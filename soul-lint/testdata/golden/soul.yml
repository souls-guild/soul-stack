# Конфиг soul-агента на управляемом хосте.

# SID = FQDN хоста; автоматически определяется, можно переопределить вручную.
# sid: redis1.cache-test-dev.example

# Где живут артефакты на этом хосте
paths:
  modules: /var/lib/soul-stack/modules   # кеш custom-модулей soul-mod-<имя>-<sha>
  seed:    /var/lib/soul-stack/seed      # SoulSeed-cert + private key (выпускается через `soul init`)

# Подключение к Keeper-кластеру.
# host — общий для обеих фаз; event_stream_port (mTLS, `soul run`) и
# bootstrap_port (server-only TLS, `soul init`) — оба обязательны.
# priority упорядочивает обе фазы (см. docs/soul/config.md → keeper.endpoints).
keeper:
  endpoints:
    - host: k1.dc1.example
      event_stream_port: 9443
      bootstrap_port: 9442
    - host: k2.dc1.example
      event_stream_port: 9443
      bootstrap_port: 9442
    - host: k3.dc1.example
      event_stream_port: 9443
      bootstrap_port: 9442
      priority: 2
    - host: k4.dc1.example
      event_stream_port: 9443
      bootstrap_port: 9442
      priority: 2
    - host: k1.dc2.example
      event_stream_port: 9443
      bootstrap_port: 9442
      priority: 3

  retry:
    max_attempts: 5
    backoff:
      initial: 1s
      max: 30s
      jitter: true
    handshake_timeout: 10s

  failback:
    enabled: true
    interval: 1h
    spray: 10m

  # mTLS-материалы выпускаются keeper-ом (через Vault PKI) при первом CSR
  tls:
    ca: /var/lib/soul-stack/seed/ca.crt

# Soulprint — что собираем как факты о хосте
soulprint:
  refresh_interval: 5m

# Cleanup кеша модулей на хосте
cleanup:
  modules_ttl_days: 30
  run_interval: 24h

# Логи и метрики
logging:
  level: info
  format: json
  rotation: { max_size_mb: 50, max_files: 5, compress: true }

metrics:
  enabled: true
  listen: "127.0.0.1:9091"

otel:
  enabled: true
  endpoint: "k1.dc1.example:4317"

# Lifecycle и capabilities плагинов (ADR-020) — симметрично keeper-side
plugin_runtime:
  socket_dir: /var/run/soul-stack/plugins        # для Soul-host (без -keeper-суффикса)
  startup_timeout: 10s
  shutdown_grace: 10s
  allowed_capabilities:
    - run_as_root
    - network_outbound
    - network_inbound
    - vault_access
    - fs_write_root
    - exec_subprocess
  conflict_policy: warn
  enable_tls: false
