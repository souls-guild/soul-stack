# vault-secrets-generated passage-ось (ADR-056 amendment, Вариант A). Симметрия с
# serial-staged.yml: тут multi-passage держит НЕ register-зависимость, а vault-ось —
# эмиттер `core.vault.kv-present` (пишет секрет по targets) уводит любую vault()-
# читающую задачу в Passage строго после себя. Без vault-оси этот сценарий схлопнулся
# бы в один Passage (read-задача рендерилась бы Keeper-side ДО записи секрета →
# render_failed на несуществующем vault-пути). Линт даёт passage_plan HINT (2 Passage),
# НЕ ошибку. Self-contained (эмиттер и потребитель в одном файле, без include): иначе
# офлайн read-задача за include-границей не видна и vault-ось не проявилась бы.
name: vault-staged
tasks:
  - name: Ensure secret exists in Vault (generate if absent)
    on: keeper
    module: core.vault.kv-present
    params:
      policy: { length: 32, charset: alphanumeric }
      targets: "${ [{ 'path': 'secret/redis/' + incarnation.name, 'field': 'password' }] }"
  - name: Write file consuming the generated secret
    module: core.file.present
    params:
      path: /etc/redis/secret.conf
      content: "requirepass ${ vault('secret/redis/' + incarnation.name + '#password') }"
