name: create
description: >
  Условный include со СТАТИЧЕСКИМ when: (input.*) — валиден (conditional-include
  group-drop, ADR-009 amendment). include раскрывается ДО стратификации; статический
  предикат (input./essence./incarnation./vars.) допустим, keeper-side render дропает
  всю группу одним вычислением include-when, если предикат false.

input:
  topology:
    type: string
    required: true
    enum: [standalone, cluster]

tasks:
  # Базовая укладка — всегда.
  - include: install.yml

  # Кластерная репликация — только при cluster-топологии. Группа целиком исчезает
  # из плана на standalone (реальное исключение, не placeholder).
  - include: replication.yml
    when: input.topology == 'cluster'
