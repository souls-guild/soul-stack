syntax = "proto3";

package soulstack.keeper.v1;

option go_package = "github.com/souls-guild/soul-stack/proto/gen/go/keeper/v1;keeperv1";

// TaskError describes a structured task execution error.
// A catalog of specific code values is separate future work (post-MVP).
message TaskError {
  string code = 1;
  string message = 2;
  string module = 3;
}
