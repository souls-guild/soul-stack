kid: keeper-dev-01

listen:
  # bootstrap/event_stream on 0.0.0.0 - reachable from docker/remote souls (host-gateway/host-IP;
  # keeper container can't see 127.0.0.1). Host coverage stays whole (0.0.0.0 ⊇ loopback), cert SAN
  # covers localhost/127/host.docker.internal/host-IP. NIM-26, precedent from e2e-live config_builder.go.
  grpc:
    bootstrap:
      addr: "0.0.0.0:9442"
      tls:
        cert: /tmp/keeper-dev/tls/keeper.crt
        key:  /tmp/keeper-dev/tls/keeper.key
    event_stream:
      addr: "0.0.0.0:9443"
      tls:
        cert: /tmp/keeper-dev/tls/keeper.crt
        key:  /tmp/keeper-dev/tls/keeper.key
        # ClientCAs for mTLS: Vault PKI root (CN=soul-stack) - the same root
        # that signs the SoulSeed certificates. See dev/provision.sh step 7.
        ca:   /tmp/keeper-dev/tls/vault-ca.crt
  openapi: { addr: "127.0.0.1:8080" }
  mcp:     { addr: "127.0.0.1:8081" }
  metrics: { addr: "127.0.0.1:9090" }

postgres:
  dsn_ref: vault:secret/keeper/postgres
  pool: { min: 2, max: 10 }

redis:
  addr: "127.0.0.1:6381"
  password_ref: ""

vault:
  addr: "http://127.0.0.1:8200"
  token: "root"
  auth:
    method: token
  pki_mount: "pki"
  pki_role: "soul-seed"

auth:
  jwt:
    signing_key_ref: vault:secret/keeper/jwt-signing-key
    issuer: keeper-dev-01
    ttl_default: 24h
    ttl_bootstrap: 720h

otel:
  # Traces go to the dev stack: otel-collector (docker-compose) on :4317 ->
  # Jaeger UI http://127.0.0.1:16686. Insecure gRPC (dev-collector without TLS).
  enabled: true
  exporter: otlp
  endpoint: "127.0.0.1:4317"

logging:
  level: info
  format: text
  rotation: { max_size_mb: 100, max_files: 5, compress: false }

# The Service registry and the default_destiny_source scalar moved to Postgres
# (service_registry + keeper_settings, ADR-029). These keys (`services:` /
# `default_destiny_source:` / `default_module_source:`) are no longer accepted
# in keeper.yml - resolution (serviceregistry.Holder) reads only from the DB. For dev/E2E
# the registry is seeded in step 10 of dev/provision.sh (a direct psql INSERT, idempotent;
# outside dev - managed via the `service.*` API, see keeper/operator-api.md):
#   - keeper_settings[default_destiny_source] = file:///tmp/keeper-dev/destiny/{name}
#   - service hello-world -> file:///tmp/keeper-dev/repos/hello-world @ main
#   - service redis       -> file:///tmp/keeper-dev/repos/redis @ main
#     (consolidated redis, ADR-029/redis consolidation: one mode-agnostic
#      `redis` destiny for all redis_type; resolved via default_destiny_source:
#      {name} = redis, ref v1.0.0 from redis/service.yml::destiny[]={redis}).
# Seeding requires the schema to already be applied (migrations 034/035); on a fresh DB it
# is deferred until after `keeper init` runs - rerun `make dev-provision`.

# Sigil - plugin binary signing + trust-allowlist registry (ADR-026). Without this block
# spawning ANY keeper-side plugin (CloudDriver soul-cloud-wb / SshProvider)
# fail-closes (no_trust_anchor). signing_key_ref -> Vault KV holding an ed25519 private key
# (field signing_key, PEM PKCS#8). After adding it - restart keeper (hot-reload
# does NOT pick up the Sigil block) + allow the binary via POST /v1/plugins/sigils.
sigil:
  signing_key_ref: vault:secret/keeper/sigil-signing-key

plugins:
  cache_root: /tmp/keeper-dev/plugins
  # work_root - writable root for the resolver's git clones (ADR-026 F-fetch). The default
  # /var/lib/soul-stack-keeper/plugin-src isn't writable under the dev user -> clone would
  # fail, leaving the slot empty. STRICTLY outside cache_root (schema-guard). The directory is created by
  # dev/provision.sh.
  work_root: /tmp/keeper-dev/plugin-work
  # CloudDriver catalog. FilterByCatalog keeps in discovery only plugins
  # whose manifest.name is listed here (the `name` field); without a `wb` entry the
  # manually-populated wb-wb cache slot would be dropped.
  #
  # DEV shortcut (no public driver git repo yet): the cache slot
  # /tmp/keeper-dev/plugins/wb-wb/{manual-0001,current} is populated MANUALLY
  # (manifest.yaml + the soul-cloud-wb binary from /home/co-cy/vscode/soulstack/wb-plugins).
  # source is file:// without SOUL_STACK_ALLOW_FILE_REPOS=1 set: the git resolver
  # rejects the scheme (validateGitScheme -> ErrSourceUnavailable), turns it into a warning
  # and does NOT touch the manual current symlink (per-entry fail-closed in ResolveCatalog).
  # The entry is needed ONLY for FilterByCatalog.
  # TEMPORARY, to be removed: once there's a real git repo, replace with
  # { name: wb, source: "ssh://...wb-plugins", ref: "<tag>" }.
  cloud_drivers:
    - { name: wb, source: "file:///dev/null/soul-cloud-wb-manual-slot", ref: "manual-0001" }
  # SoulModule catalog (epic core.module.installed, S1). source is a git repo with a
  # BUILT binary (dist/soul-mod-redis + manifest.yaml), materialized by
  # dev/provision.sh (step 9b). plugingit clones it (file:// scheme, enabled by
  # SOUL_STACK_ALLOW_FILE_REPOS=1 - set by keeper-run.sh), caches the slot
  # community-redis/<sha> -> current: the plugin becomes available for Sigil-allow (POST
  # /v1/plugins/sigils) and routine redis operations. `name` = manifest.name (redis) for FilterByCatalog.
  soul_modules:
    - { name: redis, source: "file:///tmp/keeper-dev/plugin-repos/community-redis", ref: "v1.0.0" }

plugin_runtime:
  socket_dir: /tmp/keeper-dev/plugin-sockets
  startup_timeout: 10s
  shutdown_grace: 10s
  allowed_capabilities:
    - run_as_root
    - network_outbound
    - network_inbound
    - vault_access
    - fs_write_root
    - exec_subprocess
  conflict_policy: warn
  enable_tls: false

hot_reload:
  enable_signal: true
  enable_inotify: false
  audit_correlation_id: true

audit:
  enabled: true
  otel_export: false
  retention_days: 365

# Watchman (isolation detection + soul-shedding S2): the PG+Redis probe period and the
# threshold of consecutive failures before forcibly closing local EventStream streams.
# The defaults (5s / 3) match config.DefaultWatchman*; spelled out explicitly for dev
# visibility. On a local single-instance smoke run, shedding normally doesn't trigger
# (PG/Redis from docker-compose are reachable).
watchman_interval: 5s
watchman_fail_threshold: 3

# Refuse-guard soul-shedding (Finding-A, ADR-027(h)): when acolytes=0 and other
# live Keeper instances exist in the Conclave, Keeper refuses to start. Default false
# (refuse). Doesn't trigger on single-instance dev-smoke (Conclave.CountLive<=1).
allow_unsafe_single_path_multi_keeper: false

# Acolyte work-queue pool (ADR-027). >0 - keeper is a full HA participant:
# apply runs through Ward-claim, cross-keeper dispatch works. Needed
# for the two-keeper soul-failover demo (see docs/dev/local-setup.md): keeper-a and
# keeper-b are symmetric (both acolytes>0), refuse-guard doesn't trigger either on the
# initial start or on restarting keeper-a while keeper-b is alive (phase 4). The value
# matches keeper-b.dev.yml and the mega-test stand (3x acolytes:2).
acolytes: 2

# Ceiling on the onboarding-barrier await_timeout (ADR-061): provision run budget = max_await_timeout + 10m deploy -> 20m. fail-fast: a VM usually comes online in ~5m, a large timeout would mask an enroll failure (essence redis: join_wait 10m + await 8m fit within it).
max_await_timeout: 10m

# VoyageWorker pool (ADR-043): claim+execute for unified Voyage runs
# (kind=scenario|command). Config-gated OFF by default (workers:0); enabled
# for pilot runtime validation. poll_interval/lease_* are omitted - defaults apply
# (DefaultVoyagePollInterval / DefaultVoyageLeaseTTL / DefaultVoyageLeaseRenewInterval).
voyage:
  workers: 2
  # max_scope - ceiling on the resolved scope size of a single Voyage (DoS guard
  # S-med-3). Unset -> default 10000; 0 -> unlimited. Exceeding it -> 422
  # voyage_scope_too_large.
  max_scope: 10000
  # max_batch_size - ceiling on batch/window size (DoS guard S-W4): the effective
  # batch_size for barrier, concurrency for window. Unset -> default 10000;
  # 0 -> no limit. Exceeding it -> 422 voyage_batch_size_too_large.
  max_batch_size: 10000

reaper:
  enabled: true
  interval: 1h
  dry_run: false
  batch_size: 500
  lock_ttl: 5m
  rules:
    expire_pending_seeds: { enabled: true, max_age: 24h, action: delete }
    purge_used_tokens:    { enabled: true, max_age: 90d, action: delete }
    purge_souls:          { enabled: true, statuses: [disconnected, expired], max_age: 30d, action: delete }
    purge_old_seeds:      { enabled: true, statuses: [superseded, expired, revoked], max_age: 90d, action: delete }
    mark_disconnected:    { enabled: true, stale_after: 90s, action: set_status, target_status: disconnected }
    purge_audit_old:      { enabled: true, max_age: 365d, action: delete }
    purge_apply_runs:     { enabled: true, max_age: 30d, action: delete }
    purge_apply_run_plan: { enabled: true, max_age: 30d, action: delete }
    purge_apply_task_register: { enabled: true, max_age: 1h, action: delete }
    reclaim_voyages:      { enabled: true, stale_after: 1m }

# Conductor - the leader-elected executor of Cadence schedules (ADR-048). Has its own
# `conductor:leader` lease, independent of reaper.interval (1h). Spawning due Cadences
# moved here from the Reaper rule spawn_due_cadence.
#
# Adaptive poll step (ADR-048 "Adaptive interval"): the step isn't fixed but
# clamp(derivedMinPeriod, poll_floor, poll_ceiling); an empty registry -> poll_idle.
# derivedMinPeriod = MIN(interval_seconds) of enabled rules + a 60s contribution when
# cron is present. The "Calm" profile (floor=30s/ceiling=60s/idle=120s): Cadences with a
# frequent interval are polled at floor, rare ones at ceiling, an empty registry at idle.
# floor=30s - the absolute minimum (DB-CHECK floor interval_seconds >= 30 - Pass B).
# enabled is omitted -> default-ON when Redis is present (footgun-guard ADR-048 §5);
# to disable a single Cadence, use its own enabled: false, not this setting.
cadence_scheduler:
  poll_floor: 30s
  poll_ceiling: 60s
  poll_idle: 120s
  lock_ttl: 5m

# The RBAC catalog lives in Postgres (ADR-028), managed via the role.* API/MCP;
# the `rbac:` key in keeper.yml is no longer accepted.

# push - bootstrap delivery of the `core.bootstrap.delivered` token (ADR-063) and
# push-run of Destiny (ADR-032). The whole block is optional.
#
# transport (ADR-063 amendment) - the bootstrap token delivery mode:
#   direct (default): generic SSH via primary_ip (plugin Authorize/Sign +
#     CA-signed host-cert verify via host_ca_refs[]).
#   teleport: by-name via Teleport Proxy (target = SID/FQDN, NOT an IP).
#     Transport+auth+host-verify go entirely through the Teleport identity file;
#     plugin Authorize/Sign and the Vault host-CA are NOT used. A fresh VM
#     shows up in Teleport after ~3-5min -> the module retries the connect
#     (scenario-param join_wait_timeout, default 360s).
#
# Example of teleport mode (commented out - the dev stand has no Teleport):
# push:
#   transport: teleport
#   teleport:
#     proxy_addr: proxy.example.com:443     # gRPC sshgrpc-listener of the Teleport Proxy
#     identity_file: /etc/soul/teleport-identity   # tctl auth sign, node access
#     cluster: example.com                  # cluster name where node names (SID) resolve

push:
  transport: teleport
  teleport:
    proxy_addr: tp.rwb.ru:443
    # dedicated: identity_file is hardcoded to the default dev-dir - parameterize under STAND_DEV_DIR for full isolation (NIM-25).
    identity_file: /tmp/keeper-dev/keeper-push.identity
    cluster: teleport-rwb
    # proxy sits behind a public L7 TLS balancer (*.tp.rwb.ru), ADR-063 amendment;
    # use_system_trust - a safety net when alpn is off (a no-op when alpn_upgrade=true)
    use_system_trust: true
    alpn_upgrade: true

# cloud-init userdata for core.cloud.provisioned (ADR-017(h));
# dev stand: bastion tunnel 192.168.2.3, CA in Vault (field ca), artifact host :8443.
# dedicated: bootstrap_endpoint/soul_binary_url are hardcoded to the default dev - parameterize for full isolation (NIM-25).
cloud_init:
  bootstrap_endpoint: "192.168.2.3:9442"
  # EventStream (mTLS) lives on 9443 - without this, the blueprint derived both ports of
  # soul.yml from bootstrap_endpoint and soul would dial EventStream on 9442 (ADR-063).
  event_stream_port: 9443
  tls_ca_ref: "vault:secret/keeper/bootstrap-ca"
  soul_binary_url: "https://192.168.2.3:8443/soul"
