# dev/upgrade-demo/keeper-demo.yml — ISOLATED demo-keeper for the UI stand NIM-34.
#
# Differences from dev/keeper.dev.yml (to live ALONGSIDE the shared stand without conflicts):
#   - dedicated ports (openapi 8090 / mcp 8091 / metrics 9091 / grpc 9452-9453) —
#     no conflict with the keeper of another session on 8080/9090/9442/9443;
#   - kid keeper-demo-nim34 (own identity/lease);
#   - WITHOUT the `push:` block (no teleport-identity in dev → the regular config fails on startup);
#   - acolytes:0 + allow_unsafe_single_path_multi_keeper:true — does NOT participate in
#     the acolyte work-queue (doesn't claim other sessions' apply_runs); reaper/voyage OFF —
#     doesn't purge or touch the neighboring session's data on the shared PG.
# Shared PG/Redis/Vault/TLS (the HA model allows this). To be removed outside the UI demo.

kid: keeper-demo-nim34

listen:
  grpc:
    bootstrap:
      addr: "0.0.0.0:9452"
      tls:
        cert: /tmp/keeper-dev/tls/keeper.crt
        key:  /tmp/keeper-dev/tls/keeper.key
    event_stream:
      addr: "0.0.0.0:9453"
      tls:
        cert: /tmp/keeper-dev/tls/keeper.crt
        key:  /tmp/keeper-dev/tls/keeper.key
        ca:   /tmp/keeper-dev/tls/vault-ca.crt
  openapi: { addr: "127.0.0.1:8090" }
  mcp:     { addr: "127.0.0.1:8091" }
  metrics: { addr: "127.0.0.1:9091" }

postgres:
  dsn_ref: vault:secret/keeper/postgres
  pool: { min: 2, max: 10 }

redis:
  addr: "127.0.0.1:6381"
  password_ref: ""

vault:
  addr: "http://127.0.0.1:8200"
  token: "root"
  auth:
    method: token
  pki_mount: "pki"
  pki_role: "soul-seed"

auth:
  jwt:
    signing_key_ref: vault:secret/keeper/jwt-signing-key
    # issuer matches the standard dev (dev/mint-jwt.sh issues a token with this iss).
    issuer: keeper-dev-01
    ttl_default: 24h
    ttl_bootstrap: 720h

otel:
  enabled: true
  exporter: otlp
  endpoint: "127.0.0.1:4317"

logging:
  level: info
  format: text
  rotation: { max_size_mb: 100, max_files: 5, compress: false }

# Sigil — plugin binary signing (ADR-026). The key is seeded by the dev-provisioning/stand
# (secret/keeper/sigil-signing-key). The demo upgrade-paths doesn't spawn plugins.
sigil:
  signing_key_ref: vault:secret/keeper/sigil-signing-key

plugins:
  cache_root: /tmp/keeper-dev/plugins
  cloud_drivers:
    - { name: example, source: "file:///dev/null/soul-cloud-example-manual-slot", ref: "manual-0001" }
  soul_modules:
    - { name: redis, source: "file:///dev/null/community-redis-manual-slot", ref: "manual-0001" }

plugin_runtime:
  socket_dir: /tmp/keeper-dev/plugin-sockets-demo
  startup_timeout: 10s
  shutdown_grace: 10s
  allowed_capabilities:
    - run_as_root
    - network_outbound
    - network_inbound
    - vault_access
    - fs_write_root
    - exec_subprocess
  conflict_policy: warn
  enable_tls: false

hot_reload:
  enable_signal: true
  enable_inotify: false
  audit_correlation_id: true

audit:
  enabled: true
  otel_export: false
  retention_days: 365

watchman_interval: 5s
watchman_fail_threshold: 3

# acolytes:0 — the demo-keeper does NOT participate in the acolyte work-queue (doesn't claim
# apply_runs of the neighboring session). Requires allow_unsafe (otherwise the refuse-guard
# would deny startup with a second keeper alive). For upgrade-paths (READ) and legacy-upgrade
# (in-tx, no hosts) acolyte is not needed.
allow_unsafe_single_path_multi_keeper: true
acolytes: 0

max_await_timeout: 10m

# Voyage workers OFF — the demo doesn't run mass upgrades; don't touch someone else's queue.
voyage:
  workers: 0
  max_scope: 10000
  max_batch_size: 10000

# Reaper OFF — the demo-keeper does NOT purge the shared PG (the neighboring session's data stays intact).
reaper:
  enabled: false
  interval: 1h
  dry_run: true
  batch_size: 500
  lock_ttl: 5m
  rules: {}

cadence_scheduler:
  poll_floor: 30s
  poll_ceiling: 60s
  poll_idle: 120s
  lock_ttl: 5m
