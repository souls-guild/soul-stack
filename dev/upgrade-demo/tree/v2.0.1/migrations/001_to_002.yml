from_version: 1
to_version: 2

description: >-
  Демо-миграция NIM-34: state_schema v1 -> v2 (ADR-019). Идентична миграции из
  v2.0.0 (каталог migrations/ наследуется вниз по git-дереву патчей, ADR-0068 §5).
  Плоский set с has()-guard: помечаем факт перехода полем schema_v2. Forward-only.

transform:
  - set:
      path:  state.schema_v2
      value: "${ has(state.schema_v2) ? state.schema_v2 : true }"
