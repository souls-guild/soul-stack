name: upgrade-demo
state_schema_version: 2
description: >-
  Демо-сервис NIM-34 (upgrade v2, ADR-0068), тег v2.0.0. Отличия от v1.0.0:
  state_schema_version=2 + migrations/001_to_002.yml (state-миграция ADR-019) +
  upgrade/to_v2/main.yml с top-level from: ["v1.0.0"] (self-describing
  upgrade-сценарий). Переход v1.0.0 -> v2.0.0 = режим FOUND: upgrade-paths?to=v2.0.0
  вернёт mode=found + slug=to_v2 + reachable=true + state_migrations [001->002].

# state_schema v2: поле schema_v2 добавляется миграцией 001_to_002 (флаг факта
# апгрейда, read-model). note унаследовано из v1.
state_schema:
  type: object
  properties:
    note:
      type: string
    schema_v2:
      type: boolean
