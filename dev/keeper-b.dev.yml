kid: keeper-dev-b

# Second keeper instance of the dev stack for soul-failover demo (S4). Shares
# common PG/Redis/Vault with keeper.dev.yml and the same TLS material from
# /tmp/keeper-dev/tls/ (issued by dev/provision.sh). Differs only in `kid` and
# non-overlapping listen ports (see below).
#
# acolytes: 2 — HA work-queue (ADR-027). With two live Keeper instances the
# Conclave refuse-guard soul-shedding (S3, allow_unsafe_single_path_multi_keeper:
# false) will NOT let an instance with acolytes=0 start on a single path.
# acolytes>0 on both → execution pool active, guard does not trigger.
#
# Why a second keeper: dev/soul.dev.yml lists BOTH keepers in
# keeper.endpoints with priorities (priority 1 = keeper-a, 2 = keeper-b). When
# keeper-a goes down, soul moves to keeper-b; on recovery it returns
# (failback.enabled: true). Procedure — docs/dev/local-setup.md → soul-failover.

listen:
  grpc:
    bootstrap:
      addr: "127.0.0.1:9542"
      tls:
        cert: /tmp/keeper-dev/tls/keeper.crt
        key:  /tmp/keeper-dev/tls/keeper.key
    event_stream:
      addr: "127.0.0.1:9543"
      tls:
        cert: /tmp/keeper-dev/tls/keeper.crt
        key:  /tmp/keeper-dev/tls/keeper.key
        # ClientCAs for mTLS: same Vault PKI root (CN=soul-stack) as
        # keeper-a — SoulSeed certs are signed by it too, soul verifies
        # both keepers with the same CA. See dev/provision.sh step 7.
        ca:   /tmp/keeper-dev/tls/vault-ca.crt
  openapi: { addr: "127.0.0.1:8082" }
  mcp:     { addr: "127.0.0.1:8083" }
  metrics: { addr: "127.0.0.1:9092" }

postgres:
  dsn_ref: vault:secret/keeper/postgres
  pool: { min: 2, max: 10 }

redis:
  addr: "127.0.0.1:6381"
  password_ref: ""

vault:
  addr: "http://127.0.0.1:8200"
  token: "root"
  auth:
    method: token
  pki_mount: "pki"
  pki_role: "soul-seed"

auth:
  jwt:
    signing_key_ref: vault:secret/keeper/jwt-signing-key
    # issuer matches the instance kid — tokens issued by keeper-b are
    # distinguishable from keeper-a in the audit trail by claim `iss`.
    issuer: keeper-dev-b
    ttl_default: 24h
    ttl_bootstrap: 720h

otel:
  # Same dev traces: otel-collector (docker-compose) :4317 → Jaeger
  # http://127.0.0.1:16686. Insecure gRPC (dev-collector without TLS). The
  # service in Jaeger is the same for both keepers (`keeper`) — tell
  # instances apart by kid in spans.
  enabled: true
  exporter: otlp
  endpoint: "127.0.0.1:4317"

logging:
  level: info
  format: text
  rotation: { max_size_mb: 100, max_files: 5, compress: false }

plugins:
  cache_root: /tmp/keeper-dev/plugins

plugin_runtime:
  socket_dir: /tmp/keeper-dev/plugin-sockets-b
  startup_timeout: 10s
  shutdown_grace: 10s
  allowed_capabilities:
    - run_as_root
    - network_outbound
    - network_inbound
    - vault_access
    - fs_write_root
    - exec_subprocess
  conflict_policy: warn
  enable_tls: false

hot_reload:
  enable_signal: true
  enable_inotify: false
  audit_correlation_id: true

audit:
  enabled: true
  otel_export: false
  retention_days: 365

# Watchman (isolation detection + soul-shedding S2): on losing PG/Redis the
# instance closes its own local EventStream streams. On the two-keeper
# failover demo this gives a second soul-departure scenario — WITHOUT killing
# keeper-a: just isolate it from PG/Redis, Watchman drops the stream, soul
# moves to keeper-b. Defaults (5s / 3) match config.DefaultWatchman*; spelled
# out explicitly here.
watchman_interval: 5s
watchman_fail_threshold: 3

# HA work-queue: acolytes>0 on both instances. See top comment on refuse-guard S3.
acolytes: 2

# Refuse-guard soul-shedding (Finding-A, ADR-027(h)): default false (refuse).
# Not relevant at acolytes=2 (single-path guard only triggers at
# acolytes=0 + live Conclave); kept explicit for symmetry with keeper.dev.yml.
allow_unsafe_single_path_multi_keeper: false

reaper:
  enabled: true
  interval: 1h
  dry_run: false
  batch_size: 500
  lock_ttl: 5m
  rules:
    expire_pending_seeds: { enabled: true, max_age: 24h, action: delete }
    purge_used_tokens:    { enabled: true, max_age: 90d, action: delete }
    purge_souls:          { enabled: true, statuses: [disconnected, expired], max_age: 30d, action: delete }
    purge_old_seeds:      { enabled: true, statuses: [superseded, expired, revoked], max_age: 90d, action: delete }
    mark_disconnected:    { enabled: true, stale_after: 90s, action: set_status, target_status: disconnected }
    purge_audit_old:      { enabled: true, max_age: 365d, action: delete }
    purge_apply_runs:     { enabled: true, max_age: 30d, action: delete }
    purge_apply_run_plan: { enabled: true, max_age: 30d, action: delete }
    purge_apply_task_register: { enabled: true, max_age: 1h, action: delete }

# Conductor (ADR-048) — symmetric with keeper-a: both instances spin up the
# scheduler, leadership over lease conductor:leader is elected independently
# from reaper:leader (can be different holders). Adaptive polling step
# (ADR-048 "Adaptive interval"), "Calm" profile floor=30s/ceiling=60s/idle=120s
# — see keeper.dev.yml.
cadence_scheduler:
  poll_floor: 30s
  poll_ceiling: 60s
  poll_idle: 120s
  lock_ttl: 5m
