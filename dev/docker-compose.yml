# Локальный dev-стек Soul Stack. Поднимается через `make dev-up`, см.
# `docs/dev/local-setup.md`. Включает Postgres (для audit_log и будущих
# реестров souls/operators/incarnation, ADR-005), Vault в dev-режиме (для
# чтения signing-key JWT и других KV, ADR-014/ADR-017) и OTel-стек
# (otel-collector + Jaeger) для приёма трейсов keeper/soul (ADR-024).
#
# ВАЖНО для безопасности:
#   - Postgres: учётка `keeper:keeper` — для local dev. В проде managed-PG
#     с собственными секретами через `vault:`-references в keeper.yml.
#   - Vault: dev-mode (`VAULT_DEV_ROOT_TOKEN_ID=root`), auto-unsealed,
#     in-memory storage — все секреты теряются при restart контейнера.
#     В проде — Vault Enterprise / OSS с persistent storage backend
#     (raft/consul) + auto-unseal через KMS / Shamir keys, AppRole или
#     mTLS вместо root-token-а.
#   - OTel-collector / Jaeger: приём OTLP **без TLS** (dev). keeper/soul
#     шлют трейсы insecure-gRPC на 127.0.0.1:4317. В проде — collector с
#     TLS и persistent trace-backend (не all-in-one in-memory Jaeger).

services:
  postgres:
    image: postgres:16-alpine
    container_name: ${STACK_PREFIX:-soul-stack}-postgres
    environment:
      POSTGRES_USER: keeper
      POSTGRES_PASSWORD: keeper
      POSTGRES_DB: keeper
    ports:
      - "${PG_PORT:-5434}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keeper -d keeper"]
      interval: 2s
      timeout: 3s
      retries: 30

  vault:
    image: hashicorp/vault:1.18
    container_name: ${STACK_PREFIX:-soul-stack}-vault
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      # VAULT_ADDR — для `vault`-CLI внутри контейнера (healthcheck,
      # `docker exec ... vault status`). По default CLI идёт на
      # https://127.0.0.1:8200, но dev-listener — HTTP, без TLS.
      VAULT_ADDR: http://127.0.0.1:8200
    ports:
      - "${VAULT_PORT:-8200}:8200"
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 2s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7-alpine
    container_name: ${STACK_PREFIX:-soul-stack}-redis
    ports:
      - "${REDIS_PORT:-6381}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 30

  # OTLP-приёмник: принимает трейсы по gRPC :4317 от keeper/soul, прокидывает
  # их в Jaeger (OTLP :4317 внутри docker-сети) и дублирует в debug-лог
  # (видно через `docker compose logs otel-collector`). Конфиг pipeline-а —
  # dev/otel-collector.yaml, смонтирован read-only.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.115.1
    container_name: ${STACK_PREFIX:-soul-stack}-otel-collector
    command: ["--config=/etc/otel-collector.yaml"]
    volumes:
      - ./otel-collector.yaml:/etc/otel-collector.yaml:ro
    ports:
      # OTLP gRPC — единственный наружу проброшенный порт коллектора:
      # keeper/soul шлют сюда (127.0.0.1:4317). Стандартный OTLP-порт,
      # свободен на dev-стенде (PG 5434 / Redis 6381 / Vault 8200 не задеты).
      - "${OTEL_PORT:-4317}:4317"
    depends_on:
      - jaeger

  # Хранилище и UI трейсов. all-in-one: in-memory storage (трейсы теряются
  # при restart — для dev ок), UI на :16686. Принимает от коллектора OTLP
  # внутри docker-сети; наружу проброшен только UI-порт.
  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    container_name: ${STACK_PREFIX:-soul-stack}-jaeger
    environment:
      # Включает OTLP-приёмник Jaeger (:4317/:4318 внутри контейнера);
      # коллектор экспортирует сюда по docker-DNS-имени `jaeger`.
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      # Jaeger UI — http://127.0.0.1:16686. Стандартный порт, свободен.
      - "${JAEGER_PORT:-16686}:16686"

volumes:
  postgres_data:
