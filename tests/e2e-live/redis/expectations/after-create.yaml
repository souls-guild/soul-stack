# Post-apply ожидания redis::create (режим standalone) в L3b
# (real-soul-in-container под examples/service/redis, redis-консолидация
# концепции Ansible-роли). Один Debian-12 systemd-PID-1 контейнер
# (soul-live-a.example.com). create-диспетчер инклудит ветку standalone
# (cluster/sentinel/sentinel_only гасятся static-when), которая раскрывает
# режим-агностичный destiny `redis`: apt redis-server + render redis.conf
# (merged config) + render users.acl + systemd hardening drop-in. Живой
# health-gate PING — через плагин community.redis.command.
#
# Экспортеры (redis_exporter/node_exporter) ВЫНЕСЕНЫ из service/redis: мониторинг —
# отдельная сущность (redis-консолидация .pm/tasks/2026-06-22-redis-consolidation).
#
# apply_runs/incarnation_state/audit/metrics — те же контракт-проверки, что в
# smoke-nginx-live. incarnation_state идёт из scenario.state_changes (keeper-side
# рендер из input/essence ПОСЛЕ барьера), НЕ из RunResult.
#
# host_state — реальная верификация Exec-ом внутри контейнера: пакет redis-server
# installed + systemd active, redis.conf отрендерен с merged-директивами.
apply_runs:
  status: success

incarnation_state:
  redis_type: standalone
  # maxmemory = memory_mb(1024)*reserve(75)/100 = 768mb (merge-трансляция).
  redis_config:
    maxmemory: 768mb
    maxmemory-policy: volatile-lru

audit_events:
  - type: incarnation.created

metrics:
  keeper_scenario_runs_total{result="ok"}: ">= 1"

host_state:
  - soul: soul-live-a.example.com
    packages:
      redis-server: installed
    services:
      redis-server: active
    files:
      # redis.conf, отрендеренный из merged redis_config (директива maxmemory
      # доказывает, что merge-трансляция простого ввода дошла до файла на хосте).
      - path: /etc/redis/redis.conf
        contains: "maxmemory 768mb"
