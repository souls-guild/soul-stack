name: create
# create: true — starting scenario (Phase 2: the create set = EXACTLY {scenario with the flag}).
create: true
description: >-
  FC-4 happy-path: a task with a REALLY failing module + failed_when:false. On the
  Soul, core.exec.run for a non-existent binary will fail fork/exec (file not
  found -> SendFailed -> last.failed=true, moduleErr=module.failed). failed_when
  "false" overrides the failure -> the final task status is OK -> the run is SUCCESS.
  The original error is NOT lost: applyrunner.go puts it in register.<name>.
  ignored_error, keeper persists it in apply_task_register. register: is mandatory,
  otherwise register_data doesn't accumulate.

# Focus — the flow-control outcome and register, state doesn't change.
state_changes: {}

tasks:
  - name: Deliberately failing task with ignore_errors
    module: core.exec.run
    register: fail_probe
    # * ignore_errors: a real module failure is suppressed into OK.
    failed_when: "false"
    params:
      # Non-existent absolute path -> exec can't find the binary -> res.Err != nil
      # -> util.SendFailed. This is a REAL module failure (not an exit code in output:
      # core.cmd.shell with `exit 1` does NOT fail — puts exit_code in output).
      cmd: /nonexistent/fc4-deliberate-fail
      args: ["arg-that-never-runs"]
