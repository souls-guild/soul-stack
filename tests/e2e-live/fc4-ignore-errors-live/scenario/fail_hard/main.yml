name: fail_hard
description: >-
  FC-4 контраст: ТА ЖЕ падающая задача, что в create, но БЕЗ failed_when:false.
  Реальный провал модуля (core.exec.run несуществующего бинаря) НЕ подавлен →
  финальный статус задачи FAILED → прогон FAILED → incarnation error_locked.
  Доказывает, что success в create — заслуга именно failed_when:false
  (ignore_errors), а не того, что модуль «не падает». Зеркало create без флага.

state_changes: {}

tasks:
  - name: Deliberately failing task WITHOUT ignore_errors
    module: core.exec.run
    register: fail_probe
    # Нет failed_when → реальный провал модуля валит задачу и весь прогон.
    params:
      cmd: /nonexistent/fc4-deliberate-fail
      args: ["arg-that-never-runs"]
