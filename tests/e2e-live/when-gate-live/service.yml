name: when-gate-live
state_schema_version: 1
description: >-
  FC-5 L3b when-gating capstone: реальный soul-флот исполняет probe
  (core.cmd.shell `redis-cli role`) → keeper собирает per-host register → задача
  с `when: register.redis_role.stdout == 'master'` и БЕЗ where: уходит на ВСЕ
  хосты, а Soul-side per-host gating выполняет её только на master (CHANGED/OK) и
  скипает (TASK_STATUS_SKIPPED) на репликах. Симметрия со staged-probe-live, но
  доказывается ДРУГОЙ путь: where = Keeper-side targeting (no_match на уровне
  apply_runs), when = Soul-side per-task gating (SKIPPED-событие до Apply).

# state_schema_version=1 → каталог migrations/ не обязателен (ADR-019).
# Фокус — Soul-side when-gating, не мутация incarnation.state: state_changes пуст.
state_schema:
  type: object
  properties: {}
