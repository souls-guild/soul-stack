name: module-delivery-live
state_schema_version: 1
description: >-
  NIM-32 S2 live-гейт доставки SoulModule-плагинов (ADR-065 S5, живая гарантия
  NIM-8). Сервис ДЕКЛАРИРУЕТ community.redis в modules[] и НЕ содержит явного
  install-шага нигде. create ставит redis core-модулями без потребителя плагина
  (негатив: синтеза в create-плане нет); операционный verify_live зовёт
  community.redis.command — keeper авто-синтезирует core.module.installed из
  этой manifest-декларации ПЕРЕД потребителем, Soul в ОДНОМ прогоне
  fetch→verify→atomic-rename→hot-register и тут же исполняет потребителя.

# state_schema_version=1 → каталог migrations/ не обязателен (ADR-019).
state_schema:
  type: object
  properties: {}

# modules[] — явная manifest-декларация зависимости (ADR-065(e) amendment):
# keeper синтезирует core.module.installed {name, ref} перед первым потребителем
# community.redis.* в плане. Потребителя в create НЕТ → синтеза в create-плане
# нет; потребитель — только в операционном verify_live.
modules:
  - { name: community.redis, ref: v1.0.0 }
