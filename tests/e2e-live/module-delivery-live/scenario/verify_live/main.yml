name: verify_live
description: >-
  Operational scenario: a single consumer task for community.redis.command (PING).
  Keeper synthesizes core.module.installed (install community.redis) BEFORE it from
  the manifest's modules[] declaration (ADR-065(e)); Soul in THIS run
  fetch->verify->atomic-rename->hot-registers the plugin and RIGHT THERE runs the
  consumer (without restarting the daemon, ADR-065(d)).

# state_changes is empty: the scenario proves module delivery, not a state mutation.
state_changes: {}

tasks:
  # Consumer of community.redis.* -> triggers auto-synthesis of the install step before it.
  # register+failed_when: task success means Redis answered PONG (Output.result,
  # impl.go). changed=false by default (probe semantics of command-state).
  - name: Ping redis through the community.redis plugin
    module: community.redis.command
    register: ping
    failed_when: "register.self.result != 'PONG'"
    params:
      addr: "127.0.0.1:6379"
      args: ["PING"]
