# Скрипт ответов soul-stub-а для redis-monitored::create (e2e под
# examples/service/redis-monitored).
#
# scenario create раскрывается в плоский список задач трёх standalone-destiny
# через apply:destiny (ADR-009, изолированный render каждой): redis-single →
# redis-exporter → node-exporter. task_name ниже = `name:` задач в
# examples/destiny/<name>/tasks/*.yml (те же три destiny, что у tests/e2e/redis;
# порядок раскрытия create → install/account/service).
#
# state_changes — per-task артефакт RunResult (register/drift); incarnation.state
# мутируется ОТДЕЛЬНО — keeper-side рендером scenario.state_changes.sets из
# input/essence ПОСЛЕ барьера (run.go §8), НЕ из этих state_changes. Поэтому здесь
# документируется эффект задачи на хосте, а assert incarnation_state идёт по sets
# (см. expectations/after-create.yaml).
#
# collectors.yml-задачи (smartmon/nvme/ipmi под when:) в скрипт НЕ внесены: при
# node_exporter_collectors=[] они на Soul-е скипаются. На L3a их task_name ловит
# SetApplyDefaultSuccess (harness.LoadApplyScript), чтобы unscripted-задача не
# дала FAILED. harness грузит этот скрипт inline через LoadApplyScript
# (YAML-loader fixtures не реализован — pilot-паттерн).
scenarios:
  create:
    apply_responses:
      # ── destiny redis-single ──────────────────────────────────────────────
      - task_name: "Install redis-server package"
        run_result:
          status: success
          state_changes:
            packages:
              - redis-server: installed
      - task_name: "Ensure the redis socket directory exists"
        run_result: { status: success }
      - task_name: "Render redis.conf with dual-access (TCP + unix socket)"
        run_result: { status: success }
      - task_name: "Ensure the redis-server systemd drop-in directory exists"
        run_result: { status: success }
      - task_name: "Render redis-server systemd hardening drop-in"
        run_result: { status: success }
      - task_name: "Reload systemd because the hardening drop-in changed"
        run_result: { status: success }
      - task_name: "Ensure redis-server is running and enabled at boot"
        run_result:
          status: success
          state_changes:
            services:
              - redis-server: running
      - task_name: "Restart redis-server because config or hardening changed"
        run_result: { status: success }

      # ── destiny redis-exporter ────────────────────────────────────────────
      - task_name: "Fetch redis_exporter tarball"
        run_result: { status: success }
      - task_name: "Extract redis_exporter tarball"
        run_result: { status: success }
      - task_name: "Install redis_exporter binary"
        run_result: { status: success }
      - task_name: "Render redis_exporter systemd unit"
        run_result: { status: success }
      - task_name: "Ensure redis_exporter is running and enabled at boot"
        run_result:
          status: success
          state_changes:
            services:
              - redis_exporter: running
      - task_name: "Restart redis_exporter because unit changed"
        run_result: { status: success }

      # ── destiny node-exporter ─────────────────────────────────────────────
      - task_name: "Fetch node_exporter tarball"
        run_result: { status: success }
      - task_name: "Extract node_exporter tarball"
        run_result: { status: success }
      - task_name: "Ensure the node_exporter system group exists"
        run_result: { status: success }
      - task_name: "Ensure the node_exporter system user exists"
        run_result: { status: success }
      - task_name: "Ensure textfile collector directory exists"
        run_result: { status: success }
      - task_name: "Install node_exporter binary"
        run_result: { status: success }
      - task_name: "Render node_exporter systemd unit"
        run_result: { status: success }
      - task_name: "Ensure node_exporter is running and enabled at boot"
        run_result:
          status: success
          state_changes:
            services:
              - node_exporter: running
      - task_name: "Restart node_exporter because unit or binary changed"
        run_result: { status: success }
