name: failover
description: |
  Passage 0 — role probe (register: role), emitting a per-host fact.
  Passage 1 — action, targeting `where: register.role.stdout == 'master'`.
  Stratify (ADR-056) splits the probe and the register.role consumer into separate Passages;
  the stage-loop renders Passage 1 with per-host register from Passage 0 → where targets
  ONLY the master host.
state_changes: {}
tasks:
  - name: Probe role
    module: core.exec.run
    register: role
    changed_when: "false"
    params:
      cmd: detect-role

  - name: Act on master only
    module: core.exec.run
    where: "register.role.stdout == 'master'"
    params:
      cmd: promote
