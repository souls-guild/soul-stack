# Скрипт ответов soul-stub-а для L3a redis-cluster-live (контракт-e2e под
# examples/service/redis-cluster-live). Один блок на сценарий; task_name = `name:`
# задач в examples/service/redis-cluster-live/scenario/<name>/main.yml.
#
# Все задачи сервиса — core-модули (core.pkg/core.file/core.cmd/core.file.rendered),
# без apply:destiny: список плоский (раскрытия standalone-destiny нет, в отличие от
# pilot redis). state_changes — per-task артефакт RunResult (register/drift);
# incarnation.state мутируется ОТДЕЛЬНО keeper-side рендером scenario.state_changes.sets
# из input ПОСЛЕ барьера (run.go §8), НЕ из этих state_changes. Поэтому assert
# incarnation_state идёт по sets (см. expectations/after-<scenario>.yaml), а здесь
# документируется эффект задачи на хосте.
#
# loop-задачи (add_user "… for each user") и `where:`-фильтрованные задачи
# (add_replica/remove_replica/reshard) на одном host-е раскрываются/таргетятся
# штатно; default-success (harness.LoadApplyScript → SetApplyDefaultSuccess) ловит
# любую не вошедшую в таблицу задачу, чтобы unscripted не дала FAILED.
# harness грузит этот скрипт inline через LoadApplyScript (YAML-loader fixtures не
# реализован — pilot-паттерн).
scenarios:
  create:
    apply_responses:
      - task_name: "Install redis on all cluster nodes"
        run_result:
          status: success
          state_changes:
            packages:
              - redis: installed
      - task_name: "Render redis cluster config (host-invariant)"
        run_result: { status: success }
      - task_name: "Append cluster-announce-ip from host address"
        run_result: { status: success }
      - task_name: "Start redis-server on each node"
        run_result: { status: success }
      - task_name: "Wait until redis responds on each node"
        run_result: { status: success }
      - task_name: "Render cluster node-address list on bootstrap node"
        run_result: { status: success }
      - task_name: "Form the redis cluster"
        run_result: { status: success }

  add_user:
    apply_responses:
      - task_name: "Apply Redis ACL on every cluster node for each user"
        run_result: { status: success }

  add_replica:
    apply_responses:
      - task_name: "Install redis on the new node"
        run_result:
          status: success
          state_changes:
            packages:
              - redis: installed
      - task_name: "Render cluster config on the new node"
        run_result: { status: success }
      - task_name: "Append cluster-announce-ip on the new node"
        run_result: { status: success }
      - task_name: "Start redis on the new node"
        run_result: { status: success }
      - task_name: "Wait until new node responds"
        run_result: { status: success }
      - task_name: "Join the cluster as a replica"
        run_result: { status: success }

  remove_replica:
    apply_responses:
      - task_name: "Remove the replica from the cluster by node-id"
        run_result: { status: success }
      - task_name: "Stop redis on the removed node"
        run_result: { status: success }

  reshard:
    apply_responses:
      - task_name: "Reshard slots between masters"
        run_result: { status: success }

  update_acl:
    apply_responses:
      - task_name: "Update Redis ACL for a single user on every cluster node"
        run_result: { status: success }

  update_config:
    apply_responses:
      - task_name: "Apply maxmemory + policy at runtime on every node"
        run_result: { status: success }
      - task_name: "Persist maxmemory in cluster config file"
        run_result: { status: success }
      - task_name: "Rewrite redis config when the file changed"
        run_result: { status: success }
