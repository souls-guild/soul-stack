# Post-apply ожидания redis-cluster-live::add_replica (после create).
# Сценарий НЕ объявляет state_changes (3-ADDR-модель: топология двигается на
# хостах, incarnation.state дельты не несёт — см. main.yml). Контракт = lifecycle:
# apply_runs success + audit scenario_started + metric. incarnation.state остаётся
# на create-baseline (не проверяется здесь — нет дельты).
#
# `where: soulprint.self.sid == input.new_node_sid` таргетит единственный host
# (его SID передаётся как new_node_sid) → все задачи приезжают на него, row=success
# (нет не-целевых хостов в no_match — на одной ноде L3a-фикстуры).
apply_runs:
  status: success

audit_events:
  - type: incarnation.scenario_started

metrics:
  keeper_scenario_runs_total{result="ok"}: ">= 2"
