# Post-apply ожидания service-long-runner::create.
#
# state_changes.sets из scenario/create/main.yml:
#   last_run: "create"
#   runner_marker: /tmp/long-runner-init.txt
apply_runs:
  status: success

incarnation_state:
  last_run: create
  runner_marker: /tmp/long-runner-init.txt

audit_events:
  - type: incarnation.scenario_started
    payload:
      incarnation: test-long-runner

# keeper_scenario_runs_total{result="ok"} — реальная метрика успешного прогона
# scenario (keeper/internal/scenario/metrics.go). Метрики keeper_apply_runs_total
# в коде нет.
metrics:
  keeper_scenario_runs_total{result="ok"}: ">= 1"
