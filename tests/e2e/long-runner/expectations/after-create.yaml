# Post-apply expectations for long-runner::create.
#
# state_changes.sets from scenario/create/main.yml:
#   last_run: "create"
#   runner_marker: /tmp/long-runner-init.txt
apply_runs:
  status: success

incarnation_state:
  last_run: create
  runner_marker: /tmp/long-runner-init.txt

audit_events:
  - type: incarnation.scenario_started
    payload:
      incarnation: test-long-runner

# keeper_scenario_runs_total{result="ok"} - the real metric of a successful scenario
# run (keeper/internal/scenario/metrics.go). There is no keeper_apply_runs_total
# metric in the code.
metrics:
  keeper_scenario_runs_total{result="ok"}: ">= 1"
