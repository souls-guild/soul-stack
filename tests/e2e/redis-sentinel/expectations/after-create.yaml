# Post-apply ожидания redis-sentinel::create (e2e под
# examples/service/redis-sentinel).
#
# apply_runs.status — реальный enum keeper/internal/applyrun (StatusSuccess).
#
# incarnation_state — deep-subset; значения = scenario.state_changes.sets из
# examples/service/redis-sentinel/scenario/create/main.yml, отрендеренные
# keeper-side из input ПОСЛЕ барьера (run.go §8):
#   master_ip   ← input.master_ip (передаём непустым в тесте);
#   master_name ← input.master_name (передаём явно, иначе CEL-default 'mymaster');
#   quorum      ← input.quorum (передаём явно integer, иначе CEL-default 2).
# Все три host-инвариантны (приходят через input, ADR-010 params-интерполяция).
#
# audit_events — incarnation.created (POST /v1/incarnations авто-запускает create
# и пишет именно его, НЕ scenario_started). apply_id в payload — runtime-значение,
# проверяется отдельно в тесте (не через YAML-fixture).
#
# metrics — keeper_scenario_runs_total{result="ok"} (keeper/internal/scenario/
# metrics.go), успешный прогон → >= 1.
apply_runs:
  status: success

incarnation_state:
  master_ip: "10.0.0.10"
  master_name: "mymaster"
  quorum: 3

audit_events:
  - type: incarnation.created

metrics:
  keeper_scenario_runs_total{result="ok"}: ">= 1"
