# Скрипт ответов soul-stub-а для redis-sentinel::create (e2e под
# examples/service/redis-sentinel).
#
# scenario create — три inline-задачи (без apply:destiny): install redis
# (sentinel ships в пакете) → render /etc/redis-sentinel.conf → nohup
# redis-sentinel → wait PONG на :26379. task_name ниже = `name:` задач в
# examples/service/redis-sentinel/scenario/create/main.yml.
#
# state_changes — per-task артефакт RunResult (register/drift); incarnation.state
# мутируется ОТДЕЛЬНО — keeper-side рендером scenario.state_changes.sets из input
# ПОСЛЕ барьера (run.go §8), НЕ из этих state_changes. Поэтому здесь
# документируется эффект задачи на хосте (пакет installed, sentinel running), а
# assert incarnation_state идёт по sets master_ip/master_name/quorum
# (см. expectations/after-create.yaml).
#
# "Wait until sentinel responds on :26379" — на хосте это retry-probe с
# changed_when:false / failed_when:register.self.stdout!='PONG'. soul-stub success
# -ответ удовлетворяет failed_when (нет реального stdout-сравнения на L3a, задача
# просто success). harness грузит этот скрипт inline через LoadApplyScript
# (YAML-loader fixtures не реализован — pilot-паттерн).
scenarios:
  create:
    apply_responses:
      - task_name: "Install redis (provides redis-sentinel)"
        run_result:
          status: success
          state_changes:
            packages:
              - redis: installed
      - task_name: "Render sentinel.conf monitoring the master"
        run_result: { status: success }
      - task_name: "Start redis-sentinel on each host"
        run_result:
          status: success
          state_changes:
            services:
              - redis-sentinel: running
      - task_name: "Wait until sentinel responds on :26379"
        run_result: { status: success }
