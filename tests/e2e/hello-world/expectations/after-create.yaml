# Post-apply expectations for hello-world::create.
#
# state_changes.sets in scenario:
#   greeting_file: /tmp/soul-stack-hello
# → incarnation.state.greeting_file must become /tmp/soul-stack-hello.
#
# apply_runs.status — the real enum keeper/internal/applyrun/applyrun.go::StatusSuccess.
# audit_events — incarnation.scenario_started with apply_id (event format see
# shared/audit/event_types.go::EventIncarnationScenarioStarted).
apply_runs:
  status: success

incarnation_state:
  greeting_file: /tmp/soul-stack-hello

audit_events:
  - type: incarnation.scenario_started
    payload:
      incarnation: test-hello

# keeper_scenario_runs_total{result="ok"} — the real metric for a successful scenario
# run (keeper/internal/scenario/metrics.go). There is no keeper_apply_runs_total
# metric in the code.
metrics:
  keeper_scenario_runs_total{result="ok"}: ">= 1"
