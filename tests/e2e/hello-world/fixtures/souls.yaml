# Souls-фикстура для L3a hello-world (расширение pilot-pattern smoke-nginx).
#
# Один soul-stub представляет себя Keeper-у под SID `soul-a.example.com`.
# scenario/create использует core.file.present — требует только базовый
# soulprint (pkg_mgr/init_system формально не нужны для core.file, но даём
# минимальный согласованный набор, такой же как smoke-nginx).
- sid: soul-a.example.com
  status: connected
  covens: [hello]
  soulprint:
    os:
      family: debian
      distro: debian
      version: "12"
      pkg_mgr: apt
      init_system: systemd
    hostname: soul-a
