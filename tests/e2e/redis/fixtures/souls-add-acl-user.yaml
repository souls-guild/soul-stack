# Souls-фикстура для L3a redis::add_acl_user.
#
# Один soul-stub (тот же одноузловой стек, что и create): сценарий add_acl_user
# раскрывает loop по input.users в N RenderedTask core.cmd.shell и не таргетит
# несколько хостов. covens: [redis] — членство в Coven incarnation
# (incarnation.name = redis-метка, ADR-008); roster прогона резолвится по нему.
#
# soulprint нужен потому, что add_acl_user исполняется на incarnation, уже
# развёрнутой через create: create-прогон читает soulprint.self.os.arch
# keeper-side (redis-exporter/node-exporter). Тот же os-блок, что в souls.yaml.
#
# Значения дублируются inline в redis_test.go (YAML-loader fixtures пока не
# реализован — pilot-паттерн).
- sid: soul-a.example.com
  status: connected
  covens: [redis-acl]
  soulprint:
    os:
      family: debian
      distro: debian
      version: "12"
      arch: amd64
      pkg_mgr: apt
      init_system: systemd
    hostname: soul-a
