# Скрипт ответов soul-stub-а для redis::add_acl_user.
#
# scenario add_acl_user — инлайн-loop (БЕЗ apply:destiny): одна loop-задача
# "Apply Redis ACL for each user in the list" раскрывается в render-фазе в N
# RenderedTask core.cmd.shell (по одной на элемент input.users), у всех ОДНО и
# то же task_name (loop не переименовывает раскрытые задачи). Соответствие
# stub-а — по task_name (soulstub.findEntriesByTask), поэтому достаточно одной
# scripted-записи: все N итераций матчатся ею.
#
# state_changes здесь нет: эффект задачи (ACL SETUSER на стороне Redis) не несёт
# per-task артефакта для register/drift. incarnation.state мутируется ОТДЕЛЬНО —
# keeper-side рендером scenario.state_changes.sets (redis_users ← input.users)
# ПОСЛЕ барьера (run.go §8), НЕ из RunResult. assert idет по sets
# (expectations/after-add-acl-user.yaml).
#
# Этот сценарий запускается на incarnation, уже развёрнутой create-прогоном в том
# же тесте; задачи create покрываются default-success (LoadApplyScript).
scenarios:
  add_acl_user:
    apply_responses:
      - task_name: "Apply Redis ACL for each user in the list"
        run_result: { status: success }
