# Souls-фикстура для L3a redis::update_config.
#
# Один soul-stub: update_config — re-apply destiny redis-single (один хост, без
# multi-host таргетинга). covens: [redis-cfg] — членство в Coven incarnation
# (incarnation.name, ADR-008); roster прогона резолвится по нему.
#
# soulprint обязателен: и create-прогон (в том же тесте), и re-apply redis-single
# читают факты хоста keeper-side. Тот же os-блок, что в souls.yaml.
- sid: soul-a.example.com
  status: connected
  covens: [redis-cfg]
  soulprint:
    os:
      family: debian
      distro: debian
      version: "12"
      arch: amd64
      pkg_mgr: apt
      init_system: systemd
    hostname: soul-a
