# Скрипт ответов soul-stub-а для redis::update_config.
#
# scenario update_config — re-apply ОДНОЙ destiny redis-single с обновлённым
# input (maxmemory + config): тот же изолированный render-проход, что в create,
# но с другим config (ADR-009). task_name ниже = `name:` задач в
# examples/destiny/redis-single/tasks/main.yml.
#
# Эти же task_name появляются на create-прогоне (та же destiny redis-single),
# поэтому при чейне create→update_config в одном тесте достаточно одного скрипта:
# stub матчит по task_name (findEntriesByTask). Прочие задачи create
# (redis-exporter/node-exporter) покрываются default-success (LoadApplyScript).
#
# state_changes — per-task артефакт RunResult; incarnation.state мутируется
# ОТДЕЛЬНО (keeper-side sets: redis_maxmemory/redis_config ← input ПОСЛЕ барьера).
# assert idет по sets (expectations/after-update-config.yaml).
scenarios:
  update_config:
    apply_responses:
      - task_name: "Install redis-server package"
        run_result: { status: success }
      - task_name: "Ensure the redis socket directory exists"
        run_result: { status: success }
      - task_name: "Render redis.conf with dual-access (TCP + unix socket)"
        run_result: { status: success }
      - task_name: "Ensure the redis-server systemd drop-in directory exists"
        run_result: { status: success }
      - task_name: "Render redis-server systemd hardening drop-in"
        run_result: { status: success }
      - task_name: "Reload systemd because the hardening drop-in changed"
        run_result: { status: success }
      - task_name: "Ensure redis-server is running and enabled at boot"
        run_result:
          status: success
          state_changes:
            services:
              - redis-server: running
      - task_name: "Restart redis-server because config or hardening changed"
        run_result: { status: success }
