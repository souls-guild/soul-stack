# Post-apply ожидания redis::add_acl_user.
#
# apply_runs.status — реальный enum keeper/internal/applyrun (StatusSuccess).
#
# incarnation_state — deep-subset; значение = scenario.state_changes.sets из
# examples/service/redis/scenario/add_acl_user/main.yml: redis_users ← input.users
# (полный актуальный список перезаписывается целиком). add_acl_user не трогает
# версии/сокет — они остаются от create-прогона (subset их не проверяет).
#
# audit_events — incarnation.scenario_started (явный RunScenario пишет именно его,
# payload {name, scenario, apply_id}; create-авто-прогон писал бы incarnation.created).
# apply_id в payload — runtime-значение, проверяется отдельно в тесте.
#
# metrics — keeper_scenario_runs_total{result="ok"} (create + add_acl_user в одном
# тесте → >= 2; subset-ассерт >= 1, как в pilot).
apply_runs:
  status: success

incarnation_state:
  redis_users:
    - { name: app,      acl: "on >app-pass-1234 ~app:* +@read +@write" }
    - { name: readonly, acl: "on >ro-pass-5678 ~* +@read" }
    - { name: metrics,  acl: "on >mx-pass-9012 +info +ping +client" }

audit_events:
  - type: incarnation.scenario_started

metrics:
  keeper_scenario_runs_total{result="ok"}: ">= 1"
