# Post-apply ожидания redis::update_config.
#
# apply_runs.status — реальный enum keeper/internal/applyrun (StatusSuccess).
#
# incarnation_state — deep-subset; значения = scenario.state_changes.sets из
# examples/service/redis/scenario/update_config/main.yml, отрендеренные keeper-side
# из input ПОСЛЕ барьера:
#   redis_maxmemory ← input.redis_maxmemory (1gb — новое значение);
#   redis_config    ← has(input.config) ? input.config : {} (новые директивы).
# Версии/сокет в subset не проверяем — update_config их не трогает (остаются от
# create).
#
# audit_events — incarnation.scenario_started (явный RunScenario; payload
# {name, scenario, apply_id}). apply_id проверяется отдельно в тесте.
#
# metrics — keeper_scenario_runs_total{result="ok"} (create + update_config → >= 2;
# subset-ассерт >= 1).
apply_runs:
  status: success

incarnation_state:
  redis_maxmemory: 1gb
  redis_config:
    maxclients: 20000
    timeout: 0
    appendonly: "yes"

audit_events:
  - type: incarnation.scenario_started

metrics:
  keeper_scenario_runs_total{result="ok"}: ">= 1"
