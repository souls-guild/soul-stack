# Souls fixture for L3a coven-probe::create.
#
# scenario create writes an init marker on every host of the incarnation (on: omitted →
# the whole incarnation), coven-targeting itself is checked in the scenarios
# mark_a/mark_ab/mark_where — here we set covens so the fixture is
# ready for future tests of other scenarios. For create, covens play no role.
- sid: soul-a.example.com
  status: connected
  covens: [coven-a]
  soulprint:
    os:
      family: debian
      distro: debian
      version: "12"
      pkg_mgr: apt
      init_system: systemd
    hostname: soul-a
