# Скрипт ответов soul-stub-а для noop::create.
#
# scenario/create/main.yml содержит одну задачу core.exec.run echo hello,
# `changed_when: "false"` → no-op: state_changes scenario пустой,
# incarnation.state не мутируется.
scenarios:
  create:
    apply_responses:
      - task_name: "Echo hello on every host of the incarnation"
        run_result:
          status: success
          changed: false
