# Souls fixture for L3a noop::create.
#
# The scenario only calls core.exec.run echo hello — soulprint is minimal
# (formally core.exec just needs OS facts, but we give a set consistent
# with the other L3a tests).
- sid: soul-a.example.com
  status: connected
  covens: [noop]
  soulprint:
    os:
      family: debian
      distro: debian
      version: "12"
      pkg_mgr: apt
      init_system: systemd
    hostname: soul-a
