# Post-apply ожидания service-noop::create.
#
# state_changes scenario пустой → incarnation.state не проверяем (пустой объект).
# Остаются apply_runs, audit, metrics — minimal-flow проверка scenario-runner.
apply_runs:
  status: success

audit_events:
  - type: incarnation.scenario_started
    payload:
      incarnation: test-noop

# keeper_scenario_runs_total{result="ok"} — реальная метрика успешного прогона
# scenario (keeper/internal/scenario/metrics.go). Метрики keeper_apply_runs_total
# в коде нет.
metrics:
  keeper_scenario_runs_total{result="ok"}: ">= 1"
