# Souls-фикстура для L3a smoke-nginx (ADR-039 § Часть D).
#
# Один soul-stub представляет себя Keeper-у под SID `soul-a.example.com`.
# Соответствующий status=connected — happy-path для apply_runs lifecycle.
#
# soulprint: минимальный Debian-12, нужный scenario-runner-у для
# pkg_mgr/init_system-резолва (см. docs/soul/soulprint.md §3 — required-набор
# полей под core.pkg.installed / core.service.running).
- sid: soul-a.example.com
  status: connected
  covens: [smoke]
  soulprint:
    os:
      family: debian
      distro: debian
      version: "12"
      pkg_mgr: apt
      init_system: systemd
    hostname: soul-a
