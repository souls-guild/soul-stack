# Values для bitnami/vault Helm-чарта (L3c-2). Dev-mode Vault с фиксированным
# root-token-ом — симметрично L3b harness/vault.go::startVault. Без persistence,
# без TLS на Vault listener-е (внутрикластерный трафик).
#
# Service-имя в кластере: `vault.default.svc.cluster.local:8200`.
# Auth: VAULT_TOKEN=roottoken (root-token, прокидывается keeper-у через
# ConfigMap::vault.token).
#
# Init-вотехнический PKI mount + KV signing-key seed делает harness через
# port-forward + прямой HTTP API (симметрично L3b vault.go::InitVaultTestSecrets).

server:
  dev:
    enabled: true
    devRootToken: roottoken

  standalone:
    enabled: false

  ha:
    enabled: false

  dataStorage:
    enabled: false

  auditStorage:
    enabled: false

  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

# Bitnami chart-у достаточно server.dev.enabled=true: Vault стартует с
# `vault server -dev` и listener-ом на 0.0.0.0:8200. Service-объект чарт
# создаст автоматически (ClusterIP-сервис `vault`).
