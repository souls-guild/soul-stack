name: smoke-nginx
state_schema_version: 1
description: >-
  Minimal service for the L3a E2E pilot (ADR-039): one scenario "create",
  two core tasks (install package + start service). Used by the
  tests/e2e/ harness for the apply_runs lifecycle + audit + metrics contract test.

# state_schema_version=1 → the migrations/ directory isn't required (ADR-019).
# the scenario's state-changes record the installed package and the active service in
# incarnation.state for post-apply asserts.
state_schema:
  type: object
  properties:
    nginx_package:
      type: string
      description: Name of the installed package (literal nginx).
    nginx_service:
      type: string
      description: Name of the running systemd unit (literal nginx).

# No dependencies: the scenario uses only core modules (ADR-015) —
# not listed in destiny[]/modules[] (ADR-009).
