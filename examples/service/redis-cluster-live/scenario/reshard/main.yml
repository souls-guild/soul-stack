name: reshard
description: >-
  Перебалансировка hash-слотов Redis Cluster: мигрировать N слотов от одного
  мастера к другому (`redis-cli --cluster reshard --cluster-from <src-id>
  --cluster-to <dst-id> --cluster-slots N --cluster-yes`). Неинтерактивный режим.

  node-id источника/назначения резолвятся shell-side из `cluster nodes` по IP
  (reshard принимает node-id). Данные при reshard НЕ теряются — redis мигрирует
  ключи вместе со слотами (online resharding). Целостность проверяется тестовыми
  ключами ДО/ПОСЛЕ (см. live-прогон, не в DSL).

  run_once с seed-ноды. reshard idempotent НЕ является (каждый прогон двигает
  ещё N слотов) — поэтому без unless-guard; повторный запуск осознанно двигает
  слоты дальше. Оператор контролирует количество прогонов.

input:
  seed_ip:
    type: string
    required: true
    pattern: "^[0-9.]+$"
    description: IP любой ноды кластера (контакт для reshard).
  from_ip:
    type: string
    required: true
    pattern: "^[0-9.]+$"
    description: IP мастера-источника слотов.
  to_ip:
    type: string
    required: true
    pattern: "^[0-9.]+$"
    description: IP мастера-назначения слотов.
  slots:
    type: integer
    required: true
    min: 1
    max: 16384
    description: Сколько hash-слотов мигрировать.

tasks:
  # run_once с seed: резолвить node-id from/to по IP и запустить reshard.
  - name: Reshard slots between masters
    on: ["${ incarnation.name }"]
    where: soulprint.self.network.primary_ip == input.seed_ip
    module: core.cmd.shell
    params:
      cmd: >
        FROM=$(redis-cli -h ${ input.seed_ip } -p 6379 cluster nodes | awk -v ip="${ input.from_ip }:6379" '$2 ~ ip {print $1}');
        TO=$(redis-cli -h ${ input.seed_ip } -p 6379 cluster nodes | awk -v ip="${ input.to_ip }:6379" '$2 ~ ip {print $1}');
        test -n "$FROM" -a -n "$TO" &&
        redis-cli --cluster reshard ${ input.seed_ip }:6379 --cluster-from "$FROM" --cluster-to "$TO" --cluster-slots ${ input.slots } --cluster-yes
