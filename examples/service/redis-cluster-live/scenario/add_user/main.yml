name: add_user
description: >-
  Привести ACL-пользователей Redis Cluster к переданному АКТУАЛЬНОМУ СПИСКУ.
  ACL в Redis Cluster — per-node (НЕ реплицируются автоматически), поэтому
  SETUSER применяется на КАЖДОЙ ноде кластера (on: весь incarnation, без
  run_once). redis-cli ACL SETUSER идемпотентен (повтор того же правила — no-op
  на стороне Redis), команда host-инвариантна (без soulprint.self в params).

  loop по актуальному списку: одна задача → N RenderedTask (по пользователю),
  каждая едет на все 9 нод.

input:
  users:
    type: array
    required: true
    items:
      type: object
      required: [name, acl]
      properties:
        name:
          type: string
          pattern: "^[A-Za-z0-9._-]+$"
          description: Имя ACL-пользователя Redis.
        acl:
          type: string
          secret: true
          description: ACL-правило в синтаксисе Redis ACL SETUSER (флаги/ключи/команды/пароль). Маскируется в логах.
    description: Полный актуальный список ACL-пользователей (перезаписывается целиком).

state_changes:
  - set: redis_users
    value: "${ input.users }"

tasks:
  # ACL SETUSER на каждой ноде кластера (per-node ACL). loop раскрывается в
  # render-фазе в N задач; каждая едет широко (on: весь incarnation = 9 нод).
  - name: Apply Redis ACL on every cluster node for each user
    on: ["${ incarnation.name }"]
    module: core.cmd.shell
    no_log: true
    loop:
      items: "${ input.users }"
      as: user
    params:
      cmd: "redis-cli -p 6379 ACL SETUSER ${ user.name } ${ user.acl }"
