name: update_config
description: >-
  Обновить runtime-конфиг Redis Cluster на всех нодах. maxmemory применяется
  через `CONFIG SET` (runtime, без рестарта) И дописывается в conf-файл (чтобы
  переживало рестарт). Шаг conf-файла регистрируется (register) и реальный
  CONFIG REWRITE идёт onchanges на него — демонстрация reload-on-change без
  лишнего рестарта (idempotent).

  Конфиг host-инвариантен (одни значения на все ноды) — module-params без
  soulprint.self (pilot-ограничение, как в create).

input:
  maxmemory:
    type: string
    required: true
    pattern: "^[0-9]+(b|kb|mb|gb)$"
    description: Новый лимит памяти Redis (256mb, 1gb, …).
  maxmemory_policy:
    type: string
    required: false
    default: noeviction
    enum: [noeviction, allkeys-lru, allkeys-lfu, volatile-lru, volatile-lfu, allkeys-random, volatile-random, volatile-ttl]
    description: Политика вытеснения при достижении maxmemory.

state_changes:
  sets:
    redis_config: "${ {'maxmemory': input.maxmemory, 'maxmemory-policy': has(input.maxmemory_policy) ? input.maxmemory_policy : 'noeviction'} }"

tasks:
  # 1. CONFIG SET runtime на каждой ноде (идемпотентно: redis сам no-op при том
  #    же значении). changed_when по выводу: redis возвращает OK всегда, поэтому
  #    отмечаем changed по факту отличия от текущего значения (probe-free: CONFIG
  #    SET идемпотентен на стороне redis).
  - name: Apply maxmemory + policy at runtime on every node
    on: ["${ incarnation.name }"]
    module: core.cmd.shell
    params:
      cmd: >
        redis-cli -p 6379 CONFIG SET maxmemory ${ input.maxmemory } &&
        redis-cli -p 6379 CONFIG SET maxmemory-policy ${ has(input.maxmemory_policy) ? input.maxmemory_policy : 'noeviction' }

  # 2. Дописать maxmemory в conf-файл, чтобы переживало рестарт. register +
  #    идемпотентный grep-guard (unless): если строка уже точная — пропуск.
  - name: Persist maxmemory in cluster config file
    on: ["${ incarnation.name }"]
    module: core.cmd.shell
    register: conf_changed
    params:
      cmd: >
        sed -i '/^maxmemory /d' /etc/redis-cluster.conf;
        echo "maxmemory ${ input.maxmemory }" >> /etc/redis-cluster.conf
      unless: "grep -qx 'maxmemory ${ input.maxmemory }' /etc/redis-cluster.conf"

  # 3. CONFIG REWRITE onchanges на шаг (2): только если conf-файл реально менялся,
  #    redis пересохранит свой конфиг (reload-on-change, без рестарта процесса).
  - name: Rewrite redis config when the file changed
    on: ["${ incarnation.name }"]
    module: core.cmd.shell
    onchanges: [conf_changed]
    params:
      cmd: "redis-cli -p 6379 CONFIG REWRITE"
