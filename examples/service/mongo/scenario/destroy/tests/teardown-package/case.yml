# L0-испытание destroy: teardown инкарнации, развёрнутой PACKAGE-способом (distro-пакет
# mongodb-org). Render-only, герметично.
#
# Что ассертим:
#   1. mongod остановлен (core.service.stopped).
#   2. MongoDB снят ПАКЕТОМ (core.pkg.absent name=mongodb-org) — package-ветка активна
#      (essence.install_method=package → static-гейт group-keep).
#   3. Наши конфиг-артефакты удалены (core.file.absent mongod.conf + sysctl drop-in).
#   4. BINARY-ветка дропнута (group-drop): core.file.absent бинаря/binary-юнита ОТСУТСТВУЮТ.
name: destroy tears down a package-installed mongo (stop + pkg.absent + remove configs)

fixtures:
  hosts:
    - sid: node-solo.example.com
      covens: [destroy]
      soulprint:
        network: { primary_ip: 10.0.0.5 }
        os: { arch: amd64 }

  essence:
    install_method: package
    conf_dir: /etc/mongodb

  state:
    mongo_version: "6.0.19"
    mongo_config:
      net: { bindIp: "0.0.0.0", port: 27017 }

assert:
  task_present:
    # 1. Стоп mongod.
    - module: core.service.stopped
      params_subset:
        name: mongod
    # 2. MongoDB снят пакетом (package-ветка).
    - module: core.pkg.absent
      params_subset:
        name: mongodb-org
    # 3. Наши конфиг-артефакты удалены.
    - module: core.file.absent
      params_subset:
        path: /etc/mongodb/mongod.conf
    - module: core.file.absent
      params_subset:
        path: /etc/sysctl.d/30-mongodb.conf

  task_absent:
    # 4. BINARY-ветка group-drop на package-инкарнации: бинарь и binary-unit НЕ трогаются.
    - module: core.file.absent
      params_subset:
        path: /usr/local/bin/mongod
    - module: core.file.absent
      params_subset:
        path: /etc/systemd/system/mongod.service
