# Baseline essence for the mongo service (author substrate, role-defaults concept). The operator
# overrides it in the incarnation spec; on the L0 run key values are duplicated in the case's
# fixtures.
#
# This is a TRANSLATION LAYER for simple operator input: data tables (memory_reserve_percent) and
# the mongo_config merge substrate live here, scenario create merges them with the input via merge()
# (templating §2.3). NOTHING from the translation leaks into the plugin - it's needed only for
# rendering mongod.conf at-create (source of truth).

# -- MongoDB install method: FIXED in essence, NOT operator-input --------------------
# install_method is author-context (the operator overrides it in spec.essence). Default is binary
# (the standard way: a standalone mongod binary from Nexus, symmetric with redis). compute.install reads
# default(essence.install_method, 'binary'). The package branch installs the mongodb-org distro package
# with a =version pin (an internal operator overrides install_method: package).
install_method: binary

# -- binary install method: mongod binary source from Nexus (symmetric with redis) ----
# install_method=binary (DEFAULT) pulls the mongod binary of this version from Nexus. base_url is
# author-context (the operator overrides it in spec.essence for their own mirror). destiny/scenario
# builds the per-host path from binary_base_url + soulprint.self.os (arch, distro version) + version.
# * Real MongoDB upstream: fastdl.mongodb.org/linux/mongodb-linux-<arch>-<distro>-<ver>.tgz
# (asset - a tarball with bin/mongod). base_url is set by the operator (internal Nexus mirror).
binary_base_url: "https://nexus.example.com/repository/raw/devops/dba/prod/mongodb"
binary_version:  ""

# -- SSRF guard for fetching the binary from Nexus (allow_private, symmetric with redis) --
# The default binary_base_url is an INTERNAL Nexus (resolves within RFC1918). core.url.fetched by
# default (allow_private:false) blocks dialing a private IP via the SSRF guard -> fetching the mongod binary
# fails. Default is TRUE (trusted internal Nexus). compute.install forwards the value to
# apply/params install.allow_private. Public-mirror deployment - false in spec.essence.
binary_allow_private: true

# -- Host layout: base MongoDB config and data directories --------------------------
# conf_dir/data_dir are author-context (the operator overrides the layout in spec.essence for
# their own storage layout). compute reads them from here and forwards them to render. NOT persisted
# in state - day-2 reads the layout from essence.conf_dir/data_dir (has()-safe default). Default = the
# official MongoDB layout (mongod.conf in /etc, data in /var/lib/mongodb).
conf_dir: /etc/mongodb
data_dir: /var/lib/mongodb
# mongod log directory (systemLog.path = <log_dir>/mongod.log).
log_dir:  /var/log/mongodb

# mongod port (net.port directive). Default 27017 (well-known MongoDB). One port for
# both plain and TLS (mongo TLS runs on the SAME port via net.tls.mode - unlike redis
# 6379+7379). PILOT - plain.
net_port: 27017

# Share of the memory budget (input.memory_mb) given to MongoDB for the WiredTiger cache; the rest is
# reserved for the OS/overhead and other mongod consumers. scenario computes cacheSizeGB =
# memory_mb*pct/100 / 1024 (GB). Default 50% is MongoDB's conservative recommendation (WiredTiger
# by default takes max(0.5*(RAM-1GB), 256MB); we set it explicitly from the operator's budget).
memory_reserve_percent: 50

# -- System MongoDB users --
# Name -> ROLES of the service users under which cluster administration runs. * MongoDB vs
# redis: NOT a perms string, but an ARRAY of roles {role, db} (mongo model). default_admin is the
# full-access admin (role root in admin), under which all admin connections run (createUser
# for the other users, health-runCommand). It's created FIRST via the localhost exception (the
# community.mongo.user plugin, no-auth loopback connect while the admin DB is still empty - mongo mechanics, analogous to
# redis default_admin bootstrap).
#
# The default_admin password lives in Vault under the convention secret/mongo/<incarnation>/users/default_admin
# #password (symmetric with redis/dragonfly users/<name>). scenario resolves it keeper-side via
# vault() and passes it to the plugin.
#
# * PILOT: ONE system user default_admin (root). replica/monitoring/backup/oplog users
# are FUTURE slices
# (replica-set/monitoring). System names - the validate guard rejects operator-extras with these names.
system_users:
  default_admin:
    - { role: root, db: admin }

# -- mongod.conf merge substrate (role defaults) ----------------------------------
# The BOTTOM layer of merge(): the computed wiredTiger cache and the operator's passthrough are layered
# on top. The merged result is rendered into mongod.conf (scenario render). * Structure - a nested
# MongoDB YAML (net/storage/systemLog/security subtrees), NOT a flat key-value like redis.
# maxIncomingConnections is a typical prod default; the rest (bindIp/port/dbPath/authorization)
# comes from the TEMPLATE built from host-layout/net_port (not duplicated here - one source, like redis dir/aclfile).
mongo_config:
  net:
    maxIncomingConnections: 65536
  operationProfiling:
    mode: "off"
    slowOpThresholdMs: 100

# Data table of kernel parameters for MongoDB (host tuning). scenario passes this map to
# render core.sysctl.applied -> drop-in /etc/sysctl.d/30-mongodb.conf. Values are STRINGS.
# SOURCE - MongoDB production notes (defaults: max_map_count 262144).
# Network buffers/backlogs follow the same in-memory-store recommendations as redis/dragonfly (shared
# kernel-network-stack tuning for a high-load network service).
sysctl_settings:
  # >>> Memory and processes (MongoDB production notes) <<<
  vm.max_map_count:      "262144"
  vm.swappiness:         "1"
  # >>> Network buffers (high-load network service) <<<
  net.core.somaxconn:           "65535"
  net.core.netdev_max_backlog:  "20000"
  net.ipv4.tcp_max_syn_backlog: "65535"
  net.ipv4.tcp_fin_timeout:    "30"
  net.ipv4.tcp_keepalive_time: "120"
