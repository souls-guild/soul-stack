name: create
description: >-
  Initializer incarnation for coven-probe: on every host the incarnation writes
  an init marker (core.file.present, on: omitted = whole incarnation). Gives
  the incarnation existence and a baseline before the coven-target scenarios
  mark_a / mark_ab / mark_where.

state_changes:
  - set: marker_file
    value: /tmp/coven-init.txt
  - set: last_target
    value: "create"

tasks:
  - name: Write init marker on every host of the incarnation
    module: core.file.present
    params:
      path: /tmp/coven-init.txt
      mode: "0644"
      content: "coven-probe init\n"
