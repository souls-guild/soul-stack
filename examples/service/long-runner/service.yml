name: long-runner
state_schema_version: 1
description: >-
  Service for validating cross-host barrier and serial waves (Phase-2 TEST B).
  Scenarios run core.cmd.shell sleep of DIFFERENT duration on different hosts
  (staggered by number in SID) so mid-run polling catches, at the same time,
  different per-host statuses in apply_runs and verify that the incarnation stays
  in applying until ALL hosts finish (single-winner commit). Core modules only.

state_schema:
  type: object
  properties:
    last_run:
      type: string
    runner_marker:
      type: string
