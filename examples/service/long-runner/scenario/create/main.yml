name: create
description: >-
  Инициализация incarnation long-runner: на каждом хосте пишет маркер. Быстрый
  no-op-ish create, чтобы incarnation существовал и дальше можно было гонять
  staggered/serial_waves.

state_changes:
  sets:
    last_run: "create"
    runner_marker: /tmp/long-runner-init.txt

tasks:
  - name: Write init marker on every host
    module: core.file.present
    params:
      path: /tmp/long-runner-init.txt
      mode: "0644"
      content: "long-runner init\n"
