# L0-GUARD фикса latent-бага «day-2 CA из essence вместо state» (аудит 2026-06-26).
# Сценарий-после-rotate_tls: state.tls.ca_ref УЖЕ переписан на НОВЫЙ Vault-путь
# (rotate_tls сменил CA-материал и зафиксировал новый ref в state). essence.tls_ca_ref
# при этом остался author-дефолтом (rotate его НЕ трогает) — он указывает на СТАРЫЙ CA.
#
# ★ ПРОВЕРЯЕМЫЙ ИНВАРИАНТ: day-2 коннект (compute.tls_ca) обязан резолвить CA из
# ИМЕНОВАННОГО incarnation.state.tls.ca_ref (АКТУАЛЬНЫЙ, новый), НЕ из essence.tls_ca_ref
# (устаревший). До фикса tls_ca = vault(essence.tls_ca_ref) → коннект СТАРЫМ CA к серверу
# с НОВЫМ cert → TLS verify падает → шаг failed → error_locked. Этот кейс ловит регресс:
# state-ref и essence-ref СОЗНАТЕЛЬНО указывают на РАЗНЫЕ Vault-пути с РАЗНЫМ PEM.
#
# state.tls.ca_ref → secret/services/redis/tls-v2#ca → NEW-CA (актуальный).
# essence.tls_ca_ref → secret/services/redis/tls#ca   → OLD-CA (устаревший).
# Ассерт probe/health-gate: tls_ca == NEW-CA. Если код вернётся на essence → ассерт
# увидит OLD-CA → FAIL. Render-only, герметично. Roster — 2 хоста, probe-роль = slave.
name: rolling-restart over TLS after rotate reads CA from state.tls.ca_ref not essence

fixtures:
  hosts:
    - sid: node-1.example.com
      covens: [restart]
      soulprint:
        network: { primary_ip: 10.0.0.1 }
        os: { arch: amd64 }
    - sid: node-2.example.com
      covens: [restart]
      soulprint:
        network: { primary_ip: 10.0.0.2 }
        os: { arch: amd64 }

  input:
    reason: "rolling restart after CA rotation for L0 guard"

  # Развёрнутый incarnation.state v3 ПОСЛЕ rotate_tls: state.tls.ca_ref — НОВЫЙ путь
  # (tls-v2). Это источник истины day-2-коннекта (read-model v3). port=7379 INTEGER.
  state:
    redis_type: sentinel
    redis_version: "7.2.4"
    tls:
      enable:   true
      only:     false
      port:     7379
      cert_ref: "secret/services/redis/tls-v2#cert"
      key_ref:  "secret/services/redis/tls-v2#key"
      ca_ref:   "secret/services/redis/tls-v2#ca"
    redis_config:
      maxmemory:        "256mb"
      maxmemory-policy: allkeys-lru
      tls-port:         "7379"
      tls-cert-file:    /etc/redis/tls/redis.crt
      tls-key-file:     /etc/redis/tls/redis.key
      tls-ca-cert-file: /etc/redis/tls/ca.crt
      tls-replication:  "yes"

  # essence.tls_ca_ref — author-дефолт, УКАЗЫВАЕТ НА СТАРЫЙ CA (tls#ca). После фикса
  # day-2 его НЕ читает; присутствует здесь РОВНО чтобы доказать, что коннект НЕ берёт
  # его (regress-ловушка: вернись код на essence — увидел бы OLD-CA, ассерт упал бы).
  essence:
    tls_ca_ref: "secret/services/redis/tls#ca"

  # Пароль (incarnation.name == restart) + ДВА РАЗНЫХ CA-PEM:
  #   secret/services/redis/tls-v2#ca → NEW-CA (актуальный, по state.tls.ca_ref);
  #   secret/services/redis/tls#ca    → OLD-CA (устаревший, по essence.tls_ca_ref).
  vault:
    secret/redis/restart:
      password: fixture-redis-pass-16+
    secret/services/redis/tls-v2:
      ca: "-----BEGIN CERTIFICATE-----\nNEW-CA\n-----END CERTIFICATE-----"
    secret/services/redis/tls:
      ca: "-----BEGIN CERTIFICATE-----\nOLD-CA\n-----END CERTIFICATE-----"

mocks:
  register:
    redis_role:
      role: slave

assert:
  task_present:
    # ── probe (community.redis.role): tls_ca = NEW-CA (state.tls.ca_ref) ──
    # ГЛАВНЫЙ guard: коннект резолвит CA из state-ref (актуальный), НЕ из essence-ref.
    # NEW-CA доказывает, что после rotate restart верифицирует сервер новым CA.
    - module: community.redis.role
      params_subset:
        addr: "127.0.0.1:7379"
        password: fixture-redis-pass-16+
        tls: true
        tls_ca: "-----BEGIN CERTIFICATE-----\nNEW-CA\n-----END CERTIFICATE-----"

    # ── slave-health-gate (community.redis.replica-synced): тот же NEW-CA ──
    # Ресинк-гейт внутри slave-block коннектится тем же актуальным CA из state-ref.
    - module: community.redis.replica-synced
      params_subset:
        addr: "127.0.0.1:7379"
        password: fixture-redis-pass-16+
        tls: true
        tls_ca: "-----BEGIN CERTIFICATE-----\nNEW-CA\n-----END CERTIFICATE-----"

  # ── REGRESS-ЛОВУШКА: OLD-CA (essence.tls_ca_ref) НЕ должен попасть в коннект ──
  # Вернись compute.tls_ca на vault(essence.tls_ca_ref) — probe/health-gate несли бы
  # OLD-CA. task_absent ловит ЛЮБУЮ task с OLD-CA: ≥1 совпадение → FAIL.
  task_absent:
    - module: community.redis.role
      params_subset:
        tls_ca: "-----BEGIN CERTIFICATE-----\nOLD-CA\n-----END CERTIFICATE-----"
    - module: community.redis.replica-synced
      params_subset:
        tls_ca: "-----BEGIN CERTIFICATE-----\nOLD-CA\n-----END CERTIFICATE-----"
