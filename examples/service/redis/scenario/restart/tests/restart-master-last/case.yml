# L0-испытание restart: рестарт master-а (probe→where master, run_once). Парный
# к rolling-restart-replicas — покрывает master-ветку where probe→role. Roster — 2
# хоста; mocks.register.redis_role.role = master → block-потомки (where slave) —
# placeholder-skip, master-restart (where master, run_once) рендерится.
#
# ★ Probe — community.redis.role (go-redis INFO replication), НЕ raw redis-cli:
# поле register.redis_role.role (Output плагина), НЕ .stdout.
#
# Что ассертим:
#   1. probe (community.redis.role) рендерит params коннекта (addr localhost,
#      пароль из vault, plaintext-ветка).
#   2. block-потомки (Restart + Wait-PONG) — placeholder-skip (Params == nil): на
#      master-payload-е where slave не матчит.
#   3. master-restart (core.service.restarted, where master, run_once) рендерится
#      (Params != nil): рестарт текущего master-а последним.
#
# ВНИМАНИЕ L0-ограничение: mocks.register — ЕДИНЫЙ payload на весь roster (см.
# rolling-restart-replicas). На master-payload-е оба хоста «master» → master-restart
# run_once таргетит ОДИН детерминированный (первый по SID). Раскладку доказывает
# render-ассерт TargetSIDs (TestAcceptance_RestartBlockFanOut).
name: restart the current master last

fixtures:
  hosts:
    - sid: node-1.example.com
      covens: [restart]
      soulprint:
        network: { primary_ip: 10.0.0.1 }
        os: { arch: amd64 }
    - sid: node-2.example.com
      covens: [restart]
      soulprint:
        network: { primary_ip: 10.0.0.2 }
        os: { arch: amd64 }

  input:
    reason: "restart master for L0"

  # Пароль Redis — probe резолвит vault('secret/redis/restart#password')
  # (incarnation.name == имя сценария == restart). state НЕ задан в fixture →
  # has(incarnation.state) false → tls_on false → plaintext-ветка коннекта
  # (дискриминатор v3 читает state.tls.enable, не essence).
  vault:
    secret/redis/restart:
      password: fixture-redis-pass-16+

mocks:
  register:
    redis_role:
      role: master

assert:
  rendered_tasks:
    # ── probe (community.redis.role): go-redis INFO replication, без redis-cli ──
    - index: 0
      module: community.redis.role
      params:
        addr: "127.0.0.1:6379"
        password: fixture-redis-pass-16+
        tls: false
        tls_ca: ""

    # ── master-restart (core.service.restarted, where master, run_once) ──────
    - index: 3
      module: core.service.restarted
      params:
        name: redis-server
