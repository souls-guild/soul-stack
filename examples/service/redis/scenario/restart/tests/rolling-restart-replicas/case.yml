# L0-испытание restart: rolling-restart реплик (probe→where→block+serial:1).
# Render-only, герметично. Roster прогона — 2 хоста. Probe-роль каждого хоста
# подаётся как mocks.register (L0-проброс готового register-payload-а probe-шага,
# без исполнения community.redis.role на хосте): redis_role.role = slave →
# block-потомки (where slave) рендерятся, master-restart (where master) —
# placeholder-skip.
#
# ★ Probe — community.redis.role (go-redis INFO replication), НЕ raw redis-cli:
# поле register.redis_role.role (Output плагина), НЕ .stdout. Slave-health-gate —
# community.redis.replica-synced (СТРОГИЙ ресинк-гейт master_link_status:up,
# решение пользователя 2026-06-23), НЕ pinged/PONG и НЕ core.exec.run redis-cli.
#
# Что ассертим (критерий приёмки переноса shell→плагин):
#   1. probe-шаг (community.redis.role) рендерит params коннекта (addr localhost,
#      пароль из vault, plaintext-ветка при отсутствии essence.tls_enable).
#   2. block fan-out: 2 потомка (Restart + Wait-PONG) разворачиваются в
#      RenderedTask по сквозным индексам (block fan-out + serial:1 наследование
#      доказаны render-ассертом TargetSIDs/SerialWidth в block_acceptance_test.go).
#   3. master-restart (core.service.restarted, where master) — placeholder-skip на
#      slave-payload-е (Params == nil): на slave-roster-е задача не таргетит никого.
#
# ВНИМАНИЕ L0-ограничение: mocks.register — ЕДИНЫЙ payload, применяется ко всем
# хостам roster-а одинаково (probe-per-host = dispatch-слой L3, вне пилота). Поэтому
# where матчит весь roster (все slave) либо никого; раскладку master/slave по разным
# хостам доказывает render-ассерт TargetSIDs (TestAcceptance_RestartBlockFanOut).
name: rolling-restart replicas one at a time

fixtures:
  hosts:
    - sid: node-1.example.com
      covens: [restart]
      soulprint:
        network: { primary_ip: 10.0.0.1 }
        os: { arch: amd64 }
    - sid: node-2.example.com
      covens: [restart]
      soulprint:
        network: { primary_ip: 10.0.0.2 }
        os: { arch: amd64 }

  input:
    reason: "rolling restart for L0"

  # Пароль Redis — probe и health-gate резолвят vault('secret/redis/restart/users/
  # default_admin#password') (incarnation.name == имя сценария == restart). ★ РЕДИЗАЙН
  # default_admin (2026-06-30): коннект под системным default_admin (username → AUTH),
  # пароль из ветки users/default_admin (прежний secret/redis/<inc>#password ДРОПНУТ).
  # state НЕ задан в fixture → has(incarnation.state) false → tls_on false → plaintext-
  # ветка коннекта (addr 127.0.0.1:6379, tls=false, tls_ca=''). Дискриминатор v3 читает
  # state.tls.enable.
  vault:
    secret/redis/restart/users/default_admin:
      password: default-admin-secret-pass

mocks:
  register:
    redis_role:
      role: slave

assert:
  task_present:
    # ── probe (community.redis.role): go-redis INFO replication, без redis-cli ──
    # Единственная community.redis.role в плане.
    - module: community.redis.role
      params_subset:
        addr: "127.0.0.1:6379"
        username: default_admin
        password: default-admin-secret-pass
        tls: false
        tls_ca: ""

    # ── slave-health-gate (community.redis.replica-synced) ───────────────────
    #    СТРОГИЙ ресинк-гейт (master_link_status:up), НЕ pinged/PONG. Единственная
    #    community.redis.replica-synced в плане. Этот гейт живёт ВНУТРИ slave-block-а
    #    сразу за `core.service.restarted` (block fan-out where=slave) — его наличие
    #    доказывает, что slave-block отрендерился, а сам рестарт реплики (bare
    #    core.service.restarted name=redis-server) presence-неотличим от master-рестарта
    #    (оба идентичны, дискриминатор — block-`where`/TargetSIDs, presence его не
    #    видит), поэтому его НЕ ассертим отдельно (см. наблюдение в отчёте).
    - module: community.redis.replica-synced
      params_subset:
        addr: "127.0.0.1:6379"
        username: default_admin
        password: default-admin-secret-pass
        tls: false
        tls_ca: ""
