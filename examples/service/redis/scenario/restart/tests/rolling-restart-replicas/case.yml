# L0 test restart: rolling-restart of replicas (probe->where->block+serial:1).
# Render-only, hermetic. Run roster - 2 hosts. Probe role for each host
# is supplied as mocks.register (L0 pass-through of a ready register payload for the probe step,
# without executing community.redis.role on the host): redis_role.role = slave ->
# block descendants (where slave) render, master-restart (where master) -
# placeholder-skip.
#
# star Probe is community.redis.role (go-redis INFO replication), NOT raw redis-cli:
# field register.redis_role.role (plugin Output), NOT .stdout. Slave-health-gate -
# community.redis.replica-synced (STRICT resync gate master_link_status:up,
# user decision 2026-06-23), NOT pinged/PONG and NOT core.exec.run redis-cli.
#
# What we assert (transfer-acceptance criteria shell->plugin):
#   1. probe step (community.redis.role) renders connect params (addr localhost,
#      password from vault, plaintext branch when essence.tls_enable is absent).
#   2. block fan-out: 2 descendants (Restart + Wait-PONG) expand into
#      RenderedTask via cross-cutting indices (block fan-out + serial:1 inheritance
#      proven by the render assert TargetSIDs/SerialWidth in block_acceptance_test.go).
#   3. master-restart (core.service.restarted, where master) - placeholder-skip on
#      the slave payload (Params == nil): on the slave roster the task targets nobody.
#
# L0 LIMITATION NOTICE: mocks.register - a SINGLE payload, applied identically to
# all hosts in the roster (probe-per-host = the L3 dispatch layer, outside the pilot). So
# where matches the whole roster (all slave) or nobody; splitting master/slave across different
# hosts is proven by the render assert TargetSIDs (TestAcceptance_RestartBlockFanOut).
name: rolling-restart replicas one at a time

fixtures:
  hosts:
    - sid: node-1.example.com
      covens: [restart]
      soulprint:
        network: { primary_ip: 10.0.0.1 }
        os: { arch: amd64 }
    - sid: node-2.example.com
      covens: [restart]
      soulprint:
        network: { primary_ip: 10.0.0.2 }
        os: { arch: amd64 }

  input:
    reason: "rolling restart for L0"

  # Redis password - probe and health-gate resolve vault('secret/redis/restart/users/
  # default_admin#password') (incarnation.name == scenario name == restart). star REDESIGN
  # default_admin (2026-06-30): connect as the system default_admin (username -> AUTH),
  # password from the users/default_admin branch (old secret/redis/<inc>#password DROPPED).
  # state not set in fixture -> has(incarnation.state) false -> tls_on false -> plaintext
  # connect branch (addr 127.0.0.1:6379, tls=false, tls_ca=''). v3 discriminator reads
  # state.tls.enable.
  vault:
    secret/redis/restart/users/default_admin:
      password: default-admin-secret-pass

mocks:
  register:
    redis_role:
      role: slave

assert:
  task_present:
    # -- probe (community.redis.role): go-redis INFO replication, without redis-cli --
    # The only community.redis.role in the plan.
    - module: community.redis.role
      params_subset:
        addr: "127.0.0.1:6379"
        username: default_admin
        password: default-admin-secret-pass
        tls: false
        tls_ca: ""

    # -- slave-health-gate (community.redis.replica-synced) ----------------------
    #    STRICT resync gate (master_link_status:up), NOT pinged/PONG. The only
    #    community.redis.replica-synced in the plan. This gate lives INSIDE the slave block
    #    right after `core.service.restarted` (block fan-out where=slave) - its presence
    #    proves the slave block rendered, while the replica restart itself (bare
    #    core.service.restarted name=redis-server) is presence-indistinguishable from the master restart
    #    (both identical, discriminator - block `where`/TargetSIDs, presence does not
    #    see it), so it is NOT asserted separately (see the note in the report).
    - module: community.redis.replica-synced
      params_subset:
        addr: "127.0.0.1:6379"
        username: default_admin
        password: default-admin-secret-pass
        tls: false
        tls_ca: ""
