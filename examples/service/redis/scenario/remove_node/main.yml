name: remove_node
description: >-
  Day-2: вывести ОДНУ ноду из сформированного Redis-кластера (режим cluster) через
  плагин community.redis (CLUSTER FORGET + миграция слотов при master-е). Меняет живую
  топологию кластера; decommission самого хоста — вне сценария.

# ── Входной контракт оператора (docs/input.md) ────────────────────────────────
# Простые типизированные понятия day-2: какой SID вывести и через какую
# существующую ноду контактировать (seed для CLUSTER NODES/FORGET).
input:
  remove_node_sid:
    type: string
    required: true
    format: fqdn
    description: >-
      SID (FQDN) выводимой из кластера ноды. Должен присутствовать в roster
      прогона (soulprint.hosts). Если это master СО слотами — плагин сперва
      мигрирует его слоты на оставшиеся masters, затем CLUSTER FORGET.

  seed_sid:
    type: string
    required: true
    format: fqdn
    description: >-
      SID любой ДРУГОЙ существующей ноды кластера — контакт для CLUSTER NODES
      (топология + идемпотентность) и FORGET. Должен отличаться от remove_node_sid.

tasks:
  # 1. GUARD — remove_node_sid и seed_sid обязаны быть в roster и различаться (assert:,
  #    ADR-009 amendment 2026-06-23; тот же механизм, что guard add_node). Предикат
  #    вычисляется KEEPER-SIDE на РЕНДЕРЕ (там доступен soulprint.hosts; на Soul-е его
  #    НЕТ). false ОБРЫВАЕТ render с message ДО любого dispatch — раньше и понятнее,
  #    чем shell-test на хосте. assert НЕ emit RenderedTask.
  - name: Guard remove_node and seed are distinct members of the run roster
    assert:
      that:
        - 'input.remove_node_sid != input.seed_sid && size(soulprint.hosts.where("sid == input.remove_node_sid")) == 1 && size(soulprint.hosts.where("sid == input.seed_sid")) == 1'
      message: "remove_node guard: remove_node_sid/seed_sid must be distinct hosts of the run roster"

  # 2. REMOVE-NODE — run_once. Endpoint-ы строятся из roster (soulprint.hosts) по
  #    SID: node (удаляемая) и seed = {addr: "<primary_ip>:6379"}. Это ГОТОВАЯ
  #    топология — плагин ничего не транслирует: сам читает CLUSTER NODES с seed-а,
  #    при master-е со слотами мигрирует слоты на оставшиеся masters (go-redis
  #    SETSLOT/MIGRATE), затем CLUSTER FORGET на всех оставшихся. Идемпотентен
  #    (ноды уже нет → no-op). .where("sid == ...")[0] детерминирован (single-host
  #    roster-фильтр; прецедент create/cluster.yml и add_node). ★ РЕДИЗАЙН default_admin
  #    (2026-06-30): коннект к нодам — под системным default_admin (username → AUTH,
  #    requirepass убран). password из новой Vault-ветки secret/redis/<inc>/users/
  #    default_admin#password; плагин коннектится к нодам под этой парой (password
  #    маскируется). day-2-тело (вне covenant) хардкодит 'default_admin' напрямую.
  - name: Remove the node from the cluster (slot-migration + CLUSTER FORGET)
    run_once: true
    module: community.redis.cluster
    params:
      action:   remove-node
      username: default_admin
      password: "${ vault('secret/redis/' + incarnation.name + '/users/default_admin#password') }"
      node:
        addr: "${ soulprint.hosts.where(\"sid == input.remove_node_sid\")[0].network.primary_ip + ':6379' }"
      seed:
        addr: "${ soulprint.hosts.where(\"sid == input.seed_sid\")[0].network.primary_ip + ':6379' }"
