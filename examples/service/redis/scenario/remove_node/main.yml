name: remove_node
description: >-
  Day-2: вывести ОДНУ ноду из УЖЕ сформированного Redis-кластера (режим
  redis_type=cluster). Аналог redis-cli `--cluster del-node`, но ЦЕЛИКОМ через
  плагин community.redis (go-redis: CLUSTER NODES/FORGET + при master-е со слотами
  миграция слотов SETSLOT/MIGRATE) — никакого redis-cli/shell, capability плагина
  только network_outbound.

  Удаляемая нода ОБЯЗАНА быть привязанной к incarnation Soul-ом и присутствовать в
  roster прогона (soulprint.hosts) — endpoint-ы строятся из него по SID. Таргетинг —
  по стабильному SID через where: (probe не нужен, ADR-008). Прогон зовётся на весь
  incarnation: roster содержит и удаляемую ноду, и seed.

  Граница (architect 2026-06-22): scenario оркеструет порядок/таргетинг и строит
  ГОТОВУЮ топологию-карту (SID→addr) для плагина; плагин исполняет ОДНУ операцию
  (remove-node) и сам решает миграцию слотов/FORGET (получает готовые endpoint-ы,
  ничего не транслирует).

  Decommission самого хоста (остановка redis, чистка nodes.conf, удаление Soul-а из
  incarnation) — ВНЕ этого сценария: remove_node меняет ЖИВУЮ топологию кластера,
  не декларацию. incarnation.state этим сценарием НЕ мутируется (точная роль SID в
  state не пишется — follow-up, симметрия с add_node).

# ── Входной контракт оператора (docs/input.md) ────────────────────────────────
# Простые типизированные понятия day-2: какой SID вывести и через какую
# существующую ноду контактировать (seed для CLUSTER NODES/FORGET).
input:
  remove_node_sid:
    type: string
    required: true
    format: fqdn
    description: >-
      SID (FQDN) выводимой из кластера ноды. Должен присутствовать в roster
      прогона (soulprint.hosts). Если это master СО слотами — плагин сперва
      мигрирует его слоты на оставшиеся masters, затем CLUSTER FORGET.

  seed_sid:
    type: string
    required: true
    format: fqdn
    description: >-
      SID любой ДРУГОЙ существующей ноды кластера — контакт для CLUSTER NODES
      (топология + идемпотентность) и FORGET. Должен отличаться от remove_node_sid.

tasks:
  # 1. GUARD — remove_node_sid и seed_sid обязаны быть в roster и различаться.
  #    Соответствие вычисляется KEEPER-SIDE при render (там доступен soulprint.hosts);
  #    булево встраивается в guard-команду (тот же приём, что guard add_node).
  - name: Guard remove_node and seed are distinct members of the run roster
    run_once: true
    module: core.cmd.shell
    changed_when: "false"
    params:
      cmd: >-
        test "${ input.remove_node_sid != input.seed_sid && size(soulprint.hosts.where("sid == input.remove_node_sid")) == 1 && size(soulprint.hosts.where("sid == input.seed_sid")) == 1 }" = "true" || { echo "remove_node guard: remove_node_sid/seed_sid must be distinct hosts of the run roster"; exit 1; }

  # 2. REMOVE-NODE — run_once. Endpoint-ы строятся из roster (soulprint.hosts) по
  #    SID: node (удаляемая) и seed = {addr: "<primary_ip>:6379"}. Это ГОТОВАЯ
  #    топология — плагин ничего не транслирует: сам читает CLUSTER NODES с seed-а,
  #    при master-е со слотами мигрирует слоты на оставшиеся masters (go-redis
  #    SETSLOT/MIGRATE), затем CLUSTER FORGET на всех оставшихся. Идемпотентен
  #    (ноды уже нет → no-op). .where("sid == ...")[0] детерминирован (single-host
  #    roster-фильтр; прецедент create/cluster.yml и add_node). Пароль — keeper-side
  #    vault()-резолв; плагин коннектится к нодам, password маскируется.
  - name: Remove the node from the cluster (slot-migration + CLUSTER FORGET)
    run_once: true
    module: community.redis.cluster
    params:
      action:   remove-node
      password: "${ vault('secret/redis/' + incarnation.name + '#password') }"
      node:
        addr: "${ soulprint.hosts.where(\"sid == input.remove_node_sid\")[0].network.primary_ip + ':6379' }"
      seed:
        addr: "${ soulprint.hosts.where(\"sid == input.seed_sid\")[0].network.primary_ip + ':6379' }"
