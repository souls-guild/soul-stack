# L0 trial for remove_node: remove a node from the cluster. Run roster — 3 hosts;
# removing node-3, contacting via seed node-1. The scenario builds a READY
# topology map (node/seed = primary_ip:6379 by SID from the roster) and calls the
# run_once plugin. The decision "replica → just FORGET / master with slots → migration + FORGET"
# is made by the PLUGIN at runtime (CLUSTER NODES) — not visible at L0 (render doesn't execute
# Redis); the migration/FORGET branches are proven by plugin tests (cluster_test.go).
name: remove node from cluster

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  hosts:
    - sid: node-1.example.com
      covens: [remove_node, redis]
      soulprint:
        network: { primary_ip: 10.0.0.1 }
        os: { arch: amd64 }
    - sid: node-2.example.com
      covens: [remove_node, redis]
      soulprint:
        network: { primary_ip: 10.0.0.2 }
        os: { arch: amd64 }
    - sid: node-3.example.com
      covens: [remove_node, redis]
      soulprint:
        network: { primary_ip: 10.0.0.3 }
        os: { arch: amd64 }
  # ★ default_admin REDESIGN (2026-06-30): connecting to cluster nodes — as the system
  # default_admin user (username → AUTH), its password from branch secret/redis/<inc>/users/
  # default_admin#password. The old main secret secret/redis/<inc>#password is DROPPED.
  vault:
    secret/redis/remove_node/users/default_admin:
      password: default-admin-secret-pass
  state:
    redis_type: cluster
    redis_version: ""
    redis_config:
      maxmemory: "256mb"
      cluster-enabled: "yes"
      cluster-config-file: "nodes.conf"
      cluster-node-timeout: "5000"
    redis_users: []
    redis_hosts: []

  input:
    remove_node_sid: node-3.example.com
    seed_sid: node-1.example.com

assert:
  # GUARD — assert: (remove_node != seed, both in roster → that[0] true → render
  # passes, no task emitted into the plan).
  task_present:
    # REMOVE-NODE run_once: endpoints from the roster by SID. node=node-3, seed=node-1.
    # The only community.redis.cluster in the plan.
    - module: community.redis.cluster
      params_subset:
        action: remove-node
        username: default_admin
        password: default-admin-secret-pass
        node:
          addr: "10.0.0.3:6379"
        seed:
          addr: "10.0.0.1:6379"
