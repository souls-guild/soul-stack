# L0-испытание destroy (teardown, ADR-061) — инкарнация БЫЛА провижена облаком.
# fixtures.state несёт provisioned_* (как их записал create-прогон с provision):
# provider/vm_ids/sids. destroy читает их обратно (keeper-задача видит pre-run
# снимок incarnation.state.<path>, render commit 68912a8) и эмитит ОДИН keeper-
# side шаг core.cloud.destroyed с params из state.
#
# Guard `when: size(provisioned_vm_ids) > 0` на задаче destroyed: state несёт 4
# vm_id → 4 > 0 → задача В ПЛАНЕ (НЕ group-drop). assert парности sids↔vm_ids
# (4 == 4) проходит run-level ДО dispatch.
#
# Парный к destroy-not-provisioned: там state.provisioned_* пусты → задача
# group-drop (task_absent). Этот кейс доказывает основной teardown-флоу: адрес
# РОВНО core.cloud.destroyed (НЕ provisioned), params взяты из incarnation.state.
name: destroy of a provisioned incarnation emits core.cloud.destroyed with params from state

fixtures:
  # destroy не несёт apply:destiny (keeper-only teardown) — источник не дёргается,
  # но харнесс держит ключ ради единообразия roster-резолва.
  default_destiny_source: "file://../../destiny/{name}"
  # Один хост roster-а: keeper-задача core.cloud.destroyed таргетит keeper (не
  # хосты), но харнесс строит flow_context для static-when/assert по первому хосту.
  # covens нести имя сценария (= incarnation.name) — иначе хост вне таргета.
  hosts:
    - sid: vm-1.example.com
      covens: [destroy]
      soulprint:
        network: { primary_ip: 10.0.0.1 }
        os: { arch: amd64 }

  # incarnation.state ДО прогона: ФАКТ провижена, записанный create-прогоном
  # (provisioned_vm_ids — provider-side id; provisioned_sids — Keeper-side SID;
  # provisioned_provider — имя Provider). destroy читает их в params destroyed.
  # Длины sids и vm_ids совпадают (4 == 4) — assert парности проходит.
  state:
    redis_type: cluster
    redis_config: {}
    provisioned_vm_ids: [i-aaa111, i-bbb222, i-ccc333, i-ddd444]
    provisioned_sids: [vm-1.example.com, vm-2.example.com, vm-3.example.com, vm-4.example.com]
    provisioned_provider: wb-dev

assert:
  task_present:
    # core.cloud.destroyed (on: keeper): provider/vm_ids/sids взяты из
    # incarnation.state. Адрес РОВНО destroyed (base core.cloud + state destroyed).
    - module: core.cloud.destroyed
      params_subset:
        provider: wb-dev
        vm_ids: [i-aaa111, i-bbb222, i-ccc333, i-ddd444]
        sids: [vm-1.example.com, vm-2.example.com, vm-3.example.com, vm-4.example.com]
