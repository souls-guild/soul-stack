# L0 trial destroy (teardown, ADR-061) — the incarnation WAS cloud-provisioned.
# fixtures.state carries provisioned_* (as written by the create run with provision):
# provider/vm_ids/sids. destroy reads them back (the keeper task sees the pre-run
# snapshot of incarnation.state.<path>, render commit 68912a8) and emits a SINGLE keeper-
# side step core.cloud.destroyed with params from state.
#
# Guard `when: size(provisioned_vm_ids) > 0` on the destroyed task: state carries 4
# vm_id → 4 > 0 → the task IS IN THE PLAN (NOT a group-drop). The sids↔vm_ids parity
# assert (4 == 4) passes at run-level BEFORE dispatch.
#
# Paired with destroy-not-provisioned: there state.provisioned_* are empty → the task
# is a group-drop (task_absent). This case proves the main teardown flow: the module
# is EXACTLY core.cloud.destroyed (NOT provisioned), params taken from incarnation.state.
name: destroy of a provisioned incarnation emits core.cloud.destroyed with params from state

fixtures:
  # destroy carries no apply:destiny (keeper-only teardown) — the source is not touched,
  # but the harness keeps the key for uniformity of the roster resolve.
  default_destiny_source: "file://../../destiny/{name}"
  # A single roster host: the keeper task core.cloud.destroyed targets keeper (not
  # hosts), but the harness builds flow_context for static-when/assert from the first host.
  # covens must carry the scenario name (= incarnation.name) — otherwise the host is out of target.
  hosts:
    - sid: vm-1.example.com
      covens: [destroy]
      soulprint:
        network: { primary_ip: 10.0.0.1 }
        os: { arch: amd64 }

  # incarnation.state BEFORE the run: the FACT of being provisioned, written by the create run
  # (provisioned_vm_ids — provider-side id; provisioned_sids — Keeper-side SID;
  # provisioned_provider — Provider name). destroy reads them into the destroyed params.
  # The lengths of sids and vm_ids match (4 == 4) — the parity assert passes.
  state:
    redis_type: cluster
    redis_config: {}
    provisioned_vm_ids: [i-aaa111, i-bbb222, i-ccc333, i-ddd444]
    provisioned_sids: [vm-1.example.com, vm-2.example.com, vm-3.example.com, vm-4.example.com]
    provisioned_provider: example-dev

assert:
  task_present:
    # core.cloud.destroyed (on: keeper): provider/vm_ids/sids are taken from
    # incarnation.state. The module is EXACTLY destroyed (base core.cloud + state destroyed).
    - module: core.cloud.destroyed
      params_subset:
        provider: example-dev
        vm_ids: [i-aaa111, i-bbb222, i-ccc333, i-ddd444]
        sids: [vm-1.example.com, vm-2.example.com, vm-3.example.com, vm-4.example.com]
