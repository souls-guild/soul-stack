name: add_user
description: >-
  ★ Before running, seed the password of the user being added into Vault at
  secret/redis/<incarnation>/users/<name>#password: it is NOT in the input
  form (Vault convention), otherwise the run fails with an error like "secret
  ... not found in Vault" (then seed the secret and run again).


  Add or override a single ACL user on a live Redis without a restart. The
  password comes from Vault; the scenario renders the full users.acl and
  applies it to the live instance.

# ── Operator input contract (docs/input.md) ────────────────────────────────
# ONE AclUser record (types.yml, ADR-062 $type): user name, its ACL rights, on/off.
# The same type as an element of the create input.users array: a single source of
# truth for the form and validation (perms pattern). The password is NOT in the input
# (Vault convention, see description). One user per run is an atomic maintenance
# operation "add a user" (bulk editing of the set → update_users, bulk-replace).
#
# ★ wave 2 (2026-06-26): the former untyped {username, perms, state} was replaced by a
# SINGLE field user: {$type: AclUser}. The user name moved from the top-level username
# into the user.name field. Effect: perms is now validated by the AclUser re2 pattern
# (the token-shape filter from create), which the former free-form perms didn't have:
# an invalid ACL string (garbage/injection/newlines) is rejected at input validation
# (422), instead of reaching users.acl.
input:
  user:
    $type: AclUser
    required: true
    description: >-
      Redis ACL user (AclUser: name + perms + state). Added to users.acl (or
      overrides an existing one with the same name, an idempotent upsert). perms is
      the FULL ACL string (Redis ACL directives as-is), validated by the AclUser
      pattern. The default user is not set by this scenario (it's declared in
      redis.conf separately).

# ── Declarative input invariants (validate:) ───────────────────────────────────
# ★ system-ACL-users guard (design d2): the operator CANNOT add a user with the name
# of a SERVICE account (default/replica/monitoring/sentinel/haproxy). System users are
# merged into users.acl from essence ON TOP of operator-extra (last-wins): an operator
# `replica` would silently override the replication replica-perms. Caught at INPUT
# validation (422 BEFORE applying), same as in create. INPUT-ONLY (essence unavailable):
# the name list is hardcoded (= create).
validate:
  - that: "!(input.user.name in ['default', 'replica', 'monitoring', 'sentinel', 'haproxy'])"
    message: "ACL username is reserved for a service account (default/replica/monitoring/sentinel/haproxy): choose another name; service users are created automatically from essence"

# ── Computed scenario-vars (compute:) ─────────────────────────────────────────
# Run-level context (input/essence/incarnation, without soulprint). tls_* is the
# plugin connect discriminator from state.tls (state_schema v3), identical to
# restart/update_config: ACL LOAD goes over a TLS connect if Redis is on TLS.
compute:
  # ── admin_user: name of the SYSTEM ACL user for intra-cluster AUTH (default_admin) ──
  # ★ default_admin REDESIGN (2026-06-30): the scenario body has NO extends: covenant
  # (no shared compute), so the system admin user name is declared as a LOCAL literal:
  # a single source within the scenario (the community.redis.acl plugin connect +
  # masterauth merge into config + the Vault password path all read compute.admin_user,
  # instead of hardcoding 'default_admin' in each spot). Symmetric with
  # covenant.compute.admin_user in the deploy bodies.
  admin_user: "${ 'default_admin' }"
  tls_on:   "${ has(incarnation.state) && has(incarnation.state.tls) && default(incarnation.state.tls.enable, false) }"
  tls_port: "${ compute.tls_on ? string(incarnation.state.tls.port) : '' }"
  # tls_ca is the connect's PEM CA CONTENT (the plugin expects PEM, not a path). Taken
  # from the NAMED state.tls.ca_ref (a Vault PATH in state, vault() resolves it to PEM),
  # symmetric with tls_port from state.tls.port. After rotate_tls (changes
  # state.tls.ca_ref to a new path) the connect uses the CURRENT CA, not a stale
  # essence default.
  tls_ca:   "${ compute.tls_on ? vault(incarnation.state.tls.ca_ref) : '' }"

  # ── New ACL user set: EXPANDED state.redis_users + the user being added ──
  # ★ wave 1b (2026-06-26): state.redis_users is an ARRAY of AclUser [{name,perms,state}]
  # (map→array). The former map-upsert via merge() was replaced by an array-upsert:
  # FILTER the same-named entry out of the current array (filter u.name != new) +
  # APPEND the new one as an element. filter+concatenation gives the same last-wins
  # upsert semantics (the new one overrides an existing one with the same name) as the
  # former merge-map. Each user carries name/perms/state; add does NOT store the
  # password in state: it's keeper-side vault. The has() guard on redis_users is
  # back-compat for incarnations without ACL users (empty array).
  # ★ wave 2 (2026-06-26): the user being added is input.user (AclUser, $type). Name/
  # rights/state come from the user.name/user.perms/user.state fields (previously
  # top-level username/perms/state). default(user.state,'on') is back-compat: $type
  # already fills the default at the input stage, but default() is also safe for raw
  # input without state.
  users_new: >-
    ${ (has(incarnation.state.redis_users)
          ? incarnation.state.redis_users.filter(u, u.name != input.user.name)
          : [])
       + [{ 'name': input.user.name, 'perms': input.user.perms, 'state': default(input.user.state, 'on') }] }

# ── incarnation.state mutation ─────────────────────────────────────────────────
# The scenario commits the NEW ACL user set (array of AclUser [{name,perms,state}],
# wave 1b, WITHOUT the password (it's keeper-side vault, ADR-012). The same
# compute.users_new (array) that went into the users.acl render.
state_changes:
  - set: redis_users
    value: "${ compute.users_new }"

tasks:
  # 1. Re-render users.acl to disk with the NEW user set (the same mode-agnostic
  #    destiny redis as create/add_node). vars.users is the merged set with per-user
  #    passwords from Vault (keeper-side vault(), the .tmpl hashes it, no plaintext
  #    written). redis.conf/TLS are NOT touched: add_user changes ONLY the ACL (the
  #    apply destiny renders the whole brick, but we only actually apply the ACL in
  #    step 2; redis.conf on disk won't change with the same config, an idempotent
  #    render). version comes from state; conf_dir/data_dir come from essence
  #    (v11→v12, host-layout moved into essence, Variant A).
  - name: Re-render users.acl with the new ACL user set (full file on disk)
    apply:
      destiny: redis
      input:
        version:  "${ default(incarnation.state.redis_version, '') }"
        # ★ install: REQUIRED on a re-run (live E2E regression 2026-07-01). Without it the
        # install.yml dispatcher falls through to the package branch on
        # !has(input.install) → core.pkg `apt install redis-server=<version>` (the
        # version from the Nexus binary is ABSENT in apt → env exited 100). We build
        # the SAME binary structure as create (deploy-body → compute.install from
        # essence.install_method), a single install method. Difference from
        # covenant.install: version comes from the EXPANDED state (redis_version), not
        # input.version (a re-run doesn't reinstall the version).
        install: >-
          ${ (default(essence.install_method, 'binary') == 'binary')
               ? {
                   'method':        'binary',
                   'base_url':      default(essence.binary_base_url, ''),
                   'version':       default(incarnation.state.redis_version, ''),
                   'allow_private': default(essence.binary_allow_private, true)
                 }
               : { 'method': 'package' } }
        conf_dir: "${ default(essence.conf_dir, '/etc/redis') }"
        data_dir: "${ default(essence.data_dir, '/var/lib/redis') }"
        # ★ default_admin REDESIGN (2026-06-30): apply.input.password REMOVED (destiny
        # redis no longer accepts it, requirepass was dropped). masteruser/masterauth
        # are MERGED into config as regular directives ON TOP of the expanded
        # state.redis_config (it's stored WITHOUT masterauth; the secret lives in
        # Vault, ADR-061). add_user re-renders the entire destiny `redis` brick (incl.
        # redis.conf), so the static replica→master AUTH must be merged in here too,
        # otherwise redis.conf on disk would lose masteruser/masterauth and
        # cluster/sentinel replicas would hit NOAUTH on PSYNC after a restart. On
        # master nodes the directive is inert (failover-safe). masterauth is
        # vault()-in-cell (seal masking ADR-010 §7.4); admin_user = compute.admin_user;
        # path is secret/redis/<inc>/users/default_admin#password (the same branch as
        # the users block below).
        config: >-
          ${ merge(incarnation.state.redis_config, {
               'masteruser': compute.admin_user,
               'masterauth': vault('secret/redis/' + incarnation.name + '/users/' + compute.admin_user + '#password')
             }) }
        modules_base_url: "${ default(essence.modules_base_url, '') }"
        # ★★ CRITICAL (system-ACL-users d2): the FULL users.acl = SYSTEM users (from
        # essence, FIRST) + operator-extra (state.redis_users + the new one,
        # compute.users_new, an ARRAY of AclUser from wave 1b, ON TOP). add_user re-renders
        # the WHOLE file (not append) → WITHOUT merging in the system users this render
        # would WIPE OUT replica/monitoring/sentinel/haproxy → breaking
        # replication/sentinel/health-check on a re-run. System users are merged in on
        # EVERY render from essence.system_acl_users (they're NOT in state; state only
        # holds operator-extra, item 7 of d2). last-wins: operator-extra overrides a
        # same-named system user (but system names are locked by create's validate
        # guard, so there should be no collision). Each one's Vault password is
        # secret/redis/<inc>/users/<name>#password (the same branch).
        users: >-
          ${ merge(
               merge(default(essence.system_acl_users, {}).map(name, {
                 name: {
                   'perms':    essence.system_acl_users[name],
                   'state':    'on',
                   'password': vault('secret/redis/' + incarnation.name + '/users/' + name + '#password')
                 }
               })),
               merge(compute.users_new.map(u, {
                 u.name: {
                   'perms':    u.perms,
                   'state':    u.state,
                   'password': vault('secret/redis/' + incarnation.name + '/users/' + u.name + '#password')
                 }
               }))
             ) }

  # 2. HOT-RELOAD ACL: community.redis.acl sends ACL LOAD: the live instance re-reads
  #    the whole aclfile (rendered in step 1). Idempotent by construction; the plugin
  #    diffs ACL LIST before/after (changed=false when they match). addr/TLS
  #    discriminator comes from state.tls (compute.tls_*), same as restart/update_config.
  - name: Hot-reload ACL on the live instance (ACL LOAD)
    module: community.redis.acl
    params:
      addr:     "${ compute.tls_on ? '127.0.0.1:' + compute.tls_port : '127.0.0.1:6379' }"
      # ★ default_admin REDESIGN (2026-06-30): AUTH as the system default_admin
      # (requirepass dropped). username + its password from the
      # secret/redis/<inc>/users/default_admin#password branch. The community.redis
      # plugin passes username into AUTH (parseConnConfig).
      username: "${ compute.admin_user }"
      password: "${ vault('secret/redis/' + incarnation.name + '/users/' + compute.admin_user + '#password') }"
      tls:      "${ compute.tls_on }"
      tls_ca:   "${ compute.tls_ca }"
