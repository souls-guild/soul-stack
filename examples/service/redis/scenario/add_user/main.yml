name: add_user
description: >-
  Day-2: добавить (или переопределить) ОДНОГО ACL-пользователя на УЖЕ работающем
  Redis БЕЗ рестарта процесса. Производственная конвенция «hot-reload > рестарт»
  (docs/destiny/production-conventions.md §3a/§6): ACL применяется на лету командой
  ACL LOAD (перечитать aclfile), рестарт демона не нужен.

  Оператор задаёт ОДНУ запись AclUser (name + perms + state) — тот же тип, что элемент
  массива create input.users (types.yml, ADR-062). perms валидируется тем же re2-
  паттерном AclUser, что в create (закрывает day-2-мусор: невалидная ACL-строка
  отсекается на input-валидации, а не доезжает до users.acl). Пароль НЕ во входном
  контракте: лежит в Vault по конвенции
  secret/redis/<incarnation>/users/<name>#password (как create/add_node), резолвится
  keeper-side через vault() в render-фазе. Сценарий мержит нового юзера в РАЗВЁРНУТЫЙ
  incarnation.state.redis_users, рендерит ПОЛНЫЙ users.acl на диск и ОЖИВЛЯЕТ через
  community.redis.acl (ACL LOAD).

  ★ Граница с update_config/rotate_tls: add_user трогает ТОЛЬКО ACL (users.acl +
  ACL LOAD), redis.conf и TLS-материал не перерендеривает — отдельная аудит-семантика
  «изменился список пользователей». users.acl рендерит destiny redis (тот же кирпич,
  что create) — здесь подменяется только vars.users набор.

  Идемпотентность: ACL LOAD идемпотентен ПО КОНСТРУКЦИИ (приводит живой инстанс к
  файлу независимо от текущего состояния); плагин делает честный diff ACL LIST
  до/после (changed=false при совпадении). Рендер users.acl детерминирован (range по
  отсортированному map). Day-2: инстанс УЖЕ работает (auth через vault()-пароль +
  TLS-дискриминатор из incarnation.state.tls, как restart/update_config).

  Таргетинг — на весь incarnation (on опущен, ADR-008/009): новый users.acl + ACL LOAD
  идут на КАЖДЫЙ redis-server-хост. ACL host-инвариантен (один набор юзеров на кластер).

# ── Входной контракт оператора (docs/input.md) ────────────────────────────────
# ОДНА запись AclUser (types.yml, ADR-062 $type): имя юзера, его ACL-права, on/off.
# Тот же тип, что элемент массива create input.users — единый источник правды формы
# и валидации (perms-pattern). Пароль — НЕ во входе (Vault-конвенция, см. description).
# Один юзер за прогон — атомарная day-2 операция «добавить пользователя» (массовое
# редактирование набора → update_users, bulk-replace).
#
# ★ wave 2 (2026-06-26): прежний нетипизированный {username, perms, state} заменён
# ОДНИМ полем user: {$type: AclUser}. Имя юзера переехало из top-level username в
# поле user.name. Эффект — perms теперь валидируется re2-паттерном AclUser (token-shape-
# фильтр create), которого у прежнего свободного perms не было: невалидная ACL-строка
# (мусор/инъекции/переводы строк) отсекается на input-валидации (422), а не доезжает
# до users.acl на day-2.
input:
  user:
    $type: AclUser
    required: true
    description: >-
      ACL-пользователь Redis (AclUser: name + perms + state). Добавляется в users.acl
      (или переопределяет существующего с тем же name — idempotent upsert). perms —
      ПОЛНАЯ ACL-строка (директивы Redis ACL как есть), валидируется паттерном AclUser.
      default-юзер этим сценарием не задаётся (он объявлен в redis.conf отдельно).

# ── Декларативные input-инварианты (validate:) ───────────────────────────────────
# ★ system-ACL-users guard (дизайн d2): operator НЕ может добавить юзера с именем
# СЛУЖЕБНОГО (default/replica/monitoring/sentinel/haproxy). Системные доливаются в
# users.acl из essence ПОВЕРХ operator-extra (last-wins) — operator `replica` молча
# перекрыл бы replica-perms репликации. Ловим на INPUT-валидации (422 ДО applying),
# как в create. INPUT-ONLY (essence недоступен): список имён захардкожен (= create).
validate:
  - that: "!(input.user.name in ['default', 'replica', 'monitoring', 'sentinel', 'haproxy'])"
    message: "имя ACL-пользователя зарезервировано за служебным (default/replica/monitoring/sentinel/haproxy): выбери другое имя — служебные юзеры заводятся автоматически из essence"

# ── Вычисляемые scenario-vars (compute:) ─────────────────────────────────────────
# Рун-уровневый контекст (input/essence/incarnation — без soulprint). tls_* —
# дискриминатор коннекта плагина из state.tls (state_schema v3), идентично restart/
# update_config: ACL LOAD идёт через TLS-коннект, если Redis на TLS.
compute:
  # ── admin_user: имя СИСТЕМНОГО ACL-юзера внутрикластерного AUTH (default_admin) ──
  # ★ РЕДИЗАЙН default_admin (2026-06-30): day-2-тело БЕЗ extends: covenant (нет общего
  # compute), поэтому имя системного admin-юзера объявляется ЛОКАЛЬНЫМ литералом — единый
  # источник внутри сценария (плагин-коннект community.redis.acl + masterauth-долив в
  # config + Vault-путь пароля читают compute.admin_user, не хардкодят 'default_admin' в
  # каждом месте). Симметрия с covenant.compute.admin_user деплой-тел.
  admin_user: "${ 'default_admin' }"
  tls_on:   "${ has(incarnation.state) && has(incarnation.state.tls) && default(incarnation.state.tls.enable, false) }"
  tls_port: "${ compute.tls_on ? string(incarnation.state.tls.port) : '' }"
  # tls_ca — PEM CA-СОДЕРЖИМОЕ коннекта (плагин ждёт PEM, не путь). Берётся из
  # ИМЕНОВАННОГО state.tls.ca_ref (Vault-ПУТЬ в state, vault() резолвит в PEM),
  # симметрично tls_port из state.tls.port. После rotate_tls (меняет state.tls.ca_ref
  # на новый путь) day-2 коннект использует АКТУАЛЬНЫЙ CA — не устаревший essence-дефолт.
  tls_ca:   "${ compute.tls_on ? vault(incarnation.state.tls.ca_ref) : '' }"

  # ── Новый набор ACL-юзеров: РАЗВЁРНУТЫЙ state.redis_users + добавляемый юзер ──
  # ★ wave 1b (2026-06-26): state.redis_users — МАССИВ AclUser [{name,perms,state}]
  # (map→array). Прежний map-upsert через merge() заменён array-upsert: ОТФИЛЬТРОВАТЬ
  # из текущего массива одноимённого (filter u.name != new) + ДОПИСАТЬ нового элементом.
  # filter+конкатенация даёт ту же upsert-семантику last-wins (новый перекрывает
  # существующего с тем же именем), что и прежний merge-map. Каждый юзер несёт
  # name/perms/state; пароль add НЕ хранит в state — он keeper-side vault. has()-guard
  # на redis_users — back-compat для инкарнаций без ACL-юзеров (пустой массив).
  # ★ wave 2 (2026-06-26): добавляемый юзер — input.user (AclUser, $type). Имя/права/
  # состояние из полей user.name/user.perms/user.state (раньше top-level username/
  # perms/state). default(user.state,'on') — back-compat: $type доливает default на
  # input-стадии, но default() безопасен и для сырого input без state.
  users_new: >-
    ${ (has(incarnation.state.redis_users)
          ? incarnation.state.redis_users.filter(u, u.name != input.user.name)
          : [])
       + [{ 'name': input.user.name, 'perms': input.user.perms, 'state': default(input.user.state, 'on') }] }

# ── Мутация incarnation.state ─────────────────────────────────────────────────
# day-2 фиксирует НОВЫЙ набор ACL-юзеров (массив AclUser [{name,perms,state}], wave
# 1b, БЕЗ пароля — он keeper-side vault, ADR-012). Тот же compute.users_new (массив),
# что ушёл в render users.acl.
state_changes:
  - set: redis_users
    value: "${ compute.users_new }"

tasks:
  # 1. Перерендерить users.acl на диск с НОВЫМ набором юзеров (тот же режим-агностичный
  #    destiny redis, что create/add_node). vars.users — merged набор с per-user
  #    паролями из Vault (keeper-side vault(), .tmpl хеширует, plaintext не пишет).
  #    redis.conf/TLS НЕ трогаем — add_user меняет ТОЛЬКО ACL (apply destiny рендерит
  #    весь кирпич, но оживляем мы лишь ACL шагом 2; redis.conf на диске не изменится
  #    при тех же config — idempotent рендер). version — из state; conf_dir/data_dir —
  #    из essence (v11→v12, host-layout вынесен в essence, Вариант A).
  - name: Re-render users.acl with the new ACL user set (full file on disk)
    apply:
      destiny: redis
      input:
        version:  "${ default(incarnation.state.redis_version, '') }"
        # ★ install: ОБЯЗАТЕЛЕН на day-2 (регресс live E2E 2026-07-01). Без него
        # диспетчер install.yml по !has(input.install) скатывается в package-ветку →
        # core.pkg `apt install redis-server=<version>` (версия из Nexus-binary в apt
        # ОТСУТСТВУЕТ → env exited 100). Собираем ТУ ЖЕ binary-структуру, что create
        # (deploy-body → compute.install из essence.install_method) — единый способ
        # установки. Отличие от covenant.install: version из РАЗВЁРНУТОГО state
        # (redis_version), а не input.version (day-2 версию не переустанавливает).
        install: >-
          ${ (default(essence.install_method, 'binary') == 'binary')
               ? {
                   'method':        'binary',
                   'base_url':      default(essence.binary_base_url, ''),
                   'version':       default(incarnation.state.redis_version, ''),
                   'allow_private': default(essence.binary_allow_private, true)
                 }
               : { 'method': 'package' } }
        conf_dir: "${ default(essence.conf_dir, '/etc/redis') }"
        data_dir: "${ default(essence.data_dir, '/var/lib/redis') }"
        # ★ РЕДИЗАЙН default_admin (2026-06-30): apply.input.password УДАЛЁН (destiny redis
        # его больше не принимает — requirepass убран). masteruser/masterauth ДОЛИВАЮТСЯ в
        # config обычными директивами ПОВЕРХ развёрнутого state.redis_config (он хранится
        # БЕЗ masterauth — секрет в Vault, ADR-061). add_user перерендеривает весь кирпич
        # destiny `redis` (вкл. redis.conf), поэтому статическая replica→master AUTH обязана
        # доливаться и здесь — иначе redis.conf на диске потерял бы masteruser/masterauth и
        # cluster/sentinel-реплики после рестарта упёрлись бы в NOAUTH при PSYNC. На master-
        # нодах директива инертна (failover-safe). masterauth — vault()-в-ячейке (seal-маскинг
        # ADR-010 §7.4); admin_user = compute.admin_user; путь — secret/redis/<inc>/users/
        # default_admin#password (та же ветка, что users-блок ниже).
        config: >-
          ${ merge(incarnation.state.redis_config, {
               'masteruser': compute.admin_user,
               'masterauth': vault('secret/redis/' + incarnation.name + '/users/' + compute.admin_user + '#password')
             }) }
        modules_base_url: "${ default(essence.modules_base_url, '') }"
        # ★★ КРИТИЧНО (system-ACL-users d2): ПОЛНЫЙ users.acl = СИСТЕМНЫЕ (из essence,
        # ПЕРВЫМИ) + operator-extra (state.redis_users + новый, compute.users_new — МАССИВ
        # AclUser, wave 1b, ПОВЕРХ). add_user перерендеривает ВЕСЬ файл (не append) → БЕЗ долива системных
        # этот рендер СТЁР БЫ replica/monitoring/sentinel/haproxy → сломал бы репликацию/
        # sentinel/health-check на day-2. Системные доливаются на КАЖДОМ рендере из
        # essence.system_acl_users (они НЕ в state — state хранит только operator-extra,
        # пункт 7 d2). last-wins: operator-extra перекрывает одноимённого системного
        # (но имена системных закрыты validate-guard create — коллизии быть не должно).
        # Vault-пароль каждого — secret/redis/<inc>/users/<name>#password (та же ветка).
        users: >-
          ${ merge(
               merge(default(essence.system_acl_users, {}).map(name, {
                 name: {
                   'perms':    essence.system_acl_users[name],
                   'state':    'on',
                   'password': vault('secret/redis/' + incarnation.name + '/users/' + name + '#password')
                 }
               })),
               merge(compute.users_new.map(u, {
                 u.name: {
                   'perms':    u.perms,
                   'state':    u.state,
                   'password': vault('secret/redis/' + incarnation.name + '/users/' + u.name + '#password')
                 }
               }))
             ) }

  # 2. HOT-RELOAD ACL: community.redis.acl шлёт ACL LOAD — живой инстанс перечитывает
  #    aclfile (отрендеренный шагом 1) целиком. Идемпотентно по конструкции; плагин
  #    делает diff ACL LIST до/после (changed=false при совпадении). addr/TLS-
  #    дискриминатор — из state.tls (compute.tls_*), как restart/update_config.
  - name: Hot-reload ACL on the live instance (ACL LOAD)
    module: community.redis.acl
    params:
      addr:     "${ compute.tls_on ? '127.0.0.1:' + compute.tls_port : '127.0.0.1:6379' }"
      # ★ РЕДИЗАЙН default_admin (2026-06-30): AUTH под системным default_admin (requirepass
      # убран). username + его пароль из ветки secret/redis/<inc>/users/default_admin#password.
      # Плагин community.redis передаёт username в AUTH (parseConnConfig).
      username: "${ compute.admin_user }"
      password: "${ vault('secret/redis/' + incarnation.name + '/users/' + compute.admin_user + '#password') }"
      tls:      "${ compute.tls_on }"
      tls_ca:   "${ compute.tls_ca }"
