# ★★ КРИТИЧНЫЙ guard-инвариант (system-ACL-users d2): add_user НЕ СТИРАЕТ системных.
# add_user перерендеривает ПОЛНЫЙ users.acl из state.redis_users (только operator-extra).
# БЕЗ долива системных из essence этот рендер СТЁР БЫ replica/monitoring/sentinel/haproxy
# → сломал бы репликацию/sentinel/health-check на day-2. Этот кейс ДОКАЗЫВАЕТ, что
# add_user доливает системных из essence.system_acl_users на КАЖДОМ рендере:
#   users.acl несёт СИСТЕМНЫЕ (replica/monitoring/sentinel/haproxy) + operator-extra
#   (новый alice + сохранённый bob), КАЖДЫЙ со своим vault-паролем.
# state_changes.redis_users несёт ТОЛЬКО operator-extra (alice+bob) — системные НЕ в
# state (пункт 7 d2). Регресс «add_user стёр системных» = расхождение vars.users
# (нет replica/monitoring/sentinel/haproxy) → ассерт красный.
name: add_user re-renders full acl WITHOUT wiping system users (preserve guard)

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  soulprint:
    network: { primary_ip: 10.0.0.5 }
    os: { arch: amd64 }

  # Развёрнутый state: operator-extra bob. Системные НЕ в state (доливаются из essence).
  state:
    redis_type: sentinel
    redis_version: "7.2.4"
    conf_dir: /etc/redis
    data_dir: /var/lib/redis
    modules_base_url: "https://artifacts.example.com/redis/modules"
    tls:
      enable:   false
      only:     false
      port:     7379
      cert_ref: ""
      key_ref:  ""
      ca_ref:   ""
    redis_config:
      maxmemory:        "256mb"
      maxmemory-policy: allkeys-lru
      save:             "900 1 300 10 60 10000"
      appendonly:       "no"
    redis_users:
      - { name: bob, perms: "~app:* +@read", state: "on" }

  essence:
    # Системные ACL redis-server (perms 1:1 из роли, БЕЗ default). add_user ОБЯЗАН их
    # долить, иначе rerender стирает служебных.
    system_acl_users:
      default_admin: "~* &* +@all"
      replica:    "+psync +replconf +ping"
      monitoring: "-@all +@connection +client +ping +info +config|get +cluster|info +slowlog +latency +memory +select +command|count +command|docs"
      sentinel:   "allchannels +multi +slaveof +ping +exec +subscribe +config|rewrite +role +publish +info +client|setname +client|kill +script|kill"
      haproxy:    "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +info +cluster|info"

  input:
    user:
      name: alice
      perms: "~* +@all"
      state: "on"

  vault:
    secret/redis/add_user:
      password: addusr-redis-pass-16ch
    secret/redis/add_user/users/alice:
      password: alice-user-secret-pass
    secret/redis/add_user/users/bob:
      password: bob-user-secret-pass
    secret/redis/add_user/users/default_admin:
      password: default-admin-secret-pass
    secret/redis/add_user/users/replica:
      password: replica-sys-secret-pass
    secret/redis/add_user/users/monitoring:
      password: monitoring-sys-secret-pass
    secret/redis/add_user/users/sentinel:
      password: sentinel-sys-secret-pass
    secret/redis/add_user/users/haproxy:
      password: haproxy-sys-secret-pass

assert:
  task_present:
    # users.acl несёт СИСТЕМНЫЕ + operator-extra (alice+bob). deep-compare ловит
    # ЛЮБОЕ исчезновение системного (регресс стирания).
    - module: core.file.rendered
      params_subset:
        path: /etc/redis/users.acl
        render_context:
          vars:
            users:
              default_admin:
                perms: "~* &* +@all"
                state: "on"
                password: default-admin-secret-pass
              replica:
                perms: "+psync +replconf +ping"
                state: "on"
                password: replica-sys-secret-pass
              monitoring:
                perms: "-@all +@connection +client +ping +info +config|get +cluster|info +slowlog +latency +memory +select +command|count +command|docs"
                state: "on"
                password: monitoring-sys-secret-pass
              sentinel:
                perms: "allchannels +multi +slaveof +ping +exec +subscribe +config|rewrite +role +publish +info +client|setname +client|kill +script|kill"
                state: "on"
                password: sentinel-sys-secret-pass
              haproxy:
                perms: "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +info +cluster|info"
                state: "on"
                password: haproxy-sys-secret-pass
              alice:
                perms: "~* +@all"
                state: "on"
                password: alice-user-secret-pass
              bob:
                perms: "~app:* +@read"
                state: "on"
                password: bob-user-secret-pass
          self:
            sid: trial-host
            covens: [add_user]
            choirs: []
            traits: {}
            role: ""
            network:
              primary_ip: 10.0.0.5
            os:
              arch: amd64
          role: ""
          essence: {}

    # hot-reload ACL LOAD — plain-инстанс. ★ РЕДИЗАЙН default_admin: AUTH под default_admin.
    - module: community.redis.acl
      params_subset:
        addr: "127.0.0.1:6379"
        username: default_admin
        password: default-admin-secret-pass
        tls: false

  # state_changes: redis_users несёт bob+alice БЕЗ системных (write-model = operator-
  # extra, МАССИВ AclUser wave 1b). Порядок array-upsert: сохранённый bob ПЕРВЫМ,
  # новый alice ДОПИСАН (filter(name != alice) + [alice]).
  state_changes:
    redis_users:
      - { name: bob, perms: "~app:* +@read", state: "on" }
      - { name: alice, perms: "~* +@all", state: "on" }
