# ★★ CRITICAL guard invariant (system-ACL-users d2): add_user does NOT WIPE system users.
# add_user re-renders the FULL users.acl from state.redis_users (operator-extra only).
# WITHOUT topping up system users from essence, this render WOULD WIPE replica/monitoring/sentinel/haproxy
# → would break replication/sentinel/health-check on the next run. This case PROVES that
# add_user tops up system users from essence.system_acl_users on EVERY render:
#   users.acl carries SYSTEM (replica/monitoring/sentinel/haproxy) + operator-extra
#   (new alice + preserved bob), EACH with its own vault password.
# state_changes.redis_users carries ONLY operator-extra (alice+bob) — system users are NOT in
# state (item 7 d2). A regression where "add_user wiped system users" = a mismatch in vars.users
# (missing replica/monitoring/sentinel/haproxy) → assert fails.
name: add_user re-renders full acl WITHOUT wiping system users (preserve guard)

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  soulprint:
    network: { primary_ip: 10.0.0.5 }
    os: { arch: amd64 }

  # Expanded state: operator-extra bob. System users are NOT in state (topped up from essence).
  state:
    redis_type: sentinel
    redis_version: "7.2.4"
    tls:
      enable:   false
      only:     false
      port:     7379
      cert_ref: ""
      key_ref:  ""
      ca_ref:   ""
    redis_config:
      maxmemory:        "256mb"
      maxmemory-policy: allkeys-lru
      save:             "900 1 300 10 60 10000"
      appendonly:       "no"
    redis_users:
      - { name: bob, perms: "~app:* +@read", state: "on" }

  essence:
    # host-layout (conf_dir/data_dir/modules_base_url) — in essence (v11->v12, Option A).
    conf_dir: /etc/redis
    data_dir: /var/lib/redis
    modules_base_url: "https://artifacts.example.com/redis/modules"
    # System redis-server ACLs (perms 1:1 from the role, WITHOUT default). add_user MUST
    # top them up, otherwise rerender wipes the service accounts.
    system_acl_users:
      default_admin: "~* &* +@all"
      replica:    "+psync +replconf +ping"
      monitoring: "-@all +@connection +client +ping +info +config|get +cluster|info +slowlog +latency +memory +select +command|count +command|docs"
      sentinel:   "allchannels +multi +slaveof +ping +exec +subscribe +config|rewrite +role +publish +info +client|setname +client|kill +script|kill"
      haproxy:    "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +info +cluster|info"

  input:
    user:
      name: alice
      perms: "~* +@all"
      state: "on"

  vault:
    secret/redis/add_user:
      password: addusr-redis-pass-16ch
    secret/redis/add_user/users/alice:
      password: alice-user-secret-pass
    secret/redis/add_user/users/bob:
      password: bob-user-secret-pass
    secret/redis/add_user/users/default_admin:
      password: default-admin-secret-pass
    secret/redis/add_user/users/replica:
      password: replica-sys-secret-pass
    secret/redis/add_user/users/monitoring:
      password: monitoring-sys-secret-pass
    secret/redis/add_user/users/sentinel:
      password: sentinel-sys-secret-pass
    secret/redis/add_user/users/haproxy:
      password: haproxy-sys-secret-pass

assert:
  task_present:
    # users.acl carries SYSTEM + operator-extra (alice+bob). deep-compare catches
    # ANY disappearance of a system user (wipe regression).
    - module: core.file.rendered
      params_subset:
        path: /etc/redis/users.acl
        render_context:
          vars:
            users:
              default_admin:
                perms: "~* &* +@all"
                state: "on"
                password: default-admin-secret-pass
              replica:
                perms: "+psync +replconf +ping"
                state: "on"
                password: replica-sys-secret-pass
              monitoring:
                perms: "-@all +@connection +client +ping +info +config|get +cluster|info +slowlog +latency +memory +select +command|count +command|docs"
                state: "on"
                password: monitoring-sys-secret-pass
              sentinel:
                perms: "allchannels +multi +slaveof +ping +exec +subscribe +config|rewrite +role +publish +info +client|setname +client|kill +script|kill"
                state: "on"
                password: sentinel-sys-secret-pass
              haproxy:
                perms: "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +info +cluster|info"
                state: "on"
                password: haproxy-sys-secret-pass
              alice:
                perms: "~* +@all"
                state: "on"
                password: alice-user-secret-pass
              bob:
                perms: "~app:* +@read"
                state: "on"
                password: bob-user-secret-pass
          self:
            sid: trial-host
            covens: [add_user]
            choirs: []
            traits: {}
            role: ""
            network:
              primary_ip: 10.0.0.5
            os:
              arch: amd64
          role: ""
          essence: {}

    # hot-reload ACL LOAD — plain instance. ★ default_admin REDESIGN: AUTH as default_admin.
    - module: community.redis.acl
      params_subset:
        addr: "127.0.0.1:6379"
        username: default_admin
        password: default-admin-secret-pass
        tls: false

  # state_changes: redis_users carries bob+alice WITHOUT system users (write-model = operator-
  # extra, AclUser ARRAY wave 1b). Order of array-upsert: preserved bob FIRST,
  # new alice APPENDED (filter(name != alice) + [alice]).
  state_changes:
    redis_users:
      - { name: bob, perms: "~app:* +@read", state: "on" }
      - { name: alice, perms: "~* +@all", state: "on" }
