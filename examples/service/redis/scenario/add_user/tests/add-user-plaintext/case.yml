# L0-испытание add_user: добавление ACL-пользователя БЕЗ рестарта (ACL LOAD).
# Оператор добавляет юзера alice; сценарий мержит его в РАЗВЁРНУТЫЙ state.redis_users,
# рендерит ПОЛНЫЙ users.acl (alice + ранее развёрнутый bob) и ОЖИВЛЯЕТ через
# community.redis.acl (ACL LOAD). Render-only, герметично. Plaintext (addr 6379).
#
# Что ассертим:
#   1. users.acl (core.file.rendered, path-дизамбигуатор): vars.users несёт ОБА юзера
#      (новый alice + сохранённый bob) с per-user паролями из Vault (конвенция
#      secret/redis/<inc>/users/<name>#password). Пароль в .tmpl хешируется (вне L0).
#   2. hot-reload (community.redis.acl): addr 127.0.0.1:6379 (plain), tls=false,
#      password из vault. ACL LOAD аргументов не несёт (params — только коннект).
#   3. state_changes: redis_users несёт alice+bob (имя→{perms,state}, БЕЗ пароля —
#      write-model хранит только perms/state).
#
# Идемпотентность (рендер-уровень): merge детерминирован; повторный прогон с тем же
# вводом → тот же users.acl. ACL LOAD идемпотентен по конструкции (diff ACL LIST в
# плагине даёт changed=false при совпадении live↔файл, L1+).
name: add_user merges new ACL user and hot-reloads via ACL LOAD (plaintext)

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  soulprint:
    network: { primary_ip: 10.0.0.5 }
    os: { arch: amd64 }

  # host-layout — в essence (v11→v12, Вариант A): вынесен из state, повторный прогон читает отсюда.
  essence:
    conf_dir: /etc/redis
    data_dir: /var/lib/redis
    modules_base_url: "https://artifacts.example.com/redis/modules"

  # Развёрнутый incarnation.state v6: уже есть юзер bob; add_user добавляет alice.
  state:
    redis_type: sentinel
    redis_version: "7.2.4"
    tls:
      enable:   false
      only:     false
      port:     7379
      cert_ref: ""
      key_ref:  ""
      ca_ref:   ""
    redis_config:
      maxmemory:        "256mb"
      maxmemory-policy: allkeys-lru
      save:             "900 1 300 10 60 10000"
      appendonly:       "no"
    redis_users:
      - { name: bob, perms: "~app:* +@read", state: "on" }

  input:
    user:
      name: alice
      perms: "~* +@all"
      state: "on"

  vault:
    secret/redis/add_user:
      password: addusr-redis-pass-16ch
    # ★ РЕДИЗАЙН default_admin: системный admin-юзер — пароль из новой Vault-ветки
    # users/default_admin. Читается masterauth-доливом в apply.input.config И коннектом
    # community.redis.acl (AUTH под default_admin вместо прежнего requirepass-секрета).
    secret/redis/add_user/users/default_admin:
      password: default-admin-secret-pass
    secret/redis/add_user/users/alice:
      password: alice-user-secret-pass
    secret/redis/add_user/users/bob:
      password: bob-user-secret-pass

assert:
  task_present:
    # 1. users.acl перерендерен с ОБОИМИ юзерами (alice новый + bob сохранённый),
    #    каждый со СВОИМ vault-паролем (нет cross-leak). vars.users — deep-compare.
    - module: core.file.rendered
      params_subset:
        path: /etc/redis/users.acl
        render_context:
          vars:
            users:
              alice:
                perms: "~* +@all"
                state: "on"
                password: alice-user-secret-pass
              bob:
                perms: "~app:* +@read"
                state: "on"
                password: bob-user-secret-pass
          self:
            sid: trial-host
            covens: [add_user]
            choirs: []
            # traits — registry-проекция (ADR-060), пустой объект без меток.
            traits: {}
            role: ""
            network:
              primary_ip: 10.0.0.5
            os:
              arch: amd64
          role: ""
          essence: {}

    # 2. HOT-RELOAD ACL: community.redis.acl к живому plain-инстансу. ACL LOAD —
    #    только коннект-params (addr/password/tls), без args.
    - module: community.redis.acl
      params_subset:
        addr: "127.0.0.1:6379"
        # ★ РЕДИЗАЙН default_admin: AUTH под default_admin (username + его Vault-пароль).
        username: default_admin
        password: default-admin-secret-pass
        tls: false

  # state_changes: redis_users несёт bob+alice БЕЗ пароля (write-model, МАССИВ AclUser
  # wave 1b). Порядок = array-upsert: сохранённый bob (filter оставил) ПЕРВЫМ, новый
  # alice ДОПИСАН в конец (compute.users_new = filter(name != alice) + [alice]).
  state_changes:
    redis_users:
      - { name: bob, perms: "~app:* +@read", state: "on" }
      - { name: alice, perms: "~* +@all", state: "on" }
