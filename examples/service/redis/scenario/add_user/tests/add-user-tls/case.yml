# L0 test add_user ON a TLS instance. Paired guard to add-user-plaintext —
# covers the TLS branch of the discriminator (compute.tls_on=true). Render-only, hermetic.
#
# * Invariant (convention §7a): when state.tls.enable=true the ACL LOAD step
# (community.redis.acl) must connect via TLS (addr on state.tls.port, tls=true,
# tls_ca = CA PEM from vault(state.tls.ca_ref)) — otherwise a plaintext connection to a TLS-only
# Redis would fail ACL LOAD. The CA comes from the NAMED state.tls.ca_ref (current after
# rotate_tls), NOT from the essence default.
#
# What we assert:
#   1. users.acl re-rendered with the merged set (alice — the incarnation's first user).
#   2. hot-reload (community.redis.acl): addr 127.0.0.1:7379 (TLS port), tls=true,
#      tls_ca = CA PEM (from state.tls.ca_ref).
#   3. state_changes: redis_users = {alice}.
name: add_user over TLS hot-reloads ACL on tls-port from incarnation.state

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  soulprint:
    network: { primary_ip: 10.0.0.6 }
    os: { arch: amd64 }

  # host layout — in essence (v11→v12, Option A): moved out of state, a repeat run reads it from here.
  essence:
    conf_dir: /etc/redis
    data_dir: /var/lib/redis
    modules_base_url: "https://artifacts.example.com/redis/modules"

  # Deployed incarnation.state v3 with TLS; ACL still empty (alice is the first user).
  # state.tls.ca_ref — the connection's CA source (vault() resolves the path into a PEM).
  state:
    redis_type: sentinel
    redis_version: "7.2.4"
    tls:
      enable:   true
      only:     false
      port:     7379
      cert_ref: "secret/services/redis/tls#cert"
      key_ref:  "secret/services/redis/tls#key"
      ca_ref:   "secret/services/redis/tls#ca"
    redis_config:
      maxmemory:        "256mb"
      maxmemory-policy: allkeys-lru
      save:             "900 1 300 10 60 10000"
      appendonly:       "no"
      tls-port:         "7379"
      tls-cert-file:    /etc/redis/tls/redis.crt
      tls-key-file:     /etc/redis/tls/redis.key
      tls-ca-cert-file: /etc/redis/tls/ca.crt
      tls-replication:  "yes"
    redis_users: []

  input:
    user:
      name: alice
      perms: "~app:* +@read +@write"
      state: "on"

  vault:
    secret/redis/add_user:
      password: addusr-redis-pass-16ch
    # * default_admin REDESIGN: the system admin user's password comes from the users/default_admin
    # branch (masterauth top-up in config + AUTH via community.redis.acl over TLS).
    secret/redis/add_user/users/default_admin:
      password: default-admin-secret-pass
    secret/redis/add_user/users/alice:
      password: alice-user-secret-pass
    secret/services/redis/tls:
      ca: "-----BEGIN CERTIFICATE-----\nCACERT\n-----END CERTIFICATE-----"

assert:
  task_present:
    - module: core.file.rendered
      params_subset:
        path: /etc/redis/users.acl
        render_context:
          vars:
            users:
              alice:
                perms: "~app:* +@read +@write"
                state: "on"
                password: alice-user-secret-pass
          self:
            sid: trial-host
            covens: [add_user]
            choirs: []
            # traits — registry projection (ADR-060), empty object without labels.
            traits: {}
            role: ""
            network:
              primary_ip: 10.0.0.6
            os:
              arch: amd64
          role: ""
          essence: {}

    # HOT-RELOAD ACL OVER TLS: addr on the tls port, tls=true, tls_ca = CA PEM.
    - module: community.redis.acl
      params_subset:
        addr: "127.0.0.1:7379"
        # * default_admin REDESIGN: AUTH as default_admin (username + its Vault password).
        username: default_admin
        password: default-admin-secret-pass
        tls: true
        tls_ca: "-----BEGIN CERTIFICATE-----\nCACERT\n-----END CERTIFICATE-----"

  state_changes:
    redis_users:
      - { name: alice, perms: "~app:* +@read +@write", state: "on" }
