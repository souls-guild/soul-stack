# L0-испытание (Trial, ADR-023) сценария update_node_exporter сервиса redis.
#
# Render-only, герметично. Демонстрирует re-apply destiny node-exporter с НОВОЙ
# версией (1.9.0): fetch-URL под новую версию, version-aware install-guard
# (grep на 1.9.0), unit-render node_exporter.service — доказывают, что
# node-exporter резолвится в examples/destiny/node-exporter/ (per-entry git
# override в service.yml).
#
# listen/bin_dir/collectors НЕ передаём — берутся из дефолтов сценария (паритет с
# create: :9100/usr/local/bin/[]); re-apply меняет ТОЛЬКО версию.
#
# Шаги коллекторов (when:) при collectors=[] всё равно в плане (L0-render не
# вычисляет when — предикаты Soul-side): ядро — idx 0..8, ассертим только его.
# Раскладка destiny: 0 fetch / 1 extract / 2 group / 3 user / 4 directory /
# 5 install-бинаря / 6 unit / 7 running / 8 restarted.
name: update_node_exporter bumps version via node-exporter re-apply

# default_destiny_source для name-only зависимостей; node-exporter резолвится
# per-entry git override в service.yml (шаблон к нему не применяется).
fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  input:
    node_exporter_version: "1.9.0"
    node_exporter_sha256:  "sha256:3333333333333333333333333333333333333333333333333333333333333333"
  # arch destiny берёт напрямую из soulprint.self.os.arch.
  soulprint:
    os:
      arch: amd64

assert:
  rendered_tasks:
    # fetch tarball под НОВУЮ версию: URL и path несут 1.9.0 (не state-версию).
    - index: 0
      module: core.url.fetched
      params:
        url: "https://github.com/prometheus/node_exporter/releases/download/v1.9.0/node_exporter-1.9.0.linux-amd64.tar.gz"
        path: /tmp/node_exporter-1.9.0.tar.gz
        checksum: "sha256:3333333333333333333333333333333333333333333333333333333333333333"
        mode: "0644"

    # version-aware install (service.yml, index 5): бинарь node_exporter,
    # unless-guard на новую версию (grep -qF 'version 1.9.0 '). Доказывает, что
    # install переустановит бинарь при смене версии и пропустит, если 1.9.0 стоит.
    - index: 5
      module: core.cmd.shell
      params:
        cmd: "install -m 0755 '/tmp/node_exporter-1.9.0/node_exporter-1.9.0.linux-amd64/node_exporter' '/usr/local/bin/node_exporter'"
        unless: "test -x /usr/local/bin/node_exporter && /usr/local/bin/node_exporter --version 2>&1 | grep -qF 'version 1.9.0 '"

    # unit-render: путь node_exporter.service, listen :9100 (паритет с create) —
    # доказательство, что node-exporter резолвится в свою папку.
    - index: 6
      module: core.file.rendered
      params:
        path: /etc/systemd/system/node_exporter.service
        template_content: "<present>"
        mode: "0644"
        owner: root
        group: root
        render_context:
          vars:
            bin_dir: /usr/local/bin
            user: node_exporter
            listen: ":9100"
            textfile_dir: /var/lib/node_exporter
          self:
            sid: trial-host
            covens: []
            choirs: []
            role: ""
            os:
              arch: amd64
          role: ""
          essence: {}

  # state_changes фиксирует ТОЛЬКО новую версию (re-apply одной destiny).
  state_changes:
    node_exporter_version: "1.9.0"
