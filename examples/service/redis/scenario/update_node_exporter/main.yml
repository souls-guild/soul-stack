name: update_node_exporter
description: >-
  Смена версии node_exporter (re-apply destiny node-exporter с новой версией).
  version-aware install переустановит бинарь node_exporter и рестартнёт демон
  ТОЛЬКО при смене версии (unless-guard в destiny: grep на текущую версию →
  install пропускается, если она уже стоит). listen/bin_dir/collectors — паритет
  с create (те же essence-источники): re-apply иначе изменил бы unit/набор
  коллекторов помимо версии. collectors — единая политика [] (см. essence).

  Демонстрирует точечный re-apply одной destiny (node-exporter) с обновлённым
  input, симметрично update_config для redis-single.

# ── Входной контракт (docs/input.md) ──────────────────────────────────────────
input:
  # Новая версия node_exporter. ОБЯЗАТЕЛЬНА (без дефолта): смена версии — суть
  # сценария, угадывать нечего. Жёсткий semver (GitHub Releases — semver-теги).
  node_exporter_version:
    type: string
    required: true
    pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+$"
    description: Новая версия node_exporter (GitHub Releases prometheus/node_exporter).

  # checksum tarball-а под новую версию. ОБЯЗАТЕЛЬНЫЙ (supply-chain, fail-closed):
  # destiny core.url.fetched верифицирует ДО публикации. Значение — из sha256sums
  # GitHub-релиза под пару (node_exporter_version, arch).
  node_exporter_sha256:
    type: string
    required: true
    pattern: "^sha256:[0-9a-f]{64}$"
    description: >-
      SHA-256 tarball-а node_exporter ("sha256:<hex>") под новую версию, из
      sha256sums GitHub-релиза prometheus/node_exporter под пару (version, arch).

  # ── Паритет с create: listen/bin_dir/collectors из тех же essence-источников.
  #    Re-apply должен поменять ТОЛЬКО версию; если эти поля разойдутся с create,
  #    destiny перерисует unit/набор коллекторов помимо версии. Дефолты — из
  #    essence (_default.yaml), оператор обычно их не передаёт.
  bin_dir:
    type: string
    default: /usr/local/bin
    pattern: "^/[A-Za-z0-9._/-]+$"
    description: Каталог бинаря node_exporter (паритет с create; обычно default).

  node_exporter_listen:
    type: string
    default: ":9100"
    pattern: "^[A-Za-z0-9._-]*:[0-9]{1,5}$"
    description: >-
      Listen-адрес node_exporter (--web.listen-address); паритет с create (:9100).

  node_exporter_collectors:
    type: array
    default: []
    items:
      type: string
      enum: [smartmon, nvme, ipmi]
    description: >-
      Список textfile-коллекторов (паритет с create, единая политика []). [] =
      только ядро node_exporter.

# Фиксируем новую версию в incarnation.state (orchestration.md §7.1). ТОЛЬКО
# node_exporter_version — остальной state неизменен (re-apply одной destiny).
state_changes:
  sets:
    node_exporter_version: "${ input.node_exporter_version }"

tasks:
  # re-apply node-exporter с новой версией. version-aware install в destiny
  # переустановит бинарь и рестартнёт node_exporter только при смене версии.
  - name: Apply node-exporter destiny with new version
    apply:
      destiny: node-exporter
      input:
        version:    "${ input.node_exporter_version }"
        sha256:     "${ input.node_exporter_sha256 }"
        # arch НЕ передаём: destiny берёт его напрямую из soulprint.self.os.arch
        # (как в create). Один incarnation может смешивать amd64/arm64-хосты.
        bin_dir:    "${ input.bin_dir }"
        listen:     "${ input.node_exporter_listen }"
        collectors: "${ input.node_exporter_collectors }"
