# L0-испытание rotate_tls: day-2 ротация TLS-материала БЕЗ рестарта. Оператор задаёт
# НОВЫЕ Vault-refs cert/key/ca; сценарий перерендеривает PEM в ${conf_dir}/tls/ из
# новых refs и шлёт три CONFIG SET tls-*-file через community.redis.command под
# onchanges-гейтом (Redis 6.2+ пересоздаёт SSL_CTX и перечитывает live). Render-only,
# герметично. Инстанс УЖЕ на TLS (state.tls.enable=true; rotate только для TLS).
#
# Что ассертим:
#   1. PEM перерендерены (core.file.present, path-дизамбигуатор): redis.crt/redis.key/
#      ca.crt в /etc/redis/tls/, content = vault(НОВЫЙ ref), mode 0600 owner redis.
#   2. applier-register tls_certs МАТЕРИАЛИЗОВАН: движок эмитит терминальную
#      core.noop.run(register=tls_certs) после дочерних destiny-задач (id-дизамбигуатор
#      tls_certs). Это якорь onchanges-гейта — без него onchanges:[tls_certs] падал бы
#      ErrOnChangesUnknownRegister (был обход force changed:true до 52b16ed).
#   3. reload re-read (три community.redis.command): addr 127.0.0.1:7379 (TLS-порт),
#      tls=true, tls_ca = PEM CA, args = CONFIG SET tls-cert-file/tls-key-file/
#      tls-ca-cert-file на пути в ${conf_dir}/tls/. Args-дизамбигуатор присутствует;
#      changed=true (force) БОЛЬШЕ НЕ должен стоять — task_absent ловит регресс
#      обратно на force-форму (см. ниже).
#   4. state_changes: state.tls несёт НОВЫЕ refs (cert/key/ca), enable/only/port
#      сохранены.
#
# ★ ИДЕМПОТЕНТНОСТЬ (guard-инвариант). reload гейтится onchanges:[tls_certs] вместо
# force changed:true: re-read SSL_CTX срабатывает ТОЛЬКО когда PEM реально сменился
# (новый ref → новый content → core.file.present changed → агрегат tls_certs.changed →
# onchanges satisfied), повторный прогон с тем же материалом → агрегат changed=false →
# три CONFIG SET skipped → no-op. L0 (render-only) НЕ исполняет onchanges-gating — это
# Soul-side runtime (агрегат OR + skip по onchanges_idx покрыт guard-тестами в 52b16ed:
# soul/internal/runtime/applier_register_test.go). На render-уровне L0 доказывает
# СТРУКТУРНУЮ предпосылку идемпотентности: (а) якорь tls_certs существует как
# core.noop.run, (б) force changed:true с reload-задач УБРАН (task_absent). Сам факт
# «changed→reload / без смены→skipped» от связки onchanges_idx + register-агрегат на
# Soul, который L0-харнесс не симулирует (probe-per-host = dispatch-слой L3).
name: rotate_tls re-renders PEM from new refs and re-reads via onchanges-gated CONFIG SET

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  soulprint:
    network: { primary_ip: 10.0.0.5 }
    os: { arch: amd64 }

  essence:
    # day-2 резолвит PEM CA коннекта (tls_ca плагина) через essence.tls_ca_ref — тот же
    # author-context ref, что create (host-инвариант). Это CA ТЕКУЩЕГО доверия коннекта;
    # ротируемый ca_ref (input) — это новый CA, рендерящийся в файл для самого Redis.
    tls_ca_ref: "secret/services/redis/tls#ca"

  # Развёрнутый incarnation.state v3 с ВКЛЮЧЁННЫМ TLS (rotate-предусловие). Текущие refs
  # — старые; input даёт новые.
  state:
    redis_type: sentinel
    redis_version: "7.2.4"
    conf_dir: /etc/redis
    data_dir: /var/lib/redis
    modules_base_url: "https://artifacts.example.com/redis/modules"
    tls:
      enable:   true
      only:     false
      port:     7379
      cert_ref: "secret/services/redis/tls#cert"
      key_ref:  "secret/services/redis/tls#key"
      ca_ref:   "secret/services/redis/tls#ca"
    redis_config:
      maxmemory:        "256mb"
      maxmemory-policy: allkeys-lru
      save:             "900 1 300 10 60 10000"
      appendonly:       "no"
      tls-port:         "7379"
      tls-cert-file:    /etc/redis/tls/redis.crt
      tls-key-file:     /etc/redis/tls/redis.key
      tls-ca-cert-file: /etc/redis/tls/ca.crt
      tls-replication:  "yes"
    redis_users: []

  input:
    # Новые refs (ротация всех трёх).
    cert_ref: "secret/services/redis/tls-v2#cert"
    key_ref:  "secret/services/redis/tls-v2#key"
    ca_ref:   "secret/services/redis/tls-v2#ca"

  vault:
    secret/redis/rotate_tls:
      password: rot-redis-pass-16chars
    # CA коннекта (essence.tls_ca_ref) — текущее доверие.
    secret/services/redis/tls:
      ca: "-----BEGIN CERTIFICATE-----\nCACERT\n-----END CERTIFICATE-----"
    # НОВЫЙ TLS-материал (по input refs) — рендерится в файлы для Redis.
    secret/services/redis/tls-v2:
      cert: "-----BEGIN CERTIFICATE-----\nNEWCERT\n-----END CERTIFICATE-----"
      key:  "-----BEGIN PRIVATE KEY-----\nNEWKEY\n-----END PRIVATE KEY-----"
      ca:   "-----BEGIN CERTIFICATE-----\nNEWCA\n-----END CERTIFICATE-----"

assert:
  task_present:
    # 1. PEM перерендерены из НОВЫХ refs (content = новый PEM). Дизамбигуатор — path.
    - module: core.file.present
      params_subset:
        path: /etc/redis/tls/redis.crt
        content: "-----BEGIN CERTIFICATE-----\nNEWCERT\n-----END CERTIFICATE-----"
        mode: "0600"
        owner: redis
        group: redis
    - module: core.file.present
      params_subset:
        path: /etc/redis/tls/redis.key
        content: "-----BEGIN PRIVATE KEY-----\nNEWKEY\n-----END PRIVATE KEY-----"
        mode: "0600"
        owner: redis
        group: redis
    - module: core.file.present
      params_subset:
        path: /etc/redis/tls/ca.crt
        content: "-----BEGIN CERTIFICATE-----\nNEWCA\n-----END CERTIFICATE-----"
        mode: "0600"
        owner: redis
        group: redis

    # 2. APPLIER-REGISTER МАТЕРИАЛИЗОВАН: терминальная core.noop.run(register=tls_certs)
    #    — якорь onchanges-гейта (id-дизамбигуатор; register∪id, см. ExpectedTask.ID).
    #    Эмитится движком ПОСЛЕ дочерних destiny-задач apply-шага, агрегирует OR(changed).
    #    Без этого узла onchanges:[tls_certs] не резолвился бы (ErrOnChangesUnknownRegister)
    #    — это и был мотив старого force-обхода (52b16ed снял ограничение).
    - module: core.noop.run
      id: tls_certs

    # 3. RE-READ ПОД onchanges-ГЕЙТОМ: три community.redis.command (CONFIG SET tls-*-file),
    #    addr на tls-порт, tls=true, tls_ca = CA коннекта, args на пути в /etc/redis/tls/.
    #    changed=true (force) УБРАН — гейтинг теперь onchanges:[tls_certs] (см. task_absent
    #    ниже: регресс обратно на force ловится). Args — дизамбигуатор трёх вызовов.
    - module: community.redis.command
      params_subset:
        addr: "127.0.0.1:7379"
        password: rot-redis-pass-16chars
        tls: true
        tls_ca: "-----BEGIN CERTIFICATE-----\nCACERT\n-----END CERTIFICATE-----"
        args: ["CONFIG", "SET", "tls-cert-file", "/etc/redis/tls/redis.crt"]
    - module: community.redis.command
      params_subset:
        addr: "127.0.0.1:7379"
        password: rot-redis-pass-16chars
        tls: true
        tls_ca: "-----BEGIN CERTIFICATE-----\nCACERT\n-----END CERTIFICATE-----"
        args: ["CONFIG", "SET", "tls-key-file", "/etc/redis/tls/redis.key"]
    - module: community.redis.command
      params_subset:
        addr: "127.0.0.1:7379"
        password: rot-redis-pass-16chars
        tls: true
        tls_ca: "-----BEGIN CERTIFICATE-----\nCACERT\n-----END CERTIFICATE-----"
        args: ["CONFIG", "SET", "tls-ca-cert-file", "/etc/redis/tls/ca.crt"]

  # ★ GUARD идемпотентности (render-уровень): force changed:true с reload-задач УБРАН.
  #    Любая community.redis.command CONFIG SET-tls с changed:true → регресс обратно на
  #    неидемпотентный force-путь (re-read на КАЖДЫЙ прогон, минуя onchanges). task_absent
  #    ловит его: ≥1 совпадение → fail. Покрыты ВСЕ ТРИ reload-задачи (cert/key/ca) — иначе
  #    частичный регресс force на одной из них прошёл бы незамеченным. Args-дизамбигуатор.
  task_absent:
    - module: community.redis.command
      params_subset:
        changed: true
        args: ["CONFIG", "SET", "tls-cert-file", "/etc/redis/tls/redis.crt"]
    - module: community.redis.command
      params_subset:
        changed: true
        args: ["CONFIG", "SET", "tls-key-file", "/etc/redis/tls/redis.key"]
    - module: community.redis.command
      params_subset:
        changed: true
        args: ["CONFIG", "SET", "tls-ca-cert-file", "/etc/redis/tls/ca.crt"]

  # state_changes: state.tls несёт НОВЫЕ refs; enable/only/port сохранены.
  state_changes:
    tls:
      enable:   true
      only:     false
      port:     7379
      cert_ref: "secret/services/redis/tls-v2#cert"
      key_ref:  "secret/services/redis/tls-v2#key"
      ca_ref:   "secret/services/redis/tls-v2#ca"
