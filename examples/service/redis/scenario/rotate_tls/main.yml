name: rotate_tls
description: >-
  Ротация серверного TLS-материала Redis (cert/key/CA) без рестарта — Redis 6.2+
  перечитывает PEM на лету. Отдельный сценарий ради явной аудит-семантики «сменился TLS»;
  предусловие — TLS на инстансе уже включён.

# ── Входной контракт оператора (docs/input.md) ────────────────────────────────
# НОВЫЕ Vault-ПУТИ серверного cert/key/CA (форма "<mount>/<path>#<field>"), НЕ сам
# PEM. Каждый опционален — оператор ротирует лишь часть (напр. только cert+key, CA
# тот же); не заданный ref берёт ТЕКУЩИЙ из incarnation.state.tls (подложка).
input:
  cert_ref:
    type: string
    required: false
    description: >-
      Новый Vault-путь серверного TLS-сертификата (redis.crt). Не задан → текущий
      state.tls.cert_ref (CA/key ротируются независимо).

  key_ref:
    type: string
    required: false
    description: >-
      Новый Vault-путь серверного приватного ключа (redis.key). Не задан → текущий
      state.tls.key_ref.

  ca_ref:
    type: string
    required: false
    description: >-
      Новый Vault-путь CA-сертификата кластера (ca.crt). Не задан → текущий
      state.tls.ca_ref.

# ── Декларативные input-инварианты (validate:) ───────────────────────────────────
# (1) хотя бы один ref задан (иначе нечего ротировать); (2) TLS включён (state.tls.
# enable=true) — ротация на plaintext бессмысленна. INPUT-ONLY: TLS-предусловие НЕ
# выразимо через input (state недоступен в validate-контексте) — оно вынесено в
# первый assert-шаг ниже (полный scenario-контекст с incarnation.state). Здесь —
# только «хотя бы один ref».
validate:
  - that: "has(input.cert_ref) || has(input.key_ref) || has(input.ca_ref)"
    message: "rotate_tls требует хотя бы один новый ref (cert_ref/key_ref/ca_ref)"

# ── Вычисляемые scenario-vars (compute:) ─────────────────────────────────────────
# Рун-уровневый контекст (input/essence/incarnation — без soulprint). tls_* —
# дискриминатор коннекта плагина из state.tls (как restart/update_config). Здесь TLS
# заведомо включён (assert-guard ниже), но дискриминатор оставлен симметричным
# остальным сценариям сопровождения (единый паттерн).
compute:
  # ── admin_user: имя системного ACL-юзера внутрикластерного AUTH (default_admin) ──
  # ★ РЕДИЗАЙН default_admin (2026-06-30): коннект CONFIG SET к live-Redis идёт под
  # системным default_admin (requirepass убран). rotate_tls НЕ extends covenant, поэтому
  # имя хардкодится здесь литералом (как covenant.compute.admin_user, тела сценариев вне
  # covenant — см. covenant.yml). Пароль — secret/redis/<inc>/users/default_admin#password.
  admin_user: "${ 'default_admin' }"
  tls_on:   "${ has(incarnation.state) && has(incarnation.state.tls) && default(incarnation.state.tls.enable, false) }"
  tls_port: "${ compute.tls_on ? string(incarnation.state.tls.port) : '' }"
  # tls_ca — trust-store TLS-реконнектов шага 3. CA-rollover (input.ca_ref ≠ state.tls.
  # ca_ref) → BUNDLE старого+нового CA (склейка PEM через '\n'): три CONFIG SET tls-*-file =
  # три ОТДЕЛЬНЫХ реконнекта, STRADDLE-ящих подмену серверного cert (CONFIG SET tls-cert-file
  # сам заставляет redis отдать новый cert со следующего реконнекта), поэтому единый
  # trust-store обязан доверять ОБОИМ CA — иначе реконнект после подмены упрётся в unknown
  # authority. x509-пул плагина (AppendCertsFromPEM) принимает склейку → плагин не трогаем.
  # Без rollover (ca_ref не задан / == state) — одиночный текущий CA (state — PRE-RUN снимок,
  # мутация ca_ref ПОСЛЕ apply). plaintext → пусто.
  tls_ca: >-
    ${ compute.tls_on
         ? (has(input.ca_ref) && input.ca_ref != incarnation.state.tls.ca_ref
              ? vault(incarnation.state.tls.ca_ref) + '\n' + vault(input.ca_ref)
              : vault(incarnation.state.tls.ca_ref))
         : '' }
  # ★ ИБ-КРИТИЧНО host-layout (v11→v12, Вариант A): conf_dir из essence (единый источник
  # с data_dir/modules_base_url ниже; прежний drift «conf_dir из compute, data_dir/
  # modules_base_url из state» устранён). conf_dir задаёт, КУДА destiny кладёт PEM
  # (${conf_dir}/tls/*) и куда CONFIG SET tls-*-file указывает redis-серверу — оба
  # плеча ОБЯЗАНЫ читать ОДИН источник, иначе cert ляжет не туда, где redis ищет.
  # DESYNC-РИСК ПРИНЯТ: если оператор сменил essence.conf_dir ПОСЛЕ create, cert ляжет
  # по НОВОМУ пути, а работающий redis-server ещё ищет по СТАРОМУ (перечитывается лишь на
  # рестарте) → при connection_mode=tls (plain закрыт) узел станет недоступен по сети.
  conf_dir: "${ default(essence.conf_dir, '/etc/redis') }"

  # Эффективные refs: новый из input бьёт текущий из state (подложка — частичная
  # ротация). has()-цепочка (default(input, state) упал бы no-such-key, если input.*_ref
  # отсутствует целиком — default ловит лист, не корень аргумента).
  cert_ref: "${ has(input.cert_ref) ? input.cert_ref : incarnation.state.tls.cert_ref }"
  key_ref:  "${ has(input.key_ref)  ? input.key_ref  : incarnation.state.tls.key_ref }"
  ca_ref:   "${ has(input.ca_ref)   ? input.ca_ref   : incarnation.state.tls.ca_ref }"

# ── Мутация incarnation.state ─────────────────────────────────────────────────
# Сценарий фиксирует НОВЫЕ Vault-refs cert/key/ca (read-model state.tls.*_ref). enable/
# only/port НЕ меняются (rotate только материал). Тот же compute.*_ref, что ушёл в
# render PEM destiny. add/modify по namedfield state.tls (ADR-057): обновляем refs.
state_changes:
  - set: tls
    value: >-
      ${ {
           'enable':   incarnation.state.tls.enable,
           'only':     incarnation.state.tls.only,
           'port':     incarnation.state.tls.port,
           'cert_ref': compute.cert_ref,
           'key_ref':  compute.key_ref,
           'ca_ref':   compute.ca_ref
         } }

tasks:
  # 1. GUARD — TLS обязан быть включён (state.tls.enable=true). Предикат вычисляется
  #    KEEPER-SIDE на рендере (incarnation.state доступен). false ОБРЫВАЕТ render с
  #    message ДО dispatch — раньше и понятнее, чем падение коннекта на хосте. assert
  #    НЕ emit RenderedTask.
  - name: Guard TLS is enabled on the instance before rotating its material
    assert:
      that:
        - "has(incarnation.state) && has(incarnation.state.tls) && default(incarnation.state.tls.enable, false)"
      message: "rotate_tls guard: TLS must be enabled (state.tls.enable=true); rotating material on a plaintext instance is meaningless"

  # 2. Перерендерить PEM в ${conf_dir}/tls/ из НОВЫХ refs (тот же destiny redis, что
  #    create). apply.input.tls несёт enable + НОВЫЕ cert_ref/key_ref/ca_ref → destiny
  #    server.yml кладёт cert/key/ca через core.file.present + vault(ref) в ячейке
  #    (seal-маскинг). config — текущий state.redis_config (redis.conf не меняется при
  #    ротации; tls-*-file пути те же). version/users — из state; conf_dir/data_dir/
  #    modules_base_url — из essence (host-layout, v11→v12, Вариант A; см. vars-шапку).
  #    register: tls_certs — applier-register, гейтящий reload ниже.
  #    ★ РЕДИЗАЙН default_admin: apply.input.password УДАЛЁН (destiny его не принимает —
  #    requirepass убран); аутентификация — под системным default_admin из users ниже.
  - name: Re-render TLS PEM material from the new Vault refs
    register: tls_certs
    apply:
      destiny: redis
      input:
        version:  "${ default(incarnation.state.redis_version, '') }"
        # ★ install: ОБЯЗАТЕЛЕН на повторном прогоне (регресс live E2E 2026-07-01). Без него
        # диспетчер install.yml по !has(input.install) скатывается в package-ветку →
        # core.pkg `apt install redis-server=<version>` (версия из Nexus-binary в apt
        # ОТСУТСТВУЕТ → env exited 100). Собираем ТУ ЖЕ binary-структуру, что create
        # (deploy-body → compute.install из essence.install_method) — единый способ
        # установки. Отличие от covenant.install: version из РАЗВЁРНУТОГО state
        # (redis_version), а не input.version (повторный прогон версию не переустанавливает).
        install: >-
          ${ (default(essence.install_method, 'binary') == 'binary')
               ? {
                   'method':        'binary',
                   'base_url':      default(essence.binary_base_url, ''),
                   'version':       default(incarnation.state.redis_version, ''),
                   'allow_private': default(essence.binary_allow_private, true)
                 }
               : { 'method': 'package' } }
        # host-layout — единый источник essence (v11→v12): conf_dir=compute.conf_dir (сам
        # из essence.conf_dir, см. vars-шапку), data_dir/modules_base_url прямо из essence.
        conf_dir: "${ compute.conf_dir }"
        data_dir: "${ default(essence.data_dir, '/var/lib/redis') }"
        # ★ РЕДИЗАЙН default_admin: rotate_tls перерендеривает ВЕСЬ кирпич destiny redis
        # (вкл. redis.conf), поэтому статическая replica→master AUTH обязана доливаться и
        # здесь — иначе redis.conf на диске потерял бы masteruser/masterauth и cluster/
        # sentinel-реплики после рестарта упёрлись бы в NOAUTH при PSYNC (симметрично
        # add_user/update_users). На master-нодах директива инертна (failover-safe).
        # masterauth — vault()-в-ячейке (seal-маскинг); admin_user = compute.admin_user.
        config: >-
          ${ merge(incarnation.state.redis_config, {
               'masteruser': compute.admin_user,
               'masterauth': vault('secret/redis/' + incarnation.name + '/users/' + compute.admin_user + '#password')
             }) }
        modules_base_url: "${ default(essence.modules_base_url, '') }"
        tls:
          enable:   "${ incarnation.state.tls.enable }"
          only:     "${ incarnation.state.tls.only }"
          port:     "${ incarnation.state.tls.port }"
          cert_ref: "${ compute.cert_ref }"
          key_ref:  "${ compute.key_ref }"
          ca_ref:   "${ compute.ca_ref }"
        # ★ СИСТЕМНЫЕ + operator-extra (как деплой-тело): destiny redis перерендеривает и
        # users.acl (тот же кирпич) → ОБЯЗАН долить системных из essence.system_acl_users
        # ПЕРВЫМИ (default_admin/replica/monitoring/sentinel/haproxy), иначе rotate_tls СТЁР
        # БЫ их из users.acl. operator-extra (state.redis_users — МАССИВ AclUser) ПОВЕРХ
        # (last-wins). Системные НЕ в state — доливаются из essence на каждом рендере.
        # Vault-пароль той же ветки secret/redis/<inc>/users/<name>#password.
        users: >-
          ${ merge(
               merge(default(essence.system_acl_users, {}).map(name, {
                 name: {
                   'perms':    essence.system_acl_users[name],
                   'state':    'on',
                   'password': vault('secret/redis/' + incarnation.name + '/users/' + name + '#password')
                 }
               })),
               has(incarnation.state.redis_users)
                 ? merge(incarnation.state.redis_users.map(u, {
                     u.name: {
                       'perms':    u.perms,
                       'state':    u.state,
                       'password': vault('secret/redis/' + incarnation.name + '/users/' + u.name + '#password')
                     }
                   }))
                 : {}
             ) }

  # 3. HOT-RELOAD CERT: три community.redis.command (CONFIG SET tls-cert-file /
  #    tls-key-file / tls-ca-cert-file) пересоздают SSL_CTX на live-инстансе. Redis 6.2+
  #    ПЕРЕСОЗДАЁТ SSL_CTX по CONFIG SET tls-*-file даже при неизменном пути → читает
  #    свежий PEM с диска. command (raw verb-state) бьёт МИМО diff-skip
  #    community.redis.config (тот сравнил бы значения CONFIG GET, счёл no-op при том же
  #    пути и не дёрнул бы CONFIG SET) — нужен raw CONFIG SET, чтобы re-read сработал.
  #    Гейт — onchanges:[tls_certs] (идемпотентность по onchanges, orchestration.md §2.1.1): один command = один
  #    verb → три шага, все на одном гейте. Пути PEM — из conf_dir (туда destiny положил
  #    материал шагом 2). addr/TLS-дискриминатор/пароль — из state.tls (compute.tls_*) +
  #    vault(), коннект по TLS (rotate только на TLS-инстансе).
  - name: Re-read the rotated TLS cert when it changed (CONFIG SET tls-cert-file)
    module: community.redis.command
    onchanges: [tls_certs]
    params:
      addr:     "127.0.0.1:${ compute.tls_port }"
      username: "${ compute.admin_user }"
      password: "${ vault('secret/redis/' + incarnation.name + '/users/' + compute.admin_user + '#password') }"
      tls:      "${ compute.tls_on }"
      tls_ca:   "${ compute.tls_ca }"
      args:     ["CONFIG", "SET", "tls-cert-file", "${ compute.conf_dir + '/tls/redis.crt' }"]

  - name: Re-read the rotated TLS key when it changed (CONFIG SET tls-key-file)
    module: community.redis.command
    onchanges: [tls_certs]
    params:
      addr:     "127.0.0.1:${ compute.tls_port }"
      username: "${ compute.admin_user }"
      password: "${ vault('secret/redis/' + incarnation.name + '/users/' + compute.admin_user + '#password') }"
      tls:      "${ compute.tls_on }"
      tls_ca:   "${ compute.tls_ca }"
      args:     ["CONFIG", "SET", "tls-key-file", "${ compute.conf_dir + '/tls/redis.key' }"]

  - name: Re-read the rotated TLS CA cert when it changed (CONFIG SET tls-ca-cert-file)
    module: community.redis.command
    onchanges: [tls_certs]
    params:
      addr:     "127.0.0.1:${ compute.tls_port }"
      username: "${ compute.admin_user }"
      password: "${ vault('secret/redis/' + incarnation.name + '/users/' + compute.admin_user + '#password') }"
      tls:      "${ compute.tls_on }"
      tls_ca:   "${ compute.tls_ca }"
      args:     ["CONFIG", "SET", "tls-ca-cert-file", "${ compute.conf_dir + '/tls/ca.crt' }"]
