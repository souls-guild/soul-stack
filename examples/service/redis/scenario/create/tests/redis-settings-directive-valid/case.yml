# L0-испытание version-aware валидатора имён директив redis_settings (assert, #6) —
# ПОЗИТИВ. essence несёт каталог redis_directives с серией 7.4 (подмножество реальных
# директив). input.version = 7.4.1 (enum выкаченных в Nexus сборок) → серия 7.4.
# redis_settings содержит ВАЛИДНОЕ имя директивы (appendfsync ∈ каталог[7.4]) → assert
# проходит, прогон рендерится штатно. Парный к redis-settings-directive-unknown (там
# неизвестное имя рвёт render).
#
# Каталог в fixture — ПОДМНОЖЕСТВО (не полный essence/_default.yaml): assert проверяет
# членство ключа, для позитива достаточно, чтобы переданное имя БЫЛО в наборе серии.
name: redis_settings with a valid directive name for the chosen version passes the catalog assert

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  hosts:
    - sid: node-solo.example.com
      covens: [create]
      soulprint:
        network: { primary_ip: 10.0.0.5 }
        os: { arch: amd64 }
  vault:
    secret/redis/create:
      password: s3cr3t-redis-pass-create
    secret/redis/create/users/replica:
      password: replica-sys-secret-pass
    secret/redis/create/users/monitoring:
      password: monitoring-sys-secret-pass
    secret/redis/create/users/sentinel:
      password: sentinel-sys-secret-pass
    secret/redis/create/users/haproxy:
      password: haproxy-sys-secret-pass
  essence:
    # install_method — в essence (author-context, 2026-06-28): способ установки
    # НЕ operator-input. compute.install читает default(essence.install_method, 'binary').
    install_method: package
    redis_type: sentinel
    sentinel_master_name: master
    modules_base_url: "https://artifacts.example.com/redis/modules"
    memory_reserve_percent: 75
    persistence_presets:
      rdb:
        save: "900 1 300 10 60 10000"
        appendonly: "no"
    redis_config:
      maxmemory:        "256mb"
      maxmemory-policy: allkeys-lru
      maxclients:       10000
      timeout:          300
    system_acl_users:
      replica:    "+psync +replconf +ping"
      monitoring: "-@all +@connection +client +ping +info +config|get +cluster|info +slowlog +latency +memory +select +command|count +command|docs"
      sentinel:   "allchannels +multi +slaveof +ping +exec +subscribe +config|rewrite +role +publish +info +client|setname +client|kill +script|kill"
      haproxy:    "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +info +cluster|info"
    system_acl_users_sentinel:
      default:    "allchannels allkeys +@all"
      monitoring: "-@all +@connection -command +client -hello +info -auth +sentinel|masters +sentinel|replicas +sentinel|slaves +sentinel|sentinels +sentinel|ckquorum"
      sentinel:   "allchannels -@all +auth +client|getname +client|id +client|setname +command +hello +ping +sentinel|is-master-down-by-addr +publish +role +sentinel|get-master-addr-by-name +sentinel|master +sentinel|myid +sentinel|replicas +sentinel|sentinels"
      haproxy:    "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +sentinel|get-master-addr-by-name +sentinel|master +sentinel|myid +sentinel|replicas +sentinel|sentinels"

    # Каталог директив (подмножество серии 7.4) — активирует assert-валидатор.
    redis_directives:
      "7.4":
        - maxmemory
        - maxmemory-policy
        - maxclients
        - timeout
        - appendonly
        - appendfsync
        - save

  input:
    redis_type: sentinel
    version: "7.4.1"
    # install_method=package ЯВНО: кейс про директивы, не про install. default редизайна
    # binary (качал бы бинари из Nexus) → package-ветка ставит distro-пакет с version-пином,
    # что и ассертит core.pkg.installed ниже.
    # replicas_per_master=0 ЯВНО (default редизайна 2): single-host (node-solo), size-guard
    # sentinel = 1+0 = 1 хост.
    replicas_per_master: 0
    persistence: rdb
    redis_settings:
      # ВАЛИДНОЕ имя директивы серии 7.4 (∈ каталог). Значение не валидируется (MVP —
      # только имена). Перекрывает дефолт appendfsync (если бы был) last-wins.
      appendfsync: everysec

assert:
  task_present:
    - module: core.pkg.installed
      params_subset:
        name: redis-server
        version: "7.4.1"
    - module: core.file.rendered
      params_subset:
        path: /etc/redis/redis.conf

  state_changes:
    redis_type: sentinel
    redis_version: "7.4.1"
    # redis_settings (passthrough) долился в итоговый redis_config last-wins.
    redis_config:
      maxmemory: "256mb"
      maxmemory-policy: allkeys-lru
      maxclients: 10000
      timeout: 300
      save: "900 1 300 10 60 10000"
      appendonly: "no"
      appendfsync: everysec
    redis_users: []
    redis_hosts: []
