# L0-испытание create (standalone) — Redis-МОДУЛИ (директива «модули ВСЕГДА ВСЕ»,
# 2026-06-25). НАБОР модулей больше НЕ operator-выбор: на Redis < 8 destiny
# разворачивает ПОЛНЫЙ набор из vars.redis_modules (bloom/json/search/timeseries).
# Guard на то, что:
#   1. каталог modules-dir (<data_dir>/modules) создаётся (gated-include, активен);
#   2. КАЖДЫЙ из ЧЕТЫРЁХ алиасов → отдельная core.url.fetched задача (loop по ключам
#      vars.redis_modules, Go-сорт → bloom, json, search, timeseries). modules_sha256
#      задан ЧАСТИЧНО (search/json) → им checksum "sha256:<hex>" (fail-closed verify);
#      bloom/timeseries без sha256 → пустой checksum (content-идемпотентность). URL
#      арх-специфичен из soulprint.self.os.arch;
#   3. в redis.conf приходят пути loadmodule ВСЕХ четырёх (vars.loadmodules, сорт по
#      алиасу) — рендер директив делает шаблон отдельной секцией (см. tmpl-тест).
#
# version=5:6.2.7 — мажор 6 (< 8) → version-guard (теперь В DESTINY) НЕ гасит модули
# (контр-кейс modules-redis8-skip доказывает обратную ветку). modules_base_url —
# host-инвариант → apply.input; arch (amd64) подставляется destiny per-host. input.modules
# больше НЕ задаётся (оператор не выбирает подмножество — всегда все).
name: modules always-all standalone fetches every .so and renders loadmodule directives

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  soulprint:
    network:
      primary_ip: 10.0.0.5
    os:
      arch: amd64
  vault:
    secret/redis/create:
      password: s3cr3t-redis-pass-create
  essence:
    redis_type: standalone
    memory_reserve_percent: 75
    persistence_presets:
      off:
        save: ""
        appendonly: "no"
      aof:
        save: ""
        appendonly: "yes"
      rdb:
        save: "900 1 300 10 60 10000"
        appendonly: "no"
      rdb_aof:
        save: "900 1 300 10 60 10000"
        appendonly: "yes"
    redis_config:
      maxmemory:        "256mb"
      maxmemory-policy: allkeys-lru
      maxclients:       10000
      timeout:          300

  input:
    redis_type: standalone
    version: "5:6.2.7"
    # input.modules больше НЕТ (директива «модули ВСЕГДА ВСЕ»): набор-инвариант в
    # destiny vars.redis_modules. Порядок задач/loadmodules — Go-сорт ключей map
    # (bloom, json, search, timeseries). modules_sha256 задан ЧАСТИЧНО (search/json) —
    # им verify, остальным пустой checksum.
    modules_base_url: "https://artifacts.example.com/redis/modules/6.2"
    modules_sha256:
      search: "aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"
      json:   "bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb"

assert:
  task_present:
    # redis.conf несёт vars.loadmodules — пути .so ВСЕХ четырёх модулей в порядке
    # Go-сорта ключей vars.redis_modules (bloom, json, search, timeseries). Директивы
    # loadmodule рендерит шаблон отдельной секцией (чистота — destiny_redis_tmpl_test.go).
    # Дизамбигуатор от users.acl/hardening (тот же core.file.rendered) — path.
    - module: core.file.rendered
      params_subset:
        path: /etc/redis/redis.conf
        template_content: "<present>"
        mode: "0640"
        owner: redis
        group: redis
        render_context:
          vars:
            password: s3cr3t-redis-pass-create
            conf_dir: /etc/redis
            data_dir: /var/lib/redis
            loadmodules:
              - /var/lib/redis/modules/redisbloom.so
              - /var/lib/redis/modules/rejson.so
              - /var/lib/redis/modules/redisearch.so
              - /var/lib/redis/modules/redistimeseries.so
            config:
              maxmemory: "256mb"
              maxmemory-policy: allkeys-lru
              maxclients: 10000
              timeout: 300
              save: "900 1 300 10 60 10000"
              appendonly: "no"
          self:
            sid: trial-host
            covens: [create]
            choirs: []
            role: ""
            network:
              primary_ip: 10.0.0.5
            os:
              arch: amd64
          role: ""
          essence: {}

    # modules-dir каталог — gated-include на deploy_redis && !redis8, здесь АКТИВНА.
    # Дизамбигуатор от systemd-dropin-dir (тот же core.file.directory) — path.
    - module: core.file.directory
      params_subset:
        path: /var/lib/redis/modules
        owner: redis
        group: redis
        mode: "0750"

    # fetch .so — loop по КЛЮЧАМ vars.redis_modules (Go-сорт: bloom, json, search,
    # timeseries). URL арх-специфичен (amd64 из soulprint.self). sha256 ЗАДАН для
    # search/json → checksum "sha256:<hex>" (verify); bloom/timeseries без sha256 →
    # пустой checksum (content-идемпотентность). Дизамбигуатор .so — path/url;
    # tarball-fetch (binary install) — placeholder-skip.
    - module: core.url.fetched
      params_subset:
        url: "https://artifacts.example.com/redis/modules/6.2/amd64/redisbloom.so"
        path: /var/lib/redis/modules/redisbloom.so
        checksum: ""
        mode: "0750"
        owner: redis
        group: redis

    - module: core.url.fetched
      params_subset:
        url: "https://artifacts.example.com/redis/modules/6.2/amd64/rejson.so"
        path: /var/lib/redis/modules/rejson.so
        checksum: "sha256:bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb"
        mode: "0750"
        owner: redis
        group: redis

    - module: core.url.fetched
      params_subset:
        url: "https://artifacts.example.com/redis/modules/6.2/amd64/redisearch.so"
        path: /var/lib/redis/modules/redisearch.so
        checksum: "sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"
        mode: "0750"
        owner: redis
        group: redis

    - module: core.url.fetched
      params_subset:
        url: "https://artifacts.example.com/redis/modules/6.2/amd64/redistimeseries.so"
        path: /var/lib/redis/modules/redistimeseries.so
        checksum: ""
        mode: "0750"
        owner: redis
        group: redis

    # standalone-PING: cluster/sentinel ветки — placeholder-skip; дизамбигуатор
    # addr/args.
    - module: community.redis.command
      params_subset:
        addr: "127.0.0.1:6379"
        password: s3cr3t-redis-pass-create
        args: ["PING"]

  state_changes:
    redis_type: standalone
    redis_version: "5:6.2.7"
    redis_config:
      maxmemory: "256mb"
      maxmemory-policy: allkeys-lru
      maxclients: 10000
      timeout: 300
      save: "900 1 300 10 60 10000"
      appendonly: "no"
    redis_users: {}
    redis_hosts: []
    redis_sentinel: {}
    # ── namedfields (read-model, v3): modules = ФАКТИЧЕСКИ развёрнутый набор. Redis 6
    # (< 8) → полный набор (компонент redis_modules_deployed в scenario, сорт). НЕ
    # operator-выбор. maxmemory_policy '' — оператор НЕ задавал input.maxmemory_policy.
    modules: [bloom, json, search, timeseries]
    persistence: rdb
    maxmemory_policy: ""
    install:
      method: package
    tls:
      enable:   false
      only:     false
      port:     7379
      cert_ref: ""
      key_ref:  ""
      ca_ref:   ""
    memory_mb: 0
    sysctl_settings: {}
    shards: 0
    replicas: 0
    sentinel_quorum: 0
