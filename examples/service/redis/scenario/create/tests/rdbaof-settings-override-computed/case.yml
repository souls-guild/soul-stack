# L0-испытание create (standalone) — guard на пробелы покрытия QA 2026-06-22:
#   - persistence: rdb_aof_1sec → save непустой + appendonly yes (пресет rdb_aof_1sec);
#   - memory_mb=512 → computed maxmemory 512*75/100=384 → "384mb";
#   - redis_settings.maxmemory="1gb" ПЕРЕКРЫВАЕТ computed "384mb" (last-wins на
#     COMPUTED-слое, не только на essence-дефолте): redis_settings — самый правый
#     слой merge, бьёт и вычисленные ключи. Это и есть guard.
name: rdb_aof_1sec + redis_settings overrides COMPUTED maxmemory (last-wins)

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  hosts:
    - sid: node-solo.example.com
      covens: [create]
      soulprint:
        network: { primary_ip: 10.0.0.5 }
        os: { arch: amd64 }
  vault:
    secret/redis/create:
      password: s3cr3t-redis-pass-create
    # Per-user секреты системных юзеров (secret/redis/<inc>/users/<name>#password) —
    # их резолвит keeper-side vault() при доливе system_acl_users в apply.input.users.
    secret/redis/create/users/replica:
      password: replica-sys-secret-pass
    secret/redis/create/users/monitoring:
      password: monitoring-sys-secret-pass
    secret/redis/create/users/sentinel:
      password: sentinel-sys-secret-pass
    secret/redis/create/users/haproxy:
      password: haproxy-sys-secret-pass
  essence:
    # install_method — в essence (author-context, 2026-06-28): способ установки
    # НЕ operator-input. compute.install читает default(essence.install_method, 'binary').
    install_method: package
    redis_type: sentinel
    sentinel_master_name: master
    modules_base_url: "https://artifacts.example.com/redis/modules"
    memory_reserve_percent: 75
    persistence_presets:
      off:
        save: ""
        appendonly: "no"
      aof:
        save: ""
        appendonly: "yes"
      rdb:
        save: "900 1 300 10 60 10000"
        appendonly: "no"
      rdb_aof_1sec:
        save: "900 1 300 10 60 10000"
        appendonly: "yes"
    redis_config:
      maxmemory:        "256mb"
      maxmemory-policy: allkeys-lru
      maxclients:       10000
      timeout:          300

    # Системные ACL-юзеры redis-server + sentinel-демона (1:1 из essence/_default.yaml).
    # ОБА ОБЯЗАТЕЛЬНЫ: guard create/sentinel.yml (assert 1b) рвёт render при пустом
    # любом из наборов (тихий fail-open недопустим — без них репликация/sentinel↔redis
    # AUTH сломались бы).
    system_acl_users:
      replica:    "+psync +replconf +ping"
      monitoring: "-@all +@connection +client +ping +info +config|get +cluster|info +slowlog +latency +memory +select +command|count +command|docs"
      sentinel:   "allchannels +multi +slaveof +ping +exec +subscribe +config|rewrite +role +publish +info +client|setname +client|kill +script|kill"
      haproxy:    "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +info +cluster|info"
    system_acl_users_sentinel:
      default:    "allchannels allkeys +@all"
      monitoring: "-@all +@connection -command +client -hello +info -auth +sentinel|masters +sentinel|replicas +sentinel|slaves +sentinel|sentinels +sentinel|ckquorum"
      sentinel:   "allchannels -@all +auth +client|getname +client|id +client|setname +command +hello +ping +sentinel|is-master-down-by-addr +publish +role +sentinel|get-master-addr-by-name +sentinel|master +sentinel|myid +sentinel|replicas +sentinel|sentinels"
      haproxy:    "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +sentinel|get-master-addr-by-name +sentinel|master +sentinel|myid +sentinel|replicas +sentinel|sentinels"
  input:
    redis_type: sentinel
    # version ОБЯЗАТЕЛЬНА и теперь ENUM выкаченных в Nexus сборок (7.4.1 ∈ enum;
    # мажор < 8 → version-gate модулей не активен).
    version: "7.4.1"
    # single-host sentinel (1 хост в roster) → 0 реплик (default редизайна 2):
    # size-guard sentinel = 1+0 = 1.
    replicas_per_master: 0
    # install_method=package ЯВНО (default редизайна — binary): кейс про last-wins
    # maxmemory, не про install — package-ветка даёт core.pkg.installed redis-server.
    memory_mb: 512
    # persistence rdb_aof_1sec (enum [off, aof_1sec, aof_always, rdb, rdb_aof_1sec,
    # rdb_aof_always]): RDB-снапшоты + AOF c fsync everysec. Пресет несёт save+appendonly.
    persistence: rdb_aof_1sec
    redis_settings:
      # Перекрывает COMPUTED maxmemory (384mb), не только essence-дефолт.
      maxmemory: "1gb"

assert:
  task_present:
    - module: core.pkg.installed
      params_subset:
        name: redis-server
        version: "7.4.1"

    # redis.conf — единственная core.file.rendered с этим path (дизамбигуатор от
    # users.acl/hardening).
    - module: core.file.rendered
      params_subset:
        path: /etc/redis/redis.conf
        template_content: "<present>"
        mode: "0640"
        owner: redis
        group: redis
        render_context:
          vars:
            password: s3cr3t-redis-pass-create
            conf_dir: /etc/redis
            data_dir: /var/lib/redis
            port: 6379
            run_dir: /var/run/redis
            log_dir: /var/log/redis
            loadmodules:
              - /var/lib/redis/modules/redisbloom.so
              - /var/lib/redis/modules/rejson.so
              - /var/lib/redis/modules/redisearch.so
              - /var/lib/redis/modules/redistimeseries.so
            config:
              # COMPUTED был "384mb" (512*75/100), но redis_settings (самый правый
              # слой merge) перекрыл его на "1gb". LAST-WINS на computed-слое.
              maxmemory: "1gb"
              maxmemory-policy: allkeys-lru
              maxclients: 10000
              timeout: 300
              # persistence-пресет rdb_aof_1sec.
              save: "900 1 300 10 60 10000"
              appendonly: "yes"
          self:
            sid: node-solo.example.com
            covens: [create]
            choirs: []
            # traits — registry-проекция (ADR-060), пустой объект без меток.
            traits: {}
            role: ""
            network:
              primary_ip: 10.0.0.5
            os:
              arch: amd64
          role: ""
          essence: {}

  state_changes:
    redis_type: sentinel
    redis_version: "7.4.1"
    # DRIFT-GUARD: идентичен apply.input.config (index 3).
    redis_config:
      maxmemory: "1gb"
      maxmemory-policy: allkeys-lru
      maxclients: 10000
      timeout: 300
      save: "900 1 300 10 60 10000"
      appendonly: "yes"
    redis_users: []
    redis_hosts: []
