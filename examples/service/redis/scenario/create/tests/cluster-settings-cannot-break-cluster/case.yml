# L0-испытание create в режиме cluster — GUARD на ПОРЯДОК merge (пробел покрытия
# qa 2026-06-22). НАМЕРЕНИЕ: cluster-директивы (особенно cluster-enabled) ОБЯЗАНЫ
# побеждать operator-овский redis_settings — оператор НЕ может случайно/намеренно
# сломать cluster-режим через passthrough redis_settings.
#
# Механизм: в merge() ветки cluster.yml порядок слоёв (СЛЕВА НАПРАВО, SHALLOW
# last-wins):
#   1. essence.redis_config
#   2. persistence_presets[persistence]
#   3. computed maxmemory/policy
#   4. input.redis_settings          ← operator passthrough
#   5. { cluster-enabled, cluster-config-file, cluster-node-timeout }  ← ПОСЛЕДНИМ
# cluster-блок (слой 5) идёт ПОСЛЕ redis_settings (слой 4) → last-wins: даже если
# оператор подал cluster-enabled: "no" в redis_settings, итоговый merged несёт
# cluster-enabled: "yes". Этот кейс подаёт ВРАЖДЕБНЫЙ redis_settings (cluster-enabled
# no / cluster-node-timeout 99 / cluster-config-file evil.conf) и ассертит, что в
# итоге все три cluster-директивы — КАНОНИЧЕСКИЕ, а не operator-овские.
#
# Заодно: безвредный passthrough оператора (tcp-backlog) долетает (не cluster-ключ
# → не перезатёрт), доказывая что guard режет ТОЛЬКО cluster-директивы, а не весь
# redis_settings.
#
# Топология: shards=3, replicas_per_shard=0 → 3 хоста (size-guard PASS).
name: cluster directives beat operator redis_settings (cannot break cluster)

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  hosts:
    - sid: node-b.example.com
      covens: [create, redis]
      soulprint:
        network: { primary_ip: 10.0.0.2 }
        os: { arch: amd64 }
    - sid: node-c.example.com
      covens: [create, redis]
      soulprint:
        network: { primary_ip: 10.0.0.3 }
        os: { arch: amd64 }
    - sid: node-a.example.com
      covens: [create, redis]
      soulprint:
        network: { primary_ip: 10.0.0.1 }
        os: { arch: amd64 }
  vault:
    secret/redis/create:
      password: s3cr3t-redis-pass-create
    # Per-user секреты системных юзеров (secret/redis/<inc>/users/<name>#password) —
    # их резолвит keeper-side vault() при доливе system_acl_users в apply.input.users.
    # ★ РЕДИЗАЙН default_admin (2026-06-30): default_admin — системный юзер внутрикластерного
    # AUTH (PING/cluster-build/masterauth деплоя читают его пароль той же ветки users/<name>).
    secret/redis/create/users/default_admin:
      password: default-admin-secret-pass
    secret/redis/create/users/replica:
      password: replica-sys-secret-pass
    secret/redis/create/users/monitoring:
      password: monitoring-sys-secret-pass
    secret/redis/create/users/sentinel:
      password: sentinel-sys-secret-pass
    secret/redis/create/users/haproxy:
      password: haproxy-sys-secret-pass
  essence:
    redis_type: cluster
    modules_base_url: "https://artifacts.example.com/redis/modules"
    memory_reserve_percent: 75
    persistence_presets:
      rdb:
        save: "900 1 300 10 60 10000"
        appendonly: "no"
    redis_config:
      maxmemory:        "256mb"
      maxmemory-policy: allkeys-lru
      maxclients:       10000
      timeout:          300

    # Системные ACL-юзеры redis-server (1:1 из essence/_default.yaml). ОБЯЗАТЕЛЬНЫ:
    # guard create/cluster.yml (assert 1b) рвёт render при пустом system_acl_users
    # (тихий fail-open недопустим — без них репликация/health-check сломались бы).
    # ★ РЕДИЗАЙН default_admin (2026-06-30): default_admin — системный юзер полного доступа
    # (~* &* +@all), под ним внутрикластерный AUTH cluster (заменил requirepass-default).
    system_acl_users:
      default_admin: "~* &* +@all"
      replica:    "+psync +replconf +ping"
      monitoring: "-@all +@connection +client +ping +info +config|get +cluster|info +slowlog +latency +memory +select +command|count +command|docs"
      sentinel:   "allchannels +multi +slaveof +ping +exec +subscribe +config|rewrite +role +publish +info +client|setname +client|kill +script|kill"
      haproxy:    "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +info +cluster|info"
  input:
    # ★ provision выключен (default-on: опущенная секция = ВКЛЮЧЕНО; кейс деплоит на
    # ГОТОВЫЙ roster, cloud-create не нужен) → include redis-provision.yml group-drop.
    provision:
      enabled: false
    redis_type: cluster
    # version ОБЯЗАТЕЛЬНА (директива пользователя 2026-06-23): фиксированный
    # distro-native пин (мажор < 8 → version-gate модулей не активен).
    version: "7.4.1"
    shards: 3
    replicas_per_master: 0
    cluster_node_timeout: 7000
    # ВРАЖДЕБНЫЙ passthrough: оператор пытается сломать cluster-режим. cluster-блок
    # merge() идёт ПОСЛЕ → last-wins канонические значения. tcp-backlog (не
    # cluster-ключ) долетает нетронутым.
    redis_settings:
      cluster-enabled: "no"
      cluster-config-file: "evil.conf"
      cluster-node-timeout: "99"
      tcp-backlog: 511

assert:
  # size-guard PASS — assert: (ADR-009 amendment) НЕ задача.
  task_present:
    # redis.conf: cluster-блок ПОБЕДИЛ враждебный redis_settings (last-wins).
    # Дизамбигуатор от users.acl/hardening (тот же core.file.rendered) — path.
    - module: core.file.rendered
      params_subset:
        path: /etc/redis/redis.conf
        template_content: "<present>"
        mode: "0640"
        owner: redis
        group: redis
        render_context:
          vars:
            conf_dir: /etc/redis
            data_dir: /var/lib/redis
            port: 6379
            run_dir: /var/run/redis
            log_dir: /var/log/redis
            loadmodules:
              - /var/lib/redis/modules/redisbloom.so
              - /var/lib/redis/modules/rejson.so
              - /var/lib/redis/modules/redisearch.so
              - /var/lib/redis/modules/redistimeseries.so
            config:
              # ★ РЕДИЗАЙН default_admin: replica→master AUTH (masteruser/masterauth) приходит
              # ОБЫЧНЫМИ директивами config (cluster deploy-body доливает их vault()-в-ячейке,
              # пароль ветки users/default_admin). В state_changes.redis_config их НЕТ.
              masteruser:       "default_admin"
              masterauth:       "default-admin-secret-pass"
              maxmemory:        "256mb"
              maxmemory-policy: allkeys-lru
              maxclients:       10000
              timeout:          300
              save:             "900 1 300 10 60 10000"
              appendonly:       "no"
              # КАНОНИЧЕСКИЕ cluster-директивы — НЕ operator-овские "no"/"evil.conf"/"99".
              # cluster-node-timeout = 7000 из input.cluster_node_timeout (не 99 из settings).
              cluster-enabled:      "yes"
              cluster-config-file:  "nodes.conf"
              cluster-node-timeout: "7000"
              # Безвредный passthrough (не cluster-ключ) долетел.
              tcp-backlog: 511
          self:
            sid: node-a.example.com
            covens: [create, redis]
            choirs: []
            # traits — registry-проекция (ADR-060), пустой объект без меток.
            traits: {}
            role: ""
            network:
              primary_ip: 10.0.0.1
            os:
              arch: amd64
          role: ""
          essence: {}

  state_changes:
    redis_type: cluster
    redis_version: "7.4.1"
    redis_config:
      maxmemory:        "256mb"
      maxmemory-policy: allkeys-lru
      maxclients:       10000
      timeout:          300
      save:             "900 1 300 10 60 10000"
      appendonly:       "no"
      cluster-enabled:      "yes"
      cluster-config-file:  "nodes.conf"
      cluster-node-timeout: "7000"
      tcp-backlog: 511
    redis_users: []
    redis_hosts: []
