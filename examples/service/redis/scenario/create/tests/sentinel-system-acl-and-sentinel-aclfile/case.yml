# L0 trial for create sentinel: TWO aclfiles (system-ACL-users d2 + default_admin redesign).
#   1. users.acl (redis-server): system default_admin/replica/monitoring/sentinel/haproxy
#      from essence.system_acl_users, perms 1:1, each with its OWN vault password users/<name>.
#   2. sentinel-users.acl (sentinel daemon, SECOND aclfile): system default_admin/monitoring/
#      sentinel/haproxy from essence.system_acl_users_sentinel (a DIFFERENT perms set —
#      sentinel commands). ★ default_admin REDESIGN: all system users (incl. default_admin) go through
#      a SINGLE users/<name>#password branch (the old "default → main secret" is removed);
#      the built-in default is rendered `off`.
#   3. both files are rendered in a single sentinel run; redis.conf points to aclfile
#      users.acl, sentinel.conf — aclfile sentinel-users.acl (per-host announce-ip in
#      a separate tmpl test, here we check the vars top-up).
#
# Topology: 1 host (replicas_per_master=0, size-guard 1==1+0 PASS). render_context.self
# = node-1 (host invariant of apply.input).
name: sentinel create renders two aclfiles with distinct system user sets

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  hosts:
    - sid: node-1.example.com
      covens: [create, redis]
      soulprint:
        network: { primary_ip: 10.0.0.1 }
        os: { arch: amd64 }
  vault:
    secret/redis/create:
      password: s3cr3t-redis-pass-create
    # ★ default_admin REDESIGN (2026-06-30): default_admin — the system user for
    # intra-cluster AUTH (deploy's auth_pass/PING steps read it via the users/<name> branch).
    secret/redis/create/users/default_admin:
      password: default-admin-secret-pass
    secret/redis/create/users/replica:
      password: replica-sys-secret-pass
    secret/redis/create/users/monitoring:
      password: monitoring-sys-secret-pass
    secret/redis/create/users/sentinel:
      password: sentinel-sys-secret-pass
    secret/redis/create/users/haproxy:
      password: haproxy-sys-secret-pass
  essence:
    # install_method — in essence (author-context, 2026-06-28): the install method
    # is NOT operator-input. compute.install reads default(essence.install_method, 'binary').
    install_method: package
    redis_type: sentinel
    sentinel_master_name: master
    # ★ Redesign: fallback for per-master sentinel defaults (backing input.sentinel_master_settings).
    sentinel_master_defaults:
      down-after-milliseconds: "5000"
      failover-timeout:        "60000"
    modules_base_url: "https://artifacts.example.com/redis/modules"
    memory_reserve_percent: 75
    persistence_presets:
      rdb:
        save: "900 1 300 10 60 10000"
        appendonly: "no"
    redis_config:
      maxmemory:        "256mb"
      maxmemory-policy: allkeys-lru
      maxclients:       10000
      timeout:          300
    # System redis-server users (★ redesign: + default_admin with full access, requirepass removed).
    system_acl_users:
      default_admin: "~* &* +@all"
      replica:    "+psync +replconf +ping"
      monitoring: "-@all +@connection +client +ping +info +config|get +cluster|info +slowlog +latency +memory +select +command|count +command|docs"
      sentinel:   "allchannels +multi +slaveof +ping +exec +subscribe +config|rewrite +role +publish +info +client|setname +client|kill +script|kill"
      haproxy:    "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +info +cluster|info"
    # System sentinel-daemon users (★ redesign: default_admin instead of default; sentinel commands).
    system_acl_users_sentinel:
      default_admin: "allchannels allkeys +@all"
      monitoring: "-@all +@connection -command +client -hello +info -auth +sentinel|masters +sentinel|replicas +sentinel|slaves +sentinel|sentinels +sentinel|ckquorum"
      sentinel:   "allchannels -@all +auth +client|getname +client|id +client|setname +command +hello +ping +sentinel|is-master-down-by-addr +publish +role +sentinel|get-master-addr-by-name +sentinel|master +sentinel|myid +sentinel|replicas +sentinel|sentinels"
      haproxy:    "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +sentinel|get-master-addr-by-name +sentinel|master +sentinel|myid +sentinel|replicas +sentinel|sentinels"

  input:
    # ★ provision is off (default-on: an omitted section = ENABLED; the case deploys onto
    # a READY roster, cloud-create not needed) → include redis-provision.yml group-drop.
    provision:
      enabled: false
    redis_type: sentinel
    version: "7.4.1"
    replicas_per_master: 0

assert:
  task_present:
    # users.acl (redis-server): system redis-server users (5, incl. default_admin) in the map.
    # ★ default_admin REDESIGN: .vars.password is no longer passed (requirepass removed);
    # the built-in default is rendered `off` by the template (not present in the map).
    - module: core.file.rendered
      id: redis_acl
      params_subset:
        path: /etc/redis/users.acl
        render_context:
          vars:
            users:
              default_admin:
                perms: "~* &* +@all"
                state: "on"
                password: default-admin-secret-pass
              replica:
                perms: "+psync +replconf +ping"
                state: "on"
                password: replica-sys-secret-pass
              monitoring:
                perms: "-@all +@connection +client +ping +info +config|get +cluster|info +slowlog +latency +memory +select +command|count +command|docs"
                state: "on"
                password: monitoring-sys-secret-pass
              sentinel:
                perms: "allchannels +multi +slaveof +ping +exec +subscribe +config|rewrite +role +publish +info +client|setname +client|kill +script|kill"
                state: "on"
                password: sentinel-sys-secret-pass
              haproxy:
                perms: "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +info +cluster|info"
                state: "on"
                password: haproxy-sys-secret-pass
          self:
            sid: node-1.example.com
            covens: [create, redis]
            choirs: []
            traits: {}
            role: ""
            network:
              primary_ip: 10.0.0.1
            os:
              arch: amd64
          role: ""
          essence: {}

    # sentinel-users.acl (sentinel daemon, SECOND aclfile): system sentinel users (4, WITH
    # default_admin). ★ default_admin REDESIGN: all system users (incl. default_admin) go through
    # a SINGLE users/<name>#password branch (the old "default → main secret" is removed).
    # The built-in default is rendered `off` by the template (not present in the map).
    - module: core.file.rendered
      id: redis_sentinel_acl
      params_subset:
        path: /etc/redis/sentinel-users.acl
        template_content: "<present>"
        mode: "0640"
        owner: redis
        group: redis
        render_context:
          vars:
            users:
              default_admin:
                perms: "allchannels allkeys +@all"
                state: "on"
                password: default-admin-secret-pass
              monitoring:
                perms: "-@all +@connection -command +client -hello +info -auth +sentinel|masters +sentinel|replicas +sentinel|slaves +sentinel|sentinels +sentinel|ckquorum"
                state: "on"
                password: monitoring-sys-secret-pass
              sentinel:
                perms: "allchannels -@all +auth +client|getname +client|id +client|setname +command +hello +ping +sentinel|is-master-down-by-addr +publish +role +sentinel|get-master-addr-by-name +sentinel|master +sentinel|myid +sentinel|replicas +sentinel|sentinels"
                state: "on"
                password: sentinel-sys-secret-pass
              haproxy:
                perms: "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +sentinel|get-master-addr-by-name +sentinel|master +sentinel|myid +sentinel|replicas +sentinel|sentinels"
                state: "on"
                password: haproxy-sys-secret-pass
          self:
            sid: node-1.example.com
            covens: [create, redis]
            choirs: []
            traits: {}
            role: ""
            network:
              primary_ip: 10.0.0.1
            os:
              arch: amd64
          role: ""
          essence: {}

  state_changes:
    redis_type: sentinel
    redis_version: "7.4.1"
    # no operator-extra → system users not in state → redis_users empty.
    redis_users: []
    redis_hosts: []
    redis_sentinel:
      master_name: master
      quorum: 0
      master_settings:
        down-after-milliseconds: "5000"
        failover-timeout: "60000"
      settings: {}
