# L0-испытание create в режиме cluster (redis-консолидация, honest hash-slot
# Redis Cluster). Multi-host roster (fixtures.hosts) из 3 хостов: shards=3,
# replicas_per_shard=0 → топология ровно 3*(1+0)=3 (size-guard проходит).
#
# Render-only, герметично. Диспетчер create инклудит standalone.yml + cluster.yml;
# на cluster-прогоне standalone-ветка гасится placeholder-skip-ом (static-when
# input.redis_type != 'standalone'), cluster-ветка рендерится. size-guard теперь
# assert: (keeper-side render-time precondition, ADR-009 amendment 2026-06-23): он
# НЕ emit RenderedTask. shards-guard (core.cmd.shell, has(input.shards)) УБРАН —
# обязательность shards теперь декларативна через required_when в main.yml
# (input.redis_type == 'cluster'): пропуск рвёт прогон на input-валидации ДО render
# (см. cluster-shards-guard-missing). Обе задачи (assert size-guard + удалённый
# shards-guard) НЕ занимают позиций в плане → задачи cluster-ветки сдвинуты ещё на −1.
# Ключевые индексы (актуальные asserted-значения; binary-под-ветка install.yml — три
# core.file.present вместо одного core.cmd.shell, +2 для всего, что ПОСЛЕ неё):
#   index 0  — mode-guard диспетчера (core.cmd.shell, no-op на реализованном режиме);
#   index 2  — cluster destiny: core.pkg.installed (redis-server) — ДО binary-под-ветки,
#              +2 его не касается;
#   index 18 — cluster destiny: redis.conf (core.file.rendered, cluster-директивы);
#   index 33 — cluster-build (community.redis.cluster action create, nodes-MAP).
#
# Что ассертим (критерий приёмки слайса):
#   1. size-guard PASS: assert that[0] (size(hosts)==shards*(1+replicas), 3==3*(1+0))
#      → true → render проходит, cluster-build на месте; провал ловит mismatch-кейс.
#   2. HOST-ИНВАРИАНТНЫЕ cluster-директивы в render_context.vars.config: cluster-enabled
#      yes / cluster-config-file nodes.conf / cluster-node-timeout (input или 5000).
#      cluster-announce-ip в config НЕТ — он per-host и рендерится в .tmpl из
#      .self.network.primary_ip (доказательство per-host announce — отдельный
#      destiny_redis_tmpl_test.go, см. ниже).
#   3. nodes-MAP детерминирован: ключ=SID (сортируется в плагине), addr=primary_ip
#      каждого хоста + ":6379". Форма merge(soulprint.hosts.map(...)).
#   4. plugin community.redis.cluster в плане (action create, replicas_per_shard).
#
# ВНИМАНИЕ L0-ограничение: apply.input host-инвариантен в пилоте (резолвится на
# ПЕРВОМ targeted-хосте, resolveApplyInput) → render_context здесь несёт self
# первого по SID хоста (node-a). Per-host значения (announce-ip) НЕ протаскиваются
# через apply.input.config, а рендерятся в шаблоне из .self КАЖДОГО хоста (этот
# слой L0-trial хранит только для первого хоста; per-host корректность доказана
# прямым tmpl-рендером в keeper/internal/render/destiny_redis_tmpl_test.go).
# nodes-MAP, наоборот, строится из ВСЕГО roster-а (soulprint.hosts) и несёт адреса
# всех трёх хостов.
name: cluster create builds deterministic nodes map and cluster directives

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  # Multi-host roster: 3 хоста, порядок в YAML намеренно не отсортирован
  # (b, c, a) — harness и nodes-MAP обязаны отсортировать по SID.
  hosts:
    - sid: node-b.example.com
      covens: [create, redis]
      soulprint:
        network: { primary_ip: 10.0.0.2 }
        os: { arch: amd64 }
    - sid: node-c.example.com
      covens: [create, redis]
      soulprint:
        network: { primary_ip: 10.0.0.3 }
        os: { arch: amd64 }
    - sid: node-a.example.com
      covens: [create, redis]
      soulprint:
        network: { primary_ip: 10.0.0.1 }
        os: { arch: amd64 }
  vault:
    secret/redis/create:
      password: s3cr3t-redis-pass-create
    # Per-user секреты системных юзеров (secret/redis/<inc>/users/<name>#password) —
    # их резолвит keeper-side vault() при доливе system_acl_users в apply.input.users.
    secret/redis/create/users/replica:
      password: replica-sys-secret-pass
    secret/redis/create/users/monitoring:
      password: monitoring-sys-secret-pass
    secret/redis/create/users/sentinel:
      password: sentinel-sys-secret-pass
    secret/redis/create/users/haproxy:
      password: haproxy-sys-secret-pass
  essence:
    redis_type: cluster
    modules_base_url: "https://artifacts.example.com/redis/modules"
    memory_reserve_percent: 75
    persistence_presets:
      off:
        save: ""
        appendonly: "no"
      aof:
        save: ""
        appendonly: "yes"
      rdb:
        save: "900 1 300 10 60 10000"
        appendonly: "no"
      rdb_aof:
        save: "900 1 300 10 60 10000"
        appendonly: "yes"
    redis_config:
      maxmemory:        "256mb"
      maxmemory-policy: allkeys-lru
      maxclients:       10000
      timeout:          300

    # Системные ACL-юзеры redis-server (1:1 из essence/_default.yaml). ОБЯЗАТЕЛЬНЫ:
    # guard create/cluster.yml (assert 1b) рвёт render при пустом system_acl_users
    # (тихий fail-open недопустим — без них репликация/health-check сломались бы).
    system_acl_users:
      replica:    "+psync +replconf +ping"
      monitoring: "-@all +@connection +client +ping +info +config|get +cluster|info +slowlog +latency +memory +select +command|count +command|docs"
      sentinel:   "allchannels +multi +slaveof +ping +exec +subscribe +config|rewrite +role +publish +info +client|setname +client|kill +script|kill"
      haproxy:    "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +info +cluster|info"
  input:
    redis_type: cluster
    # version ОБЯЗАТЕЛЬНА (директива пользователя 2026-06-23): фиксированный
    # distro-native пин (мажор < 8 → version-gate модулей не активен).
    version: "7.2.4"
    shards: 3
    replicas_per_master: 0
    cluster_node_timeout: 5000

assert:
  # size-guard — assert: (3 == 3*(1+0) → render проходит, в план НЕ эмитится).
  # Провал size-guard (mismatch) ловит cluster-size-guard-mismatch через
  # expect_render_error; пропуск shards — cluster-shards-guard-missing.
  task_present:
    # ── cluster destiny: пакет (mode-агностичный install ДО ветвления) ──────
    - module: core.pkg.installed
      params_subset:
        name: redis-server
        version: "7.2.4"

    # ── cluster destiny: redis.conf с cluster-директивами ───────────────────
    # config-map несёт базовый merge + HOST-ИНВАРИАНТНЫЕ cluster-директивы
    # (cluster-enabled/cluster-config-file/cluster-node-timeout). cluster-announce-ip
    # в config НЕТ — это per-host директива, её рендерит redis.conf.tmpl из
    # .self.network.primary_ip (см. destiny_redis_tmpl_test.go: per-host announce).
    # render_context.self здесь = первый по SID хост (node-a, host-инвариант
    # apply.input в пилоте), но СЛОЙ .tmpl на Soul-е возьмёт self КАЖДОГО хоста.
    # Дизамбигуатор от users.acl/hardening (тот же core.file.rendered) — path.
    - module: core.file.rendered
      params_subset:
        path: /etc/redis/redis.conf
        template_content: "<present>"
        mode: "0640"
        owner: redis
        group: redis
        render_context:
          vars:
            password: s3cr3t-redis-pass-create
            conf_dir: /etc/redis
            data_dir: /var/lib/redis
            loadmodules:
              - /var/lib/redis/modules/redisbloom.so
              - /var/lib/redis/modules/rejson.so
              - /var/lib/redis/modules/redisearch.so
              - /var/lib/redis/modules/redistimeseries.so
            config:
              maxmemory:        "256mb"
              maxmemory-policy: allkeys-lru
              maxclients:       10000
              timeout:          300
              save:             "900 1 300 10 60 10000"
              appendonly:       "no"
              cluster-enabled:      "yes"
              cluster-config-file:  "nodes.conf"
              cluster-node-timeout: "5000"
          self:
            sid: node-a.example.com
            covens: [create, redis]
            choirs: []
            # traits — registry-проекция (ADR-060), пустой объект без меток.
            traits: {}
            role: ""
            network:
              primary_ip: 10.0.0.1
            os:
              arch: amd64
          role: ""
          essence: {}

    # ── cluster-build (community.redis.cluster) ─────────────────────────────
    # nodes-MAP: ключ=SID, addr=primary_ip+":6379". Детерминирован по SID.
    # Единственная community.redis.cluster в плане → дизамбигуатор не нужен.
    - module: community.redis.cluster
      params_subset:
        action: create
        replicas_per_shard: 0
        password: s3cr3t-redis-pass-create
        nodes:
          node-a.example.com: { addr: "10.0.0.1:6379" }
          node-b.example.com: { addr: "10.0.0.2:6379" }
          node-c.example.com: { addr: "10.0.0.3:6379" }

  # cluster-факты в state: redis_type cluster + redis_config с cluster-директивами
  # (без announce-ip — host-вариативен, в state не пишется) + пустые users + пустой
  # redis_hosts (точные роли раскладывает плагин, в state не фиксируем).
  state_changes:
    redis_type: cluster
    redis_version: "7.2.4"
    redis_config:
      maxmemory:        "256mb"
      maxmemory-policy: allkeys-lru
      maxclients:       10000
      timeout:          300
      save:             "900 1 300 10 60 10000"
      appendonly:       "no"
      cluster-enabled:      "yes"
      cluster-config-file:  "nodes.conf"
      cluster-node-timeout: "5000"
    redis_users: []
    redis_hosts: []
