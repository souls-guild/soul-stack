# L0-испытание provision (ADR-061, Вариант A) — provision ЯВНО ВЫКЛЮЧЕН
# (input.provision.enabled=false). ★ С default-on (решение 2026-06-30) ОПУЩЕННАЯ секция
# означает ВКЛЮЧЕНО (top-level default {enabled: true}) — выключение теперь ТОЛЬКО явным
# enabled: false. Guard: include provision.yml gated на `has(input.provision) &&
# input.provision.enabled` (main.yml tasks). enabled=false → весь provision.yml НЕ таргетит
# никого; его keeper-side шаги (core.cloud.created + core.soul.registered) в плане
# ОТСУТСТВУЮТ (group-drop по include-when), а read-model provisioned_vm_ids/provisioned_provider —
# консервативный default ([] / '') по тернару state_changes (гейт input.provision.enabled).
#
# Парный к provision-default-on (там секция опущена → default-on → cloud-шаги присутствуют)
# и provision-enabled-sentinel/cluster (явный enabled: true). Этот кейс доказывает, что
# явный enabled: false катит прогон по существующему roster-у, лишних cloud-шагов не эмитится.
name: provision explicitly disabled drops cloud-create and onboarding tasks

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  hosts:
    - sid: node-solo.example.com
      covens: [create]
      soulprint:
        network: { primary_ip: 10.0.0.5 }
        os: { arch: amd64 }
  vault:
    secret/redis/create:
      password: s3cr3t-redis-pass-create
    # ★ РЕДИЗАЙН default_admin (2026-06-30): default_admin — системный юзер
    # внутрикластерного AUTH (auth_pass/PING шаги деплоя читают его по ветке users/<name>).
    secret/redis/create/users/default_admin:
      password: default-admin-secret-pass
    secret/redis/create/users/replica:
      password: replica-sys-secret-pass
    secret/redis/create/users/monitoring:
      password: monitoring-sys-secret-pass
    secret/redis/create/users/sentinel:
      password: sentinel-sys-secret-pass
    secret/redis/create/users/haproxy:
      password: haproxy-sys-secret-pass
  essence:
    # install_method — в essence (author-context, 2026-06-28): способ установки
    # НЕ operator-input. compute.install читает default(essence.install_method, 'binary').
    install_method: package
    redis_type: sentinel
    sentinel_master_name: master
    modules_base_url: "https://artifacts.example.com/redis/modules"
    memory_reserve_percent: 75
    persistence_presets:
      rdb:
        save: "900 1 300 10 60 10000"
        appendonly: "no"
    redis_config:
      maxmemory:        "256mb"
      maxmemory-policy: allkeys-lru
      maxclients:       10000
      timeout:          300
    system_acl_users:
      default_admin: "~* &* +@all"
      replica:    "+psync +replconf +ping"
      monitoring: "-@all +@connection +client +ping +info +config|get +cluster|info +slowlog +latency +memory +select +command|count +command|docs"
      sentinel:   "allchannels +multi +slaveof +ping +exec +subscribe +config|rewrite +role +publish +info +client|setname +client|kill +script|kill"
      haproxy:    "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +info +cluster|info"
    system_acl_users_sentinel:
      default_admin: "allchannels allkeys +@all"
      monitoring: "-@all +@connection -command +client -hello +info -auth +sentinel|masters +sentinel|replicas +sentinel|slaves +sentinel|sentinels +sentinel|ckquorum"
      sentinel:   "allchannels -@all +auth +client|getname +client|id +client|setname +command +hello +ping +sentinel|is-master-down-by-addr +publish +role +sentinel|get-master-addr-by-name +sentinel|master +sentinel|myid +sentinel|replicas +sentinel|sentinels"
      haproxy:    "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +sentinel|get-master-addr-by-name +sentinel|master +sentinel|myid +sentinel|replicas +sentinel|sentinels"
  input:
    redis_type: sentinel
    version: "7.4.1"
    # install_method=package ЯВНО: кейс про provision-gate, не про install. default
    # редизайна binary → package-ветка (assert не сверяет install — важна provision-ветка).
    # replicas_per_master=0 ЯВНО (default редизайна 2): single-host (node-solo), size-guard
    # sentinel = 1+0 = 1 хост.
    replicas_per_master: 0
    persistence: rdb
    # ★ provision ЯВНО выключен (default-on: опущенная секция = ВКЛЮЧЕНО, выключение
    # только явным enabled: false) → include provision.yml group-drop.
    provision:
      enabled: false

assert:
  task_present:
    # Прогон катит обычную sentinel-ветку по существующему roster-у: redis.conf
    # рендерится (дизамбигуатор — path). Доказывает, что отсутствие provision не
    # ломает основной деплой.
    - module: core.file.rendered
      params_subset:
        path: /etc/redis/redis.conf

  task_absent:
    # provision.yml шаги ОТСУТСТВУЮТ (include-when has(input.provision) false →
    # group-drop). core.cloud.created — создание VM; core.soul.registered — барьер
    # онбординга. Ни тот, ни другой не эмитится без provision.
    - module: core.cloud.created
    - module: core.soul.registered

  state_changes:
    redis_type: sentinel
    redis_version: "7.4.1"
    # read-model: VM никем не провижены этим прогоном → консервативный default.
    # provisioned_sids=[] покрывает non-provision-ветку guard-а (register.provision
    # не существует на group-drop → тернар короткозамыкает, sids не читаются).
    provisioned_vm_ids: []
    provisioned_sids: []
    provisioned_provider: ""
