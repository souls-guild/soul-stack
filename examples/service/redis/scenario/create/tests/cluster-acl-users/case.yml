# L0-испытание create в режиме cluster С ACL-ЮЗЕРАМИ (пробел покрытия qa
# 2026-06-22). Доказываем, что в cluster-режиме:
#   1. users.acl рендерится из MAP имя→{perms,state,password} — тот же
#      детерминированный map-рендер, что и standalone (range по map → сортировка
#      ключей); cluster не ломает ACL-проход.
#   2. cluster-директивы в redis.conf СОСУЩЕСТВУЮТ с ACL-юзерами — это разные
#      файлы (users.acl и redis.conf), оба рендерятся в одном прогоне.
#   3. per-user пароль резолвится keeper-side vault() по конвенции
#      secret/redis/<inc>/users/<name>#password; в users.acl он пишется ХЕШЕМ
#      (sha256 в .tmpl), plaintext-пароль НЕ течёт в config redis.conf и НЕ
#      попадает в чужой ключ. Два юзера (zeta/alpha) с РАЗНЫМИ паролями: ассерт
#      ловит и резолв, и отсутствие cross-leak.
#
# PRESENCE-форма (миграция с позиционной 2026-06-24): задачи идентифицируются
# module + params_subset (path-дизамбигуатор users.acl↔redis.conf); индексы не
# сверяются (хрупки — съезжают от любой правки destiny). render_context.vars.users
# сверяется целиком (deep-compare по map): per-user пароли изолированы, cross-leak
# = расхождение значения. Инвариант «в redis.conf НЕТ per-user пароля» держится
# тем, что params_subset redis.conf.vars НЕ перечисляет ни одного user-секрета —
# присутствие zeta/alpha-пароля в config было бы видно только как лишний ключ
# (ассерт частичен), поэтому отдельный guard — task_absent ниже на сам пароль
# в config-ячейке невозможен (config — map); сверка ведётся через render_context
# users.acl (там пароль обязан быть) + state_changes redis_users (там пароля
# быть НЕ должно — write-model хранит только perms/state).
#
# Топология: shards=3, replicas_per_shard=0 → 3 хоста (size-guard PASS).
# render_context.self = первый по SID хост (node-a, host-инвариант apply.input).
name: cluster create renders per-user acl alongside cluster directives

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  hosts:
    - sid: node-b.example.com
      covens: [create, redis]
      soulprint:
        network: { primary_ip: 10.0.0.2 }
        os: { arch: amd64 }
    - sid: node-c.example.com
      covens: [create, redis]
      soulprint:
        network: { primary_ip: 10.0.0.3 }
        os: { arch: amd64 }
    - sid: node-a.example.com
      covens: [create, redis]
      soulprint:
        network: { primary_ip: 10.0.0.1 }
        os: { arch: amd64 }
  vault:
    secret/redis/create:
      password: s3cr3t-redis-pass-create
    # Per-user секреты системных юзеров (secret/redis/<inc>/users/<name>#password) —
    # их резолвит keeper-side vault() при доливе system_acl_users в apply.input.users.
    secret/redis/create/users/replica:
      password: replica-sys-secret-pass
    secret/redis/create/users/monitoring:
      password: monitoring-sys-secret-pass
    secret/redis/create/users/sentinel:
      password: sentinel-sys-secret-pass
    secret/redis/create/users/haproxy:
      password: haproxy-sys-secret-pass
    # Per-user секреты — РАЗНЫЕ значения: cross-leak (пароль одного юзера в строке
    # другого) детектируется ассертом на отдельные значения.
    secret/redis/create/users/zeta:
      password: zeta-user-secret-pass
    secret/redis/create/users/alpha:
      password: alpha-user-secret-pass
  essence:
    redis_type: cluster
    modules_base_url: "https://artifacts.example.com/redis/modules"
    memory_reserve_percent: 75
    persistence_presets:
      rdb:
        save: "900 1 300 10 60 10000"
        appendonly: "no"
    redis_config:
      maxmemory:        "256mb"
      maxmemory-policy: allkeys-lru
      maxclients:       10000
      timeout:          300

    # Системные ACL-юзеры redis-server (1:1 из essence/_default.yaml). ОБЯЗАТЕЛЬНЫ:
    # guard create/cluster.yml (assert 1b) рвёт render при пустом system_acl_users
    # (тихий fail-open недопустим — без них репликация/health-check сломались бы).
    system_acl_users:
      replica:    "+psync +replconf +ping"
      monitoring: "-@all +@connection +client +ping +info +config|get +cluster|info +slowlog +latency +memory +select +command|count +command|docs"
      sentinel:   "allchannels +multi +slaveof +ping +exec +subscribe +config|rewrite +role +publish +info +client|setname +client|kill +script|kill"
      haproxy:    "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +info +cluster|info"
  input:
    redis_type: cluster
    # version ОБЯЗАТЕЛЬНА (директива пользователя 2026-06-23): фиксированный
    # distro-native пин (мажор < 8 → version-gate модулей не активен).
    version: "7.4.1"
    shards: 3
    replicas_per_master: 0
    cluster_node_timeout: 5000
    users:
      - { name: zeta, perms: "~* +@all", state: "on" }
      - { name: alpha, perms: "~app:* +@read +@write", state: "on" }

assert:
  # mode-guard (cluster реализован → no-op) и size-guard (assert: PASS, не задача)
  # позиций не занимают и НЕ ассертятся — присутствие задач сверяется по атрибутам.
  task_present:
    # users.acl: MAP имя→{perms,state,password} с per-user vault-паролями.
    # zeta/alpha — каждый со СВОИМ резолвнутым паролем (нет cross-leak). vars.users
    # сверяется целиком (deep-compare). Дизамбигуатор от redis.conf (тот же
    # core.file.rendered, тот же when) — path в params_subset + register-якорь.
    - module: core.file.rendered
      id: redis_acl
      params_subset:
        path: /etc/redis/users.acl
        template_content: "<present>"
        mode: "0640"
        owner: redis
        group: redis
        render_context:
          vars:
            # password — главный секрет (requirepass): шаблон рендерит из него default-юзера
            # в users.acl (без default в aclfile Redis игнорит requirepass → built-in default
            # без пароля → protected-mode рвёт внешние коннекты cluster-init плагина).
            password: s3cr3t-redis-pass-create
            # СИСТЕМНЫЕ (4, из essence.system_acl_users, доливаются ОБЯЗАТЕЛЬНО — guard 1b)
            # + operator-extra zeta/alpha (last-wins). Имена не пересекаются с системными.
            users:
              replica:
                perms: "+psync +replconf +ping"
                state: "on"
                password: replica-sys-secret-pass
              monitoring:
                perms: "-@all +@connection +client +ping +info +config|get +cluster|info +slowlog +latency +memory +select +command|count +command|docs"
                state: "on"
                password: monitoring-sys-secret-pass
              sentinel:
                perms: "allchannels +multi +slaveof +ping +exec +subscribe +config|rewrite +role +publish +info +client|setname +client|kill +script|kill"
                state: "on"
                password: sentinel-sys-secret-pass
              haproxy:
                perms: "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +info +cluster|info"
                state: "on"
                password: haproxy-sys-secret-pass
              zeta:
                perms: "~* +@all"
                state: "on"
                password: zeta-user-secret-pass
              alpha:
                perms: "~app:* +@read +@write"
                state: "on"
                password: alpha-user-secret-pass
          self:
            sid: node-a.example.com
            covens: [create, redis]
            choirs: []
            # traits — registry-проекция (ADR-060), пустой объект без меток.
            traits: {}
            role: ""
            network:
              primary_ip: 10.0.0.1
            os:
              arch: amd64
          role: ""
          essence: {}

    # redis.conf: cluster-директивы СОСУЩЕСТВУЮТ с ACL (разные файлы). В config
    # НЕТ per-user пароля (он только в users.acl, хешем). Дизамбигуатор от
    # users.acl — path + register-якорь redis_conf.
    - module: core.file.rendered
      id: redis_conf
      params_subset:
        path: /etc/redis/redis.conf
        template_content: "<present>"
        mode: "0640"
        owner: redis
        group: redis
        render_context:
          vars:
            password: s3cr3t-redis-pass-create
            conf_dir: /etc/redis
            data_dir: /var/lib/redis
            port: 6379
            run_dir: /var/run/redis
            log_dir: /var/log/redis
            loadmodules:
              - /var/lib/redis/modules/redisbloom.so
              - /var/lib/redis/modules/rejson.so
              - /var/lib/redis/modules/redisearch.so
              - /var/lib/redis/modules/redistimeseries.so
            config:
              maxmemory:        "256mb"
              maxmemory-policy: allkeys-lru
              maxclients:       10000
              timeout:          300
              save:             "900 1 300 10 60 10000"
              appendonly:       "no"
              cluster-enabled:      "yes"
              cluster-config-file:  "nodes.conf"
              cluster-node-timeout: "5000"
          self:
            sid: node-a.example.com
            covens: [create, redis]
            choirs: []
            # traits — registry-проекция (ADR-060), пустой объект без меток.
            traits: {}
            role: ""
            network:
              primary_ip: 10.0.0.1
            os:
              arch: amd64
          role: ""
          essence: {}

  task_absent:
    # GUARD «cluster НЕ разворачивает sentinel-демон»: include tasks/sentinel.yml
    # gated на input.sentinel_enabled (отсутствует → conditional-include group-drop):
    # sentinel.conf и демон ФИЗИЧЕСКИ отсутствуют в плане (include дропнут целиком, не
    # placeholder). presence task_absent ловит отсутствие. Регресс «sentinel протёк в
    # cluster» = задача с реальными params.
    - module: core.file.rendered
      params_subset:
        path: /etc/redis/sentinel.conf
    - module: core.service.running
      params_subset:
        name: redis-sentinel

  state_changes:
    redis_type: cluster
    redis_version: "7.4.1"
    redis_config:
      maxmemory:        "256mb"
      maxmemory-policy: allkeys-lru
      maxclients:       10000
      timeout:          300
      save:             "900 1 300 10 60 10000"
      appendonly:       "no"
      cluster-enabled:      "yes"
      cluster-config-file:  "nodes.conf"
      cluster-node-timeout: "5000"
    # ACL-юзеры в state — МАССИВ AclUser [{name,perms,state}] (БЕЗ пароля; он keeper-
    # side vault). wave 1b: порядок = порядок input.users (state хранит массив как есть).
    # GUARD «per-user пароль НЕ в state»: deep-compare redis_users без password.
    redis_users:
      - { name: zeta, perms: "~* +@all", state: "on" }
      - { name: alpha, perms: "~app:* +@read +@write", state: "on" }
    redis_hosts: []
