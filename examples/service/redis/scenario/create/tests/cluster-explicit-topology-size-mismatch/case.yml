# L0 test for create cluster - FAIL branch of the size-guard on the SUM form (explicit topology).
# Mirrors cluster-explicit-topology (happy path), but the roster is DELIBERATELY one less than
# the sum of declared shard sizes: cluster_topology carries 2 shards of 2 nodes each (sum=4), while
# fixtures.hosts has only 3. The size-guard in create/cluster.yml, on the cluster_topology BRANCH,
# checks size(roster) against the SUM of shard sizes (not shards*(1+replicas)); 3 != 4 ->
# render aborts BEFORE dispatch. Proves that the sum-form size-guard is actually computed and
# fails fast (rather than silently failing later in the plugin on an uncovered/nonexistent node).
#
# Paired with cluster-explicit-topology (roster == sum -> render succeeds). Symmetric to
# cluster-size-guard-mismatch (which uses the old formula shards*(1+replicas)).
name: cluster create with explicit topology and roster smaller than declared sum aborts at render

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  # Roster of 3 hosts - ONE LESS than the sum of the topology's shard sizes (2+2=4).
  hosts:
    - sid: node-2.example.com
      covens: [create, redis]
      soulprint:
        network: { primary_ip: 10.0.0.2 }
        os: { arch: amd64 }
    - sid: node-1.example.com
      covens: [create, redis]
      soulprint:
        network: { primary_ip: 10.0.0.1 }
        os: { arch: amd64 }
    - sid: node-3.example.com
      covens: [create, redis]
      soulprint:
        network: { primary_ip: 10.0.0.3 }
        os: { arch: amd64 }
  vault:
    secret/redis/create:
      password: s3cr3t-redis-pass-create
    secret/redis/create/users/replica:
      password: replica-sys-secret-pass
    secret/redis/create/users/monitoring:
      password: monitoring-sys-secret-pass
    secret/redis/create/users/sentinel:
      password: sentinel-sys-secret-pass
    secret/redis/create/users/haproxy:
      password: haproxy-sys-secret-pass
  essence:
    redis_type: cluster
    modules_base_url: "https://artifacts.example.com/redis/modules"
    memory_reserve_percent: 75
    persistence_presets:
      rdb:
        save: "900 1 300 10 60 10000"
        appendonly: "no"
    redis_config:
      maxmemory:        "256mb"
      maxmemory-policy: allkeys-lru
      maxclients:       10000
      timeout:          300
    system_acl_users:
      replica:    "+psync +replconf +ping"
      monitoring: "-@all +@connection +client +ping +info +config|get +cluster|info +slowlog +latency +memory +select +command|count +command|docs"
      sentinel:   "allchannels +multi +slaveof +ping +exec +subscribe +config|rewrite +role +publish +info +client|setname +client|kill +script|kill"
      haproxy:    "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +info +cluster|info"
  input:
    # * provision is disabled (default-on: an omitted section = ENABLED; the case deploys onto
    # a READY roster, cloud-create isn't needed) -> include redis-provision.yml group-drop.
    provision:
      enabled: false
    redis_type: cluster
    version: "7.4.1"
    shards: 2
    replicas_per_master: 1
    cluster_node_timeout: 5000
    # Topology sum=4 (2 shards of 2), while the roster above = 3 -> 3 != 4.
    cluster_topology:
      - [node-2.example.com, node-1.example.com]
      - [node-4.example.com, node-3.example.com]

# Abort at render: size-guard sum-form false (3 != sum(2+2)). The substring is the shared message
# of the create/cluster.yml assert rule (it's a single one for both forms).
expect_render_error: "the number of hosts in the run roster must be exactly"
