# L0-испытание create (cluster, multi-host) — Redis-МОДУЛИ на кластере (директива
# «модули ВСЕГДА ВСЕ»). Guard на то, что в cluster-режиме (3 хоста, shards=3)
# разворачивается ПОЛНЫЙ набор модулей (.so всех четырёх качаются, loadmodule-директивы
# всех четырёх приходят в redis.conf наравне с cluster-директивами). Per-host arch в
# URL: все хосты amd64 (homogeneous), arch из soulprint.self.os.arch — render_context
# L0 несёт self первого по SID хоста (node-a), но СЛОЙ .tmpl на Soul-е возьмёт arch
# КАЖДОГО хоста (mixed-arch корректен — URL строит destiny per-host, не apply.input).
# input.modules больше НЕ задаётся (набор-инвариант в destiny vars.redis_modules).
# .so качаются БЕЗ checksum (content-идемпотентность, sha256-инпуты вырезаны 2026-06-25).
name: cluster modules fetch every .so and add loadmodule alongside cluster directives

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  hosts:
    - sid: node-b.example.com
      covens: [create, redis]
      soulprint:
        network: { primary_ip: 10.0.0.2 }
        os: { arch: amd64 }
    - sid: node-c.example.com
      covens: [create, redis]
      soulprint:
        network: { primary_ip: 10.0.0.3 }
        os: { arch: amd64 }
    - sid: node-a.example.com
      covens: [create, redis]
      soulprint:
        network: { primary_ip: 10.0.0.1 }
        os: { arch: amd64 }
  vault:
    secret/redis/create:
      password: s3cr3t-redis-pass-create
    # Per-user секреты системных юзеров (secret/redis/<inc>/users/<name>#password) —
    # их резолвит keeper-side vault() при доливе system_acl_users в apply.input.users.
    # ★ РЕДИЗАЙН default_admin (2026-06-30): default_admin — системный юзер внутрикластерного
    # AUTH (PING/cluster-build/masterauth деплоя читают его пароль той же ветки users/<name>).
    secret/redis/create/users/default_admin:
      password: default-admin-secret-pass
    secret/redis/create/users/replica:
      password: replica-sys-secret-pass
    secret/redis/create/users/monitoring:
      password: monitoring-sys-secret-pass
    secret/redis/create/users/sentinel:
      password: sentinel-sys-secret-pass
    secret/redis/create/users/haproxy:
      password: haproxy-sys-secret-pass
  essence:
    # install_method — в essence (author-context, 2026-06-28): способ установки
    # НЕ operator-input. compute.install читает default(essence.install_method, 'binary').
    install_method: package
    redis_type: cluster
    modules_base_url: "https://artifacts.example.com/redis/modules/6.2"
    memory_reserve_percent: 75
    persistence_presets:
      off:
        save: ""
        appendonly: "no"
      aof_1sec:
        save: ""
        appendonly: "yes"
      rdb:
        save: "900 1 300 10 60 10000"
        appendonly: "no"
      rdb_aof_1sec:
        save: "900 1 300 10 60 10000"
        appendonly: "yes"
    redis_config:
      maxmemory:        "256mb"
      maxmemory-policy: allkeys-lru
      maxclients:       10000
      timeout:          300

    # Системные ACL-юзеры redis-server (1:1 из essence/_default.yaml). ОБЯЗАТЕЛЬНЫ:
    # guard create/cluster.yml (assert 1b) рвёт render при пустом system_acl_users
    # (тихий fail-open недопустим — без них репликация/health-check сломались бы).
    # ★ РЕДИЗАЙН default_admin (2026-06-30): default_admin — системный юзер полного доступа
    # (~* &* +@all), под ним внутрикластерный AUTH cluster (заменил requirepass-default).
    system_acl_users:
      default_admin: "~* &* +@all"
      replica:    "+psync +replconf +ping"
      monitoring: "-@all +@connection +client +ping +info +config|get +cluster|info +slowlog +latency +memory +select +command|count +command|docs"
      sentinel:   "allchannels +multi +slaveof +ping +exec +subscribe +config|rewrite +role +publish +info +client|setname +client|kill +script|kill"
      haproxy:    "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +info +cluster|info"
  input:
    # ★ provision выключен (default-on: опущенная секция = ВКЛЮЧЕНО; кейс деплоит на
    # ГОТОВЫЙ roster, cloud-create не нужен) → include redis-provision.yml group-drop.
    provision:
      enabled: false
    redis_type: cluster
    version: "7.4.1"
    # install_method=package ЯВНО (default редизайна — binary): кейс про модули
    # (фетч .so), а не про install-модель; package-ветка активна, но не ассертится.
    shards: 3
    replicas_per_master: 0
    cluster_node_timeout: 5000
    # input.modules НЕ задаётся (набор-инвариант). .so качаются по content-
    # идемпотентности (без checksum).

assert:
  task_present:
    # redis.conf несёт cluster-директивы + vars.loadmodules ([rejson.so]).
    # Дизамбигуатор от users.acl/hardening (тот же core.file.rendered) — path.
    - module: core.file.rendered
      params_subset:
        path: /etc/redis/redis.conf
        template_content: "<present>"
        mode: "0640"
        owner: redis
        group: redis
        render_context:
          vars:
            conf_dir: /etc/redis
            data_dir: /var/lib/redis
            port: 6379
            run_dir: /var/run/redis
            log_dir: /var/log/redis
            loadmodules:
              - /var/lib/redis/modules/redisbloom.so
              - /var/lib/redis/modules/rejson.so
              - /var/lib/redis/modules/redisearch.so
              - /var/lib/redis/modules/redistimeseries.so
            config:
              # ★ РЕДИЗАЙН default_admin: replica→master AUTH (masteruser/masterauth)
              # приходит ОБЫЧНЫМИ директивами config (cluster deploy-body доливает их
              # vault()-в-ячейке).
              masteruser:       "default_admin"
              masterauth:       "default-admin-secret-pass"
              maxmemory:        "256mb"
              maxmemory-policy: allkeys-lru
              maxclients:       10000
              timeout:          300
              save:             "900 1 300 10 60 10000"
              appendonly:       "no"
              cluster-enabled:      "yes"
              cluster-config-file:  "nodes.conf"
              cluster-node-timeout: "5000"
          self:
            sid: node-a.example.com
            covens: [create, redis]
            choirs: []
            # traits — registry-проекция (ADR-060), пустой объект без меток.
            traits: {}
            role: ""
            network:
              primary_ip: 10.0.0.1
            os:
              arch: amd64
          role: ""
          essence: {}

    # modules-dir каталог — gated-include на deploy_redis && !redis8, активна.
    # Дизамбигуатор от systemd-dropin-dir (тот же core.file.directory) — path.
    - module: core.file.directory
      params_subset:
        path: /var/lib/redis/modules
        owner: redis
        group: redis
        mode: "0750"

    # fetch .so — ВСЕ четыре (Go-сорт: bloom, json, search, timeseries). URL арх-
    # специфичен (x86_64 — uname-m-маппинг soulprint amd64 первого хоста в L0). checksum НЕ передаётся —
    # content-идемпотентность. tarball-fetch (binary install) — placeholder.
    - module: core.url.fetched
      params_subset:
        url: "https://artifacts.example.com/redis/modules/6.2/x86_64/redisbloom.so"
        path: /var/lib/redis/modules/redisbloom.so
        mode: "0750"
        owner: redis
        group: redis

    - module: core.url.fetched
      params_subset:
        url: "https://artifacts.example.com/redis/modules/6.2/x86_64/rejson.so"
        path: /var/lib/redis/modules/rejson.so
        mode: "0750"
        owner: redis
        group: redis

    - module: core.url.fetched
      params_subset:
        url: "https://artifacts.example.com/redis/modules/6.2/x86_64/redisearch.so"
        path: /var/lib/redis/modules/redisearch.so
        mode: "0750"
        owner: redis
        group: redis

    - module: core.url.fetched
      params_subset:
        url: "https://artifacts.example.com/redis/modules/6.2/x86_64/redistimeseries.so"
        path: /var/lib/redis/modules/redistimeseries.so
        mode: "0750"
        owner: redis
        group: redis

    # cluster-build: единственная community.redis.cluster в плане.
    - module: community.redis.cluster
      params_subset:
        action: create
        replicas_per_shard: 0
        # ★ РЕДИЗАЙН default_admin: коннект под default_admin (username → AUTH). Прежний
        # главный секрет ДРОПНУТ — пароль из ветки users/default_admin.
        username: default_admin
        password: default-admin-secret-pass
        nodes:
          node-a.example.com: { addr: "10.0.0.1:6379" }
          node-b.example.com: { addr: "10.0.0.2:6379" }
          node-c.example.com: { addr: "10.0.0.3:6379" }

  state_changes:
    redis_type: cluster
    redis_version: "7.4.1"
    redis_config:
      maxmemory:        "256mb"
      maxmemory-policy: allkeys-lru
      maxclients:       10000
      timeout:          300
      save:             "900 1 300 10 60 10000"
      appendonly:       "no"
      cluster-enabled:      "yes"
      cluster-config-file:  "nodes.conf"
      cluster-node-timeout: "5000"
    redis_users: []
    redis_hosts: []
    # Redis 6 (< 8) → полный набор развёрнут (модули всегда все).
    modules: [bloom, json, search, timeseries]
