# L0-испытание version-aware валидатора имён директив redis_settings (assert, #6) —
# НЕГАТИВ для серии Redis 8.6. essence несёт каталог redis_directives с серией 8.6.
# input.version = 8.6.1 (enum выкаченных в Nexus сборок) → серия 8.6. redis_settings
# содержит НЕИЗВЕСТНОЕ имя (опечатка `maxmemoyr` — нет в каталоге) → assert false →
# render рвётся на KEEPER-SIDE (422 assert-failed) ДО любого dispatch.
#
# ★ GUARD на регрессию каталога: серии 8.4/8.6 ДОБАВЛЕНЫ в каталог поздно (version-enum
# уже включал 8.6.1/8.4.0, а каталог обрывался на 8.2 → version-aware assert был
# вакуумно-true для 8.x → опечатка в redis_settings МОЛЧА проходила → redis-server падал
# на старте). Этот кейс держит инвариант «серия 8.6 присутствует в каталоге и
# валидируется так же, как 7.4». Парный к redis-settings-directive-unknown (серия 7.4).
name: redis_settings with an unknown directive name aborts at render for Redis 8.6 (catalog assert)

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  hosts:
    - sid: node-solo.example.com
      covens: [create]
      soulprint:
        network: { primary_ip: 10.0.0.5 }
        os: { arch: amd64 }
  vault:
    secret/redis/create:
      password: s3cr3t-redis-pass-create
    secret/redis/create/users/replica:
      password: replica-sys-secret-pass
    secret/redis/create/users/monitoring:
      password: monitoring-sys-secret-pass
    secret/redis/create/users/sentinel:
      password: sentinel-sys-secret-pass
    secret/redis/create/users/haproxy:
      password: haproxy-sys-secret-pass
  essence:
    redis_type: sentinel
    sentinel_master_name: master
    modules_base_url: "https://artifacts.example.com/redis/modules"
    memory_reserve_percent: 75
    persistence_presets:
      rdb:
        save: "900 1 300 10 60 10000"
        appendonly: "no"
    redis_config:
      maxmemory:        "256mb"
      maxmemory-policy: allkeys-lru
      maxclients:       10000
      timeout:          300
    system_acl_users:
      replica:    "+psync +replconf +ping"
      monitoring: "-@all +@connection +client +ping +info +config|get +cluster|info +slowlog +latency +memory +select +command|count +command|docs"
      sentinel:   "allchannels +multi +slaveof +ping +exec +subscribe +config|rewrite +role +publish +info +client|setname +client|kill +script|kill"
      haproxy:    "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +info +cluster|info"
    system_acl_users_sentinel:
      default:    "allchannels allkeys +@all"
      monitoring: "-@all +@connection -command +client -hello +info -auth +sentinel|masters +sentinel|replicas +sentinel|slaves +sentinel|sentinels +sentinel|ckquorum"
      sentinel:   "allchannels -@all +auth +client|getname +client|id +client|setname +command +hello +ping +sentinel|is-master-down-by-addr +publish +role +sentinel|get-master-addr-by-name +sentinel|master +sentinel|myid +sentinel|replicas +sentinel|sentinels"
      haproxy:    "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +sentinel|get-master-addr-by-name +sentinel|master +sentinel|myid +sentinel|replicas +sentinel|sentinels"

    # Каталог директив с серией 8.6 — активирует assert-валидатор для version 8.6.1.
    # Подмножество реальных директив серии 8.6 (включая 8.x-only bgsave-cpulist) —
    # достаточно для проверки членства опечатки.
    redis_directives:
      "8.6":
        - maxmemory
        - maxmemory-policy
        - maxclients
        - timeout
        - appendonly
        - appendfsync
        - save
        - bgsave-cpulist

  input:
    redis_type: sentinel
    version: "8.6.1"
    install_method: package
    replicas_per_master: 0
    persistence: rdb
    redis_settings:
      # ОПЕЧАТКА: должно быть maxmemory. Имя НЕТ в каталоге серии 8.6 → assert false.
      # До добавления серии 8.6 в каталог assert был вакуумно-true → опечатка проходила.
      maxmemoyr: "512mb"

# Прогон обрывается на render: assert «Validate redis_settings directive names…» false.
# Подстрока — message assert-правила (create/main.yml).
expect_render_error: "redis_settings содержит неизвестную директиву redis.conf для выбранной версии Redis"
