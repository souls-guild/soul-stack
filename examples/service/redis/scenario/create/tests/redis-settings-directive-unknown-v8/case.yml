# L0 test for the version-aware validator of redis_settings directive names (assert, #6) —
# NEGATIVE case for the Redis 8.6 series. essence carries a redis_directives catalog for series 8.6.
# input.version = 8.6.1 (enum of shipped Nexus builds) → series 8.6. redis_settings
# contains an UNKNOWN name (typo `maxmemoyr` — not in the catalog) → assert false →
# render aborts on the KEEPER SIDE (422 assert-failed) BEFORE any dispatch.
#
# ★ GUARD against catalog regression: series 8.4/8.6 were ADDED to the catalog late (the
# version-enum already included 8.6.1/8.4.0, but the catalog stopped at 8.2 → the version-aware
# assert was vacuously true for 8.x → a typo in redis_settings SILENTLY passed through →
# redis-server crashed at startup). This case holds the invariant "series 8.6 is present in
# the catalog and validated the same way as 7.4". Paired with redis-settings-directive-unknown (series 7.4).
name: redis_settings with an unknown directive name aborts at render for Redis 8.6 (catalog assert)

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  hosts:
    - sid: node-solo.example.com
      covens: [create]
      soulprint:
        network: { primary_ip: 10.0.0.5 }
        os: { arch: amd64 }
  vault:
    secret/redis/create:
      password: s3cr3t-redis-pass-create
    # ★ default_admin REDESIGN (2026-06-30): default_admin is the system user
    # for intra-cluster AUTH (deploy's auth_pass/PING steps read it via the users/<name> branch).
    secret/redis/create/users/default_admin:
      password: default-admin-secret-pass
    secret/redis/create/users/replica:
      password: replica-sys-secret-pass
    secret/redis/create/users/monitoring:
      password: monitoring-sys-secret-pass
    secret/redis/create/users/sentinel:
      password: sentinel-sys-secret-pass
    secret/redis/create/users/haproxy:
      password: haproxy-sys-secret-pass
  essence:
    # install_method — in essence (author-context, 2026-06-28): install method is
    # NOT operator-input. compute.install reads default(essence.install_method, 'binary').
    install_method: package
    redis_type: sentinel
    sentinel_master_name: master
    modules_base_url: "https://artifacts.example.com/redis/modules"
    memory_reserve_percent: 75
    persistence_presets:
      rdb:
        save: "900 1 300 10 60 10000"
        appendonly: "no"
    redis_config:
      maxmemory:        "256mb"
      maxmemory-policy: allkeys-lru
      maxclients:       10000
      timeout:          300
    system_acl_users:
      default_admin: "~* &* +@all"
      replica:    "+psync +replconf +ping"
      monitoring: "-@all +@connection +client +ping +info +config|get +cluster|info +slowlog +latency +memory +select +command|count +command|docs"
      sentinel:   "allchannels +multi +slaveof +ping +exec +subscribe +config|rewrite +role +publish +info +client|setname +client|kill +script|kill"
      haproxy:    "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +info +cluster|info"
    system_acl_users_sentinel:
      default_admin: "allchannels allkeys +@all"
      monitoring: "-@all +@connection -command +client -hello +info -auth +sentinel|masters +sentinel|replicas +sentinel|slaves +sentinel|sentinels +sentinel|ckquorum"
      sentinel:   "allchannels -@all +auth +client|getname +client|id +client|setname +command +hello +ping +sentinel|is-master-down-by-addr +publish +role +sentinel|get-master-addr-by-name +sentinel|master +sentinel|myid +sentinel|replicas +sentinel|sentinels"
      haproxy:    "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +sentinel|get-master-addr-by-name +sentinel|master +sentinel|myid +sentinel|replicas +sentinel|sentinels"

    # Directive catalog with series 8.6 — activates the assert validator for version 8.6.1.
    # A subset of real series 8.6 directives (including 8.x-only bgsave-cpulist) —
    # enough to test membership of the typo.
    redis_directives:
      "8.6":
        - maxmemory
        - maxmemory-policy
        - maxclients
        - timeout
        - appendonly
        - appendfsync
        - save
        - bgsave-cpulist

  input:
    # ★ provision disabled (default-on: an omitted section = ENABLED; this case deploys onto
    # a READY roster, cloud-create is not needed) → include redis-provision.yml group-drop.
    provision:
      enabled: false
    redis_type: sentinel
    version: "8.6.1"
    replicas_per_master: 0
    persistence: rdb
    redis_settings:
      # TYPO: should be maxmemory. The name is NOT in the series 8.6 catalog → assert false.
      # Before series 8.6 was added to the catalog, the assert was vacuously true → the typo passed.
      maxmemoyr: "512mb"

# The run aborts at render: assert "Validate redis_settings directive names..." false.
# Substring — the assert rule's message (create/main.yml).
expect_render_error: "unknown redis_settings directive"
