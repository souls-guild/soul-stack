# L0-испытание cluster-без-shards — FAIL-ветка. shards остаётся required:false без
# default в input-схеме (min:1 + раскладка ролей по хостам), поэтому ОТСУТСТВИЕ
# shards = осмысленная ошибка оператора, а не дефолт.
#
# ★ ПОВЕДЕНИЕ ПОСЛЕ перевода size-guard в assert: (ADR-009 amendment 2026-06-23):
# size-guard теперь keeper-side render-time precondition (assert:), вычисляется
# ДО dispatch. При cluster-без-shards его предикат that[0] =
#   size(soulprint.hosts) == (has(input.shards) ? int : 0) * (1 + int(replicas))
# = 1 == 0*(1+0) = false → render ОБРЫВАЕТСЯ с message "topology mismatch" РАНЬШЕ,
# чем shards-guard (отдельная core.cmd.shell-задача) доедет до Soul. Прежде (size-
# guard = shell-задача) этот кейс ассертил ДВА отрендеренных guard-а в fail-форме;
# теперь render не доходит до плана — ассертим обрыв через expect_render_error.
#
# shards-guard (core.cmd.shell, has(input.shards)) ОСТАЁТСЯ в сценарии (отдельная
# фича required_when — следующий слайс); но на render он рендерится ДО assert и при
# его провале прогон всё равно обрывается на assert. Итог для оператора один:
# cluster-без-shards не стартует. Точечную shards-специфичную диагностику вернёт
# required_when, когда заменит shards-guard.
#
# Парный с cluster-single-shard (shards задан): там render проходит, cluster-build
# на месте.
name: cluster without shards aborts render at size-guard assert

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  hosts:
    - sid: node-solo.example.com
      covens: [create, redis]
      soulprint:
        network: { primary_ip: 10.0.0.9 }
        os: { arch: amd64 }
  vault:
    secret/redis/create:
      password: s3cr3t-redis-pass-create
  essence:
    redis_type: cluster
    memory_reserve_percent: 75
    persistence_presets:
      rdb:
        save: "900 1 300 10 60 10000"
        appendonly: "no"
    redis_config:
      maxmemory:        "256mb"
      maxmemory-policy: allkeys-lru
      maxclients:       10000
      timeout:          300

  input:
    redis_type: cluster
    # version ОБЯЗАТЕЛЬНА (директива пользователя 2026-06-23): фиксированный
    # distro-native пин (мажор < 8 → version-gate модулей не активен).
    version: "7.2.4"
    # shards НЕ задан намеренно — 1 хост != 0*(1+0) → size-guard assert обрывает render.

# Render обрывается assert-провалом size-guard-а (1 != 0). has()-тернар держит CEL
# валидным при отсутствии shards (иначе int(input.shards) дал бы no-such-key).
expect_render_error: "topology mismatch"
