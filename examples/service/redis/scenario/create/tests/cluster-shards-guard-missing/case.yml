# L0-испытание cluster-без-shards — FAIL-ветка. shards остаётся required:false без
# default в input-схеме (min:1 + раскладка ролей по хостам), но несёт
# required_when: "input.redis_type == 'cluster'" — условную обязательность по режиму
# (ADR-009 amendment 2026-06-23). Поэтому ОТСУТСТВИЕ shards в режиме cluster =
# осмысленная ошибка оператора, а не дефолт.
#
# ★ ПОВЕДЕНИЕ: shards-специфичную диагностику даёт required_when на INPUT-ВАЛИДАЦИИ
# (config.ResolveInputValues → requireInputValues), которая идёт ДО render: предикат
# input.redis_type == 'cluster' истинен, shards не передан и без default → прогон
# обрывается понятным сообщением «input "shards" обязателен...» РАНЬШЕ, чем дойдёт до
# render и size-guard assert (1 != 0*1). В trial-harness эта input-ошибка пробрасывается
# через renderCase (config.ResolveInputValues) и ловится тем же expect_render_error.
# Прежде (size-guard shell-задача / без required_when) кейс ассертил отрендеренный
# guard / обрыв на size-guard "topology mismatch"; теперь required_when отсекает раньше.
#
# Парный с cluster-single-shard (shards задан): там input-валидация проходит, render
# идёт, cluster-build на месте.
name: cluster without shards aborts at input validation (required_when)

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  hosts:
    - sid: node-solo.example.com
      covens: [create, redis]
      soulprint:
        network: { primary_ip: 10.0.0.9 }
        os: { arch: amd64 }
  vault:
    secret/redis/create:
      password: s3cr3t-redis-pass-create
  essence:
    redis_type: cluster
    memory_reserve_percent: 75
    persistence_presets:
      rdb:
        save: "900 1 300 10 60 10000"
        appendonly: "no"
    redis_config:
      maxmemory:        "256mb"
      maxmemory-policy: allkeys-lru
      maxclients:       10000
      timeout:          300

  input:
    # ★ provision выключен (default-on: опущенная секция = ВКЛЮЧЕНО; кейс деплоит на
    # ГОТОВЫЙ roster, cloud-create не нужен) → include redis-provision.yml group-drop.
    provision:
      enabled: false
    redis_type: cluster
    # version ОБЯЗАТЕЛЬНА (директива пользователя 2026-06-23) и теперь ENUM выкаченных
    # в Nexus сборок — 7.4.1 ∈ enum (мажор < 8 → version-gate модулей не активен).
    # Берём валидный enum намеренно: required_when shards проверяется requireInputValues
    # ДО enum-валидации, поэтому невалидный version замаскировал бы shards-ошибку.
    version: "7.4.1"
    # shards НЕ задан намеренно — required_when (input.redis_type == 'cluster')
    # делает его обязательным в режиме cluster → input-валидация рвёт прогон ДО render.

# Прогон обрывается на input-валидации: required_when shards истинен (режим cluster),
# значение не передано и без default. Подстрока — узнаваемая форма required-сообщения
# requireInputValues (input_value.go), включающая сам предикат required_when.
expect_render_error: "input \"shards\" обязателен, но не передан и не имеет default (required_when: input.redis_type == 'cluster')"
