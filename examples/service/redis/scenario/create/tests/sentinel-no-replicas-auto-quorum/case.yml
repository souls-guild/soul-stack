# L0-испытание create в режиме sentinel БЕЗ реплик (replicas_per_master=0 → ровно 1
# хост, size-guard 1 == 1+0; standalone-эквивалент). quorum АВТО в apply =
# size(soulprint.hosts)/2+1 = 1/2+1 = 1 (CONFIG MONITOR quorum). В state quorum=0
# (state_changes не видит soulprint.hosts — input-only; auto вычисляется в apply,
# см. main.yml). master_name из essence — дефолт master.
#
# Покрывает: replicas_per_master=0 граница size-guard (standalone-эквивалент);
# auto-quorum; default master_name (essence); single-host roster (1 sentinel мониторит
# сам себя как master).
name: sentinel create no replicas, auto quorum and default master name

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  hosts:
    - sid: node-solo.example.com
      covens: [create, redis]
      soulprint:
        network: { primary_ip: 10.0.0.9 }
        os: { arch: amd64 }
  vault:
    secret/redis/create:
      password: s3cr3t-redis-pass-create
    # Per-user секреты системных юзеров (secret/redis/<inc>/users/<name>#password) —
    # их резолвит keeper-side vault() при доливе system_acl_users в apply.input.users.
    secret/redis/create/users/replica:
      password: replica-sys-secret-pass
    secret/redis/create/users/monitoring:
      password: monitoring-sys-secret-pass
    secret/redis/create/users/sentinel:
      password: sentinel-sys-secret-pass
    secret/redis/create/users/haproxy:
      password: haproxy-sys-secret-pass
  essence:
    # install_method — в essence (author-context, 2026-06-28): способ установки
    # НЕ operator-input. compute.install читает default(essence.install_method, 'binary').
    install_method: package
    redis_type: sentinel
    sentinel_master_name: master
    # ★ Редизайн: подложка per-master sentinel-дефолтов (под input.sentinel_master_settings).
    sentinel_master_defaults:
      down-after-milliseconds: "5000"
      failover-timeout:        "60000"
    modules_base_url: "https://artifacts.example.com/redis/modules"
    memory_reserve_percent: 75
    persistence_presets:
      rdb:
        save: "900 1 300 10 60 10000"
        appendonly: "no"
    redis_config:
      maxmemory:        "256mb"
      maxmemory-policy: allkeys-lru
      maxclients:       10000
      timeout:          300

    # Системные ACL-юзеры redis-server + sentinel-демона (1:1 из essence/_default.yaml).
    # ОБА ОБЯЗАТЕЛЬНЫ: guard create/sentinel.yml (assert 1b) рвёт render при пустом
    # любом из наборов (тихий fail-open недопустим — без них репликация/sentinel↔redis
    # AUTH сломались бы).
    system_acl_users:
      replica:    "+psync +replconf +ping"
      monitoring: "-@all +@connection +client +ping +info +config|get +cluster|info +slowlog +latency +memory +select +command|count +command|docs"
      sentinel:   "allchannels +multi +slaveof +ping +exec +subscribe +config|rewrite +role +publish +info +client|setname +client|kill +script|kill"
      haproxy:    "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +info +cluster|info"
    system_acl_users_sentinel:
      default:    "allchannels allkeys +@all"
      monitoring: "-@all +@connection -command +client -hello +info -auth +sentinel|masters +sentinel|replicas +sentinel|slaves +sentinel|sentinels +sentinel|ckquorum"
      sentinel:   "allchannels -@all +auth +client|getname +client|id +client|setname +command +hello +ping +sentinel|is-master-down-by-addr +publish +role +sentinel|get-master-addr-by-name +sentinel|master +sentinel|myid +sentinel|replicas +sentinel|sentinels"
      haproxy:    "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +sentinel|get-master-addr-by-name +sentinel|master +sentinel|myid +sentinel|replicas +sentinel|sentinels"
  input:
    redis_type: sentinel
    # version — фикс-enum выкаченных в Nexus сборок (мажор < 8 → version-gate модулей
    # не активен). install_method=package ЯВНО (default редизайна — binary): кейс
    # изолирует sentinel-логику (auto-quorum/master-election) от install-модели.
    version: "7.4.1"
    replicas_per_master: 0

assert:
  # sentinel size-guard PASS: 1 == 1+0 → assert: (ADR-009 amendment), в план не
  # эмитится.
  task_present:
    # REPLICAOF: master_addr = единственный хост (он же master) → плагин no-op
    # (addr==master_addr guard). Единственная community.redis.replica в плане.
    - module: community.redis.replica
      params_subset:
        addr: "127.0.0.1:6379"
        master_addr: "10.0.0.9:6379"
        password: s3cr3t-redis-pass-create

    # SENTINEL MONITOR: monitor.ip — единственный хост; auto-quorum = 1/2+1 = 1.
    # master_name из essence — дефолт master. Единственная активная
    # community.redis.sentinel.
    - module: community.redis.sentinel
      params_subset:
        addr: "127.0.0.1:26379"
        master_name: master
        # ★ CONNECTION-AUTH к sentinel-демону :26379 (главный секрет, default-юзер требует
        # пароль). Guard на NOAUTH — отдельно от auth_pass (мониторинг master).
        password: s3cr3t-redis-pass-create
        auth_pass: s3cr3t-redis-pass-create
        redis_version: "7.4.1"
        monitor:
          ip: 10.0.0.9
          port: 6379
          quorum: 1

  state_changes:
    redis_type: sentinel
    redis_version: "7.4.1"
    redis_users: []
    redis_hosts: []
    # auto-quorum НЕ материализуется в state → 0; master_name из essence (master).
    # ★ Редизайн: тайминги failover теперь в master_settings (эффективный per-master map
    # essence.sentinel_master_defaults поверх input.sentinel_master_settings; здесь
    # operator dict не задан → дефолты down-after 5000/failover-timeout 60000). settings —
    # глобальные sentinel-директивы оператора (не заданы → {}).
    redis_sentinel:
      master_name: master
      quorum: 0
      master_settings:
        down-after-milliseconds: "5000"
        failover-timeout: "60000"
      settings: {}
