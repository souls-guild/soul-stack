# L0-испытание create в режиме sentinel БЕЗ реплик (replicas_per_master=0 → ровно 1
# хост, size-guard 1 == 1+0; standalone-эквивалент). quorum АВТО в apply =
# size(soulprint.hosts)/2+1 = 1/2+1 = 1 (CONFIG MONITOR quorum). В state quorum=0
# (state_changes не видит soulprint.hosts — input-only; auto вычисляется в apply,
# см. main.yml). master_name из essence — дефолт master.
#
# Покрывает: replicas_per_master=0 граница size-guard (standalone-эквивалент);
# auto-quorum; default master_name (essence); single-host roster (1 sentinel мониторит
# сам себя как master).
name: sentinel create no replicas, auto quorum and default master name

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  hosts:
    - sid: node-solo.example.com
      covens: [create, redis]
      soulprint:
        network: { primary_ip: 10.0.0.9 }
        os: { arch: amd64 }
  vault:
    secret/redis/create:
      password: s3cr3t-redis-pass-create
  essence:
    redis_type: sentinel
    sentinel_master_name: master
    modules_base_url: "https://artifacts.example.com/redis/modules"
    memory_reserve_percent: 75
    persistence_presets:
      rdb:
        save: "900 1 300 10 60 10000"
        appendonly: "no"
    redis_config:
      maxmemory:        "256mb"
      maxmemory-policy: allkeys-lru
      maxclients:       10000
      timeout:          300

  input:
    redis_type: sentinel
    # version ОБЯЗАТЕЛЬНА (директива пользователя 2026-06-23): фиксированный
    # distro-native пин (мажор < 8 → version-gate модулей не активен).
    version: "7.2.4"
    replicas_per_master: 0

assert:
  # sentinel size-guard PASS: 1 == 1+0 → assert: (ADR-009 amendment), в план не
  # эмитится.
  task_present:
    # REPLICAOF: master_addr = единственный хост (он же master) → плагин no-op
    # (addr==master_addr guard). Единственная community.redis.replica в плане.
    - module: community.redis.replica
      params_subset:
        addr: "127.0.0.1:6379"
        master_addr: "10.0.0.9:6379"
        password: s3cr3t-redis-pass-create

    # SENTINEL MONITOR: monitor.ip — единственный хост; auto-quorum = 1/2+1 = 1.
    # master_name из essence — дефолт master. Единственная активная
    # community.redis.sentinel.
    - module: community.redis.sentinel
      params_subset:
        addr: "127.0.0.1:26379"
        master_name: master
        auth_pass: s3cr3t-redis-pass-create
        redis_version: "7.2.4"
        monitor:
          ip: 10.0.0.9
          port: 6379
          quorum: 1

  state_changes:
    redis_type: sentinel
    redis_version: "7.2.4"
    redis_users: {}
    redis_hosts: []
    # auto-quorum НЕ материализуется в state → 0; master_name из essence (master).
    redis_sentinel:
      master_name: master
      quorum: 0
