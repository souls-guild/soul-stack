# L0-trial for create in sentinel mode WITHOUT replicas (replicas_per_master=0 → exactly 1
# host, size-guard 1 == 1+0; standalone-equivalent). quorum is AUTO in apply =
# size(soulprint.hosts)/2+1 = 1/2+1 = 1 (CONFIG MONITOR quorum). In state quorum=0
# (state_changes does not see soulprint.hosts — input-only; auto is computed in apply,
# see main.yml). master_name comes from essence — default master.
#
# Covers: replicas_per_master=0 boundary of the size-guard (standalone-equivalent);
# auto-quorum; default master_name (essence); single-host roster (1 sentinel monitors
# itself as master).
name: sentinel create no replicas, auto quorum and default master name

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  hosts:
    - sid: node-solo.example.com
      covens: [create, redis]
      soulprint:
        network: { primary_ip: 10.0.0.9 }
        os: { arch: amd64 }
  vault:
    secret/redis/create:
      password: s3cr3t-redis-pass-create
    # Per-user secrets of system users (secret/redis/<inc>/users/<name>#password) —
    # resolved by the keeper-side vault() when topping up system_acl_users into apply.input.users.
    # ★ REDESIGN default_admin (2026-06-30): default_admin is the system user for
    # intra-cluster AUTH (auth_pass/PING deploy steps read it via the users/<name> branch).
    secret/redis/create/users/default_admin:
      password: default-admin-secret-pass
    secret/redis/create/users/replica:
      password: replica-sys-secret-pass
    secret/redis/create/users/monitoring:
      password: monitoring-sys-secret-pass
    secret/redis/create/users/sentinel:
      password: sentinel-sys-secret-pass
    secret/redis/create/users/haproxy:
      password: haproxy-sys-secret-pass
  essence:
    # install_method lives in essence (author-context, 2026-06-28): the install method
    # is NOT operator-input. compute.install reads default(essence.install_method, 'binary').
    install_method: package
    redis_type: sentinel
    sentinel_master_name: master
    # ★ Redesign: per-master sentinel-defaults substrate (under input.sentinel_master_settings).
    sentinel_master_defaults:
      down-after-milliseconds: "5000"
      failover-timeout:        "60000"
    modules_base_url: "https://artifacts.example.com/redis/modules"
    memory_reserve_percent: 75
    persistence_presets:
      rdb:
        save: "900 1 300 10 60 10000"
        appendonly: "no"
    redis_config:
      maxmemory:        "256mb"
      maxmemory-policy: allkeys-lru
      maxclients:       10000
      timeout:          300

    # System ACL users of redis-server + the sentinel daemon (1:1 from essence/_default.yaml).
    # BOTH ARE REQUIRED: the create/sentinel.yml guard (assert 1b) aborts render if either
    # set is empty (a silent fail-open is unacceptable — without them replication/sentinel↔redis
    # AUTH would break).
    system_acl_users:
      default_admin: "~* &* +@all"
      replica:    "+psync +replconf +ping"
      monitoring: "-@all +@connection +client +ping +info +config|get +cluster|info +slowlog +latency +memory +select +command|count +command|docs"
      sentinel:   "allchannels +multi +slaveof +ping +exec +subscribe +config|rewrite +role +publish +info +client|setname +client|kill +script|kill"
      haproxy:    "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +info +cluster|info"
    system_acl_users_sentinel:
      default_admin: "allchannels allkeys +@all"
      monitoring: "-@all +@connection -command +client -hello +info -auth +sentinel|masters +sentinel|replicas +sentinel|slaves +sentinel|sentinels +sentinel|ckquorum"
      sentinel:   "allchannels -@all +auth +client|getname +client|id +client|setname +command +hello +ping +sentinel|is-master-down-by-addr +publish +role +sentinel|get-master-addr-by-name +sentinel|master +sentinel|myid +sentinel|replicas +sentinel|sentinels"
      haproxy:    "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +sentinel|get-master-addr-by-name +sentinel|master +sentinel|myid +sentinel|replicas +sentinel|sentinels"
  input:
    # ★ provision disabled (default-on: an omitted section = ENABLED; the case deploys onto
    # a READY roster, cloud-create is not needed) → include redis-provision.yml group-drop.
    provision:
      enabled: false
    redis_type: sentinel
    # version is the fixed enum of builds released to Nexus (major < 8 → module
    # version-gate not active). install_method=package EXPLICITLY (redesign default is
    # binary): the case isolates sentinel logic (auto-quorum/master-election) from the install model.
    version: "7.4.1"
    replicas_per_master: 0

assert:
  # sentinel size-guard PASS: 1 == 1+0 → assert: (ADR-009 amendment), not
  # emitted into the plan.
  task_present:
    # REPLICAOF: master_addr = the only host (which is also master) → plugin no-op
    # (addr==master_addr guard). The single community.redis.replica in the plan.
    - module: community.redis.replica
      params_subset:
        addr: "127.0.0.1:6379"
        master_addr: "10.0.0.9:6379"
        # ★ REDESIGN default_admin: replica→master AUTH under default_admin.
        username: default_admin
        password: default-admin-secret-pass

    # SENTINEL MONITOR: monitor.ip — the only host; auto-quorum = 1/2+1 = 1.
    # master_name comes from essence — default master. The single active
    # community.redis.sentinel.
    - module: community.redis.sentinel
      params_subset:
        addr: "127.0.0.1:26379"
        master_name: master
        # ★ REDESIGN default_admin: CONNECTION-AUTH to :26379 under default_admin (username/
        # password); auth_user/auth_pass — master monitoring credentials. Guard on NOAUTH.
        username: default_admin
        password: default-admin-secret-pass
        auth_user: default_admin
        auth_pass: default-admin-secret-pass
        redis_version: "7.4.1"
        monitor:
          ip: 10.0.0.9
          port: 6379
          quorum: 1

  state_changes:
    redis_type: sentinel
    redis_version: "7.4.1"
    redis_users: []
    redis_hosts: []
    # auto-quorum does NOT materialize into state → 0; master_name comes from essence (master).
    # ★ Redesign: failover timings now live in master_settings (an effective per-master map
    # of essence.sentinel_master_defaults over input.sentinel_master_settings; here the
    # operator dict is not set → defaults down-after 5000/failover-timeout 60000). settings —
    # global sentinel directives of the operator (not set → {}).
    redis_sentinel:
      master_name: master
      quorum: 0
      master_settings:
        down-after-milliseconds: "5000"
        failover-timeout: "60000"
      settings: {}
