# L0-испытание (Trial, ADR-023): TLS ВЫКЛЮЧЕН (default). Guard: при tls_enable=false
# (essence не задаёт tls_enable) TLS-render-задачи placeholder-skip (не рендерятся,
# файлы /etc/redis/tls/* НЕ создаются), а merged config НЕ несёт tls-* директив и
# НЕ ставит port 0 (plain открыт). Это back-compat: инсталляция без TLS не меняется.
name: tls disabled keeps plaintext config without tls directives or pem files

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  hosts:
    - sid: node-solo.example.com
      covens: [create]
      soulprint:
        network: { primary_ip: 10.0.0.5 }
        os: { arch: amd64 }
  vault:
    secret/redis/create:
      password: s3cr3t-redis-pass-create
    # Per-user секреты системных юзеров (secret/redis/<inc>/users/<name>#password) —
    # их резолвит keeper-side vault() при доливе system_acl_users в apply.input.users.
    # ★ РЕДИЗАЙН default_admin (2026-06-30): default_admin — системный юзер
    # внутрикластерного AUTH (auth_pass/PING шаги деплоя читают его по ветке users/<name>).
    secret/redis/create/users/default_admin:
      password: default-admin-secret-pass
    secret/redis/create/users/replica:
      password: replica-sys-secret-pass
    secret/redis/create/users/monitoring:
      password: monitoring-sys-secret-pass
    secret/redis/create/users/sentinel:
      password: sentinel-sys-secret-pass
    secret/redis/create/users/haproxy:
      password: haproxy-sys-secret-pass
  essence:
    redis_type: sentinel
    sentinel_master_name: master
    # ★ Редизайн: подложка per-master sentinel-дефолтов (под input.sentinel_master_settings).
    sentinel_master_defaults:
      down-after-milliseconds: "5000"
      failover-timeout:        "60000"
    modules_base_url: "https://artifacts.example.com/redis/modules"
    # install_method — в essence (author-context, 2026-06-28): способ установки НЕ
    # operator-input. Кейс про TLS-директивы, не про install → package задан ЯВНО
    # (distro redis-server, без binary-URL; короче redis.conf-план).
    install_method: package
    memory_reserve_percent: 75
    persistence_presets:
      rdb:
        save: "900 1 300 10 60 10000"
        appendonly: "no"
    redis_config:
      maxmemory:        "256mb"
      maxmemory-policy: allkeys-lru
      maxclients:       10000
      timeout:          300
    # tls_enable НЕ задан → default false. tls_*_ref не нужны (vault не вызывается).

    # Системные ACL-юзеры redis-server + sentinel-демона (1:1 из essence/_default.yaml).
    # ОБА ОБЯЗАТЕЛЬНЫ: guard create/sentinel.yml (assert 1b) рвёт render при пустом
    # любом из наборов (тихий fail-open недопустим — без них репликация/sentinel↔redis
    # AUTH сломались бы).
    # ★ РЕДИЗАЙН default_admin (2026-06-30): default_admin — системный юзер полного
    # доступа (~* &* +@all) в ОБА набора (заменил прежний requirepass-default).
    system_acl_users:
      default_admin: "~* &* +@all"
      replica:    "+psync +replconf +ping"
      monitoring: "-@all +@connection +client +ping +info +config|get +cluster|info +slowlog +latency +memory +select +command|count +command|docs"
      sentinel:   "allchannels +multi +slaveof +ping +exec +subscribe +config|rewrite +role +publish +info +client|setname +client|kill +script|kill"
      haproxy:    "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +info +cluster|info"
    system_acl_users_sentinel:
      default_admin: "allchannels allkeys +@all"
      monitoring: "-@all +@connection -command +client -hello +info -auth +sentinel|masters +sentinel|replicas +sentinel|slaves +sentinel|sentinels +sentinel|ckquorum"
      sentinel:   "allchannels -@all +auth +client|getname +client|id +client|setname +command +hello +ping +sentinel|is-master-down-by-addr +publish +role +sentinel|get-master-addr-by-name +sentinel|master +sentinel|myid +sentinel|replicas +sentinel|sentinels"
      haproxy:    "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +sentinel|get-master-addr-by-name +sentinel|master +sentinel|myid +sentinel|replicas +sentinel|sentinels"
  input:
    redis_type: sentinel
    # version ОБЯЗАТЕЛЬНА: enum выкаченных в Nexus сборок (мажор < 8 → version-gate
    # модулей не активен). 7.4.1 — серия 7.x, как прежний distro-пин 7.2.4.
    version: "7.4.1"
    persistence: rdb
    # single-host (1 хост) → 0 реплик (default редизайна 2): size-guard sentinel = 1+0.
    replicas_per_master: 0

assert:
  task_present:
    # redis.conf: merged config БЕЗ tls-* и БЕЗ port 0 (plain открыт).
    # Дизамбигуатор от users.acl/hardening (тот же core.file.rendered) — path.
    - module: core.file.rendered
      params_subset:
        path: /etc/redis/redis.conf
        render_context:
          vars:
            # ★ РЕДИЗАЙН default_admin: .vars.password БОЛЬШЕ НЕ передаётся в redis.conf
            # шаблон (requirepass убран из server.yml). AUTH — под default_admin (users.acl).
            conf_dir: /etc/redis
            data_dir: /var/lib/redis
            port: 6379
            run_dir: /var/run/redis
            log_dir: /var/log/redis
            # Ровно дефолтные директивы — НИ ОДНОЙ tls-* и НЕТ ключа port (plain
            # порт задаёт redis.conf.tmpl статикой `port 6379`, не config-ключом).
            loadmodules:
              - /var/lib/redis/modules/redisbloom.so
              - /var/lib/redis/modules/rejson.so
              - /var/lib/redis/modules/redisearch.so
              - /var/lib/redis/modules/redistimeseries.so
            config:
              # ★ РЕДИЗАЙН default_admin: replica→master AUTH (masteruser/
              # masterauth) приходит ОБЫЧНЫМИ директивами config (sentinel
              # deploy-body доливает их vault()-в-ячейке) → redis.conf range-ит
              # их как любую директиву → статически переживают рестарт.
              masteruser:       "default_admin"
              masterauth:       "default-admin-secret-pass"
              maxmemory: "256mb"
              maxmemory-policy: allkeys-lru
              maxclients: 10000
              timeout: 300
              save: "900 1 300 10 60 10000"
              appendonly: "no"
          self:
            sid: node-solo.example.com
            covens: [create]
            choirs: []
            # traits — registry-проекция (ADR-060), пустой объект без меток.
            traits: {}
            role: ""
            network:
              primary_ip: 10.0.0.5
            os:
              arch: amd64
          role: ""
          essence: {}

    # PING: tls=false (plain, без tls_ca), addr на 6379 (plain открыт). cluster/sentinel
    # PING — placeholder-skip; дизамбигуатор addr/args.
    # ★ РЕДИЗАЙН default_admin: AUTH под default_admin (username + его пароль из ветки
    # users/default_admin), requirepass убран.
    - module: community.redis.command
      params_subset:
        addr: "127.0.0.1:6379"
        username: default_admin
        password: default-admin-secret-pass
        tls: false
        tls_ca: ""
        args: ["PING"]

  task_absent:
    # TLS выключен (tls_enable=false) → TLS-dir и PEM-cert gated-placeholder-skip
    # (params_subset path не сматчит placeholder). Guard «без TLS нет PEM-файлов».
    - module: core.file.directory
      params_subset:
        path: /etc/redis/tls
    - module: core.file.present
      params_subset:
        path: /etc/redis/tls/redis.crt

  state_changes:
    redis_type: sentinel
    redis_version: "7.4.1"
    # БЕЗ tls-* директив — симметрия с apply.input.config (drift-guard).
    redis_config:
      maxmemory: "256mb"
      maxmemory-policy: allkeys-lru
      maxclients: 10000
      timeout: 300
      save: "900 1 300 10 60 10000"
      appendonly: "no"
    redis_users: []
    redis_hosts: []
    # ★ Редизайн: тайминги failover в master_settings (essence.sentinel_master_defaults);
    # settings — глобальные sentinel-директивы (не заданы → {}).
    redis_sentinel:
      master_name: master
      quorum: 0
      master_settings:
        down-after-milliseconds: "5000"
        failover-timeout: "60000"
      settings: {}
