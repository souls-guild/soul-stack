# L0-испытание create (standalone) — Redis-МОДУЛИ БЕЗ sha256 (checksum ОПЦИОНАЛЕН,
# директива пользователя 2026-06-24). Контр-кейс к modules-enabled-standalone (там
# modules_sha256 ЗАДАН частично → search/json verify). Здесь оператор modules_sha256
# НЕ передаёт вовсе → КАЖДЫЙ из четырёх модулей fetch-ится с ПУСТЫМ checksum, и
# core.url.fetched качает .so по СОДЕРЖИМОМУ (content-идемпотентность), без verify.
#
# Guard (директива «модули ВСЕГДА ВСЕ»): при ОТСУТСТВУЮЩЕМ modules_sha256:
#   1. рендер проходит (CEL-ячейка checksum НЕ падает no-such-key — has()-guard);
#   2. КАЖДЫЙ из ЧЕТЫРЁХ алиасов → core.url.fetched с checksum: "" (absent);
#   3. остальное (modules-dir, loadmodules всех четырёх, URL из arch) — как с sha256.
#
# version=5:6.2.7 — мажор 6 (< 8), version-guard модули НЕ гасит. input.modules НЕ
# задаётся (набор-инвариант в destiny vars.redis_modules) — отличие от enabled-кейса
# ровно одно: пустой checksum у ВСЕХ vs частичный verify.
name: modules without sha256 render empty checksum and fetch by content idempotency

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  soulprint:
    network:
      primary_ip: 10.0.0.5
    os:
      arch: amd64
  vault:
    secret/redis/create:
      password: s3cr3t-redis-pass-create
  essence:
    redis_type: standalone
    memory_reserve_percent: 75
    persistence_presets:
      off:
        save: ""
        appendonly: "no"
      aof:
        save: ""
        appendonly: "yes"
      rdb:
        save: "900 1 300 10 60 10000"
        appendonly: "no"
      rdb_aof:
        save: "900 1 300 10 60 10000"
        appendonly: "yes"
    redis_config:
      maxmemory:        "256mb"
      maxmemory-policy: allkeys-lru
      maxclients:       10000
      timeout:          300

  input:
    redis_type: standalone
    version: "5:6.2.7"
    # input.modules НЕ задаётся (набор-инвариант), modules_sha256 — НЕТ (опционален).
    # ВСЕ четыре модуля fetch-ятся с пустым checksum (absent для каждого).
    modules_base_url: "https://artifacts.example.com/redis/modules/6.2"

assert:
  task_present:
    # redis.conf несёт vars.loadmodules — пути .so ВСЕХ четырёх (Go-сорт: bloom, json,
    # search, timeseries). loadmodules от наличия sha256 НЕ зависят. Дизамбигуатор от
    # users.acl/hardening — path.
    - module: core.file.rendered
      params_subset:
        path: /etc/redis/redis.conf
        template_content: "<present>"
        mode: "0640"
        owner: redis
        group: redis
        render_context:
          vars:
            password: s3cr3t-redis-pass-create
            conf_dir: /etc/redis
            data_dir: /var/lib/redis
            loadmodules:
              - /var/lib/redis/modules/redisbloom.so
              - /var/lib/redis/modules/rejson.so
              - /var/lib/redis/modules/redisearch.so
              - /var/lib/redis/modules/redistimeseries.so
            config:
              maxmemory: "256mb"
              maxmemory-policy: allkeys-lru
              maxclients: 10000
              timeout: 300
              save: "900 1 300 10 60 10000"
              appendonly: "no"
          self:
            sid: trial-host
            covens: [create]
            choirs: []
            # traits — registry-проекция (ADR-060), пустой объект без меток.
            traits: {}
            role: ""
            network:
              primary_ip: 10.0.0.5
            os:
              arch: amd64
          role: ""
          essence: {}

    # modules-dir каталог — gated-include на deploy_redis && !redis8, здесь АКТИВНА.
    # Дизамбигуатор от systemd-dropin-dir — path.
    - module: core.file.directory
      params_subset:
        path: /var/lib/redis/modules
        owner: redis
        group: redis
        mode: "0750"

    # fetch .so — loop по КЛЮЧАМ vars.redis_modules (Go-сорт: bloom, json, search,
    # timeseries). URL арх-специфичен (amd64). checksum ПУСТ ("") у КАЖДОГО —
    # modules_sha256 не передан: core.url.fetched качает по content-идемпотентности.
    # Дизамбигуатор .so — path/url; tarball-fetch — placeholder-skip.
    - module: core.url.fetched
      params_subset:
        url: "https://artifacts.example.com/redis/modules/6.2/amd64/redisbloom.so"
        path: /var/lib/redis/modules/redisbloom.so
        checksum: ""
        mode: "0750"
        owner: redis
        group: redis

    - module: core.url.fetched
      params_subset:
        url: "https://artifacts.example.com/redis/modules/6.2/amd64/rejson.so"
        path: /var/lib/redis/modules/rejson.so
        checksum: ""
        mode: "0750"
        owner: redis
        group: redis

    - module: core.url.fetched
      params_subset:
        url: "https://artifacts.example.com/redis/modules/6.2/amd64/redisearch.so"
        path: /var/lib/redis/modules/redisearch.so
        checksum: ""
        mode: "0750"
        owner: redis
        group: redis

    - module: core.url.fetched
      params_subset:
        url: "https://artifacts.example.com/redis/modules/6.2/amd64/redistimeseries.so"
        path: /var/lib/redis/modules/redistimeseries.so
        checksum: ""
        mode: "0750"
        owner: redis
        group: redis

    # standalone-PING: cluster/sentinel ветки — placeholder-skip; дизамбигуатор
    # addr/args.
    - module: community.redis.command
      params_subset:
        addr: "127.0.0.1:6379"
        password: s3cr3t-redis-pass-create
        args: ["PING"]

  state_changes:
    redis_type: standalone
    redis_version: "5:6.2.7"
    redis_config:
      maxmemory: "256mb"
      maxmemory-policy: allkeys-lru
      maxclients: 10000
      timeout: 300
      save: "900 1 300 10 60 10000"
      appendonly: "no"
    redis_users: {}
    redis_hosts: []
    redis_sentinel: {}
    # Redis 6 (< 8) → полный набор развёрнут (модули всегда все).
    modules: [bloom, json, search, timeseries]
