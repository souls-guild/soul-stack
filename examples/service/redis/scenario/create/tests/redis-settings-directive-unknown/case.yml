# L0 test for the version-aware validator of redis_settings directive names (assert, #6) —
# NEGATIVE. essence carries a redis_directives catalog for series 7.4. input.version = 7.4.1
# (enum of builds shipped in Nexus) → series 7.4. redis_settings contains an UNKNOWN name
# (typo `maxmemoyr` — not in the catalog) → assert false → render aborts on the KEEPER SIDE
# (422 assert-failed) BEFORE any dispatch, with a clear message. Paired with
# redis-settings-directive-valid.
#
# Verifies the MAIN intent of the feature: the passthrough-map redis_settings (additional_properties)
# no longer silently carries a garbage name through — the typo is caught at render, not via a late
# rejection by redis-server on the host.
name: redis_settings with an unknown directive name aborts at render (catalog assert)

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  hosts:
    - sid: node-solo.example.com
      covens: [create]
      soulprint:
        network: { primary_ip: 10.0.0.5 }
        os: { arch: amd64 }
  vault:
    secret/redis/create:
      password: s3cr3t-redis-pass-create
    # ★ default_admin REDESIGN (2026-06-30): default_admin — the system user
    # for intra-cluster AUTH (the auth_pass/PING deploy steps read it via the users/<name> branch).
    secret/redis/create/users/default_admin:
      password: default-admin-secret-pass
    secret/redis/create/users/replica:
      password: replica-sys-secret-pass
    secret/redis/create/users/monitoring:
      password: monitoring-sys-secret-pass
    secret/redis/create/users/sentinel:
      password: sentinel-sys-secret-pass
    secret/redis/create/users/haproxy:
      password: haproxy-sys-secret-pass
  essence:
    redis_type: sentinel
    sentinel_master_name: master
    modules_base_url: "https://artifacts.example.com/redis/modules"
    memory_reserve_percent: 75
    persistence_presets:
      rdb:
        save: "900 1 300 10 60 10000"
        appendonly: "no"
    redis_config:
      maxmemory:        "256mb"
      maxmemory-policy: allkeys-lru
      maxclients:       10000
      timeout:          300
    system_acl_users:
      default_admin: "~* &* +@all"
      replica:    "+psync +replconf +ping"
      monitoring: "-@all +@connection +client +ping +info +config|get +cluster|info +slowlog +latency +memory +select +command|count +command|docs"
      sentinel:   "allchannels +multi +slaveof +ping +exec +subscribe +config|rewrite +role +publish +info +client|setname +client|kill +script|kill"
      haproxy:    "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +info +cluster|info"
    system_acl_users_sentinel:
      default_admin: "allchannels allkeys +@all"
      monitoring: "-@all +@connection -command +client -hello +info -auth +sentinel|masters +sentinel|replicas +sentinel|slaves +sentinel|sentinels +sentinel|ckquorum"
      sentinel:   "allchannels -@all +auth +client|getname +client|id +client|setname +command +hello +ping +sentinel|is-master-down-by-addr +publish +role +sentinel|get-master-addr-by-name +sentinel|master +sentinel|myid +sentinel|replicas +sentinel|sentinels"
      haproxy:    "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +sentinel|get-master-addr-by-name +sentinel|master +sentinel|myid +sentinel|replicas +sentinel|sentinels"

    # Directive catalog (subset of series 7.4) — activates the assert validator.
    redis_directives:
      "7.4":
        - maxmemory
        - maxmemory-policy
        - maxclients
        - timeout
        - appendonly
        - appendfsync
        - save

  input:
    # ★ provision disabled (default-on: an omitted section = ENABLED; the case deploys onto
    # a READY roster, cloud-create isn't needed) → include redis-provision.yml group-drop.
    provision:
      enabled: false
    redis_type: sentinel
    version: "7.4.1"
    persistence: rdb
    redis_settings:
      # TYPO: should be maxmemory. The name is NOT in the series 7.2 catalog → assert false.
      maxmemoyr: "512mb"

# The run aborts at render: assert "Validate redis_settings directive names…" is false.
# The substring is the message of the assert rule (create/main.yml).
expect_render_error: "redis_settings contains an unknown redis.conf directive for the selected Redis version"
