# L0-испытание version-aware валидатора (assert, #6) — НЕГАТИВ «правильная директива,
# ЧУЖАЯ версия». Это guard на САМУЮ суть version-awareness: directive bgsave-cpulist —
# РЕАЛЬНАЯ директива redis.conf, но появилась в Redis 8.x (есть в каталоге[8.2], НЕТ в
# каталоге[7.4]). Оператор выбрал version 7.4.1 (серия 7.4, enum выкаченных в Nexus
# сборок) → assert обязан отвергнуть bgsave-cpulist: на redis 7.4 такой директивы нет,
# redis-server упал бы с ошибкой конфига. Проверяет, что валидатор сверяет имя именно с
# НАБОРОМ ВЫБРАННОЙ серии, а не с «любой версией Redis» (иначе опечатки ловились бы, а
# version-drift — нет).
#
# В каталоге fixture несём ОБЕ серии (7.4 и 8.2): bgsave-cpulist ∈ 8.2, ∉ 7.4. Версия
# 7.4.1 матчит только серию 7.4 (regex `^([0-9]+:)?7.4[.]`), членство проверяется
# против 7.4 → false. Серия 8.2 для этой версии вакуумно-true (тернар) и НЕ спасает.
name: redis_settings with a directive from a newer Redis series aborts at render (version mismatch)

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  hosts:
    - sid: node-solo.example.com
      covens: [create]
      soulprint:
        network: { primary_ip: 10.0.0.5 }
        os: { arch: amd64 }
  vault:
    secret/redis/create:
      password: s3cr3t-redis-pass-create
    # ★ РЕДИЗАЙН default_admin (2026-06-30): default_admin — системный юзер
    # внутрикластерного AUTH (auth_pass/PING шаги деплоя читают его по ветке users/<name>).
    secret/redis/create/users/default_admin:
      password: default-admin-secret-pass
    secret/redis/create/users/replica:
      password: replica-sys-secret-pass
    secret/redis/create/users/monitoring:
      password: monitoring-sys-secret-pass
    secret/redis/create/users/sentinel:
      password: sentinel-sys-secret-pass
    secret/redis/create/users/haproxy:
      password: haproxy-sys-secret-pass
  essence:
    redis_type: sentinel
    sentinel_master_name: master
    modules_base_url: "https://artifacts.example.com/redis/modules"
    memory_reserve_percent: 75
    persistence_presets:
      rdb:
        save: "900 1 300 10 60 10000"
        appendonly: "no"
    redis_config:
      maxmemory:        "256mb"
      maxmemory-policy: allkeys-lru
      maxclients:       10000
      timeout:          300
    system_acl_users:
      default_admin: "~* &* +@all"
      replica:    "+psync +replconf +ping"
      monitoring: "-@all +@connection +client +ping +info +config|get +cluster|info +slowlog +latency +memory +select +command|count +command|docs"
      sentinel:   "allchannels +multi +slaveof +ping +exec +subscribe +config|rewrite +role +publish +info +client|setname +client|kill +script|kill"
      haproxy:    "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +info +cluster|info"
    system_acl_users_sentinel:
      default_admin: "allchannels allkeys +@all"
      monitoring: "-@all +@connection -command +client -hello +info -auth +sentinel|masters +sentinel|replicas +sentinel|slaves +sentinel|sentinels +sentinel|ckquorum"
      sentinel:   "allchannels -@all +auth +client|getname +client|id +client|setname +command +hello +ping +sentinel|is-master-down-by-addr +publish +role +sentinel|get-master-addr-by-name +sentinel|master +sentinel|myid +sentinel|replicas +sentinel|sentinels"
      haproxy:    "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +sentinel|get-master-addr-by-name +sentinel|master +sentinel|myid +sentinel|replicas +sentinel|sentinels"

    # Каталог с ДВУМЯ сериями: bgsave-cpulist есть только в 8.2 (введена в Redis 8.x).
    redis_directives:
      "7.4":
        - maxmemory
        - maxmemory-policy
        - maxclients
        - timeout
        - appendonly
        - save
      "8.2":
        - maxmemory
        - maxmemory-policy
        - maxclients
        - timeout
        - appendonly
        - save
        - bgsave-cpulist

  input:
    redis_type: sentinel
    version: "7.4.1"
    persistence: rdb
    redis_settings:
      # Реальная директива, но из Redis 8.x — на серии 7.4 её НЕТ → assert false.
      bgsave-cpulist: "0-3"

# Прогон обрывается на render: assert «Validate redis_settings directive names…» false
# (bgsave-cpulist ∉ каталог[7.4]). Подстрока — message assert-правила.
expect_render_error: "redis_settings содержит неизвестную директиву redis.conf для выбранной версии Redis"
