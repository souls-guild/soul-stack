# L0-испытание size-guard create в режиме cluster — FAIL-ветка (mismatch), assert:.
# Roster из 4 хостов, но shards=3, replicas_per_shard=0 → ожидается 3*(1+0)=3 хоста.
# 4 != 3 → size-guard (assert:, ADR-009 amendment 2026-06-23) вычисляет предикат
# that[0] в FALSE на РЕНДЕРЕ Keeper-side → render ОБРЫВАЕТСЯ ошибкой с message
# "topology mismatch: ..." ДО dispatch (ни одной задачи на Soul, прогон не стартует).
# Это «fail на этапе модели» — главная цель пилота assert:. Прежний механизм
# (core.cmd.shell, отрендеренное "false" в test-cmd) заменён: теперь это НЕ задача,
# а keeper-side precondition, и harness ассертит ОБРЫВ рендера через
# expect_render_error (ADR-023 amendment) — render-успеха быть не должно.
#
# Парный с cluster-create-3shards (true-ветка size-guard): тот же предикат, на
# совпадающей топологии render проходит и cluster-build на месте.
name: cluster size-guard aborts render on topology mismatch (4 hosts != 3 shards)

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  # 4 хоста против shards=3 → mismatch → assert that[0] false → render abort.
  hosts:
    - sid: node-a.example.com
      covens: [create, redis]
      soulprint:
        network: { primary_ip: 10.0.0.1 }
    - sid: node-b.example.com
      covens: [create, redis]
      soulprint:
        network: { primary_ip: 10.0.0.2 }
    - sid: node-c.example.com
      covens: [create, redis]
      soulprint:
        network: { primary_ip: 10.0.0.3 }
    - sid: node-d.example.com
      covens: [create, redis]
      soulprint:
        network: { primary_ip: 10.0.0.4 }
  vault:
    secret/redis/create:
      password: s3cr3t-redis-pass-create
  essence:
    redis_type: cluster
    modules_base_url: "https://artifacts.example.com/redis/modules"
    memory_reserve_percent: 75
    persistence_presets:
      rdb:
        save: "900 1 300 10 60 10000"
        appendonly: "no"
    redis_config:
      maxmemory:        "256mb"
      maxmemory-policy: allkeys-lru
      maxclients:       10000
      timeout:          300

  input:
    redis_type: cluster
    # version ОБЯЗАТЕЛЬНА (директива пользователя 2026-06-23): фиксированный
    # distro-native пин (мажор < 8 → version-gate модулей не активен).
    version: "7.2.4"
    # modules_base_url обязателен на Redis < 8 (директива «модули ВСЕГДА ВСЕ»): иначе
    # validate[3] 422-нул бы ДО render, скрыв ожидаемый ниже size-guard render-error.
    shards: 3
    replicas_per_master: 0

# Render ОБРЫВАЕТСЯ assert-провалом size-guard-а: ожидаем ошибку рендера с message
# из assert. expect_render_error взаимоисключим с assert.rendered_tasks (плана нет —
# прогон не стартовал).
expect_render_error: "topology mismatch"
