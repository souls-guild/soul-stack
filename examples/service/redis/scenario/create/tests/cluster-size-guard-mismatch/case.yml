# L0-испытание size-guard create в режиме cluster — FAIL-ветка (mismatch).
# Roster из 4 хостов, но shards=3, replicas_per_shard=0 → ожидается 3*(1+0)=3
# хоста. 4 != 3 → size-guard вычисляет булево "false", и cmd принимает форму
# `test "false" = "true" || { echo ...; exit 1; }` — при исполнении ноды (L2/live)
# это рвёт прогон fail-fast ДО любого install. На L0 (render-only) доказывается
# именно ТРАНСЛЯЦИЯ guard-а в fail-форму (отрендеренное "false"); вместе с
# cluster-create-3shards (true-ветка) обе полярности size-guard покрыты.
#
# Парный с cluster-create-3shards: тот же guard-предикат, противоположный исход.
name: cluster size-guard fails on topology mismatch (4 hosts != 3 shards)

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  # 4 хоста против shards=3 → mismatch.
  hosts:
    - sid: node-a.example.com
      covens: [create, redis]
      soulprint:
        network: { primary_ip: 10.0.0.1 }
    - sid: node-b.example.com
      covens: [create, redis]
      soulprint:
        network: { primary_ip: 10.0.0.2 }
    - sid: node-c.example.com
      covens: [create, redis]
      soulprint:
        network: { primary_ip: 10.0.0.3 }
    - sid: node-d.example.com
      covens: [create, redis]
      soulprint:
        network: { primary_ip: 10.0.0.4 }
  vault:
    secret/redis/create:
      password: s3cr3t-redis-pass-create
  essence:
    redis_type: cluster
    memory_reserve_percent: 75
    persistence_presets:
      rdb:
        save: "900 1 300 10 60 10000"
        appendonly: "no"
    redis_config:
      maxmemory:        "256mb"
      maxmemory-policy: allkeys-lru
      maxclients:       10000
      timeout:          300

  input:
    redis_type: cluster
    shards: 3
    replicas_per_shard: 0

assert:
  rendered_tasks:
    # size-guard FAIL-форма: 4 == 3*(1+0) → false → "false" встроено в test.
    # При исполнении сработает || { echo ...; exit 1; } — fail-fast.
    - index: 2
      module: core.cmd.shell
      params:
        cmd: 'test "false" = "true" || { echo "topology mismatch: hosts != shards*(1+replicas_per_shard)"; exit 1; }'
