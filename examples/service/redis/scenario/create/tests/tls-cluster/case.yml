# L0-испытание: TLS cluster (only-TLS). Guard: при tls_enable+tls_only в режиме
# cluster merged config несёт TLS-директивы ВКЛЮЧАЯ tls-cluster yes (cluster-bus
# шифруется) + port 0 (plain закрыт); cluster-build плагин коннектится к нодам ПО
# TLS (tls=true, tls_ca, addr-ы на tls_port). cert/CA/порт — host-инвариант (один
# на кластер) → через apply.input (резолв на targeted[0] корректен).
name: tls cluster adds tls-cluster directive and builds over TLS on tls_only

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  hosts:
    - sid: node-b.example.com
      covens: [create, redis]
      soulprint:
        network: { primary_ip: 10.0.0.2 }
        os: { arch: amd64 }
    - sid: node-c.example.com
      covens: [create, redis]
      soulprint:
        network: { primary_ip: 10.0.0.3 }
        os: { arch: amd64 }
    - sid: node-a.example.com
      covens: [create, redis]
      soulprint:
        network: { primary_ip: 10.0.0.1 }
        os: { arch: amd64 }
  vault:
    secret/redis/create:
      password: s3cr3t-redis-pass-create
    # Per-user секреты системных юзеров (secret/redis/<inc>/users/<name>#password) —
    # их резолвит keeper-side vault() при доливе system_acl_users в apply.input.users.
    # ★ РЕДИЗАЙН default_admin (2026-06-30): default_admin — системный юзер внутрикластерного
    # AUTH (PING/cluster-build/masterauth деплоя читают его пароль той же ветки users/<name>).
    secret/redis/create/users/default_admin:
      password: default-admin-secret-pass
    secret/redis/create/users/replica:
      password: replica-sys-secret-pass
    secret/redis/create/users/monitoring:
      password: monitoring-sys-secret-pass
    secret/redis/create/users/sentinel:
      password: sentinel-sys-secret-pass
    secret/redis/create/users/haproxy:
      password: haproxy-sys-secret-pass
    secret/services/redis/tls:
      cert: "-----BEGIN CERTIFICATE-----\nSERVERCERT\n-----END CERTIFICATE-----"
      key:  "-----BEGIN PRIVATE KEY-----\nSERVERKEY\n-----END PRIVATE KEY-----"
      ca:   "-----BEGIN CERTIFICATE-----\nCACERT\n-----END CERTIFICATE-----"
  essence:
    # install_method — в essence (author-context, 2026-06-28): способ установки
    # НЕ operator-input. compute.install читает default(essence.install_method, 'binary').
    install_method: package
    redis_type: cluster
    modules_base_url: "https://artifacts.example.com/redis/modules"
    memory_reserve_percent: 75
    persistence_presets:
      rdb:
        save: "900 1 300 10 60 10000"
        appendonly: "no"
    redis_config:
      maxmemory:        "256mb"
      maxmemory-policy: allkeys-lru
      maxclients:       10000
      timeout:          300
    # ★ #5: порт/refs — в essence; режим канала — input.connection_mode (tls = only-TLS).
    tls_port:   7379
    tls_cert_ref: "secret/services/redis/tls#cert"
    tls_key_ref:  "secret/services/redis/tls#key"
    tls_ca_ref:   "secret/services/redis/tls#ca"

    # Системные ACL-юзеры redis-server (1:1 из essence/_default.yaml). ОБЯЗАТЕЛЬНЫ:
    # guard create/cluster.yml (assert 1b) рвёт render при пустом system_acl_users
    # (тихий fail-open недопустим — без них репликация/health-check сломались бы).
    # ★ РЕДИЗАЙН default_admin (2026-06-30): default_admin — системный юзер полного доступа
    # (~* &* +@all), под ним внутрикластерный AUTH cluster (заменил requirepass-default).
    system_acl_users:
      default_admin: "~* &* +@all"
      replica:    "+psync +replconf +ping"
      monitoring: "-@all +@connection +client +ping +info +config|get +cluster|info +slowlog +latency +memory +select +command|count +command|docs"
      sentinel:   "allchannels +multi +slaveof +ping +exec +subscribe +config|rewrite +role +publish +info +client|setname +client|kill +script|kill"
      haproxy:    "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +info +cluster|info"
  input:
    # ★ provision выключен (default-on: опущенная секция = ВКЛЮЧЕНО; кейс деплоит на
    # ГОТОВЫЙ roster, cloud-create не нужен) → include redis-provision.yml group-drop.
    provision:
      enabled: false
    redis_type: cluster
    # version ОБЯЗАТЕЛЬНА: enum выкаченных в Nexus сборок (мажор < 8 → version-gate
    # модулей не активен). 7.4.1 — серия 7.x, как прежний distro-пин 7.2.4.
    version: "7.4.1"
    shards: 3
    replicas_per_master: 0
    cluster_node_timeout: 5000
    # ★ Редизайн: connection_mode=tls — только-TLS (plain закрыт, port 0, tls-cluster yes).
    connection_mode: tls

assert:
  # size-guard PASS — assert: (ADR-009 amendment), в план не эмитится.
  task_present:
    # redis.conf: merged config с cluster + TLS (вкл. tls-cluster yes) + port 0.
    # Дизамбигуатор от users.acl/hardening — path.
    - module: core.file.rendered
      params_subset:
        path: /etc/redis/redis.conf
        render_context:
          vars:
            conf_dir: /etc/redis
            data_dir: /var/lib/redis
            port: 6379
            run_dir: /var/run/redis
            log_dir: /var/log/redis
            loadmodules:
              - /var/lib/redis/modules/redisbloom.so
              - /var/lib/redis/modules/rejson.so
              - /var/lib/redis/modules/redisearch.so
              - /var/lib/redis/modules/redistimeseries.so
            config:
              # ★ РЕДИЗАЙН default_admin: replica→master AUTH (masteruser/masterauth)
              # приходит ОБЫЧНЫМИ директивами config (cluster deploy-body доливает их
              # vault()-в-ячейке). В only-TLS репликация идёт по TLS (tls-replication yes
              # выше), masterauth маскируется seal-слоем.
              masteruser:       "default_admin"
              masterauth:       "default-admin-secret-pass"
              port: "0"
              tls-port: "7379"
              tls-cert-file: /etc/redis/tls/redis.crt
              tls-key-file: /etc/redis/tls/redis.key
              tls-ca-cert-file: /etc/redis/tls/ca.crt
              tls-replication: "yes"
              tls-cluster: "yes"
              maxmemory:        "256mb"
              maxmemory-policy: allkeys-lru
              maxclients:       10000
              timeout:          300
              save:             "900 1 300 10 60 10000"
              appendonly:       "no"
              cluster-enabled:      "yes"
              cluster-config-file:  "nodes.conf"
              cluster-node-timeout: "5000"
          self:
            sid: node-a.example.com
            covens: [create, redis]
            choirs: []
            # traits — registry-проекция (ADR-060), пустой объект без меток.
            traits: {}
            role: ""
            network:
              primary_ip: 10.0.0.1
            os:
              arch: amd64
          role: ""
          essence: {}

    # cluster-build: nodes-MAP на tls_port (7379), tls=true + tls_ca (плагин по TLS) +
    # mTLS client-cert (tls_cert/tls_key для взаимного cluster-bus, tls-cluster yes).
    # Единственная community.redis.cluster в плане.
    - module: community.redis.cluster
      params_subset:
        action: create
        replicas_per_shard: 0
        # ★ РЕДИЗАЙН default_admin: коннект под default_admin (username → AUTH). Прежний
        # главный секрет ДРОПНУТ — пароль из ветки users/default_admin.
        username: default_admin
        password: default-admin-secret-pass
        tls: true
        tls_ca: "-----BEGIN CERTIFICATE-----\nCACERT\n-----END CERTIFICATE-----"
        tls_cert: "-----BEGIN CERTIFICATE-----\nSERVERCERT\n-----END CERTIFICATE-----"
        tls_key: "-----BEGIN PRIVATE KEY-----\nSERVERKEY\n-----END PRIVATE KEY-----"
        nodes:
          node-a.example.com: { addr: "10.0.0.1:7379" }
          node-b.example.com: { addr: "10.0.0.2:7379" }
          node-c.example.com: { addr: "10.0.0.3:7379" }

  state_changes:
    redis_type: cluster
    redis_version: "7.4.1"
    connection_mode: tls
    redis_config:
      port: "0"
      tls-port: "7379"
      tls-cert-file: /etc/redis/tls/redis.crt
      tls-key-file: /etc/redis/tls/redis.key
      tls-ca-cert-file: /etc/redis/tls/ca.crt
      tls-replication: "yes"
      tls-cluster: "yes"
      maxmemory:        "256mb"
      maxmemory-policy: allkeys-lru
      maxclients:       10000
      timeout:          300
      save:             "900 1 300 10 60 10000"
      appendonly:       "no"
      cluster-enabled:      "yes"
      cluster-config-file:  "nodes.conf"
      cluster-node-timeout: "5000"
    redis_users: []
    redis_hosts: []
