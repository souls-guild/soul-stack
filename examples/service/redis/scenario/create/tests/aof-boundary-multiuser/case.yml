# L0-испытание create (standalone) — guard на пробелы покрытия QA 2026-06-22:
#   - persistence: aof  → save="" + appendonly yes (пресет aof, не rdb);
#   - memory_mb=64 (ГРАНИЦА min) → 64*75/100=48 → maxmemory "48mb" (НЕ "0mb":
#     именно ради ненулевого результата стоит min:64, см. input.memory_mb);
#   - maxmemory_policy НЕ задан → берётся из essence (allkeys-lru), has-guard не
#     материализует пустой ключ;
#   - ≥2 ACL-юзера с именами, НАРУШАЮЩИМИ порядок вставки (zeta/alpha/mike) →
#     users рендерится MAP-ом (детерминизм порядка строк users.acl; прямой
#     order-guard на отрендеренный файл — destiny_redis_tmpl_test.go).
name: aof + memory boundary 64mb + essence policy fallback + multi-user map

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  hosts:
    - sid: node-solo.example.com
      covens: [create]
      soulprint:
        network: { primary_ip: 10.0.0.5 }
        os: { arch: amd64 }
  vault:
    secret/redis/create:
      password: s3cr3t-redis-pass-create
    # Per-user секреты системных юзеров (secret/redis/<inc>/users/<name>#password) —
    # их резолвит keeper-side vault() при доливе system_acl_users в apply.input.users.
    secret/redis/create/users/replica:
      password: replica-sys-secret-pass
    secret/redis/create/users/monitoring:
      password: monitoring-sys-secret-pass
    secret/redis/create/users/sentinel:
      password: sentinel-sys-secret-pass
    secret/redis/create/users/haproxy:
      password: haproxy-sys-secret-pass
    secret/redis/create/users/zeta:
      password: zeta-secret-pass
    secret/redis/create/users/alpha:
      password: alpha-secret-pass
    secret/redis/create/users/mike:
      password: mike-secret-pass
  essence:
    # install_method — в essence (author-context, 2026-06-28): способ установки
    # НЕ operator-input. compute.install читает default(essence.install_method, 'binary').
    install_method: package
    redis_type: sentinel
    sentinel_master_name: master
    modules_base_url: "https://artifacts.example.com/redis/modules"
    memory_reserve_percent: 75
    persistence_presets:
      off:
        save: ""
        appendonly: "no"
      aof_1sec:
        save: ""
        appendonly: "yes"
      rdb:
        save: "900 1 300 10 60 10000"
        appendonly: "no"
      rdb_aof_1sec:
        save: "900 1 300 10 60 10000"
        appendonly: "yes"
    redis_config:
      maxmemory:        "256mb"
      maxmemory-policy: allkeys-lru
      maxclients:       10000
      timeout:          300

    # Системные ACL-юзеры redis-server + sentinel-демона (1:1 из essence/_default.yaml).
    # ОБА ОБЯЗАТЕЛЬНЫ: guard create/sentinel.yml (assert 1b) рвёт render при пустом
    # любом из наборов (тихий fail-open недопустим — без них репликация/sentinel↔redis
    # AUTH сломались бы).
    system_acl_users:
      replica:    "+psync +replconf +ping"
      monitoring: "-@all +@connection +client +ping +info +config|get +cluster|info +slowlog +latency +memory +select +command|count +command|docs"
      sentinel:   "allchannels +multi +slaveof +ping +exec +subscribe +config|rewrite +role +publish +info +client|setname +client|kill +script|kill"
      haproxy:    "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +info +cluster|info"
    system_acl_users_sentinel:
      default:    "allchannels allkeys +@all"
      monitoring: "-@all +@connection -command +client -hello +info -auth +sentinel|masters +sentinel|replicas +sentinel|slaves +sentinel|sentinels +sentinel|ckquorum"
      sentinel:   "allchannels -@all +auth +client|getname +client|id +client|setname +command +hello +ping +sentinel|is-master-down-by-addr +publish +role +sentinel|get-master-addr-by-name +sentinel|master +sentinel|myid +sentinel|replicas +sentinel|sentinels"
      haproxy:    "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +sentinel|get-master-addr-by-name +sentinel|master +sentinel|myid +sentinel|replicas +sentinel|sentinels"
  input:
    redis_type: sentinel
    # version ОБЯЗАТЕЛЬНА (директива пользователя 2026-06-23): фиксированный
    # distro-native пин (мажор < 8 → version-gate модулей не активен).
    version: "7.4.1"
    # single-host roster (1 хост) → реплик нет (sentinel size-guard = 1+0 = 1).
    replicas_per_master: 0
    memory_mb: 64
    persistence: aof_1sec
    # maxmemory_policy НЕ задан — должен прийти из essence (allkeys-lru).
    users:
      - { name: zeta, perms: "~* +@all", state: "on" }
      - { name: alpha, perms: "~app:* +@read", state: "on" }
      - { name: mike, perms: "~m:* +@write", state: "off" }

assert:
  task_present:
    - module: core.pkg.installed
      params_subset:
        name: redis-server
        version: "7.4.1"

    # users.acl: MAP трёх юзеров. Порядок строк гарантирует range по map (шаблон);
    # здесь ассертим лишь СОСТАВ map-а (значения order-independent). Дизамбигуатор от
    # redis.conf (тот же core.file.rendered) — path в params_subset.
    - module: core.file.rendered
      params_subset:
        path: /etc/redis/users.acl
        template_content: "<present>"
        mode: "0640"
        owner: redis
        group: redis
        render_context:
          vars:
            # СИСТЕМНЫЕ (4, из essence.system_acl_users, доливаются ОБЯЗАТЕЛЬНО — guard 1b)
            # + operator-extra zeta/alpha/mike (last-wins). Имена не пересекаются с системными.
            users:
              replica:
                perms: "+psync +replconf +ping"
                state: "on"
                password: replica-sys-secret-pass
              monitoring:
                perms: "-@all +@connection +client +ping +info +config|get +cluster|info +slowlog +latency +memory +select +command|count +command|docs"
                state: "on"
                password: monitoring-sys-secret-pass
              sentinel:
                perms: "allchannels +multi +slaveof +ping +exec +subscribe +config|rewrite +role +publish +info +client|setname +client|kill +script|kill"
                state: "on"
                password: sentinel-sys-secret-pass
              haproxy:
                perms: "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +info +cluster|info"
                state: "on"
                password: haproxy-sys-secret-pass
              zeta:
                perms: "~* +@all"
                state: "on"
                password: zeta-secret-pass
              alpha:
                perms: "~app:* +@read"
                state: "on"
                password: alpha-secret-pass
              mike:
                perms: "~m:* +@write"
                state: "off"
                password: mike-secret-pass
          self:
            sid: node-solo.example.com
            covens: [create]
            choirs: []
            # traits — registry-проекция (ADR-060), пустой объект без меток.
            traits: {}
            role: ""
            network:
              primary_ip: 10.0.0.5
            os:
              arch: amd64
          role: ""
          essence: {}

    # redis.conf: ИТОГ merge() — главный guard этого кейса.
    - module: core.file.rendered
      params_subset:
        path: /etc/redis/redis.conf
        template_content: "<present>"
        mode: "0640"
        owner: redis
        group: redis
        render_context:
          vars:
            password: s3cr3t-redis-pass-create
            conf_dir: /etc/redis
            data_dir: /var/lib/redis
            port: 6379
            run_dir: /var/run/redis
            log_dir: /var/log/redis
            loadmodules:
              - /var/lib/redis/modules/redisbloom.so
              - /var/lib/redis/modules/rejson.so
              - /var/lib/redis/modules/redisearch.so
              - /var/lib/redis/modules/redistimeseries.so
            config:
              # ГРАНИЦА: 64*75/100=48 → "48mb" (НЕ "0mb"). Перекрыл essence "256mb".
              maxmemory: "48mb"
              # maxmemory_policy НЕ задан в input → из essence (has-guard: пустой
              # ключ не материализован, дефолт не затёрт).
              maxmemory-policy: allkeys-lru
              maxclients: 10000
              timeout: 300
              # persistence-пресет aof: save пуст, appendonly yes.
              save: ""
              appendonly: "yes"
          self:
            sid: node-solo.example.com
            covens: [create]
            choirs: []
            # traits — registry-проекция (ADR-060), пустой объект без меток.
            traits: {}
            role: ""
            network:
              primary_ip: 10.0.0.5
            os:
              arch: amd64
          role: ""
          essence: {}

  state_changes:
    redis_type: sentinel
    redis_version: "7.4.1"
    # DRIFT-GUARD: идентичен apply.input.config (index 3).
    redis_config:
      maxmemory: "48mb"
      maxmemory-policy: allkeys-lru
      maxclients: 10000
      timeout: 300
      save: ""
      appendonly: "yes"
    redis_users:
      - { name: zeta, perms: "~* +@all", state: "on" }
      - { name: alpha, perms: "~app:* +@read", state: "on" }
      - { name: mike, perms: "~m:* +@write", state: "off" }
    redis_hosts: []
