# L0 test create (standalone) - host-tuning extras are UNCONDITIONAL
# (transparent-hugepages + logrotate + sysctl, WITHOUT tcp_bbr). All three
# extras are a Redis / hardening recommendation, NOT an operator choice: there are no operator
# flags, tasks at the tail of destiny `redis` render ALWAYS (no toggle, so there is
# no longer a counter-case for "disabled"). Guards that THP + logrotate + sysctl
# render on default input.
#
# Extras are mode-agnostic and host-invariant; sysctl_settings is an essence
# data table (not in operator input), reaching destiny via apply.input.
#
# Tail indices of destiny (standalone run: mode-guard 0, destiny 1..21, PING 22;
# manual daemon-reloads removed - core.service does the reload itself; sysctl is ONE
# task core.sysctl.applied, the module writes the drop-in + reload itself):
#   16 - render disable-thp.service (core.file.rendered);
#   17 - disable-thp service.running;
#   18 - render logrotate (/etc/logrotate.d/redis);
#   19 - sysctl bulk drop-in (core.sysctl.applied, /etc/sysctl.d/30-redis.conf).
name: host-tuning extras always render (thp + logrotate + sysctl)

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  hosts:
    - sid: node-solo.example.com
      covens: [create]
      soulprint:
        network: { primary_ip: 10.0.0.5 }
        os: { arch: amd64 }
  vault:
    secret/redis/create:
      password: s3cr3t-redis-pass-create
    # Per-user secrets for system users (secret/redis/<inc>/users/<name>#password) -
    # resolved by keeper-side vault() when topping up system_acl_users into apply.input.users.
    # star REDESIGN default_admin (2026-06-30): default_admin is the system user
    # for in-cluster AUTH (auth_pass/PING deploy steps read it via the users/<name> branch).
    secret/redis/create/users/default_admin:
      password: default-admin-secret-pass
    secret/redis/create/users/replica:
      password: replica-sys-secret-pass
    secret/redis/create/users/monitoring:
      password: monitoring-sys-secret-pass
    secret/redis/create/users/sentinel:
      password: sentinel-sys-secret-pass
    secret/redis/create/users/haproxy:
      password: haproxy-sys-secret-pass
  essence:
    redis_type: sentinel
    sentinel_master_name: master
    modules_base_url: "https://artifacts.example.com/redis/modules"
    memory_reserve_percent: 75
    persistence_presets:
      off:
        save: ""
        appendonly: "no"
      aof_1sec:
        save: ""
        appendonly: "yes"
      rdb:
        save: "900 1 300 10 60 10000"
        appendonly: "no"
      rdb_aof_1sec:
        save: "900 1 300 10 60 10000"
        appendonly: "yes"
    redis_config:
      maxmemory:        "256mb"
      maxmemory-policy: allkeys-lru
      maxclients:       10000
      timeout:          300
    # sysctl data table (trimmed down for the test; determinism of row order
    # is checked by render_context.vars.sysctl_settings below).
    sysctl_settings:
      vm.overcommit_memory: "1"
      vm.swappiness:        "1"
      net.core.somaxconn:   "65535"

    # System ACL users for redis-server + the sentinel daemon (1:1 with essence/_default.yaml).
    # BOTH ARE REQUIRED: the create/sentinel.yml guard (assert 1b) breaks the render if
    # either set is empty (silent fail-open is unacceptable - without them replication/sentinel<->redis
    # AUTH would break).
    system_acl_users:
      default_admin: "~* &* +@all"
      replica:    "+psync +replconf +ping"
      monitoring: "-@all +@connection +client +ping +info +config|get +cluster|info +slowlog +latency +memory +select +command|count +command|docs"
      sentinel:   "allchannels +multi +slaveof +ping +exec +subscribe +config|rewrite +role +publish +info +client|setname +client|kill +script|kill"
      haproxy:    "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +info +cluster|info"
    system_acl_users_sentinel:
      default_admin: "allchannels allkeys +@all"
      monitoring: "-@all +@connection -command +client -hello +info -auth +sentinel|masters +sentinel|replicas +sentinel|slaves +sentinel|sentinels +sentinel|ckquorum"
      sentinel:   "allchannels -@all +auth +client|getname +client|id +client|setname +command +hello +ping +sentinel|is-master-down-by-addr +publish +role +sentinel|get-master-addr-by-name +sentinel|master +sentinel|myid +sentinel|replicas +sentinel|sentinels"
      haproxy:    "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +sentinel|get-master-addr-by-name +sentinel|master +sentinel|myid +sentinel|replicas +sentinel|sentinels"
  input:
    # star provision disabled (default-on: an omitted section = ENABLED; the case deploys onto
    # a READY roster, cloud-create is not needed) -> include redis-provision.yml group-drop.
    provision:
      enabled: false
    redis_type: sentinel
    # version is REQUIRED (user directive 2026-06-23): a fixed
    # distro-native pin (major < 8 -> module version-gate not active).
    version: "7.4.1"
    # single-host sentinel roster (1 host) -> no replicas (size-guard 1+0).
    replicas_per_master: 0
    # No more extras flags in the contract: THP/logrotate/sysctl are unconditional.

assert:
  task_present:
    # -- transparent-hugepages --------------------------------------------------
    # Disambiguator from redis.conf/users.acl/logrotate/hardening (same
    # core.file.rendered) - path.
    - module: core.file.rendered
      params_subset:
        path: /etc/systemd/system/disable-thp.service
        template_content: "<present>"
        mode: "0644"
        owner: root
        group: root

    # daemon-reload removed: core.service (daemon_reload: auto) re-reads the unit itself
    # before enable/start. Disambiguator from redis-server service.running - name.
    - module: core.service.running
      params_subset:
        name: disable-thp
        enabled: true

    # -- logrotate (unconditional) -----------------------------------------------
    - module: core.file.rendered
      params_subset:
        path: /etc/logrotate.d/redis
        template_content: "<present>"
        mode: "0644"
        owner: root
        group: root

    # -- sysctl bulk drop-in (unconditional) --------------------------------------
    # core.sysctl.applied: the module itself writes a deterministic drop-in from a map
    # (sorted keys) + a targeted sysctl -p on change (reload: auto), it does not mark
    # the change itself. settings come from essence (passed via apply.input). ignore_failures
    # -> `sysctl -e -p` (container mode). The only core.sysctl.applied in the plan.
    - module: core.sysctl.applied
      params_subset:
        filename: 30-redis
        reload: auto
        ignore_failures: true
        settings:
          vm.overcommit_memory: "1"
          vm.swappiness:        "1"
          net.core.somaxconn:   "65535"

    # standalone PING: cluster/sentinel PING branches are placeholder-skip (without params);
    # disambiguator - addr/args in params_subset.
    - module: community.redis.command
      params_subset:
        addr: "127.0.0.1:6379"
        username: default_admin
        password: default-admin-secret-pass
        args: ["PING"]
