# L0-испытание create (standalone) — host-tuning extras БЕЗУСЛОВНЫ (концепция
# Ansible-роли: transparent-hugepages + logrotate + sysctl, БЕЗ tcp_bbr). Все три
# extras — рекомендация Redis / hardening, НЕ выбор оператора: операторских флагов
# нет, задачи в хвосте destiny `redis` рендерятся ВСЕГДА (никакого toggle, поэтому
# контр-кейса на «отключено» больше нет). Guard на то, что THP + logrotate + sysctl
# рендерятся при дефолтном входе.
#
# Extras — режим-агностичны и host-инвариантны; sysctl_settings — данные-таблица
# essence (не во входе оператора), доезжает в destiny через apply.input.
#
# Индексы хвоста destiny (standalone-прогон: mode-guard 0, destiny 1..21, PING 22;
# ручные daemon-reload убраны — core.service делает reload сам; sysctl — ОДНА
# задача core.sysctl.applied, модуль сам пишет drop-in + reload):
#   16 — render disable-thp.service (core.file.rendered);
#   17 — disable-thp service.running;
#   18 — render logrotate (/etc/logrotate.d/redis);
#   19 — sysctl bulk drop-in (core.sysctl.applied, /etc/sysctl.d/30-redis.conf).
name: host-tuning extras always render (thp + logrotate + sysctl)

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  hosts:
    - sid: node-solo.example.com
      covens: [create]
      soulprint:
        network: { primary_ip: 10.0.0.5 }
        os: { arch: amd64 }
  vault:
    secret/redis/create:
      password: s3cr3t-redis-pass-create
    # Per-user секреты системных юзеров (secret/redis/<inc>/users/<name>#password) —
    # их резолвит keeper-side vault() при доливе system_acl_users в apply.input.users.
    secret/redis/create/users/replica:
      password: replica-sys-secret-pass
    secret/redis/create/users/monitoring:
      password: monitoring-sys-secret-pass
    secret/redis/create/users/sentinel:
      password: sentinel-sys-secret-pass
    secret/redis/create/users/haproxy:
      password: haproxy-sys-secret-pass
  essence:
    redis_type: sentinel
    sentinel_master_name: master
    modules_base_url: "https://artifacts.example.com/redis/modules"
    memory_reserve_percent: 75
    persistence_presets:
      off:
        save: ""
        appendonly: "no"
      aof_1sec:
        save: ""
        appendonly: "yes"
      rdb:
        save: "900 1 300 10 60 10000"
        appendonly: "no"
      rdb_aof_1sec:
        save: "900 1 300 10 60 10000"
        appendonly: "yes"
    redis_config:
      maxmemory:        "256mb"
      maxmemory-policy: allkeys-lru
      maxclients:       10000
      timeout:          300
    # Данные-таблица sysctl (усечённая для теста, детерминизм порядка строк
    # проверяет render_context.vars.sysctl_settings ниже).
    sysctl_settings:
      vm.overcommit_memory: "1"
      vm.swappiness:        "1"
      net.core.somaxconn:   "65535"

    # Системные ACL-юзеры redis-server + sentinel-демона (1:1 из essence/_default.yaml).
    # ОБА ОБЯЗАТЕЛЬНЫ: guard create/sentinel.yml (assert 1b) рвёт render при пустом
    # любом из наборов (тихий fail-open недопустим — без них репликация/sentinel↔redis
    # AUTH сломались бы).
    system_acl_users:
      replica:    "+psync +replconf +ping"
      monitoring: "-@all +@connection +client +ping +info +config|get +cluster|info +slowlog +latency +memory +select +command|count +command|docs"
      sentinel:   "allchannels +multi +slaveof +ping +exec +subscribe +config|rewrite +role +publish +info +client|setname +client|kill +script|kill"
      haproxy:    "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +info +cluster|info"
    system_acl_users_sentinel:
      default:    "allchannels allkeys +@all"
      monitoring: "-@all +@connection -command +client -hello +info -auth +sentinel|masters +sentinel|replicas +sentinel|slaves +sentinel|sentinels +sentinel|ckquorum"
      sentinel:   "allchannels -@all +auth +client|getname +client|id +client|setname +command +hello +ping +sentinel|is-master-down-by-addr +publish +role +sentinel|get-master-addr-by-name +sentinel|master +sentinel|myid +sentinel|replicas +sentinel|sentinels"
      haproxy:    "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +sentinel|get-master-addr-by-name +sentinel|master +sentinel|myid +sentinel|replicas +sentinel|sentinels"
  input:
    redis_type: sentinel
    # version ОБЯЗАТЕЛЬНА (директива пользователя 2026-06-23): фиксированный
    # distro-native пин (мажор < 8 → version-gate модулей не активен).
    version: "7.4.1"
    # single-host sentinel roster (1 хост) → реплик нет (size-guard 1+0).
    replicas_per_master: 0
    # Флагов extras в контракте больше НЕТ: THP/logrotate/sysctl безусловны.

assert:
  task_present:
    # ── transparent-hugepages ───────────────────────────────────────────────
    # Дизамбигуатор от redis.conf/users.acl/logrotate/hardening (тот же
    # core.file.rendered) — path.
    - module: core.file.rendered
      params_subset:
        path: /etc/systemd/system/disable-thp.service
        template_content: "<present>"
        mode: "0644"
        owner: root
        group: root

    # daemon-reload убран: core.service (daemon_reload: auto) сам перечитывает unit
    # перед enable/start. Дизамбигуатор от redis-server service.running — name.
    - module: core.service.running
      params_subset:
        name: disable-thp
        enabled: true

    # ── logrotate (безусловно) ──────────────────────────────────────────────
    - module: core.file.rendered
      params_subset:
        path: /etc/logrotate.d/redis
        template_content: "<present>"
        mode: "0644"
        owner: root
        group: root

    # ── sysctl bulk drop-in (безусловно) ────────────────────────────────────
    # core.sysctl.applied: модуль сам пишет детерминированный drop-in из map
    # (sorted keys) + точечный sysctl -p при изменении (reload: auto), сам change
    # не помечает. settings — из essence (передан через apply.input). ignore_failures
    # → `sysctl -e -p` (контейнерный режим). Единственная core.sysctl.applied в плане.
    - module: core.sysctl.applied
      params_subset:
        filename: 30-redis
        reload: auto
        ignore_failures: true
        settings:
          vm.overcommit_memory: "1"
          vm.swappiness:        "1"
          net.core.somaxconn:   "65535"

    # standalone-PING: cluster/sentinel PING-ветки — placeholder-skip (без params);
    # дизамбигуатор — addr/args в params_subset.
    - module: community.redis.command
      params_subset:
        addr: "127.0.0.1:6379"
        password: s3cr3t-redis-pass-create
        args: ["PING"]
