# L0-испытание create (standalone) — VERSION-GUARD Redis 8+: модули ВСТРОЕНЫ в
# сервер → .so НЕ качаем и loadmodule НЕ пишем. Контр-кейс к modules-no-checksum-standalone
# (Redis 6 → полный набор активен). Директива «модули ВСЕГДА ВСЕ» = для Redis < 8;
# на Redis 8+ — builtin-skip.
#
# Корень гейта (ПЕРЕЕХАЛ В DESTINY): version-guard теперь в самой destiny (раньше
# scenario обнулял modules). redis8 истинно, когда эффективная версия (input.version
# distro-пин ИЛИ input.install.version upstream) мажором >= 8: regex
# ^([0-9]+:)?(8|9|двузначный мажор)\. На version=8.0.0:
#   - include modules.yml gated на deploy_redis && !redis8 → redis8 истинно → conditional-
#     include group-drop: ВЕСЬ файл (modules-dir + fetch-loop) ФИЗИЧЕСКИ отсутствует в
#     плане (не placeholder — задачи не рендерятся, indices не резервируются);
#   - loadmodules-ячейка redis.conf: redis8 → [] → секции loadmodule нет;
#   - state.modules = [] (compute.redis_modules_deployed: redis8 → []).
# План идентичен modules-empty (presence-форма — позиционные индексы не сверяются).
#
# Упрощение (brief): version-guard по версии (мажор), полную version-matrix
# совместимости модулей НЕ тащим. version не задан → НЕ гейтим (fail-closed на Redis).
name: redis 8 version guard skips module download (modules builtin)

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  hosts:
    - sid: node-solo.example.com
      covens: [create]
      soulprint:
        network: { primary_ip: 10.0.0.5 }
        os: { arch: amd64 }
  vault:
    secret/redis/create:
      password: s3cr3t-redis-pass-create
    # Per-user секреты системных юзеров (secret/redis/<inc>/users/<name>#password) —
    # их резолвит keeper-side vault() при доливе system_acl_users в apply.input.users.
    secret/redis/create/users/replica:
      password: replica-sys-secret-pass
    secret/redis/create/users/monitoring:
      password: monitoring-sys-secret-pass
    secret/redis/create/users/sentinel:
      password: sentinel-sys-secret-pass
    secret/redis/create/users/haproxy:
      password: haproxy-sys-secret-pass
  essence:
    redis_type: sentinel
    sentinel_master_name: master
    modules_base_url: "https://artifacts.example.com/redis/modules/8.0"
    memory_reserve_percent: 75
    persistence_presets:
      off:
        save: ""
        appendonly: "no"
      aof:
        save: ""
        appendonly: "yes"
      rdb:
        save: "900 1 300 10 60 10000"
        appendonly: "no"
      rdb_aof:
        save: "900 1 300 10 60 10000"
        appendonly: "yes"
    redis_config:
      maxmemory:        "256mb"
      maxmemory-policy: allkeys-lru
      maxclients:       10000
      timeout:          300

    # Системные ACL-юзеры redis-server + sentinel-демона (1:1 из essence/_default.yaml).
    # ОБА ОБЯЗАТЕЛЬНЫ: guard create/sentinel.yml (assert 1b) рвёт render при пустом
    # любом из наборов (тихий fail-open недопустим — без них репликация/sentinel↔redis
    # AUTH сломались бы).
    system_acl_users:
      replica:    "+psync +replconf +ping"
      monitoring: "-@all +@connection +client +ping +info +config|get +cluster|info +slowlog +latency +memory +select +command|count +command|docs"
      sentinel:   "allchannels +multi +slaveof +ping +exec +subscribe +config|rewrite +role +publish +info +client|setname +client|kill +script|kill"
      haproxy:    "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +info +cluster|info"
    system_acl_users_sentinel:
      default:    "allchannels allkeys +@all"
      monitoring: "-@all +@connection -command +client -hello +info -auth +sentinel|masters +sentinel|replicas +sentinel|slaves +sentinel|sentinels +sentinel|ckquorum"
      sentinel:   "allchannels -@all +auth +client|getname +client|id +client|setname +command +hello +ping +sentinel|is-master-down-by-addr +publish +role +sentinel|get-master-addr-by-name +sentinel|master +sentinel|myid +sentinel|replicas +sentinel|sentinels"
      haproxy:    "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +sentinel|get-master-addr-by-name +sentinel|master +sentinel|myid +sentinel|replicas +sentinel|sentinels"
  input:
    redis_type: sentinel
    version: "8.0.0"
    # Redis 8+ → version-guard гасит модули (встроены в сервер). modules_base_url задан,
    # но на 8+ не используется (URL не строится — include modules.yml group-drop).

assert:
  task_present:
    # redis.conf БЕЗ loadmodules (version-gate → пустой список): vars.loadmodules: [].
    # Дизамбигуатор от users.acl/hardening — path.
    - module: core.file.rendered
      params_subset:
        path: /etc/redis/redis.conf
        template_content: "<present>"
        mode: "0640"
        owner: redis
        group: redis
        render_context:
          vars:
            password: s3cr3t-redis-pass-create
            conf_dir: /etc/redis
            data_dir: /var/lib/redis
            loadmodules: []
            config:
              maxmemory: "256mb"
              maxmemory-policy: allkeys-lru
              maxclients: 10000
              timeout: 300
              save: "900 1 300 10 60 10000"
              appendonly: "no"
          self:
            sid: node-solo.example.com
            covens: [create]
            choirs: []
            # traits — registry-проекция (ADR-060), пустой объект без меток.
            traits: {}
            role: ""
            network:
              primary_ip: 10.0.0.5
            os:
              arch: amd64
          role: ""
          essence: {}

    # standalone-PING: cluster/sentinel ветки — placeholder-skip; дизамбигуатор
    # addr/args.
    - module: community.redis.command
      params_subset:
        addr: "127.0.0.1:6379"
        password: s3cr3t-redis-pass-create
        args: ["PING"]

  task_absent:
    # VERSION-GATE Redis 8+: include modules.yml gated на deploy_redis && !redis8 →
    # group-drop (modules-dir отсутствует в плане). Guard «Redis 8 НЕ создаёт modules-dir».
    # Дизамбигуатор от активного systemd-dropin-dir (тот же core.file.directory) — path.
    - module: core.file.directory
      params_subset:
        path: /var/lib/redis/modules
    # .so fetch: include modules.yml group-dropped → fetch-loop в плане отсутствует.
    # Guard «Redis 8 НЕ качает .so». Дизамбигуатор от tarball-fetch placeholder — path.
    - module: core.url.fetched
      params_subset:
        path: /var/lib/redis/modules/redisearch.so

  state_changes:
    redis_type: sentinel
    redis_version: "8.0.0"
    redis_config:
      maxmemory: "256mb"
      maxmemory-policy: allkeys-lru
      maxclients: 10000
      timeout: 300
      save: "900 1 300 10 60 10000"
      appendonly: "no"
    redis_users: {}
    redis_hosts: []
    redis_sentinel:
      master_name: master
      quorum: 0
    # Redis 8+ → модули встроены, .so не качаются → развёрнутый набор пуст.
    modules: []
