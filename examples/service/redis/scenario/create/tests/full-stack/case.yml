# L0-испытание (Trial, ADR-023) сценария create сервиса redis (режим standalone,
# redis-консолидация концепции Ansible-роли). ГЛАВНЫЙ guard этого слайса —
# трансляция ПРОСТОГО типизированного ввода оператора в детальный redis.conf через
# merge() (SHALLOW last-wins) + render users.acl с полными ACL-строками.
#
# Render-only, герметично. План = задачи destiny `redis` (изолированный
# render-проход, ADR-009) + задача community.redis.command (PING health-gate).
# Изоляция видна по тому, что params destiny собраны из её apply.input, а не из
# scenario-scope.
#
# Что ассертим (критерий приёмки слайса):
#   1. ВЫЧИСЛЕННЫЙ maxmemory: memory_mb=1024 * reserve=75 / 100 = 768 → "768mb"
#      (computed-слой перекрыл essence-дефолт "256mb").
#   2. save/appendonly из persistence-пресета (rdb): save непустой, appendonly no.
#   3. LAST-WINS на КОНФЛИКТУЮЩЕМ ключе: timeout есть и в essence-дефолте (300), и
#      в redis_settings оператора (60) → в merged 60 (passthrough бьёт дефолт).
#   4. maxmemory-policy из input (volatile-lru) перекрыл essence (allkeys-lru).
#   5. passthrough redis_settings (tcp-backlog) долетел в merged.
#   6. users.acl отрендерен с ПОЛНОЙ ACL-строкой оператора; пароль юзера —
#      keeper-side vault()-резолв по конвенции secret/redis/<inc>/users/<name>.
#
# Пароли резолвятся KEEPER-SIDE через CEL vault() в render-фазе (templating.md
# §2.3/§4): requirepass — secret/redis/<inc>#password; per-user —
# secret/redis/<inc>/users/<name>#password. incarnation.name в L0 = имя сценария
# (create). fixtures.vault мокает Vault KV → в плане уже ЗНАЧЕНИЕ (ADR-012).
name: create translates simple input to merged redis.conf + users.acl

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  soulprint:
    network:
      primary_ip: 10.0.0.5
    os:
      arch: amd64
  # Мок Vault KV: requirepass + пароль ACL-юзера app. secret/-префикс снимается
  # нормализацией fixtureVault; #-поле — ключ внутри секрета.
  vault:
    secret/redis/create:
      password: s3cr3t-redis-pass-create
    secret/redis/create/users/app:
      password: app-user-secret-pass
  # essence — слой трансляции: persistence_presets (данные-таблица),
  # memory_reserve_percent (резерв ОС), redis_config (merge-подложка дефолтов).
  essence:
    redis_type: standalone
    memory_reserve_percent: 75
    persistence_presets:
      off:
        save: ""
        appendonly: "no"
      aof:
        save: ""
        appendonly: "yes"
      rdb:
        save: "900 1 300 10 60 10000"
        appendonly: "no"
      rdb_aof:
        save: "900 1 300 10 60 10000"
        appendonly: "yes"
    redis_config:
      maxmemory:        "256mb"
      maxmemory-policy: allkeys-lru
      maxclients:       10000
      timeout:          300

# Простой типизированный ввод оператора. memory_mb + persistence + policy + один
# ACL-юзер с полной ACL-строкой + passthrough redis_settings с КОНФЛИКТУЮЩИМ
# ключом (timeout).
  input:
    redis_type: standalone
    version: "5:7.0.15-1~deb12u7"
    modules_base_url: "https://artifacts.example.com/redis/modules"
    memory_mb: 1024
    persistence: rdb
    maxmemory_policy: volatile-lru
    users:
      app:
        perms: "~app:* +@read +@write -@dangerous"
        state: "on"
    redis_settings:
      timeout: 60
      tcp-backlog: 511

# PRESENCE-форма (assert-by-presence, PILOT новой модели L0): ассертим НАЛИЧИЕ
# вызова задачи в плане, не её ПОЗИЦИЮ (индексы хрупки — съезжают от любой правки
# destiny). Каждая задача идентифицируется module + различающим подмножеством
# params (path/name) через params_subset; полный params в presence не нужен,
# матч частичен по-ключно (лишние ключи рендера совпадению не мешают). Выключенный
# include sentinel.yml (sentinel в режиме standalone) — task_absent: его задачи
# group-dropped (физически отсутствуют, conditional-include group-drop), поэтому не
# матчатся — guard «sentinel-демон в standalone НЕ разворачивается».
assert:
  task_present:
    # ── destiny redis (standalone) ──────────────────────────────────────────
    # core.cmd.shell mode-guard (диспетчер по redis_type) и socket-dir
    # (when: config.unixsocket — static-skip, unixsocket нет) НЕ ассертим: первый
    # — no-op "true", второй — выключенная ветка.
    - module: core.pkg.installed
      params_subset:
        name: redis-server
        version: "5:7.0.15-1~deb12u7"

    # users.acl: MAP имя→{perms,state,password} с ПОЛНОЙ ACL-строкой +
    # keeper-side vault()-пароль. ПОЧЕМУ map, а не список: range по map в шаблоне
    # сортирует ключи → детерминизм порядка строк (regress-guard на tiling-баг
    # 2026-06-22; прямой order-guard — destiny_redis_tmpl_test.go). Дизамбигуатор
    # от redis.conf-задачи — path в params_subset (обе core.file.rendered с тем же
    # when), плюс явный register-якорь redis_acl.
    - module: core.file.rendered
      id: redis_acl
      params_subset:
        path: /etc/redis/users.acl
        template_content: "<present>"
        mode: "0640"
        owner: redis
        group: redis
        render_context:
          vars:
            users:
              app:
                perms: "~app:* +@read +@write -@dangerous"
                state: "on"
                # Per-user пароль — keeper-side vault()-резолв (plaintext в плане,
                # хешируется sha256 уже в шаблоне). Ассерт ловит регресс резолва.
                password: app-user-secret-pass
          self:
            sid: trial-host
            covens: [create]
            choirs: []
            role: ""
            network:
              primary_ip: 10.0.0.5
            os:
              arch: amd64
          role: ""
          essence: {}

    # redis.conf: ИТОГ merge(). Здесь живёт главный guard трансляции. Дизамбигуатор
    # от users.acl — register-якорь redis_conf + path.
    - module: core.file.rendered
      id: redis_conf
      params_subset:
        path: /etc/redis/redis.conf
        template_content: "<present>"
        mode: "0640"
        owner: redis
        group: redis
        render_context:
          vars:
            password: s3cr3t-redis-pass-create
            loadmodules:
              - /var/lib/redis/modules/redisbloom.so
              - /var/lib/redis/modules/rejson.so
              - /var/lib/redis/modules/redisearch.so
              - /var/lib/redis/modules/redistimeseries.so
            config:
              # computed: 1024*75/100=768 → "768mb" (перекрыл essence "256mb").
              maxmemory: "768mb"
              # input.maxmemory_policy перекрыл essence allkeys-lru.
              maxmemory-policy: volatile-lru
              # essence-дефолт без конфликта.
              maxclients: 10000
              # LAST-WINS: redis_settings.timeout (60) перекрыл essence (300).
              timeout: 60
              # persistence-пресет rdb.
              save: "900 1 300 10 60 10000"
              appendonly: "no"
              # passthrough redis_settings долетел.
              tcp-backlog: 511
          self:
            sid: trial-host
            covens: [create]
            choirs: []
            role: ""
            network:
              primary_ip: 10.0.0.5
            os:
              arch: amd64
          role: ""
          essence: {}

    # redis-server: enabled-at-boot. Дизамбигуатор от sentinel-демона
    # (core.service.running redis-sentinel — group-dropped, include sentinel.yml
    # выключен) — name.
    - module: core.service.running
      params_subset:
        name: redis-server
        enabled: true

    - module: core.service.restarted
      params_subset:
        name: redis-server

    # ── community.redis.command (PING health-gate) ──────────────────────────
    # addr localhost, пароль — тот же requirepass vault()-резолв, args [PING].
    # cluster/sentinel PING-ветки — placeholder-skip (без params), дизамбигуатор —
    # args/addr в params_subset.
    - module: community.redis.command
      params_subset:
        addr: "127.0.0.1:6379"
        password: s3cr3t-redis-pass-create
        args: ["PING"]

  task_absent:
    # GUARD «standalone НЕ разворачивает sentinel-демон»: include tasks/sentinel.yml
    # gated на input.sentinel_enabled (отсутствует → conditional-include group-drop).
    # Её sentinel.conf и сам демон ФИЗИЧЕСКИ отсутствуют в плане (include дропнут
    # целиком, не placeholder). Регресс «sentinel протёк в standalone» = задача
    # отрендерится с реальными params → match → fail task_absent.
    - module: core.file.rendered
      params_subset:
        path: /etc/redis/sentinel.conf
    - module: core.service.running
      params_subset:
        name: redis-sentinel

  # Регресс на класс багов «state_changes падает на render» + сверка ИТОГА
  # трансляции, записываемого в incarnation.state (тот же merge(), что ушёл в
  # render redis.conf — единый источник истины).
  #
  # DRIFT-GUARD: redis_config ниже ОБЯЗАН быть БИТ-В-БИТ равен apply.input.config
  # (index 3 выше) — оба собраны одним inline-merge() в scenario create. Если они
  # разойдутся (например правка одного merge без другого), day-2-сценарий увидит
  # ложный дрифт «state ≠ live config». Дублирование значений в ассерте намеренно:
  # это и есть guard на синхронность двух inline-merge.
  state_changes:
    redis_type: standalone
    redis_version: "5:7.0.15-1~deb12u7"
    redis_config:
      maxmemory: "768mb"
      maxmemory-policy: volatile-lru
      maxclients: 10000
      timeout: 60
      save: "900 1 300 10 60 10000"
      appendonly: "no"
      tcp-backlog: 511
    redis_users:
      app:
        perms: "~app:* +@read +@write -@dangerous"
        state: "on"
    redis_hosts: []
    # standalone — не sentinel → redis_sentinel пуст.
    redis_sentinel: {}
    # ── namedfields (read-model, v3): NON-ZERO/NON-EMPTY guard. memory_mb=1024 и
    # maxmemory_policy=volatile-lru заданы оператором → ровно эти значения (read-model
    # хранит НАМЕРЕНИЕ, не вычисленный maxmemory "768mb"). persistence=rdb.
    memory_mb: 1024
    maxmemory_policy: volatile-lru
    persistence: rdb
    install:
      method: package
    tls:
      enable:   false
      only:     false
      port:     7379
      cert_ref: ""
      key_ref:  ""
      ca_ref:   ""
    modules: [bloom, json, search, timeseries]
    sysctl_settings: {}
    shards: 0
    replicas: 0
    sentinel_quorum: 0
