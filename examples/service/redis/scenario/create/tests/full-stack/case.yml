# L0-испытание (Trial, ADR-023) сценария create сервиса redis (режим sentinel single-
# host = 1 master + 0 реплик, standalone-эквивалент; redis-консолидация концепции
# Ansible-роли). ГЛАВНЫЙ guard этого слайса — трансляция ПРОСТОГО типизированного
# ввода оператора в детальный redis.conf через merge() (SHALLOW last-wins) + render
# users.acl с полными ACL-строками.
#
# Render-only, герметично. План = задачи destiny `redis` (изолированный
# render-проход, ADR-009; включая sentinel.conf/демон) + community.redis.command
# (PING health-gate). Изоляция видна по тому, что params destiny собраны из её
# apply.input, а не из scenario-scope.
#
# Что ассертим (критерий приёмки слайса):
#   1. ВЫЧИСЛЕННЫЙ maxmemory: memory_mb=1024 * reserve=75 / 100 = 768 → "768mb"
#      (computed-слой перекрыл essence-дефолт "256mb").
#   2. save/appendonly из persistence-пресета (rdb): save непустой, appendonly no.
#   3. LAST-WINS на КОНФЛИКТУЮЩЕМ ключе: timeout есть и в essence-дефолте (300), и
#      в redis_settings оператора (60) → в merged 60 (passthrough бьёт дефолт).
#   4. maxmemory-policy из input (volatile-lru) перекрыл essence (allkeys-lru).
#   5. passthrough redis_settings (tcp-backlog) долетел в merged.
#   6. users.acl отрендерен с ПОЛНОЙ ACL-строкой оператора; пароль юзера —
#      keeper-side vault()-резолв по конвенции secret/redis/<inc>/users/<name>.
#
# Пароли резолвятся KEEPER-SIDE через CEL vault() в render-фазе (templating.md
# §2.3/§4): requirepass — secret/redis/<inc>#password; per-user —
# secret/redis/<inc>/users/<name>#password. incarnation.name в L0 = имя сценария
# (create). fixtures.vault мокает Vault KV → в плане уже ЗНАЧЕНИЕ (ADR-012).
name: create translates simple input to merged redis.conf + users.acl

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  hosts:
    - sid: node-solo.example.com
      covens: [create]
      soulprint:
        network: { primary_ip: 10.0.0.5 }
        os: { arch: amd64 }
  # Мок Vault KV: requirepass + пароль ACL-юзера app. secret/-префикс снимается
  # нормализацией fixtureVault; #-поле — ключ внутри секрета.
  vault:
    secret/redis/create:
      password: s3cr3t-redis-pass-create
    # Per-user секреты системных юзеров (secret/redis/<inc>/users/<name>#password) —
    # их резолвит keeper-side vault() при доливе system_acl_users в apply.input.users.
    secret/redis/create/users/replica:
      password: replica-sys-secret-pass
    secret/redis/create/users/monitoring:
      password: monitoring-sys-secret-pass
    secret/redis/create/users/sentinel:
      password: sentinel-sys-secret-pass
    secret/redis/create/users/haproxy:
      password: haproxy-sys-secret-pass
    secret/redis/create/users/app:
      password: app-user-secret-pass
  # essence — слой трансляции: persistence_presets (данные-таблица),
  # memory_reserve_percent (резерв ОС), redis_config (merge-подложка дефолтов).
  essence:
    redis_type: sentinel
    sentinel_master_name: master
    modules_base_url: "https://artifacts.example.com/redis/modules"
    memory_reserve_percent: 75
    persistence_presets:
      off:
        save: ""
        appendonly: "no"
      aof:
        save: ""
        appendonly: "yes"
      rdb:
        save: "900 1 300 10 60 10000"
        appendonly: "no"
      rdb_aof:
        save: "900 1 300 10 60 10000"
        appendonly: "yes"
    redis_config:
      maxmemory:        "256mb"
      maxmemory-policy: allkeys-lru
      maxclients:       10000
      timeout:          300

# Простой типизированный ввод оператора. memory_mb + persistence + policy + один
# ACL-юзер с полной ACL-строкой + passthrough redis_settings с КОНФЛИКТУЮЩИМ
# ключом (timeout).
    # Системные ACL-юзеры redis-server + sentinel-демона (1:1 из essence/_default.yaml).
    # ОБА ОБЯЗАТЕЛЬНЫ: guard create/sentinel.yml (assert 1b) рвёт render при пустом
    # любом из наборов (тихий fail-open недопустим — без них репликация/sentinel↔redis
    # AUTH сломались бы).
    system_acl_users:
      replica:    "+psync +replconf +ping"
      monitoring: "-@all +@connection +client +ping +info +config|get +cluster|info +slowlog +latency +memory +select +command|count +command|docs"
      sentinel:   "allchannels +multi +slaveof +ping +exec +subscribe +config|rewrite +role +publish +info +client|setname +client|kill +script|kill"
      haproxy:    "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +info +cluster|info"
    system_acl_users_sentinel:
      default:    "allchannels allkeys +@all"
      monitoring: "-@all +@connection -command +client -hello +info -auth +sentinel|masters +sentinel|replicas +sentinel|slaves +sentinel|sentinels +sentinel|ckquorum"
      sentinel:   "allchannels -@all +auth +client|getname +client|id +client|setname +command +hello +ping +sentinel|is-master-down-by-addr +publish +role +sentinel|get-master-addr-by-name +sentinel|master +sentinel|myid +sentinel|replicas +sentinel|sentinels"
      haproxy:    "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +sentinel|get-master-addr-by-name +sentinel|master +sentinel|myid +sentinel|replicas +sentinel|sentinels"
  input:
    redis_type: sentinel
    version: "5:7.0.15-1~deb12u7"
    memory_mb: 1024
    persistence: rdb
    maxmemory_policy: volatile-lru
    users:
      - { name: app, perms: "~app:* +@read +@write -@dangerous", state: "on" }
    redis_settings:
      timeout: 60
      tcp-backlog: 511

# PRESENCE-форма (assert-by-presence, PILOT новой модели L0): ассертим НАЛИЧИЕ
# вызова задачи в плане, не её ПОЗИЦИЮ (индексы хрупки — съезжают от любой правки
# destiny). Каждая задача идентифицируется module + различающим подмножеством
# params (path/name) через params_subset; полный params в presence не нужен,
# матч частичен по-ключно (лишние ключи рендера совпадению не мешают). Выключенный
# include sentinel.yml (sentinel в режиме standalone) — task_absent: его задачи
# group-dropped (физически отсутствуют, conditional-include group-drop), поэтому не
# матчатся — guard «sentinel-демон в standalone НЕ разворачивается».
assert:
  task_present:
    # ── destiny redis (standalone) ──────────────────────────────────────────
    # core.cmd.shell mode-guard (диспетчер по redis_type) и socket-dir
    # (when: config.unixsocket — static-skip, unixsocket нет) НЕ ассертим: первый
    # — no-op "true", второй — выключенная ветка.
    - module: core.pkg.installed
      params_subset:
        name: redis-server
        version: "5:7.0.15-1~deb12u7"

    # users.acl: MAP имя→{perms,state,password} с ПОЛНОЙ ACL-строкой +
    # keeper-side vault()-пароль. ПОЧЕМУ map, а не список: range по map в шаблоне
    # сортирует ключи → детерминизм порядка строк (regress-guard на tiling-баг
    # 2026-06-22; прямой order-guard — destiny_redis_tmpl_test.go). Дизамбигуатор
    # от redis.conf-задачи — path в params_subset (обе core.file.rendered с тем же
    # when), плюс явный register-якорь redis_acl.
    - module: core.file.rendered
      id: redis_acl
      params_subset:
        path: /etc/redis/users.acl
        template_content: "<present>"
        mode: "0640"
        owner: redis
        group: redis
        render_context:
          vars:
            # СИСТЕМНЫЕ (4, из essence.system_acl_users, доливаются ОБЯЗАТЕЛЬНО — guard 1b)
            # + operator-extra app (last-wins). app не пересекается с системными именами.
            users:
              replica:
                perms: "+psync +replconf +ping"
                state: "on"
                password: replica-sys-secret-pass
              monitoring:
                perms: "-@all +@connection +client +ping +info +config|get +cluster|info +slowlog +latency +memory +select +command|count +command|docs"
                state: "on"
                password: monitoring-sys-secret-pass
              sentinel:
                perms: "allchannels +multi +slaveof +ping +exec +subscribe +config|rewrite +role +publish +info +client|setname +client|kill +script|kill"
                state: "on"
                password: sentinel-sys-secret-pass
              haproxy:
                perms: "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +info +cluster|info"
                state: "on"
                password: haproxy-sys-secret-pass
              app:
                perms: "~app:* +@read +@write -@dangerous"
                state: "on"
                # Per-user пароль — keeper-side vault()-резолв (plaintext в плане,
                # хешируется sha256 уже в шаблоне). Ассерт ловит регресс резолва.
                password: app-user-secret-pass
          self:
            sid: node-solo.example.com
            covens: [create]
            choirs: []
            # traits — registry-проекция (ADR-060), пустой объект без меток.
            traits: {}
            role: ""
            network:
              primary_ip: 10.0.0.5
            os:
              arch: amd64
          role: ""
          essence: {}

    # redis.conf: ИТОГ merge(). Здесь живёт главный guard трансляции. Дизамбигуатор
    # от users.acl — register-якорь redis_conf + path.
    - module: core.file.rendered
      id: redis_conf
      params_subset:
        path: /etc/redis/redis.conf
        template_content: "<present>"
        mode: "0640"
        owner: redis
        group: redis
        render_context:
          vars:
            password: s3cr3t-redis-pass-create
            conf_dir: /etc/redis
            data_dir: /var/lib/redis
            loadmodules:
              - /var/lib/redis/modules/redisbloom.so
              - /var/lib/redis/modules/rejson.so
              - /var/lib/redis/modules/redisearch.so
              - /var/lib/redis/modules/redistimeseries.so
            config:
              # computed: 1024*75/100=768 → "768mb" (перекрыл essence "256mb").
              maxmemory: "768mb"
              # input.maxmemory_policy перекрыл essence allkeys-lru.
              maxmemory-policy: volatile-lru
              # essence-дефолт без конфликта.
              maxclients: 10000
              # LAST-WINS: redis_settings.timeout (60) перекрыл essence (300).
              timeout: 60
              # persistence-пресет rdb.
              save: "900 1 300 10 60 10000"
              appendonly: "no"
              # passthrough redis_settings долетел.
              tcp-backlog: 511
          self:
            sid: node-solo.example.com
            covens: [create]
            choirs: []
            # traits — registry-проекция (ADR-060), пустой объект без меток.
            traits: {}
            role: ""
            network:
              primary_ip: 10.0.0.5
            os:
              arch: amd64
          role: ""
          essence: {}

    # redis-server: enabled-at-boot. Дизамбигуатор от sentinel-демона
    # (core.service.running redis-sentinel — sentinel.yml тоже активен в режиме
    # sentinel) — name.
    - module: core.service.running
      params_subset:
        name: redis-server
        enabled: true

    - module: core.service.restarted
      params_subset:
        name: redis-server

    # ── community.redis.command (PING health-gate) ──────────────────────────
    # addr localhost, пароль — тот же requirepass vault()-резолв, args [PID]. cluster
    # PING-ветка — placeholder-skip (без params), дизамбигуатор — args/addr в
    # params_subset. (sentinel PING на :26379 — отдельная задача, не матчится этим addr.)
    - module: community.redis.command
      params_subset:
        addr: "127.0.0.1:6379"
        password: s3cr3t-redis-pass-create
        args: ["PING"]

  # Регресс на класс багов «state_changes падает на render» + сверка ИТОГА
  # трансляции, записываемого в incarnation.state (тот же merge(), что ушёл в
  # render redis.conf — единый источник истины).
  #
  # DRIFT-GUARD: redis_config ниже ОБЯЗАН быть БИТ-В-БИТ равен apply.input.config
  # (index 3 выше) — оба собраны одним inline-merge() в scenario create. Если они
  # разойдутся (например правка одного merge без другого), day-2-сценарий увидит
  # ложный дрифт «state ≠ live config». Дублирование значений в ассерте намеренно:
  # это и есть guard на синхронность двух inline-merge.
  state_changes:
    redis_type: sentinel
    redis_version: "5:7.0.15-1~deb12u7"
    redis_config:
      maxmemory: "768mb"
      maxmemory-policy: volatile-lru
      maxclients: 10000
      timeout: 60
      save: "900 1 300 10 60 10000"
      appendonly: "no"
      tcp-backlog: 511
    redis_users:
      - { name: app, perms: "~app:* +@read +@write -@dangerous", state: "on" }
    redis_hosts: []
    # standalone — не sentinel → redis_sentinel пуст.
    redis_sentinel:
      master_name: master
      quorum: 0
      down_after_ms: 5000
      failover_timeout_ms: 60000
    # ── namedfields (read-model, v3): NON-ZERO/NON-EMPTY guard. memory_mb=1024 и
    # maxmemory_policy=volatile-lru заданы оператором → ровно эти значения (read-model
    # хранит НАМЕРЕНИЕ, не вычисленный maxmemory "768mb"). persistence=rdb.
    memory_mb: 1024
    maxmemory_policy: volatile-lru
    persistence: rdb
    install:
      method: package
    tls:
      enable:   false
      only:     false
      port:     7379
      cert_ref: ""
      key_ref:  ""
      ca_ref:   ""
    modules: [bloom, json, search, timeseries]
    sysctl_settings: {}
    shards: 0
    replicas: 0
    sentinel_quorum: 0
