# L0-испытание (Trial, ADR-023): TLS в режиме sentinel single-host (концепция
# Ansible-роли redis: redis_tls_*). TLS включён ИЗ ESSENCE (essence.tls_enable=true,
# оператор input.tls не задал) — back-compat: essence остаётся дефолтом, input.tls — опц.
# Главный guard слайса — что при включённом TLS:
#   1. PEM-файлы /etc/redis/tls/{redis.crt,redis.key,ca.crt} раскладываются
#      core.file.present (mode 0600, owner redis), content = vault(tls.<x>_ref) →
#      ЦЕЛЫЙ PEM в ячейке content задачи destiny (НЕ .tmpl, vault() в ячейке);
#   2. TLS-директивы (tls-port/tls-cert-file/tls-key-file/tls-ca-cert-file/
#      tls-replication) попали в merged config (range-ятся в redis.conf);
#   3. tls_only → `port 0` в config (plain закрыт);
#   4. health-gate PING несёт tls=true + addr на tls_port + tls_ca (плагин ОБЯЗАН
#      коннектиться по TLS, т.к. plain закрыт).
# cert/CA/порт — HOST-ИНВАРИАНТ (один на кластер) → через apply.input. PEM content
# = vault(ref) в САМОЙ ячейке → seal помечает sealed vault-слоем (маскинг в state/
# error_summary). Маскинг доказан отдельным кейсом tls-pem-sealed-masking.
#
# PRESENCE-форма (миграция с позиционной 2026-06-24): задачи идентифицируются
# module + params_subset; индексы не сверяются (хрупки). Три PEM-задачи
# (cert/key/ca) — один и тот же module core.file.present, дизамбигуируются по path
# (/etc/redis/tls/{redis.crt,redis.key,ca.crt}); каждая несёт СВОЙ content (PEM из
# vault) + mode 0600 — guard на права и на правильный материал в правильном файле.
name: tls enabled renders PEM files and TLS directives, port 0 on tls_only

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  hosts:
    - sid: node-solo.example.com
      covens: [create]
      soulprint:
        network: { primary_ip: 10.0.0.5 }
        os: { arch: amd64 }
  # Мок Vault: requirepass + TLS PEM-материал (cert/key/ca под secret/services/redis/tls).
  # scenario резолвит их из essence.tls_*_ref (доверенный путь автора).
  vault:
    secret/redis/create:
      password: s3cr3t-redis-pass-create
    # Per-user секреты системных юзеров (secret/redis/<inc>/users/<name>#password) —
    # их резолвит keeper-side vault() при доливе system_acl_users в apply.input.users.
    secret/redis/create/users/replica:
      password: replica-sys-secret-pass
    secret/redis/create/users/monitoring:
      password: monitoring-sys-secret-pass
    secret/redis/create/users/sentinel:
      password: sentinel-sys-secret-pass
    secret/redis/create/users/haproxy:
      password: haproxy-sys-secret-pass
    secret/services/redis/tls:
      cert: "-----BEGIN CERTIFICATE-----\nSERVERCERT\n-----END CERTIFICATE-----"
      key:  "-----BEGIN PRIVATE KEY-----\nSERVERKEY\n-----END PRIVATE KEY-----"
      ca:   "-----BEGIN CERTIFICATE-----\nCACERT\n-----END CERTIFICATE-----"
  essence:
    redis_type: sentinel
    sentinel_master_name: master
    modules_base_url: "https://artifacts.example.com/redis/modules"
    memory_reserve_percent: 75
    persistence_presets:
      rdb:
        save: "900 1 300 10 60 10000"
        appendonly: "no"
    redis_config:
      maxmemory:        "256mb"
      maxmemory-policy: allkeys-lru
      maxclients:       10000
      timeout:          300
    # ★ #5: TLS-параметры (порт, Vault-пути PEM) — в essence. Включение/закрытие plain
    # — операторские галочки input.tls_enabled/tls_keep_plain.
    tls_port:   7379
    tls_cert_ref: "secret/services/redis/tls#cert"
    tls_key_ref:  "secret/services/redis/tls#key"
    tls_ca_ref:   "secret/services/redis/tls#ca"

    # Системные ACL-юзеры redis-server + sentinel-демона (1:1 из essence/_default.yaml).
    # ОБА ОБЯЗАТЕЛЬНЫ: guard create/sentinel.yml (assert 1b) рвёт render при пустом
    # любом из наборов (тихий fail-open недопустим — без них репликация/sentinel↔redis
    # AUTH сломались бы).
    system_acl_users:
      replica:    "+psync +replconf +ping"
      monitoring: "-@all +@connection +client +ping +info +config|get +cluster|info +slowlog +latency +memory +select +command|count +command|docs"
      sentinel:   "allchannels +multi +slaveof +ping +exec +subscribe +config|rewrite +role +publish +info +client|setname +client|kill +script|kill"
      haproxy:    "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +info +cluster|info"
    system_acl_users_sentinel:
      default:    "allchannels allkeys +@all"
      monitoring: "-@all +@connection -command +client -hello +info -auth +sentinel|masters +sentinel|replicas +sentinel|slaves +sentinel|sentinels +sentinel|ckquorum"
      sentinel:   "allchannels -@all +auth +client|getname +client|id +client|setname +command +hello +ping +sentinel|is-master-down-by-addr +publish +role +sentinel|get-master-addr-by-name +sentinel|master +sentinel|myid +sentinel|replicas +sentinel|sentinels"
      haproxy:    "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +sentinel|get-master-addr-by-name +sentinel|master +sentinel|myid +sentinel|replicas +sentinel|sentinels"
  input:
    redis_type: sentinel
    # version ОБЯЗАТЕЛЬНА (директива пользователя 2026-06-23): фиксированный
    # distro-native пин (мажор < 8 → version-gate модулей не активен).
    version: "7.2.4"
    persistence: rdb
    # ★ #5: оператор включает TLS + закрывает plain-порт (only-TLS).
    tls_enabled: true
    tls_keep_plain: false

assert:
  task_present:
    # TLS dir (core.file.directory, when tls.enable → АКТИВЕН): /etc/redis/tls.
    - module: core.file.directory
      params_subset:
        path: /etc/redis/tls
        owner: redis
        group: redis
        mode: "0750"

    # TLS server cert: core.file.present, content = vault(tls.cert_ref) → ЦЕЛЫЙ PEM
    # в ячейке content (НЕ .tmpl/render_context: PEM через vault() в ячейке,
    # seal-маскинг vault-слоем). Дизамбигуатор от key/ca — path.
    - module: core.file.present
      params_subset:
        path: /etc/redis/tls/redis.crt
        content: "-----BEGIN CERTIFICATE-----\nSERVERCERT\n-----END CERTIFICATE-----"
        mode: "0600"
        owner: redis
        group: redis

    # TLS private key: core.file.present, content = vault(tls.key_ref) → секрет-PEM
    # в ячейке (sealed vault-слоем). Дизамбигуатор от cert/ca — path.
    - module: core.file.present
      params_subset:
        path: /etc/redis/tls/redis.key
        content: "-----BEGIN PRIVATE KEY-----\nSERVERKEY\n-----END PRIVATE KEY-----"
        mode: "0600"
        owner: redis
        group: redis

    # TLS CA cert: core.file.present, content = vault(tls.ca_ref). Дизамбигуатор
    # от cert/key — path.
    - module: core.file.present
      params_subset:
        path: /etc/redis/tls/ca.crt
        content: "-----BEGIN CERTIFICATE-----\nCACERT\n-----END CERTIFICATE-----"
        mode: "0600"
        owner: redis
        group: redis

    # redis.conf: merged config несёт TLS-директивы + port 0 (tls_only). КРИТИЧНО:
    # `port: "0"` — гарантия only-TLS (plain закрыт). Дизамбигуатор от users.acl/
    # hardening — path.
    - module: core.file.rendered
      params_subset:
        path: /etc/redis/redis.conf
        render_context:
          vars:
            password: s3cr3t-redis-pass-create
            conf_dir: /etc/redis
            data_dir: /var/lib/redis
            port: 6379
            run_dir: /var/run/redis
            log_dir: /var/log/redis
            loadmodules:
              - /var/lib/redis/modules/redisbloom.so
              - /var/lib/redis/modules/rejson.so
              - /var/lib/redis/modules/redisearch.so
              - /var/lib/redis/modules/redistimeseries.so
            config:
              # port 0 — plain закрыт (tls_only). КРИТИЧНО: гарантия only-TLS.
              port: "0"
              tls-port: "7379"
              tls-cert-file: /etc/redis/tls/redis.crt
              tls-key-file: /etc/redis/tls/redis.key
              tls-ca-cert-file: /etc/redis/tls/ca.crt
              tls-replication: "yes"
              # обычные директивы тоже на месте (TLS не вытеснил их).
              maxmemory: "256mb"
              maxmemory-policy: allkeys-lru
              maxclients: 10000
              timeout: 300
              save: "900 1 300 10 60 10000"
              appendonly: "no"
          self:
            sid: node-solo.example.com
            covens: [create]
            choirs: []
            # traits — registry-проекция (ADR-060), пустой объект без меток.
            traits: {}
            role: ""
            network:
              primary_ip: 10.0.0.5
            os:
              arch: amd64
          role: ""
          essence: {}

    # PING health-gate: при tls_only плагин по TLS (tls=true, addr на tls_port,
    # tls_ca = CA-PEM из vault). Доказывает «плагин ОБЯЗАН по TLS». cluster/sentinel
    # PING — placeholder-skip; дизамбигуатор addr/args.
    - module: community.redis.command
      params_subset:
        addr: "127.0.0.1:7379"
        password: s3cr3t-redis-pass-create
        tls: true
        tls_ca: "-----BEGIN CERTIFICATE-----\nCACERT\n-----END CERTIFICATE-----"
        args: ["PING"]

  # DRIFT-GUARD: redis_config в state ОБЯЗАН быть бит-в-бит равен apply.input.config
  # (redis.conf выше), включая TLS-директивы + port 0 (host-инвариант → пишутся в state).
  state_changes:
    redis_type: sentinel
    redis_version: "7.2.4"
    redis_config:
      port: "0"
      tls-port: "7379"
      tls-cert-file: /etc/redis/tls/redis.crt
      tls-key-file: /etc/redis/tls/redis.key
      tls-ca-cert-file: /etc/redis/tls/ca.crt
      tls-replication: "yes"
      maxmemory: "256mb"
      maxmemory-policy: allkeys-lru
      maxclients: 10000
      timeout: 300
      save: "900 1 300 10 60 10000"
      appendonly: "no"
    redis_users: []
    redis_hosts: []
    redis_sentinel:
      master_name: master
      quorum: 0
      down_after_ms: 5000
      failover_timeout_ms: 60000
    # ── namedfields (read-model, v3): из тех же compute.tls_*, что TLS-блок redis_config.
    # tls включён+only из essence → enable/only true, port 7379, refs из essence.
    tls:
      enable:   true
      only:     true
      port:     7379
      cert_ref: "secret/services/redis/tls#cert"
      key_ref:  "secret/services/redis/tls#key"
      ca_ref:   "secret/services/redis/tls#ca"
    install:
      method: package
    persistence: rdb
    memory_mb: 0
    maxmemory_policy: ""
    modules: [bloom, json, search, timeseries]
    sysctl_settings: {}
    shards: 0
    replicas: 0
    sentinel_quorum: 0
