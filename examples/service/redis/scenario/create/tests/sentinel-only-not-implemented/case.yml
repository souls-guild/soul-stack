# L0-испытание mode-guard диспетчера — FAIL-ветка для НЕРЕАЛИЗОВАННОГО режима.
# redis_type=sentinel_only входит в enum input.redis_type (зарезервирован под
# отдельный батч), но НИ ОДНА ветка диспетчера (standalone/cluster/sentinel) его
# не обрабатывает: все их задачи gated на свой redis_type → placeholder-skip.
# БЕЗ mode-guard это дало бы footgun «тихий зелёный no-op»: create проходит, Redis
# НЕ развёрнут. mode-guard (ПЕРВАЯ задача main.yml, БЕЗ when:) вычисляет KEEPER-SIDE
# булево «режим реализован»; для sentinel_only → "false" → встроенное в cmd
# `test "false" = "true" || { echo ...; exit 1; }` рвёт прогон fail-fast при
# исполнении ноды (L2/live). На L0 (render-only) доказывается ТРАНСЛЯЦИЯ guard-а в
# fail-форму с конкретным redis_type в echo.
#
# Этот же guard ловит ЛЮБОЙ будущий неучтённый режим (не только sentinel_only).
name: dispatcher guard fails on not-yet-implemented redis_type (sentinel_only)

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  hosts:
    - sid: node-solo.example.com
      covens: [create, redis]
      soulprint:
        network: { primary_ip: 10.0.0.9 }
        os: { arch: amd64 }
  vault:
    secret/redis/create:
      password: s3cr3t-redis-pass-create
  essence:
    redis_type: standalone
    memory_reserve_percent: 75
    persistence_presets:
      rdb:
        save: "900 1 300 10 60 10000"
        appendonly: "no"
    redis_config:
      maxmemory:        "256mb"
      maxmemory-policy: allkeys-lru
      maxclients:       10000
      timeout:          300

  input:
    redis_type: sentinel_only

assert:
  rendered_tasks:
    # mode-guard FAIL-форма (index 0): sentinel_only вне [standalone, cluster,
    # sentinel] → булево "false" → echo с конкретным redis_type + exit 1.
    - index: 0
      module: core.cmd.shell
      params:
        cmd: 'test "false" = "true" || { echo "redis_type=sentinel_only ещё не реализован (поддержаны: standalone, cluster, sentinel)"; exit 1; }'
