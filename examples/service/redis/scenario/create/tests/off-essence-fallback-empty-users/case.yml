# L0 create test (standalone) - guard for QA coverage gaps 2026-06-22:
#   - persistence: off -> save="" + appendonly no (off preset);
#   - memory_mb NOT set -> maxmemory comes from essence ("256mb"), the has-guard
#     does NOT materialize the computed layer (no false "0mb");
#   - maxmemory_policy NOT set -> comes from essence (allkeys-lru);
#   - input.users NOT set -> operator-extra is empty: redis_users in state is an empty map.
#     users.acl, however, is NOT empty - it contains the REQUIRED system users from essence
#     (replica/monitoring/sentinel/haproxy), without which the create/sentinel.yml guard
#     (assert 1b) would abort the render. "empty users" here means empty operator-extra,
#     NOT an empty users.acl (a silent fail-open is not allowed).
name: persistence off + essence maxmemory/policy fallback + empty operator users

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  hosts:
    - sid: node-solo.example.com
      covens: [create]
      soulprint:
        network: { primary_ip: 10.0.0.5 }
        os: { arch: amd64 }
  vault:
    secret/redis/create:
      password: s3cr3t-redis-pass-create
    # Per-user secrets of system users (secret/redis/<inc>/users/<name>#password) -
    # resolved by keeper-side vault() when merging system_acl_users into apply.input.users.
    # NOTE: default_admin redesign (2026-06-30): default_admin is the system user for
    # intra-cluster AUTH (auth_pass/PING deploy steps read it via the users/<name> branch).
    secret/redis/create/users/default_admin:
      password: default-admin-secret-pass
    secret/redis/create/users/replica:
      password: replica-sys-secret-pass
    secret/redis/create/users/monitoring:
      password: monitoring-sys-secret-pass
    secret/redis/create/users/sentinel:
      password: sentinel-sys-secret-pass
    secret/redis/create/users/haproxy:
      password: haproxy-sys-secret-pass
  essence:
    # install_method is in essence (author-context, 2026-06-28): the install method
    # is NOT operator-input. compute.install reads default(essence.install_method, 'binary').
    install_method: package
    redis_type: sentinel
    sentinel_master_name: master
    # System ACL users (1:1 from essence/_default.yaml) are REQUIRED: the
    # create/sentinel.yml guard (assert 1b) breaks the render if any set is empty.
    # operator-extra (input.users) is empty, so users.acl gets ONLY these system users.
    system_acl_users:
      default_admin: "~* &* +@all"
      replica:    "+psync +replconf +ping"
      monitoring: "-@all +@connection +client +ping +info +config|get +cluster|info +slowlog +latency +memory +select +command|count +command|docs"
      sentinel:   "allchannels +multi +slaveof +ping +exec +subscribe +config|rewrite +role +publish +info +client|setname +client|kill +script|kill"
      haproxy:    "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +info +cluster|info"
    system_acl_users_sentinel:
      default_admin: "allchannels allkeys +@all"
      monitoring: "-@all +@connection -command +client -hello +info -auth +sentinel|masters +sentinel|replicas +sentinel|slaves +sentinel|sentinels +sentinel|ckquorum"
      sentinel:   "allchannels -@all +auth +client|getname +client|id +client|setname +command +hello +ping +sentinel|is-master-down-by-addr +publish +role +sentinel|get-master-addr-by-name +sentinel|master +sentinel|myid +sentinel|replicas +sentinel|sentinels"
      haproxy:    "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +sentinel|get-master-addr-by-name +sentinel|master +sentinel|myid +sentinel|replicas +sentinel|sentinels"
    modules_base_url: "https://artifacts.example.com/redis/modules"
    memory_reserve_percent: 75
    persistence_presets:
      off:
        save: ""
        appendonly: "no"
      aof:
        save: ""
        appendonly: "yes"
      rdb:
        save: "900 1 300 10 60 10000"
        appendonly: "no"
      rdb_aof:
        save: "900 1 300 10 60 10000"
        appendonly: "yes"
    redis_config:
      maxmemory:        "256mb"
      maxmemory-policy: allkeys-lru
      maxclients:       10000
      timeout:          300

  input:
    # provision is disabled (default-on: an omitted section = ENABLED; this case deploys
    # onto an ALREADY-PROVISIONED roster, cloud-create is not needed) -> include redis-provision.yml group-drop.
    provision:
      enabled: false
    redis_type: sentinel
    # version is REQUIRED (enum of builds rolled out to Nexus): 7.4.1 - major < 8, so
    # the module version-gate is not active (the .so modules load).
    version: "7.4.1"
    # install_method=package EXPLICITLY: this case is about persistence/memory-fallback, not install.
    # redesign default is binary -> the package branch installs the distro package (assert core.pkg.installed).
    # replicas_per_master=0 EXPLICITLY (redesign default 2): single-host (node-solo), size-guard
    # sentinel = 1+0 = 1 host.
    replicas_per_master: 0
    persistence: off
    # memory_mb and maxmemory_policy are NOT set -> both come from essence.
    # users is not set.

assert:
  task_present:
    - module: core.pkg.installed
      params_subset:
        name: redis-server
        version: "7.4.1"

    # users.acl: operator-extra is empty (input.users not set), but system users are
    # REQUIRED -> users.acl gets exactly 4 system redis-server users (replica/monitoring/
    # sentinel/haproxy) from essence.system_acl_users, each with a per-user vault password.
    # An empty users.acl can never happen - that would be a silent fail-open (guard 1b
    # catches this). Disambiguator from redis.conf (the same core.file.rendered) is path.
    - module: core.file.rendered
      params_subset:
        path: /etc/redis/users.acl
        template_content: "<present>"
        mode: "0640"
        owner: redis
        group: redis
        render_context:
          vars:
            users:
              default_admin:
                perms: "~* &* +@all"
                state: "on"
                password: default-admin-secret-pass
              replica:
                perms: "+psync +replconf +ping"
                state: "on"
                password: replica-sys-secret-pass
              monitoring:
                perms: "-@all +@connection +client +ping +info +config|get +cluster|info +slowlog +latency +memory +select +command|count +command|docs"
                state: "on"
                password: monitoring-sys-secret-pass
              sentinel:
                perms: "allchannels +multi +slaveof +ping +exec +subscribe +config|rewrite +role +publish +info +client|setname +client|kill +script|kill"
                state: "on"
                password: sentinel-sys-secret-pass
              haproxy:
                perms: "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +info +cluster|info"
                state: "on"
                password: haproxy-sys-secret-pass
          self:
            sid: node-solo.example.com
            covens: [create]
            choirs: []
            # traits is a registry projection (ADR-060), an empty object with no labels.
            traits: {}
            role: ""
            network:
              primary_ip: 10.0.0.5
            os:
              arch: amd64
          role: ""
          essence: {}

    # redis.conf: maxmemory/policy come ENTIRELY from essence (computed layer is empty).
    - module: core.file.rendered
      params_subset:
        path: /etc/redis/redis.conf
        template_content: "<present>"
        mode: "0640"
        owner: redis
        group: redis
        render_context:
          vars:
            conf_dir: /etc/redis
            data_dir: /var/lib/redis
            port: 6379
            run_dir: /var/run/redis
            log_dir: /var/log/redis
            loadmodules:
              - /var/lib/redis/modules/redisbloom.so
              - /var/lib/redis/modules/rejson.so
              - /var/lib/redis/modules/redisearch.so
              - /var/lib/redis/modules/redistimeseries.so
            config:
              # default_admin redesign: replica->master AUTH (masteruser/
              # masterauth) arrives as REGULAR config directives (the sentinel
              # deploy-body fills them in via vault()-in-cell) -> redis.conf ranges
              # over them like any other directive -> they survive a restart statically.
              masteruser:       "default_admin"
              masterauth:       "default-admin-secret-pass"
              # has-guard: memory_mb not set -> computed maxmemory is NOT materialized
              # -> the essence default "256mb" remains (NOT "0mb").
              maxmemory: "256mb"
              maxmemory-policy: allkeys-lru
              maxclients: 10000
              timeout: 300
              # persistence off.
              save: ""
              appendonly: "no"
          self:
            sid: node-solo.example.com
            covens: [create]
            choirs: []
            # traits is a registry projection (ADR-060), an empty object with no labels.
            traits: {}
            role: ""
            network:
              primary_ip: 10.0.0.5
            os:
              arch: amd64
          role: ""
          essence: {}

  state_changes:
    redis_type: sentinel
    redis_version: "7.4.1"
    redis_config:
      maxmemory: "256mb"
      maxmemory-policy: allkeys-lru
      maxclients: 10000
      timeout: 300
      save: ""
      appendonly: "no"
    # Empty user map (clean state).
    redis_users: []
    redis_hosts: []
