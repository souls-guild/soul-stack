# L0-испытание top-level validate:-секции (ADR-009 amendment 2026-06-23, DSL wave 2):
# FAIL-ветка кросс-полевого input-инварианта «хотя бы один listener» (#5).
#
# Оператор выключает TLS (tls_enabled=false) И закрывает plain-порт (tls_keep_plain=
# false): plain-порт закрыт (`port 0`), TLS-порт не открыт (TLS off) → у Redis НИ ОДНОГО
# listener-а. validate:-правило create/main.yml ловит это НА INPUT-ВАЛИДАЦИИ
# (config.EvalValidateRules, input-only eval) ДО render — понятным сообщением.
#
# validate-CEL — input-only; оба поля имеют default → присутствуют, прямой предикат
# input.tls_enabled || input.tls_keep_plain. Правило false → expect_render_error по
# подстроке message (create/main.yml validate[0]).
name: no listener when tls disabled and plain port closed aborts at input validation

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  soulprint:
    network:
      primary_ip: 10.0.0.5
    os:
      arch: amd64
  vault:
    secret/redis/create:
      password: s3cr3t-redis-pass-create
  essence:
    redis_type: sentinel
    memory_reserve_percent: 75
    persistence_presets:
      rdb:
        save: "900 1 300 10 60 10000"
        appendonly: "no"
    redis_config:
      maxmemory:        "256mb"
      maxmemory-policy: allkeys-lru
      maxclients:       10000
      timeout:          300
    # essence TLS не включает (дефолт off).

  # Оператор закрывает plain-порт, но НЕ включает TLS — validate-правило false.
  input:
    redis_type: sentinel
    version: "7.2.4"
    persistence: rdb
    tls_enabled: false
    tls_keep_plain: false

# Прогон обрывается на validate: правило «хотя бы один listener» false.
# Подстрока — message правила (create/main.yml validate[0]).
expect_render_error: "ни одного listener"
