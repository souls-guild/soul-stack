# L0-испытание create (standalone) — logrotate/sysctl ВЫКЛЮЧЕНЫ, THP ВСЕГДА активна.
# Контр-кейс к extras-enabled: logrotate_enable/sysctl_enable=false → их блоки
# static-when-false → placeholder-skip (gated булевым input.<flag>, isStaticWhen).
# THP-отключение убрано из операторского контракта (директива 2026-06-23,
# рекомендация Redis — hardening, не выбор оператора): задачи disable-thp БЕЗ when:,
# рендерятся ВСЕГДА. Кейс доказывает обе ветки:
#   - THP (index 17/18) РЕНДЕРИТСЯ (params present, не skip) даже когда прочие
#     extras сняты — отключение THP безусловно;
#   - logrotate/sysctl-слоты заняты placeholder-skip-ом (не раскрылись, не упали),
#     поэтому PING сценария остаётся на index 23 — то же, что в enabled-кейсе.
#
# Индексы хвоста destiny НЕ съехали от снятия when: с THP: gated-форма занимала
# слот placeholder-skip-ом, безусловная форма занимает тот же слот render-ом —
# число задач плоского плана неизменно (PING на 23 в обоих кейсах).
name: logrotate/sysctl skip when disabled, THP always active

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  soulprint:
    network:
      primary_ip: 10.0.0.5
    os:
      arch: amd64
  vault:
    secret/redis/create:
      password: s3cr3t-redis-pass-create
  essence:
    redis_type: standalone
    memory_reserve_percent: 75
    persistence_presets:
      off:
        save: ""
        appendonly: "no"
      aof:
        save: ""
        appendonly: "yes"
      rdb:
        save: "900 1 300 10 60 10000"
        appendonly: "no"
      rdb_aof:
        save: "900 1 300 10 60 10000"
        appendonly: "yes"
    redis_config:
      maxmemory:        "256mb"
      maxmemory-policy: allkeys-lru
      maxclients:       10000
      timeout:          300

  input:
    redis_type: standalone
    # version ОБЯЗАТЕЛЬНА (директива пользователя 2026-06-23): фиксированный
    # distro-native пин (мажор < 8 → version-gate модулей не активен).
    version: "7.2.4"
    # Снимаем opt-out-флаги logrotate/sysctl → их блоки static-when-false →
    # placeholder-skip. THP-флага в контракте нет: отключение THP безусловно.
    logrotate_enable: false
    sysctl_enable: false

assert:
  rendered_tasks:
    # Базовый standalone-кирпич не задет выключением extras: пакет/redis.conf
    # рендерятся как обычно (extras — отдельные хвостовые задачи).
    - index: 1
      module: core.pkg.installed
      params:
        name: redis-server
        version: "7.2.4"

    - index: 8
      module: core.file.rendered
      params:
        path: /etc/redis/redis.conf
        template_content: "<present>"

    # THP ВСЕГДА активна: render disable-thp.service РЕНДЕРИТСЯ (params present),
    # даже когда logrotate/sysctl сняты. Если бы THP оставалась gated и гасла —
    # params были бы nil и эти ассерты упали бы (skip vs render по params).
    - index: 17
      module: core.file.rendered
      params:
        path: /etc/systemd/system/disable-thp.service
        template_content: "<present>"
        mode: "0644"
        owner: root
        group: root

    - index: 18
      module: core.service.running
      params:
        name: disable-thp
        enabled: true

    # PING на index 23: logrotate/sysctl-слоты — placeholder-skip, не раскрылись и
    # не упали; THP-слоты раскрылись render-ом. Тот же индекс, что в extras-enabled
    # → хвостовые extras занимают фиксированное число слотов независимо от флагов.
    - index: 23
      module: community.redis.command
      params:
        addr: "127.0.0.1:6379"
        password: s3cr3t-redis-pass-create
        args: ["PING"]
