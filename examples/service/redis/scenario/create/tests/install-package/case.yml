# L0-испытание (Trial, ADR-023): install.method=package (ЯВНО). Зеркало install-binary.
# Guard: при method=package активна package-ветка install.yml (core.pkg.installed
# redis-server на index 0), а binary-ветка (url.fetched/archive/user/group/cmd.shell/
# unit/restart, индексы 1-7) — placeholder-skip (params пусты). Поведение БИТ-В-БИТ
# совпадает с default-режимом (install не передан): явный method=package = дефолт.
name: install method package installs the distro redis-server package

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  soulprint:
    network:
      primary_ip: 10.0.0.5
    os:
      arch: amd64
  vault:
    secret/redis/create:
      password: s3cr3t-redis-pass-create
  essence:
    redis_type: standalone
    memory_reserve_percent: 75
    persistence_presets:
      rdb:
        save: "900 1 300 10 60 10000"
        appendonly: "no"
    redis_config:
      maxmemory: "256mb"

  input:
    redis_type: standalone
    version: "5:7.0.15-1~deb12u7"
    persistence: rdb
    install:
      method: package

assert:
  rendered_tasks:
    # index 0 — distro-пакет: core.pkg.installed с distro-пином (package-ветка активна).
    - index: 0
      module: core.pkg.installed
      params:
        name: redis-server
        version: "5:7.0.15-1~deb12u7"

    # index 1 — Fetch redis tarball (binary-ветка): method=package → placeholder-skip.
    # Модуль есть в плане (block static-skip per-потомок), params пусты.
    - index: 1
      module: core.url.fetched

    # index 5 — Install redis binaries (cmd.shell, binary-ветка): placeholder-skip.
    - index: 5
      module: core.cmd.shell

    # index 14 — redis.conf на месте (+7 сдвиг от binary-ветки install.yml). Полную
    # сверку merged config даёт full-stack; здесь — что data-плоскость поведение-
    # сохранна (тот же модуль/путь, что в default-режиме).
    - index: 14
      module: core.file.rendered

  state_changes:
    redis_type: standalone
    redis_version: "5:7.0.15-1~deb12u7"
    redis_config:
      maxmemory: "256mb"
      save: "900 1 300 10 60 10000"
      appendonly: "no"
    redis_users: {}
    redis_hosts: []
    redis_sentinel: {}
