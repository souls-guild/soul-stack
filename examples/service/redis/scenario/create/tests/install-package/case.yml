# L0-испытание (Trial, ADR-023): install.method=package (ЯВНО). Зеркало install-binary.
# Режим sentinel single-host (1 master + 0 реплик = standalone-эквивалент) — install-
# ветка install.yml режим-агностична. Guard: при method=package активна package-ветка
# install.yml (core.pkg.installed redis-server на index 0), а binary-ветка
# (url.fetched/archive/user/group/три core.file.present-бинаря/unit/restart) —
# placeholder-skip (params пусты). Явный method=package = дефолт.
name: install method package installs the distro redis-server package

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  hosts:
    - sid: node-solo.example.com
      covens: [create, redis]
      soulprint:
        network: { primary_ip: 10.0.0.5 }
        os: { arch: amd64 }
  vault:
    secret/redis/create:
      password: s3cr3t-redis-pass-create
  essence:
    redis_type: sentinel
    sentinel_master_name: master
    modules_base_url: "https://artifacts.example.com/redis/modules"
    memory_reserve_percent: 75
    persistence_presets:
      rdb:
        save: "900 1 300 10 60 10000"
        appendonly: "no"
    redis_config:
      maxmemory: "256mb"

  input:
    redis_type: sentinel
    version: "5:7.0.15-1~deb12u7"
    persistence: rdb
    install:
      method: package

assert:
  task_present:
    # distro-пакет: core.pkg.installed с distro-пином (package-ветка активна).
    - module: core.pkg.installed
      params_subset:
        name: redis-server
        version: "5:7.0.15-1~deb12u7"

    # redis.conf на месте. Полную сверку merged config даёт full-stack; здесь — что
    # data-плоскость поведение-сохранна (тот же модуль/путь, что в default-режиме).
    - module: core.file.rendered
      params_subset:
        path: /etc/redis/redis.conf

  task_absent:
    # binary-ветка install.yml выключена (method=package → static-skip): tarball-fetch
    # и раскладка бинаря — placeholder-skip без params. params_subset не сматчит
    # placeholder (Params nil) → guard «package НЕ запускает binary-install».
    - module: core.url.fetched
      params_subset:
        path: "/tmp/redis-7.2.4.tar.gz"
    - module: core.file.present
      params_subset:
        path: /usr/local/bin/redis-server

  state_changes:
    redis_type: sentinel
    redis_version: "5:7.0.15-1~deb12u7"
    redis_config:
      maxmemory: "256mb"
      save: "900 1 300 10 60 10000"
      appendonly: "no"
    redis_users: {}
    redis_hosts: []
    redis_sentinel:
      master_name: master
      quorum: 0
