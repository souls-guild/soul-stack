# L0-испытание (Trial, ADR-023): install.method=package (ЯВНО). Зеркало install-binary.
# Режим sentinel single-host (1 master + 0 реплик = standalone-эквивалент) — install-
# ветка install.yml режим-агностична. Guard: при method=package активна package-ветка
# install.yml (core.pkg.installed redis-server на index 0), а binary-ветка
# (url.fetched/archive/user/group/три core.file.present-бинаря/unit/restart) —
# placeholder-skip (params пусты). Явный method=package = дефолт.
name: install method package installs the distro redis-server package

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  hosts:
    - sid: node-solo.example.com
      covens: [create, redis]
      soulprint:
        network: { primary_ip: 10.0.0.5 }
        os: { arch: amd64 }
  vault:
    secret/redis/create:
      password: s3cr3t-redis-pass-create
    # Per-user секреты системных юзеров (secret/redis/<inc>/users/<name>#password) —
    # их резолвит keeper-side vault() при доливе system_acl_users в apply.input.users.
    secret/redis/create/users/replica:
      password: replica-sys-secret-pass
    secret/redis/create/users/monitoring:
      password: monitoring-sys-secret-pass
    secret/redis/create/users/sentinel:
      password: sentinel-sys-secret-pass
    secret/redis/create/users/haproxy:
      password: haproxy-sys-secret-pass
  essence:
    # install_method — в essence (author-context, 2026-06-28): способ установки
    # НЕ operator-input. compute.install читает default(essence.install_method, 'binary').
    install_method: package
    redis_type: sentinel
    sentinel_master_name: master
    # ★ Редизайн: подложка per-master sentinel-дефолтов (под input.sentinel_master_settings).
    sentinel_master_defaults:
      down-after-milliseconds: "5000"
      failover-timeout:        "60000"
    modules_base_url: "https://artifacts.example.com/redis/modules"
    memory_reserve_percent: 75
    persistence_presets:
      rdb:
        save: "900 1 300 10 60 10000"
        appendonly: "no"
    redis_config:
      maxmemory: "256mb"

    # Системные ACL-юзеры redis-server + sentinel-демона (1:1 из essence/_default.yaml).
    # ОБА ОБЯЗАТЕЛЬНЫ: guard create/sentinel.yml (assert 1b) рвёт render при пустом
    # любом из наборов (тихий fail-open недопустим — без них репликация/sentinel↔redis
    # AUTH сломались бы).
    system_acl_users:
      replica:    "+psync +replconf +ping"
      monitoring: "-@all +@connection +client +ping +info +config|get +cluster|info +slowlog +latency +memory +select +command|count +command|docs"
      sentinel:   "allchannels +multi +slaveof +ping +exec +subscribe +config|rewrite +role +publish +info +client|setname +client|kill +script|kill"
      haproxy:    "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +info +cluster|info"
    system_acl_users_sentinel:
      default:    "allchannels allkeys +@all"
      monitoring: "-@all +@connection -command +client -hello +info -auth +sentinel|masters +sentinel|replicas +sentinel|slaves +sentinel|sentinels +sentinel|ckquorum"
      sentinel:   "allchannels -@all +auth +client|getname +client|id +client|setname +command +hello +ping +sentinel|is-master-down-by-addr +publish +role +sentinel|get-master-addr-by-name +sentinel|master +sentinel|myid +sentinel|replicas +sentinel|sentinels"
      haproxy:    "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +sentinel|get-master-addr-by-name +sentinel|master +sentinel|myid +sentinel|replicas +sentinel|sentinels"
  input:
    redis_type: sentinel
    version: "7.4.1"
    persistence: rdb
    # single-host sentinel roster (1 хост) → реплик нет (size-guard 1+0).
    replicas_per_master: 0

assert:
  task_present:
    # distro-пакет: core.pkg.installed с distro-пином (package-ветка активна).
    - module: core.pkg.installed
      params_subset:
        name: redis-server
        version: "7.4.1"

    # ★ redis-sentinel — ОТДЕЛЬНЫЙ distro-пакет (redis-server его НЕ тянет), нужен
    # на хосте для sentinel-демона (иначе redis-sentinel.service → 203/EXEC, дефект
    # пойман live на Debian 12). Режим sentinel → sentinel_enabled=true → пакет в плане.
    # version — ТОТ ЖЕ distro-пин, что у redis-server (версионируются вместе). Guard
    # против регресса «package-ветка ставит только redis-server». Парный негатив —
    # cluster-create-3shards (cluster + package → redis-sentinel ОТСУТСТВУЕТ).
    - module: core.pkg.installed
      params_subset:
        name: redis-sentinel
        version: "7.4.1"

    # redis.conf на месте. Полную сверку merged config даёт full-stack; здесь — что
    # data-плоскость поведение-сохранна (тот же модуль/путь, что в default-режиме).
    - module: core.file.rendered
      params_subset:
        path: /etc/redis/redis.conf

  task_absent:
    # binary-ветка install.yml выключена (method=package → static-skip): tarball-fetch
    # и раскладка бинаря — placeholder-skip без params. params_subset не сматчит
    # placeholder (Params nil) → guard «package НЕ запускает binary-install».
    - module: core.url.fetched
      params_subset:
        path: "/tmp/redis-7.2.4.tar.gz"
    - module: core.file.present
      params_subset:
        path: /usr/local/bin/redis-server

  state_changes:
    redis_type: sentinel
    redis_version: "7.4.1"
    redis_config:
      maxmemory: "256mb"
      save: "900 1 300 10 60 10000"
      appendonly: "no"
    redis_users: []
    redis_hosts: []
    # ★ Редизайн: тайминги failover в master_settings (дефолты essence.sentinel_master_defaults;
    # operator dict не задан). settings — глобальные sentinel-директивы (не заданы → {}).
    redis_sentinel:
      master_name: master
      quorum: 0
      master_settings:
        down-after-milliseconds: "5000"
        failover-timeout: "60000"
      settings: {}
