# L0-испытание (Trial, ADR-023): TLS standalone (концепция Ansible-роли redis:
# redis_tls_*). Главный guard слайса — что при tls_enable:
#   1. PEM-файлы /etc/redis/tls/{redis.crt,redis.key,ca.crt} РЕНДЕРЯТСЯ (mode 0600,
#      owner redis), PEM приходит из vault(essence.tls_*_ref) — ЦЕЛЫЙ PEM в плане;
#   2. TLS-директивы (tls-port/tls-cert-file/tls-key-file/tls-ca-cert-file/
#      tls-replication) попали в merged config (range-ятся в redis.conf);
#   3. tls_only → `port 0` в config (plain закрыт);
#   4. health-gate PING несёт tls=true + addr на tls_port + tls_ca (плагин ОБЯЗАН
#      коннектиться по TLS, т.к. plain закрыт).
# cert/CA/порт — HOST-ИНВАРИАНТ (один на кластер) → через apply.input (резолв на
# targeted[0] корректен). PEM render-vars (tls_cert/tls_key/tls_ca) — secret-имена
# → маскируются выходным слоем shared/audit ПО ИМЕНИ ключа (tls[_-]?(key|cert|ca)).
name: tls enabled standalone renders PEM files and TLS directives, port 0 on tls_only

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  soulprint:
    network:
      primary_ip: 10.0.0.5
    os:
      arch: amd64
  # Мок Vault: requirepass + TLS PEM-материал (cert/key/ca под secret/services/redis/tls).
  # scenario резолвит их из essence.tls_*_ref (доверенный путь автора).
  vault:
    secret/redis/create:
      password: s3cr3t-redis-pass-create
    secret/services/redis/tls:
      cert: "-----BEGIN CERTIFICATE-----\nSERVERCERT\n-----END CERTIFICATE-----"
      key:  "-----BEGIN PRIVATE KEY-----\nSERVERKEY\n-----END PRIVATE KEY-----"
      ca:   "-----BEGIN CERTIFICATE-----\nCACERT\n-----END CERTIFICATE-----"
  essence:
    redis_type: standalone
    memory_reserve_percent: 75
    persistence_presets:
      rdb:
        save: "900 1 300 10 60 10000"
        appendonly: "no"
    redis_config:
      maxmemory:        "256mb"
      maxmemory-policy: allkeys-lru
      maxclients:       10000
      timeout:          300
    # TLS ВКЛЮЧЁН + only-TLS: plain закрыт, плагин обязан по TLS.
    tls_enable: true
    tls_only:   true
    tls_port:   7379
    tls_cert_ref: "secret/services/redis/tls#cert"
    tls_key_ref:  "secret/services/redis/tls#key"
    tls_ca_ref:   "secret/services/redis/tls#ca"

  input:
    redis_type: standalone
    persistence: rdb

assert:
  rendered_tasks:
    # index 3 — TLS dir (core.exec.run, when tls_enable → АКТИВЕН): install -d /etc/redis/tls.
    - index: 3
      module: core.exec.run
      params:
        creates: /etc/redis/tls
        cmd: install
        args: ["-d", "-o", "redis", "-g", "redis", "-m", "0750", "/etc/redis/tls"]

    # index 4 — TLS server cert: PEM из vault → render_context.vars.tls_cert (ЦЕЛЫЙ PEM).
    - index: 4
      module: core.file.rendered
      params:
        path: /etc/redis/tls/redis.crt
        template_content: "<present>"
        mode: "0600"
        owner: redis
        group: redis
        render_context:
          vars:
            tls_cert: "-----BEGIN CERTIFICATE-----\nSERVERCERT\n-----END CERTIFICATE-----"
          self:
            sid: trial-host
            covens: [create]
            choirs: []
            role: ""
            network:
              primary_ip: 10.0.0.5
            os:
              arch: amd64
          role: ""
          essence: {}

    # index 5 — TLS private key: секрет-PEM из vault → render_context.vars.tls_key.
    - index: 5
      module: core.file.rendered
      params:
        path: /etc/redis/tls/redis.key
        template_content: "<present>"
        mode: "0600"
        owner: redis
        group: redis
        render_context:
          vars:
            tls_key: "-----BEGIN PRIVATE KEY-----\nSERVERKEY\n-----END PRIVATE KEY-----"
          self:
            sid: trial-host
            covens: [create]
            choirs: []
            role: ""
            network:
              primary_ip: 10.0.0.5
            os:
              arch: amd64
          role: ""
          essence: {}

    # index 6 — TLS CA cert.
    - index: 6
      module: core.file.rendered
      params:
        path: /etc/redis/tls/ca.crt
        template_content: "<present>"
        mode: "0600"
        owner: redis
        group: redis
        render_context:
          vars:
            tls_ca: "-----BEGIN CERTIFICATE-----\nCACERT\n-----END CERTIFICATE-----"
          self:
            sid: trial-host
            covens: [create]
            choirs: []
            role: ""
            network:
              primary_ip: 10.0.0.5
            os:
              arch: amd64
          role: ""
          essence: {}

    # index 8 — redis.conf: merged config несёт TLS-директивы + port 0 (tls_only).
    - index: 8
      module: core.file.rendered
      params:
        path: /etc/redis/redis.conf
        render_context:
          vars:
            password: s3cr3t-redis-pass-create
            loadmodules: []
            config:
              # port 0 — plain закрыт (tls_only). КРИТИЧНО: гарантия only-TLS.
              port: "0"
              tls-port: "7379"
              tls-cert-file: /etc/redis/tls/redis.crt
              tls-key-file: /etc/redis/tls/redis.key
              tls-ca-cert-file: /etc/redis/tls/ca.crt
              tls-replication: "yes"
              # обычные директивы тоже на месте (TLS не вытеснил их).
              maxmemory: "256mb"
              maxmemory-policy: allkeys-lru
              maxclients: 10000
              timeout: 300
              save: "900 1 300 10 60 10000"
              appendonly: "no"
          self:
            sid: trial-host
            covens: [create]
            choirs: []
            role: ""
            network:
              primary_ip: 10.0.0.5
            os:
              arch: amd64
          role: ""
          essence: {}

    # index 25 — PING health-gate: при tls_only плагин по TLS (tls=true, addr на
    # tls_port, tls_ca = CA-PEM из vault). Доказывает «плагин ОБЯЗАН по TLS».
    - index: 26
      module: community.redis.command
      params:
        addr: "127.0.0.1:7379"
        password: s3cr3t-redis-pass-create
        tls: true
        tls_ca: "-----BEGIN CERTIFICATE-----\nCACERT\n-----END CERTIFICATE-----"
        args: ["PING"]

  # DRIFT-GUARD: redis_config в state ОБЯЗАН быть бит-в-бит равен apply.input.config
  # (index 8), включая TLS-директивы + port 0 (host-инвариант → пишутся в state).
  state_changes:
    redis_type: standalone
    redis_version: ""
    redis_config:
      port: "0"
      tls-port: "7379"
      tls-cert-file: /etc/redis/tls/redis.crt
      tls-key-file: /etc/redis/tls/redis.key
      tls-ca-cert-file: /etc/redis/tls/ca.crt
      tls-replication: "yes"
      maxmemory: "256mb"
      maxmemory-policy: allkeys-lru
      maxclients: 10000
      timeout: 300
      save: "900 1 300 10 60 10000"
      appendonly: "no"
    redis_users: {}
    redis_hosts: []
    redis_sentinel: {}
