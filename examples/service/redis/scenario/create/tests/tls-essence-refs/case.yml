# L0-испытание (Trial, ADR-023): TLS через 2 галочки + essence-параметры (#5). Оператор
# включает only-TLS галочками (tls_enabled=true, tls_keep_plain=false), а технические
# параметры — НЕстандартный tls_port 7400 (бьёт дефолт 7379) и Vault-пути PEM под
# operator-конвенцией secret/ops/redis/tls — живут в essence (author-context, оператор
# переопределяет в spec.essence под свою инсталляцию). Guard: tls_port из essence даёт
# tls-port 7400 в redis.conf; refs из essence идут в vault(ref) → PEM в content
# (seal-маскинг). Доказывает разделение: включение TLS — операторские галочки, порт/
# пути — essence-подложка.
name: tls enabled by checkboxes uses essence port and vault refs

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  hosts:
    - sid: node-solo.example.com
      covens: [create]
      soulprint:
        network: { primary_ip: 10.0.0.5 }
        os: { arch: amd64 }
  vault:
    secret/redis/create:
      password: s3cr3t-redis-pass-create
    # Per-user секреты системных юзеров (secret/redis/<inc>/users/<name>#password) —
    # их резолвит keeper-side vault() при доливе system_acl_users в apply.input.users.
    secret/redis/create/users/replica:
      password: replica-sys-secret-pass
    secret/redis/create/users/monitoring:
      password: monitoring-sys-secret-pass
    secret/redis/create/users/sentinel:
      password: sentinel-sys-secret-pass
    secret/redis/create/users/haproxy:
      password: haproxy-sys-secret-pass
    # PEM по essence.tls_*_ref (operator-конвенция secret/ops/redis/tls).
    secret/ops/redis/tls:
      cert: "-----BEGIN CERTIFICATE-----\nOPCERT\n-----END CERTIFICATE-----"
      key:  "-----BEGIN PRIVATE KEY-----\nOPKEY\n-----END PRIVATE KEY-----"
      ca:   "-----BEGIN CERTIFICATE-----\nOPCA\n-----END CERTIFICATE-----"
  essence:
    # install_method — в essence (author-context, 2026-06-28): способ установки
    # НЕ operator-input. compute.install читает default(essence.install_method, 'binary').
    install_method: package
    redis_type: sentinel
    sentinel_master_name: master
    # ★ Редизайн: подложка per-master sentinel-дефолтов (под input.sentinel_master_settings).
    sentinel_master_defaults:
      down-after-milliseconds: "5000"
      failover-timeout:        "60000"
    modules_base_url: "https://artifacts.example.com/redis/modules"
    memory_reserve_percent: 75
    persistence_presets:
      rdb:
        save: "900 1 300 10 60 10000"
        appendonly: "no"
    redis_config:
      maxmemory:        "256mb"
      maxmemory-policy: allkeys-lru
      maxclients:       10000
      timeout:          300
    # ★ #5: TLS-параметры в essence: НЕстандартный порт 7400 (бьёт дефолт 7379) +
    # operator-конвенция Vault-путей PEM. Режим канала — input.connection_mode.
    tls_port:     7400
    tls_cert_ref: "secret/ops/redis/tls#cert"
    tls_key_ref:  "secret/ops/redis/tls#key"
    tls_ca_ref:   "secret/ops/redis/tls#ca"

    # Системные ACL-юзеры redis-server + sentinel-демона (1:1 из essence/_default.yaml).
    # ОБА ОБЯЗАТЕЛЬНЫ: guard create/sentinel.yml (assert 1b) рвёт render при пустом
    # любом из наборов (тихий fail-open недопустим — без них репликация/sentinel↔redis
    # AUTH сломались бы).
    system_acl_users:
      replica:    "+psync +replconf +ping"
      monitoring: "-@all +@connection +client +ping +info +config|get +cluster|info +slowlog +latency +memory +select +command|count +command|docs"
      sentinel:   "allchannels +multi +slaveof +ping +exec +subscribe +config|rewrite +role +publish +info +client|setname +client|kill +script|kill"
      haproxy:    "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +info +cluster|info"
    system_acl_users_sentinel:
      default:    "allchannels allkeys +@all"
      monitoring: "-@all +@connection -command +client -hello +info -auth +sentinel|masters +sentinel|replicas +sentinel|slaves +sentinel|sentinels +sentinel|ckquorum"
      sentinel:   "allchannels -@all +auth +client|getname +client|id +client|setname +command +hello +ping +sentinel|is-master-down-by-addr +publish +role +sentinel|get-master-addr-by-name +sentinel|master +sentinel|myid +sentinel|replicas +sentinel|sentinels"
      haproxy:    "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +sentinel|get-master-addr-by-name +sentinel|master +sentinel|myid +sentinel|replicas +sentinel|sentinels"
  input:
    redis_type: sentinel
    version: "7.4.1"
    persistence: rdb
    # single-host (1 хост) → 0 реплик (default редизайна 2): size-guard sentinel = 1+0.
    replicas_per_master: 0
    # ★ Редизайн: connection_mode=tls — только-TLS (plain закрыт, port 0). Заменяет
    # прежние tls_enabled=true + tls_keep_plain=false.
    connection_mode: tls

assert:
  task_present:
    # TLS server cert: content = vault(essence.tls_cert_ref) → operator-PEM.
    # Дизамбигуатор PEM (тот же core.file.present) — path.
    - module: core.file.present
      params_subset:
        path: /etc/redis/tls/redis.crt
        content: "-----BEGIN CERTIFICATE-----\nOPCERT\n-----END CERTIFICATE-----"
        mode: "0600"
        owner: redis
        group: redis

    # TLS private key: content = vault(essence.tls_key_ref) → operator-PEM.
    - module: core.file.present
      params_subset:
        path: /etc/redis/tls/redis.key
        content: "-----BEGIN PRIVATE KEY-----\nOPKEY\n-----END PRIVATE KEY-----"
        mode: "0600"
        owner: redis
        group: redis

    # redis.conf: TLS-директивы на порту 7400 из essence (бьёт дефолт 7379) + port 0
    # (only). КРИТИЧНО: tls-port 7400 доказывает, что essence.tls_port победил.
    # Дизамбигуатор от users.acl/hardening — path.
    - module: core.file.rendered
      params_subset:
        path: /etc/redis/redis.conf
        render_context:
          vars:
            password: s3cr3t-redis-pass-create
            conf_dir: /etc/redis
            data_dir: /var/lib/redis
            port: 6379
            run_dir: /var/run/redis
            log_dir: /var/log/redis
            loadmodules:
              - /var/lib/redis/modules/redisbloom.so
              - /var/lib/redis/modules/rejson.so
              - /var/lib/redis/modules/redisearch.so
              - /var/lib/redis/modules/redistimeseries.so
            config:
              port: "0"
              tls-port: "7400"
              tls-cert-file: /etc/redis/tls/redis.crt
              tls-key-file: /etc/redis/tls/redis.key
              tls-ca-cert-file: /etc/redis/tls/ca.crt
              tls-replication: "yes"
              maxmemory: "256mb"
              maxmemory-policy: allkeys-lru
              maxclients: 10000
              timeout: 300
              save: "900 1 300 10 60 10000"
              appendonly: "no"
          self:
            sid: node-solo.example.com
            covens: [create]
            choirs: []
            # traits — registry-проекция (ADR-060), пустой объект без меток.
            traits: {}
            role: ""
            network:
              primary_ip: 10.0.0.5
            os:
              arch: amd64
          role: ""
          essence: {}

    # PING: tls=true, addr на tls_port 7400 (essence), tls_ca = operator-CA-PEM.
    # cluster/sentinel PING — placeholder-skip; дизамбигуатор addr/args.
    - module: community.redis.command
      params_subset:
        addr: "127.0.0.1:7400"
        password: s3cr3t-redis-pass-create
        tls: true
        tls_ca: "-----BEGIN CERTIFICATE-----\nOPCA\n-----END CERTIFICATE-----"
        args: ["PING"]

  state_changes:
    redis_type: sentinel
    redis_version: "7.4.1"
    connection_mode: tls
    redis_config:
      port: "0"
      tls-port: "7400"
      tls-cert-file: /etc/redis/tls/redis.crt
      tls-key-file: /etc/redis/tls/redis.key
      tls-ca-cert-file: /etc/redis/tls/ca.crt
      tls-replication: "yes"
      maxmemory: "256mb"
      maxmemory-policy: allkeys-lru
      maxclients: 10000
      timeout: 300
      save: "900 1 300 10 60 10000"
      appendonly: "no"
    redis_users: []
    redis_hosts: []
    redis_sentinel:
      master_name: master
      quorum: 0
      master_settings:
        down-after-milliseconds: "5000"
        failover-timeout: "60000"
      settings: {}
