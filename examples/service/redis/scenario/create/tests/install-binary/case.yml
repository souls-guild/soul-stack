# L0-испытание (Trial, ADR-023): install.method=binary (Nexus, ОТДЕЛЬНЫЕ бинари).
# Guard: binary-ветка install.yml активна (group → user → ТРИ core.url.fetched
# (redis-server/redis-cli/redis-benchmark) → symlink-shell check-aof/rdb/sentinel →
# свой redis-server.service), а package-ветка (core.pkg.installed) — placeholder-skip
# (params пусты). Прецедент binary-install — node-exporter/modules. URL собирается per-host
# из base_url (essence) + arch/Debian/distro_ver (soulprint.self.os) + version
# (input.version, enum). Первичный старт redis-server — ЕДИНСТВЕННЫЙ, в server.yml
# (core.service.running), ПОСЛЕ рендера redis.conf/ACL + data/log/socket-каталогов;
# преждевременный binary-restart УБРАН (см. architect-аудит 2026-06-29: вызывал
# restart-loop на старте; binary-upgrade-рестарт вынесен в upgrade-сценарий/ручной).
#
# ★ Редизайн install-модели: вместо tarball+extract — ТРИ отдельных core.url.fetched
# прямо в bin_dir (схема ansible redis installation.yml). Идемпотентность нативная по
# SHA-256 содержимого (аналог If-None-Match). redis-sentinel — СИМЛИНК на redis-server
# (multi-call бинарь: redis-server по argv[0] redis-sentinel = sentinel-режим; отдельного
# redis-sentinel в Nexus нет — 404). redis-check-aof/redis-check-rdb — тоже симлинки на
# redis-server (maintenance-тулзы). ansible-роль качает только server/cli/benchmark и
# симлинит остальное.
#
# ★ Cross-file register guard: register'ы binary-ветки redis_server_bin/redis_cli_bin/
# redis_benchmark_bin/redis_server_links/redis_server_unit (install.yml) остаются
# объявленными для захвата результата fetch/links/unit (onchanges-потребителя у них теперь
# нет — binary-restart убран). Кейс рендерится без unknown_register_reference, фиксируя что
# orphan-register (без onchanges-потребителя) валиден per-file линтером validateTaskRefs.
#
# PRESENCE-форма (миграция с позиционной 2026-06-24): задачи идентифицируются
# module + params_subset; индексы не сверяются. Три бинаря (redis-server/redis-cli/
# redis-benchmark) — один и тот же core.url.fetched, дизамбигуируются по url/path. GUARD
# «package-ветка НЕ активна при method=binary» — task_absent ниже: package-шаг при binary —
# static-skip (Params==nil), его core.pkg.installed несёт пустые params → name не матчится.
name: install method binary fetches redis binaries from nexus and lays out binaries with own unit

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  hosts:
    - sid: node-solo.example.com
      covens: [create]
      soulprint:
        network: { primary_ip: 10.0.0.5 }
        # os.version нужен binary-URL (.../Debian/<distro_ver>/...) — Debian 12.
        os: { arch: amd64, version: "12" }
  vault:
    secret/redis/create:
      password: s3cr3t-redis-pass-create
    # Per-user секреты системных юзеров (secret/redis/<inc>/users/<name>#password) —
    # их резолвит keeper-side vault() при доливе system_acl_users в apply.input.users.
    # ★ РЕДИЗАЙН default_admin (2026-06-30): default_admin — системный юзер
    # внутрикластерного AUTH (auth_pass/PING шаги деплоя читают его по ветке users/<name>).
    secret/redis/create/users/default_admin:
      password: default-admin-secret-pass
    secret/redis/create/users/replica:
      password: replica-sys-secret-pass
    secret/redis/create/users/monitoring:
      password: monitoring-sys-secret-pass
    secret/redis/create/users/sentinel:
      password: sentinel-sys-secret-pass
    secret/redis/create/users/haproxy:
      password: haproxy-sys-secret-pass
  essence:
    redis_type: sentinel
    sentinel_master_name: master
    # ★ Редизайн: подложка per-master sentinel-дефолтов (под input.sentinel_master_settings).
    sentinel_master_defaults:
      down-after-milliseconds: "5000"
      failover-timeout:        "60000"
    modules_base_url: "https://artifacts.example.com/redis/modules"
    memory_reserve_percent: 75
    persistence_presets:
      rdb:
        save: "900 1 300 10 60 10000"
        appendonly: "no"
    redis_config:
      maxmemory: "256mb"

    # ★ install_method — в essence (author-context, 2026-06-28): способ установки НЕ
    # operator-input. binary — дефолт; compute.install читает default(essence.install_method,
    # 'binary'). Кейс — guard binary-ветки, поэтому install_method: binary задан ЯВНО.
    install_method: binary
    # ★ Редизайн: base_url бинарей — в essence (author-context, Nexus-mirror). Версия —
    # операторский input.version (enum выкаченных сборок), НЕ essence.binary_version.
    binary_base_url: "https://downloads.example.com/redis"

    # Системные ACL-юзеры redis-server + sentinel-демона (1:1 из essence/_default.yaml).
    # ОБА ОБЯЗАТЕЛЬНЫ: guard create/sentinel.yml (assert 1b) рвёт render при пустом
    # любом из наборов (тихий fail-open недопустим — без них репликация/sentinel↔redis
    # AUTH сломались бы).
    system_acl_users:
      default_admin: "~* &* +@all"
      replica:    "+psync +replconf +ping"
      monitoring: "-@all +@connection +client +ping +info +config|get +cluster|info +slowlog +latency +memory +select +command|count +command|docs"
      sentinel:   "allchannels +multi +slaveof +ping +exec +subscribe +config|rewrite +role +publish +info +client|setname +client|kill +script|kill"
      haproxy:    "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +info +cluster|info"
    system_acl_users_sentinel:
      default_admin: "allchannels allkeys +@all"
      monitoring: "-@all +@connection -command +client -hello +info -auth +sentinel|masters +sentinel|replicas +sentinel|slaves +sentinel|sentinels +sentinel|ckquorum"
      sentinel:   "allchannels -@all +auth +client|getname +client|id +client|setname +command +hello +ping +sentinel|is-master-down-by-addr +publish +role +sentinel|get-master-addr-by-name +sentinel|master +sentinel|myid +sentinel|replicas +sentinel|sentinels"
      haproxy:    "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +sentinel|get-master-addr-by-name +sentinel|master +sentinel|myid +sentinel|replicas +sentinel|sentinels"
  input:
    # ★ provision выключен (default-on: опущенная секция = ВКЛЮЧЕНО; кейс деплоит на
    # ГОТОВЫЙ roster, cloud-create не нужен) → include redis-provision.yml group-drop.
    provision:
      enabled: false
    redis_type: sentinel
    persistence: rdb
    # version — enum выкаченных в Nexus сборок; определяет путь к бинарю (.../<version>/).
    version: "7.4.1"
    # replicas_per_master=0 ЯВНО (default редизайна — 2): single-host install-кейс,
    # size-guard sentinel = 1+0 = 1 хост.
    replicas_per_master: 0

assert:
  task_present:
    # distro-группа redis (system). Единственный core.group.present.
    - module: core.group.present
      params_subset:
        name: redis
        system: true

    # distro-юзер redis (system, nologin). Единственный core.user.present.
    - module: core.user.present
      params_subset:
        name: redis
        group: redis
        system: true
        shell: /usr/sbin/nologin
        home: /var/lib/redis

    # ★ Редизайн: ТРИ core.url.fetched качают redis-server/redis-cli/redis-benchmark
    # ОТДЕЛЬНЫМИ файлами в /usr/local/bin (mode 0755, owner/group root). URL per-host:
    # <base_url>/<arch>/Debian/<distro_ver>/<version>/redis-* (x86_64/Debian/12/7.4.1).
    # checksum НЕ передаётся (content-идемпотентность SHA-256). register
    # redis_server_bin/redis_cli_bin/redis_benchmark_bin. Дизамбигуатор — url/path.
    # redis-sentinel — СИМЛИНК на redis-server (НЕ fetch): отдельного redis-sentinel в Nexus
    # нет (404), redis-server по argv[0] redis-sentinel работает в sentinel-режиме.
    # allow_private: true — GUARD на снятый SSRF-guard core.url (essence.binary_allow_private
    # дефолт true: дефолтный binary_base_url = внутренний Nexus в RFC1918). Регресс «guard
    # не снят» (флаг false/отсутствует) → fetch падает на реальном хосте (SSRF-block private-IP).
    - module: core.url.fetched
      params_subset:
        url: "https://downloads.example.com/redis/x86_64/Debian/12/7.4.1/redis-server"
        path: /usr/local/bin/redis-server
        mode: "0755"
        owner: root
        group: root
        allow_private: true

    - module: core.url.fetched
      params_subset:
        url: "https://downloads.example.com/redis/x86_64/Debian/12/7.4.1/redis-cli"
        path: /usr/local/bin/redis-cli
        mode: "0755"
        owner: root
        group: root
        allow_private: true

    - module: core.url.fetched
      params_subset:
        url: "https://downloads.example.com/redis/x86_64/Debian/12/7.4.1/redis-benchmark"
        path: /usr/local/bin/redis-benchmark
        mode: "0755"
        owner: root
        group: root
        allow_private: true

    # ★ Симлинки redis-check-aof/redis-check-rdb/redis-sentinel → redis-server. redis-sentinel —
    # симлинк (НЕ отдельный fetch): redis-server multi-call работает в sentinel-режиме по
    # argv[0]. check-aof/check-rdb — maintenance-тулзы того же бинаря. ВРЕМЕННО (PILOT) через
    # core.cmd.shell `ln -sfn` (у core.file нет symlink-state — core.file.symlink в backlog).
    # Единственный core.cmd.shell в binary-плане; матчим по полной cmd-строке.
    - module: core.cmd.shell
      params_subset:
        cmd: "ln -sfn /usr/local/bin/redis-server /usr/local/bin/redis-check-aof && ln -sfn /usr/local/bin/redis-server /usr/local/bin/redis-check-rdb && ln -sfn /usr/local/bin/redis-server /usr/local/bin/redis-sentinel"

    # Свой systemd-юнит redis-server.service (binary install). register
    # redis_server_unit. Имя юнита redis-server → hardening drop-in/core.service в обеих
    # ветках работают. Дизамбигуатор от redis.conf — path + register-якорь.
    - module: core.file.rendered
      id: redis_server_unit
      params_subset:
        path: /etc/systemd/system/redis-server.service
        template_content: "<present>"
        mode: "0644"
        owner: root
        group: root

    # redis.conf на месте: data-плоскость одинакова в обеих ветках (install.method
    # меняет только установку бинарей, не render redis.conf). Дизамбигуатор от
    # redis-server.service unit — path.
    - module: core.file.rendered
      params_subset:
        path: /etc/redis/redis.conf

    # conf-dir (обе ветки, БЕЗУСЛОВНО): binary-ветка пакета не несёт → создаём явно ДО
    # рендера redis.conf/users.acl (server.yml). owner redis, mode 0750, parents:true.
    # Регресс «binary не создаёт conf-dir» = рендер users.acl/redis.conf падает «open
    # .../.users.acl.tmp-…: no such file or directory» (caught live 2026-06-29).
    # Дизамбигуатор от data/log/socket/tls/modules-dir — path /etc/redis (conf-каталог).
    - module: core.file.directory
      params_subset:
        path: /etc/redis
        owner: redis
        group: redis
        mode: "0750"
        parents: true

    # data/log-dir (обе ветки, БЕЗУСЛОВНО): binary-ветка пакета не несёт → создаём явно
    # ДО первого старта redis-server (server.yml). owner redis, mode 0750, parents:true.
    # Регресс «binary не создаёт data/log-dir» = redis-server на binary-инсталляции
    # падает (нет каталога RDB/AOF или logfile). Дизамбигуатор от socket/tls/modules-dir —
    # path /var/lib/redis и /var/log/redis (точные каталоги данных/логов).
    - module: core.file.directory
      params_subset:
        path: /var/lib/redis
        owner: redis
        group: redis
        mode: "0750"
        parents: true
    - module: core.file.directory
      params_subset:
        path: /var/log/redis
        owner: redis
        group: redis
        mode: "0750"
        parents: true

  task_absent:
    # GUARD «method=binary НЕ активирует package-ветку»: core.pkg.installed gated на
    # install.method==package (binary → static-skip, Params==nil) → name не матчится.
    # Регресс «package протёк в binary» = задача с реальным name redis-server.
    - module: core.pkg.installed
      params_subset:
        name: redis-server

  state_changes:
    redis_type: sentinel
    # redis_version = input.version (enum выкаченных в Nexus сборок).
    redis_version: "7.4.1"
    redis_config:
      maxmemory: "256mb"
      save: "900 1 300 10 60 10000"
      appendonly: "no"
    redis_users: []
    redis_hosts: []
    # ★ Редизайн: тайминги failover в master_settings (дефолты essence.sentinel_master_defaults;
    # operator dict не задан). settings — глобальные sentinel-директивы (не заданы → {}).
    redis_sentinel:
      master_name: master
      quorum: 0
      master_settings:
        down-after-milliseconds: "5000"
        failover-timeout: "60000"
      settings: {}
    # ── namedfields (read-model). install вынесен из state в essence (v11→v12,
    # Вариант A): в state_changes его больше нет (поле не в state_schema). Способ
    # установки binary покрыт destiny-задачами fetch-бинарей выше (не через state).
    # TLS off (essence без tls_*): enable/only false, port 7379 (essence-дефолт),
    # refs пусты (essence.tls_*_ref не заданы → has()-цепочка даёт '').
    tls:
      enable:   false
      only:     false
      port:     7379
      cert_ref: ""
      key_ref:  ""
      ca_ref:   ""
    persistence: rdb
    memory_mb: 0
    maxmemory_policy: ""
    modules: [bloom, json, search, timeseries]
    sysctl_settings: {}
    shards: 0
    replicas: 0
    sentinel_quorum: 0
