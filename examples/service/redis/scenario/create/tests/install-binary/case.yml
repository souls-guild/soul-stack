# L0-испытание (Trial, ADR-023): install.method=binary (upstream-tarball). Guard:
# binary-ветка install.yml активна (url.fetched → archive.extracted → group → user →
# три core.file.present с src: → свой redis-server.service + СВОЙ рестарт), а
# package-ветка (core.pkg.installed, index 0) — placeholder-skip (params пусты).
# Прецедент binary-install — node-exporter. URL собирается per-host из base_url +
# install.version + soulprint.self.os.arch. version (top-level distro-пин) НЕ передан
# — required_when=package, при method=binary не обязателен; redis_version в state
# берётся из install.version (compute.redis_version).
#
# Бинари раскладываются тремя core.file.present с src: (а не одним core.cmd.shell с
# install -m0755): src копирует содержимое regular-файла из распакованного /tmp →
# идемпотентность нативная по sha256 (честный changed строго при смене байт бинаря),
# version-aware unless-guard больше не нужен.
#
# ★ Cross-file register guard: register'ы redis_server_bin/redis_cli_bin/
# redis_sentinel_bin/redis_server_unit (install.yml) читает onchanges рестарт-задачи
# В ТОМ ЖЕ install.yml (НЕ server.yml) — этот кейс рендерится без
# unknown_register_reference, фиксируя «register + его onchanges-потребитель живут в
# одном файле» как инвариант (per-file линтер validateTaskRefs).
name: install method binary fetches upstream tarball and lays out binaries with own unit

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  soulprint:
    network:
      primary_ip: 10.0.0.5
    os:
      arch: amd64
  vault:
    secret/redis/create:
      password: s3cr3t-redis-pass-create
  essence:
    redis_type: standalone
    memory_reserve_percent: 75
    persistence_presets:
      rdb:
        save: "900 1 300 10 60 10000"
        appendonly: "no"
    redis_config:
      maxmemory: "256mb"

  # version (top-level distro-пин) НЕ передан: method=binary → required_when=package
  # не срабатывает. install.version (upstream-semver) несёт версию tarball-а.
  input:
    redis_type: standalone
    persistence: rdb
    install:
      method: binary
      base_url: "https://downloads.example.com/redis"
      version: "7.2.4"

assert:
  rendered_tasks:
    # index 0 — package-ветка (core.pkg.installed): method=binary → placeholder-skip.
    - index: 0
      module: core.pkg.installed

    # index 1 — Fetch redis tarball: URL из base_url + version + arch (amd64). checksum
    # пуст (sha256 не задан → content-идемпотентность). path во /tmp.
    - index: 1
      module: core.url.fetched
      params:
        url: "https://downloads.example.com/redis/redis-7.2.4-amd64.tar.gz"
        path: "/tmp/redis-7.2.4.tar.gz"
        checksum: ""
        mode: "0644"

    # index 2 — Extract redis tarball во /tmp/redis-7.2.4.
    - index: 2
      module: core.archive.extracted
      params:
        path: "/tmp/redis-7.2.4.tar.gz"
        dest: "/tmp/redis-7.2.4"

    # index 3 — distro-группа redis (system).
    - index: 3
      module: core.group.present
      params:
        name: redis
        system: true

    # index 4 — distro-юзер redis (system, nologin).
    - index: 4
      module: core.user.present
      params:
        name: redis
        group: redis
        system: true
        shell: /usr/sbin/nologin
        home: /var/lib/redis

    # index 5..7 — три core.file.present с src: раскладывают redis-server/redis-cli/
    # redis-sentinel из распакованного /tmp/redis-7.2.4 в /usr/local/bin (mode 0755,
    # owner/group root). register redis_server_bin/redis_cli_bin/redis_sentinel_bin.
    # Идемпотентность нативная — sha256(src) сверяется с целью, changed строго при
    # смене байт (реальный апгрейд версии); version-aware unless-guard прежнего
    # core.cmd.shell не нужен. src/content взаимоисключены (content в задаче нет).
    - index: 5
      module: core.file.present
      params:
        path: /usr/local/bin/redis-server
        src: /tmp/redis-7.2.4/redis-server
        mode: "0755"
        owner: root
        group: root

    - index: 6
      module: core.file.present
      params:
        path: /usr/local/bin/redis-cli
        src: /tmp/redis-7.2.4/redis-cli
        mode: "0755"
        owner: root
        group: root

    - index: 7
      module: core.file.present
      params:
        path: /usr/local/bin/redis-sentinel
        src: /tmp/redis-7.2.4/redis-sentinel
        mode: "0755"
        owner: root
        group: root

    # index 8 — свой systemd-юнит redis-server.service (binary install). register
    # redis_server_unit. Имя юнита redis-server → hardening drop-in/core.service в обеих
    # ветках работают.
    - index: 8
      module: core.file.rendered
      params:
        path: /etc/systemd/system/redis-server.service
        template_content: "<present>"
        mode: "0644"
        owner: root
        group: root

    # index 9 — рестарт redis-server на смену бинаря/юнита (binary-локальный onchanges
    # на redis_server_bin/redis_cli_bin/redis_sentinel_bin/redis_server_unit, все из
    # ЭТОГО файла — cross-file guard).
    - index: 9
      module: core.service.restarted
      params:
        name: redis-server

    # index 16 — redis.conf на месте: data-плоскость одинакова в обеих ветках
    # (install.method меняет только установку бинарей, не render redis.conf). Индекс
    # сдвинут с 14 на 16: три core.file.present вместо одного core.cmd.shell дают +2.
    - index: 16
      module: core.file.rendered

  state_changes:
    redis_type: standalone
    # redis_version из install.version (compute.redis_version: binary → upstream-semver).
    redis_version: "7.2.4"
    redis_config:
      maxmemory: "256mb"
      save: "900 1 300 10 60 10000"
      appendonly: "no"
    redis_users: {}
    redis_hosts: []
    redis_sentinel: {}
    # ── namedfields (read-model, v3): install=binary (тот же compute.install, что
    # ушёл в destiny apply.input). sha256 не задан → '' (content-идемпотентность).
    install:
      method:   binary
      base_url: "https://downloads.example.com/redis"
      version:  "7.2.4"
      sha256:   ""
    # TLS off (essence без tls_*): enable/only false, port 7379 (essence-дефолт),
    # refs пусты (essence.tls_*_ref не заданы → has()-цепочка даёт '').
    tls:
      enable:   false
      only:     false
      port:     7379
      cert_ref: ""
      key_ref:  ""
      ca_ref:   ""
    persistence: rdb
    memory_mb: 0
    maxmemory_policy: ""
    modules: []
    sysctl_settings: {}
    shards: 0
    replicas: 0
    sentinel_quorum: 0
