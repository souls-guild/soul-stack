# L0-испытание (Trial, ADR-023): install.method=binary (upstream-tarball). Guard:
# binary-ветка install.yml активна (url.fetched → archive.extracted → group → user →
# три core.file.present с src: → свой redis-server.service + СВОЙ рестарт), а
# package-ветка (core.pkg.installed) — placeholder-skip (params пусты). Прецедент
# binary-install — node-exporter. URL собирается per-host из base_url +
# install.version + soulprint.self.os.arch. version (top-level distro-пин) НЕ передан
# — required_when=package, при method=binary не обязателен; redis_version в state
# берётся из install.version (compute.redis_version).
#
# Бинари раскладываются тремя core.file.present с src: (а не одним core.cmd.shell с
# install -m0755): src копирует содержимое regular-файла из распакованного /tmp →
# идемпотентность нативная по sha256 (честный changed строго при смене байт бинаря),
# version-aware unless-guard больше не нужен.
#
# ★ Cross-file register guard: register'ы redis_server_bin/redis_cli_bin/
# redis_sentinel_bin/redis_server_unit (install.yml) читает onchanges рестарт-задачи
# В ТОМ ЖЕ install.yml (НЕ server.yml) — этот кейс рендерится без
# unknown_register_reference, фиксируя «register + его onchanges-потребитель живут в
# одном файле» как инвариант (per-file линтер validateTaskRefs).
#
# PRESENCE-форма (миграция с позиционной 2026-06-24): задачи идентифицируются
# module + params_subset; индексы не сверяются (хрупки — три file.present вместо
# одного cmd.shell съезжали план на +2). Три бинаря (redis-server/redis-cli/
# redis-sentinel) — один и тот же core.file.present, дизамбигуируются по path +
# своим src (guard на правильный бинарь в правильном файле). GUARD «package-ветка
# НЕ активна при method=binary» — task_absent ниже: package-шаг при binary —
# static-skip (Params==nil), его core.pkg.installed несёт пустые params → name
# не матчится; регресс «package протёк в binary» = задача с реальным name.
name: install method binary fetches upstream tarball and lays out binaries with own unit

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  hosts:
    - sid: node-solo.example.com
      covens: [create]
      soulprint:
        network: { primary_ip: 10.0.0.5 }
        os: { arch: amd64 }
  vault:
    secret/redis/create:
      password: s3cr3t-redis-pass-create
    # Per-user секреты системных юзеров (secret/redis/<inc>/users/<name>#password) —
    # их резолвит keeper-side vault() при доливе system_acl_users в apply.input.users.
    secret/redis/create/users/replica:
      password: replica-sys-secret-pass
    secret/redis/create/users/monitoring:
      password: monitoring-sys-secret-pass
    secret/redis/create/users/sentinel:
      password: sentinel-sys-secret-pass
    secret/redis/create/users/haproxy:
      password: haproxy-sys-secret-pass
  essence:
    redis_type: sentinel
    sentinel_master_name: master
    modules_base_url: "https://artifacts.example.com/redis/modules"
    memory_reserve_percent: 75
    persistence_presets:
      rdb:
        save: "900 1 300 10 60 10000"
        appendonly: "no"
    redis_config:
      maxmemory: "256mb"

    # ★ #1: URL/версия бинаря — в essence (binary_base_url/binary_version), не в input.
    binary_base_url: "https://downloads.example.com/redis"
    binary_version:  "7.2.4"

  # version (top-level distro-пин) НЕ передан: install_method=binary → required_when=
  # package не срабатывает. essence.binary_version несёт версию tarball-а.
    # Системные ACL-юзеры redis-server + sentinel-демона (1:1 из essence/_default.yaml).
    # ОБА ОБЯЗАТЕЛЬНЫ: guard create/sentinel.yml (assert 1b) рвёт render при пустом
    # любом из наборов (тихий fail-open недопустим — без них репликация/sentinel↔redis
    # AUTH сломались бы).
    system_acl_users:
      replica:    "+psync +replconf +ping"
      monitoring: "-@all +@connection +client +ping +info +config|get +cluster|info +slowlog +latency +memory +select +command|count +command|docs"
      sentinel:   "allchannels +multi +slaveof +ping +exec +subscribe +config|rewrite +role +publish +info +client|setname +client|kill +script|kill"
      haproxy:    "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +info +cluster|info"
    system_acl_users_sentinel:
      default:    "allchannels allkeys +@all"
      monitoring: "-@all +@connection -command +client -hello +info -auth +sentinel|masters +sentinel|replicas +sentinel|slaves +sentinel|sentinels +sentinel|ckquorum"
      sentinel:   "allchannels -@all +auth +client|getname +client|id +client|setname +command +hello +ping +sentinel|is-master-down-by-addr +publish +role +sentinel|get-master-addr-by-name +sentinel|master +sentinel|myid +sentinel|replicas +sentinel|sentinels"
      haproxy:    "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +sentinel|get-master-addr-by-name +sentinel|master +sentinel|myid +sentinel|replicas +sentinel|sentinels"
  input:
    redis_type: sentinel
    persistence: rdb
    install_method: binary

assert:
  task_present:
    # Fetch redis tarball: URL из base_url + version + arch (amd64). checksum НЕ
    # передаётся (content-идемпотентность по SHA-256 содержимого). path во /tmp.
    # Единственный core.url.fetched в плане.
    - module: core.url.fetched
      params_subset:
        url: "https://downloads.example.com/redis/redis-7.2.4-amd64.tar.gz"
        path: "/tmp/redis-7.2.4.tar.gz"
        mode: "0644"

    # Extract redis tarball во /tmp/redis-7.2.4. Единственный core.archive.extracted.
    - module: core.archive.extracted
      params_subset:
        path: "/tmp/redis-7.2.4.tar.gz"
        dest: "/tmp/redis-7.2.4"

    # distro-группа redis (system). Единственный core.group.present.
    - module: core.group.present
      params_subset:
        name: redis
        system: true

    # distro-юзер redis (system, nologin). Единственный core.user.present.
    - module: core.user.present
      params_subset:
        name: redis
        group: redis
        system: true
        shell: /usr/sbin/nologin
        home: /var/lib/redis

    # Три core.file.present с src: раскладывают redis-server/redis-cli/redis-sentinel
    # из распакованного /tmp/redis-7.2.4 в /usr/local/bin (mode 0755, owner/group root).
    # register redis_server_bin/redis_cli_bin/redis_sentinel_bin. Идемпотентность
    # нативная — sha256(src) сверяется с целью, changed строго при смене байт.
    # src/content взаимоисключены (content в задаче нет). Дизамбигуатор тройки — path.
    - module: core.file.present
      params_subset:
        path: /usr/local/bin/redis-server
        src: /tmp/redis-7.2.4/redis-server
        mode: "0755"
        owner: root
        group: root

    - module: core.file.present
      params_subset:
        path: /usr/local/bin/redis-cli
        src: /tmp/redis-7.2.4/redis-cli
        mode: "0755"
        owner: root
        group: root

    - module: core.file.present
      params_subset:
        path: /usr/local/bin/redis-sentinel
        src: /tmp/redis-7.2.4/redis-sentinel
        mode: "0755"
        owner: root
        group: root

    # Свой systemd-юнит redis-server.service (binary install). register
    # redis_server_unit. Имя юнита redis-server → hardening drop-in/core.service в обеих
    # ветках работают. Дизамбигуатор от redis.conf — path + register-якорь.
    - module: core.file.rendered
      id: redis_server_unit
      params_subset:
        path: /etc/systemd/system/redis-server.service
        template_content: "<present>"
        mode: "0644"
        owner: root
        group: root

    # redis.conf на месте: data-плоскость одинакова в обеих ветках (install.method
    # меняет только установку бинарей, не render redis.conf). Дизамбигуатор от
    # redis-server.service unit — path.
    - module: core.file.rendered
      params_subset:
        path: /etc/redis/redis.conf

    # Рестарт redis-server на смену бинаря/юнита (binary-локальный onchanges на
    # redis_server_bin/redis_cli_bin/redis_sentinel_bin/redis_server_unit, все из
    # ЭТОГО файла — cross-file guard). В плане ДВА core.service.restarted
    # name=redis-server (этот binary-restart из install.yml + config/hardening-restart
    # из server.yml). Дизамбигуатор — id=redis_binary_restart (стабильный якорь на
    # binary-restart). Раньше различались when-ом, но гейт deploy_redis ушёл на include
    # (conditional-include group-drop): server.yml-restart → when пуст, а binary-restart
    # внутри binary-блока несёт merged binary-block-when (хрупкий для матча) — поэтому
    # id-якорь, а не when.
    - module: core.service.restarted
      id: redis_binary_restart
      params_subset:
        name: redis-server

  task_absent:
    # GUARD «method=binary НЕ активирует package-ветку»: core.pkg.installed gated на
    # install.method==package (binary → static-skip, Params==nil) → name не матчится.
    # Регресс «package протёк в binary» = задача с реальным name redis-server.
    - module: core.pkg.installed
      params_subset:
        name: redis-server

  state_changes:
    redis_type: sentinel
    # redis_version из essence.binary_version (compute.redis_version: binary → upstream-semver).
    redis_version: "7.2.4"
    redis_config:
      maxmemory: "256mb"
      save: "900 1 300 10 60 10000"
      appendonly: "no"
    redis_users: {}
    redis_hosts: []
    redis_sentinel:
      master_name: master
      quorum: 0
      down_after_ms: 5000
      failover_timeout_ms: 60000
    # ── namedfields (read-model): install=binary (тот же compute.install, что ушёл в
    # destiny apply.input). base_url/version из essence.binary_* (#1).
    install:
      method:   binary
      base_url: "https://downloads.example.com/redis"
      version:  "7.2.4"
    # TLS off (essence без tls_*): enable/only false, port 7379 (essence-дефолт),
    # refs пусты (essence.tls_*_ref не заданы → has()-цепочка даёт '').
    tls:
      enable:   false
      only:     false
      port:     7379
      cert_ref: ""
      key_ref:  ""
      ca_ref:   ""
    persistence: rdb
    memory_mb: 0
    maxmemory_policy: ""
    modules: [bloom, json, search, timeseries]
    sysctl_settings: {}
    shards: 0
    replicas: 0
    sentinel_quorum: 0
