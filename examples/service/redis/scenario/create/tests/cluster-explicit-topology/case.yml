# L0 test of create in cluster mode with an EXPLICIT TOPOLOGY (input.cluster_topology):
# the operator sets the shard layout THEMSELVES instead of the plugin's auto-layout by sort SID. 4 hosts,
# replicas_per_master=1 → 2 shards of 2 nodes (master+replica). The topology deliberately makes
# node-2/node-4 masters (NOT the sort-first node-1/node-2) — proves that the declared
# layout actually reaches the plugin via the topology parameter, rather than coinciding with sort.
#
# size-guard BRANCH (cluster.yml): when cluster_topology is given, checks the roster against the SUM
# of shard sizes (2+2=4), not against the old formula shards*(1+replicas). Here 4 == 4 →
# render passes. The paired negative case (sum mismatch) is a separate
# cluster-explicit-topology-size-mismatch via expect_render_error.
#
# What we assert (slice acceptance criterion):
#   1. size-guard PASS on the sum form (4 hosts == sum(len of shards)) → cluster-build is in place.
#   2. cluster-build (community.redis.cluster action create) carries the param `topology` =
#      EXACTLY the passed list of lists of SIDs (deepEqual, not a subset) + a nodes-MAP of all
#      4 hosts (deterministic by SID) + replicas_per_shard=1 (size check of composition).
name: cluster create with explicit topology forwards declared shard layout to the plugin

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  hosts:
    - sid: node-2.example.com
      covens: [create, redis]
      soulprint:
        network: { primary_ip: 10.0.0.2 }
        os: { arch: amd64 }
    - sid: node-4.example.com
      covens: [create, redis]
      soulprint:
        network: { primary_ip: 10.0.0.4 }
        os: { arch: amd64 }
    - sid: node-1.example.com
      covens: [create, redis]
      soulprint:
        network: { primary_ip: 10.0.0.1 }
        os: { arch: amd64 }
    - sid: node-3.example.com
      covens: [create, redis]
      soulprint:
        network: { primary_ip: 10.0.0.3 }
        os: { arch: amd64 }
  vault:
    secret/redis/create:
      password: s3cr3t-redis-pass-create
    # ★ REDESIGN default_admin (2026-06-30): default_admin is the system user for intra-cluster
    # AUTH (the cluster-build of the deploy reads its password from the same users/<name> branch).
    secret/redis/create/users/default_admin:
      password: default-admin-secret-pass
    secret/redis/create/users/replica:
      password: replica-sys-secret-pass
    secret/redis/create/users/monitoring:
      password: monitoring-sys-secret-pass
    secret/redis/create/users/sentinel:
      password: sentinel-sys-secret-pass
    secret/redis/create/users/haproxy:
      password: haproxy-sys-secret-pass
  essence:
    # install_method is in essence (author-context, 2026-06-28): the installation method
    # is NOT operator-input. compute.install reads default(essence.install_method, 'binary').
    install_method: package
    redis_type: cluster
    modules_base_url: "https://artifacts.example.com/redis/modules"
    memory_reserve_percent: 75
    persistence_presets:
      rdb:
        save: "900 1 300 10 60 10000"
        appendonly: "no"
    redis_config:
      maxmemory:        "256mb"
      maxmemory-policy: allkeys-lru
      maxclients:       10000
      timeout:          300
    # ★ REDESIGN default_admin (2026-06-30): default_admin is the full-access system user
    # (~* &* +@all), the intra-cluster AUTH cluster runs under it (replaced requirepass-default).
    system_acl_users:
      default_admin: "~* &* +@all"
      replica:    "+psync +replconf +ping"
      monitoring: "-@all +@connection +client +ping +info +config|get +cluster|info +slowlog +latency +memory +select +command|count +command|docs"
      sentinel:   "allchannels +multi +slaveof +ping +exec +subscribe +config|rewrite +role +publish +info +client|setname +client|kill +script|kill"
      haproxy:    "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +info +cluster|info"
  input:
    # ★ provision disabled (default-on: an omitted section = ENABLED; the case deploys onto a
    # READY roster, cloud-create not needed) → include redis-provision.yml group-drop.
    provision:
      enabled: false
    redis_type: cluster
    version: "7.4.1"
    shards: 2
    replicas_per_master: 1
    cluster_node_timeout: 5000
    # Explicit layout: masters node-2/node-4 (first SID of each shard), replicas node-1/node-3.
    # Deliberately does NOT match auto-sort (which would have made node-1/node-2 masters).
    cluster_topology:
      - [node-2.example.com, node-1.example.com]
      - [node-4.example.com, node-3.example.com]

assert:
  # size-guard PASS (sum form): 4 == sum(2+2). Failure is caught by the size-mismatch case.
  task_present:
    # cluster-build: the topology arrives via param `topology` (deepEqual of the whole list),
    # nodes-MAP of all 4 hosts, replicas_per_shard=1 (size check of composition). The only
    # community.redis.cluster in the plan → no disambiguator needed.
    - module: community.redis.cluster
      params_subset:
        action: create
        replicas_per_shard: 1
        # ★ REDESIGN default_admin: connects as default_admin (username → AUTH). The former
        # main secret is DROPPED — password comes from the users/default_admin branch.
        username: default_admin
        password: default-admin-secret-pass
        topology:
          - [node-2.example.com, node-1.example.com]
          - [node-4.example.com, node-3.example.com]
        nodes:
          node-1.example.com: { addr: "10.0.0.1:6379" }
          node-2.example.com: { addr: "10.0.0.2:6379" }
          node-3.example.com: { addr: "10.0.0.3:6379" }
          node-4.example.com: { addr: "10.0.0.4:6379" }

  state_changes:
    redis_type: cluster
    redis_version: "7.4.1"
    redis_config:
      maxmemory:        "256mb"
      maxmemory-policy: allkeys-lru
      maxclients:       10000
      timeout:          300
      save:             "900 1 300 10 60 10000"
      appendonly:       "no"
      cluster-enabled:      "yes"
      cluster-config-file:  "nodes.conf"
      cluster-node-timeout: "5000"
    redis_users: []
    redis_hosts: []
    shards: 2
    replicas: 1
    sentinel_quorum: 0
    persistence: rdb
    tls:
      enable:   false
      only:     false
      port:     7379
      cert_ref: ""
      key_ref:  ""
      ca_ref:   ""
    memory_mb: 0
    maxmemory_policy: ""
    modules: [bloom, json, search, timeseries]
    sysctl_settings: {}
