# L0 test of create in cluster mode WITH PERSISTENCE=aof (qa coverage gap
# 2026-06-22). Cluster in prod is usually appendonly (AOF gives precise
# durability on node failure). Proves that the final config of EVERY host
# carries BOTH the cluster directives (cluster-enabled/cluster-config-file/
# cluster-node-timeout) AND the correct save/appendonly from the aof preset
# (appendonly yes, save "") - two merge() layers coexist, the cluster block
# doesn't overwrite the persistence preset.
#
# Topology: shards=3, replicas_per_shard=0 -> 3 hosts (size-guard PASS).
# persistence aof: the preset gives appendonly "yes" + save "". The cluster
# block (last in merge) adds cluster-* on top - it does NOT touch
# appendonly/save (different keys).
name: cluster create with aof persistence keeps cluster + appendonly directives

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  hosts:
    - sid: node-b.example.com
      covens: [create, redis]
      soulprint:
        network: { primary_ip: 10.0.0.2 }
        os: { arch: amd64 }
    - sid: node-c.example.com
      covens: [create, redis]
      soulprint:
        network: { primary_ip: 10.0.0.3 }
        os: { arch: amd64 }
    - sid: node-a.example.com
      covens: [create, redis]
      soulprint:
        network: { primary_ip: 10.0.0.1 }
        os: { arch: amd64 }
  vault:
    secret/redis/create:
      password: s3cr3t-redis-pass-create
    # Per-user secrets of system users (secret/redis/<inc>/users/<name>#password) -
    # resolved by keeper-side vault() when filling system_acl_users into apply.input.users.
    # * default_admin REDESIGN (2026-06-30): default_admin is the system user for
    # in-cluster AUTH (PING/cluster-build/masterauth deploy reads its password
    # from the same users/<name> branch).
    secret/redis/create/users/default_admin:
      password: default-admin-secret-pass
    secret/redis/create/users/replica:
      password: replica-sys-secret-pass
    secret/redis/create/users/monitoring:
      password: monitoring-sys-secret-pass
    secret/redis/create/users/sentinel:
      password: sentinel-sys-secret-pass
    secret/redis/create/users/haproxy:
      password: haproxy-sys-secret-pass
  essence:
    redis_type: cluster
    modules_base_url: "https://artifacts.example.com/redis/modules"
    memory_reserve_percent: 75
    persistence_presets:
      off:
        save: ""
        appendonly: "no"
      aof_1sec:
        save: ""
        appendonly: "yes"
      rdb:
        save: "900 1 300 10 60 10000"
        appendonly: "no"
      rdb_aof_1sec:
        save: "900 1 300 10 60 10000"
        appendonly: "yes"
    redis_config:
      maxmemory:        "256mb"
      maxmemory-policy: allkeys-lru
      maxclients:       10000
      timeout:          300

    # System ACL users of redis-server (1:1 from essence/_default.yaml). REQUIRED:
    # the create/cluster.yml guard (assert 1b) breaks the render on empty
    # system_acl_users (a silent fail-open is unacceptable - replication/health
    # checks would break without them).
    # * default_admin REDESIGN (2026-06-30): default_admin is the full-access
    # system user (~* &* +@all), used for in-cluster AUTH (replaced requirepass-default).
    system_acl_users:
      default_admin: "~* &* +@all"
      replica:    "+psync +replconf +ping"
      monitoring: "-@all +@connection +client +ping +info +config|get +cluster|info +slowlog +latency +memory +select +command|count +command|docs"
      sentinel:   "allchannels +multi +slaveof +ping +exec +subscribe +config|rewrite +role +publish +info +client|setname +client|kill +script|kill"
      haproxy:    "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +info +cluster|info"
  input:
    # * provision is disabled (default-on: an omitted section means ENABLED;
    # the case deploys onto a READY roster, cloud-create isn't needed) ->
    # include redis-provision.yml group-drop.
    provision:
      enabled: false
    redis_type: cluster
    # version is REQUIRED (user directive 2026-06-23): fixed distro-native pin
    # (major < 8 -> module version-gate not active).
    version: "7.4.1"
    shards: 3
    replicas_per_master: 0
    persistence: aof_1sec
    cluster_node_timeout: 5000

assert:
  # size-guard PASS: 3 == 3*(1+0) -> assert: (not a task, not emitted into the plan).
  task_present:
    # redis.conf: aof preset (appendonly yes / save "") COEXISTS with the
    # cluster directives. No announce-ip in config - it's per-host from .tmpl.
    # Disambiguator from users.acl/hardening - path.
    - module: core.file.rendered
      params_subset:
        path: /etc/redis/redis.conf
        template_content: "<present>"
        mode: "0640"
        owner: redis
        group: redis
        render_context:
          vars:
            conf_dir: /etc/redis
            data_dir: /var/lib/redis
            port: 6379
            run_dir: /var/run/redis
            log_dir: /var/log/redis
            loadmodules:
              - /var/lib/redis/modules/redisbloom.so
              - /var/lib/redis/modules/rejson.so
              - /var/lib/redis/modules/redisearch.so
              - /var/lib/redis/modules/redistimeseries.so
            config:
              # * default_admin REDESIGN: replica->master AUTH (masteruser/masterauth)
              # arrives as ORDINARY config directives (the cluster deploy body fills
              # them in via vault()-in-cell).
              masteruser:       "default_admin"
              masterauth:       "default-admin-secret-pass"
              maxmemory:        "256mb"
              maxmemory-policy: allkeys-lru
              maxclients:       10000
              timeout:          300
              # aof preset: AOF enabled, RDB snapshots disabled.
              save:             ""
              appendonly:       "yes"
              # cluster directives on top - appendonly/save not affected.
              cluster-enabled:      "yes"
              cluster-config-file:  "nodes.conf"
              cluster-node-timeout: "5000"
          self:
            sid: node-a.example.com
            covens: [create, redis]
            choirs: []
            # traits - registry projection (ADR-060), empty object with no labels.
            traits: {}
            role: ""
            network:
              primary_ip: 10.0.0.1
            os:
              arch: amd64
          role: ""
          essence: {}

  state_changes:
    redis_type: cluster
    redis_version: "7.4.1"
    redis_config:
      maxmemory:        "256mb"
      maxmemory-policy: allkeys-lru
      maxclients:       10000
      timeout:          300
      save:             ""
      appendonly:       "yes"
      cluster-enabled:      "yes"
      cluster-config-file:  "nodes.conf"
      cluster-node-timeout: "5000"
    redis_users: []
    redis_hosts: []
