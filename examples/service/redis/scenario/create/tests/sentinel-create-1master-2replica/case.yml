# L0 test for create in sentinel mode (redis consolidation). Multi-host roster
# (fixtures.hosts) of 3 hosts: replicas_per_master=2 -> topology 1+2=3 (size-guard
# passes). Master election: the first host by SID (node-1) = master; node-2/node-3 =
# replicas.
#
# Render-only, hermetic. The create dispatcher includes cluster.yml + sentinel.yml via
# CONDITIONAL-INCLUDE (when: on include, orchestration.md §6 Variant B): on the sentinel
# run, the include of cluster.yml has a statically-false when (input.redis_type == 'cluster')
# -> the entire cluster branch is DROPPED from the plan (group-drop, tasks are not physically
# rendered, NOT a placeholder-skip), the include of sentinel.yml (when: input.redis_type == 'sentinel')
# expands.
#
# What we assert (slice acceptance criteria):
#   1. size-guard PASS form: 3 == 1 + 2 -> "true" baked into the test (both size-
#      guard branches are covered together with the paired sentinel-size-guard-mismatch).
#   2. ANTI-TILING: master_addr (REPLICAOF) and monitor.ip (SENTINEL MONITOR) -
#      HOST-INVARIANT, both = primary_ip of the first host by SID (node-1 = 10.0.0.1).
#      There is NO announce-ip in these params - it's per-host in sentinel.conf.tmpl from .self
#      (separate destiny_redis_sentinel_tmpl_test.go).
#   3. plugin community.redis.replica: addr=127.0.0.1:6379 (per-host invariant,
#      local), master_addr=10.0.0.1:6379 (master election).
#   4. plugin community.redis.sentinel: monitor.ip=10.0.0.1, quorum=2 (AUTO:
#      size(3)/2+1=2). master_name=master (essence default).
#
# ATTENTION L0 limitation: apply.input is host-invariant in the pilot (resolved on
# the FIRST targeted host, resolveApplyInput) -> render_context.self in destiny =
# the first host by SID (node-1). Per-host announce-ip is NOT threaded through
# apply.input - it is rendered into sentinel.conf.tmpl from .self of EACH host
# (per-host correctness - direct tmpl render in destiny_redis_sentinel_tmpl_test.go).
name: sentinel create 1 master + 2 replicas with monitor reconcile

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  # Order in YAML is deliberately unsorted (3, 1, 2) - the harness and master-election
  # must sort by SID (node-1 = master).
  hosts:
    - sid: node-3.example.com
      covens: [create, redis]
      soulprint:
        network: { primary_ip: 10.0.0.3 }
        os: { arch: amd64 }
    - sid: node-1.example.com
      covens: [create, redis]
      soulprint:
        network: { primary_ip: 10.0.0.1 }
        os: { arch: amd64 }
    - sid: node-2.example.com
      covens: [create, redis]
      soulprint:
        network: { primary_ip: 10.0.0.2 }
        os: { arch: amd64 }
  vault:
    secret/redis/create:
      password: s3cr3t-redis-pass-create
    # Per-user secrets of system users (secret/redis/<inc>/users/<name>#password) -
    # resolved by keeper-side vault() when topping up system_acl_users into apply.input.users.
    # * default_admin REDESIGN (2026-06-30): default_admin is the system user for intra-cluster
    # AUTH (the deploy's auth_pass/PING steps read its password from the same users/<name> branch).
    secret/redis/create/users/default_admin:
      password: default-admin-secret-pass
    secret/redis/create/users/replica:
      password: replica-sys-secret-pass
    secret/redis/create/users/monitoring:
      password: monitoring-sys-secret-pass
    secret/redis/create/users/sentinel:
      password: sentinel-sys-secret-pass
    secret/redis/create/users/haproxy:
      password: haproxy-sys-secret-pass
  essence:
    # install_method - in essence (author-context, 2026-06-28): the install method
    # is NOT operator-input. compute.install reads default(essence.install_method, 'binary').
    install_method: package
    redis_type: sentinel
    sentinel_master_name: master
    # * Redesign: per-master sentinel defaults underlay (backing input.sentinel_master_settings).
    sentinel_master_defaults:
      down-after-milliseconds: "5000"
      failover-timeout:        "60000"
    modules_base_url: "https://artifacts.example.com/redis/modules"
    memory_reserve_percent: 75
    persistence_presets:
      rdb:
        save: "900 1 300 10 60 10000"
        appendonly: "no"
    redis_config:
      maxmemory:        "256mb"
      maxmemory-policy: allkeys-lru
      maxclients:       10000
      timeout:          300

    # System ACL users of redis-server + sentinel daemon (1:1 from essence/_default.yaml).
    # BOTH ARE MANDATORY: the create/sentinel.yml guard (assert 1b) breaks render if
    # either set is empty (a silent fail-open is not acceptable - without them
    # replication/sentinel<->redis AUTH would break).
    # * default_admin REDESIGN (2026-06-30): default_admin is the system user with full
    # access (~* &* +@all) in BOTH sets (replaced the previous requirepass-default).
    system_acl_users:
      default_admin: "~* &* +@all"
      replica:    "+psync +replconf +ping"
      monitoring: "-@all +@connection +client +ping +info +config|get +cluster|info +slowlog +latency +memory +select +command|count +command|docs"
      sentinel:   "allchannels +multi +slaveof +ping +exec +subscribe +config|rewrite +role +publish +info +client|setname +client|kill +script|kill"
      haproxy:    "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +info +cluster|info"
    system_acl_users_sentinel:
      default_admin: "allchannels allkeys +@all"
      monitoring: "-@all +@connection -command +client -hello +info -auth +sentinel|masters +sentinel|replicas +sentinel|slaves +sentinel|sentinels +sentinel|ckquorum"
      sentinel:   "allchannels -@all +auth +client|getname +client|id +client|setname +command +hello +ping +sentinel|is-master-down-by-addr +publish +role +sentinel|get-master-addr-by-name +sentinel|master +sentinel|myid +sentinel|replicas +sentinel|sentinels"
      haproxy:    "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +sentinel|get-master-addr-by-name +sentinel|master +sentinel|myid +sentinel|replicas +sentinel|sentinels"
  input:
    # * provision is disabled (default-on: an omitted section = ENABLED; the case deploys onto
    # a READY roster, cloud-create isn't needed) -> include redis-provision.yml group-drop.
    provision:
      enabled: false
    redis_type: sentinel
    # version is MANDATORY: enum of builds shipped to Nexus (major < 8 -> version-gate
    # of modules is not active). 7.4.1 - the 7.x series, like the previous distro pin 7.2.4.
    version: "7.4.1"
    replicas_per_master: 2

assert:
  # sentinel size-guard PASS: 3 == 1+2 -> assert: (ADR-009 amendment), not
  # emitted into the plan.
  task_present:
    # -- sentinel destiny: redis.conf (sentinel mode: NO cluster directives) --
    # render_context.self = first host by SID (node-1, apply.input host invariant).
    # Disambiguator from users.acl/hardening (same core.file.rendered) - path.
    - module: core.file.rendered
      params_subset:
        path: /etc/redis/redis.conf
        template_content: "<present>"
        mode: "0640"
        owner: redis
        group: redis
        render_context:
          vars:
            # * default_admin REDESIGN: .vars.password is NO LONGER passed into the redis.conf
            # template (requirepass removed from server.yml). Authentication is under default_admin
            # (users.acl), redis.conf only carries aclfile + protected-mode.
            conf_dir: /etc/redis
            data_dir: /var/lib/redis
            port: 6379
            run_dir: /var/run/redis
            log_dir: /var/log/redis
            loadmodules:
              - /var/lib/redis/modules/redisbloom.so
              - /var/lib/redis/modules/rejson.so
              - /var/lib/redis/modules/redisearch.so
              - /var/lib/redis/modules/redistimeseries.so
            config:
              # * default_admin REDESIGN: replica->master AUTH (masteruser/
              # masterauth) comes in as REGULAR config directives (the sentinel
              # deploy-body tops them up via vault()-in-cell) -> redis.conf ranges
              # over them like any directive -> they statically survive a restart.
              masteruser:       "default_admin"
              masterauth:       "default-admin-secret-pass"
              maxmemory:        "256mb"
              maxmemory-policy: allkeys-lru
              maxclients:       10000
              timeout:          300
              save:             "900 1 300 10 60 10000"
              appendonly:       "no"
          self:
            sid: node-1.example.com
            covens: [create, redis]
            choirs: []
            # traits - registry projection (ADR-060), an empty object with no tags.
            traits: {}
            role: ""
            network:
              primary_ip: 10.0.0.1
            os:
              arch: amd64
          role: ""
          essence: {}

    # -- REPLICAOF for replicas (community.redis.replica) --------------------
    # addr=127.0.0.1:6379 (per-host local invariant), master_addr - master
    # election (first by SID = node-1 = 10.0.0.1). * P0: the task carries
    # `where: soulprint.self.sid != soulprint.hosts[0].sid` - rendered ONLY on
    # replicas (node-2/node-3), ABSENT on the master host (node-1) (master does NOT
    # replicate itself). addr=127.0.0.1 is NEVER equal to master_addr=10.0.0.1
    # on any host -> the plugin guard (addr==master_addr -> no-op) does not
    # trigger in prod, the real protection is this where. Per-host absence of the task on
    # master is proven by the render assert TargetSIDs (TestAcceptance_SentinelReplicaExcludesMaster).
    # Params are host-invariant -> presence checks the same replica params.
    # The only community.redis.replica in the plan -> no disambiguator needed.
    # * default_admin REDESIGN: replica->master AUTH under the ACL user default_admin
    # (username -> CONFIG SET masteruser, password -> masterauth). The previous main
    # secret was DROPPED - password comes from the secret/redis/<inc>/users/default_admin branch.
    - module: community.redis.replica
      params_subset:
        addr: "127.0.0.1:6379"
        master_addr: "10.0.0.1:6379"
        username: default_admin
        password: default-admin-secret-pass

    # -- SENTINEL MONITOR reconcile (community.redis.sentinel) ---------------
    # monitor.ip - HOST-INVARIANT master address (master election node-1).
    # quorum=2 (AUTO: size(3)/2+1). master_name=master (essence default). auth_pass -
    # keeper-side vault() resolve. The only active one.
    # * #7: config carries per-master failover timings (defaults 5000/60000) under keys
    # `sentinel <opt> <master>` - the plugin's classifyConfig sorts them into per-master.
    - module: community.redis.sentinel
      params_subset:
        addr: "127.0.0.1:26379"
        master_name: master
        # * default_admin REDESIGN: CONNECTION-AUTH to the sentinel daemon :26379 under
        # default_admin (built-in default -> off, connect under the system default_admin
        # of the sentinel set). username/password - the connection pair; auth_user/auth_pass -
        # credentials for MONITORING the master (SENTINEL SET <master> auth-user/auth-pass).
        # The previous main secret was DROPPED - everything is on users/default_admin. Guard on NOAUTH.
        username: default_admin
        password: default-admin-secret-pass
        auth_user: default_admin
        auth_pass: default-admin-secret-pass
        redis_version: "7.4.1"
        config:
          "sentinel down-after-milliseconds master": "5000"
          "sentinel failover-timeout master": "60000"
        monitor:
          ip: 10.0.0.1
          port: 6379
          quorum: 2

  # sentinel facts in state: redis_type sentinel + redis_config (WITHOUT cluster
  # directives) + master_name/quorum + empty users/hosts (declared roles are in apply,
  # not in state - matches the cluster precedent).
  state_changes:
    redis_type: sentinel
    redis_version: "7.4.1"
    redis_config:
      maxmemory:        "256mb"
      maxmemory-policy: allkeys-lru
      maxclients:       10000
      timeout:          300
      save:             "900 1 300 10 60 10000"
      appendonly:       "no"
    redis_users: []
    redis_hosts: []
    redis_sentinel:
      master_name: master
      quorum: 0
      master_settings:
        down-after-milliseconds: "5000"
        failover-timeout: "60000"
      settings: {}
    # -- namedfields (read-model, v3): sentinel topology. replicas=2 (UNIFIED
    # replicas_per_master, master's replicas), sentinel_quorum=0 (AUTO, not materialized
    # into state). shards=0 (not cluster).
    replicas: 2
    sentinel_quorum: 0
    shards: 0
    persistence: rdb
    maxmemory_policy: ""
    tls:
      enable:   false
      only:     false
      port:     7379
      cert_ref: ""
      key_ref:  ""
      ca_ref:   ""
    memory_mb: 0
    modules: [bloom, json, search, timeseries]
    sysctl_settings: {}
