# L0-испытание create в режиме sentinel (redis-консолидация). Multi-host roster
# (fixtures.hosts) из 3 хостов: replicas_per_master=2 → топология 1+2=3 (size-guard
# проходит). Master-election: первый по SID хост (node-1) = master; node-2/node-3 =
# реплики.
#
# Render-only, герметично. Диспетчер create инклудит cluster.yml + sentinel.yml через
# CONDITIONAL-INCLUDE (when: на include, orchestration.md §6 Вариант B): на sentinel-
# прогоне include cluster.yml имеет статически-ложный when (input.redis_type == 'cluster')
# → вся cluster-ветка DROP-ается из плана (group-drop, задачи физически не рендерятся,
# НЕ placeholder-skip), include sentinel.yml (when: input.redis_type == 'sentinel')
# раскрывается.
#
# Что ассертим (критерий приёмки слайса):
#   1. size-guard PASS-форма: 3 == 1 + 2 → "true" встроено в test (обе ветки size-
#      guard покрыты вместе с парным sentinel-size-guard-mismatch).
#   2. ANTI-TILING: master_addr (REPLICAOF) и monitor.ip (SENTINEL MONITOR) —
#      HOST-ИНВАРИАНТНЫ, оба = primary_ip первого по SID хоста (node-1 = 10.0.0.1).
#      announce-ip в этих params НЕТ — он per-host в sentinel.conf.tmpl из .self
#      (отдельный destiny_redis_sentinel_tmpl_test.go).
#   3. plugin community.redis.replica: addr=127.0.0.1:6379 (per-host инвариант,
#      локальный), master_addr=10.0.0.1:6379 (master-election).
#   4. plugin community.redis.sentinel: monitor.ip=10.0.0.1, quorum=2 (АВТО:
#      size(3)/2+1=2). master_name=master (essence-дефолт).
#
# ВНИМАНИЕ L0-ограничение: apply.input host-инвариантен в пилоте (резолвится на
# ПЕРВОМ targeted-хосте, resolveApplyInput) → render_context.self в destiny =
# первый по SID хост (node-1). Per-host announce-ip НЕ протаскивается через
# apply.input — он рендерится в sentinel.conf.tmpl из .self КАЖДОГО хоста
# (per-host корректность — прямой tmpl-рендер destiny_redis_sentinel_tmpl_test.go).
name: sentinel create 1 master + 2 replicas with monitor reconcile

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  # Порядок в YAML намеренно не отсортирован (3, 1, 2) — harness и master-election
  # обязаны отсортировать по SID (node-1 = master).
  hosts:
    - sid: node-3.example.com
      covens: [create, redis]
      soulprint:
        network: { primary_ip: 10.0.0.3 }
        os: { arch: amd64 }
    - sid: node-1.example.com
      covens: [create, redis]
      soulprint:
        network: { primary_ip: 10.0.0.1 }
        os: { arch: amd64 }
    - sid: node-2.example.com
      covens: [create, redis]
      soulprint:
        network: { primary_ip: 10.0.0.2 }
        os: { arch: amd64 }
  vault:
    secret/redis/create:
      password: s3cr3t-redis-pass-create
    # Per-user секреты системных юзеров (secret/redis/<inc>/users/<name>#password) —
    # их резолвит keeper-side vault() при доливе system_acl_users в apply.input.users.
    secret/redis/create/users/replica:
      password: replica-sys-secret-pass
    secret/redis/create/users/monitoring:
      password: monitoring-sys-secret-pass
    secret/redis/create/users/sentinel:
      password: sentinel-sys-secret-pass
    secret/redis/create/users/haproxy:
      password: haproxy-sys-secret-pass
  essence:
    redis_type: sentinel
    sentinel_master_name: master
    modules_base_url: "https://artifacts.example.com/redis/modules"
    memory_reserve_percent: 75
    persistence_presets:
      rdb:
        save: "900 1 300 10 60 10000"
        appendonly: "no"
    redis_config:
      maxmemory:        "256mb"
      maxmemory-policy: allkeys-lru
      maxclients:       10000
      timeout:          300

    # Системные ACL-юзеры redis-server + sentinel-демона (1:1 из essence/_default.yaml).
    # ОБА ОБЯЗАТЕЛЬНЫ: guard create/sentinel.yml (assert 1b) рвёт render при пустом
    # любом из наборов (тихий fail-open недопустим — без них репликация/sentinel↔redis
    # AUTH сломались бы).
    system_acl_users:
      replica:    "+psync +replconf +ping"
      monitoring: "-@all +@connection +client +ping +info +config|get +cluster|info +slowlog +latency +memory +select +command|count +command|docs"
      sentinel:   "allchannels +multi +slaveof +ping +exec +subscribe +config|rewrite +role +publish +info +client|setname +client|kill +script|kill"
      haproxy:    "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +info +cluster|info"
    system_acl_users_sentinel:
      default:    "allchannels allkeys +@all"
      monitoring: "-@all +@connection -command +client -hello +info -auth +sentinel|masters +sentinel|replicas +sentinel|slaves +sentinel|sentinels +sentinel|ckquorum"
      sentinel:   "allchannels -@all +auth +client|getname +client|id +client|setname +command +hello +ping +sentinel|is-master-down-by-addr +publish +role +sentinel|get-master-addr-by-name +sentinel|master +sentinel|myid +sentinel|replicas +sentinel|sentinels"
      haproxy:    "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +sentinel|get-master-addr-by-name +sentinel|master +sentinel|myid +sentinel|replicas +sentinel|sentinels"
  input:
    redis_type: sentinel
    # version ОБЯЗАТЕЛЬНА (директива пользователя 2026-06-23): фиксированный
    # distro-native пин (мажор < 8 → version-gate модулей не активен).
    version: "7.2.4"
    replicas_per_master: 2

assert:
  # sentinel size-guard PASS: 3 == 1+2 → assert: (ADR-009 amendment), в план не
  # эмитится.
  task_present:
    # ── sentinel destiny: redis.conf (sentinel-режим: НЕТ cluster-директив) ──
    # render_context.self = первый по SID хост (node-1, host-инвариант apply.input).
    # Дизамбигуатор от users.acl/hardening (тот же core.file.rendered) — path.
    - module: core.file.rendered
      params_subset:
        path: /etc/redis/redis.conf
        template_content: "<present>"
        mode: "0640"
        owner: redis
        group: redis
        render_context:
          vars:
            password: s3cr3t-redis-pass-create
            conf_dir: /etc/redis
            data_dir: /var/lib/redis
            loadmodules:
              - /var/lib/redis/modules/redisbloom.so
              - /var/lib/redis/modules/rejson.so
              - /var/lib/redis/modules/redisearch.so
              - /var/lib/redis/modules/redistimeseries.so
            config:
              maxmemory:        "256mb"
              maxmemory-policy: allkeys-lru
              maxclients:       10000
              timeout:          300
              save:             "900 1 300 10 60 10000"
              appendonly:       "no"
          self:
            sid: node-1.example.com
            covens: [create, redis]
            choirs: []
            # traits — registry-проекция (ADR-060), пустой объект без меток.
            traits: {}
            role: ""
            network:
              primary_ip: 10.0.0.1
            os:
              arch: amd64
          role: ""
          essence: {}

    # ── REPLICAOF реплик (community.redis.replica) ──────────────────────────
    # addr=127.0.0.1:6379 (per-host локальный инвариант), master_addr — master-
    # election (первый по SID = node-1 = 10.0.0.1). ★ P0: задача несёт
    # `where: soulprint.self.sid != soulprint.hosts[0].sid` — рендерится ТОЛЬКО на
    # репликах (node-2/node-3), на master-хосте (node-1) ОТСУТСТВУЕТ (master НЕ
    # реплицирует сам себя). addr=127.0.0.1 НИКОГДА не равен master_addr=10.0.0.1
    # ни на одном хосте → плагин-guard (addr==master_addr → no-op) в prod не
    # срабатывает, реальная защита — этот where. Per-host отсутствие задачи на
    # master доказано render-ассертом TargetSIDs (TestAcceptance_SentinelReplicaExcludesMaster).
    # Params host-инвариантны → presence сверяет одни и те же params реплик.
    # Единственная community.redis.replica в плане → дизамбигуатор не нужен.
    - module: community.redis.replica
      params_subset:
        addr: "127.0.0.1:6379"
        master_addr: "10.0.0.1:6379"
        password: s3cr3t-redis-pass-create

    # ── SENTINEL MONITOR reconcile (community.redis.sentinel) ───────────────
    # monitor.ip — HOST-ИНВАРИАНТНЫЙ адрес master-а (master-election node-1).
    # quorum=2 (АВТО: size(3)/2+1). master_name=master (essence-дефолт). auth_pass —
    # keeper-side vault()-резолв. Единственная активная.
    # ★ #7: config несёт per-master тайминги failover (дефолты 5000/60000) ключами
    # `sentinel <opt> <master>` — плагин classifyConfig раскладывает их в per-master.
    - module: community.redis.sentinel
      params_subset:
        addr: "127.0.0.1:26379"
        master_name: master
        auth_pass: s3cr3t-redis-pass-create
        redis_version: "7.2.4"
        config:
          "sentinel down-after-milliseconds master": "5000"
          "sentinel failover-timeout master": "60000"
        monitor:
          ip: 10.0.0.1
          port: 6379
          quorum: 2

  # sentinel-факты в state: redis_type sentinel + redis_config (БЕЗ cluster-
  # директив) + master_name/quorum + пустые users/hosts (declared-роли в apply,
  # не в state — соответствует cluster-precedent).
  state_changes:
    redis_type: sentinel
    redis_version: "7.2.4"
    redis_config:
      maxmemory:        "256mb"
      maxmemory-policy: allkeys-lru
      maxclients:       10000
      timeout:          300
      save:             "900 1 300 10 60 10000"
      appendonly:       "no"
    redis_users: []
    redis_hosts: []
    redis_sentinel:
      master_name: master
      quorum: 0
      down_after_ms: 5000
      failover_timeout_ms: 60000
    # ── namedfields (read-model, v3): топология sentinel. replicas=2 (UNIFIED
    # replicas_per_master, реплик master-а), sentinel_quorum=0 (АВТО, не материализуется
    # в state). shards=0 (не cluster).
    replicas: 2
    sentinel_quorum: 0
    shards: 0
    persistence: rdb
    maxmemory_policy: ""
    install:
      method: package
    tls:
      enable:   false
      only:     false
      port:     7379
      cert_ref: ""
      key_ref:  ""
      ca_ref:   ""
    memory_mb: 0
    modules: [bloom, json, search, timeseries]
    sysctl_settings: {}
