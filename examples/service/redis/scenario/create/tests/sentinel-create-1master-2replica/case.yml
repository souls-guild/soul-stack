# L0-испытание create в режиме sentinel (redis-консолидация). Multi-host roster
# (fixtures.hosts) из 3 хостов: replicas=2 → топология 1+2=3 (size-guard проходит).
# Master-election: первый по SID хост (node-1) = master; node-2/node-3 = реплики.
#
# Render-only, герметично. Диспетчер create инклудит standalone.yml + cluster.yml
# + sentinel.yml; на sentinel-прогоне standalone/cluster-ветки гасятся placeholder-
# skip-ом (static-when input.redis_type != 'sentinel'), sentinel-ветка рендерится.
#
# Что ассертим (критерий приёмки слайса):
#   1. size-guard PASS-форма: 3 == 1 + 2 → "true" встроено в test (обе ветки size-
#      guard покрыты вместе с парным sentinel-size-guard-mismatch).
#   2. ANTI-TILING: master_addr (REPLICAOF) и monitor.ip (SENTINEL MONITOR) —
#      HOST-ИНВАРИАНТНЫ, оба = primary_ip первого по SID хоста (node-1 = 10.0.0.1).
#      announce-ip в этих params НЕТ — он per-host в sentinel.conf.tmpl из .self
#      (отдельный destiny_redis_sentinel_tmpl_test.go).
#   3. plugin community.redis.replica: addr=127.0.0.1:6379 (per-host инвариант,
#      локальный), master_addr=10.0.0.1:6379 (master-election).
#   4. plugin community.redis.sentinel: monitor.ip=10.0.0.1, quorum=2 (input).
#
# ВНИМАНИЕ L0-ограничение: apply.input host-инвариантен в пилоте (резолвится на
# ПЕРВОМ targeted-хосте, resolveApplyInput) → render_context.self в destiny =
# первый по SID хост (node-1). Per-host announce-ip НЕ протаскивается через
# apply.input — он рендерится в sentinel.conf.tmpl из .self КАЖДОГО хоста
# (per-host корректность — прямой tmpl-рендер destiny_redis_sentinel_tmpl_test.go).
name: sentinel create 1 master + 2 replicas with monitor reconcile

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  # Порядок в YAML намеренно не отсортирован (3, 1, 2) — harness и master-election
  # обязаны отсортировать по SID (node-1 = master).
  hosts:
    - sid: node-3.example.com
      covens: [create, redis]
      soulprint:
        network: { primary_ip: 10.0.0.3 }
        os: { arch: amd64 }
    - sid: node-1.example.com
      covens: [create, redis]
      soulprint:
        network: { primary_ip: 10.0.0.1 }
        os: { arch: amd64 }
    - sid: node-2.example.com
      covens: [create, redis]
      soulprint:
        network: { primary_ip: 10.0.0.2 }
        os: { arch: amd64 }
  vault:
    secret/redis/create:
      password: s3cr3t-redis-pass-create
  essence:
    redis_type: sentinel
    memory_reserve_percent: 75
    persistence_presets:
      rdb:
        save: "900 1 300 10 60 10000"
        appendonly: "no"
    redis_config:
      maxmemory:        "256mb"
      maxmemory-policy: allkeys-lru
      maxclients:       10000
      timeout:          300

  input:
    redis_type: sentinel
    replicas: 2
    sentinel_quorum: 2
    sentinel_master_name: mymaster

assert:
  rendered_tasks:
    # ── size-guard (core.cmd.shell) ─────────────────────────────────────────
    # index 0 — mode-guard диспетчера (sentinel реализован → no-op); cluster-ветка
    # (mode/shards/size-guard + apply + ping + build) — placeholder-skip, занимает
    # слоты 1..7. sentinel size-guard теперь на index 8: 3 == 1 + 2 → "true".
    - index: 8
      module: core.cmd.shell
      params:
        cmd: 'test "true" = "true" || { echo "topology mismatch: hosts != 1 + replicas"; exit 1; }'

    # ── sentinel destiny: redis.conf (sentinel-режим: НЕТ cluster-директив) ──
    # render_context.self = первый по SID хост (node-1, host-инвариант apply.input).
    - index: 12
      module: core.file.rendered
      params:
        path: /etc/redis/redis.conf
        template_content: "<present>"
        mode: "0640"
        owner: redis
        group: redis
        render_context:
          vars:
            password: s3cr3t-redis-pass-create
            config:
              maxmemory:        "256mb"
              maxmemory-policy: allkeys-lru
              maxclients:       10000
              timeout:          300
              save:             "900 1 300 10 60 10000"
              appendonly:       "no"
          self:
            sid: node-1.example.com
            covens: [create, redis]
            choirs: []
            role: ""
            network:
              primary_ip: 10.0.0.1
            os:
              arch: amd64
          role: ""
          essence: {}

    # ── REPLICAOF реплик (community.redis.replica) ──────────────────────────
    # addr=127.0.0.1:6379 (per-host локальный инвариант), master_addr — master-
    # election (первый по SID = node-1 = 10.0.0.1). ★ P0: задача несёт
    # `where: soulprint.self.sid != soulprint.hosts[0].sid` — рендерится ТОЛЬКО на
    # репликах (node-2/node-3), на master-хосте (node-1) ОТСУТСТВУЕТ (master НЕ
    # реплицирует сам себя). addr=127.0.0.1 НИКОГДА не равен master_addr=10.0.0.1
    # ни на одном хосте → плагин-guard (addr==master_addr → no-op) в prod не
    # срабатывает, реальная защита — этот where. Per-host отсутствие задачи на
    # master доказано render-ассертом TargetSIDs (TestAcceptance_SentinelReplicaExcludesMaster).
    # Params host-инвариантны → L0 assert by-index сверяет одни и те же params
    # реплик.
    - index: 24
      module: community.redis.replica
      params:
        addr: "127.0.0.1:6379"
        master_addr: "10.0.0.1:6379"
        password: s3cr3t-redis-pass-create

    # ── SENTINEL MONITOR reconcile (community.redis.sentinel) ───────────────
    # monitor.ip — HOST-ИНВАРИАНТНЫЙ адрес master-а (master-election node-1).
    # quorum=2 (input.sentinel_quorum). auth_pass — keeper-side vault()-резолв.
    - index: 25
      module: community.redis.sentinel
      params:
        addr: "127.0.0.1:26379"
        master_name: mymaster
        auth_pass: s3cr3t-redis-pass-create
        redis_version: ""
        monitor:
          ip: 10.0.0.1
          port: 6379
          quorum: 2

  # sentinel-факты в state: redis_type sentinel + redis_config (БЕЗ cluster-
  # директив) + master_name/quorum + пустые users/hosts (declared-роли в apply,
  # не в state — соответствует cluster-precedent).
  state_changes:
    redis_type: sentinel
    redis_version: ""
    redis_config:
      maxmemory:        "256mb"
      maxmemory-policy: allkeys-lru
      maxclients:       10000
      timeout:          300
      save:             "900 1 300 10 60 10000"
      appendonly:       "no"
    redis_users: {}
    redis_hosts: []
    redis_sentinel:
      master_name: mymaster
      quorum: 2
