# L0-испытание create (standalone) — VERSION-GUARD Redis 8+ на binary-install.
# РЕГРЕСС-КЕЙС к BLOCKER-у redis8-гейта: на Redis 8 модули ВСТРОЕНЫ в сервер, поэтому
# .so качать и loadmodule писать НЕЛЬЗЯ — иначе redis-server 8 получил бы 4 НЕСОВМЕСТИМЫХ
# .so + loadmodule → не стартовал бы (а state писал бы modules:[] — рассинхрон с фактом).
# Гейт по ЭФФЕКТИВНОЙ версии: vars.redis_effective_version = input.version (когда непуст)
# ИНАЧЕ input.install.version; 8.x-regex (redis_is_v8plus) применяется к ней.
#
# ★ Редизайн input-контракта: version теперь REQUIRED enum выкаченных в Nexus сборок
# (передаётся ВСЕГДА, не '') — эффективная версия = input.version напрямую. URL/версия
# бинаря: base_url из essence (author-context), версия из input.version 8.0.3.
#
# Контр-кейс к install-binary (version 7.4.1 → модули ВКЛЮЧЕНЫ). Здесь version=8.0.3
# (мажор 8 → redis8) → version-guard ГАСИТ модули (встроены в Redis 8):
#   - include modules.yml gated на deploy_redis && !redis8 → redis8 истинно по
#     эффективной версии (input.version 8.0.3) → group-drop: modules-dir + fetch-loop
#     ФИЗИЧЕСКИ отсутствуют в плане;
#   - loadmodules-ячейка redis.conf: redis8 → [] → секции loadmodule нет;
#   - state.modules = [] (compute.redis_modules_deployed: redis8 → []).
# Регресс «version-guard не сработал на 8.x» = модули протекли бы (modules-dir + .so +
# непустой loadmodules + state.modules≠[]).
name: redis 8 version guard skips modules on binary install

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  hosts:
    - sid: node-solo.example.com
      covens: [create]
      soulprint:
        network: { primary_ip: 10.0.0.5 }
        # os.version нужен binary-URL (.../Debian/<distro_ver>/...) — Debian 12.
        os: { arch: amd64, version: "12" }
  vault:
    secret/redis/create:
      password: s3cr3t-redis-pass-create
    # Per-user секреты системных юзеров (secret/redis/<inc>/users/<name>#password) —
    # их резолвит keeper-side vault() при доливе system_acl_users в apply.input.users.
    # ★ РЕДИЗАЙН default_admin (2026-06-30): default_admin — системный юзер
    # внутрикластерного AUTH (auth_pass/PING шаги деплоя читают его по ветке users/<name>).
    secret/redis/create/users/default_admin:
      password: default-admin-secret-pass
    secret/redis/create/users/replica:
      password: replica-sys-secret-pass
    secret/redis/create/users/monitoring:
      password: monitoring-sys-secret-pass
    secret/redis/create/users/sentinel:
      password: sentinel-sys-secret-pass
    secret/redis/create/users/haproxy:
      password: haproxy-sys-secret-pass
  essence:
    # install_method — в essence (author-context, 2026-06-28): способ установки
    # НЕ operator-input. compute.install читает default(essence.install_method, 'binary').
    install_method: binary
    redis_type: sentinel
    sentinel_master_name: master
    # ★ Редизайн: подложка per-master sentinel-дефолтов (под input.sentinel_master_settings).
    sentinel_master_defaults:
      down-after-milliseconds: "5000"
      failover-timeout:        "60000"
    memory_reserve_percent: 75
    persistence_presets:
      rdb:
        save: "900 1 300 10 60 10000"
        appendonly: "no"
    redis_config:
      maxmemory: "256mb"

    # ★ Редизайн (#1): URL бинаря — в essence (author-context, Nexus-mirror). Версия —
    # операторский input.version (enum выкаченных сборок 8.0.3), НЕ essence.binary_version.
    # version=8.0.3 (мажор 8 → redis8) → version-guard гасит модули (встроены в Redis 8).
    binary_base_url: "https://downloads.example.com/redis"

    # Системные ACL-юзеры redis-server + sentinel-демона (1:1 из essence/_default.yaml).
    # ОБА ОБЯЗАТЕЛЬНЫ: guard create/sentinel.yml (assert 1b) рвёт render при пустом
    # любом из наборов (тихий fail-open недопустим — без них репликация/sentinel↔redis
    # AUTH сломались бы).
    system_acl_users:
      default_admin: "~* &* +@all"
      replica:    "+psync +replconf +ping"
      monitoring: "-@all +@connection +client +ping +info +config|get +cluster|info +slowlog +latency +memory +select +command|count +command|docs"
      sentinel:   "allchannels +multi +slaveof +ping +exec +subscribe +config|rewrite +role +publish +info +client|setname +client|kill +script|kill"
      haproxy:    "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +info +cluster|info"
    system_acl_users_sentinel:
      default_admin: "allchannels allkeys +@all"
      monitoring: "-@all +@connection -command +client -hello +info -auth +sentinel|masters +sentinel|replicas +sentinel|slaves +sentinel|sentinels +sentinel|ckquorum"
      sentinel:   "allchannels -@all +auth +client|getname +client|id +client|setname +command +hello +ping +sentinel|is-master-down-by-addr +publish +role +sentinel|get-master-addr-by-name +sentinel|master +sentinel|myid +sentinel|replicas +sentinel|sentinels"
      haproxy:    "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +sentinel|get-master-addr-by-name +sentinel|master +sentinel|myid +sentinel|replicas +sentinel|sentinels"
  input:
    # ★ provision выключен (default-on: опущенная секция = ВКЛЮЧЕНО; кейс деплоит на
    # ГОТОВЫЙ roster, cloud-create не нужен) → include redis-provision.yml group-drop.
    provision:
      enabled: false
    redis_type: sentinel
    persistence: rdb
    # version — REQUIRED enum выкаченных в Nexus сборок; 8.0.3 ∈ enum (мажор 8 → redis8
    # version-guard ГАСИТ модули: встроены в сервер). binary качает бинари этой версии.
    version: "8.0.3"
    # single-host sentinel (1 хост) → 0 реплик (default редизайна 2): size-guard 1+0.
    replicas_per_master: 0

assert:
  task_present:
    # ★ Редизайн install-модели: бинари качаются ЧЕТЫРЬМЯ отдельными core.url.fetched
    # прямо в /usr/local/bin (НЕ tarball). URL per-host: <base_url>/<arch>/Debian/
    # <distro_ver>/<version>/redis-* (x86_64/Debian/12/8.0.3). Бинари ставятся ВСЕГДА —
    # version-guard гасит только .so модулей, не сам redis. Дизамбигуатор — url/path.
    - module: core.url.fetched
      params_subset:
        url: "https://downloads.example.com/redis/x86_64/Debian/12/8.0.3/redis-server"
        path: /usr/local/bin/redis-server
        mode: "0755"
        owner: root
        group: root

    # data/log-dir (обе ветки, БЕЗУСЛОВНО): binary-ветка пакета не несёт → создаём явно
    # ДО старта redis-server (иначе redis-server на binary-инсталляции не находит data-dir).
    # owner redis, parents:true. Дизамбигуатор от socket/modules/tls-dir — path.
    - module: core.file.directory
      params_subset:
        path: /var/lib/redis
        owner: redis
        group: redis
        mode: "0750"
        parents: true
    - module: core.file.directory
      params_subset:
        path: /var/log/redis
        owner: redis
        group: redis
        mode: "0750"
        parents: true

    # redis.conf БЕЗ loadmodules (version-gate Redis 8+ → пустой список): vars.loadmodules:
    # []. Регресс «version-guard не сработал» = непустой loadmodules + .so в плане.
    # Дизамбигуатор от users.acl/hardening/unit — path.
    - module: core.file.rendered
      params_subset:
        path: /etc/redis/redis.conf
        template_content: "<present>"
        mode: "0640"
        owner: redis
        group: redis
        render_context:
          vars:
            conf_dir: /etc/redis
            data_dir: /var/lib/redis
            port: 6379
            run_dir: /var/run/redis
            log_dir: /var/log/redis
            loadmodules: []
            config:
              # ★ РЕДИЗАЙН default_admin: replica→master AUTH (masteruser/
              # masterauth) приходит ОБЫЧНЫМИ директивами config (sentinel
              # deploy-body доливает их vault()-в-ячейке) → redis.conf range-ит
              # их как любую директиву → статически переживают рестарт.
              masteruser:       "default_admin"
              masterauth:       "default-admin-secret-pass"
              maxmemory: "256mb"
              save: "900 1 300 10 60 10000"
              appendonly: "no"
          self:
            sid: node-solo.example.com
            covens: [create]
            choirs: []
            # traits — registry-проекция (ADR-060), пустой объект без меток.
            traits: {}
            role: ""
            network:
              primary_ip: 10.0.0.5
            os:
              arch: amd64
              version: "12"
          role: ""
          essence: {}

    # standalone-PING: cluster/sentinel ветки — placeholder-skip; дизамбигуатор addr/args.
    - module: community.redis.command
      params_subset:
        addr: "127.0.0.1:6379"
        username: default_admin
        password: default-admin-secret-pass
        args: ["PING"]

  task_absent:
    # VERSION-GATE Redis 8+ (по эффективной версии = input.version 8.0.3): include
    # modules.yml gated на deploy_redis && !redis8 → group-drop (modules-dir отсутствует
    # в плане). Регресс «version-guard не сработал на 8.x» = modules-dir протёк.
    - module: core.file.directory
      params_subset:
        path: /var/lib/redis/modules
    # .so fetch: include modules.yml group-dropped → fetch-loop отсутствует.
    # Дизамбигуатор от binary-fetch (redis-* в плане) — path .so.
    - module: core.url.fetched
      params_subset:
        path: /var/lib/redis/modules/redisearch.so
    # GUARD «method=binary НЕ активирует package-ветку»: core.pkg.installed static-skip.
    - module: core.pkg.installed
      params_subset:
        name: redis-server

  state_changes:
    redis_type: sentinel
    # redis_version = input.version (enum выкаченных в Nexus сборок; binary качает её бинари).
    redis_version: "8.0.3"
    # Redis 8+ → модули встроены, .so не качаются → развёрнутый набор пуст.
    modules: []
    install:
      method:        binary
      base_url:      "https://downloads.example.com/redis"
      version:       "8.0.3"
      # allow_private — compute.install несёт его (SSRF-guard fetch бинарей с internal
      # Nexus; default essence.binary_allow_private=true).
      allow_private: true
