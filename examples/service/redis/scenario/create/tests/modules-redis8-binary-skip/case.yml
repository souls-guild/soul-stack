# L0 test for create (standalone) - VERSION GUARD for Redis 8+ on binary install.
# REGRESSION CASE for the redis8-gate BLOCKER: on Redis 8 modules are BUILT INTO the
# server, so .so must NOT be downloaded and loadmodule must NOT be written - otherwise
# redis-server 8 would get 4 INCOMPATIBLE .so + loadmodule entries and fail to start
# (while state would write modules:[] - out of sync with reality).
# Gated on the EFFECTIVE version: vars.redis_effective_version = input.version (when
# non-empty) OTHERWISE input.install.version; the 8.x regex (redis_is_v8plus) applies to it.
#
# * Input contract redesign: version is now a REQUIRED enum of builds published to
# Nexus (ALWAYS passed, never ''), so the effective version = input.version directly.
# Binary URL/version: base_url from essence (author-context), version from input.version
# 8.0.3.
#
# Counter-case to install-binary (version 7.4.1 -> modules ENABLED). Here version=8.0.3
# (major 8 -> redis8) -> version-guard SUPPRESSES modules (built into Redis 8):
#   - the modules.yml include is gated on deploy_redis && !redis8 -> redis8 is true by
#     the effective version (input.version 8.0.3) -> group-drop: modules-dir +
#     fetch-loop are PHYSICALLY absent from the plan;
#   - the loadmodules cell in redis.conf: redis8 -> [] -> no loadmodule section;
#   - state.modules = [] (compute.redis_modules_deployed: redis8 -> []).
# Regression "version-guard didn't fire on 8.x" = modules would leak (modules-dir + .so +
# non-empty loadmodules + state.modules != []).
name: redis 8 version guard skips modules on binary install

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  hosts:
    - sid: node-solo.example.com
      covens: [create]
      soulprint:
        network: { primary_ip: 10.0.0.5 }
        # os.version is needed for the binary URL (.../Debian/<distro_ver>/...) - Debian 12.
        os: { arch: amd64, version: "12" }
  vault:
    secret/redis/create:
      password: s3cr3t-redis-pass-create
    # Per-user secrets for system users (secret/redis/<inc>/users/<name>#password) -
    # resolved by keeper-side vault() when merging system_acl_users into apply.input.users.
    # * default_admin REDESIGN (2026-06-30): default_admin is the system user for
    # intra-cluster AUTH (deploy's auth_pass/PING steps read it via the users/<name> branch).
    secret/redis/create/users/default_admin:
      password: default-admin-secret-pass
    secret/redis/create/users/replica:
      password: replica-sys-secret-pass
    secret/redis/create/users/monitoring:
      password: monitoring-sys-secret-pass
    secret/redis/create/users/sentinel:
      password: sentinel-sys-secret-pass
    secret/redis/create/users/haproxy:
      password: haproxy-sys-secret-pass
  essence:
    # install_method - in essence (author-context, 2026-06-28): the install method is
    # NOT operator input. compute.install reads default(essence.install_method, 'binary').
    install_method: binary
    redis_type: sentinel
    sentinel_master_name: master
    # * Redesign: substrate of per-master sentinel defaults (under input.sentinel_master_settings).
    sentinel_master_defaults:
      down-after-milliseconds: "5000"
      failover-timeout:        "60000"
    memory_reserve_percent: 75
    persistence_presets:
      rdb:
        save: "900 1 300 10 60 10000"
        appendonly: "no"
    redis_config:
      maxmemory: "256mb"

    # * Redesign (#1): binary URL is in essence (author-context, Nexus mirror). Version
    # is the operator's input.version (enum of published builds, 8.0.3), NOT essence.binary_version.
    # version=8.0.3 (major 8 -> redis8) -> version-guard suppresses modules (built into Redis 8).
    binary_base_url: "https://downloads.example.com/redis"

    # System ACL users for redis-server + the sentinel daemon (1:1 from essence/_default.yaml).
    # BOTH ARE REQUIRED: the guard in create/sentinel.yml (assert 1b) breaks rendering if
    # either set is empty (a silent fail-open is unacceptable - without them replication/
    # sentinel<->redis AUTH would break).
    system_acl_users:
      default_admin: "~* &* +@all"
      replica:    "+psync +replconf +ping"
      monitoring: "-@all +@connection +client +ping +info +config|get +cluster|info +slowlog +latency +memory +select +command|count +command|docs"
      sentinel:   "allchannels +multi +slaveof +ping +exec +subscribe +config|rewrite +role +publish +info +client|setname +client|kill +script|kill"
      haproxy:    "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +info +cluster|info"
    system_acl_users_sentinel:
      default_admin: "allchannels allkeys +@all"
      monitoring: "-@all +@connection -command +client -hello +info -auth +sentinel|masters +sentinel|replicas +sentinel|slaves +sentinel|sentinels +sentinel|ckquorum"
      sentinel:   "allchannels -@all +auth +client|getname +client|id +client|setname +command +hello +ping +sentinel|is-master-down-by-addr +publish +role +sentinel|get-master-addr-by-name +sentinel|master +sentinel|myid +sentinel|replicas +sentinel|sentinels"
      haproxy:    "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +sentinel|get-master-addr-by-name +sentinel|master +sentinel|myid +sentinel|replicas +sentinel|sentinels"
  input:
    # * provision disabled (default-on: an omitted section = ENABLED; this case deploys
    # onto an EXISTING roster, no cloud-create needed) -> redis-provision.yml include group-drop.
    provision:
      enabled: false
    redis_type: sentinel
    persistence: rdb
    # version - REQUIRED enum of builds published to Nexus; 8.0.3 is in the enum (major 8
    # -> redis8 version-guard SUPPRESSES modules: built into the server). binary downloads
    # this version's binaries.
    version: "8.0.3"
    # single-host sentinel (1 host) -> 0 replicas (default from redesign 2): size-guard 1+0.
    replicas_per_master: 0

assert:
  task_present:
    # * Install model redesign: binaries are downloaded via FOUR separate core.url.fetched
    # steps directly into /usr/local/bin (NOT a tarball). Per-host URL: <base_url>/<arch>/Debian/
    # <distro_ver>/<version>/redis-* (x86_64/Debian/12/8.0.3). Binaries are ALWAYS installed -
    # version-guard only suppresses module .so files, not redis itself. Disambiguator - url/path.
    - module: core.url.fetched
      params_subset:
        url: "https://downloads.example.com/redis/x86_64/Debian/12/8.0.3/redis-server"
        path: /usr/local/bin/redis-server
        mode: "0755"
        owner: root
        group: root

    # data/log-dir (both branches, UNCONDITIONALLY): the binary branch has no package to
    # carry them -> create explicitly BEFORE redis-server starts (otherwise redis-server
    # on a binary install can't find the data dir). owner redis, parents:true.
    # Disambiguator from socket/modules/tls-dir - path.
    - module: core.directory.present
      params_subset:
        path: /var/lib/redis
        owner: redis
        group: redis
        mode: "0750"
        parents: true
    - module: core.directory.present
      params_subset:
        path: /var/log/redis
        owner: redis
        group: redis
        mode: "0750"
        parents: true

    # redis.conf WITHOUT loadmodules (version-gate Redis 8+ -> empty list): vars.loadmodules:
    # []. Regression "version-guard didn't fire" = non-empty loadmodules + .so in the plan.
    # Disambiguator from users.acl/hardening/unit - path.
    - module: core.file.rendered
      params_subset:
        path: /etc/redis/redis.conf
        template_content: "<present>"
        mode: "0640"
        owner: redis
        group: redis
        render_context:
          vars:
            conf_dir: /etc/redis
            data_dir: /var/lib/redis
            port: 6379
            run_dir: /var/run/redis
            log_dir: /var/log/redis
            loadmodules: []
            config:
              # * default_admin REDESIGN: replica->master AUTH (masteruser/
              # masterauth) arrives as ORDINARY config directives (sentinel
              # deploy-body fills them via a vault() cell) -> redis.conf ranges
              # over them like any directive -> they statically survive a restart.
              masteruser:       "default_admin"
              masterauth:       "default-admin-secret-pass"
              maxmemory: "256mb"
              save: "900 1 300 10 60 10000"
              appendonly: "no"
          self:
            sid: node-solo.example.com
            covens: [create]
            choirs: []
            # traits - registry projection (ADR-060), empty object with no labels.
            traits: {}
            role: ""
            network:
              primary_ip: 10.0.0.5
            os:
              arch: amd64
              version: "12"
          role: ""
          essence: {}

    # standalone-PING: cluster/sentinel branches - placeholder-skip; disambiguator addr/args.
    - module: community.redis.command
      params_subset:
        addr: "127.0.0.1:6379"
        username: default_admin
        password: default-admin-secret-pass
        args: ["PING"]

  task_absent:
    # VERSION-GATE Redis 8+ (by effective version = input.version 8.0.3): the
    # modules.yml include is gated on deploy_redis && !redis8 -> group-drop (modules-dir
    # is absent from the plan). Regression "version-guard didn't fire on 8.x" = modules-dir leaked.
    - module: core.directory.present
      params_subset:
        path: /var/lib/redis/modules
    # .so fetch: modules.yml include group-dropped -> fetch-loop is absent.
    # Disambiguator from binary-fetch (redis-* in the plan) - path .so.
    - module: core.url.fetched
      params_subset:
        path: /var/lib/redis/modules/redisearch.so
    # GUARD "method=binary does NOT activate the package branch": core.pkg.installed static-skip.
    - module: core.pkg.installed
      params_subset:
        name: redis-server

  state_changes:
    redis_type: sentinel
    # redis_version = input.version (enum of builds published to Nexus; binary downloads its binaries).
    redis_version: "8.0.3"
    # Redis 8+ -> modules are built in, no .so downloaded -> the deployed set is empty.
    modules: []
