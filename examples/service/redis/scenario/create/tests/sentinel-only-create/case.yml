# L0-испытание create в режиме sentinel_only (redis-консолидация). Тонкий
# sentinel-слой: ТОЛЬКО sentinel-демон (deploy_redis=false → data-плоскость
# redis-server НЕ разворачивается), мониторящий ВНЕШНИЙ master из input.master_ip.
# Multi-host roster (2 хоста) — sentinel-демон на КАЖДОМ; size-guard'а в этом
# режиме нет (любое число sentinel-ов валидно, кворум считается от их числа).
#
# Render-only, герметично. Диспетчер create инклудит standalone/cluster/sentinel/
# sentinel-only; на sentinel_only-прогоне первые три ветки гаснут placeholder-skip-
# ом (static-when input.redis_type != 'sentinel_only'), sentinel-only-ветка
# рендерится. ВНУТРИ destiny `redis` deploy_redis=false гасит data-плоскость:
# include server.yml дропается ЦЕЛИКОМ (conditional-include group-drop, ADR-009
# amendment) → redis.conf/users.acl/PEM/systemd redis-server ФИЗИЧЕСКИ ОТСУТСТВУЮТ в
# плане (не placeholder-skip — их задачи не рендерятся, indices не резервируются), но
# пакет redis ставится ВСЕГДА (install.yml безусловен, несёт sentinel-демон) +
# sentinel.conf/unit/демон (include sentinel.yml keep при sentinel_enabled).
#
# Что ассертим (критерий приёмки слайса):
#   1. mode-guard (index 0): sentinel_only реализован → "true" → no-op. master_ip-
#      guard УБРАН (required_when в main.yml: input.redis_type == 'sentinel_only'
#      ловит пропуск master_ip на input-валидации, см. sentinel-only-requires-master-ip).
#   2. install redis-server (index 10): пакет ставится ДАЖЕ при deploy_redis=false.
#      package-install — destiny-index 0 install.yml, ДО binary-под-ветки → +2 от
#      трёх core.file.present его НЕ касается (бинари рендерятся ПОСЛЕ пакета).
#   3. sentinel.conf РЕНДЕРИТСЯ: monitor ВНЕШНЕГО master 10.9.9.9, quorum
#      2 (size/2+1 при 2 хостах). data-плоскость redis-server в плане отсутствует
#      (include server.yml group-dropped — доказано render-acceptance
#      TestAcceptance_SentinelOnlySkipsRedisServer).
#   4. SENTINEL MONITOR: monitor.ip = input.master_ip 10.9.9.9 (ВНЕШНИЙ,
#      НЕ из soulprint.hosts), quorum 2.
#   5. PONG-gate :26379: same-task register.self (PONG), НЕ cross-passage.
name: sentinel_only deploys only sentinel daemon monitoring external master

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  hosts:
    - sid: node-2.example.com
      covens: [create, redis]
      soulprint:
        network: { primary_ip: 10.0.0.2 }
        os: { arch: amd64 }
    - sid: node-1.example.com
      covens: [create, redis]
      soulprint:
        network: { primary_ip: 10.0.0.1 }
        os: { arch: amd64 }
  vault:
    secret/redis/create:
      password: s3cr3t-redis-pass-create
  essence:
    redis_type: sentinel_only
    memory_reserve_percent: 75
    persistence_presets:
      rdb:
        save: "900 1 300 10 60 10000"
        appendonly: "no"
    redis_config:
      maxmemory:        "256mb"
      maxmemory-policy: allkeys-lru
      maxclients:       10000
      timeout:          300

  input:
    redis_type: sentinel_only
    # version ОБЯЗАТЕЛЬНА (директива пользователя 2026-06-23): фиксированный
    # distro-native пин (мажор < 8 → version-gate модулей не активен).
    version: "7.2.4"
    master_ip: 10.9.9.9

assert:
  task_present:
    # Install redis-server package: пакет ставится ВСЕГДА — несёт и sentinel-демон.
    # deploy_redis=false его НЕ гасит. binary-под-ветка install.yml — placeholder-skip
    # (method=package).
    - module: core.pkg.installed
      params_subset:
        name: redis-server
        version: "7.2.4"

    # sentinel.conf: РЕНДЕРИТСЯ (sentinel_enabled=true). vars: monitor ВНЕШНЕГО master
    # 10.9.9.9:6379, master_name mymaster, quorum 2 (size(2)/2+1). announce-ip НЕ в
    # vars — per-host в sentinel.conf.tmpl из .self. render_context.self = первый по
    # SID хост (node-1, host-инвариант apply.input). data-плоскость redis-server
    # (redis.conf/users.acl/systemd) — group-dropped (include server.yml выключен,
    # см. task_absent). Дизамбигуатор от sentinel-unit/hardening (тот же
    # core.file.rendered) — path.
    - module: core.file.rendered
      params_subset:
        path: /etc/redis/sentinel.conf
        template_content: "<present>"
        mode: "0640"
        owner: redis
        group: redis
        render_context:
          vars:
            master_name: mymaster
            master_ip: "10.9.9.9"
            master_port: "6379"
            quorum: "2"
            auth_user: ""
            auth_pass: s3cr3t-redis-pass-create
            sentinel_config: {}
          self:
            sid: node-1.example.com
            covens: [create, redis]
            choirs: []
            role: ""
            network:
              primary_ip: 10.0.0.1
            os:
              arch: amd64
          role: ""
          essence: {}

    # SENTINEL MONITOR: monitor.ip = input.master_ip 10.9.9.9 (ВНЕШНИЙ, НЕ из
    # soulprint.hosts — master живёт вне прогона). quorum 2 (size/2+1). sentinel-mode
    # вариант — placeholder-skip → единственная активная community.redis.sentinel.
    - module: community.redis.sentinel
      params_subset:
        addr: "127.0.0.1:26379"
        master_name: mymaster
        auth_pass: s3cr3t-redis-pass-create
        redis_version: "7.2.4"
        monitor:
          ip: "10.9.9.9"
          port: 6379
          quorum: 2

    # PONG-gate :26379: same-task register.self (PONG), НЕ cross-passage.
    # community.redis.pinged (единая идиома health-gate через плагин-state, НЕ raw
    # command args:[PING]). Единственная community.redis.pinged в плане.
    - module: community.redis.pinged
      params_subset:
        addr: "127.0.0.1:26379"

  task_absent:
    # GUARD «sentinel_only НЕ разворачивает data-плоскость redis-server»
    # (deploy_redis=false → include server.yml group-dropped: redis.conf/users.acl/
    # systemd redis-server ФИЗИЧЕСКИ отсутствуют в плане). presence task_absent ловит
    # обе формы (полное отсутствие group-drop'а и placeholder-skip). Регресс
    # «redis.conf протёк в sentinel_only» = задача отрендерится с реальными params →
    # match → fail.
    - module: core.file.rendered
      params_subset:
        path: /etc/redis/redis.conf
    - module: core.file.rendered
      params_subset:
        path: /etc/redis/users.acl

  # sentinel_only-факты в state: redis_type sentinel_only + redis_config ПУСТОЙ
  # (data-плоскости нет) + master_name/master_ip(ВНЕШНИЙ)/quorum + пустые
  # users/hosts.
  state_changes:
    redis_type: sentinel_only
    redis_version: "7.2.4"
    redis_config: {}
    redis_users: {}
    redis_hosts: []
    redis_sentinel:
      master_name: mymaster
      master_ip: "10.9.9.9"
      quorum: 0
