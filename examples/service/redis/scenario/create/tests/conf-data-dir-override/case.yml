# L0-испытание create (standalone) — OVERRIDE conf_dir/data_dir (директива B). Guard:
# оператор переопределяет базовые каталоги конфигурации и данных Redis, и эти пути
# ДОЕЗЖАЮТ до файловых задач destiny `redis`. Регресс-кейс к MAJOR-у: до фикса
# scenario create НЕ объявлял conf_dir/data_dir в input и НЕ прокидывал их в
# apply.input → destiny брала только дефолт (override был МЁРТВ). Фикс: scenario
# объявляет conf_dir/data_dir (default = текущий путь) и прокидывает в apply.input
# всех веток; destiny строит пути redis.conf/users.acl/tls/.so/modules-dir из них.
#
# Override: conf_dir=/opt/redis, data_dir=/srv/redis-data. Ожидаем:
#   - redis.conf, users.acl → /opt/redis/* (под conf_dir);
#   - modules-dir + .so → /srv/redis-data/modules/* (под data_dir);
#   - loadmodules в redis.conf → /srv/redis-data/modules/*.so (data_dir);
#   - redis.conf render_context несёт conf_dir/data_dir override → шаблон выводит
#     `dir` из data_dir (/srv/redis-data) и `aclfile` из conf_dir (/opt/redis/users.acl),
#     а НЕ захардкоженные /var/lib/redis ÷ /etc/redis/users.acl (директива B, фикс хардкода
#     dir/aclfile в redis.conf.tmpl мимо override);
#   - state.conf_dir/data_dir персистят override (day-2 add_node читает их).
# version=5:6.2.7 (< 8) → модули активны (.so под data_dir проверяемы). TLS off
# (этот кейс про ФАЙЛОВЫЕ пути задач destiny). TLS-директивы redis.conf под override
# conf_dir покрывает отдельный кейс conf-data-dir-override-tls (qa-фикс хардкода
# /etc/redis/tls в compute.redis_config).
name: conf_dir and data_dir override flow through to destiny file paths

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  hosts:
    - sid: node-solo.example.com
      covens: [create]
      soulprint:
        network: { primary_ip: 10.0.0.5 }
        os: { arch: amd64 }
  vault:
    secret/redis/create:
      password: s3cr3t-redis-pass-create
    # Per-user секреты системных юзеров (secret/redis/<inc>/users/<name>#password) —
    # их резолвит keeper-side vault() при доливе system_acl_users в apply.input.users.
    secret/redis/create/users/replica:
      password: replica-sys-secret-pass
    secret/redis/create/users/monitoring:
      password: monitoring-sys-secret-pass
    secret/redis/create/users/sentinel:
      password: sentinel-sys-secret-pass
    secret/redis/create/users/haproxy:
      password: haproxy-sys-secret-pass
  essence:
    redis_type: sentinel
    sentinel_master_name: master
    modules_base_url: "https://artifacts.example.com/redis/modules/6.2"
    memory_reserve_percent: 75
    persistence_presets:
      rdb:
        save: "900 1 300 10 60 10000"
        appendonly: "no"
    redis_config:
      maxmemory: "256mb"

    # Системные ACL-юзеры redis-server + sentinel-демона (1:1 из essence/_default.yaml).
    # ОБА ОБЯЗАТЕЛЬНЫ: guard create/sentinel.yml (assert 1b) рвёт render при пустом
    # любом из наборов (тихий fail-open недопустим — без них репликация/sentinel↔redis
    # AUTH сломались бы).
    system_acl_users:
      replica:    "+psync +replconf +ping"
      monitoring: "-@all +@connection +client +ping +info +config|get +cluster|info +slowlog +latency +memory +select +command|count +command|docs"
      sentinel:   "allchannels +multi +slaveof +ping +exec +subscribe +config|rewrite +role +publish +info +client|setname +client|kill +script|kill"
      haproxy:    "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +info +cluster|info"
    system_acl_users_sentinel:
      default:    "allchannels allkeys +@all"
      monitoring: "-@all +@connection -command +client -hello +info -auth +sentinel|masters +sentinel|replicas +sentinel|slaves +sentinel|sentinels +sentinel|ckquorum"
      sentinel:   "allchannels -@all +auth +client|getname +client|id +client|setname +command +hello +ping +sentinel|is-master-down-by-addr +publish +role +sentinel|get-master-addr-by-name +sentinel|master +sentinel|myid +sentinel|replicas +sentinel|sentinels"
      haproxy:    "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +sentinel|get-master-addr-by-name +sentinel|master +sentinel|myid +sentinel|replicas +sentinel|sentinels"
  input:
    redis_type: sentinel
    version: "5:6.2.7"
    persistence: rdb
    # ★ OVERRIDE host-layout (директива B): нестандартные conf/data каталоги.
    conf_dir: /opt/redis
    data_dir: /srv/redis-data

assert:
  task_present:
    # redis.conf под conf_dir override (/opt/redis), а loadmodules → под data_dir
    # override (/srv/redis-data/modules). Регресс «override мёртв» = /etc/redis/redis.conf
    # + loadmodules /var/lib/redis/modules. Дизамбигуатор от users.acl/hardening — path.
    - module: core.file.rendered
      params_subset:
        path: /opt/redis/redis.conf
        template_content: "<present>"
        mode: "0640"
        owner: redis
        group: redis
        render_context:
          vars:
            password: s3cr3t-redis-pass-create
            # ★ GUARD host-layout (директива B): conf_dir/data_dir доезжают в render_context
            # шаблона redis.conf → `dir` рендерится из data_dir (/srv/redis-data), `aclfile`
            # из conf_dir (${conf_dir}/users.acl → /opt/redis/users.acl). Регресс «dir/aclfile
            # захардкожены /var/lib/redis ÷ /etc/redis/users.acl мимо override» = эти ключи
            # отсутствуют/= дефолт → deepEqualJSON render_context FAIL.
            conf_dir: /opt/redis
            data_dir: /srv/redis-data
            loadmodules:
              - /srv/redis-data/modules/redisbloom.so
              - /srv/redis-data/modules/rejson.so
              - /srv/redis-data/modules/redisearch.so
              - /srv/redis-data/modules/redistimeseries.so
            config:
              maxmemory: "256mb"
              save: "900 1 300 10 60 10000"
              appendonly: "no"
          self:
            sid: node-solo.example.com
            covens: [create]
            choirs: []
            # traits — registry-проекция (ADR-060), пустой объект без меток.
            traits: {}
            role: ""
            network:
              primary_ip: 10.0.0.5
            os:
              arch: amd64
          role: ""
          essence: {}

    # users.acl под conf_dir override. Дизамбигуатор от redis.conf — path.
    - module: core.file.rendered
      params_subset:
        path: /opt/redis/users.acl
        mode: "0640"
        owner: redis
        group: redis

    # modules-dir под data_dir override. Дизамбигуатор от systemd-dropin-dir — path.
    - module: core.file.directory
      params_subset:
        path: /srv/redis-data/modules
        owner: redis
        group: redis
        mode: "0750"

    # .so fetch под data_dir override; URL арх-специфичен (amd64). Дизамбигуатор — path.
    - module: core.url.fetched
      params_subset:
        url: "https://artifacts.example.com/redis/modules/6.2/amd64/redisearch.so"
        path: /srv/redis-data/modules/redisearch.so
        mode: "0750"
        owner: redis
        group: redis

  task_absent:
    # Регресс «override не доехал, взят дефолт»: дефолтные пути НЕ должны появиться.
    - module: core.file.rendered
      params_subset:
        path: /etc/redis/redis.conf
    - module: core.url.fetched
      params_subset:
        path: /var/lib/redis/modules/redisearch.so

  state_changes:
    redis_type: sentinel
    redis_version: "5:6.2.7"
    modules: [bloom, json, search, timeseries]
    # ★ override персистит в state → day-2 add_node читает его (тот же layout у новой ноды).
    conf_dir: /opt/redis
    data_dir: /srv/redis-data
