# L0-испытание (Trial, ADR-023): ★ ANTI-DOWNGRADE guard (ИБ-фикс medium-crypto).
# Комбинация tls_enable=true && tls_only=FALSE (plain-порт ещё открыт): доказываем,
# что health-gate PING плагина коннектится ПО TLS, а НЕ plaintext-ом. Прежде tls/
# addr/tls_ca гейтились на essence.tls_only → при tls_only=false плагин уходил
# PLAINTEXT-ом на 6379 → AUTH-пароль открытым текстом по сети (downgrade). Теперь
# гейт на essence.tls_ENABLE: TLS включён → плагин ОБЯЗАН по TLS (tls=true, addr на
# tls_port, tls_ca). redis.conf при этом БЕЗ `port 0` (plain открыт, не only-TLS) —
# отличие от tls-enabled-standalone (там tls_only=true → port 0).
name: tls enabled without tls_only still connects plugin over TLS (no plaintext downgrade)

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  hosts:
    - sid: node-solo.example.com
      covens: [create]
      soulprint:
        network: { primary_ip: 10.0.0.5 }
        os: { arch: amd64 }
  vault:
    secret/redis/create:
      password: s3cr3t-redis-pass-create
    # Per-user секреты системных юзеров (secret/redis/<inc>/users/<name>#password) —
    # их резолвит keeper-side vault() при доливе system_acl_users в apply.input.users.
    # ★ РЕДИЗАЙН default_admin (2026-06-30): default_admin — системный юзер
    # внутрикластерного AUTH (auth_pass/PING шаги деплоя читают его по ветке users/<name>).
    secret/redis/create/users/default_admin:
      password: default-admin-secret-pass
    secret/redis/create/users/replica:
      password: replica-sys-secret-pass
    secret/redis/create/users/monitoring:
      password: monitoring-sys-secret-pass
    secret/redis/create/users/sentinel:
      password: sentinel-sys-secret-pass
    secret/redis/create/users/haproxy:
      password: haproxy-sys-secret-pass
    secret/services/redis/tls:
      cert: "-----BEGIN CERTIFICATE-----\nSERVERCERT\n-----END CERTIFICATE-----"
      key:  "-----BEGIN PRIVATE KEY-----\nSERVERKEY\n-----END PRIVATE KEY-----"
      ca:   "-----BEGIN CERTIFICATE-----\nCACERT\n-----END CERTIFICATE-----"
  essence:
    # install_method — в essence (author-context, 2026-06-28): способ установки
    # НЕ operator-input. compute.install читает default(essence.install_method, 'binary').
    install_method: package
    redis_type: sentinel
    sentinel_master_name: master
    # ★ Редизайн: подложка per-master sentinel-дефолтов (под input.sentinel_master_settings).
    sentinel_master_defaults:
      down-after-milliseconds: "5000"
      failover-timeout:        "60000"
    modules_base_url: "https://artifacts.example.com/redis/modules"
    memory_reserve_percent: 75
    persistence_presets:
      rdb:
        save: "900 1 300 10 60 10000"
        appendonly: "no"
    redis_config:
      maxmemory:        "256mb"
      maxmemory-policy: allkeys-lru
      maxclients:       10000
      timeout:          300
    # ★ #5: порт/refs — в essence; режим канала — input.connection_mode (tls_plain открыт).
    tls_port:   7379
    tls_cert_ref: "secret/services/redis/tls#cert"
    tls_key_ref:  "secret/services/redis/tls#key"
    tls_ca_ref:   "secret/services/redis/tls#ca"

    # Системные ACL-юзеры redis-server + sentinel-демона (1:1 из essence/_default.yaml).
    # ОБА ОБЯЗАТЕЛЬНЫ: guard create/sentinel.yml (assert 1b) рвёт render при пустом
    # любом из наборов (тихий fail-open недопустим — без них репликация/sentinel↔redis
    # AUTH сломались бы).
    system_acl_users:
      default_admin: "~* &* +@all"
      replica:    "+psync +replconf +ping"
      monitoring: "-@all +@connection +client +ping +info +config|get +cluster|info +slowlog +latency +memory +select +command|count +command|docs"
      sentinel:   "allchannels +multi +slaveof +ping +exec +subscribe +config|rewrite +role +publish +info +client|setname +client|kill +script|kill"
      haproxy:    "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +info +cluster|info"
    system_acl_users_sentinel:
      default_admin: "allchannels allkeys +@all"
      monitoring: "-@all +@connection -command +client -hello +info -auth +sentinel|masters +sentinel|replicas +sentinel|slaves +sentinel|sentinels +sentinel|ckquorum"
      sentinel:   "allchannels -@all +auth +client|getname +client|id +client|setname +command +hello +ping +sentinel|is-master-down-by-addr +publish +role +sentinel|get-master-addr-by-name +sentinel|master +sentinel|myid +sentinel|replicas +sentinel|sentinels"
      haproxy:    "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +sentinel|get-master-addr-by-name +sentinel|master +sentinel|myid +sentinel|replicas +sentinel|sentinels"
  input:
    # ★ provision выключен (default-on: опущенная секция = ВКЛЮЧЕНО; кейс деплоит на
    # ГОТОВЫЙ roster, cloud-create не нужен) → include redis-provision.yml group-drop.
    provision:
      enabled: false
    redis_type: sentinel
    # version ОБЯЗАТЕЛЬНА: enum выкаченных в Nexus сборок (мажор < 8 → version-gate
    # модулей не активен). 7.4.1 — серия 7.x, как прежний distro-пин 7.2.4.
    version: "7.4.1"
    persistence: rdb
    # single-host (1 хост) → 0 реплик (default редизайна 2): size-guard sentinel = 1+0.
    replicas_per_master: 0
    # ★ Редизайн: connection_mode=tls_plain — TLS И plain открыты (нет port 0). Заменяет
    # прежнюю tls_enabled=true без tls_keep_plain (anti-downgrade: PING всё равно по TLS).
    connection_mode: tls_plain

assert:
  task_present:
    # redis.conf: TLS-директивы есть, но `port` НЕ обнулён (plain открыт,
    # tls_only=false). КРИТИЧНО: отсутствие `port 0` отличает не-only-TLS от only-TLS.
    # Дизамбигуатор от users.acl/hardening — path.
    - module: core.file.rendered
      params_subset:
        path: /etc/redis/redis.conf
        render_context:
          vars:
            conf_dir: /etc/redis
            data_dir: /var/lib/redis
            port: 6379
            run_dir: /var/run/redis
            log_dir: /var/log/redis
            loadmodules:
              - /var/lib/redis/modules/redisbloom.so
              - /var/lib/redis/modules/rejson.so
              - /var/lib/redis/modules/redisearch.so
              - /var/lib/redis/modules/redistimeseries.so
            config:
              # ★ РЕДИЗАЙН default_admin: replica→master AUTH (masteruser/
              # masterauth) приходит ОБЫЧНЫМИ директивами config (sentinel
              # deploy-body доливает их vault()-в-ячейке) → redis.conf range-ит
              # их как любую директиву → статически переживают рестарт.
              masteruser:       "default_admin"
              masterauth:       "default-admin-secret-pass"
              # НЕТ ключа `port` (plain открыт) — anti-проверка downgrade-режима.
              tls-port: "7379"
              tls-cert-file: /etc/redis/tls/redis.crt
              tls-key-file: /etc/redis/tls/redis.key
              tls-ca-cert-file: /etc/redis/tls/ca.crt
              tls-replication: "yes"
              tls-auth-clients: "no"
              maxmemory: "256mb"
              maxmemory-policy: allkeys-lru
              maxclients: 10000
              timeout: 300
              save: "900 1 300 10 60 10000"
              appendonly: "no"
          self:
            sid: node-solo.example.com
            covens: [create]
            choirs: []
            # traits — registry-проекция (ADR-060), пустой объект без меток.
            traits: {}
            role: ""
            network:
              primary_ip: 10.0.0.5
            os:
              arch: amd64
          role: ""
          essence: {}

    # PING health-gate: ★ ДОКАЗАТЕЛЬСТВО anti-downgrade. tls=true (НЕ false!), addr на
    # tls_port 7379 (НЕ plain 6379), tls_ca = CA-PEM. Под прежним гейтом (tls_only) тут
    # было бы tls=false, addr=6379 → plaintext AUTH. cluster/sentinel PING —
    # placeholder-skip; дизамбигуатор addr/args.
    - module: community.redis.command
      params_subset:
        addr: "127.0.0.1:7379"
        username: default_admin
        password: default-admin-secret-pass
        tls: true
        tls_ca: "-----BEGIN CERTIFICATE-----\nCACERT\n-----END CERTIFICATE-----"
        args: ["PING"]

  state_changes:
    redis_type: sentinel
    redis_version: "7.4.1"
    connection_mode: tls_plain
    redis_config:
      tls-port: "7379"
      tls-cert-file: /etc/redis/tls/redis.crt
      tls-key-file: /etc/redis/tls/redis.key
      tls-ca-cert-file: /etc/redis/tls/ca.crt
      tls-replication: "yes"
      tls-auth-clients: "no"
      maxmemory: "256mb"
      maxmemory-policy: allkeys-lru
      maxclients: 10000
      timeout: 300
      save: "900 1 300 10 60 10000"
      appendonly: "no"
    redis_users: []
    redis_hosts: []
    redis_sentinel:
      master_name: master
      quorum: 0
      master_settings:
        down-after-milliseconds: "5000"
        failover-timeout: "60000"
      settings: {}
