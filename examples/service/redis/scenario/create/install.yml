# scenario-include-сосед (orchestration.md §6): подключается из create/main.yml.
# Тройка apply:destiny в СТРОГОМ порядке. Каждая destiny раскрывается изолированным
# render-проходом в свои N задач со сквозными индексами; destiny видит только
# переданный ей apply.input (ADR-009).
#
# Порядок критичен:
#   redis-single создаёт группу redis и unix-сокет (770) → redis-exporter входит в
#   эту группу ради group-доступа к сокету. redis-exporter ПОСЛЕ redis-single.
#   node-exporter от Redis не зависит, идёт последним для детерминизма.

# 1. Redis: пакет + redis.conf с unix-сокетом + сервис.
- name: Apply redis-single destiny
  apply:
    destiny: redis-single
    input:
      # CEL по scenario-scope: значения резолвятся здесь, в destiny уходит результат.
      # redis_version опционален (required:false): не задан → version уходит "" →
      # core.pkg ставит latest из репо без =version-пина.
      version:        "${ has(input.redis_version) ? input.redis_version : '' }"
      # Пароль резолвится KEEPER-SIDE через vault() (templating.md §2.3/§4): путь
      # из incarnation (доверенный контекст), в destiny уходит уже ЗНАЧЕНИЕ, а не
      # ссылка — Soul vault-клиент не тянет (ADR-012).
      redis_password: "${ vault('secret/redis/' + incarnation.name + '#password') }"
      redis_socket:   "${ input.redis_socket }"
      maxmemory:      "${ input.redis_maxmemory }"
      config:         "${ essence.redis_config }"

# 2. redis_exporter: ходит в Redis через тот же unix-сокет, что записал redis-single.
- name: Apply redis-exporter destiny
  apply:
    destiny: redis-exporter
    input:
      version:        "${ input.redis_exporter_version }"
      sha256:         "${ input.redis_exporter_sha256 }"
      # arch — из фактов хоста (soulprint), не из статичного input.arch: один
      # incarnation может смешивать amd64/arm64-хосты, tarball должен совпасть с
      # реальной архитектурой. soulprint уже отдаёт amd64/arm64 (proto
      # soulprint.proto) — маппинг не нужен. destiny soulprint напрямую не видит
      # (изоляция ADR-009), значение доезжает в неё только через этот apply:input
      # (симметрично node-exporter ниже).
      arch:           "${ soulprint.self.os.arch }"
      bin_dir:        "${ input.bin_dir }"
      listen:         "${ input.redis_exporter_listen }"
      redis_socket:   "${ input.redis_socket }"
      # Тот же keeper-side vault()-резолв, что и для redis-single (см. выше).
      redis_password: "${ vault('secret/redis/' + incarnation.name + '#password') }"

# 3. node_exporter: метрики хоста, от Redis не зависит.
- name: Apply node-exporter destiny
  apply:
    destiny: node-exporter
    input:
      version: "${ input.node_exporter_version }"
      sha256:  "${ input.node_exporter_sha256 }"
      # arch — из фактов хоста (soulprint), не из статичного input.arch: один
      # incarnation может смешивать amd64/arm64-хосты, tarball должен совпасть с
      # реальной архитектурой. soulprint уже отдаёт amd64/arm64 (proto
      # soulprint.proto) — маппинг не нужен. destiny soulprint напрямую не видит
      # (изоляция ADR-009), значение доезжает в неё только через этот apply:input.
      arch:    "${ soulprint.self.os.arch }"
      bin_dir: "${ input.bin_dir }"
      listen:  "${ input.node_exporter_listen }"
      # extra_args не передаём — destiny подставит свой default [] (passthrough
      # node_exporter-флагов нужен точечно; добавляется здесь при необходимости).
