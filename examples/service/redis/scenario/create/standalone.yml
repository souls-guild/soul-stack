# Ветка диспетчера create — режим standalone (redis-консолидация концепции
# Ansible-роли). Подключается из main.yml через include: и раскрывается в плоский
# список ДО render (orchestration.md §6). Каждая задача несёт `when:` по redis_type
# — статический предикат (только input.*), который Keeper вычисляет at-render
# (isStaticWhen): неактивная ветка (redis_type != standalone) гасится placeholder-
# skip-ом (ADR-012(d) Вариант b), активная рендерится. Так main.yml инклудит ВСЕ
# ветки, а исполняется ровно одна — диспетчер без условного include (include:
# раскрывается безусловно, when: на самой include-задаче запрещён).
#
# Дефолт redis_type — standalone (input default материализуется input-валидацией
# ДО CEL → input.redis_type всегда присутствует). Предикат гейта читает его голым:
# not-задан оператором → дефолт standalone → input.redis_type == 'standalone' → активна.
#
# Поведение БИТ-В-БИТ повторяет прежний одиночный main.yml (до рефактора в
# диспетчер): тот же merge()-перевод простого ввода в redis.conf + users.acl, тот
# же health-gate PING. См. headerы прежнего main.yml — здесь не дублируем.

# 1. Per-host install + render redis.conf + render users.acl + systemd.
#    Изолированный render-проход destiny `redis` (ADR-009): внутри видно ТОЛЬКО
#    переданный apply.input. config — ГОТОВЫЙ merged map (destiny не мержит).
#
#    Слой трансляции (merge() SHALLOW last-wins, СЛЕВА НАПРАВО — правый бьёт левый
#    по ключу верхнего уровня):
#      1. essence.redis_config             — дефолты автора (defaults роли);
#      2. persistence_presets[persistence] — save/appendonly выбранного режима;
#      3. вычисленные maxmemory + policy   — производные от memory_mb / input;
#      4. input.redis_settings             — passthrough оператора (бьёт всё).
#    Слой 3 материализует только заданные ключи (has-guard): пустой memory_mb не
#    уедет строкой "0mb", отсутствующий maxmemory_policy не затрёт дефолт/пресет.
- name: Apply redis destiny (install + render redis.conf/users.acl + systemd)
  when: "input.redis_type == 'standalone'"
  apply:
    destiny: redis
    input:
      version:  "${ input.version }"
      # Пароль requirepass — keeper-side vault()-резолв (templating.md §2.3/§4):
      # путь из incarnation (доверенный контекст), в destiny уходит ЗНАЧЕНИЕ.
      password: "${ vault('secret/redis/' + incarnation.name + '#password') }"
      # Итоговый merged-конфиг — единый compute.redis_config (объявлен ОДИН раз в
      # main.yml compute:, ADR-009): тот же map, что уйдёт в state_changes.redis_config
      # — drift «state ≡ live config» снят самим compute. destiny range-ит его в
      # redis.conf как есть. Для standalone compute.redis_config = базовый merge (без
      # cluster-директив; TLS-блок при tls_enable). HOST-ИНВАРИАНТ → apply.input
      # резолвится на targeted[0], для одного-на-всех значения это КОРРЕКТНО.
      config: "${ compute.redis_config }"
      # ACL-юзеры → MAP имя→{perms, state, password}. ПОЧЕМУ map, а не список:
      # users.acl.tmpl range-ит коллекцию построчно, а Go text/template range по
      # MAP сортирует ключи (детерминизм), по list — наследует недетерминированный
      # порядок итерации Go-map (templating.md §6) → ложный change → лишний
      # рестарт Redis (на rolling-restart флоте каскадный). CEL не строит
      # map-из-map напрямую, но .map(name, {name: {...}}) даёт СПИСОК
      # одноключевых map-ов, а merge(list(map)) (templating.md §2.3) сворачивает
      # его в один map имя→объект. Пароль каждого юзера резолвится keeper-side из
      # Vault по конвенции secret/redis/<incarnation>/users/<name>#password (имя
      # из доверенного контекста incarnation + ключ users, не из секрет-значения).
      # В шаблоне пароль хешируется sha256sum (Redis ACL #<hash>) — plaintext в
      # файл не пишется. Пусто → пустой map (users.acl без юзеров).
      users: >-
        ${ has(input.users)
           ? merge(input.users.map(name, {
               name: {
                 'perms':    input.users[name].perms,
                 'state':    input.users[name].state,
                 'password': vault('secret/redis/' + incarnation.name + '/users/' + name + '#password')
               }
             }))
           : {} }
      # Redis-модули (Redis < 8). VERSION-GATE: на Redis 8+ модули встроены →
      # передаём destiny ПУСТОЙ список (.so не качается, loadmodule не пишется).
      # Гейт по input.version (мажор >= 8: epoch-префикс N: + 8|9|двузначный мажор).
      # version обязателен (required:true в input-схеме, всегда непустой) → проверка
      # непустоты не нужна, гейтим прямо matches() по мажору. modules_base_url/modules_sha256 — host-
      # инвариант (один источник/арх на кластер) → apply.input; arch-специфичный
      # URL строит destiny per-host из soulprint.self.os.arch. checksum REQUIRED
      # каждого .so — fail-closed (core.url.fetched верифицирует SHA-256).
      modules: >-
        ${ (has(input.modules) && !input.version.matches('^([0-9]+:)?(8|9|[1-9][0-9])\\.'))
           ? input.modules
           : [] }
      modules_base_url: "${ default(input.modules_base_url, '') }"
      modules_sha256:   "${ default(input.modules_sha256, {}) }"
      # Host-tuning extras (концепция роли). THP/logrotate/sysctl БЕЗУСЛОВНЫ
      # (рекомендация Redis / hardening) — операторских флагов нет, задачи destiny
      # `redis` всегда активны. sysctl_settings — данные-таблица essence (passthrough
      # оператора отложен, essence-дефолт покрывает Redis-tuning), host-инвариантна →
      # apply.input.
      sysctl_settings:  "${ default(essence.sysctl_settings, {}) }"
      # TLS PEM-материал — HOST-ИНВАРИАНТ (один cert/CA на кластер) → apply.input.
      # Источник — Vault-ПУТИ из essence (essence.tls_*_ref — доверенный контекст
      # автора, не operator-input → vault() принимает их динамическим аргументом).
      # vault() резолвит PEM в render-фазе keeper-side, в destiny уходит ЦЕЛЫЙ PEM
      # (как requirepass). PEM-vars (tls_cert/tls_key/tls_ca) — secret-имена →
      # маскируются выходным слоем (shared/audit), в логи/OTel/RunResult не текут.
      tls_enable: "${ default(essence.tls_enable, false) }"
      tls_only:   "${ default(essence.tls_only, false) }"
      tls_port:   "${ int(default(essence.tls_port, 7379)) }"
      tls_cert:   "${ (has(essence.tls_enable) && essence.tls_enable) ? vault(essence.tls_cert_ref) : '' }"
      tls_key:    "${ (has(essence.tls_enable) && essence.tls_enable) ? vault(essence.tls_key_ref) : '' }"
      tls_ca:     "${ (has(essence.tls_enable) && essence.tls_enable) ? vault(essence.tls_ca_ref) : '' }"

# 2. Health-gate: PING живого Redis после старта (демонстрация плагина
#    community.redis; raw-команда, конфиг НЕ пишет). addr — localhost (плагин
#    исполняется на redis-хосте), пароль — тот же keeper-side vault()-резолв.
#    ★ ИБ (anti-downgrade): tls/tls_ca/порт гейтятся на essence.tls_ENABLE, НЕ
#    tls_only. TLS включён → плагин ОБЯЗАН коннектиться по TLS (tls=true + addr на
#    tls_port + tls_ca для verify), иначе при tls_enable=true && tls_only=false
#    (plain ещё открыт) плагин ушёл бы PLAINTEXT-ом на 6379 → AUTH-пароль открытым
#    текстом по сети (plaintext-downgrade). TLS выключен → PING по 6379 без TLS
#    (back-compat). tls_ca — secret-имя (маскируется); vault(essence.tls_ca_ref).
- name: Wait for redis to answer PING
  when: "input.redis_type == 'standalone'"
  module: community.redis.command
  retry: { count: 5, delay: 2s }
  params:
    addr:     "${ (has(essence.tls_enable) && essence.tls_enable) ? '127.0.0.1:' + string(int(default(essence.tls_port, 7379))) : '127.0.0.1:6379' }"
    password: "${ vault('secret/redis/' + incarnation.name + '#password') }"
    tls:      "${ default(essence.tls_enable, false) }"
    tls_ca:   "${ (has(essence.tls_enable) && essence.tls_enable) ? vault(essence.tls_ca_ref) : '' }"
    args:     ["PING"]
