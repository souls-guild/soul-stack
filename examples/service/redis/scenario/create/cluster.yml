# Ветка диспетчера create — режим cluster (honest hash-slot Redis Cluster, 16384
# слота; перенос инварианта из прежнего redis-cluster-live). Подключается из
# main.yml через include: и раскрывается в плоский список ДО render. Каждая задача
# несёт `when: input.redis_type == 'cluster'` — статический предикат (только
# input.*), Keeper гасит его placeholder-skip-ом на standalone-прогоне (isStaticWhen)
# и рендерит на cluster-прогоне. См. standalone.yml — тот же механизм диспетчера.
#
# Раскладку ролей master/replica и слотов делает ПЛАГИН (community.redis.cluster
# action create) детерминированно по сортировке ключей nodes. Scenario лишь строит
# топологию-MAP (SID→addr) и зовёт плагин run_once на bootstrap-ноде; саму
# трансляцию (деление 16384 на shards) НЕ повторяет — иначе две раскладки
# (scenario + плагин) рассинхронятся.

# 1. SHARDS-GUARD — shards обязателен в режиме cluster. shards остаётся
#    required:false без default в input-схеме (min:1 + раскладка ролей, симметрии с
#    standalone нет), поэтому отсутствие shards = осмысленная ошибка оператора, а
#    НЕ дефолтное значение. Без этого guard-а size-guard ниже взял бы int(input.shards)
#    по отсутствующему ключу → CEL «no such key» при render (криптично). Guard
#    вычисляет has(input.shards) KEEPER-SIDE и при отсутствии рвёт прогон понятным
#    echo. ПЕРВОЙ run_once-задачей cluster-ветки, ДО size-guard.
- name: Guard cluster requires shards
  when: "input.redis_type == 'cluster'"
  run_once: true
  module: core.cmd.shell
  changed_when: "false"
  params:
    cmd: >-
      test "${ has(input.shards) }" = "true" || { echo "redis_type=cluster требует input.shards (число master-шардов, min 1)"; exit 1; }

# 2. SIZE-GUARD — fail-fast ДО любого install. Топология обязана точно совпасть:
#    число таргетированных хостов roster-а == shards*(1+replicas_per_shard).
#    Соответствие вычисляется KEEPER-SIDE при RENDER (там доступен soulprint.hosts —
#    roster прогона; на Soul-е во flow_context его НЕТ, поэтому Soul-side failed_when
#    тут fail-closed и неприменим). Отрендеренное булево встраивается в guard-команду:
#    совпало → "true" → test проходит, no-op; не совпало → "false" → echo + exit 1
#    рвёт прогон с понятным сообщением. changed_when:false — это проверка, а не
#    изменение. run_once — guard единый на прогон, не per-host.
#    int(input.shards) обёрнут has()-тернаром (→0 при отсутствии): если shards не
#    задан, прогон уже рвёт shards-guard выше, но size-guard всё равно РЕНДЕРИТСЯ
#    (активная cluster-задача, не placeholder-skip) — тернар держит CEL валидным.
#    replicas_per_shard имеет default:0 → int() безопасен без обёртки.
- name: Guard cluster topology size matches shards and replicas
  when: "input.redis_type == 'cluster'"
  run_once: true
  module: core.cmd.shell
  changed_when: "false"
  params:
    cmd: >-
      test "${ int(size(soulprint.hosts)) == (has(input.shards) ? int(input.shards) : 0) * (1 + int(input.replicas_per_shard)) }" = "true" || { echo "topology mismatch: hosts != shards*(1+replicas_per_shard)"; exit 1; }

# 2. Per-host install + render redis.conf (с cluster-директивами) + render
#    users.acl + systemd. Та же destiny `redis` (режим-агностична), что и
#    standalone, но merged config ДОПОЛНЕН cluster-директивами поверх базового
#    merge. Они — обычные ключи config-map-а (destiny range-ит их в redis.conf):
#      - cluster-enabled yes        — включить cluster-режим инстанса;
#      - cluster-config-file        — где Redis ведёт топологию (nodes.conf);
#      - cluster-node-timeout       — таймаут gossip (мс), input или дефолт 5000.
#    Все три HOST-ИНВАРИАНТНЫ → их корректно гнать через apply.input.config (он
#    резолвится ОДИН раз на первом по SID хосте, resolveApplyInput targeted[0]).
#
#    cluster-announce-ip ЗДЕСЬ НЕТ намеренно: это per-host директива (IP ЭТОЙ
#    ноды), её рендерит destiny `redis` в redis.conf.tmpl из
#    `{{ .self.network.primary_ip }}` (render_context.self ПЕР-ХОСТ, симметрично
#    bind), под гейтом cluster-enabled. Проброс announce-ip через config-map
#    зафиксировал бы IP первой ноды для ВСЕХ → все анонсируют один адрес →
#    cluster-bus за NAT/в облаке сломан (TILING-урок qa 2026-06-22).
#    int() на uint64-операндах cluster_node_timeout — унификация числового типа
#    (YAML→uint64 в L0, JSON→double в проде), иначе CEL «no such overload».
- name: Apply redis destiny (cluster install + render redis.conf/users.acl + systemd)
  when: "input.redis_type == 'cluster'"
  apply:
    destiny: redis
    input:
      version:  "${ has(input.version) ? input.version : '' }"
      password: "${ vault('secret/redis/' + incarnation.name + '#password') }"
      # TLS-блок (HOST-ИНВАРИАНТ, см. standalone.yml). В cluster добавляется
      # tls-cluster yes (узлы шифруют cluster-bus). Идёт ПОСЛЕ cluster-директив,
      # но домены разные (tls-* vs cluster-enabled/...) — не конфликтуют.
      config: >-
        ${ merge(
             essence.redis_config,
             essence.persistence_presets[has(input.persistence) ? input.persistence : 'rdb'],
             merge(
               has(input.memory_mb)
                 ? { 'maxmemory': string(int(input.memory_mb) * int(essence.memory_reserve_percent) / 100) + 'mb' }
                 : {},
               has(input.maxmemory_policy) ? { 'maxmemory-policy': input.maxmemory_policy } : {}
             ),
             has(input.redis_settings) ? input.redis_settings : {},
             {
               'cluster-enabled':      'yes',
               'cluster-config-file':  'nodes.conf',
               'cluster-node-timeout': string(has(input.cluster_node_timeout) ? int(input.cluster_node_timeout) : 5000)
             },
             (has(essence.tls_enable) && essence.tls_enable)
               ? merge(
                   {
                     'tls-port':         string(has(essence.tls_port) ? int(essence.tls_port) : 7379),
                     'tls-cert-file':    '/etc/redis/tls/redis.crt',
                     'tls-key-file':     '/etc/redis/tls/redis.key',
                     'tls-ca-cert-file': '/etc/redis/tls/ca.crt',
                     'tls-replication':  'yes',
                     'tls-cluster':      'yes'
                   },
                   (has(essence.tls_only) && essence.tls_only) ? { 'port': '0' } : {}
                 )
               : {}
           ) }
      users: >-
        ${ has(input.users)
           ? merge(input.users.map(name, {
               name: {
                 'perms':    input.users[name].perms,
                 'state':    input.users[name].state,
                 'password': vault('secret/redis/' + incarnation.name + '/users/' + name + '#password')
               }
             }))
           : {} }
      # Redis-модули (Redis < 8), version-gate — см. standalone.yml (тот же гейт по
      # input.version, host-инвариантные base_url/sha256 → apply.input, арх-URL
      # строит destiny per-host). На Redis 8+ → пустой список.
      modules: >-
        ${ (has(input.modules) && !(has(input.version) && input.version != '' && input.version.matches('^([0-9]+:)?(8|9|[1-9][0-9])\\.')))
           ? input.modules
           : [] }
      modules_base_url: "${ has(input.modules_base_url) ? input.modules_base_url : '' }"
      modules_sha256:   "${ has(input.modules_sha256) ? input.modules_sha256 : {} }"
      # Host-tuning extras (концепция роли), режим-агностичны — те же флаги, что в
      # standalone-ветке. Host-инвариантны → apply.input. sysctl_settings — essence.
      thp_disable:      "${ has(input.thp_disable) ? input.thp_disable : true }"
      logrotate_enable: "${ has(input.logrotate_enable) ? input.logrotate_enable : true }"
      sysctl_enable:    "${ has(input.sysctl_enable) ? input.sysctl_enable : true }"
      sysctl_settings:  "${ has(essence.sysctl_settings) ? essence.sysctl_settings : {} }"
      # TLS PEM + флаги — HOST-ИНВАРИАНТ (один cert/CA на кластер) → apply.input
      # (см. standalone.yml). Источник — Vault-пути essence (доверенный контекст).
      tls_enable: "${ has(essence.tls_enable) ? essence.tls_enable : false }"
      tls_only:   "${ has(essence.tls_only) ? essence.tls_only : false }"
      tls_port:   "${ has(essence.tls_port) ? int(essence.tls_port) : 7379 }"
      tls_cert:   "${ (has(essence.tls_enable) && essence.tls_enable) ? vault(essence.tls_cert_ref) : '' }"
      tls_key:    "${ (has(essence.tls_enable) && essence.tls_enable) ? vault(essence.tls_key_ref) : '' }"
      tls_ca:     "${ (has(essence.tls_enable) && essence.tls_enable) ? vault(essence.tls_ca_ref) : '' }"

# 3. Health-gate per-host: PING живого Redis после старта (каждая нода обязана
#    ответить ДО сборки кластера). community.redis.command, retry/until через retry.
#    addr — localhost (плагин на redis-хосте), пароль — keeper-side vault()-резолв.
#    ★ ИБ (anti-downgrade): tls/tls_ca/порт гейтятся на essence.tls_ENABLE, НЕ
#    tls_only (TLS включён → плагин ОБЯЗАН по TLS; при tls_only=false plain ещё
#    открыт, но AUTH-пароль по plaintext недопустим). addr на tls_port + tls_ca (CA-PEM).
- name: Wait for each cluster node to answer PING
  when: "input.redis_type == 'cluster'"
  module: community.redis.command
  retry: { count: 10, delay: 3s }
  params:
    addr:     "${ (has(essence.tls_enable) && essence.tls_enable) ? '127.0.0.1:' + string(has(essence.tls_port) ? int(essence.tls_port) : 7379) : '127.0.0.1:6379' }"
    password: "${ vault('secret/redis/' + incarnation.name + '#password') }"
    tls:      "${ has(essence.tls_enable) ? essence.tls_enable : false }"
    tls_ca:   "${ (has(essence.tls_enable) && essence.tls_enable) ? vault(essence.tls_ca_ref) : '' }"
    args:     ["PING"]

# 4. CLUSTER-BUILD — run_once на bootstrap-ноде. Строим nodes-MAP детерминированно
#    из roster-а прогона (soulprint.hosts): ключ = SID (стабилен и сортируем →
#    плагин раскладывает master/replica по сортировке ключей детерминированно),
#    значение = {addr: "<primary_ip>:6379"}. Форма merge(list(map)): .map(...) даёт
#    СПИСОК одноключевых map-ов SID→{addr}, merge сворачивает в один map (templating
#    §2.3). Плагин community.redis.cluster (action create) сам шлёт CLUSTER MEET/
#    ADDSLOTS/REPLICATE по go-redis и делит 16384 слота — scenario топологию НЕ
#    транслирует, передаёт готовую. Пароль — keeper-side vault()-резолв (плагин
#    коннектится к каждой ноде; password маскируется, в логи не течёт).
#    ★ ИБ (anti-downgrade): tls/tls_ca/порт nodes гейтятся на essence.tls_ENABLE,
#    НЕ tls_only — TLS включён → плагин ОБЯЗАН коннектиться к нодам по TLS (иначе
#    AUTH-пароль к каждой ноде ушёл бы plaintext-ом). addr-ы строятся на tls_port,
#    передаём tls=true + tls_ca (CA-PEM для verify).
#    ★ mTLS cluster-bus: при включённом tls-cluster (взаимная аутентификация нод)
#    плагину нужен КЛИЕНТСКИЙ cert — пробрасываем tls_cert/tls_key (резолв из тех же
#    vault(essence.tls_cert_ref/tls_key_ref), что redis.conf). Плагин строит mTLS-пару
#    ТОЛЬКО когда заданы ОБА (tls.go: certPEM+keyPEM); без mutual-bus они не мешают
#    handshake. cert/key host-инвариантны (один на кластер) → apply.input корректен.
- name: Build the redis cluster (CLUSTER MEET/ADDSLOTS/REPLICATE)
  when: "input.redis_type == 'cluster'"
  run_once: true
  module: community.redis.cluster
  params:
    action:             create
    nodes:              "${ merge(soulprint.hosts.map(h, { h.sid: { 'addr': h.network.primary_ip + ':' + ((has(essence.tls_enable) && essence.tls_enable) ? string(has(essence.tls_port) ? int(essence.tls_port) : 7379) : '6379') } })) }"
    replicas_per_shard: "${ int(input.replicas_per_shard) }"
    password:           "${ vault('secret/redis/' + incarnation.name + '#password') }"
    tls:                "${ has(essence.tls_enable) ? essence.tls_enable : false }"
    tls_ca:             "${ (has(essence.tls_enable) && essence.tls_enable) ? vault(essence.tls_ca_ref) : '' }"
    tls_cert:           "${ (has(essence.tls_enable) && essence.tls_enable) ? vault(essence.tls_cert_ref) : '' }"
    tls_key:            "${ (has(essence.tls_enable) && essence.tls_enable) ? vault(essence.tls_key_ref) : '' }"
