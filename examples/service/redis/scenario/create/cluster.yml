# Ветка диспетчера create — режим cluster (honest hash-slot Redis Cluster, 16384 слота).
# Подключается из main.yml через CONDITIONAL-INCLUDE: `when: input.redis_type ==
# 'cluster'` стоит НА include — на sentinel-прогоне весь файл group-drop (задачи
# физически не рендерятся), на cluster-прогоне раскрывается в плоский список ДО render.
# Per-task when по redis_type больше НЕ нужен (гейт на include). См. sentinel.yml — тот
# же механизм диспетчера.
#
# ★ ДЕПЛОЙ-ТЕЛО ВЫНЕСЕНО на service-level (S4-0, 2026-06-27, симметрично S1 sentinel):
# install + render redis.conf(с cluster-директивами)/users.acl + systemd + PING-gate +
# CLUSTER MEET/ADDSLOTS/REPLICATE живут в общем scenario/redis-deploy-cluster.yml и
# инклудятся ОТСЮДА по имени файла (scenario-include фоллбэкает scenario/<name>/<file> →
# scenario/<file>, orchestration.md §6). Раскладку ролей master/replica и слотов делает
# ПЛАГИН (community.redis.cluster action create) детерминированно по сортировке ключей
# nodes — scenario лишь строит топологию-MAP (SID→addr) и зовёт плагин run_once.
#
# ★ ИНВАРИАНТ (см. шапку redis-deploy-cluster.yml): инклудящий ОБЯЗАН объявить в своём
# compute: набор, который тело читает (redis_config/conf_dir/data_dir/install/
# modules_base_url/redis_version/tls_*). Все они объявлены в create/main.yml::compute
# (этот сценарий). cross-file дрейф soul-lint НЕ ловит.

# ── 0. SIZE-GUARD (топология) — keeper-side render-time assert ─────────────────────
# Размер roster-а ОБЯЗАН быть ровно shards*(1+replicas_per_master) (мастера кластера +
# реплики на каждый шард) — иначе плагин community.redis.cluster (action create) выведет
# число шардов ИЗ числа нод и МОЛЧА проигнорирует declared input.shards (silent рассинхрон
# declared↔actual). Тот же механизм, что size-guard migrate_cluster/cluster.yml (assert:,
# ADR-009 amendment 2026-06-23): предикат вычисляется KEEPER-SIDE на РЕНДЕРЕ — там доступен
# soulprint.hosts (на Soul-е его НЕТ). false ОБРЫВАЕТ render с message ДО любого dispatch
# (раньше и понятнее, чем runtime-отказ/тихий no-op плагина). assert НЕ emit RenderedTask.
# Стоит ПЕРЕД include деплой-тела — mismatch рвёт прогон fail-fast, до установки пакетов.
# ★ ПОЧЕМУ assert, а не validate: size-guard нужен soulprint.hosts (roster), а validate-
# контекст INPUT-ONLY (структурный CEL-барьер). Обязательность самого shards (присутствие
# в режиме cluster) — отдельный required_when в main.yml, отсекает ДО render (см.
# cluster-shards-guard-missing); здесь только сверка топологии с уже-присутствующим shards.
- name: Guard cluster roster size matches shards and replicas
  assert:
    that:
      - "size(soulprint.hosts) == int(input.shards) * (1 + int(input.replicas_per_master))"
    message: "число хостов roster-а прогона должно быть ровно shards*(1+replicas_per_master) (мастера кластера + реплики на каждый шард) — задай столько же таргетированных souls, сколько узлов в объявленной топологии, иначе плагин вывел бы число шардов из числа нод и проигнорировал declared shards"

- include: redis-deploy-cluster.yml
