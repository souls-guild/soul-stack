# Ветка диспетчера create — режим cluster (honest hash-slot Redis Cluster, 16384 слота).
# Подключается из main.yml через CONDITIONAL-INCLUDE: `when: input.redis_type ==
# 'cluster'` стоит НА include — на sentinel-прогоне весь файл group-drop (задачи
# физически не рендерятся), на cluster-прогоне раскрывается в плоский список ДО render.
# Per-task when по redis_type больше НЕ нужен (гейт на include). См. sentinel.yml — тот
# же механизм диспетчера.
#
# ★ ДЕПЛОЙ-ТЕЛО ВЫНЕСЕНО на service-level (S4-0, 2026-06-27, симметрично S1 sentinel):
# install + render redis.conf(с cluster-директивами)/users.acl + systemd + PING-gate +
# CLUSTER MEET/ADDSLOTS/REPLICATE живут в общем scenario/redis-deploy-cluster.yml и
# инклудятся ОТСЮДА по имени файла (scenario-include фоллбэкает scenario/<name>/<file> →
# scenario/<file>, orchestration.md §6). Раскладку ролей master/replica и слотов делает
# ПЛАГИН (community.redis.cluster action create) детерминированно по сортировке ключей
# nodes — scenario лишь строит топологию-MAP (SID→addr) и зовёт плагин run_once.
#
# ★ ИНВАРИАНТ (см. шапку redis-deploy-cluster.yml): инклудящий ОБЯЗАН объявить в своём
# compute: набор, который тело читает (redis_config/conf_dir/data_dir/install/
# modules_base_url/redis_version/tls_*). Все они объявлены в create/main.yml::compute
# (этот сценарий). cross-file дрейф soul-lint НЕ ловит.
- include: redis-deploy-cluster.yml
