name: create
# create: true — сценарий годен как СТАРТОВЫЙ (bootstrap новой incarnation), т.е.
# выбираем при POST /v1/incarnations (scenario.ResolveCreateScenarios читает флаг,
# scenario.go::Create). Принадлежность к create-набору — ДЕКЛАРАТИВНАЯ и data-driven:
# набор стартовых сценариев = РОВНО {scenario с `create: true`}. Прежний хардкод-union
# в keeper (имя `create` всегда в наборе как default) убран (Фаза 2 принята) — `create`
# годен как bootstrap не из-за имени, а потому что несёт этот флаг.
create: true
description: >-
  Развернуть Redis (концепция Ansible-роли, redis-консолидация). Оператор задаёт
  ПРОСТЫЕ типизированные понятия (режим, сколько памяти, какая persistence, какая
  eviction-политика, какие ACL-юзеры, топология шардов), а сценарий ТРАНСЛИРУЕТ их
  в детальный redis.conf. Граница (architect 2026-06-22):

    - простой слой = строго типизированный структурный `input:` ниже (Named Dict,
      каждый параметр чёткого типа), НЕ свободный текст;
    - слой трансляции = тело сценария: данные-таблицы (persistence_presets,
      memory_reserve_percent) живут в essence; вычисление maxmemory — inline-CEL;
      слияние слоёв — CEL-функция merge() (SHALLOW last-wins, templating.md §2.3);
    - итоговый redis_config рендерится в ПОЛНЫЙ redis.conf at-CREATE (источник
      истины) — здесь merge нужен. CONFIG SET живого инстанса — это day-2
      update_config (отдельный сценарий), в create плагин config НЕ вызываем.

  ДИСПЕТЧЕР ПО redis_type (2026-06-22): этот файл — диспетчер. Тело прогона вынесено
  в ветки create/cluster.yml / sentinel.yml, подключаемые через include: ниже.
  Ветвление делает CONDITIONAL-INCLUDE (orchestration.md §6, Вариант B group-drop):
  `when: input.redis_type == '<mode>'` стоит НА include-задаче — статический
  input-предикат (isStaticWhen) РЕАЛЬНО исключает неактивную ветку из плана
  (render-phase group-drop), а не гасит её placeholder-skip-ом. Прежний per-task when
  по каждой задаче ветки убран (гейт переехал на include): дублировал бы include-when.
  Оператор всегда зовёт create; режим выбирает redis_type. enum redis_type гарантирует
  попадание ровно в одну ветку (тихого зелёного no-op быть не может). L0-кейсы ассертят
  presence-матчером (task_present/task_absent), которому group-drop безопасен
  (позиционные индексы не важны).

  ★ РЕЖИМЫ СЕРВИСА сужены до sentinel/cluster (2026-06-25): standalone и sentinel_only
  убраны из сервиса (решение пользователя). standalone покрывается sentinel с 0 реплик
  (один master + sentinel-демон); sentinel_only нужен только в DESTINY `redis` (её
  гибкость sentinel_enabled/deploy_redis остаётся для переиспользования, напр. DragonFly),
  но не как режим этого сервиса. Сужение enum redis_type ([sentinel, cluster]) — bump
  state_schema_version 3→4 + миграция 003_to_004 (forward-only remap старых режимов).

  Пароли НЕ во входном контракте: лежат в Vault, резолвятся KEEPER-SIDE через CEL
  vault() в render-фазе (templating.md §2.3/§4) — на хост доезжает уже ЗНАЧЕНИЕ
  (ADR-012). Путь строится из доверенного контекста (incarnation), не из input.

# ── extends: covenant — общий контракт секций (S4 пилот) ───────────────────────────
# Секции input (КРОМЕ provision-дельты ниже) / compute / state_changes / validate
# вынесены в covenant.yml (корень service-репо) и наследуются add-only: keeper-side
# резолвер сливает covenant ПЕРВЫМ, дельта create ДОБАВЛЯЕТ поверх (не переопределяя
# ключи covenant — иначе section_key_conflict). create несёт ТОЛЬКО свою дельту:
# input.provision (cloud-create в том же прогоне, ADR-061), form (презентация —
# НЕ мержится, сугубо локальна) и tasks (тело прогона — диспетчер по redis_type).
extends: covenant

# ── Входной контракт: ДЕЛЬТА create поверх covenant.input ──────────────────────────
# Общий input-контракт (redis_type/version/memory_mb/persistence/connection_mode/
# users/… + отсутствие modules*-полей) — в covenant.yml. Здесь — ТОЛЬКО provision,
# которого covenant НЕ несёт (add-only: covenant.input + это поле = эффективный input).
input:
  # ── cloud-provision: поднять VM под топологию в том же прогоне (ADR-061, Вариант A) ─
  # ★ provision (FLAG имя секции, propose-and-wait): опциональный object-вход «создай
  # машины». Когда задан и enabled=true — create ОДНИМ прогоном (а) создаёт VM через
  # core.cloud.created (on: keeper), (б) доставляет per-VM bootstrap-токен (иллюстративно),
  # (в) регистрирует созданные SID + БЛОКИРУЮЩЕ ждёт онбординга (core.soul.registered
  # await_online + refresh_soulprint, ADR-061), после чего roster пере-резолвится и
  # cluster/sentinel-ветка катит redis-роль на уже-online хосты. Не задан / enabled=false
  # — provision.yml group-drop, прогон работает по СУЩЕСТВУЮЩЕМУ roster-у (поведение до
  # фичи бит-в-бит).
  #
  # ★ node_count тут НЕТ намеренно: число VM выводится из ТОПОЛОГИИ (cluster: shards*(1+
  # replicas_per_master); sentinel: 1+replicas_per_master) — единственный источник истины
  # размера кластера. Отдельное node_count рассинхронилось бы с size-guard веток.
  # ★ teardown (destroy) — НЕ здесь (отдельный сценарий).
  provision:
    type: object
    required: false
    description: >-
      Поднять VM под топологию в том же create-прогоне (ADR-061). enabled=true →
      сначала cloud-create + онбординг (барьер await_online), потом redis-роль на
      созданные хосты. Не задан / enabled=false → прогон по существующему roster-у.
    additional_properties: false
    properties:
      enabled:
        type: boolean
        default: false
        description: Главный гейт provision. false (или секция опущена) — provision.yml group-drop.
      provider:
        type: string
        description: Имя cloud-Provider в реестре providers (NOT plugin name → soul-cloud-<provider>).
      profile:
        type: string
        description: Имя VM-профиля в реестре profiles (ресурсы/образ/сеть VM).
      await_timeout:
        type: string
        pattern: "^[0-9]+[smh]$"
        description: >-
          Верхняя граница ожидания онбординга созданных VM (барьер await_online,
          ADR-061; форма <N>{s|m|h}). Не задан → essence.provision_await_timeout (дефолт
          10m). Ограничен сверху keeper.yml::max_await_timeout.
      ssh_provider:
        type: string
        description: >-
          Имя SshProvider-плагина (keeper.yml::plugins.ssh_providers[].name) для
          доставки per-VM bootstrap-токена по SSH (core.bootstrap.delivered, ADR-063).
          Не задан / enabled=false → шаг доставки таргетит как placeholder (provision
          выключен).

# ── Вычисляемые scenario-vars: ДЕЛЬТА create поверх covenant.compute ────────────────
# Общий compute-контракт (redis_config/install/conf_dir/data_dir/tls_*/sentinel_directives/
# redis_version/modules_*/…) — в covenant.yml, наследуется add-only (covenant-первым). Здесь —
# ТОЛЬКО sentinel_monitor_now: covenant его НЕ несёт (расходится с migrate_cluster по значению,
# section_key_conflict при merge). На create-семантике =true БЕЗУСЛОВНО: node-1 — настоящий
# master, нет фазы заливки role:slave → sentinel мониторит его сразу (деплой-тело
# redis-deploy-sentinel.yml проксирует флаг в task-var шага 4). См. шапку redis-deploy-sentinel.yml.
compute:
  sentinel_monitor_now: "${ true }"

# ── Презентационный слой формы (form:, top-level scenario-ключ) ───────────────────
# form: — ЧИСТАЯ ПРЕЗЕНТАЦИЯ: как UI группирует и подписывает поля input в Run-форме.
# Контракт ввода (типы/валидация/обязательность) живёт ИСКЛЮЧИТЕЛЬНО в input: выше —
# form ссылается на поля по имени, ничего не дублирует и не меняет. Опционален:
# уберёшь блок → UI рисует input плоско (forward-compat). soul-lint сверяет
# инварианты (каждое name ∈ input:, имя в одной секции, key уникален); поле input
# без секции — WARNING (UI дорисует в дефолтную секцию в конце), не error.
form:
  sections:
    # 1. Параметры Redis — режим, сетевой канал, версия.
    # install_method убран из формы (2026-06-28): способ установки зафиксирован в
    # essence (binary), оператор его не задаёт.
    - key: redis
      title: "Параметры Redis"
      description: "Режим развёртывания, сетевой канал и версия"
      fields:
        - { name: redis_type, label: "Режим развёртывания" }
        - { name: connection_mode, label: "Сетевой канал" }
        - { name: version, label: "Версия Redis" }

    # 2. Топология — реплики (оба режима) + cluster-специфика.
    - key: topology
      title: "Топология"
      description: "Реплики (оба режима) и параметры Cluster"
      fields:
        - name: replicas_per_master
          label: "Реплик на master"
          placeholder: "2"
          hint: "Реплик на каждый master. По умолчанию 2 (master + 2 реплики). 0 = без реплик."
        # cluster-специфичные поля: видимы ТОЛЬКО в режиме cluster. show_when —
        # презентация, не гейт: shards.required_when на input-валидации остаётся
        # независимо (defence-in-depth).
        - name: shards
          label: "Число master-шардов (cluster)"
          show_when: "input.redis_type == 'cluster'"
          placeholder: "3"
          hint: "16384 hash-слота делятся поровну между шардами (min 3). Roster прогона обязан быть shards*(1+реплик)."
        - name: cluster_node_timeout
          label: "Таймаут gossip, мс (cluster)"
          show_when: "input.redis_type == 'cluster'"
          placeholder: "5000"
          hint: "Таймаут gossip между нодами кластера (cluster-node-timeout). Не задан → 5000."
        - name: cluster_topology
          label: "Явная топология шардов (cluster)"
          show_when: "input.redis_type == 'cluster'"
          hint: "Список шардов; каждый шард — список SID [master, replica, …] (первый = master). Оператор сам распихивает VM по зонам. Не задан → плагин раскладывает роли по sort SID автоматически."

    # 3. Ресурсы — память, I/O-потоки, политика вытеснения.
    - key: resources
      title: "Ресурсы"
      fields:
        - name: memory_mb
          label: "Объём данных, МБ"
          placeholder: "1024"
          hint: "Бюджет памяти под Redis на хосте. maxmemory вычисляется как доля от него (минус резерв ОС). Не задан → maxmemory из подложки essence."
        - name: io_threads
          label: "I/O-потоков"
          placeholder: "0"
          hint: "Число I/O-потоков Redis (io-threads). 0 = однопоточный I/O. >0 — типично число ядер - 1."
        - { name: maxmemory_policy, label: "Политика вытеснения" }

    # 4. Персистентность — режим сохранения.
    - key: persistence
      title: "Персистентность"
      fields:
        - { name: persistence, label: "Режим persistence" }

    # 5. Пользователи — ACL.
    - key: users
      title: "Пользователи"
      fields:
        - { name: users, label: "ACL-пользователи" }

    # 6. Конфигурация — passthrough-директивы redis.conf и sentinel.conf.
    - key: config
      title: "Конфигурация"
      description: "Passthrough-директивы redis.conf и sentinel.conf"
      collapsed: true
      fields:
        - { name: redis_settings, label: "Директивы redis.conf" }
        # sentinel-специфичные dict-ы: видимы ТОЛЬКО в режиме sentinel.
        - name: sentinel_settings
          label: "Директивы sentinel.conf (глобальные)"
          show_when: "input.redis_type == 'sentinel'"
          hint: "Глобальные директивы sentinel.conf (resolve-hostnames, announce-port, …)."
        - name: sentinel_master_settings
          label: "Директивы Sentinel (per-master)"
          show_when: "input.redis_type == 'sentinel'"
          hint: "Per-master опции (down-after-milliseconds, failover-timeout, parallel-syncs, …). Дефолты: down-after 5000, failover-timeout 60000."

    # Облачное создание VM — отдельная секция (опционально, ADR-061).
    - key: provision
      title: "Облачное создание VM"
      description: "Поднять VM под топологию в том же прогоне (опционально, ADR-061)"
      collapsed: true
      fields:
        - { name: provision, label: "Cloud-provision" }

# Тело прогона — ветки диспетчера, по одной на режим (CONDITIONAL-INCLUDE, см. описание
# сценария выше). Порядок include — cluster, sentinel; индексы не важны (ветки
# взаимоисключающие по enum). Отдельного mode-guard нет: неизвестный redis_type
# отвергает input-валидация Keeper-а по enum ДО рендера.
tasks:
  # ── Генерация паролей в Vault ПЕРЕД любым чтением секретов (core.vault.kv-present) ──
  # ★ ГЕНЕРАЦИЯ СЕКРЕТОВ СЕРВИСОМ (2026-06-28): оператор больше НЕ пред-сеет пароли в
  # Vault — create САМ генерит недостающие крипто-случайно (generate-if-absent). Шаг
  # keeper-side (on: keeper, core.vault.kv-present): для каждого target читает путь и,
  # если поля нет — пишет crypto/rand-значение по policy; есть — no-op (НЕ перезатирает,
  # ротация — отдельный сценарий). changed=true только при реальной генерации.
  #
  # ★★ PASSAGE-ИНВАРИАНТ (критично): этот шаг ОБЯЗАН исполниться (apply, запись в Vault)
  # ДО render-фазы задач, читающих те же секреты через ${ vault(...) } (apply redis +
  # community.redis.* в ветках cluster/sentinel). Модель staged-render (ADR-056): passage
  # N полностью applies ДО render passage N+1. vault() в render с отсутствующим секретом
  # РВЁТ render (vault_resolve: «поле отсутствует»), поэтому generate ОБЯЗАН быть в БОЛЕЕ
  # РАННЕМ passage, чем read.
  #
  # КАК порядок обеспечен (ФАКТ, без декоративных register-рёбер):
  #   - этот шаг — `on: keeper` БЕЗ roster-зависимости (vault() — НЕ register-ребро,
  #     soulprint.* в targets НЕ читается) → Stratify держит его в passage 0;
  #   - read-задачи деплоя (redis-deploy-{sentinel,cluster}.yml) ВСЕ читают roster
  #     прогона (apply.input/params несут soulprint.hosts / soulprint.self) → они
  #     roster-ПОТРЕБИТЕЛИ (passage_refresh.go::taskReadsRoster);
  #   - provision-тело (redis-provision.yml, инклудится ВЫШЕ по program-order) несёт
  #     `core.soul.registered` с `refresh_soulprint: true` — refresh-ЭМИТТЕР (ADR-0061
  #     §S2). Он физически в плане ДО group-drop по include-when (Stratify работает на
  #     ПОЛНОМ плоском списке, дроп ветвей — позже на render-фазе), поэтому roster-refresh
  #     ребро уводит ВСЕ read-задачи деплоя в passage СТРОГО ПОСЛЕ generate (замер:
  #     generate=passage 0, любая vault()-читающая задача деплоя=passage 2).
  # vault() сам passage НЕ определяет (он не register-ссылка и не roster-чтение) — поэтому
  # ребро generate→read несёт roster-ось (refresh-эмиттер + roster-потребление деплоя), а
  # НЕ register. Несущий инвариант (generate в passage СТРОГО РАНЬШЕ любой vault()-read)
  # закреплён guard-тестом keeper/internal/render/redis_create_secrets_passage_test.go.
  #
  # targets ВЫЧИСЛЯЮТСЯ из ТОГО ЖЕ essence/input, что и read-задачи (drift «что генерим ≡
  # что читаем» = баг, поэтому список юзеров НЕ хардкодится): главный secret/redis/<inc>
  # #password + per-user union(system_acl_users, system_acl_users_sentinel) БЕЗ default
  # (sentinel default → главный секрет) + operator-extra input.users. policy alphanumeric/32
  # (redis.conf/ACL-safe). register НАМЕРЕННО НЕТ (passage-ребро несёт roster-ось, не register).
  - name: Ensure redis passwords exist in Vault (generate if absent)
    on: keeper
    module: core.vault.kv-present
    params:
      # policy — НАСТОЯЩИЙ YAML-map (не CEL-строка): module.params type-check ждёт
      # MappingNode под map-param. length/charset заданы явно — «описанные правила».
      policy:
        length: 32
        charset: alphanumeric
      # targets — ОДНОСТРОЧНЫЙ quoted-string ${…} (НЕ block-scalar): module.params
      # type-check пропускает CEL-wrap только для StringNode. union ключей
      # system_acl_users ∪ system_acl_users_sentinel БЕЗ default + operator-extra input.users.
      targets: "${ [{ 'path': 'secret/redis/' + incarnation.name, 'field': 'password' }] + merge(default(essence.system_acl_users, {}).map(n, { n: 0 }) + default(essence.system_acl_users_sentinel, {}).map(n, { n: 0 })).map(name, name).filter(name, name != 'default').map(name, { 'path': 'secret/redis/' + incarnation.name + '/users/' + name, 'field': 'password' }) + (has(input.users) ? input.users.map(u, { 'path': 'secret/redis/' + incarnation.name + '/users/' + u.name, 'field': 'password' }) : []) }"

  # ── Version-aware валидатор имён директив redis_settings (assert, #6) ─────────────
  # ★ #6 (2026-06-26): redis_settings — passthrough KEY→VALUE: input-схема пропускает
  # ЛЮБОЙ ключ (additional_properties: {type: string}). Без проверки оператор молча
  # протащит опечатку (`maxmemoyr 512mb`) или директиву чужой версии → redis-server не
  # стартует на хосте (поздний, непонятный отказ). Этот assert сверяет КАЖДОЕ ИМЯ
  # директивы redis_settings против каталога валидных имён ДЛЯ ВЫБРАННОЙ версии
  # (essence.redis_directives[<серия>], сгенерирован из src/config.c апстрима) — первый
  # неизвестный ключ рвёт render (422 assert-failed) ДО applying, понятным сообщением.
  #
  # ПОЧЕМУ assert, а не validate: каталог живёт в essence, а validate-контекст INPUT-ONLY
  # (essence недоступен, структурный CEL-барьер). assert видит essence+input+compute
  # (полный scenario-контекст) — единственный механизм, дотягивающийся до каталога.
  # Run-level (один раз на прогон), soulprint.hosts не нужен (проверка host-инвариантна),
  # но доступен.
  #
  # ВЕРСИЯ — compute.redis_version (= input.version, enum выкаченных в Nexus сборок;
  # ★ редизайн: ОДНА на оба способа установки — binary качает бинари этой версии, package
  # ставит =version-пин; прежний каскад «binary → essence.binary_version» убран).
  # Версия несёт серию major.minor → assert матчит её против ключей каталога.
  #
  # МЕХАНИКА version→серия БЕЗ split (StdLib CEL не даёт .split/.substring): итерируем
  # ключи каталога (.all(s, …)) и матчим версию против серии регуляркой
  # `^([0-9]+:)?<s>[.]` (трейлинг `[.]` — граница серии, чтобы 7.0 не цеплял 7.04;
  # epoch-префикс `5:` в регэкспе опционален — back-compat со старыми distro-пинами,
  # хотя input.version теперь чистый enum `8.6.1`). Для серий, которым версия НЕ
  # принадлежит, предикат вакуумно true (короткое замыкание тернаром) — проверка идёт
  # только против «своей» серии. Версия, не попавшая НИ в одну серию каталога (серия
  # отсутствует в каталоге — напр. 8.4 пока не сгенерирована) → assert skip: валидируем
  # ТОЛЬКО известные серии. default(input.redis_settings, {}) — поле опц.; .all над {} = true.
  - name: Validate redis_settings directive names against the catalog for the chosen Redis version
    assert:
      # that[] и message обязаны быть СКАЛЯРНЫМИ строками (не folded `>-`/`|`):
      # soul-lint требует *ast.StringNode (quoted/plain), block-scalar = type_mismatch.
      # Предикат — одна строка (CEL-normalize схлопывает пробелы): для каждого ключа
      # redis_settings k — для каждой серии каталога s, которой принадлежит версия
      # (regex `^([0-9]+:)?<s>[.]`), k обязан быть в essence.redis_directives[s]; серии
      # не той версии вакуумно-true (тернар), версия вне каталога → ни одна серия не
      # матчится → skip.
      #
      # `!has(essence.redis_directives) || …` — EMPTY-CATALOG-SKIP: каталог опционален.
      # Если essence его не несёт (минимальные fixtures L0-кейсов, либо essence оператора
      # без каталога) — assert skip (нечем валидировать). С каталогом — полная проверка.
      that:
        - "!has(essence.redis_directives) || default(input.redis_settings, {}).all(k, essence.redis_directives.all(s, compute.redis_version.matches('^([0-9]+:)?' + s + '[.]') ? (k in essence.redis_directives[s]) : true))"
      message: "redis_settings содержит неизвестную директиву redis.conf для выбранной версии Redis (input.version): сверь имя с каталогом валидных директив этой версии (essence.redis_directives[<major.minor>]) — опечатка или директива из другой версии Redis. Каталог генерируется scripts/gen-redis-catalog.sh из src/config.c."

  # ── provision (ADR-061, Вариант A): cloud-create + онбординг ПЕРЕД роль-веткой ──────
  # CONDITIONAL-INCLUDE redis-provision.yml СТРОГО ПЕРЕД cluster/sentinel: при enabled=true
  # его шаги (а) создают VM, (в) регистрируют+ждут онбординга с refresh_soulprint → roster
  # пере-резолвится, и ТОЛЬКО потом cluster/sentinel-ветка видит созданные хосты в
  # soulprint.hosts. ★ ОБЩЕЕ PROVISION-ТЕЛО service-level (scenario/redis-provision.yml, то
  # же, что инклудит migrate_cluster/main.yml — дубликата нет; scenario-include фоллбэкает
  # имя файла на service-level, orchestration.md §6). when по input.provision — НЕ
  # статический (object-input, не enum) → placeholder-skip-форма include-when (не
  # group-drop): на enabled=false/опущенной секции шаги тела не таргетят никого. has()-guard
  # — секция опциональна (no-such-key без неё). ★ teardown НЕ здесь.
  - include: redis-provision.yml
    when: "has(input.provision) && input.provision.enabled"

  - include: cluster.yml
    when: "input.redis_type == 'cluster'"
  - include: sentinel.yml
    when: "input.redis_type == 'sentinel'"
