name: create
description: >-
  Развернуть Redis (концепция Ansible-роли, redis-консолидация). Оператор задаёт
  ПРОСТЫЕ типизированные понятия (режим, сколько памяти, какая persistence, какая
  eviction-политика, какие ACL-юзеры, топология шардов), а сценарий ТРАНСЛИРУЕТ их
  в детальный redis.conf. Граница (architect 2026-06-22):

    - простой слой = строго типизированный структурный `input:` ниже (Named Dict,
      каждый параметр чёткого типа), НЕ свободный текст;
    - слой трансляции = тело сценария: данные-таблицы (persistence_presets,
      memory_reserve_percent) живут в essence; вычисление maxmemory — inline-CEL;
      слияние слоёв — CEL-функция merge() (SHALLOW last-wins, templating.md §2.3);
    - итоговый redis_config рендерится в ПОЛНЫЙ redis.conf at-CREATE (источник
      истины) — здесь merge нужен. CONFIG SET живого инстанса — это day-2
      update_config (отдельный сценарий), в create плагин config НЕ вызываем.

  ДИСПЕТЧЕР ПО redis_type (2026-06-22): этот файл — диспетчер. Тело прогона вынесено
  в ветки create/standalone.yml / cluster.yml / sentinel.yml / sentinel-only.yml,
  подключаемые через include: ниже. include: раскрывается БЕЗУСЛОВНО в плоский список
  ДО render (when: на самой include-задаче запрещён), поэтому ветвление делает не
  include, а `when:` на каждой задаче ветки: предикат по input.redis_type статичен
  (isStaticWhen — только input.*), Keeper вычисляет его at-render и гасит неактивную
  ветку placeholder-skip-ом (ADR-012(d) Вариант b). Оператор всегда зовёт create;
  режим выбирает redis_type. Порядок include — standalone, cluster, sentinel,
  sentinel_only: ветки добавляются В ХВОСТ, индексы предыдущих веток не сдвигаются.

  Пароли НЕ во входном контракте: лежат в Vault, резолвятся KEEPER-SIDE через CEL
  vault() в render-фазе (templating.md §2.3/§4) — на хост доезжает уже ЗНАЧЕНИЕ
  (ADR-012). Путь строится из доверенного контекста (incarnation), не из input.

# ── Входной контракт оператора (docs/input.md) ────────────────────────────────
# Простые типизированные понятия. Трансляция в redis.conf — в ветках диспетчера.
# Реализованы ВСЕ четыре режима: standalone (standalone.yml), cluster (cluster.yml),
# sentinel (sentinel.yml), sentinel_only (sentinel-only.yml — только sentinel-демон,
# мониторящий ВНЕШНИЙ master из input.master_ip). guard первой задачей диспетчера
# рвёт прогон с понятным сообщением, если выбран реально-неизвестный режим (а не
# молчаливый зелёный no-op).
input:
  redis_type:
    type: string
    required: false
    default: standalone
    enum: [standalone, sentinel, cluster, sentinel_only]
    description: >-
      Режим развёртывания (концепция роли). Реализованы ВСЕ четыре режима:
      standalone, cluster, sentinel (master-replica + sentinel-демон) и
      sentinel_only (тонкий sentinel-слой, мониторящий ВНЕШНИЙ master из
      input.master_ip — data-плоскость redis-server не разворачивается).
      redis_type выбирает ветку диспетчера (include: standalone.yml /
      cluster.yml / sentinel.yml / sentinel-only.yml + when: по redis_type на
      каждой задаче).

  version:
    type: string
    required: true
    pattern: "^([0-9]+:)?[0-9][A-Za-z0-9.~+-]*$"
    description: >-
      Версия пакета redis-server в репозитории дистрибутива (distro-native пин,
      напр. 5:7.0.15-1~deb12u7). ОБЯЗАТЕЛЬНА (директива пользователя 2026-06-23):
      core.pkg всегда ставит =version-пин (воспроизводимая инсталляция). Поведение
      «latest из репо» (пустой version → core.pkg без пина) более НЕ доступно.

  memory_mb:
    type: integer
    required: false
    min: 64
    description: >-
      Бюджет памяти под Redis на хосте, МБ. maxmemory вычисляется как доля от него
      (essence.memory_reserve_percent — резерв под ОС) с ЦЕЛОЧИСЛЕННЫМ усечением:
      maxmemory = int(memory_mb)*int(reserve)/100 + "mb". Нижний пол min:64 не
      случаен: при слишком малом memory_mb усечение даёт "0mb", а в Redis
      maxmemory 0 = БЕЗ лимита (обратное намерению ограничить память). 64 МБ при
      reserve=75 → 48mb — безопасно ненулевой результат. Не задан → директива
      maxmemory берётся из merge-подложки essence.redis_config.

  persistence:
    type: string
    required: false
    default: rdb
    enum: [off, aof, rdb, rdb_aof]
    description: >-
      Режим persistence. Транслируется в save/appendonly через
      essence.persistence_presets[persistence] (данные-таблица).

  maxmemory_policy:
    type: string
    required: false
    enum:
      - noeviction
      - allkeys-lru
      - allkeys-lfu
      - allkeys-random
      - volatile-lru
      - volatile-lfu
      - volatile-random
      - volatile-ttl
    description: >-
      Политика вытеснения при достижении maxmemory. Не задана → берётся из
      merge-подложки essence.redis_config.

  # ── Топология cluster (режим redis_type=cluster) ─────────────────────────────
  # Counts задают РАСКЛАДКУ ролей по таргетированным souls (pull-native, Вариант A):
  # оператор объявляет shards и replicas_per_shard, а сценарий проверяет, что число
  # хостов roster-а ровно shards*(1+replicas_per_shard) (size-guard cluster.yml), и
  # строит nodes-MAP для плагина. cloud-создание машин — post-бета.
  shards:
    type: integer
    required: false
    min: 1
    description: >-
      Число master-шардов Redis Cluster (режим cluster). 16384 hash-слота делятся
      поровну между shards мастерами (раскладку делает плагин community.redis.cluster
      детерминированно). Размер roster-а прогона обязан быть shards*(1+
      replicas_per_shard) — иначе size-guard рвёт прогон fail-fast.

  replicas_per_shard:
    type: integer
    required: false
    default: 0
    min: 0
    description: >-
      Реплик на один master-шард (режим cluster). 0 (дефолт) — кластер без реплик
      (только мастера). Состав roster-а: shards мастеров + shards*replicas_per_shard
      реплик. default:0 — чтобы size-guard читал int(input.replicas_per_shard) без
      has()-обвязки (контраст: shards остаётся guard-only, см. shards-guard cluster.yml).

  cluster_node_timeout:
    type: integer
    required: false
    default: 5000
    min: 1
    description: >-
      Таймаут gossip между нодами кластера, мс (директива cluster-node-timeout
      redis.conf, режим cluster). Не задан → 5000.

  # ── Топология sentinel (режим redis_type=sentinel) ───────────────────────────
  # Counts задают РАСКЛАДКУ ролей по таргетированным souls (pull-native, Вариант A):
  # 1 master + replicas реплик. size-guard create/sentinel.yml проверяет, что число
  # хостов roster-а ровно 1+replicas. master-election (кто master) — run_once по
  # sort soulprint.hosts (первый по SID); на create роль declared (probe невозможен,
  # redis ещё не поднят). sentinel-демон поднимается на КАЖДОМ хосте.
  replicas:
    type: integer
    required: false
    default: 0
    min: 0
    description: >-
      Реплик master-а (режим sentinel). 0 (дефолт) — только master (без реплик).
      Состав roster-а прогона: 1 master + replicas реплик (size-guard сверяет
      size(soulprint.hosts) == 1+replicas). default:0 — чтобы size-guard читал
      int(input.replicas) без has()-обвязки.

  sentinel_quorum:
    type: integer
    required: false
    min: 1
    description: >-
      Quorum sentinel-ов для признания master down (режим sentinel). Не задан →
      вычисляется size(soulprint.hosts)/2+1 (большинство). Передаётся в плагин
      community.redis.sentinel (SENTINEL MONITOR quorum) и в sentinel.conf.

  sentinel_master_name:
    type: string
    required: false
    default: mymaster
    description: >-
      Логическое имя monitored master в Sentinel (режимы sentinel/sentinel_only).
      По умолчанию mymaster. Уходит в sentinel.conf и в community.redis.sentinel
      (master_name).

  # ── Топология sentinel_only (режим redis_type=sentinel_only) ─────────────────
  # Тонкий sentinel-слой: разворачиваем ТОЛЬКО sentinel-демон (deploy_redis=false —
  # redis-server НЕ ставим), мониторящий ВНЕШНИЙ master. Адрес master-а оператор
  # задаёт явно (master_ip) — он НЕ выбирается из roster-а (master живёт вне этого
  # прогона). master_ip — HOST-ИНВАРИАНТ (один на кластер) → apply.input. REQUIRED
  # при sentinel_only — enforced guard-задачей sentinel-only.yml (schema-уровень
  # required нельзя сделать условным по режиму). sentinel-демон поднимается на
  # КАЖДОМ таргетированном хосте; size-guard в этом режиме НЕ нужен (любое число
  # sentinel-ов валидно — кворум считается от их количества).
  master_ip:
    type: string
    required: false
    description: >-
      IP/адрес ВНЕШНЕГО redis-master, который мониторит sentinel-кластер (режим
      sentinel_only). Обязателен при sentinel_only (guard рвёт прогон при пропуске).
      В прочих режимах не используется (master выбирается из roster-а).

  master_port:
    type: integer
    required: false
    default: 6379
    min: 1
    description: >-
      Порт ВНЕШНЕГО redis-master (режим sentinel_only). По умолчанию 6379. Уходит в
      sentinel.conf (sentinel monitor) и в community.redis.sentinel (monitor.port).

  users:
    type: object
    required: false
    description: >-
      ACL-пользователи Redis: ключ — имя, значение — {perms, state}. perms —
      ПОЛНАЯ ACL-строка (не алиас): директивы Redis ACL как есть, напр.
      "~* +@all" или "~app:* +@read +@write -@dangerous". Рендерятся в users.acl
      (destiny `redis`); пароль каждого юзера резолвится keeper-side из Vault по
      конвенции secret/redis/<incarnation>/users/<name>#password.
    properties: {}
    additional_properties:
      type: object
      required: [perms, state]
      additional_properties: false
      properties:
        perms:
          type: string
        state:
          type: string
          enum: [on, off]

  redis_settings:
    type: object
    required: false
    description: >-
      Passthrough-директивы redis.conf от оператора (key→value). Перекрывают
      дефолты/пресет в итоговом merge (last-wins). Используй для директив, не
      покрытых простыми полями выше.
    properties: {}
    additional_properties: true

  # ── Redis-модули (концепция Ansible-роли redis: redis_module_*) ──────────────
  # Загружаемые модули RediSearch/RedisJSON/RedisTimeSeries/RedisBloom как .so
  # (Redis < 8). VERSION-GATE: на Redis 8+ модули ВСТРОЕНЫ — сценарий передаёт
  # destiny пустой список (см. modules_for_redis в ветках диспетчера). Гейт по
  # input.version (мажор >= 8), упрощённо: полную version-matrix совместимости НЕ
  # тащим (brief), version не задан → не гейтим (fail-closed на Redis: .so против
  # 8+-бинаря отклонит сам сервер). modules_base_url/modules_sha256 обязательны при
  # непустом modules — destiny верифицирует SHA-256 каждого .so (fail-closed).
  modules:
    type: array
    required: false
    description: >-
      Алиасы Redis-модулей для подключения (Redis < 8): search (RediSearch),
      json (RedisJSON), timeseries (RedisTimeSeries), bloom (RedisBloom). Пусто/не
      задан → модули не подключаются. На Redis 8+ игнорируется (модули встроены).
    items:
      type: string
      enum: [search, json, timeseries, bloom]

  modules_base_url:
    type: string
    required: false
    description: >-
      Базовый URL источника .so-модулей (без арх-сегмента). destiny `redis` строит
      полный URL per-host как <base_url>/<arch>/<имя.so>. Обязателен при непустом
      modules.

  modules_sha256:
    type: object
    required: false
    description: >-
      Маппинг алиас→SHA-256 .so-объекта (голый hex). ОБЯЗАТЕЛЕН для каждого
      подключаемого модуля (fail-closed: core.url.fetched верифицирует, mismatch →
      падение). Соответствует паре (version, arch) кластера.
    properties: {}
    additional_properties:
      type: string
      pattern: "^[0-9a-f]{64}$"

  # ── Host-tuning extras (концепция Ansible-роли) ──────────────────────────────
  # Режим-агностичные per-host добавки. logrotate/sysctl включены по умолчанию
  # (средо-зависимы): оператор снимает флаг, если хост-тюнинг делается вне Soul
  # Stack. Транслируются в destiny `redis` через apply.input (host-инвариантны).
  # Значения sysctl-параметров — данные-таблица essence.sysctl_settings (не во
  # входе оператора). THP-отключение БЕЗУСЛОВНО (рекомендация Redis, hardening — не
  # выбор оператора): флага thp_disable в контракте НЕТ, задача всегда активна.
  logrotate_enable:
    type: boolean
    required: false
    default: true
    description: >-
      Поставить logrotate-конфиг для логов Redis (/etc/logrotate.d/redis).
      По умолчанию true.

  sysctl_enable:
    type: boolean
    required: false
    default: true
    description: >-
      Применить kernel-параметры под Redis (/etc/sysctl.d/30-redis.conf + sysctl
      --system). Значения — essence.sysctl_settings. По умолчанию true.

# ── Мутация incarnation.state ─────────────────────────────────────────────────
# После успешного apply Keeper фиксирует развёрнутое (ADR-009 §7.1, ADR-057
# list-форма). redis_config — ИТОГ трансляции (тот же merge(), что ушёл в render
# redis.conf): повторный apply и day-2-сценарии видят один источник истины.
# Выражение merge() повторяет apply.input.config веток — общего scenario-var для
# него нет (scenario-`vars:` только task-level и не виден ни apply.input, ни
# state_changes; см. resolveApplyInput/stateChangesVars), inline-повтор намеренный.
#
# redis_config ветвится по redis_type: standalone — базовый merge (бит-в-бит как
# до рефактора); cluster — тот же merge + cluster-директивы поверх (тот же набор,
# что ушёл в apply.input.config ветки cluster.yml — DRIFT-GUARD синхронности). В
# state cluster-announce-ip НЕ материализуется (host-вариативен; state — per-run,
# не per-host), остальные cluster-директивы статичны и пишутся.
state_changes:
  - set: redis_type
    value: "${ input.redis_type }"
  - set: redis_version
    value: "${ input.version }"
  # TLS-директивы (host-инвариант: один cert/порт на кластер) пишутся в state так
  # же, как ушли в apply.input.config веток — DRIFT-GUARD синхронности (state ≡
  # live config). TLS-блок: standalone/sentinel — без tls-cluster; cluster — с
  # tls-cluster yes. port 0 при tls_only. TLS off (essence.tls_enable отсутствует/
  # false) → merge({}) → нет директив (бит-в-бит как до TLS-слоя). cluster-announce-ip
  # в state НЕ пишется (host-вариативен) — TLS-cert/порт, наоборот, host-инвариантны.
  # sentinel_only — ПУСТОЙ {} перед cluster-/standalone-ветками: data-плоскости
  # redis-server нет (deploy_redis=false → redis.conf не рендерится), state required
  # удовлетворяется присутствием ключа.
  - set: redis_config
    value: >-
      ${ (input.redis_type == 'sentinel_only')
           ? {}
           : (input.redis_type == 'cluster')
           ? merge(
               essence.redis_config,
               essence.persistence_presets[input.persistence],
               merge(
                 has(input.memory_mb)
                   ? { 'maxmemory': string(int(input.memory_mb) * int(essence.memory_reserve_percent) / 100) + 'mb' }
                   : {},
                 has(input.maxmemory_policy) ? { 'maxmemory-policy': input.maxmemory_policy } : {}
               ),
               has(input.redis_settings) ? input.redis_settings : {},
               {
                 'cluster-enabled':      'yes',
                 'cluster-config-file':  'nodes.conf',
                 'cluster-node-timeout': string(int(input.cluster_node_timeout))
               },
               (has(essence.tls_enable) && essence.tls_enable)
                 ? merge(
                     {
                       'tls-port':         string(has(essence.tls_port) ? int(essence.tls_port) : 7379),
                       'tls-cert-file':    '/etc/redis/tls/redis.crt',
                       'tls-key-file':     '/etc/redis/tls/redis.key',
                       'tls-ca-cert-file': '/etc/redis/tls/ca.crt',
                       'tls-replication':  'yes',
                       'tls-cluster':      'yes'
                     },
                     (has(essence.tls_only) && essence.tls_only) ? { 'port': '0' } : {}
                   )
                 : {}
             )
           : merge(
               essence.redis_config,
               essence.persistence_presets[input.persistence],
               merge(
                 has(input.memory_mb)
                   ? { 'maxmemory': string(int(input.memory_mb) * int(essence.memory_reserve_percent) / 100) + 'mb' }
                   : {},
                 has(input.maxmemory_policy) ? { 'maxmemory-policy': input.maxmemory_policy } : {}
               ),
               has(input.redis_settings) ? input.redis_settings : {},
               (has(essence.tls_enable) && essence.tls_enable)
                 ? merge(
                     {
                       'tls-port':         string(has(essence.tls_port) ? int(essence.tls_port) : 7379),
                       'tls-cert-file':    '/etc/redis/tls/redis.crt',
                       'tls-key-file':     '/etc/redis/tls/redis.key',
                       'tls-ca-cert-file': '/etc/redis/tls/ca.crt',
                       'tls-replication':  'yes'
                     },
                     (has(essence.tls_only) && essence.tls_only) ? { 'port': '0' } : {}
                   )
                 : {}
             ) }
  - set: redis_users
    value: "${ has(input.users) ? input.users : {} }"
  # redis_hosts пустой во ВСЕХ режимах: state_changes рендерятся per-host с
  # soulprint.SELF (AllowHosts=false, orchestration.md §7.1) — roster soulprint.hosts
  # тут НЕДОСТУПЕН (граница: state — per-run, роли раскладывает apply-сторона).
  # Точные declared-роли sentinel (master-election) живут в apply.input.sentinel,
  # не в state (симметрично cluster, где роли раскладывает плагин).
  - set: redis_hosts
    value: "${ [] }"
  # redis_sentinel: факты monitored master (режимы sentinel/sentinel_only). quorum
  # берётся ТОЛЬКО из input (size(soulprint.hosts) в state_changes недоступен, см.
  # выше): задан → пишем его; не задан → 0 (auto-quorum size/2+1 вычисляется в apply,
  # в state не материализуется). sentinel_only ДОПОЛНИТЕЛЬНО пишет master_ip
  # (ВНЕШНИЙ master, оператор задал явно — единственный факт топологии этого режима);
  # в режиме sentinel master выбирается из roster-а (host-вариативен) → master_ip в
  # state НЕ материализуется. Вне sentinel-режимов — пустой объект.
  - set: redis_sentinel
    value: >-
      ${ (input.redis_type == 'sentinel_only')
           ? {
               'master_name': input.sentinel_master_name,
               'master_ip':   has(input.master_ip) ? input.master_ip : '',
               'quorum':      has(input.sentinel_quorum) ? int(input.sentinel_quorum) : 0
             }
           : (input.redis_type == 'sentinel')
           ? {
               'master_name': input.sentinel_master_name,
               'quorum':      has(input.sentinel_quorum) ? int(input.sentinel_quorum) : 0
             }
           : {} }

# Тело прогона — ветки диспетчера, по одной на режим. Раскрываются inline ДО render
# (orchestration.md §6); ветвление по redis_type — через `when:` на их задачах.
tasks:
  # GUARD режима — ПЕРВОЙ задачей диспетчера, БЕЗ when: (рендерится при ЛЮБОМ
  # redis_type). Ловит footgun «нереализованный режим = тихий зелёный no-op»:
  # ветки standalone/cluster/sentinel/sentinel_only все gated на свой redis_type,
  # поэтому при redis_type вне этого набора ВСЕ ветки гаснут placeholder-skip-ом и
  # create проходит зелёным, НИЧЕГО не развернув. Guard вычисляет KEEPER-SIDE булево
  # «режим реализован» (тот же render-в-cmd-форму паттерн, что size-guard веток):
  # реализован → "true" → test проходит, no-op; не реализован → "false" → echo с
  # конкретным redis_type + exit 1 рвут прогон fail-fast. Перечень mode-литералов
  # синхронен enum input.redis_type (все четыре режима реализованы) — guard
  # отвергает только реально-неизвестные значения. changed_when:false — проверка,
  # run_once — guard единый на прогон. input.redis_type читается голым (default:
  # standalone материализуется input-валидацией ДО CEL → has()-guard избыточен).
  - name: Guard redis_type is an implemented mode
    run_once: true
    module: core.cmd.shell
    changed_when: "false"
    params:
      cmd: >-
        test "${ input.redis_type == 'standalone' || input.redis_type == 'cluster' || input.redis_type == 'sentinel' || input.redis_type == 'sentinel_only' }" = "true" || { echo "redis_type=${ input.redis_type } не поддержан (реализованы: standalone, cluster, sentinel, sentinel_only)"; exit 1; }
  - include: standalone.yml
  - include: cluster.yml
  - include: sentinel.yml
  - include: sentinel-only.yml
