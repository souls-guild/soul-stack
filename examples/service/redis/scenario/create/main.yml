name: create
description: >-
  Развернуть Redis (концепция Ansible-роли, redis-консолидация). Оператор задаёт
  ПРОСТЫЕ типизированные понятия (режим, сколько памяти, какая persistence, какая
  eviction-политика, какие ACL-юзеры, топология шардов), а сценарий ТРАНСЛИРУЕТ их
  в детальный redis.conf. Граница (architect 2026-06-22):

    - простой слой = строго типизированный структурный `input:` ниже (Named Dict,
      каждый параметр чёткого типа), НЕ свободный текст;
    - слой трансляции = тело сценария: данные-таблицы (persistence_presets,
      memory_reserve_percent) живут в essence; вычисление maxmemory — inline-CEL;
      слияние слоёв — CEL-функция merge() (SHALLOW last-wins, templating.md §2.3);
    - итоговый redis_config рендерится в ПОЛНЫЙ redis.conf at-CREATE (источник
      истины) — здесь merge нужен. CONFIG SET живого инстанса — это day-2
      update_config (отдельный сценарий), в create плагин config НЕ вызываем.

  ДИСПЕТЧЕР ПО redis_type (2026-06-22): этот файл — диспетчер. Тело прогона вынесено
  в ветки create/cluster.yml / sentinel.yml, подключаемые через include: ниже.
  Ветвление делает CONDITIONAL-INCLUDE (orchestration.md §6, Вариант B group-drop):
  `when: input.redis_type == '<mode>'` стоит НА include-задаче — статический
  input-предикат (isStaticWhen) РЕАЛЬНО исключает неактивную ветку из плана
  (render-phase group-drop), а не гасит её placeholder-skip-ом. Прежний per-task when
  по каждой задаче ветки убран (гейт переехал на include): дублировал бы include-when.
  Оператор всегда зовёт create; режим выбирает redis_type. enum redis_type гарантирует
  попадание ровно в одну ветку (тихого зелёного no-op быть не может). L0-кейсы ассертят
  presence-матчером (task_present/task_absent), которому group-drop безопасен
  (позиционные индексы не важны).

  ★ РЕЖИМЫ СЕРВИСА сужены до sentinel/cluster (2026-06-25): standalone и sentinel_only
  убраны из сервиса (решение пользователя). standalone покрывается sentinel с 0 реплик
  (один master + sentinel-демон); sentinel_only нужен только в DESTINY `redis` (её
  гибкость sentinel_enabled/deploy_redis остаётся для переиспользования, напр. DragonFly),
  но не как режим этого сервиса. Сужение enum redis_type ([sentinel, cluster]) — bump
  state_schema_version 3→4 + миграция 003_to_004 (forward-only remap старых режимов).

  Пароли НЕ во входном контракте: лежат в Vault, резолвятся KEEPER-SIDE через CEL
  vault() в render-фазе (templating.md §2.3/§4) — на хост доезжает уже ЗНАЧЕНИЕ
  (ADR-012). Путь строится из доверенного контекста (incarnation), не из input.

# ── Входной контракт оператора (docs/input.md) ────────────────────────────────
# Простые типизированные понятия. Трансляция в redis.conf — в ветках диспетчера.
# Режимы сервиса: sentinel (sentinel.yml) и cluster (cluster.yml). standalone-
# развёртывание покрывается sentinel с replicas_per_master=0 (один master + sentinel-
# демон). Неизвестный режим отвергается input-валидацией Keeper-а (enum redis_type
# ниже) ДО рендера — понятным отказом, а не молчаливым зелёным no-op (обе ветки
# gated на свой redis_type).
input:
  redis_type:
    type: string
    required: false
    default: sentinel
    enum: [sentinel, cluster]
    description: >-
      Режим развёртывания (концепция роли). Два режима: sentinel (master-replica +
      sentinel-демон; replicas_per_master=0 даёт standalone-эквивалент) и cluster
      (honest hash-slot Redis Cluster). redis_type выбирает ветку диспетчера
      (conditional-include cluster.yml / sentinel.yml + when: по redis_type на include).

  version:
    type: string
    # ОБЯЗАТЕЛЬНА ТОЛЬКО для install_method=package (required_when, input-only):
    # distro-пин. При install_method=binary версия бинаря — в essence.binary_version
    # (upstream-semver), не во входном контракте. install_method имеет default:package
    # → ВСЕГДА присутствует в эффективном input → required_when без has()-обвязки.
    required_when: "input.install_method == 'package'"
    pattern: "^([0-9]+:)?[0-9][A-Za-z0-9.~+-]*$"
    description: >-
      Версия пакета redis-server в репозитории дистрибутива (distro-native пин,
      напр. 5:7.0.15-1~deb12u7). ОБЯЗАТЕЛЬНА при install_method=package (директива
      пользователя 2026-06-23): core.pkg всегда ставит =version-пин. Поведение
      «latest из репо» более НЕ доступно. При install_method=binary НЕ используется
      (версия бинаря — в essence.binary_version).

  # ── install_method: способ установки redis (default package, #1) ─────────────
  # package (default, поведение-сохраняющее) — distro-пакет; binary — upstream-tarball.
  # ★ #1 (2026-06-26): прежний object-input `install` (method/base_url/version) сведён
  # к ОДНОМУ enum-полю install_method. URL/версия бинаря — НЕ операторский ввод: они
  # переехали в essence (binary_base_url/binary_version, author-context, оператор
  # переопределяет в spec.essence), симметрично modules_base_url/sysctl_settings. compute
  # собирает destiny-структуру install {method, base_url, version} из install_method +
  # essence.binary_*. tarball качается по content-идемпотентности (SHA-256), без verify.
  #
  # ★ Раскладка conf_dir/data_dir больше НЕ операторский input (#2): дефолты переехали
  # в essence (conf_dir/data_dir), compute читает их оттуда. Override — в spec.essence
  # инкарнации, не в Run-форме. В state conf_dir/data_dir ОСТАЮТСЯ (day-2 add_node читает
  # layout из incarnation.state) — источник правки лишь сместился input→essence, форма
  # state не меняется.
  install_method:
    type: string
    required: false
    default: package
    enum: [package, binary]
    description: >-
      Способ установки redis. package (default) — distro-пакет redis-server (=version-
      пин из input.version); binary — upstream-tarball (URL/версия из essence.binary_base_url/
      binary_version, имя файла строит destiny per-host из soulprint.self.os.arch). tarball
      качается по content-идемпотентности (SHA-256 содержимого), без integrity-verify.

  memory_mb:
    type: integer
    required: false
    min: 64
    description: >-
      Бюджет памяти под Redis на хосте, МБ. maxmemory вычисляется как доля от него
      (essence.memory_reserve_percent — резерв под ОС) с ЦЕЛОЧИСЛЕННЫМ усечением:
      maxmemory = int(memory_mb)*int(reserve)/100 + "mb". Нижний пол min:64 не
      случаен: при слишком малом memory_mb усечение даёт "0mb", а в Redis
      maxmemory 0 = БЕЗ лимита (обратное намерению ограничить память). 64 МБ при
      reserve=75 → 48mb — безопасно ненулевой результат. Не задан → директива
      maxmemory берётся из merge-подложки essence.redis_config.

  persistence:
    type: string
    required: false
    default: rdb
    enum: [off, aof, rdb, rdb_aof]
    description: >-
      Режим persistence. Транслируется в save/appendonly через
      essence.persistence_presets[persistence] (данные-таблица).

  maxmemory_policy:
    type: string
    required: false
    enum:
      - noeviction
      - allkeys-lru
      - allkeys-lfu
      - allkeys-random
      - volatile-lru
      - volatile-lfu
      - volatile-random
      - volatile-ttl
    description: >-
      Политика вытеснения при достижении maxmemory. Не задана → берётся из
      merge-подложки essence.redis_config.

  # ── Реплики на master (UNIFIED, оба режима) ──────────────────────────────────
  # ОДНО поле replicas_per_master на оба режима (унификация 2026-06-25): реплик на
  # каждый master. cluster — реплик на шард (состав roster-а: shards мастеров +
  # shards*replicas_per_master реплик); sentinel — реплик master-а (состав roster-а:
  # 1 master + replicas_per_master реплик). default:0 → size-guard читает
  # int(input.replicas_per_master) без has()-обвязки.
  replicas_per_master:
    type: integer
    required: false
    default: 0
    min: 0
    description: >-
      Реплик на каждый master. cluster — реплик на шард (roster =
      shards*(1+replicas_per_master)); sentinel — реплик master-а (roster =
      1+replicas_per_master). 0 (дефолт) — без реплик (cluster: только мастера;
      sentinel: только master, standalone-эквивалент). size-guard каждой ветки
      сверяет состав roster-а.

  # ── Топология cluster (режим redis_type=cluster) ─────────────────────────────
  # Counts задают РАСКЛАДКУ ролей по таргетированным souls (pull-native, Вариант A):
  # оператор объявляет shards и replicas_per_master, а сценарий проверяет, что число
  # хостов roster-а ровно shards*(1+replicas_per_master) (size-guard cluster.yml), и
  # строит nodes-MAP для плагина. cloud-создание машин — post-бета.
  shards:
    type: integer
    required: false
    required_when: "input.redis_type == 'cluster'"
    min: 1
    description: >-
      Число master-шардов Redis Cluster (режим cluster). 16384 hash-слота делятся
      поровну между shards мастерами (раскладку делает плагин community.redis.cluster
      детерминированно). Размер roster-а прогона обязан быть shards*(1+
      replicas_per_master) — иначе size-guard рвёт прогон fail-fast. Обязателен при
      redis_type=cluster (required_when) — пропуск рвёт прогон на input-валидации.

  cluster_node_timeout:
    type: integer
    required: false
    default: 5000
    min: 1
    description: >-
      Таймаут gossip между нодами кластера, мс (директива cluster-node-timeout
      redis.conf, режим cluster). Не задан → 5000.

  # ── Топология sentinel (режим redis_type=sentinel) ───────────────────────────
  # Counts задают РАСКЛАДКУ ролей по таргетированным souls (pull-native, Вариант A):
  # 1 master + replicas_per_master реплик. size-guard create/sentinel.yml проверяет,
  # что число хостов roster-а ровно 1+replicas_per_master. master-election (кто master)
  # — run_once по sort soulprint.hosts (первый по SID); на create роль declared (probe
  # невозможен, redis ещё не поднят). sentinel-демон поднимается на КАЖДОМ хосте.
  # Реплик master-а задаёт UNIFIED-поле replicas_per_master (см. выше).
  # sentinel_quorum — АВТО (size(soulprint.hosts)/2+1, большинство): операторского
  # поля нет (убрано 2026-06-25). sentinel_master_name — в essence (дефолт `master`),
  # не в input.
  #
  # ★ #7 (2026-06-26): тайминги failover sentinel — операторский ввод. Транслируются
  # в per-master директивы sentinel.conf `sentinel down-after-milliseconds <master>` и
  # `sentinel failover-timeout <master>` (через apply.input.sentinel.config) И в
  # community.redis.sentinel params.config (live SENTINEL SET reconcile, плагин уже
  # классифицирует их в per-master — доработка плагина не нужна).
  sentinel_down_after_ms:
    type: integer
    required: false
    default: 5000
    min: 1
    description: >-
      Сколько мс master не отвечает, прежде чем sentinel считает его упавшим
      (директива sentinel down-after-milliseconds, режим sentinel). Не задан → 5000.

  sentinel_failover_timeout_ms:
    type: integer
    required: false
    default: 60000
    min: 1
    description: >-
      Таймаут одной попытки failover, мс (директива sentinel failover-timeout, режим
      sentinel). По истечении sentinel считает failover провалившимся и пробует снова.
      Не задан → 60000.

  # ★ wave 1b types-эпик (2026-06-26): operator-extra ACL — ТИПИЗИРОВАННЫЙ массив
  # элементов AclUser (types.yml, ADR-062 $type). Прежний нетипизированный map
  # username→{perms,state} заменён массивом [{name, perms, state}]: имя юзера переехало
  # в поле name элемента (раньше было map-ключом). Форма AclUser объявлена ОДИН раз в
  # types.yml (источник правды), add_user/update_users ссылаются на тот же тип.
  # Ветки cluster/sentinel итерируют массив (.map(u, {u.name: …})) → собирают тот же
  # destiny-map имя→{perms,state,password}, что и прежде (destiny-контракт не менялся).
  users:
    type: array
    required: false
    items:
      $type: AclUser
    description: >-
      ACL-пользователи Redis (массив AclUser: {name, perms, state}). perms — ПОЛНАЯ
      ACL-строка (не алиас): директивы Redis ACL как есть, напр. "~* +@all" или
      "~app:* +@read +@write -@dangerous". Рендерятся в users.acl (destiny `redis`);
      пароль каждого юзера резолвится keeper-side из Vault по конвенции
      secret/redis/<incarnation>/users/<name>#password.

  # ── redis_settings: passthrough-директивы redis.conf (KEY→VALUE, #6) ─────────
  # ★ #6 (2026-06-26): additional_properties: true (произвольный JSON) сужено до
  # additional_properties: {type: string} — UI рисует KEY→VALUE-редактор (ADR-045:
  # object + скалярный value-тип → key→value-виджет, а не сырой JSON). Директивы
  # redis.conf — это плоский map имя→строковое значение (`maxmemory 512mb`), поэтому
  # value-тип string точен. compute мержит этот map поверх дефолтов/пресета (last-wins)
  # со СТРОКОВЫМИ значениями — формы редактора достаточно.
  redis_settings:
    type: object
    required: false
    description: >-
      Passthrough-директивы redis.conf от оператора (key→value, строки). Перекрывают
      дефолты/пресет в итоговом merge (last-wins). Используй для директив, не
      покрытых простыми полями выше. UI — KEY→VALUE-редактор.
    properties: {}
    additional_properties:
      type: string

  # ── TLS — 2 булевых галочки (#5) ──────────────────────────────────────────────
  # ★ #5 (2026-06-26): прежний object-input `tls` (enable/only/port/cert_ref/key_ref/
  # ca_ref) сведён к ДВУМ операторским галочкам:
  #   - tls_enabled    — включить TLS (главный гейт);
  #   - tls_keep_plain — оставить ли открытым plain-порт (default true). false закрывает
  #     plain-порт (`port 0`) — режим только-TLS. Инвертированная форма прежнего `only`
  #     (only=!keep_plain): галочка «оставить plain» интуитивнее «закрыть plain».
  # Технические параметры TLS (порт, Vault-пути cert/key/ca) — НЕ операторский ввод,
  # они переехали в essence (tls_port/tls_cert_ref/tls_key_ref/tls_ca_ref, author-
  # context, оператор переопределяет в spec.essence), симметрично binary_*/modules_base_url.
  # compute собирает tls_only = tls_enabled && !tls_keep_plain и читает порт/refs из
  # essence. cert/key/ca — Vault-ПУТИ (НЕ PEM): destiny читает PEM через vault(ref) в
  # ячейке content (seal-маскинг).
  tls_enabled:
    type: boolean
    required: false
    default: false
    description: >-
      Включить TLS Redis (главный гейт). false (дефолт) → TLS off (TLS-задачи destiny
      gated off, директив нет). Порт и Vault-пути cert/key/ca берутся из essence
      (tls_port/tls_cert_ref/tls_key_ref/tls_ca_ref).

  tls_keep_plain:
    type: boolean
    required: false
    default: true
    description: >-
      Оставить ли открытым plain-порт 6379 при включённом TLS. true (дефолт) — plain и
      TLS слушаются одновременно. false — закрыть plain (`port 0`), режим только-TLS.
      Имеет смысл лишь при tls_enabled=true. Нельзя tls_enabled=false И tls_keep_plain=
      false одновременно — у Redis не осталось бы ни одного listener-а (см. validate:).

  # ── cloud-provision: поднять VM под топологию в том же прогоне (ADR-061, Вариант A) ─
  # ★ provision (FLAG имя секции, propose-and-wait): опциональный object-вход «создай
  # машины». Когда задан и enabled=true — create ОДНИМ прогоном (а) создаёт VM через
  # core.cloud.created (on: keeper), (б) доставляет per-VM bootstrap-токен (иллюстративно),
  # (в) регистрирует созданные SID + БЛОКИРУЮЩЕ ждёт онбординга (core.soul.registered
  # await_online + refresh_soulprint, ADR-061), после чего roster пере-резолвится и
  # cluster/sentinel-ветка катит redis-роль на уже-online хосты. Не задан / enabled=false
  # — provision.yml group-drop, прогон работает по СУЩЕСТВУЮЩЕМУ roster-у (поведение до
  # фичи бит-в-бит).
  #
  # ★ node_count тут НЕТ намеренно: число VM выводится из ТОПОЛОГИИ (cluster: shards*(1+
  # replicas_per_master); sentinel: 1+replicas_per_master) — единственный источник истины
  # размера кластера. Отдельное node_count рассинхронилось бы с size-guard веток.
  # ★ teardown (destroy) — НЕ здесь (отдельный сценарий).
  provision:
    type: object
    required: false
    description: >-
      Поднять VM под топологию в том же create-прогоне (ADR-061). enabled=true →
      сначала cloud-create + онбординг (барьер await_online), потом redis-роль на
      созданные хосты. Не задан / enabled=false → прогон по существующему roster-у.
    additional_properties: false
    properties:
      enabled:
        type: boolean
        default: false
        description: Главный гейт provision. false (или секция опущена) — provision.yml group-drop.
      provider:
        type: string
        description: Имя cloud-Provider в реестре providers (NOT plugin name → soul-cloud-<provider>).
      profile:
        type: string
        description: Имя VM-профиля в реестре profiles (ресурсы/образ/сеть VM).
      await_timeout:
        type: string
        pattern: "^[0-9]+[smh]$"
        description: >-
          Верхняя граница ожидания онбординга созданных VM (барьер await_online,
          ADR-061; форма <N>{s|m|h}). Не задан → essence.provision_await_timeout (дефолт
          10m). Ограничен сверху keeper.yml::max_await_timeout.

  # ── Redis-модули (концепция Ansible-роли redis: redis_module_*) ──────────────
  # ★ ДИРЕКТИВА «модули ВСЕГДА ВСЕ» (2026-06-25): НАБОР модулей больше НЕ operator-
  # выбор — destiny разворачивает ПОЛНЫЙ набор из своего vars.redis_modules (Redis < 8).
  # Поэтому поля input.modules здесь НЕТ (оператор не выбирает подмножество). На Redis
  # 8+ модули ВСТРОЕНЫ — version-guard (по compute.redis_version) гасит .so и в destiny
  # (include modules.yml group-drop), и в read-model (state.modules=[]).
  #
  # ★ ИСТОЧНИК .so — essence-плейсхолдер (2026-06-25): modules_base_url убран из
  # операторского input. Это author-context-параметр (essence.modules_base_url, дефолт
  # ""), который оператор переопределяет в spec.essence инкарнации, а не в Run-форме
  # каждого прогона. На Redis < 8 без источника .so destiny не построит URL — мягкая
  # проверка в validate: (см. ниже). .so качаются по content-идемпотентности (SHA-256
  # содержимого), без integrity-verify (как node-exporter).

# ── Презентационный слой формы (form:, top-level scenario-ключ) ───────────────────
# form: — ЧИСТАЯ ПРЕЗЕНТАЦИЯ: как UI группирует и подписывает поля input в Run-форме.
# Контракт ввода (типы/валидация/обязательность) живёт ИСКЛЮЧИТЕЛЬНО в input: выше —
# form ссылается на поля по имени, ничего не дублирует и не меняет. Опционален:
# уберёшь блок → UI рисует input плоско (forward-compat). soul-lint сверяет
# инварианты (каждое name ∈ input:, имя в одной секции, key уникален); поле input
# без секции — WARNING (UI дорисует в дефолтную секцию в конце), не error.
form:
  sections:
    - key: mode
      title: "Режим и установка"
      description: "Тип развёртывания и способ установки Redis"
      fields:
        - { name: redis_type, label: "Режим развёртывания" }
        - { name: install_method, label: "Способ установки" }
        - name: version
          label: "Версия пакета (distro-пин)"
          placeholder: "5:7.0.15-1~deb12u7"
          hint: "Distro-native пин (=version). Обязательно при способе установки «package»; для «binary» версия и URL бинаря задаются в essence."

    - key: resources
      title: "Память и persistence"
      fields:
        - name: memory_mb
          label: "Бюджет памяти, МБ"
          placeholder: "1024"
          hint: "Бюджет памяти под Redis на хосте. maxmemory вычисляется как доля от него (минус резерв ОС). Не задан → maxmemory из подложки essence."
        - { name: persistence, label: "Режим persistence" }
        - { name: maxmemory_policy, label: "Политика вытеснения" }

    - key: topology
      title: "Топология"
      description: "Реплики (оба режима), параметры Cluster и тайминги Sentinel"
      collapsed: true
      fields:
        - name: replicas_per_master
          label: "Реплик на master"
          placeholder: "0"
          hint: "0 = один master без реплик (cluster: только мастера; sentinel: standalone-эквивалент)."
        # cluster-специфичные поля: видимы ТОЛЬКО в режиме cluster (для sentinel
        # не используются). show_when — презентация, не гейт: shards.required_when
        # на input-валидации остаётся независимо (defence-in-depth).
        - name: shards
          label: "Число master-шардов (cluster)"
          show_when: "input.redis_type == 'cluster'"
          placeholder: "3"
          hint: "16384 hash-слота делятся поровну между шардами. Roster прогона обязан быть shards*(1+реплик)."
        - name: cluster_node_timeout
          label: "Таймаут gossip, мс (cluster)"
          show_when: "input.redis_type == 'cluster'"
          placeholder: "5000"
          hint: "Таймаут gossip между нодами кластера (cluster-node-timeout). Не задан → 5000."
        # sentinel-специфичные тайминги failover: видимы ТОЛЬКО в режиме sentinel.
        - name: sentinel_down_after_ms
          label: "down-after, мс (sentinel)"
          show_when: "input.redis_type == 'sentinel'"
          placeholder: "5000"
          hint: "Сколько мс master не отвечает, прежде чем sentinel считает его упавшим. Не задан → 5000."
        - name: sentinel_failover_timeout_ms
          label: "failover-timeout, мс (sentinel)"
          show_when: "input.redis_type == 'sentinel'"
          placeholder: "60000"
          hint: "Таймаут одной попытки failover. Не задан → 60000."

    - key: security
      title: "ACL и TLS"
      fields:
        - { name: users, label: "ACL-пользователи" }
        - { name: tls_enabled, label: "Включить TLS" }
        # Галочка plain-порта имеет смысл только при включённом TLS.
        - name: tls_keep_plain
          label: "Оставить открытым plain-порт"
          show_when: "input.tls_enabled"
          hint: "Слушать ли plain-порт 6379 одновременно с TLS. Снять → только-TLS (plain закрыт). Нельзя выключить и TLS, и эту галочку — у Redis не осталось бы listener-а."

    - key: provision
      title: "Облачное создание VM"
      description: "Поднять VM под топологию в том же прогоне (опционально, ADR-061)"
      collapsed: true
      fields:
        - { name: provision, label: "Cloud-provision" }

    - key: advanced
      title: "Дополнительно"
      collapsed: true
      fields:
        - { name: redis_settings, label: "Passthrough-директивы redis.conf" }

# ── Декларативные input-инварианты (validate:, ADR-009 amendment 2026-06-23) ──────
# validate: — кросс-полевые предусловия ВВОДА, не выразимые одним schema-ключом и
# не покрываемые required_when (присутствие) или enum/min/max (одно поле). Контекст
# правила — INPUT-ONLY (только input.*; essence/soulprint/roster недоступны —
# структурный CEL-барьер). Первый провал → 422 validation_failed ДО коммита
# incarnation и ДО applying (как required_when), оператору с message правила.
#
# Граница с assert: (ниже, в ветках): assert — про ТОПОЛОГИЮ прогона (size-guard
# сверяет size(soulprint.hosts) с 1+replicas / shards*(1+replicas_per_shard)),
# нужен полный scenario-контекст с soulprint.hosts. validate здесь — про САМ ВВОД
# (соотношение чисел), вычислимо ДО резолва roster.
validate:
  # ★ #5 (2026-06-26): инвариант «хотя бы один listener» на 2 галочках. Нельзя
  # tls_enabled=false И tls_keep_plain=false одновременно: TLS выключен (tls-порт не
  # пишется), а plain закрыт (keep_plain=false → `port 0`) → у Redis НИ ОДНОГО listener-а,
  # сервер недоступен по сети. Оба поля имеют default (false/true соответственно) → ВСЕГДА
  # присутствуют в эффективном input → has()-обвязка не нужна, прямой предикат. Не
  # выразимо одним schema-ключом (потолок — другое поле) и не required_when (соотношение,
  # не присутствие). validate-CEL input-only (default()/vault() недоступны — здесь не
  # нужны, оба поля гарантированно есть).
  - that: "input.tls_enabled || input.tls_keep_plain"
    message: "нельзя одновременно выключить TLS и закрыть plain-порт: у Redis не осталось бы ни одного listener-а — оставь plain-порт открытым (tls_keep_plain) либо включи TLS (tls_enabled)"

  # ★ #1 (2026-06-26): правило «install.method=binary требует base_url+version» УБРАНО.
  # URL и версия бинаря переехали из operator-input в essence (binary_base_url/
  # binary_version, author-context), а validate-контекст INPUT-ONLY — essence в нём
  # недоступен (структурный CEL-барьер). Подложка essence задаёт источник; пустой
  # binary_base_url при install_method=binary проявится при render-е destiny (URL
  # tarball-а), а не на input-валидации. install_method — простой enum (схема ловит).

  # ★ system-ACL-users guard (дизайн d2): operator-extra (input.users) НЕ может занять
  # имя СЛУЖЕБНОГО юзера. Системные (default/replica/monitoring/sentinel/haproxy)
  # доливаются в users.acl из essence.system_acl_users[_sentinel] с last-wins ПОВЕРХ
  # системных — операторский юзер с тем же именем МОЛЧА перекрыл бы служебные perms
  # (напр. operator `replica` с `~* +@all` сломал бы replica-perms репликации, дав
  # лишние права). Ловим коллизию на INPUT-валидации (422 ДО applying) понятным
  # отказом, а не молчаливым переопределением. INPUT-ONLY (essence в validate
  # недоступен — структурный CEL-барьер): список зарезервированных имён захардкожен
  # здесь (он же essence.system_acl_users[_sentinel] keys + default из requirepass).
  # has()-guard — input.users опционален; .all() над МАССИВОМ итерирует элементы
  # AclUser (wave 1b), имя — поле u.name (раньше map-ключ name).
  - that: "!has(input.users) || input.users.all(u, !(u.name in ['default', 'replica', 'monitoring', 'sentinel', 'haproxy']))"
    message: "имя ACL-пользователя зарезервировано за служебным (default/replica/monitoring/sentinel/haproxy): выбери другое имя — служебные юзеры заводятся автоматически из essence"

  # ★ Правило «modules_base_url обязателен на Redis < 8» УБРАНО (2026-06-25): источник
  # .so переехал из operator-input в essence.modules_base_url (author-context, дефолт ""),
  # а validate-контекст INPUT-ONLY — essence в нём недоступен (структурный CEL-барьер).
  # Проверить заполненность essence.modules_base_url тут нельзя. Подложка essence по
  # умолчанию задаёт источник, оператор переопределяет в spec.essence; пустой источник
  # на Redis < 8 проявится при render-е destiny (URL .so), а не на input-валидации.

# ── Host-tuning extras (концепция Ansible-роли) ──────────────────────────────────
# Режим-агностичные per-host добавки — THP-отключение, logrotate, sysctl — БЕЗУСЛОВНЫ
# (рекомендация Redis / hardening, не выбор оператора): флагов в операторском
# контракте НЕТ, задачи всегда активны. Значения sysctl-параметров — данные-таблица
# essence.sysctl_settings (не во входе оператора), транслируются в destiny `redis`
# через apply.input (host-инвариантны).

# ── Вычисляемые scenario-vars (compute:, ADR-009 amendment 2026-06-23) ────────────
# `compute:` резолвится KEEPER-SIDE ОДИН раз на прогон в рун-уровневом контексте
# (input/essence/incarnation — БЕЗ soulprint, барьер host-инвариантности) и виден
# как `compute.<name>` И в apply.input веток, И в state_changes ниже. Это снимает
# дублирование большого merge()-перевода: он объявлен ЗДЕСЬ ОДИН раз, ветки и state
# ссылаются `${ compute.redis_config }` — drift «state ≡ live config» снят самим
# compute (одно значение, не два синхронизируемых выражения).
#
# compute.redis_config — ИТОГ трансляции простого ввода в redis.conf-map. Ветвится
# по input.redis_type:
#   - cluster → базовый merge + cluster-директивы (cluster-enabled/config-file/
#     node-timeout) + tls-cluster yes при TLS;
#   - sentinel → базовый merge (без cluster-директив).
# Слои merge (SHALLOW last-wins, слева направо): essence.redis_config (дефолты) →
# persistence-пресет → вычисленные maxmemory/policy (has-guard) → input.redis_settings
# (passthrough оператора) → TLS-блок (после redis_settings, оператор не ломает TLS).
# TLS-гейт — compute.tls_on/tls_only_on/tls_port (2 операторские галочки tls_enabled/
# tls_keep_plain + порт/refs из essence, #5; объявлены выше). ★ FIX (qa): TLS-директивы
# tls-cert-file/tls-key-file/tls-ca-cert-file
# выводятся из compute.conf_dir (НЕ хардкод /etc/redis/tls) — destiny кладёт PEM в
# ${conf_dir}/tls/ (server.yml), и redis.conf обязан смотреть ТУДА ЖЕ, иначе при
# override conf_dir + TLS redis-server не находит cert и не стартует (при tls.only узел
# недоступен по сети). cluster-announce-ip в config НЕ материализуется (per-host →
# шаблон .self), TLS cert/порт host-инвариантны.
#
# ★ ГРАНИЦА КОНФИГА: host-layout-директивы dir (рабочий каталог RDB/AOF, → data_dir) и
# aclfile (→ conf_dir) задаёт destiny-ШАБЛОН redis.conf.tmpl ИЗ vars (dir {{.vars.data_dir}},
# aclfile {{.vars.conf_dir}}/users.acl), НЕ этот compute. Прежний хардкод (/var/lib/redis,
# /etc/redis/users.acl) убран — override conf_dir/data_dir теперь доезжает до redis.conf
# (apply.input.conf_dir/data_dir → destiny vars). Эти директивы здесь не дублируем: layout
# выводится из vars в шаблоне (один источник), их добавление в compute.redis_config
# продублировало бы ту же логику. logfile/pidfile (/var/log/redis, /var/run/redis) —
# системные каталоги вне input-схемы conf_dir/data_dir; unixsocket/dbfilename в шаблоне
# не задаются.
compute:
  # ── TLS-флаги: 2 операторские галочки + essence-параметры (#5) ────────────────
  # TLS-намерение — tls_enabled/tls_keep_plain (input, оба с default → всегда есть);
  # порт/refs — из essence (см. tls_on/tls_only_on/tls_port/tls_*_ref ниже). Объявлены
  # ОТДЕЛЬНЫМИ compute-vars, чтобы и redis_config (ниже), и ветки (apply.input.tls +
  # health-gate) читали ОДНО разрешённое значение — а не повторяли его. compute контекст
  # рун-уровневый: input/essence доступны, soulprint — нет (host-инвариантность TLS).
  #
  # ── Эффективная версия redis: distro-пин (package) ЛИБО upstream-semver (binary, #1)
  # ★ #1 (2026-06-26): install_method — enum с default:package (ВСЕГДА присутствует).
  # package → input.version (required_when=package, тоже присутствует); binary →
  # essence.binary_version (URL/версия бинаря переехали в essence). Объявлена ОДИН раз —
  # state_changes.redis_version и param redis_version плагина читают её, не повторяя
  # каскад. has(input.version) — package-ветка required_when гарантирует наличие;
  # default(essence.binary_version, '') — author-context-дефолт ''.
  redis_version: "${ input.install_method == 'binary' ? default(essence.binary_version, '') : (has(input.version) ? input.version : '') }"
  # ── Развёрнутые Redis-модули (read-model state.modules) ──────────────────────
  # ★ ДИРЕКТИВА «модули ВСЕГДА ВСЕ» (2026-06-25): набор больше НЕ operator-выбор.
  # destiny разворачивает ПОЛНЫЙ набор из своего vars.redis_modules (Redis < 8). state-
  # read-model отражает ФАКТИЧЕСКИ развёрнутое: Redis < 8 → полный набор алиасов;
  # Redis 8+ → [] (модули встроены, .so не качаются — version-guard). Список алиасов
  # тут — ЗЕРКАЛО ключей destiny vars.redis_modules (destiny маппит alias→.so для
  # деплоя; scenario знает только алиасы для read-model — разные слои, дублируются
  # только ИМЕНА; при добавлении модуля синхронизировать оба места). Отсортирован (как
  # Go-сорт ключей map в destiny) — детерминизм state.
  redis_modules_deployed: >-
    ${ compute.redis_version.matches('^([0-9]+:)?(8|9|[1-9][0-9])\\.')
         ? []
         : ['bloom', 'json', 'search', 'timeseries'] }
  # ── Источник .so Redis-модулей (essence-плейсхолдер, 2026-06-25) ─────────────
  # modules_base_url переехал из operator-input в essence.modules_base_url (author-
  # context, дефолт ""; оператор переопределяет в spec.essence). Объявлен ОДНИМ compute-
  # var, чтобы ветки (apply.input.modules_base_url) и state_changes читали одно значение.
  # default() ловит отсутствие листа на существующем essence-map; дефолт "" симметричен
  # прежнему default(input.modules_base_url, '').
  modules_base_url: "${ default(essence.modules_base_url, '') }"
  # ── Per-master sentinel-директивы (тайминги failover, #7) ────────────────────
  # ★ #7 (2026-06-26): тайминги down-after-milliseconds/failover-timeout транслируются
  # в директивы sentinel.conf формы `sentinel <opt> <master-name>` (так их печатает
  # шаблон sentinel.conf.tmpl) И в плагин community.redis.sentinel (params.config →
  # classifyConfig раскладывает per-master → SENTINEL SET). ОДИН source-of-truth: и
  # стартовый конфиг, и live-reconcile читают этот map. master_name — из essence (дефолт
  # 'master'). Ключ — вычисляемое выражение (паттерн `{ h.sid: … }` cluster-nodes).
  # Объявлен compute-var, чтобы apply.input.sentinel.config и плагин-config читали одно.
  sentinel_directives: >-
    ${ {
         'sentinel down-after-milliseconds ' + default(essence.sentinel_master_name, 'master'): string(int(input.sentinel_down_after_ms)),
         'sentinel failover-timeout '         + default(essence.sentinel_master_name, 'master'): string(int(input.sentinel_failover_timeout_ms))
       } }
  # ── install: destiny-структура {method, base_url, version} (#1) ──────────────
  # ★ #1 (2026-06-26): собирается из install_method (enum, дефолт package) + essence.
  # binary_base_url/binary_version (URL/версия бинаря переехали в essence). method всегда
  # присутствует; base_url/version материализуются ТОЛЬКО при method=binary (default()
  # ловит отсутствие листа на essence-map; дефолт ''). Та же структура уходит в destiny
  # `redis` (apply.input.install) и в state_changes.install — read-model и destiny-ввод
  # из одного значения.
  install: >-
    ${ (input.install_method == 'binary')
         ? {
             'method':   'binary',
             'base_url': default(essence.binary_base_url, ''),
             'version':  default(essence.binary_version, '')
           }
         : { 'method': 'package' } }
  # ── Эффективный host-layout: conf_dir/data_dir из essence (#2) ───────────────
  # ★ #2 (2026-06-26): conf_dir/data_dir больше НЕ операторский input — дефолты
  # переехали в essence (conf_dir/data_dir; оператор переопределяет в spec.essence).
  # Объявлены ОТДЕЛЬНЫМИ compute-vars, чтобы redis_config (TLS-пути ниже), ветки
  # (apply.input.conf_dir/data_dir) и state_changes читали ОДНО разрешённое значение.
  # default(essence.<x>, …) — author-context-дефолт = текущий путь (back-compat). host-
  # инвариант (один layout на кластер) — soulprint в compute недоступен. ★ TLS-директивы
  # redis.conf (tls-cert-file/...) следуют conf_dir: destiny кладёт PEM в ${conf_dir}/tls/
  # (server.yml) — redis.conf обязан смотреть туда же (иначе redis не находит cert).
  conf_dir: "${ default(essence.conf_dir, '/etc/redis') }"
  data_dir: "${ default(essence.data_dir, '/var/lib/redis') }"
  # ── TLS-флаги: 2 галочки + essence (#5) ──────────────────────────────────────
  # ★ #5 (2026-06-26): TLS-намерение — 2 операторские галочки (tls_enabled/tls_keep_plain,
  # оба с default → ВСЕГДА присутствуют), технические параметры — из essence. tls_on =
  # tls_enabled (главный гейт). tls_only_on = tls_enabled && !tls_keep_plain (закрыть
  # plain-порт). Порт/refs — из essence (default() ловит отсутствие листа; L0-кейсы без
  # TLS их не задают). Объявлены ОТДЕЛЬНЫМИ compute-vars, чтобы redis_config/ветки/
  # health-gate читали ОДНО значение.
  tls_on:      "${ input.tls_enabled }"
  tls_only_on: "${ input.tls_enabled && !input.tls_keep_plain }"
  tls_port:    "${ int(default(essence.tls_port, 7379)) }"
  # Vault-ПУТИ PEM — из essence (author-context). has()-цепочка (default() ловит no-such-
  # key только в ПЕРВОМ аргументе): L0-кейсы без TLS essence.tls_*_ref не задают → ''.
  tls_cert_ref: "${ has(essence.tls_cert_ref) ? essence.tls_cert_ref : '' }"
  tls_key_ref:  "${ has(essence.tls_key_ref)  ? essence.tls_key_ref  : '' }"
  tls_ca_ref:   "${ has(essence.tls_ca_ref)   ? essence.tls_ca_ref   : '' }"
  redis_config: >-
    ${ (input.redis_type == 'cluster')
         ? merge(
             essence.redis_config,
             essence.persistence_presets[input.persistence],
             merge(
               has(input.memory_mb)
                 ? { 'maxmemory': string(int(input.memory_mb) * int(essence.memory_reserve_percent) / 100) + 'mb' }
                 : {},
               has(input.maxmemory_policy) ? { 'maxmemory-policy': input.maxmemory_policy } : {}
             ),
             default(input.redis_settings, {}),
             {
               'cluster-enabled':      'yes',
               'cluster-config-file':  'nodes.conf',
               'cluster-node-timeout': string(int(input.cluster_node_timeout))
             },
             compute.tls_on
               ? merge(
                   {
                     'tls-port':         string(compute.tls_port),
                     'tls-cert-file':    compute.conf_dir + '/tls/redis.crt',
                     'tls-key-file':     compute.conf_dir + '/tls/redis.key',
                     'tls-ca-cert-file': compute.conf_dir + '/tls/ca.crt',
                     'tls-replication':  'yes',
                     'tls-cluster':      'yes'
                   },
                   compute.tls_only_on ? { 'port': '0' } : {}
                 )
               : {}
           )
         : merge(
             essence.redis_config,
             essence.persistence_presets[input.persistence],
             merge(
               has(input.memory_mb)
                 ? { 'maxmemory': string(int(input.memory_mb) * int(essence.memory_reserve_percent) / 100) + 'mb' }
                 : {},
               has(input.maxmemory_policy) ? { 'maxmemory-policy': input.maxmemory_policy } : {}
             ),
             default(input.redis_settings, {}),
             compute.tls_on
               ? merge(
                   {
                     'tls-port':         string(compute.tls_port),
                     'tls-cert-file':    compute.conf_dir + '/tls/redis.crt',
                     'tls-key-file':     compute.conf_dir + '/tls/redis.key',
                     'tls-ca-cert-file': compute.conf_dir + '/tls/ca.crt',
                     'tls-replication':  'yes'
                   },
                   compute.tls_only_on ? { 'port': '0' } : {}
                 )
               : {}
           ) }

# ── Мутация incarnation.state ─────────────────────────────────────────────────
# После успешного apply Keeper фиксирует развёрнутое (ADR-009 §7.1, ADR-057
# list-форма). redis_config — ИТОГ трансляции (тот же compute.redis_config, что ушёл
# в render redis.conf веток cluster/sentinel): повторный apply и day-2-сценарии видят
# один источник истины. Раньше выражение merge() ДУБЛИРОВАЛОСЬ здесь и в
# apply.input.config веток (DRIFT-GUARD руками); теперь оно объявлено ОДИН раз в
# compute: выше — drift снят самим compute.
state_changes:
  - set: redis_type
    value: "${ input.redis_type }"
  - set: redis_version
    value: "${ compute.redis_version }"
  # redis_config ≡ apply.input.config веток: единый compute.redis_config (см. выше).
  - set: redis_config
    value: "${ compute.redis_config }"

  # ── Именованные поля намерения (read-model, v3) ─────────────────────────────
  # ★ КРИТИЧНО (architect a9e1c2c6): значения берутся из ТЕХ ЖЕ compute.*/input, что
  # и redis_config — не из сырого input отдельно. Так namedfields (намерение) и
  # redis_config (вычисленный итог) согласованы по построению (один compute-проход).
  # tls: тот же compute.tls_on/tls_only_on/tls_port/tls_*_ref, что дал TLS-блок
  # redis_config (cert/key/ca — Vault-ПУТИ, не PEM: секрет в state не лежит).
  - set: tls
    value: >-
      ${ {
           'enable':   compute.tls_on,
           'only':     compute.tls_only_on,
           'port':     compute.tls_port,
           'cert_ref': compute.tls_cert_ref,
           'key_ref':  compute.tls_key_ref,
           'ca_ref':   compute.tls_ca_ref
         } }
  # install: нормализованный compute.install (method всегда; base_url/version при
  # binary). Тот же install, что уходит в destiny `redis` (apply.input.install).
  - set: install
    value: "${ compute.install }"
  # persistence: input.persistence (default rdb) — тот же ключ, по которому выбран
  # essence.persistence_presets в redis_config (read-model дублирует выбор оператора).
  - set: persistence
    value: "${ input.persistence }"
  # memory_mb: бюджет памяти оператора (int). Не задан → 0 (плоский set всегда
  # создаёт ключ; 0 = «оператор не зафиксировал бюджет», maxmemory взят из essence).
  - set: memory_mb
    value: "${ int(default(input.memory_mb, 0)) }"
  # maxmemory_policy: явный выбор оператора; не задан → '' (директива из essence-
  # подложки, см. redis_config). namedfield маркирует ОТСУТСТВИЕ явного выбора пустой
  # строкой (не лезем в redis_config за фактическим значением — это write-model).
  - set: maxmemory_policy
    value: "${ default(input.maxmemory_policy, '') }"
  # modules: ФАКТИЧЕСКИ развёрнутые Redis-модули (директива «модули ВСЕГДА ВСЕ»). Redis
  # < 8 → полный набор (destiny грузит все из vars.redis_modules); Redis 8+ → [] (модули
  # встроены). НЕ operator-выбор (input.modules удалён) — compute.redis_modules_deployed.
  - set: modules
    value: "${ compute.redis_modules_deployed }"
  # modules_base_url: источник .so (read-model, из essence). Сохраняем для day-2
  # (add_node читает его из state, чтобы новая нода тянула .so из того же источника).
  # Пусто → не задан в essence (Redis 8+ — модули встроены, источник не нужен).
  - set: modules_base_url
    value: "${ compute.modules_base_url }"
  # conf_dir/data_dir: host-layout (read-model). Сохраняем для day-2 (add_node читает
  # их из state, чтобы новая нода знала тот же layout, что и кластер). ★ #2: источник —
  # essence (тот же compute.conf_dir/data_dir, что ушёл в destiny), не input. В state
  # ОСТАЮТСЯ — форма state не меняется (правка лишь сместила источник input→essence).
  - set: conf_dir
    value: "${ compute.conf_dir }"
  - set: data_dir
    value: "${ compute.data_dir }"
  # sysctl_settings: применённый host-tuning (тот же essence.sysctl_settings, что
  # уходит в destiny apply.input). Из essence (host-инвариант, не операторский ввод).
  - set: sysctl_settings
    value: "${ default(essence.sysctl_settings, {}) }"
  # ── Топология (counts) ──────────────────────────────────────────────────────
  # shards/replicas/sentinel_quorum — из тех же input.*, что size-guard/cluster-build/
  # sentinel-ветки. shards — только cluster (не задан → 0). replicas — UNIFIED
  # int(default(input.replicas_per_master, 0)) в обоих режимах (реплик на каждый master;
  # cluster — на шард, sentinel — master-а). sentinel_quorum — ВСЕГДА 0 (операторского
  # поля больше нет, кворум АВТО size/2+1 вычисляется в apply, в state не материализуется;
  # 0 = «auto»).
  - set: shards
    value: "${ int(default(input.shards, 0)) }"
  - set: replicas
    value: "${ int(default(input.replicas_per_master, 0)) }"
  - set: sentinel_quorum
    value: "${ 0 }"

  # ── cloud-provision read-model (ADR-061, Вариант A) ─────────────────────────
  # ФАКТ «эти VM подняты ЭТИМ create-прогоном». ★ GUARD по input.provision (НЕ
  # has(register.provision)!): на non-provision-прогоне provision.yml group-drop →
  # шага core.cloud.created нет → register.provision не существует → has(register.provision)
  # дал бы no-such-key В САМОМ предикате (CEL вычисляет аргумент has() — он есть в env,
  # но обращение register.provision.vm_ids вне guard рвануло бы). Гейт — input.provision
  # (object-вход, has()-safe): задан И enabled → читаем register.provision (создан шагом
  # (а)); иначе [] / '' (хосты не провиженные сервисом). Тернар короткозамыкает —
  # register.provision.* не трогается на non-provision-пути.
  - set: provisioned_vm_ids
    value: >-
      ${ (has(input.provision) && input.provision.enabled)
           ? register.provision.vm_ids
           : [] }
  # provisioned_sids: SID (FQDN) созданных VM — для cascade-destroy day-2 teardown
  # (souls→destroyed/seeds→orphaned/tokens→burned; Reaper НЕ снимает pending-VM-souls).
  # Тот же GUARD по input.provision, что vm_ids/provider (на non-provision-прогоне
  # register.provision не существует → тернар короткозамыкает, register.* не трогается).
  # sids собираются из register.provision.hosts[].sid (.map — то же выражение, что
  # params.sid шага (в) core.soul.registered в provision.yml); отдельного register
  # .provision.sids нет. Иначе [] (хосты не провиженные сервисом).
  - set: provisioned_sids
    value: >-
      ${ (has(input.provision) && input.provision.enabled)
           ? register.provision.hosts.map(h, h.sid)
           : [] }
  - set: provisioned_provider
    value: >-
      ${ (has(input.provision) && input.provision.enabled)
           ? input.provision.provider
           : '' }

  # redis_users — ТИПИЗИРОВАННЫЙ массив AclUser (wave 1b, map→array). state хранит
  # input.users как есть (массив [{name,perms,state}]); пароли НЕ в state (Vault).
  - set: redis_users
    value: "${ default(input.users, []) }"
  # redis_hosts пустой во ВСЕХ режимах: state_changes рендерятся per-host с
  # soulprint.SELF (AllowHosts=false, orchestration.md §7.1) — roster soulprint.hosts
  # тут НЕДОСТУПЕН (граница: state — per-run, роли раскладывает apply-сторона).
  # Точные declared-роли sentinel (master-election) живут в apply.input.sentinel,
  # не в state (симметрично cluster, где роли раскладывает плагин).
  - set: redis_hosts
    value: "${ [] }"
  # redis_sentinel: факты monitored master (режим sentinel). master_name — из essence
  # (essence.sentinel_master_name, дефолт 'master'; операторского поля больше нет).
  # quorum в state НЕ материализуется (auto-quorum size/2+1 вычисляется в apply,
  # size(soulprint.hosts) в state_changes недоступен) → 0. master_ip больше не пишется
  # (режим sentinel_only убран: master выбирается из roster-а, host-вариативен).
  # ★ #7 (2026-06-26): тайминги failover down_after_ms/failover_timeout_ms (read-model)
  # — из input (оба с default → присутствуют). day-2 читает их именованно (как install/tls).
  # Вне режима sentinel — пустой объект (только cluster остаётся).
  - set: redis_sentinel
    value: >-
      ${ (input.redis_type == 'sentinel')
           ? {
               'master_name':       default(essence.sentinel_master_name, 'master'),
               'quorum':            0,
               'down_after_ms':     int(input.sentinel_down_after_ms),
               'failover_timeout_ms': int(input.sentinel_failover_timeout_ms)
             }
           : {} }

# Тело прогона — ветки диспетчера, по одной на режим. CONDITIONAL-INCLUDE
# (orchestration.md §6, Вариант B): `when:` стоит НА include — статический
# input-предикат по redis_type РЕАЛЬНО исключает неактивную ветку из плана
# (render-phase group-drop), её задачи физически не рендерятся. Прежний per-task when
# внутри cluster.yml/sentinel.yml убран (гейт переехал сюда). Порядок include —
# cluster, sentinel; индексы не важны (ветки взаимоисключающие по enum).
#
# Mode-guard (прежняя core.cmd.shell-задача «режим реализован») УБРАН: неизвестный
# redis_type отвергает input-валидация Keeper-а по enum redis_type ([sentinel,
# cluster]) ДО рендера — раньше и понятнее, чем shell-test на Soul. enum гарантирует
# попадание ровно в одну ветку (тихого зелёного no-op быть не может).
tasks:
  # ── Version-aware валидатор имён директив redis_settings (assert, #6) ─────────────
  # ★ #6 (2026-06-26): redis_settings — passthrough KEY→VALUE: input-схема пропускает
  # ЛЮБОЙ ключ (additional_properties: {type: string}). Без проверки оператор молча
  # протащит опечатку (`maxmemoyr 512mb`) или директиву чужой версии → redis-server не
  # стартует на хосте (поздний, непонятный отказ). Этот assert сверяет КАЖДОЕ ИМЯ
  # директивы redis_settings против каталога валидных имён ДЛЯ ВЫБРАННОЙ версии
  # (essence.redis_directives[<серия>], сгенерирован из src/config.c апстрима) — первый
  # неизвестный ключ рвёт render (422 assert-failed) ДО applying, понятным сообщением.
  #
  # ПОЧЕМУ assert, а не validate: каталог живёт в essence, а validate-контекст INPUT-ONLY
  # (essence недоступен, структурный CEL-барьер). assert видит essence+input+compute
  # (полный scenario-контекст) — единственный механизм, дотягивающийся до каталога.
  # Run-level (один раз на прогон), soulprint.hosts не нужен (проверка host-инвариантна),
  # но доступен.
  #
  # ВЕРСИЯ — compute.redis_version (package: input.version distro-пин; binary:
  # essence.binary_version semver). Оба несут серию major.minor, поэтому assert
  # валидирует ОБА способа установки (если каталог покрывает их серию).
  #
  # МЕХАНИКА version→серия БЕЗ split (StdLib CEL не даёт .split/.substring): итерируем
  # ключи каталога (.all(s, …)) и матчим версию против серии регуляркой
  # `^([0-9]+:)?<s>[.]` (epoch-префикс distro-пина `5:` опционален; трейлинг `[.]` —
  # граница серии, чтобы 7.0 не цеплял 7.04). Для серий, которым версия НЕ принадлежит,
  # предикат вакуумно true (короткое замыкание тернаром) — проверка идёт только против
  # «своей» серии. Версия, не попавшая НИ в одну серию каталога (compute.redis_version
  # == '' — ни package-version, ни binary_version не заданы; либо серия отсутствует в
  # каталоге) → assert skip: валидируем ТОЛЬКО известные версии, не-каталожную не
  # блокируем. default(input.redis_settings, {}) — поле опционально; .all над {} = true.
  - name: Validate redis_settings directive names against the catalog for the chosen Redis version
    assert:
      # that[] и message обязаны быть СКАЛЯРНЫМИ строками (не folded `>-`/`|`):
      # soul-lint требует *ast.StringNode (quoted/plain), block-scalar = type_mismatch.
      # Предикат — одна строка (CEL-normalize схлопывает пробелы): для каждого ключа
      # redis_settings k — для каждой серии каталога s, которой принадлежит версия
      # (regex `^([0-9]+:)?<s>[.]`), k обязан быть в essence.redis_directives[s]; серии
      # не той версии вакуумно-true (тернар), версия вне каталога → ни одна серия не
      # матчится → skip.
      #
      # `!has(essence.redis_directives) || …` — EMPTY-CATALOG-SKIP: каталог опционален.
      # Если essence его не несёт (минимальные fixtures L0-кейсов, либо essence оператора
      # без каталога) — assert skip (нечем валидировать). С каталогом — полная проверка.
      that:
        - "!has(essence.redis_directives) || default(input.redis_settings, {}).all(k, essence.redis_directives.all(s, compute.redis_version.matches('^([0-9]+:)?' + s + '[.]') ? (k in essence.redis_directives[s]) : true))"
      message: "redis_settings содержит неизвестную директиву redis.conf для выбранной версии Redis (input.version): сверь имя с каталогом валидных директив этой версии (essence.redis_directives[<major.minor>]) — опечатка или директива из другой версии Redis. Каталог генерируется scripts/gen-redis-catalog.sh из src/config.c."

  # ── provision (ADR-061, Вариант A): cloud-create + онбординг ПЕРЕД роль-веткой ──────
  # CONDITIONAL-INCLUDE provision.yml СТРОГО ПЕРЕД cluster/sentinel: при enabled=true
  # его шаги (а) создают VM, (в) регистрируют+ждут онбординга с refresh_soulprint → roster
  # пере-резолвится, и ТОЛЬКО потом cluster/sentinel-ветка видит созданные хосты в
  # soulprint.hosts. when по input.provision — НЕ статический (object-input, не enum) →
  # placeholder-skip-форма include-when (не group-drop): на enabled=false/опущенной секции
  # шаги provision.yml не таргетят никого. has()-guard — секция опциональна (no-such-key
  # без неё). ★ teardown НЕ здесь.
  - include: provision.yml
    when: "has(input.provision) && input.provision.enabled"

  - include: cluster.yml
    when: "input.redis_type == 'cluster'"
  - include: sentinel.yml
    when: "input.redis_type == 'sentinel'"
