# Ветка диспетчера create — режим sentinel (master-replica + sentinel-демон;
# перенос redis-cluster (master-replica) + redis-sentinel прежних сервисов).
# Подключается из main.yml через CONDITIONAL-INCLUDE: `when: input.redis_type ==
# 'sentinel'` стоит НА include — на cluster-прогоне весь файл group-drop (задачи
# физически не рендерятся), на sentinel-прогоне раскрывается в плоский список ДО
# render. Per-task when по redis_type не нужен (гейт на include).
#
# ★ sentinel — БАЗОВАЯ ветка деплоя (после удаления standalone-ветки 2026-06-25):
# replicas_per_master=0 даёт standalone-эквивалент (один master + sentinel-демон).
#
# ★ ДЕПЛОЙ-ТЕЛО ВЫНЕСЕНО на service-level (S1, 2026-06-27): install + render конфигов +
# внутрикластерный REPLICAOF + SENTINEL MONITOR + health-gates живут в общем
# scenario/redis-deploy-sentinel.yml и инклудятся ОТСЮДА по имени файла (scenario-include
# фоллбэкает scenario/<name>/<file> → scenario/<file>, orchestration.md §6). То же тело
# делит migrate_cluster/sentinel.yml — дубликата нет.
#
# ★ ИНВАРИАНТ (см. шапку redis-deploy-sentinel.yml): инклудящий ОБЯЗАН объявить в своём
# compute: набор, который тело читает (redis_config/conf_dir/data_dir/install/
# modules_base_url/sentinel_directives/redis_version/tls_*). Все они объявлены в
# create/main.yml::compute (этот сценарий). cross-file дрейф soul-lint НЕ ловит.
- include: redis-deploy-sentinel.yml
