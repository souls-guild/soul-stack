# Ветка диспетчера create — режим sentinel (master-replica + sentinel-демон;
# перенос redis-cluster (master-replica) + redis-sentinel прежних сервисов).
# Подключается из main.yml через CONDITIONAL-INCLUDE: `when: input.redis_type ==
# 'sentinel'` стоит НА include — на cluster-прогоне весь файл group-drop (задачи
# физически не рендерятся), на sentinel-прогоне раскрывается в плоский список ДО
# render. Per-task when по redis_type не нужен (гейт на include).
#
# ★ sentinel — БАЗОВАЯ ветка деплоя (после удаления standalone-ветки 2026-06-25):
# replicas_per_master=0 даёт standalone-эквивалент (один master + sentinel-демон).
#
# ★ ДЕПЛОЙ-ТЕЛО ВЫНЕСЕНО на service-level (S1, 2026-06-27): install + render конфигов +
# внутрикластерный REPLICAOF + SENTINEL MONITOR + health-gates живут в общем
# scenario/redis-deploy-sentinel.yml и инклудятся ОТСЮДА по имени файла (scenario-include
# фоллбэкает scenario/<name>/<file> → scenario/<file>, orchestration.md §6). То же тело
# делит migrate_cluster/sentinel.yml — дубликата нет.
#
# ★ ИНВАРИАНТ (см. шапку redis-deploy-sentinel.yml): инклудящий ОБЯЗАН объявить в своём
# compute: набор, который тело читает (redis_config/conf_dir/data_dir/install/
# modules_base_url/sentinel_directives/redis_version/tls_*). Все они объявлены в
# create/main.yml::compute (этот сценарий). cross-file дрейф soul-lint НЕ ловит.

# ── 0. SIZE-GUARD (топология) — keeper-side render-time assert ─────────────────────
# Размер roster-а ОБЯЗАН быть ровно 1+replicas_per_master (один master + реплики master-а;
# sentinel-демон поднимается на КАЖДОМ хосте, отдельных sentinel-нод нет) — иначе master-
# election (run_once по sort soulprint.hosts) и SENTINEL MONITOR/REPLICAOF разъедутся с
# declared-топологией: лишние хосты молча стали бы незаявленными репликами, нехватка —
# недобором реплик (silent рассинхрон declared↔actual). Симметрично size-guard create/
# cluster.yml (формула там shards*(1+replicas_per_master)) и migrate_cluster/sentinel.yml.
# Предикат вычисляется KEEPER-SIDE на РЕНДЕРЕ — там доступен soulprint.hosts (на Soul-е его
# НЕТ). false ОБРЫВАЕТ render с message ДО любого dispatch (раньше и понятнее runtime-
# отказа). assert НЕ emit RenderedTask. Стоит ПЕРЕД include деплой-тела — mismatch рвёт
# прогон fail-fast, до установки пакетов.
# ★ ПОЧЕМУ assert, а не validate: size-guard нужен soulprint.hosts (roster), а validate-
# контекст INPUT-ONLY (структурный CEL-барьер). replicas_per_master имеет default:0 →
# int(input.replicas_per_master) без has()-обвязки (см. main.yml).
- name: Guard sentinel roster size matches replicas
  assert:
    that:
      - "size(soulprint.hosts) == 1 + int(input.replicas_per_master)"
    message: "число хостов roster-а прогона должно быть ровно 1+replicas_per_master (один master + реплики master-а; sentinel-демон на каждом хосте) — задай столько же таргетированных souls, сколько узлов в объявленной топологии, иначе лишние хосты стали бы незаявленными репликами, а нехватка — недобором реплик"

- include: redis-deploy-sentinel.yml
