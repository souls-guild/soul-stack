# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║ SHARED sentinel-cluster DEPLOY BODY (service-level include, reusable)          ║
# ╚══════════════════════════════════════════════════════════════════════════════╝
# One deploy of a new Redis cluster in sentinel mode (master-replica + sentinel daemon):
# install + render redis.conf/users.acl/sentinel.conf + systemd + intra-cluster
# REPLICAOF + SENTINEL MONITOR + health-gates. Lives at service-level
# (scenario/<file>), not inside any single scenario, and is included by BOTH
# consumers by file name: scenario-include resolves `scenario/<name>/<file>`,
# then falls back to `scenario/<file>` (orchestration.md §6, include.go). This way create and
# migrate_cluster share ONE body without duplication.
#
#   Consumers (as of 2026-06-27):
#     - scenario/create/sentinel.yml        — clean deploy of a new cluster;
#     - scenario/migrate_cluster/sentinel.yml — deploy + load from an external source.
#
# ★★ INCLUDING-FILE INVARIANT (manual drift guard — soul-lint does NOT catch cross-file) ★★
#   This file REFERENCES compute.<name> but does NOT declare them (compute: is a top-level
#   scenario block, one per scenario, orchestration.md §2.4; declared in the main.yml
#   of the INCLUDING file). Any scenario that includes this file MUST declare in its own
#   compute: the ENTIRE set that the body reads, WITH THE SAME SEMANTICS:
#       redis_config  conf_dir  data_dir  install  modules_base_url
#       sentinel_directives  redis_version  sentinel_monitor_now
#       tls_on  tls_only_on  tls_port  tls_cert_ref  tls_key_ref  tls_ca_ref
#   Also read from the including context: input.version/input.users (opt.),
#   essence.system_acl_users[_sentinel]/sentinel_master_name/sysctl_settings,
#   incarnation.name (Vault paths), soulprint.self/soulprint.hosts (master-election).
#   Skipping/renaming any compute.<name> in the includer is NOT caught statically
#   (cross-file drift is invisible to soul-lint) — it will show up as a render failure. Source of truth
#   for the set and semantics — create/main.yml::compute.
#
#   ★ sentinel_monitor_now (bool) — CONTRACT FLAG of step 4 (SENTINEL MONITOR), introduced
#     by the prod fix for sentinel-migrate split-brain. Controls whether to run MONITOR in THIS
#     deploy. Step 4 proxies it into a task-var (vars.sentinel_monitor_now = "${ compute.
#     sentinel_monitor_now }") and gates on `when: vars.sentinel_monitor_now` — flow-control
#     when doesn't see compute.* directly, so it goes through a task-var (its CEL sees compute):
#       - create/sentinel.yml         → true  (node-1 is the real master, monitor immediately);
#       - migrate_cluster/sentinel.yml → false (the new master isn't yet attached to the external
#                                              source; MONITOR during the load would see
#                                              role:slave and trigger a failover → split-
#                                              brain. MONITOR is moved into detach_source,
#                                              AFTER REPLICAOF NO ONE — the cluster is autonomous).
#     With false, static-when produces a placeholder-skip of step 4 (Params=nil, the presence task_absent
#     matcher passes). The sentinel daemons still come up (step 1) and pass the PONG-gate (step 5) —
#     only the MONITOR command is missing. The including file MUST declare this compute-var.
#
# master-election: a probe is IMPOSSIBLE at create-phase (redis not up yet) → role is DECLARED:
# the host first by SID (soulprint.hosts[0]) = master. soulprint.hosts is already sorted by
# SID (cel_render.go), the order is deterministic.
#
# ★ ANTI-TILING (boundary of apply.input vs .self template): host-invariant values (a SINGLE
#   master per cluster: master_addr/monitor.ip) are resolved run_once (master-election
#   soulprint.hosts[0]) and pushed via apply.input (resolveApplyInput takes the first by
#   SID targeted[0] — correct for a host-invariant value). Per-host
#   announce-ip is NOT handled here, it's rendered in sentinel.conf.tmpl from .self.network.primary_ip
#   of EACH host (via apply.input the IP of the first node would get baked in → gossip across NAT/in
#   the cloud would break).

# 1. Per-host install + render redis.conf + users.acl + sentinel.conf + units.
#    The same destiny `redis` (mode-agnostic) as cluster, but with sentinel_enabled=true
#    → additionally renders sentinel.conf + the redis-sentinel unit and brings up the daemon.
#    config — base merge (WITHOUT cluster directives: sentinel mode is a regular redis master
#    + a separate sentinel daemon). compute.redis_config is host-invariant → apply.input.
- name: Apply redis destiny (install + render redis.conf/users.acl/sentinel.conf + systemd)
  apply:
    destiny: redis
    input:
      # version: distro pin (package). For binary version — in state from essence.binary_version
      # (compute.redis_version); destiny doesn't install a distro package → has()-guard ''.
      version:  "${ has(input.version) ? input.version : '' }"
      # install: installation method {method, base_url, version} — compute.install from
      # install_method + essence.binary_* (#1). as-is into the destiny dispatcher install.yml.
      install:  "${ compute.install }"
      # conf_dir/data_dir: host layout from essence (#2). compute.conf_dir/data_dir
      # (default = current path, back-compat). HOST-INVARIANT → apply.input.
      conf_dir: "${ compute.conf_dir }"
      data_dir: "${ compute.data_dir }"
      # ★ REDESIGN default_admin (2026-06-30): input.password REMOVED (requirepass dropped).
      # Authentication is via the system default_admin, its password comes in via users below.
      # Unified compute.redis_config (declared ONCE in the includer's main.yml, ADR-009):
      # the same map that ends up in state_changes.redis_config — the "state ≡ live config"
      # drift is removed by compute itself. For sentinel = base merge (WITHOUT cluster directives;
      # tls-replication yes when TLS, port 0 when tls_only). HOST-INVARIANT → apply.input.
      #
      # ★ REDESIGN default_admin: STATIC replica→master AUTH in redis.conf — masteruser/
      # masterauth are ADDED to config as REGULAR directives (on top of compute.redis_config).
      # CRITICAL for PERSISTENCE across restart: the community.redis.replica plugin (step 3)
      # sets them via CONFIG SET at runtime, but CONFIG SET is NOT saved without CONFIG REWRITE →
      # on sentinel restart redis-server would come up without masterauth → replica
      # master_link_status:DOWN → replica-synced timeout (a live defect). A static directive
      # in redis.conf survives a restart. The directives are host-INVARIANT (one default_admin per
      # cluster) → apply.input. Failover-safe: Redis applies masteruser/masterauth only
      # when a node becomes a replica — inert on the current master, the old master after
      # failover already carries the creds. ★ DIFFERS from state_changes.redis_config (covenant.yml):
      # there the PURE compute.redis_config remains WITHOUT masterauth — the password does NOT go into
      # incarnation.state (the secret lives in Vault). masterauth — vault()-IN-A-CELL (seal masking,
      # ADR-010 §7.4): the password is masked in logs/OTel/state. admin_user = default_admin
      # (compute.admin_user); path — secret/redis/<inc>/users/default_admin#password.
      config: >-
        ${ merge(compute.redis_config, {
             'masteruser': compute.admin_user,
             'masterauth': vault('secret/redis/' + incarnation.name + '/users/' + compute.admin_user + '#password')
           }) }
      # ★ SYSTEM + operator-extra (system-ACL-users, design d2 Variant A): the service
      # default_admin/replica/monitoring/sentinel/haproxy from essence.system_acl_users
      # come FIRST, operator-extra (input.users — an ARRAY of AclUser, wave 1b) ON TOP (last-wins).
      # ★ default_admin (redesign) — the SYSTEM user with full access (~* &* +@all), comes
      # from essence.system_acl_users like all others: under it runs the intra-cluster AUTH (replaced
      # requirepass-default). Without the system users, replication (replica), sentinel↔redis AUTH
      # (sentinel) and the admin connection (default_admin) would break. Vault password — a NEW path
      # secret/redis/<inc>/users/<name>#password. operator-extra: .map(u, {u.name: …}).
      users: >-
        ${ merge(
             merge(default(essence.system_acl_users, {}).map(name, {
               name: {
                 'perms':    essence.system_acl_users[name],
                 'state':    'on',
                 'password': vault('secret/redis/' + incarnation.name + '/users/' + name + '#password')
               }
             })),
             has(input.users)
               ? merge(input.users.map(u, {
                   u.name: {
                     'perms':    u.perms,
                     'state':    u.state,
                     'password': vault('secret/redis/' + incarnation.name + '/users/' + u.name + '#password')
                   }
                 }))
               : {}
           ) }
      # ★ The sentinel daemon's 2nd aclfile (system-ACL-users, design d2): sentinel uses
      # a SEPARATE perms set essence.system_acl_users_sentinel (default_admin/monitoring/
      # sentinel/haproxy — sentinel commands, not redis commands). Optional field of destiny
      # `redis` input.sentinel_users → task renders sentinel-users.acl + sentinel.conf.tmpl
      # aclfile. System users only (operator-extra is not added into the sentinel-aclfile).
      # ★ REDESIGN default_admin: the former ternary "default → MAIN secret, others →
      # users/<name>" is REMOVED — all system users (incl. default_admin) use the SINGLE branch
      # secret/redis/<inc>/users/<name>#password. The sentinel daemon connects to
      # :26379 as default_admin (its password from this branch), to master — auth_user default_admin.
      sentinel_users: >-
        ${ merge(default(essence.system_acl_users_sentinel, {}).map(name, {
             name: {
               'perms':    essence.system_acl_users_sentinel[name],
               'state':    'on',
               'password': vault('secret/redis/' + incarnation.name + '/users/' + name + '#password')
             }
           })) }
      # Redis modules — the SET is no longer passed (directive "modules ALWAYS ALL"): destiny
      # deploys the full set from vars.redis_modules itself, the Redis 8+ version-guard is also
      # in destiny. scenario only provides the .so source (compute.modules_base_url from essence),
      # host-invariant → apply.input; destiny builds the archive URL per-host, .so files are downloaded via
      # content-based idempotency (no verify).
      modules_base_url: "${ compute.modules_base_url }"
      # ★ SSRF guard for fetching .so modules: modules_base_url may be an internal Nexus
      # (resolving to RFC1918) → core.url.fetched blocks private IPs. compute.modules_allow_private
      # (from essence.modules_allow_private, default true). as-is into destiny modules.yml.
      modules_allow_private: "${ compute.modules_allow_private }"
      # Host-tuning extras (role concept), mode-agnostic. THP/logrotate/sysctl
      # are UNCONDITIONAL (Redis recommendation / hardening) — no operator flags, the destiny
      # `redis` tasks are always active. sysctl_settings — essence, host-invariant → apply.input.
      sysctl_settings:  "${ default(essence.sysctl_settings, {}) }"
      # TLS — a single dict (enable/only/port + cert_ref/key_ref/ca_ref). HOST-INVARIANT →
      # apply.input. enable/only/port — compute-vars (2 toggles tls_enabled/tls_keep_plain
      # + port from essence, #5). cert_ref/key_ref/ca_ref — Vault PATHS (destiny reads the PEM
      # via vault() in the content cell, seal masking); refs — only from essence.tls_*_ref.
      tls:
        enable:   "${ compute.tls_on }"
        only:     "${ compute.tls_only_on }"
        port:     "${ compute.tls_port }"
        cert_ref: "${ compute.tls_cert_ref }"
        key_ref:  "${ compute.tls_key_ref }"
        ca_ref:   "${ compute.tls_ca_ref }"
      sentinel_enabled: true
      sentinel:
        # master_name — from essence (essence.sentinel_master_name, default 'master';
        # there's no longer an operator field for this, 2026-06-25).
        master_name: "${ default(essence.sentinel_master_name, 'master') }"
        # master-election: the host first by SID = master. HOST-INVARIANT → apply.input.
        master_ip:   "${ soulprint.hosts[0].network.primary_ip }"
        master_port: 6379
        # quorum — AUTO (majority): size(soulprint.hosts)/2+1. There's no longer an
        # operator field sentinel_quorum (removed 2026-06-25).
        quorum:      "${ int(size(soulprint.hosts)) / 2 + 1 }"
        # ★ REDESIGN default_admin: sentinel AUTH against master — via the ACL user default_admin
        # (requirepass removed). auth_user + auth_pass are rendered into sentinel.conf
        # (sentinel auth-user/auth-pass <master>). Without auth_user sentinel would go with the
        # built-in default (now off) → NOAUTH while monitoring the master.
        auth_user:   "${ compute.admin_user }"
        auth_pass:   "${ vault('secret/redis/' + incarnation.name + '/users/' + compute.admin_user + '#password') }"
        # ★ #7: starting per-master failover timings in sentinel.conf (down-after/
        # failover-timeout). compute.sentinel_directives — a map `sentinel <opt> <master>`
        # → value; the sentinel.conf.tmpl template ranges over .vars.sentinel_config.
        config:      "${ compute.sentinel_directives }"

# 2. Health-gate per-host: PING a live Redis after start (every node must respond
#    BEFORE binding replicas/configuring sentinel). community.redis.command, retry/until via
#    retry. addr — localhost (plugin runs on the redis host).
#    ★ Security (anti-downgrade): tls/tls_ca/port are gated on compute.tls_on (TLS ENABLED), NOT
#    tls_only — TLS enabled → the plugin MUST use TLS (otherwise the AUTH password would go plaintext). PING
#    via compute.tls_port + tls=true + tls_ca (vault(ref) in the scenario pass).
- name: Wait for each redis node to answer PING
  module: community.redis.command
  retry: { count: 10, delay: 3s }
  params:
    addr:     "${ compute.tls_on ? '127.0.0.1:' + string(compute.tls_port) : '127.0.0.1:6379' }"
    # ★ REDESIGN default_admin: AUTH as default_admin (requirepass removed). username +
    # its password from the new Vault branch. The community.redis plugin passes username into AUTH.
    username: "${ compute.admin_user }"
    password: "${ vault('secret/redis/' + incarnation.name + '/users/' + compute.admin_user + '#password') }"
    tls:      "${ compute.tls_on }"
    tls_ca:   "${ compute.tls_on ? vault(compute.tls_ca_ref) : '' }"
    args:     ["PING"]

# 3. REPLICAOF for replicas: plugin community.redis.replica ONLY on replicas. addr —
#    the local instance (127.0.0.1:6379, per-host invariant); master_addr —
#    the HOST-INVARIANT address of the master (master-election soulprint.hosts[0]).
#
#    ★ P0 INVARIANT (master does NOT replicate itself): `where:` excludes the chosen
#    master by SID — the task is rendered ONLY on replicas (placeholder-skip on the
#    master host). master_addr=primary_ip (e.g. 10.0.0.1), and addr=127.0.0.1:6379 → on
#    the master node addr != master_addr, so the plugin guard (replica.go: addr==master_addr
#    → no-op) would NOT trigger and would run REPLICAOF on the master itself (making it a replica of itself).
#    The real protection is this `where:`, the plugin guard remains defense-in-depth. master SID —
#    the same master-election expression (soulprint.hosts[0]), but `.sid` instead of primary_ip.
#    The predicate is a top-level where key (a string), NOT a CEL map literal (rewriteHostsWhere doesn't
#    rewrite .where inside a map literal).
#    ★ Security (anti-downgrade): tls/tls_ca/port are gated on compute.tls_on (TLS ENABLED), NOT
#    tls_only — TLS enabled → the plugin connects to the local redis AND to the master over TLS
#    (otherwise masterauth/REPLICAOF and replication would go plaintext). addr/master_addr on
#    compute.tls_port; tls_ca — CA PEM (vault(ref), verify master).
#
#    ★ REDESIGN default_admin (2026-06-30): replica→master AUTH via the ACL user default_admin
#    (requirepass removed). username (→ CONFIG SET masteruser) + password (→ CONFIG SET
#    masterauth) — the plugin sets them AT RUNTIME for the initial REPLICAOF. PERSISTENCE across
#    restart is provided by the static masteruser/masterauth in redis.conf (apply redis step 1,
#    master_user/master_auth) — the plugin's CONFIG SET is not saved without CONFIG REWRITE. Password —
#    secret/redis/<inc>/users/default_admin#password (the same branch as auth_pass/health-PING).
- name: Make replicas follow the elected master (REPLICAOF)
  where: "soulprint.self.sid != soulprint.hosts[0].sid"
  module: community.redis.replica
  params:
    addr:        "${ compute.tls_on ? '127.0.0.1:' + string(compute.tls_port) : '127.0.0.1:6379' }"
    master_addr: "${ soulprint.hosts[0].network.primary_ip + ':' + (compute.tls_on ? string(compute.tls_port) : '6379') }"
    username:    "${ compute.admin_user }"
    password:    "${ vault('secret/redis/' + incarnation.name + '/users/' + compute.admin_user + '#password') }"
    tls:         "${ compute.tls_on }"
    tls_ca:      "${ compute.tls_on ? vault(compute.tls_ca_ref) : '' }"

# 4. SENTINEL MONITOR reconcile: plugin community.redis.sentinel on EVERY host (each
#    sentinel daemon monitors the master). addr — local sentinel (127.0.0.1:26379,
#    per-host invariant); monitor.ip — the HOST-INVARIANT address of the master (master-election).
#    quorum — majority size/2+1. auth_pass — keeper-side vault() resolve (masked,
#    doesn't leak into logs). The reconcile algorithm (MONITOR/REMOVE+MONITOR/SET/CONFIG SET) was ported
#    1:1 from Ansible redis_sentinel_update.py (see the sentinel.go plugin).
#    ★ #7: config — the same per-master timings (compute.sentinel_directives) as in the starting
#    sentinel.conf. The classifyConfig plugin sorts the keys `sentinel <opt> <master>` into
#    per-master and applies SENTINEL SET (reconcileMasterParams) — on create it will idempotently
#    match the starting config, on a repeat run it will give a live update of the timings.
#
#    ★★ CONTRACT FLAG sentinel_monitor_now (prod fix for sentinel-migrate split-brain) ★★
#    Gate `when: vars.sentinel_monitor_now` — whether to run MONITOR NOW (in this deploy).
#    On create=true: node-1 remains the REAL master, safe to monitor right away.
#    On migrate_cluster=false: at deploy time the new master is NOT YET attached to the external
#    source (REPLICAOF external — a separate step AFTER the deploy-body include); if
#    sentinel had monitored it before the load started, on a real dataset (sync > down-after 5s)
#    sentinel would see its "master" in role:slave and trigger a failover → split-brain/
#    a broken load. So during migration MONITOR is DEFERRED: the sentinel daemons come up in
#    step 1 (sentinel.conf + unit + PONG-gate step 5), but the MONITOR command is NOT issued — it's
#    issued by detach_source/sentinel.yml AFTER REPLICAOF NO ONE (the new master is again
#    autonomous).
#    ★ GATE MECHANICS (compute → task-var → static-when): flow-control `when` does NOT see
#    compute.* directly (its CEL env only declares input/vars/essence/incarnation/self/
#    register), so the contract flag is proxied through a task-level `vars:` —
#    sentinel_monitor_now: "${ compute.sentinel_monitor_now }" (a CEL task-var DOES see compute).
#    Then `when: vars.sentinel_monitor_now` is STATIC (register-/soulprint-independent) →
#    on false, render produces a placeholder-skip (Params=nil): the task appears in the plan as skip, but is NOT
#    executed (for the presence matcher — task_absent passes). The includer MUST declare
#    compute.sentinel_monitor_now (see the header invariant above).
- name: Configure each sentinel to monitor the elected master (SENTINEL MONITOR)
  vars:
    sentinel_monitor_now: "${ compute.sentinel_monitor_now }"
  when: "vars.sentinel_monitor_now"
  module: community.redis.sentinel
  params:
    addr:        "127.0.0.1:26379"
    master_name: "${ default(essence.sentinel_master_name, 'master') }"
    # ★ CONNECTION-AUTH to the sentinel daemon itself :26379 (separate from auth_pass!):
    # sentinel.conf carries the aclfile sentinel-users.acl, where default renders `off`, and
    # the connection goes as the SYSTEM default_admin (sentinel set) → ANY connection to :26379
    # requires AUTH as it. ★ REDESIGN default_admin (2026-06-30): username +
    # secret/redis/<inc>/users/default_admin#password (the former MAIN secret is DROPPED).
    # password+username go into redis.Options (parseConnConfig→defaultConnect) — this is the AUTH
    # of the connection. auth_pass/auth_user BELOW are different: credentials for MONITORING the master (command
    # SENTINEL SET/MONITOR <master> auth-user/auth-pass), unrelated to the daemon's own AUTH.
    # Without password/username → NOAUTH on connecting to :26379.
    username:    "${ compute.admin_user }"
    password:    "${ vault('secret/redis/' + incarnation.name + '/users/' + compute.admin_user + '#password') }"
    auth_user:   "${ compute.admin_user }"
    auth_pass:   "${ vault('secret/redis/' + incarnation.name + '/users/' + compute.admin_user + '#password') }"
    redis_version: "${ compute.redis_version }"
    config:      "${ compute.sentinel_directives }"
    monitor:
      # HOST-INVARIANT address of the master (master-election: soulprint.hosts[0]).
      ip:     "${ soulprint.hosts[0].network.primary_ip }"
      port:   6379
      # quorum — AUTO (majority): size(soulprint.hosts)/2+1.
      quorum: "${ int(size(soulprint.hosts)) / 2 + 1 }"

# 5. Health-gate per-host: SENTINEL answers PONG on :26379 (the daemon is up and
#    configured). ★ STRICTLY same-task register.self (NOT cross-passage flow-control,
#    ADR-056 cross_passage_when_unsupported): "wait for N sentinels" is NOT expressible —
#    we check ONLY our own local sentinel. retry/until + failed_when on
#    register.self.result of this same task.
- name: Wait until each sentinel answers PONG on :26379
  module: community.redis.command
  changed_when: false
  retry:
    count: 12
    delay: 2s
    until: "register.self.result == 'PONG'"
  failed_when: "register.self.result != 'PONG'"
  params:
    addr: "127.0.0.1:26379"
    # ★ CONNECTION-AUTH: the sentinel daemon is protected by an aclfile (built-in default renders `off`,
    # connection goes as the SYSTEM default_admin of the sentinel set). PING without AUTH → NOAUTH.
    # ★ REDESIGN default_admin (2026-06-30): username + secret/redis/<inc>/users/
    # default_admin#password (the former main secret is DROPPED). The same pair as the connection AUTH
    # of step 4 (SENTINEL MONITOR to :26379).
    username: "${ compute.admin_user }"
    password: "${ vault('secret/redis/' + incarnation.name + '/users/' + compute.admin_user + '#password') }"
    args: ["PING"]
