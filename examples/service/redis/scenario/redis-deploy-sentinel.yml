# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║ ОБЩЕЕ ДЕПЛОЙ-ТЕЛО sentinel-кластера (service-level include, переиспользуемое)   ║
# ╚══════════════════════════════════════════════════════════════════════════════╝
# Один деплой нового Redis-кластера в режиме sentinel (master-replica + sentinel-демон):
# install + render redis.conf/users.acl/sentinel.conf + systemd + внутрикластерный
# REPLICAOF + SENTINEL MONITOR + health-gates. Лежит на service-level
# (scenario/<file>), а не внутри какого-то одного сценария, и инклудится ОБОИМИ
# потребителями по имени файла: scenario-include резолвит `scenario/<name>/<file>`,
# затем фоллбэкает на `scenario/<file>` (orchestration.md §6, include.go). Так create и
# migrate_cluster делят ОДНО тело без дубликата.
#
#   Потребители (на 2026-06-27):
#     - scenario/create/sentinel.yml        — чистый деплой нового кластера;
#     - scenario/migrate_cluster/sentinel.yml — деплой + заливка с внешнего источника.
#
# ★★ ИНВАРИАНТ ИНКЛУДЯЩЕГО (drift-guard руками — soul-lint cross-file НЕ ловит) ★★
#   Этот файл ССЫЛАЕТСЯ на compute.<name>, но НЕ объявляет их (compute: — top-level
#   scenario-блок, один на сценарий, orchestration.md §2.4; объявляется в main.yml
#   ИНКЛУДЯЩЕГО). Любой сценарий, инклудящий этот файл, ОБЯЗАН объявить в своём
#   compute: ВЕСЬ набор, который тело читает, С ТОЙ ЖЕ СЕМАНТИКОЙ:
#       redis_config  conf_dir  data_dir  install  modules_base_url
#       sentinel_directives  redis_version  sentinel_monitor_now
#       tls_on  tls_only_on  tls_port  tls_cert_ref  tls_key_ref  tls_ca_ref
#   Также из контекста инклудящего читаются: input.version/input.users (опц.),
#   essence.system_acl_users[_sentinel]/sentinel_master_name/sysctl_settings,
#   incarnation.name (Vault-пути), soulprint.self/soulprint.hosts (master-election).
#   Пропуск/переименование любого compute.<name> в инклудящем НЕ ловится статически
#   (cross-file дрейф невидим soul-lint) — проявится падением render. Источник истины
#   набора и семантики — create/main.yml::compute.
#
#   ★ sentinel_monitor_now (bool) — КОНТРАКТ-ФЛАГ шага 4 (SENTINEL MONITOR), введён
#     prod-фиксом sentinel-migrate split-brain. Управляет, выполнять ли MONITOR в ЭТОМ
#     деплое. Шаг 4 проксирует его в task-var (vars.sentinel_monitor_now = "${ compute.
#     sentinel_monitor_now }") и гейтит `when: vars.sentinel_monitor_now` — флоу-control
#     when не видит compute.* напрямую, поэтому через task-var (он CEL compute видит):
#       - create/sentinel.yml         → true  (node-1 — настоящий master, мониторим сразу);
#       - migrate_cluster/sentinel.yml → false (новый master ещё не привязан к внешнему
#                                              источнику; MONITOR во время заливки увидел бы
#                                              role:slave и инициировал failover → split-
#                                              brain. MONITOR переносится в detach_source,
#                                              ПОСЛЕ REPLICAOF NO ONE — кластер автономен).
#     При false static-when даёт placeholder-skip шага 4 (Params=nil, presence task_absent
#     проходит). sentinel-демоны при этом поднимаются (шаг 1) и проходят PONG-gate (шаг 5) —
#     нет лишь команды MONITOR. Инклудящий ОБЯЗАН объявить этот compute-var.
#
# master-election: probe НЕВОЗМОЖЕН на create-фазе (redis ещё не поднят) → роль DECLARED:
# первый по SID хост (soulprint.hosts[0]) = master. soulprint.hosts уже отсортирован по
# SID (cel_render.go), порядок детерминирован.
#
# ★ АНТИ-TILING (граница apply.input vs шаблон .self): host-инвариантные значения (ОДИН
#   master на кластер: master_addr/monitor.ip) резолвятся run_once (master-election
#   soulprint.hosts[0]) и гонятся через apply.input (resolveApplyInput берёт первый по
#   SID targeted[0] — для host-инвариантного значения это корректно). Пер-хостовый
#   announce-ip — НЕ здесь, он рендерится в sentinel.conf.tmpl из .self.network.primary_ip
#   КАЖДОГО хоста (через apply.input зафиксировался бы IP первой ноды → gossip за NAT/в
#   облаке сломан).

# 1. Per-host install + render redis.conf + users.acl + sentinel.conf + units.
#    Та же destiny `redis` (режим-агностична), что и cluster, но с sentinel_enabled=true
#    → дополнительно рендерится sentinel.conf + redis-sentinel unit и поднимается демон.
#    config — базовый merge (БЕЗ cluster-директив: sentinel-режим — обычный redis-master
#    + отдельный sentinel-демон). compute.redis_config host-инвариантен → apply.input.
- name: Apply redis destiny (install + render redis.conf/users.acl/sentinel.conf + systemd)
  apply:
    destiny: redis
    input:
      # version: distro-пин (package). При binary version бинаря — в state из essence.binary_version
      # (compute.redis_version); destiny не ставит distro-пакет → has()-guard ''.
      version:  "${ has(input.version) ? input.version : '' }"
      # install: способ установки {method, base_url, version} — compute.install из
      # install_method + essence.binary_* (#1). as-is в destiny-диспетчер install.yml.
      install:  "${ compute.install }"
      # conf_dir/data_dir: host-layout из essence (#2). compute.conf_dir/data_dir
      # (default = текущий путь, back-compat). HOST-ИНВАРИАНТ → apply.input.
      conf_dir: "${ compute.conf_dir }"
      data_dir: "${ compute.data_dir }"
      password: "${ vault('secret/redis/' + incarnation.name + '#password') }"
      # Единый compute.redis_config (объявлен ОДИН раз в main.yml инклудящего, ADR-009):
      # тот же map, что уйдёт в state_changes.redis_config — drift «state ≡ live config»
      # снят самим compute. Для sentinel = базовый merge (БЕЗ cluster-директив;
      # tls-replication yes при TLS, port 0 при tls_only). HOST-ИНВАРИАНТ → apply.input.
      config: "${ compute.redis_config }"
      # ★ СИСТЕМНЫЕ + operator-extra (system-ACL-users, дизайн d2 Вариант A): служебные
      # replica/monitoring/sentinel/haproxy из essence.system_acl_users ПЕРВЫМИ,
      # operator-extra (input.users — МАССИВ AclUser, wave 1b) ПОВЕРХ (last-wins).
      # default — в requirepass redis.conf, не здесь. Без системных репликация (replica) и
      # sentinel↔redis AUTH (sentinel) сломаются. Vault-пароль — secret/redis/<inc>/users/
      # <name>#password. operator-extra: .map(u, {u.name: …}) (имя из поля u.name).
      users: >-
        ${ merge(
             merge(default(essence.system_acl_users, {}).map(name, {
               name: {
                 'perms':    essence.system_acl_users[name],
                 'state':    'on',
                 'password': vault('secret/redis/' + incarnation.name + '/users/' + name + '#password')
               }
             })),
             has(input.users)
               ? merge(input.users.map(u, {
                   u.name: {
                     'perms':    u.perms,
                     'state':    u.state,
                     'password': vault('secret/redis/' + incarnation.name + '/users/' + u.name + '#password')
                   }
                 }))
               : {}
           ) }
      # ★ 2-й aclfile sentinel-демона (system-ACL-users, дизайн d2): sentinel использует
      # ОТДЕЛЬНЫЙ perms-набор essence.system_acl_users_sentinel (default/monitoring/
      # sentinel/haproxy — sentinel-команды, не redis-команды). Опциональное поле destiny
      # `redis` input.sentinel_users → задача рендера sentinel-users.acl + sentinel.conf.tmpl
      # aclfile. Только системные (operator-extra в sentinel-aclfile не доливается).
      # ★ Vault-пароль: default-юзер → ГЛАВНЫЙ секрет secret/redis/<inc>#password (тот же,
      # что requirepass redis-server — иначе sentinel-демон не пустил бы default-клиента
      # общим паролем). Остальные (monitoring/sentinel/haproxy) → ветка users/<name>#password.
      sentinel_users: >-
        ${ merge(default(essence.system_acl_users_sentinel, {}).map(name, {
             name: {
               'perms':    essence.system_acl_users_sentinel[name],
               'state':    'on',
               'password': (name == 'default')
                 ? vault('secret/redis/' + incarnation.name + '#password')
                 : vault('secret/redis/' + incarnation.name + '/users/' + name + '#password')
             }
           })) }
      # Redis-модули — НАБОР больше НЕ передаётся (директива «модули ВСЕГДА ВСЕ»): destiny
      # разворачивает полный набор из vars.redis_modules сама, version-guard Redis 8+ тоже
      # в destiny. scenario отдаёт только источник .so (compute.modules_base_url из essence),
      # host-инвариант → apply.input; арх-URL строит destiny per-host, .so качаются по
      # content-идемпотентности (без verify).
      modules_base_url: "${ compute.modules_base_url }"
      # Host-tuning extras (концепция роли), режим-агностичны. THP/logrotate/sysctl
      # БЕЗУСЛОВНЫ (рекомендация Redis / hardening) — операторских флагов нет, задачи
      # destiny `redis` всегда активны. sysctl_settings — essence, host-инвариант → apply.input.
      sysctl_settings:  "${ default(essence.sysctl_settings, {}) }"
      # TLS — единый dict (enable/only/port + cert_ref/key_ref/ca_ref). HOST-ИНВАРИАНТ →
      # apply.input. enable/only/port — compute-vars (2 галочки tls_enabled/tls_keep_plain
      # + порт из essence, #5). cert_ref/key_ref/ca_ref — Vault-ПУТИ (destiny читает PEM
      # через vault() в ячейке content, seal-маскинг); refs — только из essence.tls_*_ref.
      tls:
        enable:   "${ compute.tls_on }"
        only:     "${ compute.tls_only_on }"
        port:     "${ compute.tls_port }"
        cert_ref: "${ compute.tls_cert_ref }"
        key_ref:  "${ compute.tls_key_ref }"
        ca_ref:   "${ compute.tls_ca_ref }"
      sentinel_enabled: true
      sentinel:
        # master_name — из essence (essence.sentinel_master_name, дефолт 'master';
        # операторского поля больше нет, 2026-06-25).
        master_name: "${ default(essence.sentinel_master_name, 'master') }"
        # master-election: первый по SID хост = master. HOST-ИНВАРИАНТНО → apply.input.
        master_ip:   "${ soulprint.hosts[0].network.primary_ip }"
        master_port: 6379
        # quorum — АВТО (большинство): size(soulprint.hosts)/2+1. Операторского поля
        # sentinel_quorum больше нет (убрано 2026-06-25).
        quorum:      "${ int(size(soulprint.hosts)) / 2 + 1 }"
        auth_pass:   "${ vault('secret/redis/' + incarnation.name + '#password') }"
        # ★ #7: стартовые per-master тайминги failover в sentinel.conf (down-after/
        # failover-timeout). compute.sentinel_directives — map `sentinel <opt> <master>`
        # → значение; шаблон sentinel.conf.tmpl range-ит .vars.sentinel_config.
        config:      "${ compute.sentinel_directives }"

# 2. Health-gate per-host: PING живого Redis после старта (каждый узел обязан ответить
#    ДО привязки реплик/настройки sentinel). community.redis.command, retry/until через
#    retry. addr — localhost (плагин на redis-хосте).
#    ★ ИБ (anti-downgrade): tls/tls_ca/порт гейтятся на compute.tls_on (TLS ВКЛЮЧЁН), НЕ
#    tls_only — TLS включён → плагин ОБЯЗАН по TLS (иначе AUTH-пароль plaintext-ом). PING
#    по compute.tls_port + tls=true + tls_ca (vault(ref) в scenario-проходе).
- name: Wait for each redis node to answer PING
  module: community.redis.command
  retry: { count: 10, delay: 3s }
  params:
    addr:     "${ compute.tls_on ? '127.0.0.1:' + string(compute.tls_port) : '127.0.0.1:6379' }"
    password: "${ vault('secret/redis/' + incarnation.name + '#password') }"
    tls:      "${ compute.tls_on }"
    tls_ca:   "${ compute.tls_on ? vault(compute.tls_ca_ref) : '' }"
    args:     ["PING"]

# 3. REPLICAOF реплик: plugin community.redis.replica ТОЛЬКО на репликах. addr —
#    локальный инстанс (127.0.0.1:6379, per-host инвариант); master_addr —
#    HOST-ИНВАРИАНТНЫЙ адрес master-а (master-election soulprint.hosts[0]).
#
#    ★ P0-ИНВАРИАНТ (master НЕ реплицирует сам себя): `where:` исключает выбранного
#    master по SID — задача рендерится ТОЛЬКО на репликах (placeholder-skip на
#    master-хосте). master_addr=primary_ip (напр. 10.0.0.1), а addr=127.0.0.1:6379 → на
#    master-узле addr != master_addr, поэтому плагин-guard (replica.go: addr==master_addr
#    → no-op) НЕ сработал бы и сделал бы REPLICAOF на самом master-е (реплика из себя).
#    Реальная защита — этот `where:`, плагин-guard остаётся defense-in-depth. master SID —
#    то же выражение master-election (soulprint.hosts[0]), но `.sid` вместо primary_ip.
#    Предикат — top-level where-ключ (строка), НЕ CEL-map-литерал (rewriteHostsWhere не
#    переписывает .where внутри map-литерала).
#    ★ ИБ (anti-downgrade): tls/tls_ca/порт гейтятся на compute.tls_on (TLS ВКЛЮЧЁН), НЕ
#    tls_only — TLS включён → плагин коннектится к локальному redis И к master-у по TLS
#    (иначе masterauth/REPLICAOF и репликация ушли бы plaintext-ом). addr/master_addr на
#    compute.tls_port; tls_ca — CA-PEM (vault(ref), verify master).
- name: Make replicas follow the elected master (REPLICAOF)
  where: "soulprint.self.sid != soulprint.hosts[0].sid"
  module: community.redis.replica
  params:
    addr:        "${ compute.tls_on ? '127.0.0.1:' + string(compute.tls_port) : '127.0.0.1:6379' }"
    master_addr: "${ soulprint.hosts[0].network.primary_ip + ':' + (compute.tls_on ? string(compute.tls_port) : '6379') }"
    password:    "${ vault('secret/redis/' + incarnation.name + '#password') }"
    tls:         "${ compute.tls_on }"
    tls_ca:      "${ compute.tls_on ? vault(compute.tls_ca_ref) : '' }"

# 4. SENTINEL MONITOR reconcile: plugin community.redis.sentinel на КАЖДОМ хосте (каждый
#    sentinel-демон мониторит master). addr — локальный sentinel (127.0.0.1:26379,
#    per-host инвариант); monitor.ip — HOST-ИНВАРИАНТНЫЙ адрес master-а (master-election).
#    quorum — большинство size/2+1. auth_pass — keeper-side vault()-резолв (маскируется,
#    в логи не течёт). Алгоритм reconcile (MONITOR/REMOVE+MONITOR/SET/CONFIG SET) перенесён
#    1:1 из Ansible redis_sentinel_update.py (см. плагин sentinel.go).
#    ★ #7: config — те же per-master тайминги (compute.sentinel_directives), что в стартовом
#    sentinel.conf. Плагин classifyConfig раскладывает ключи `sentinel <opt> <master>` в
#    per-master и применяет SENTINEL SET (reconcileMasterParams) — на create идемпотентно
#    совпадёт со стартовым конфигом, на day-2 даст live-апдейт таймингов.
#
#    ★★ КОНТРАКТ-ФЛАГ sentinel_monitor_now (prod-фикс sentinel-migrate split-brain) ★★
#    Гейт `when: vars.sentinel_monitor_now` — выполнять ли MONITOR СЕЙЧАС (в этом деплое).
#    НА create=true: node-1 остаётся НАСТОЯЩИМ master, мониторить безопасно сразу.
#    НА migrate_cluster=false: к моменту деплоя новый master ЕЩЁ НЕ привязан к внешнему
#    источнику (REPLICAOF external — отдельный шаг ПОСЛЕ include деплой-тела); если бы
#    sentinel замониторил его до начала заливки, на реальном dataset (синк > down-after 5с)
#    sentinel увидел бы свой «master» в role:slave и инициировал бы failover → split-brain/
#    разрыв заливки. Поэтому при миграции MONITOR ОТКЛАДЫВАЕТСЯ: sentinel-демоны поднимаются
#    шагом 1 (sentinel.conf + unit + PONG-gate шаг 5), но команду MONITOR НЕ дают — её
#    выполняет detach_source/sentinel.yml ПОСЛЕ REPLICAOF NO ONE (новый master снова
#    автономен).
#    ★ МЕХАНИКА ГЕЙТА (compute → task-var → static-when): flow-control `when` НЕ видит
#    compute.* напрямую (его CEL-env объявляет лишь input/vars/essence/incarnation/self/
#    register), поэтому contract-флаг проксируется через task-level `vars:` —
#    sentinel_monitor_now: "${ compute.sentinel_monitor_now }" (CEL task-var ВИДИТ compute).
#    Тогда `when: vars.sentinel_monitor_now` СТАТИЧЕН (register-/soulprint-независим) →
#    при false render даёт placeholder-skip (Params=nil): задача в плане как skip, но НЕ
#    исполняется (для presence-матчера — task_absent проходит). Инклудящий ОБЯЗАН объявить
#    compute.sentinel_monitor_now (см. шапку-инвариант выше).
- name: Configure each sentinel to monitor the elected master (SENTINEL MONITOR)
  vars:
    sentinel_monitor_now: "${ compute.sentinel_monitor_now }"
  when: "vars.sentinel_monitor_now"
  module: community.redis.sentinel
  params:
    addr:        "127.0.0.1:26379"
    master_name: "${ default(essence.sentinel_master_name, 'master') }"
    # ★ CONNECTION-AUTH к самому sentinel-демону :26379 (отдельно от auth_pass!):
    # sentinel.conf несёт aclfile sentinel-users.acl, где default-юзер `on #<hash>` →
    # ЛЮБОЙ коннект к :26379 требует AUTH (sentinel_users.default = ГЛАВНЫЙ секрет
    # secret/redis/<inc>#password, шаг 1). password идёт в redis.Options.Password
    # (parseConnConfig→defaultConnect) — это AUTH соединения. auth_pass НИЖЕ — иное:
    # это пароль МОНИТОРИНГА master-а (команда SENTINEL SET <master> auth-pass), к
    # AUTH самого демона отношения не имеет. Без password → NOAUTH на коннекте.
    password:    "${ vault('secret/redis/' + incarnation.name + '#password') }"
    auth_pass:   "${ vault('secret/redis/' + incarnation.name + '#password') }"
    redis_version: "${ compute.redis_version }"
    config:      "${ compute.sentinel_directives }"
    monitor:
      # HOST-ИНВАРИАНТНЫЙ адрес master-а (master-election: soulprint.hosts[0]).
      ip:     "${ soulprint.hosts[0].network.primary_ip }"
      port:   6379
      # quorum — АВТО (большинство): size(soulprint.hosts)/2+1.
      quorum: "${ int(size(soulprint.hosts)) / 2 + 1 }"

# 5. Health-gate per-host: SENTINEL отвечает PONG на :26379 (демон поднялся и
#    сконфигурирован). ★ СТРОГО same-task register.self (НЕ cross-passage flow-control,
#    ADR-056 cross_passage_when_unsupported): «дождаться N sentinel» НЕ выражаем —
#    проверяем ТОЛЬКО свой локальный sentinel. retry/until + failed_when по
#    register.self.result этой же задачи.
- name: Wait until each sentinel answers PONG on :26379
  module: community.redis.command
  changed_when: false
  retry:
    count: 12
    delay: 2s
    until: "register.self.result == 'PONG'"
  failed_when: "register.self.result != 'PONG'"
  params:
    addr: "127.0.0.1:26379"
    # ★ CONNECTION-AUTH: sentinel-демон защищён aclfile (default-юзер требует пароль,
    # шаг 1 sentinel_users.default = главный секрет). PING без AUTH → NOAUTH. Тот же
    # главный секрет, что requirepass redis-server (sentinel default-юзер общим паролем).
    password: "${ vault('secret/redis/' + incarnation.name + '#password') }"
    args: ["PING"]
