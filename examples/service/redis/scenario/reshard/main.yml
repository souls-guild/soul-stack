name: reshard
description: >-
  Перенести N hash-слотов с одного master-а на другой в сформированном Redis-кластере.
  Императивная неидемпотентная операция: повторный вызов двигает ещё слоты — запускать
  осознанно.

# ── Входной контракт оператора (docs/input.md) ────────────────────────────────
# Простые типизированные понятия оператора: с какого master-а, на какой и сколько
# слотов перенести.
input:
  from_sid:
    type: string
    required: true
    format: fqdn
    description: >-
      SID (FQDN) master-а ИСТОЧНИКА — с него снимаются слоты. Должен присутствовать
      в roster прогона (soulprint.hosts) и быть master-ом со слотами в кластере.

  to_sid:
    type: string
    required: true
    format: fqdn
    description: >-
      SID (FQDN) master-а ПОЛУЧАТЕЛЯ слотов. Должен присутствовать в roster прогона
      и отличаться от from_sid.

  slots:
    type: integer
    required: true
    min: 1
    description: >-
      Сколько слотов перенести с from на to (>= 1). Берутся ПЕРВЫЕ slots слотов
      источника по возрастанию. ★ НЕ идемпотентно: повторный apply перенесёт ещё
      slots слотов.

tasks:
  # 1. GUARD — from_sid и to_sid обязаны быть в roster и различаться (assert:,
  #    ADR-009 amendment 2026-06-23; тот же механизм, что guard remove_node). Предикат
  #    вычисляется KEEPER-SIDE на РЕНДЕРЕ (там доступен soulprint.hosts; на Soul-е его
  #    НЕТ). false ОБРЫВАЕТ render с message ДО любого dispatch — раньше и понятнее,
  #    чем shell-test на хосте. assert НЕ emit RenderedTask.
  - name: Guard from and to are distinct masters of the run roster
    assert:
      that:
        - 'input.from_sid != input.to_sid && size(soulprint.hosts.where("sid == input.from_sid")) == 1 && size(soulprint.hosts.where("sid == input.to_sid")) == 1'
      message: "reshard guard: from_sid/to_sid must be distinct hosts of the run roster"

  # 2. RESHARD — run_once. Endpoint-ы строятся из roster (soulprint.hosts) по SID:
  #    from/to = {addr: "<primary_ip>:6379"}. Это ГОТОВАЯ топология — плагин ничего
  #    не транслирует: сам читает CLUSTER NODES с from, выбирает первые `slots`
  #    слотов источника и переносит каждый (go-redis SETSLOT/MIGRATE/SETSLOT NODE).
  #    ★ НЕ идемпотентен (без unless): повторный прогон сдвинет ещё `slots` слотов.
  #    .where("sid == ...")[0] детерминирован (single-host roster-фильтр; прецедент
  #    add_node/remove_node). ★ РЕДИЗАЙН default_admin (2026-06-30): коннект к нодам —
  #    под системным default_admin (username → AUTH, requirepass убран). password из
  #    новой Vault-ветки secret/redis/<inc>/users/default_admin#password; плагин коннектится
  #    к нодам под этой парой (password маскируется). Тело сценария (вне covenant) хардкодит
  #    'default_admin' напрямую (нет extends: covenant compute.admin_user).
  - name: Reshard N slots from source master to target master
    run_once: true
    module: community.redis.cluster
    params:
      action:   reshard
      username: default_admin
      password: "${ vault('secret/redis/' + incarnation.name + '/users/default_admin#password') }"
      # int() унифицирует uint64-операнд input.slots в числовой тип (тот же приём,
      # что replicas_per_shard в create/cluster.yml); whole-cell ${…} → нативный int.
      slots:    "${ int(input.slots) }"
      from:
        addr: "${ soulprint.hosts.where(\"sid == input.from_sid\")[0].network.primary_ip + ':6379' }"
      to:
        addr: "${ soulprint.hosts.where(\"sid == input.to_sid\")[0].network.primary_ip + ':6379' }"
