# L0-испытание reshard: GUARD-провал. from_sid == to_sid → assert-guard (ADR-009
# amendment 2026-06-23) вычисляет предикат that[0] в FALSE на РЕНДЕРЕ Keeper-side →
# render ОБРЫВАЕТСЯ ошибкой с message ДО любого dispatch (ни одной задачи на Soul).
# Покрывает FALSE-ветку guard-предиката (парный с happy-кейсом). Соответствие
# вычисляется KEEPER-SIDE при render (soulprint.hosts доступен); harness ассертит
# обрыв через expect_render_error (ADR-023 amendment).
name: reshard guard fails when from equals to

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  hosts:
    - sid: node-1.example.com
      covens: [reshard, redis]
      soulprint:
        network: { primary_ip: 10.0.0.1 }
        os: { arch: amd64 }
    - sid: node-2.example.com
      covens: [reshard, redis]
      soulprint:
        network: { primary_ip: 10.0.0.2 }
        os: { arch: amd64 }
  vault:
    secret/redis/reshard:
      password: s3cr3t-redis-pass-reshard
  state:
    redis_type: cluster
    redis_version: ""
    redis_config:
      maxmemory: "256mb"
      cluster-enabled: "yes"
      cluster-config-file: "nodes.conf"
      cluster-node-timeout: "5000"
    redis_users: []
    redis_hosts: []

  input:
    from_sid: node-1.example.com
    to_sid: node-1.example.com
    slots: 50

# Render ОБРЫВАЕТСЯ assert-провалом guard-а: ожидаем ошибку рендера с message из
# assert. expect_render_error взаимоисключим с assert.rendered_tasks (плана нет —
# прогон не стартовал).
expect_render_error: "reshard guard: from_sid/to_sid must be distinct hosts of the run roster"
