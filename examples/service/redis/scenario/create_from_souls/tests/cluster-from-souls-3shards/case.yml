# L0 test for create_from_souls in cluster mode: deploys an honest hash-slot Redis
# Cluster onto an EXISTING roster (no provisioning). Multi-host roster (fixtures.hosts)
# of 3 hosts: shards=3, replicas_per_master=0 → topology is exactly 3*(1+0)=3 (size
# guard passes).
#
# ★ ACCEPTANCE CRITERION (difference from create): the run proceeds over an existing
# roster WITHOUT provisioning steps. task_absent asserts that core.cloud.created
# (VM creation) and core.soul.registered (onboarding barrier) are ABSENT from the
# plan; create_from_souls has neither an include of redis-provision.yml nor a
# provision section.
#
# Render-only, hermetic. On the cluster run, the sentinel branch group-drops and the
# cluster branch renders. The size guard is an assert: (keeper-side render-time
# precondition, ADR-009), it does not emit a RenderedTask. The deploy body
# (redis-deploy-cluster.yml) is service-level, same as for create. The PLUGIN
# (community.redis.cluster action create) deterministically assigns master/replica
# roles and slots by sorted SID; the scenario builds the topology MAP (SID -> addr).
name: cluster deploy on existing roster without provision

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  # Multi-host roster: 3 hosts, the order in YAML is intentionally unsorted (b, c, a).
  hosts:
    - sid: node-b.example.com
      covens: [create_from_souls, redis]
      soulprint:
        network: { primary_ip: 10.0.0.2 }
        os: { arch: amd64 }
    - sid: node-c.example.com
      covens: [create_from_souls, redis]
      soulprint:
        network: { primary_ip: 10.0.0.3 }
        os: { arch: amd64 }
    - sid: node-a.example.com
      covens: [create_from_souls, redis]
      soulprint:
        network: { primary_ip: 10.0.0.1 }
        os: { arch: amd64 }
  vault:
    secret/redis/create_from_souls:
      password: s3cr3t-redis-pass-create-from-souls
    # ★ default_admin REDESIGN (2026-06-30): default_admin is the system user for
    # in-cluster AUTH; cluster-build (community.redis.cluster username/password) and
    # the deploy's masteruser/masterauth read its password from the users/default_admin
    # branch (the main secret is DROPPED from the deploy bodies).
    secret/redis/create_from_souls/users/default_admin:
      password: default-admin-secret-pass
    secret/redis/create_from_souls/users/replica:
      password: replica-sys-secret-pass
    secret/redis/create_from_souls/users/monitoring:
      password: monitoring-sys-secret-pass
    secret/redis/create_from_souls/users/sentinel:
      password: sentinel-sys-secret-pass
    secret/redis/create_from_souls/users/haproxy:
      password: haproxy-sys-secret-pass
  essence:
    install_method: package
    redis_type: cluster
    modules_base_url: "https://artifacts.example.com/redis/modules"
    memory_reserve_percent: 75
    persistence_presets:
      off:
        save: ""
        appendonly: "no"
      aof:
        save: ""
        appendonly: "yes"
      rdb:
        save: "900 1 300 10 60 10000"
        appendonly: "no"
      rdb_aof:
        save: "900 1 300 10 60 10000"
        appendonly: "yes"
    redis_config:
      maxmemory:        "256mb"
      maxmemory-policy: allkeys-lru
      maxclients:       10000
      timeout:          300
    system_acl_users:
      replica:    "+psync +replconf +ping"
      monitoring: "-@all +@connection +client +ping +info +config|get +cluster|info +slowlog +latency +memory +select +command|count +command|docs"
      sentinel:   "allchannels +multi +slaveof +ping +exec +subscribe +config|rewrite +role +publish +info +client|setname +client|kill +script|kill"
      haproxy:    "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +info +cluster|info"
  input:
    redis_type: cluster
    version: "7.4.1"
    shards: 3
    replicas_per_master: 0
    cluster_node_timeout: 5000

assert:
  task_present:
    # ── cluster destiny: package (mode-agnostic install BEFORE branching) ──────
    - module: core.pkg.installed
      params_subset:
        name: redis-server
        version: "7.4.1"

    # ── cluster destiny: redis.conf with cluster directives ───────────────────
    # config-map carries the base merge + HOST-INVARIANT cluster directives. cluster-announce-ip
    # is NOT in config: it's a per-host directive rendered by redis.conf.tmpl from .self.
    # render_context.self = the first host by SID (node-a, the apply.input host invariant).
    - module: core.file.rendered
      params_subset:
        path: /etc/redis/redis.conf
        template_content: "<present>"
        mode: "0640"
        owner: redis
        group: redis
        render_context:
          vars:
            conf_dir: /etc/redis
            data_dir: /var/lib/redis
            port: 6379
            run_dir: /var/run/redis
            log_dir: /var/log/redis
            loadmodules:
              - /var/lib/redis/modules/redisbloom.so
              - /var/lib/redis/modules/rejson.so
              - /var/lib/redis/modules/redisearch.so
              - /var/lib/redis/modules/redistimeseries.so
            config:
              # ★ default_admin REDESIGN: replica->master AUTH (masteruser/masterauth) arrives as
              # REGULAR config directives (the cluster deploy body fills them in via vault()-in-cell).
              # The password comes from the users/default_admin branch; it's NOT in
              # state_changes.redis_config (the secret lives in Vault, not in incarnation.state).
              masteruser:       "default_admin"
              masterauth:       "default-admin-secret-pass"
              maxmemory:        "256mb"
              maxmemory-policy: allkeys-lru
              maxclients:       10000
              timeout:          300
              save:             "900 1 300 10 60 10000"
              appendonly:       "no"
              cluster-enabled:      "yes"
              cluster-config-file:  "nodes.conf"
              cluster-node-timeout: "5000"
          self:
            sid: node-a.example.com
            covens: [create_from_souls, redis]
            choirs: []
            traits: {}
            role: ""
            network:
              primary_ip: 10.0.0.1
            os:
              arch: amd64
          role: ""
          essence: {}

    # ── cluster-build (community.redis.cluster) ─────────────────────────────
    # nodes MAP: key=SID, addr=primary_ip+":6379". Deterministic by SID.
    - module: community.redis.cluster
      params_subset:
        action: create
        replicas_per_shard: 0
        # ★ default_admin REDESIGN: connects to each node as the ACL user default_admin
        # (username -> AUTH). The former main secret is DROPPED; password comes from the
        # users/default_admin branch.
        username: default_admin
        password: default-admin-secret-pass
        nodes:
          node-a.example.com: { addr: "10.0.0.1:6379" }
          node-b.example.com: { addr: "10.0.0.2:6379" }
          node-c.example.com: { addr: "10.0.0.3:6379" }

  task_absent:
    # ★ create_from_souls CRITERION: provisioning steps are ABSENT (no include of
    # redis-provision.yml, no provision section). The run proceeds over an existing roster.
    - module: core.cloud.created
    - module: core.soul.registered
    # redis-sentinel package is ABSENT in cluster mode (sentinel_enabled defaults to false).
    - module: core.pkg.installed
      params_subset:
        name: redis-sentinel

  state_changes:
    redis_type: cluster
    redis_version: "7.4.1"
    redis_config:
      maxmemory:        "256mb"
      maxmemory-policy: allkeys-lru
      maxclients:       10000
      timeout:          300
      save:             "900 1 300 10 60 10000"
      appendonly:       "no"
      cluster-enabled:      "yes"
      cluster-config-file:  "nodes.conf"
      cluster-node-timeout: "5000"
    redis_users: []
    redis_hosts: []
    # ★ provision read-model: ALWAYS the conservative default; create_from_souls
    # doesn't spin up VMs (difference from create).
    provisioned_vm_ids: []
    provisioned_sids: []
    provisioned_provider: ""
