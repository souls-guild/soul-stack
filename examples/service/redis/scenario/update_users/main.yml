name: update_users
description: >-
  Заменить целиком набор operator-ACL-пользователей на работающем Redis без рестарта.
  Пользователь, которого нет в новом наборе, удаляется; системные служебные юзеры не
  трогаются.

# ── Входной контракт оператора (docs/input.md) ────────────────────────────────
# ПОЛНЫЙ НОВЫЙ набор operator-extra ACL-юзеров (массив AclUser, types.yml/ADR-062 $type)
# — тот же тип, что элемент create input.users. Массив целиком заменяет state.redis_users
# (bulk-replace). Пустой/опущенный массив = удалить ВСЕХ operator-extra (системные
# остаются, доливаются из essence). Пароль — НЕ во входе (Vault-конвенция, см. description).
#
# ★ Почему массив, а не один user (как add_user): update_users — про НАБОР («правим всех»),
# а не про точечную добавку. perms каждого элемента валидируется re2-паттерном AclUser
# (token-shape-фильтр), как в create — невалидная ACL-строка отсекается на input-валидации.
input:
  users:
    type: array
    required: true
    # ★ form-prefill (docs/input.md → «Pre-fill из state»): «правим ВСЕХ» =
    # форма открывается с УЖЕ показанным текущим набором operator-extra (оператор
    # правит дельту, не вводит набор с нуля и не стирает его молча). Источник —
    # incarnation.state.redis_users (тот же массив AclUser, что state_changes пишет
    # ниже: set redis_users <- input.users), поэтому имя поля (users) и state-ключ
    # (redis_users) расходятся — prefill идёт явным аксессором, не по совпадению
    # имён. Резолвит form-prefill-эндпоинт (path-whitelist + secret-исключение);
    # redis_users НЕ secret (пароля в нём нет — он keeper-side Vault), массив
    # отдаётся целиком. Это лишь UI-подсказка: в эффективный input state НЕ течёт
    # (bulk-replace применяет ровно то, что оператор оставил в форме).
    prefill_from_state: state.redis_users
    items:
      $type: AclUser
    description: >-
      ПОЛНЫЙ новый набор operator-extra ACL-юзеров (массив AclUser: {name, perms, state}).
      ЦЕЛИКОМ заменяет incarnation.state.redis_users (bulk-replace): юзера, которого нет
      в массиве, удаляет из ACL. perms — ПОЛНАЯ ACL-строка (директивы Redis ACL как есть),
      валидируется паттерном AclUser. Системные служебные юзеры сюда НЕ входят (доливаются
      из essence). Пустой массив = убрать всех operator-extra. Форма открывается
      преднаполненной текущим набором (prefill_from_state: state.redis_users).

# ── Декларативные input-инварианты (validate:) ───────────────────────────────────
# ★ system-ACL-users guard (дизайн d2): ни один элемент input.users НЕ может занять имя
# СЛУЖЕБНОГО (default/replica/monitoring/sentinel/haproxy). Системные доливаются в
# users.acl из essence ПОВЕРХ operator-extra (last-wins) — operator `replica` молча
# перекрыл бы replica-perms репликации. Ловим на INPUT-валидации (422 ДО applying), как
# create/add_user. INPUT-ONLY (essence недоступен): список имён захардкожен (= create).
# .all() над МАССИВОМ итерирует элементы AclUser; имя — поле u.name. input.users required
# → has()-обвязка не нужна (всегда присутствует в эффективном input).
validate:
  - that: "input.users.all(u, !(u.name in ['default', 'replica', 'monitoring', 'sentinel', 'haproxy']))"
    message: "имя ACL-пользователя зарезервировано за служебным (default/replica/monitoring/sentinel/haproxy): выбери другое имя — служебные юзеры заводятся автоматически из essence"

# ── Вычисляемые scenario-vars (compute:) ─────────────────────────────────────────
# Рун-уровневый контекст (input/essence/incarnation — без soulprint). tls_* —
# дискриминатор коннекта плагина из state.tls (state_schema v3), идентично add_user/
# restart/update_config: ACL LOAD идёт через TLS-коннект, если Redis на TLS.
compute:
  # ── admin_user: имя СИСТЕМНОГО ACL-юзера внутрикластерного AUTH (default_admin) ──
  # ★ РЕДИЗАЙН default_admin (2026-06-30): тело сценария БЕЗ extends: covenant (нет общего
  # compute), поэтому имя системного admin-юзера объявляется ЛОКАЛЬНЫМ литералом — единый
  # источник внутри сценария (плагин-коннект community.redis.acl + masterauth-долив в
  # config + Vault-путь пароля читают compute.admin_user, не хардкодят 'default_admin' в
  # каждом месте). Симметрия с covenant.compute.admin_user деплой-тел.
  admin_user: "${ 'default_admin' }"
  tls_on:   "${ has(incarnation.state) && has(incarnation.state.tls) && default(incarnation.state.tls.enable, false) }"
  tls_port: "${ compute.tls_on ? string(incarnation.state.tls.port) : '' }"
  # tls_ca — PEM CA-СОДЕРЖИМОЕ коннекта из ИМЕНОВАННОГО state.tls.ca_ref (vault() резолвит
  # Vault-ПУТЬ в PEM), симметрично tls_port из state.tls.port. После rotate_tls (меняет
  # state.tls.ca_ref на новый путь) коннект берёт АКТУАЛЬНЫЙ CA — не устаревший
  # essence-дефолт.
  tls_ca:   "${ compute.tls_on ? vault(incarnation.state.tls.ca_ref) : '' }"

# ── Мутация incarnation.state ─────────────────────────────────────────────────
# ★ BULK-REPLACE: state.redis_users ЗАМЕНЯЕТСЯ input.users ЦЕЛИКОМ (массив AclUser
# [{name,perms,state}], wave 1b, БЕЗ пароля — он keeper-side vault, ADR-012). НЕ upsert,
# НЕ merge: то, чего нет в input.users, выпадает из state (= удаление юзера). Тот же
# набор, что ушёл в render users.acl operator-extra-слоем. required → input.users всегда
# присутствует; пустой массив фиксирует «operator-extra нет» (системные остаются вне state).
state_changes:
  - set: redis_users
    value: "${ input.users }"

tasks:
  # 1. Перерендерить users.acl на диск с НОВЫМ набором юзеров (тот же режим-агностичный
  #    destiny redis, что create/add_user/add_node). vars.users — merged набор с per-user
  #    паролями из Vault (keeper-side vault(), .tmpl хеширует, plaintext не пишет).
  #    redis.conf/TLS НЕ трогаем — update_users меняет ТОЛЬКО ACL (apply destiny рендерит
  #    весь кирпич, но оживляем мы лишь ACL шагом 2; redis.conf на диске не изменится при
  #    тех же config — idempotent рендер). version — из state; conf_dir/data_dir — из
  #    essence (v11→v12, host-layout вынесен в essence, Вариант A).
  - name: Re-render users.acl with the new ACL user set (full file on disk)
    apply:
      destiny: redis
      input:
        version:  "${ default(incarnation.state.redis_version, '') }"
        # ★ install: ОБЯЗАТЕЛЕН на повторном прогоне (регресс live E2E 2026-07-01). Без него
        # диспетчер install.yml по !has(input.install) скатывается в package-ветку →
        # core.pkg `apt install redis-server=<version>` (версия из Nexus-binary в apt
        # ОТСУТСТВУЕТ → env exited 100). Собираем ТУ ЖЕ binary-структуру, что create
        # (deploy-body → compute.install из essence.install_method) — единый способ
        # установки. Отличие от covenant.install: version из РАЗВЁРНУТОГО state
        # (redis_version), а не input.version (повторный прогон версию не переустанавливает).
        install: >-
          ${ (default(essence.install_method, 'binary') == 'binary')
               ? {
                   'method':        'binary',
                   'base_url':      default(essence.binary_base_url, ''),
                   'version':       default(incarnation.state.redis_version, ''),
                   'allow_private': default(essence.binary_allow_private, true)
                 }
               : { 'method': 'package' } }
        conf_dir: "${ default(essence.conf_dir, '/etc/redis') }"
        data_dir: "${ default(essence.data_dir, '/var/lib/redis') }"
        # ★ РЕДИЗАЙН default_admin (2026-06-30): apply.input.password УДАЛЁН (destiny redis
        # его больше не принимает — requirepass убран). masteruser/masterauth ДОЛИВАЮТСЯ в
        # config обычными директивами ПОВЕРХ развёрнутого state.redis_config (он хранится
        # БЕЗ masterauth — секрет в Vault, ADR-061). update_users перерендеривает весь кирпич
        # destiny `redis` (вкл. redis.conf), поэтому статическая replica→master AUTH обязана
        # доливаться и здесь — иначе redis.conf на диске потерял бы masteruser/masterauth и
        # cluster/sentinel-реплики после рестарта упёрлись бы в NOAUTH при PSYNC. На master-
        # нодах директива инертна (failover-safe). masterauth — vault()-в-ячейке (seal-маскинг
        # ADR-010 §7.4); admin_user = compute.admin_user; путь — secret/redis/<inc>/users/
        # default_admin#password (та же ветка, что users-блок ниже).
        config: >-
          ${ merge(incarnation.state.redis_config, {
               'masteruser': compute.admin_user,
               'masterauth': vault('secret/redis/' + incarnation.name + '/users/' + compute.admin_user + '#password')
             }) }
        modules_base_url: "${ default(essence.modules_base_url, '') }"
        # ★★ КРИТИЧНО (system-ACL-users d2): ПОЛНЫЙ users.acl = СИСТЕМНЫЕ (из essence,
        # ПЕРВЫМИ) + operator-extra (НОВЫЙ input.users — МАССИВ AclUser, ПОВЕРХ). update_users
        # перерендеривает ВЕСЬ файл (не append) → БЕЗ долива системных этот рендер СТЁР БЫ
        # replica/monitoring/sentinel/haproxy → сломал бы репликацию/sentinel/health-check
        # на повторном прогоне. Системные доливаются на КАЖДОМ рендере из essence.system_acl_users (они
        # НЕ в state — state хранит только operator-extra, пункт 7 d2). last-wins: operator-
        # extra перекрывает одноимённого системного (но имена системных закрыты validate-guard
        # — коллизии быть не должно). Vault-пароль каждого — secret/redis/<inc>/users/<name>
        # #password (та же ветка). ★ bulk-replace: operator-extra-слой = input.users ЦЕЛИКОМ
        # (то, чего в нём нет, в файл не попадёт = удаление юзера). Идентичен render-у create
        # (там operator-extra = input.users), отличие лишь в источнике: create — при развёртке,
        # update_users — сопровождение уже работающего инстанса.
        users: >-
          ${ merge(
               merge(default(essence.system_acl_users, {}).map(name, {
                 name: {
                   'perms':    essence.system_acl_users[name],
                   'state':    'on',
                   'password': vault('secret/redis/' + incarnation.name + '/users/' + name + '#password')
                 }
               })),
               merge(input.users.map(u, {
                 u.name: {
                   'perms':    u.perms,
                   'state':    u.state,
                   'password': vault('secret/redis/' + incarnation.name + '/users/' + u.name + '#password')
                 }
               }))
             ) }

  # 2. HOT-RELOAD ACL: community.redis.acl шлёт ACL LOAD — живой инстанс перечитывает
  #    aclfile (отрендеренный шагом 1) целиком. Удалённые из набора юзеры исчезают из
  #    ACL LIST при перезагрузке файла (ACL LOAD приводит инстанс к файлу). Идемпотентно
  #    по конструкции; плагин делает diff ACL LIST до/после (changed=false при совпадении).
  #    addr/TLS-дискриминатор — из state.tls (compute.tls_*), как add_user/restart.
  - name: Hot-reload ACL on the live instance (ACL LOAD)
    module: community.redis.acl
    params:
      addr:     "${ compute.tls_on ? '127.0.0.1:' + compute.tls_port : '127.0.0.1:6379' }"
      # ★ РЕДИЗАЙН default_admin (2026-06-30): AUTH под системным default_admin (requirepass
      # убран). username + его пароль из ветки secret/redis/<inc>/users/default_admin#password.
      # Плагин community.redis передаёт username в AUTH (parseConnConfig).
      username: "${ compute.admin_user }"
      password: "${ vault('secret/redis/' + incarnation.name + '/users/' + compute.admin_user + '#password') }"
      tls:      "${ compute.tls_on }"
      tls_ca:   "${ compute.tls_ca }"
