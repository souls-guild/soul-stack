# ★★ КРИТИЧНЫЙ guard-инвариант (system-ACL-users d2): update_users НЕ СТИРАЕТ системных.
# update_users перерендеривает ПОЛНЫЙ users.acl, заменяя operator-extra на input.users.
# БЕЗ долива системных из essence этот рендер СТЁР БЫ replica/monitoring/sentinel/haproxy
# → сломал бы репликацию/sentinel/health-check на повторном прогоне. Этот кейс ДОКАЗЫВАЕТ, что
# update_users доливает системных из essence.system_acl_users на КАЖДОМ рендере, даже
# при полной замене operator-extra:
#   users.acl несёт СИСТЕМНЫЕ (replica/monitoring/sentinel/haproxy) + НОВЫЙ operator-extra
#   набор (alice+carol), КАЖДЫЙ со своим vault-паролем; старый bob — удалён.
# state_changes.redis_users несёт ТОЛЬКО operator-extra (alice+carol) — системные НЕ в
# state (пункт 7 d2). Регресс «update_users стёр системных» = расхождение vars.users
# (нет replica/...) → ассерт красный.
name: update_users re-renders full acl WITHOUT wiping system users (preserve guard)

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  soulprint:
    network: { primary_ip: 10.0.0.5 }
    os: { arch: amd64 }

  # Развёрнутый state: operator-extra bob. Системные НЕ в state (доливаются из essence).
  state:
    redis_type: sentinel
    redis_version: "7.2.4"
    tls:
      enable:   false
      only:     false
      port:     7379
      cert_ref: ""
      key_ref:  ""
      ca_ref:   ""
    redis_config:
      maxmemory:        "256mb"
      maxmemory-policy: allkeys-lru
      save:             "900 1 300 10 60 10000"
      appendonly:       "no"
    redis_users:
      - { name: bob, perms: "~app:* +@read", state: "on" }

  essence:
    # host-layout (conf_dir/data_dir/modules_base_url) — в essence (v11→v12, Вариант A).
    conf_dir: /etc/redis
    data_dir: /var/lib/redis
    modules_base_url: "https://artifacts.example.com/redis/modules"
    # Системные ACL redis-server (perms 1:1 из роли, БЕЗ default). update_users ОБЯЗАН их
    # долить, иначе rerender стирает служебных.
    system_acl_users:
      default_admin: "~* &* +@all"
      replica:    "+psync +replconf +ping"
      monitoring: "-@all +@connection +client +ping +info +config|get +cluster|info +slowlog +latency +memory +select +command|count +command|docs"
      sentinel:   "allchannels +multi +slaveof +ping +exec +subscribe +config|rewrite +role +publish +info +client|setname +client|kill +script|kill"
      haproxy:    "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +info +cluster|info"

  # Новый полный набор operator-extra: alice + carol (bob удалён).
  input:
    users:
      - { name: alice, perms: "~* +@all", state: "on" }
      - { name: carol, perms: "~cache:* +@read", state: "off" }

  vault:
    secret/redis/update_users:
      password: updusr-redis-pass-16ch
    secret/redis/update_users/users/alice:
      password: alice-user-secret-pass
    secret/redis/update_users/users/carol:
      password: carol-user-secret-pass
    secret/redis/update_users/users/default_admin:
      password: default-admin-secret-pass
    secret/redis/update_users/users/replica:
      password: replica-sys-secret-pass
    secret/redis/update_users/users/monitoring:
      password: monitoring-sys-secret-pass
    secret/redis/update_users/users/sentinel:
      password: sentinel-sys-secret-pass
    secret/redis/update_users/users/haproxy:
      password: haproxy-sys-secret-pass

assert:
  task_present:
    # users.acl несёт СИСТЕМНЫЕ + НОВЫЙ operator-extra (alice+carol). bob отсутствует
    # (bulk-replace). deep-compare ловит ЛЮБОЕ исчезновение системного (регресс стирания).
    - module: core.file.rendered
      params_subset:
        path: /etc/redis/users.acl
        render_context:
          vars:
            users:
              default_admin:
                perms: "~* &* +@all"
                state: "on"
                password: default-admin-secret-pass
              replica:
                perms: "+psync +replconf +ping"
                state: "on"
                password: replica-sys-secret-pass
              monitoring:
                perms: "-@all +@connection +client +ping +info +config|get +cluster|info +slowlog +latency +memory +select +command|count +command|docs"
                state: "on"
                password: monitoring-sys-secret-pass
              sentinel:
                perms: "allchannels +multi +slaveof +ping +exec +subscribe +config|rewrite +role +publish +info +client|setname +client|kill +script|kill"
                state: "on"
                password: sentinel-sys-secret-pass
              haproxy:
                perms: "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +info +cluster|info"
                state: "on"
                password: haproxy-sys-secret-pass
              alice:
                perms: "~* +@all"
                state: "on"
                password: alice-user-secret-pass
              carol:
                perms: "~cache:* +@read"
                state: "off"
                password: carol-user-secret-pass
          self:
            sid: trial-host
            covens: [update_users]
            choirs: []
            traits: {}
            role: ""
            network:
              primary_ip: 10.0.0.5
            os:
              arch: amd64
          role: ""
          essence: {}

    # hot-reload ACL LOAD — plain-инстанс. ★ РЕДИЗАЙН default_admin: AUTH под default_admin.
    - module: community.redis.acl
      params_subset:
        addr: "127.0.0.1:6379"
        username: default_admin
        password: default-admin-secret-pass
        tls: false

  # state_changes: redis_users = НОВЫЙ набор operator-extra (alice+carol) БЕЗ системных,
  # БЕЗ пароля (write-model). bob выпал (bulk-replace).
  state_changes:
    redis_users:
      - { name: alice, perms: "~* +@all", state: "on" }
      - { name: carol, perms: "~cache:* +@read", state: "off" }
