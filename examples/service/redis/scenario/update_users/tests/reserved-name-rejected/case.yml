# L0 test for the validate-guard in update_users (system-ACL-users d2): no element of
# input.users may take the name of a SYSTEM user (default/replica/monitoring/sentinel/
# haproxy). The operator puts a user named monitoring into the set — reserved (merged in
# from essence ON TOP OF operator-extra → would silently overwrite the exporter's
# monitoring perms). The validate rule in update_users/main.yml (.all() over the array)
# catches this at INPUT validation (422 BEFORE applying). Rule false → expect_render_error
# matches a substring of message.
name: update_users with reserved system name in the set aborts at input validation

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  soulprint:
    network: { primary_ip: 10.0.0.5 }
    os: { arch: amd64 }

  state:
    redis_type: sentinel
    redis_version: "7.2.4"
    redis_config:
      maxmemory: "256mb"
    redis_users:
      - { name: bob, perms: "~app:* +@read", state: "on" }

  essence:
    # host-layout — in essence (v11→v12, Variant A). the guard aborts the render before
    # the deploy body; layout is here for fixture fidelity (state v12 shape without
    # layout keys).
    conf_dir: /etc/redis
    data_dir: /var/lib/redis
    system_acl_users:
      replica:    "+psync +replconf +ping"
      monitoring: "-@all +@connection +client +ping +info +config|get +cluster|info +slowlog +latency +memory +select +command|count +command|docs"
      sentinel:   "allchannels +multi +slaveof +ping +exec +subscribe +config|rewrite +role +publish +info +client|setname +client|kill +script|kill"
      haproxy:    "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +info +cluster|info"

  # The operator tries to add a user with the reserved name monitoring to the set
  # (alongside the valid alice — .all() must reject the whole set).
  input:
    users:
      - { name: alice, perms: "~* +@all", state: "on" }
      - { name: monitoring, perms: "~* +@all", state: "on" }

  vault:
    secret/redis/update_users:
      password: updusr-redis-pass-16ch

# The run aborts at validate: the "name is reserved for a system user" rule is false.
expect_render_error: "reserved for a system user"
