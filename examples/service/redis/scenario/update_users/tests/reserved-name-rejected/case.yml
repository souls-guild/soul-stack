# L0-испытание validate-guard update_users (system-ACL-users d2): ни один элемент
# input.users НЕ может занять имя СЛУЖЕБНОГО (default/replica/monitoring/sentinel/haproxy).
# Оператор кладёт в набор юзера с именем monitoring — зарезервировано (доливается из
# essence ПОВЕРХ operator-extra → молча перекрыл бы monitoring-perms экспортёра).
# validate-правило update_users/main.yml (.all() над массивом) ловит на INPUT-валидации
# (422 ДО applying). Правило false → expect_render_error по подстроке message.
name: update_users with reserved system name in the set aborts at input validation

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  soulprint:
    network: { primary_ip: 10.0.0.5 }
    os: { arch: amd64 }

  state:
    redis_type: sentinel
    redis_version: "7.2.4"
    redis_config:
      maxmemory: "256mb"
    redis_users:
      - { name: bob, perms: "~app:* +@read", state: "on" }

  essence:
    # host-layout — в essence (v11→v12, Вариант A). guard рвёт render до deploy-тела,
    # layout здесь для правдивости fixtures (форма state v12 без layout-ключей).
    conf_dir: /etc/redis
    data_dir: /var/lib/redis
    system_acl_users:
      replica:    "+psync +replconf +ping"
      monitoring: "-@all +@connection +client +ping +info +config|get +cluster|info +slowlog +latency +memory +select +command|count +command|docs"
      sentinel:   "allchannels +multi +slaveof +ping +exec +subscribe +config|rewrite +role +publish +info +client|setname +client|kill +script|kill"
      haproxy:    "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +info +cluster|info"

  # Оператор пытается завести в наборе юзера с зарезервированным именем monitoring
  # (рядом с валидным alice — .all() обязан отбраковать весь набор).
  input:
    users:
      - { name: alice, perms: "~* +@all", state: "on" }
      - { name: monitoring, perms: "~* +@all", state: "on" }

  vault:
    secret/redis/update_users:
      password: updusr-redis-pass-16ch

# Прогон обрывается на validate: правило «имя зарезервировано за служебным» false.
expect_render_error: "зарезервировано за служебным"
