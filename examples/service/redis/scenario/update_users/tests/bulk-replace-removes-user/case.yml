# ** CENTRAL guard for update_users: BULK-REPLACE removes a user dropped from the set.
# Deployed state.redis_users = {alice, bob}; the operator sets a NEW full set
# input.users = {alice (with CHANGED perms)} — bob is NOT in the set. update_users replaces
# state.redis_users ENTIRELY:
#   1. users.acl renders with alice (new perms) — WITHOUT bob (removed from the ACL);
#   2. state_changes.redis_users = [alice] (bob dropped out — bulk-replace, not upsert).
# A regression where "update_users merges/upserts instead of replacing" = bob would remain
# in users.acl and/or in state_changes → assert fails. Render-only, hermetic. Plaintext (addr 6379).
name: update_users bulk-replaces the set and drops a user absent from input (plaintext)

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  soulprint:
    network: { primary_ip: 10.0.0.5 }
    os: { arch: amd64 }

  # host-layout — in essence (v11→v12, Variant A): moved out of state, a re-run reads it from here.
  essence:
    conf_dir: /etc/redis
    data_dir: /var/lib/redis
    modules_base_url: "https://artifacts.example.com/redis/modules"

  # Deployed incarnation.state v6: operator-extra alice + bob.
  state:
    redis_type: sentinel
    redis_version: "7.2.4"
    tls:
      enable:   false
      only:     false
      port:     7379
      cert_ref: ""
      key_ref:  ""
      ca_ref:   ""
    redis_config:
      maxmemory:        "256mb"
      maxmemory-policy: allkeys-lru
      save:             "900 1 300 10 60 10000"
      appendonly:       "no"
    redis_users:
      - { name: alice, perms: "~* +@all", state: "on" }
      - { name: bob, perms: "~app:* +@read", state: "on" }

  # New full set: only alice (with NEW perms). bob is removed.
  input:
    users:
      - { name: alice, perms: "~app:* +@read +@write", state: "on" }

  vault:
    secret/redis/update_users:
      password: updusr-redis-pass-16ch
    # * default_admin REDESIGN: a system admin user — password from the users/default_admin branch
    # (masterauth fill-in in apply.input.config + AUTH community.redis.acl).
    secret/redis/update_users/users/default_admin:
      password: default-admin-secret-pass
    secret/redis/update_users/users/alice:
      password: alice-user-secret-pass

assert:
  task_present:
    # 1. users.acl carries ONLY alice with NEW perms — bob is absent (bulk-replace).
    #    deep-compare: an extra bob = a failed assert.
    - module: core.file.rendered
      params_subset:
        path: /etc/redis/users.acl
        render_context:
          vars:
            users:
              alice:
                perms: "~app:* +@read +@write"
                state: "on"
                password: alice-user-secret-pass
          self:
            sid: trial-host
            covens: [update_users]
            choirs: []
            traits: {}
            role: ""
            network:
              primary_ip: 10.0.0.5
            os:
              arch: amd64
          role: ""
          essence: {}

    # 2. HOT-RELOAD ACL: community.redis.acl against a live plain instance.
    #    * default_admin REDESIGN: AUTH under default_admin (username + its Vault password).
    - module: community.redis.acl
      params_subset:
        addr: "127.0.0.1:6379"
        username: default_admin
        password: default-admin-secret-pass
        tls: false

  # state_changes: redis_users = the NEW set ENTIRELY (only alice, bob dropped — bulk-
  # replace, WITHOUT the password). An upsert/merge regression = bob would remain → fails.
  state_changes:
    redis_users:
      - { name: alice, perms: "~app:* +@read +@write", state: "on" }
