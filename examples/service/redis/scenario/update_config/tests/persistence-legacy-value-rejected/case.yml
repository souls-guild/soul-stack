# L0 guard (NIM-53 bug #1, negative): the old persistence value (rdb_aof) is no longer in the enum
# update_config → rejected at INPUT validation (ResolveInputValues) BEFORE render. Enforces
# the invariant "old aof/rdb_aof are not accepted": they aren't keys of essence.persistence_presets,
# accepting them would break render with no-such-key → incarnation error_locked (see the positive
# persistence-canonical-value). The enum must reject them BEFORE applying, with a clear rejection.
name: update_config rejects a legacy persistence value (rdb_aof) at input validation

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  soulprint:
    network: { primary_ip: 10.0.0.5 }
    os: { arch: amd64 }

  essence:
    memory_reserve_percent: 75
    conf_dir: /etc/redis
    data_dir: /var/lib/redis
    persistence_presets:
      rdb:
        save: "900 1 300 10 60 10000"
        appendonly: "no"

  state:
    redis_type: sentinel
    redis_version: "7.4.1"
    tls:
      enable:   false
      only:     false
      port:     7379
      cert_ref: ""
      key_ref:  ""
      ca_ref:   ""
    persistence: rdb
    memory_mb: 1024
    maxmemory_policy: allkeys-lru
    io_threads: 0
    redis_config:
      maxmemory:        "768mb"
      maxmemory-policy: allkeys-lru
      save:             "900 1 300 10 60 10000"
      appendonly:       "no"
    redis_users: []

  input:
    # Old value from the pre-redesign enum [off,aof,rdb,rdb_aof] — now NOT in the enum.
    persistence: rdb_aof

  vault:
    secret/redis/update_config/users/default_admin:
      password: default-admin-secret-pass

# The run aborts at input validation: persistence ∉ enum. The substring is the marker for the
# enum rejection from ResolveInputValues (shared/config/input_value.go).
expect_render_error: "is not in enum"
