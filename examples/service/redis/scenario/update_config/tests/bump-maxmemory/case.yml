# L0-испытание (Trial, ADR-023) сценария update_config сервиса redis.
#
# Render-only, герметично. Демонстрирует re-apply destiny redis-single с
# обновлённым input: новый maxmemory (1gb) + новые директивы config уходят в
# .vars шаблона redis.conf. Изолированный render-проход destiny (ADR-009).
#
# destiny redis-single — standalone в examples/destiny/; apply:destiny резолвится
# зеркалом прода (slice A, ADR-023) через service.yml::destiny[] +
# default_destiny_source ниже (file://, относительно service-root).
name: update_config re-applies redis-single with new maxmemory and config

# L0-источник destiny (герметичный file://, относительно service-root).
fixtures:
  default_destiny_source: "file://../../destiny/destiny-{name}"
  input:
    # distro-native version-пин (epoch + revision) — то, что реально отдаёт apt на
    # Debian; узкий semver ломал =version-пин (BUG-1). has(input.redis_version)
    # истинно → пин уходит в core.pkg как есть.
    redis_version:   "5:7.0.15-1~deb12u7"
    redis_socket:    /var/run/redis/redis-server.sock
    redis_maxmemory: 1gb
    config:
      maxclients: 20000
      timeout:    0
      appendonly: "yes"
  # Мок Vault KV: vault('secret/redis/update_config#password') (incarnation.name в
  # L0 = имя сценария). Пароль НЕ во input — резолвится keeper-side.
  vault:
    secret/redis/update_config:
      password: s3cr3t-redis-pass-upd

assert:
  rendered_tasks:
    - index: 0
      module: core.pkg.installed
      params:
        name: redis-server
        # distro-native пин проходит насквозь (BUG-1 fix: pattern допускает epoch/revision).
        version: "5:7.0.15-1~deb12u7"

    # Каталог unix-сокета (idempotent install -d) — создаётся ДО рендера конфига.
    - index: 1
      module: core.exec.run
      params:
        creates: /var/run/redis
        cmd: install
        args: ["-d", "-o", "redis", "-g", "redis", "-m", "0755", "/var/run/redis"]

    # redis.conf перерисовывается с новым maxmemory и расширенным config.
    - index: 2
      module: core.file.rendered
      params:
        path: /etc/redis/redis.conf
        # template-путь заменён на доставленное Keeper-ом literal-содержимое (A1, ADR-012(d)).
        template_content: "<present>"
        mode: "0640"
        owner: redis
        group: redis
        # Корень text/template — render_context {vars,self,role,essence}
        # (templating.md §3.2, BUG-A fix); плоского params.vars больше нет.
        render_context:
          vars:
            socket: /var/run/redis/redis-server.sock
            # keeper-side vault()-резолв → значение в плане (см. create-кейс).
            password: s3cr3t-redis-pass-upd
            maxmemory: 1gb
            config:
              maxclients: 20000
              timeout: 0
              appendonly: "yes"
          self:
            sid: trial-host
            covens: []
            role: ""
          role: ""
          essence: {}
