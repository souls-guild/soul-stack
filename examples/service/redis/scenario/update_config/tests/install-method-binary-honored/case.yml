# L0-trial (Trial, ADR-023): GUARD for the install branch — update_config MUST
# re-ensure redis with the same install method (binary) that create fixed,
# and NOT fall back to package. REGRESSION (caught live E2E 2026-07-01): on re-run apply.input
# did not pass install → the `redis` destiny's install.yml dispatcher, via !has(input.install),
# fell into the package branch → core.pkg `apt install redis-server=<version>`. The version
# (e.g. 8.6.1) was published ONLY to Nexus (binary), not present in apt → env exited 100
# (E: Version '8.6.1' for 'redis-server' was not found). The CONFIG part still
# applied, install-ensure failed.
#
# What we assert (acceptance criteria):
#   1. binary branch of install.yml is ACTIVE: THREE core.url.fetched pull redis-server/
#      redis-cli/redis-benchmark from Nexus by the DEPLOYED version (incarnation.state.
#      redis_version = 8.6.1), NOT by input.version (absent on re-run). URL per-host:
#      <base_url>/<arch>/Debian/<distro_ver>/<version>/redis-*. allow_private
#      is passed through from essence.binary_allow_private.
#   2. package branch is DISABLED: core.pkg.installed redis-server ABSENT from the plan.
#
# The install-structure source is the same as create (deploy-body redis-deploy-*.yml
# passes compute.install from essence.install_method): author-context essence, a single
# install method for both create and maintenance. version on re-run is taken from state (deployed),
# not from input (re-run doesn't reinstall the version).
name: update_config honors the deployed binary install method (no package fallback)

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  soulprint:
    network: { primary_ip: 10.0.0.5 }
    # os.version is needed for the binary-URL (.../Debian/<distro_ver>/...) — Debian 12.
    os: { arch: amd64, version: "12" }

  essence:
    memory_reserve_percent: 75
    conf_dir: /etc/redis
    data_dir: /var/lib/redis
    modules_base_url: "https://artifacts.example.com/redis/modules"
    # ★ install_method — author-context (essence, not operator-input). binary is the default;
    # on re-run apply.input.install builds the binary structure from this field (symmetry with
    # covenant.install / deploy-body). This case guards the binary branch, so it's set
    # explicitly (even though binary is the default — to make the regression obvious).
    install_method: binary
    # binary_base_url — the Nexus-mirror (author-context). Re-run takes it into install.base_url,
    # destiny builds the URL <base_url>/<arch>/Debian/<distro_ver>/<version>/redis-*.
    binary_base_url: "https://downloads.example.com/redis"
    # binary_allow_private=true → lifts the core.url SSRF-guard (default base = internal
    # Nexus in RFC1918). Re-run must pass it through into install.allow_private (otherwise fetch
    # on a real host would hit the SSRF-block for the private IP).
    binary_allow_private: true
    persistence_presets:
      rdb:
        save: "900 1 300 10 60 10000"
        appendonly: "no"

  # Deployed incarnation.state (from create with install_method=binary): version 8.6.1 —
  # published ONLY to Nexus (binary), not present in apt (the very live regression). update_config
  # re-ensures install by this deployed version.
  state:
    redis_type: cluster
    redis_version: "8.6.1"
    tls:
      enable:   false
      only:     false
      port:     7379
      cert_ref: ""
      key_ref:  ""
      ca_ref:   ""
    persistence: rdb
    memory_mb: 1024
    maxmemory_policy: allkeys-lru
    redis_config:
      maxmemory:        "768mb"
      maxmemory-policy: allkeys-lru
      save:             "900 1 300 10 60 10000"
      appendonly:       "no"
    redis_users: []

  input:
    # Operator delta: only the new eviction policy.
    maxmemory_policy: volatile-lru

  vault:
    secret/redis/update_config:
      password: upd-redis-pass-16chars
    secret/redis/update_config/users/default_admin:
      password: default-admin-secret-pass

assert:
  task_present:
    # ★ binary branch is ACTIVE: THREE core.url.fetched pull binaries from Nexus by the DEPLOYED
    # version (incarnation.state.redis_version = 8.6.1) — NOT input.version (re-run doesn't
    # carry it). URL per-host: <base_url>/x86_64/Debian/12/8.6.1/redis-* (amd64→x86_64).
    # allow_private:true — passed through from essence.binary_allow_private. Regression "re-run falls
    # into package" → these tasks would be absent (placeholder-skip), core.pkg below present.
    - module: core.url.fetched
      params_subset:
        url: "https://downloads.example.com/redis/x86_64/Debian/12/8.6.1/redis-server"
        path: /usr/local/bin/redis-server
        mode: "0755"
        owner: root
        group: root
        allow_private: true

    - module: core.url.fetched
      params_subset:
        url: "https://downloads.example.com/redis/x86_64/Debian/12/8.6.1/redis-cli"
        path: /usr/local/bin/redis-cli
        mode: "0755"
        owner: root
        group: root
        allow_private: true

    - module: core.url.fetched
      params_subset:
        url: "https://downloads.example.com/redis/x86_64/Debian/12/8.6.1/redis-benchmark"
        path: /usr/local/bin/redis-benchmark
        mode: "0755"
        owner: root
        group: root
        allow_private: true

  task_absent:
    # ★ package branch is DISABLED (method=binary → install.yml dispatcher static-skip):
    # core.pkg.installed redis-server — placeholder-skip without params. params_subset won't
    # match the placeholder (Params nil) → guard "re-run does NOT fall into package `apt install
    # redis-server=<version>`". This is the root of the live regression.
    - module: core.pkg.installed
      params_subset:
        name: redis-server
