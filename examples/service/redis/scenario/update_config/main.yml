name: update_config
description: >-
  Изменить директивы redis.conf на работающем Redis без рестарта (hot-reload). Оператор
  задаёт изменённые простые понятия (память, eviction, persistence), сценарий
  перевычисляет конфиг и применяет hot-settable директивы на живом инстансе.

# ── Входной контракт оператора (docs/input.md) ────────────────────────────────
# Простые типизированные понятия — изменяемое подмножество create-контракта. Не
# заданное оператором → берётся из incarnation.state (подложка), чтобы повторный
# update_config не сбрасывал ранее развёрнутые директивы к essence-дефолту.
input:
  memory_mb:
    type: integer
    required: false
    min: 64
    description: >-
      Новый бюджет памяти под Redis, МБ. maxmemory = int(memory_mb)*reserve/100+"mb"
      (та же трансляция, что create). Не задан → берётся ранее развёрнутый
      incarnation.state.memory_mb (подложка). min:64 — как create (усечение не даёт
      "0mb" = безлимит).

  maxmemory_policy:
    type: string
    required: false
    enum:
      - noeviction
      - allkeys-lru
      - allkeys-lfu
      - allkeys-random
      - volatile-lru
      - volatile-lfu
      - volatile-random
      - volatile-ttl
    description: >-
      Новая политика вытеснения. Не задана → берётся ранее развёрнутая
      incarnation.state.maxmemory_policy (подложка).

  io_threads:
    type: integer
    required: false
    min: 0
    # dedicated io_threads (симметрия covenant.yml create): io-threads — startup-only
    # директива (плагин пропускает CONFIG SET), значение вступит при следующем рестарте
    # процесса из redis.conf шага 1. БЕЗ default (как memory_mb/maxmemory_policy):
    # не задан или 0 → сохраняется ранее развёрнутое из state.redis_config (подложка).
    description: >-
      Новое число I/O-потоков Redis (директива io-threads, startup-only — вступит при
      следующем рестарте процесса). Не задан или 0 → ранее развёрнутое
      (incarnation.state, подложка).

  persistence:
    type: string
    required: false
    # ★ enum синхронизирован с essence.persistence_presets / covenant.yml (aof/rdb_aof
    # разбиты на _1sec/_always): старые aof/rdb_aof — НЕ ключи presets → рвали render
    # `no such key` в essence.persistence_presets[persistence] → incarnation error_locked.
    enum: [off, aof_1sec, aof_always, rdb, rdb_aof_1sec, rdb_aof_always]
    description: >-
      Новый режим persistence (транслируется в save/appendonly/appendfsync через
      essence.persistence_presets). off — без сохранения; aof_1sec/aof_always — только AOF
      (fsync everysec/always); rdb — только снапшоты; rdb_aof_1sec/rdb_aof_always — снапшоты
      + AOF. Не задан → ранее развёрнутый incarnation.state.persistence (подложка).

  redis_settings:
    type: object
    required: false
    # x-directives: redis — валидировать ключи против каталога директив сервиса
    # (essence.redis_directives). Долетает в DTO input_schema сырым (NIM-76).
    x-directives: redis
    description: >-
      Passthrough-директивы redis.conf (key→value, строки), перекрывают дефолты/пресет
      в merge (last-wins). Для директив, не покрытых простыми полями. Сливаются ПОВЕРХ
      ранее развёрнутого incarnation.state.redis_config (накопительно: не заданное
      здесь сохраняет прежнее значение). UI — KEY→VALUE-редактор.
    # ★ #6-симметрия create (qa-gap): additional_properties сужен до {type: string} —
    # директивы redis.conf плоский map имя→строка (`maxmemory 512mb`), value-тип string
    # точен (ADR-045: object + скалярный value-тип → key→value-виджет, не сырой JSON).
    # Раньше тут было additional_properties: true (произвольный JSON) — UI рисовал
    # сырой JSON, а опечатка директивы протаскивалась молча (assert ниже её ловит).
    properties: {}
    additional_properties:
      type: string

# ── Декларативные input-инварианты (validate:) ───────────────────────────────────
# Сценарий обязан иметь, что апдейтить: хотя бы одно изменяемое поле. INPUT-ONLY
# (has()-цепочка, default()/essence недоступны в validate).
validate:
  - that: "has(input.memory_mb) || has(input.maxmemory_policy) || has(input.persistence) || has(input.io_threads) || has(input.redis_settings)"
    message: "update_config требует хотя бы одно изменяемое поле (memory_mb/maxmemory_policy/persistence/io_threads/redis_settings)"

# ── Вычисляемые scenario-vars (compute:, ADR-009 amendment) ──────────────────────
# Рун-уровневый контекст (input/essence/incarnation — без soulprint, host-инвариант).
# Источник истины — incarnation.state (что РАЗВЁРНУТО), вход — ДЕЛЬТА оператора.
#
# tls_* — дискриминатор коннекта плагина из ИМЕНОВАННОГО state.tls (state_schema v3,
# конвенция §7a), идентично restart: плагин обязан коннектиться по TLS, если
# Redis на TLS (иначе plaintext на TLS-only провалит шаг; AUTH plaintext при открытом
# plain-порту — утечка пароля). tls_ca — PEM CA из vault(incarnation.state.tls.ca_ref)
# (плагин ждёт PEM, не путь; в state лежит Vault-ПУТЬ, vault() резолвит в PEM).
compute:
  # ── admin_user: имя СИСТЕМНОГО ACL-юзера внутрикластерного AUTH (default_admin) ──
  # ★ РЕДИЗАЙН default_admin (2026-06-30): тело сценария БЕЗ extends: covenant (нет общего
  # compute), поэтому имя системного admin-юзера объявляется ЛОКАЛЬНЫМ литералом — единый
  # источник внутри сценария (плагин-коннект community.redis.config + masterauth-долив в
  # apply.input.config + Vault-путь пароля читают compute.admin_user, не хардкодят
  # 'default_admin' в каждом месте). Симметрия с covenant.compute.admin_user деплой-тел.
  admin_user: "${ 'default_admin' }"
  tls_on:   "${ has(incarnation.state) && has(incarnation.state.tls) && default(incarnation.state.tls.enable, false) }"
  tls_port: "${ compute.tls_on ? string(incarnation.state.tls.port) : '' }"
  # tls_ca из ИМЕНОВАННОГО state.tls.ca_ref, симметрично tls_port из state.tls.port. После
  # rotate_tls (меняет state.tls.ca_ref) коннект берёт АКТУАЛЬНЫЙ CA, не essence-дефолт.
  tls_ca:   "${ compute.tls_on ? vault(incarnation.state.tls.ca_ref) : '' }"

  # ── Эффективная версия redis (для version-aware валидатора redis_settings, #6) ──
  # Повторный прогон версию НЕ переустанавливает — берём РАЗВЁРНУТУЮ из incarnation.state
  # (зафиксирована create). Серия major.minor этой версии выбирает набор валидных
  # директив в каталоге (assert ниже). Старые инкарнации без поля → '' (assert skip:
  # не-каталожную версию не блокируем). Симметрия с compute.redis_version create.
  redis_version: "${ default(incarnation.state.redis_version, '') }"

  # Эффективное persistence: вход бьёт развёрнутое state (подложка), default rdb для
  # совсем старых инкарнаций без поля.
  persistence: "${ default(input.persistence, default(incarnation.state.persistence, 'rdb')) }"

  # ── Перевычисленный redis_config (тот же merge-перевод, что create) ──────────
  # Слои (SHALLOW last-wins): РАЗВЁРНУТЫЙ incarnation.state.redis_config (база повторного прогона —
  # сохраняет TLS/cluster/прочие директивы, которые оператор сейчас не трогает) →
  # persistence-пресет → вычисленные maxmemory/policy/io-threads (вход ИЛИ state-подложка) →
  # input.redis_settings (passthrough дельта). TLS-директивы УЖЕ в базовом
  # state.redis_config (create их туда положил) — здесь НЕ перевычисляются (TLS-материал
  # update_config не трогает; ротация — rotate_tls). Аналогично cluster-директивы.
  redis_config: >-
    ${ merge(
         incarnation.state.redis_config,
         essence.persistence_presets[compute.persistence],
         merge(
           has(input.memory_mb)
             ? { 'maxmemory': string(int(input.memory_mb) * int(essence.memory_reserve_percent) / 100) + 'mb' }
             : (has(incarnation.state.memory_mb) && int(incarnation.state.memory_mb) >= 64
                  ? { 'maxmemory': string(int(incarnation.state.memory_mb) * int(essence.memory_reserve_percent) / 100) + 'mb' }
                  : {}),
           has(input.maxmemory_policy)
             ? { 'maxmemory-policy': input.maxmemory_policy }
             : (has(incarnation.state.maxmemory_policy) && incarnation.state.maxmemory_policy != ''
                  ? { 'maxmemory-policy': incarnation.state.maxmemory_policy }
                  : {}),
           (has(input.io_threads) && int(input.io_threads) > 0)
             ? { 'io-threads': string(int(input.io_threads)) }
             : {}
         ),
         default(input.redis_settings, {})
       ) }

# ── Мутация incarnation.state ─────────────────────────────────────────────────
# Сценарий фиксирует НОВЫЙ развёрнутый redis_config + изменённые namedfields (read-model
# из тех же compute/input, что redis_config — без drift, как create). Не заданные
# оператором namedfields сохраняют прежнее значение (подложка из state).
state_changes:
  - set: redis_config
    value: "${ compute.redis_config }"
  - set: persistence
    value: "${ compute.persistence }"
  - set: memory_mb
    value: "${ int(default(input.memory_mb, default(incarnation.state.memory_mb, 0))) }"
  - set: maxmemory_policy
    value: "${ default(input.maxmemory_policy, default(incarnation.state.maxmemory_policy, '')) }"
  # io_threads read-model (подложка как memory_mb): задан → новый; иначе ранее
  # развёрнутый state.io_threads; иначе 0. Держит state.io_threads ≡ redis_config['io-threads'].
  - set: io_threads
    value: "${ int(default(input.io_threads, default(incarnation.state.io_threads, 0))) }"

tasks:
  # ── Version-aware валидатор имён директив redis_settings (assert, #6) ─────────────
  # ★ qa-gap: update_config принимает redis_settings (passthrough KEY→VALUE) —
  # без проверки оператор молча протащит опечатку (`maxmemoyr 512mb`) или директиву
  # чужой версии → CONFIG SET отвергнет / redis-server не перезапустится (поздний,
  # непонятный отказ). Тот же assert-валидатор, что в create/main.yml: сверяет КАЖДОЕ
  # ИМЯ директивы input.redis_settings против каталога валидных имён ДЛЯ РАЗВЁРНУТОЙ
  # версии (essence.redis_directives[<серия compute.redis_version>], где
  # compute.redis_version = incarnation.state.redis_version) — первый неизвестный ключ
  # рвёт render (422 assert-failed) ДО applying, понятным сообщением.
  #
  # ПОЧЕМУ assert, а не validate: каталог живёт в essence, а validate-контекст
  # INPUT-ONLY (essence недоступен, структурный CEL-барьер). essence.redis_directives
  # доступен ТОЛЬКО assert-у (полный scenario-контекст). Run-level, host-инвариантно.
  #
  # ВЕРСИЯ — compute.redis_version (РАЗВЁРНУТАЯ, из incarnation.state). Повторный прогон версию не
  # меняет → валидируем против той же серии, что задеплоена. EMPTY-CATALOG-SKIP
  # (!has(essence.redis_directives)) — каталог опционален (минимальные fixtures);
  # версия вне каталога (compute.redis_version == '' или серия отсутствует) → skip.
  # Механика version→серия (без split) идентична create/main.yml.
  - name: Validate redis_settings directive names against the catalog for the deployed Redis version
    assert:
      # that[] и message — СКАЛЯРНЫЕ строки (не block-scalar): soul-lint требует
      # *ast.StringNode, block-scalar = type_mismatch. Предикат идентичен create/main.yml
      # (источник — incarnation.state.redis_version вместо input.version).
      that:
        - "!has(essence.redis_directives) || default(input.redis_settings, {}).all(k, essence.redis_directives.all(s, compute.redis_version.matches('^([0-9]+:)?' + s + '[.]') ? (k in essence.redis_directives[s]) : true))"
      message: "redis_settings содержит неизвестную директиву redis.conf для развёрнутой версии Redis (incarnation.state.redis_version): сверь имя с каталогом валидных директив этой версии (essence.redis_directives[<major.minor>]) — опечатка или директива из другой версии Redis. Каталог генерируется scripts/gen-redis-catalog.sh из src/config.c."

  # 1. Перерендерить redis.conf на диск с новым merged config (тот же режим-агностичный
  #    destiny redis, что create/add_node). Это desired state на диске — для следующего
  #    рестарта процесса (startup-only-директивы из state.redis_config + новые). version —
  #    из state; conf_dir/data_dir — из essence (host-layout кластера, директива B, вынесен
  #    в essence v11→v12, Вариант A); пароль/users — keeper-side vault(), сохраняются
  #    неизменными (update_config их не трогает, но redis.conf рендерится целиком).
  #    config — ПЕРЕВЫЧИСЛЕННЫЙ compute.redis_config.
  - name: Re-render redis.conf with the updated config (full file on disk)
    apply:
      destiny: redis
      input:
        version:  "${ default(incarnation.state.redis_version, '') }"
        # ★ install: ОБЯЗАТЕЛЕН на повторном прогоне (регресс live E2E 2026-07-01). Без него
        # диспетчер install.yml по !has(input.install) скатывается в package-ветку →
        # core.pkg `apt install redis-server=<version>` (версия из Nexus-binary в apt
        # ОТСУТСТВУЕТ → env exited 100). Собираем ТУ ЖЕ binary-структуру, что create
        # (deploy-body → compute.install из essence.install_method) — единый способ
        # установки. Отличие от covenant.install: version из РАЗВЁРНУТОГО state
        # (redis_version), а не input.version (повторный прогон версию не переустанавливает).
        install: >-
          ${ (default(essence.install_method, 'binary') == 'binary')
               ? {
                   'method':        'binary',
                   'base_url':      default(essence.binary_base_url, ''),
                   'version':       default(incarnation.state.redis_version, ''),
                   'allow_private': default(essence.binary_allow_private, true)
                 }
               : { 'method': 'package' } }
        conf_dir: "${ default(essence.conf_dir, '/etc/redis') }"
        data_dir: "${ default(essence.data_dir, '/var/lib/redis') }"
        # ★ РЕДИЗАЙН default_admin (2026-06-30): apply.input.password УДАЛЁН (destiny redis
        # его больше не принимает — requirepass убран). masteruser/masterauth ДОЛИВАЮТСЯ в
        # config обычными директивами ПОВЕРХ перевычисленного compute.redis_config. КРИТИЧНО:
        # эта задача перерендеривает redis.conf целиком (тот же кирпич destiny `redis`) →
        # без долива статической replica→master AUTH redis.conf на диске потерял бы masteruser/
        # masterauth → cluster/sentinel-реплики после рестарта упёрлись бы в NOAUTH при PSYNC.
        # На master-нодах директива инертна (failover-safe). ★ ОТЛИЧНО от state_changes.redis_config
        # ниже: туда уходит ЧИСТЫЙ compute.redis_config БЕЗ masterauth — пароль НЕ уезжает в
        # incarnation.state (секрет в Vault, ADR-061). masterauth — vault()-в-ячейке (seal-маскинг
        # ADR-010 §7.4); admin_user = compute.admin_user; путь — secret/redis/<inc>/users/
        # default_admin#password.
        config: >-
          ${ merge(compute.redis_config, {
               'masteruser': compute.admin_user,
               'masterauth': vault('secret/redis/' + incarnation.name + '/users/' + compute.admin_user + '#password')
             }) }
        modules_base_url: "${ default(essence.modules_base_url, '') }"
        # ★★ КРИТИЧНО (system-ACL-users d2): redis.conf-рендер этой задачи перерендеривает
        # и users.acl (тот же destiny `redis` кирпич) → ОБЯЗАН долить системные из essence,
        # иначе update_config СТЁР БЫ replica/monitoring/sentinel/haproxy (как add_user).
        # Системные ПЕРВЫМИ, operator-extra (state.redis_users — МАССИВ AclUser, wave 1b)
        # ПОВЕРХ (last-wins). Системные НЕ в state (пункт 7 d2) — доливаются из essence на
        # каждом рендере. has()-guard на state.redis_users — back-compat (инкарнации без
        # operator-extra). Vault-пароль той же ветки secret/redis/<inc>/users/<name>#password.
        # operator-extra: .map(u, {u.name: …}) (имя из поля u.name, раньше map-ключ).
        users: >-
          ${ merge(
               merge(default(essence.system_acl_users, {}).map(name, {
                 name: {
                   'perms':    essence.system_acl_users[name],
                   'state':    'on',
                   'password': vault('secret/redis/' + incarnation.name + '/users/' + name + '#password')
                 }
               })),
               has(incarnation.state.redis_users)
                 ? merge(incarnation.state.redis_users.map(u, {
                     u.name: {
                       'perms':    u.perms,
                       'state':    u.state,
                       'password': vault('secret/redis/' + incarnation.name + '/users/' + u.name + '#password')
                     }
                   }))
                 : {}
             ) }

  # 2. HOT-RELOAD: применить hot-settable директивы к живому инстансу (CONFIG SET).
  #    ★ rewrite=false НАМЕРЕННО (NIM-53): redis.conf уже отрендерен ЦЕЛИКОМ шагом 1 — он
  #    источник истины файла. CONFIG REWRITE перезаписал бы файл из ЖИВОГО in-memory конфига
  #    и ОТКАТИЛ БЫ startup-only-директивы (io-threads/…) к их live-значению (плагин
  #    пропускает их на CONFIG SET — процесс не рестартовал), стерев новое значение шага 1
  #    «для следующего рестарта». Симметрия rotate_tls (рендер + hot-reload без rewrite).
  #    Передаём ВЕСЬ compute.redis_config — плагин сам пропускает startup-only по денилисту
  #    (port/dir/io-threads/aclfile/cluster-enabled/loadmodule/…), применяет только
  #    hot-settable. changed=false при no-op (честный CONFIG GET-diff в плагине →
  #    идемпотентность повторного прогона). addr/TLS-дискриминатор — из state.tls
  #    (compute.tls_*), как restart. changed_when здесь НЕ давим: реальный change
  #    (применённая директива) обязан отразиться в RunResult.
  - name: Hot-reload changed config directives on the live instance (CONFIG SET)
    module: community.redis.config
    params:
      addr:     "${ compute.tls_on ? '127.0.0.1:' + compute.tls_port : '127.0.0.1:6379' }"
      # ★ РЕДИЗАЙН default_admin (2026-06-30): AUTH под системным default_admin (requirepass
      # убран). username + его пароль из ветки secret/redis/<inc>/users/default_admin#password.
      # Плагин community.redis передаёт username в AUTH (parseConnConfig).
      username: "${ compute.admin_user }"
      password: "${ vault('secret/redis/' + incarnation.name + '/users/' + compute.admin_user + '#password') }"
      tls:      "${ compute.tls_on }"
      tls_ca:   "${ compute.tls_ca }"
      # config — ЧИСТЫЙ compute.redis_config (БЕЗ masterauth-долива): hot-reload шлёт CONFIG
      # SET только операторской дельты директив; masteruser/masterauth — replication-материал
      # (на живом инстансе уже выставлен create-ом), update_config его НЕ трогает. Плагин
      # итерирует ТОЛЬКО переданные ключи (директивы вне config не сбрасываются).
      config:   "${ compute.redis_config }"
      # ★ rewrite=false (NIM-53): файл — источник истины шага 1 (см. коммент задачи).
      # REWRITE откатил бы startup-only (io-threads) к live-значению — регресс NIM-53.
      rewrite:  false
