# L0-испытание (Trial, ADR-023) сценария add_acl_user сервиса redis.
#
# Render-only, герметично. Демонстрирует loop (slice E1, destiny/tasks.md §7):
# одна loop-задача раскрывается в render-фазе в N RenderedTask по элементам
# input.users (сквозные индексы 0,1,2). В каждой итерации loop-переменная
# ${ user.* } подставляется в команду redis-cli ACL SETUSER.
#
# no_log: true на УРОВНЕ задачи (main.yml) → RenderedTask.NoLog включается,
# секрет-маскинг ACL-пароля работает. no_log — task-level поле, не param,
# поэтому в assert.params его нет (L0-формат rendered_tasks сверяет params как
# данные; NoLog в нём не выражается). Кейс самодостаточен: только инлайн-loop,
# apply:destiny здесь нет — cross-service-резолв не задействован.
name: add_acl_user fans out ACL SETUSER over the user list

fixtures:
  input:
    users:
      - { name: app,      acl: "on >app-pass-1234 ~app:* +@read +@write" }
      - { name: readonly, acl: "on >ro-pass-5678 ~* +@read" }
      - { name: metrics,  acl: "on >mx-pass-9012 +info +ping +client" }

assert:
  rendered_tasks:
    # array → алфавитный порядок НЕ применяется (только object сортируется по
    # ключам); array сохраняет порядок элементов. index = позиция в списке.
    - index: 0
      module: core.cmd.shell
      params:
        cmd: "redis-cli ACL SETUSER app on >app-pass-1234 ~app:* +@read +@write"

    - index: 1
      module: core.cmd.shell
      params:
        cmd: "redis-cli ACL SETUSER readonly on >ro-pass-5678 ~* +@read"

    - index: 2
      module: core.cmd.shell
      params:
        cmd: "redis-cli ACL SETUSER metrics on >mx-pass-9012 +info +ping +client"
