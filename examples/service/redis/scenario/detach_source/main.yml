name: detach_source
description: >-
  Day-2: отцепить внешний источник от инкарнации, залитой через migrate_cluster —
  финальная проверка offset (fail-closed) и перевод master-а в самостоятельный режим
  (REPLICAOF NO ONE). Предусловие: оператор остановил запись в старый кластер (квиес —
  вне сценария).

# Входного контракта оператора НЕТ: detach_source не принимает параметров — источник,
# режим и коннект-данные берутся из incarnation.state (seeded_from/redis_type/tls/…),
# записанных migrate_cluster и предыдущими сценариями. Оператор лишь ЗАПУСКАЕТ сценарий
# (после ручного квиеса записи в источник, см. description).

# ── Вычисляемые scenario-vars (compute:) ─────────────────────────────────────────
# Рун-уровневый контекст (incarnation/essence — без soulprint). source_master — master
# ВНЕШНЕГО источника из state (записан migrate_cluster: seeded_from.source_endpoints[0]).
# tls_* — дискриминатор коннекта к ЛОКАЛЬНОМУ инстансу из state.tls (как все day-2:
# add_user/update_users/restart).
#
# ★ source_password/source_tls_ca (v10 прод-фикс) — учётка ВНЕШНЕГО источника для
# финального offset-gate, восстановленная из ССЫЛОК в state. migrate_cluster ПЕРСИСТИТ
# Vault-ПУТИ (seeded_from.source_password_ref/source_tls_ca_ref), detach читает их
# vault()-ом keeper-side и аутентифицируется к источнику. До v10 учётка в state НЕ
# хранилась → gate к AUTH/TLS-источнику падал коннектом → detach НИКОГДА не проходил
# (error_locked). Теперь полный цикл migrate→detach работает с защищённым источником.
# ref пуст (источник без AUTH/TLS, либо state до v10-фикса) → '' (gate шлёт
# source_password='', поведение S1-пилота бит-в-бит — НЕ ломаем detach без AUTH).
# default('')-guard на сам ref — defensive back-compat (v10 ref гарантирует, но edge-
# state без него не должен рвать eager-compute). Резолв keeper-side, значение маскируется.
#
# ★ source_master fail-soft на пустом source_endpoints: compute-блок резолвится ЦЕЛИКОМ
# и EAGERLY один раз на прогон (render/compute.go), ДО tasks. Голый [0] на пустом списке
# упал бы ОПАКОВОЙ ошибкой `index out of bounds: 0` РАНЬШЕ, чем render дойдёт до
# assert-guard в sentinel.yml — оператор не понял бы, что инкарнация просто не
# мигрировалась. guard `size(...) >= 1 ? [0] : ''` отдаёт '' на пустом (compute не
# падает), а ВНЯТНЫЙ отказ даёт assert-таск sentinel.yml (он ПЕРВЫЙ в ветке, отсекает
# не-мигрированные инкарнации до probe). Тот же '' у source_password/source_tls_ca на
# непрошедшей миграцию инкарнации (ref пуст) — assert-guard всё равно отсечёт её раньше gate.
compute:
  source_master: "${ size(default(incarnation.state.seeded_from.source_endpoints, [])) >= 1 ? incarnation.state.seeded_from.source_endpoints[0] : '' }"
  source_password: "${ default(default(incarnation.state.seeded_from, {}).source_password_ref, '') != '' ? vault(incarnation.state.seeded_from.source_password_ref) : '' }"
  source_tls_ca:   "${ default(default(incarnation.state.seeded_from, {}).source_tls_ca_ref, '') != '' ? vault(incarnation.state.seeded_from.source_tls_ca_ref) : '' }"
  tls_on:   "${ has(incarnation.state) && has(incarnation.state.tls) && default(incarnation.state.tls.enable, false) }"
  tls_port: "${ compute.tls_on ? string(incarnation.state.tls.port) : '' }"
  tls_ca:   "${ compute.tls_on ? vault(incarnation.state.tls.ca_ref) : '' }"
  # ── sentinel MONITOR ПОСЛЕ detach (split-brain-фикс): директивы/версия из STATE ──
  # ★ Шаг SENTINEL MONITOR (sentinel.yml, перенесён сюда из деплой-тела migrate_cluster:
  # его нельзя выполнять, пока новый master реплицирует источник — sentinel увидел бы
  # role:slave и инициировал failover → split-brain. После REPLICAOF NO ONE master снова
  # автономен, мониторить безопасно). day-2 берёт всё из incarnation.state (входного
  # контракта у detach нет):
  #   - sentinel_directives — те же per-master тайминги, что писал create/migrate в
  #     sentinel.conf, но из state.redis_sentinel (down_after_ms/failover_timeout_ms/
  #     master_name), а не из input. Форма ключей `sentinel <opt> <master>` идентична
  #     create/main.yml::compute.sentinel_directives (плагин classifyConfig раскладывает
  #     per-master). default()-guard на redis_sentinel — у v9-инкарнации объект гарантирован,
  #     но дефолты (5000/60000/'master') страхуют legacy/неполный state.
  #   - redis_version — для plugin community.redis.sentinel (version-gate команд), из
  #     state.redis_version (записан create/migrate).
  sentinel_master_name: "${ default(default(incarnation.state.redis_sentinel, {}).master_name, 'master') }"
  redis_version:        "${ default(incarnation.state.redis_version, '') }"
  sentinel_directives: >-
    ${ {
         'sentinel down-after-milliseconds ' + compute.sentinel_master_name: string(int(default(default(incarnation.state.redis_sentinel, {}).down_after_ms, 5000))),
         'sentinel failover-timeout '         + compute.sentinel_master_name: string(int(default(default(incarnation.state.redis_sentinel, {}).failover_timeout_ms, 60000)))
       } }

# ── Мутация incarnation.state ─────────────────────────────────────────────────
# Отметить источник отцеплённым: seeded_from.detached := true (source_endpoints
# СОХРАНЯЕТСЯ — историческая запись «откуда мигрировали»). ★ seeded_from — скалярный
# ОБЪЕКТ, не коллекция, поэтому ADR-057 `modify` (match-предикат над ЭЛЕМЕНТАМИ
# коллекции) к нему неприменим — патч поля объекта выражается через `set` целиком:
# merge() старого объекта с {detached: true} (shallow last-wins, templating.md §2.3) —
# сохраняет source_endpoints (и любые будущие поля seeded_from), меняет только detached.
# seeded_from-объект гарантирован у v9-инкарнаций (миграция 008_to_009), НО с ПУСТЫМ
# source_endpoints у тех, что не проходили migrate_cluster (миграция даёт каждой v9
# {source_endpoints:[], detached:false}). detach — обычный day-2 (нет runnable:false),
# оператор может запустить его на create'нутой инкарнации — такую отсекает assert-guard
# в sentinel.yml (size(source_endpoints) >= 1), до этого merge она не доходит.
state_changes:
  - set: seeded_from
    value: "${ merge(incarnation.state.seeded_from, {'detached': true}) }"

# Тело прогона — ветки диспетчера по incarnation.state.redis_type. S1-пилот: sentinel
# реализован, cluster — fail-closed заглушка (S4). when по state.redis_type — day-2
# режим-гейт (как диспетчер create по input.redis_type, но источник — state).
tasks:
  - include: cluster.yml
    when: "incarnation.state.redis_type == 'cluster'"
  - include: sentinel.yml
    when: "incarnation.state.redis_type == 'sentinel'"
