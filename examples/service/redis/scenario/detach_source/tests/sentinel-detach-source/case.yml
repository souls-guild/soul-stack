# L0-испытание detach_source в режиме sentinel (S1-пилот, happy-path). Day-2 для
# инкарнации, ранее залитой migrate_cluster (incarnation.state.seeded_from с detached:false,
# источник 10.9.0.1:6379). Roster из 1 хоста (новый master). Диспетчер по
# incarnation.state.redis_type (day-2 знает режим из state).
#
# Render-only, герметично. Диспетчер инклудит cluster.yml + sentinel.yml через
# CONDITIONAL-INCLUDE (when: на include по state.redis_type): sentinel-инкарнация →
# cluster-ветка group-drop, sentinel.yml раскрывается.
#
# Что ассертим:
#   1. ФИНАЛЬНЫЙ offset-gate ПЕРЕД detach (community.redis.offset-synced): source_addr=
#      внешний источник из state (seeded_from.source_endpoints[0]=10.9.0.1:6379),
#      lag_threshold=0 (жёстко — detach точка невозврата). ★ source_password='' здесь —
#      back-compat ветка (v10): у этой инкарнации seeded_from БЕЗ ref-полей (форма до
#      v10-фикса) → compute.source_password резолвится в '' (источник без AUTH). Кейс с
#      НЕПУСТЫМ ref (gate аутентифицируется к AUTH-источнику) — sentinel-detach-source-auth.
#   2. REPLICAOF NO ONE (community.redis.detached): addr локальный, password наш.
#   3. ★ SPLIT-BRAIN-ФИКС: SENTINEL MONITOR (community.redis.sentinel) ПРИСУТСТВУЕТ — он
#      ПЕРЕНЕСЁН СЮДА из деплой-тела migrate_cluster (там был placeholder-skip, чтобы не
#      мониторить master во время заливки → не словить failover). Выполняется ПОСЛЕ
#      REPLICAOF NO ONE (master автономен): monitor.ip=10.0.0.1 (master-election, roster
#      = новый master), quorum=1 (size(1)/2+1), master_name/тайминги/версия из state
#      (compute.sentinel_master_name/sentinel_directives/redis_version). Симметрия с
#      migrate-кейсами, где этот же модуль в task_absent.
#   4. state_changes: seeded_from.detached := true (source_endpoints СОХРАНЯЕТСЯ).
name: sentinel detach_source runs final offset gate then detaches the external source

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  soulprint:
    network: { primary_ip: 10.0.0.1 }
    os: { arch: amd64 }

  # Развёрнутый incarnation.state v9: sentinel-инкарнация, залитая migrate_cluster.
  # seeded_from.detached=false (источник ещё привязан) — detach_source выставит true.
  state:
    redis_type: sentinel
    redis_version: "7.2.4"
    conf_dir: /etc/redis
    data_dir: /var/lib/redis
    modules_base_url: "https://artifacts.example.com/redis/modules"
    tls:
      enable:   false
      only:     false
      port:     7379
      cert_ref: ""
      key_ref:  ""
      ca_ref:   ""
    redis_config:
      maxmemory:        "256mb"
      maxmemory-policy: allkeys-lru
      save:             "900 1 300 10 60 10000"
      appendonly:       "no"
    redis_users: []
    # ★ redis_sentinel (state_schema v9): тайминги/master_name sentinel. ОБЯЗАТЕЛЕН для
    # перенесённого сюда SENTINEL MONITOR (split-brain-фикс): compute.sentinel_directives/
    # sentinel_master_name day-2 собираются ИЗ НЕГО (входного контракта у detach нет).
    redis_sentinel:
      master_name: master
      quorum: 0
      down_after_ms: 5000
      failover_timeout_ms: 60000
    seeded_from:
      source_endpoints:
        - "10.9.0.1:6379"
        - "10.9.0.2:6379"
      detached: false

  vault:
    secret/redis/detach_source:
      password: detach-redis-pass-16ch

assert:
  task_present:
    # ── ФИНАЛЬНЫЙ offset-gate ПЕРЕД detach ──────────────────────────────────────
    # source_addr из state (seeded_from.source_endpoints[0]). lag_threshold=0 (жёстко).
    # source_password='' — back-compat (seeded_from без ref-полей → compute.source_password=''
    # → источник без AUTH). source_tls=false (нет CA-ref). password — наш локальный.
    - module: community.redis.offset-synced
      params_subset:
        addr: "127.0.0.1:6379"
        source_addr: "10.9.0.1:6379"
        password: detach-redis-pass-16ch
        source_password: ""
        source_tls: false
        lag_threshold: 0
        skip_checksum: false

    # ── REPLICAOF NO ONE (community.redis.detached) ─────────────────────────────
    - module: community.redis.detached
      params_subset:
        addr: "127.0.0.1:6379"
        password: detach-redis-pass-16ch
        tls: false

    # ── SENTINEL MONITOR (community.redis.sentinel) — ★ ПЕРЕНЕСЁН СЮДА (split-brain-фикс) ──
    # Выполняется ПОСЛЕ REPLICAOF NO ONE (master снова автономен). monitor.ip=10.0.0.1
    # (master-election: roster = новый master), quorum=1 (size(1)/2+1=1). master_name=master,
    # redis_version=7.2.4, config (тайминги 5000/60000) — всё из incarnation.state (compute
    # .sentinel_master_name/redis_version/sentinel_directives, day-2 нет input). auth_pass —
    # наш secret/redis/<inc>#password. Единственная community.redis.sentinel в плане.
    - module: community.redis.sentinel
      params_subset:
        addr: "127.0.0.1:26379"
        master_name: master
        auth_pass: detach-redis-pass-16ch
        redis_version: "7.2.4"
        config:
          "sentinel down-after-milliseconds master": "5000"
          "sentinel failover-timeout master": "60000"
        monitor:
          ip: 10.0.0.1
          port: 6379
          quorum: 1

  # seeded_from.detached := true (source_endpoints СОХРАНЯЕТСЯ — merge старого объекта
  # с {detached:true}). Остальной state detach_source не трогает.
  state_changes:
    seeded_from:
      source_endpoints:
        - "10.9.0.1:6379"
        - "10.9.0.2:6379"
      detached: true
