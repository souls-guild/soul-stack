# L0 fail case for detach_source: the incarnation has NOT gone through migrate_cluster.
# seeded_from exists (migration 008_to_009 gives it to every v9 incarnation), but
# source_endpoints is EMPTY: nothing to detach. detach is a routine operational scenario
# (no runnable:false), an operator can run it on a freshly created incarnation; this case
# pins down that such a run ABORTS with a CLEAR assert failure BEFORE the probe, not an
# opaque compute error `index out of bounds: 0` (which a bare source_endpoints[0] would
# produce; see detach_source/main.yml compute.source_master fail-soft + the assert-guard
# in sentinel.yml).
#
# Render-only, hermetic. The dispatcher includes sentinel.yml (state.redis_type=sentinel);
# the first step on that branch is the assert-guard `size(seeded_from.source_endpoints) >= 1`,
# which evaluates to false on an empty list → ErrAssertFailed. expect_render_error catches
# the render abort by a substring of message (mechanism in keeper/internal/trial/case.go,
# NOT expect_validate: validate is input-only per ADR-009, invariants over incarnation.state
# are expressed as an assert task).
name: sentinel detach_source on a never-migrated incarnation aborts with a clear message

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  soulprint:
    network: { primary_ip: 10.0.0.1 }
    os: { arch: amd64 }

  # incarnation.state v9 for a sentinel incarnation that has NEVER gone through
  # migrate_cluster: seeded_from exists (the shape from migration 008_to_009), but
  # source_endpoints is EMPTY. host-layout (conf_dir/data_dir/modules_base_url) was
  # moved into essence (v11→v12); detach_source does NOT read it (no deploy body) →
  # these keys are absent from state v12.
  state:
    redis_type: sentinel
    redis_version: "7.2.4"
    tls:
      enable:   false
      only:     false
      port:     7379
      cert_ref: ""
      key_ref:  ""
      ca_ref:   ""
    redis_config:
      maxmemory:        "256mb"
      maxmemory-policy: allkeys-lru
      save:             "900 1 300 10 60 10000"
      appendonly:       "no"
    redis_users: []
    seeded_from:
      source_endpoints: []
      detached: false

  vault:
    secret/redis/detach_source:
      password: detach-redis-pass-16ch

# assert-guard in sentinel.yml aborts the render BEFORE the probe: source_endpoints is
# empty → size(...) >= 1 == false → ErrAssertFailed with this message (substring match).
expect_render_error: "nothing to detach"
