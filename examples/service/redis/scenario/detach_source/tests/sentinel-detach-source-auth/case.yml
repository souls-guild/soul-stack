# L0-испытание detach_source в режиме sentinel под ЗАЩИЩЁННЫМ источником (v10 прод-фикс).
# Day-2 для инкарнации, залитой migrate_cluster с AUTH+TLS-источником: state.seeded_from
# несёт ССЫЛКИ на учётку источника (source_password_ref/source_tls_ca_ref — Vault-ПУТИ,
# персистнуты migrate_cluster). Финальный offset-gate теперь АУТЕНТИФИЦИРУЕТСЯ к источнику:
# compute.source_password = vault(seeded_from.source_password_ref), source_tls включается
# по наличию CA. ДО v10 detach под AUTH-источником падал коннектом (source_password='') →
# error_locked → полный цикл migrate→detach с защищённым источником был сломан.
#
# ★ Парный кейс sentinel-detach-source — back-compat ветка (seeded_from БЕЗ ref-полей →
# source_password=''). Этот кейс фиксирует НЕПУСТУЮ ветку (ref задан → vault(ref)).
#
# Render-only, герметично. Roster из 1 хоста (новый master). Диспетчер по
# incarnation.state.redis_type → sentinel-ветка раскрывается, cluster group-drop.
#
# Что ассертим (дельта к sentinel-detach-source):
#   1. ФИНАЛЬНЫЙ offset-gate: source_password = old-cluster-source-pass (vault по
#      seeded_from.source_password_ref), source_tls=true + source_tls_ca = PEM источника
#      (vault по seeded_from.source_tls_ca_ref). Источник реально под AUTH+TLS — gate
#      коннектится с учёткой, а не падает.
#   2. REPLICAOF NO ONE (community.redis.detached): локальный addr, наш password.
#   3. SENTINEL MONITOR (community.redis.sentinel) ПОСЛЕ detach (split-brain-фикс).
#   4. state_changes: seeded_from.detached := true, ref'ы СОХРАНЯЮТСЯ (merge старого
#      объекта с {detached:true} — source_endpoints/ref'ы проходят насквозь).
name: sentinel detach_source authenticates the final offset gate to an AUTH+TLS source

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  soulprint:
    network: { primary_ip: 10.0.0.1 }
    os: { arch: amd64 }

  # incarnation.state v10: sentinel-инкарнация, залитая migrate_cluster с ЗАЩИЩЁННЫМ
  # источником. seeded_from несёт ССЫЛКИ на учётку источника (Vault-ПУТИ, не секреты).
  # detached=false (источник ещё привязан) — detach_source выставит true.
  state:
    redis_type: sentinel
    redis_version: "7.2.4"
    conf_dir: /etc/redis
    data_dir: /var/lib/redis
    modules_base_url: "https://artifacts.example.com/redis/modules"
    tls:
      enable:   false
      only:     false
      port:     7379
      cert_ref: ""
      key_ref:  ""
      ca_ref:   ""
    redis_config:
      maxmemory:        "256mb"
      maxmemory-policy: allkeys-lru
      save:             "900 1 300 10 60 10000"
      appendonly:       "no"
    redis_users: []
    redis_sentinel:
      master_name: master
      quorum: 0
      down_after_ms: 5000
      failover_timeout_ms: 60000
    # ★ seeded_from v10: ref'ы на учётку ВНЕШНЕГО источника (Vault-ПУТИ под pattern-guard
    # secret/redis/migrate/*, как персистит migrate_cluster). detach читает их vault()-ом.
    seeded_from:
      source_endpoints:
        - "10.9.0.1:6379"
        - "10.9.0.2:6379"
      detached: false
      source_password_ref: "secret/redis/migrate/oldcluster#password"
      source_tls_ca_ref: "secret/redis/migrate/oldcluster#ca"

  vault:
    secret/redis/detach_source:
      password: detach-redis-pass-16ch
    # ★ Учётка ВНЕШНЕГО источника: значения за ref'ами из state.seeded_from.
    secret/redis/migrate/oldcluster:
      password: old-cluster-source-pass
      ca: |
        -----BEGIN CERTIFICATE-----
        OLD-CLUSTER-SOURCE-CA-PEM
        -----END CERTIFICATE-----

assert:
  task_present:
    # ── ФИНАЛЬНЫЙ offset-gate ПЕРЕД detach — АУТЕНТИФИЦИРОВАН к AUTH+TLS-источнику ──
    # source_password = vault(seeded_from.source_password_ref) = old-cluster-source-pass.
    # source_tls=true (CA-ref непуст), source_tls_ca = vault(seeded_from.source_tls_ca_ref).
    - module: community.redis.offset-synced
      params_subset:
        addr: "127.0.0.1:6379"
        source_addr: "10.9.0.1:6379"
        password: detach-redis-pass-16ch
        source_password: old-cluster-source-pass
        source_tls: true
        source_tls_ca: |
          -----BEGIN CERTIFICATE-----
          OLD-CLUSTER-SOURCE-CA-PEM
          -----END CERTIFICATE-----
        lag_threshold: 0
        skip_checksum: false

    # ── REPLICAOF NO ONE (community.redis.detached) ─────────────────────────────
    - module: community.redis.detached
      params_subset:
        addr: "127.0.0.1:6379"
        password: detach-redis-pass-16ch
        tls: false

    # ── SENTINEL MONITOR (community.redis.sentinel) ПОСЛЕ detach (split-brain-фикс) ──
    - module: community.redis.sentinel
      params_subset:
        addr: "127.0.0.1:26379"
        master_name: master
        auth_pass: detach-redis-pass-16ch
        redis_version: "7.2.4"
        config:
          "sentinel down-after-milliseconds master": "5000"
          "sentinel failover-timeout master": "60000"
        monitor:
          ip: 10.0.0.1
          port: 6379
          quorum: 1

  # seeded_from.detached := true; source_endpoints И ref'ы СОХРАНЯЮТСЯ (merge старого
  # объекта с {detached:true} — историческая запись «откуда + чем» мигрировали).
  state_changes:
    seeded_from:
      source_endpoints:
        - "10.9.0.1:6379"
        - "10.9.0.2:6379"
      detached: true
      source_password_ref: "secret/redis/migrate/oldcluster#password"
      source_tls_ca_ref: "secret/redis/migrate/oldcluster#ca"
