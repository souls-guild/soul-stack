# +==================================================================================+
# | SHARED DEPLOY BODY for a cluster cluster (service-level include, reusable)       |
# +==================================================================================+
# A single deploy of a new Redis Cluster (honest hash-slot, 16384 slots): per-host install +
# render redis.conf (with cluster directives) / users.acl + systemd + PING-gate +
# CLUSTER MEET/ADDSLOTS/REPLICATE (plugin community.redis.cluster, action create,
# run_once on the bootstrap node). Lives at service-level (scenario/<file>) rather than inside
# a single scenario, and is included by consumers by file name: scenario-include resolves
# `scenario/<name>/<file>`, then falls back to `scenario/<file>` (orchestration.md §6,
# include.go). Symmetric to redis-deploy-sentinel.yml - shared body without duplication.
#
#   Consumers (as of 2026-06-27):
#     - scenario/create/cluster.yml - plain deploy of a new empty cluster.
#   (migrate_cluster/cluster.yml - a fail-closed stub until S4: slot-aware seeding of
#    Redis Cluster requires a separate design, the shared body does NOT include it yet.)
#
# ** INCLUDER INVARIANT (manual drift-guard - soul-lint cross-file does NOT catch this) **
#   This file REFERENCES compute.<name> but does NOT declare them (compute: is a top-level
#   scenario block, one per scenario, orchestration.md §2.4; declared in the main.yml
#   of the INCLUDER). Any scenario that includes this file MUST declare in its own
#   compute: the ENTIRE set that the body reads, WITH THE SAME SEMANTICS:
#       redis_config  conf_dir  data_dir  install  modules_base_url  redis_version
#       tls_on  tls_only_on  tls_port  tls_cert_ref  tls_key_ref  tls_ca_ref
#   Also read from the includer's context: input.version (opt., package pin)/
#   input.users (opt.)/input.replicas_per_master (CLUSTER-BUILD replicas_per_shard),
#   essence.system_acl_users/sysctl_settings, incarnation.name (Vault paths),
#   soulprint.hosts (nodes-MAP). Omitting/renaming any compute.<name> in the
#   includer is NOT caught statically (cross-file drift is invisible to soul-lint) - it
#   will surface as a render failure. Source of truth for the set and semantics is create/main.yml::compute.
#
# * ANTI-TILING (boundary between apply.input and the .self template): host-invariant values
#   are resolved via run_once / apply.input (resolveApplyInput takes the first by SID, targeted[0]
#   - correct for a host-invariant value). The per-host cluster-announce-ip is
#   NOT here - it's rendered by destiny `redis` in redis.conf.tmpl from .self.network.primary_ip
#   of EACH host (via apply.input it would lock in the IP of the first node -> cluster-bus
#   would break over NAT/in the cloud). The master/replica role and slot layout is done by the PLUGIN
#   (community.redis.cluster action create) deterministically by sorting nodes keys;
#   scenario only builds the topology-MAP (SID->addr) and calls the plugin run_once on the bootstrap
#   node - it does NOT repeat the translation itself (dividing 16384 across shards), otherwise the two layouts
#   (scenario + plugin) would go out of sync.

# 1. Per-host install + render redis.conf (with cluster directives) + render users.acl +
#    systemd. The same destiny `redis` (mode-agnostic) as sentinel, but the merged config
#    is AUGMENTED with cluster directives on top of the base merge (they're just regular keys of the
#    config-map, destiny ranges over them into redis.conf): cluster-enabled yes / cluster-config-file
#    nodes.conf / cluster-node-timeout (ms). All three are HOST-INVARIANT -> correct to route
#    via apply.input.config (resolved ONCE on the first host by SID, targeted[0]).
#    cluster-announce-ip is DELIBERATELY NOT HERE: a per-host directive (this node's IP), rendered
#    by destiny `redis` in redis.conf.tmpl from {{ .self.network.primary_ip }} under
#    the cluster-enabled gate. compute.redis_config is host-invariant -> apply.input.
- name: Apply redis destiny (cluster install + render redis.conf/users.acl + systemd)
  apply:
    destiny: redis
    input:
      # version: distro pin (package). Binary version is in state from essence.binary_version
      # (compute.redis_version); destiny doesn't install a distro package -> has()-guard ''.
      version:  "${ has(input.version) ? input.version : '' }"
      # install: install method {method, base_url, version} - compute.install from
      # install_method + essence.binary_* (#1). as-is into the destiny dispatcher install.yml.
      install:  "${ compute.install }"
      # conf_dir/data_dir: host layout from essence (#2). compute.conf_dir/data_dir
      # (default = current path, back-compat). HOST-INVARIANT -> apply.input.
      conf_dir: "${ compute.conf_dir }"
      data_dir: "${ compute.data_dir }"
      # * default_admin REDESIGN (2026-06-30): input.password REMOVED (requirepass dropped).
      # Authentication is under the system default_admin, its password comes in via users below.
      # A single compute.redis_config (declared ONCE in the includer's main.yml, ADR-009):
      # the same map that goes into state_changes.redis_config - the "state == live config" drift
      # is eliminated by compute itself. For cluster = base merge + cluster directives (cluster-
      # enabled/config-file/node-timeout) + tls-cluster yes when TLS. HOST-INVARIANT ->
      # apply.input on targeted[0] is correct.
      #
      # * default_admin REDESIGN: STATIC replica->master AUTH in redis.conf - masteruser/
      # masterauth are TOPPED UP into config as REGULAR directives (on top of compute.redis_config).
      # CRITICAL for cluster REPLICAS: the plugin community.redis.cluster (CLUSTER REPLICATE,
      # formCluster) does NOT set masterauth - it only sends REPLICATE master-id. A cluster
      # replica, on FULLSYNC with the master node, passes AUTH ONLY via the static masterauth in
      # redis.conf; without it PSYNC would hit NOAUTH -> master_link_status:DOWN (the same live
      # defect as sentinel replicas have). The directive survives a restart (CONFIG SET is not
      # persisted without REWRITE). Topped up on ALL nodes host-invariantly (one default_admin
      # per cluster) -> apply.input. Failover-safe: Redis applies masteruser/masterauth only
      # when a node becomes a replica - inert on master nodes; with replicas=0 (no replicas)
      # the directive is also inert (nobody is a replica), but rendered symmetrically - without
      # per-replicas branching. * DIFFERENT from state_changes.redis_config (covenant.yml): there
      # it's PURE compute.redis_config WITHOUT masterauth - the password does NOT travel into incarnation.state
      # (the secret lives in Vault). masterauth - vault()-IN-CELL (seal masking, ADR-010 §7.4).
      # admin_user = default_admin (compute.admin_user); path - secret/redis/<inc>/users/
      # default_admin#password.
      config: >-
        ${ merge(compute.redis_config, {
             'masteruser': compute.admin_user,
             'masterauth': vault('secret/redis/' + incarnation.name + '/users/' + compute.admin_user + '#password')
           }) }
      # * SYSTEM + operator-extra (system-ACL-users, design d2 Variant A): service
      # default_admin/replica/monitoring/sentinel/haproxy from essence.system_acl_users
      # FIRST, operator-extra (input.users - AclUser ARRAY, wave 1b) ON TOP (last-wins).
      # * default_admin (redesign) - a SYSTEM user with full access (~* &* +@all), comes
      # from essence.system_acl_users like all others: intra-cluster AUTH runs under it (replaced
      # requirepass-default - which is removed from redis.conf). Without the system users, replication (replica),
      # cluster MEET/REPLICATE (default_admin) and health-check would break. Vault password -
      # secret/redis/<inc>/users/<name>#password. operator-extra: .map(u, {u.name: ...}) (name
      # from the u.name field). Both .map calls yield a LIST of single-key maps, merge(list-of-maps)
      # folds them into one map (templating §2.3); argument order = priority.
      users: >-
        ${ merge(
             merge(default(essence.system_acl_users, {}).map(name, {
               name: {
                 'perms':    essence.system_acl_users[name],
                 'state':    'on',
                 'password': vault('secret/redis/' + incarnation.name + '/users/' + name + '#password')
               }
             })),
             has(input.users)
               ? merge(input.users.map(u, {
                   u.name: {
                     'perms':    u.perms,
                     'state':    u.state,
                     'password': vault('secret/redis/' + incarnation.name + '/users/' + u.name + '#password')
                   }
                 }))
               : {}
           ) }
      # Redis modules - the SET is NO LONGER passed (directive "modules ALWAYS ALL"): destiny
      # deploys the full set from vars.redis_modules itself, the version-guard for Redis 8+ is also
      # in destiny. scenario only supplies the .so source (compute.modules_base_url from essence),
      # host-invariant -> apply.input; destiny builds the archive URL per-host, .so files are downloaded via
      # content idempotency (without verify).
      modules_base_url: "${ compute.modules_base_url }"
      # * SSRF-guard for fetching .so modules: modules_base_url can be an internal Nexus
      # (resolving to RFC1918) -> core.url.fetched blocks private IPs. compute.modules_allow_private
      # (from essence.modules_allow_private, default true). as-is into destiny modules.yml.
      modules_allow_private: "${ compute.modules_allow_private }"
      # Host-tuning extras (role concept), mode-agnostic. THP/logrotate/sysctl
      # are UNCONDITIONAL (Redis recommendation / hardening) - there are no operator flags,
      # destiny `redis` tasks are always active. sysctl_settings - essence, host-invariant -> apply.input.
      sysctl_settings:  "${ default(essence.sysctl_settings, {}) }"
      # TLS - a single dict (enable/only/port + cert_ref/key_ref/ca_ref). HOST-INVARIANT ->
      # apply.input. enable/only/port - compute vars (2 flags tls_enabled/tls_keep_plain
      # + port from essence, #5). cert_ref/key_ref/ca_ref - Vault PATHS (destiny reads the PEM
      # via vault() in the content cell, seal masking); refs come only from essence.tls_*_ref.
      tls:
        enable:   "${ compute.tls_on }"
        only:     "${ compute.tls_only_on }"
        port:     "${ compute.tls_port }"
        cert_ref: "${ compute.tls_cert_ref }"
        key_ref:  "${ compute.tls_key_ref }"
        ca_ref:   "${ compute.tls_ca_ref }"

# 2. Per-host health-gate: PING of the live Redis after start (every node must respond BEFORE
#    building the cluster). community.redis.command, retry/until via retry. addr - localhost
#    (plugin on the redis host), password - keeper-side vault() resolve.
#    * Security (anti-downgrade): tls/tls_ca/port are gated on compute.tls_on (TLS ENABLED), NOT
#    tls_only (TLS enabled -> the plugin MUST use TLS; when tls_only_on=false plain is still open,
#    but an AUTH password over plaintext is unacceptable). addr on compute.tls_port + tls_ca (CA-PEM,
#    vault(ref) at scenario-pass time, sealed by the vault layer).
- name: Wait for each cluster node to answer PING
  module: community.redis.command
  retry: { count: 10, delay: 3s }
  params:
    addr:     "${ compute.tls_on ? '127.0.0.1:' + string(compute.tls_port) : '127.0.0.1:6379' }"
    # * default_admin REDESIGN: AUTH under default_admin (requirepass removed). username +
    # its password come from the new Vault branch. The community.redis plugin passes username into AUTH.
    username: "${ compute.admin_user }"
    password: "${ vault('secret/redis/' + incarnation.name + '/users/' + compute.admin_user + '#password') }"
    tls:      "${ compute.tls_on }"
    tls_ca:   "${ compute.tls_on ? vault(compute.tls_ca_ref) : '' }"
    args:     ["PING"]

# 3. CLUSTER-BUILD - run_once on the bootstrap node. We build the nodes-MAP deterministically from
#    the run roster (soulprint.hosts): key = SID (stable and sortable -> the plugin
#    lays out master/replica by sorting keys deterministically), value =
#    {addr: "<primary_ip>:6379"}. Form merge(list(map)): .map(...) yields a LIST of
#    single-key SID->{addr} maps, merge folds them into one map (templating §2.3).
#    The plugin community.redis.cluster (action create) itself sends CLUSTER MEET/ADDSLOTS/
#    REPLICATE over go-redis and splits the 16384 slots - scenario does NOT translate the topology,
#    it passes it ready-made. * default_admin REDESIGN: connecting to each node - under the ACL user
#    default_admin (requirepass removed). username (-> AUTH) + password from the new Vault branch;
#    the plugin connects to each node under this pair (password is masked, doesn't leak into logs).
#    * Security (anti-downgrade): tls/tls_ca/port for nodes are gated on compute.tls_on (TLS
#    ENABLED), NOT tls_only - TLS enabled -> the plugin MUST connect to nodes over TLS
#    (otherwise the AUTH password to each node would go out as plaintext). addrs are built on
#    compute.tls_port, we pass tls=true + tls_ca (CA-PEM for verify).
#    * mTLS cluster-bus: when tls-cluster is enabled (mutual node authentication) the plugin
#    needs a CLIENT cert - we pass through tls_cert/tls_key (vault(ref) of the same paths as in
#    redis.conf: compute.tls_cert_ref/tls_key_ref). The plugin builds the mTLS pair ONLY when
#    BOTH are set (tls.go: certPEM+keyPEM); without a mutual bus they don't interfere with the handshake.
#    cert/key are host-invariant -> apply.input is correct.
- name: Build the redis cluster (CLUSTER MEET/ADDSLOTS/REPLICATE)
  run_once: true
  module: community.redis.cluster
  params:
    action:             create
    nodes:              "${ merge(soulprint.hosts.map(h, { h.sid: { 'addr': h.network.primary_ip + ':' + (compute.tls_on ? string(compute.tls_port) : '6379') } })) }"
    # plugin-param `replicas_per_shard` - CONTRACT of community.redis.cluster (do not change),
    # sourced from -> unified input.replicas_per_master (replicas per shard).
    replicas_per_shard: "${ int(input.replicas_per_master) }"
    # * EXPLICIT TOPOLOGY (opt.): the operator passes a list of shards [master_sid, replica_sid, ...]
    # (first = master), SID == keys of the nodes-MAP above (h.sid). If set -> the plugin lays out
    # roles BY IT (buildClusterPlanExplicit), ignoring auto-sort. If not set -> [] (the plugin
    # lays out roles by sorting SID itself, backward-compat). replicas_per_shard, when topology
    # is set, only serves as a size check of the composition (the plugin fails on a size mismatch).
    topology: "${ has(input.cluster_topology) ? input.cluster_topology : [] }"
    username:           "${ compute.admin_user }"
    password:           "${ vault('secret/redis/' + incarnation.name + '/users/' + compute.admin_user + '#password') }"
    tls:                "${ compute.tls_on }"
    tls_ca:             "${ compute.tls_on ? vault(compute.tls_ca_ref) : '' }"
    tls_cert:           "${ compute.tls_on ? vault(compute.tls_cert_ref) : '' }"
    tls_key:            "${ compute.tls_on ? vault(compute.tls_key_ref) : '' }"
