# L0-испытание (Trial, ADR-023) сценария restart_node_exporter.
#
# Render-only, герметично. Лёгкий ассерт: одна задача core.service.restarted с
# именем юнита node_exporter (destiny node-exporter). Ловит регресс имени юнита и
# факт отсутствия state-мутации.
name: restart_node_exporter restarts node_exporter unit

# apply:destiny здесь нет — default_destiny_source не нужен.
fixtures: {}

assert:
  rendered_tasks:
    - index: 0
      module: core.service.restarted
      params:
        name: node_exporter
