# ★★ ВРЕМЕННЫЙ ДУБЛИКАТ (S1-пилот migrate_cluster, под замену) ★★
# Это КОПИЯ тела create/sentinel.yml — деплой нового кластера в режиме sentinel (install
# + render redis.conf/users.acl/sentinel.conf + systemd + внутрикластерная репликация +
# SENTINEL MONITOR + health-gates). migrate_cluster/sentinel.yml инклудит ЭТОТ файл, а не
# create/sentinel.yml напрямую: scenario-include резолвит только sibling-имя (local →
# service-level), cross-scenario путь рвёт парс (name_invalid_format). Правильный путь без
# дубликата — вынести деплой create на service-level и сослаться из обоих сценариев; это
# правка работающего create, оставлена как РАЗВИЛКА для PM/architect (см. отчёт делегации).
# До выноса этот файл обязан оставаться синхронным с create/sentinel.yml (drift-guard
# руками; источник истины — create/sentinel.yml). Ссылается на compute.* из
# migrate_cluster/main.yml (redis_config/tls_*/sentinel_directives + conf_dir/data_dir/
# install/modules_base_url — те же имена, что в create/main.yml).
#
# master-election: probe НЕВОЗМОЖЕН на create-фазе (redis ещё не поднят) → роль DECLARED:
# первый по SID хост (soulprint.hosts[0]) = master. soulprint.hosts отсортирован по SID.

# 1. Per-host install + render redis.conf + users.acl + sentinel.conf + units.
- name: Apply redis destiny (install + render redis.conf/users.acl/sentinel.conf + systemd)
  apply:
    destiny: redis
    input:
      version:  "${ has(input.version) ? input.version : '' }"
      install:  "${ compute.install }"
      conf_dir: "${ compute.conf_dir }"
      data_dir: "${ compute.data_dir }"
      password: "${ vault('secret/redis/' + incarnation.name + '#password') }"
      config: "${ compute.redis_config }"
      users: >-
        ${ merge(
             merge(default(essence.system_acl_users, {}).map(name, {
               name: {
                 'perms':    essence.system_acl_users[name],
                 'state':    'on',
                 'password': vault('secret/redis/' + incarnation.name + '/users/' + name + '#password')
               }
             })),
             has(input.users)
               ? merge(input.users.map(u, {
                   u.name: {
                     'perms':    u.perms,
                     'state':    u.state,
                     'password': vault('secret/redis/' + incarnation.name + '/users/' + u.name + '#password')
                   }
                 }))
               : {}
           ) }
      sentinel_users: >-
        ${ merge(default(essence.system_acl_users_sentinel, {}).map(name, {
             name: {
               'perms':    essence.system_acl_users_sentinel[name],
               'state':    'on',
               'password': (name == 'default')
                 ? vault('secret/redis/' + incarnation.name + '#password')
                 : vault('secret/redis/' + incarnation.name + '/users/' + name + '#password')
             }
           })) }
      modules_base_url: "${ compute.modules_base_url }"
      sysctl_settings:  "${ default(essence.sysctl_settings, {}) }"
      tls:
        enable:   "${ compute.tls_on }"
        only:     "${ compute.tls_only_on }"
        port:     "${ compute.tls_port }"
        cert_ref: "${ compute.tls_cert_ref }"
        key_ref:  "${ compute.tls_key_ref }"
        ca_ref:   "${ compute.tls_ca_ref }"
      sentinel_enabled: true
      sentinel:
        master_name: "${ default(essence.sentinel_master_name, 'master') }"
        master_ip:   "${ soulprint.hosts[0].network.primary_ip }"
        master_port: 6379
        quorum:      "${ int(size(soulprint.hosts)) / 2 + 1 }"
        auth_pass:   "${ vault('secret/redis/' + incarnation.name + '#password') }"
        config:      "${ compute.sentinel_directives }"

# 2. Health-gate per-host: PING живого Redis после старта.
- name: Wait for each redis node to answer PING
  module: community.redis.command
  retry: { count: 10, delay: 3s }
  params:
    addr:     "${ compute.tls_on ? '127.0.0.1:' + string(compute.tls_port) : '127.0.0.1:6379' }"
    password: "${ vault('secret/redis/' + incarnation.name + '#password') }"
    tls:      "${ compute.tls_on }"
    tls_ca:   "${ compute.tls_on ? vault(compute.tls_ca_ref) : '' }"
    args:     ["PING"]

# 3. REPLICAOF реплик ВНУТРИ нового кластера (community.redis.replica ТОЛЬКО на репликах).
#    master НЕ реплицирует сам себя: where исключает master по SID.
- name: Make replicas follow the elected master (REPLICAOF)
  where: "soulprint.self.sid != soulprint.hosts[0].sid"
  module: community.redis.replica
  params:
    addr:        "${ compute.tls_on ? '127.0.0.1:' + string(compute.tls_port) : '127.0.0.1:6379' }"
    master_addr: "${ soulprint.hosts[0].network.primary_ip + ':' + (compute.tls_on ? string(compute.tls_port) : '6379') }"
    password:    "${ vault('secret/redis/' + incarnation.name + '#password') }"
    tls:         "${ compute.tls_on }"
    tls_ca:      "${ compute.tls_on ? vault(compute.tls_ca_ref) : '' }"

# 4. SENTINEL MONITOR reconcile на КАЖДОМ хосте.
- name: Configure each sentinel to monitor the elected master (SENTINEL MONITOR)
  module: community.redis.sentinel
  params:
    addr:        "127.0.0.1:26379"
    master_name: "${ default(essence.sentinel_master_name, 'master') }"
    auth_pass:   "${ vault('secret/redis/' + incarnation.name + '#password') }"
    redis_version: "${ compute.redis_version }"
    config:      "${ compute.sentinel_directives }"
    monitor:
      ip:     "${ soulprint.hosts[0].network.primary_ip }"
      port:   6379
      quorum: "${ int(size(soulprint.hosts)) / 2 + 1 }"

# 5. Health-gate per-host: SENTINEL отвечает PONG на :26379.
- name: Wait until each sentinel answers PONG on :26379
  module: community.redis.command
  changed_when: false
  retry:
    count: 12
    delay: 2s
    until: "register.self.result == 'PONG'"
  failed_when: "register.self.result != 'PONG'"
  params:
    addr: "127.0.0.1:26379"
    args: ["PING"]
