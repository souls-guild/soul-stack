name: migrate_cluster
description: >-
  S1-пилот: РАЗВЕРНУТЬ новый Redis-кластер И ЗАЛИТЬ в него данные с ВНЕШНЕГО
  (старого) кластера через нативную репликацию Redis (REPLICAOF на внешний
  источник). Create-сценарий (create: true) — поднимает инфраструктуру с нуля,
  как `create`, но дополнительно подключает свежий master к внешнему источнику и
  ждёт, пока реплика догонит его по offset (gate). Источник остаётся ЖИВ —
  отцепление (REPLICAOF NO ONE) выполняет отдельный day-2 `detach_source` ПОСЛЕ
  того, как оператор остановит запись в старый кластер.

  ДИСПЕТЧЕР ПО redis_type (как create): этот файл — диспетчер. Реализованы ОБЕ ветки:
    - sentinel (migrate_cluster/sentinel.yml) — миграция master-replica + sentinel
      через нативный REPLICAOF на внешний источник + offset-gate (поток ниже). Источник
      остаётся ЖИВ; отцепление — отдельный day-2 detach_source.
    - cluster (migrate_cluster/cluster.yml, B3-поток S4-3b) — слот-aware миграция honest
      hash-slot Redis Cluster: joinable-деплой новых нод → join-external (реплики старых
      мастеров 1:1) → failover-takeover (промоушен новых в мастера) → forget-external
      (выкинуть старые ноды). АТОМАРНА в migrate-фазе → detach НЕ нужен (seeded_from
      .detached сразу true). Операционные предусловия cluster-bus/выровненный пароль/
      graceful failover — на операторе (см. шапку migrate_cluster/cluster.yml).
  enum redis_type [sentinel, cluster] гарантирует попадание ровно в одну ветку.

  Поток sentinel-ветки (migrate_cluster/sentinel.yml):
    1. include redis-deploy-sentinel.yml — поднять НОВЫЙ кластер (install + redis.conf +
       users.acl + sentinel.conf + units + REPLICAOF между своими нодами + SENTINEL
       MONITOR + health-gates). ОБЩЕЕ деплой-тело service-level (scenario/redis-deploy-
       sentinel.yml), которое делит create/sentinel.yml — дубликата нет (scenario-include
       фоллбэкает имя файла на service-level, orchestration.md §6).
    2. свежий master реплицирует ВНЕШНИЙ источник (community.redis.replica с
       source_external: true) — нативная репликация Redis тянет dataset из старого
       кластера.
    3. offset-lag gate (community.redis.offset-synced, retry/until) — БЛОКИРУЮЩЕ
       ждёт, пока новый master догонит источник по репликационному offset (в
       пределах lag_threshold). Только после этого прогон считается успешным.

  ★ ГРАНИЦА (НЕ ВХОДИТ): квиес записи в СТАРЫЙ кластер. Soul Stack НЕ управляет
  клиентским трафиком приложений — остановку записи в источник перед финальным
  detach делает САМ ОПЕРАТОР. Этот сценарий лишь поднимает реплику и догоняет
  offset; данные, записанные в источник ПОСЛЕ offset-snapshot detach_source, будут
  потеряны, если оператор не остановил запись (см. detach_source).

  Пароли НЕ во входном контракте сервиса (secret/redis/<incarnation>#password,
  keeper-side vault() в render-фазе, ADR-012). ИСКЛЮЧЕНИЕ — учётка ВНЕШНЕГО
  источника: его Vault-ПУТЬ (НЕ значение) задаёт оператор в input.source.password_ref
  под жёстким pattern-guard secret/redis/migrate/* (см. input ниже) — источник чужой,
  его секрет не лежит по нашей конвенции secret/redis/<inc>.

# ── Входной контракт оператора (docs/input.md) ────────────────────────────────
# Наследует ВЕСЬ create-контракт (redis_type/version/install_method/memory_mb/io_threads/
# persistence/maxmemory_policy/replicas_per_master/shards/cluster_node_timeout/
# sentinel_settings/sentinel_master_settings/users/redis_settings/connection_mode) —
# миграция поднимает новый кластер ТОЙ ЖЕ формы, что обычный create. Поля create
# скопированы as-is (scenario.input — inline per-scenario, общего include-контракта нет),
# СИНХРОНИЗИРОВАНЫ с редизайном create/main.yml: version — enum выкаченных в Nexus сборок;
# install_method дефолт binary; connection_mode-enum вместо tls_enabled/tls_keep_plain;
# 6-enum persistence; io_threads; per-master/глобальные sentinel-dicts вместо именованных
# таймингов. НОВОЕ (migrate-специфика) — две секции: source (внешний источник) и verify
# (параметры offset-gate). ★ cluster_topology create-поля тут НЕТ намеренно: cluster-
# MIGRATION-пилот (B3) переносит только мастера (replica-guard replicas_per_master=0,
# cluster.yml) — явная раскладка шардов с репликами вне пилота.
input:
  # ── create-наследие ──────────────────────────────────────────────────────────
  redis_type:
    type: string
    required: false
    default: sentinel
    enum: [sentinel, cluster]
    description: >-
      Режим развёртывания нового кластера (как create). S1-пилот реализует только
      sentinel; cluster — заглушка-fail (S4).

  # ── version: фикс-enum БИНАРНЫХ версий Redis (Nexus, как create) ──────────────
  # ★ Редизайн input-контракта (синхрон с create/main.yml): version — ENUM
  # фиксированных upstream-версий из Nexus (install_method=binary по умолчанию качает
  # ИМЕННО эти бинари). Прежний свободный pattern distro-пина заменён закрытым списком.
  # required (нужна ВСЕГДА: binary — дефолтный способ, версия определяет путь к бинарю;
  # package-ветка ставит =version-пин тем же enum). Поднимаем новый кластер той же формы,
  # что create — список версий ОБЯЗАН совпадать с create/main.yml::input.version.
  version:
    type: string
    required: true
    enum: ["8.6.1", "8.4.0", "8.2.2", "8.0.3", "7.4.1", "6.2.21"]
    description: >-
      Версия Redis (фиксированный набор бинарей из Nexus, как create). Выбери одну из
      выкаченных версий: install_method=binary (default) качает бинари redis-server/
      redis-cli/redis-benchmark этой версии из Nexus; install_method=package ставит
      =version-пин. Список закрыт — произвольная версия не принимается.

  install_method:
    type: string
    required: false
    default: binary
    enum: [package, binary]
    description: >-
      Способ установки redis нового кластера (как create). binary (DEFAULT) — бинари из
      Nexus (essence.binary_base_url + input.version); package — distro-пакет
      (=version-пин). URL бинаря — author-context (essence.binary_base_url), не input.

  memory_mb:
    type: integer
    required: false
    min: 64
    description: >-
      Бюджет памяти под Redis на хосте, МБ (как create). maxmemory вычисляется как доля
      от него (essence.memory_reserve_percent), целочисленное усечение. min:64 не
      случаен: при слишком малом memory_mb усечение даёт "0mb" = БЕЗ лимита (обратное
      намерению). Не задан → maxmemory из merge-подложки essence.redis_config.

  # io_threads: число I/O-потоков redis (директива io-threads, как create). default 0 =
  # однопоточный I/O. compute.redis_config пишет io-threads ТОЛЬКО при >0 (has-guard).
  io_threads:
    type: integer
    required: false
    default: 0
    min: 0
    description: >-
      Число I/O-потоков Redis (директива io-threads, как create). 0 (дефолт) —
      однопоточный I/O (директива не пишется). >0 — Redis распараллеливает обработку
      сокетов по N потокам. Пишется в redis.conf только при >0.

  persistence:
    type: string
    required: false
    default: rdb
    enum: [off, aof_1sec, aof_always, rdb, rdb_aof_1sec, rdb_aof_always]
    description: >-
      Режим persistence (как create). Транслируется в save/appendonly/appendfsync через
      essence.persistence_presets[persistence]. off — без сохранения; aof_1sec/aof_always
      — только AOF (fsync everysec / always); rdb — только снапшоты; rdb_aof_1sec/
      rdb_aof_always — снапшоты + AOF (двойная durability).

  maxmemory_policy:
    type: string
    required: false
    enum:
      - noeviction
      - allkeys-lru
      - allkeys-lfu
      - allkeys-random
      - volatile-lru
      - volatile-lfu
      - volatile-random
      - volatile-ttl
    description: Политика вытеснения (как create).

  # ── Реплики на master (UNIFIED, оба режима, как create) ──────────────────────
  # ОДНО поле на оба режима: реплик на каждый master. cluster — реплик на шард (roster
  # = shards*(1+replicas_per_master)); sentinel — реплик master-а (roster =
  # 1+replicas_per_master). default 2 / max 8 — синхрон с create/main.yml.
  replicas_per_master:
    type: integer
    required: false
    default: 2
    min: 0
    max: 8
    description: >-
      Реплик на каждый master нового кластера (как create). cluster — реплик на шард
      (roster = shards*(1+replicas_per_master)); sentinel — реплик master-а (roster =
      1+replicas_per_master). default 2 (HA-набор). 0 — без реплик. Потолок max:8.
      ★ cluster-MIGRATION-пилот (B3) принимает только replicas_per_master=0 (replica-
      guard cluster.yml) — реплики в новом кластере при миграции пока не переносятся.

  shards:
    type: integer
    required: false
    required_when: "input.redis_type == 'cluster'"
    min: 3
    description: >-
      Число master-шардов Redis Cluster (режим cluster, как create). 16384 hash-слота
      делятся поровну между shards мастерами. min:3 — нижний предел honest Redis Cluster.
      Размер roster-а обязан быть shards*(1+replicas_per_master) (size-guard cluster.yml).
      Обязателен при redis_type=cluster (required_when).

  cluster_node_timeout:
    type: integer
    required: false
    default: 5000
    min: 1
    description: Таймаут gossip между нодами кластера, мс (cluster).

  # ── sentinel_master_settings: per-master директивы Sentinel (dict, как create) ─
  # ★ ПОГЛОЩАЕТ прежние именованные поля sentinel_down_after_ms/sentinel_failover_timeout_ms
  # (синхрон с create/main.yml): их дефолты down-after-milliseconds=5000/failover-timeout=
  # 60000 переехали в essence.sentinel_master_defaults — подложку под этот dict. KEY →
  # VALUE: ключ — имя per-master sentinel-опции БЕЗ префикса `sentinel ` и БЕЗ master-name
  # (compute добавляет), значение — строка. compute.sentinel_directives мержит essence-
  # дефолты + этот dict и разворачивает в `sentinel <opt> <master>` (та же форма, что
  # create — деплой-тело redis-deploy-sentinel.yml читает обобщённый compute.sentinel_directives).
  sentinel_master_settings:
    type: object
    required: false
    description: >-
      Per-master директивы Sentinel нового кластера (key→value, строки; режим sentinel,
      как create). Ключ — имя опции SENTINEL SET без префикса и master-name
      (down-after-milliseconds, failover-timeout, parallel-syncs, …). Перекрывают дефолты
      essence.sentinel_master_defaults (down-after-milliseconds=5000, failover-timeout=60000).
      UI — KEY→VALUE-редактор.
    properties: {}
    additional_properties:
      type: string

  # ── sentinel_settings: глобальные (НЕ per-master) директивы sentinel.conf (как create) ─
  # KEY → VALUE passthrough, сливается в apply.input.sentinel.config ВМЕСТЕ с per-master
  # директивами (compute.sentinel_directives, обобщён симметрично create). Для глобальных
  # sentinel-директив (resolve-hostnames, announce-port, …), не покрытых sentinel_master_settings.
  sentinel_settings:
    type: object
    required: false
    description: >-
      Глобальные passthrough-директивы sentinel.conf нового кластера (key→value, строки;
      режим sentinel, как create). Сливаются в sentinel.conf вместе с per-master
      директивами. Для директив не покрытых sentinel_master_settings. UI — KEY→VALUE-редактор.
    properties: {}
    additional_properties:
      type: string

  users:
    type: array
    required: false
    items:
      $type: AclUser
    description: ACL-пользователи Redis нового кластера (массив AclUser, как create).

  redis_settings:
    type: object
    required: false
    description: Passthrough-директивы redis.conf (key→value, как create).
    properties: {}
    additional_properties:
      type: string

  # ── connection_mode: режим сетевого канала Redis (enum, как create) ──────────
  # ★ Редизайн (синхрон с create/main.yml): прежние tls_enabled+tls_keep_plain сведены к
  # ОДНОМУ enum-полю:
  #   - plain     — только plain-порт 6379 (TLS off), DEFAULT;
  #   - tls_plain — TLS И plain слушаются одновременно;
  #   - tls       — только TLS (plain закрыт, `port 0`).
  # Маппинг в compute: tls_on = connection_mode != 'plain'; tls_only_on = connection_mode
  # == 'tls'. enum СТРУКТУРНО исключает «нет ни одного listener-а» → прежнее validate-
  # правило «хотя бы один listener» удалено (см. validate ниже). Порт/Vault-пути cert/key/ca
  # — НЕ операторский ввод (essence.tls_port/tls_cert_ref/tls_key_ref/tls_ca_ref).
  connection_mode:
    type: string
    required: false
    default: plain
    enum: [tls, tls_plain, plain]
    description: >-
      Режим сетевого канала Redis нового кластера (как create). plain (дефолт) — только
      plain-порт 6379 (TLS off); tls_plain — TLS и plain одновременно; tls — только TLS
      (plain-порт закрыт, port 0). Порт TLS и Vault-пути cert/key/ca — из essence.

  # ── cloud-provision: поднять VM под топологию ПЕРЕД миграцией (ADR-061, как create) ─
  # ★ Наследие create-контракта (scenario.input — inline per-scenario, общего include
  # нет): схема скопирована as-is из create/main.yml::input.provision. Когда задан и
  # enabled=true — migrate_cluster ОДНИМ прогоном (а) создаёт VM через core.cloud.created,
  # (б) доставляет per-VM bootstrap-токен, (в) регистрирует созданные SID + БЛОКИРУЮЩЕ
  # ждёт онбординга (await_online + refresh_soulprint, ADR-061), после чего roster
  # пере-резолвится и деплой+миграция (redis-deploy-sentinel.yml + seed-шаги) катятся на
  # уже-online хосты. Не задан / enabled=false → миграция по СУЩЕСТВУЮЩЕМУ roster-у
  # (поведение S1-пилота бит-в-бит). Общее provision-тело — service-level
  # scenario/redis-provision.yml (то же, что инклудит create/main.yml).
  #
  # ★ node_count тут НЕТ намеренно: число VM выводится из ТОПОЛОГИИ (как create) —
  # единственный источник истины размера кластера. ★ teardown (destroy) — НЕ здесь.
  provision:
    type: object
    required: false
    description: >-
      Поднять VM под топологию ПЕРЕД миграцией в том же прогоне (ADR-061, как create).
      enabled=true → сначала cloud-create + онбординг (барьер await_online), потом
      деплой нового кластера + заливка с внешнего источника. Не задан / enabled=false →
      миграция по существующему roster-у.
    additional_properties: false
    properties:
      enabled:
        type: boolean
        default: false
        description: Главный гейт provision. false (или секция опущена) — provision-тело placeholder-skip.
      provider:
        type: string
        description: Имя cloud-Provider в реестре providers (NOT plugin name → soul-cloud-<provider>).
      profile:
        type: string
        description: Имя VM-профиля в реестре profiles (ресурсы/образ/сеть VM).
      await_timeout:
        type: string
        pattern: "^[0-9]+[smh]$"
        description: >-
          Верхняя граница ожидания онбординга созданных VM (барьер await_online,
          ADR-061; форма <N>{s|m|h}). Не задан → essence.provision_await_timeout (дефолт
          10m). Ограничен сверху keeper.yml::max_await_timeout.
      ssh_provider:
        type: string
        description: >-
          Имя SshProvider-плагина (keeper.yml::plugins.ssh_providers[].name) для
          доставки per-VM bootstrap-токена по SSH (core.bootstrap.delivered, ADR-063).

  # ── source: внешний (старый) кластер — ОТКУДА мигрируем ────────────────────────
  # Координаты и учётка ВНЕШНЕГО источника. password_ref/tls_ca_ref — Vault-ПУТИ (НЕ
  # значения): сценарий читает их авторским каналом ${ vault(input.source.<ref>) } в
  # render-фазе (templating.md §2.3/§4). ★ pattern-guard secret/redis/migrate/* — ОБА
  # ref ОБЯЗАНЫ лежать под этим префиксом: оператор не может навести vault() на
  # произвольный путь своего Keeper-токена (closes path-injection caveat templating.md
  # §4 — статический запрет input-производных vault()-путей). Это НЕ vault_scope
  # (тот резолвит vault:-ЗНАЧЕНИЕ в input keeper-side ДО валидации, docs/input.md) —
  # здесь оператор даёт ПУТЬ-строку, а читает сценарий сам (авторский канал).
  source:
    type: object
    required: true
    additional_properties: false
    properties:
      hosts:
        type: array
        items:
          type: string
        description: >-
          host:port внешних нод старого кластера. hosts[0] — master источника
          (откуда новый кластер реплицирует dataset).
      password_ref:
        type: string
        # ★ pattern: добавлен `#` в символ-класс (к ТЗ-форме [A-Za-z0-9._/-]) — Vault-ref
        # несёт field-суффикс через `#` (secret/redis/migrate/oldcluster#password, как вся
        # redis-конвенция secret/redis/<inc>#password); без `#` валидный ref реджектился бы.
        # Anchor ^secret/redis/migrate/ СОХРАНЁН — path-injection guard не ослаблен (оператор
        # заперт в этом префиксе, навести vault() на secret/keeper/* нельзя).
        pattern: "^secret/redis/migrate/[A-Za-z0-9._/#-]+$"
        description: >-
          Vault-ПУТЬ к паролю учётки ВНЕШНЕГО источника (НЕ значение). Под жёстким
          pattern secret/redis/migrate/* (path-injection guard; `#field`-суффикс
          допускается). Сценарий читает его через vault(input.source.password_ref) в
          render-фазе; на хост уезжает уже значение (ADR-012). Не задан → источник без
          AUTH (пустой пароль).
      tls_ca_ref:
        pattern: "^secret/redis/migrate/[A-Za-z0-9._/#-]+$"
        type: string
        description: >-
          Vault-ПУТЬ к PEM CA для проверки TLS-сертификата ВНЕШНЕГО источника (НЕ
          значение). Тот же pattern-guard (`#field`-суффикс допускается). Читается через
          vault() при source.tls=true.
      tls:
        type: boolean
        default: false
        description: >-
          Коннектиться к внешнему источнику по TLS. true → реплика и offset-probe
          идут на источник по TLS, CA берётся из tls_ca_ref.

  # ── verify: параметры offset-lag gate ────────────────────────────────────────
  # Условие «реплика догнала источник». lag_threshold — допустимое отставание
  # master_repl_offset (0 = полная синхронизация). skip_checksum — пропустить дорогую
  # сверку контрольной суммы dataset (плагин offset-synced решает, как именно).
  verify:
    type: object
    required: false
    additional_properties: false
    properties:
      lag_threshold:
        type: integer
        default: 0
        description: >-
          Допустимое отставание реплики от источника по репликационному offset
          (байт). 0 (дефолт) — требовать полную синхронизацию (offset совпал).
      skip_checksum:
        type: boolean
        default: false
        description: >-
          Пропустить сверку контрольной суммы dataset в offset-gate (быстрее, но
          слабее гарантия). По умолчанию false (сверять).

# ── Декларативные input-инварианты (validate:, как create) ────────────────────────
# INPUT-ONLY (essence/soulprint недоступны — структурный CEL-барьер).
validate:
  # ★ Редизайн (синхрон с create): правило «хотя бы один listener» УДАЛЕНО. Прежде на 2
  # булевых галочках (tls_enabled/tls_keep_plain) была возможна комбинация «TLS off + plain
  # закрыт» — без listener-а; ловилась этим validate. Теперь connection_mode — enum [tls,
  # tls_plain, plain]: КАЖДОЕ значение оставляет ≥1 listener → «нет listener-а» СТРУКТУРНО
  # невыразимо, отдельное правило не нужно.

  # create-инвариант: имя operator-extra ACL-юзера не может занять служебное.
  - that: "!has(input.users) || input.users.all(u, !(u.name in ['default', 'replica', 'monitoring', 'sentinel', 'haproxy']))"
    message: "имя ACL-пользователя зарезервировано за служебным (default/replica/monitoring/sentinel/haproxy): выбери другое имя — служебные юзеры заводятся автоматически из essence"

  # ★ source.hosts непуст: миграция без источника бессмысленна. source.hosts[0] —
  # master источника (sentinel.yml читает его first-by-index). Пустой массив прошёл бы
  # required:true секции, но дал бы no-such-index при резолве source_master.
  - that: "size(input.source.hosts) >= 1"
    message: "source.hosts должен содержать хотя бы один host:port внешнего источника (source.hosts[0] = master старого кластера, откуда тянется dataset)"

# ── Вычисляемые scenario-vars (compute:) ─────────────────────────────────────────
# Рун-уровневый контекст (input/essence/incarnation — БЕЗ soulprint). compute.redis_config
# и сопутствующие — ТОТ ЖЕ перевод простого ввода в redis.conf, что в create/main.yml
# (нужен общему деплой-телу redis-deploy-sentinel.yml для render redis.conf И state_changes
# ниже). Скопирован as-is из create (scenario.compute inline per-scenario; миграция
# поднимает кластер той же формы). ★ compute: — top-level scenario-блок (orchestration.md
# §2.4): объявляется ОДИН раз ЗДЕСЬ (не в sentinel.yml-ветке — там только tasks) и виден
# как compute.<name> во ВСЕХ ветках. source-специфичные vars (source_master/source_password/
# source_tls_ca) объявлены тут же — их читает migrate_cluster/sentinel.yml.
#
# ★★ ИНВАРИАНТ инклудящего (redis-deploy-sentinel.yml шапка): этот compute: ОБЯЗАН
# объявлять ВЕСЬ набор, который общее деплой-тело читает — redis_config/conf_dir/data_dir/
# install/modules_base_url/sentinel_directives/redis_version/tls_on/tls_only_on/tls_port/
# tls_cert_ref/tls_key_ref/tls_ca_ref — С ТОЙ ЖЕ СЕМАНТИКОЙ, что create/main.yml::compute.
# Пропуск/переименование любого НЕ ловится soul-lint (cross-file дрейф невидим) — проявится
# падением render. Источник истины набора — create/main.yml::compute.
compute:
  # ── Внешний (старый) источник: координаты + секреты учётки ─────────────────────
  # source_master — master ВНЕШНЕГО кластера (hosts[0]), к которому привязывается
  # свежий master нового кластера (REPLICAOF на внешний). source_password/source_tls_ca
  # — авторский канал vault() по ПУТИ из operator-input (input.source.password_ref/
  # tls_ca_ref под pattern-guard secret/redis/migrate/*; path-injection закрыт паттерном,
  # templating.md §4). password_ref опционален → has()-guard, иначе '' (источник без AUTH);
  # tls_ca читается ТОЛЬКО при source.tls=true. Резолв keeper-side, значение маскируется.
  source_master:   "${ input.source.hosts[0] }"
  source_password: "${ has(input.source.password_ref) ? vault(input.source.password_ref) : '' }"
  source_tls_ca:   "${ input.source.tls ? vault(input.source.tls_ca_ref) : '' }"
  # ── Эффективная версия redis: input.version (enum выкаченных в Nexus сборок) ──────
  # ★ Редизайн (синхрон с create): version — required enum, ОДИН для обоих способов
  # установки (binary качает бинари этой версии из Nexus; package ставит =version-пин).
  # Прежний legacy-каскад «binary → essence.binary_version» УБРАН — версия всегда
  # операторская input.version. required:true гарантирует присутствие → голый input.version.
  redis_version: "${ input.version }"
  redis_modules_deployed: >-
    ${ compute.redis_version.matches('^([0-9]+:)?(8|9|[1-9][0-9])\\.')
         ? []
         : ['bloom', 'json', 'search', 'timeseries'] }
  modules_base_url: "${ default(essence.modules_base_url, '') }"
  # ★ SSRF-guard для fetch .so модулей (синхрон с create): modules_base_url может быть
  # внутренним Nexus (resolve в RFC1918) → .so-fetch destiny упал бы на SSRF-guard core.url.
  # Из essence.modules_allow_private (дефолт true). Общее деплой-тело redis-deploy-*.yml
  # читает его в apply.input.modules_allow_private — ИНВАРИАНТ инклудящего (этот compute
  # ОБЯЗАН его объявить, иначе render деплой-тела падает no-such-key).
  modules_allow_private: "${ default(essence.modules_allow_private, true) }"
  # ── Per-master + глобальные sentinel-директивы (обобщённый dict, синхрон с create) ──
  # ★ Прежде хардкодило ровно 2 директивы (down-after-milliseconds/failover-timeout) из
  # удалённых именованных полей. Теперь ОБОБЩЕНО ТОЧНО как create/main.yml::compute.
  # sentinel_directives: per-master опции — dict input.sentinel_master_settings ПОВЕРХ
  # дефолтов essence.sentinel_master_defaults (down-after-milliseconds=5000/failover-timeout=
  # 60000), .map() разворачивает каждую пару в `sentinel <opt> <master>`; глобальные
  # input.sentinel_settings сливаются СЮДА ЖЕ (plain-ключи). ОДИН source-of-truth, ту же
  # форму читает общее деплой-тело redis-deploy-sentinel.yml (apply.input.sentinel.config).
  sentinel_directives: >-
    ${ merge(
         merge(
           merge(
             default(essence.sentinel_master_defaults, {}),
             default(input.sentinel_master_settings, {})
           ).map(k, {
             'sentinel ' + k + ' ' + default(essence.sentinel_master_name, 'master'): string(merge(
               default(essence.sentinel_master_defaults, {}),
               default(input.sentinel_master_settings, {})
             )[k])
           })
         ),
         default(input.sentinel_settings, {})
       ) }
  # ── sentinel_monitor_now=false: НЕ мониторить master во время заливки (split-brain-фикс) ──
  # ★ КОНТРАКТ-ФЛАГ шага 4 деплой-тела (redis-deploy-sentinel.yml: проксируется в task-var и
  # гейтится when: vars.sentinel_monitor_now; через task-var, т.к. flow-control when не видит
  # compute.* напрямую). При миграции MONITOR ОТКЛАДЫВАЕТСЯ: к моменту деплоя новый master ещё НЕ привязан к
  # внешнему источнику (REPLICAOF external — шаг 2 ниже, ПОСЛЕ include деплой-тела), а
  # начавшаяся заливка переводит master в role:slave на время синка (> down-after 5с). Если
  # бы sentinel замониторил его сразу, он увидел бы свой «master» как slave и инициировал
  # failover → split-brain/разрыв заливки. Поэтому здесь false (sentinel-демоны поднимаются
  # деплой-телом, но команду MONITOR НЕ дают) — фактический MONITOR делает detach_source/
  # sentinel.yml ПОСЛЕ REPLICAOF NO ONE, когда новый master снова автономен. На create этот
  # флаг=true (node-1 остаётся настоящим master). См. шапку redis-deploy-sentinel.yml.
  sentinel_monitor_now: "${ false }"
  # ── install: destiny-структура {method, base_url, version, allow_private} (синхрон с create) ─
  # ★ Собирается из install_method (enum, дефолт binary) + essence.binary_base_url (URL —
  # author-context) + input.version (версия — операторский enum выкаченных в Nexus сборок).
  # Прежний legacy `version: essence.binary_version` УБРАН — версия всегда input.version.
  # destiny строит per-host путь <base_url>/<arch>/Debian/<distro_ver>/<version>/redis-*.
  # ★ allow_private (синхрон с create): SSRF-guard core.url для fetch бинарей — дефолтный
  # binary_base_url внутренний Nexus (resolve в RFC1918). Из essence.binary_allow_private
  # (дефолт true). Публичный-mirror-деплой ставит false в spec.essence.
  install: >-
    ${ (input.install_method == 'binary')
         ? {
             'method':        'binary',
             'base_url':      default(essence.binary_base_url, ''),
             'version':       input.version,
             'allow_private': default(essence.binary_allow_private, true)
           }
         : { 'method': 'package' } }
  conf_dir: "${ default(essence.conf_dir, '/etc/redis') }"
  data_dir: "${ default(essence.data_dir, '/var/lib/redis') }"
  # ── TLS-флаги: из connection_mode enum (синхрон с create) ────────────────────
  # ★ TLS-намерение — ОДНО enum-поле connection_mode (default → ВСЕГДА присутствует).
  # tls_on = connection_mode != 'plain' (TLS включён в режимах tls/tls_plain). tls_only_on
  # = connection_mode == 'tls' (закрыть plain-порт). down-stream redis_config TLS-блок
  # читает compute.tls_on/tls_only_on без изменений. Порт/refs — из essence.
  tls_on:      "${ input.connection_mode != 'plain' }"
  tls_only_on: "${ input.connection_mode == 'tls' }"
  tls_port:    "${ int(default(essence.tls_port, 7379)) }"
  tls_cert_ref: "${ has(essence.tls_cert_ref) ? essence.tls_cert_ref : '' }"
  tls_key_ref:  "${ has(essence.tls_key_ref)  ? essence.tls_key_ref  : '' }"
  tls_ca_ref:   "${ has(essence.tls_ca_ref)   ? essence.tls_ca_ref   : '' }"
  redis_config: >-
    ${ (input.redis_type == 'cluster')
         ? merge(
             essence.redis_config,
             essence.persistence_presets[input.persistence],
             merge(
               has(input.memory_mb)
                 ? { 'maxmemory': string(int(input.memory_mb) * int(essence.memory_reserve_percent) / 100) + 'mb' }
                 : {},
               has(input.maxmemory_policy) ? { 'maxmemory-policy': input.maxmemory_policy } : {},
               int(input.io_threads) > 0 ? { 'io-threads': string(int(input.io_threads)) } : {}
             ),
             default(input.redis_settings, {}),
             {
               'cluster-enabled':      'yes',
               'cluster-config-file':  'nodes.conf',
               'cluster-node-timeout': string(int(input.cluster_node_timeout))
             },
             compute.tls_on
               ? merge(
                   {
                     'tls-port':         string(compute.tls_port),
                     'tls-cert-file':    compute.conf_dir + '/tls/redis.crt',
                     'tls-key-file':     compute.conf_dir + '/tls/redis.key',
                     'tls-ca-cert-file': compute.conf_dir + '/tls/ca.crt',
                     'tls-replication':  'yes',
                     'tls-cluster':      'yes'
                   },
                   compute.tls_only_on ? { 'port': '0' } : {}
                 )
               : {}
           )
         : merge(
             essence.redis_config,
             essence.persistence_presets[input.persistence],
             merge(
               has(input.memory_mb)
                 ? { 'maxmemory': string(int(input.memory_mb) * int(essence.memory_reserve_percent) / 100) + 'mb' }
                 : {},
               has(input.maxmemory_policy) ? { 'maxmemory-policy': input.maxmemory_policy } : {},
               int(input.io_threads) > 0 ? { 'io-threads': string(int(input.io_threads)) } : {}
             ),
             default(input.redis_settings, {}),
             compute.tls_on
               ? merge(
                   {
                     'tls-port':         string(compute.tls_port),
                     'tls-cert-file':    compute.conf_dir + '/tls/redis.crt',
                     'tls-key-file':     compute.conf_dir + '/tls/redis.key',
                     'tls-ca-cert-file': compute.conf_dir + '/tls/ca.crt',
                     'tls-replication':  'yes'
                   },
                   compute.tls_only_on ? { 'port': '0' } : {}
                 )
               : {} ) }

# ── Мутация incarnation.state ─────────────────────────────────────────────────
# Create-набор (тот же, что create/main.yml — поднимаем кластер той же формы;
# scenario.state_changes inline per-scenario, общего include нет) + НОВОЕ поле
# seeded_from. ★ seeded_from БЕЗ timestamp (детерминизм L0, форма от state_schema v9:
# {source_endpoints[], detached bool}): source_endpoints = input.source.hosts (откуда
# мигрировали), detached: false (источник ещё ЖИВ — отцепит day-2 detach_source). Время
# миграции — в state_history (snapshot per-change), не в самом state.
state_changes:
  - set: redis_type
    value: "${ input.redis_type }"
  - set: redis_version
    value: "${ compute.redis_version }"
  - set: redis_config
    value: "${ compute.redis_config }"
  - set: tls
    value: >-
      ${ {
           'enable':   compute.tls_on,
           'only':     compute.tls_only_on,
           'port':     compute.tls_port,
           'cert_ref': compute.tls_cert_ref,
           'key_ref':  compute.tls_key_ref,
           'ca_ref':   compute.tls_ca_ref
         } }
  # connection_mode: явный режим сетевого канала оператора (enum tls/tls_plain/plain,
  # синхрон с create). read-model дублирует выбор; tls-namedfield выше несёт производные.
  - set: connection_mode
    value: "${ input.connection_mode }"
  - set: install
    value: "${ compute.install }"
  - set: persistence
    value: "${ input.persistence }"
  - set: memory_mb
    value: "${ int(default(input.memory_mb, 0)) }"
  - set: maxmemory_policy
    value: "${ default(input.maxmemory_policy, '') }"
  # io_threads: число I/O-потоков оператора (int, default 0; синхрон с create). read-model
  # дублирует выбор (0 = однопоточный I/O, директива io-threads не пишется в redis.conf).
  - set: io_threads
    value: "${ int(input.io_threads) }"
  - set: modules
    value: "${ compute.redis_modules_deployed }"
  - set: modules_base_url
    value: "${ compute.modules_base_url }"
  - set: conf_dir
    value: "${ compute.conf_dir }"
  - set: data_dir
    value: "${ compute.data_dir }"
  - set: sysctl_settings
    value: "${ default(essence.sysctl_settings, {}) }"
  - set: shards
    value: "${ int(default(input.shards, 0)) }"
  - set: replicas
    value: "${ int(default(input.replicas_per_master, 0)) }"
  - set: sentinel_quorum
    value: "${ 0 }"
  - set: redis_users
    value: "${ default(input.users, []) }"
  - set: redis_hosts
    value: "${ [] }"
  # redis_sentinel: факты monitored master (режим sentinel; синхрон с create read-model).
  # ★ Редизайн: прежние именованные тайминги down_after_ms/failover_timeout_ms поглощены
  # обобщённым per-master dict. read-model хранит ЭФФЕКТИВНЫЙ map per-master опций
  # (master_settings = essence.sentinel_master_defaults поверх input.sentinel_master_settings,
  # last-wins) и глобальные settings (input.sentinel_settings) — day-2 читает их именованно.
  # master_name — из essence; quorum в state НЕ материализуется (auto size/2+1) → 0.
  - set: redis_sentinel
    value: >-
      ${ (input.redis_type == 'sentinel')
           ? {
               'master_name':     default(essence.sentinel_master_name, 'master'),
               'quorum':          0,
               'master_settings': merge(
                                     default(essence.sentinel_master_defaults, {}),
                                     default(input.sentinel_master_settings, {})
                                   ),
               'settings':        default(input.sentinel_settings, {})
             }
           : {} }

  # ── cloud-provision read-model (ADR-061, как create) ────────────────────────
  # ФАКТ «эти VM подняты ЭТИМ migrate-прогоном» — для cascade-destroy day-2 teardown
  # (souls→destroyed/seeds→orphaned/tokens→burned). ★ GUARD по input.provision (НЕ
  # has(register.provision)!): на non-provision-прогоне provision-тело placeholder-skip
  # → register.provision не существует → обращение к нему вне guard рвануло бы. Гейт —
  # input.provision (object-вход, has()-safe): задан И enabled → читаем register.provision
  # (создан шагом (а) redis-provision.yml); иначе [] / ''. Тернар короткозамыкает —
  # register.provision.* не трогается на non-provision-пути. Те же guard+форма, что
  # create/main.yml::state_changes (provisioned_vm_ids/sids/provider).
  - set: provisioned_vm_ids
    value: >-
      ${ (has(input.provision) && input.provision.enabled)
           ? register.provision.vm_ids
           : [] }
  - set: provisioned_sids
    value: >-
      ${ (has(input.provision) && input.provision.enabled)
           ? register.provision.hosts.map(h, h.sid)
           : [] }
  - set: provisioned_provider
    value: >-
      ${ (has(input.provision) && input.provision.enabled)
           ? input.provision.provider
           : '' }

  # ★ seed-source read-model (v9–v10): ФАКТ «залито миграцией с внешнего кластера». Без
  # timestamp (детерминизм L0; время миграции — в state_history). detached ВЕТВИТСЯ по
  # режиму:
  #   - sentinel → false: источник ещё ЖИВ, отцепление (REPLICAOF NO ONE) — отдельный
  #     day-2 detach_source ПОСЛЕ ручного квиеса записи оператором;
  #   - cluster → true: B3-поток АТОМАРЕН — forget-external (выкидывание старых нод)
  #     выполнен в migrate-фазе ЭТОГО прогона (cluster.yml шаг 4), источник уже отцеплён
  #     → detached сразу true. detach_source/cluster.yml ничего не отцепляет (honest-
  #     сообщение «forget выполнен в migrate_cluster»).
  # ★ source_password_ref/source_tls_ca_ref (v10) — ПЕРСИСТИМ ССЫЛКИ (Vault-ПУТИ, НЕ
  #   значения) на учётку внешнего источника из input.source.password_ref/tls_ca_ref:
  #   day-2 detach_source делает финальный offset-gate к источнику, и без этих ref'ов
  #   коннект к AUTH/TLS-источнику падал бы (учётка не во входном контракте detach,
  #   секрет в state не оседает — ИБ). detach читает их vault()-ом keeper-side. Оба
  #   опциональны во входе → default('') (источник без AUTH/TLS). Кладём ПУТЬ-строку
  #   (ref), НЕ результат vault() — симметрия с tls.*_ref (в state ссылка, не PEM).
  - set: seeded_from
    value: >-
      ${ {
           'source_endpoints':    input.source.hosts,
           'detached':            input.redis_type == 'cluster',
           'source_password_ref': default(input.source.password_ref, ''),
           'source_tls_ca_ref':   default(input.source.tls_ca_ref, '')
         } }

# Тело прогона — ветки диспетчера по redis_type (CONDITIONAL-INCLUDE, как create).
# S1-пилот: sentinel реализован, cluster — fail-closed заглушка (S4).
tasks:
  # ── provision (ADR-061, как create): cloud-create + онбординг ПЕРЕД деплой+миграцией ──
  # CONDITIONAL-INCLUDE redis-provision.yml СТРОГО ПЕРЕД cluster/sentinel-веткой: при
  # enabled=true его шаги (а) создают VM, (в) регистрируют+ждут онбординга с
  # refresh_soulprint → roster пере-резолвится, и ТОЛЬКО потом sentinel-ветка (деплой
  # нового кластера + заливка с внешнего источника) видит созданные хосты в soulprint.hosts.
  # ★ ТО ЖЕ ОБЩЕЕ PROVISION-ТЕЛО service-level (scenario/redis-provision.yml), что инклудит
  # create/main.yml — дубликата нет (scenario-include фоллбэкает имя файла на service-level,
  # orchestration.md §6). when по input.provision — НЕ статический (object-input, не enum) →
  # placeholder-skip-форма include-when (не group-drop): на enabled=false/опущенной секции
  # шаги тела не таргетят никого. has()-guard — секция опциональна (no-such-key без неё).
  # ★ teardown НЕ здесь.
  - include: redis-provision.yml
    when: "has(input.provision) && input.provision.enabled"

  - include: cluster.yml
    when: "input.redis_type == 'cluster'"
  - include: sentinel.yml
    when: "input.redis_type == 'sentinel'"
