name: migrate_cluster
# create: true — migrate_cluster ТОЖЕ стартовый (bootstrap новой incarnation): он
# поднимает инфраструктуру с нуля, как create, плюс заливает данные с внешнего
# источника. Ключ реален — сценарий доступен оператору в выборе при POST /v1/incarnations
# (scenario.ResolveCreateScenarios читает именно ключ scenario.go::Create).
create: true
description: >-
  S1-пилот: РАЗВЕРНУТЬ новый Redis-кластер И ЗАЛИТЬ в него данные с ВНЕШНЕГО
  (старого) кластера через нативную репликацию Redis (REPLICAOF на внешний
  источник). Create-сценарий (create: true) — поднимает инфраструктуру с нуля,
  как `create`, но дополнительно подключает свежий master к внешнему источнику и
  ждёт, пока реплика догонит его по offset (gate). Источник остаётся ЖИВ —
  отцепление (REPLICAOF NO ONE) выполняет отдельный day-2 `detach_source` ПОСЛЕ
  того, как оператор остановит запись в старый кластер.

  ДИСПЕТЧЕР ПО redis_type (как create): этот файл — диспетчер. Реализованы ОБЕ ветки:
    - sentinel (migrate_cluster/sentinel.yml) — миграция master-replica + sentinel
      через нативный REPLICAOF на внешний источник + offset-gate (поток ниже). Источник
      остаётся ЖИВ; отцепление — отдельный day-2 detach_source.
    - cluster (migrate_cluster/cluster.yml, B3-поток S4-3b) — слот-aware миграция honest
      hash-slot Redis Cluster: joinable-деплой новых нод → join-external (реплики старых
      мастеров 1:1) → failover-takeover (промоушен новых в мастера) → forget-external
      (выкинуть старые ноды). АТОМАРНА в migrate-фазе → detach НЕ нужен (seeded_from
      .detached сразу true). Операционные предусловия cluster-bus/выровненный пароль/
      graceful failover — на операторе (см. шапку migrate_cluster/cluster.yml).
  enum redis_type [sentinel, cluster] гарантирует попадание ровно в одну ветку.

  Поток sentinel-ветки (migrate_cluster/sentinel.yml):
    1. include redis-deploy-sentinel.yml — поднять НОВЫЙ кластер (install + redis.conf +
       users.acl + sentinel.conf + units + REPLICAOF между своими нодами + SENTINEL
       MONITOR + health-gates). ОБЩЕЕ деплой-тело service-level (scenario/redis-deploy-
       sentinel.yml), которое делит create/sentinel.yml — дубликата нет (scenario-include
       фоллбэкает имя файла на service-level, orchestration.md §6).
    2. свежий master реплицирует ВНЕШНИЙ источник (community.redis.replica с
       source_external: true) — нативная репликация Redis тянет dataset из старого
       кластера.
    3. offset-lag gate (community.redis.offset-synced, retry/until) — БЛОКИРУЮЩЕ
       ждёт, пока новый master догонит источник по репликационному offset (в
       пределах lag_threshold). Только после этого прогон считается успешным.

  ★ ГРАНИЦА (НЕ ВХОДИТ): квиес записи в СТАРЫЙ кластер. Soul Stack НЕ управляет
  клиентским трафиком приложений — остановку записи в источник перед финальным
  detach делает САМ ОПЕРАТОР. Этот сценарий лишь поднимает реплику и догоняет
  offset; данные, записанные в источник ПОСЛЕ offset-snapshot detach_source, будут
  потеряны, если оператор не остановил запись (см. detach_source).

  Пароли НЕ во входном контракте сервиса (secret/redis/<incarnation>#password,
  keeper-side vault() в render-фазе, ADR-012). ИСКЛЮЧЕНИЕ — учётка ВНЕШНЕГО
  источника: его Vault-ПУТЬ (НЕ значение) задаёт оператор в input.source.password_ref
  под жёстким pattern-guard secret/redis/migrate/* (см. input ниже) — источник чужой,
  его секрет не лежит по нашей конвенции secret/redis/<inc>.

# ── extends: covenant — общий контракт секций (S4 тираж) ────────────────────────────
# Секции input / compute / state_changes / validate ОБЩЕГО контракта (поднимаем новый
# кластер ТОЙ ЖЕ формы, что create) вынесены в covenant.yml (корень service-репо) и
# наследуются add-only: keeper-side резолвер сливает covenant ПЕРВЫМ, дельта
# migrate_cluster ДОБАВЛЯЕТ поверх (не переопределяя ключи covenant — иначе
# section_key_conflict).
#
# ★ ДЕЛЬТА migrate_cluster (add-only поверх covenant) — migrate-СПЕЦИФИКА:
#   - input  — provision (cloud-create, как create — covenant его НЕ несёт) + source
#     (внешний источник: ОТКУДА мигрируем) + verify (offset-lag gate). ★ install_method
#     УБРАН из migrate-input: способ установки догнал редизайн create (2026-06-28) —
#     он теперь author-context essence.install_method (covenant.compute.install читает
#     default(essence.install_method,'binary')), НЕ operator-input. Прежнее migrate-поле
#     input.install_method было «наследием create-контракта» (зафиксировано в старой
#     шапке) ДО того, как create вынес его в essence; тираж covenant приводит migrate к
#     общей форме (поле удалено, fixtures подают install_method в essence).
#   - compute — source_master/source_password/source_tls_ca (координаты+учётка внешнего
#     источника, migrate-специфика) + sentinel_monitor_now=false. ★ sentinel_monitor_now
#     covenant НЕ несёт (расходится с create-семантикой по ЗНАЧЕНИЮ: create=true,
#     migrate=false): при миграции новый master во время заливки в role:slave, ранний
#     SENTINEL MONITOR → split-brain → MONITOR переносится в detach_source. Значение
#     иное, чем у create → covenant его не несёт, обе стороны объявляют в своей дельте.
#   - state_changes — ТОЛЬКО seeded_from (migrate-специфика: факт «залито с внешнего
#     кластера»). create-набор + provisioned_* — целиком из covenant (provisioned_*
#     provision-aware: при enabled читают register.provision, иначе []/'').
#   - validate — ТОЛЬКО source.hosts-инвариант (migrate-специфика). create-инвариант
#     (имя operator-extra ACL не служебное) — из covenant.
#   - tasks — диспетчер по redis_type + provision-include (то же общее provision-тело
#     service-level scenario/redis-provision.yml, что инклудит create/main.yml).
extends: covenant

# ── Входной контракт: ДЕЛЬТА migrate_cluster поверх covenant.input ──────────────────
# Общий input-контракт (redis_type/version/memory_mb/persistence/connection_mode/users/
# redis_settings/sentinel_*/topology + отсутствие install_method/modules*-полей) — в
# covenant.yml. Здесь — provision (как create) + source/verify (migrate-специфика).
input:
  # ── cloud-provision: поднять VM под топологию ПЕРЕД миграцией (ADR-061, как create) ─
  # ★ Схема — ТА ЖЕ, что create/main.yml::input.provision (covenant её НЕ несёт — это
  # дельта обоих create-сценариев). Когда задан и enabled=true — migrate_cluster ОДНИМ
  # прогоном (а) создаёт VM через core.cloud.created, (б) доставляет per-VM bootstrap-
  # токен, (в) регистрирует созданные SID + БЛОКИРУЮЩЕ ждёт онбординга (await_online +
  # refresh_soulprint, ADR-061), после чего roster пере-резолвится и деплой+миграция
  # (redis-deploy-sentinel.yml + seed-шаги) катятся на уже-online хосты. Не задан /
  # enabled=false → миграция по СУЩЕСТВУЮЩЕМУ roster-у (поведение S1-пилота бит-в-бит).
  # Общее provision-тело — service-level scenario/redis-provision.yml.
  #
  # ★ node_count тут НЕТ намеренно: число VM выводится из ТОПОЛОГИИ (как create) —
  # единственный источник истины размера кластера. ★ teardown (destroy) — НЕ здесь.
  provision:
    type: object
    required: false
    description: >-
      Поднять VM под топологию ПЕРЕД миграцией в том же прогоне (ADR-061, как create).
      enabled=true → сначала cloud-create + онбординг (барьер await_online), потом
      деплой нового кластера + заливка с внешнего источника. Не задан / enabled=false →
      миграция по существующему roster-у.
    additional_properties: false
    properties:
      enabled:
        type: boolean
        default: false
        description: Главный гейт provision. false (или секция опущена) — provision-тело placeholder-skip.
      provider:
        type: string
        description: Имя cloud-Provider в реестре providers (NOT plugin name → soul-cloud-<provider>).
      profile:
        type: string
        description: Имя VM-профиля в реестре profiles (ресурсы/образ/сеть VM).
      await_timeout:
        type: string
        pattern: "^[0-9]+[smh]$"
        description: >-
          Верхняя граница ожидания онбординга созданных VM (барьер await_online,
          ADR-061; форма <N>{s|m|h}). Не задан → essence.provision_await_timeout (дефолт
          10m). Ограничен сверху keeper.yml::max_await_timeout.
      join_wait_timeout:
        type: string
        pattern: "^[0-9]+[smh]$"
        description: >-
          Потолок ожидания появления свежесозданной VM в Teleport перед доставкой
          токена (core.bootstrap.delivered, retry-до-join; форма <N>{s|m|h}). Не задан →
          essence.provision_join_wait_timeout (дефолт 15m).
      ssh_provider:
        type: string
        description: >-
          Имя SshProvider-плагина (keeper.yml::plugins.ssh_providers[].name) для
          доставки per-VM bootstrap-токена по SSH (core.bootstrap.delivered, ADR-063).

  # ── source: внешний (старый) кластер — ОТКУДА мигрируем ────────────────────────
  # Координаты и учётка ВНЕШНЕГО источника. password_ref/tls_ca_ref — Vault-ПУТИ (НЕ
  # значения): сценарий читает их авторским каналом ${ vault(input.source.<ref>) } в
  # render-фазе (templating.md §2.3/§4). ★ pattern-guard secret/redis/migrate/* — ОБА
  # ref ОБЯЗАНЫ лежать под этим префиксом: оператор не может навести vault() на
  # произвольный путь своего Keeper-токена (closes path-injection caveat templating.md
  # §4 — статический запрет input-производных vault()-путей). Это НЕ vault_scope
  # (тот резолвит vault:-ЗНАЧЕНИЕ в input keeper-side ДО валидации, docs/input.md) —
  # здесь оператор даёт ПУТЬ-строку, а читает сценарий сам (авторский канал).
  source:
    type: object
    required: true
    additional_properties: false
    properties:
      hosts:
        type: array
        items:
          type: string
        description: >-
          host:port внешних нод старого кластера. hosts[0] — master источника
          (откуда новый кластер реплицирует dataset).
      password_ref:
        type: string
        # ★ pattern: добавлен `#` в символ-класс (к ТЗ-форме [A-Za-z0-9._/-]) — Vault-ref
        # несёт field-суффикс через `#` (secret/redis/migrate/oldcluster#password, как вся
        # redis-конвенция secret/redis/<inc>#password); без `#` валидный ref реджектился бы.
        # Anchor ^secret/redis/migrate/ СОХРАНЁН — path-injection guard не ослаблен (оператор
        # заперт в этом префиксе, навести vault() на secret/keeper/* нельзя).
        pattern: "^secret/redis/migrate/[A-Za-z0-9._/#-]+$"
        description: >-
          Vault-ПУТЬ к паролю учётки ВНЕШНЕГО источника (НЕ значение). Под жёстким
          pattern secret/redis/migrate/* (path-injection guard; `#field`-суффикс
          допускается). Сценарий читает его через vault(input.source.password_ref) в
          render-фазе; на хост уезжает уже значение (ADR-012). Не задан → источник без
          AUTH (пустой пароль).
      tls_ca_ref:
        pattern: "^secret/redis/migrate/[A-Za-z0-9._/#-]+$"
        type: string
        description: >-
          Vault-ПУТЬ к PEM CA для проверки TLS-сертификата ВНЕШНЕГО источника (НЕ
          значение). Тот же pattern-guard (`#field`-суффикс допускается). Читается через
          vault() при source.tls=true.
      tls:
        type: boolean
        default: false
        description: >-
          Коннектиться к внешнему источнику по TLS. true → реплика и offset-probe
          идут на источник по TLS, CA берётся из tls_ca_ref.

  # ── verify: параметры offset-lag gate ────────────────────────────────────────
  # Условие «реплика догнала источник». lag_threshold — допустимое отставание
  # master_repl_offset (0 = полная синхронизация). skip_checksum — пропустить дорогую
  # сверку контрольной суммы dataset (плагин offset-synced решает, как именно).
  verify:
    type: object
    required: false
    additional_properties: false
    properties:
      lag_threshold:
        type: integer
        default: 0
        description: >-
          Допустимое отставание реплики от источника по репликационному offset
          (байт). 0 (дефолт) — требовать полную синхронизацию (offset совпал).
      skip_checksum:
        type: boolean
        default: false
        description: >-
          Пропустить сверку контрольной суммы dataset в offset-gate (быстрее, но
          слабее гарантия). По умолчанию false (сверять).

# ── Декларативные input-инварианты: ДЕЛЬТА migrate_cluster поверх covenant.validate ──
# INPUT-ONLY (essence/soulprint недоступны — структурный CEL-барьер). create-инвариант
# (имя operator-extra ACL не служебное) — в covenant. Здесь — source.hosts +
# cluster_topology-reject. ★ ADD-ONLY поверх covenant.validate: validate-секции
# НАКАПЛИВАЮТСЯ (mergeValidateSections — append, правила-предикаты, не ключи map → к ним
# section_key_conflict НЕприменим). covenant.validate несёт create-инварианты (operator-
# extra ACL не служебное), эту реджект-дельту НЕ дублирует (cluster_topology валиден для
# create/create_from_souls — там он раскладывает шарды; в migrate он НЕ применяется).
validate:
  # ★ source.hosts непуст: миграция без источника бессмысленна. source.hosts[0] —
  # master источника (sentinel.yml читает его first-by-index). Пустой массив прошёл бы
  # required:true секции, но дал бы no-such-index при резолве source_master.
  - that: "size(input.source.hosts) >= 1"
    message: "source.hosts должен содержать хотя бы один host:port внешнего источника (source.hosts[0] = master старого кластера, откуда тянется dataset)"

  # ★ cluster_topology НЕ применяется в migrate_cluster — FAIL-CLOSED reject (НЕ silent
  # no-op). covenant.input несёт cluster_topology (нужен create/create_from_souls для
  # явной раскладки шардов оператором), migrate наследует его через `extends: covenant` →
  # эффективный input migrate ПРИНИМАЕТ поле по схеме. НО cluster-ветка миграции
  # (cluster.yml инклудит redis-deploy-cluster-joinable.yml + плагин community.redis.cluster
  # action join-external) cluster_topology НЕ читает: B3-пилот переносит ТОЛЬКО мастера на
  # готовый roster (replica-guard replicas_per_master==0 — топология с явной раскладкой
  # master/replica осмысленна лишь с репликами, а они тут не поддержаны), join-external
  # вливает ровно одну новую ноду на старый мастер 1:1. ★ ПРЕЖНИЙ inline-migrate
  # НАМЕРЕННО исключал это поле из своего input (комментарий «cluster_topology тут НЕТ
  # намеренно»); тираж covenant вернул его по наследованию → заданное оператором поле
  # прошло бы input-валидацию и МОЛЧА не применилось (silent green no-op, против «no
  # silent-wrong»). Это правило превращает молчаливый no-op в ранний внятный 422 ДО
  # applying. !has() — поле опционально (covenant required:false): задано → reject, не
  # задано (штатный migrate) → правило истинно, прогон идёт. Явная раскладка шардов —
  # вне миграции: подними кластер нужной топологией через create/create_from_souls.
  - that: "!has(input.cluster_topology)"
    message: "cluster_topology в migrate_cluster не применяется: пилот переносит только мастера на готовый roster (replicas_per_master==0); явная раскладка шардов — вне миграции (задай её в create/create_from_souls). Не задавай это поле."

# ── Вычисляемые scenario-vars: ДЕЛЬТА migrate_cluster поверх covenant.compute ────────
# Общий compute-контракт (redis_config/redis_config_base/redis_config_tls/install/
# conf_dir/data_dir/tls_*/sentinel_directives/redis_version/modules_*/…) — в covenant.yml
# (наследуется covenant-первым; ★ install теперь essence-driven, как create). Здесь —
# migrate-специфика: координаты/учётка внешнего источника + sentinel_monitor_now=false.
# ★ compute: — top-level scenario-блок; covenant-объявления видны дельте по имени.
compute:
  # ── Внешний (старый) источник: координаты + секреты учётки ─────────────────────
  # source_master — master ВНЕШНЕГО кластера (hosts[0]), к которому привязывается
  # свежий master нового кластера (REPLICAOF на внешний). source_password/source_tls_ca
  # — авторский канал vault() по ПУТИ из operator-input (input.source.password_ref/
  # tls_ca_ref под pattern-guard secret/redis/migrate/*; path-injection закрыт паттерном,
  # templating.md §4). password_ref опционален → has()-guard, иначе '' (источник без AUTH);
  # tls_ca читается ТОЛЬКО при source.tls=true. Резолв keeper-side, значение маскируется.
  source_master:   "${ input.source.hosts[0] }"
  source_password: "${ has(input.source.password_ref) ? vault(input.source.password_ref) : '' }"
  source_tls_ca:   "${ input.source.tls ? vault(input.source.tls_ca_ref) : '' }"
  # ── sentinel_monitor_now=false: НЕ мониторить master во время заливки (split-brain-фикс) ──
  # ★ КОНТРАКТ-ФЛАГ шага 4 деплой-тела (redis-deploy-sentinel.yml: проксируется в task-var и
  # гейтится when: vars.sentinel_monitor_now; через task-var, т.к. flow-control when не видит
  # compute.* напрямую). При миграции MONITOR ОТКЛАДЫВАЕТСЯ: к моменту деплоя новый master ещё
  # НЕ привязан к внешнему источнику (REPLICAOF external — шаг 2 ниже, ПОСЛЕ include деплой-тела),
  # а начавшаяся заливка переводит master в role:slave на время синка (> down-after 5с). Если бы
  # sentinel замониторил его сразу, он увидел бы свой «master» как slave и инициировал failover →
  # split-brain/разрыв заливки. Поэтому здесь false (sentinel-демоны поднимаются деплой-телом, но
  # команду MONITOR НЕ дают) — фактический MONITOR делает detach_source/sentinel.yml ПОСЛЕ
  # REPLICAOF NO ONE, когда новый master снова автономен. ★ covenant этот флаг НЕ несёт (на
  # create-семантике он =true) — каждый наследник объявляет своё значение в дельте compute.
  sentinel_monitor_now: "${ false }"

# ── Мутация incarnation.state: ДЕЛЬТА migrate_cluster поверх covenant.state_changes ──
# Create-набор state (redis_type/redis_version/redis_config/tls/install/persistence/…) +
# provisioned_* — целиком из covenant (поднимаем кластер той же формы). Здесь — ТОЛЬКО
# seeded_from (migrate-специфика). ★ seeded_from БЕЗ timestamp (детерминизм L0, форма от
# state_schema v10: {source_endpoints[], detached bool, source_password_ref, source_tls_ca_ref}).
# Время миграции — в state_history (snapshot per-change), не в самом state.
state_changes:
  # ★ seed-source read-model (v9–v10): ФАКТ «залито миграцией с внешнего кластера». Без
  # timestamp (детерминизм L0; время миграции — в state_history). detached ВЕТВИТСЯ по
  # режиму:
  #   - sentinel → false: источник ещё ЖИВ, отцепление (REPLICAOF NO ONE) — отдельный
  #     day-2 detach_source ПОСЛЕ ручного квиеса записи оператором;
  #   - cluster → true: B3-поток АТОМАРЕН — forget-external (выкидывание старых нод)
  #     выполнен в migrate-фазе ЭТОГО прогона (cluster.yml шаг 4), источник уже отцеплён
  #     → detached сразу true. detach_source/cluster.yml ничего не отцепляет (honest-
  #     сообщение «forget выполнен в migrate_cluster»).
  # ★ source_password_ref/source_tls_ca_ref (v10) — ПЕРСИСТИМ ССЫЛКИ (Vault-ПУТИ, НЕ
  #   значения) на учётку внешнего источника из input.source.password_ref/tls_ca_ref:
  #   day-2 detach_source делает финальный offset-gate к источнику, и без этих ref'ов
  #   коннект к AUTH/TLS-источнику падал бы (учётка не во входном контракте detach,
  #   секрет в state не оседает — ИБ). detach читает их vault()-ом keeper-side. Оба
  #   опциональны во входе → default('') (источник без AUTH/TLS). Кладём ПУТЬ-строку
  #   (ref), НЕ результат vault() — симметрия с tls.*_ref (в state ссылка, не PEM).
  - set: seeded_from
    value: >-
      ${ {
           'source_endpoints':    input.source.hosts,
           'detached':            input.redis_type == 'cluster',
           'source_password_ref': default(input.source.password_ref, ''),
           'source_tls_ca_ref':   default(input.source.tls_ca_ref, '')
         } }

# Тело прогона — ветки диспетчера по redis_type (CONDITIONAL-INCLUDE, как create).
# S1-пилот: sentinel реализован, cluster — B3-поток (S4-3b).
tasks:
  # ── provision (ADR-061, как create): cloud-create + онбординг ПЕРЕД деплой+миграцией ──
  # CONDITIONAL-INCLUDE redis-provision.yml СТРОГО ПЕРЕД cluster/sentinel-веткой: при
  # enabled=true его шаги (а) создают VM, (в) регистрируют+ждут онбординга с
  # refresh_soulprint → roster пере-резолвится, и ТОЛЬКО потом sentinel-ветка (деплой
  # нового кластера + заливка с внешнего источника) видит созданные хосты в soulprint.hosts.
  # ★ ТО ЖЕ ОБЩЕЕ PROVISION-ТЕЛО service-level (scenario/redis-provision.yml), что инклудит
  # create/main.yml — дубликата нет (scenario-include фоллбэкает имя файла на service-level,
  # orchestration.md §6). when по input.provision — НЕ статический (object-input, не enum) →
  # placeholder-skip-форма include-when (не group-drop): на enabled=false/опущенной секции
  # шаги тела не таргетят никого. has()-guard — секция опциональна (no-such-key без неё).
  # ★ teardown НЕ здесь.
  - include: redis-provision.yml
    when: "has(input.provision) && input.provision.enabled"

  - include: cluster.yml
    when: "input.redis_type == 'cluster'"
  - include: sentinel.yml
    when: "input.redis_type == 'sentinel'"
