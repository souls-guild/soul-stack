# L0 trial for migrate_cluster in cluster mode - FAIL branch of replica-guard (the B3 pilot
# supports ONLY replicas_per_master=0). Mirrors cluster-migrate-2shards (the same
# happy-path cluster input + an external source of 2 seed nodes), but replicas_per_master=1 →
# topology shards*(1+replicas)=2*(1+1)=4. The roster is DELIBERATELY set to 4 hosts so that
# size-guard (0.) PASSES (4 == 2*(1+1)) and the run hits exactly replica-guard (0b.) -
# the case isolates the NEW guard, not size-guard.
#
# ★ WHY this is needed (QA bug, major): the plugin's join-external (migrate.go) merges new
# nodes 1:1 onto old masters and runtime-asserts len(newNodes) == shards_dest (it does NOT
# create replicas in the new cluster - the pilot migrates ONLY masters). With replicas>0, size-guard
# would let through a roster of shards*(1+replicas), but the plugin would then fail on len(newNodes) !=
# shards_dest - a late runtime failure AFTER the joinable deploy → error_locked. replica-guard
# (0b.) turns a late runtime failure into an early, clear render failure BEFORE any dispatch.
#
# Paired with cluster-migrate-2shards (replicas=0 → render passes through to the planned join/failover/
# forget steps). DIFFERENCE from the size-based size-guard-mismatch (create): there roster != topology;
# here roster == topology (size-guard PASS), but a topology with replicas isn't supported by the pilot.

# Render-only, hermetic. The migrate_cluster dispatcher includes cluster.yml + sentinel.yml
# via CONDITIONAL-INCLUDE: on a cluster run the sentinel branch is group-dropped, cluster.yml
# expands - size-guard assert (PASS, 4==4) → replica-guard assert (FAIL, 1!=0) aborts
# render BEFORE include redis-deploy-cluster-joinable.yml (the joinable deploy doesn't start).
name: cluster migrate with replicas_per_master>0 aborts at render (replica-guard)

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  # Roster of 4 hosts = exactly shards*(1+replicas)=2*(1+1) → size-guard (0.) PASSES,
  # the run reaches replica-guard (0b.) and aborts there (replicas=1 != 0). Order
  # deliberately not sorted - the guard operates on size(), not position.
  hosts:
    - sid: node-2.example.com
      covens: [migrate_cluster, redis]
      soulprint:
        network: { primary_ip: 10.0.0.2 }
        os: { arch: amd64 }
    - sid: node-1.example.com
      covens: [migrate_cluster, redis]
      soulprint:
        network: { primary_ip: 10.0.0.1 }
        os: { arch: amd64 }
    - sid: node-4.example.com
      covens: [migrate_cluster, redis]
      soulprint:
        network: { primary_ip: 10.0.0.4 }
        os: { arch: amd64 }
    - sid: node-3.example.com
      covens: [migrate_cluster, redis]
      soulprint:
        network: { primary_ip: 10.0.0.3 }
        os: { arch: amd64 }
  vault:
    secret/redis/migrate_cluster:
      password: s3cr3t-redis-pass-migrate
    secret/redis/migrate_cluster/users/replica:
      password: replica-sys-secret-pass
    secret/redis/migrate_cluster/users/monitoring:
      password: monitoring-sys-secret-pass
    secret/redis/migrate_cluster/users/sentinel:
      password: sentinel-sys-secret-pass
    secret/redis/migrate_cluster/users/haproxy:
      password: haproxy-sys-secret-pass
    secret/redis/migrate/oldcluster:
      password: old-cluster-source-pass
  essence:
    # install_method - in essence (author-context): the install method is NOT operator-input
    # (covenant.compute.install reads default(essence.install_method, 'binary')). package
    # explicit (the field moved input→essence together with migrate, a covenant rollout).
    install_method: package
    redis_type: cluster
    sentinel_master_name: master
    modules_base_url: "https://artifacts.example.com/redis/modules"
    memory_reserve_percent: 75
    persistence_presets:
      rdb:
        save: "900 1 300 10 60 10000"
        appendonly: "no"
    redis_config:
      maxmemory:        "256mb"
      maxmemory-policy: allkeys-lru
      maxclients:       10000
      timeout:          300
    system_acl_users:
      replica:    "+psync +replconf +ping"
      monitoring: "-@all +@connection +client +ping +info +config|get +cluster|info +slowlog +latency +memory +select +command|count +command|docs"
      sentinel:   "allchannels +multi +slaveof +ping +exec +subscribe +config|rewrite +role +publish +info +client|setname +client|kill +script|kill"
      haproxy:    "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +info +cluster|info"
  input:
    redis_type: cluster
    # ★ version - enum of builds shipped to Nexus (redesign); a valid enum is needed so that
    # the run passes input validation and reaches replica-guard (render-assert), instead of failing
    # earlier on the enum. install_method moved into essence (above) - NOT operator-input.
    version: "7.4.1"
    shards: 2
    # ★ replicas_per_master=1 - a topology with replicas. size-guard (0.) PASS (4==2*(1+1)),
    # but replica-guard (0b.) aborts render: the pilot migrates only masters.
    replicas_per_master: 1
    cluster_node_timeout: 5000
    source:
      hosts:
        - "10.9.0.1:6379"
        - "10.9.0.2:6379"
      password_ref: "secret/redis/migrate/oldcluster#password"
      tls: false

# The run aborts at render: replica-guard assert "Guard cluster migration pilot supports
# masters only (no replicas)" false (1 != 0). Substring - message of the assert rule in cluster.yml.
expect_render_error: "cluster-migration (B3 pilot) supports only replicas_per_master=0"
