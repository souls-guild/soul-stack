# L0-испытание migrate_cluster в режиме sentinel С provision (ADR-061, Вариант A).
# Парный к sentinel-migrate-1master-1replica (existing-таргет, provision опущен) и к
# create/provision-enabled-sentinel: проверяет, что migrate_cluster ТЕМ ЖЕ общим
# provision-телом (service-level scenario/redis-provision.yml) поднимает VM ПЕРЕД
# деплоем+миграцией. Поток: (а) core.cloud.created поднимает VM (count = 1 + replicas =
# 2, топология sentinel), (б) core.bootstrap.delivered доставляет токен, (в)
# core.soul.registered регистрирует созданные SID + барьер await_online +
# refresh_soulprint, ПОТОМ деплой нового кластера (redis-deploy-sentinel.yml) + заливка
# с внешнего источника (community.redis.replica source_external + offset-synced).
#
# include redis-provision.yml gated на has(input.provision) && input.provision.enabled
# у main.yml (placeholder-skip-форма include-when — object-input не статичен): здесь
# enabled=true → шаги тела таргетят roster. Provision-include СТРОГО ПЕРЕД cluster/
# sentinel-веткой (main.yml::tasks) — VM поднимаются до деплоя.
#
# ★ register.provision в L0 — из mocks.register (probe не исполняется, ADR-023): шаги
# (б)/(в) provision-тела и state_changes (provisioned_*) читают register.provision.
# {vm_ids,hosts} отсюда. Roster — 2 хоста (vm-1 master, vm-2 реплика); в проде их даёт
# refresh_soulprint после онбординга, в L0 mid-run re-resolve — stub, roster = статичный
# fixture, поэтому задаём 2 хоста руками. sid-ы созданных VM = SID-ы roster-а.
#
# ВНИМАНИЕ L0-ограничение (как sentinel-migrate/sentinel-create): apply.input
# host-инвариантен в пилоте (резолвится на ПЕРВОМ targeted-хосте) → render_context.self
# в destiny = vm-1 (master).
name: sentinel migrate provisions VMs first then deploys and seeds from external source

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  # Порядок намеренно не отсортирован (2, 1) — harness и master-election сортируют по SID.
  hosts:
    - sid: vm-2.example.com
      covens: [migrate_cluster, redis]
      soulprint:
        network: { primary_ip: 10.0.0.2 }
        os: { arch: amd64 }
    - sid: vm-1.example.com
      covens: [migrate_cluster, redis]
      soulprint:
        network: { primary_ip: 10.0.0.1 }
        os: { arch: amd64 }
  vault:
    secret/redis/migrate_cluster:
      password: s3cr3t-redis-pass-migrate
    # ★ РЕДИЗАЙН default_admin (2026-06-30): default_admin — системный юзер
    # внутрикластерного AUTH (auth_pass/PING шаги деплоя читают его по ветке users/<name>).
    secret/redis/migrate_cluster/users/default_admin:
      password: default-admin-secret-pass
    secret/redis/migrate_cluster/users/replica:
      password: replica-sys-secret-pass
    secret/redis/migrate_cluster/users/monitoring:
      password: monitoring-sys-secret-pass
    secret/redis/migrate_cluster/users/sentinel:
      password: sentinel-sys-secret-pass
    secret/redis/migrate_cluster/users/haproxy:
      password: haproxy-sys-secret-pass
    # ★ Учётка ВНЕШНЕГО источника под pattern-guard secret/redis/migrate/*. Читается
    # авторским каналом vault(input.source.password_ref) — password_ref = ниже в input.
    secret/redis/migrate/oldcluster:
      password: old-cluster-source-pass
  essence:
    # install_method — в essence (author-context): способ установки НЕ operator-input
    # (covenant.compute.install читает default(essence.install_method, 'binary')). package
    # явно (поле переехало input→essence вместе с migrate, тираж covenant).
    install_method: package
    redis_type: sentinel
    sentinel_master_name: master
    modules_base_url: "https://artifacts.example.com/redis/modules"
    provision_await_timeout: "10m"
    provision_join_wait_timeout: "55m"
    memory_reserve_percent: 75
    persistence_presets:
      rdb:
        save: "900 1 300 10 60 10000"
        appendonly: "no"
    # ★ Редизайн: подложка per-master sentinel-директив (compute.sentinel_directives /
    # state.redis_sentinel.master_settings). Дефолты удалённых полей 5000/60000.
    sentinel_master_defaults:
      down-after-milliseconds: "5000"
      failover-timeout: "60000"
    redis_config:
      maxmemory:        "256mb"
      maxmemory-policy: allkeys-lru
      maxclients:       10000
      timeout:          300
    system_acl_users:
      default_admin: "~* &* +@all"
      replica:    "+psync +replconf +ping"
      monitoring: "-@all +@connection +client +ping +info +config|get +cluster|info +slowlog +latency +memory +select +command|count +command|docs"
      sentinel:   "allchannels +multi +slaveof +ping +exec +subscribe +config|rewrite +role +publish +info +client|setname +client|kill +script|kill"
      haproxy:    "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +info +cluster|info"
    system_acl_users_sentinel:
      default_admin: "allchannels allkeys +@all"
      monitoring: "-@all +@connection -command +client -hello +info -auth +sentinel|masters +sentinel|replicas +sentinel|slaves +sentinel|sentinels +sentinel|ckquorum"
      sentinel:   "allchannels -@all +auth +client|getname +client|id +client|setname +command +hello +ping +sentinel|is-master-down-by-addr +publish +role +sentinel|get-master-addr-by-name +sentinel|master +sentinel|myid +sentinel|replicas +sentinel|sentinels"
      haproxy:    "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +sentinel|get-master-addr-by-name +sentinel|master +sentinel|myid +sentinel|replicas +sentinel|sentinels"
  input:
    redis_type: sentinel
    # ★ version — enum выкаченных в Nexus сборок (редизайн). install_method переехал в
    # essence (выше) — НЕ operator-input после тиража covenant. connection_mode/
    # sentinel_settings опущены → дефолты.
    version: "7.4.1"
    replicas_per_master: 1
    # ★ provision ВКЛЮЧЁН: поднять VM под топологию sentinel (count = 1 + replicas = 2)
    # ПЕРЕД деплоем+миграцией. await_timeout=5m перекрывает essence-дефолт (10m).
    provision:
      enabled: true
      provider: wb-dev
      profile: redis-small
      await_timeout: "5m"
      ssh_provider: ssh-wb
    # ★ Внешний источник: координаты + Vault-ПУТЬ к паролю (под pattern-guard).
    source:
      hosts:
        - "10.9.0.1:6379"
        - "10.9.0.2:6379"
      password_ref: "secret/redis/migrate/oldcluster#password"
      tls: false
    # verify опущен → lag_threshold default 0, skip_checksum default false.

# register.provision — готовый payload core.cloud.created (L0-проброс, шаг (а) не
# исполняется): vm_ids созданных VM + hosts[{sid,...,bootstrap_token}]. Шаги (б)/(в) и
# state_changes читают его. sid-ы созданных VM = SID-ы roster-а (в проде refresh_soulprint
# их и добавил бы; здесь roster уже несёт их). 2 VM под sentinel-топологию (1 master + 1
# реплика).
mocks:
  register:
    provision:
      vm_ids: [i-aaa111, i-bbb222]
      hosts:
        - { sid: vm-1.example.com, vm_id: i-aaa111, primary_ip: 10.0.0.1, bootstrap_token: tok-vm1 }
        - { sid: vm-2.example.com, vm_id: i-bbb222, primary_ip: 10.0.0.2, bootstrap_token: tok-vm2 }

assert:
  task_present:
    # ── provision-тело (redis-provision.yml), ПЕРЕД деплоем ──────────────────────
    # (а) core.cloud.created: count = 1 + replicas_per_master = 2 (sentinel-топология,
    # НЕ shards*(1+replicas)), generate_userdata: false (VM без cloud-init, setup ставит
    # шаг (б) install: true). Единственная core.cloud.created в плане.
    - module: core.cloud.created
      params_subset:
        provider: wb-dev
        profile: redis-small
        count: 2
        # name — run-identity батча = incarnation.name (здесь "migrate_cluster"): драйвер
        # именует VM <name>-<seq> + label soulstack-run=<name> (идемпотентность, NIM-16).
        name: migrate_cluster
        generate_userdata: false

    # (б) core.bootstrap.delivered: install + доставка per-VM bootstrap-токена по SSH
    # (ADR-063). install: true (VM без cloud-init, setup ставится по SSH); hosts =
    # ${ register.provision.hosts } (весь payload, 2 VM с bootstrap_token); ssh_provider
    # из input.provision. Единственная core.bootstrap.delivered в плане.
    - module: core.bootstrap.delivered
      params_subset:
        ssh_provider: ssh-wb
        install: true
        # join_wait_timeout — из essence.provision_join_wait_timeout (input.provision его
        # не задаёт). Guard: essence-дефолт доходит до шага (не хардкод), duration-строка.
        join_wait_timeout: "55m"
        hosts:
          - { sid: vm-1.example.com, vm_id: i-aaa111, primary_ip: 10.0.0.1, bootstrap_token: tok-vm1 }
          - { sid: vm-2.example.com, vm_id: i-bbb222, primary_ip: 10.0.0.2, bootstrap_token: tok-vm2 }

    # (в) core.soul.registered: sid — список SID созданных VM (register.provision.hosts
    # .map(h, h.sid)); coven — корневой incarnation.name (migrate_cluster); барьер
    # онбординга await_online + refresh_soulprint; await_timeout из input.provision (5m,
    # перекрывает essence 10m). Единственная core.soul.registered в плане.
    - module: core.soul.registered
      params_subset:
        sid: [vm-1.example.com, vm-2.example.com]
        coven: [migrate_cluster]
        await_online: true
        refresh_soulprint: true
        await_timeout: "5m"

    # ── redis-deploy-sentinel.yml (деплой нового кластера) катится ПОСЛЕ provision ──
    # render_context.self = vm-1 (master, host-инвариант apply.input). Дизамбигуатор от
    # users.acl/sentinel.conf/hardening (тот же core.file.rendered) — path.
    - module: core.file.rendered
      params_subset:
        path: /etc/redis/redis.conf

    # ── deploy-тело: ВНУТРИ-кластерный REPLICAOF (community.redis.replica) ───────
    # addr=127.0.0.1:6379 (per-host локальный), master_addr=10.0.0.1:6379 (master-
    # election vm-1). ОТЛИЧАЕТСЯ от source-replica (шаг ниже) по master_addr (10.0.0.1
    # ВНУТРИ vs 10.9.0.1 ВНЕШНИЙ) и отсутствию source_external.
    - module: community.redis.replica
      params_subset:
        addr: "127.0.0.1:6379"
        master_addr: "10.0.0.1:6379"
        # ★ РЕДИЗАЙН default_admin: внутрикластерная replica→master AUTH под default_admin.
        username: default_admin
        password: default-admin-secret-pass

    # ── МИГРАЦИЯ: REPLICAOF на ВНЕШНИЙ источник (community.redis.replica, source_external) ──
    # run_once на vm-1 (master нового кластера). master_addr=10.9.0.1:6379 (source.hosts[0]),
    # source_external:true, master_password = vault(source.password_ref). Дизамбигуатор от
    # внутрикластерного replica — source_external:true + master_addr=внешний.
    - module: community.redis.replica
      params_subset:
        addr: "127.0.0.1:6379"
        master_addr: "10.9.0.1:6379"
        source_external: true
        # ★ РЕДИЗАЙН default_admin: LOCAL-коннект под default_admin; master_password — источник.
        username: default_admin
        password: default-admin-secret-pass
        master_password: old-cluster-source-pass
        master_tls: false

    # ── МИГРАЦИЯ: offset-gate (community.redis.offset-synced) ────────────────────
    # run_once на vm-1. source_addr=10.9.0.1:6379 (внешний), lag_threshold=0 (default
    # verify), skip_checksum=false. source_password = vault(source.password_ref).
    - module: community.redis.offset-synced
      params_subset:
        addr: "127.0.0.1:6379"
        source_addr: "10.9.0.1:6379"
        # ★ РЕДИЗАЙН default_admin: LOCAL-коннект под default_admin; source_password — источник.
        username: default_admin
        password: default-admin-secret-pass
        source_password: old-cluster-source-pass
        lag_threshold: 0
        skip_checksum: false

  # ★ SPLIT-BRAIN-ФИКС: SENTINEL MONITOR НЕ исполняется в миграции (как sentinel-migrate-
  # 1master-1replica). when: vars.sentinel_monitor_now (=false) → static-when placeholder-skip
  # шага 4 деплой-тела (Params=nil, presence task_absent проходит). MONITOR делает day-2
  # detach_source ПОСЛЕ REPLICAOF NO ONE.
  task_absent:
    - module: community.redis.sentinel

  # create-набор state + cloud-provision read-model + seed-source read-model. redis_config
  # БЕЗ cluster-директив (sentinel). provisioned_* — ФАКТ «эти VM подняты этим migrate-
  # прогоном» (для cascade-destroy day-2 teardown); тот же guard+форма, что create.
  # seeded_from: source_endpoints = source.hosts ЦЕЛИКОМ, detached:false (источник ещё жив).
  state_changes:
    redis_type: sentinel
    redis_version: "7.4.1"
    redis_config:
      maxmemory:        "256mb"
      maxmemory-policy: allkeys-lru
      maxclients:       10000
      timeout:          300
      save:             "900 1 300 10 60 10000"
      appendonly:       "no"
    redis_users: []
    redis_hosts: []
    # ★ Редизайн: redis_sentinel несёт обобщённые map-ы (master_settings/settings).
    # master_settings = essence-дефолты; settings={} (sentinel_settings не задан).
    redis_sentinel:
      master_name: master
      quorum: 0
      master_settings:
        down-after-milliseconds: "5000"
        failover-timeout: "60000"
      settings: {}
    replicas: 1
    sentinel_quorum: 0
    shards: 0
    persistence: rdb
    maxmemory_policy: ""
    # connection_mode=plain (default); io_threads=0 (default).
    connection_mode: plain
    io_threads: 0
    tls:
      enable:   false
      only:     false
      port:     7379
      cert_ref: ""
      key_ref:  ""
      ca_ref:   ""
    memory_mb: 0
    modules: [bloom, json, search, timeseries]
    sysctl_settings: {}
    # ★ cloud-provision read-model: vm_ids из register.provision, provider из
    # input.provision, sids из register.provision.hosts[].sid (гейт input.provision.enabled).
    provisioned_vm_ids: [i-aaa111, i-bbb222]
    provisioned_sids: [vm-1.example.com, vm-2.example.com]
    provisioned_provider: wb-dev
    # ★ seed-source read-model (v10): откуда мигрировали + detached:false + ССЫЛКИ на
    # учётку источника. source_password_ref = input.source.password_ref; source_tls_ca_ref=''
    # (tls:false, tls_ca_ref не задан).
    seeded_from:
      source_endpoints:
        - "10.9.0.1:6379"
        - "10.9.0.2:6379"
      detached: false
      source_password_ref: "secret/redis/migrate/oldcluster#password"
      source_tls_ca_ref: ""
