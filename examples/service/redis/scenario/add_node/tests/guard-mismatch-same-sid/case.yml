# L0-испытание add_node: GUARD-провал. new_node_sid == seed_sid → assert-guard
# (ADR-009 amendment 2026-06-23) вычисляет предикат that[0] в FALSE на РЕНДЕРЕ
# Keeper-side → render ОБРЫВАЕТСЯ ошибкой с message ДО любого dispatch (ни одной
# задачи на Soul). Покрывает FALSE-ветку guard-предиката (парный с happy-кейсами,
# где TRUE). Соответствие вычисляется KEEPER-SIDE при render (soulprint.hosts
# доступен); harness ассертит обрыв через expect_render_error (ADR-023 amendment).
name: add_node guard fails when new_node equals seed

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  hosts:
    - sid: node-1.example.com
      covens: [add_node, redis]
      soulprint:
        network: { primary_ip: 10.0.0.1 }
        os: { arch: amd64 }
    - sid: node-9.example.com
      covens: [add_node, redis]
      soulprint:
        network: { primary_ip: 10.0.0.9 }
        os: { arch: amd64 }
  # ★ РЕДИЗАЙН default_admin (2026-06-30): vault-ветка default_admin (коннект под
  # системным admin-юзером). Guard рвёт render ДО destiny/ADD-NODE — пароль здесь не
  # резолвится, но ветка приведена к новой форме для консистентности с happy-кейсами.
  vault:
    secret/redis/add_node/users/default_admin:
      password: default-admin-secret-pass
  # modules_base_url — в essence (v11→v12, Вариант A). Guard рвёт render (same-sid),
  # layout для правдивости fixtures (форма state v12 без layout-ключей).
  essence:
    modules_base_url: "https://artifacts.example.com/redis/modules"
  state:
    redis_type: cluster
    redis_version: ""
    redis_config:
      maxmemory: "256mb"
      cluster-enabled: "yes"
      cluster-config-file: "nodes.conf"
      cluster-node-timeout: "5000"
    redis_users: []
    redis_hosts: []

  input:
    new_node_sid: node-9.example.com
    seed_sid: node-9.example.com
    role: replica

# Render ОБРЫВАЕТСЯ assert-провалом guard-а: ожидаем ошибку рендера с message из
# assert. expect_render_error взаимоисключим с assert.rendered_tasks (плана нет —
# прогон не стартовал).
expect_render_error: "add_node guard: new_node_sid/seed_sid must be distinct hosts of the run roster"
