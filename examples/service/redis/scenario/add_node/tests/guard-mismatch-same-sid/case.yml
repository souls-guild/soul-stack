# L0-испытание add_node: GUARD-провал. new_node_sid == seed_sid → guard рендерится
# в "false" → отрендеренная команда даёт echo+exit 1 (на исполнении порвёт прогон).
# Покрывает FALSE-ветку guard-предиката (парный с happy-кейсами, где TRUE).
# Соответствие вычисляется KEEPER-SIDE при render (soulprint.hosts доступен).
name: add_node guard fails when new_node equals seed

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  hosts:
    - sid: node-1.example.com
      covens: [add_node, redis]
      soulprint:
        network: { primary_ip: 10.0.0.1 }
        os: { arch: amd64 }
    - sid: node-9.example.com
      covens: [add_node, redis]
      soulprint:
        network: { primary_ip: 10.0.0.9 }
        os: { arch: amd64 }
  vault:
    secret/redis/add_node:
      password: s3cr3t-redis-pass-addnode
  state:
    redis_type: cluster
    redis_version: ""
    redis_config:
      maxmemory: "256mb"
      cluster-enabled: "yes"
      cluster-config-file: "nodes.conf"
      cluster-node-timeout: "5000"
    redis_users: {}
    redis_hosts: []

  input:
    new_node_sid: node-9.example.com
    seed_sid: node-9.example.com
    role: replica

assert:
  rendered_tasks:
    # GUARD рендерится в "false" → test "false" = "true" не проходит → echo+exit 1.
    - index: 0
      module: core.cmd.shell
      params:
        cmd: 'test "false" = "true" || { echo "add_node guard: new_node_sid/seed_sid must be distinct hosts of the run roster"; exit 1; }'
