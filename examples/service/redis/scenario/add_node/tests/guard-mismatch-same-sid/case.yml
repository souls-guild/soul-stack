# L0-trial add_node: GUARD failure. new_node_sid == seed_sid → the assert-guard
# (ADR-009 amendment 2026-06-23) evaluates the predicate that[0] as FALSE at RENDER
# time keeper-side → render ABORTS with an error message BEFORE any dispatch (not a single
# task reaches Soul). Covers the FALSE branch of the guard predicate (paired with the happy cases
# where it's TRUE). The match is evaluated KEEPER-SIDE at render (soulprint.hosts
# is available); the harness asserts the abort via expect_render_error (ADR-023 amendment).
name: add_node guard fails when new_node equals seed

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  hosts:
    - sid: node-1.example.com
      covens: [add_node, redis]
      soulprint:
        network: { primary_ip: 10.0.0.1 }
        os: { arch: amd64 }
    - sid: node-9.example.com
      covens: [add_node, redis]
      soulprint:
        network: { primary_ip: 10.0.0.9 }
        os: { arch: amd64 }
  # ★ default_admin REDESIGN (2026-06-30): the default_admin vault branch (connecting as the
  # system admin user). The guard aborts render BEFORE destiny/ADD-NODE — the password isn't
  # resolved here, but the branch is brought to the new form for consistency with the happy cases.
  vault:
    secret/redis/add_node/users/default_admin:
      password: default-admin-secret-pass
  # modules_base_url — in essence (v11→v12, Variant A). The guard aborts render (same-sid),
  # the layout is here for fixture fidelity (state v12 form without layout keys).
  essence:
    modules_base_url: "https://artifacts.example.com/redis/modules"
  state:
    redis_type: cluster
    redis_version: ""
    redis_config:
      maxmemory: "256mb"
      cluster-enabled: "yes"
      cluster-config-file: "nodes.conf"
      cluster-node-timeout: "5000"
    redis_users: []
    redis_hosts: []

  input:
    new_node_sid: node-9.example.com
    seed_sid: node-9.example.com
    role: replica

# Render ABORTS with the guard's assert failure: we expect a render error with the message from
# assert. expect_render_error is mutually exclusive with assert.rendered_tasks (there's no plan —
# the run never started).
expect_render_error: "add_node guard: new_node_sid/seed_sid must be distinct hosts of the run roster"
