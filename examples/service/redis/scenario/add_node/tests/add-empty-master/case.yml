# L0 trial add_node: add a new node as an empty MASTER (role=master).
# add-node does NOT move slots (slot migration is a separate reshard, follow-up):
# the scenario just passes role=master, master.addr is empty (not needed for master).
name: add empty master node

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  hosts:
    - sid: node-1.example.com
      covens: [add_node, redis]
      soulprint:
        network: { primary_ip: 10.0.0.1 }
        os: { arch: amd64 }
    - sid: node-2.example.com
      covens: [add_node, redis]
      soulprint:
        network: { primary_ip: 10.0.0.2 }
        os: { arch: amd64 }
    - sid: node-9.example.com
      covens: [add_node, redis]
      soulprint:
        network: { primary_ip: 10.0.0.9 }
        os: { arch: amd64 }
  # ★ default_admin REDESIGN (2026-06-30): connecting to nodes is done under the system default_admin
  # (PING-gate + CLUSTER MEET + deploy's masterauth read its password). The former main
  # secret secret/redis/<inc>#password is DROPPED — users/default_admin branch instead.
  vault:
    secret/redis/add_node/users/default_admin:
      password: default-admin-secret-pass
  # modules_base_url — in essence (v11→v12, Option A): moved out of state, a re-run reads
  # it from here. The case doesn't assert module paths (guard/add-node plugin), the layout is for
  # fixture fidelity (state v12 shape without layout keys).
  essence:
    modules_base_url: "https://artifacts.example.com/redis/modules"
  state:
    redis_type: cluster
    redis_version: ""
    redis_config:
      maxmemory: "256mb"
      cluster-enabled: "yes"
      cluster-config-file: "nodes.conf"
      cluster-node-timeout: "5000"
    redis_users: []
    redis_hosts: []

  input:
    new_node_sid: node-9.example.com
    seed_sid: node-1.example.com
    role: master

assert:
  # GUARD — assert: (not emitted into the plan).
  task_present:
    # ADD-NODE: the only community.redis.cluster in the plan.
    - module: community.redis.cluster
      params_subset:
        action: add-node
        role: master
        username: default_admin
        password: default-admin-secret-pass
        new_node:
          addr: "10.0.0.9:6379"
        seed:
          addr: "10.0.0.1:6379"
        master:
          addr: ""
