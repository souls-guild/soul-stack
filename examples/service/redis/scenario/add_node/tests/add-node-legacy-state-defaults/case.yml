# L0 test for add_node — has()-SAFE, host-layout from ESSENCE (v11→v12, Variant A).
# Guard: add_node reads conf_dir/data_dir/modules_base_url from essence via
# default(essence.<x>, '<default>'). When essence does NOT override host-layout
# (essence without these keys), default catches the missing leaf and does NOT fail with
# "no such key", returning the default paths. Regression "bare essence.conf_dir" = render fail
# no-such-key on essence without a host-layout override. Migration from incarnation.state to
# essence: host layout moved out of state into essence (v11→v12), a re-run reads it from there.
#
# essence is INTENTIONALLY without conf_dir/data_dir/modules_base_url (layout not overridden).
# Expected:
#   - render does NOT fail no-such-key (render succeeds, plan is built);
#   - destiny gets the DEFAULT paths: redis.conf → /etc/redis, modules-dir → /var/lib/redis;
#   - the add-node plugin builds endpoints from the roster as usual.
name: add_node tolerates essence without conf_dir/data_dir/modules_base_url override

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  hosts:
    - sid: node-1.example.com
      covens: [add_node, redis]
      soulprint:
        network: { primary_ip: 10.0.0.1 }
        os: { arch: amd64 }
    - sid: node-9.example.com
      covens: [add_node, redis]
      soulprint:
        network: { primary_ip: 10.0.0.9 }
        os: { arch: amd64 }
  # ★ default_admin REDESIGN (2026-06-30): connecting to nodes is done as the system default_admin
  # (the PING gate + CLUSTER MEET + deploy's masterauth read its password). The former main
  # secret secret/redis/<inc>#password is DROPPED — replaced by the users/default_admin branch.
  vault:
    secret/redis/add_node/users/default_admin:
      password: default-admin-secret-pass
  # essence WITHOUT conf_dir/data_dir/modules_base_url: host-layout is NOT overridden
  # by the operator → a re-run reads it via the default paths (default(essence.<x>, '<default>')).
  # The essence block is omitted entirely (empty essence) — checking has()-safe for the absence
  # of all three keys at once. redis_version="" — no pin (< 8 effectively → modules
  # go through the default paths).
  state:
    redis_type: cluster
    redis_version: ""
    redis_config:
      maxmemory: "256mb"
      cluster-enabled: "yes"
      cluster-config-file: "nodes.conf"
      cluster-node-timeout: "5000"
    redis_users: []
    redis_hosts: []

  input:
    new_node_sid: node-9.example.com
    seed_sid: node-1.example.com
    role: master

assert:
  task_present:
    # redis.conf under the DEFAULT conf_dir (essence without conf_dir → default /etc/redis):
    # proves default(essence.conf_dir, '/etc/redis') worked, render didn't fail.
    # Disambiguator — path.
    - module: core.file.rendered
      params_subset:
        path: /etc/redis/redis.conf
    # data-dir under the DEFAULT data_dir (essence without data_dir → default /var/lib/redis):
    # proves default(essence.data_dir, '/var/lib/redis') worked has()-safe on
    # essence without an override. Disambiguator — path. An UNCONDITIONAL install.yml task
    # (data-dir is created in both install branches, not gated) — always present.
    # ★ NOT modules-dir (/var/lib/redis/modules): after the "modules ALWAYS ALL" redesign
    # (2026-06-25) the modules group is gated on vars.redis_modules_enabled, which requires
    # a NON-EMPTY modules_base_url; essence without the key → default(essence.modules_base_url,'')
    # = '' → vanilla redis → modules.yml group-drop (no modules-dir in the plan — correct).
    # We prove the data_dir default via the unconditional data-dir task.
    - module: core.directory.present
      params_subset:
        path: /var/lib/redis
    # ADD-NODE plugin: empty master_sid → master.addr empty (role=master). Endpoints
    # from the roster. Proves the re-run reached the end (render didn't abort).
    - module: community.redis.cluster
      params_subset:
        action: add-node
        role: master
        username: default_admin
        password: default-admin-secret-pass
        new_node:
          addr: "10.0.0.9:6379"
        seed:
          addr: "10.0.0.1:6379"
        master:
          addr: ""
