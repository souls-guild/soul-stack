# L0-испытание add_node — has()-SAFE, host-layout из ESSENCE (v11→v12, Вариант A).
# Guard: add_node читает conf_dir/data_dir/modules_base_url из essence через
# default(essence.<x>, '<дефолт>'). Когда essence НЕ переопределяет host-layout
# (essence без этих ключей), default ловит отсутствие листа и НЕ падает «no such key»,
# отдавая дефолтные пути. Регресс «голый essence.conf_dir» = render-фейл no-such-key
# на essence без host-layout-override. Переезд с incarnation.state на essence: host-
# layout вынесен из state в essence (v11→v12), повторный прогон читает его оттуда.
#
# essence НАМЕРЕННО без conf_dir/data_dir/modules_base_url (layout не переопределён).
# Ожидаем:
#   - render НЕ падает no-such-key (рендер успешен, план собран);
#   - destiny получает ДЕФОЛТНЫЕ пути: redis.conf → /etc/redis, modules-dir → /var/lib/redis;
#   - add-node плагин строит endpoint-ы из roster как обычно.
name: add_node tolerates essence without conf_dir/data_dir/modules_base_url override

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  hosts:
    - sid: node-1.example.com
      covens: [add_node, redis]
      soulprint:
        network: { primary_ip: 10.0.0.1 }
        os: { arch: amd64 }
    - sid: node-9.example.com
      covens: [add_node, redis]
      soulprint:
        network: { primary_ip: 10.0.0.9 }
        os: { arch: amd64 }
  # ★ РЕДИЗАЙН default_admin (2026-06-30): коннект к нодам — под системным default_admin
  # (PING-gate + CLUSTER MEET + masterauth деплоя читают его пароль). Прежний главный
  # секрет secret/redis/<inc>#password ДРОПНУТ — ветка users/default_admin.
  vault:
    secret/redis/add_node/users/default_admin:
      password: default-admin-secret-pass
  # essence БЕЗ conf_dir/data_dir/modules_base_url: host-layout НЕ переопределён
  # оператором → повторный прогон читает его дефолтными путями (default(essence.<x>, '<деф>')).
  # essence-блок опущен целиком (пустой essence) — проверяем has()-safe на отсутствие
  # всех трёх ключей разом. redis_version="" — без пина (< 8 эффективно → модули
  # проходят дефолтными путями).
  state:
    redis_type: cluster
    redis_version: ""
    redis_config:
      maxmemory: "256mb"
      cluster-enabled: "yes"
      cluster-config-file: "nodes.conf"
      cluster-node-timeout: "5000"
    redis_users: []
    redis_hosts: []

  input:
    new_node_sid: node-9.example.com
    seed_sid: node-1.example.com
    role: master

assert:
  task_present:
    # redis.conf под ДЕФОЛТНЫМ conf_dir (essence без conf_dir → default /etc/redis):
    # доказывает, что default(essence.conf_dir, '/etc/redis') сработал, render не упал.
    # Дизамбигуатор — path.
    - module: core.file.rendered
      params_subset:
        path: /etc/redis/redis.conf
    # data-dir под ДЕФОЛТНЫМ data_dir (essence без data_dir → default /var/lib/redis):
    # доказывает, что default(essence.data_dir, '/var/lib/redis') сработал has()-safe на
    # essence без override. Дизамбигуатор — path. БЕЗУСЛОВНАЯ задача install.yml (data-dir
    # создаётся в обеих install-ветках, не gated) — присутствует всегда.
    # ★ НЕ modules-dir (/var/lib/redis/modules): после редизайна «модули ВСЕГДА ВСЕ»
    # (2026-06-25) modules-группа gated на vars.redis_modules_enabled, требующий
    # НЕПУСТОЙ modules_base_url; essence без ключа → default(essence.modules_base_url,'')
    # = '' → vanilla redis → modules.yml group-drop (modules-dir в плане НЕТ — корректно).
    # data_dir-дефолт доказываем безусловной data-dir задачей.
    - module: core.file.directory
      params_subset:
        path: /var/lib/redis
    # ADD-NODE плагин: пустой master_sid → master.addr пуст (role=master). Endpoint-ы
    # из roster. Доказывает, что повторный прогон дошёл до конца (render не сорвался).
    - module: community.redis.cluster
      params_subset:
        action: add-node
        role: master
        username: default_admin
        password: default-admin-secret-pass
        new_node:
          addr: "10.0.0.9:6379"
        seed:
          addr: "10.0.0.1:6379"
        master:
          addr: ""
