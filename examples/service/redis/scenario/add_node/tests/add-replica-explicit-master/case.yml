# L0 test for add_node: REPLICA with an EXPLICIT master (master_sid is set → master.addr
# = the primary_ip of the corresponding host). Paired with add-replica-auto-master:
# confirms that master_sid is threaded through into master.addr (the has(master_sid)
# branch of the ternary), not an empty string. The plugin resolves the master's node-id from this addr.
name: add replica node (explicit master)

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  hosts:
    - sid: node-1.example.com
      covens: [add_node, redis]
      soulprint:
        network: { primary_ip: 10.0.0.1 }
        os: { arch: amd64 }
    - sid: node-2.example.com
      covens: [add_node, redis]
      soulprint:
        network: { primary_ip: 10.0.0.2 }
        os: { arch: amd64 }
    - sid: node-9.example.com
      covens: [add_node, redis]
      soulprint:
        network: { primary_ip: 10.0.0.9 }
        os: { arch: amd64 }
  # ★ default_admin REDESIGN (2026-06-30): connecting to nodes is done as the system default_admin
  # (PING-gate + CLUSTER MEET + deploy masterauth read its password). The former primary
  # secret secret/redis/<inc>#password is DROPPED - users/default_admin branch.
  vault:
    secret/redis/add_node/users/default_admin:
      password: default-admin-secret-pass
  # modules_base_url - in essence (v11→v12, Option A): moved out of state, a repeat run reads
  # from here (the new node pulls .so from the same source as the cluster).
  essence:
    modules_base_url: "https://artifacts.example.com/redis/modules"
  state:
    redis_type: cluster
    redis_version: ""
    redis_config:
      maxmemory: "256mb"
      cluster-enabled: "yes"
      cluster-config-file: "nodes.conf"
      cluster-node-timeout: "5000"
    redis_users: []
    redis_hosts: []

  input:
    new_node_sid: node-9.example.com
    seed_sid: node-1.example.com
    role: replica
    master_sid: node-2.example.com

assert:
  # GUARD - assert: (not emitted into the plan).
  task_present:
    # ADD-NODE: master.addr = primary_ip of host node-2 (explicit master_sid).
    # The only community.redis.cluster in the plan.
    - module: community.redis.cluster
      params_subset:
        action: add-node
        role: replica
        username: default_admin
        password: default-admin-secret-pass
        new_node:
          addr: "10.0.0.9:6379"
        seed:
          addr: "10.0.0.1:6379"
        master:
          addr: "10.0.0.2:6379"
