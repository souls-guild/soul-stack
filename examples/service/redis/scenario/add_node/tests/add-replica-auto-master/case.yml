# L0 test for add_node: join a new node as a REPLICA with AUTO-selected
# master (master_sid not set → master.addr empty → the plugin balances on its own).
# Run roster is 3 hosts (two existing nodes + newcomer node-9). The destiny task's
# target is ONLY the newcomer (where soulprint.self.sid == new_node_sid):
# render_context.self = node-9, the cluster-announce-ip in .tmpl comes from ITS
# primary_ip (TILING lesson: per-host via .self, not apply.input).
#
# redis.conf config comes from incarnation.state.redis_config (source of truth,
# fixed at create) — NOT recomputed → no render↔state drift.
# add-node nodes-endpoints are built from the roster (soulprint.hosts) by SID:
# new_node=node-9, seed=node-1; master.addr empty (auto-select).
name: add replica node (auto-pick master)

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  hosts:
    - sid: node-1.example.com
      covens: [add_node, redis]
      soulprint:
        network: { primary_ip: 10.0.0.1 }
        os: { arch: amd64 }
    - sid: node-2.example.com
      covens: [add_node, redis]
      soulprint:
        network: { primary_ip: 10.0.0.2 }
        os: { arch: amd64 }
    - sid: node-9.example.com
      covens: [add_node, redis]
      soulprint:
        network: { primary_ip: 10.0.0.9 }
        os: { arch: amd64 }
  # ★ default_admin REDESIGN (2026-06-30): connecting to nodes as the system default_admin
  # (PING-gate + CLUSTER MEET + masterauth deploy read its password). The old main
  # secret secret/redis/<inc>#password is DROPPED — the users/default_admin branch.
  vault:
    secret/redis/add_node/users/default_admin:
      password: default-admin-secret-pass
  # host-layout — in essence (v11→v12, Option A): modules_base_url moved out of state,
  # add_node reads it from there (the new node pulls .so from the same source).
  essence:
    modules_base_url: "https://artifacts.example.com/redis/modules"
  state:
    redis_type: cluster
    redis_version: ""
    redis_config:
      maxmemory: "256mb"
      cluster-enabled: "yes"
      cluster-config-file: "nodes.conf"
      cluster-node-timeout: "5000"
    redis_users: []
    redis_hosts: []

  input:
    new_node_sid: node-9.example.com
    seed_sid: node-1.example.com
    role: replica

assert:
  # GUARD — assert: (new_node != seed, both in roster → that[0] true → render passes,
  # the task is not omitted from the plan).
  task_present:
    # redis.conf renders on the NEW node (render_context.self = node-9).
    # config = incarnation.state.redis_config (cluster directives), not recomputed.
    # Disambiguator from users.acl/hardening (same core.file.rendered) — path.
    - module: core.file.rendered
      params_subset:
        path: /etc/redis/redis.conf
        template_content: "<present>"
        mode: "0640"
        owner: redis
        group: redis
        render_context:
          vars:
            # host-layout (directive B): the new node takes its layout from essence (v11→v12,
            # Option A; default /etc/redis ÷ /var/lib/redis, essence without override → default),
            # the template derives dir/aclfile from them — the same layout as the node that created the cluster.
            conf_dir: /etc/redis
            data_dir: /var/lib/redis
            port: 6379
            run_dir: /var/run/redis
            log_dir: /var/log/redis
            loadmodules:
              - /var/lib/redis/modules/redisbloom.so
              - /var/lib/redis/modules/rejson.so
              - /var/lib/redis/modules/redisearch.so
              - /var/lib/redis/modules/redistimeseries.so
            config:
              # ★ default_admin REDESIGN: masteruser/masterauth are LAYERED on top of
              # incarnation.state.redis_config as regular directives (config-merge add_node) —
              # static replica→master AUTH (the node may join as a replica). masterauth is
              # the system default_admin's password from Vault (users/default_admin#password).
              masteruser: "default_admin"
              masterauth: "default-admin-secret-pass"
              maxmemory: "256mb"
              cluster-enabled: "yes"
              cluster-config-file: "nodes.conf"
              cluster-node-timeout: "5000"
          self:
            sid: node-9.example.com
            covens: [add_node, redis]
            choirs: []
            # traits — registry projection (ADR-060), an empty object with no labels.
            traits: {}
            role: ""
            network:
              primary_ip: 10.0.0.9
            os:
              arch: amd64
          role: ""
          essence: {}

    # health-gate on the new node: PING a live Redis before adding it to the cluster.
    # cluster/sentinel PING — placeholder-skip; disambiguator addr/args.
    - module: community.redis.command
      params_subset:
        addr: "127.0.0.1:6379"
        username: default_admin
        password: default-admin-secret-pass
        args: ["PING"]

    # ADD-NODE run_once: endpoints from the roster by SID. master.addr is empty
    # (auto-selecting the least loaded master is done by the plugin — the scenario doesn't relay it).
    # The single community.redis.cluster in the plan.
    - module: community.redis.cluster
      params_subset:
        action: add-node
        role: replica
        username: default_admin
        password: default-admin-secret-pass
        new_node:
          addr: "10.0.0.9:6379"
        seed:
          addr: "10.0.0.1:6379"
        master:
          addr: ""
