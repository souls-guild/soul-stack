# L0-испытание add_node: присоединить новую ноду как РЕПЛИКУ с АВТО-выбором
# master (master_sid не задан → master.addr пуст → плагин балансирует сам).
# Roster прогона — 3 хоста (две существующие ноды + новичок node-9). Таргет
# destiny-задачи — ТОЛЬКО новичок (where soulprint.self.sid == new_node_sid):
# render_context.self = node-9, cluster-announce-ip в .tmpl возьмётся из ЕГО
# primary_ip (TILING-урок: per-host через .self, не apply.input).
#
# Конфиг redis.conf берётся из incarnation.state.redis_config (источник истины,
# зафиксированный create) — НЕ перевычисляется → нет drift render↔state.
# nodes-endpoint-ы add-node строятся из roster (soulprint.hosts) по SID:
# new_node=node-9, seed=node-1; master.addr пуст (авто-выбор).
name: add replica node (auto-pick master)

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  hosts:
    - sid: node-1.example.com
      covens: [add_node, redis]
      soulprint:
        network: { primary_ip: 10.0.0.1 }
        os: { arch: amd64 }
    - sid: node-2.example.com
      covens: [add_node, redis]
      soulprint:
        network: { primary_ip: 10.0.0.2 }
        os: { arch: amd64 }
    - sid: node-9.example.com
      covens: [add_node, redis]
      soulprint:
        network: { primary_ip: 10.0.0.9 }
        os: { arch: amd64 }
  # ★ РЕДИЗАЙН default_admin (2026-06-30): коннект к нодам — под системным default_admin
  # (PING-gate + CLUSTER MEET + masterauth деплоя читают его пароль). Прежний главный
  # секрет secret/redis/<inc>#password ДРОПНУТ — ветка users/default_admin.
  vault:
    secret/redis/add_node/users/default_admin:
      password: default-admin-secret-pass
  # host-layout — в essence (v11→v12, Вариант A): modules_base_url вынесен из state,
  # add_node читает его отсюда (новая нода тянет .so из того же источника).
  essence:
    modules_base_url: "https://artifacts.example.com/redis/modules"
  state:
    redis_type: cluster
    redis_version: ""
    redis_config:
      maxmemory: "256mb"
      cluster-enabled: "yes"
      cluster-config-file: "nodes.conf"
      cluster-node-timeout: "5000"
    redis_users: []
    redis_hosts: []

  input:
    new_node_sid: node-9.example.com
    seed_sid: node-1.example.com
    role: replica

assert:
  # GUARD — assert: (new_node != seed, оба в roster → that[0] true → render проходит,
  # задача в план не эмитится).
  task_present:
    # redis.conf рендерится на НОВОЙ ноде (render_context.self = node-9).
    # config = incarnation.state.redis_config (cluster-директивы), не перевычислен.
    # Дизамбигуатор от users.acl/hardening (тот же core.file.rendered) — path.
    - module: core.file.rendered
      params_subset:
        path: /etc/redis/redis.conf
        template_content: "<present>"
        mode: "0640"
        owner: redis
        group: redis
        render_context:
          vars:
            # host-layout (директива B): новая нода берёт layout из essence (v11→v12,
            # Вариант A; default /etc/redis ÷ /var/lib/redis, essence без override → дефолт),
            # шаблон выводит dir/aclfile из них — тот же layout, что у создавшей кластер ноды.
            conf_dir: /etc/redis
            data_dir: /var/lib/redis
            port: 6379
            run_dir: /var/run/redis
            log_dir: /var/log/redis
            loadmodules:
              - /var/lib/redis/modules/redisbloom.so
              - /var/lib/redis/modules/rejson.so
              - /var/lib/redis/modules/redisearch.so
              - /var/lib/redis/modules/redistimeseries.so
            config:
              # ★ РЕДИЗАЙН default_admin: masteruser/masterauth ДОЛИВАЮТСЯ поверх
              # incarnation.state.redis_config обычными директивами (config-merge add_node) —
              # статическая replica→master AUTH (нода может войти репликой). masterauth —
              # пароль системного default_admin из Vault (users/default_admin#password).
              masteruser: "default_admin"
              masterauth: "default-admin-secret-pass"
              maxmemory: "256mb"
              cluster-enabled: "yes"
              cluster-config-file: "nodes.conf"
              cluster-node-timeout: "5000"
          self:
            sid: node-9.example.com
            covens: [add_node, redis]
            choirs: []
            # traits — registry-проекция (ADR-060), пустой объект без меток.
            traits: {}
            role: ""
            network:
              primary_ip: 10.0.0.9
            os:
              arch: amd64
          role: ""
          essence: {}

    # health-gate на новой ноде: PING живого Redis перед вводом в кластер.
    # cluster/sentinel PING — placeholder-skip; дизамбигуатор addr/args.
    - module: community.redis.command
      params_subset:
        addr: "127.0.0.1:6379"
        username: default_admin
        password: default-admin-secret-pass
        args: ["PING"]

    # ADD-NODE run_once: endpoint-ы из roster по SID. master.addr пуст (авто-выбор
    # наименее загруженного master-а делает плагин — scenario не транслирует).
    # Единственная community.redis.cluster в плане.
    - module: community.redis.cluster
      params_subset:
        action: add-node
        role: replica
        username: default_admin
        password: default-admin-secret-pass
        new_node:
          addr: "10.0.0.9:6379"
        seed:
          addr: "10.0.0.1:6379"
        master:
          addr: ""
