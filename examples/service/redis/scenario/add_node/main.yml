name: add_node
description: >-
  Attach a single new node to an already-formed Redis cluster. The node must already be
  onboarded as a Soul; a master is added empty — slot migration is a separate reshard.

# ── Operator input contract (docs/input.md) ────────────────────────────────
# Simple typed operator concepts: which SID to add, with which role, which existing
# node to contact (seed), which master to attach a replica to.
input:
  new_node_sid:
    type: string
    required: true
    format: fqdn
    description: >-
      SID (FQDN) of the new node — a Soul already bound to the incarnation, that needs
      to be brought into the cluster. Must be present in the run roster (soulprint.hosts).

  seed_sid:
    type: string
    required: true
    format: fqdn
    description: >-
      SID of any EXISTING node of the cluster — the contact for CLUSTER MEET and the
      source of CLUSTER NODES (idempotency). Must differ from new_node_sid.

  role:
    type: string
    required: false
    default: replica
    enum: [replica, master]
    description: >-
      Role of the new node. replica — become a replica of a master (master_sid or, if not
      set, the least loaded one — the plugin chooses). master — an empty master
      with no slots (slots migrated by a separate reshard).

  master_sid:
    type: string
    required: false
    format: fqdn
    description: >-
      SID of the master node (role=replica) that the newcomer becomes a replica of. Not
      set → the plugin picks the master with the fewest replicas (load balancing).

# incarnation.state is NOT mutated by this scenario in the current slice: the exact role
# of each SID isn't written to state (redis_hosts population is a follow-up, see the brief
# "pilot topology"). add_node changes the live cluster topology, not the declaration.

tasks:
  # 1. GUARD — new_node_sid and seed_sid must be in the roster and distinct (assert:,
  #    ADR-009 amendment 2026-06-23; the same mechanism as create's size-guard). The
  #    predicate is evaluated KEEPER-SIDE at RENDER TIME (soulprint.hosts is available
  #    there; it's NOT on the Soul). false ABORTS the render with a message BEFORE any
  #    dispatch — earlier and clearer than a shell-test on the host. assert does NOT emit
  #    a RenderedTask.
  - name: Guard new_node and seed are distinct members of the run roster
    assert:
      that:
        - 'input.new_node_sid != input.seed_sid && size(soulprint.hosts.where("sid == input.new_node_sid")) == 1 && size(soulprint.hosts.where("sid == input.seed_sid")) == 1'
      message: "add_node guard: new_node_sid/seed_sid must be distinct hosts of the run roster"

  # 2. Per-host install + render redis.conf (cluster directives) + systemd on the NEW
  #    node (targeted by stable SID). The same mode-agnostic `redis` destiny as create/
  #    cluster: cluster-enabled/cluster-config-file/cluster-node-timeout — host-invariant
  #    keys of the merged config (from incarnation.state.redis_config — the SOURCE OF
  #    TRUTH fixed by create, we do NOT recompute → no drift). cluster-announce-ip is NOT
  #    HERE: per-host, rendered by the `redis` destiny in redis.conf.tmpl from
  #    {{ .self.network.primary_ip }} gated on cluster-enabled (the TILING lesson).
  #    Password — keeper-side vault() resolve.
  - name: Apply redis destiny on the new cluster node (install + render + systemd)
    where: soulprint.self.sid == input.new_node_sid
    apply:
      destiny: redis
      input:
        version:  "${ default(incarnation.state.redis_version, '') }"
        # ★ install: REQUIRED on a repeat run (regression from live E2E 2026-07-01). A new
        # node arrives WITHOUT redis — install.yml installs it. Without an install
        # structure the dispatcher falls into the package branch via !has(input.install) →
        # core.pkg `apt install redis-server=<version>` (the version from the Nexus binary
        # is ABSENT in apt → env exited 100). We assemble the SAME binary structure as
        # create (deploy-body → compute.install from essence.install_method) — the new
        # node is installed the same way as the cluster. version — from the DEPLOYED state
        # (the cluster's redis_version), not input.version.
        install: >-
          ${ (default(essence.install_method, 'binary') == 'binary')
               ? {
                   'method':        'binary',
                   'base_url':      default(essence.binary_base_url, ''),
                   'version':       default(incarnation.state.redis_version, ''),
                   'allow_private': default(essence.binary_allow_private, true)
                 }
               : { 'method': 'package' } }
        # conf_dir/data_dir: host-layout of the new node (directive B) — the SAME paths as
        # the cluster. Read from essence (v11→v12, Variant A): layout is author-context,
        # the same source as create's compute.conf_dir/data_dir. The new node must know
        # the same layout, otherwise redis.conf/.so/tls would land in default paths,
        # diverging from the cluster. default(...,'/etc/redis'|'/var/lib/redis') — has()-safe,
        # if essence doesn't override the layout (default paths). Desync risk accepted: if
        # the operator changed essence.conf_dir/data_dir after create — the new node gets
        # the NEW layout.
        conf_dir: "${ default(essence.conf_dir, '/etc/redis') }"
        data_dir: "${ default(essence.data_dir, '/var/lib/redis') }"
        # ★ default_admin REDESIGN (2026-06-30): apply.input.password REMOVED (requirepass
        # dropped — the destiny no longer accepts password). Authentication is under the
        # system default_admin, its password arrives in users below (system users are
        # added from essence).
        #
        # ★ STATIC replica→master AUTH in redis.conf — masteruser/masterauth are ADDED on
        # top of incarnation.state.redis_config (the source of truth from create) as
        # ORDINARY directives (same as the cluster deploy reference). CRITICAL if the new
        # node joins as a replica: a cluster replica on FULLSYNC passes AUTH ONLY via the
        # static masterauth in redis.conf (the plugin only sends REPLICATE master-id,
        # doesn't set masterauth) — without it PSYNC would hit NOAUTH →
        # master_link_status:DOWN. Added on the new node host-invariantly (one
        # default_admin per cluster). Failover-safe: inert on role=master. The scenario
        # body (outside covenant) hardcodes 'default_admin' directly. masterauth — vault()-
        # IN-CELL (seal-masking, ADR-010 §7.4); path —
        # secret/redis/<inc>/users/default_admin#password.
        config: >-
          ${ merge(incarnation.state.redis_config, {
               'masteruser': 'default_admin',
               'masterauth': vault('secret/redis/' + incarnation.name + '/users/default_admin#password')
             }) }
        # Source of Redis module .so files — from essence (the "modules ALWAYS ALL"
        # directive): the new cluster node pulls the same module set from the same source
        # as the cluster. essence.modules_base_url — author-context (v11→v12); default ''
        # if not set (Redis 8+ — modules are built-in, base_url unused).
        modules_base_url: "${ default(essence.modules_base_url, '') }"
        # ★★ CRITICAL (system-ACL-users d2): the new node MUST get the same users.acl as
        # the cluster — SYSTEM users (from essence, FIRST: replica/monitoring/sentinel/
        # haproxy) + operator-extra (state.redis_users — an ARRAY of AclUser, wave 1b, ON
        # TOP). WITHOUT the system replica user the new node CANNOT replicate (PSYNC) —
        # the cluster won't accept it as a replica. System users are NOT in state (item 7
        # d2) — added from essence. Vault password from the same
        # secret/redis/<inc>/users/<name>#password branch. operator-extra:
        # .map(u, {u.name: …}) (name from field u.name, previously the map key).
        users: >-
          ${ merge(
               merge(default(essence.system_acl_users, {}).map(name, {
                 name: {
                   'perms':    essence.system_acl_users[name],
                   'state':    'on',
                   'password': vault('secret/redis/' + incarnation.name + '/users/' + name + '#password')
                 }
               })),
               has(incarnation.state.redis_users)
                 ? merge(incarnation.state.redis_users.map(u, {
                     u.name: {
                       'perms':    u.perms,
                       'state':    u.state,
                       'password': vault('secret/redis/' + incarnation.name + '/users/' + u.name + '#password')
                     }
                   }))
                 : {}
             ) }

  # 3. Health-gate: the new node must answer PING BEFORE being added to the cluster.
  #    community.redis.command, retry/until via retry. addr localhost (plugin on the node
  #    itself). ★ default_admin REDESIGN (2026-06-30): the PING connect is under the
  #    system default_admin (username → AUTH, requirepass dropped); password from the new
  #    Vault path users/default_admin. The scenario body (outside covenant) hardcodes
  #    'default_admin'.
  - name: Wait for the new node to answer PING
    where: soulprint.self.sid == input.new_node_sid
    module: community.redis.command
    retry: { count: 10, delay: 3s }
    params:
      addr:     "127.0.0.1:6379"
      username: default_admin
      password: "${ vault('secret/redis/' + incarnation.name + '/users/default_admin#password') }"
      args:     ["PING"]

  # 4. ADD-NODE — run_once. Endpoints are built from the roster (soulprint.hosts) by SID:
  #    new_node/seed/master = {addr: "<primary_ip>:6379"}. This is READY topology — the
  #    plugin translates nothing, it sends CLUSTER MEET/REPLICATE/NODES via go-redis.
  #    .where("sid == ...")[0] is deterministic (single-host roster filter; precedent from
  #    redis-cluster/create replication.yml). master is passed ONLY when role=replica and
  #    master_sid is set; otherwise the plugin picks the master itself.
  - name: Add the new node to the cluster (CLUSTER MEET + REPLICATE/empty-master)
    run_once: true
    module: community.redis.cluster
    params:
      action:   add-node
      role:     "${ default(input.role, 'replica') }"
      # ★ default_admin REDESIGN (2026-06-30): connection to the nodes is under the system
      # default_admin (username → AUTH, requirepass dropped); password from the new Vault
      # path users/default_admin.
      username: default_admin
      password: "${ vault('secret/redis/' + incarnation.name + '/users/default_admin#password') }"
      new_node:
        addr: "${ soulprint.hosts.where(\"sid == input.new_node_sid\")[0].network.primary_ip + ':6379' }"
      seed:
        addr: "${ soulprint.hosts.where(\"sid == input.seed_sid\")[0].network.primary_ip + ':6379' }"
      # master.addr is empty if master_sid isn't set → the plugin treats this as
      # "unspecified" and picks the master itself (load balancing). .where is inside the
      # string ${…}-cell, NOT inside a CEL-map literal (rewrite doesn't reach into
      # {…}-literals).
      master:
        addr: >-
          ${ has(input.master_sid)
             ? soulprint.hosts.where("sid == input.master_sid")[0].network.primary_ip + ':6379'
             : '' }
