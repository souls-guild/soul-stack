# Baseline-essence сервиса redis (подложка автора, концепция defaults роли).
# Оператор переопределяет в spec инкарнации; на L0-прогоне ключевые значения
# дублируются в fixtures кейса.
#
# Это СЛОЙ ТРАНСЛЯЦИИ простого ввода оператора (architect 2026-06-22): данные-
# таблицы (persistence_presets, memory_reserve_percent) и merge-подложка
# redis_config живут здесь, scenario сливает их с вводом через merge() (templating
# §2.3). НИЧЕГО из этой трансляции не уходит в плагин — она нужна только render-у
# redis.conf at-create (источник истины).

# Режим развёртывания по умолчанию. Режимы сервиса — sentinel/cluster (2026-06-25);
# sentinel с replicas_per_master=0 даёт standalone-эквивалент.
redis_type: sentinel

# Логическое имя monitored master в Sentinel (директива sentinel.conf SENTINEL
# MONITOR + community.redis.sentinel master_name). Переехало из operator-input в
# essence (2026-06-25): author-context, оператор переопределяет в spec.essence.
# Дефолт `master` (раньше operator-default был `mymaster`).
sentinel_master_name: master

# Базовый URL источника .so Redis-модулей (без арх-сегмента). destiny `redis` строит
# полный URL per-host как <base_url>/<arch>/<имя.so> (Redis < 8: модули разворачиваются
# всегда все). Переехало из operator-input в essence (2026-06-25): author-context,
# оператор переопределяет в spec.essence под свой mirror. Дефолт "" — не задан (Redis
# 8+ — модули встроены, источник не нужен; на Redis < 8 оператор обязан переопределить).
modules_base_url: ""

# Доля бюджета памяти (input.memory_mb), отдаваемая Redis под maxmemory; остаток —
# резерв под ОС/накладные. scenario вычисляет maxmemory = memory_mb*pct/100 (МБ).
memory_reserve_percent: 75

# Данные-таблица persistence: enum оператора (off/aof/rdb/rdb_aof) → директивы
# redis.conf. scenario берёт presets[input.persistence] и мержит в redis_config.
# Значения — строки (range-ятся в redis.conf как `<key> <value>`):
#   - save: "" отключает RDB-снапшоты; непустая — política save точек.
#   - appendonly: yes/no включает AOF.
# rdb_aof = и снапшоты, и AOF (двойная durability).
persistence_presets:
  off:
    save:       ""
    appendonly: "no"
  aof:
    save:       ""
    appendonly: "yes"
  rdb:
    save:       "900 1 300 10 60 10000"
    appendonly: "no"
  rdb_aof:
    save:       "900 1 300 10 60 10000"
    appendonly: "yes"

# TLS (концепция Ansible-роли redis: defaults redis_tls_*). Источник PEM —
# Vault-ПУТИ (не сам PEM): scenario резолвит их через ${ vault(<ref>) } в render-
# фазе и передаёт ЦЕЛЫЕ PEM в destiny/плагин. Пути — доверенный контекст автора
# (essence), не operator-input → vault() принимает их динамическим аргументом
# (templating.md §2.3). Форма ref — "<mount>/<path>#<field>" (как requirepass).
# tls_enable/tls_only по умолчанию false (plaintext); tls_port — 7379 (как роль).
tls_enable: false
tls_only:   false
tls_port:   7379
# Vault-пути источника PEM (заполнить под реальную инсталляцию). Дефолт —
# конвенция secret/services/redis/tls (симметрия с secret/redis/<inc> паролей).
tls_cert_ref: "secret/services/redis/tls#cert"
tls_key_ref:  "secret/services/redis/tls#key"
tls_ca_ref:   "secret/services/redis/tls#ca"

# ── Системные ACL-юзеры Redis (концепция Ansible-роли redis: redis_system_users /
#    redis_sentinel_system_users) ────────────────────────────────────────────────
# Имя→ACL-perms-строка СЛУЖЕБНЫХ юзеров, без которых кластер не работает: replica
# (репликация PSYNC), monitoring (экспортёр метрик), sentinel (sentinel↔redis AUTH),
# haproxy (health-check балансировщика). perms скопированы 1:1 из vars/main.yml роли
# (redis_system_users / redis_sentinel_system_users) — НЕ выдумывать, источник истины.
#
# Два набора, потому что у redis-server и sentinel-демона РАЗНЫЕ требования к командам
# (sentinel-команды vs обычные redis-команды) → ДВА aclfile: users.acl (redis-server,
# system_acl_users) и sentinel-users.acl (sentinel-демон, system_acl_users_sentinel).
#
# Пароль КАЖДОГО системного юзера — в Vault по той же ветке, что operator-extra:
# secret/redis/<incarnation>/users/<name>#password. scenario резолвит keeper-side
# через vault() в render-фазе и доливает системных в apply.input.users ПОВЕРХ
# operator-extra (last-wins; см. create/cluster.yml/sentinel.yml, add_user).
#
# ★ default-юзер: в system_acl_users (redis-server) его НЕТ — он задаётся requirepass
# в redis.conf (модель кирпича: redis.conf.tmpl «requirepass {{.vars.password}}»,
# users.acl.tmpl его не дублирует). В system_acl_users_sentinel default ЕСТЬ — у
# sentinel-демона нет requirepass-эквивалента для aclfile-доступа, поэтому default
# объявляется в sentinel-users.acl с тем же секретом secret/redis/<inc>#password
# (как роль). Имена системных = default/replica/monitoring/sentinel/haproxy —
# validate-guard create отвергает operator-extra с любым из этих имён (коллизия).
#
# Набор redis-server (redis_system_users роли, БЕЗ default — он в requirepass):
system_acl_users:
  replica:    "+psync +replconf +ping"
  monitoring: "-@all +@connection +client +ping +info +config|get +cluster|info +slowlog +latency +memory +select +command|count +command|docs"
  sentinel:   "allchannels +multi +slaveof +ping +exec +subscribe +config|rewrite +role +publish +info +client|setname +client|kill +script|kill"
  haproxy:    "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +info +cluster|info"

# Набор sentinel-демона (redis_sentinel_system_users роли; ВКЛЮЧАЕТ default):
system_acl_users_sentinel:
  default:    "allchannels allkeys +@all"
  monitoring: "-@all +@connection -command +client -hello +info -auth +sentinel|masters +sentinel|replicas +sentinel|slaves +sentinel|sentinels +sentinel|ckquorum"
  sentinel:   "allchannels -@all +auth +client|getname +client|id +client|setname +command +hello +ping +sentinel|is-master-down-by-addr +publish +role +sentinel|get-master-addr-by-name +sentinel|master +sentinel|myid +sentinel|replicas +sentinel|sentinels"
  haproxy:    "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +sentinel|get-master-addr-by-name +sentinel|master +sentinel|myid +sentinel|replicas +sentinel|sentinels"

# Merge-подложка redis.conf (defaults роли) — НИЖНИЙ слой merge(): persistence-
# пресет, вычисленные maxmemory/policy и passthrough оператора наслаиваются
# поверх. Этот merged итог рендерится в полный redis.conf (destiny `redis`).
redis_config:
  maxmemory:        "256mb"
  maxmemory-policy: allkeys-lru
  maxclients:       10000
  timeout:          300

# Данные-таблица kernel-параметров под Redis. scenario передаёт этот map в destiny
# `redis` через apply.input.sysctl_settings → core.sysctl.applied строит drop-in
# /etc/sysctl.d/30-redis.conf и применяет его `sysctl -e -p <file>` БЕЗУСЛОВНО
# (host-tuning — рекомендация Redis, не выбор оператора; операторского флага
# sysctl_enable нет). Значения — СТРОКИ (multi-value параметры через пробел); модуль
# сортирует ключи при построении drop-in (детерминизм → нет ложного reload). Не во
# входе оператора: tuning под Redis, не операционный выбор.
#
# ИСТОЧНИК (выровнено 2026-06-23): набор и значения 1:1 повторяют sysctl-блок
# Ansible-роли redis (roles/redis/tasks/installation.yml «Настройка параметров
# ядра»), который ссылается на Redis admin-docs (background-save fork-error +
# kernel-network-stack tuning). БЕЗ блока tcp_bbr (net.core.default_qdisc=fq +
# net.ipv4.tcp_congestion_control=bbr) — он зависит от загрузки модуля ядра tcp_bbr
# (на Debian не загружен по умолчанию) → отложен отдельным шагом загрузки модуля.
sysctl_settings:
  # >>> Память и процессы (КРИТИЧНО для fork RDB/AOF и больших инстансов) <<<
  # overcommit_memory=1 — Redis-рекомендация: иначе background save падает с
  # fork-error (redis-docs FAQ background-saving-fails). swappiness=1 — исключаем
  # вытеснение в swap кроме крайней ситуации.
  vm.overcommit_memory:  "1"
  vm.swappiness:         "1"
  vm.max_map_count:      "262144"
  vm.vfs_cache_pressure: "200"
  # >>> Сетевые буферы (производительность под нагрузкой, Redis kernel-stack tuning) <<<
  net.core.rmem_max:     "134217728"
  net.core.wmem_max:     "134217728"
  net.core.rmem_default: "212992"
  net.core.wmem_default: "212992"
  net.ipv4.tcp_rmem:     "4096 212992 134217728"
  net.ipv4.tcp_wmem:     "4096 212992 134217728"
  # >>> Очереди и бэклоги <<<
  net.core.somaxconn:           "65535"
  net.core.netdev_max_backlog:  "20000"
  net.ipv4.tcp_max_syn_backlog: "65535"
  # >>> TCP-стек (Redis kernel-network-stack tuning) <<<
  net.ipv4.tcp_sack:           "1"
  net.ipv4.tcp_timestamps:     "1"
  net.ipv4.tcp_window_scaling: "1"
  net.ipv4.tcp_syncookies:     "1"
  net.ipv4.tcp_tw_reuse:       "1"
  net.ipv4.tcp_fin_timeout:    "30"
  net.ipv4.ip_local_port_range: "30000 65535"
