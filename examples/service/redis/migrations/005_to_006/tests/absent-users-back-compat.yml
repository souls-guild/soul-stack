name: absent-users-back-compat
description: >
  Back-compat: инкарнация БЕЗ ключа redis_users (старый state без operator-extra
  ACL) → ключ создаётся пустым массивом (has()-guard в тернаре). Прочий state цел.

state_before:
  redis_type: "cluster"
  redis_config:
    maxmemory: "512mb"

state_after:
  redis_type: "cluster"
  redis_config:
    maxmemory: "512mb"
  redis_users: []
