name: refs-default-back-compat
description: >
  v9-инкарнация с seeded_from БЕЗ ref-полей (обычный create или migrate до
  v10-фикса: 008_to_009 ввёл seeded_from {source_endpoints, detached}, ref'ов
  ещё не было) → миграция доливает source_password_ref/source_tls_ca_ref
  консервативным default '' (источник без AUTH/TLS, поведение до фикса).
  source_endpoints/detached проходят насквозь (лист-guard их сохраняет).

state_before:
  redis_type: "sentinel"
  seeded_from:
    source_endpoints: ["old-1.example.com:6379", "old-2.example.com:6379"]
    detached: false

state_after:
  redis_type: "sentinel"
  seeded_from:
    source_endpoints: ["old-1.example.com:6379", "old-2.example.com:6379"]
    detached: false
    source_password_ref: ""
    source_tls_ca_ref: ""
