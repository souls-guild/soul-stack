name: preserves-existing-refs
description: >
  Идемпотентность: инкарнация, у которой ref'ы УЖЕ заполнены (повторный прогон
  миграции / inline-seed migrate_cluster v10), сохраняет их как есть —
  лист-guard has() возвращает текущее значение, не перезатирает ''-дефолтом.
  source_endpoints/detached (включая detached:true после day-2 detach) тоже
  проходят насквозь.

state_before:
  redis_type: "sentinel"
  seeded_from:
    source_endpoints: ["old-1.example.com:6379"]
    detached: true
    source_password_ref: "secret/redis/migrate/oldcluster#password"
    source_tls_ca_ref: "secret/redis/migrate/oldcluster#ca"

state_after:
  redis_type: "sentinel"
  seeded_from:
    source_endpoints: ["old-1.example.com:6379"]
    detached: true
    source_password_ref: "secret/redis/migrate/oldcluster#password"
    source_tls_ca_ref: "secret/redis/migrate/oldcluster#ca"
