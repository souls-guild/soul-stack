name: preserves-existing-refs
description: >
  Idempotency: an incarnation whose refs are ALREADY populated (a repeat run
  of the migration / inline-seed migrate_cluster v10) keeps them as-is -
  the leaf guard has() returns the current value instead of overwriting it
  with the ''-default. source_endpoints/detached (including detached:true
  after a later operational detach) also pass through unchanged.

state_before:
  redis_type: "sentinel"
  seeded_from:
    source_endpoints: ["old-1.example.com:6379"]
    detached: true
    source_password_ref: "secret/redis/migrate/oldcluster#password"
    source_tls_ca_ref: "secret/redis/migrate/oldcluster#ca"

state_after:
  redis_type: "sentinel"
  seeded_from:
    source_endpoints: ["old-1.example.com:6379"]
    detached: true
    source_password_ref: "secret/redis/migrate/oldcluster#password"
    source_tls_ca_ref: "secret/redis/migrate/oldcluster#ca"
