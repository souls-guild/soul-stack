name: preserves-unrelated
description: >
  Инкарнация без install/conf_dir/data_dir/modules_base_url (напр. уже провиженная
  без host-layout-override, дефолтные пути). delete no-op по всем четырём путям →
  остальной state (redis_type/redis_config/redis_users/redis_sentinel/namedfields/
  топология) проходит насквозь бит-в-бит, лишние ключи delete НЕ создаёт.

state_before:
  redis_type: "sentinel"
  redis_config:
    maxmemory: "512mb"
    appendonly: "yes"
  redis_users:
    - { name: "app", perms: "~* +@all", state: "on" }
  redis_sentinel:
    master_name: "master"
    quorum: 2
    master_settings:
      down-after-milliseconds: "5000"
      failover-timeout: "60000"
    settings: {}
  tls:
    enable: false
    only: false
    port: 0
  persistence: "rdb"
  memory_mb: 1024
  shards: 0
  replicas: 1

state_after:
  redis_type: "sentinel"
  redis_config:
    maxmemory: "512mb"
    appendonly: "yes"
  redis_users:
    - { name: "app", perms: "~* +@all", state: "on" }
  redis_sentinel:
    master_name: "master"
    quorum: 2
    master_settings:
      down-after-milliseconds: "5000"
      failover-timeout: "60000"
    settings: {}
  tls:
    enable: false
    only: false
    port: 0
  persistence: "rdb"
  memory_mb: 1024
  shards: 0
  replicas: 1
