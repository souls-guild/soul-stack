name: preserves-unrelated
description: >
  Миграция трогает ТОЛЬКО provisioned_vm_ids/provisioned_provider: остальной state
  (redis_type/redis_config/redis_users/redis_sentinel/namedfields/топология)
  проходит насквозь без изменений. Без provision-полей до миграции → они доливаются
  default-ом ([], ''), всё прочее — бит-в-бит.

state_before:
  redis_type: "sentinel"
  redis_config:
    maxmemory: "256mb"
    appendonly: "yes"
  redis_users:
    - { name: "app", perms: "~* +@all", state: "on" }
  redis_sentinel:
    master_name: "master"
    quorum: 2
    down_after_ms: 5000
    failover_timeout_ms: 60000
  tls:
    enable: true
    only: false
    port: 7379
  persistence: "rdb_aof"
  memory_mb: 1024
  shards: 0
  replicas: 1

state_after:
  redis_type: "sentinel"
  redis_config:
    maxmemory: "256mb"
    appendonly: "yes"
  redis_users:
    - { name: "app", perms: "~* +@all", state: "on" }
  redis_sentinel:
    master_name: "master"
    quorum: 2
    down_after_ms: 5000
    failover_timeout_ms: 60000
  tls:
    enable: true
    only: false
    port: 7379
  persistence: "rdb_aof"
  memory_mb: 1024
  shards: 0
  replicas: 1
  provisioned_vm_ids: []
  provisioned_provider: ""
