name: provisioned-defaults-back-compat
description: >
  Инкарнация без provision-полей (развёрнута до v7, БЕЗ cloud-create) →
  консервативный default: provisioned_vm_ids=[] и provisioned_provider=''.
  has()-guard back-compat для отсутствующих ключей.

state_before:
  redis_type: "sentinel"
  redis_config:
    maxmemory: "256mb"

state_after:
  redis_type: "sentinel"
  redis_config:
    maxmemory: "256mb"
  provisioned_vm_ids: []
  provisioned_provider: ""
