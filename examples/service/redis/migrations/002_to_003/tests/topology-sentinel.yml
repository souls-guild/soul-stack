name: topology-sentinel
description: >
  Извлечение топологии из v2-state: sentinel_quorum ← redis_sentinel.quorum,
  replicas ← число redis_hosts с role==replica (2 из 3 — один primary + две
  реплики). shards=0 (не восстановим). redis_sentinel/redis_hosts НЕ трогаются.

state_before:
  redis_type: sentinel
  redis_version: "7.2.4"
  redis_config:
    maxmemory: "256mb"
    maxmemory-policy: allkeys-lru
    save: "900 1 300 10 60 10000"
    appendonly: "no"
  redis_users: {}
  redis_hosts:
    - { sid: node-1.example.com, role: primary }
    - { sid: node-2.example.com, role: replica }
    - { sid: node-3.example.com, role: replica }
  redis_sentinel:
    master_name: mymaster
    quorum: 2

state_after:
  redis_type: sentinel
  redis_version: "7.2.4"
  redis_config:
    maxmemory: "256mb"
    maxmemory-policy: allkeys-lru
    save: "900 1 300 10 60 10000"
    appendonly: "no"
  redis_users: {}
  redis_hosts:
    - { sid: node-1.example.com, role: primary }
    - { sid: node-2.example.com, role: replica }
    - { sid: node-3.example.com, role: replica }
  redis_sentinel:
    master_name: mymaster
    quorum: 2
  tls:
    enable: false
    only: false
    port: 7379
    cert_ref: ""
    key_ref: ""
    ca_ref: ""
  install:
    method: package
  persistence: rdb
  maxmemory_policy: allkeys-lru
  memory_mb: 0
  modules: []
  sysctl_settings: {}
  shards: 0
  replicas: 2
  sentinel_quorum: 2
