name: tls-extracted
description: >
  redis_config несёт TLS-директивы (tls-port + port 0) → tls.enable=true,
  tls.only=true (plain закрыт). tls.port=7379 — НЕ извлечён из redis_config['tls-port']
  (DSL-лимит: migration-CEL без string→int, см. 002_to_003.yml), а роль-дефолт 7379;
  совпал с redis_config['tls-port']="7379" случайно (не-дефолтный порт см. в
  non-default-tls-port). cert/key/ca_ref → '' (Vault-ПУТИ в v2-state не лежали).
  maxmemory_policy извлечён из redis_config.

state_before:
  redis_type: standalone
  redis_version: "7.2.4"
  redis_config:
    port: "0"
    tls-port: "7379"
    tls-cert-file: /etc/redis/tls/redis.crt
    tls-key-file: /etc/redis/tls/redis.key
    tls-ca-cert-file: /etc/redis/tls/ca.crt
    tls-replication: "yes"
    maxmemory: "256mb"
    maxmemory-policy: allkeys-lru
    save: "900 1 300 10 60 10000"
    appendonly: "no"
  redis_users: {}
  redis_hosts: []
  redis_sentinel: {}

state_after:
  redis_type: standalone
  redis_version: "7.2.4"
  redis_config:
    port: "0"
    tls-port: "7379"
    tls-cert-file: /etc/redis/tls/redis.crt
    tls-key-file: /etc/redis/tls/redis.key
    tls-ca-cert-file: /etc/redis/tls/ca.crt
    tls-replication: "yes"
    maxmemory: "256mb"
    maxmemory-policy: allkeys-lru
    save: "900 1 300 10 60 10000"
    appendonly: "no"
  redis_users: {}
  redis_hosts: []
  redis_sentinel: {}
  tls:
    enable: true
    only: true
    port: 7379
    cert_ref: ""
    key_ref: ""
    ca_ref: ""
  install:
    method: package
  persistence: rdb
  maxmemory_policy: allkeys-lru
  memory_mb: 0
  modules: []
  sysctl_settings: {}
  shards: 0
  replicas: 0
  sentinel_quorum: 0
