name: tls-absent
description: >
  redis_config WITHOUT TLS directives → tls.enable=false, tls.only=false, tls.port=7379
  (role default). maxmemory_policy=allkeys-lru. Counter-case to tls-extracted.

state_before:
  redis_type: standalone
  redis_version: "7.2.4"
  redis_config:
    maxmemory: "256mb"
    maxmemory-policy: allkeys-lru
    maxclients: 10000
    timeout: 300
    save: "900 1 300 10 60 10000"
    appendonly: "no"
  redis_users: {}
  redis_hosts: []
  redis_sentinel: {}

state_after:
  redis_type: standalone
  redis_version: "7.2.4"
  redis_config:
    maxmemory: "256mb"
    maxmemory-policy: allkeys-lru
    maxclients: 10000
    timeout: 300
    save: "900 1 300 10 60 10000"
    appendonly: "no"
  redis_users: {}
  redis_hosts: []
  redis_sentinel: {}
  tls:
    enable: false
    only: false
    port: 7379
    cert_ref: ""
    key_ref: ""
    ca_ref: ""
  install:
    method: package
  persistence: rdb
  maxmemory_policy: allkeys-lru
  memory_mb: 0
  modules: []
  sysctl_settings: {}
  shards: 0
  replicas: 0
  sentinel_quorum: 0
