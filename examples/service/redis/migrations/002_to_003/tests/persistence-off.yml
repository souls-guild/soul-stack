name: persistence-off
description: >
  Reverse folding of persistence: NO save/appendonly keys in redis_config (or
  save='' and appendonly='no') -> off. Here the keys are absent entirely — covers the
  in-guard branch "key is missing". maxmemory-policy is also absent -> maxmemory_policy=''.

state_before:
  redis_type: standalone
  redis_version: "7.2.4"
  redis_config:
    maxmemory: "256mb"
    maxclients: 10000
  redis_users: {}
  redis_hosts: []
  redis_sentinel: {}

state_after:
  redis_type: standalone
  redis_version: "7.2.4"
  redis_config:
    maxmemory: "256mb"
    maxclients: 10000
  redis_users: {}
  redis_hosts: []
  redis_sentinel: {}
  tls:
    enable: false
    only: false
    port: 7379
    cert_ref: ""
    key_ref: ""
    ca_ref: ""
  install:
    method: package
  persistence: off
  maxmemory_policy: ""
  memory_mb: 0
  modules: []
  sysctl_settings: {}
  shards: 0
  replicas: 0
  sentinel_quorum: 0
