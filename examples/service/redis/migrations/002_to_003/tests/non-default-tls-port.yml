name: non-default-tls-port
description: >
  GUARD: redis_config['tls-port']="9999" (НЕ-дефолтный TLS-порт) → state.tls.port=7379
  (роль-дефолт), НЕ 9999. Закрепляет документированное best-effort-поведение как регресс-
  guard: migration-CEL sandbox (ADR-019) не имеет string→int, поэтому tls.port НЕ
  извлекается из строкового redis_config['tls-port'], а ставится роль-дефолтом 7379
  (см. 002_to_003.yml, set state.tls.port: 7379). Точный порт восстанавливается на
  следующем create-override. ★ Если кто-то добавит int(string) в sandbox и начнёт
  извлекать tls-port — этот тест УПАДЁТ (state_after ждёт 7379, а не 9999), сигналя об
  изменении контракта. tls.enable=true (есть tls-port), tls.only=true (port == '0').

state_before:
  redis_type: standalone
  redis_version: "7.2.4"
  redis_config:
    port: "0"
    tls-port: "9999"
    tls-cert-file: /etc/redis/tls/redis.crt
    tls-key-file: /etc/redis/tls/redis.key
    tls-ca-cert-file: /etc/redis/tls/ca.crt
    save: "900 1 300 10 60 10000"
    appendonly: "no"
  redis_users: {}
  redis_hosts: []
  redis_sentinel: {}

state_after:
  redis_type: standalone
  redis_version: "7.2.4"
  redis_config:
    port: "0"
    tls-port: "9999"
    tls-cert-file: /etc/redis/tls/redis.crt
    tls-key-file: /etc/redis/tls/redis.key
    tls-ca-cert-file: /etc/redis/tls/ca.crt
    save: "900 1 300 10 60 10000"
    appendonly: "no"
  redis_users: {}
  redis_hosts: []
  redis_sentinel: {}
  tls:
    enable: true
    only: true
    port: 7379
    cert_ref: ""
    key_ref: ""
    ca_ref: ""
  install:
    method: package
  persistence: rdb
  maxmemory_policy: ""
  memory_mb: 0
  modules: []
  sysctl_settings: {}
  shards: 0
  replicas: 0
  sentinel_quorum: 0
