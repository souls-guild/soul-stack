name: sentinel-unchanged
description: >
  redis_type sentinel — already valid in the new enum [sentinel, cluster]. Identity
  branch of the ternary: redis_type and the rest of the state carry over bit-for-bit (the migration
  is a no-op for this mode).

state_before:
  redis_type: sentinel
  redis_version: "7.2.4"
  redis_config:
    maxmemory: "256mb"
    maxmemory-policy: allkeys-lru
    save: "900 1 300 10 60 10000"
    appendonly: "no"
  redis_users: {}
  redis_hosts:
    - { sid: node-1.example.com, role: primary }
    - { sid: node-2.example.com, role: replica }
  redis_sentinel:
    master_name: master
    quorum: 2
  tls:
    enable: false
    only: false
    port: 7379
    cert_ref: ""
    key_ref: ""
    ca_ref: ""
  install:
    method: package
  persistence: rdb
  maxmemory_policy: allkeys-lru
  memory_mb: 0
  modules: []
  modules_base_url: ""
  conf_dir: /etc/redis
  data_dir: /var/lib/redis
  sysctl_settings: {}
  shards: 0
  replicas: 1
  sentinel_quorum: 2

state_after:
  redis_type: sentinel
  redis_version: "7.2.4"
  redis_config:
    maxmemory: "256mb"
    maxmemory-policy: allkeys-lru
    save: "900 1 300 10 60 10000"
    appendonly: "no"
  redis_users: {}
  redis_hosts:
    - { sid: node-1.example.com, role: primary }
    - { sid: node-2.example.com, role: replica }
  redis_sentinel:
    master_name: master
    quorum: 2
  tls:
    enable: false
    only: false
    port: 7379
    cert_ref: ""
    key_ref: ""
    ca_ref: ""
  install:
    method: package
  persistence: rdb
  maxmemory_policy: allkeys-lru
  memory_mb: 0
  modules: []
  modules_base_url: ""
  conf_dir: /etc/redis
  data_dir: /var/lib/redis
  sysctl_settings: {}
  shards: 0
  replicas: 1
  sentinel_quorum: 2
