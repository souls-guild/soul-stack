name: cluster-unchanged
description: >
  redis_type cluster — already valid in the new enum [sentinel, cluster]. Identity
  branch of the ternary: redis_type and the rest of the state (incl. cluster directives
  in redis_config and the shards/replicas topology) carry over bit-for-bit (migration is
  a no-op for this mode).

state_before:
  redis_type: cluster
  redis_version: "7.2.4"
  redis_config:
    maxmemory: "256mb"
    maxmemory-policy: allkeys-lru
    save: "900 1 300 10 60 10000"
    appendonly: "no"
    cluster-enabled: "yes"
    cluster-config-file: "nodes.conf"
    cluster-node-timeout: "5000"
  redis_users: {}
  redis_hosts: []
  redis_sentinel: {}
  tls:
    enable: false
    only: false
    port: 7379
    cert_ref: ""
    key_ref: ""
    ca_ref: ""
  install:
    method: package
  persistence: rdb
  maxmemory_policy: allkeys-lru
  memory_mb: 0
  modules: []
  modules_base_url: ""
  conf_dir: /etc/redis
  data_dir: /var/lib/redis
  sysctl_settings: {}
  shards: 3
  replicas: 1
  sentinel_quorum: 0

state_after:
  redis_type: cluster
  redis_version: "7.2.4"
  redis_config:
    maxmemory: "256mb"
    maxmemory-policy: allkeys-lru
    save: "900 1 300 10 60 10000"
    appendonly: "no"
    cluster-enabled: "yes"
    cluster-config-file: "nodes.conf"
    cluster-node-timeout: "5000"
  redis_users: {}
  redis_hosts: []
  redis_sentinel: {}
  tls:
    enable: false
    only: false
    port: 7379
    cert_ref: ""
    key_ref: ""
    ca_ref: ""
  install:
    method: package
  persistence: rdb
  maxmemory_policy: allkeys-lru
  memory_mb: 0
  modules: []
  modules_base_url: ""
  conf_dir: /etc/redis
  data_dir: /var/lib/redis
  sysctl_settings: {}
  shards: 3
  replicas: 1
  sentinel_quorum: 0
