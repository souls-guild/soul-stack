name: sentinel-only-to-sentinel
description: >
  Remap redis_type sentinel_only → sentinel (the mode was removed from the service on
  2026-06-25). The sentinel_only state carried redis_sentinel.master_ip (external master) —
  it moves over byte-for-byte (the migration does not clean the data plane, only remaps the
  mode). The rest of the state is unchanged; ONLY redis_type changes. ★ Remap semantics (no
  data plane → sentinel with a roster master) requires architectural confirmation — see
  003_to_004.yml.

state_before:
  redis_type: sentinel_only
  redis_version: "7.2.4"
  redis_config: {}
  redis_users: {}
  redis_hosts: []
  redis_sentinel:
    master_name: master
    master_ip: 10.9.9.9
    quorum: 2
  tls:
    enable: false
    only: false
    port: 7379
    cert_ref: ""
    key_ref: ""
    ca_ref: ""
  install:
    method: package
  persistence: rdb
  maxmemory_policy: ""
  memory_mb: 0
  modules: []
  modules_base_url: ""
  conf_dir: /etc/redis
  data_dir: /var/lib/redis
  sysctl_settings: {}
  shards: 0
  replicas: 0
  sentinel_quorum: 2

state_after:
  redis_type: sentinel
  redis_version: "7.2.4"
  redis_config: {}
  redis_users: {}
  redis_hosts: []
  redis_sentinel:
    master_name: master
    master_ip: 10.9.9.9
    quorum: 2
  tls:
    enable: false
    only: false
    port: 7379
    cert_ref: ""
    key_ref: ""
    ca_ref: ""
  install:
    method: package
  persistence: rdb
  maxmemory_policy: ""
  memory_mb: 0
  modules: []
  modules_base_url: ""
  conf_dir: /etc/redis
  data_dir: /var/lib/redis
  sysctl_settings: {}
  shards: 0
  replicas: 0
  sentinel_quorum: 2
