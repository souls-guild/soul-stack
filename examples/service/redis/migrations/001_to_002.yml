description: |
  state_schema v1 → v2 (консолидированный redis):
  - redis_users из плоского списка ИМЁН превращается в map name → {perms, state}
    (per-user ACL-строка + enabled-флаг — схема консолидированного redis).
  - v1: redis_users: ["app", "monitor"]
  - v2: redis_users: { app: {perms: "off ~* &* +@all", state: "off"},
                       monitor: {perms: "off ~* &* +@all", state: "off"} }
  Дефолтные perms/state консервативны (off, без прав на ресурсы): после миграции
  оператор задаёт реальные ACL day-2-сценарием, а не наследует «всё разрешено».

  Демо-цель миграции (ADR-019, docs/migrations.md): грамматика rename + set +
  foreach + delete. foreach итерирует по СПИСКУ (элемент = имя пользователя,
  используется как сегмент пути set) — форма, не требующая keys(), которого нет в
  migration-CEL sandbox (ADR-019: только state + stdlib). Forward-only (down: не
  поддерживается, восстановление через state_history).

from_version: 1
to_version: 2

transform:
  # rename — снимаем v1-список имён в legacy-ключ, чтобы итерировать по нему и
  # наполнить целевой redis_users заново (rename падает, если to уже существует —
  # целевого redis_users_legacy_v1 в state ещё нет).
  - rename:
      from: state.redis_users
      to:   state.redis_users_legacy_v1

  # set — материализуем целевой map ДО foreach: пустой список пользователей даёт
  # пустой map (осмысленный intent «redis_users стал map»), а не отсутствие ключа
  # после rename.
  - set:
      path:  state.redis_users
      value: {}

  # foreach — по каждому имени пользователя v1: имя биндится к user_name и идёт
  # сегментом пути set, значение — дефолтный консервативный ACL-объект.
  - foreach: "${ state.redis_users_legacy_v1 }"
    as: user_name
    do:
      - set:
          path: "state.redis_users.${ user_name }"
          value:
            perms: "off ~* &* +@all"
            state: "off"

  # delete — убираем legacy-снимок (no-op-безопасен, если уже отсутствует).
  - delete:
      path: state.redis_users_legacy_v1
