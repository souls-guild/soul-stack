from_version: 13
to_version: 14

description: >-
  state_schema v13 → v14: обязательный log-shipping data-плоскости (Слайс V-I, redis-пилот,
  ADR-067). state ДОПОЛНЯЕТСЯ read-model-объектом logging — зафиксированные версия/sink/
  источники агента vector, развёрнутого create-прогоном на каждый хост (симметрия v12→v13
  monitoring: экспортеры метрик). Секрет доступа к коллектору (sink_auth_ref) в state НЕ
  хранится (ИБ — он в Vault, как tls.*_ref и пароль ACL-юзера monitoring).

  Forward-only (down: не поддерживается; восстановление — через state_history). Существующие
  v13-инкарнации развёрнуты ДО ввода log-shipping (агента vector ещё нет) → консервативный
  default: version пустая ('' = «не развёрнуто», best-effort как monitoring в 012_to_013),
  sink_type console (безопасный дефолт без внешней инфры), sink_endpoint '' , log_sources []
  (следующий create перезапишет их значениями из essence.vector_*). ОДИН плоский set с
  has()-guard на ВЕСЬ объект (CEL-map-литерал-дефолт): logging уже есть → сохраняется как есть
  (идемпотентность повторного прогона), иначе ставится default. Зеркало объект-guard-а v12→v13
  (monitoring) и 008_to_009 (seeded_from). Остальной state (redis_config/redis_users/tls/
  monitoring/namedfields/топология) НЕ трогается.

transform:
  - set:
      path: state.logging
      value: >-
        ${ has(state.logging)
             ? state.logging
             : {
                 'vector_version':       '',
                 'vector_sink_type':     'console',
                 'vector_sink_endpoint': '',
                 'vector_log_sources':   []
               } }
