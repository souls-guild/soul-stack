from_version: 5
to_version: 6

description: >-
  state_schema v5 → v6: redis_users из map name→{perms,state} в ТИПИЗИРОВАННЫЙ
  массив [{name, perms, state}] (wave 1b types-эпика, ADR-062 — переиспользуемый
  тип AclUser в input/state). map-ключ (имя пользователя) переезжает в поле name
  элемента массива; perms/state сохраняются как есть.

  ★ DSL-форма (ИНВЕРСИЯ 001_to_002, который делал list→map через foreach): здесь
  нужна обратная свёртка map→array. Она выразима ОДНИМ плоским set с CEL-форой
  поверх map-а:
    state.redis_users.map(n, {'name': n, 'perms': ..., 'state': ...})
  Нативный CEL-макрос .map() НАД MAP-ом итерирует его КЛЮЧИ (n — имя пользователя),
  что и нужно: ключ map-а → поле name элемента. keys() в migration-CEL НЕ
  зарегистрирован (только stdlib-макросы map/filter/all/has/size + операторы), но
  он и НЕ нужен — .map() над map даёт ключи напрямую. foreach тоже не годится: он
  биндит ЗНАЧЕНИЕ элемента map-а, а нам нужен КЛЮЧ как name. set читает текущий
  state.redis_users (map) для вычисления value ДО перезаписи того же пути — applySet
  вычисляет value по актуальному state, затем setPath (keeper/internal/statemigrate/
  apply.go).

  ★ ПОРЯДОК массива НЕ детерминирован (cel-go .map() над Go-map обходит ключи в
  порядке map-итерации, не сортирует) — но это НЕ инвариант: day-2-читатели
  state.redis_users пересобирают destiny-users-MAP через свой .map(u, {u.name: …}),
  а users.acl.tmpl range-ит по MAP с сортировкой ключей. Итоговый users.acl
  детерминирован независимо от порядка элементов массива в state. Поэтому тесты
  миграции (single-user/empty/absent/preserves) — 0/1-элементные (order-immune);
  многоэлементный order-sensitive кейс не заводим (трактовка порядка как инварианта
  ложна, тест был бы flaky). Пустой/отсутствующий map → пустой массив (явная ветка
  тернара через has()+size — читабельно и back-compat для инкарнаций без ключа).

  Forward-only (down: не поддерживается; восстановление — через state_history).
  Остальной state (redis_config/redis_hosts/redis_sentinel/namedfields) НЕ трогается.
  has()-guard на redis_users — back-compat: инкарнации без ACL-юзеров (ключа нет)
  получают пустой массив.

transform:
  - set:
      path:  state.redis_users
      value: >-
        ${ (!has(state.redis_users) || size(state.redis_users) == 0)
             ? []
             : state.redis_users.map(n, {
                 'name':  n,
                 'perms': state.redis_users[n].perms,
                 'state': state.redis_users[n].state
               }) }
