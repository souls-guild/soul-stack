from_version: 2
to_version: 3

description: >-
  state_schema v2 → v3 (richer state, architect a9e1c2c6): the opaque redis_config
  is SUPPLEMENTED with named INTENT fields (day-2 read-model) — tls/install/
  persistence/memory_mb/maxmemory_policy/modules/sysctl_settings + topology
  (shards/replicas/sentinel_quorum). redis_config/redis_users/redis_hosts/
  redis_sentinel are NOT touched (write-model stays as is).

  ★ BEST-EFFORT (to be honest): the migration is a pure function of the old state (ADR-019:
  essence/input/vault are FORBIDDEN in migration-CEL). So the intent
  fields are filled in like this:

    DERIVABLE from redis_config (reverse-folding the computed result):
      - tls.enable  ← the fact that the 'tls-port' directive is present in redis_config;
      - tls.port    ← int(redis_config['tls-port']) if present, otherwise 7379 (role default);
      - tls.only    ← redis_config['port'] == '0' (plain port closed);
      - persistence ← reverse-folding save/appendonly → off/aof/rdb/rdb_aof;
      - maxmemory_policy ← redis_config['maxmemory-policy'] if present, otherwise '';

    DERIVABLE from state topology:
      - sentinel_quorum ← redis_sentinel.quorum if present, otherwise 0;
      - replicas        ← number of redis_hosts with role==replica (if the roster is present in state);

    DEFAULT (fundamentally absent from v2-state, and essence is unavailable in migration-CEL):
      - tls.cert_ref/key_ref/ca_ref ← '' (PEM Vault PATHS were not stored in state; on day-2
        restart ca_ref is taken from essence.tls_ca_ref — a stable author-context);
      - install ← {method: package} (v2 did not record the install method);
      - modules ← [] (v2 did not record Redis modules);
      - sysctl_settings ← {} (v2 did not record host tuning; it was actually applied on hosts,
        but wasn't in state);
      - memory_mb ← 0 (IRREVERSIBLE: redis_config holds the computed maxmemory "768mb",
        not the operator's original budget — truncating division is irreversible);
      - shards ← 0 (the number of cluster master shards is not reliably recoverable from
        redis_config/redis_hosts — declared roles in v2-state were not materialized).

  FULL ACCURACY of namedfields is achieved on the next create-override (the operator
  supplies simple input again → create rewrites namedfields from its own compute).
  Forward-only (down: is not supported; recovery — via state_history).

  Optional-field idiom (maxmemory_policy): a flat set WITHOUT if: always creates the key,
  so "optional" is expressed by its VALUE, not by presence — we always set it, and when
  the source is missing write '' (empty string), symmetric to the namedfield convention
  in create (empty = "operator didn't explicitly choose", directive comes from the essence substrate).

transform:
  # ── TLS intent from redis_config (reverse-folding) ───────────────────────
  # First materialize tls as a map, then fill its subfields with separate sets —
  # each with its own CEL reverse-fold (flat DSL: nested set by segments).
  - set:
      path:  state.tls
      value: {}
  - set:
      path:  state.tls.enable
      value: "${ 'tls-port' in state.redis_config }"
  - set:
      path:  state.tls.only
      value: "${ 'port' in state.redis_config && state.redis_config['port'] == '0' }"
  # ★ BEST-EFFORT (DSL limit): tls.port → role default 7379, NOT extracted from
  # redis_config['tls-port']. Reason: redis_config['tls-port'] is a STRING ("7379"),
  # and the migration-CEL sandbox (ADR-019) has NO string→int conversion (no
  # int(string)/uint(string)/double(string) overload; no custom functions, no strings-ext).
  # tls.port is typed integer in the namedfield (symmetric to create compute.tls_port),
  # putting a string here would break the schema and diverge from create. Extending the sandbox
  # for int(string) requires a separate ADR (ADR-019 fixed surface). The exact port
  # is recovered on the next create-override. On a NON-default TLS port this is a
  # loss (best-effort, see description). The important day-2
  # signal is tls.enable (bool, recovered exactly); restart hinges on it.
  - set:
      path:  state.tls.port
      value: 7379
  # PEM Vault PATHS were not stored in v2-state (only on-host paths tls-*-file) → '' (default).
  - set:
      path:  state.tls.cert_ref
      value: ""
  - set:
      path:  state.tls.key_ref
      value: ""
  - set:
      path:  state.tls.ca_ref
      value: ""

  # ── persistence (reverse-fold save/appendonly) ─────────────────────────
  # appendonly=='yes' && save!='' → rdb_aof; appendonly=='yes' && save=='' → aof;
  # appendonly!='yes' && save!='' → rdb; otherwise → off. The keys save/appendonly may
  # be absent (in-guard); 'save' is non-empty ⇔ the key is present AND value != ''.
  - set:
      path:  state.persistence
      value: >-
        ${ ('appendonly' in state.redis_config && state.redis_config['appendonly'] == 'yes')
             ? (('save' in state.redis_config && state.redis_config['save'] != '') ? 'rdb_aof' : 'aof')
             : (('save' in state.redis_config && state.redis_config['save'] != '') ? 'rdb' : 'off') }

  # ── maxmemory_policy (optional: always set, '' if absent) ───────────
  - set:
      path:  state.maxmemory_policy
      value: "${ 'maxmemory-policy' in state.redis_config ? state.redis_config['maxmemory-policy'] : '' }"

  # ── DEFAULT fields (absent in v2-state, essence unavailable) ──────────────────────
  - set:
      path:  state.install
      value:
        method: package
  - set:
      path:  state.modules
      value: []
  - set:
      path:  state.sysctl_settings
      value: {}
  # memory_mb is irreversible (redis_config carries the computed maxmemory, not the original budget).
  - set:
      path:  state.memory_mb
      value: 0

  # ── Topology ──────────────────────────────────────────────────────────────
  # shards is not reliably recoverable from v2-state → 0.
  - set:
      path:  state.shards
      value: 0
  # sentinel_quorum ← redis_sentinel.quorum if recorded, otherwise 0. redis_sentinel
  # may be entirely absent (standalone/cluster v2) → has-guard on the root + leaf.
  # ★ DSL gotcha: int() works on field-selection (state.x.q), but NOT on bracket
  # indexing (state.x['q'] → no int(double) overload). quorum without a hyphen → field access
  # (state.redis_sentinel.quorum), has() accepts field-selection as its argument.
  - set:
      path:  state.sentinel_quorum
      value: "${ (has(state.redis_sentinel) && has(state.redis_sentinel.quorum)) ? int(state.redis_sentinel.quorum) : 0 }"
  # replicas ← number of redis_hosts with role==replica (the sentinel roster in v2 materialized
  # roles). redis_hosts may be absent/empty → has-guard + filter-comprehension.
  - set:
      path:  state.replicas
      value: "${ has(state.redis_hosts) ? size(state.redis_hosts.filter(h, h.role == 'replica')) : 0 }"
