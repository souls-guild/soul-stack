from_version: 2
to_version: 3

description: >-
  state_schema v2 → v3 (richer state, architect a9e1c2c6): opaque redis_config
  ДОПОЛНЯЕТСЯ именованными полями НАМЕРЕНИЯ (read-model day-2) — tls/install/
  persistence/memory_mb/maxmemory_policy/modules/sysctl_settings + топология
  (shards/replicas/sentinel_quorum). redis_config/redis_users/redis_hosts/
  redis_sentinel НЕ трогаются (write-model сохраняется как есть).

  ★ BEST-EFFORT (честно): миграция — чистая функция от старого state (ADR-019:
  essence/input/vault в migration-CEL ЗАПРЕЩЕНЫ). Поэтому намеренные поля
  заполняются так:

    ИЗВЛЕКАЕМО из redis_config (обратная свёртка вычисленного итога):
      - tls.enable  ← факт наличия директивы 'tls-port' в redis_config;
      - tls.port    ← int(redis_config['tls-port']) если есть, иначе 7379 (роль-дефолт);
      - tls.only    ← redis_config['port'] == '0' (plain-порт закрыт);
      - persistence ← обратная свёртка save/appendonly → off/aof/rdb/rdb_aof;
      - maxmemory_policy ← redis_config['maxmemory-policy'] если есть, иначе '';

    ИЗВЛЕКАЕМО из топологии state:
      - sentinel_quorum ← redis_sentinel.quorum если есть, иначе 0;
      - replicas        ← число redis_hosts с role==replica (если roster в state есть);

    DEFAULT (в v2-state принципиально НЕТ, а essence в migration-CEL недоступен):
      - tls.cert_ref/key_ref/ca_ref ← '' (Vault-ПУТИ PEM в state не лежали; на day-2
        restart ca_ref берётся из essence.tls_ca_ref — стабильный author-context);
      - install ← {method: package} (способ установки v2 не фиксировал);
      - modules ← [] (Redis-модули v2 не фиксировал);
      - sysctl_settings ← {} (host-tuning v2 не фиксировал; реально применён на хостах,
        но в state его не было);
      - memory_mb ← 0 (НЕОБРАТИМ: в redis_config лежит вычисленный maxmemory "768mb",
        а не исходный бюджет оператора — деление с усечением необратимо);
      - shards ← 0 (число master-шардов cluster по redis_config/redis_hosts
        достоверно не восстановимо — declared-роли в v2-state не материализовались).

  ПОЛНАЯ ТОЧНОСТЬ namedfields достигается на следующем create-override (оператор
  заново задаёт простой ввод → create перезаписывает namedfields из своего compute).
  Forward-only (down: не поддерживается; восстановление — через state_history).

  Идиома optional-полей (maxmemory_policy): плоский set БЕЗ if: всегда создаёт ключ,
  поэтому «optional» выражается ЗНАЧЕНИЕМ, а не присутствием — ставим всегда, при
  отсутствии источника пишем '' (пустую строку), симметрично namedfield-конвенции
  create (пусто = «оператор явно не выбрал», директива из essence-подложки).

transform:
  # ── TLS-намерение из redis_config (обратная свёртка) ───────────────────────
  # Сначала материализуем tls как map, затем наполняем подполя отдельными set —
  # каждое со своей CEL-обратной-свёрткой (плоский DSL: вложенные set по сегментам).
  - set:
      path:  state.tls
      value: {}
  - set:
      path:  state.tls.enable
      value: "${ 'tls-port' in state.redis_config }"
  - set:
      path:  state.tls.only
      value: "${ 'port' in state.redis_config && state.redis_config['port'] == '0' }"
  # ★ BEST-EFFORT (DSL-лимит): tls.port → роль-дефолт 7379, НЕ извлекается из
  # redis_config['tls-port']. Причина: redis_config['tls-port'] — СТРОКА ("7379"),
  # а migration-CEL sandbox (ADR-019) НЕ имеет конверсии string→int (нет overload
  # int(string)/uint(string)/double(string); custom-функций нет, strings-ext нет).
  # tls.port в namedfield типизирован integer (симметрично create compute.tls_port),
  # положить сюда строку — нарушить схему и разойтись с create. Расширение sandbox
  # int(string) требует отдельного ADR (ADR-019 fixed surface). Точный порт
  # восстанавливается на следующем create-override. На НЕ-дефолтном TLS-порту это
  # потеря — оператор перезадаёт create (best-effort, см. description). Важный day-2-
  # сигнал — tls.enable (bool, восстановим точно); restart на нём дискриминирует.
  - set:
      path:  state.tls.port
      value: 7379
  # Vault-ПУТИ PEM в v2-state не лежали (только on-host пути tls-*-file) → '' (default).
  - set:
      path:  state.tls.cert_ref
      value: ""
  - set:
      path:  state.tls.key_ref
      value: ""
  - set:
      path:  state.tls.ca_ref
      value: ""

  # ── persistence (обратная свёртка save/appendonly) ─────────────────────────
  # appendonly=='yes' && save!='' → rdb_aof; appendonly=='yes' && save=='' → aof;
  # appendonly!='yes' && save!='' → rdb; иначе → off. Ключи save/appendonly могут
  # отсутствовать (in-guard); 'save' непустой ⇔ ключ есть И значение != ''.
  - set:
      path:  state.persistence
      value: >-
        ${ ('appendonly' in state.redis_config && state.redis_config['appendonly'] == 'yes')
             ? (('save' in state.redis_config && state.redis_config['save'] != '') ? 'rdb_aof' : 'aof')
             : (('save' in state.redis_config && state.redis_config['save'] != '') ? 'rdb' : 'off') }

  # ── maxmemory_policy (optional: ставим всегда, '' при отсутствии) ───────────
  - set:
      path:  state.maxmemory_policy
      value: "${ 'maxmemory-policy' in state.redis_config ? state.redis_config['maxmemory-policy'] : '' }"

  # ── DEFAULT-поля (в v2-state нет, essence недоступен) ──────────────────────
  - set:
      path:  state.install
      value:
        method: package
  - set:
      path:  state.modules
      value: []
  - set:
      path:  state.sysctl_settings
      value: {}
  # memory_mb необратим (redis_config несёт вычисленный maxmemory, не исходный бюджет).
  - set:
      path:  state.memory_mb
      value: 0

  # ── Топология ──────────────────────────────────────────────────────────────
  # shards достоверно не восстановим из v2-state → 0.
  - set:
      path:  state.shards
      value: 0
  # sentinel_quorum ← redis_sentinel.quorum если зафиксирован, иначе 0. redis_sentinel
  # может отсутствовать целиком (standalone/cluster v2) → has-guard на корень + лист.
  # ★ DSL-грабли: int() работает на field-selection (state.x.q), но НЕ на bracket-
  # индексе (state.x['q'] → no-overload int(double)). quorum без дефиса → field-access
  # (state.redis_sentinel.quorum), has() принимает field-selection как аргумент.
  - set:
      path:  state.sentinel_quorum
      value: "${ (has(state.redis_sentinel) && has(state.redis_sentinel.quorum)) ? int(state.redis_sentinel.quorum) : 0 }"
  # replicas ← число redis_hosts с role==replica (sentinel-roster v2 материализовал
  # роли). redis_hosts может отсутствовать/быть пустым → has-guard + filter-comprehension.
  - set:
      path:  state.replicas
      value: "${ has(state.redis_hosts) ? size(state.redis_hosts.filter(h, h.role == 'replica')) : 0 }"
