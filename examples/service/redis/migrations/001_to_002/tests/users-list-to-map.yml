name: users-list-to-map
description: >
  Base case: a list of usernames turns into a map with per-user perms.
  Multiple users — foreach over list elements.

state_before:
  redis_users: ["app", "monitor"]
  redis_type: standalone
  redis_version: "7.2.4"

state_after:
  redis_users:
    app:     { perms: "off ~* &* +@all", state: "off" }
    monitor: { perms: "off ~* &* +@all", state: "off" }
  redis_type: standalone
  redis_version: "7.2.4"
