name: preserves-unrelated
description: >
  The migration touches ONLY provisioned_sids: the rest of the state (redis_type/redis_config/
  redis_users/redis_sentinel/namedfields/topology/provisioned_vm_ids/provisioned_provider)
  passes through unchanged. Without provisioned_sids before the migration → it is filled in
  with the default ([]), everything else is bit-for-bit.

state_before:
  redis_type: "sentinel"
  redis_config:
    maxmemory: "256mb"
    appendonly: "yes"
  redis_users:
    - { name: "app", perms: "~* +@all", state: "on" }
  redis_sentinel:
    master_name: "master"
    quorum: 2
    down_after_ms: 5000
    failover_timeout_ms: 60000
  tls:
    enable: true
    only: false
    port: 7379
  persistence: "rdb_aof"
  memory_mb: 1024
  shards: 0
  replicas: 1
  provisioned_vm_ids: ["i-aaa111", "i-bbb222", "i-ccc333"]
  provisioned_provider: "aws-prod"

state_after:
  redis_type: "sentinel"
  redis_config:
    maxmemory: "256mb"
    appendonly: "yes"
  redis_users:
    - { name: "app", perms: "~* +@all", state: "on" }
  redis_sentinel:
    master_name: "master"
    quorum: 2
    down_after_ms: 5000
    failover_timeout_ms: 60000
  tls:
    enable: true
    only: false
    port: 7379
  persistence: "rdb_aof"
  memory_mb: 1024
  shards: 0
  replicas: 1
  provisioned_vm_ids: ["i-aaa111", "i-bbb222", "i-ccc333"]
  provisioned_provider: "aws-prod"
  provisioned_sids: []
