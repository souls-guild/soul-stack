name: logging-defaults-back-compat
description: >
  Инкарнация v13 развёрнута ДО ввода log-shipping — поля logging в state нет. Миграция
  ДОБАВЛЯЕТ read-model logging с консервативным default: version пустая ('' = не развёрнуто),
  sink_type console (безопасный дефолт без инфры), endpoint пустой, log_sources пустой.
  Остальной state (redis_type/redis_config/redis_users/tls/monitoring/персистенс/топология)
  проходит насквозь бит-в-бит.

state_before:
  redis_type: "sentinel"
  redis_config:
    maxmemory: "512mb"
    appendonly: "yes"
  redis_users:
    - { name: "app", perms: "~* +@all", state: "on" }
  tls:
    enable: false
    only: false
    port: 0
  persistence: "rdb"
  memory_mb: 1024
  shards: 0
  replicas: 1
  monitoring:
    node_exporter_version: "1.8.2"
    redis_exporter_version: "1.62.0"
    node_exporter_listen: ":9100"
    redis_exporter_listen: ":9121"

state_after:
  redis_type: "sentinel"
  redis_config:
    maxmemory: "512mb"
    appendonly: "yes"
  redis_users:
    - { name: "app", perms: "~* +@all", state: "on" }
  tls:
    enable: false
    only: false
    port: 0
  persistence: "rdb"
  memory_mb: 1024
  shards: 0
  replicas: 1
  monitoring:
    node_exporter_version: "1.8.2"
    redis_exporter_version: "1.62.0"
    node_exporter_listen: ":9100"
    redis_exporter_listen: ":9121"
  logging:
    vector_version: ""
    vector_sink_type: "console"
    vector_sink_endpoint: ""
    vector_log_sources: []
