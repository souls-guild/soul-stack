name: logging-defaults-back-compat
description: >
  A v13 incarnation deployed BEFORE log-shipping was introduced -- there is no logging field
  in state. The migration ADDS a logging read-model with a conservative default: empty version
  ('' = not deployed), sink_type console (a safe default with no infra), empty endpoint, empty
  log_sources. The rest of state (redis_type/redis_config/redis_users/tls/monitoring/persistence/
  topology) passes through bit-for-bit.

state_before:
  redis_type: "sentinel"
  redis_config:
    maxmemory: "512mb"
    appendonly: "yes"
  redis_users:
    - { name: "app", perms: "~* +@all", state: "on" }
  tls:
    enable: false
    only: false
    port: 0
  persistence: "rdb"
  memory_mb: 1024
  shards: 0
  replicas: 1
  monitoring:
    node_exporter_version: "1.8.2"
    redis_exporter_version: "1.62.0"
    node_exporter_listen: ":9100"
    redis_exporter_listen: ":9121"

state_after:
  redis_type: "sentinel"
  redis_config:
    maxmemory: "512mb"
    appendonly: "yes"
  redis_users:
    - { name: "app", perms: "~* +@all", state: "on" }
  tls:
    enable: false
    only: false
    port: 0
  persistence: "rdb"
  memory_mb: 1024
  shards: 0
  replicas: 1
  monitoring:
    node_exporter_version: "1.8.2"
    redis_exporter_version: "1.62.0"
    node_exporter_listen: ":9100"
    redis_exporter_listen: ":9121"
  logging:
    vector_version: ""
    vector_sink_type: "console"
    vector_sink_endpoint: ""
    vector_log_sources: []
