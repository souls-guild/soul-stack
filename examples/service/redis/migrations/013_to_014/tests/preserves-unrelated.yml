name: preserves-unrelated
description: >
  Incarnation whose logging in state ALREADY exists (e.g. a repeated migration run or state
  where log-shipping is deployed with a non-empty sink). The object has()-guard PRESERVES existing
  logging values as-is (idempotency, does NOT overwrite with defaults), the rest of the state
  (redis_type/redis_config/redis_users/redis_sentinel/monitoring/topology) passes through
  bit-for-bit. Mirrors the object-guard of v12→v13 (monitoring) and 008_to_009 (seeded_from).

state_before:
  redis_type: "cluster"
  redis_config:
    maxmemory: "256mb"
    appendonly: "yes"
  redis_users:
    - { name: "app", perms: "~* +@all", state: "on" }
  redis_sentinel:
    master_name: "master"
    quorum: 2
    master_settings:
      down-after-milliseconds: "5000"
      failover-timeout: "60000"
    settings: {}
  tls:
    enable: true
    only: false
    port: 7379
  persistence: "rdb_aof_1sec"
  shards: 3
  replicas: 1
  monitoring:
    node_exporter_version: "1.8.2"
    redis_exporter_version: "1.62.0"
    node_exporter_listen: ":19100"
    redis_exporter_listen: ":19121"
  logging:
    vector_version: "0.40.0"
    vector_sink_type: "loki"
    vector_sink_endpoint: "https://loki.example.com"
    vector_log_sources: ["/var/log/redis/*.log"]

state_after:
  redis_type: "cluster"
  redis_config:
    maxmemory: "256mb"
    appendonly: "yes"
  redis_users:
    - { name: "app", perms: "~* +@all", state: "on" }
  redis_sentinel:
    master_name: "master"
    quorum: 2
    master_settings:
      down-after-milliseconds: "5000"
      failover-timeout: "60000"
    settings: {}
  tls:
    enable: true
    only: false
    port: 7379
  persistence: "rdb_aof_1sec"
  shards: 3
  replicas: 1
  monitoring:
    node_exporter_version: "1.8.2"
    redis_exporter_version: "1.62.0"
    node_exporter_listen: ":19100"
    redis_exporter_listen: ":19121"
  logging:
    vector_version: "0.40.0"
    vector_sink_type: "loki"
    vector_sink_endpoint: "https://loki.example.com"
    vector_log_sources: ["/var/log/redis/*.log"]
