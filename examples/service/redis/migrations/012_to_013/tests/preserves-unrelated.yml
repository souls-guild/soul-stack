name: preserves-unrelated
description: >
  An incarnation whose state ALREADY has monitoring (e.g. a repeated migration run or
  state where monitoring is already deployed). The has()-guard on the object PRESERVES existing
  monitoring values as-is (idempotency, does NOT overwrite with defaults), the rest of the state
  (redis_type/redis_config/redis_users/redis_sentinel/namedfields/topology) passes through
  bit-for-bit. Mirrors the object-guard of 008_to_009 (seeded_from).

state_before:
  redis_type: "cluster"
  redis_config:
    maxmemory: "256mb"
    appendonly: "yes"
  redis_users:
    - { name: "app", perms: "~* +@all", state: "on" }
  redis_sentinel:
    master_name: "master"
    quorum: 2
    master_settings:
      down-after-milliseconds: "5000"
      failover-timeout: "60000"
    settings: {}
  tls:
    enable: true
    only: false
    port: 7379
  persistence: "rdb_aof_1sec"
  shards: 3
  replicas: 1
  monitoring:
    node_exporter_version: "1.8.2"
    redis_exporter_version: "1.62.0"
    node_exporter_listen: ":19100"
    redis_exporter_listen: ":19121"

state_after:
  redis_type: "cluster"
  redis_config:
    maxmemory: "256mb"
    appendonly: "yes"
  redis_users:
    - { name: "app", perms: "~* +@all", state: "on" }
  redis_sentinel:
    master_name: "master"
    quorum: 2
    master_settings:
      down-after-milliseconds: "5000"
      failover-timeout: "60000"
    settings: {}
  tls:
    enable: true
    only: false
    port: 7379
  persistence: "rdb_aof_1sec"
  shards: 3
  replicas: 1
  monitoring:
    node_exporter_version: "1.8.2"
    redis_exporter_version: "1.62.0"
    node_exporter_listen: ":19100"
    redis_exporter_listen: ":19121"
