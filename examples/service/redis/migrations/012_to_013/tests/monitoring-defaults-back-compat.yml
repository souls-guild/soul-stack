name: monitoring-defaults-back-compat
description: >
  The v12 incarnation was deployed BEFORE monitoring was introduced — there is no monitoring
  field in state. The migration ADDS a monitoring read-model with a conservative default: versions
  empty ('' = not deployed), ports — conventional :9100/:9121. The rest of the state (redis_type/
  redis_config/redis_users/tls/persistence/topology) passes through bit-for-bit.

state_before:
  redis_type: "sentinel"
  redis_config:
    maxmemory: "512mb"
    appendonly: "yes"
  redis_users:
    - { name: "app", perms: "~* +@all", state: "on" }
  tls:
    enable: false
    only: false
    port: 0
  persistence: "rdb"
  memory_mb: 1024
  shards: 0
  replicas: 1

state_after:
  redis_type: "sentinel"
  redis_config:
    maxmemory: "512mb"
    appendonly: "yes"
  redis_users:
    - { name: "app", perms: "~* +@all", state: "on" }
  tls:
    enable: false
    only: false
    port: 0
  persistence: "rdb"
  memory_mb: 1024
  shards: 0
  replicas: 1
  monitoring:
    node_exporter_version: ""
    redis_exporter_version: ""
    node_exporter_listen: ":9100"
    redis_exporter_listen: ":9121"
