name: persistence-idempotent-aof-1sec
description: >
  ИДЕМПОТЕНТНОСТЬ remap: state УЖЕ в НОВОМ enum (persistence:aof_1sec) — как будто
  010_to_011 уже отработала раз. Повторный прогон НЕ должен ничего менять:
    - persistence:aof_1sec → тождество (ни 'aof', ни 'rdb_aof' → ветка тернара
      возвращает state.persistence как есть; НЕ ремапится повторно в что-то иное);
    - connection_mode/io_threads уже присутствуют → set перезаписывает тем же значением
      (plain / 0), state стабилен;
    - cluster (redis_sentinel == {}) → size==0 no-op.
  Доказывает forward-стабильность: re-apply миграции на уже-мигрированном state —
  фикс-точка (важно при ручном повторе/восстановлении из state_history). aof_always —
  parный кейс persistence-idempotent-aof-always.

state_before:
  redis_type: cluster
  redis_version: "7.4.1"
  redis_config:
    maxmemory: "512mb"
    maxmemory-policy: allkeys-lru
    save: ""
    appendonly: "yes"
    appendfsync: "everysec"
    cluster-enabled: "yes"
    cluster-config-file: "nodes.conf"
    cluster-node-timeout: "5000"
  redis_users: []
  redis_hosts: []
  redis_sentinel: {}
  tls:
    enable: false
    only: false
    port: 7379
    cert_ref: ""
    key_ref: ""
    ca_ref: ""
  install:
    method: package
  persistence: aof_1sec
  connection_mode: plain
  io_threads: 0
  maxmemory_policy: allkeys-lru
  memory_mb: 0
  modules: []
  modules_base_url: ""
  conf_dir: /etc/redis
  data_dir: /var/lib/redis
  sysctl_settings: {}
  shards: 3
  replicas: 1
  sentinel_quorum: 0
  provisioned_vm_ids: []
  provisioned_provider: ""
  provisioned_sids: []
  seeded_from:
    source_endpoints: []
    detached: false
    source_password_ref: ""
    source_tls_ca_ref: ""

