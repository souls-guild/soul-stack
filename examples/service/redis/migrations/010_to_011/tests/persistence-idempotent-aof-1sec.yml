name: persistence-idempotent-aof-1sec
description: >
  IDEMPOTENCY of remap: state is ALREADY in the NEW enum (persistence:aof_1sec) — as if
  010_to_011 already ran once. A repeat run must NOT change anything:
    - persistence:aof_1sec → identity (neither 'aof' nor 'rdb_aof' → the ternary branch
      returns state.persistence as is; NOT remapped again into something else);
    - connection_mode/io_threads already present → set overwrites with the same value
      (plain / 0), state is stable;
    - cluster (redis_sentinel == {}) → size==0 no-op.
  Proves forward-stability: re-applying the migration on an already-migrated state is a
  fixed point (important for manual re-run/recovery from state_history). aof_always is the
  paired case persistence-idempotent-aof-always.

state_before:
  redis_type: cluster
  redis_version: "7.4.1"
  redis_config:
    maxmemory: "512mb"
    maxmemory-policy: allkeys-lru
    save: ""
    appendonly: "yes"
    appendfsync: "everysec"
    cluster-enabled: "yes"
    cluster-config-file: "nodes.conf"
    cluster-node-timeout: "5000"
  redis_users: []
  redis_hosts: []
  redis_sentinel: {}
  tls:
    enable: false
    only: false
    port: 7379
    cert_ref: ""
    key_ref: ""
    ca_ref: ""
  install:
    method: package
  persistence: aof_1sec
  connection_mode: plain
  io_threads: 0
  maxmemory_policy: allkeys-lru
  memory_mb: 0
  modules: []
  modules_base_url: ""
  conf_dir: /etc/redis
  data_dir: /var/lib/redis
  sysctl_settings: {}
  shards: 3
  replicas: 1
  sentinel_quorum: 0
  provisioned_vm_ids: []
  provisioned_provider: ""
  provisioned_sids: []
  seeded_from:
    source_endpoints: []
    detached: false
    source_password_ref: ""
    source_tls_ca_ref: ""

