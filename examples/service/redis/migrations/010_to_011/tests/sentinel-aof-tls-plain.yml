name: sentinel-aof-tls-plain
description: >
  sentinel-инкарнация (v10): старый persistence:aof + tls.enable:true/only:false +
  redis_sentinel с именованными down_after_ms/failover_timeout_ms. После миграции:
    - persistence → aof_1sec (remap, fsync everysec бит-в-бит);
    - connection_mode → tls_plain (tls.enable && !tls.only, обратная свёртка);
    - io_threads → 0 (best-effort default);
    - redis_sentinel → master_settings {down-after-milliseconds, failover-timeout}
      (значения из старых листов, конверсия int→string) + settings {}, master_name/
      quorum сохранены; старые down_after_ms/failover_timeout_ms отброшены.
  Остальной state (redis_config/redis_users/install/topology/seeded_from) — бит-в-бит.

state_before:
  redis_type: sentinel
  redis_version: "7.4.1"
  redis_config:
    maxmemory: "256mb"
    maxmemory-policy: allkeys-lru
    save: ""
    appendonly: "yes"
    appendfsync: "everysec"
  redis_users:
    - { name: "app", perms: "~* +@all", state: "on" }
  redis_hosts: []
  redis_sentinel:
    master_name: master
    quorum: 2
    down_after_ms: 3000
    failover_timeout_ms: 45000
  tls:
    enable: true
    only: false
    port: 7379
    cert_ref: "secret/services/redis/tls#cert"
    key_ref: "secret/services/redis/tls#key"
    ca_ref: "secret/services/redis/tls#ca"
  install:
    method: package
  persistence: aof
  maxmemory_policy: allkeys-lru
  memory_mb: 0
  modules: []
  modules_base_url: ""
  conf_dir: /etc/redis
  data_dir: /var/lib/redis
  sysctl_settings: {}
  shards: 0
  replicas: 2
  sentinel_quorum: 2
  provisioned_vm_ids: []
  provisioned_provider: ""
  provisioned_sids: []
  seeded_from:
    source_endpoints: []
    detached: false
    source_password_ref: ""
    source_tls_ca_ref: ""

state_after:
  redis_type: sentinel
  redis_version: "7.4.1"
  redis_config:
    maxmemory: "256mb"
    maxmemory-policy: allkeys-lru
    save: ""
    appendonly: "yes"
    appendfsync: "everysec"
  redis_users:
    - { name: "app", perms: "~* +@all", state: "on" }
  redis_hosts: []
  redis_sentinel:
    master_name: master
    quorum: 2
    master_settings:
      down-after-milliseconds: "3000"
      failover-timeout: "45000"
    settings: {}
  tls:
    enable: true
    only: false
    port: 7379
    cert_ref: "secret/services/redis/tls#cert"
    key_ref: "secret/services/redis/tls#key"
    ca_ref: "secret/services/redis/tls#ca"
  install:
    method: package
  persistence: aof_1sec
  connection_mode: tls_plain
  io_threads: 0
  maxmemory_policy: allkeys-lru
  memory_mb: 0
  modules: []
  modules_base_url: ""
  conf_dir: /etc/redis
  data_dir: /var/lib/redis
  sysctl_settings: {}
  shards: 0
  replicas: 2
  sentinel_quorum: 2
  provisioned_vm_ids: []
  provisioned_provider: ""
  provisioned_sids: []
  seeded_from:
    source_endpoints: []
    detached: false
    source_password_ref: ""
    source_tls_ca_ref: ""
