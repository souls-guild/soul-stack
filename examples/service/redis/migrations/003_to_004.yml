from_version: 3
to_version: 4

description: >-
  state_schema v3 → v4: NARROWING the redis_type enum to [sentinel, cluster] (user
  decision 2026-06-25 — the standalone and sentinel_only modes are removed from the
  SERVICE; sentinel_only remains a capability in the `redis` destiny for reuse). Old
  incarnations with redis_type ∈ {standalone, sentinel_only} have a value outside the
  new enum → state would become schema-invalid. This forward-only migration remaps
  them to a valid mode so state stays schema-valid.

  ★ REMAP (forward-only, ADR-019 no down:):
    - standalone     → sentinel   (one master + sentinel daemon; replicas_per_master=0
                                    in the new service gives a standalone-equivalent);
    - sentinel_only  → sentinel   (no clean target: sentinel_only has no data plane;
                                    sentinel is the closest mode, carrying a sentinel daemon);
    - sentinel       → sentinel   (unchanged);
    - cluster        → cluster    (unchanged).

  ★★ WARNING — THE SEMANTICS OF THE REMAP ARE NOT UNAMBIGUOUS (needs_architect):
  the remap CHANGES THE LIVE MEANING of the incarnation. A standalone install did NOT
  have a sentinel daemon; after remapping to sentinel, a repeated apply create will
  deploy a sentinel daemon that wasn't there. sentinel_only never had a redis-server
  data plane at all; remapping to sentinel implies the master is chosen from the
  roster (rather than external). This is an operationally significant change, not a
  pure structural rename. The migration is implemented as forward-only by request (so
  state stays valid), but the CORRECTNESS of the chosen target mode for live
  standalone/sentinel_only incarnations must be confirmed by the architect/product
  before production. Alternatives (rejected at this step as requiring a decision
  outside the DSL): (a) refuse upgrade for such incarnations; (b) introduce a
  "standalone-equivalent" flag in state; (c) keep the old mode in a separate legacy
  field.

  ★ DSL form: migration-CEL (ADR-019 sandbox) allows ?:/==; the remap is one flat set
  with a ternary over state.redis_type. The rest of state (redis_config/redis_users/
  redis_hosts/redis_sentinel/namedfields v3) is NOT touched. Forward-only (no down:;
  restoration via state_history).

transform:
  # Remap redis_type into the new enum [sentinel, cluster]. standalone/sentinel_only →
  # sentinel; sentinel/cluster — unchanged (identity branch of the ternary).
  - set:
      path:  state.redis_type
      value: >-
        ${ (state.redis_type == 'standalone' || state.redis_type == 'sentinel_only')
             ? 'sentinel'
             : state.redis_type }
