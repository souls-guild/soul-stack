from_version: 3
to_version: 4

description: >-
  state_schema v3 → v4: СУЖЕНИЕ enum redis_type до [sentinel, cluster] (решение
  пользователя 2026-06-25 — режимы standalone и sentinel_only убраны из СЕРВИСА;
  sentinel_only остаётся capability в destiny `redis` для переиспользования). Старые
  инкарнации с redis_type ∈ {standalone, sentinel_only} имеют значение вне нового enum
  → state стал бы schema-невалиден. Эта миграция forward-only ремапит их в валидный
  режим, чтобы state остался схема-корректным.

  ★ REMAP (forward-only, ADR-019 без down:):
    - standalone     → sentinel   (один master + sentinel-демон; replicas_per_master=0
                                    в новом сервисе даёт standalone-эквивалент);
    - sentinel_only  → sentinel   (нет clean-target: у sentinel_only нет data-плоскости;
                                    sentinel — ближайший режим, несущий sentinel-демон);
    - sentinel       → sentinel   (без изменений);
    - cluster        → cluster    (без изменений).

  ★★ ВНИМАНИЕ — СЕМАНТИКА REMAP-А НЕ ОДНОЗНАЧНА (needs_architect):
  ремап МЕНЯЕТ ЖИВОЙ СМЫСЛ инкарнации. standalone-инсталляция НЕ имела sentinel-демона;
  после ремапа в sentinel повторный apply create развернёт sentinel-демон, которого там
  не было. sentinel_only вообще НЕ имела data-плоскости redis-server; ремап в sentinel
  подразумевает, что master выбирается из roster-а (а не внешний). Это операционно
  значимое изменение, не чистый структурный rename. Миграция реализована как
  forward-only по запросу (чтобы state остался валиден), но КОРРЕКТНОСТЬ выбранного
  target-режима для живых standalone/sentinel_only-инкарнаций должна быть подтверждена
  архитектором/продуктом до прода. Альтернативы (отвергнуты на этом шаге как требующие
  решения вне DSL): (а) отказать в upgrade таких инкарнаций; (б) ввести флаг
  «standalone-эквивалент» в state; (в) сохранить старый режим в отдельном legacy-поле.

  ★ DSL-форма: migration-CEL (ADR-019 sandbox) допускает ?:/==; ремап — один плоский
  set с тернаром по state.redis_type. Остальной state (redis_config/redis_users/
  redis_hosts/redis_sentinel/namedfields v3) НЕ трогается. Forward-only (down: нет;
  восстановление — через state_history).

transform:
  # Ремап redis_type в новый enum [sentinel, cluster]. standalone/sentinel_only →
  # sentinel; sentinel/cluster — без изменений (тождественная ветка тернара).
  - set:
      path:  state.redis_type
      value: >-
        ${ (state.redis_type == 'standalone' || state.redis_type == 'sentinel_only')
             ? 'sentinel'
             : state.redis_type }
