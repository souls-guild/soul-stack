name: redis
state_schema_version: 8
description: >-
  Redis по концепции Ansible-роли: ОДИН сервис на режимы развёртывания
  (redis_type ∈ sentinel/cluster). Per-host install + render redis.conf делает
  destiny `redis` (режим-агностичный кирпич, ADR-009 B-гибрид); ЖИВОЙ Redis-рантайм
  (CONFIG SET, ACL, cluster, sentinel, failover) идёт через плагин `community.redis`;
  оркестрация (порядок/таргетинг/rolling/health-gate) — в scenario сервиса.

  Статус (2026-06-25): scenario `create` реализован для ДВУХ режимов сервиса —
  cluster и sentinel (диспетчер по redis_type). sentinel с replicas_per_master=0
  даёт standalone-эквивалент (один master + sentinel-демон). Режимы standalone и
  sentinel_only убраны из СЕРВИСА (sentinel_only остаётся capability в destiny
  `redis` для переиспользования, напр. DragonFly). Day-2 hot-reload реализован:
  `update_config` (CONFIG SET hot-settable + REWRITE), `add_user` (ACL LOAD),
  `rotate_tls` (CONFIG SET tls-*-file, live cert-reload), а также `restart`
  (systemd-unit-уровень), `add_node`/`remove_node`/`reshard` (cluster).
  Производственная конвенция: для config/acl/tls — hot-reload (без рестарта),
  рестарт только за systemd-unit-уровнем (hardening drop-in). В backlog:
  failover-сценарий, плагинный state community.redis.failover, установка из
  бинарного дистрибутива (Шаг B припаркован)
  (redis-консолидация .pm/tasks/2026-06-22-redis-consolidation).

# state_schema_version = 8: цепочка миграций forward-only (ADR-019).
#   - 001_to_002 (migrations/001_to_002.yml): redis_users из списка имён в map
#     name → {perms, state} (демо-грамматики DSL — rename + set + foreach + delete).
#   - 002_to_003 (migrations/002_to_003.yml): «richer state» — opaque redis_config
#     ДОПОЛНЯЕТСЯ ИМЕНОВАННЫМИ полями намерения (read-model day-2): tls/install/
#     persistence/memory_mb/maxmemory_policy/modules/sysctl_settings + топология
#     (shards/replicas/sentinel_quorum). Best-effort: извлекаемое — из redis_config/
#     redis_sentinel, неизвлекаемое — консервативный default (см. описание миграции).
#   - 003_to_004 (migrations/003_to_004.yml): СУЖЕНИЕ enum redis_type до
#     [sentinel, cluster]. Forward-only remap старых режимов: standalone → sentinel,
#     sentinel_only → sentinel (чтобы state остался schema-валиден). ★ СЕМАНТИКА
#     remap-а требует архитектурного подтверждения (см. описание миграции).
#   - 004_to_005 (migrations/004_to_005.yml): тайминги failover sentinel (#7) —
#     redis_sentinel ДОПОЛНЯЕТСЯ down_after_ms/failover_timeout_ms (read-model day-2).
#     Только для sentinel-инкарнаций (redis_sentinel непуст); для cluster (redis_sentinel
#     {}) — no-op. Best-effort default = роль-дефолты 5000/60000 (точное значение
#     восстанавливается на следующем create-override). Симметрично 002_to_003 namedfields.
#   - 005_to_006 (migrations/005_to_006.yml): redis_users из map name→{perms,state} в
#     ТИПИЗИРОВАННЫЙ массив [{name, perms, state}] (wave 1b types-эпика, ADR-062 AclUser).
#     map-ключ (имя) переезжает в поле name элемента. Выразимо ОДНИМ set с CEL-форой
#     state.redis_users.map(n, {name: n, ...}) — нативный .map() над MAP-ом итерирует
#     КЛЮЧИ (зеркало 001_to_002 list→map, инверсия); keys() в migration-CEL НЕ
#     зарегистрирован и НЕ нужен. Порядок массива в state НЕ детерминирован (.map()
#     над Go-map не сортирует) — детерминизм итогового ACL даёт sorted-range по MAP в
#     users.acl.tmpl, НЕ порядок элементов state. Пустой/отсутствующий map → пустой массив.
#   - 006_to_007 (migrations/006_to_007.yml): cloud-provision read-model (ADR-061,
#     Вариант A: create поднимает VM в том же прогоне). state ДОПОЛНЯЕТСЯ полями
#     provisioned_vm_ids (array string — provider-vm-id созданных VM, day-2 teardown
#     читает их для destroy) и provisioned_provider (string — имя cloud-Provider).
#     Существующим инкарнациям (развёрнутым БЕЗ provision) — консервативный default:
#     provisioned_vm_ids=[] и provisioned_provider='' (не провиженные нашим сервисом).
#     ДВА плоских set (поля независимы) — has()-guard back-compat для инкарнаций без них.
#   - 007_to_008 (migrations/007_to_008.yml): cascade-destroy read-model (дополнение к
#     v7). state ДОПОЛНЯЕТСЯ provisioned_sids (array string — SID/FQDN созданных нашим
#     прогоном VM). day-2 teardown читает их для cascade destroy реестров souls/seeds/
#     tokens (Reaper НЕ снимает pending-VM-souls сам → без sids осиротевшие записи
#     повисли бы, anti-replay нарушен). Рядом с provisioned_vm_ids: vm_ids — provider-id
#     (для core.cloud.destroyed), sids — Keeper-id Soul (для cascade destroy) — разные
#     подсистемы. ОДИН плоский set; default [] существующим (has()-guard). Зеркало 006_to_007.
# incarnation.state фиксирует, что развёрнуто, чтобы оператор видел инсталляцию и
# повторный apply был idempotent.
#
# ГРАНИЦА двух представлений конфига (architect a9e1c2c6):
#   - redis_config (opaque, additionalProperties:true) — ВЫЧИСЛЕННЫЙ ИТОГ трансляции
#     простого ввода в redis.conf-map (что реально уйдёт в render и CONFIG SET). Это
#     write-model «как развёрнуто».
#   - именованные поля (tls/install/persistence/...) — НАМЕРЕНИЕ оператора в простых
#     типизированных понятиях (read-model). День-2-сценарии читают их именованно
#     (restart — state.tls, будущие update_config — state.install/persistence/memory_mb).
# ОБА представления заполняются из ОДНОГО compute-прохода create (compute.*): namedfields
# и redis_config считаются из тех же compute.tls_*/input.* — рассинхрона между ними нет.
state_schema:
  type: object
  required: [redis_type, redis_config]
  properties:
    # Режим развёртывания (концепция роли). Порождает производные флаги
    # (deploy_redis/deploy_sentinel/cluster_enabled), уходящие в destiny через
    # apply: input: в соответствующих scenario. Режимы сервиса: sentinel/cluster
    # (standalone/sentinel_only убраны 2026-06-25, см. 003_to_004 migration).
    redis_type:
      type: string
      enum: [sentinel, cluster]
    redis_version:
      type: string
    # Итоговый конфиг redis.conf (merged default→preset→user из essence). Уходит и
    # в render destiny `redis`, и в community.redis.config (CONFIG SET к живому Redis).
    redis_config:
      type: object
      additionalProperties: true

    # ── Именованные поля намерения (read-model, v3) ───────────────────────────
    # Простые типизированные понятия оператора, рядом с opaque redis_config. День-2-
    # сценарии читают их ИМЕНОВАННО (не парсят redis_config). Заполняются create из
    # тех же compute.*/input, что и redis_config (один источник истины, без drift).

    # TLS-намерение: включён ли TLS, закрыт ли plain-порт, на каком TLS-порту, и
    # Vault-ПУТИ серверного cert/key/CA (НЕ сам PEM — секрет в state не лежит, ИБ).
    # Заполняется из compute.tls_on/tls_only_on/tls_port/tls_*_ref (те же значения,
    # что ушли в TLS-блок redis_config). day-2 restart читает state.tls.enable/port.
    tls:
      type: object
      additionalProperties: false
      properties:
        enable:   { type: boolean }
        only:     { type: boolean }
        port:     { type: integer }
        cert_ref: { type: string }
        key_ref:  { type: string }
        ca_ref:   { type: string }
    # Способ установки redis (package — distro-пакет; binary — upstream-tarball).
    # base_url/version материализуются при method=binary. Из default(input.install,
    # {method:package}). day-2 update_config читает state.install.method.
    install:
      type: object
      additionalProperties: false
      properties:
        method:   { type: string, enum: [package, binary] }
        base_url: { type: string }
        version:  { type: string }
    # Режим persistence (концепция роли). Из input.persistence (default rdb).
    persistence:
      type: string
      enum: [off, aof, rdb, rdb_aof]
    # Бюджет памяти под Redis, МБ. Из input.memory_mb; не задан → отсутствует/0.
    memory_mb:
      type: integer
      minimum: 64
    # Политика вытеснения. Из input.maxmemory_policy; не задан → пустая строка
    # (директива берётся из merge-подложки essence — в namedfields маркируется
    # отсутствием явного выбора оператора).
    maxmemory_policy:
      type: string
    # Развёрнутые Redis-модули (read-model). Директива «модули ВСЕГДА ВСЕ»: на Redis
    # < 8 — полный набор алиасов (destiny грузит все из vars.redis_modules), на Redis
    # 8+ — пусто (встроены). НЕ operator-выбор (input.modules упразднён).
    modules:
      type: array
      items:
        type: string
        enum: [search, json, timeseries, bloom]
    # Источник .so Redis-модулей (modules_base_url оператора, read-model). Сохраняется
    # для day-2 (add_node): новая нода кластера тянет .so из ТОГО ЖЕ источника. Пусто,
    # если оператор не задавал (Redis 8+ — модули встроены, источник не нужен).
    modules_base_url:
      type: string
    # Host-layout (директива B, read-model): базовые каталоги конфигурации и данных
    # Redis, переопределяемые оператором (input.conf_dir/data_dir). Сохраняются для
    # day-2 (add_node): новая нода кластера обязана знать ТОТ ЖЕ layout. default =
    # текущий путь (/etc/redis, /var/lib/redis); для старых инкарнаций без этих полей
    # day-2 читает их has()-safe-дефолтом (back-compat). Симметрично modules_base_url.
    conf_dir:
      type: string
    data_dir:
      type: string
    # Применённые kernel-параметры под Redis (host-tuning). Из essence.sysctl_settings
    # (тот же map, что ушёл в destiny через apply.input). key→value (строки).
    sysctl_settings:
      type: object
      additionalProperties:
        type: string

    # ── cloud-provision read-model (v7–v8, ADR-061) ───────────────────────────
    # ФАКТ «эти хосты подняты нашим create-прогоном через cloud-create». Заполняется
    # create ТОЛЬКО когда input.provision.enabled (provider/vm_ids/sids из register
    # core.cloud.created); иначе [] / '' (хосты не провиженные сервисом — declared
    # roster). day-2 teardown читает provisioned_vm_ids для core.cloud.destroyed.
    # provider — имя cloud-Provider в реестре (для того же destroy-вызова).
    provisioned_vm_ids:
      type: array
      items:
        type: string
    provisioned_provider:
      type: string
    # provisioned_sids (v8): SID (FQDN) каждой VM, поднятой этим create-прогоном. ОТЛИЧНО
    # от provisioned_vm_ids: vm_ids — provider-side id (для core.cloud.destroyed), sids —
    # Keeper-side идентичность Soul. day-2 teardown (cascade destroy) читает sids, чтобы
    # добить осиротевшие souls (→destroyed) / seeds (→orphaned) / bootstrap-токены
    # (→burned): Reaper НЕ снимает pending-VM-souls сам (mark_disconnected только
    # connected→disconnected), без sids записи повисли бы (нарушение anti-replay).
    # Заполняется тем же guard+формой, что provisioned_vm_ids (input.provision.enabled →
    # register.provision.hosts.map(h, h.sid)); иначе [].
    provisioned_sids:
      type: array
      items:
        type: string

    # ── Топология (counts, v3) ────────────────────────────────────────────────
    # Раскладка ролей по таргетированным souls. Из input.shards/replicas/
    # sentinel_quorum (см. input create). Режим-зависимы: cluster использует shards/
    # replicas (replicas_per_shard), sentinel — replicas/sentinel_quorum; для прочих
    # режимов — 0. Не задан в input → 0 (auto-quorum sentinel вычисляется в apply,
    # в namedfields материализуется 0 как «оператор не зафиксировал явно»).
    shards:          { type: integer }
    replicas:        { type: integer }
    sentinel_quorum: { type: integer }

    # ACL-пользователи Redis: ТИПИЗИРОВАННЫЙ массив [{name, perms, state}] (wave 1b
    # types-эпика, ADR-062 AclUser; перевод map→array, миграция 005_to_006). name —
    # имя юзера (раньше был map-ключ); perms — полная ACL-строка (директивы Redis ACL
    # как есть). Наполняется create из input.users (тоже массив AclUser); пароли — НЕ
    # в state (keeper-side Vault, ADR-012). day-2 (add_user/add_node/update_config/
    # rotate_tls) читают массив через .map(u, {u.name: {...}}) → собирают тот же
    # destiny-map имя→{perms,state,password}, что и прежде (destiny-контракт не менялся).
    redis_users:
      type: array
      items:
        type: object
        required: [name, perms, state]
        properties:
          name:  { type: string }
          perms: { type: string }
          state: { type: string, enum: [on, off] }
        additionalProperties: false
    # Хосты топологии (sid + роль). Для standalone — один primary; для cluster/
    # sentinel наполняется сценарием create (раскладка ролей по таргетированным
    # souls). Точная роль каждого SID в state — follow-up.
    redis_hosts:
      type: array
      items:
        type: object
        required: [sid, role]
        properties:
          sid:  { type: string, format: fqdn }
          role: { type: string, enum: [primary, replica, sentinel] }
    # Факты sentinel-режимов (master_name + quorum monitored master + тайминги
    # failover). Наполняется create при redis_type=sentinel; для cluster пуст.
    # master_ip материализуется ТОЛЬКО в sentinel_only (ВНЕШНИЙ master, заданный
    # оператором явно — единственный факт топологии режима); в режиме sentinel
    # master выбирается из roster-а (host-вариативен) → master_ip в state не пишется.
    # ★ #7 (v5): down_after_ms/failover_timeout_ms — тайминги failover (read-model
    # day-2). Из input.sentinel_down_after_ms/sentinel_failover_timeout_ms (оба default).
    redis_sentinel:
      type: object
      additionalProperties: false
      properties:
        master_name:         { type: string }
        master_ip:           { type: string }
        quorum:              { type: integer }
        down_after_ms:       { type: integer }
        failover_timeout_ms: { type: integer }

# Зависимости-destiny (ADR-007: версия зависимости = git ref, не semver-range).
# Резолв git-URL — гибрид (docs/keeper/config.md::default_destiny_source):
# запись без git: → default_destiny_source + {name}; с git: → override.
# `redis` — режим-агностичный standalone-кирпич в examples/destiny/redis/.
destiny:
  - { name: redis, ref: v1.0.0 }

# Custom-модули сервиса. Двухуровневая форма <namespace>.<module> (kebab-case)
# обязательна (docs/service/manifest.md → modules[]). community.redis — ОСНОВНОЙ
# интерфейс к живому Redis (examples/module/soul-mod-community-redis/).
modules:
  - { name: community.redis, ref: v1.0.0 }
