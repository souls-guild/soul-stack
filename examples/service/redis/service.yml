name: redis
state_schema_version: 1
description: >-
  Redis по концепции Ansible-роли: ОДИН сервис на все режимы развёртывания
  (redis_type ∈ standalone/sentinel/cluster/sentinel_only). Per-host install +
  render redis.conf делает destiny `redis` (режим-агностичный кирпич, ADR-009
  B-гибрид); ЖИВОЙ Redis-рантайм (CONFIG SET, ACL, cluster, sentinel, failover)
  идёт через плагин `community.redis`; оркестрация (порядок/таргетинг/rolling/
  health-gate) — в scenario сервиса.

  Статус (2026-06-22): scenario `create` реализован для режимов standalone,
  cluster и sentinel (диспетчер по redis_type). sentinel_only + day-2 scenarios
  (add_acl_user/update_config/reshard/failover) — backlog
  (redis-консолидация .pm/tasks/2026-06-22-redis-consolidation).

# state_schema_version = 1 → каталог migrations/ не обязателен (ADR-019).
# incarnation.state фиксирует, что развёрнуто, чтобы оператор видел инсталляцию и
# повторный apply был idempotent.
state_schema:
  type: object
  required: [redis_type, redis_config]
  properties:
    # Режим развёртывания (концепция роли). Порождает производные флаги
    # (deploy_redis/deploy_sentinel/cluster_enabled), уходящие в destiny через
    # apply: input: в соответствующих scenario. Реализованы standalone/cluster/
    # sentinel; sentinel_only — backlog.
    redis_type:
      type: string
      enum: [standalone, sentinel, cluster, sentinel_only]
    redis_version:
      type: string
    # Итоговый конфиг redis.conf (merged default→preset→user из essence). Уходит и
    # в render destiny `redis`, и в community.redis.config (CONFIG SET к живому Redis).
    redis_config:
      type: object
      additionalProperties: true
    # ACL-пользователи Redis: map username → {perms, state}. perms — полная ACL-
    # строка (директивы Redis ACL как есть). Наполняется create из input.users;
    # пароли — НЕ в state (keeper-side Vault, ADR-012).
    redis_users:
      type: object
      additionalProperties:
        type: object
        required: [perms, state]
        properties:
          perms: { type: string }
          state: { type: string, enum: [on, off] }
        additionalProperties: false
    # Хосты топологии (sid + роль). Для standalone — один primary; для cluster/
    # sentinel наполняется сценарием create (раскладка ролей по таргетированным
    # souls). Точная роль каждого SID в state — follow-up.
    redis_hosts:
      type: array
      items:
        type: object
        required: [sid, role]
        properties:
          sid:  { type: string, format: fqdn }
          role: { type: string, enum: [primary, replica, sentinel] }
    # Факты sentinel-режима (master_name + quorum monitored master). Наполняется
    # create при redis_type=sentinel; для прочих режимов отсутствует/пуст.
    redis_sentinel:
      type: object
      additionalProperties: false
      properties:
        master_name: { type: string }
        quorum:      { type: integer }

# Зависимости-destiny (ADR-007: версия зависимости = git ref, не semver-range).
# Резолв git-URL — гибрид (docs/keeper/config.md::default_destiny_source):
# запись без git: → default_destiny_source + {name}; с git: → override.
# `redis` — режим-агностичный standalone-кирпич в examples/destiny/redis/.
destiny:
  - { name: redis, ref: v1.0.0 }

# Custom-модули сервиса. Двухуровневая форма <namespace>.<module> (kebab-case)
# обязательна (docs/service/manifest.md → modules[]). community.redis — ОСНОВНОЙ
# интерфейс к живому Redis (examples/module/soul-mod-community-redis/).
modules:
  - { name: community.redis, ref: v1.0.0 }
