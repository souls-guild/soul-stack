name: redis
state_schema_version: 14
description: >-
  Redis по концепции Ansible-роли: ОДИН сервис на режимы развёртывания
  (redis_type ∈ sentinel/cluster). Per-host install + render redis.conf делает
  destiny `redis` (режим-агностичный кирпич, ADR-009 B-гибрид); ЖИВОЙ Redis-рантайм
  (CONFIG SET, ACL, cluster, sentinel, failover) идёт через плагин `community.redis`;
  оркестрация (порядок/таргетинг/rolling/health-gate) — в scenario сервиса.

  Статус (2026-06-25): scenario `create` реализован для ДВУХ режимов сервиса —
  cluster и sentinel (диспетчер по redis_type). sentinel с replicas_per_master=0
  даёт standalone-эквивалент (один master + sentinel-демон). Режимы standalone и
  sentinel_only убраны из СЕРВИСА (sentinel_only остаётся capability в destiny
  `redis` для переиспользования, напр. DragonFly). Day-2 hot-reload реализован:
  `update_config` (CONFIG SET hot-settable + REWRITE), `add_user` (ACL LOAD),
  `rotate_tls` (CONFIG SET tls-*-file, live cert-reload), а также `restart`
  (systemd-unit-уровень), `add_node`/`remove_node`/`reshard` (cluster).
  Производственная конвенция: для config/acl/tls — hot-reload (без рестарта),
  рестарт только за systemd-unit-уровнем (hardening drop-in). В backlog:
  failover-сценарий, плагинный state community.redis.failover, установка из
  бинарного дистрибутива (Шаг B припаркован)
  (redis-консолидация .pm/tasks/2026-06-22-redis-consolidation).

# state_schema_version = 8: цепочка миграций forward-only (ADR-019).
#   - 001_to_002 (migrations/001_to_002.yml): redis_users из списка имён в map
#     name → {perms, state} (демо-грамматики DSL — rename + set + foreach + delete).
#   - 002_to_003 (migrations/002_to_003.yml): «richer state» — opaque redis_config
#     ДОПОЛНЯЕТСЯ ИМЕНОВАННЫМИ полями намерения (read-model day-2): tls/install/
#     persistence/memory_mb/maxmemory_policy/modules/sysctl_settings + топология
#     (shards/replicas/sentinel_quorum). Best-effort: извлекаемое — из redis_config/
#     redis_sentinel, неизвлекаемое — консервативный default (см. описание миграции).
#   - 003_to_004 (migrations/003_to_004.yml): СУЖЕНИЕ enum redis_type до
#     [sentinel, cluster]. Forward-only remap старых режимов: standalone → sentinel,
#     sentinel_only → sentinel (чтобы state остался schema-валиден). ★ СЕМАНТИКА
#     remap-а требует архитектурного подтверждения (см. описание миграции).
#   - 004_to_005 (migrations/004_to_005.yml): тайминги failover sentinel (#7) —
#     redis_sentinel ДОПОЛНЯЕТСЯ down_after_ms/failover_timeout_ms (read-model day-2).
#     Только для sentinel-инкарнаций (redis_sentinel непуст); для cluster (redis_sentinel
#     {}) — no-op. Best-effort default = роль-дефолты 5000/60000 (точное значение
#     восстанавливается на следующем create-override). Симметрично 002_to_003 namedfields.
#   - 005_to_006 (migrations/005_to_006.yml): redis_users из map name→{perms,state} в
#     ТИПИЗИРОВАННЫЙ массив [{name, perms, state}] (wave 1b types-эпика, ADR-062 AclUser).
#     map-ключ (имя) переезжает в поле name элемента. Выразимо ОДНИМ set с CEL-форой
#     state.redis_users.map(n, {name: n, ...}) — нативный .map() над MAP-ом итерирует
#     КЛЮЧИ (зеркало 001_to_002 list→map, инверсия); keys() в migration-CEL НЕ
#     зарегистрирован и НЕ нужен. Порядок массива в state НЕ детерминирован (.map()
#     над Go-map не сортирует) — детерминизм итогового ACL даёт sorted-range по MAP в
#     users.acl.tmpl, НЕ порядок элементов state. Пустой/отсутствующий map → пустой массив.
#   - 006_to_007 (migrations/006_to_007.yml): cloud-provision read-model (ADR-061,
#     Вариант A: create поднимает VM в том же прогоне). state ДОПОЛНЯЕТСЯ полями
#     provisioned_vm_ids (array string — provider-vm-id созданных VM, day-2 teardown
#     читает их для destroy) и provisioned_provider (string — имя cloud-Provider).
#     Существующим инкарнациям (развёрнутым БЕЗ provision) — консервативный default:
#     provisioned_vm_ids=[] и provisioned_provider='' (не провиженные нашим сервисом).
#     ДВА плоских set (поля независимы) — has()-guard back-compat для инкарнаций без них.
#   - 007_to_008 (migrations/007_to_008.yml): cascade-destroy read-model (дополнение к
#     v7). state ДОПОЛНЯЕТСЯ provisioned_sids (array string — SID/FQDN созданных нашим
#     прогоном VM). day-2 teardown читает их для cascade destroy реестров souls/seeds/
#     tokens (Reaper НЕ снимает pending-VM-souls сам → без sids осиротевшие записи
#     повисли бы, anti-replay нарушен). Рядом с provisioned_vm_ids: vm_ids — provider-id
#     (для core.cloud.destroyed), sids — Keeper-id Soul (для cascade destroy) — разные
#     подсистемы. ОДИН плоский set; default [] существующим (has()-guard). Зеркало 006_to_007.
#   - 008_to_009 (migrations/008_to_009.yml): seed-source read-model (S1-пилот
#     migrate_cluster). state ДОПОЛНЯЕТСЯ вложенным объектом seeded_from — ОТКУДА
#     залиты данные при миграции с внешнего кластера: source_endpoints (array string)
#     и detached (bool — false после migrate, true после day-2 detach_source). Время
#     намеренно НЕ в state (детерминизм L0; now() в migration-CEL запрещён ADR-019) —
#     берётся из state_history (snapshot per-change). Существующим инкарнациям (обычный
#     create, не миграция) — консервативный default {source_endpoints: [], detached: false}.
#     ОДИН плоский set с has()-guard на ВЕСЬ объект (CEL-map-литерал-дефолт): seeded_from
#     уже есть → сохраняется как есть, иначе ставится дефолт. Зеркало 006_to_007/007_to_008
#     (guard на объекте, не на листьях). Остальной state НЕ трогается.
#   - 009_to_010 (migrations/009_to_010.yml): seeded_from ДОПОЛНЯЕТСЯ ССЫЛКАМИ на учётку
#     внешнего источника — source_password_ref (Vault-ПУТЬ к паролю) + source_tls_ca_ref
#     (Vault-ПУТЬ к CA), оба string. Прод-фикс блокера detach под AUTH-источником: day-2
#     detach_source делает финальный offset-gate к ВНЕШНЕМУ источнику, но раньше учётка
#     источника в state НЕ хранилась (только в input.source.* у migrate_cluster) → коннект
#     к AUTH-источнику падал → detach НИКОГДА не проходил (error_locked). Теперь migrate
#     ПЕРСИСТИТ ССЫЛКИ (НЕ секреты — Vault-пути), detach читает их vault()-ом keeper-side.
#     Существующим v9-инкарнациям (и обычному create) — консервативный default: пустые
#     ref'ы (source без AUTH/TLS, как было). ★ ЛИСТ-guard (has() на КАЖДОЕ новое поле
#     внутри уже-существующего seeded_from), НЕ объект-guard как 008_to_009: seeded_from у
#     v9 уже ЕСТЬ (008_to_009 его гарантировал), здесь добавляются ПОЛЯ в него —
#     перезатереть объект целиком означало бы стереть source_endpoints/detached. Зеркало
#     листового паттерна 006_to_007 (has() на каждое новое поле). Остальной state не трогается.
#   - 010_to_011 (migrations/010_to_011.yml): редизайн input-контракта (connection_mode
#     enum + io-threads + расширение persistence + restruct sentinel-таймингов). state:
#     (1) persistence remap старых значений aof→aof_1sec / rdb_aof→rdb_aof_1sec (off/rdb
#     и новые aof_always/rdb_aof_always — тождество); (2) НОВОЕ connection_mode (enum
#     tls/tls_plain/plain) — выведено из существующего tls.enable/only (обратная свёртка,
#     best-effort как 002_to_003 namedfields); (3) НОВОЕ io_threads — best-effort default
#     0 (исходное значение в state не лежало — симметрия memory_mb в 002_to_003); (4)
#     redis_sentinel RESTRUCT (только для sentinel-инкарнаций, has-guard): именованные
#     down_after_ms/failover_timeout_ms СВЁРНУТЫ в master_settings (map<string,string>
#     эффективных per-master директив down-after-milliseconds/failover-timeout) +
#     settings={} (глобальные sentinel) — зеркало input.sentinel_master_settings; старые
#     листы удаляются (delete). cluster (redis_sentinel {}) — sentinel-ветка no-op.
#     Forward-only (down: нет; восстановление — state_history).
#   - 011_to_012 (migrations/011_to_012.yml): вынос install + host-layout (conf_dir/
#     data_dir/modules_base_url) из state в essence (Вариант A) — четыре delete (no-op на
#     инкарнациях без полей).
#   - 012_to_013 (migrations/012_to_013.yml): обязательный мониторинг data-плоскости
#     (Слайс I). state ДОПОЛНЯЕТСЯ read-model monitoring (версии/listen node_exporter+
#     redis_exporter; симметрия install/tls). Существующим v12 — консервативный default
#     (версии '', порты :9100/:9121). ОДИН плоский set с has()-guard на объект (зеркало
#     008_to_009 seeded_from). Пароль/юзер monitoring в state НЕ хранятся (ИБ).
# incarnation.state фиксирует, что развёрнуто, чтобы оператор видел инсталляцию и
# повторный apply был idempotent.
#
# ГРАНИЦА двух представлений конфига (architect a9e1c2c6):
#   - redis_config (opaque, additionalProperties:true) — ВЫЧИСЛЕННЫЙ ИТОГ трансляции
#     простого ввода в redis.conf-map (что реально уйдёт в render и CONFIG SET). Это
#     write-model «как развёрнуто».
#   - именованные поля (tls/persistence/...) — НАМЕРЕНИЕ оператора в простых
#     типизированных понятиях (read-model). День-2-сценарии читают их именованно
#     (restart — state.tls, update_config — state.persistence/memory_mb). install и
#     host-layout (conf_dir/data_dir/modules_base_url) вынесены в essence (v11→v12,
#     Вариант A): install — read-model без читателей, layout — day-2 читают essence.
# ОБА представления заполняются из ОДНОГО compute-прохода create (compute.*): namedfields
# и redis_config считаются из тех же compute.tls_*/input.* — рассинхрона между ними нет.
state_schema:
  type: object
  required: [redis_type, redis_config]
  properties:
    # Режим развёртывания (концепция роли). Порождает производные флаги
    # (deploy_redis/deploy_sentinel/cluster_enabled), уходящие в destiny через
    # apply: input: в соответствующих scenario. Режимы сервиса: sentinel/cluster
    # (standalone/sentinel_only убраны 2026-06-25, см. 003_to_004 migration).
    redis_type:
      type: string
      enum: [sentinel, cluster]
    redis_version:
      type: string
    # Итоговый конфиг redis.conf (merged default→preset→user из essence). Уходит и
    # в render destiny `redis`, и в community.redis.config (CONFIG SET к живому Redis).
    redis_config:
      type: object
      additionalProperties: true

    # ── Именованные поля намерения (read-model, v3) ───────────────────────────
    # Простые типизированные понятия оператора, рядом с opaque redis_config. День-2-
    # сценарии читают их ИМЕНОВАННО (не парсят redis_config). Заполняются create из
    # тех же compute.*/input, что и redis_config (один источник истины, без drift).

    # TLS-намерение: включён ли TLS, закрыт ли plain-порт, на каком TLS-порту, и
    # Vault-ПУТИ серверного cert/key/CA (НЕ сам PEM — секрет в state не лежит, ИБ).
    # Заполняется из compute.tls_on/tls_only_on/tls_port/tls_*_ref (те же значения,
    # что ушли в TLS-блок redis_config). day-2 restart читает state.tls.enable/port.
    tls:
      type: object
      additionalProperties: false
      properties:
        enable:   { type: boolean }
        only:     { type: boolean }
        port:     { type: integer }
        cert_ref: { type: string }
        key_ref:  { type: string }
        ca_ref:   { type: string }
    # Режим сетевого канала Redis (enum, read-model v11). Явный выбор оператора
    # (input.connection_mode): plain — только plain-порт; tls_plain — TLS+plain;
    # tls — только TLS. tls-namedfield выше несёт ПРОИЗВОДНЫЕ enable/only/port
    # (compute.tls_on/tls_only_on), connection_mode дублирует ИСХОДНЫЙ выбор enum.
    # Для v≤10-инкарнаций выводится из tls.enable/only обратной свёрткой (010_to_011).
    connection_mode:
      type: string
      enum: [tls, tls_plain, plain]
    # Число I/O-потоков Redis (директива io-threads, read-model v11). Из
    # input.io_threads (default 0 = однопоточный I/O). 0 → директива io-threads в
    # redis_config НЕ пишется (compute has-guard >0). Для v≤10 — best-effort 0
    # (исходное значение в state не лежало; 010_to_011, симметрия memory_mb).
    io_threads:
      type: integer
      minimum: 0
    # Режим persistence (концепция роли). Из input.persistence (default rdb).
    # ★ v11: enum РАСШИРЕН до 6 значений (aof/rdb_aof разбиты на _1sec/_always по
    # частоте fsync AOF; off/rdb без изменений). Старые aof/rdb_aof ремапятся в
    # _1sec миграцией 010_to_011 (back-compat fsync everysec).
    persistence:
      type: string
      enum: [off, aof_1sec, aof_always, rdb, rdb_aof_1sec, rdb_aof_always]
    # Бюджет памяти под Redis, МБ. Из input.memory_mb; не задан → отсутствует/0.
    memory_mb:
      type: integer
      minimum: 64
    # Политика вытеснения. Из input.maxmemory_policy; не задан → пустая строка
    # (директива берётся из merge-подложки essence — в namedfields маркируется
    # отсутствием явного выбора оператора).
    maxmemory_policy:
      type: string
    # Развёрнутые Redis-модули (read-model). Директива «модули ВСЕГДА ВСЕ»: на Redis
    # < 8 — полный набор алиасов (destiny грузит все из vars.redis_modules), на Redis
    # 8+ — пусто (встроены). НЕ operator-выбор (input.modules упразднён).
    modules:
      type: array
      items:
        type: string
        enum: [search, json, timeseries, bloom]
    # Применённые kernel-параметры под Redis (host-tuning). Из essence.sysctl_settings
    # (тот же map, что ушёл в destiny через apply.input). key→value (строки).
    sysctl_settings:
      type: object
      additionalProperties:
        type: string

    # ── Мониторинг data-плоскости (read-model, v13, Слайс I) ──────────────────
    # ФАКТ развёрнутых экспортеров метрик: create БЕЗУСЛОВНО ставит node_exporter +
    # redis_exporter на каждый хост (ПОСЛЕ deploy). Версии/listen-порты — из essence
    # (node_exporter_*/redis_exporter_*, те же значения, что ушли в apply.input двух
    # destiny). Симметрия install/tls read-model: оператор видит, что развёрнуто, и
    # повторный apply идемпотентен. Пароль/юзер ACL-юзера monitoring СЮДА НЕ пишутся —
    # они в Vault (secret/redis/<inc>/users/monitoring), как tls.*_ref (ИБ). Для
    # v≤12-инкарнаций (мониторинг ещё не развёрнут) — консервативный default: версии ''
    # (best-effort как memory_mb/io_threads), порты :9100/:9121 (012_to_013).
    monitoring:
      type: object
      additionalProperties: false
      properties:
        node_exporter_version:  { type: string }
        redis_exporter_version: { type: string }
        node_exporter_listen:   { type: string }
        redis_exporter_listen:  { type: string }

    # ── Log-shipping data-плоскости (read-model, v14, Слайс V-I, ADR-067) ──────
    # ФАКТ развёрнутого агента отгрузки логов: create БЕЗУСЛОВНО ставит vector на
    # каждый хост (ПОСЛЕ deploy+экспортеров). version/sink_type/endpoint/log_sources —
    # из essence.vector_* (те же значения, что ушли в apply.input destiny vector).
    # ★ sink_auth_ref (токен коллектора) СЮДА НЕ пишется — секрет живёт в Vault
    # (как tls.*_ref и пароль monitoring). Симметрия monitoring read-model: оператор
    # видит, что развёрнуто. Для v≤13-инкарнаций (log-shipping ещё не развёрнут) —
    # консервативный default: version '' (не развёрнуто, best-effort как monitoring),
    # sink_type console (безопасный, без инфры), endpoint '' , log_sources [] (013_to_014).
    logging:
      type: object
      additionalProperties: false
      properties:
        vector_version:       { type: string }
        vector_sink_type:     { type: string }
        vector_sink_endpoint: { type: string }
        vector_log_sources:
          type: array
          items: { type: string }

    # ── cloud-provision read-model (v7–v8, ADR-061) ───────────────────────────
    # ФАКТ «эти хосты подняты нашим create-прогоном через cloud-create». Заполняется
    # create ТОЛЬКО когда input.provision.enabled (provider/vm_ids/sids из register
    # core.cloud.created); иначе [] / '' (хосты не провиженные сервисом — declared
    # roster). day-2 teardown читает provisioned_vm_ids для core.cloud.destroyed.
    # provider — имя cloud-Provider в реестре (для того же destroy-вызова).
    provisioned_vm_ids:
      type: array
      items:
        type: string
    provisioned_provider:
      type: string
    # provisioned_sids (v8): SID (FQDN) каждой VM, поднятой этим create-прогоном. ОТЛИЧНО
    # от provisioned_vm_ids: vm_ids — provider-side id (для core.cloud.destroyed), sids —
    # Keeper-side идентичность Soul. day-2 teardown (cascade destroy) читает sids, чтобы
    # добить осиротевшие souls (→destroyed) / seeds (→orphaned) / bootstrap-токены
    # (→burned): Reaper НЕ снимает pending-VM-souls сам (mark_disconnected только
    # connected→disconnected), без sids записи повисли бы (нарушение anti-replay).
    # Заполняется тем же guard+формой, что provisioned_vm_ids (input.provision.enabled →
    # register.provision.hosts.map(h, h.sid)); иначе [].
    provisioned_sids:
      type: array
      items:
        type: string

    # ── seed-source read-model (v9–v10, S1-пилот migrate_cluster) ─────────────
    # ФАКТ «данные инкарнации залиты миграцией с ВНЕШНЕГО Redis-кластера» (S1
    # migrate_cluster). source_endpoints — адреса источника (откуда тянули);
    # detached — отцеплён ли источник: false сразу после migrate (источник ещё
    # жив, реплицируем/догружаем), true после day-2 detach_source (источник
    # больше не нужен). Время сюда НЕ кладём — оно в state_history (snapshot
    # per-change несёт время), а в самом state остаётся детерминированным (важно
    # для L0; timestamps в state — отложенный S-batch). Обычный create (не
    # миграция) → консервативный default {source_endpoints: [], detached: false,
    # source_password_ref: '', source_tls_ca_ref: ''}.
    #
    # ★ source_password_ref / source_tls_ca_ref (v10) — ССЫЛКИ (Vault-ПУТИ, НЕ
    # значения) на учётку ВНЕШНЕГО источника, ПЕРСИСТЯТСЯ migrate_cluster из
    # input.source.password_ref/tls_ca_ref. Прод-фикс: day-2 detach_source делает
    # финальный offset-gate к источнику, и если источник под AUTH/TLS — без этих
    # ref'ов коннект упирался бы в отказ (учётка не во входном контракте detach,
    # секрет в state не оседает — ИБ). detach читает их vault()-ом keeper-side
    # (vault(state.seeded_from.source_password_ref)) и аутентифицируется к
    # источнику. Пусто → источник без AUTH/TLS (source_password=''), как было до
    # фикса. В state лежит ПУТЬ, не PEM/пароль — симметрия с tls.*_ref (ИБ).
    seeded_from:
      type: object
      additionalProperties: false
      properties:
        source_endpoints:
          type: array
          items:
            type: string
        detached:
          type: boolean
        source_password_ref:
          type: string
        source_tls_ca_ref:
          type: string

    # ── Топология (counts, v3) ────────────────────────────────────────────────
    # Раскладка ролей по таргетированным souls. Из input.shards/replicas/
    # sentinel_quorum (см. input create). Режим-зависимы: cluster использует shards/
    # replicas (replicas_per_shard), sentinel — replicas/sentinel_quorum; для прочих
    # режимов — 0. Не задан в input → 0 (auto-quorum sentinel вычисляется в apply,
    # в namedfields материализуется 0 как «оператор не зафиксировал явно»).
    shards:          { type: integer }
    replicas:        { type: integer }
    sentinel_quorum: { type: integer }

    # ACL-пользователи Redis: ТИПИЗИРОВАННЫЙ массив [{name, perms, state}] (wave 1b
    # types-эпика, ADR-062 AclUser; перевод map→array, миграция 005_to_006). name —
    # имя юзера (раньше был map-ключ); perms — полная ACL-строка (директивы Redis ACL
    # как есть). Наполняется create из input.users (тоже массив AclUser); пароли — НЕ
    # в state (keeper-side Vault, ADR-012). day-2 (add_user/add_node/update_config/
    # rotate_tls) читают массив через .map(u, {u.name: {...}}) → собирают тот же
    # destiny-map имя→{perms,state,password}, что и прежде (destiny-контракт не менялся).
    redis_users:
      type: array
      items:
        type: object
        required: [name, perms, state]
        properties:
          name:  { type: string }
          perms: { type: string }
          state: { type: string, enum: [on, off] }
        additionalProperties: false
    # Хосты топологии (sid + роль). Для cluster/sentinel наполняется сценарием create
    # (раскладка ролей по таргетированным souls). Точная роль каждого SID в state — follow-up.
    redis_hosts:
      type: array
      items:
        type: object
        required: [sid, role]
        properties:
          sid:  { type: string, format: fqdn }
          role: { type: string, enum: [primary, replica, sentinel] }
    # Факты sentinel-режима (master_name + quorum monitored master + эффективные
    # директивы sentinel). Наполняется create при redis_type=sentinel; для cluster пуст.
    # master_ip create НЕ пишет (master выбирается из roster-а, host-вариативен) —
    # поле остаётся в схеме лишь для back-compat с legacy-state (ремап sentinel_only,
    # 003_to_004); current-режимы его не материализуют.
    # ★ v11: именованные down_after_ms/failover_timeout_ms ЗАМЕНЕНЫ обобщёнными map-ами
    # (редизайн input — input.sentinel_master_settings/sentinel_settings):
    #   - master_settings — эффективные PER-MASTER sentinel-директивы (key→value, строки;
    #     имя опции SENTINEL SET без префикса/master-name, напр. down-after-milliseconds/
    #     failover-timeout/parallel-syncs). Замещает 2 именованных поля (их значения
    #     переезжают в down-after-milliseconds/failover-timeout этого map-а, 010_to_011);
    #   - settings — глобальные (НЕ per-master) sentinel.conf-директивы (key→value, строки).
    redis_sentinel:
      type: object
      additionalProperties: false
      properties:
        master_name: { type: string }
        master_ip:   { type: string }
        quorum:      { type: integer }
        master_settings:
          type: object
          additionalProperties:
            type: string
        settings:
          type: object
          additionalProperties:
            type: string

# Зависимости-destiny (ADR-007: версия зависимости = git ref, не semver-range).
# Резолв git-URL — гибрид (docs/keeper/config.md::default_destiny_source):
# запись без git: → default_destiny_source + {name}; с git: → override.
# `redis` — режим-агностичный standalone-кирпич в examples/destiny/redis/.
# node-exporter/redis-exporter — переиспользуемые standalone-destiny экспортеров
# (examples/destiny/), разворачиваются apply:destiny обязательным шагом мониторинга в
# конце create (Слайс I). arch каждая берёт из soulprint.self; redis-exporter
# авторизуется ACL-юзером monitoring через новый input redis_user.
destiny:
  - { name: redis, ref: v1.0.0 }
  - { name: node-exporter, ref: v1.0.0 }
  - { name: redis-exporter, ref: v1.0.0 }
  - { name: vector, ref: v1.0.0 }

# Custom-модули сервиса. Двухуровневая форма <namespace>.<module> (kebab-case)
# обязательна (docs/service/manifest.md → modules[]). community.redis — ОСНОВНОЙ
# интерфейс к живому Redis (examples/module/soul-mod-community-redis/).
modules:
  - { name: community.redis, ref: v1.0.0 }

# Раскрываемые секреты инкарнации (NIM-74): оператор с правом incarnation.view-secrets
# раскрывает plaintext пароля ACL-юзера из State-вьюхи. enumerate=state.redis_users —
# множество допустимых key = имена элементов (element.name); vault_ref — конвенция
# secret/redis/<incarnation>/users/<name>#password (та же ветка, что day-2 сценарии).
revealable_secrets:
  - id: user_password
    label: "Пароль пользователя Redis"
    enumerate: state.redis_users
    vault_ref: "secret/{service}/{incarnation}/users/{key}#password"
