# covenant.yml — переиспользуемый общий контракт секций сценариев redis (S4 пилот).
#
# Несёт ТОЛЬКО общий контракт ЧЕТЫРЁХ секций: input / compute / state_changes /
# validate (shared/config ScenarioFragment). name/tasks/create/form/extends —
# НЕ здесь (covenant — контракт, а не исполняемый сценарий; лишний ключ →
# covenant_unexpected_key). Сценарий подключает фрагмент через `extends: covenant`
# и ДОБАВЛЯЕТ свою дельту add-only (covenant — БАЗА, дельта НЕ переопределяет ключи
# covenant, иначе section_key_conflict). keeper-side резолвер (LoadScenarioManifest
# Resolved) сливает covenant ПЕРВЫМ: эффективный манифест = covenant ++ дельта,
# поэтому порядок compute-объявлений и state_changes-Ops сохраняется как здесь.
#
# ★ provision-секция input ОТСУТСТВУЕТ намеренно: это дельта `create` (cloud-create
# в том же прогоне, ADR-061), не общий контракт. provisioned_*-set-ы state_changes
# ниже provision-aware (тернар по input.provision) — БЕЗ provision вырождаются в []
# (нулевая дельта state), потому covenant самодостаточен для сценариев без provision.

# ── Входной контракт оператора (docs/input.md) ────────────────────────────────
# Простые типизированные понятия. Трансляция в redis.conf — в ветках диспетчера.
# Режимы сервиса: sentinel (sentinel.yml) и cluster (cluster.yml). standalone-
# развёртывание покрывается sentinel с replicas_per_master=0 (один master + sentinel-
# демон). Неизвестный режим отвергается input-валидацией Keeper-а (enum redis_type
# ниже) ДО рендера — понятным отказом, а не молчаливым зелёным no-op (обе ветки
# gated на свой redis_type).
input:
  redis_type:
    type: string
    required: false
    default: sentinel
    enum: [sentinel, cluster]
    description: >-
      Режим развёртывания (концепция роли). Два режима: sentinel (master-replica +
      sentinel-демон; replicas_per_master=0 даёт standalone-эквивалент) и cluster
      (honest hash-slot Redis Cluster). redis_type выбирает ветку диспетчера
      (conditional-include cluster.yml / sentinel.yml + when: по redis_type на include).

  # ── version: фикс-enum БИНАРНЫХ версий Redis (Nexus) ──────────────────────────
  # ★ Редизайн input-контракта: version — теперь ENUM фиксированных upstream-версий
  # из Nexus (essence.install_method=binary по умолчанию качает ИМЕННО эти бинари —
  # см. install.yml binary-ветку). Прежний свободный pattern distro-пина заменён
  # закрытым списком: оператор выбирает версию из выкаченных в Nexus, а не пишет
  # произвольную строку. required (нужна ВСЕГДА: binary — дефолтный способ установки,
  # версия определяет путь к бинарю; package-ветка ставит =version-пин тем же enum).
  version:
    type: string
    required: true
    enum: ["8.6.1", "8.4.0", "8.2.2", "8.0.3", "7.4.1", "6.2.21"]
    description: >-
      Версия Redis (фиксированный набор бинарей из Nexus). Выбери одну из выкаченных
      версий: способ установки binary (essence.install_method, default) качает бинари
      redis-server/redis-cli/redis-benchmark этой версии из Nexus; способ package ставит
      =version-пин. Список закрыт — произвольная версия не принимается (доступны только
      выкаченные в Nexus сборки).

  # ── install_method УБРАН из operator-input (2026-06-28) ──────────────────────
  # Способ установки redis — НЕ операторский выбор в Run-форме: он зафиксирован в
  # essence.install_method (дефолт binary, author-context). compute.install читает
  # default(essence.install_method, 'binary') — оператор больше не видит/не задаёт это
  # поле. Внутренний оператор переопределяет способ в spec.essence (install_method:
  # package), обычный — нет. Симметрия с modules_base_url/binary_base_url (тоже essence).
  #
  # ★ Раскладка conf_dir/data_dir тоже НЕ операторский input (#2): дефолты переехали
  # в essence (conf_dir/data_dir), compute читает их оттуда. Override — в spec.essence
  # инкарнации, не в Run-форме. В state conf_dir/data_dir НЕ персистятся (state_changes
  # их не пишет, см. ниже) — layout живёт в essence, day-2 add_node читает
  # essence.conf_dir/data_dir (has()-safe default). Источник правки — только essence.

  memory_mb:
    type: integer
    required: false
    min: 64
    description: >-
      Бюджет памяти под Redis на хосте, МБ. maxmemory вычисляется как доля от него
      (essence.memory_reserve_percent — резерв под ОС) с ЦЕЛОЧИСЛЕННЫМ усечением:
      maxmemory = int(memory_mb)*int(reserve)/100 + "mb". Нижний пол min:64 не
      случаен: при слишком малом memory_mb усечение даёт "0mb", а в Redis
      maxmemory 0 = БЕЗ лимита (обратное намерению ограничить память). 64 МБ при
      reserve=75 → 48mb — безопасно ненулевой результат. Не задан → директива
      maxmemory берётся из merge-подложки essence.redis_config.

  # io_threads: число I/O-потоков redis (директива io-threads). default 0 = одно-
  # поточный I/O (поведение Redis по умолчанию). >0 — Redis раскидывает чтение/запись
  # сокетов по N потокам. compute.redis_config пишет io-threads ТОЛЬКО при >0 (has-guard,
  # как memory_mb) — чтобы io-threads 0 не шумел в diff. Директива есть во всех сериях
  # каталога (essence.redis_directives).
  io_threads:
    type: integer
    required: false
    default: 0
    min: 0
    description: >-
      Число I/O-потоков Redis (директива io-threads). 0 (дефолт) — однопоточный I/O
      (директива не пишется). >0 — Redis распараллеливает обработку сокетов по N потокам
      (типично = числу ядер - 1). Пишется в redis.conf только при >0.

  persistence:
    type: string
    required: false
    default: rdb
    enum: [off, aof_1sec, aof_always, rdb, rdb_aof_1sec, rdb_aof_always]
    description: >-
      Режим persistence. Транслируется в save/appendonly/appendfsync через
      essence.persistence_presets[persistence] (данные-таблица). off — без сохранения;
      aof_1sec/aof_always — только AOF (fsync everysec / always); rdb — только
      снапшоты; rdb_aof_1sec/rdb_aof_always — снапшоты + AOF (двойная durability).

  maxmemory_policy:
    type: string
    required: false
    enum:
      - noeviction
      - allkeys-lru
      - allkeys-lfu
      - allkeys-random
      - volatile-lru
      - volatile-lfu
      - volatile-random
      - volatile-ttl
    description: >-
      Политика вытеснения при достижении maxmemory. Не задана → берётся из
      merge-подложки essence.redis_config.

  # ── Реплики на master (UNIFIED, оба режима) ──────────────────────────────────
  # ОДНО поле replicas_per_master на оба режима (унификация 2026-06-25): реплик на
  # каждый master. cluster — реплик на шард (состав roster-а: shards мастеров +
  # shards*replicas_per_master реплик); sentinel — реплик master-а (состав roster-а:
  # 1 master + replicas_per_master реплик). default:0 → size-guard читает
  # int(input.replicas_per_master) без has()-обвязки.
  replicas_per_master:
    type: integer
    required: false
    default: 2
    min: 0
    max: 8
    description: >-
      Реплик на каждый master. cluster — реплик на шард (roster =
      shards*(1+replicas_per_master)); sentinel — реплик master-а (roster =
      1+replicas_per_master). default 2 (HA-набор по умолчанию: master + 2 реплики).
      0 — без реплик (cluster: только мастера; sentinel: только master, standalone-
      эквивалент). Потолок max:8. size-guard каждой ветки сверяет состав roster-а.

  # ── Топология cluster (режим redis_type=cluster) ─────────────────────────────
  # Counts задают РАСКЛАДКУ ролей по таргетированным souls (pull-native, Вариант A):
  # оператор объявляет shards и replicas_per_master, а сценарий проверяет, что число
  # хостов roster-а ровно shards*(1+replicas_per_master) (size-guard cluster.yml), и
  # строит nodes-MAP для плагина. cloud-создание машин — post-бета.
  shards:
    type: integer
    required: false
    required_when: "input.redis_type == 'cluster'"
    min: 3
    description: >-
      Число master-шардов Redis Cluster (режим cluster). 16384 hash-слота делятся
      поровну между shards мастерами (раскладку делает плагин community.redis.cluster
      детерминированно). min:3 — нижний предел honest Redis Cluster (кластер из <3
      мастеров не собирается). Размер roster-а прогона обязан быть shards*(1+
      replicas_per_master) — иначе size-guard рвёт прогон fail-fast. Обязателен при
      redis_type=cluster (required_when) — пропуск рвёт прогон на input-валидации.

  cluster_node_timeout:
    type: integer
    required: false
    default: 5000
    min: 1
    description: >-
      Таймаут gossip между нодами кластера, мс (директива cluster-node-timeout
      redis.conf, режим cluster). Не задан → 5000.

  # ── cluster_topology: ЯВНАЯ раскладка шардов (опц., режим cluster) ────────────
  # ★ ЯВНАЯ ТОПОЛОГИЯ (propose-and-wait, имя cluster_topology — нет коллизии с
  # input.shards): оператор САМ задаёт список шардов вместо авто-раскладки плагина по
  # sort SID. Каждый элемент = ОДИН шард — список SID [master_sid, replica_sid, ...],
  # ПЕРВЫЙ SID шарда = master, остальные = его реплики. Так оператор распихивает VM по
  # зонам и кодирует anti-affinity прямо в списке (master и реплика шарда — в разных
  # зонах). Плагин community.redis.cluster (action create) собирает кластер ПО НЕМУ
  # (buildClusterPlanExplicit — зеркало авто-раскладки: те же 16384 слота поровну между
  # мастерами, та же сборка CLUSTER MEET/ADDSLOTS/REPLICATE).
  #
  # ★ ОПЦИОНАЛЬНО (backward-compat): не задан → плагин раскладывает роли сам по sort SID
  # (поведение до фичи бит-в-бит). Задан → ВЫТЕСНЯЕТ авто-раскладку; replicas_per_master
  # при этом задаёт лишь размер VM-roster-а (size-guard ниже сверяет sum(len шардов)).
  # Если задан И cluster_topology, И replicas_per_master, и размер шарда не совпадает с
  # 1+replicas_per_master — плагин рвёт прогон fail-fast (валидация плагина).
  #
  # ★ SID-инвариант: каждый SID обязан быть среди таргетированных souls прогона
  # (soulprint.hosts) и встречаться РОВНО один раз; все хосты roster-а обязаны попасть в
  # топологию (плагин отвергает несуществующий/дублированный SID и непокрытую ноду).
  cluster_topology:
    type: array
    required: false
    items:
      type: array
      items:
        type: string
    description: >-
      Явная раскладка шардов Redis Cluster (опционально, режим cluster). Список шардов;
      каждый шард — список SID [master, replica, ...] (первый = master). Оператор сам
      распихивает VM по зонам / кодирует anti-affinity. Не задан → плагин раскладывает
      роли автоматически по sort SID. Каждый SID обязан быть среди таргетированных souls
      и ровно один раз; все хосты roster-а покрыты.

  # ── Топология sentinel (режим redis_type=sentinel) ───────────────────────────
  # Counts задают РАСКЛАДКУ ролей по таргетированным souls (pull-native, Вариант A):
  # 1 master + replicas_per_master реплик. size-guard create/sentinel.yml проверяет,
  # что число хостов roster-а ровно 1+replicas_per_master. master-election (кто master)
  # — run_once по sort soulprint.hosts (первый по SID); на create роль declared (probe
  # невозможен, redis ещё не поднят). sentinel-демон поднимается на КАЖДОМ хосте.
  # Реплик master-а задаёт UNIFIED-поле replicas_per_master (см. выше).
  # sentinel_quorum — АВТО (size(soulprint.hosts)/2+1, большинство): операторского
  # поля нет (убрано 2026-06-25). sentinel_master_name — в essence (дефолт `master`),
  # не в input.
  #
  # ★ sentinel_master_settings: per-master директивы sentinel (dict, режим sentinel).
  # ПОГЛОЩАЕТ прежние именованные поля sentinel_down_after_ms/sentinel_failover_timeout_ms
  # (их дефолты down-after-milliseconds=5000 / failover-timeout=60000 перенесены в
  # essence.sentinel_master_defaults — подложку под этот dict). KEY → VALUE: ключ — имя
  # per-master sentinel-опции БЕЗ префикса `sentinel ` и БЕЗ master-name (их добавляет
  # compute), напр. `down-after-milliseconds`/`failover-timeout`/`parallel-syncs`;
  # значение — строка. compute.sentinel_directives мержит essence-дефолты + этот dict и
  # разворачивает в директивы `sentinel <opt> <master>` (sentinel.conf + плагин
  # community.redis.sentinel SENTINEL SET). UI — KEY→VALUE-редактор. Без version-валидации
  # (sentinel-каталога нет — passthrough).
  sentinel_master_settings:
    type: object
    required: false
    description: >-
      Per-master директивы Sentinel (key→value, строки; режим sentinel). Ключ — имя
      опции SENTINEL SET без префикса и master-name (down-after-milliseconds,
      failover-timeout, parallel-syncs, …). Перекрывают дефолты essence.sentinel_master_defaults
      (down-after-milliseconds=5000, failover-timeout=60000). UI — KEY→VALUE-редактор.
    properties: {}
    additional_properties:
      type: string

  # ★ sentinel_settings: глобальные (НЕ per-master) директивы sentinel.conf (dict,
  # режим sentinel). KEY → VALUE passthrough, сливается в apply.input.sentinel.config
  # ВМЕСТЕ с per-master директивами (sentinel.conf.tmpl range-ит произвольный map).
  # Используй для глобальных sentinel-директив (resolve-hostnames, announce-port, …),
  # не покрытых per-master sentinel_master_settings. Без version-валидации (sentinel-
  # каталога нет — passthrough). UI — KEY→VALUE-редактор.
  sentinel_settings:
    type: object
    required: false
    description: >-
      Глобальные passthrough-директивы sentinel.conf от оператора (key→value, строки;
      режим sentinel). Сливаются в sentinel.conf вместе с per-master директивами.
      Используй для директив не покрытых sentinel_master_settings. UI — KEY→VALUE-редактор.
    properties: {}
    additional_properties:
      type: string

  # ★ wave 1b types-эпик (2026-06-26): operator-extra ACL — ТИПИЗИРОВАННЫЙ массив
  # элементов AclUser (types.yml, ADR-062 $type). Прежний нетипизированный map
  # username→{perms,state} заменён массивом [{name, perms, state}]: имя юзера переехало
  # в поле name элемента (раньше было map-ключом). Форма AclUser объявлена ОДИН раз в
  # types.yml (источник правды), add_user/update_users ссылаются на тот же тип.
  # Ветки cluster/sentinel итерируют массив (.map(u, {u.name: …})) → собирают тот же
  # destiny-map имя→{perms,state,password}, что и прежде (destiny-контракт не менялся).
  users:
    type: array
    required: false
    items:
      $type: AclUser
    description: >-
      ACL-пользователи Redis (массив AclUser: {name, perms, state}). perms — ПОЛНАЯ
      ACL-строка (не алиас): директивы Redis ACL как есть, напр. "~* +@all" или
      "~app:* +@read +@write -@dangerous". Рендерятся в users.acl (destiny `redis`);
      пароль каждого юзера резолвится keeper-side из Vault по конвенции
      secret/redis/<incarnation>/users/<name>#password.

  # ── redis_settings: passthrough-директивы redis.conf (KEY→VALUE, #6) ─────────
  # ★ #6 (2026-06-26): additional_properties: true (произвольный JSON) сужено до
  # additional_properties: {type: string} — UI рисует KEY→VALUE-редактор (ADR-045:
  # object + скалярный value-тип → key→value-виджет, а не сырой JSON). Директивы
  # redis.conf — это плоский map имя→строковое значение (`maxmemory 512mb`), поэтому
  # value-тип string точен. compute мержит этот map поверх дефолтов/пресета (last-wins)
  # со СТРОКОВЫМИ значениями — формы редактора достаточно.
  redis_settings:
    type: object
    required: false
    description: >-
      Passthrough-директивы redis.conf от оператора (key→value, строки). Перекрывают
      дефолты/пресет в итоговом merge (last-wins). Используй для директив, не
      покрытых простыми полями выше. UI — KEY→VALUE-редактор.
    properties: {}
    additional_properties:
      type: string

  # ── connection_mode: режим сетевого канала Redis (enum, ЗАМЕНЯЕТ 2 галочки TLS) ──
  # ★ Редизайн: прежние tls_enabled+tls_keep_plain сведены к ОДНОМУ enum-полю:
  #   - plain     — только plain-порт 6379 (TLS off), DEFAULT;
  #   - tls_plain — TLS И plain слушаются одновременно (TLS on, plain открыт);
  #   - tls       — только TLS (plain закрыт, `port 0`).
  # Маппинг в compute: tls_on = connection_mode != 'plain'; tls_only_on =
  # connection_mode == 'tls'. down-stream TLS-блок redis_config читает
  # compute.tls_on/tls_only_on — НЕ меняется. enum СТРУКТУРНО исключает «нет ни одного
  # listener-а» (нельзя выбрать «TLS off + plain закрыт») → прежнее validate-правило
  # «хотя бы один listener» удалено. Технические параметры TLS (порт, Vault-пути
  # cert/key/ca) — НЕ операторский ввод, они в essence (tls_port/tls_cert_ref/
  # tls_key_ref/tls_ca_ref, author-context). cert/key/ca — Vault-ПУТИ (НЕ PEM): destiny
  # читает PEM через vault(ref) в ячейке content (seal-маскинг).
  connection_mode:
    type: string
    required: false
    default: plain
    enum: [tls, tls_plain, plain]
    description: >-
      Режим сетевого канала Redis. plain (дефолт) — только plain-порт 6379 (TLS off);
      tls_plain — TLS и plain одновременно; tls — только TLS (plain-порт закрыт, port 0).
      Порт TLS и Vault-пути cert/key/ca берутся из essence (tls_port/tls_cert_ref/
      tls_key_ref/tls_ca_ref).
  # ── Redis-модули (концепция Ansible-роли redis: redis_module_*) ──────────────
  # ★ ДИРЕКТИВА «модули ВСЕГДА ВСЕ» (2026-06-25): НАБОР модулей больше НЕ operator-
  # выбор — destiny разворачивает ПОЛНЫЙ набор из своего vars.redis_modules (Redis < 8).
  # Поэтому поля input.modules здесь НЕТ (оператор не выбирает подмножество). На Redis
  # 8+ модули ВСТРОЕНЫ — version-guard (по compute.redis_version) гасит .so и в destiny
  # (include modules.yml group-drop), и в read-model (state.modules=[]).
  #
  # ★ ИСТОЧНИК .so — essence-плейсхолдер (2026-06-25): modules_base_url убран из
  # операторского input. Это author-context-параметр (essence.modules_base_url, дефолт
  # ""), который оператор переопределяет в spec.essence инкарнации, а не в Run-форме
  # каждого прогона. На Redis < 8 без источника .so destiny не построит URL — мягкая
  # проверка в validate: (см. ниже). .so качаются по content-идемпотентности (SHA-256
  # содержимого), без integrity-verify (как node-exporter).

# ── Декларативные input-инварианты (validate:, ADR-009 amendment 2026-06-23) ──────
# validate: — кросс-полевые предусловия ВВОДА, не выразимые одним schema-ключом и
# не покрываемые required_when (присутствие) или enum/min/max (одно поле). Контекст
# правила — INPUT-ONLY (только input.*; essence/soulprint/roster недоступны —
# структурный CEL-барьер). Первый провал → 422 validation_failed ДО коммита
# incarnation и ДО applying (как required_when), оператору с message правила.
#
# Граница с assert: (ниже, в ветках): assert — про ТОПОЛОГИЮ прогона (size-guard
# сверяет size(soulprint.hosts) с 1+replicas / shards*(1+replicas_per_shard)),
# нужен полный scenario-контекст с soulprint.hosts. validate здесь — про САМ ВВОД
# (соотношение чисел), вычислимо ДО резолва roster.
validate:
  # ★ Редизайн: правило «хотя бы один listener» УДАЛЕНО. Прежде на 2 булевых галочках
  # (tls_enabled/tls_keep_plain) была возможна комбинация «TLS off + plain закрыт» — без
  # listener-а; ловилась этим validate. Теперь connection_mode — enum [tls, tls_plain,
  # plain]: КАЖДОЕ значение оставляет ≥1 listener (plain → plain; tls_plain → оба; tls →
  # TLS). «Нет listener-а» СТРУКТУРНО невыразимо → отдельное правило не нужно.

  # ★ #1 (2026-06-26): правило «install.method=binary требует base_url+version» УБРАНО.
  # URL и версия бинаря переехали из operator-input в essence (binary_base_url/
  # binary_version, author-context), а validate-контекст INPUT-ONLY — essence в нём
  # недоступен (структурный CEL-барьер). Подложка essence задаёт источник; пустой
  # binary_base_url при essence.install_method=binary проявится при render-е destiny
  # (URL бинаря), а не на input-валидации. Сам install_method тоже в essence (2026-06-28)
  # — НЕ operator-input → отдельного input-правила под него нет.

  # ★ system-ACL-users guard (дизайн d2 + редизайн default_admin 2026-06-30): operator-extra
  # (input.users) НЕ может занять имя СЛУЖЕБНОГО юзера. Системные (default_admin/replica/
  # monitoring/sentinel/haproxy) доливаются в users.acl из essence.system_acl_users[_sentinel]
  # с last-wins ПОВЕРХ системных — операторский юзер с тем же именем МОЛЧА перекрыл бы
  # служебные perms (напр. operator `replica` с `~* +@all` сломал бы replica-perms
  # репликации; operator `default_admin` подменил бы admin-учётку внутрикластерного AUTH).
  # Ловим коллизию на INPUT-валидации (422 ДО applying) понятным отказом, а не молчаливым
  # переопределением. INPUT-ONLY (essence в validate недоступен — структурный CEL-барьер):
  # список зарезервированных имён захардкожен здесь (= essence.system_acl_users[_sentinel]
  # keys). ★ `default` из reserved УБРАН (редизайн): встроенный Redis-юзер default больше НЕ
  # системный (его роль занял default_admin) — оператор может объявить default в input.users
  # (тогда он рендерится range-ом, иначе шаблон ставит `user default off`). +default_admin.
  # has()-guard — input.users опционален; .all() над МАССИВОМ итерирует элементы
  # AclUser (wave 1b), имя — поле u.name (раньше map-ключ name).
  - that: "!has(input.users) || input.users.all(u, !(u.name in ['default_admin', 'replica', 'monitoring', 'sentinel', 'haproxy']))"
    message: "имя ACL-пользователя зарезервировано за служебным (default_admin/replica/monitoring/sentinel/haproxy): выбери другое имя — служебные юзеры заводятся автоматически из essence"

  # ★ Правило «modules_base_url обязателен на Redis < 8» УБРАНО (2026-06-25): источник
  # .so переехал из operator-input в essence.modules_base_url (author-context, дефолт ""),
  # а validate-контекст INPUT-ONLY — essence в нём недоступен (структурный CEL-барьер).
  # Проверить заполненность essence.modules_base_url тут нельзя. Подложка essence по
  # умолчанию задаёт источник, оператор переопределяет в spec.essence; пустой источник
  # на Redis < 8 проявится при render-е destiny (URL .so), а не на input-валидации.


# ── Host-tuning extras (концепция Ansible-роли) ──────────────────────────────────
# Режим-агностичные per-host добавки — THP-отключение, logrotate, sysctl — БЕЗУСЛОВНЫ
# (рекомендация Redis / hardening, не выбор оператора): флагов в операторском
# контракте НЕТ, задачи всегда активны. Значения sysctl-параметров — данные-таблица
# essence.sysctl_settings (не во входе оператора), транслируются в destiny `redis`
# через apply.input (host-инвариантны).

# ── Вычисляемые scenario-vars (compute:, ADR-009 amendment 2026-06-23) ────────────
# `compute:` резолвится KEEPER-SIDE ОДИН раз на прогон в рун-уровневом контексте
# (input/essence/incarnation — БЕЗ soulprint, барьер host-инвариантности) и виден
# как `compute.<name>` И в apply.input веток, И в state_changes ниже. Это снимает
# дублирование большого merge()-перевода: он объявлен ЗДЕСЬ ОДИН раз, ветки и state
# ссылаются `${ compute.redis_config }` — drift «state ≡ live config» снят самим
# compute (одно значение, не два синхронизируемых выражения).
#
# compute.redis_config — ИТОГ трансляции простого ввода в redis.conf-map. Ветвится
# по input.redis_type:
#   - cluster → базовый merge + cluster-директивы (cluster-enabled/config-file/
#     node-timeout) + tls-cluster yes при TLS;
#   - sentinel → базовый merge (без cluster-директив).
# Слои merge (SHALLOW last-wins, слева направо): essence.redis_config (дефолты) →
# persistence-пресет → вычисленные maxmemory/policy/io-threads (guard) → input.redis_settings
# (passthrough оператора) → TLS-блок (после redis_settings, оператор не ломает TLS).
# TLS-гейт — compute.tls_on/tls_only_on/tls_port (enum connection_mode + порт/refs из
# essence; объявлены выше). ★ FIX (qa): TLS-директивы
# tls-cert-file/tls-key-file/tls-ca-cert-file
# выводятся из compute.conf_dir (НЕ хардкод /etc/redis/tls) — destiny кладёт PEM в
# ${conf_dir}/tls/ (server.yml), и redis.conf обязан смотреть ТУДА ЖЕ, иначе при
# override conf_dir + TLS redis-server не находит cert и не стартует (при tls.only узел
# недоступен по сети). cluster-announce-ip в config НЕ материализуется (per-host →
# шаблон .self), TLS cert/порт host-инвариантны.
#
# ★ ГРАНИЦА КОНФИГА: host-layout-директивы dir (рабочий каталог RDB/AOF, → data_dir) и
# aclfile (→ conf_dir) задаёт destiny-ШАБЛОН redis.conf.tmpl ИЗ vars (dir {{.vars.data_dir}},
# aclfile {{.vars.conf_dir}}/users.acl), НЕ этот compute. Прежний хардкод (/var/lib/redis,
# /etc/redis/users.acl) убран — override conf_dir/data_dir теперь доезжает до redis.conf
# (apply.input.conf_dir/data_dir → destiny vars). Эти директивы здесь не дублируем: layout
# выводится из vars в шаблоне (один источник), их добавление в compute.redis_config
# продублировало бы ту же логику. logfile/pidfile (/var/log/redis, /var/run/redis) —
# системные каталоги вне input-схемы conf_dir/data_dir; unixsocket/dbfilename в шаблоне
# не задаются.
compute:
  # ── admin_user: имя СИСТЕМНОГО ACL-юзера внутрикластерного AUTH (default_admin) ──
  # ★ РЕДИЗАЙН default_admin (2026-06-30): ЕДИНЫЙ источник имени admin-юзера, под которым
  # идёт ВСЯ внутрикластерная аутентификация (репликация masterauth, cluster MEET, sentinel
  # monitor/auth, health-PING) — заменил прежний requirepass-юзер default. Все деплой-тела
  # (redis-deploy-{sentinel,cluster,cluster-joinable}.yml) читают compute.admin_user в
  # плагин-вызовах community.redis.* (params.username/master_username/auth_user) и в Vault-
  # пути его пароля — НЕ хардкодят 'default_admin' в десятках мест. Литерал (не из input/
  # essence): имя системного юзера — инвариант сервиса, не операторский выбор. Пароль
  # default_admin — secret/redis/<inc>/users/<admin_user>#password. ★ day-2-тела
  # (вне covenant) хардкодят 'default_admin' напрямую (у них нет extends: covenant compute).
  admin_user: "${ 'default_admin' }"
  # ── TLS-флаги: enum connection_mode + essence-параметры (редизайн) ────────────
  # TLS-намерение — connection_mode (input enum с default → всегда есть); порт/refs —
  # из essence (см. tls_on/tls_only_on/tls_port/tls_*_ref ниже). Объявлены ОТДЕЛЬНЫМИ
  # compute-vars, чтобы и redis_config (ниже), и ветки (apply.input.tls + health-gate)
  # читали ОДНО разрешённое значение — а не повторяли его. compute контекст рун-уровневый:
  # input/essence доступны, soulprint — нет (host-инвариантность TLS).
  #
  # ── Эффективная версия redis: input.version (enum выкаченных в Nexus сборок) ──────
  # ★ Редизайн: version — required enum, ОДИН для обоих способов установки (binary качает
  # бинари этой версии из Nexus; package ставит =version-пин). Прежний каскад «binary →
  # essence.binary_version» убран — версия всегда операторская input.version. Объявлена
  # ОДИН раз: state_changes.redis_version, param redis_version плагина и binary-URL destiny
  # читают её. required:true гарантирует присутствие → голый input.version без has()-обвязки.
  redis_version: "${ input.version }"
  # ── Развёрнутые Redis-модули (read-model state.modules) ──────────────────────
  # ★ ДИРЕКТИВА «модули ВСЕГДА ВСЕ» (2026-06-25): набор больше НЕ operator-выбор.
  # destiny разворачивает ПОЛНЫЙ набор из своего vars.redis_modules (Redis < 8). state-
  # read-model отражает ФАКТИЧЕСКИ развёрнутое: Redis < 8 → полный набор алиасов;
  # Redis 8+ → [] (модули встроены, .so не качаются — version-guard). Список алиасов
  # тут — ЗЕРКАЛО ключей destiny vars.redis_modules (destiny маппит alias→.so для
  # деплоя; scenario знает только алиасы для read-model — разные слои, дублируются
  # только ИМЕНА; при добавлении модуля синхронизировать оба места). Отсортирован (как
  # Go-сорт ключей map в destiny) — детерминизм state.
  redis_modules_deployed: >-
    ${ compute.redis_version.matches('^([0-9]+:)?(8|9|[1-9][0-9])\\.')
         ? []
         : ['bloom', 'json', 'search', 'timeseries'] }
  # ── Источник .so Redis-модулей (essence-плейсхолдер, 2026-06-25) ─────────────
  # modules_base_url переехал из operator-input в essence.modules_base_url (author-
  # context, дефолт ""; оператор переопределяет в spec.essence). Объявлен ОДНИМ compute-
  # var, чтобы ветки (apply.input.modules_base_url) и state_changes читали одно значение.
  # default() ловит отсутствие листа на существующем essence-map; дефолт "" симметричен
  # прежнему default(input.modules_base_url, '').
  modules_base_url: "${ default(essence.modules_base_url, '') }"
  # ── SSRF-guard для fetch .so модулей (essence-плейсхолдер, 2026-06-28) ────────
  # Симметрично install.allow_private: modules_base_url тоже может быть внутренним Nexus
  # (resolve в RFC1918) → 4 .so-fetch destiny упали бы на SSRF-guard core.url. Берётся из
  # essence.modules_allow_private (дефолт true). Объявлен ОДНИМ compute-var, ветки гонят его
  # в apply.input.modules_allow_private. default() ловит отсутствие листа на existing essence.
  modules_allow_private: "${ default(essence.modules_allow_private, true) }"
  # ── Per-master sentinel-директивы (обобщённый dict, редизайн) ────────────────
  # ★ Прежде хардкодило ровно 2 директивы (down-after-milliseconds/failover-timeout) из
  # именованных полей. Теперь ОБОБЩЕНО: per-master опции — dict input.sentinel_master_settings
  # ПОВЕРХ дефолтов essence.sentinel_master_defaults (down-after-milliseconds=5000,
  # failover-timeout=60000 — туда переехали дефолты удалённых полей). merge() даёт
  # эффективный map опций (last-wins, operator поверх essence), затем .map() разворачивает
  # КАЖДУЮ пару `k:v` в директиву `sentinel <k> <master> → string(v)` (форма, которую
  # печатает sentinel.conf.tmpl И классифицирует плагин community.redis.sentinel
  # classifyConfig → SENTINEL SET). master_name — из essence (дефолт 'master'). ОДИН
  # source-of-truth: и стартовый sentinel.conf, и live-reconcile читают этот map.
  # value уже строка (additional_properties:{type:string}) + essence-дефолты — строки;
  # string() нормализует на случай нестрокового essence-значения.
  # .map над map даёт LIST of maps — оборачиваем merge(), чтобы свернуть в ОДИН map
  # (тот же паттерн, что cluster-nodes merge(soulprint.hosts.map(...)) в cluster.yml).
  # ★ ГЛОБАЛЬНЫЕ sentinel-директивы (input.sentinel_settings) сливаются СЮДА ЖЕ: их
  # plain-ключи (resolve-hostnames, announce-port, …) шаблон sentinel.conf.tmpl печатает
  # как есть, а плагин classifyConfig раскладывает plain-ключ → globals (per-master ключи
  # `sentinel <opt> <master>` → perMaster). Один config-map несёт оба класса — деплой-тело
  # передаёт его в apply.input.sentinel.config без изменений (shared body не трогаем).
  sentinel_directives: >-
    ${ merge(
         merge(
           merge(
             default(essence.sentinel_master_defaults, {}),
             default(input.sentinel_master_settings, {})
           ).map(k, {
             'sentinel ' + k + ' ' + default(essence.sentinel_master_name, 'master'): string(merge(
               default(essence.sentinel_master_defaults, {}),
               default(input.sentinel_master_settings, {})
             )[k])
           })
         ),
         default(input.sentinel_settings, {})
       ) }
  # ── sentinel_monitor_now: НЕ в covenant (расходится между наследниками) ──────
  # Контракт-флаг шага 4 деплой-тела (SENTINEL MONITOR ПРЯМО в деплое) — НЕ общий: на
  # create-семантике (create/create_from_souls) =true (node-1 — настоящий master,
  # sentinel мониторит сразу), у migrate_cluster =false (новый master во время заливки в
  # role:slave, ранний MONITOR → split-brain; MONITOR переносится в detach_source).
  # Расхождение по ЗНАЧЕНИЮ → covenant его не несёт (иначе section_key_conflict при merge),
  # каждый наследник объявляет sentinel_monitor_now в СВОЕЙ дельте compute. См. шапку
  # redis-deploy-sentinel.yml.
  # ── install: destiny-структура {method, base_url, version, allow_private} (редизайн) ─
  # Собирается из essence.install_method (дефолт binary, author-context — НЕ operator-
  # input, 2026-06-28) + essence.binary_base_url (URL) + input.version (версия —
  # операторский enum выкаченных в Nexus сборок). method всегда присутствует; base_url/
  # version/allow_private материализуются ТОЛЬКО при method=binary. destiny строит per-host
  # путь как <base_url>/<arch>/Debian/<distro_ver>/<version>/redis-* (arch/distro_ver —
  # soulprint.self.os; см. install.yml binary-ветку). Та же структура уходит в destiny
  # `redis` (apply.input.install) и в state_changes.install. default(essence.install_method,
  # 'binary') ловит отсутствие листа на existing essence-map (симметрия modules_base_url).
  #
  # ★ allow_private (2026-06-28): SSRF-guard core.url для fetch бинарей. Дефолтный
  # binary_base_url — ВНУТРЕННИЙ Nexus (resolve в RFC1918) → core.url.fetched по умолчанию
  # блокит dial в private-IP. Берётся из essence.binary_allow_private (дефолт true: дефолтный
  # base = internal Nexus → legit). Публичный-mirror-деплой (external-resolvable base) задаёт
  # false в spec.essence. default() ловит отсутствие листа на existing essence-map.
  install: >-
    ${ (default(essence.install_method, 'binary') == 'binary')
         ? {
             'method':        'binary',
             'base_url':      default(essence.binary_base_url, ''),
             'version':       input.version,
             'allow_private': default(essence.binary_allow_private, true)
           }
         : { 'method': 'package' } }
  # ── Эффективный host-layout: conf_dir/data_dir из essence (#2) ───────────────
  # ★ #2 (2026-06-26): conf_dir/data_dir больше НЕ операторский input — дефолты
  # переехали в essence (conf_dir/data_dir; оператор переопределяет в spec.essence).
  # Объявлены ОТДЕЛЬНЫМИ compute-vars, чтобы redis_config (TLS-пути ниже), ветки
  # (apply.input.conf_dir/data_dir) и state_changes читали ОДНО разрешённое значение.
  # default(essence.<x>, …) — author-context-дефолт = текущий путь (back-compat). host-
  # инвариант (один layout на кластер) — soulprint в compute недоступен. ★ TLS-директивы
  # redis.conf (tls-cert-file/...) следуют conf_dir: destiny кладёт PEM в ${conf_dir}/tls/
  # (server.yml) — redis.conf обязан смотреть туда же (иначе redis не находит cert).
  conf_dir: "${ default(essence.conf_dir, '/etc/redis') }"
  data_dir: "${ default(essence.data_dir, '/var/lib/redis') }"
  # ── TLS-флаги: из connection_mode enum + essence (редизайн) ──────────────────
  # ★ TLS-намерение — ОДНО enum-поле connection_mode (default → ВСЕГДА присутствует),
  # технические параметры — из essence. tls_on = connection_mode != 'plain' (главный
  # гейт: TLS включён в режимах tls/tls_plain). tls_only_on = connection_mode == 'tls'
  # (закрыть plain-порт, режим только-TLS). Порт/refs — из essence (default() ловит
  # отсутствие листа; L0-кейсы без TLS их не задают). Объявлены ОТДЕЛЬНЫМИ compute-vars,
  # чтобы redis_config/ветки/health-gate читали ОДНО значение. down-stream redis_config
  # TLS-блок читает compute.tls_on/tls_only_on без изменений.
  tls_on:      "${ input.connection_mode != 'plain' }"
  tls_only_on: "${ input.connection_mode == 'tls' }"
  tls_port:    "${ int(default(essence.tls_port, 7379)) }"
  # Vault-ПУТИ PEM — из essence (author-context). has()-цепочка (default() ловит no-such-
  # key только в ПЕРВОМ аргументе): L0-кейсы без TLS essence.tls_*_ref не задают → ''.
  tls_cert_ref: "${ has(essence.tls_cert_ref) ? essence.tls_cert_ref : '' }"
  tls_key_ref:  "${ has(essence.tls_key_ref)  ? essence.tls_key_ref  : '' }"
  tls_ca_ref:   "${ has(essence.tls_ca_ref)   ? essence.tls_ca_ref   : '' }"
  # ── redis_config_base: ОБЩАЯ база redis.conf-map обеих веток (R3, dedup) ──────
  # ★ R3 (compute[i]→compute[j], j<i): mode-АГНОСТИЧНЫЕ слои merge, идентичные в cluster
  # и sentinel-ветках, вынесены сюда ОДНИМ объявлением — раньше дублировались в обеих
  # ветках тернара redis_config (~50 строк копии maxmemory/io-threads/persistence/
  # redis_settings + TLS). Ветки redis_config ниже наследуют эту базу и ДОБАВЛЯЮТ свою
  # дельту (cluster — cluster-директивы; обе — TLS-блок redis_config_tls). Слои (SHALLOW
  # last-wins, слева направо): essence.redis_config (дефолты) → persistence-пресет →
  # вычисленные maxmemory/policy/io-threads (has-guard) → input.redis_settings (passthrough
  # оператора). ★ ПОРЯДОК last-wins СОХРАНЁН: cluster-директивы и TLS добавляются ветками
  # ПОСЛЕ этой базы (как было), потому redis_settings оператора не перетирает TLS/cluster.
  redis_config_base: >-
    ${ merge(
         essence.redis_config,
         essence.persistence_presets[input.persistence],
         merge(
           has(input.memory_mb)
             ? { 'maxmemory': string(int(input.memory_mb) * int(essence.memory_reserve_percent) / 100) + 'mb' }
             : {},
           has(input.maxmemory_policy) ? { 'maxmemory-policy': input.maxmemory_policy } : {},
           int(input.io_threads) > 0 ? { 'io-threads': string(int(input.io_threads)) } : {}
         ),
         default(input.redis_settings, {})
       ) }
  # ── redis_config_tls: ОБЩИЙ TLS-блок redis.conf обеих веток (R3, dedup) ───────
  # ★ R3: общие 5 TLS-директив + port-guard, идентичные в cluster и sentinel-ветках
  # (раньше дублировались). cluster-ветка ДОЛИВАЕТ свою tls-cluster:yes поверх (см.
  # redis_config ниже) — эта база её НЕ несёт (mode-агностична). tls_off → {} (тернар).
  # TLS-директивы выводятся из compute.conf_dir (destiny кладёт PEM в ${conf_dir}/tls/ —
  # redis.conf обязан смотреть туда же). compute.tls_on/tls_only_on/tls_port/conf_dir
  # объявлены ВЫШЕ (j<i, грамматика compute допускает ссылку на предыдущие compute-vars).
  redis_config_tls: >-
    ${ compute.tls_on
         ? merge(
             {
               'tls-port':         string(compute.tls_port),
               'tls-cert-file':    compute.conf_dir + '/tls/redis.crt',
               'tls-key-file':     compute.conf_dir + '/tls/redis.key',
               'tls-ca-cert-file': compute.conf_dir + '/tls/ca.crt',
               'tls-replication':  'yes'
             },
             compute.tls_only_on ? { 'port': '0' } : {}
           )
         : {} }
  # ── redis_config: redis_config_base + per-mode дельта (R3) ────────────────────
  # ★ Тернар по input.redis_type теперь ТОНКИЙ: общая база (redis_config_base) + TLS-блок
  # (redis_config_tls) наследуются обеими ветками, cluster-ветка ДОБАВЛЯЕТ cluster-
  # директивы (cluster-enabled/config-file/node-timeout) + tls-cluster:yes поверх TLS-блока
  # (последний merge-слой → перекрывает при коллизии, last-wins). sentinel-ветка = база +
  # TLS-блок без cluster-дельты. Порядок слоёв merge СОХРАНЁН бит-в-бит относительно
  # прежнего inline-тернара (base → [cluster-директивы] → TLS [→ tls-cluster]).
  redis_config: >-
    ${ (input.redis_type == 'cluster')
         ? merge(
             compute.redis_config_base,
             {
               'cluster-enabled':      'yes',
               'cluster-config-file':  'nodes.conf',
               'cluster-node-timeout': string(int(input.cluster_node_timeout))
             },
             compute.redis_config_tls,
             compute.tls_on ? { 'tls-cluster': 'yes' } : {}
           )
         : merge(
             compute.redis_config_base,
             compute.redis_config_tls
           ) }

# ── Мутация incarnation.state ─────────────────────────────────────────────────
# После успешного apply Keeper фиксирует развёрнутое (ADR-009 §7.1, ADR-057
# list-форма). redis_config — ИТОГ трансляции (тот же compute.redis_config, что ушёл
# в render redis.conf веток cluster/sentinel): повторный apply и day-2-сценарии видят
# один источник истины. Раньше выражение merge() ДУБЛИРОВАЛОСЬ здесь и в
# apply.input.config веток (DRIFT-GUARD руками); теперь оно объявлено ОДИН раз в
# compute: выше — drift снят самим compute.
state_changes:
  - set: redis_type
    value: "${ input.redis_type }"
  - set: redis_version
    value: "${ compute.redis_version }"
  # redis_config ≡ apply.input.config веток: единый compute.redis_config (см. выше).
  - set: redis_config
    value: "${ compute.redis_config }"

  # ── Именованные поля намерения (read-model, v3) ─────────────────────────────
  # ★ КРИТИЧНО (architect a9e1c2c6): значения берутся из ТЕХ ЖЕ compute.*/input, что
  # и redis_config — не из сырого input отдельно. Так namedfields (намерение) и
  # redis_config (вычисленный итог) согласованы по построению (один compute-проход).
  # tls: тот же compute.tls_on/tls_only_on/tls_port/tls_*_ref, что дал TLS-блок
  # redis_config (cert/key/ca — Vault-ПУТИ, не PEM: секрет в state не лежит).
  - set: tls
    value: >-
      ${ {
           'enable':   compute.tls_on,
           'only':     compute.tls_only_on,
           'port':     compute.tls_port,
           'cert_ref': compute.tls_cert_ref,
           'key_ref':  compute.tls_key_ref,
           'ca_ref':   compute.tls_ca_ref
         } }
  # connection_mode: явный режим сетевого канала оператора (enum tls/tls_plain/plain).
  # read-model дублирует выбор; tls-namedfield выше несёт производные enable/only/port.
  - set: connection_mode
    value: "${ input.connection_mode }"
  # persistence: input.persistence (default rdb) — тот же ключ, по которому выбран
  # essence.persistence_presets в redis_config (read-model дублирует выбор оператора).
  - set: persistence
    value: "${ input.persistence }"
  # memory_mb: бюджет памяти оператора (int). Не задан → 0 (плоский set всегда
  # создаёт ключ; 0 = «оператор не зафиксировал бюджет», maxmemory взят из essence).
  - set: memory_mb
    value: "${ int(default(input.memory_mb, 0)) }"
  # maxmemory_policy: явный выбор оператора; не задан → '' (директива из essence-
  # подложки, см. redis_config). namedfield маркирует ОТСУТСТВИЕ явного выбора пустой
  # строкой (не лезем в redis_config за фактическим значением — это write-model).
  - set: maxmemory_policy
    value: "${ default(input.maxmemory_policy, '') }"
  # io_threads: число I/O-потоков оператора (int, default 0). 0 = однопоточный I/O
  # (директива io-threads не пишется в redis.conf). read-model дублирует выбор.
  - set: io_threads
    value: "${ int(input.io_threads) }"
  # modules: ФАКТИЧЕСКИ развёрнутые Redis-модули (директива «модули ВСЕГДА ВСЕ»). Redis
  # < 8 → полный набор (destiny грузит все из vars.redis_modules); Redis 8+ → [] (модули
  # встроены). НЕ operator-выбор (input.modules удалён) — compute.redis_modules_deployed.
  - set: modules
    value: "${ compute.redis_modules_deployed }"
  # ★ install + host-layout (conf_dir/data_dir/modules_base_url) вынесены в essence
  # (v11→v12, Вариант A): install — read-model без читателей, layout — day-2 читают
  # essence напрямую (default(essence.<x>, '<деф>')). Здесь их set-ов больше нет —
  # ключей нет в state_schema, set писал бы поле вне схемы → валидация state упала бы.
  # sysctl_settings: применённый host-tuning (тот же essence.sysctl_settings, что
  # уходит в destiny apply.input). Из essence (host-инвариант, не операторский ввод).
  - set: sysctl_settings
    value: "${ default(essence.sysctl_settings, {}) }"
  # monitoring: read-model ФАКТА развёрнутых экспортеров (Слайс I, симметрия install/tls
  # read-model). Версии/порты — из essence.node_exporter_*/redis_exporter_* (те же значения,
  # что уходят в apply.input двух destiny в create/main.yml). Пароль/юзер ACL-юзера monitoring
  # в state НЕ хранятся (ИБ — они в Vault, как tls.*_ref). Дефолты дублируют essence/миграцию
  # 012_to_013 (порты :9100/:9121 конвенциональны; версии — из essence-подложки).
  - set: monitoring
    value: >-
      ${ {
           'node_exporter_version':  default(essence.node_exporter_version, ''),
           'redis_exporter_version': default(essence.redis_exporter_version, ''),
           'node_exporter_listen':   default(essence.node_exporter_listen, ':9100'),
           'redis_exporter_listen':  default(essence.redis_exporter_listen, ':9121')
         } }
  # ── Топология (counts) ──────────────────────────────────────────────────────
  # shards/replicas/sentinel_quorum — из тех же input.*, что size-guard/cluster-build/
  # sentinel-ветки. shards — только cluster (не задан → 0). replicas — UNIFIED
  # int(default(input.replicas_per_master, 0)) в обоих режимах (реплик на каждый master;
  # cluster — на шард, sentinel — master-а). sentinel_quorum — ВСЕГДА 0 (операторского
  # поля больше нет, кворум АВТО size/2+1 вычисляется в apply, в state не материализуется;
  # 0 = «auto»).
  - set: shards
    value: "${ int(default(input.shards, 0)) }"
  - set: replicas
    value: "${ int(default(input.replicas_per_master, 0)) }"
  - set: sentinel_quorum
    value: "${ 0 }"

  # ── cloud-provision read-model (ADR-061, Вариант A) ─────────────────────────
  # ФАКТ «эти VM подняты ЭТИМ create-прогоном». ★ GUARD по input.provision (НЕ
  # has(register.provision)!): на non-provision-прогоне provision.yml group-drop →
  # шага core.cloud.created нет → register.provision не существует → has(register.provision)
  # дал бы no-such-key В САМОМ предикате (CEL вычисляет аргумент has() — он есть в env,
  # но обращение register.provision.vm_ids вне guard рвануло бы). Гейт — input.provision
  # (object-вход, has()-safe): задан И enabled → читаем register.provision (создан шагом
  # (а)); иначе [] / '' (хосты не провиженные сервисом). Тернар короткозамыкает —
  # register.provision.* не трогается на non-provision-пути.
  - set: provisioned_vm_ids
    value: >-
      ${ (has(input.provision) && input.provision.enabled)
           ? register.provision.vm_ids
           : [] }
  # provisioned_sids: SID (FQDN) созданных VM — для cascade-destroy day-2 teardown
  # (souls→destroyed/seeds→orphaned/tokens→burned; Reaper НЕ снимает pending-VM-souls).
  # Тот же GUARD по input.provision, что vm_ids/provider (на non-provision-прогоне
  # register.provision не существует → тернар короткозамыкает, register.* не трогается).
  # sids собираются из register.provision.hosts[].sid (.map — то же выражение, что
  # params.sid шага (в) core.soul.registered в provision.yml); отдельного register
  # .provision.sids нет. Иначе [] (хосты не провиженные сервисом).
  - set: provisioned_sids
    value: >-
      ${ (has(input.provision) && input.provision.enabled)
           ? register.provision.hosts.map(h, h.sid)
           : [] }
  # provisioned_provider — ФАКТ-провайдер созданных VM. provider читается как
  # default(input.provision.provider, essence.provision_provider): оператор обычно НЕ задаёт
  # provider (форма provision скрыта, default-on) → фоллбэк на essence.provision_provider
  # (симметрия с redis-provision.yml::core.cloud.created.params.provider). Гейт input.provision
  # (has()-safe) держит non-provision-путь: enabled=false / create_from_souls → '' (VM не
  # провижены этим прогоном). ★ TODO: prod/dev provider switch (ENV keeper / Coven-overlay) — отдельный ADR.
  - set: provisioned_provider
    value: >-
      ${ (has(input.provision) && input.provision.enabled)
           ? default(input.provision.provider, essence.provision_provider)
           : '' }

  # redis_users — ТИПИЗИРОВАННЫЙ массив AclUser (wave 1b, map→array). state хранит
  # input.users как есть (массив [{name,perms,state}]); пароли НЕ в state (Vault).
  - set: redis_users
    value: "${ default(input.users, []) }"
  # redis_hosts пустой во ВСЕХ режимах: state_changes рендерятся per-host с
  # soulprint.SELF (AllowHosts=false, orchestration.md §7.1) — roster soulprint.hosts
  # тут НЕДОСТУПЕН (граница: state — per-run, роли раскладывает apply-сторона).
  # Точные declared-роли sentinel (master-election) живут в apply.input.sentinel,
  # не в state (симметрично cluster, где роли раскладывает плагин).
  - set: redis_hosts
    value: "${ [] }"
  # redis_sentinel: факты monitored master (режим sentinel). master_name — из essence
  # (essence.sentinel_master_name, дефолт 'master'; операторского поля больше нет).
  # quorum в state НЕ материализуется (auto-quorum size/2+1 вычисляется в apply,
  # size(soulprint.hosts) в state_changes недоступен) → 0. master_ip больше не пишется
  # (режим sentinel_only убран: master выбирается из roster-а, host-вариативен).
  # ★ Редизайн: прежние именованные тайминги down_after_ms/failover_timeout_ms поглощены
  # обобщённым per-master dict. read-model хранит ЭФФЕКТИВНЫЙ map per-master опций
  # (master_settings = essence.sentinel_master_defaults поверх input.sentinel_master_settings,
  # last-wins) и глобальные settings (input.sentinel_settings) — day-2 читает их именованно
  # (как install/tls). Вне режима sentinel — пустой объект (только cluster остаётся).
  - set: redis_sentinel
    value: >-
      ${ (input.redis_type == 'sentinel')
           ? {
               'master_name':     default(essence.sentinel_master_name, 'master'),
               'quorum':          0,
               'master_settings': merge(
                                     default(essence.sentinel_master_defaults, {}),
                                     default(input.sentinel_master_settings, {})
                                   ),
               'settings':        default(input.sentinel_settings, {})
             }
           : {} }
