# covenant.yml - a reusable shared contract for redis scenario sections (S4 pilot).
#
# Carries ONLY the shared contract of the FOUR sections: input / compute / state_changes /
# validate (shared/config ScenarioFragment). name/tasks/create/form/extends are
# NOT here (covenant is a contract, not an executable scenario; an extra key ->
# covenant_unexpected_key). A scenario pulls in the fragment via `extends: covenant`
# and ADDS its own delta add-only (covenant is the BASE, the delta does NOT override
# covenant's keys, otherwise section_key_conflict). The keeper-side resolver (LoadScenarioManifest
# Resolved) merges covenant FIRST: the effective manifest = covenant ++ delta,
# so the order of compute declarations and state_changes Ops is preserved as it is here.
#
# * The provision section of input is DELIBERATELY ABSENT: it's a `create` delta (cloud-create
# in the same run, ADR-061), not part of the shared contract. The provisioned_* state_changes
# sets below are provision-aware (a ternary on input.provision) - WITHOUT provision they
# degenerate to [] (a zero state delta), so covenant is self-sufficient for scenarios without provision.

# ── Operator input contract (docs/input.md) ────────────────────────────────
# Simple typed concepts. Translation into redis.conf happens in the dispatcher branches.
# Service modes: sentinel (sentinel.yml) and cluster (cluster.yml). standalone
# deployment is covered by sentinel with replicas_per_master=0 (a single master +
# sentinel daemon). An unknown mode is rejected by Keeper's input validation (enum
# redis_type below) BEFORE render - a clear refusal, not a silent green no-op (both
# branches are gated on their own redis_type).
input:
  redis_type:
    type: string
    required: false
    default: sentinel
    enum: [sentinel, cluster]
    description: >-
      Deployment mode (a role concept). Two modes: sentinel (master-replica +
      sentinel daemon; replicas_per_master=0 gives a standalone-equivalent) and cluster
      (honest hash-slot Redis Cluster). redis_type selects the dispatcher branch
      (conditional-include cluster.yml / sentinel.yml + when: on redis_type on the include).

  # ── version: a fixed enum of Redis BINARY versions (Nexus) ──────────────────────
  # ★ Input-contract redesign: version is now a fixed ENUM of upstream versions
  # published to Nexus (essence.install_method=binary by default pulls EXACTLY these
  # binaries - see the install.yml binary branch). The former free-form distro-pin
  # pattern is replaced by a closed list: the operator picks a version from what's
  # published to Nexus instead of writing an arbitrary string. required (ALWAYS
  # needed: binary is the default install method, and the version determines the
  # binary path; the package branch pins =version with the same enum).
  version:
    type: string
    required: true
    enum: ["8.6.1", "8.4.0", "8.2.2", "8.0.3", "7.4.1", "6.2.21"]
    description: >-
      Redis version (a fixed set of binaries published to Nexus). Pick one of the
      published versions: install method binary (essence.install_method, default)
      pulls the redis-server/redis-cli/redis-benchmark binaries of this version from
      Nexus; install method package pins =version. The list is closed - an arbitrary
      version is not accepted (only builds published to Nexus are available).

  # ── install_method REMOVED from operator-input (2026-06-28) ──────────────────────
  # The redis install method is NOT an operator choice in the Run form: it's fixed in
  # essence.install_method (default binary, author-context). compute.install reads
  # default(essence.install_method, 'binary') - the operator no longer sees/sets this
  # field. An internal operator overrides the method in spec.essence (install_method:
  # package), a regular one doesn't. Symmetric with modules_base_url/binary_base_url
  # (also essence).
  #
  # ★ The conf_dir/data_dir layout is also NOT operator input (#2): the defaults moved
  # to essence (conf_dir/data_dir), compute reads them from there. Override is in the
  # incarnation's spec.essence, not the Run form. conf_dir/data_dir are NOT persisted
  # in state (state_changes doesn't write them, see below) - layout lives in essence,
  # day-2 add_node reads essence.conf_dir/data_dir (has()-safe default). The only
  # place to change it is essence.

  memory_mb:
    type: integer
    required: false
    min: 64
    description: >-
      Memory budget for Redis on the host, MB. maxmemory is computed as a share of it
      (essence.memory_reserve_percent - the OS reserve) with INTEGER truncation:
      maxmemory = int(memory_mb)*int(reserve)/100 + "mb". The min:64 floor isn't
      arbitrary: too small a memory_mb truncates to "0mb", and in Redis maxmemory 0
      means NO limit (the opposite of the intent to cap memory). 64 MB at reserve=75
      -> 48mb - a safely non-zero result. Not set -> the maxmemory directive comes
      from the essence.redis_config merge substrate.

  # io_threads: number of redis I/O threads (the io-threads directive). default 0 =
  # single-threaded I/O (Redis's default behavior). >0 - Redis spreads socket
  # read/write across N threads. compute.redis_config writes io-threads ONLY when >0
  # (has-guard, like memory_mb) - so io-threads 0 doesn't add diff noise. The
  # directive exists across every catalog series (essence.redis_directives).
  io_threads:
    type: integer
    required: false
    default: 0
    min: 0
    description: >-
      Number of Redis I/O threads (the io-threads directive). 0 (default) -
      single-threaded I/O (the directive isn't written). >0 - Redis parallelizes
      socket handling across N threads (typically = core count - 1). Written to
      redis.conf only when >0.

  persistence:
    type: string
    required: false
    default: rdb
    enum: [off, aof_1sec, aof_always, rdb, rdb_aof_1sec, rdb_aof_always]
    description: >-
      Persistence mode. Translated into save/appendonly/appendfsync via
      essence.persistence_presets[persistence] (a data table). off - no persistence;
      aof_1sec/aof_always - AOF only (fsync everysec / always); rdb - snapshots only;
      rdb_aof_1sec/rdb_aof_always - snapshots + AOF (double durability).

  maxmemory_policy:
    type: string
    required: false
    enum:
      - noeviction
      - allkeys-lru
      - allkeys-lfu
      - allkeys-random
      - volatile-lru
      - volatile-lfu
      - volatile-random
      - volatile-ttl
    description: >-
      Eviction policy when maxmemory is reached. Not set -> comes from the
      essence.redis_config merge substrate.

  # ── Replicas per master (UNIFIED, both modes) ──────────────────────────────────
  # A SINGLE replicas_per_master field for both modes (unified 2026-06-25): replicas
  # per master. cluster - replicas per shard (roster composition: shards masters +
  # shards*replicas_per_master replicas); sentinel - replicas of the master (roster
  # composition: 1 master + replicas_per_master replicas). default:0 -> the
  # size-guard reads int(input.replicas_per_master) without a has() wrapper.
  replicas_per_master:
    type: integer
    required: false
    default: 2
    min: 0
    max: 8
    description: >-
      Replicas per master. cluster - replicas per shard (roster =
      shards*(1+replicas_per_master)); sentinel - replicas of the master (roster =
      1+replicas_per_master). default 2 (the default HA set: master + 2 replicas).
      0 - no replicas (cluster: masters only; sentinel: master only, a
      standalone-equivalent). Cap max:8. Each branch's size-guard checks the roster
      composition.

  # ── cluster topology (mode redis_type=cluster) ─────────────────────────────
  # Counts define the role LAYOUT across targeted souls (pull-native, Variant A):
  # the operator declares shards and replicas_per_master, and the scenario checks
  # that the roster host count is exactly shards*(1+replicas_per_master) (size-guard
  # in cluster.yml), and builds a nodes MAP for the plugin. Cloud VM creation is
  # post-beta.
  shards:
    type: integer
    required: false
    required_when: "input.redis_type == 'cluster'"
    min: 3
    description: >-
      Number of Redis Cluster master shards (mode cluster). 16384 hash slots are
      split evenly across the shards masters (the community.redis.cluster plugin
      does the layout deterministically). min:3 - the lower bound for an honest
      Redis Cluster (a cluster of <3 masters doesn't form). The run's roster size
      must be shards*(1+replicas_per_master) - otherwise the size-guard fails the
      run fast. Required when redis_type=cluster (required_when) - omitting it fails
      the run at input validation.

  cluster_node_timeout:
    type: integer
    required: false
    default: 5000
    min: 1
    description: >-
      Gossip timeout between cluster nodes, ms (the redis.conf directive
      cluster-node-timeout, mode cluster). Not set -> 5000.

  # ── cluster_topology: EXPLICIT shard layout (opt., mode cluster) ────────────
  # ★ EXPLICIT TOPOLOGY (propose-and-wait, name cluster_topology - no collision with
  # input.shards): the operator sets the shard list themselves instead of the plugin's
  # auto-layout by sort SID. Each element = ONE shard - a list of SIDs
  # [master_sid, replica_sid, ...], the FIRST SID of a shard is the master, the rest
  # are its replicas. This lets the operator spread VMs across zones and encode
  # anti-affinity directly in the list (a shard's master and replica in different
  # zones). The community.redis.cluster plugin (action create) assembles the cluster
  # FROM IT (buildClusterPlanExplicit - a mirror of the auto-layout: the same 16384
  # slots split evenly across masters, the same CLUSTER MEET/ADDSLOTS/REPLICATE
  # sequence).
  #
  # ★ OPTIONAL (backward-compat): not set -> the plugin lays out roles itself by sort
  # SID (the pre-feature behavior, bit-for-bit). Set -> OVERRIDES the auto-layout;
  # replicas_per_master then only sets the VM roster size (the size-guard below checks
  # sum(shard lengths)). If BOTH cluster_topology AND replicas_per_master are set and a
  # shard's size doesn't match 1+replicas_per_master, the plugin fails the run fast
  # (plugin validation).
  #
  # ★ SID invariant: every SID must be among the run's targeted souls
  # (soulprint.hosts) and appear EXACTLY once; every roster host must be covered by
  # the topology (the plugin rejects a non-existent/duplicated SID and an uncovered
  # node).
  cluster_topology:
    type: array
    required: false
    items:
      type: array
      items:
        type: string
    description: >-
      Explicit Redis Cluster shard layout (optional, mode cluster). A list of shards;
      each shard is a list of SIDs [master, replica, ...] (the first is the master).
      The operator spreads VMs across zones / encodes anti-affinity themselves. Not
      set -> the plugin lays out roles automatically by sort SID. Every SID must be
      among the targeted souls and appear exactly once; every roster host is covered.

  # ── sentinel topology (mode redis_type=sentinel) ───────────────────────────
  # Counts define the role LAYOUT across targeted souls (pull-native, Variant A):
  # 1 master + replicas_per_master replicas. The size-guard in create/sentinel.yml
  # checks that the roster host count is exactly 1+replicas_per_master.
  # master-election (who's master) is run_once by sort soulprint.hosts (first by
  # SID); on create the role is declared (probing is impossible - redis isn't up
  # yet). The sentinel daemon comes up on EVERY host. Replicas of the master are set
  # by the UNIFIED field replicas_per_master (see above). sentinel_quorum is AUTO
  # (size(soulprint.hosts)/2+1, majority): there's no operator field for it (removed
  # 2026-06-25). sentinel_master_name lives in essence (default `master`), not in
  # input.
  #
  # ★ sentinel_master_settings: per-master sentinel directives (dict, mode
  # sentinel). SUBSUMES the former named fields
  # sentinel_down_after_ms/sentinel_failover_timeout_ms (their defaults
  # down-after-milliseconds=5000 / failover-timeout=60000 moved into
  # essence.sentinel_master_defaults - the substrate under this dict). KEY -> VALUE:
  # the key is the per-master sentinel option name WITHOUT the `sentinel ` prefix and
  # WITHOUT the master name (compute adds those), e.g.
  # `down-after-milliseconds`/`failover-timeout`/`parallel-syncs`; the value is a
  # string. compute.sentinel_directives merges the essence defaults + this dict and
  # expands them into `sentinel <opt> <master>` directives (sentinel.conf + the
  # community.redis.sentinel plugin's SENTINEL SET). UI - a KEY->VALUE editor. No
  # version validation (there's no sentinel catalog - passthrough).
  sentinel_master_settings:
    type: object
    required: false
    description: >-
      Per-master Sentinel directives (key->value, strings; mode sentinel). The key is
      the SENTINEL SET option name without the prefix and master name
      (down-after-milliseconds, failover-timeout, parallel-syncs, ...). Overrides the
      essence.sentinel_master_defaults defaults (down-after-milliseconds=5000,
      failover-timeout=60000). UI - a KEY->VALUE editor.
    properties: {}
    additional_properties:
      type: string

  # ★ sentinel_settings: global (NOT per-master) sentinel.conf directives (dict,
  # mode sentinel). KEY -> VALUE passthrough, merged into apply.input.sentinel.config
  # TOGETHER WITH the per-master directives (sentinel.conf.tmpl ranges over an
  # arbitrary map). Use it for global sentinel directives (resolve-hostnames,
  # announce-port, ...) not covered by per-master sentinel_master_settings. No
  # version validation (there's no sentinel catalog - passthrough). UI - a
  # KEY->VALUE editor.
  sentinel_settings:
    type: object
    required: false
    description: >-
      Global passthrough sentinel.conf directives from the operator (key->value,
      strings; mode sentinel). Merged into sentinel.conf together with the per-master
      directives. Use it for directives not covered by sentinel_master_settings. UI -
      a KEY->VALUE editor.
    properties: {}
    additional_properties:
      type: string

  # ★ wave 1b types epic (2026-06-26): operator-extra ACL is a TYPED array of
  # AclUser elements (types.yml, ADR-062 $type). The former untyped map
  # username->{perms,state} is replaced by an array [{name, perms, state}]: the
  # username moved into the element's name field (formerly a map key). The AclUser
  # shape is declared ONCE in types.yml (the source of truth), add_user/update_users
  # reference the same type. The cluster/sentinel branches iterate the array
  # (.map(u, {u.name: ...})) -> assembling the same destiny map name->{perms,state,
  # password} as before (the destiny contract hasn't changed).
  users:
    type: array
    required: false
    items:
      $type: AclUser
    description: >-
      Redis ACL users (an array of AclUser: {name, perms, state}). perms is the FULL
      ACL string (not an alias): Redis ACL directives as-is, e.g. "~* +@all" or
      "~app:* +@read +@write -@dangerous". Rendered into users.acl (destiny `redis`);
      each user's password is resolved keeper-side from Vault by the convention
      secret/redis/<incarnation>/users/<name>#password.

  # ── redis_settings: passthrough redis.conf directives (KEY→VALUE, #6) ─────────
  # ★ #6 (2026-06-26): additional_properties: true (arbitrary JSON) narrowed to
  # additional_properties: {type: string} - the UI renders a KEY->VALUE editor
  # (ADR-045: object + scalar value type -> a key->value widget, not raw JSON).
  # redis.conf directives are a flat map name->string value (`maxmemory 512mb`), so
  # value type string is exact. compute merges this map over the defaults/preset
  # (last-wins) with STRING values - the editor form is sufficient.
  redis_settings:
    type: object
    required: false
    # x-directives: redis - validate keys against the service directive catalog
    # (essence.redis_directives). Passed through raw into the input_schema DTO
    # (NIM-76).
    x-directives: redis
    description: >-
      Passthrough redis.conf directives from the operator (key->value, strings).
      Override the defaults/preset in the final merge (last-wins). Use it for
      directives not covered by the plain fields above. UI - a KEY->VALUE editor.
    properties: {}
    additional_properties:
      type: string

  # ── connection_mode: Redis network channel mode (enum, REPLACES the 2 TLS toggles) ──
  # ★ Redesign: the former tls_enabled+tls_keep_plain are collapsed into ONE enum
  # field:
  #   - plain     — plain port 6379 only (TLS off), DEFAULT;
  #   - tls_plain — TLS AND plain listen simultaneously (TLS on, plain open);
  #   - tls       — TLS only (plain closed, `port 0`).
  # Mapped in compute: tls_on = connection_mode != 'plain'; tls_only_on =
  # connection_mode == 'tls'. The downstream TLS block in redis_config reads
  # compute.tls_on/tls_only_on - unchanged. The enum STRUCTURALLY rules out "no
  # listener at all" (you can't pick "TLS off + plain closed") -> the former validate
  # rule "at least one listener" was removed. The TLS technical parameters (port,
  # Vault paths for cert/key/ca) are NOT operator input, they live in essence
  # (tls_port/tls_cert_ref/tls_key_ref/tls_ca_ref, author-context). cert/key/ca are
  # Vault PATHS (NOT PEM): destiny reads the PEM via vault(ref) in a content cell
  # (seal masking).
  connection_mode:
    type: string
    required: false
    default: plain
    enum: [tls, tls_plain, plain]
    description: >-
      Redis network channel mode. plain (default) - plain port 6379 only (TLS off);
      tls_plain - TLS and plain simultaneously; tls - TLS only (plain port closed,
      port 0). The TLS port and the Vault paths for cert/key/ca come from essence
      (tls_port/tls_cert_ref/tls_key_ref/tls_ca_ref).
  # ── Redis modules ─────────────────────────────────────────────────────────────
  # ★ THE "modules are ALWAYS ALL" DIRECTIVE (2026-06-25): the module SET is no
  # longer an operator choice - destiny deploys the FULL set from its own
  # vars.redis_modules (Redis < 8). That's why there's no input.modules field here
  # (the operator doesn't pick a subset). On Redis 8+ the modules are BUILT IN - a
  # version-guard (on compute.redis_version) drops the .so both in destiny (include
  # modules.yml group-drop) and in the read-model (state.modules=[]).
  #
  # ★ THE .so SOURCE is an essence placeholder (2026-06-25): modules_base_url was
  # removed from operator input. It's an author-context parameter
  # (essence.modules_base_url, default ""), which the operator overrides in the
  # incarnation's spec.essence, not in each run's Run form. On Redis < 8 without a
  # .so source, destiny can't build the URL - a soft check in validate: (see below).
  # The .so files are fetched by content idempotency (SHA-256 of the content),
  # without integrity verification (like node-exporter).

# ── Declarative input invariants (validate:, ADR-009 amendment 2026-06-23) ──────
# validate: — cross-field preconditions on the INPUT that can't be expressed by a
# single schema key and aren't covered by required_when (presence) or
# enum/min/max (a single field). The rule context is INPUT-ONLY (only input.*;
# essence/soulprint/roster are unavailable - a structural CEL barrier). The first
# failure -> 422 validation_failed BEFORE the incarnation commit and BEFORE
# applying (like required_when), with the rule's message to the operator.
#
# The boundary with assert: (below, in the branches): assert is about the run's
# TOPOLOGY (the size-guard checks size(soulprint.hosts) against 1+replicas /
# shards*(1+replicas_per_shard)), and needs the full scenario context with
# soulprint.hosts. validate here is about the INPUT ITSELF (a relation between
# numbers), computable BEFORE the roster is resolved.
validate:
  # ★ Redesign: the rule "at least one listener" is REMOVED. Previously, with 2
  # boolean toggles (tls_enabled/tls_keep_plain), the combination "TLS off + plain
  # closed" was possible - no listener at all; this validate rule caught it. Now
  # connection_mode is an enum [tls, tls_plain, plain]: EVERY value leaves >=1
  # listener (plain -> plain; tls_plain -> both; tls -> TLS). "No listener" is now
  # STRUCTURALLY inexpressible -> a separate rule isn't needed.

  # ★ #1 (2026-06-26): the rule "install.method=binary requires base_url+version" is
  # REMOVED. The binary URL and version moved from operator-input into essence
  # (binary_base_url/binary_version, author-context), and the validate context is
  # INPUT-ONLY - essence is unavailable there (a structural CEL barrier). The essence
  # substrate supplies the source; an empty binary_base_url with
  # essence.install_method=binary will surface at destiny render time (the binary
  # URL), not at input validation. install_method itself is also in essence
  # (2026-06-28) - NOT operator-input -> there's no separate input rule for it.

  # ★ system-ACL-users guard (design d2 + default_admin redesign 2026-06-30):
  # operator-extra (input.users) CANNOT claim a SYSTEM user's name. System users
  # (default_admin/replica/monitoring/sentinel/haproxy) are merged into users.acl
  # from essence.system_acl_users[_sentinel] with last-wins OVER the system ones - an
  # operator user with the same name would SILENTLY shadow the system perms (e.g. an
  # operator `replica` with `~* +@all` would break replication's replica perms; an
  # operator `default_admin` would displace the admin account used for in-cluster
  # AUTH). We catch the collision at INPUT validation (422 BEFORE applying) with a
  # clear refusal, not a silent override. INPUT-ONLY (essence is unavailable in
  # validate - a structural CEL barrier): the reserved-name list is hardcoded here (=
  # essence.system_acl_users[_sentinel] keys). ★ `default` was REMOVED from the
  # reserved list (redesign): the built-in Redis user default is no longer a system
  # user (default_admin took over its role) - the operator can declare default in
  # input.users (then it's rendered by the range, otherwise the template sets `user
  # default off`). +default_admin. has()-guard - input.users is optional; .all() over
  # the ARRAY iterates AclUser elements (wave 1b), the name is field u.name (formerly
  # a map key name).
  - that: "!has(input.users) || input.users.all(u, !(u.name in ['default_admin', 'replica', 'monitoring', 'sentinel', 'haproxy']))"
    message: "ACL username is reserved for a system user (default_admin/replica/monitoring/sentinel/haproxy): pick another name - system users are provisioned automatically from essence"

  # ★ The rule "modules_base_url is required on Redis < 8" is REMOVED (2026-06-25):
  # the .so source moved from operator-input into essence.modules_base_url
  # (author-context, default ""), and the validate context is INPUT-ONLY - essence is
  # unavailable there (a structural CEL barrier). Checking whether
  # essence.modules_base_url is filled in can't be done here. The essence substrate
  # supplies a default source, the operator overrides it in spec.essence; an empty
  # source on Redis < 8 will surface at destiny render time (the .so URL), not at
  # input validation.


# ── Host-tuning extras ──────────────────────────────────────────────────────────────────────────────
# Mode-agnostic per-host extras - THP disabling, logrotate, sysctl - are
# UNCONDITIONAL (a Redis recommendation / hardening, not an operator choice): there
# are no flags for them in the operator contract, the tasks are always active.
# sysctl parameter values are a data table, essence.sysctl_settings (not in operator
# input), passed through to destiny `redis` via apply.input (host-invariant).

# ── Computed scenario vars (compute:, ADR-009 amendment 2026-06-23) ────────────
# `compute:` is resolved KEEPER-SIDE ONCE per run in the run-level context
# (input/essence/incarnation - WITHOUT soulprint, the host-invariance barrier) and is
# visible as `compute.<name>` BOTH in the branches' apply.input AND in state_changes
# below. This removes the duplication of the large merge() translation: it's declared
# HERE ONCE, and the branches and state reference `${ compute.redis_config }` - the
# "state == live config" drift is removed by compute itself (one value, not two
# expressions to keep in sync).
#
# compute.redis_config is the RESULT of translating the simple input into a
# redis.conf map. Branches on input.redis_type:
#   - cluster -> base merge + cluster directives (cluster-enabled/config-file/
#     node-timeout) + tls-cluster yes under TLS;
#   - sentinel -> base merge (no cluster directives).
# Merge layers (SHALLOW last-wins, left to right): essence.redis_config (defaults) ->
# persistence preset -> computed maxmemory/policy/io-threads (guard) ->
# input.redis_settings (operator passthrough) -> TLS block (after redis_settings, so
# the operator can't break TLS). The TLS gate is
# compute.tls_on/tls_only_on/tls_port (enum connection_mode + port/refs from essence;
# declared above). ★ FIX (qa): the TLS directives
# tls-cert-file/tls-key-file/tls-ca-cert-file are derived from compute.conf_dir (NOT
# hardcoded /etc/redis/tls) - destiny puts the PEM under ${conf_dir}/tls/
# (server.yml), and redis.conf must point at the SAME place, otherwise with an
# overridden conf_dir + TLS redis-server can't find the cert and won't start (under
# tls.only the node becomes unreachable over the network). cluster-announce-ip isn't
# materialized in config (per-host -> the .self template), TLS cert/port are
# host-invariant.
#
# ★ CONFIG BOUNDARY: the host-layout directives dir (the RDB/AOF working directory,
# -> data_dir) and aclfile (-> conf_dir) are set by the destiny TEMPLATE
# redis.conf.tmpl FROM vars (dir {{.vars.data_dir}}, aclfile
# {{.vars.conf_dir}}/users.acl), NOT this compute. The former hardcoding
# (/var/lib/redis, /etc/redis/users.acl) is gone - overriding conf_dir/data_dir now
# reaches redis.conf (apply.input.conf_dir/data_dir -> destiny vars). We don't
# duplicate these directives here: the layout is derived from vars in the template
# (a single source), adding them to compute.redis_config would duplicate that same
# logic. logfile/pidfile (/var/log/redis, /var/run/redis) are system directories
# outside the conf_dir/data_dir input schema; unixsocket/dbfilename aren't set in the
# template.
compute:
  # ── admin_user: the name of the SYSTEM ACL user for in-cluster AUTH (default_admin) ──
  # ★ default_admin REDESIGN (2026-06-30): the SINGLE source for the admin user's
  # name, used for ALL in-cluster authentication (masterauth replication, cluster
  # MEET, sentinel monitor/auth, health-PING) - replacing the former requirepass user
  # default. Every deploy body (redis-deploy-{sentinel,cluster,
  # cluster-joinable}.yml) reads compute.admin_user in the community.redis.* plugin
  # calls (params.username/master_username/auth_user) and in its password's Vault
  # path - they DON'T hardcode 'default_admin' in dozens of places. A literal (not
  # from input/essence): the system user's name is a service invariant, not an
  # operator choice. default_admin's password is
  # secret/redis/<inc>/users/<admin_user>#password. ★ day-2 bodies (outside covenant)
  # hardcode 'default_admin' directly (they don't have extends: covenant compute).
  admin_user: "${ 'default_admin' }"
  # ── TLS flags: connection_mode enum + essence parameters (redesign) ────────────
  # TLS intent is connection_mode (an input enum with a default -> always present);
  # port/refs come from essence (see tls_on/tls_only_on/tls_port/tls_*_ref below).
  # Declared as SEPARATE compute vars so that both redis_config (below) and the
  # branches (apply.input.tls + health-gate) read ONE resolved value - instead of
  # repeating it. The compute context is run-level: input/essence are available,
  # soulprint isn't (TLS host-invariance).
  #
  # ── Effective redis version: input.version (enum of builds published to Nexus) ──────
  # ★ Redesign: version is a required enum, ONE for both install methods (binary
  # pulls binaries of this version from Nexus; package pins =version). The former
  # "binary -> essence.binary_version" cascade is gone - the version is always
  # operator input.version. Declared ONCE: state_changes.redis_version, the plugin's
  # redis_version param, and destiny's binary URL all read it. required:true
  # guarantees presence -> plain input.version without a has() wrapper.
  redis_version: "${ input.version }"
  # ── Deployed Redis modules (read-model state.modules) ──────────────────────
  # ★ THE "modules are ALWAYS ALL" DIRECTIVE (2026-06-25): the set is no longer an
  # operator choice. destiny deploys the FULL set from its own vars.redis_modules
  # (Redis < 8). The state read-model reflects what's ACTUALLY deployed: Redis < 8 ->
  # the full alias set; Redis 8+ -> [] (modules are built in, .so files aren't
  # fetched - version-guard). The alias list here is a MIRROR of the destiny
  # vars.redis_modules keys (destiny maps alias->.so for deployment; the scenario
  # only knows the aliases for the read-model - different layers, only the NAMES are
  # duplicated; keep both places in sync when adding a module). Sorted (like the
  # Go map-key sort in destiny) for state determinism.
  redis_modules_deployed: >-
    ${ compute.redis_version.matches('^([0-9]+:)?(8|9|[1-9][0-9])\\.')
         ? []
         : ['bloom', 'json', 'search', 'timeseries'] }
  # ── Source of the Redis modules' .so files (essence placeholder, 2026-06-25) ─────────────
  # modules_base_url moved from operator-input into essence.modules_base_url
  # (author-context, default ""; the operator overrides it in spec.essence). Declared
  # as ONE compute var so that the branches (apply.input.modules_base_url) and
  # state_changes read the same value. default() catches a missing key on an
  # existing essence map; default "" mirrors the former
  # default(input.modules_base_url, '').
  modules_base_url: "${ default(essence.modules_base_url, '') }"
  # ── SSRF guard for fetching .so modules (essence placeholder, 2026-06-28) ────────
  # Symmetric with install.allow_private: modules_base_url can also be an internal Nexus
  # (resolves to RFC1918) → the 4 .so-fetch destiny would trip the SSRF guard core.url. Read from
  # essence.modules_allow_private (default true). Declared as ONE compute var, branches feed it
  # into apply.input.modules_allow_private. default() catches a missing key on an existing essence.
  modules_allow_private: "${ default(essence.modules_allow_private, true) }"
  # ── Per-master sentinel directives (generalized dict, redesign) ────────────────
  # ★ Previously hardcoded exactly 2 directives (down-after-milliseconds/failover-timeout) from
  # named fields. Now GENERALIZED: per-master options - dict input.sentinel_master_settings
  # OVER the defaults essence.sentinel_master_defaults (down-after-milliseconds=5000,
  # failover-timeout=60000 - the removed fields' defaults moved there). merge() gives
  # the effective options map (last-wins, operator over essence), then .map() expands
  # EVERY `k:v` pair into a directive `sentinel <k> <master> → string(v)` (the form
  # sentinel.conf.tmpl prints AND the community.redis.sentinel plugin's
  # classifyConfig classifies → SENTINEL SET). master_name - from essence (default 'master'). ONE
  # source of truth: both the initial sentinel.conf and live-reconcile read this same map.
  # value is already a string (additional_properties:{type:string}) + essence defaults are strings;
  # string() normalizes in case an essence value isn't a string.
  # .map over a map gives a LIST of maps - wrap it in merge() to fold into ONE map
  # (the same pattern as cluster-nodes merge(soulprint.hosts.map(...)) in cluster.yml).
  # ★ GLOBAL sentinel directives (input.sentinel_settings) are merged in RIGHT HERE: their
  # plain keys (resolve-hostnames, announce-port, …) sentinel.conf.tmpl prints
  # as-is, while the classifyConfig plugin splits a plain key → globals (per-master keys
  # `sentinel <opt> <master>` → perMaster). One config map carries both classes - the deploy body
  # passes it into apply.input.sentinel.config unchanged (we don't touch the shared body).
  sentinel_directives: >-
    ${ merge(
         merge(
           merge(
             default(essence.sentinel_master_defaults, {}),
             default(input.sentinel_master_settings, {})
           ).map(k, {
             'sentinel ' + k + ' ' + default(essence.sentinel_master_name, 'master'): string(merge(
               default(essence.sentinel_master_defaults, {}),
               default(input.sentinel_master_settings, {})
             )[k])
           })
         ),
         default(input.sentinel_settings, {})
       ) }
  # ── sentinel_monitor_now: NOT in covenant (diverges between inheritors) ──────
  # Contract flag for deploy-body step 4 (SENTINEL MONITOR RIGHT in the deploy) - NOT shared: on
  # create semantics (create/create_from_souls) =true (node-1 is a real master,
  # sentinel monitors it immediately), migrate_cluster has =false (the new master is still in
  # role:slave during the fill; an early MONITOR → split-brain; MONITOR moves to detach_source).
  # A divergence by VALUE → covenant doesn't carry it (otherwise section_key_conflict on merge),
  # each inheritor declares sentinel_monitor_now in ITS OWN compute delta. See the header of
  # redis-deploy-sentinel.yml.
  # ── install: destiny struct {method, base_url, version, allow_private} (redesign) ─
  # Assembled from essence.install_method (default binary, author-context - NOT operator
  # input, 2026-06-28) + essence.binary_base_url (URL) + input.version (the version -
  # an operator enum of builds published to Nexus). method is always present; base_url/
  # version/allow_private materialize ONLY when method=binary. destiny builds the per-host
  # path as <base_url>/<arch>/Debian/<distro_ver>/<version>/redis-* (arch/distro_ver -
  # soulprint.self.os; see the install.yml binary branch). The same struct goes into destiny
  # `redis` (apply.input.install) and into state_changes.install. default(essence.install_method,
  # 'binary') catches a missing key on an existing essence map (symmetric with modules_base_url).
  #
  # ★ allow_private (2026-06-28): SSRF guard core.url for fetching binaries. The default
  # binary_base_url is an INTERNAL Nexus (resolves to RFC1918) → core.url.fetched by default
  # blocks dialing a private IP. Read from essence.binary_allow_private (default true: the default
  # base = internal Nexus → legit). A public-mirror deploy (external-resolvable base) sets
  # false in spec.essence. default() catches a missing key on an existing essence map.
  install: >-
    ${ (default(essence.install_method, 'binary') == 'binary')
         ? {
             'method':        'binary',
             'base_url':      default(essence.binary_base_url, ''),
             'version':       input.version,
             'allow_private': default(essence.binary_allow_private, true)
           }
         : { 'method': 'package' } }
  # ── Effective host layout: conf_dir/data_dir from essence (#2) ───────────────
  # ★ #2 (2026-06-26): conf_dir/data_dir are NO LONGER operator input - the defaults
  # moved into essence (conf_dir/data_dir; the operator overrides them in spec.essence).
  # Declared as SEPARATE compute vars so that redis_config (TLS paths below), the branches
  # (apply.input.conf_dir/data_dir), and state_changes all read ONE resolved value.
  # default(essence.<x>, …) - the author-context default = the current path (back-compat). host
  # invariant (one layout per cluster) - soulprint isn't available in compute. ★ The TLS directives
  # in redis.conf (tls-cert-file/...) follow conf_dir: destiny puts the PEM under ${conf_dir}/tls/
  # (server.yml) - redis.conf must point at the same place (otherwise redis can't find the cert).
  conf_dir: "${ default(essence.conf_dir, '/etc/redis') }"
  data_dir: "${ default(essence.data_dir, '/var/lib/redis') }"
  # ── TLS flags: from the connection_mode enum + essence (redesign) ──────────────────
  # ★ TLS intent is ONE enum field connection_mode (has a default → ALWAYS present),
  # the technical parameters come from essence. tls_on = connection_mode != 'plain' (the main
  # gate: TLS is on in modes tls/tls_plain). tls_only_on = connection_mode == 'tls'
  # (close the plain port, TLS-only mode). Port/refs - from essence (default() catches
  # a missing key; L0 cases without TLS don't set them). Declared as SEPARATE compute vars,
  # so that redis_config/branches/health-gate all read ONE value. The downstream redis_config
  # TLS block reads compute.tls_on/tls_only_on unchanged.
  tls_on:      "${ input.connection_mode != 'plain' }"
  tls_only_on: "${ input.connection_mode == 'tls' }"
  tls_port:    "${ int(default(essence.tls_port, 7379)) }"
  # Vault PATHS for the PEM - from essence (author-context). A has() chain (default() catches no-such-
  # key only in the FIRST argument): L0 cases without TLS don't set essence.tls_*_ref → ''.
  tls_cert_ref: "${ has(essence.tls_cert_ref) ? essence.tls_cert_ref : '' }"
  tls_key_ref:  "${ has(essence.tls_key_ref)  ? essence.tls_key_ref  : '' }"
  tls_ca_ref:   "${ has(essence.tls_ca_ref)   ? essence.tls_ca_ref   : '' }"
  # ── redis_config_base: the SHARED base of the redis.conf map for both branches (R3, dedup) ──────
  # ★ R3 (compute[i]→compute[j], j<i): mode-AGNOSTIC merge layers, identical in the cluster
  # and sentinel branches, are factored out here as ONE declaration - previously duplicated in both
  # branches of the redis_config ternary (~50 lines of copied maxmemory/io-threads/persistence/
  # redis_settings + TLS). The redis_config branches below inherit this base and ADD their own
  # delta (cluster - cluster directives; both - the TLS block redis_config_tls). Layers (SHALLOW
  # last-wins, left to right): essence.redis_config (defaults) → persistence preset →
  # computed maxmemory/policy/io-threads (has-guard) → input.redis_settings (operator
  # passthrough). ★ last-wins ORDER PRESERVED: cluster directives and TLS are added by the branches
  # AFTER this base (as before), so the operator's redis_settings doesn't overwrite TLS/cluster.
  redis_config_base: >-
    ${ merge(
         essence.redis_config,
         essence.persistence_presets[input.persistence],
         merge(
           has(input.memory_mb)
             ? { 'maxmemory': string(int(input.memory_mb) * int(essence.memory_reserve_percent) / 100) + 'mb' }
             : {},
           has(input.maxmemory_policy) ? { 'maxmemory-policy': input.maxmemory_policy } : {},
           int(input.io_threads) > 0 ? { 'io-threads': string(int(input.io_threads)) } : {}
         ),
         default(input.redis_settings, {})
       ) }
  # ── redis_config_tls: the SHARED TLS block of redis.conf for both branches (R3, dedup) ───────
  # tls-auth-clients:no - server-only TLS: community.redis connects without a client cert
  # (we don't issue mTLS, NIM-53 finding #3; otherwise redis's default `yes` → certificate required).
  # ★ R3: 6 shared TLS directives + the port guard, identical in the cluster and sentinel branches
  # (previously duplicated). The cluster branch ADDS its own tls-cluster:yes on top (see
  # redis_config below) - this base does NOT carry it (mode-agnostic). tls_off → {} (ternary).
  # The TLS directives are derived from compute.conf_dir (destiny puts the PEM under ${conf_dir}/tls/ -
  # redis.conf must point at the same place). compute.tls_on/tls_only_on/tls_port/conf_dir
  # are declared ABOVE (j<i, the compute grammar allows referencing earlier compute vars).
  redis_config_tls: >-
    ${ compute.tls_on
         ? merge(
             {
               'tls-port':         string(compute.tls_port),
               'tls-cert-file':    compute.conf_dir + '/tls/redis.crt',
               'tls-key-file':     compute.conf_dir + '/tls/redis.key',
               'tls-ca-cert-file': compute.conf_dir + '/tls/ca.crt',
               'tls-replication':  'yes',
               'tls-auth-clients': 'no'
             },
             compute.tls_only_on ? { 'port': '0' } : {}
           )
         : {} }
  # ── redis_config: redis_config_base + per-mode delta (R3) ────────────────────
  # ★ The ternary on input.redis_type is now THIN: the shared base (redis_config_base) + the TLS
  # block (redis_config_tls) are inherited by both branches, the cluster branch ADDS the cluster
  # directives (cluster-enabled/config-file/node-timeout) + tls-cluster:yes on top of the TLS block
  # (the last merge layer → wins on collision, last-wins). The sentinel branch = base +
  # the TLS block without the cluster delta. The merge layer order is PRESERVED bit-for-bit relative
  # to the former inline ternary (base → [cluster directives] → TLS [→ tls-cluster]).
  redis_config: >-
    ${ (input.redis_type == 'cluster')
         ? merge(
             compute.redis_config_base,
             {
               'cluster-enabled':      'yes',
               'cluster-config-file':  'nodes.conf',
               'cluster-node-timeout': string(int(input.cluster_node_timeout))
             },
             compute.redis_config_tls,
             compute.tls_on ? { 'tls-cluster': 'yes' } : {}
           )
         : merge(
             compute.redis_config_base,
             compute.redis_config_tls
           ) }

# ── incarnation.state mutation ─────────────────────────────────────────────────
# After a successful apply, Keeper records what was deployed (ADR-009 §7.1, ADR-057
# list form). redis_config - the RESULT of the translation (the same compute.redis_config that went
# into rendering redis.conf in the cluster/sentinel branches): a repeat apply and day-2 scenarios see
# one source of truth. Previously the merge() expression was DUPLICATED here and in
# the branches' apply.input.config (a manual DRIFT-GUARD); now it's declared ONCE in
# compute: above - drift is removed by compute itself.
state_changes:
  - set: redis_type
    value: "${ input.redis_type }"
  - set: redis_version
    value: "${ compute.redis_version }"
  # redis_config ≡ the branches' apply.input.config: a single compute.redis_config (see above).
  - set: redis_config
    value: "${ compute.redis_config }"

  # ── Named intent fields (read-model, v3) ─────────────────────────────
  # ★ CRITICAL (architect a9e1c2c6): values are taken from the SAME compute.*/input as
  # redis_config - not from raw input separately. So namedfields (intent) and
  # redis_config (the computed result) are consistent by construction (a single compute pass).
  # tls: the same compute.tls_on/tls_only_on/tls_port/tls_*_ref that produced the TLS block in
  # redis_config (cert/key/ca - Vault PATHS, not PEM: the secret doesn't live in state).
  - set: tls
    value: >-
      ${ {
           'enable':   compute.tls_on,
           'only':     compute.tls_only_on,
           'port':     compute.tls_port,
           'cert_ref': compute.tls_cert_ref,
           'key_ref':  compute.tls_key_ref,
           'ca_ref':   compute.tls_ca_ref
         } }
  # connection_mode: the operator's explicit network channel mode (enum tls/tls_plain/plain).
  # the read-model duplicates the choice; the tls namedfield above carries the derived enable/only/port.
  - set: connection_mode
    value: "${ input.connection_mode }"
  # persistence: input.persistence (default rdb) - the same key used to select
  # essence.persistence_presets in redis_config (the read-model duplicates the operator's choice).
  - set: persistence
    value: "${ input.persistence }"
  # memory_mb: the operator's memory budget (int). Not set → 0 (a flat set always
  # creates the key; 0 = "the operator didn't pin a budget", maxmemory comes from essence).
  - set: memory_mb
    value: "${ int(default(input.memory_mb, 0)) }"
  # maxmemory_policy: the operator's explicit choice; not set → '' (the directive comes from the essence
  # substrate, see redis_config). The namedfield marks the ABSENCE of an explicit choice with an empty
  # string (we don't reach into redis_config for the actual value - this is a write-model).
  - set: maxmemory_policy
    value: "${ default(input.maxmemory_policy, '') }"
  # io_threads: the operator's number of I/O threads (int, default 0). 0 = single-threaded I/O
  # (the io-threads directive isn't written to redis.conf). the read-model duplicates the choice.
  - set: io_threads
    value: "${ int(input.io_threads) }"
  # modules: the Redis modules ACTUALLY deployed (the "modules are ALWAYS ALL" directive). Redis
  # < 8 → the full set (destiny loads all of them from vars.redis_modules); Redis 8+ → [] (modules
  # are built in). NOT an operator choice (input.modules was removed) - compute.redis_modules_deployed.
  - set: modules
    value: "${ compute.redis_modules_deployed }"
  # ★ install + host-layout (conf_dir/data_dir/modules_base_url) moved into essence
  # (v11→v12, Variant A): install - a read-model with no readers, layout - day-2 reads
  # essence directly (default(essence.<x>, '<default>')). There are no more sets for them here -
  # the keys aren't in state_schema, a set would write a field outside the schema → state validation would fail.
  # sysctl_settings: the applied host tuning (the same essence.sysctl_settings that
  # goes into destiny apply.input). From essence (host-invariant, not operator input).
  - set: sysctl_settings
    value: "${ default(essence.sysctl_settings, {}) }"
  # monitoring: a read-model of the FACT of deployed exporters (Slice I, symmetric with the install/tls
  # read-model). Versions/ports - from essence.node_exporter_*/redis_exporter_* (the same values
  # that go into apply.input of the two destinies in create/main.yml). The password/user of the ACL
  # monitoring user are NOT stored in state (security - they're in Vault, like tls.*_ref). The defaults
  # duplicate essence/migration 012_to_013 (ports :9100/:9121 are conventional; versions - from the essence substrate).
  - set: monitoring
    value: >-
      ${ {
           'node_exporter_version':  default(essence.node_exporter_version, ''),
           'redis_exporter_version': default(essence.redis_exporter_version, ''),
           'node_exporter_listen':   default(essence.node_exporter_listen, ':9100'),
           'redis_exporter_listen':  default(essence.redis_exporter_listen, ':9121')
         } }
  # logging: a read-model of the FACT of deployed log-shipping (Slice V-I, ADR-067; symmetric with
  # monitoring). Version/sink_type/endpoint/log_sources - from essence.vector_* (the same values
  # that go into the destiny vector apply.input in create/main.yml). ★ vector_sink_auth_ref is NOT
  # written HERE - it's a secret (Vault ref/token), it doesn't land in state (security, like tls.*_ref and the
  # monitoring password). The defaults duplicate essence/migration 013_to_014 (console - a safe default with no
  # infra required; version from the essence substrate). The operator sees what's deployed; a repeat apply is idempotent.
  - set: logging
    value: >-
      ${ {
           'vector_version':       default(essence.vector_version, ''),
           'vector_sink_type':     default(essence.vector_sink_type, 'console'),
           'vector_sink_endpoint': default(essence.vector_sink_endpoint, ''),
           'vector_log_sources':   default(essence.vector_log_sources, [])
         } }
  # ── Topology (counts) ──────────────────────────────────────────────────────
  # shards/replicas/sentinel_quorum - from the same input.* that the size-guard/cluster-build/
  # sentinel branches use. shards - cluster only (not set → 0). replicas - UNIFIED
  # int(default(input.replicas_per_master, 0)) in both modes (replicas per master;
  # cluster - per shard, sentinel - of the master). sentinel_quorum - ALWAYS 0 (there's no
  # more operator field for it, the quorum is AUTO size/2+1 computed in apply, it isn't materialized in state;
  # 0 = "auto").
  - set: shards
    value: "${ int(default(input.shards, 0)) }"
  - set: replicas
    value: "${ int(default(input.replicas_per_master, 0)) }"
  - set: sentinel_quorum
    value: "${ 0 }"

  # ── cloud-provision read-model (ADR-061, Variant A) ─────────────────────────
  # The FACT that "these VMs were provisioned by THIS create run". ★ GUARD on input.provision (NOT
  # has(register.provision)!): on a non-provision run, provision.yml group-drop →
  # there's no core.cloud.created step → register.provision doesn't exist → has(register.provision)
  # would give no-such-key IN THE PREDICATE ITSELF (CEL evaluates has()'s argument - it's present in env,
  # but touching register.provision.vm_ids outside the guard would blow up). The gate is input.provision
  # (an object input, has()-safe): set AND enabled → read register.provision (created by step
  # (a)); otherwise [] / '' (hosts not provisioned by the service). The ternary short-circuits -
  # register.provision.* isn't touched on the non-provision path.
  - set: provisioned_vm_ids
    value: >-
      ${ (has(input.provision) && input.provision.enabled)
           ? register.provision.vm_ids
           : [] }
  # provisioned_sids: the SID (FQDN) of created VMs - for cascade-destroy day-2 teardown
  # (souls→destroyed/seeds→orphaned/tokens→burned; the Reaper does NOT reap pending-VM souls).
  # The same GUARD on input.provision as vm_ids/provider (on a non-provision run
  # register.provision doesn't exist → the ternary short-circuits, register.* isn't touched).
  # sids are gathered from register.provision.hosts[].sid (.map - the same expression as
  # params.sid in step (c) core.soul.registered in provision.yml); there's no separate register
  # .provision.sids. Otherwise [] (hosts not provisioned by the service).
  - set: provisioned_sids
    value: >-
      ${ (has(input.provision) && input.provision.enabled)
           ? register.provision.hosts.map(h, h.sid)
           : [] }
  # provisioned_provider - the FACT provider of created VMs. provider is read as
  # default(input.provision.provider, essence.provision_provider): the operator usually does NOT set
  # provider (the provision form is hidden, default-on) → falls back to essence.provision_provider
  # (symmetric with redis-provision.yml::core.cloud.created.params.provider). The input.provision gate
  # (has()-safe) holds the non-provision path: enabled=false / create_from_souls → '' (VMs weren't
  # provisioned by this run). ★ TODO: prod/dev provider switch (ENV keeper / Coven overlay) - a separate ADR.
  - set: provisioned_provider
    value: >-
      ${ (has(input.provision) && input.provision.enabled)
           ? default(input.provision.provider, essence.provision_provider)
           : '' }

  # redis_users - a TYPED array of AclUser (wave 1b, map→array). state stores
  # input.users as-is (an array [{name,perms,state}]); passwords are NOT in state (Vault).
  - set: redis_users
    value: "${ default(input.users, []) }"
  # redis_hosts is empty in ALL modes: state_changes render per-host with
  # soulprint.SELF (AllowHosts=false, orchestration.md §7.1) - the roster soulprint.hosts
  # is NOT AVAILABLE here (boundary: state is per-run, roles are laid out on the apply side).
  # The exact declared sentinel roles (master-election) live in apply.input.sentinel,
  # not in state (symmetric with cluster, where the plugin lays out the roles).
  - set: redis_hosts
    value: "${ [] }"
  # redis_sentinel: facts about the monitored master (sentinel mode). master_name - from essence
  # (essence.sentinel_master_name, default 'master'; there's no more operator field for it).
  # quorum isn't materialized in state (the auto-quorum size/2+1 is computed in apply,
  # size(soulprint.hosts) isn't available in state_changes) → 0. master_ip is no longer written
  # (the sentinel_only mode was removed: the master is picked from the roster, host-variant).
  # ★ Redesign: the former named timings down_after_ms/failover_timeout_ms are absorbed into
  # the generalized per-master dict. The read-model stores the EFFECTIVE map of per-master options
  # (master_settings = essence.sentinel_master_defaults over input.sentinel_master_settings,
  # last-wins) and the global settings (input.sentinel_settings) - day-2 reads them by name
  # (like install/tls). Outside sentinel mode - an empty object (only cluster remains).
  - set: redis_sentinel
    value: >-
      ${ (input.redis_type == 'sentinel')
           ? {
               'master_name':     default(essence.sentinel_master_name, 'master'),
               'quorum':          0,
               'master_settings': merge(
                                     default(essence.sentinel_master_defaults, {}),
                                     default(input.sentinel_master_settings, {})
                                   ),
               'settings':        default(input.sentinel_settings, {})
             }
           : {} }
