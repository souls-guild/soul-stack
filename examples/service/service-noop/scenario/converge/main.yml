name: converge
description: |
  Scry-сценарий drift-детекта (ADR-031 Slice B). Объявляет ЖЕЛАЕМОЕ конечное
  состояние сервиса noop — для smoke-проверки сам факт наличия маркер-файла
  /var/lib/soul-stack/noop-converged. Keeper прогоняет этот сценарий в
  dry_run-режиме при check-drift; Soul зовёт core.file.Plan (read-safe) вместо
  Apply, сравнивает желаемое vs фактическое и возвращает per-task changed.

  service-author кладёт `scenario/converge/main.yml` ТОЛЬКО когда хочет
  поддержать Scry-проверку — это специализированный scenario-kind (auto-discover
  по имени). Конвенция input-резолва: каждое поле input по имени берётся из
  `incarnation.state.<имя>` либо overrid-ится оператором в body запроса.

# state_changes не задаётся: converge — read-only declaration, drift-проверка
# ничего не коммитит в state (Soul вообще mod.Apply не вызывает на dry_run,
# а Keeper не запускает фазу state_changes для DryRun-прогонов).
state_changes: {}

tasks:
  # Маркер сходимости: ожидаем, что файл существует с фиксированным
  # содержимым. На clean-системе file ещё нет → Plan вернёт changed=true
  # (drift). После реального apply (scenario create / fix) файл появляется →
  # Plan вернёт changed=false (clean).
  - name: Ensure converged marker file
    module: core.file.present
    params:
      path: /var/lib/soul-stack/noop-converged
      content: "noop converged\n"
      mode: "0644"
