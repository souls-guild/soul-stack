name: smoke
description: Verify cluster is operational after apply

tasks:
  - name: Ping all cluster hosts
    on: ["${ incarnation.name }"]
    apply:
      destiny: redis
      input: { action: ping }
    expect:
      stdout: "PONG"

  # smoke идёт ПОСЛЕ create — redis запущен, actual-роль доступна живым probe.
  # Probe несёт ИМЕНОВАННЫЙ register: smoke_role, т.к. его результат читается
  # ПОЗЖЕ в where: следующего шага (orchestration.md §4 канон register.<name>.*).
  # Полнота probe гарантируется fail-stop барьером (ADR-056 §5). tr -d '\n' —
  # register.stdout без trailing newline (where сравнивает == 'slave').
  - name: Detect actual redis role on each host
    module: core.cmd.shell
    on: ["${ incarnation.name }"]
    register: smoke_role
    changed_when: false
    params:
      cmd: "redis-cli role | head -1 | tr -d '\\n'"

  # actual-роль через where: по register предыдущего probe (НЕ declared,
  # НЕ удалённый под-ковен {name}-replica). orchestration.md §4: where: без
  # предшествующего probe — ошибка валидации; ссылка канонической формой.
  - name: Verify replicas report slave role
    on: ["${ incarnation.name }"]
    where: register.smoke_role.stdout == 'slave'
    apply:
      destiny: redis
      input: { action: replication_status }
    expect:
      replication_state: "slave"

  # Топология (declared) — на keeper-стороне через soulprint.hosts
  # (orchestration.md §3 on: keeper, §4.1 soulprint.hosts.where).
  - name: Assert exactly one primary in topology
    on: keeper
    apply:
      destiny: assert
      input:
        condition: "${ size(soulprint.hosts.where(\"role == 'primary'\")) == 1 }"
        message:   "Expected exactly one primary in the cluster"
