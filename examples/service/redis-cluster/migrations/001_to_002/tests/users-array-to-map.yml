name: users-array-to-map
description: >
  Базовый случай: массив имён пользователей переходит в map с per-user ACL.

state_before:
  redis_users: ["app", "monitor"]
  redis_maxmemory: "512mb"

state_after:
  redis_users:
    app:     { acl: "off ~* &* +@all", state: "off" }
    monitor: { acl: "off ~* &* +@all", state: "off" }
  redis_maxmemory: "512mb"
