description: |
  state_schema v1 → v2:
  - redis_users превращается из массива строк в map с acl/state.
  - v1: redis_users: ["app", "monitor"]
  - v2: redis_users: { app: {acl: "off ~* &* +@all", state: "off"}, monitor: {acl: "off ~* &* +@all", state: "off"} }

  Грамматика — ADR-019, docs/migrations.md.

from_version: 1
to_version: 2

transform:
  - rename:
      from: state.redis_users
      to:   state.redis_users_legacy_v1

  # Материализуем целевой map ДО foreach: пустой список пользователей даёт
  # пустой map (осмысленный intent «users стали map»), а не отсутствие ключа.
  - set:
      path:  state.redis_users
      value: {}

  - foreach: "${ state.redis_users_legacy_v1 }"
    as: user_name
    do:
      - set:
          path: "state.redis_users.${ user_name }"
          value:
            acl: "off ~* &* +@all"
            state: "off"

  - delete:
      path: state.redis_users_legacy_v1
