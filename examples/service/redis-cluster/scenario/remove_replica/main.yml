name: remove_replica
description: Scale in — remove one replica from the cluster

# Формат блока — docs/input.md. Симметричен add_replica: тот растит
# redis_hosts[], этот — убирает один элемент по SID.
input:
  sid:
    type: string
    required: true
    format: fqdn
    description: SID реплики, выводимой из кластера.

# ★ ADR-057: remove убирает элемент из incarnation.state.redis_hosts[] (list of
# objects {sid, role}). Раньше у remove_replica state_changes не было вовсе —
# хост останавливался, но запись в state НЕ убывала (state расходился с фактом).
# remove по предикату sid + expect: one закрывает дыру: ровно один такой хост
# обязан быть (иначе error_locked — снять несуществующий/неоднозначный SID
# нельзя, state не коммитится). Коммит — после cross-host барьера (§7).
state_changes:
  - remove: redis_hosts
    match: "elem.sid == input.sid"
    expect: one

tasks:
  # Probe: фактическая роль выводимого хоста. where: таргетит ровно выводимую
  # реплику по стабильному soulprint.self.sid (orchestration.md §4 M3-amend:
  # чисто-стабильный where: без probe легален). Полнота probe гарантируется
  # fail-stop барьером (ADR-056 §5): упавший probe → barrier → error_locked.
  - name: Detect role of the replica being removed
    module: core.cmd.shell
    on: ["${ incarnation.name }"]
    where: soulprint.self.sid == input.sid
    register: role
    changed_when: false
    params:
      cmd: "redis-cli role | head -1 | tr -d '\\n'"

  # Защита от потери primary: выводить можно только реплику, не текущий primary
  # (его вывод = split-brain). failed_when: register.self — собственный результат
  # шага (исполним), останавливает сценарий до коммита. tr -d '\n' — register.stdout
  # без trailing newline (failed_when сравнивает == 'master').
  - name: Refuse to remove the current primary
    module: core.cmd.shell
    on: ["${ incarnation.name }"]
    where: soulprint.self.sid == input.sid
    changed_when: false
    failed_when: register.self.stdout == 'master'
    params:
      cmd: "redis-cli role | head -1 | tr -d '\\n'"

  # Останавливаем redis на выводимой реплике (graceful: SHUTDOWN NOSAVE — это
  # реплика, её данные — копия primary). changed_when: фиксирует факт остановки.
  - name: Stop redis on the replica being removed
    module: core.cmd.shell
    on: ["${ incarnation.name }"]
    where: soulprint.self.sid == input.sid
    params:
      cmd: "redis-cli shutdown nosave || true"
