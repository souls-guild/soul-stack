name: create
description: Initial bootstrap of Redis HA cluster (with optional cloud-spawn)

# Типизированный вход сценария. Формат блока — docs/input.md.
input:
  # Версия НЕОБЯЗАТЕЛЬНА: не задана → core.pkg ставит версию по умолчанию из
  # репозитория (без =version-пина). Pattern допускает distro-native строку —
  # опциональный epoch `N:` + upstream-версия + опциональная ревизия (напр. Debian
  # `5:7.0.15-1~deb12u7`); жёсткий semver ломал version-пин на реальном дистрибутиве.
  redis_version:
    type: string
    required: false
    pattern: "^([0-9]+:)?[0-9][A-Za-z0-9.~+-]*$"
    description: >-
      Версия пакета redis-server в репозитории дистрибутива (distro-native, напр.
      5:7.0.15-1~deb12u7). Необязательна: если не задана — ставится версия по
      умолчанию из репозитория (поведение latest, core.pkg без =version-пина).

  redis_users:
    type: object
    required: true
    properties: {}
    additional_properties:
      type: object
      properties:
        acl:   { type: string }
        state: { type: string, enum: [on, off] }
      required: [acl, state]

  redis_config:
    type: object
    properties: {}
    additional_properties: { type: string }

  # Адреса хостов кластера. На create probe невозможен (redis ещё не запущен),
  # топология приходит явным входом оператора и фиксируется в incarnation.state.
  redis_hosts:
    type: array
    items: { type: string }

  redis_password:
    type: string
    required: true
    secret: true
    pattern: "^vault:.*"
    # Пароль приходит scoped vault:-ref (default-deny на input без vault_scope —
    # docs/input.md §«vault_scope»). prefix-glob ограничивает резолв ветвью
    # secret/redis/* (per-incarnation путь secret/redis/<inc>#password).
    vault_scope: "secret/redis/*"

  spawn:
    type: object
    properties:
      provider: { type: string }
      profile:  { type: string }
      count:    { type: integer, min: 3, max: 6 }
      role_distribution:
        type: array
        items:
          type: object
          properties:
            index: { type: string }
            role:  { type: string, enum: [primary, replica] }

# Что сценарий пишет в incarnation.state после успешного apply.
# set-цепочка (ADR-057 list-форма): какое поле обновить и откуда значение. В
# пилоте видит только input/incarnation/soulprint.self; soulprint.hosts/vars/
# essence/state — future (полная грамматика), здесь не используем.
state_changes:
  # redis_version/redis_config/redis_hosts — optional-без-default: незащищённый
  # `${ input.X }` на рендере set даёт CEL «no such key» при отсутствии ключа
  # (incarnation → error_locked). Канон has()-guard с нейтральным значением
  # ("" для string, {} для object, [] для array). redis_users — required:true,
  # ключ всегда есть → guard не нужен.
  - set: redis_version
    value: "${ has(input.redis_version) ? input.redis_version : '' }"
  - set: redis_users
    value: "${ input.redis_users }"
  - set: redis_config
    value: "${ has(input.redis_config) ? input.redis_config : {} }"
  - set: redis_hosts
    value: "${ has(input.redis_hosts) ? input.redis_hosts : [] }"

tasks:
  # Если нужно — создаём VM через CloudDriver (ADR-017: keeper-side core).
  # spawn optional-без-default: `input.spawn != null` дал бы CEL «no such key» при
  # отсутствии ключа — канон has()-guard (пилот, docs/input.md).
  - name: provision
    on: keeper
    when: has(input.spawn)
    module: core.cloud.created
    params:
      # provider/profile/count — читаются provisioned.go (state created).
      provider: "${ input.spawn.provider }"
      profile:  "${ input.spawn.profile }"
      count:    "${ input.spawn.count }"

  # Ставим Redis на все хосты этого кластера
  - include: install.yml

  # Настраиваем репликацию на репликах
  - include: replication.yml

  # Создаём пользователей из input. На create probe невозможен (redis ещё не
  # запущен) — declared-топология и адрес primary берутся из soulprint.hosts и
  # пробрасываются в destiny через apply: input: (orchestration.md §4.1,
  # bootstrap-таргетинг). Шаг идёт широко по incarnation; destiny применяет
  # users на declared-primary по master_addr, на репликах — idempotent no-op
  # (реплики подхватят через replication). Per-role step-таргетинг отдельным
  # ключом не вводится (pattern пилота create/replication.yml).
  - name: Ensure redis users on the cluster
    on: ["${ incarnation.name }"]
    apply:
      destiny: redis
      input:
        action:      ensure_users
        users:       "${ input.redis_users }"
        master_addr: "${ soulprint.hosts.where(\"role == 'primary'\")[0].network.primary_ip }"
