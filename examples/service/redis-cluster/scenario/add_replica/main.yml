name: add_replica
description: Scale out replica count by 1

# Формат блока — docs/input.md.
input:
  spawn:                                  # если incarnation создавался со spawn — создаём VM
    type: object
    properties:
      provider: { type: string }
      profile:  { type: string }
      sid:      { type: string, format: fqdn }  # SID новой VM — ВХОД cloud-provision
                                          # (scenario задаёт сам, см. keeper/cloud.md).
                                          # Новый хост (ещё не в инкарнации) → format: fqdn, не sid+source-пикер.

  host:                                   # либо привязываем НОВЫЙ SID (ещё не в инкарнации)
    type: object
    properties:
      sid: { type: string, format: fqdn }  # привязка нового хоста → format: fqdn

  redis_password:
    type: string
    required: true
    secret: true
    pattern: "^vault:.*"

# Факт о новом хосте (role: replica) пишется в incarnation.state.redis_hosts[]
# после успешного apply (cross-host барьер — orchestration.md §7). Declared-роль
# в incarnation.spec.hosts[]: для spawn-ветки заполняется cloud-provision из
# role_distribution (M2-side-effect, keeper/cloud.md); для host-ветки —
# легитимно пуста (orchestration.md §4.1: role может быть null для хостов,
# привязанных вне declared-spec).
state_changes:
  appends: [redis_hosts]

# SID добавляемого хоста: spawn-ветка → input.spawn.sid; host-ветка → input.host.sid.
# Единый vars.new_sid покрывает обе ветки — далее все per-host шаги таргетят
# по soulprint.self.sid == vars.new_sid (orchestration.md §4 M3-amend:
# чисто-стабильный where: без register допустим).
vars:
  # spawn/host — optional-без-default (ровно один из них задаёт оператор).
  # `input.spawn != null` дал бы CEL «no such key» при ОТСУТСТВИИ ключа spawn —
  # канон has()-guard (пилот, docs/input.md). Ложная ветвь берёт input.host.sid:
  # она достижима только когда spawn отсутствует → host задан (host-ветка).
  new_sid: "${ has(input.spawn) ? input.spawn.sid : input.host.sid }"

tasks:
  # Spawn-ветка: создаём VM с заданным SID. core.cloud.created (ADR-017)
  # пишет declared-роль в incarnation.spec.hosts[] из role_distribution
  # (keeper/cloud.md, orchestration.md §4.1). Coven-метки этот шаг НЕ
  # назначает — это отдельный шаг ниже (keeper/cloud.md, keeper/modules.md).
  - name: Spawn new replica VM
    on: keeper
    when: has(input.spawn)
    module: core.cloud.created
    params:
      # provider/profile — читаются provisioned.go (state created).
      provider: "${ input.spawn.provider }"
      profile:  "${ input.spawn.profile }"
      # SID новой VM определяется провайдером (vm.fqdn); явная привязка
      # роли replica — будущее (keeper/cloud.md, doc-комментарий пакета cloud).
      count: 1

  # Регистрируем нового Soul в реестре incarnation: привязываем к корневому
  # coven (mode: append default). refresh_soulprint: true (default) — после
  # шага soulprint.hosts текущего прогона содержит новый хост, следующие
  # шаги его видят через where: soulprint.self.sid == vars.new_sid
  # (keeper/modules.md). Один шаг покрывает обе ветки (sid — из vars.new_sid):
  # бывшие два разных шага (`tag-existing-host` через apply: destiny: coven-assign
  # и coven_assignment в spawn-инпуте cloud-provision) слиты в один.
  # Результат не читается далее — без именованного register: (конвенция §8).
  - name: Bind new replica to the incarnation root coven
    on: keeper
    module: core.soul.registered
    params:
      sid:   "${ vars.new_sid }"
      coven: ["${ incarnation.name }"]

  # Probe IP фактического primary СУЩЕСТВУЮЩИХ хостов (кластер работает,
  # primary волатилен — failover мог быть; runtime-паттерн как restart).
  # where: исключает новый хост — на нём redis ещё не стоит. На хосте-primary
  # команда печатает его bind-IP, на репликах — пусто. failed_when: — идиома
  # полноты §5 (ответили все существующие, host_count - 1, новый исключён).
  # master_addr читается ниже в setup-replication → probe ИМЕНОВАН
  # (конвенция register пилота restart).
  - name: Detect actual redis primary address on existing hosts
    module: core.cmd.shell
    on: ["${ incarnation.name }"]
    where: soulprint.self.sid != vars.new_sid
    register: master_addr
    changed_when: false
    failed_when: size(register.master_addr) < (incarnation.host_count - 1)
    params:
      cmd: >
        [ "$(redis-cli role | head -1)" = master ]
        && redis-cli -p 6379 config get bind | awk 'NR==2{print $1}' || true

  # Ставим redis на НОВЫЙ хост. Таргет — стабильный soulprint.self.sid
  # (orchestration.md §4 M3-amend: чисто-стабильный where: без register/probe
  # легален; register-часть инварианта не ослаблена).
  - name: install-on-new
    on: ["${ incarnation.name }"]
    where: soulprint.self.sid == vars.new_sid
    apply:
      destiny: redis
      input:
        action:    apply
        version:   "${ state.redis_version }"
        password:  "${ input.redis_password }"
        config:    "${ state.redis_config }"

  # Репликация на новом хосте → на actual-primary существующих. master_addr
  # из probe существующих (register.master_addr), НЕ из declared soulprint.hosts
  # (кластер работает). Структуру хостов передаём destiny через input (M3) —
  # destiny сама пропускает primary по своему инварианту
  # (redis-replication-config). Изоляция destiny цела (§4.1).
  - name: setup-replication
    on: ["${ incarnation.name }"]
    where: soulprint.self.sid == vars.new_sid
    apply:
      destiny: redis-replication-config
      input:
        hosts:       "${ soulprint.hosts }"
        master_addr: "${ register.master_addr.map(k, register.master_addr[k].stdout).filter(v, v != '')[0] }"
        password:    "${ input.redis_password }"

  # Health-gate: wait: изъят (orchestration.md §2) → probe + retry:+until:.
  # Самодостаточный → БЕЗ именованного register:, условие через
  # register.self.* (конвенция пилота restart, tasks.md §9/§10).
  # count×delay = 90s (прежний timeout).
  - name: Wait until the new replica is syncing
    module: core.cmd.shell
    on: ["${ incarnation.name }"]
    where: soulprint.self.sid == vars.new_sid
    changed_when: false
    retry:
      count: 18
      delay: 5s
      until: register.self.stdout == 'up'
    failed_when: register.self.stdout != 'up'
    params:
      cmd: >
        redis-cli -p 6379 info replication
        | awk -F: '/master_link_status/{print $2}' | tr -d '[:space:]'
        || echo down
