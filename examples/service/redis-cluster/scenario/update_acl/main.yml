name: update_acl
description: Change ACL of one or more existing users

# Формат блока — docs/input.md.
input:
  changes:
    type: object
    required: true
    # map произвольных ключей username → ACL-объект: фиксированных полей нет,
    # форма элементов задаётся в additional_properties (как `os` в
    # examples/destiny/redis-replication-config/destiny.yml).
    properties: {}
    additional_properties:
      type: object
      properties:
        acl:   { type: string }
        state: { type: string, enum: [on, off] }
      required: [acl]

# input.changes — map username → {acl, state?}; патчим КАЖДОГО подходящего юзера
# своим значением (ADR-057 list-форма). foreach по map даёт биндинг change с
# .key (username) и .value (объект {acl, state?}); modify по key патчит запись в
# state.redis_users (map-коллекция). В modify-патче биндинги: key/value —
# текущая запись state (value.state — прежнее состояние, fallback если
# change.value.state не передан, т.к. state необязателен в input). expect: one —
# каждый изменяемый юзер обязан существовать (иначе error_locked: нельзя менять
# ACL несуществующему).
state_changes:
  - foreach: "${ input.changes }"
    as: change
    do:
      - modify: redis_users
        match: "key == change.key"
        patch:
          acl:   "${ change.value.acl }"
          state: "${ has(change.value.state) ? change.value.state : value.state }"
        expect: one

tasks:
  # Probe: фактическая роль каждого хоста (actual-роль волатильна, берётся
  # живым probe непосредственно перед таргетингом — concept.md, ADR-008).
  # Полнота probe гарантируется fail-stop барьером (ADR-056 §5): упавший probe
  # на любом хосте → barrier → error_locked, where-Passage не стартует.
  # tr -d '\n' — register.stdout без trailing newline (where сравнивает == 'master').
  - name: Detect actual redis role per host
    module: core.cmd.shell
    on: ["${ incarnation.name }"]
    register: redis_role
    changed_when: false
    params:
      cmd: "redis-cli role | head -1 | tr -d '\\n'"

  # Diff и применение ACL на текущем мастере. run_once: — ровно один хост
  # (первый по SID) из резолва on:+where: (orchestration.md §2). >1 «текущих
  # master» по probe — норма, шаг идёт на одном детерминированном.
  # incarnation.state.redis_users — read-only снимок состояния из БД (для diff).
  - name: Diff and apply ACL changes on the current master
    on: ["${ incarnation.name }"]
    where: register.redis_role.stdout == 'master'
    run_once: true
    apply:
      destiny: redis
      input:
        action:  update_acls
        changes: "${ input.changes }"
        current: "${ incarnation.state.redis_users }"   # снимок состояния из БД, для diff
