name: restart
description: >-
  Day-2: rolling-restart DragonFly (sentinel-режим — master-replica) БЕЗ изменения
  конфига. REUSE идиомы probe→where rolling-restart из redis/restart (ADR-056/008):
  фактическая роль каждого хоста ВОЛАТИЛЬНА (после возможного sentinel-failover declared-
  роль create уже неверна), поэтому роль берётся ЖИВЫМ probe непосредственно перед
  таргетингом, а не из incarnation.state.

  ★ DragonFly vs redis: данные плоскости рендерит destiny `dragonfly` (здесь не нужна —
  рестарт конфиг не трогает); ЖИВОЙ рантайм (probe роли, health-gate) идёт через плагин
  community.redis (DragonFly redis-совместим: INFO replication / PING работают — плагин
  БЕЗ правок). Рестарт демона — core.service.restarted (host-операция над systemd-юнитом
  `dragonfly`; Type=simple unit — package-deb или binary-юнит). sentinel-демон
  (redis-sentinel) этим сценарием НЕ рестартится: он отдельный процесс, rolling касается
  только data-плоскости DragonFly (симметрия с redis — там рестартится только redis-server).

  ★ Все взаимодействия с DragonFly — через плагин community.redis (НЕ raw redis-cli/
  core.cmd.shell): probe роли — community.redis.role (INFO replication); health-gate реплики
  — community.redis.replica-synced (СТРОГИЙ ресинк-гейт: master_link_status:up — реплика
  догнала master-а, не просто «демон ответил PONG»); рестарт master-а последним —
  community.redis.pinged (у master-а нет master_link_status; PONG = верный liveness master-а).

  ★ Имя state — `replica-synced`/`pinged`/`role` (kebab-case): грамматика module-address
  `<ns>.<module>.<state>` в soul-lint требует kebab во всех сегментах (прецедент redis/restart).

  Таргетинг — на весь incarnation (on опущен = весь incarnation, ADR-008/009): прогон зовётся
  на всех Soul-ах инкарнации, probe раскладывает их на master/slave по живому ответу INFO
  replication. Реплики рестартятся ПО ОДНОЙ (block + serial:1: волна = {рестарт, health-gate}),
  master рестартится ОТДЕЛЬНОЙ задачей ПОСЛЕ всех реплик (rolling-инвариант «master последним»).
  state не меняется — только запись в state_history.

  ★ Граница (как в redis/restart): живой failover (SENTINEL FAILOVER до рестарта master-а)
  — follow-up при появлении failover-verb-а у community.redis. Пока master рестартится
  напрямую (краткая недоступность на рестарт).

# Формат блока — docs/input.md.
input:
  reason:
    type: string
    default: "manual restart"

# state не меняется — только лог в state_history с пометкой.
state_changes: {}

# ── Вычисляемые scenario-vars (compute:, ADR-009 amendment) ───────────────────────
# Рун-уровневый контекст (input/essence/incarnation — БЕЗ soulprint). Снимает дублирование
# локального адреса коннекта плагина (повторялся бы на probe + health-gate).
#
# ★ DragonFly vs redis (БЛОКЕР-фикс): локальные вызовы плагина идут к СВОЕМУ инстансу через
# UNIX-СОКЕТ (compute.local_addr), НЕ 127.0.0.1:port. DF при --bind=primary_ip НЕ слушает
# loopback (dfly_main.cc) — TCP-коннект на 127.0.0.1 не подключился бы; сокет — отдельный
# UDS-listener (всегда локально доступен). UDS не сетевой путь → TLS на нём не нужен (даже на
# TLS-инстансе): tls/tls_ca у локальных probe/health-gate УБРАНЫ. Поэтому TLS-дискриминатор
# (tls_on/tls_port/tls_ca) для restart БОЛЬШЕ НЕ НУЖЕН — он применялся только к локальным
# коннектам, которые теперь UDS. run_dir host-инвариант (vars destiny); default дублирует
# дефолт (scenario не видит destiny-vars); essence на day-2 неполна, но run_dir — не operator-
# override, дефолт верен.
compute:
  local_addr: "${ 'unix:' + default(essence.run_dir, '/var/run/dragonfly') + '/dragonfly.sock' }"
  # ★ admin_user (редизайн default_admin): probe роли + health-gate реплики коннектятся к
  # локальному DragonFly под ним (requirepass убран). Литерал (day-2 вне covenant).
  admin_user: "${ 'default_admin' }"

tasks:
  # Probe: фактическая роль каждого хоста через плагин community.redis.role (go-redis INFO
  # replication, без redis-cli). actual-роль волатильна, берётся живым probe непосредственно
  # перед таргетингом (concept.md, ADR-008). Полнота probe гарантируется fail-stop барьером
  # (ADR-056 §5): упавший probe на любом хосте → barrier → error_locked, where-Passage не
  # стартует. register.self.role — фактическая роль ("master"/"slave"), where сравнивает
  # БЕЗ ручного trim (плагин отдаёт типизированную строку). addr — локальный UNIX-сокет.
  - name: Detect actual dragonfly role per host
    module: community.redis.role
    register: df_role
    changed_when: false
    params:
      addr:     "${ compute.local_addr }"
      # ★ РЕДИЗАЙН default_admin: AUTH под default_admin (requirepass убран). UDS без TLS.
      username: "${ compute.admin_user }"
      password: "${ vault('secret/dragonfly/' + incarnation.name + '/users/' + compute.admin_user + '#password') }"

  # Rolling-restart реплик по одному хосту (serial: 1). serial: на block: катит весь блок
  # целиком по одному набору хостов перед следующей волной (orchestration.md §2, Вариант A:
  # волна = {изменить, проверить здоровье}). block.where (slave) наследуется обоими потомками
  # — рендерятся ТОЛЬКО на репликах, master в этой волне не трогается.
  - name: Rolling-restart replicas one at a time
    where: register.df_role.role == 'slave'
    serial: 1
    block:
      # Рестарт data-плоскости DragonFly (systemd-юнит `dragonfly`). sentinel-демон
      # (redis-sentinel) НЕ трогаем — он отдельный процесс.
      - name: Restart dragonfly
        module: core.service.restarted
        params:
          name: dragonfly
      # Health-gate: дождаться, пока рестартнутая реплика РЕСИНКНУЛАСЬ с master-ом
      # (master_link_status:up), а не просто подняла демон. community.redis.replica-synced
      # (INFO replication), НЕ pinged (PONG слаб — демон жив, но мог ещё не догнать master
      # после рестарта; rolling не должен идти к следующей реплике, пока текущая не догнала).
      # Бюджет времени и условие — retry:+until: (count × delay = бюджет, until: = условие).
      - name: Wait until replica resynced with master
        module: community.redis.replica-synced
        changed_when: false
        retry:
          count: 12
          delay: 5s
          until: "register.self.synced == true"
        failed_when: "register.self.synced != true"
        params:
          addr:     "${ compute.local_addr }"
          # ★ РЕДИЗАЙН default_admin: AUTH под default_admin (requirepass убран). UDS без TLS.
          username: "${ compute.admin_user }"
          password: "${ vault('secret/dragonfly/' + incarnation.name + '/users/' + compute.admin_user + '#password') }"

  # Рестарт master-а ПОСЛЕ всех реплик (rolling-инвариант «master последним»). run_once: —
  # ровно один хост (первый по SID) из резолва on:+where: (orchestration.md §2). >1 «текущих
  # master» по probe — норма sentinel-multi (редко), шаг идёт на одном детерминированном за прогон.
  - name: Restart the current master last
    module: core.service.restarted
    where: register.df_role.role == 'master'
    run_once: true
    params:
      name: dragonfly
