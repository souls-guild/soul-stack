# L0-испытание restart: rolling-restart реплик НА TLS-инстансе. Парный guard к
# rolling-restart-replicas (plaintext) — покрывает TLS-ветку дискриминатора day-2-гейта.
# Render-only, герметично. Roster — 2 хоста, probe-роль = slave.
#
# ★ Инвариант: дискриминатор TLS берётся из ИМЕНОВАННОГО поля РАЗВЁРНУТОГО
# incarnation.state.tls, НЕ из essence. create записал в state.tls операторское TLS-намерение
# (enable/port); day-2 restart обязан коннектиться плагином ПО TLS, иначе plaintext-коннект на
# TLS-инстанс провалит health-gate. state.tls.port — INTEGER (7379) → addr через string(...).
# tls_ca — PEM CA из vault(state.tls.ca_ref) (плагин ждёт PEM, не путь).
#
# Что ассертим:
#   1. probe (community.redis.role): tls=true, addr 127.0.0.1:7379 (НЕ plain 6379), tls_ca = PEM CA.
#   2. block-потомок health-gate (community.redis.replica-synced) с теми же TLS-params.
name: rolling-restart replicas over TLS reads tls-port from incarnation.state

fixtures:
  hosts:
    - sid: node-1.example.com
      covens: [restart]
      soulprint:
        network: { primary_ip: 10.0.0.1 }
        os: { arch: amd64 }
    - sid: node-2.example.com
      covens: [restart]
      soulprint:
        network: { primary_ip: 10.0.0.2 }
        os: { arch: amd64 }

  input:
    reason: "rolling restart over TLS for L0"

  # Развёрнутый incarnation.state с включённым TLS: state.tls несёт enable=true + port=7379.
  state:
    df_version: "1.39.0"
    tls:
      enable:   true
      only:     false
      port:     7379
      cert_ref: "secret/services/dragonfly/tls#cert"
      key_ref:  "secret/services/dragonfly/tls#key"
      ca_ref:   "secret/services/dragonfly/tls#ca"
    df_config:
      maxmemory:        "256mb"
      tls:              "true"
      tls_port:         "7379"
      tls_cert_file:    /etc/dragonfly/tls/dragonfly.crt
      tls_key_file:     /etc/dragonfly/tls/dragonfly.key
      tls_ca_cert_file: /etc/dragonfly/tls/ca.crt
      tls_replication:  "true"

  # Пароль (secret/dragonfly/restart#password) + PEM CA (по state.tls.ca_ref — day-2 резолвит vault()).
  vault:
    secret/dragonfly/restart:
      password: fixture-df-pass-16chars
    secret/services/dragonfly/tls:
      ca: "-----BEGIN CERTIFICATE-----\nCACERT\n-----END CERTIFICATE-----"

mocks:
  register:
    df_role:
      role: slave

assert:
  task_present:
    # probe (community.redis.role): ПО TLS (tls-порт из state.tls.port).
    - module: community.redis.role
      params_subset:
        addr: "127.0.0.1:7379"
        password: fixture-df-pass-16chars
        tls: true
        tls_ca: "-----BEGIN CERTIFICATE-----\nCACERT\n-----END CERTIFICATE-----"

    # slave-health-gate (community.redis.replica-synced) ПО TLS.
    - module: community.redis.replica-synced
      params_subset:
        addr: "127.0.0.1:7379"
        password: fixture-df-pass-16chars
        tls: true
        tls_ca: "-----BEGIN CERTIFICATE-----\nCACERT\n-----END CERTIFICATE-----"
