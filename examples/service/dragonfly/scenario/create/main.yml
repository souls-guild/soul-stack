name: create
description: >-
  Развернуть DragonFly в режиме sentinel (master-replica + sentinel-демон). Оператор задаёт
  ПРОСТЫЕ типизированные понятия (сколько памяти, eviction-политика, ACL-юзеры, реплики,
  TLS), а сценарий ТРАНСЛИРУЕТ их во flagfile dragonfly.conf. Граница:

    - простой слой = строго типизированный структурный `input:` ниже (Named Dict);
    - слой трансляции = тело сценария: данные-таблица (memory_reserve_percent) в essence;
      вычисление maxmemory — inline-CEL; слияние слоёв — CEL-функция merge() (SHALLOW
      last-wins, templating §2.3);
    - итоговый df_config рендерится в ПОЛНЫЙ flagfile at-CREATE (источник истины).

  ★ PILOT (D1, sentinel-only — БЕЗ диспетчера): ОДИН режим (sentinel; replicas_per_master=0
  даёт standalone-эквивалент: один master + sentinel-демон). cluster ВНЕ скоупа → нет
  conditional-include по режиму, тело прогона ИНЛАЙН в этом файле (install + render +
  внутрикластерный REPLICAOF + SENTINEL MONITOR + health-gates). Деплой-тело НЕ вынесено в
  service-level include (единственный потребитель — этот create; вынос оправдан, когда тело
  делят ≥2 сценария, как у redis create+migrate_cluster).

  ★ DragonFly vs redis: данные плоскости рендерит destiny `dragonfly` (flagfile вместо
  redis.conf); ЖИВОЙ рантайм — community.redis (DragonFly redis-совместим: PING/REPLICAOF/
  SENTINEL MONITOR/INFO replication работают — плагин БЕЗ правок). Без redis-модулей (.so),
  без cluster-директив, без persistence-пресетов (DF persistence — snapshot_cron, отложена).

  Пароли НЕ во входном контракте: лежат в Vault, резолвятся KEEPER-SIDE через CEL vault() в
  render-фазе (templating §2.3/§4) — на хост доезжает уже ЗНАЧЕНИЕ (ADR-012). Путь строится
  из доверенного контекста (incarnation), не из input.

# ── Входной контракт оператора (docs/input.md) ────────────────────────────────
# Простые типизированные понятия. Трансляция во flagfile — в compute ниже.
input:
  version:
    type: string
    # ОБЯЗАТЕЛЬНА ТОЛЬКО для install_method=package (required_when, input-only): distro-пин.
    # При install_method=binary версия бинаря — в essence.binary_version. install_method
    # имеет default:package → ВСЕГДА присутствует → required_when без has()-обвязки.
    required_when: "input.install_method == 'package'"
    pattern: "^([0-9]+:)?[0-9][A-Za-z0-9.~+-]*$"
    description: >-
      Версия distro-пакета dragonfly (distro-native пин). ОБЯЗАТЕЛЬНА при
      install_method=package. При install_method=binary НЕ используется (версия бинаря — в
      essence.binary_version).

  # ── install_method: способ установки DragonFly (default package) ──────────────
  # package (default) — distro-deb dragonfly; binary — upstream-tarball. URL/версия бинаря —
  # author-context (essence.binary_base_url/binary_version, оператор переопределяет в
  # spec.essence). compute собирает destiny-структуру install {method, base_url, version}.
  install_method:
    type: string
    required: false
    default: package
    enum: [package, binary]
    description: >-
      Способ установки DragonFly. package (default) — distro-deb dragonfly (=version-пин из
      input.version); binary — upstream-tarball (URL/версия из essence.binary_base_url/
      binary_version, имя файла dragonfly-<arch>.tar.gz строит destiny из soulprint.self.os.arch).

  memory_mb:
    type: integer
    required: false
    min: 64
    description: >-
      Бюджет памяти под DragonFly на хосте, МБ. maxmemory вычисляется как доля от него
      (essence.memory_reserve_percent — резерв под ОС) с ЦЕЛОЧИСЛЕННЫМ усечением. Нижний пол
      min:64 не случаен: при слишком малом memory_mb усечение даёт "0mb" (БЕЗ лимита). Не
      задан → директива maxmemory берётся из merge-подложки essence.df_config.

  # ★ maxmemory_policy ОТСУТСТВУЕТ во входе: у DragonFly НЕТ такого флага (нет ABSL_FLAG;
  # имя — производное INFO/CONFIG-поле от bool --cache_mode). Per-policy выбор (redis-имена
  # lru/lfu/…) DF не транслирует — eviction вне скоупа PILOT. Если потребуется eviction —
  # вводить boolean-вход поверх реального рычага --cache_mode отдельным слайсом, НЕ enum
  # redis-политик (их 7 из 8 схлопнулись бы в один cache_mode=true с потерей выбора).

  # ── Реплики на master (sentinel-режим) ───────────────────────────────────────
  # replicas_per_master — реплик master-а. roster прогона = 1 master + replicas_per_master
  # реплик (size-guard ниже). 0 (дефолт) — без реплик (standalone-эквивалент).
  replicas_per_master:
    type: integer
    required: false
    default: 0
    min: 0
    description: >-
      Реплик master-а. roster прогона = 1+replicas_per_master (один master + реплики master-
      а; sentinel-демон на каждом хосте). 0 (дефолт) — без реплик (standalone-эквивалент).
      size-guard сверяет состав roster-а.

  # ── Тайминги failover sentinel ───────────────────────────────────────────────
  sentinel_down_after_ms:
    type: integer
    required: false
    default: 5000
    min: 1
    description: >-
      Сколько мс master не отвечает, прежде чем sentinel считает его упавшим (директива
      sentinel down-after-milliseconds). Не задан → 5000.

  sentinel_failover_timeout_ms:
    type: integer
    required: false
    default: 60000
    min: 1
    description: >-
      Таймаут одной попытки failover, мс (директива sentinel failover-timeout). Не задан →
      60000.

  # ── operator-extra ACL — ТИПИЗИРОВАННЫЙ массив AclUser (types.yml, ADR-062 $type) ──
  users:
    type: array
    required: false
    items:
      $type: AclUser
    description: >-
      ACL-пользователи DragonFly (массив AclUser: {name, perms, state}). perms — ПОЛНАЯ ACL-
      строка (Redis ACL-синтаксис, DragonFly его принимает). Рендерятся в users.acl (destiny
      `dragonfly`); пароль каждого юзера резолвится keeper-side из Vault по конвенции
      secret/dragonfly/<incarnation>/users/<name>#password.

  # ── df_settings: passthrough-флаги dragonfly.conf (KEY→VALUE) ─────────────────
  # Произвольные DF-флаги (underscore-форма) поверх дефолтов/вычислений (last-wins). UI
  # рисует KEY→VALUE-редактор (ADR-045: object + скалярный value-тип → key→value-виджет).
  # ★ PILOT: имена DF-флагов НЕ валидируются version-каталогом (у redis есть redis_directives
  # из config.c; для DragonFly version-aware каталог флагов — отдельный слайс). Опечатка
  # проявится при старте DF на хосте, не на render. Это осознанное упрощение PILOT-а.
  df_settings:
    type: object
    required: false
    description: >-
      Passthrough-флаги dragonfly.conf от оператора (key→value, строки, DF-флаги underscore-
      форма). Перекрывают дефолты в итоговом merge (last-wins). Для флагов, не покрытых
      простыми полями выше. UI — KEY→VALUE-редактор. PILOT: имена не валидируются.
    properties: {}
    additional_properties:
      type: string

  # ── TLS — одна булева галочка ────────────────────────────────────────────────
  # tls_enabled — включить TLS (главный гейт). ★ DragonFly vs redis: TLS встаёт на ОСНОВНОЙ
  # --port (флаг --tls; tls_port у DF НЕТ — absl FATAL на неизвестном). Поэтому «оставить
  # plain отдельным портом» к DF неприменимо: TLS не открывает второй listener, а переводит
  # основной в TLS. Галки tls_keep_plain/«только-TLS» НЕТ (нет двух портов). Vault-пути PEM —
  # author-context (essence.tls_cert_ref/tls_key_ref/tls_ca_ref).
  tls_enabled:
    type: boolean
    required: false
    default: false
    description: >-
      Включить TLS DragonFly (главный гейт). false (дефолт) → TLS off. TLS встаёт на основной
      порт 6379 (у DragonFly нет отдельного tls-порта). Vault-пути cert/key/ca берутся из
      essence (tls_cert_ref/tls_key_ref/tls_ca_ref).

  # ── cloud-provision: поднять VM под топологию в том же прогоне (ADR-061, Вариант A) ─
  # ★ provision (образец redis, решение пользователя 2026-07-01: DragonFly cloud-provision
  # ПО ОБРАЗЦУ redis; provision обязателен в базовом create): object-вход «создай машины».
  # Когда enabled=true (ДЕФОЛТ, см. default-on ниже) — create ОДНИМ прогоном (а) создаёт VM
  # через core.cloud.created (on: keeper), (б) доставляет per-VM bootstrap-токен по SSH,
  # (в) регистрирует созданные SID + БЛОКИРУЮЩЕ ждёт онбординга (core.soul.registered
  # await_online + refresh_soulprint, ADR-061), после чего roster пере-резолвится и
  # sentinel-тело катит DragonFly-роль на уже-online хосты.
  # enabled=false — dragonfly-provision.yml не таргетит никого, прогон работает по
  # СУЩЕСТВУЮЩЕМУ roster-у (deploy на существующие souls — прежний профиль сервиса).
  #
  # ★ provider/profile/await_timeout/ssh_provider оператор может НЕ задавать — они
  # фоллбэкают на essence.provision_* (dragonfly-provision.yml: default(input.provision.X,
  # essence.provision_X)). По умолчанию оператор НЕ выбирает их вручную (форма скрыта).
  #
  # ★ FORM: provision НАМЕРЕННО НЕ в form.sections (симметрия redis) — секция скрыта из
  # Run-формы. soul-lint эмитит form_field_uncovered WARNING на это поле (UI дорисует в
  # дефолтную секцию) — это ОЖИДАЕМО, не error.
  #
  # ★ node_count тут НЕТ намеренно: число VM выводится из ТОПОЛОГИИ sentinel
  # (1+replicas_per_master) — единственный источник истины размера кластера. Отдельное
  # node_count рассинхронилось бы с size-guard (assert size(soulprint.hosts) == та же формула).
  # ★ teardown (destroy) — НЕ здесь (отдельный сценарий, cascade core.cloud.destroyed).
  provision:
    type: object
    required: false
    # ★ DEFAULT-ON (образец redis): provision ВКЛЮЧЁН по умолчанию. top-level default объекта
    # = {enabled: true} → оператор, НЕ передавший секцию provision, получает cloud-create
    # (штатный путь create — поднять VM под топологию). Чтобы катить на ГОТОВЫЙ roster без
    # provision, оператор задаёт provision: {enabled: false} ЯВНО. Дефолт продублирован на
    # вложенном enabled (плоский mergeInputDefaults не спускается в properties частично
    # заданного объекта — дубль держит семантику «по умолчанию on» читаемой единообразно).
    default:
      enabled: true
    description: >-
      Поднять VM под топологию в том же create-прогоне (ADR-061). enabled=true →
      сначала cloud-create + онбординг (барьер await_online), потом DragonFly-роль на
      созданные хосты. enabled=false → прогон по существующему roster-у.
    additional_properties: false
    properties:
      enabled:
        type: boolean
        default: true
        description: Главный гейт provision. ДЕФОЛТ true (default-on). false — dragonfly-provision.yml не таргетит никого.
      provider:
        type: string
        description: >-
          Имя cloud-Provider в реестре providers (NOT plugin name → soul-cloud-<provider>).
          Не задан → essence.provision_provider.
      profile:
        type: string
        description: >-
          Имя VM-профиля в реестре profiles (ресурсы/образ/сеть VM). Не задан →
          essence.provision_profile.
      await_timeout:
        type: string
        pattern: "^[0-9]+[smh]$"
        description: >-
          Верхняя граница ожидания онбординга созданных VM (барьер await_online,
          ADR-061; форма <N>{s|m|h}). Не задан → essence.provision_await_timeout (дефолт
          10m). Ограничен сверху keeper.yml::max_await_timeout.
      join_wait_timeout:
        type: string
        pattern: "^[0-9]+[smh]$"
        description: >-
          Потолок ожидания появления свежесозданной VM в Teleport перед доставкой
          токена (core.bootstrap.delivered, retry-до-join; форма <N>{s|m|h}). Не задан →
          essence.provision_join_wait_timeout (дефолт 15m).
      ssh_provider:
        type: string
        description: >-
          Имя SshProvider-плагина (keeper.yml::plugins.ssh_providers[].name) для
          доставки per-VM bootstrap-токена по SSH (core.bootstrap.delivered, ADR-063).
          Не задан → essence.provision_ssh_provider.

# ── Презентационный слой формы (form:) ────────────────────────────────────────
form:
  sections:
    - key: mode
      title: "Установка"
      description: "Способ установки DragonFly"
      fields:
        - { name: install_method, label: "Способ установки" }
        - name: version
          label: "Версия пакета (distro-пин)"
          hint: "Distro-native пин (=version). Обязательно при способе установки «package»; для «binary» версия и URL бинаря задаются в essence."

    - key: resources
      title: "Память"
      fields:
        - name: memory_mb
          label: "Бюджет памяти, МБ"
          placeholder: "1024"
          hint: "Бюджет памяти под DragonFly. maxmemory вычисляется как доля от него (минус резерв ОС). Не задан → maxmemory из подложки essence."

    - key: topology
      title: "Топология (sentinel)"
      description: "Реплики и тайминги Sentinel"
      collapsed: true
      fields:
        - name: replicas_per_master
          label: "Реплик на master"
          placeholder: "0"
          hint: "0 = один master без реплик (standalone-эквивалент)."
        - name: sentinel_down_after_ms
          label: "down-after, мс"
          placeholder: "5000"
          hint: "Сколько мс master не отвечает, прежде чем sentinel считает его упавшим. Не задан → 5000."
        - name: sentinel_failover_timeout_ms
          label: "failover-timeout, мс"
          placeholder: "60000"
          hint: "Таймаут одной попытки failover. Не задан → 60000."

    - key: security
      title: "ACL и TLS"
      fields:
        - { name: users, label: "ACL-пользователи" }
        - { name: tls_enabled, label: "Включить TLS" }

    - key: advanced
      title: "Дополнительно"
      collapsed: true
      fields:
        - { name: df_settings, label: "Passthrough-флаги dragonfly.conf" }

# ── Декларативные input-инварианты (validate:, INPUT-ONLY) ────────────────────
# ★ Инварианта «хотя бы один listener» НЕТ: у DragonFly TLS встаёт на ОСНОВНОЙ --port (не
# открывает второй порт), поэтому «выключить TLS и закрыть plain» невыразимо — основной порт
# слушает всегда (plain при tls_enabled=false, TLS при tls_enabled=true). См. tls_enabled выше.
validate:
  # system-ACL-users guard (редизайн default_admin): operator-extra (input.users) НЕ может
  # занять имя СЛУЖЕБНОГО юзера (default_admin/replica/monitoring/sentinel/haproxy доливаются
  # из essence last-wins ПОВЕРХ → operator с тем же именем молча перекрыл бы служебные perms;
  # operator `default_admin` подменил бы admin-учётку внутрикластерного AUTH). INPUT-ONLY
  # (essence в validate недоступен): список зарезервированных захардкожен. .all() над массивом
  # AclUser, имя — поле u.name. ★ `default` из reserved УБРАН (встроенный default больше НЕ
  # системный — его роль занял default_admin; оператор может объявить default в input.users).
  - that: "!has(input.users) || input.users.all(u, !(u.name in ['default_admin', 'replica', 'monitoring', 'sentinel', 'haproxy']))"
    message: "имя ACL-пользователя зарезервировано за служебным (default_admin/replica/monitoring/sentinel/haproxy): выбери другое имя — служебные юзеры заводятся автоматически из essence"

# ── Вычисляемые scenario-vars (compute:) ──────────────────────────────────────
# compute: резолвится KEEPER-SIDE ОДИН раз на прогон в рун-уровневом контексте (input/
# essence/incarnation — БЕЗ soulprint, барьер host-инвариантности) и виден как compute.<name>
# в apply.input тела И в state_changes. Снимает дублирование merge()-перевода: объявлен ЗДЕСЬ
# ОДИН раз, тело и state ссылаются ${ compute.df_config }.
#
# ★ ГРАНИЦА КОНФИГА: host-layout-флаги --dir (snapshot, → data_dir) и --aclfile (→ conf_dir)
# задаёт destiny-ШАБЛОН dragonfly.flags.tmpl ИЗ vars, НЕ этот compute. TLS-флаги
# (tls_cert_file/tls_key_file/tls_ca_cert_file) выводятся из compute.conf_dir (destiny кладёт
# PEM в ${conf_dir}/tls/ — flagfile обязан смотреть ТУДА ЖЕ).
compute:
  # ── admin_user: имя СИСТЕМНОГО ACL-юзера внутрикластерного AUTH (default_admin) ──
  # ★ РЕДИЗАЙН default_admin (симметрия redis 2026-06-30): ЕДИНЫЙ источник имени admin-юзера,
  # под которым идёт ВСЯ внутрикластерная аутентификация (репликация masterauth, sentinel
  # monitor/auth, health-PING) — заменил прежний requirepass DragonFly. Деплой-тело читает
  # compute.admin_user в плагин-вызовах community.redis.* (username/auth_user) и в Vault-пути
  # его пароля. Литерал (не из input/essence): имя системного юзера — инвариант сервиса, не
  # операторский выбор. Пароль default_admin — secret/dragonfly/<inc>/users/default_admin#password.
  admin_user: "${ 'default_admin' }"
  # Эффективная версия DragonFly: package → input.version (required_when=package);
  # binary → essence.binary_version. Объявлена ОДИН раз (state + плагин читают её).
  df_version: "${ input.install_method == 'binary' ? default(essence.binary_version, '') : (has(input.version) ? input.version : '') }"
  # Версия sentinel-ДЕМОНА (distro redis-sentinel, НЕ DragonFly) для version-гейта плагина
  # community.redis.sentinel. SEMVER (X.Y.Z) — versionGE 7.0.0. essence-pinned (sentinel —
  # отдельный продукт, версия не зависит от df_version). default ловит отсутствие листа.
  sentinel_redis_version: "${ default(essence.sentinel_redis_version, '7.2.4') }"
  # Distro-пин ПАКЕТА redis-server (несёт redis-sentinel), уходит в apply.input.version
  # второго apply:destiny:redis (sentinel_only). ★ ОТДЕЛЬНО от sentinel_redis_version выше:
  # это apt-форма с опциональным epoch/ревизией (5:7.0.15-1~deb12u7), а та — SEMVER для
  # version-gate плагина. Два РАЗНЫХ формата → два compute-var. essence-pinned; default ловит
  # отсутствие листа (back-compat essence старого ref).
  sentinel_redis_package_version: "${ default(essence.sentinel_redis_package_version, '5:7.0.15-1~deb12u7') }"
  # Per-master sentinel-директивы (тайминги failover): map `sentinel <opt> <master>` →
  # значение. Шаблон sentinel.conf.tmpl range-ит, плагин community.redis.sentinel classifyConfig
  # раскладывает per-master → SENTINEL SET. ОДИН source-of-truth (стартовый конфиг + live).
  sentinel_directives: >-
    ${ {
         'sentinel down-after-milliseconds ' + default(essence.sentinel_master_name, 'master'): string(int(input.sentinel_down_after_ms)),
         'sentinel failover-timeout '         + default(essence.sentinel_master_name, 'master'): string(int(input.sentinel_failover_timeout_ms))
       } }
  # install: destiny-структура {method, base_url, version} из install_method + essence.binary_*.
  # method всегда; base_url/version при method=binary. Та же структура в destiny (apply.input.
  # install) и state.
  install: >-
    ${ (input.install_method == 'binary')
         ? {
             'method':   'binary',
             'base_url': default(essence.binary_base_url, ''),
             'version':  default(essence.binary_version, '')
           }
         : { 'method': 'package' } }
  # Эффективный host-layout: conf_dir/data_dir из essence (author-context, host-инвариант).
  # ★ TLS-флаги flagfile следуют conf_dir: destiny кладёт PEM в ${conf_dir}/tls/.
  conf_dir: "${ default(essence.conf_dir, '/etc/dragonfly') }"
  data_dir: "${ default(essence.data_dir, '/var/lib/dragonfly') }"
  # ★ ЛОКАЛЬНЫЙ адрес инстанса — UNIX-СОКЕТ (НЕ 127.0.0.1:port). DF при --bind=primary_ip НЕ
  # слушает loopback, локальные вызовы плагина (health-gate, REPLICAOF свой addr, ACL LOAD)
  # идут на сокет ${run_dir}/dragonfly.sock (тот же путь, что флаг --unixsocket в шаблоне).
  # Плагин community.redis понимает unix:-префикс адреса. run_dir host-инвариант (vars destiny;
  # default дублирует дефолт /var/run/dragonfly — scenario не видит destiny-vars). Сокет БЕЗ
  # TLS (локальный UDS) → у локальных вызовов tls/tls_ca НЕ ставим даже на TLS-инстансе.
  local_addr:  "${ 'unix:' + default(essence.run_dir, '/var/run/dragonfly') + '/dragonfly.sock' }"
  # TLS: одна галочка + essence. tls_on = tls_enabled (главный гейт). ★ У DragonFly TLS встаёт
  # на основной --port (нет tls_port, нет «только-TLS» — основной порт слушает всегда). Vault-
  # refs — из essence (default() ловит отсутствие листа; L0-кейсы без TLS их не задают).
  tls_on:      "${ input.tls_enabled }"
  tls_cert_ref: "${ has(essence.tls_cert_ref) ? essence.tls_cert_ref : '' }"
  tls_key_ref:  "${ has(essence.tls_key_ref)  ? essence.tls_key_ref  : '' }"
  tls_ca_ref:   "${ has(essence.tls_ca_ref)   ? essence.tls_ca_ref   : '' }"
  # df_config — ИТОГ трансляции простого ввода во flagfile-map (DF-флаги, underscore-форма).
  # Слои merge (SHALLOW last-wins, слева направо): essence.df_config (дефолты) → вычисленный
  # maxmemory (has-guard) → input.df_settings (passthrough) → TLS-блок (после passthrough —
  # оператор не ломает TLS). БЕЗ persistence-пресета (DF persistence отложена), БЕЗ cluster-
  # директив (sentinel-only). ★ maxmemory_policy НЕ в merge: у DF нет такого флага (absl
  # FATAL на неизвестном) — eviction вне скоупа PILOT.
  # ★ TLS-блок — DF-флаги: tls/tls_cert_file/tls_key_file/tls_ca_cert_file/tls_replication
  # (underscore!). Bool-флаги (tls/tls_replication) — значение 'true' (absl принимает --flag=
  # true). ★ tls_port НЕТ (у DragonFly нет такого флага — absl FATAL); TLS встаёт на основной
  # --port, второй порт не открывается → ни tls_port, ни `--port=0`.
  df_config: >-
    ${ merge(
         essence.df_config,
         has(input.memory_mb)
           ? { 'maxmemory': string(int(input.memory_mb) * int(essence.memory_reserve_percent) / 100) + 'mb' }
           : {},
         default(input.df_settings, {}),
         compute.tls_on
           ? {
               'tls':                'true',
               'tls_cert_file':      compute.conf_dir + '/tls/dragonfly.crt',
               'tls_key_file':       compute.conf_dir + '/tls/dragonfly.key',
               'tls_ca_cert_file':   compute.conf_dir + '/tls/ca.crt',
               'tls_replication':    'true'
             }
           : {}
       ) }

# ── Мутация incarnation.state ─────────────────────────────────────────────────
# После успешного apply Keeper фиксирует развёрнутое (ADR-009 §7.1, ADR-057 list-форма).
# df_config — тот же compute.df_config, что ушёл в render: повторный apply и операционные сценарии видят
# один источник истины.
state_changes:
  - set: df_version
    value: "${ compute.df_version }"
  - set: df_config
    value: "${ compute.df_config }"
  # tls: тот же compute.tls_* (cert/key/ca — Vault-ПУТИ, не PEM). ★ БЕЗ only/port: у DragonFly
  # TLS на основном порту (нет tls_port, нет «только-TLS») — операционный сценарий коннектится по сокету.
  - set: tls
    value: >-
      ${ {
           'enable':   compute.tls_on,
           'cert_ref': compute.tls_cert_ref,
           'key_ref':  compute.tls_key_ref,
           'ca_ref':   compute.tls_ca_ref
         } }
  # ★ install + host-layout (conf_dir/data_dir) вынесены в essence (v1→v2, Вариант A):
  # install — read-model без читателей, layout — операционные сценарии читают essence напрямую
  # (default(essence.<x>, '<деф>')). Их set-ов больше нет — ключей нет в state_schema,
  # set писал бы поле вне схемы → валидация state упала бы.
  - set: memory_mb
    value: "${ int(default(input.memory_mb, 0)) }"
  - set: sysctl_settings
    value: "${ default(essence.sysctl_settings, {}) }"
  # monitoring: read-model ФАКТА развёрнутого node_exporter (Слайс II, ADR-024; симметрия
  # install/tls read-model). Версия/порт — из essence.node_exporter_* (те же значения, что
  # уходят в apply.input destiny node-exporter). ★ node-exporter-ONLY (DragonFly отдаёт метрики
  # нативно) — redis_exporter-полей тут нет. Дефолты дублируют essence/миграцию 004_to_005.
  - set: monitoring
    value: >-
      ${ {
           'node_exporter_version': default(essence.node_exporter_version, ''),
           'node_exporter_listen':  default(essence.node_exporter_listen, ':9100')
         } }
  # logging: read-model ФАКТА развёрнутого log-shipping (Слайс V-I, ADR-067; симметрия monitoring).
  # Версия/sink_type/endpoint/log_sources — из essence.vector_* (те же значения, что уходят в
  # apply.input destiny vector). ★ vector_sink_auth_ref СЮДА НЕ пишется — секрет (в Vault, как
  # tls.*_ref). Дефолты дублируют essence/миграцию 005_to_006 (console — безопасный дефолт).
  - set: logging
    value: >-
      ${ {
           'vector_version':       default(essence.vector_version, ''),
           'vector_sink_type':     default(essence.vector_sink_type, 'console'),
           'vector_sink_endpoint': default(essence.vector_sink_endpoint, ''),
           'vector_log_sources':   default(essence.vector_log_sources, [])
         } }
  # Топология: replicas (реплик master-а), sentinel_quorum=0 (auto, не материализуется).
  - set: replicas
    value: "${ int(default(input.replicas_per_master, 0)) }"
  - set: sentinel_quorum
    value: "${ 0 }"
  # df_users — массив AclUser как есть (пароли НЕ в state, Vault).
  - set: df_users
    value: "${ default(input.users, []) }"
  # df_hosts пустой: state_changes рендерятся per-host с soulprint.SELF (AllowHosts=false,
  # orchestration §7.1) — roster soulprint.hosts недоступен. Точные declared-роли — в
  # apply.input.sentinel, не в state.
  - set: df_hosts
    value: "${ [] }"
  # df_sentinel: факты monitored master. master_name из essence; quorum=0 (auto); master_ip
  # не пишется (host-вариативен); тайминги failover из input.
  - set: df_sentinel
    value: >-
      ${ {
           'master_name':         default(essence.sentinel_master_name, 'master'),
           'quorum':              0,
           'down_after_ms':       int(input.sentinel_down_after_ms),
           'failover_timeout_ms': int(input.sentinel_failover_timeout_ms)
         } }

  # ── cloud-provision read-model (ADR-061, Вариант A) ──────────────────────────
  # ФАКТ «эти VM подняты ЭТИМ create-прогоном». ★ GUARD по input.provision (НЕ
  # has(register.provision)!): на non-provision-прогоне dragonfly-provision.yml не таргетит
  # никого → шага core.cloud.created нет → register.provision не существует → has(register
  # .provision) дал бы no-such-key В САМОМ предикате. Гейт — input.provision (object-вход,
  # has()-safe): задан И enabled → читаем register.provision (создан шагом (а)); иначе [] / ''
  # (хосты не провиженные сервисом). Тернар короткозамыкает — register.provision.* не трогается
  # на non-provision-пути. Зеркало redis covenant.yml provisioned_* state_changes.
  - set: provisioned_vm_ids
    value: >-
      ${ (has(input.provision) && input.provision.enabled)
           ? register.provision.vm_ids
           : [] }
  # provisioned_sids: SID (FQDN) созданных VM — для cascade-destroy teardown
  # (souls→destroyed/seeds→orphaned/tokens→burned; Reaper НЕ снимает pending-VM-souls).
  # Тот же GUARD по input.provision, что vm_ids/provider. sids собираются из
  # register.provision.hosts[].sid (.map — то же выражение, что params.sid шага (в)
  # core.soul.registered в dragonfly-provision.yml). Иначе [] (хосты не провиженные сервисом).
  - set: provisioned_sids
    value: >-
      ${ (has(input.provision) && input.provision.enabled)
           ? register.provision.hosts.map(h, h.sid)
           : [] }
  # provisioned_provider — ФАКТ-провайдер созданных VM. provider читается как
  # default(input.provision.provider, essence.provision_provider): оператор обычно НЕ задаёт
  # provider (форма provision скрыта, default-on) → фоллбэк на essence.provision_provider
  # (симметрия с dragonfly-provision.yml::core.cloud.created.params.provider). Гейт
  # input.provision (has()-safe) держит non-provision-путь: enabled=false → '' (VM не провижены).
  - set: provisioned_provider
    value: >-
      ${ (has(input.provision) && input.provision.enabled)
           ? default(input.provision.provider, essence.provision_provider)
           : '' }

# ── Тело прогона (ИНЛАЙН, sentinel-only — без диспетчера/include) ──────────────
tasks:
  # ── Генерация паролей в Vault ПЕРЕД любым чтением секретов (core.vault.kv-present) ──
  # ★ ГЕНЕРАЦИЯ СЕКРЕТОВ СЕРВИСОМ (симметрия redis 2026-06-28): оператор НЕ пред-сеет пароли
  # в Vault — create САМ генерит недостающие крипто-случайно (generate-if-absent). Шаг
  # keeper-side (on: keeper, core.vault.kv-present): для каждого target читает путь и, если
  # поля нет — пишет crypto/rand-значение по policy; есть — no-op (НЕ перезатирает, ротация —
  # отдельный сценарий). changed=true только при реальной генерации.
  #
  # ★★ PASSAGE-ИНВАРИАНТ: этот шаг ОБЯЗАН исполниться (запись в Vault) ДО render-фазы задач,
  # читающих те же секреты через ${ vault(...) } (apply dragonfly + apply redis sentinel +
  # community.redis.*). Модель staged-render (ADR-056): passage N applies ДО render passage
  # N+1. vault() в render с отсутствующим секретом РВЁТ render, поэтому generate ОБЯЗАН быть в
  # БОЛЕЕ РАННЕМ passage. Шаг — `on: keeper` БЕЗ roster-зависимости → Stratify держит его в
  # passage 0; read-задачи деплоя читают roster (soulprint.hosts/soulprint.self) → passage > 0.
  #
  # targets ВЫЧИСЛЯЮТСЯ из ТОГО ЖЕ essence/input, что и read-задачи (drift «что генерим ≡ что
  # читаем» = баг, список юзеров НЕ хардкодится): union ключей system_acl_users ∪
  # system_acl_users_sentinel (default_admin в НИХ) + operator-extra input.users. policy
  # alphanumeric/32 (ACL-safe). ★ БЕЗ главного secret/dragonfly/<inc>#password — requirepass
  # убран (редизайн default_admin), admin-учётка теперь default_admin (в наборах).
  - name: Ensure dragonfly passwords exist in Vault (generate if absent)
    on: keeper
    module: core.vault.kv-present
    params:
      policy:
        length: 32
        charset: alphanumeric
      targets: "${ merge(default(essence.system_acl_users, {}).map(n, { n: 0 }) + default(essence.system_acl_users_sentinel, {}).map(n, { n: 0 })).map(name, { 'path': 'secret/dragonfly/' + incarnation.name + '/users/' + name, 'field': 'password' }) + (has(input.users) ? input.users.map(u, { 'path': 'secret/dragonfly/' + incarnation.name + '/users/' + u.name, 'field': 'password' }) : []) }"

  # ── provision (ADR-061, Вариант A): cloud-create + онбординг ПЕРЕД деплоем ─────
  # CONDITIONAL-INCLUDE dragonfly-provision.yml СТРОГО ПЕРЕД size-guard и деплоем: при
  # enabled=true его шаги (а) создают VM, (в) регистрируют+ждут онбординга с
  # refresh_soulprint → roster пере-резолвится, и ТОЛЬКО потом size-guard/деплой видят
  # созданные хосты в soulprint.hosts. ★ ОБЩЕЕ PROVISION-ТЕЛО service-level
  # (scenario/dragonfly-provision.yml): scenario-include фоллбэкает имя файла на
  # service-level (orchestration.md §6). when по input.provision — статический (только
  # input.*, без register/soulprint) → group-drop include-when: на enabled=false/опущенной
  # секции всё provision-тело (вкл. NIM-58 name-guard) выброшено из плана. has()-guard — секция
  # опциональна (no-such-key без неё).
  #
  # ★★ ПОРЯДОК provision→size-guard: size-guard читает soulprint.hosts (roster-потребитель),
  # provision-тело несёт core.soul.registered с refresh_soulprint:true (refresh-эмиттер) →
  # Stratify уводит size-guard/деплой в passage СТРОГО ПОСЛЕ онбординга (roster-refresh ребро).
  # На enabled=false провижена нет — size-guard сверяет ИСХОДНЫЙ declared-roster. ★ teardown НЕ здесь.
  - include: dragonfly-provision.yml
    when: "has(input.provision) && input.provision.enabled"

  # ── 0. SIZE-GUARD (топология) — keeper-side render-time assert ────────────────
  # Размер roster-а ОБЯЗАН быть ровно 1+replicas_per_master (один master + реплики; sentinel-
  # демон на КАЖДОМ хосте). Иначе master-election (run_once по sort soulprint.hosts) и
  # SENTINEL MONITOR/REPLICAOF разъедутся с declared-топологией. Предикат вычисляется
  # KEEPER-SIDE на РЕНДЕРЕ (soulprint.hosts доступен). false ОБРЫВАЕТ render с message ДО
  # установки. ★ assert (не validate): нужен soulprint.hosts (roster), validate INPUT-ONLY.
  - name: Guard sentinel roster size matches replicas
    assert:
      that:
        - "size(soulprint.hosts) == 1 + int(input.replicas_per_master)"
      message: "число хостов roster-а прогона должно быть ровно 1+replicas_per_master (один master + реплики master-а; sentinel-демон на каждом хосте) — задай столько же таргетированных souls, сколько узлов в объявленной топологии"

  # ── 1. Per-host install + render flagfile + users.acl + sentinel.conf + units ──
  # destiny `dragonfly` (режим-агностична) с sentinel_enabled=true. config — базовый merge
  # (БЕЗ cluster-директив). compute.df_config host-инвариантен → apply.input.
  - name: Apply dragonfly destiny (install + render dragonfly.conf/users.acl/sentinel.conf + systemd)
    apply:
      destiny: dragonfly
      input:
        # version: distro-пин (package). При binary версия бинаря — в essence.binary_version
        # (compute.df_version); destiny не ставит distro-deb → has()-guard ''.
        version:  "${ has(input.version) ? input.version : '' }"
        install:  "${ compute.install }"
        conf_dir: "${ compute.conf_dir }"
        data_dir: "${ compute.data_dir }"
        # ★ РЕДИЗАЙН default_admin: input.password УБРАН (requirepass убран из flagfile).
        # Аутентификация — под системным default_admin, его пароль приходит в users ниже.
        # Единый compute.df_config (тот же map, что в state_changes.df_config — drift снят
        # самим compute). Базовый merge (БЕЗ cluster; tls/tls_replication true при TLS — TLS
        # на основном порту, БЕЗ tls_port). HOST-ИНВАРИАНТ → apply.input.
        #
        # ★ РЕДИЗАЙН default_admin: СТАТИЧЕСКАЯ replica→master AUTH во flagfile — masteruser/
        # masterauth ДОЛИВАЮТСЯ в config ОБЫЧНЫМИ флагами (поверх compute.df_config). КРИТИЧНО
        # для ПЕРСИСТЕНТНОСТИ через рестарт: плагин community.redis.replica (шаг 3) ставит их
        # CONFIG SET-ом в рантайме, но CONFIG SET НЕ сохраняется → при рестарте DragonFly
        # поднялся бы без masterauth → replica master_link_status:DOWN. Статический флаг во
        # flagfile переживает рестарт. Директивы host-ИНВАРИАНТНЫ (один default_admin на
        # кластер) → apply.input. ★ ОТЛИЧНО от state_changes.df_config: там ЧИСТЫЙ compute.df_config
        # БЕЗ masterauth — пароль НЕ уезжает в state (секрет в Vault). masterauth — vault()-В-
        # ЯЧЕЙКЕ (seal-маскинг). admin_user = default_admin; путь — secret/dragonfly/<inc>/users/
        # default_admin#password. Имена флагов DF — underscore-форма (masteruser/masterauth —
        # одно слово, совпадает с redis).
        config: >-
          ${ merge(compute.df_config, {
               'masteruser': compute.admin_user,
               'masterauth': vault('secret/dragonfly/' + incarnation.name + '/users/' + compute.admin_user + '#password')
             }) }
        # ★ СИСТЕМНЫЕ + operator-extra ACL: служебные default_admin/replica/monitoring/sentinel/
        # haproxy из essence.system_acl_users ПЕРВЫМИ, operator-extra (input.users — массив
        # AclUser) ПОВЕРХ (last-wins). ★ default_admin (редизайн) — СИСТЕМНЫЙ юзер полного
        # доступа (~* &* +@all): под ним идёт внутрикластерный AUTH (заменил requirepass). Без
        # системных репликация (replica), sentinel↔df AUTH (sentinel) и admin-коннект
        # (default_admin) сломаются. Vault-пароль — secret/dragonfly/<inc>/users/<name>#password.
        # operator-extra: .map(u, {u.name: …}).
        users: >-
          ${ merge(
               merge(default(essence.system_acl_users, {}).map(name, {
                 name: {
                   'perms':    essence.system_acl_users[name],
                   'state':    'on',
                   'password': vault('secret/dragonfly/' + incarnation.name + '/users/' + name + '#password')
                 }
               })),
               has(input.users)
                 ? merge(input.users.map(u, {
                     u.name: {
                       'perms':    u.perms,
                       'state':    u.state,
                       'password': vault('secret/dragonfly/' + incarnation.name + '/users/' + u.name + '#password')
                     }
                   }))
                 : {}
             ) }
        # Host-tuning extras (THP/logrotate/sysctl БЕЗУСЛОВНЫ). sysctl_settings — essence,
        # host-инвариант → apply.input.
        sysctl_settings:  "${ default(essence.sysctl_settings, {}) }"
        # TLS — единый dict. enable — compute-var (галочка). ★ БЕЗ only/port: у DragonFly TLS
        # на основном порту (нет tls_port, нет «только-TLS»). cert_ref/key_ref/ca_ref — Vault-
        # ПУТИ (destiny читает PEM через vault() в ячейке, seal-маскинг); refs из essence.tls_*_ref.
        tls:
          enable:   "${ compute.tls_on }"
          cert_ref: "${ compute.tls_cert_ref }"
          key_ref:  "${ compute.tls_key_ref }"
          ca_ref:   "${ compute.tls_ca_ref }"
        # ★ sentinel-демон БОЛЬШЕ НЕ ставит destiny `dragonfly` (sentinel_enabled/sentinel/
        # sentinel_users УБРАНЫ): DragonFly не несёт redis-sentinel, а distro-демон полностью
        # разворачивает destiny `redis` (sentinel_only-capability, ОТДЕЛЬНЫЙ apply — шаг 1b
        # ПОСЛЕ health-gate DF). Этот apply теперь ставит ТОЛЬКО data-плоскость DragonFly.

  # ── 2. Health-gate per-host: PING живого DragonFly после старта ───────────────
  # community.redis.command (DragonFly redis-совместим). Каждый узел обязан ответить ДО
  # привязки реплик/настройки sentinel. ★ ЛОКАЛЬНЫЙ коннект — через UNIX-СОКЕТ
  # (compute.local_addr): DF при --bind=primary_ip НЕ слушает 127.0.0.1, а сокет — отдельный
  # UDS-listener (всегда доступен локально). UDS без TLS (anti-downgrade неприменим — это не
  # сетевой путь, AUTH-пароль не уходит в сеть): tls/tls_ca НЕ ставим даже на TLS-инстансе.
  - name: Wait for each dragonfly node to answer PING
    module: community.redis.command
    retry: { count: 10, delay: 3s }
    params:
      addr:     "${ compute.local_addr }"
      # ★ РЕДИЗАЙН default_admin: AUTH под default_admin (requirepass убран). username + его
      # пароль из ветки secret/dragonfly/<inc>/users/default_admin#password. Локальный UDS без
      # TLS (не сетевой путь) — tls/tls_ca НЕ ставим даже на TLS-инстансе.
      username: "${ compute.admin_user }"
      password: "${ vault('secret/dragonfly/' + incarnation.name + '/users/' + compute.admin_user + '#password') }"
      args:     ["PING"]

  # ── 2b. Sentinel-плоскость через destiny `redis` (sentinel_only-capability, REUSE) ─
  # ★ ПЕРЕИСПОЛЬЗОВАНИЕ destiny `redis` (две apply:destiny в одном сценарии, ADR-009): вместо
  # ДУБЛИКАТА sentinel-задач в destiny `dragonfly` (sentinel.conf/redis-sentinel.service/
  # sentinel-users.acl) поднимаем sentinel-демон ТЕМ ЖЕ кирпичом, что redis — destiny `redis`
  # в режиме sentinel_only (deploy_redis=false → data-плоскость redis-server НЕ разворачивается,
  # только sentinel-демон над ВНЕШНИМ master-ом, которым здесь служит DragonFly). DragonFly
  # redis-совместим на проводе → sentinel мониторит его как обычный redis-master.
  #
  # ★ ПОРЯДОК: ПОСЛЕ health-gate DF (PING) — DragonFly-master уже жив и отвечает, sentinel-
  #   демон ставится над работающим master-ом. SENTINEL MONITOR (шаг 4) идёт ещё позже —
  #   после REPLICAOF реплик.
  #
  # ★ КОНТРАКТ sentinel_only destiny `redis`: install.yml ставит пакет redis (несёт redis-
  #   sentinel) БЕЗУСЛОВНО; server.yml (data-плоскость) gated deploy_redis → group-drop при
  #   false; sentinel.yml gated sentinel_enabled → активна. Пути sentinel-демона (юзер redis,
  #   /var/lib/redis state) — дефолт destiny `redis`; data_dir НЕ передаём (R1: дефолт
  #   /var/lib/redis под redis-юзером — sentinel пишет state туда, не в DragonFly /var/lib/dragonfly).
  # ★ version (R4): distro-пин ПАКЕТА redis-server (essence.sentinel_redis_package_version,
  #   apt-форма с epoch). required_when destiny `redis` истинно (install.method=package по
  #   умолчанию) → version обязателен ДАЖЕ при deploy_redis=false (пакет ставится всегда).
  # ★ РЕДИЗАЙН default_admin (R3 переработан): input.password УДАЛЁН из destiny `redis` —
  #   sentinel-демон коннектится к DragonFly-master под ACL-юзером default_admin (auth_user/
  #   auth_pass в sentinel-блоке), а connection-AUTH к самому :26379 — под default_admin из
  #   sentinel-набора (sentinel_users.default_admin). Прежний тернар «default → главный секрет»
  #   УБРАН — все системные по ЕДИНОЙ ветке secret/dragonfly/<inc>/users/<name>#password.
  - name: Apply redis destiny in sentinel_only mode (sentinel daemon monitoring the DragonFly master)
    apply:
      destiny: redis
      input:
        # sentinel_only: НЕ разворачиваем data-плоскость redis-server (только sentinel-демон).
        deploy_redis: false
        sentinel_enabled: true
        # distro-пин ПАКЕТА redis-server (несёт redis-sentinel). apt-форма с epoch — ОТДЕЛЬНО
        # от sentinel_redis_version (semver version-gate плагина). required при package-install.
        version:  "${ compute.sentinel_redis_package_version }"
        sentinel:
          # master_name — то же логическое имя monitored master, что DF-плоскость.
          master_name: "${ default(essence.sentinel_master_name, 'master') }"
          # master-election: первый по SID хост = master (DragonFly-инстанс). HOST-ИНВАРИАНТНО.
          master_ip:   "${ soulprint.hosts[0].network.primary_ip }"
          master_port: 6379
          # quorum — АВТО (большинство): size(soulprint.hosts)/2+1. Считается ИНЛАЙН в apply.input
          # (НЕ из compute — compute не видит soulprint, барьер host-инвариантности).
          quorum:      "${ int(size(soulprint.hosts)) / 2 + 1 }"
          # ★ РЕДИЗАЙН default_admin: sentinel AUTH на DragonFly-master — под ACL-юзером
          # default_admin (requirepass убран). auth_user + auth_pass рендерятся в sentinel.conf
          # (sentinel auth-user/auth-pass <master>). Без auth_user sentinel пошёл бы под
          # built-in default (теперь off) → NOAUTH на мониторинге DF-master.
          auth_user:   "${ compute.admin_user }"
          auth_pass:   "${ vault('secret/dragonfly/' + incarnation.name + '/users/' + compute.admin_user + '#password') }"
          # стартовые per-master тайминги failover в sentinel.conf. compute.sentinel_directives
          # — map `sentinel <opt> <master>` → значение; шаблон range-ит .vars.sentinel_config.
          config:      "${ compute.sentinel_directives }"
        # 2-й aclfile sentinel-демона: служебные из essence.system_acl_users_sentinel
        # (sentinel-команды). ★ РЕДИЗАЙН default_admin: прежний тернар «default → ГЛАВНЫЙ секрет,
        # остальные → users/<name>» УБРАН — все системные (вкл. default_admin) по ЕДИНОЙ ветке
        # secret/dragonfly/<inc>/users/<name>#password. sentinel-демон коннектится к :26379 под
        # default_admin (его пароль из этой ветки), к DF-master — auth_user default_admin.
        sentinel_users: >-
          ${ merge(default(essence.system_acl_users_sentinel, {}).map(name, {
               name: {
                 'perms':    essence.system_acl_users_sentinel[name],
                 'state':    'on',
                 'password': vault('secret/dragonfly/' + incarnation.name + '/users/' + name + '#password')
               }
             })) }

  # ── 3. REPLICAOF реплик: community.redis.replica ТОЛЬКО на репликах ───────────
  # addr — ЛОКАЛЬНЫЙ инстанс через UNIX-СОКЕТ (compute.local_addr); master_addr — HOST-
  # ИНВАРИАНТНЫЙ ВНЕШНИЙ адрес master-а (master-election soulprint.hosts[0]). ★ master_addr
  # остаётся TCP primary_ip:6379 (внешний линк реплика→master): у DragonFly TLS на ОСНОВНОМ
  # порту 6379 (нет отдельного tls-порта), репликационный линк по TLS включает директива
  # tls_replication во flagfile (df_config), НЕ params плагина. ★ P0-ИНВАРИАНТ (master НЕ
  # реплицирует сам себя): `where:` исключает выбранного master по SID — задача рендерится
  # ТОЛЬКО на репликах. ★ Локальный addr (UDS) без tls/tls_ca: коннект плагина к своему
  # инстансу идёт по сокету (не сетевой путь), TLS там не нужен.
  #
  # ★ РЕДИЗАЙН default_admin: replica→master AUTH под ACL-юзером default_admin (requirepass
  # убран). username (→ CONFIG SET masteruser) + password (→ CONFIG SET masterauth) — плагин
  # выставляет их В РАНТАЙМЕ для первичного REPLICAOF. ПЕРСИСТ через рестарт обеспечивает
  # статический masteruser/masterauth во flagfile (apply dragonfly шаг 1). Пароль —
  # secret/dragonfly/<inc>/users/default_admin#password (та же ветка, что health-PING).
  - name: Make replicas follow the elected master (REPLICAOF)
    where: "soulprint.self.sid != soulprint.hosts[0].sid"
    module: community.redis.replica
    params:
      addr:        "${ compute.local_addr }"
      master_addr: "${ soulprint.hosts[0].network.primary_ip + ':6379' }"
      username:    "${ compute.admin_user }"
      password:    "${ vault('secret/dragonfly/' + incarnation.name + '/users/' + compute.admin_user + '#password') }"

  # ── 4. SENTINEL MONITOR reconcile: community.redis.sentinel на КАЖДОМ хосте ────
  # addr — локальный sentinel (127.0.0.1:26379); monitor.ip — HOST-ИНВАРИАНТНЫЙ адрес master-
  # а. quorum — большинство size/2+1. auth_pass — keeper-side vault()-резолв. config — те же
  # per-master тайминги (compute.sentinel_directives). ★ PILOT: на create мониторим master
  # СРАЗУ (node-1 — настоящий master; контракт-флаг sentinel_monitor_now redis-а нужен лишь
  # migrate_cluster — здесь его нет, MONITOR безусловен).
  - name: Configure each sentinel to monitor the elected master (SENTINEL MONITOR)
    module: community.redis.sentinel
    params:
      addr:        "127.0.0.1:26379"
      master_name: "${ default(essence.sentinel_master_name, 'master') }"
      # ★ CONNECTION-AUTH к sentinel-демону :26379 (отдельно от auth_pass — мониторинг
      # master-а): sentinel.conf несёт aclfile sentinel-users.acl, built-in default рендерится
      # `off`, коннект под СИСТЕМНЫМ default_admin (sentinel-набор, шаг 2b). ★ РЕДИЗАЙН
      # default_admin: username + secret/dragonfly/<inc>/users/default_admin#password (прежний
      # главный секрет ДРОПНУТ). password → redis.Options.Password (AUTH соединения). Без него → NOAUTH.
      username:    "${ compute.admin_user }"
      password:    "${ vault('secret/dragonfly/' + incarnation.name + '/users/' + compute.admin_user + '#password') }"
      auth_user:   "${ compute.admin_user }"
      auth_pass:   "${ vault('secret/dragonfly/' + incarnation.name + '/users/' + compute.admin_user + '#password') }"
      # ★ Версия sentinel-ДЕМОНА (distro redis-sentinel), НЕ DragonFly: этот param гейтит
      # version-aware sentinel-фичи плагина (versionGE 7.0.0). df_version сюда тащить НЕЛЬЗЯ —
      # DF и sentinel-демон разные продукты с разными версиями.
      redis_version: "${ compute.sentinel_redis_version }"
      config:      "${ compute.sentinel_directives }"
      monitor:
        ip:     "${ soulprint.hosts[0].network.primary_ip }"
        port:   6379
        quorum: "${ int(size(soulprint.hosts)) / 2 + 1 }"

  # ── 5. Health-gate per-host: SENTINEL отвечает PONG на :26379 ─────────────────
  # ★ СТРОГО same-task register.self (НЕ cross-passage flow-control, ADR-056): «дождаться N
  # sentinel» НЕ выражаем — проверяем ТОЛЬКО свой локальный sentinel. retry/until +
  # failed_when по register.self.result этой же задачи.
  - name: Wait until each sentinel answers PONG on :26379
    module: community.redis.command
    changed_when: false
    retry:
      count: 12
      delay: 2s
      until: "register.self.result == 'PONG'"
    failed_when: "register.self.result != 'PONG'"
    params:
      addr: "127.0.0.1:26379"
      # ★ CONNECTION-AUTH: sentinel-демон защищён aclfile (built-in default рендерится `off`,
      # коннект под СИСТЕМНЫМ default_admin sentinel-набора). PING без AUTH → NOAUTH. ★ РЕДИЗАЙН
      # default_admin: username + secret/dragonfly/<inc>/users/default_admin#password (прежний
      # главный секрет ДРОПНУТ). Та же пара, что коннект-AUTH шага 4 (SENTINEL MONITOR к :26379).
      username: "${ compute.admin_user }"
      password: "${ vault('secret/dragonfly/' + incarnation.name + '/users/' + compute.admin_user + '#password') }"
      args: ["PING"]

  # ── 6. ОБЯЗАТЕЛЬНЫЙ мониторинг data-плоскости (Слайс II, ADR-024) ──────────────
  # ПОСЛЕ deploy-ветки (DF + sentinel-плоскость + health-gates) create БЕЗУСЛОВНО (без when-
  # гейта) разворачивает node_exporter на КАЖДЫЙ хост incarnation КОМПОЗИЦИЕЙ переиспользуемой
  # standalone-destiny через apply:destiny (изолированный render, ADR-009). Мониторинг — не
  # операторский выбор, а инвариант data-сервиса (контракт=A: версии/порты в essence).
  # ★ node-exporter-ONLY: DragonFly отдаёт СВОИ метрики нативно (встроенный prometheus-эндпоинт)
  # → redis_exporter-аналог НЕ ставим. arch destiny берёт сама из soulprint.self.os.arch.
  - name: Apply node-exporter destiny (host metrics)
    apply:
      destiny: node-exporter
      input:
        version: "${ default(essence.node_exporter_version, '1.8.2') }"
        listen:  "${ default(essence.node_exporter_listen, ':9100') }"
        # Корень загрузки: essence-override на внутреннее зеркало/nexus-proxy; default — GitHub.
        base_url: "${ default(essence.node_exporter_base_url, 'https://github.com/prometheus/node_exporter/releases/download') }"
        # SSRF-guard opt-out при private-resolve base_url; default false — guard держится.
        allow_private: "${ default(essence.node_exporter_allow_private, false) }"

  # ── 7. ОБЯЗАТЕЛЬНЫЙ log-shipping data-плоскости (Слайс V-I, ADR-067) ─────────────
  # ПОСЛЕ экспортера create БЕЗУСЛОВНО разворачивает vector (агент отгрузки логов) на КАЖДЫЙ
  # хост КОМПОЗИЦИЕЙ переиспользуемой standalone-destiny через apply:destiny (ADR-009). vector
  # ДОПОЛНЯЕТ node_exporter (метрики, pull) лог-плоскостью (логи, push). log_sources — ОБЕ
  # плоскости: DragonFly glog (/var/log/dragonfly/*.log) + sentinel-демон (/var/log/redis/*.log).
  # sink_auth_ref — Vault-ref ИЛИ значение (резолв Soul-side, секрет в state НЕ оседает, ИБ).
  - name: Apply vector destiny (log shipping)
    apply:
      destiny: vector
      input:
        version:       "${ default(essence.vector_version, '0.40.0') }"
        sha256:        "${ default(essence.vector_sha256, '') }"
        base_url:      "${ default(essence.vector_base_url, 'https://github.com/vectordotdev/vector/releases/download') }"
        # SSRF-guard opt-out при private-resolve base_url; default false — guard держится.
        allow_private: "${ default(essence.vector_allow_private, false) }"
        sink_type:     "${ default(essence.vector_sink_type, 'console') }"
        sink_endpoint: "${ default(essence.vector_sink_endpoint, '') }"
        sink_auth_ref: "${ default(essence.vector_sink_auth_ref, '') }"
        log_sources:   "${ default(essence.vector_log_sources, []) }"
