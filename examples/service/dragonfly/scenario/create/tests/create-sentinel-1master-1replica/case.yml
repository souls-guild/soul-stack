# L0-испытание create DragonFly в режиме sentinel. Multi-host roster из 2 хостов:
# replicas_per_master=1 → топология 1+1=2 (size-guard проходит). Master-election: первый по
# SID хост (node-1) = master; node-2 = реплика.
#
# ★ РЕФАКТОР «sentinel из destiny redis»: sentinel-демон ставит ВТОРОЙ apply:destiny:redis
#   (sentinel_only: deploy_redis=false), НЕ destiny `dragonfly`. Presence-матчер раскрывает
#   ОБА apply:destiny inline → видит redis-destiny sentinel-задачи (install redis-server +
#   sentinel.conf в /etc/redis) И НЕ видит dragonfly-sentinel-задач (их в кирпиче больше нет).
#
# Render-only, герметично. Что ассертим (критерий приёмки слайса):
#   1. size-guard PASS-форма: 2 == 1+1.
#   2. flagfile dragonfly.conf отрендерен (render_context.vars в DF-форме: config, host-
#      layout, port). render_context.self = первый по SID хост (node-1, host-инвариант
#      apply.input).
#   3. ANTI-TILING: master_addr (REPLICAOF) и monitor.ip (SENTINEL MONITOR) — HOST-
#      ИНВАРИАНТНЫ, оба = primary_ip первого по SID хоста (node-1 = 10.0.0.1).
#   4. plugin community.redis.replica: addr=unix-сокет (per-host локальный),
#      master_addr=10.0.0.1:6379 (master-election). where исключает master (только реплика).
#   5. plugin community.redis.sentinel: monitor.ip=10.0.0.1, quorum=2 (АВТО size(2)/2+1=2).
#   6. ★ SENTINEL-ПЛОСКОСТЬ через destiny `redis` (sentinel_only): install redis-server
#      (distro-пин R4) + sentinel.conf в /etc/redis (owner redis) присутствуют в плане.
#   7. ★ ДУБЛИКАТ СНЯТ: dragonfly-destiny БОЛЬШЕ НЕ рендерит /etc/dragonfly/sentinel.conf
#      (task_absent) — sentinel-конфиг теперь только в redis-плоскости (/etc/redis).
name: dragonfly create 1 master + 1 replica with monitor reconcile

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  # Порядок в YAML не отсортирован (2, 1) — harness и master-election сортируют по SID
  # (node-1 = master).
  hosts:
    - sid: node-2.example.com
      covens: [create, dragonfly]
      soulprint:
        network: { primary_ip: 10.0.0.2 }
        os: { arch: amd64 }
    - sid: node-1.example.com
      covens: [create, dragonfly]
      soulprint:
        network: { primary_ip: 10.0.0.1 }
        os: { arch: amd64 }
  # Vault: default_admin (внутрикластерный AUTH + masterauth) + системные + (нет operator-extra).
  # Главного secret/dragonfly/create#password больше нет (requirepass убран — редизайн default_admin).
  # generate-шаг (core.vault.kv-present) в L0 не исполняется (keeper-side write) — секреты
  # пред-сеются фикстурой, как и было.
  vault:
    secret/dragonfly/create/users/default_admin:
      password: dfadmin-create-pass
    secret/dragonfly/create/users/replica:
      password: replica-sys-secret-pass
    secret/dragonfly/create/users/monitoring:
      password: monitoring-sys-secret-pass
    secret/dragonfly/create/users/sentinel:
      password: sentinel-sys-secret-pass
    secret/dragonfly/create/users/haproxy:
      password: haproxy-sys-secret-pass
  essence:
    sentinel_master_name: master
    memory_reserve_percent: 75
    df_config:
      maxmemory:        "256mb"
      maxclients:       10000
    system_acl_users:
      default_admin: "~* &* +@all"
      replica:    "+psync +replconf +ping"
      monitoring: "-@all +@connection +client +ping +info +config|get +cluster|info +slowlog +latency +memory +select +command|count +command|docs"
      sentinel:   "allchannels +multi +slaveof +ping +exec +subscribe +config|rewrite +role +publish +info +client|setname +client|kill +script|kill"
      haproxy:    "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +info +cluster|info"
    system_acl_users_sentinel:
      default_admin: "allchannels allkeys +@all"
      monitoring: "-@all +@connection -command +client -hello +info -auth +sentinel|masters +sentinel|replicas +sentinel|slaves +sentinel|sentinels +sentinel|ckquorum"
      sentinel:   "allchannels -@all +auth +client|getname +client|id +client|setname +command +hello +ping +sentinel|is-master-down-by-addr +publish +role +sentinel|get-master-addr-by-name +sentinel|master +sentinel|myid +sentinel|replicas +sentinel|sentinels"
      haproxy:    "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +sentinel|get-master-addr-by-name +sentinel|master +sentinel|myid +sentinel|replicas +sentinel|sentinels"
  input:
    version: "1.39.0"
    replicas_per_master: 1
    # ★ provision выключен (default-on: опущенная секция = ВКЛЮЧЕНО; кейс деплоит на
    # ГОТОВЫЙ roster из 2 хостов) → include dragonfly-provision.yml не таргетит никого.
    provision:
      enabled: false

assert:
  task_present:
    # ── dragonfly destiny: flagfile dragonfly.conf отрендерен ──
    # render_context.self = первый по SID хост (node-1, host-инвариант apply.input).
    # Дизамбигуатор от users.acl/sentinel.conf (тот же core.file.rendered) — path.
    # template_content presence — факт доставки literal-шаблона Keeper→Soul (точная сверка
    # flagfile-строк — L2/Real-Linux). render_context целиком сверяется отдельным L1
    # tmpl-тестом (хрупок к точной форме vars здесь).
    - module: core.file.rendered
      params_subset:
        path: /etc/dragonfly/dragonfly.conf
        template_content: "<present>"
        mode: "0640"
        owner: dragonfly
        group: dragonfly

    # ── REPLICAOF реплик (community.redis.replica) ──
    # addr — ЛОКАЛЬНЫЙ UNIX-сокет (DF не слушает 127.0.0.1 при --bind=primary_ip); master_addr —
    # ВНЕШНИЙ адрес master-election (node-1, primary_ip:6379). where исключает master → node-2.
    # AUTH под default_admin (requirepass убран).
    - module: community.redis.replica
      params_subset:
        addr: "unix:/var/run/dragonfly/dragonfly.sock"
        master_addr: "10.0.0.1:6379"
        username: default_admin
        password: dfadmin-create-pass

    # ── SENTINEL MONITOR reconcile (community.redis.sentinel) ──
    # monitor.ip — HOST-ИНВАРИАНТНЫЙ адрес master-а (node-1). quorum=2 (АВТО size(2)/2+1).
    # redis_version — версия sentinel-ДЕМОНА (essence.sentinel_redis_version, дефолт 7.2.4),
    # НЕ df_version (1.39.0). Гейтит version-aware sentinel-фичи плагина.
    - module: community.redis.sentinel
      params_subset:
        addr: "127.0.0.1:26379"
        master_name: master
        # ★ CONNECTION-AUTH к sentinel-демону :26379 под default_admin (built-in default off).
        # auth_pass/auth_user — мониторинг DF-master под default_admin. Guard на NOAUTH.
        username: default_admin
        password: dfadmin-create-pass
        auth_user: default_admin
        auth_pass: dfadmin-create-pass
        redis_version: "7.2.4"
        config:
          "sentinel down-after-milliseconds master": "5000"
          "sentinel failover-timeout master": "60000"
        monitor:
          ip: 10.0.0.1
          port: 6379
          quorum: 2

    # ── 6. SENTINEL-ПЛОСКОСТЬ через destiny `redis` (sentinel_only, ВТОРОЙ apply) ──
    # install redis-server: distro-пин ПАКЕТА (compute.sentinel_redis_package_version,
    # дефолт 5:7.0.15-1~deb12u7) — R4 distro-пин, пакет несёт redis-sentinel.
    - module: core.pkg.installed
      params_subset:
        name: redis-server
        version: "5:7.0.15-1~deb12u7"

    # sentinel.conf рендерится в /etc/redis (redis-плоскость, owner redis), НЕ /etc/dragonfly.
    # template_content presence — факт доставки literal-шаблона redis-destiny Keeper→Soul.
    - module: core.file.rendered
      params_subset:
        path: /etc/redis/sentinel.conf
        template_content: "<present>"
        mode: "0640"
        owner: redis
        group: redis

  task_absent:
    # ── 7. ДУБЛИКАТ СНЯТ: dragonfly-destiny больше НЕ рендерит sentinel.conf ──
    # sentinel-конфиг теперь ТОЛЬКО в redis-плоскости (/etc/redis выше). Раньше dragonfly-
    # destiny рендерил /etc/dragonfly/sentinel.conf — этой задачи в плане быть НЕ должно.
    - module: core.file.rendered
      params_subset:
        path: /etc/dragonfly/sentinel.conf
    # provision выключен → cloud-create и барьер онбординга ОТСУТСТВУЮТ (group-drop).
    - module: core.cloud.created
    - module: core.soul.registered

  state_changes:
    df_version: "1.39.0"
    df_config:
      maxmemory:        "256mb"
      maxclients:       10000
    df_users: []
    df_hosts: []
    df_sentinel:
      master_name: master
      quorum: 0
      down_after_ms: 5000
      failover_timeout_ms: 60000
    replicas: 1
    sentinel_quorum: 0
    tls:
      enable:   false
      cert_ref: ""
      key_ref:  ""
      ca_ref:   ""
    memory_mb: 0
    # read-model: VM не провижены этим прогоном → консервативный default.
    provisioned_vm_ids: []
    provisioned_sids: []
    provisioned_provider: ""
