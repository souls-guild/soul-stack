# L0 test for DragonFly create WITHOUT replicas (replicas_per_master=0 → exactly 1 host, size-
# guard 1 == 1+0; standalone-equivalent: one master + sentinel daemon monitors itself).
#
# quorum is AUTO in apply = size(soulprint.hosts)/2+1 = 1/2+1 = 1. In state quorum=0 (state_changes
# doesn't see soulprint.hosts - auto happens in apply). master_name comes from essence - default master.
#
# Covers: replicas_per_master=0 size-guard boundary (standalone-equivalent); auto-quorum;
# default master_name (essence); single-host roster; DragonFly flagfile-render (vars in
# render_context dragonfly.conf).
#
# ★ REFACTOR "sentinel from destiny redis": sentinel daemon issues a SECOND apply:destiny:redis
#   (sentinel_only). The presence matcher sees the redis-destiny sentinel plane (install
#   redis-server + sentinel.conf /etc/redis) and does NOT see dragonfly-sentinel tasks.
name: dragonfly create standalone, no replicas, auto quorum

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  hosts:
    - sid: node-solo.example.com
      covens: [create, dragonfly]
      soulprint:
        network: { primary_ip: 10.0.0.9 }
        os: { arch: amd64 }
  # Vault: default_admin (masterauth top-up + intra-cluster AUTH) + system users. The primary
  # secret/dragonfly/create#password no longer exists (requirepass removed - default_admin redesign).
  vault:
    secret/dragonfly/create/users/default_admin:
      password: dfadmin-create-pass
    secret/dragonfly/create/users/replica:
      password: replica-sys-secret-pass
    secret/dragonfly/create/users/monitoring:
      password: monitoring-sys-secret-pass
    secret/dragonfly/create/users/sentinel:
      password: sentinel-sys-secret-pass
    secret/dragonfly/create/users/haproxy:
      password: haproxy-sys-secret-pass
  essence:
    sentinel_master_name: master
    memory_reserve_percent: 75
    df_config:
      maxmemory:        "256mb"
      maxclients:       10000
    system_acl_users:
      default_admin: "~* &* +@all"
      replica:    "+psync +replconf +ping"
      monitoring: "-@all +@connection +client +ping +info +config|get +cluster|info +slowlog +latency +memory +select +command|count +command|docs"
      sentinel:   "allchannels +multi +slaveof +ping +exec +subscribe +config|rewrite +role +publish +info +client|setname +client|kill +script|kill"
      haproxy:    "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +info +cluster|info"
    system_acl_users_sentinel:
      default_admin: "allchannels allkeys +@all"
      monitoring: "-@all +@connection -command +client -hello +info -auth +sentinel|masters +sentinel|replicas +sentinel|slaves +sentinel|sentinels +sentinel|ckquorum"
      sentinel:   "allchannels -@all +auth +client|getname +client|id +client|setname +command +hello +ping +sentinel|is-master-down-by-addr +publish +role +sentinel|get-master-addr-by-name +sentinel|master +sentinel|myid +sentinel|replicas +sentinel|sentinels"
      haproxy:    "-@all +auth +client|getname +client|id +client|setname +command +hello +ping +role +sentinel|get-master-addr-by-name +sentinel|master +sentinel|myid +sentinel|replicas +sentinel|sentinels"
  input:
    version: "1.39.0"
    replicas_per_master: 0
    # ★ provision disabled (default-on: an omitted section = ENABLED; this case deploys onto
    # a READY roster, cloud-create is not needed) → include dragonfly-provision.yml targets
    # nobody. Symmetric with redis non-provision create tests.
    provision:
      enabled: false

assert:
  task_present:
    # REPLICAOF: addr - the LOCAL UNIX socket; master_addr = the single host (which is also the
    # master, primary_ip:6379). On real standalone INFO role=master → plugin no-op.
    - module: community.redis.replica
      params_subset:
        addr: "unix:/var/run/dragonfly/dragonfly.sock"
        master_addr: "10.0.0.9:6379"
        username: default_admin
        password: dfadmin-create-pass

    # SENTINEL MONITOR: monitor.ip - the single host; auto-quorum = 1.
    # redis_version - the sentinel DAEMON version (essence.sentinel_redis_version, default 7.2.4),
    # NOT df_version (1.39.0). Gates version-aware sentinel features of the plugin.
    - module: community.redis.sentinel
      params_subset:
        addr: "127.0.0.1:26379"
        master_name: master
        # ★ CONNECTION-AUTH to the sentinel daemon :26379 as default_admin (built-in default off).
        # auth_pass/auth_user - monitoring the DF master as default_admin. Guard against NOAUTH.
        username: default_admin
        password: dfadmin-create-pass
        auth_user: default_admin
        auth_pass: dfadmin-create-pass
        redis_version: "7.2.4"
        monitor:
          ip: 10.0.0.9
          port: 6379
          quorum: 1

    # ── SENTINEL PLANE via destiny `redis` (sentinel_only, SECOND apply) ──
    # install redis-server (distro pin R4, carries redis-sentinel) + sentinel.conf in /etc/redis.
    - module: core.pkg.installed
      params_subset:
        name: redis-server
        version: "5:7.0.15-1~deb12u7"
    - module: core.file.rendered
      params_subset:
        path: /etc/redis/sentinel.conf
        template_content: "<present>"
        mode: "0640"
        owner: redis
        group: redis

  task_absent:
    # DUPLICATE REMOVED: dragonfly-destiny no longer renders /etc/dragonfly/sentinel.conf.
    - module: core.file.rendered
      params_subset:
        path: /etc/dragonfly/sentinel.conf
    # provision disabled (enabled: false) → dragonfly-provision.yml group-drop: cloud-create
    # and the onboarding barrier are ABSENT from the plan.
    - module: core.cloud.created
    - module: core.soul.registered

  state_changes:
    df_version: "1.39.0"
    df_users: []
    df_hosts: []
    df_sentinel:
      master_name: master
      quorum: 0
      down_after_ms: 5000
      failover_timeout_ms: 60000
    replicas: 0
    sentinel_quorum: 0
    # read-model: no VMs were provisioned by this run → conservative default.
    provisioned_vm_ids: []
    provisioned_sids: []
    provisioned_provider: ""
