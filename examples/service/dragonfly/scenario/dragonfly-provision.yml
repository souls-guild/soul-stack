# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║ SHARED PROVISION BODY (service-level include, reusable) — ADR-061               ║
# ╚══════════════════════════════════════════════════════════════════════════════╝
# Cloud-provision new VMs for the DragonFly topology BEFORE deploy: (a) core.cloud.created
# creates the VMs, (b) core.bootstrap.delivered delivers a per-VM bootstrap token over SSH,
# (c) core.soul.registered registers the created SIDs + BLOCKINGLY awaits onboarding
# (await_online) + refresh_soulprint → the scenario-runner re-resolves the roster BEFORE
# the deploy branch (live snapshot of the online set). Modeled 1:1 on redis-provision.yml (user
# decision 2026-07-01: DragonFly cloud-provision MODELED on redis; provision is mandatory
# in the base create). Lives at service-level (scenario/<file>), not inside one scenario,
# and is included by the consumer by filename: scenario-include resolves `scenario/<name>/<file>`,
# then falls back to `scenario/<file>` (orchestration.md §6, include.go).
#
#   Consumer (as of 2026-07-01):
#     - scenario/create/main.yml — cloud-create + onboarding BEFORE deploy.
#   (redis shares this body with create+migrate_cluster; DragonFly has no migrate_cluster — PILOT
#   is sentinel-only — but the body is still service-level for symmetry with redis and in case
#   a second consumer shows up. Currently the only consumer is create.)
#
#   Include is gated on `has(input.provision) && input.provision.enabled` in the INCLUDING
#   scenario (placeholder-skip form of include-when — object-input is not static, not group-drop):
#   with enabled=false / an omitted section, the body's steps target nobody.
#
# ★★ INCLUDING-SCENARIO INVARIANT (hand-enforced drift-guard — soul-lint does NOT catch cross-file) ★★
#   This file REFERENCES input.*/incarnation.*/essence.*/register.* but does NOT declare
#   them. The scenario that includes this body MUST carry in its own contract the FULL set
#   that the body reads, WITH THE SAME SEMANTICS:
#       input.provision.{enabled, provider, profile, await_timeout, ssh_provider}
#       input.replicas_per_master
#       incarnation.name
#       essence.provision_{provider, profile, await_timeout, ssh_provider}
#   provider/profile/await_timeout/ssh_provider are read as default(input.provision.X,
#   essence.provision_X) — the operator can usually omit them (the provision form is hidden,
#   default-on), then the essence default is used. The including scenario MUST carry the
#   corresponding essence.provision_*. Steps (b)/(c) read register.provision.hosts — the
#   register of the FIRST step (a) core.cloud.created (created HERE). Skipping/renaming any
#   input field in the including scenario is NOT caught statically (cross-file drift is
#   invisible to soul-lint) — it shows up as a render failure. Source of truth for the
#   input.provision set and schema is create/main.yml::input.provision.
#
# ★ VM COUNT — FROM THE TOPOLOGY (the single source of truth for cluster size):
#   sentinel-only (PILOT): 1+replicas_per_master (one master + the master's replicas).
# There is deliberately no separate node_count in input.provision — it would drift from
# the size-guard of the deploy branch (assert size(soulprint.hosts) == the same formula, create/main.yml).
# ★ DragonFly has NO redis_type/shards (the redis cluster branch is out of PILOT scope) → the
#   count formula is simpler than redis: always 1+replicas_per_master (no ternary on mode).
#
# ★ teardown (destroy) — NOT here (a separate scenario, cascade core.cloud.destroyed).

# NIM-58: incarnation.NamePattern ⊃ vmNameBasePattern — early guard before provisioning.
- name: Guard incarnation name is a valid VM-name base for cloud provisioning
  assert:
    that:
      - "incarnation.name.matches('^[a-z][a-z0-9-]{0,48}[a-z0-9]$')"
    message: "incarnation name is not valid as a VM-name base for provisioning (needs ^[a-z][a-z0-9-]{0,48}[a-z0-9]$): a leading digit / trailing dash / length 51-63 pass create but fail in the CloudDriver — rename the incarnation or create with provision.enabled=false"

# (a) Create VMs via CloudDriver (on: keeper, ADR-017). count = 1+replicas_per_master
#     (sentinel topology). generate_userdata: false: the VM is created WITHOUT cloud-init
#     userdata (some cloud providers reject ci_user_data) → the VM auto-joins Teleport, and
#     the whole setup (soul binary + CA + soul.yml + systemd unit) is installed by step (b)
#     over Teleport SSH (install: true, see below). The per-VM bootstrap token lands in
#     register.provision.hosts[].bootstrap_token (plain one-time, masked by
#     audit.MaskSecrets on all outputs).
- name: Provision VMs for the dragonfly topology (cloud-init bootstrap)
  on: keeper
  module: core.cloud.created
  register: provision
  params:
    # provider/profile — input.provision.X with fallback to essence.provision_X (default-on:
    # the provision form is hidden, the operator usually does NOT set provider/profile →
    # essence default).
    # ★ TODO: prod/dev provider switch (ENV keeper / Coven-overlay) — a separate ADR. Currently
    # one static essence pair (prod); environment switching is NOT implemented.
    provider: "${ default(input.provision.provider, essence.provision_provider) }"
    profile:  "${ default(input.provision.profile, essence.provision_profile) }"
    # count = cluster size from the sentinel topology: 1+replicas_per_master. int() unifies
    # the numeric type (YAML→uint64 at L0, JSON→double in prod). SINGLE-LINE quoted string (NOT
    # a block scalar `>-`): goccy parses a block scalar as LiteralNode, and the CEL-wrapped-skip
    # param-type-check (module_params.go) only catches StringNode → the int param `count` would
    # be falsely rejected as param_type_mismatch on the folded form.
    count: "${ 1 + int(input.replicas_per_master) }"
    # name — the run's RUN-IDENTITY (idempotency per incarnation, NIM-16): the driver names
    # VMs <name>-<seq> and stamps label soulstack-run=<name> (nameBase→runLabel,
    # provisioned.go→soul-cloud-*) → a restart of the same incarnation reuses the same VM batch
    # (findByRunLabel, no orphans spawned). Without name, create fails with `no run identity`.
    # Modeled on redis-provision.yml. incarnation.name is the root Coven label (ADR-008), stable
    # across runs; USUALLY matches vmNameBasePattern, but incarnation.NamePattern
    # ^[a-z0-9][a-z0-9-]{0,62}$ is a superset (leading digit / trailing dash / length 51-63
    # will fail the driver) → cross-domain guard (domain mismatch) is a separate ticket.
    name: "${ incarnation.name }"
    generate_userdata: false

# (b) Install soul + deliver the per-VM bootstrap token over SSH (on: keeper,
#     core.bootstrap.delivered, ADR-063). Takes hosts from the previous step's register
#     (each — {sid, primary_ip, bootstrap_token}). install: true → the VM arrived WITHOUT
#     cloud-init (step (a) generate_userdata:false), so the entire setup is installed HERE
#     over Teleport SSH: soul binary (pinned-CA HTTPS) + keeper CA + soul.yml + systemd
#     unit (the same install blueprint as cloud-init B-flat). It then places the token at
#     /etc/soul/token (umask 077, 0400, ★token via STDIN not argv), redeems it
#     (`soul init` — CSR→Bootstrap→SoulSeed; idempotent via the seed-cert guard), and
#     activates the unit: daemon-reload + enable + start (start_soul defaults to true).
#     ssh_provider — the SshProvider plugin name (Teleport).
#     Any host error → step failed (B1-strict) → state is not committed → error_locked.
#     require: provision — tokens come from its register.
- name: Install soul and deliver per-VM bootstrap token over SSH
  on: keeper
  module: core.bootstrap.delivered
  params:
    hosts:        "${ register.provision.hosts }"
    # ssh_provider — input.provision.ssh_provider with fallback to essence.provision_ssh_provider
    # (default-on: the form is hidden, the operator usually does NOT set it → essence default teleport).
    ssh_provider: "${ default(input.provision.ssh_provider, essence.provision_ssh_provider) }"
    # join_wait_timeout — retry-wait ceiling for a fresh VM joining Teleport.
    # input.provision.join_wait_timeout → essence.provision_join_wait_timeout → '15m'
    # (symmetric with the onboarding step's await_timeout).
    join_wait_timeout: "${ default(input.provision.join_wait_timeout, default(essence.provision_join_wait_timeout, '15m')) }"
    install:      true
  require:
    - provision

# (c) Register the created SIDs + a BLOCKING onboarding barrier + refresh_soulprint
#     (on: keeper, core.soul.registered, ADR-061). sid — a LIST from register.provision.hosts
#     (h.sid of each created VM; the list comes via a CEL expression, list-SID ADR-061). The bind
#     makes each SID a member of this incarnation implicitly (incarnation_membership, ADR-008
#     amendment NIM-124) — no coven: needed (membership is not a coven value). await_online:true →
#     the step waits until the created Souls become online (Redis SID lease), bounded by
#     await_timeout; B1-strict: quorum shortfall → step failed → state not committed →
#     error_locked. refresh_soulprint: true → after success the roster is re-resolved, the deploy
#     branch sees the online set. await_timeout: input.provision.await_timeout →
#     essence.provision_await_timeout → '10m'.
- name: Register provisioned VMs and await their onboarding
  on: keeper
  module: core.soul.registered
  register: onboarded
  require:
    - provision
  params:
    sid:               "${ register.provision.hosts.map(h, h.sid) }"
    await_online:      true
    await_timeout:     "${ default(input.provision.await_timeout, default(essence.provision_await_timeout, '10m')) }"
    refresh_soulprint: true
