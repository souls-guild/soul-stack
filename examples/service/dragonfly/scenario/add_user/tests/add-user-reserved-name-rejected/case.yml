# L0-испытание validate-guard add_user (system-ACL-users): operator НЕ может добавить юзера
# с именем СЛУЖЕБНОГО (default/replica/monitoring/sentinel/haproxy). Оператор задаёт
# user.name=sentinel — зарезервировано (доливается из essence ПОВЕРХ operator-extra → молча
# перекрыл бы sentinel-perms). validate-правило add_user/main.yml ловит на INPUT-валидации
# (422 ДО applying). Правило false → expect_render_error.
name: add_user with reserved system name aborts at input validation

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  soulprint:
    network: { primary_ip: 10.0.0.5 }
    os: { arch: amd64 }

  state:
    df_version: "1.39.0"
    conf_dir: /etc/dragonfly
    data_dir: /var/lib/dragonfly
    install:
      method: package
    df_config:
      maxmemory: "256mb"
    df_users:
      - { name: bob, perms: "~app:* +@read", state: "on" }

  # Оператор пытается добавить юзера с зарезервированным именем sentinel.
  input:
    user:
      name: sentinel
      perms: "~* +@all"
      state: "on"

  vault:
    secret/dragonfly/add_user:
      password: addusr-df-pass-16chars

expect_render_error: "зарезервировано за служебным"
