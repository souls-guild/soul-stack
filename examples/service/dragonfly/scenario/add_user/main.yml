name: add_user
description: >-
  Operational: add (or override) ONE ACL user on an ALREADY running DragonFly
  WITHOUT restarting the process. Production convention "hot-reload > restart"
  (docs/destiny/production-conventions.md §3a/§6): the ACL is applied on the fly via ACL LOAD
  (re-reading the aclfile), the daemon doesn't need a restart. REUSE from redis/add_user (DragonFly carries
  a full Redis-compatible ACL: SETUSER/LOAD/aclfile with #<sha256> — acl/user.cc).

  The operator supplies ONE AclUser entry (name + perms + state) — the same type as an
  element of the create input.users array (types.yml, ADR-062). perms is validated with the same re2 pattern
  as AclUser in create. The password is NOT in the input contract: it lives in Vault under the convention
  secret/dragonfly/<incarnation>/users/<name>#password (like create), resolved keeper-side
  via vault() in the render phase. The scenario merges the new user into the EXPANDED
  incarnation.state.df_users, renders the FULL users.acl to disk (destiny `dragonfly`, the same
  brick as create) and REACTIVATES it via community.redis.acl (ACL LOAD).

  ★ Boundary with rotate_tls: add_user touches ONLY the ACL (users.acl + ACL LOAD), it does not
  meaningfully re-render dragonfly.conf or TLS material (destiny renders the whole brick, but we only
  reactivate the ACL in step 2; the flagfile/sentinel.conf on disk stay unchanged for the same config —
  idempotent render) — a separate audit semantics: "the user list changed".

  Idempotency: ACL LOAD is idempotent BY CONSTRUCTION (it brings the live instance in line with the file
  regardless of current state); the plugin does an honest ACL LIST diff before/after (changed=false
  when they match). users.acl rendering is deterministic (range over a sorted map). Operational
  scenario: the instance is ALREADY running (auth via vault() password + TLS discriminator from incarnation.state.tls).

  Targeting — the whole incarnation (on omitted, ADR-008/009): the new users.acl + ACL LOAD go to
  EVERY dragonfly host. The ACL is host-invariant (one user set per cluster).

# ── Operator input contract (docs/input.md) ────────────────────────────────
# ONE AclUser entry (types.yml, ADR-062 $type): username, its ACL rights, on/off. The same
# type as an element of the create input.users array — a single source of truth for the form and validation
# (perms pattern). Password — NOT in input (Vault convention, see description). One user per
# run — an atomic "add a user" operational action (bulk editing of the whole set
# → update_users, bulk-replace).
input:
  user:
    $type: AclUser
    required: true
    description: >-
      DragonFly ACL user (AclUser: name + perms + state). Added to users.acl
      (or overrides an existing one with the same name — idempotent upsert). perms is the FULL
      ACL string (Redis ACL syntax, DragonFly accepts it), validated by the AclUser pattern.
      default_admin is not set by this scenario (it's a system user, filled in from essence).

# ── Declarative input invariants (validate:) ───────────────────────────────────
# system-ACL-users guard (same as create/redis-add_user): the operator CANNOT add a user with
# a SYSTEM name (default_admin/replica/monitoring/sentinel/haproxy). System users are filled into
# users.acl from essence ON TOP OF operator-extra (last-wins) — operator `replica` would silently
# override replication perms; operator `default_admin` would replace the admin account. We catch this at
# INPUT validation (422 BEFORE applying). INPUT-ONLY (essence unavailable): the name list is hardcoded.
validate:
  - that: "!(input.user.name in ['default_admin', 'replica', 'monitoring', 'sentinel', 'haproxy'])"
    message: "ACL username is reserved for a system user (default_admin/replica/monitoring/sentinel/haproxy): pick another name — system users are created automatically from essence"

# ── Computed scenario vars (compute:) ─────────────────────────────────────────
# Run-level context (input/essence/incarnation — no soulprint).
#
# ★ DragonFly vs redis (blocker fix): ACL LOAD goes to the LOCAL instance via a UNIX SOCKET
# (compute.local_addr), NOT 127.0.0.1:port. DF with --bind=primary_ip does NOT listen on loopback;
# the socket is a separate UDS listener. A UDS is not a network path → no TLS discriminator is needed
# (tls/tls_ca were removed from ACL LOAD even on a TLS instance). run_dir is host-invariant; the default
# duplicates the destiny default.
compute:
  local_addr: "${ 'unix:' + default(essence.run_dir, '/var/run/dragonfly') + '/dragonfly.sock' }"
  # ★ admin_user (default_admin redesign): the system admin username. Operational, outside covenant
  # (dragonfly has no covenant.yml) — a literal right here. ACL LOAD connects as this user.
  admin_user: "${ 'default_admin' }"
  # ── Effective host layout: install/conf_dir/data_dir from essence (v1→v2, migration) ──
  # install/conf_dir/data_dir were MOVED out of state into essence — read essence directly
  # (default() handles a missing leaf). install here is a read-model for an operational scenario with no real reader
  # (destiny renders configs, installation already happened at create) → a conservative package default.
  install:  "${ (default(essence.install_method, 'package') == 'binary') ? { 'method': 'binary', 'base_url': default(essence.binary_base_url, ''), 'version': default(essence.binary_version, '') } : { 'method': 'package' } }"
  conf_dir: "${ default(essence.conf_dir, '/etc/dragonfly') }"
  data_dir: "${ default(essence.data_dir, '/var/lib/dragonfly') }"

  # ── New ACL user set: EXPANDED state.df_users + the added user ──
  # state.df_users — an ARRAY of AclUser [{name,perms,state}]. Array upsert: FILTER OUT of
  # the current array the entry with the same name (filter u.name != new) + APPEND the new one as an element. filter +
  # concatenation gives last-wins upsert semantics (the new entry overrides an existing one with the same
  # name). add's password is NOT stored in state — it's keeper-side vault. has() guard on df_users —
  # back-compat for incarnations without operator-extra ACL (empty array). default(user.state,'on')
  # — $type fills in the default at the input stage, but default() is also safe for raw input.
  users_new: >-
    ${ (has(incarnation.state.df_users)
          ? incarnation.state.df_users.filter(u, u.name != input.user.name)
          : [])
       + [{ 'name': input.user.name, 'perms': input.user.perms, 'state': default(input.user.state, 'on') }] }

# ── incarnation.state mutation ─────────────────────────────────────────────────
# Operational: records the NEW ACL user set (array of AclUser [{name,perms,state}], WITHOUT the password —
# it's keeper-side vault, ADR-012). Same compute.users_new (array) that went into rendering users.acl.
state_changes:
  - set: df_users
    value: "${ compute.users_new }"

tasks:
  # 1. Re-render users.acl to disk with the NEW user set (the same mode-agnostic destiny
  #    `dragonfly` as create). vars.users — the merged set with per-user passwords from Vault (keeper-
  #    side vault(), .tmpl hashes sha256, no plaintext written). We do NOT reactivate dragonfly.conf/TLS —
  #    add_user changes ONLY the ACL (destiny renders the whole brick, but we reactivate only the ACL in step 2;
  #    the flagfile on disk won't change for the same config — idempotent render). version — from state;
  #    install/conf_dir/data_dir — from essence (v1→v2, host layout moved to essence, Option A).
  #    We do NOT pass the sentinel block in apply.input (sentinel.conf on disk stays as-is).
  - name: Re-render users.acl with the new ACL user set (full file on disk)
    apply:
      destiny: dragonfly
      input:
        version:  "${ has(incarnation.state.df_version) ? incarnation.state.df_version : '' }"
        install:  "${ compute.install }"
        conf_dir: "${ compute.conf_dir }"
        data_dir: "${ compute.data_dir }"
        # ★ default_admin redesign: apply.input.password REMOVED (destiny no longer accepts it —
        # requirepass removed). masteruser/masterauth are FILLED into config as regular flags ON TOP OF
        # state.df_config (stored WITHOUT masterauth — the secret is in Vault). add_user re-renders
        # the whole flagfile, so the static replica→master AUTH must be filled in here too —
        # otherwise the flagfile on disk would lose masteruser/masterauth and sentinel replicas would
        # hit NOAUTH after a restart. On the master node the directive is inert (failover-safe).
        # masterauth — vault()-in-cell (seal masking); path — secret/dragonfly/<inc>/users/
        # default_admin#password (same branch as the users block below).
        config: >-
          ${ merge(incarnation.state.df_config, {
               'masteruser': compute.admin_user,
               'masterauth': vault('secret/dragonfly/' + incarnation.name + '/users/' + compute.admin_user + '#password')
             }) }
        # ★★ CRITICAL (system-ACL-users): the FULL users.acl = SYSTEM users (from essence, FIRST) +
        # operator-extra (state.df_users + the new one, compute.users_new — an ARRAY of AclUser — ON TOP).
        # add_user re-renders the WHOLE file (not append) → WITHOUT filling in system users, this render WOULD
        # WIPE OUT default_admin/replica/monitoring/sentinel/haproxy → breaking AUTH/replication/sentinel
        # in an operational run. System users (incl. default_admin) are filled in on EVERY render from
        # essence.system_acl_users. last-wins: operator-extra overrides a system user with the same name
        # (system names are locked out by the validate guard — no collision). Each one's Vault password —
        # secret/dragonfly/<inc>/users/<name>#password.
        users: >-
          ${ merge(
               merge(default(essence.system_acl_users, {}).map(name, {
                 name: {
                   'perms':    essence.system_acl_users[name],
                   'state':    'on',
                   'password': vault('secret/dragonfly/' + incarnation.name + '/users/' + name + '#password')
                 }
               })),
               merge(compute.users_new.map(u, {
                 u.name: {
                   'perms':    u.perms,
                   'state':    u.state,
                   'password': vault('secret/dragonfly/' + incarnation.name + '/users/' + u.name + '#password')
                 }
               }))
             ) }

  # 2. HOT-RELOAD ACL: community.redis.acl sends ACL LOAD — the live instance re-reads the aclfile
  #    (rendered in step 1) in full. Idempotent by construction; the plugin does an ACL LIST diff
  #    before/after (changed=false when they match). addr/TLS discriminator — from state.tls (compute.tls_*).
  - name: Hot-reload ACL on the live instance (ACL LOAD)
    module: community.redis.acl
    params:
      addr:     "${ compute.local_addr }"
      # ★ default_admin redesign: AUTH as default_admin (requirepass removed). username + its
      # password from the secret/dragonfly/<inc>/users/default_admin#password branch. UDS without TLS.
      username: "${ compute.admin_user }"
      password: "${ vault('secret/dragonfly/' + incarnation.name + '/users/' + compute.admin_user + '#password') }"
