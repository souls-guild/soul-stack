# ★★ CENTRAL guard update_users: BULK-REPLACE removes a user dropped from the set.
# Deployed state.df_users = {alice, bob}; the operator sets a NEW full set input.users =
# {alice (with CHANGED perms)} - bob is NOT in the set. update_users replaces state.df_users ENTIRELY:
#   1. users.acl renders with alice (new perms) - WITHOUT bob (removed from ACL);
#   2. state_changes.df_users = [alice] (bob dropped out - bulk-replace, not upsert).
# Regression "update_users merges/upserts instead of replace" = bob would remain → assert fails.
# Render-only, hermetic. ACL LOAD goes through a LOCAL UNIX socket. essence.system_acl_users
# is NOT set → system defaults get topped up ({}) → vars.users carries ONLY operator-extra (a clean
# bulk-replace assert).
name: update_users bulk-replaces the set and drops a user absent from input (plaintext)

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  soulprint:
    network: { primary_ip: 10.0.0.5 }
    os: { arch: amd64 }

  # Deployed incarnation.state (v2: install/conf_dir/data_dir moved out to essence): operator-
  # extra alice + bob.
  state:
    df_version: "1.39.0"
    tls:
      enable:   false
      cert_ref: ""
      key_ref:  ""
      ca_ref:   ""
    df_config:
      maxmemory:        "256mb"
    df_users:
      - { name: alice, perms: "~* +@all", state: "on" }
      - { name: bob, perms: "~app:* +@read", state: "on" }

  # New full set: only alice (with NEW perms). bob is removed.
  input:
    users:
      - { name: alice, perms: "~app:* +@read +@write", state: "on" }

  # Vault: default_admin (masterauth top-up into flagfile + ACL LOAD-AUTH) + operator-extra alice.
  vault:
    secret/dragonfly/update_users/users/default_admin:
      password: dfadmin-update-users-pass
    secret/dragonfly/update_users/users/alice:
      password: alice-user-secret-pass

assert:
  task_present:
    # 1. users.acl carries ONLY alice with NEW perms - bob is absent (bulk-replace).
    - module: core.file.rendered
      params_subset:
        path: /etc/dragonfly/users.acl
        render_context:
          vars:
            users:
              alice:
                perms: "~app:* +@read +@write"
                state: "on"
                password: alice-user-secret-pass
          self:
            sid: trial-host
            covens: [update_users]
            choirs: []
            traits: {}
            role: ""
            network:
              primary_ip: 10.0.0.5
            os:
              arch: amd64
          role: ""
          essence: {}

    # 2. HOT-RELOAD ACL: community.redis.acl to the live instance through a LOCAL UNIX socket.
    #    AUTH as default_admin (requirepass removed).
    - module: community.redis.acl
      params_subset:
        addr: "unix:/var/run/dragonfly/dragonfly.sock"
        username: default_admin
        password: dfadmin-update-users-pass

  # state_changes: df_users = NEW set ENTIRELY (only alice, bob dropped out - bulk-replace).
  state_changes:
    df_users:
      - { name: alice, perms: "~app:* +@read +@write", state: "on" }
