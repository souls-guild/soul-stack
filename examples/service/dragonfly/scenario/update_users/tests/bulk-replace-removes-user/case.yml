# ★★ ЦЕНТРАЛЬНЫЙ guard update_users: BULK-REPLACE удаляет юзера, выпавшего из набора.
# Развёрнутый state.df_users = {alice, bob}; оператор задаёт НОВЫЙ полный набор input.users =
# {alice (с ИЗМЕНЁННЫМИ perms)} — bob в наборе НЕТ. update_users заменяет state.df_users ЦЕЛИКОМ:
#   1. users.acl рендерится с alice (новые perms) — БЕЗ bob (удалён из ACL);
#   2. state_changes.df_users = [alice] (bob выпал — bulk-replace, не upsert).
# Регресс «update_users мержит/апсертит вместо replace» = bob остался бы → ассерт красный.
# Render-only, герметично. ACL LOAD идёт через ЛОКАЛЬНЫЙ UNIX-сокет. essence.system_acl_users
# НЕ задаётся → долив системных default({}) → vars.users несёт ТОЛЬКО operator-extra (чистый
# ассерт bulk-replace).
name: update_users bulk-replaces the set and drops a user absent from input (plaintext)

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  soulprint:
    network: { primary_ip: 10.0.0.5 }
    os: { arch: amd64 }

  # Развёрнутый incarnation.state (v2: install/conf_dir/data_dir вынесены в essence): operator-
  # extra alice + bob.
  state:
    df_version: "1.39.0"
    tls:
      enable:   false
      cert_ref: ""
      key_ref:  ""
      ca_ref:   ""
    df_config:
      maxmemory:        "256mb"
    df_users:
      - { name: alice, perms: "~* +@all", state: "on" }
      - { name: bob, perms: "~app:* +@read", state: "on" }

  # Новый полный набор: только alice (с НОВЫМИ perms). bob удаляется.
  input:
    users:
      - { name: alice, perms: "~app:* +@read +@write", state: "on" }

  # Vault: default_admin (masterauth-долив во flagfile + ACL LOAD-AUTH) + operator-extra alice.
  vault:
    secret/dragonfly/update_users/users/default_admin:
      password: dfadmin-update-users-pass
    secret/dragonfly/update_users/users/alice:
      password: alice-user-secret-pass

assert:
  task_present:
    # 1. users.acl несёт ТОЛЬКО alice с НОВЫМИ perms — bob отсутствует (bulk-replace).
    - module: core.file.rendered
      params_subset:
        path: /etc/dragonfly/users.acl
        render_context:
          vars:
            users:
              alice:
                perms: "~app:* +@read +@write"
                state: "on"
                password: alice-user-secret-pass
          self:
            sid: trial-host
            covens: [update_users]
            choirs: []
            traits: {}
            role: ""
            network:
              primary_ip: 10.0.0.5
            os:
              arch: amd64
          role: ""
          essence: {}

    # 2. HOT-RELOAD ACL: community.redis.acl к живому инстансу через ЛОКАЛЬНЫЙ UNIX-сокет.
    #    AUTH под default_admin (requirepass убран).
    - module: community.redis.acl
      params_subset:
        addr: "unix:/var/run/dragonfly/dragonfly.sock"
        username: default_admin
        password: dfadmin-update-users-pass

  # state_changes: df_users = НОВЫЙ набор ЦЕЛИКОМ (только alice, bob выпал — bulk-replace).
  state_changes:
    df_users:
      - { name: alice, perms: "~app:* +@read +@write", state: "on" }
