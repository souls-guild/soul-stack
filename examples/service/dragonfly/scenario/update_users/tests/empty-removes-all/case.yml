# L0-испытание update_users: ПУСТОЙ input.users убирает ВСЕХ operator-extra. Развёрнутый
# state.df_users = {alice, bob}; оператор задаёт input.users = [] (пустой массив). bulk-replace
# заменяет state.df_users ЦЕЛИКОМ пустым набором:
#   1. users.acl рендерится БЕЗ operator-extra (системные доливались бы из essence — здесь
#      essence.system_acl_users не задан → vars.users = {} пустой);
#   2. state_changes.df_users = [] (operator-extra стёрт).
# Доказывает, что bulk-replace позволяет убрать всех operator-extra пустым массивом (системные
# вне state — остаются через долив из essence на каждом рендере, см. main.yml).
name: update_users with empty input removes all operator-extra users

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  soulprint:
    network: { primary_ip: 10.0.0.5 }
    os: { arch: amd64 }

  # state v2: install/conf_dir/data_dir вынесены в essence (не в state).
  state:
    df_version: "1.39.0"
    tls:
      enable:   false
      cert_ref: ""
      key_ref:  ""
      ca_ref:   ""
    df_config:
      maxmemory:        "256mb"
    df_users:
      - { name: alice, perms: "~* +@all", state: "on" }
      - { name: bob, perms: "~app:* +@read", state: "on" }

  # Пустой набор: убрать всех operator-extra.
  input:
    users: []

  # Vault: default_admin (masterauth-долив во flagfile + ACL LOAD-AUTH читают его безусловно).
  vault:
    secret/dragonfly/update_users/users/default_admin:
      password: dfadmin-update-users-pass

assert:
  task_present:
    # users.acl рендерится с ПУСТЫМ набором (operator-extra стёрты; системных нет — essence
    # без system_acl_users → vars.users = {}).
    - module: core.file.rendered
      params_subset:
        path: /etc/dragonfly/users.acl
        render_context:
          vars:
            users: {}
          self:
            sid: trial-host
            covens: [update_users]
            choirs: []
            traits: {}
            role: ""
            network:
              primary_ip: 10.0.0.5
            os:
              arch: amd64
          role: ""
          essence: {}

    # HOT-RELOAD ACL: community.redis.acl через ЛОКАЛЬНЫЙ UNIX-сокет (ACL LOAD приводит инстанс
    # к пустому operator-набору). AUTH под default_admin (requirepass убран).
    - module: community.redis.acl
      params_subset:
        addr: "unix:/var/run/dragonfly/dragonfly.sock"
        username: default_admin
        password: dfadmin-update-users-pass

  # state_changes: df_users = [] (operator-extra стёрт целиком).
  state_changes:
    df_users: []
