# L0 trial for update_users: an EMPTY input.users removes ALL operator-extra users. The deployed
# state.df_users = {alice, bob}; the operator sets input.users = [] (empty array). bulk-replace
# replaces state.df_users ENTIRELY with an empty set:
#   1. users.acl renders WITHOUT operator-extra (system users would be merged in from essence —
#      here essence.system_acl_users is not set → vars.users = {} empty);
#   2. state_changes.df_users = [] (operator-extra wiped).
# Proves that bulk-replace lets you remove all operator-extra users with an empty array (system
# users outside state — remain via merge-in from essence on every render, see main.yml).
name: update_users with empty input removes all operator-extra users

fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  soulprint:
    network: { primary_ip: 10.0.0.5 }
    os: { arch: amd64 }

  # state v2: install/conf_dir/data_dir moved out into essence (not state).
  state:
    df_version: "1.39.0"
    tls:
      enable:   false
      cert_ref: ""
      key_ref:  ""
      ca_ref:   ""
    df_config:
      maxmemory:        "256mb"
    df_users:
      - { name: alice, perms: "~* +@all", state: "on" }
      - { name: bob, perms: "~app:* +@read", state: "on" }

  # Empty set: remove all operator-extra users.
  input:
    users: []

  # Vault: default_admin (masterauth merged into the flagfile + ACL LOAD-AUTH read it unconditionally).
  vault:
    secret/dragonfly/update_users/users/default_admin:
      password: dfadmin-update-users-pass

assert:
  task_present:
    # users.acl renders with an EMPTY set (operator-extra wiped; no system users — essence
    # without system_acl_users → vars.users = {}).
    - module: core.file.rendered
      params_subset:
        path: /etc/dragonfly/users.acl
        render_context:
          vars:
            users: {}
          self:
            sid: trial-host
            covens: [update_users]
            choirs: []
            traits: {}
            role: ""
            network:
              primary_ip: 10.0.0.5
            os:
              arch: amd64
          role: ""
          essence: {}

    # HOT-RELOAD ACL: community.redis.acl over a LOCAL UNIX socket (ACL LOAD brings the instance
    # to an empty operator set). AUTH as default_admin (requirepass removed).
    - module: community.redis.acl
      params_subset:
        addr: "unix:/var/run/dragonfly/dragonfly.sock"
        username: default_admin
        password: dfadmin-update-users-pass

  # state_changes: df_users = [] (operator-extra wiped entirely).
  state_changes:
    df_users: []
