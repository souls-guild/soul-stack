name: rotate_tls
description: >-
  Операционный сценарий: ротация TLS-материала DragonFly (серверный cert/key + CA) БЕЗ рестарта процесса.
  DragonFly перечитывает cert/key/CA на лету по CONFIG SET tls_*_file — рестарт демона не
  нужен (производственная конвенция «hot-reload > рестарт», docs/destiny/production-
  conventions.md §3a/§6). REUSE из redis/rotate_tls.

  ★★ DragonFly vs redis (КРИТИЧНАЯ АДАПТАЦИЯ): имена TLS-флагов DragonFly — UNDERSCORE-форма
  (tls_cert_file / tls_key_file / tls_ca_cert_file), НЕ дефис как у redis (tls-cert-file).
  Подтверждено разведкой исходников DragonFly (src/server/tls/tls_helpers.cc:
  ABSL_FLAG(std::string, tls_cert_file ...), tls_key_file, tls_ca_cert_file; все три
  config_registry.RegisterMutable → мутабельны через CONFIG SET, server_family.cc:1229-1231).
  Три CONFIG SET-команды ниже несут эти underscore-имена.

  Отдельный сценарий РАДИ ЯВНОЙ АУДИТ-СЕМАНТИКИ ротации: «сменился TLS-материал» — отдельное
  событие в state_history, с собственным input (новые Vault-refs cert/key/ca) и собственной
  мутацией state.tls.*_ref.

  Оператор задаёт НОВЫЕ Vault-ПУТИ серверного cert/key/CA (не сам PEM — секрет идёт через
  vault() в ячейке content destiny, seal-маскинг). Сценарий: (1) destiny `dragonfly`
  перерендеривает PEM в ${conf_dir}/tls/{dragonfly.crt,dragonfly.key,ca.crt} из НОВЫХ refs
  (apply: register: tls_certs — агрегат changed по дочерним core.file.present); (2) три
  community.redis.command CONFIG SET tls_cert_file / tls_key_file / tls_ca_cert_file ПОД
  onchanges:[tls_certs] — DragonFly ПЕРЕСОЗДАЁТ SSL_CTX и перечитывает PEM live, но ТОЛЬКО
  когда PEM реально сменился (один command = одна команда → три шага, все на одном onchanges-гейте).

  ★ ПРЕДУСЛОВИЕ: TLS уже ВКЛЮЧЁН на инстансе (state.tls.enable=true). Ротация на plaintext-
  инстансе бессмысленна — assert-шаг рвёт прогон ДО applying. Включение TLS на работающем
  plaintext-DragonFly — отдельная операция (флаг --tls переводит ОСНОВНОЙ listener в TLS на
  старте; hot-включение основного порта в TLS требует рестарта), не rotate_tls.

  ★ ИДЕМПОТЕНТНОСТЬ ПО onchanges: три CONFIG SET гейтятся onchanges:[tls_certs] (НЕ force
  changed:true), где tls_certs — applier-register apply-шага 2. Движок эмитит синтетическую
  core.noop.run с register_data = OR(changed) по дочерним destiny-задачам (orchestration.md
  §2.1.1). re-read SSL_CTX срабатывает ТОЛЬКО когда PEM реально сменился; повторный прогон с
  тем же материалом → файлы не меняются → агрегат changed=false → три CONFIG SET skipped →
  весь сценарий no-op.

  Таргетинг — на весь incarnation (on опущен, ADR-008/009): новый PEM + reload идут на КАЖДЫЙ
  dragonfly-хост. TLS-материал host-инвариантен (один cert/CA на кластер).

# ── Входной контракт оператора (docs/input.md) ────────────────────────────────
# НОВЫЕ Vault-ПУТИ серверного cert/key/CA (форма "<mount>/<path>#<field>"), НЕ сам PEM. Каждый
# опционален — оператор ротирует лишь часть (напр. только cert+key, CA тот же); не заданный ref
# берёт ТЕКУЩИЙ из incarnation.state.tls (подложка).
input:
  cert_ref:
    type: string
    required: false
    description: >-
      Новый Vault-путь серверного TLS-сертификата (dragonfly.crt). Не задан → текущий
      state.tls.cert_ref (CA/key ротируются независимо).

  key_ref:
    type: string
    required: false
    description: >-
      Новый Vault-путь серверного приватного ключа (dragonfly.key). Не задан → текущий
      state.tls.key_ref.

  ca_ref:
    type: string
    required: false
    description: >-
      Новый Vault-путь CA-сертификата кластера (ca.crt). Не задан → текущий state.tls.ca_ref.

# ── Декларативные input-инварианты (validate:) ───────────────────────────────────
# (1) хотя бы один ref задан (иначе нечего ротировать). TLS-предусловие (state.tls.enable=true)
# НЕ выразимо через input (state недоступен в validate-контексте) — оно вынесено в первый
# assert-шаг ниже (полный scenario-контекст с incarnation.state). Здесь — только «хотя бы один ref».
validate:
  - that: "has(input.cert_ref) || has(input.key_ref) || has(input.ca_ref)"
    message: "rotate_tls требует хотя бы один новый ref (cert_ref/key_ref/ca_ref)"

# ── Вычисляемые scenario-vars (compute:) ─────────────────────────────────────────
# Рун-уровневый контекст (input/essence/incarnation — без soulprint).
#
# ★ DragonFly vs redis (БЛОКЕР-фикс): три CONFIG SET tls_*_file идут к ЛОКАЛЬНОМУ инстансу
# через UNIX-СОКЕТ (compute.local_addr), НЕ 127.0.0.1:tls_port. DF при --bind=primary_ip НЕ
# слушает loopback; сокет — отдельный UDS-listener (всегда локально доступен, даже пока TLS-
# материал ротируется). ★ UDS не сетевой путь → tls/tls_ca коннекта НЕ нужны: re-read SSL_CTX
# (CONFIG SET tls_*_file) выполняется командой ВНУТРИ локального коннекта, а handshake клиент↔
# сервер на сокете не идёт через TLS. Это снимает курицу-яйцо «коннектиться TLS старым CA, пока
# его же подменяешь». run_dir host-инвариант; default дублирует дефолт.
compute:
  local_addr: "${ 'unix:' + default(essence.run_dir, '/var/run/dragonfly') + '/dragonfly.sock' }"
  # ★ admin_user (редизайн default_admin): 3 CONFIG SET tls_*_file коннектятся под ним
  # (requirepass убран). Литерал (операционный сценарий вне covenant).
  admin_user: "${ 'default_admin' }"
  # ── host-layout из essence (v1→v2, миграция): conf_dir/data_dir/install больше не в state ──
  # ★ conf_dir из essence (не state) — операционный сценарий читает актуальный layout; PEM кладётся в
  # ${conf_dir}/tls/. install у rotate read-model без реального читателя → package-дефолт.
  conf_dir:   "${ default(essence.conf_dir, '/etc/dragonfly') }"
  data_dir:   "${ default(essence.data_dir, '/var/lib/dragonfly') }"
  install:    "${ (default(essence.install_method, 'package') == 'binary') ? { 'method': 'binary', 'base_url': default(essence.binary_base_url, ''), 'version': default(essence.binary_version, '') } : { 'method': 'package' } }"

  # Эффективные refs: новый из input бьёт текущий из state (подложка — частичная ротация).
  # has()-цепочка (default(input, state) упал бы no-such-key, если input.*_ref отсутствует
  # целиком — default ловит лист, не корень аргумента).
  cert_ref: "${ has(input.cert_ref) ? input.cert_ref : incarnation.state.tls.cert_ref }"
  key_ref:  "${ has(input.key_ref)  ? input.key_ref  : incarnation.state.tls.key_ref }"
  ca_ref:   "${ has(input.ca_ref)   ? input.ca_ref   : incarnation.state.tls.ca_ref }"

# ── Мутация incarnation.state ─────────────────────────────────────────────────
# операционный сценарий фиксирует НОВЫЕ Vault-refs cert/key/ca (read-model state.tls.*_ref). enable НЕ меняется
# (rotate только материал). ★ БЕЗ only/port: у DragonFly TLS на основном порту (нет tls_port,
# нет «только-TLS»). Тот же compute.*_ref, что ушёл в render PEM destiny.
state_changes:
  - set: tls
    value: >-
      ${ {
           'enable':   incarnation.state.tls.enable,
           'cert_ref': compute.cert_ref,
           'key_ref':  compute.key_ref,
           'ca_ref':   compute.ca_ref
         } }

tasks:
  # 1. GUARD — TLS обязан быть включён (state.tls.enable=true). Предикат вычисляется KEEPER-SIDE
  #    на рендере (incarnation.state доступен). false ОБРЫВАЕТ render с message ДО dispatch —
  #    раньше и понятнее, чем падение коннекта на хосте. assert НЕ emit RenderedTask.
  - name: Guard TLS is enabled on the instance before rotating its material
    assert:
      that:
        - "has(incarnation.state) && has(incarnation.state.tls) && default(incarnation.state.tls.enable, false)"
      message: "rotate_tls guard: TLS must be enabled (state.tls.enable=true); rotating material on a plaintext instance is meaningless"

  # 2. Перерендерить PEM в ${conf_dir}/tls/ из НОВЫХ refs (тот же destiny `dragonfly`, что create).
  #    apply.input.tls несёт enable + НОВЫЕ cert_ref/key_ref/ca_ref → destiny server.yml кладёт
  #    cert/key/ca через core.file.present + vault(ref) в ячейке (seal-маскинг). config —
  #    state.df_config + долив masteruser/masterauth (dragonfly.conf сам при ротации не
  #    меняется; tls_*_file пути те же), симметрично add_user/update_users — иначе flagfile
  #    на диске потерял бы replica→master AUTH → NOAUTH после рестарта реплики.
  #    version — из state; install/conf_dir/data_dir — из essence (v1→v2). register: tls_certs —
  #    applier-register, гейтящий reload ниже. ★ users: СИСТЕМНЫЕ (из essence, вкл. default_admin)
  #    + operator-extra (state.df_users) — destiny перерендеривает весь users.acl, без долива
  #    системных стёр бы default_admin/replica/... → сломал бы AUTH/репликацию (симметрия redis
  #    rotate_tls). ACL здесь НЕ оживляется (ACL LOAD нет), но файл на диске обязан нести ВСЕХ.
  - name: Re-render TLS PEM material from the new Vault refs
    register: tls_certs
    apply:
      destiny: dragonfly
      input:
        version:  "${ has(incarnation.state.df_version) ? incarnation.state.df_version : '' }"
        # host-layout — из essence (v1→v2, Вариант A): install/conf_dir/data_dir из compute
        # (сам из essence). ★ РЕДИЗАЙН default_admin: apply.input.password УДАЛЁН (destiny
        # больше не принимает — requirepass убран); аутентификация под системным default_admin
        # из users ниже.
        install:  "${ compute.install }"
        conf_dir: "${ compute.conf_dir }"
        data_dir: "${ compute.data_dir }"
        config: >-
          ${ merge(incarnation.state.df_config, {
               'masteruser': compute.admin_user,
               'masterauth': vault('secret/dragonfly/' + incarnation.name + '/users/' + compute.admin_user + '#password')
             }) }
        tls:
          enable:   "${ incarnation.state.tls.enable }"
          cert_ref: "${ compute.cert_ref }"
          key_ref:  "${ compute.key_ref }"
          ca_ref:   "${ compute.ca_ref }"
        # ★ СИСТЕМНЫЕ + operator-extra (как деплой-тело/redis rotate_tls): destiny перерендеривает
        # и users.acl (тот же кирпич) → ОБЯЗАН долить системных из essence.system_acl_users
        # ПЕРВЫМИ (default_admin/replica/monitoring/sentinel/haproxy), иначе rotate_tls СТЁР БЫ их
        # из users.acl → сломал бы AUTH/репликацию. operator-extra (state.df_users — МАССИВ
        # AclUser) ПОВЕРХ (last-wins). Системные НЕ в state — доливаются из essence на каждом
        # рендере. Vault-пароль той же ветки secret/dragonfly/<inc>/users/<name>#password.
        users: >-
          ${ merge(
               merge(default(essence.system_acl_users, {}).map(name, {
                 name: {
                   'perms':    essence.system_acl_users[name],
                   'state':    'on',
                   'password': vault('secret/dragonfly/' + incarnation.name + '/users/' + name + '#password')
                 }
               })),
               has(incarnation.state.df_users)
                 ? merge(incarnation.state.df_users.map(u, {
                     u.name: {
                       'perms':    u.perms,
                       'state':    u.state,
                       'password': vault('secret/dragonfly/' + incarnation.name + '/users/' + u.name + '#password')
                     }
                   }))
                 : {}
             ) }

  # 3. HOT-RELOAD CERT: три community.redis.command (CONFIG SET tls_cert_file / tls_key_file /
  #    tls_ca_cert_file — UNDERSCORE, DragonFly-форма) пересоздают SSL_CTX на live-инстансе.
  #    DragonFly ПЕРЕСОЗДАЁТ SSL_CTX по CONFIG SET tls_*_file (RegisterMutable) → читает свежий
  #    PEM с диска. command (raw verb-state) бьёт МИМО diff-skip community.redis.config (тот сравнил
  #    бы значения CONFIG GET, счёл no-op при том же пути и не дёрнул бы CONFIG SET) — нужен raw
  #    CONFIG SET, чтобы re-read сработал. Гейт — onchanges:[tls_certs] (идемпотентность): один
  #    command = один verb → три шага на одном гейте. Пути PEM — из conf_dir (туда destiny положил
  #    материал: dragonfly.crt/dragonfly.key/ca.crt). ★ addr — ЛОКАЛЬНЫЙ UNIX-сокет
  #    (compute.local_addr); tls/tls_ca коннекта НЕ нужны (UDS не сетевой путь — handshake клиент↔
  #    сервер не TLS). CONFIG SET tls_*_file всё равно подменяет СЕРВЕРНЫЙ материал live.
  - name: Re-read the rotated TLS cert when it changed (CONFIG SET tls_cert_file)
    module: community.redis.command
    onchanges: [tls_certs]
    params:
      addr:     "${ compute.local_addr }"
      # ★ РЕДИЗАЙН default_admin: AUTH под default_admin (requirepass убран). UDS без TLS.
      username: "${ compute.admin_user }"
      password: "${ vault('secret/dragonfly/' + incarnation.name + '/users/' + compute.admin_user + '#password') }"
      args:     ["CONFIG", "SET", "tls_cert_file", "${ compute.conf_dir + '/tls/dragonfly.crt' }"]

  - name: Re-read the rotated TLS key when it changed (CONFIG SET tls_key_file)
    module: community.redis.command
    onchanges: [tls_certs]
    params:
      addr:     "${ compute.local_addr }"
      # ★ РЕДИЗАЙН default_admin: AUTH под default_admin (requirepass убран). UDS без TLS.
      username: "${ compute.admin_user }"
      password: "${ vault('secret/dragonfly/' + incarnation.name + '/users/' + compute.admin_user + '#password') }"
      args:     ["CONFIG", "SET", "tls_key_file", "${ compute.conf_dir + '/tls/dragonfly.key' }"]

  - name: Re-read the rotated TLS CA cert when it changed (CONFIG SET tls_ca_cert_file)
    module: community.redis.command
    onchanges: [tls_certs]
    params:
      addr:     "${ compute.local_addr }"
      # ★ РЕДИЗАЙН default_admin: AUTH под default_admin (requirepass убран). UDS без TLS.
      username: "${ compute.admin_user }"
      password: "${ vault('secret/dragonfly/' + incarnation.name + '/users/' + compute.admin_user + '#password') }"
      args:     ["CONFIG", "SET", "tls_ca_cert_file", "${ compute.conf_dir + '/tls/ca.crt' }"]
