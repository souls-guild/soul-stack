# L0-GUARD for provisioned_sids ↔ provisioned_vm_ids parity (security, redis sample).
# Negative case for destroy-provisioned: incarnation.state carries MISMATCHED lengths —
# 4 vm_ids but 3 sids. This is state corruption (manual edit / partial migration / a bug
# in the provision-guard) that destroy MUST catch BEFORE irreversible teardown.
#
# ★ WHY THIS IS a security invariant: vm_ids remove the VM from the provider, sids clean
# up keeper registries (souls→destroyed, soul_seeds→orphaned, bootstrap_tokens→burned).
# A length mismatch means orphaned records: the VM is removed, but its SID (with an
# active soul_seed + an unused bootstrap_token) stays in the registry. This is:
#   (1) orphan souls/seeds — garbage that the Reaper does NOT clean up (mark_disconnected
#       only touches connected→disconnected, not pending-VM-souls);
#   (2) a violation of anti-replay — the un-burned bootstrap_token is reusable.
# create writes both sets with ONE guard from register.provision.hosts (a single source
# of the size), so under normal conditions the lengths are EQUAL; the assert catches
# corruption.
#
# ★ INVARIANT UNDER TEST: the first assert-step of destroy/main.yml
# (size(provisioned_sids) == size(provisioned_vm_ids)) is computed keeper-side in the
# render-phase ONCE, BEFORE dispatching core.cloud.destroyed. 3 != 4 → assert false →
# render ABORTS (expect_render_error) BEFORE any cloud call or cascade. Paired with
# destroy-provisioned (4 == 4, passes). Render-only, hermetic.
name: destroy aborts when provisioned sids and vm_ids lengths disagree

fixtures:
  # destroy does not carry apply:destiny (keeper-only), but the harness keeps the key for
  # uniformity of roster-resolve (like destroy-provisioned).
  default_destiny_source: "file://../../destiny/{name}"
  hosts:
    - sid: vm-1.example.com
      covens: [destroy]
      soulprint:
        network: { primary_ip: 10.0.0.1 }
        os: { arch: amd64 }

  essence:
    install_method: package
    conf_dir: /etc/dragonfly

  # incarnation.state with MISMATCHED provisioned-sets: 4 vm_id but 3 sid
  # (one VM would be left without a cascade of its SID → orphan soul/seed/token). the
  # parity assert (3 == 4 → false) aborts the run BEFORE dispatching core.cloud.destroyed.
  state:
    df_version: "1.39.0"
    df_config:
      maxmemory: "256mb"
    provisioned_vm_ids: [i-aaa111, i-bbb222, i-ccc333, i-ddd444]
    provisioned_sids: [vm-1.example.com, vm-2.example.com, vm-3.example.com]
    provisioned_provider: example-dev

# The run aborts on the parity assert-step (destroy/main.yml tasks[0]).
# Substring — the rule's message (lengths must match).
expect_render_error: "lengths must match"
