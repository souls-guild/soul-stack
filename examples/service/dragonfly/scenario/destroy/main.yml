name: destroy
description: >-
  Teardown DragonFly: снять с КАЖДОГО хоста инкарнации то, что поставил create — systemd-
  сервисы + конфиг-артефакты — ПЕРЕД удалением инкарнации. Lifecycle-сценарий (НЕ runnable из
  Run-формы — terminal-флоу DELETE /v1/incarnations/{name}, как create — bootstrap): keeper
  трактует имя `destroy` как фазу жизненного цикла (scenario.LifecycleScenarioNames),
  запускается в режиме TerminalDestroy.

  ★ DragonFly ДВУХРЕЖИМНЫЙ teardown (решение пользователя 2026-07-01: DragonFly cloud-provision
  ПО ОБРАЗЦУ redis; provision обязателен в базовом create — default-on): destroy несёт ОБЕ ветки.
    (1) CLOUD-CASCADE (симметрия redis/destroy): когда create ПРОВИЖИЛ VM (provisioned_vm_ids/
        sids в state — default-on путь), destroy снимает облачные VM (core.cloud.destroyed,
        on: keeper) + cascade keeper-реестров (souls→destroyed/seeds→orphaned/tokens→burned).
        Гейт `when: size(provisioned_vm_ids) > 0` (static → group-drop) держит эту задачу ТОЛЬКО
        на провиженных инкарнациях. assert парности sids↔vm_ids ДО destroy (как redis).
    (2) SOUL-SIDE teardown (прежний профиль DragonFly): когда create катился на СУЩЕСТВУЮЩИЕ
        хосты (provision: {enabled: false} — не провижен) — VM не наши, снимать облачно нечего,
        поэтому чистим Soul-side: остановить сервисы + удалить наши /etc-артефакты. Эти шаги
        идемпотентны и БЕЗУСЛОВНЫ: на провиженной инкарнации они безвредно отработают на VM
        (которые тут же снимает cloud-destroy), на не-провиженной — единственный teardown.
  Обе ветки в одном сценарии: cloud-cascade group-drop-ается на не-провиженных, Soul-side
  всегда активен. REUSE lifecycle-каркаса redis/destroy (input: {}, terminal, state_changes нет).

  ★ ГРАНИЦА TEARDOWN (консервативный MVP — снять «systemd + файлы», НЕ данные/пакеты-общего-
  назначения):
    - сервисы dragonfly + redis-sentinel + disable-thp ОСТАНАВЛИВАЮТСЯ (core.service.stopped,
      идемпотентно — нет сервиса → no-op). redis-sentinel поднимает destiny `redis` (sentinel
      из redis-плоскости, рефактор) — но имя systemd-юнита то же, остановка остаётся валидной;
    - DragonFly УБИРАЕТСЯ по СПОСОБУ установки (essence.install_method, static-гейт → group-drop):
      binary-ветка удаляет /usr/local/bin/dragonfly + свой unit-файл; package-ветка снимает
      distro-deb dragonfly (core.pkg.absent — пакет уносит свой systemd-юнит чисто, без отдельного
      daemon-reload);
    - НАШИ конфиг-артефакты DragonFly в ${conf_dir} и /etc (users.acl, dragonfly.conf, TLS PEM,
      logrotate/sysctl drop-in, disable-thp unit) УДАЛЯЮТСЯ — они всегда наши, безопасно в обеих
      ветках;
    - ★ SENTINEL-АРТЕФАКТЫ (sentinel.conf/sentinel-users.acl/redis-sentinel unit, пакет
      redis-server) НЕ снимаются ЗДЕСЬ — их разворачивает destiny `redis` (sentinel_only) в
      ЕЁ conf_dir (/etc/redis), не /etc/dragonfly. Полный sentinel-teardown — отдельный слайс
      (apply destiny `redis` teardown / явные /etc/redis-пути). Для PILOT не критично: redis-
      sentinel юнит гасится (stop выше), осиротевший конфиг безвреден на удаляемом хосте;
    - data_dir (snapshot-данные DragonFly), пакет redis-tools (redis-cli — общего назначения,
      ставится БЕЗУСЛОВНО), distro-юзер dragonfly — НЕ ТРОГАЮТСЯ (удаление данных деструктивно и
      необратимо; снос общих пакетов задел бы соседние сервисы). Это осознанная граница MVP —
      расширить «глубину» (purge данных, снос пакетов) — отдельным решением.

  ★ state_changes ОТСУТСТВУЮТ намеренно: destroy терминальный — инкарнация удаляется
  (auto_destroy), чистить state бессмысленно (он уходит вместе с инкарнацией). Зеркало create,
  где state НАПОЛНЯЕТСЯ; здесь не трогаем.

  Таргетинг — на весь incarnation (on опущен, ADR-008/009): teardown идёт на КАЖДЫЙ хост
  инкарнации (Soul-side, не keeper — host-операции над systemd/файлами).

# ── Входной контракт оператора ────────────────────────────────────────────────
# Пуст: destroy не принимает операторского ввода. Что снимать — ФАКТ из incarnation.state
# (provisioned_provider/vm_ids/sids для cloud-cascade) + способ установки и conf_dir из essence
# (install_method/conf_dir для Soul-side teardown), а не выбор оператора в момент teardown.
# Operator только инициирует удаление (DELETE /v1/incarnations/{name}).
input: {}

tasks:
  # ── CLOUD-CASCADE ветка (провиженные VM, симметрия redis/destroy, ADR-061) ────
  # ★ Инвариант парности sids↔vm_ids ДО destroy (architect): provisioned_sids и
  # provisioned_vm_ids читаются ПАРОЙ — cascade без sids оставил бы осиротевшие
  # souls/seeds/tokens (vm_ids снимают VM у провайдера, sids чистят реестры;
  # рассогласование длин = orphan). create пишет оба ОДНИМ guard-ом из
  # register.provision.hosts (один источник истины размера), поэтому в норме длины
  # равны; assert ловит порчу state (ручная правка / частичная миграция / баг) ДО
  # необратимого destroy. RUN-LEVEL precondition (вычисляется keeper-side в render-фазе
  # ОДИН раз, ДО dispatch destroyed). На не-провиженной инкарнации обе стороны default
  # [] → 0 == 0 → вакуумно true (assert не мешает Soul-side teardown без provision).
  # default(...) — поля back-compat-опциональны (инкарнации до v3/v4 без них).
  - name: Assert provisioned sids and vm_ids were captured as a pair before teardown
    assert:
      that:
        - "size(default(incarnation.state.provisioned_sids, [])) == size(default(incarnation.state.provisioned_vm_ids, []))"
      message: "рассогласование provisioned_sids и provisioned_vm_ids в incarnation.state: cascade-destroy без полного набора SID оставил бы осиротевшие записи souls/seeds/bootstrap_tokens (нарушение anti-replay) — длины обязаны совпадать (оба набора пишет create одним guard-ом из register.provision.hosts)"

  # Снятие VM + cascade keeper-реестров (core.cloud.destroyed, on: keeper). ★ Адрес
  # РОВНО core.cloud.destroyed (base core.cloud + state destroyed): applyDestroyed →
  # PluginHost.Destroy(vm_ids) ПОТОМ cascade(sids). params из incarnation.state (keeper-
  # задача видит pre-run снимок). GROUP-DROP на не-провиженных: when статичен
  # (incarnation.* только, isStaticWhen) → пустой provisioned_vm_ids исключает задачу из
  # плана (render-phase, не placeholder-skip). Инкарнации без provision проходят teardown
  # без cloud-вызова (только Soul-side ниже).
  - name: Destroy provisioned VMs and cascade their keeper registry records
    on: keeper
    module: core.cloud.destroyed
    when: "size(default(incarnation.state.provisioned_vm_ids, [])) > 0"
    params:
      provider: "${ incarnation.state.provisioned_provider }"
      vm_ids:   "${ incarnation.state.provisioned_vm_ids }"
      sids:     "${ incarnation.state.provisioned_sids }"

  # ── SOUL-SIDE teardown (прежний профиль DragonFly, всегда активен) ────────────
  # ── 1. Остановить сервисы DragonFly (идемпотентно) ───────────────────────────
  # core.service.stopped — приводит юнит к «не запущен». Нет сервиса (уже снят / не ставился)
  # → no-op. Останавливаем ДО удаления файлов/пакета: снять конфиг под работающим демоном —
  # гонка. Три юнита: dragonfly (data-плоскость), redis-sentinel (sentinel-демон — его ставит
  # destiny `redis`, но имя юнита то же), disable-thp (oneshot THP — RemainAfterExit, stop
  # снимает active-маркер).
  - name: Stop the dragonfly service
    module: core.service.stopped
    params:
      name: dragonfly

  - name: Stop the redis-sentinel service
    module: core.service.stopped
    params:
      name: redis-sentinel

  - name: Stop the disable-thp service
    module: core.service.stopped
    params:
      name: disable-thp

  # ── 2a. Убрать DragonFly — BINARY-ветка (upstream-tarball install) ────────────
  # Гейт static (essence.install_method только → isStaticWhen) → render-phase GROUP-DROP: на
  # package-инкарнации эти задачи физически исключены из плана. ★ v1→v2: способ установки
  # ВЫНЕСЕН из state в essence (install больше не в state) — гейт читает essence.install_method
  # (тот же источник, что compute.install у create). binary-create положил бинарь в
  # /usr/local/bin и СВОЙ unit в /etc/systemd/system — оба наши, удаляем.
  - name: Remove the dragonfly binary (binary install)
    module: core.file.absent
    when: "default(essence.install_method, 'package') == 'binary'"
    params:
      path: /usr/local/bin/dragonfly

  - name: Remove the dragonfly systemd unit (binary install)
    module: core.file.absent
    when: "default(essence.install_method, 'package') == 'binary'"
    params:
      path: /etc/systemd/system/dragonfly.service

  # ── 2b. Убрать DragonFly — PACKAGE-ветка (distro-deb dragonfly) ───────────────
  # Гейт static (group-drop на binary-инкарнации). package-create поставил distro-deb dragonfly
  # с его собственным systemd-юнитом — снимаем ПАКЕТОМ (core.pkg.absent), пакет уносит свой
  # юнит чисто (отдельный daemon-reload не нужен — apt/dpkg сам реконсилит systemd). ★ v1→v2:
  # способ установки из essence.install_method (package — дефолт): «method != binary».
  - name: Remove the dragonfly distribution package (package install)
    module: core.pkg.absent
    when: "default(essence.install_method, 'package') != 'binary'"
    params:
      name: dragonfly

  # ── 3. Удалить НАШИ конфиг-артефакты DragonFly (обе ветки, всегда наши) ───────
  # ${conf_dir}-файлы (users.acl, dragonfly.conf, TLS PEM) + /etc drop-in-ы (logrotate, sysctl,
  # disable-thp unit). conf_dir из essence (default /etc/dragonfly). core.file.absent идемпотентен
  # (нет файла → no-op). TLS-PEM удаляем безусловно: на plaintext-инкарнации этих файлов нет →
  # no-op (гейтить незачем). ★ sentinel.conf/sentinel-users.acl ЗДЕСЬ НЕ УДАЛЯЮТСЯ — их кладёт
  # destiny `redis` (sentinel_only) в /etc/redis, не /etc/dragonfly (рефактор «sentinel из redis»);
  # их teardown — отдельный слайс (см. шапку).
  - name: Remove the dragonfly users.acl
    module: core.file.absent
    params:
      path: "${ default(essence.conf_dir, '/etc/dragonfly') + '/users.acl' }"

  - name: Remove the dragonfly.conf flagfile
    module: core.file.absent
    params:
      path: "${ default(essence.conf_dir, '/etc/dragonfly') + '/dragonfly.conf' }"

  - name: Remove the TLS server certificate
    module: core.file.absent
    params:
      path: "${ default(essence.conf_dir, '/etc/dragonfly') + '/tls/dragonfly.crt' }"

  - name: Remove the TLS server private key
    module: core.file.absent
    params:
      path: "${ default(essence.conf_dir, '/etc/dragonfly') + '/tls/dragonfly.key' }"

  - name: Remove the TLS CA certificate
    module: core.file.absent
    params:
      path: "${ default(essence.conf_dir, '/etc/dragonfly') + '/tls/ca.crt' }"

  - name: Remove the dragonfly logrotate config
    module: core.file.absent
    params:
      path: /etc/logrotate.d/dragonfly

  - name: Remove the dragonfly sysctl drop-in
    module: core.file.absent
    params:
      path: /etc/sysctl.d/30-dragonfly.conf

  - name: Remove the disable-thp systemd unit
    module: core.file.absent
    params:
      path: /etc/systemd/system/disable-thp.service
