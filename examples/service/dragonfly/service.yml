name: dragonfly
state_schema_version: 4
description: >-
  DragonFly по концепции Ansible-роли (PILOT, sentinel-only). Оператор задаёт ПРОСТЫЕ
  типизированные понятия (память, ACL-юзеры, реплики, TLS), а сценарий create транслирует
  их в flagfile dragonfly.conf. Per-host install + render data-плоскости делает destiny
  `dragonfly`; sentinel-демон над DragonFly-master-ом разворачивает destiny `redis` в режиме
  sentinel_only (DragonFly не несёт redis-sentinel — рефактор «sentinel из destiny redis»;
  два apply:destiny в create, ADR-009). ЖИВОЙ рантайм (PING/REPLICAOF/SENTINEL MONITOR) идёт
  через плагин `community.redis` (DragonFly redis-совместим — плагин БЕЗ правок); оркестрация
  (порядок/таргетинг/health-gate) — в scenario сервиса.

  ★ PILOT-СКОУП (D1, 2026-06-27): ТОЛЬКО sentinel-режим (master-replica + sentinel-демон;
  replicas_per_master=0 даёт standalone-эквивалент). cluster ВНЕ скоупа (DragonFly cluster —
  emulated, отдельный слайс). Реализован ТОЛЬКО scenario `create`. Day-2 (restart/add_user/
  rotate_tls/destroy/update_config) — СЛЕД. слайс ПОСЛЕ review. Без диспетчера по режиму
  (один режим), без миграций (v1).

# state_schema_version = 4: цепочка миграций forward-only (ADR-019).
#   - 001_to_002 (migrations/001_to_002.yml): вынос install + host-layout
#     (conf_dir/data_dir) из state в essence — install read-model без читателей,
#     layout day-2 читают essence напрямую (default(essence.<x>, '<деф>')). Симметрия
#     redis 011_to_012 (Вариант A). У DragonFly НЕТ modules_base_url (redis-модули к DF
#     неприменимы) → вырезаются три поля, не четыре. sysctl_settings ОСТАЁТСЯ (read-model).
#   - 002_to_003 (migrations/002_to_003.yml): cloud-provision read-model (ADR-061,
#     Вариант A — create поднимает VM в том же прогоне; решение пользователя 2026-07-01,
#     DragonFly cloud-provision по образцу redis). Добавляет provisioned_vm_ids (array
#     string — provider-vm-id созданных VM, day-2 teardown читает их для core.cloud.destroyed)
#     и provisioned_provider (string — имя cloud-Provider). Зеркало redis 006_to_007. Default
#     для инкарнаций без provision (deploy на существующие хосты): provisioned_vm_ids=[] и
#     provisioned_provider='' (не провиженные нашим сервисом).
#   - 003_to_004 (migrations/003_to_004.yml): cascade-destroy read-model (дополнение к v3).
#     Добавляет provisioned_sids (array string — SID/FQDN созданных нашим прогоном VM; day-2
#     cascade-teardown добивает осиротевшие souls/seeds/tokens — Reaper НЕ снимает pending-VM-
#     souls, без sids они повисли бы, anti-replay нарушен). Рядом с provisioned_vm_ids: vm_ids —
#     provider-id (для core.cloud.destroyed), sids — Keeper-side идентичность Soul (для cascade).
#     Зеркало redis 007_to_008.
# incarnation.state фиксирует, что развёрнуто, чтобы оператор видел инсталляцию и
# повторный apply был idempotent. Мини-схема (без cluster/modules/seeded_from — вне
# PILOT-скоупа; provision-read-model добавлен v2→v4 по образцу redis).
#
# ГРАНИЦА двух представлений конфига (как у redis):
#   - df_config (opaque, additionalProperties:true) — ВЫЧИСЛЕННЫЙ ИТОГ трансляции простого
#     ввода в flagfile-map (что реально уйдёт в render). Write-model «как развёрнуто».
#   - именованные поля (tls/memory_mb/...) — НАМЕРЕНИЕ оператора в простых типизированных
#     понятиях (read-model). День-2-сценарии читают их именованно. install и host-layout
#     (conf_dir/data_dir) вынесены в essence (v1→v2, Вариант A): install — read-model без
#     читателей, layout — day-2 читают essence.
# ОБА заполняются из ОДНОГО compute-прохода create — рассинхрона нет.
state_schema:
  type: object
  required: [df_config]
  properties:
    # Эффективная версия DragonFly (distro-пин при package; upstream-semver при binary).
    df_version:
      type: string
    # Итоговый flagfile-конфиг (merged default→вычисления→passthrough из essence). Уходит
    # в render destiny `dragonfly`. Ключи — DF-флаги (underscore-форма).
    df_config:
      type: object
      additionalProperties: true

    # ── Именованные поля намерения (read-model) ────────────────────────────────
    # TLS-намерение: включён ли TLS + Vault-ПУТИ cert/key/CA (НЕ сам PEM — секрет в state не
    # лежит, ИБ). Из compute.tls_* (те же значения, что в TLS-блоке df_config). ★ БЕЗ only/port:
    # у DragonFly TLS на ОСНОВНОМ порту (нет tls_port, нет «только-TLS») — day-2-сценарии
    # коннектятся к локальному инстансу по UNIX-сокету, TLS-порт им не нужен.
    tls:
      type: object
      additionalProperties: false
      properties:
        enable:   { type: boolean }
        cert_ref: { type: string }
        key_ref:  { type: string }
        ca_ref:   { type: string }
    # ★ install + host-layout (conf_dir/data_dir) ВЫНЕСЕНЫ в essence (v1→v2, Вариант A):
    # install — read-model без читателей, layout — day-2 читают essence напрямую
    # (default(essence.conf_dir, '/etc/dragonfly') / data_dir). В state их полей больше нет —
    # set писал бы ключ вне схемы → валидация state упала бы (см. миграцию 001_to_002).
    # Бюджет памяти под DragonFly, МБ. Из input.memory_mb; не задан → 0.
    memory_mb:
      type: integer
      minimum: 64
    # Применённые kernel-параметры под DragonFly (host-tuning). Из essence.sysctl_settings.
    sysctl_settings:
      type: object
      additionalProperties:
        type: string

    # ── Топология (counts, sentinel-режим) ─────────────────────────────────────
    # replicas — реплик master-а (из input.replicas_per_master). sentinel_quorum — ВСЕГДА 0
    # (auto-quorum size/2+1 вычисляется в apply, в state не материализуется; 0 = «auto»).
    replicas:        { type: integer }
    sentinel_quorum: { type: integer }

    # ACL-пользователи DragonFly: ТИПИЗИРОВАННЫЙ массив [{name, perms, state}] (ADR-062
    # AclUser). Наполняется create из input.users (тоже массив AclUser); пароли — НЕ в state
    # (keeper-side Vault, ADR-012).
    df_users:
      type: array
      items:
        type: object
        required: [name, perms, state]
        properties:
          name:  { type: string }
          perms: { type: string }
          state: { type: string, enum: [on, off] }
        additionalProperties: false
    # Хосты топологии (sid + роль). Наполняется сценарием create (раскладка ролей по
    # таргетированным souls). Точная роль каждого SID в state — follow-up (как у redis).
    df_hosts:
      type: array
      items:
        type: object
        required: [sid, role]
        properties:
          sid:  { type: string, format: fqdn }
          role: { type: string, enum: [primary, replica, sentinel] }
    # Факты sentinel-режима (master_name + quorum monitored master + тайминги failover).
    # Наполняется create. master_ip create НЕ пишет (master выбирается из roster-а,
    # host-вариативен).
    df_sentinel:
      type: object
      additionalProperties: false
      properties:
        master_name:         { type: string }
        master_ip:           { type: string }
        quorum:              { type: integer }
        down_after_ms:       { type: integer }
        failover_timeout_ms: { type: integer }

    # ── cloud-provision read-model (v2→v4, ADR-061, Вариант A) ──────────────────
    # ФАКТ «эти хосты подняты нашим create-прогоном через cloud-create». Заполняется
    # create ТОЛЬКО когда input.provision.enabled (provider/vm_ids/sids из register
    # core.cloud.created); иначе [] / '' (хосты не провиженные сервисом — declared
    # roster). day-2 teardown читает provisioned_vm_ids для core.cloud.destroyed.
    # provider — имя cloud-Provider в реестре (для того же destroy-вызова). Зеркало
    # redis service.yml provisioned_* (решение пользователя 2026-07-01).
    provisioned_vm_ids:
      type: array
      items:
        type: string
    provisioned_provider:
      type: string
    # provisioned_sids (v4): SID (FQDN) каждой VM, поднятой этим create-прогоном. ОТЛИЧНО
    # от provisioned_vm_ids: vm_ids — provider-side id (для core.cloud.destroyed), sids —
    # Keeper-side идентичность Soul. day-2 teardown (cascade destroy) читает sids, чтобы
    # добить осиротевшие souls (→destroyed) / seeds (→orphaned) / bootstrap-токены
    # (→burned): Reaper НЕ снимает pending-VM-souls сам (mark_disconnected только
    # connected→disconnected), без sids записи повисли бы (нарушение anti-replay).
    # Заполняется тем же guard+формой, что provisioned_vm_ids (input.provision.enabled →
    # register.provision.hosts.map(h, h.sid)); иначе [].
    provisioned_sids:
      type: array
      items:
        type: string

# Зависимости-destiny (ADR-007: версия зависимости = git ref, не semver-range).
#   - `dragonfly` — кирпич data-плоскости DragonFly (examples/destiny/dragonfly/);
#   - `redis`     — кирпич Redis (examples/destiny/redis/), используется в режиме
#     sentinel_only (deploy_redis=false) для sentinel-демона над DragonFly-master-ом
#     (рефактор «sentinel из destiny redis»: DragonFly не несёт redis-sentinel). scenario
#     create делает ДВА apply:destiny (dragonfly + redis), ADR-009.
destiny:
  - { name: dragonfly, ref: v1.0.0 }
  - { name: redis, ref: v1.0.0 }

# Custom-модули сервиса. community.redis — ОСНОВНОЙ интерфейс к живому DragonFly (redis-
# совместим: PING/REPLICAOF/SENTINEL работают; examples/module/soul-mod-community-redis/).
modules:
  - { name: community.redis, ref: v1.0.0 }
