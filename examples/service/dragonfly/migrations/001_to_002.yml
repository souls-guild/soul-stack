from_version: 1
to_version: 2

description: >-
  v1->v2: moves install + host-layout (conf_dir/data_dir) out of incarnation.state
  into essence (symmetric with redis 011_to_012, Option A). install is a
  read-model with no readers; conf_dir/data_dir - operational scenarios switched
  to essence reads (default(essence.<x>, '<default>')). Forward-only, delete is
  a no-op on incarnations without the fields. * DragonFly vs redis: DragonFly has
  NO modules_base_url (redis .so modules don't apply to DF) - only three fields
  are removed. sysctl_settings STAYS in state (read-model, same as redis) - not
  moved out.

transform:
  - delete: { path: state.install }
  - delete: { path: state.conf_dir }
  - delete: { path: state.data_dir }
