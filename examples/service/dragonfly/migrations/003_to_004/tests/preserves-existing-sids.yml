name: preserves-existing-sids
description: >
  Идемпотентность: инкарнация, у которой provisioned_sids УЖЕ есть (повторный
  прогон миграции / inline-seed), сохраняет значение как есть (has()-guard
  возвращает текущее, не перезатирает default-ом []). Зеркало redis
  007_to_008 preserves-existing-sids.

state_before:
  df_version: "1.39.0"
  provisioned_vm_ids: ["i-aaa111", "i-bbb222"]
  provisioned_provider: "wb-prod"
  provisioned_sids: ["vm-1.example.com", "vm-2.example.com"]

state_after:
  df_version: "1.39.0"
  provisioned_vm_ids: ["i-aaa111", "i-bbb222"]
  provisioned_provider: "wb-prod"
  provisioned_sids: ["vm-1.example.com", "vm-2.example.com"]
