from_version: 5
to_version: 6

description: >-
  state_schema v5 → v6: mandatory log-shipping of the data plane (Slice V-I, ADR-067).
  state gets AUGMENTED with a read-model object logging — captured version/sink/sources of the vector
  agent, deployed by the create run on each host (symmetry with v4→v5 monitoring: metrics
  exporter). The collector access secret (sink_auth_ref) is NOT stored in state (security — it lives in Vault, like
  tls.*_ref).

  Forward-only (down: not supported; recovery — via state_history). Existing
  v5 incarnations were deployed BEFORE log-shipping was introduced (no vector agent yet) → conservative default:
  version empty ('' = "not deployed", best-effort as monitoring in 004_to_005), sink_type console
  (safe default without external infra), sink_endpoint '' , log_sources [] (the next create
  will overwrite them with values from essence.vector_*). ONE flat set with a has()-guard on the WHOLE object
  (CEL map-literal default): logging already present → kept as is (idempotency of a repeat
  run), otherwise default is set. Mirrors redis 013_to_014 (object-guard). The rest of state
  (including monitoring) is NOT touched.

transform:
  - set:
      path: state.logging
      value: >-
        ${ has(state.logging)
             ? state.logging
             : {
                 'vector_version':       '',
                 'vector_sink_type':     'console',
                 'vector_sink_endpoint': '',
                 'vector_log_sources':   []
               } }
