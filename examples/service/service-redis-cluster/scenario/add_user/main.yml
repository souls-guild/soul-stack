name: add_user
description: Add a single Redis user with ACL

# Формат блока — docs/input.md.
input:
  user:
    type: string
    required: true
    pattern: "^[a-zA-Z][a-zA-Z0-9_-]{1,31}$"

  acl:
    type: string
    required: true
    min_length: 1

  state:
    type: string
    required: true
    enum: [on, off]

state_changes:
  appends: [redis_users]

tasks:
  # Probe: фактическая роль каждого хоста (actual-роль волатильна, берётся
  # живым probe непосредственно перед таргетингом — concept.md, ADR-008).
  # failed_when: утверждает полноту ответа (идиома orchestration.md §5):
  # частичный probe → failed → сценарий стоп, state не коммитится (§7).
  - name: Detect actual redis role per host
    module: core.cmd.shell
    on: ["${ incarnation.name }"]
    register: redis_role
    changed_when: false
    failed_when: size(register.redis_role) < incarnation.host_count
    params:
      cmd: "redis-cli role | head -1"

  # Создаём пользователя на текущем мастере. run_once: — ровно один хост
  # (первый по SID) из резолва on:+where: (orchestration.md §2). >1 «текущих
  # master» по probe — норма, шаг идёт на одном детерминированном.
  - name: Create the user on the current master
    on: ["${ incarnation.name }"]
    where: register.redis_role.stdout == 'master'
    run_once: true
    apply:
      destiny: redis
      input:
        action: ensure_user
        user:   "${ input.user }"
        acl:    "${ input.acl }"
        state:  "${ input.state }"

  # Health-gate: ждём, пока юзер реплицируется на все реплики. wait: изъят
  # (orchestration.md §2) — бюджет времени и условие выражены
  # унаследованным retry:+until: на probe-шаге (count × delay = бюджет,
  # until: = условие). БЕЗ именованного register: — самодостаточный
  # health-gate, register.self.* (destiny/tasks.md §9, §10).
  - name: Wait until the user is replicated to all replicas
    module: core.exec.run
    on: ["${ incarnation.name }"]
    where: register.redis_role.stdout == 'slave'
    changed_when: false
    retry:
      count: 15
      delay: 2s
      until: contains(register.self.stdout, input.user)
    failed_when: "!contains(register.self.stdout, input.user)"
    params:
      cmd: redis-cli
      args: ["ACL", "GETUSER", "${ input.user }"]
