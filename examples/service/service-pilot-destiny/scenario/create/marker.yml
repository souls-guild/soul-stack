# scenario-include-сосед (orchestration.md §6): подключается из create/main.yml.
# Та же структура задач — apply:destiny-задача, делегирующая укладку маркера в
# destiny pilot-flat. Резолв scenario-локально (scenario/create/marker.yml).

- name: Apply pilot-flat marker destiny
  apply:
    destiny: pilot-flat
    input:
      # CEL по scenario-scope: значения резолвятся в scenario-env, а в destiny
      # уходит уже результат (destiny scenario-input не видит).
      marker_file:    "${ input.path }"
      marker_payload: "${ input.content }"
