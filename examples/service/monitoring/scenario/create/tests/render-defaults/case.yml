# L0-испытание (Trial, ADR-023) сценария create сервиса monitoring.
#
# Render-only, герметично: проверяет, что при дефолтных input-ах render-пайплайн
# (CEL-фаза) даёт ожидаемые rendered_tasks. После унификации дрейфа план — это
# КОМПОЗИЦИЯ destiny node-exporter (apply:destiny, изолированный render) + инлайн
# redis_exporter (остаётся инлайн осознанно, см. scenario/create/main.yml):
#   - node-exporter (apply:destiny, индексы 0..): destiny node-exporter (бинарь
#     node_exporter, version-aware install, стабильный сервис-аккаунт node_exporter,
#     hardened-unit, textfile-коллекторы железа). collectors=[] (input) → ставится
#     только ядро;
#   - redis_exporter (инлайн, индексы 30..37): тройка (url.fetched → archive.extracted
#     → core.file.present install бинаря) + core.user.present + unit с
#     User=redis-exporter (без пароля и без Requires=redis-server.service — сервис
#     Redis не ставит, подключается к уже работающему).
#
# ВАЖНО про индексы: L0-render НЕ вычисляет when: (предикаты — Soul-side). Шаги
# коллекторов node-exporter (when: '<c>' in input.collectors) при collectors=[]
# всё равно присутствуют в плане (idx 9..29) — отбракует их хост. Ассертим только
# ядро node-exporter (idx 0..8) и инлайн redis_exporter (idx 30..36).
#
# Раскладка node-exporter (include раскрыт inline): install.yml 0 fetch / 1 extract;
# account.yml 2 group / 3 user / 4 directory; service.yml 5 install-бинаря / 6 unit /
# 7 running / 8 restarted. Коллекторы: smartmon 9..14, nvme 15..21, ipmi 22..29.
#
# L0 не качает tarball/не ставит пакет — только CEL-render YAML-выражений. Реальная
# установка требует Linux+systemd (см. README).
name: create renders exporter install tasks with defaults

# L0-источник destiny (герметичный file://): каталог node-exporter лежит в
# examples/destiny/ относительно service-root (examples/service/monitoring/).
fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  # L0-render берёт input как есть и НЕ применяет default-ы scenario-контракта
  # (defaults подставляет Keeper при инвокации, до render-фазы). Поэтому передаём
  # те же значения, что объявлены дефолтами в scenario/create/main.yml.
  input:
    node_exporter_version:    "1.8.2"
    node_exporter_collectors: []
    redis_exporter_version:   "1.62.0"
    # redis_exporter_sha256 ОБЯЗАТЕЛЕН (required:true): redis_exporter — инлайн-fetch
    # со своим checksum (node_exporter качается через destiny node-exporter, у которой
    # checksum убран). L0 render-only — хэш не верифицируется; валидный тестовый 64-hex.
    redis_exporter_sha256:    "sha256:2222222222222222222222222222222222222222222222222222222222222222"
    bin_dir:                  /usr/local/bin
    redis_socket:             /var/run/redis/redis-server.sock
    node_exporter_listen:     ":9100"
    redis_exporter_listen:    ":9121"
    # passthrough-флаги инлайн-redis_exporter: дефолт [] (оператор расширяет точечно).
    redis_exporter_extra_args: []
  # soulprint синтетического L0-хоста: node-exporter destiny берёт arch напрямую из
  # soulprint.self.os.arch. Без этого факта CEL-render шага упал бы на no-such-key.
  soulprint:
    os:
      arch: amd64

# Presence-форма (миграция 2026-06-24): тест проверяет НАЛИЧИЕ вызовов в плане, не
# их позицию. План — композиция node-exporter (apply:destiny) + инлайн
# redis_exporter; дубли модулей между блоками (url.fetched / archive.extracted /
# file.present / file.rendered / user.present / service.running) разводятся
# params_subset (path/name/url — уникальны на задачу). Сверка params_subset по-ключно
# частична (лишние ключи рендера кейс не валят); render_context unit-ов фиксируем.
assert:
  task_present:
    # ── node-exporter (apply:destiny, ядро) ─────────────────────────────────────
    # node_exporter tarball: url собран CEL-ом из base_url+version+arch (arch из
    # soulprint). checksum НЕ задаётся (destiny node-exporter качает без verification —
    # idempotency по SHA-256 содержимого). Дизамбигуатор от redis-tarball — url/path.
    - module: core.url.fetched
      params_subset:
        url: https://github.com/prometheus/node_exporter/releases/download/v1.8.2/node_exporter-1.8.2.linux-amd64.tar.gz
        path: /tmp/node_exporter-1.8.2.tar.gz
        mode: "0644"

    - module: core.archive.extracted
      params_subset:
        path: /tmp/node_exporter-1.8.2.tar.gz
        dest: /tmp/node_exporter-1.8.2

    # Стабильный сервис-аккаунт node_exporter (НЕ DynamicUser — textfile-каталог
    # переживает рестарты): группа ДО пользователя. Единственный core.group.present.
    - module: core.group.present
      params_subset:
        name: node_exporter
        system: true

    # Дизамбигуатор от redis-exporter user — name. home НЕ задаётся: account.yml
    # больше не прописывает home (system-аккаунт без домашней директории, useradd
    # -M; см. tasks/account.yml) — у задачи ключа home нет.
    - module: core.user.present
      params_subset:
        name: node_exporter
        system: true
        group: node_exporter
        shell: /usr/sbin/nologin

    # textfile-каталог через декларативное core.file.directory. Единственный.
    - module: core.file.directory
      params_subset:
        path: /var/lib/node_exporter
        owner: node_exporter
        group: node_exporter
        mode: "0755"

    # install бинаря node_exporter (service.yml): core.file.present с src: — копия
    # node_exporter из распакованного /tmp. Идемпотентность нативная по sha256(src),
    # честный changed строго при смене байт; version-aware unless-guard не нужен.
    # Дизамбигуатор от redis-exporter install — path.
    - module: core.file.present
      params_subset:
        path: /usr/local/bin/node_exporter
        src: /tmp/node_exporter-1.8.2/node_exporter-1.8.2.linux-amd64/node_exporter
        mode: "0755"
        owner: root
        group: root

    # Unit-path — /etc/systemd/system/node_exporter.service, listen :9100.
    # literal-содержимое .tmpl доставлено Keeper-ом (A1). Дизамбигуатор — path.
    - module: core.file.rendered
      params_subset:
        path: /etc/systemd/system/node_exporter.service
        template_content: "<present>"
        mode: "0644"
        owner: root
        group: root
        render_context:
          vars:
            exporter_bin: /usr/local/bin/node_exporter
            user: node_exporter
            group: node_exporter
            listen: ":9100"
            textfile_dir: /var/lib/node_exporter
            # Прод-параметры демона (destiny node-exporter input-дефолты): scenario
            # их не переопределяет → значения берутся из destiny.yml. gomaxprocs:0 и
            # пустые list/string → флаг в ExecStart НЕ добавляется (условный рендер).
            gomaxprocs: 0
            disabled_collectors: []
            enabled_collectors: []
            log_level: "info"
            log_format: "logfmt"
            fs_mount_points_exclude: ""
            netdev_device_exclude: ""
          self:
            sid: trial-host
            # single-host сахар (fixtures.soulprint) несёт корневую
            # incarnation.name-метку в covens (имя сценария = create) —
            # зеркало прод-roster `WHERE $1 = ANY(coven)`. Это поведение harness
            # с самого начала (см. fixtureHosts), а не артефакт multi-host-enabler-а.
            covens: [create]
            choirs: []
            # traits — operator-set key-value метки (ADR-060), registry-проекция
            # как covens/choirs; нет traits на хосте → пустой объект.
            traits: {}
            role: ""
            os:
              arch: amd64
          role: ""
          essence: {}

    # running + restart — по имени юнита node_exporter (ловит регресс имени).
    # daemon-reload-шага НЕТ: core.service сам reload-ит при смене unit (auto).
    # Дизамбигуатор от redis-exporter/коллектор-таймеров — name.
    - module: core.service.running
      params_subset:
        name: node_exporter
        enabled: true

    # Единственный core.service.restarted в плане.
    - module: core.service.restarted
      params_subset:
        name: node_exporter

    # ── redis_exporter (инлайн) ─────────────────────────────────────────────────
    # redis_exporter tarball: имя файла несёт префикс `v` перед версией
    # (redis_exporter-v<v>.linux-<arch>) — отличие раскладки от node_exporter.
    # Дизамбигуатор от node-tarball — url/path.
    - module: core.url.fetched
      params_subset:
        url: https://github.com/oliver006/redis_exporter/releases/download/v1.62.0/redis_exporter-v1.62.0.linux-amd64.tar.gz
        path: /tmp/redis_exporter-1.62.0.tar.gz
        checksum: "sha256:2222222222222222222222222222222222222222222222222222222222222222"
        mode: "0644"

    - module: core.archive.extracted
      params_subset:
        path: /tmp/redis_exporter-1.62.0.tar.gz
        dest: /tmp/redis_exporter-1.62.0

    # install бинаря redis_exporter (инлайн): core.file.present с src: — копия
    # redis_exporter из распакованного /tmp в bin_dir. Имя каталога/файла внутри
    # tarball-а несёт префикс `v` (redis_exporter-v<v>.linux-<arch>). Идемпотентность
    # нативная по sha256(src) — честный changed строго при смене байт; прежний
    # core.cmd.shell + creates: пропускал апгрейд (latent-баг устранён).
    # Дизамбигуатор от node-install — path.
    - module: core.file.present
      params_subset:
        path: /usr/local/bin/redis_exporter
        src: /tmp/redis_exporter-1.62.0/redis_exporter-v1.62.0.linux-amd64/redis_exporter
        mode: "0755"
        owner: root
        group: root

    # Выделенный системный пользователь redis-exporter в группе redis (доступ к
    # unix-сокету по членству в группе, least-privilege). Инлайн оставлен осознанно:
    # сервис подключается к уже работающему Redis (без DynamicUser-нюансов destiny).
    # Дизамбигуатор от node-exporter user — name.
    - module: core.user.present
      params_subset:
        name: redis-exporter
        groups: [redis]
        shell: /usr/sbin/nologin

    # redis_exporter unit (инлайн): redis_addr собран CEL-ом из 'unix://' + redis_socket
    # — ключевая проверка «подключение к Redis через unix-сокет». Без пароля.
    # Дизамбигуатор от node-exporter unit — path.
    - module: core.file.rendered
      params_subset:
        path: /etc/systemd/system/redis_exporter.service
        # template-путь заменён на доставленное Keeper-ом literal-содержимое (A1, ADR-012(d)).
        template_content: "<present>"
        mode: "0644"
        owner: root
        group: root
        render_context:
          vars:
            bin_dir: /usr/local/bin
            listen: ":9121"
            redis_addr: unix:///var/run/redis/redis-server.sock
            # passthrough-флаги не переданы оператором → default [] сценария.
            extra_args: []
          self:
            sid: trial-host
            # см. node_exporter unit выше: covens несёт incarnation.name-метку.
            covens: [create]
            choirs: []
            # traits — registry-проекция (ADR-060), пустой объект без меток.
            traits: {}
            role: ""
            os:
              arch: amd64
          role: ""
          essence: {}

    # Единственный core.service.enabled в плане.
    - module: core.service.enabled
      params_subset:
        name: redis_exporter

    # Дизамбигуатор от node_exporter/коллектор-таймеров running — name.
    - module: core.service.running
      params_subset:
        name: redis_exporter
