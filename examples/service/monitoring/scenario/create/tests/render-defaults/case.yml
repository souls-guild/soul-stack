# L0-испытание (Trial, ADR-023) сценария create сервиса monitoring.
#
# Render-only, герметично: проверяет, что при дефолтных input-ах render-пайплайн
# (CEL-фаза) даёт ожидаемые rendered_tasks. После унификации дрейфа план — это
# КОМПОЗИЦИЯ destiny node-exporter (apply:destiny, изолированный render) + инлайн
# redis_exporter (остаётся инлайн осознанно, см. scenario/create/main.yml):
#   - node-exporter (apply:destiny, индексы 0..): destiny node-exporter (бинарь
#     node_exporter, version-aware install, стабильный сервис-аккаунт node_exporter,
#     hardened-unit, textfile-коллекторы железа). collectors=[] (input) → ставится
#     только ядро;
#   - redis_exporter (инлайн, индексы 30..37): тройка + core.user.present + unit с
#     User=redis-exporter (без пароля и без Requires=redis-server.service — сервис
#     Redis не ставит, подключается к уже работающему).
#
# ВАЖНО про индексы: L0-render НЕ вычисляет when: (предикаты — Soul-side). Шаги
# коллекторов node-exporter (when: '<c>' in input.collectors) при collectors=[]
# всё равно присутствуют в плане (idx 9..29) — отбракует их хост. Ассертим только
# ядро node-exporter (idx 0..8) и инлайн redis_exporter (idx 30..36).
#
# Раскладка node-exporter (include раскрыт inline): install.yml 0 fetch / 1 extract;
# account.yml 2 group / 3 user / 4 directory; service.yml 5 install-бинаря / 6 unit /
# 7 running / 8 restarted. Коллекторы: smartmon 9..14, nvme 15..21, ipmi 22..29.
#
# L0 не качает tarball/не ставит пакет — только CEL-render YAML-выражений. Реальная
# установка требует Linux+systemd (см. README).
name: create renders exporter install tasks with defaults

# L0-источник destiny (герметичный file://): каталог node-exporter лежит в
# examples/destiny/ относительно service-root (examples/service/monitoring/).
fixtures:
  default_destiny_source: "file://../../destiny/{name}"
  # L0-render берёт input как есть и НЕ применяет default-ы scenario-контракта
  # (defaults подставляет Keeper при инвокации, до render-фазы). Поэтому передаём
  # те же значения, что объявлены дефолтами в scenario/create/main.yml.
  input:
    node_exporter_version:    "1.8.2"
    # sha256 экспортёров ОБЯЗАТЕЛЕН (required:true, placeholder-дефолт убран). L0
    # render-only — fetch не исполняется, хэш не верифицируется; передаём валидный
    # тестовый 64-hex.
    node_exporter_sha256:     "sha256:1111111111111111111111111111111111111111111111111111111111111111"
    node_exporter_collectors: []
    redis_exporter_version:   "1.62.0"
    redis_exporter_sha256:    "sha256:2222222222222222222222222222222222222222222222222222222222222222"
    bin_dir:                  /usr/local/bin
    redis_socket:             /var/run/redis/redis-server.sock
    node_exporter_listen:     ":9100"
    redis_exporter_listen:    ":9121"
    # passthrough-флаги инлайн-redis_exporter: дефолт [] (оператор расширяет точечно).
    redis_exporter_extra_args: []
  # soulprint синтетического L0-хоста: node-exporter destiny берёт arch напрямую из
  # soulprint.self.os.arch. Без этого факта CEL-render шага упал бы на no-such-key.
  soulprint:
    os:
      arch: amd64

# Сверка params в L0 — полная (deep-equal), не подмножество. node-exporter (0..8)
# раскрывается из destiny; redis_exporter (30..37) — инлайн. Ассертим установочную
# тройку, render unit-ов (CEL-сборка url/redis_addr), сервис-аккаунты и
# декларативные шаги. Install-шаги несут rendered install-строку — их полная
# фиксация хрупка; проверяются soul-lint + scenario.
assert:
  rendered_tasks:
    # ── node-exporter (apply:destiny, индексы 0..8 — ядро) ──────────────────────
    # node_exporter tarball: url собран CEL-ом из base_url+version+arch (arch из
    # soulprint), checksum-пин из apply:input.
    - index: 0
      module: core.url.fetched
      params:
        url: https://github.com/prometheus/node_exporter/releases/download/v1.8.2/node_exporter-1.8.2.linux-amd64.tar.gz
        path: /tmp/node_exporter-1.8.2.tar.gz
        checksum: "sha256:1111111111111111111111111111111111111111111111111111111111111111"
        mode: "0644"

    - index: 1
      module: core.archive.extracted
      params:
        path: /tmp/node_exporter-1.8.2.tar.gz
        dest: /tmp/node_exporter-1.8.2

    # Стабильный сервис-аккаунт node_exporter (НЕ DynamicUser — textfile-каталог
    # переживает рестарты): группа ДО пользователя.
    - index: 2
      module: core.group.present
      params:
        name: node_exporter
        system: true

    - index: 3
      module: core.user.present
      params:
        name: node_exporter
        system: true
        group: node_exporter
        shell: /usr/sbin/nologin
        home: /

    # textfile-каталог через декларативное core.file.directory.
    - index: 4
      module: core.file.directory
      params:
        path: /var/lib/node_exporter
        owner: node_exporter
        group: node_exporter
        mode: "0755"

    # version-aware install (service.yml): бинарь node_exporter; unless-guard
    # пропускает install при уже стоящей версии.
    - index: 5
      module: core.cmd.shell
      params:
        cmd: "install -m 0755 '/tmp/node_exporter-1.8.2/node_exporter-1.8.2.linux-amd64/node_exporter' '/usr/local/bin/node_exporter'"
        unless: "test -x /usr/local/bin/node_exporter && /usr/local/bin/node_exporter --version 2>&1 | grep -qF 'version 1.8.2 '"

    # Unit-path — /etc/systemd/system/node_exporter.service, listen :9100.
    # literal-содержимое .tmpl доставлено Keeper-ом (A1).
    - index: 6
      module: core.file.rendered
      params:
        path: /etc/systemd/system/node_exporter.service
        template_content: "<present>"
        mode: "0644"
        owner: root
        group: root
        render_context:
          vars:
            bin_dir: /usr/local/bin
            user: node_exporter
            listen: ":9100"
            textfile_dir: /var/lib/node_exporter
          self:
            sid: trial-host
            covens: []
            choirs: []
            role: ""
            os:
              arch: amd64
          role: ""
          essence: {}

    # running + restart — по имени юнита node_exporter (ловит регресс имени).
    # daemon-reload-шага НЕТ: core.service сам reload-ит при смене unit (auto).
    - index: 7
      module: core.service.running
      params:
        name: node_exporter
        enabled: true

    - index: 8
      module: core.service.restarted
      params:
        name: node_exporter

    # ── redis_exporter (инлайн, индексы 30..37) ─────────────────────────────────
    # node-exporter блок — 9 задач ядра (0..8) + 21 коллектор-задача (when:,
    # idx 9..29, при collectors=[] остаются в плане render-only). Инлайн
    # redis_exporter начинается с idx 30.
    #
    # redis_exporter tarball: имя файла несёт префикс `v` перед версией
    # (redis_exporter-v<v>.linux-<arch>) — отличие раскладки от node_exporter.
    - index: 30
      module: core.url.fetched
      params:
        url: https://github.com/oliver006/redis_exporter/releases/download/v1.62.0/redis_exporter-v1.62.0.linux-amd64.tar.gz
        path: /tmp/redis_exporter-1.62.0.tar.gz
        checksum: "sha256:2222222222222222222222222222222222222222222222222222222222222222"
        mode: "0644"

    - index: 31
      module: core.archive.extracted
      params:
        path: /tmp/redis_exporter-1.62.0.tar.gz
        dest: /tmp/redis_exporter-1.62.0

    # Выделенный системный пользователь redis-exporter в группе redis (доступ к
    # unix-сокету по членству в группе, least-privilege). Инлайн оставлен осознанно:
    # сервис подключается к уже работающему Redis (без DynamicUser-нюансов destiny).
    - index: 33
      module: core.user.present
      params:
        name: redis-exporter
        groups: [redis]
        shell: /usr/sbin/nologin

    # redis_exporter unit (инлайн): redis_addr собран CEL-ом из 'unix://' + redis_socket
    # — ключевая проверка «подключение к Redis через unix-сокет». Без пароля.
    - index: 34
      module: core.file.rendered
      params:
        path: /etc/systemd/system/redis_exporter.service
        # template-путь заменён на доставленное Keeper-ом literal-содержимое (A1, ADR-012(d)).
        template_content: "<present>"
        mode: "0644"
        owner: root
        group: root
        render_context:
          vars:
            bin_dir: /usr/local/bin
            listen: ":9121"
            redis_addr: unix:///var/run/redis/redis-server.sock
            # passthrough-флаги не переданы оператором → default [] сценария.
            extra_args: []
          self:
            sid: trial-host
            covens: []
            choirs: []
            role: ""
            os:
              arch: amd64
          role: ""
          essence: {}

    - index: 35
      module: core.service.enabled
      params:
        name: redis_exporter

    - index: 36
      module: core.service.running
      params:
        name: redis_exporter
