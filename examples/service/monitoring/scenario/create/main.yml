name: create
description: |
  Разворачивает node_exporter и redis_exporter на каждом хосте incarnation
  (Linux + systemd) КОМПОЗИЦИЕЙ двух переиспользуемых standalone-destiny через
  apply:destiny (изолированный render каждой, ADR-009):
    - node-exporter  — метрики хоста;
    - redis-exporter — подключается к Redis через unix-сокет
                       (--redis.addr=unix://<socket>), путь сокета — параметр.

  Сервис ничего не рендерит сам — он только оркеструет порядок apply:destiny и
  прокидывает каждой destiny её input. Внутри каждой destiny виден ТОЛЬКО
  переданный ей apply.input (изоляция, ADR-009): scenario-scope в destiny-env не
  попадает. Прод-grade установка (сервис-аккаунт — стабильный node_exporter у
  node-exporter / DynamicUser=yes у redis-exporter, systemd-hardening, passthrough
  extra_args, arch из фактов хоста) живёт в самих destiny — дрейф с инлайн-копиями
  устранён.

  arch берётся НЕ из статичного input.arch, а из soulprint.self.os.arch (факт
  хоста): один incarnation может смешивать amd64/arm64-хосты, tarball должен
  совпасть с реальной архитектурой. destiny soulprint напрямую не видит (изоляция
  ADR-009) — значение доезжает только через apply:input.

# ── Входной контракт (docs/input.md) ──────────────────────────────────────────
# Все версии и пути с дефолтами; обязательных параметров нет — create на чистой
# VM проходит без аргументов. Оператор переопределяет точечно.
input:
  node_exporter_version:
    type: string
    default: "1.8.2"
    pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+$"
    description: Версия node_exporter (GitHub Releases prometheus/node_exporter).

  redis_exporter_version:
    type: string
    default: "1.62.0"
    pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+$"
    description: Версия redis_exporter (GitHub Releases oliver006/redis_exporter).

  # checksum tarball-а redis_exporter (linux-<arch>). См. примечание выше:
  # ОБЯЗАТЕЛЬНЫЙ, без дефолта (fail-closed). Значение — из GitHub-релиза (файл
  # sha256sums) под пару (redis_exporter_version, arch).
  redis_exporter_sha256:
    type: string
    required: true
    pattern: "^sha256:[0-9a-f]{64}$"
    description: >-
      SHA-256 tarball-а redis_exporter (форма "sha256:<hex>"). Должен
      соответствовать паре redis_exporter_version + arch; берётся из sha256sums
      GitHub-релиза oliver006/redis_exporter.

  bin_dir:
    type: string
    default: /usr/local/bin
    pattern: "^/[A-Za-z0-9._/-]+$"
    description: Каталог, куда раскладываются бинарники экспортеров.

  redis_socket:
    type: string
    default: /var/run/redis/redis-server.sock
    pattern: "^/[A-Za-z0-9._/-]+$"
    description: Путь к unix-сокету Redis, к которому подключается redis_exporter.

  node_exporter_listen:
    type: string
    default: ":9100"
    pattern: "^[A-Za-z0-9._-]*:[0-9]{1,5}$"
    description: >-
      Listen-адрес node_exporter (--web.listen-address). По умолчанию :9100
      (стандартный порт node_exporter).

  # Textfile-коллекторы железа node-exporter. Дефолт [] (из essence): на VM
  # железа нет, ставится только ядро node_exporter без oneshot-сборщиков.
  node_exporter_collectors:
    type: array
    default: []
    items:
      type: string
      enum: [smartmon, nvme, ipmi]
    description: >-
      Список textfile-коллекторов node-exporter (smartmon|nvme|ipmi). [] = только
      ядро node_exporter без oneshot-сборщиков железа.

  redis_exporter_listen:
    type: string
    default: ":9121"
    pattern: "^[A-Za-z0-9._-]*:[0-9]{1,5}$"
    description: Listen-адрес redis_exporter (--web.listen-address). По умолчанию :9121.

  # Passthrough-канал (прод-конвенция §1) для ЛЮБЫХ флагов инлайн-redis_exporter
  # сверх базовых --redis.addr и --web.listen-address: коллекторы (--check-keys=...,
  # --check-single-keys=...), TLS/basic-auth (--web.config.file=<path>; сам web.yml —
  # отдельный файл, §4), namespace и пр. Каждый элемент — отдельный токен ExecStart
  # (не разбивается шаблоном по пробелам): значение-с-пробелом передавай одним
  # элементом — ["--web.config.file=/etc/x.yml"]. Уходит в шаблон нативным списком
  # (вся ячейка = один ${…} → нативный тип, ADR-010).
  redis_exporter_extra_args:
    type: array
    default: []
    items:
      type: string
    description: >-
      Дополнительные флаги инлайн-redis_exporter (--check-keys=...,
      --web.config.file=<path> для TLS/basic-auth и пр.). Каждый элемент —
      отдельный аргумент ExecStart. web.yml для TLS — отдельный файл.

# ── Мутация incarnation.state ─────────────────────────────────────────────────
# После успешного apply Keeper фиксирует, что развёрнуто (ADR-009, §7.1).
state_changes:
  - set: node_exporter_version
    value: "${ input.node_exporter_version }"
  - set: redis_exporter_version
    value: "${ input.redis_exporter_version }"
  - set: redis_socket
    value: "${ input.redis_socket }"

tasks:
  # ── node_exporter ───────────────────────────────────────────────────────────
  # Делегируется в destiny node-exporter (apply:destiny, изолированный render).
  # Внутри неё — прод-grade установка: тройка url.fetched→archive.extracted→install,
  # стабильный сервис-аккаунт node_exporter (НЕ DynamicUser — textfile-каталог
  # переживает рестарт) + systemd-hardening. scenario только прокидывает её input;
  # arch destiny берёт сама из soulprint.self.os.arch (см. ниже).
  - name: Apply node-exporter destiny
    apply:
      destiny: node-exporter
      input:
        version: "${ input.node_exporter_version }"
        # arch НЕ передаём: destiny берёт его напрямую из soulprint.self.os.arch
        # (soulprint доступен в destiny-CEL). Один incarnation может смешивать
        # amd64/arm64-хосты — destiny сама подберёт tarball под факт хоста.
        bin_dir: "${ input.bin_dir }"
        listen:  "${ input.node_exporter_listen }"
        # collectors — единый источник (input.node_exporter_collectors, дефолт []):
        # на VM железа нет, ставится только ядро. base_url/user/textfile_dir не
        # передаём — дефолты destiny устроят.
        collectors: "${ input.node_exporter_collectors }"

  # ── redis_exporter ──────────────────────────────────────────────────────────
  # ОСТАЁТСЯ ИНЛАЙН (НЕ apply:destiny redis-exporter) — осознанно. Назначение
  # monitoring (см. README §«Допущения»): экспортеры на хосте, где Redis
  # уже работает (возможно, без requirepass), сервис сам Redis НЕ ставит. Прод-grade
  # destiny redis-exporter под это НЕ подходит по двум причинам:
  #   1. требует input.redis_password (required, min_length 16) и кладёт его в
  #      Environment=REDIS_PASSWORD — у этого сервиса пароля Redis во входном
  #      контракте нет вовсе (Redis может быть без auth);
  #   2. её unit несёт Requires=redis-server.service — на хосте без локального
  #      redis-server (подключение к чужому Redis через сокет) unit не стартует.
  # Перевод сломал бы прод-назначение и потребовал бы расширения публичного
  # контракта сценария новым required-полем. Инлайн здесь оправдан (ADR-009:
  # граница destiny↔scenario — рекомендация). Дрейф с node-exporter устранён;
  # redis-exporter — отдельный кейс, не дубль эталонной destiny.
  - name: Fetch redis_exporter tarball
    module: core.url.fetched
    params:
      url: "${ 'https://github.com/oliver006/redis_exporter/releases/download/v' + input.redis_exporter_version + '/redis_exporter-v' + input.redis_exporter_version + '.linux-' + soulprint.self.os.arch + '.tar.gz' }"
      path: "${ '/tmp/redis_exporter-' + input.redis_exporter_version + '.tar.gz' }"
      checksum: "${ input.redis_exporter_sha256 }"
      mode: "0644"

  - name: Extract redis_exporter tarball
    module: core.archive.extracted
    params:
      path: "${ '/tmp/redis_exporter-' + input.redis_exporter_version + '.tar.gz' }"
      dest: "${ '/tmp/redis_exporter-' + input.redis_exporter_version }"

  # Разложить бинарь redis_exporter из распакованного каталога в bin_dir через
  # core.file.present с src: (копия содержимого regular-файла с хоста). Идемпотентность
  # нативная: changed=true ТОЛЬКО при отсутствии целевого файла либо расхождении его
  # sha256 с src (плюс дрейф mode/owner). Прежний core.cmd.shell + creates:-guard
  # пропускал install при ЛЮБОМ существующем файле → апгрейд версии НЕ переустанавливал
  # бинарь (latent-баг). register — onchanges рестарта ниже реагирует на смену бинаря
  # так же, как на смену unit-файла. src несёт префикс `v` в имени каталога внутри
  # tarball-а (redis_exporter-v<v>.linux-<arch>) — раскладка GitHub Releases.
  - name: Install redis_exporter binary
    module: core.file.present
    register: redis_exporter_bin
    params:
      path: "${ input.bin_dir + '/redis_exporter' }"
      src: "${ '/tmp/redis_exporter-' + input.redis_exporter_version + '/redis_exporter-v' + input.redis_exporter_version + '.linux-' + soulprint.self.os.arch + '/redis_exporter' }"
      mode: "0755"
      owner: root
      group: root

  # Выделенный системный пользователь exporter-а (least-privilege). Членство в
  # supplementary-группе redis даёт «group»-доступ к unix-сокету (типично
  # unixsocketperm 770, owner redis:redis); прав владельца redis exporter НЕ
  # получает. Допущение: группа redis уже существует на хосте (её создаёт пакет
  # redis-server — этот сервис Redis НЕ ставит, см. README). no-login shell.
  - name: Create redis-exporter system user in the redis group
    module: core.user.present
    params:
      name: redis-exporter
      groups: [redis]
      shell: /usr/sbin/nologin

  # Подключение к Redis через unix-сокет: --redis.addr=unix://<socket>.
  # Путь сокета пробрасывается в шаблон unit-а как переменная redis_addr.
  - name: Render redis_exporter systemd unit
    module: core.file.rendered
    register: redis_exporter_unit
    params:
      path: /etc/systemd/system/redis_exporter.service
      template: templates/redis_exporter.service.tmpl
      mode: "0644"
      owner: root
      group: root
      vars:
        bin_dir:    "${ input.bin_dir }"
        listen:     "${ input.redis_exporter_listen }"
        redis_addr: "${ 'unix://' + input.redis_socket }"
        # passthrough-флаги redis_exporter (--check-keys=..., --web.config.file=...
        # и пр.): уходят в шаблон списком, range дописывает каждый отдельным токеном
        # ExecStart. Вся ячейка = один ${…} → нативный список (ADR-010).
        extra_args: "${ input.redis_exporter_extra_args }"

  - name: Enable redis_exporter at boot
    module: core.service.enabled
    params:
      name: redis_exporter

  - name: Ensure redis_exporter is running
    module: core.service.running
    params:
      name: redis_exporter

  - name: Restart redis_exporter because the unit or binary changed
    module: core.service.restarted
    onchanges: [redis_exporter_unit, redis_exporter_bin]
    timeout: 30s
    params:
      name: redis_exporter
