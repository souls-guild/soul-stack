name: keeper-register
state_schema_version: 1
description: >-
  E2E-фундамент keeper-side module dispatch (ADR-017). Сервис прогоняет
  единственный keeper-side шаг `core.soul.registered` с `on: keeper`: он
  исполняется на самом keeper-инстансе (не на хосте), привязывая указанный SID к
  набору Coven-меток в реестре `souls`. Доказывает, что keeper-side dispatch
  работает end-to-end.

# state_schema_version = 1 → каталог migrations/ не обязателен (ADR-019).
# Структура incarnation.state пустая: keeper-шаг пишет в реестр souls, не в
# incarnation.state.
state_schema:
  type: object
  properties: {}

# Зависимостей нет: scenario использует только core-модули (ADR-015),
# которые не перечисляются в destiny[]/modules[] (ADR-009).
