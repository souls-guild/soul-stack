name: pilot-destiny
state_schema_version: 1
description: >
  Pilot apply:destiny (slice A): a service built from a single create scenario that
  delegates work into the flat destiny pilot-flat via apply: { destiny, input }.
  Demonstrates the isolated destiny render pass (V2, ADR-009): destiny sees
  only its own input:, not the scenario-scope.

# incarnation.state — what is fixed after apply.
state_schema:
  type: object
  required: [marker_path, marker_content]
  properties:
    marker_path:    { type: string }
    marker_content: { type: string }

# The destiny dependency. Hybrid source:
#  - an entry without git: → git-URL = default_destiny_source + {name} (keeper.yml);
#  - an entry with git:    → override, the git-URL is taken directly (no template needed).
# ref is taken from the entry in both cases (ADR-007: version = git ref).
# In the L0 fixture destiny sits right next to it (pilot-flat/), git is not used.
# Example of a per-entry override (commented out — there's no separate destiny repo in L0):
#   - { name: pilot-special, ref: v2.0.0, git: "git@github.com:custom/destiny-special.git" }
destiny:
  - { name: pilot-flat, ref: v1.0.0 }
  # Negative destiny for the L0 check of a var→var cycle (vars-cycle scenario).
  - { name: pilot-vars-cycle, ref: v1.0.0 }
