# L0-испытание (Trial, ADR-023): outer='yes', inner='yes' → обе группы остаются.
# Положительный край матрицы: конъюнктивный include-when inner истинен на обоих
# операндах, обе задачи рендерятся обычным путём (не placeholder).
name: nested conditional-include keeps both when outer and inner are yes

fixtures:
  input:
    outer: 'yes'
    inner: 'yes'

assert:
  task_present:
    - module: core.file.present
      params_subset:
        path: /etc/pilot/outer.txt
    - module: core.file.present
      params_subset:
        path: /etc/pilot/inner.txt
