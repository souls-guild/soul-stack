# Вложенная условная группа: подключается из outer.yml под `when: input.inner == 'yes'`.
# Её эффективный include-when — конъюнкция `(input.outer == 'yes') && (input.inner ==
# 'yes')`, поэтому inner-task ОТСУТСТВУЕТ, если ложен outer ИЛИ inner.
- name: inner marker
  module: core.file.present
  params:
    path:    /etc/pilot/inner.txt
    content: "inner"
