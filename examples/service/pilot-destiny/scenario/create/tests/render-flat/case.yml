# L0 trial (Trial, ADR-023) of the create scenario of the pilot-destiny service.
#
# Render-only, hermetic. Demonstrates slice A (apply:destiny, V2 ADR-009):
#   - apply:destiny expands into an isolated render pass of the pilot-flat destiny;
#   - two destiny tasks are spliced into the shared plan with through-indices 0,1;
#   - destiny sees ONLY its own input: (marker_file/marker_payload come from
#     apply.input; scenario input.path/content don't make it into the destiny-env);
#   - marker_mode isn't passed in apply.input → picked up from the destiny default (0644).
#
# The pilot-flat destiny lives INSIDE the service (pilot-flat/). apply:destiny
# resolves via a mirror of the production path (slice A, ADR-023): pilot-flat is declared
# in service.yml::destiny[], the URL is from default_destiny_source below. Here the destiny
# is in the same directory as the service, so the template has no `../` (file://{name}
# relative to service-root).
name: create delegates marker placement to pilot-flat destiny

# operator's scenario-input. apply.input resolves marker_file/marker_payload from it.
fixtures:
  default_destiny_source: "file://{name}"
  input:
    path:    /etc/pilot/marker.txt
    content: "pilot ok"

# Presence form (migration 2026-06-24): two destiny tasks, both modules unique
# in the plan. Isolation is visible from params being assembled from apply.input (marker_*), while
# scenario input.path made it there only because the scenario explicitly passed it through
# apply.input.
assert:
  task_present:
    # core.file.present: content from apply.input (scenario input.content),
    # mode picked up from the destiny default (0644) — apply.input didn't pass it.
    - module: core.file.present
      params_subset:
        path:    /etc/pilot/marker.txt
        content: "pilot ok"
        mode:    "0644"

    # core.exec.run: argv carries marker_file from apply.input in the last element.
    - module: core.exec.run
      params_subset:
        cmd: echo
        args: ["marker", "written", "to", "/etc/pilot/marker.txt"]
