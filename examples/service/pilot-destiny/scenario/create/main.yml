name: create
description: >
  Делегирует укладку marker-файла в плоскую destiny pilot-flat через
  apply:destiny. apply.input — что scenario передаёт в destiny (литералы + CEL по
  scenario-scope); внутри destiny виден ТОЛЬКО этот input (изоляция, ADR-009).

  Демонстрирует scenario-include (слайс B, orchestration.md §6): apply-задача
  вынесена в соседний marker.yml и подключена через include: — раскрывается в
  плоский список ДО render (двухуровневый резолв scenario-локально → service-level).

# scenario-input: оператор задаёт путь и содержимое маркера.
input:
  path:
    type: string
    required: true
    pattern: "^/[A-Za-z0-9._/-]+$"
    description: Путь marker-файла на хосте.
  content:
    type: string
    required: true
    description: Содержимое marker-файла.

# Что фиксируем в incarnation.state после успешного apply (ADR-009 §7.1).
state_changes:
  - set: marker_path
    value: "${ input.path }"
  - set: marker_content
    value: "${ input.content }"

tasks:
  # scenario-include: соседний файл marker.yml раскрывается inline ДО render.
  # Внутри — apply:destiny-задача (раскрывается изолированным render-проходом
  # destiny в N её задач со сквозными индексами).
  - include: marker.yml
