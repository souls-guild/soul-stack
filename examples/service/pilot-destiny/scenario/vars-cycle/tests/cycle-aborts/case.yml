# L0-trial (Trial, ADR-023): var→var CYCLE in file-level vars.yml destiny
# pilot-vars-cycle (a → b → c → a) aborts the destiny render pass with a var_cycle
# error with trace. EAGER-topological resolve of the layer: the graph is built at
# layer start, the cycle can't be resolved by toposort → ErrVarCycle BEFORE params
# render. Guard test for the invariant
# "cycle → error with trace" (case #3).
name: cyclic var chain in destiny vars.yml aborts render with cycle trace

fixtures:
  default_destiny_source: "file://{name}"
  input:
    path: /etc/pilot/marker.txt

# Render MUST abort. The substring var_cycle is a stable error marker;
# the trace "a → b → c → a" is printed in the text (see ErrVarCycle).
expect_render_error: "var_cycle"
