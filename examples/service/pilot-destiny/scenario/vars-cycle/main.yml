name: vars-cycle
description: >
  Negative scenario: delegates to the pilot-vars-cycle destiny, whose vars.yml carries
  a cycle a → b → c → a. The destiny render pass MUST abort with var_cycle and a trace
  (eager-topological var-layer resolution, ADR-009/ADR-010 amendment 2026-06-24).
  The L0 case verifies this via expect_render_error.

input:
  path:
    type: string
    required: true
    pattern: "^/[A-Za-z0-9._/-]+$"
    description: Marker file path.

tasks:
  - name: Apply pilot-vars-cycle destiny
    apply:
      destiny: pilot-vars-cycle
      input:
        marker_file: "${ input.path }"
