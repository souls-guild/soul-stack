# L0 trial (Trial, ADR-023): conditional-include group-drop on standalone.
#
# Full prod-path run: config.ExpandIncludes expands both includes (base.yml
# unconditionally, cluster.yml under the static `when: input.topology == 'cluster'`), then
# render with topology=standalone drops the cluster.yml group ENTIRELY (render-phase
# group-drop). The presence matcher confirms: base is present, both cluster tasks are
# ABSENT (a real exclusion, not a placeholder).
name: conditional-include drops cluster group on standalone

fixtures:
  input:
    topology: standalone

assert:
  # Base — always in the plan.
  task_present:
    - module: core.file.present
      params_subset:
        path: /etc/pilot/base.txt

  # The cluster group is dropped entirely — both tasks are absent.
  task_absent:
    - module: core.file.present
      params_subset:
        path: /etc/pilot/replication.txt
    - module: core.file.present
      params_subset:
        path: /etc/pilot/sentinel.txt
