# L0 trial (ADR-023): conditional-include keep on cluster.
#
# Reverse of drop-on-standalone: with topology=cluster a static include-when:true →
# the cluster.yml group STAYS, its tasks render the normal way (not as a placeholder).
# The presence matcher checks that all three tasks are present (base + 2 cluster).
name: conditional-include keeps cluster group on cluster

fixtures:
  input:
    topology: cluster

assert:
  task_present:
    - module: core.file.present
      params_subset:
        path: /etc/pilot/base.txt
    - module: core.file.present
      params_subset:
        path: /etc/pilot/replication.txt
    - module: core.file.present
      params_subset:
        path: /etc/pilot/sentinel.txt
