name: create
description: |
  Базовый стек «Redis + мониторинг» на каждом хосте incarnation (Linux + systemd),
  собранный КОМПОЗИЦИЕЙ трёх переиспользуемых standalone-destiny через apply:destiny
  (изолированный render каждой, ADR-009). Порядок строгий:

    1. redis-single   — redis-server из пакета дистрибутива + redis.conf с
                        unix-сокетом (dual-access TCP+socket) + systemd-hardening
                        drop-in + сервис. Пакет создаёт группу redis и сокет (770).
    2. redis-exporter — ходит в Redis через unix-сокет (--redis.addr=unix://<socket>);
                        сервис-аккаунт DynamicUser=yes + SupplementaryGroups=redis,
                        пароль через Environment=REDIS_PASSWORD. ТРЕБУЕТ группу/сокет
                        от redis-single → строго ПОСЛЕ него.
    3. node-exporter  — метрики хоста, от Redis не зависит, идёт последним для
                        детерминированного порядка.

  Сервис ничего не рендерит сам — он только оркеструет порядок apply:destiny и
  прокидывает каждой destiny её input. Внутри каждой destiny виден ТОЛЬКО
  переданный ей apply.input (изоляция, ADR-009): scenario-scope в destiny-env не
  попадает. Прод-grade установка (redis-single с hardening; экспортеры под
  DynamicUser + hardening + extra_args + arch из soulprint) живёт в самих destiny —
  дрейф с прежними инлайн-копиями устранён.

  Точка интеграции — путь unix-сокета Redis (input.redis_socket): один и тот же
  путь уходит и в redis-single (unixsocket в redis.conf), и в redis-exporter
  (--redis.addr=unix://...).

  arch берётся НЕ из статичного input.arch, а из soulprint.self.os.arch (факт
  хоста): один incarnation может смешивать amd64/arm64-хосты, tarball должен
  совпасть с реальной архитектурой. destiny soulprint напрямую не видит (изоляция
  ADR-009) — значение доезжает только через apply:input.

# ── Входной контракт (docs/input.md) ──────────────────────────────────────────
# Версии и пути — с дефолтами; единственный обязательный параметр — пароль Redis
# (secret, без дефолта). Оператор переопределяет точечно.
input:
  # Версия НЕОБЯЗАТЕЛЬНА (как в Ansible/Salt): не задана → core.pkg ставит версию
  # по умолчанию из репозитория (без =version-пина). Pattern допускает
  # distro-native строку — опциональный epoch `N:` + upstream-версия + опциональная
  # ревизия (напр. Debian `5:7.0.15-1~deb12u7`); жёсткий semver `7.2.4` версию-пин
  # ломал на реальном дистрибутиве (apt-get install redis-server=7.2.4 → exit 100).
  redis_version:
    type: string
    required: false
    pattern: "^([0-9]+:)?[0-9][A-Za-z0-9.~+-]*$"
    description: >-
      Версия пакета redis-server в репозитории дистрибутива (distro-native, напр.
      5:7.0.15-1~deb12u7). Необязательна: если не задана — ставится версия по
      умолчанию из репозитория (поведение latest, core.pkg без =version-пина).

  redis_password:
    type: string
    required: true
    secret: true
    min_length: 16
    # vault_scope открывает оператору scoped-резолв `vault:`-ref в значении
    # этого поля: оператор может передать `vault:secret/services/redis/<inc>#password`
    # вместо литерала, и Keeper прочитает секрет keeper-side ДО render-фазы
    # (docs/input.md → «vault_scope»). Резолв разрешён только под этим
    # prefix-glob; `secret/keeper/*` / `secret/internal/*` запрещены жёстко
    # (deny-list) даже под scope. Литеральный пароль тоже принимается.
    vault_scope: "secret/services/redis/*"
    description: >-
      Пароль Redis (requirepass). Маскируется в логах/трейсах/UI. Можно передать
      литералом или scoped `vault:`-ref в пределах vault_scope.

  redis_socket:
    type: string
    default: /var/run/redis/redis-server.sock
    pattern: "^/[A-Za-z0-9._/-]+$"
    description: >-
      Путь к unix-сокету Redis. Единая точка интеграции: идёт и в redis.conf
      (unixsocket), и в redis_exporter (--redis.addr=unix://...).

  redis_maxmemory:
    type: string
    default: 256mb
    pattern: "^[0-9]+(b|kb|mb|gb)$"
    description: Лимит памяти Redis (формат Redis — 256mb, 4gb, …).

  node_exporter_version:
    type: string
    default: "1.8.2"
    pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+$"
    description: Версия node_exporter (GitHub Releases prometheus/node_exporter).

  # checksum tarball-а node_exporter (linux-<arch>). core.url.fetched верифицирует
  # его ДО публикации файла — неверный хэш не материализуется (supply-chain).
  # ОБЯЗАТЕЛЬНЫЙ, без дефолта (fail-closed): нет хэша → честный отказ, а не fetch
  # с placeholder-ом, который верификация всё равно отвергнет. Значение — из
  # GitHub-релиза (файл sha256sums) под пару (node_exporter_version, arch).
  node_exporter_sha256:
    type: string
    required: true
    pattern: "^sha256:[0-9a-f]{64}$"
    description: >-
      SHA-256 tarball-а node_exporter (форма "sha256:<hex>"). Должен
      соответствовать паре node_exporter_version + arch; берётся из sha256sums
      GitHub-релиза prometheus/node_exporter.

  redis_exporter_version:
    type: string
    default: "1.62.0"
    pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+$"
    description: Версия redis_exporter (GitHub Releases oliver006/redis_exporter).

  # checksum tarball-а redis_exporter (linux-<arch>). См. примечание выше:
  # ОБЯЗАТЕЛЬНЫЙ, без дефолта (fail-closed). Значение — из GitHub-релиза (файл
  # sha256sums) под пару (redis_exporter_version, arch).
  redis_exporter_sha256:
    type: string
    required: true
    pattern: "^sha256:[0-9a-f]{64}$"
    description: >-
      SHA-256 tarball-а redis_exporter (форма "sha256:<hex>"). Должен
      соответствовать паре redis_exporter_version + arch; берётся из sha256sums
      GitHub-релиза oliver006/redis_exporter.

  arch:
    type: string
    default: amd64
    enum: [amd64, arm64]
    description: Архитектура GitHub-релизных tarball-ов экспортеров (amd64|arm64).

  bin_dir:
    type: string
    default: /usr/local/bin
    pattern: "^/[A-Za-z0-9._/-]+$"
    description: Каталог, куда раскладываются бинарники экспортеров.

  node_exporter_listen:
    type: string
    default: ":9100"
    pattern: "^[A-Za-z0-9._-]*:[0-9]{1,5}$"
    description: Listen-адрес node_exporter (--web.listen-address). По умолчанию :9100.

  redis_exporter_listen:
    type: string
    default: ":9121"
    pattern: "^[A-Za-z0-9._-]*:[0-9]{1,5}$"
    description: Listen-адрес redis_exporter (--web.listen-address). По умолчанию :9121.

# ── Мутация incarnation.state ─────────────────────────────────────────────────
# После успешного apply Keeper фиксирует, что развёрнуто (ADR-009, §7.1).
# Form C: map поле→CEL; пилот-контекст — только input/incarnation/soulprint.self.
state_changes:
  sets:
    redis_version:          "${ has(input.redis_version) ? input.redis_version : '' }"
    node_exporter_version:  "${ input.node_exporter_version }"
    redis_exporter_version: "${ input.redis_exporter_version }"
    redis_socket:           "${ input.redis_socket }"

tasks:
  # ── 1. Redis (redis-single) ─────────────────────────────────────────────────
  # Делегируется в destiny redis-single (apply:destiny, изолированный render):
  # core.pkg redis-server + redis.conf (dual-access TCP+socket) + systemd-hardening
  # drop-in + сервис. Пакет создаёт группу redis и unix-сокет (770) — предпосылка
  # для redis-exporter ниже. Пароль из input (required), пробрасывается в redis.conf.
  - name: Apply redis-single destiny
    apply:
      destiny: redis-single
      input:
        # redis_version опционален (required:false): не задан → version уходит "" →
        # core.pkg ставит latest из репо без =version-пина.
        version:        "${ has(input.redis_version) ? input.redis_version : '' }"
        redis_password: "${ input.redis_password }"
        redis_socket:   "${ input.redis_socket }"
        maxmemory:      "${ input.redis_maxmemory }"
        # config не используется этим сервисом (нет essence.redis_config / input под
        # точечные директивы): передаём пустой объект, redis-single рендерит только
        # переданные ключи (отсутствующие — дефолты Redis).
        config:         "${ {} }"

  # ── 2. redis_exporter (redis-exporter) ──────────────────────────────────────
  # Строго ПОСЛЕ redis-single: ему нужны группа redis и unix-сокет. Ходит в Redis
  # через --redis.addr=unix://<socket> (redis_addr собирает destiny из redis_socket
  # — тот же сокет, что unixsocket в redis.conf). Сервис-аккаунт DynamicUser=yes +
  # SupplementaryGroups=redis (ручной core.user больше не нужен); пароль через
  # Environment=REDIS_PASSWORD.
  - name: Apply redis-exporter destiny
    apply:
      destiny: redis-exporter
      input:
        version:        "${ input.redis_exporter_version }"
        sha256:         "${ input.redis_exporter_sha256 }"
        arch:           "${ soulprint.self.os.arch }"
        bin_dir:        "${ input.bin_dir }"
        listen:         "${ input.redis_exporter_listen }"
        redis_socket:   "${ input.redis_socket }"
        redis_password: "${ input.redis_password }"

  # ── 3. node_exporter (node-exporter) ────────────────────────────────────────
  # Метрики хоста, от Redis не зависит, идёт последним для детерминированного
  # порядка. arch — из soulprint.self.os.arch (см. description).
  - name: Apply node-exporter destiny
    apply:
      destiny: node-exporter
      input:
        version: "${ input.node_exporter_version }"
        sha256:  "${ input.node_exporter_sha256 }"
        arch:    "${ soulprint.self.os.arch }"
        bin_dir: "${ input.bin_dir }"
        listen:  "${ input.node_exporter_listen }"
        # extra_args не передаём — destiny подставит свой default [].
