# Baseline-essence сервиса redis-monitored (подложка автора).
# Оператор переопределяет в spec инкарнации; на pilot ключевые значения всё
# равно приходят через scenario-input: (см. scenario/create/main.yml).
#
# Версии пиннятся на конкретные релизы. Для redis это версия пакета
# redis-server в репозитории дистрибутива; для экспортеров — релизы стороннего
# ПО с GitHub (ADR-007: версия артефакта — git-ref, но это сторонние релизы,
# поэтому здесь они — обычные значения, а не ref).
#
# redis_socket — единая точка интеграции: один и тот же путь идёт в redis.conf
# (unixsocket ...) и в redis_exporter (--redis.addr=unix://...).
redis_version:          "7.2.4"
node_exporter_version:  "1.8.2"
redis_exporter_version: "1.62.0"
redis_socket:           "/var/run/redis/redis-server.sock"
