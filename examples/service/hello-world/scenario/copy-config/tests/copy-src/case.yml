# L0 test (Trial, ADR-023) for the copy-config scenario of the hello-world service.
#
# Render-only, hermetic. Verifies that core.file.present with src passes through the
# render pipeline: src comes from input.src (CEL ${ input.src }) as an absolute
# path, content does NOT appear in the task (src/content are mutually exclusive, ADR-015),
# mode is the literal 0640.
name: copy-config renders core.file.present with src from input

fixtures:
  input:
    src: /opt/dist/app.conf

assert:
  task_present:
    # The only task in the plan.
    - module: core.file.present
      params_subset:
        path: /etc/soul-stack/app.conf
        src:  /opt/dist/app.conf
        mode: "0640"
