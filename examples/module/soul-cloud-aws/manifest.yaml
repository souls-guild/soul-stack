kind: cloud_driver
protocol_version: 1                    # compat-флаг plugin-протокола (ADR-020(c))
namespace: cloud                       # пример third-party коллекции CloudDriver
name: aws

# Closed enum по ADR-020(f).
# vault_access НЕ нужен: credentials резолвит Keeper (A-flow, docs/keeper/cloud.md)
# и передаёт plain в CreateRequest.credentials — драйвер в Vault НЕ ходит.
required_capabilities:
  - network_outbound                   # вызовы AWS API

# CloudDriver работает на keeper-стороне и не трогает локальные ресурсы host-а —
# объявляем пустой список (ADR-020(g), пример из docs/keeper/plugins.md).
side_effects: []

spec:
  provider_kind: aws                   # информативное поле семейства провайдера
  # JSON Schema draft 2020-12 (формат для kind: cloud_driver — см.
  # docs/keeper/plugins.md → spec.profile_schema).
  profile_schema:
    type: object
    required: [region, instance_type, ami]
    properties:
      region:
        type: string
        pattern: "^[a-z]{2}-[a-z]+-[0-9]+$"
      instance_type:
        type: string
        examples: [t3.medium, m5.large]
      ami:
        type: string
        pattern: "^ami-[0-9a-f]{8,17}$"
      disk:
        type: object
        properties:
          size_gb:
            type: integer
            minimum: 8
          type:
            type: string
            enum: [gp3, io2, st1]
      network:
        type: object
        properties:
          subnet:
            type: string
          security_groups:
            type: array
            items:
              type: string
              pattern: "^sg-[0-9a-f]+$"
      tags:
        type: object
        additionalProperties:
          type: string
