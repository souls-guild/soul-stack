kind: cloud_driver
protocol_version: 1                    # plugin protocol compat flag (ADR-020(c))
namespace: cloud                       # example of a third-party CloudDriver collection
name: azure

# Closed enum per ADR-020(f).
# vault_access is NOT needed: Keeper resolves credentials (A-flow, docs/keeper/cloud.md)
# and passes them plain into CreateRequest.credentials — the driver does NOT touch Vault.
required_capabilities:
  - network_outbound                   # calls to the Azure ARM API

# CloudDriver runs on the keeper side and doesn't touch local host resources —
# we declare an empty list (ADR-020(g), example from docs/keeper/plugins.md).
side_effects: []

spec:
  provider_kind: azure                 # informational field for the provider family
  # JSON Schema draft 2020-12 (format for kind: cloud_driver — see
  # docs/keeper/plugins.md → spec.profile_schema).
  #
  # Unlike EC2, an Azure VM is multi-resource (VM + NIC + PublicIP). The profile
  # describes the required shape; the driver creates the sub-resources itself with
  # deterministic names derived from vm_name (see main.go → resourceNames).
  profile_schema:
    type: object
    required: [location, vm_size, image, subnet_id]
    properties:
      location:
        type: string
        examples: [westeurope, eastus, northeurope]
      vm_size:
        type: string
        examples: [Standard_B2s, Standard_D2s_v5]
      image:
        type: object
        required: [publisher, offer, sku]
        properties:
          publisher: { type: string }
          offer:     { type: string }
          sku:       { type: string }
          version:
            type: string
            default: latest
      # Subnet ARM resource id — fully qualified, so the driver doesn't need to
      # build its own subscription/rg/vnet/subnet join.
      subnet_id:
        type: string
        pattern: "^/subscriptions/[^/]+/resourceGroups/[^/]+/providers/Microsoft\\.Network/virtualNetworks/[^/]+/subnets/[^/]+$"
      admin_username:
        type: string
        default: soul
      ssh_public_key:
        type: string
      public_ip:
        type: object
        properties:
          enabled:
            type: boolean
            default: true
          sku:
            type: string
            enum: [Basic, Standard]
            default: Standard
          # DNS label for PublicIP: if fqdn is present it will be
          # `<dns_label>.<location>.cloudapp.azure.com`; without it the driver returns
          # primary_ip as identifier.
          dns_label:
            type: string
      disk:
        type: object
        properties:
          size_gb:
            type: integer
            minimum: 30
          type:
            type: string
            enum: [Standard_LRS, StandardSSD_LRS, Premium_LRS]
      network_security_group_id:
        type: string
      tags:
        type: object
        additionalProperties:
          type: string
