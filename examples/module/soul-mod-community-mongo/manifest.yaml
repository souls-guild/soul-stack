# Manifest of the soul-mod-community-mongo plugin (ADR-020 plugin infrastructure).
#
# MAIN interface to a live MongoDB (PILOT slice, concept from the Ansible mongodb role):
# the service scenario orchestrates order/targeting, the plugin executes ONE operation on
# a single mongod instance VIA go-mongo-driver (NOT core.exec+mongosh — password in argv
# = a security risk, fragile parsing; parallel with community.redis: redis also went
# shell→plugin). 3 states implemented: pinged (health) + user (createUser/dropUser
# upsert, imperative — mongo users live in admin.system.users, NOT in a config file) +
# command (raw db.runCommand).
#
# ★ localhost-exception bootstrap (mongo mechanics, analog of redis default_admin):
# the first admin is created WITHOUT auth via loopback, while the admin DB is empty (mongod with
# authorization:enabled allows this). The plugin detects an auth-fail and falls back
# to a no-auth localhost connection for the first createUser — see user.go. render passes
# addr+username+password, the plugin decides the auth path BASED ON the live state.
#
# DELIBERATELY WITHOUT dry-run preview: the plugin does NOT implement PlanReadSafe — on a dry_run host
# (Soul) default-deny applies (the task gets an honest "drift not supported" rather than a
# false "no drift"). Parallel with community.redis.
#
# ★ PILOT scope: replica-set (replSetInitiate/add-member/member-synced), sharded,
# keyFile, TLS — NEXT slices. For now — only 3 states for standalone create+destroy.
kind: soul_module
protocol_version: 1                    # compat flag of the SoulModule API; artifact version is a git ref (ADR-007)
namespace: community
name: mongo

# Connection parameters (common to all states, see the state headers below):
#   - addr            (string, required) — mongod host:port (usually 127.0.0.1:27017);
#   - username        (string) — ACL username for AUTH (default_admin for the system one);
#   - password        (string, secret, PEM/password) — vault ref in operator-input;
#                     keeper resolves it before Apply, the plugin receives plaintext (ADR-012).
#                     Masked in logs/traces/UI (secret);
#   - auth_db         (string) — authenticationDatabase (default admin);
#   - tls/tls_ca/tls_cert/tls_key/tls_skip_verify — TLS connection (PILOT: mongo in plain,
#                     parameters kept for forward-compat, not set in the pilot scenario).
# password/PEM are kept separate from anything that ends up in events (security invariant
# ADR-010): connection/command errors are sanitized by redactError over the password.
#
# Closed enum (ADR-020(f) / docs/keeper/plugins.md → required_capabilities). ONLY
# network_outbound: the plugin connects to mongod over TCP (incl. TLS). WITHOUT vault_access —
# the password arrives ALREADY resolved from Keeper (render-phase vault() in the scenario), the plugin
# does not need its own Vault access (ADR-012).
required_capabilities:
  - network_outbound

# Strict contract for touched resources (ADR-020(g)): exactly one
# <resource-type>: <value> pair per record. All states operate on a live mongod service.
side_effects:
  - { service: mongod }

spec:
  states:
    # pinged — health probe via go-mongo-driver Ping (primary). Read-only,
    # changed=false BY DESIGN (precedent core.http.probe / community.redis.pinged):
    # this is a check, not a mutation. Output.ok carries the liveness fact for the health gate
    # (retry/until/failed_when over register.self.ok).
    pinged:
      description: |
        MongoDB health probe via go-mongo-driver Ping (primary). Read-only,
        changed=false by design (probe, not a mutation). Output.ok — condition for the
        health gate (until: register.self.ok == true). No dry-run preview.
      input:
        addr:
          type: string
          required: true
          description: "mongod address: host:port (usually 127.0.0.1:27017)."
        username:
          type: string
          required: false
          description: ACL username for AUTH (if not anonymous).
        password:
          type: string
          required: false
          secret: true
          pattern: "^vault:.*"
          description: >-
            MongoDB password (vault ref in operator-input; keeper resolves before Apply).
            Masked — does not end up in events/logs. Not passed to Ping (goes into the connection).
        auth_db:
          type: string
          required: false
          description: authenticationDatabase (default admin).
        tls:
          type: bool
          required: false
          default: false
          description: >-
            Connect to mongod over TLS. Defaults to false (plaintext). PILOT: mongo
            in plain mode — not set.
        tls_ca:
          type: string
          required: false
          secret: true
          pattern: "^vault:.*"
          description: >-
            PEM of the CA certificate for verifying the server certificate (RootCAs).
            Masked (secret). Resolved keeper-side from Vault (render phase).
        tls_cert:
          type: string
          required: false
          secret: true
          pattern: "^vault:.*"
          description: >-
            PEM of the client certificate for mTLS (optional, only together with tls_key).
            Masked (secret).
        tls_key:
          type: string
          required: false
          secret: true
          pattern: "^vault:.*"
          description: >-
            PEM of the client key for mTLS (optional, only together with tls_cert).
            Masked (secret); does not end up in events/errors.
        tls_skip_verify:
          type: bool
          required: false
          default: false
          description: >-
            EXPLICIT opt-out of server certificate verification. Defaults to false
            (verification enabled — default secure).
    # user — createUser/dropUser (upsert, imperative). Mongo users live in
    # admin.system.users (NOT in a config file, unlike redis users.acl) — hence a
    # verb-state, not a render. Idempotent via usersInfo (present + user exists → no-op;
    # absent + doesn't exist → no-op). changed=true on an actual create/drop.
    #
    # ★★ LOCALHOST-EXCEPTION BOOTSTRAP: the first admin (default_admin) is created WITHOUT auth
    # via loopback (mongod allows this while the admin DB is empty). On auth-fail on the
    # usersInfo probe, the plugin falls back to a no-auth localhost connection → createUser for the first
    # admin. Once the admin is created — connections go through with auth (fallback no longer needed). Output
    # carries used_localhost/bootstrap_admin (whether the no-auth path was taken).
    user:
      description: |
        Manage a MongoDB user (createUser/dropUser upsert) via go-mongo-driver.
        state present — create the user (if missing), absent — remove it (if present).
        Idempotent via usersInfo (already in the desired state → changed=false). ★ the first
        admin is created via the localhost-exception (no-auth loopback connection, while the
        admin DB is empty). Changing the password/roles of an existing user — day-2 (out of PILOT scope).
        No dry-run preview.
      input:
        addr:
          type: string
          required: true
          description: "mongod address: host:port (usually 127.0.0.1:27017)."
        name:
          type: string
          required: true
          description: MongoDB username (createUser/dropUser).
        state:
          type: string
          required: false
          default: present
          description: "present (create if missing) / absent (remove if present). Default present."
        database:
          type: string
          required: false
          description: >-
            The DB in which the user is created (login/roles context). Default admin
            (system users). Roles without an explicit db inherit this DB.
        password:
          type: string
          required: false
          secret: true
          pattern: "^vault:.*"
          description: >-
            Password of the ADMIN CONNECTION (the user is created under username; vault ref, keeper resolves before
            Apply). Goes into the connection credentials; does not end up in events/logs. ★ This is NOT the password
            of the user being created (see user_password) — except for bootstrapping the first admin, where the admin
            creates ITSELF (password serves both roles when user_password is not set).
        user_password:
          type: string
          required: false
          secret: true
          pattern: "^vault:.*"
          description: >-
            Password of the CREATED user (pwd of the createUser document; vault ref, keeper resolves before
            Apply). Separate from password (admin connection auth): for operator users the connection is under the
            admin password, while createUser uses this password. Not set → falls back to password
            (bootstrap of the first admin: the admin creates itself under the same password). Masked.
        roles:
          type: list
          required: false
          description: >-
            User roles (array of {role, db}) for state=present. Each element —
            {role: "readWrite", db: "appdb"}. db with no value inherits database.
            Required to be non-empty when present (a user without roles is meaningless).
        username:
          type: string
          required: false
          description: >-
            ACL username for the AUTH connection (the admin under which the user is created). During
            bootstrap of the first admin, auth is not yet possible → localhost-exception no-auth.
        auth_db:
          type: string
          required: false
          description: authenticationDatabase of the connection (default admin).
        tls:
          type: bool
          required: false
          default: false
          description: "Connect over TLS. Defaults to false. PILOT: mongo in plain — not set."
        tls_ca:
          type: string
          required: false
          secret: true
          pattern: "^vault:.*"
          description: CA PEM for verifying the server certificate. Masked (secret).
        tls_cert:
          type: string
          required: false
          secret: true
          pattern: "^vault:.*"
          description: Client-cert PEM for mTLS (optional, with tls_key). Masked (secret).
        tls_key:
          type: string
          required: false
          secret: true
          pattern: "^vault:.*"
          description: Client-key PEM for mTLS (optional, with tls_cert). Masked (secret).
        tls_skip_verify:
          type: bool
          required: false
          default: false
          description: EXPLICIT opt-out of certificate verification. Defaults to false (default secure).
    # command — raw db.runCommand to MongoDB. Imperative verb-state (precedent
    # community.redis.command / core.exec.run): changed=false by default (probe);
    # the operator is responsible for idempotency.
    #
    # WARNING (security): the command output is mongo's response, not a secret managed by the plugin,
    # it is NOT covered by the ADR-010 masks (Output only carries the ok flag). DO NOT run
    # via command read-commands that return secrets (usersInfo with showCredentials) — their
    # result would end up in plaintext; use no_log/a specialized state for that instead.
    # params.password itself is masked and does not end up in the command arguments.
    command:
      description: |
        Run a raw command against MongoDB via db.runCommand (imperative verb-state).
        Defaults to changed=false (probe); the operator is responsible for idempotency.
        Output.ok — success flag of the response. No dry-run preview.
      input:
        addr:
          type: string
          required: true
          description: "mongod address: host:port (usually 127.0.0.1:27017)."
        db:
          type: string
          required: false
          description: Target DB for runCommand (default admin).
        command:
          type: map
          required: true
          description: >-
            bson document of the command (first/only key — the command name), e.g.
            { serverStatus: 1 } or { collStats: "events" }. For PILOT — single-field commands.
        username:
          type: string
          required: false
          description: ACL username for AUTH.
        password:
          type: string
          required: false
          secret: true
          pattern: "^vault:.*"
          description: >-
            MongoDB password (vault ref; keeper resolves before Apply). Masked — is not
            passed into the command arguments (goes into the connection).
        auth_db:
          type: string
          required: false
          description: authenticationDatabase (default admin).
        changed:
          type: bool
          required: false
          default: false
          description: >-
            Mark the result as changed=true (for commands that actually mutate
            state). Defaults to false (probe semantics).
        tls:
          type: bool
          required: false
          default: false
          description: "Connect over TLS. Defaults to false. PILOT: mongo in plain — not set."
        tls_ca:
          type: string
          required: false
          secret: true
          pattern: "^vault:.*"
          description: CA PEM for verifying the server certificate. Masked (secret).
        tls_cert:
          type: string
          required: false
          secret: true
          pattern: "^vault:.*"
          description: Client-cert PEM for mTLS (optional, with tls_key). Masked (secret).
        tls_key:
          type: string
          required: false
          secret: true
          pattern: "^vault:.*"
          description: Client-key PEM for mTLS (optional, with tls_cert). Masked (secret).
        tls_skip_verify:
          type: bool
          required: false
          default: false
          description: EXPLICIT opt-out of certificate verification. Defaults to false (default secure).
