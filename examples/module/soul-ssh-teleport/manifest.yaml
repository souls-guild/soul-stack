kind: ssh_provider
protocol_version: 1                    # compat-флаг plugin-протокола (ADR-020(c))
namespace: ssh                         # коллекция SshProvider в этом репо
name: teleport

# Closed enum по ADR-020(f). Teleport-провайдер:
#   network_outbound — gRPC-вызовы Teleport Auth API (через Teleport-proxy).
# vault_access НЕ нужен — Teleport не Vault. Аутентификация плагина в Teleport
# идёт через identity-file (либо tbot-сокет; PM-decision creds-flow=B: плагин
# сам аутентифицируется в Teleport через identity-file/profile/credentials в
# env). Эти артефакты резолвятся вне Vault-канала.
required_capabilities:
  - network_outbound

# SshProvider не трогает локальные ресурсы host-а (cert живёт в памяти
# keeper.push на время сессии — Keeper-ephemeral режим, см. docs/keeper/push.md).
side_effects: []

spec:
  # provider_kind — открытая строка (ADR-020(e)); convention из docs/keeper/plugins.md.
  provider_kind: teleport
  # JSON Schema draft 2020-12 (формат для kind: ssh_provider — см.
  # docs/keeper/plugins.md → spec.params_schema). Embedded из schema.json.
  params_schema:
    type: object
    required: [proxy_addr]
    properties:
      proxy_addr:
        type: string
        description: >-
          Teleport proxy endpoint (`host:port`, обычно :3023 для SSH-proxy).
          Едет в SignReply.proxy_jump для последующего использования
          keeper.push (dispatcher proxy_jump support — S3, см. docs/keeper/push.md).
        examples: ["teleport.example.com:3023", "tp-proxy.internal:3023"]
      cluster_name:
        type: string
        description: >-
          Имя Teleport-кластера (опц.). Используется при multi-cluster
          конфигурации Teleport (trust между root и leaf cluster-ами).
      identity_file:
        type: string
        description: >-
          Путь к Teleport identity-file (обычно выпускается `tctl auth sign`
          или `tbot`). Альтернатива — tbot_socket. Один из двух источников
          обязателен.
      tbot_socket:
        type: string
        description: >-
          Путь к Unix-сокету `tbot`-демона, если используется (renewable
          credentials без identity-file на диске). Взаимоисключающе с
          identity_file (oneOf).
      roles:
        type: array
        description: >-
          Список Teleport-ролей, под которыми запрашиваются сертификаты для
          конечного пользователя. Пустой список = роли по умолчанию,
          назначенные identity-file/tbot-bot-у.
        items: { type: string }
      valid_principals:
        type: array
        description: >-
          Allowlist principal-ов (Linux-пользователей), которые плагин
          разрешает класть в подписанный cert. Пустой список = принимать
          любой `req.user` (если Teleport-роль это разрешает). Жёсткое
          ограничение для production.
        items: { type: string }
      deny:
        type: array
        description: >-
          Deny-list пар (host, user); по умолчанию провайдер allow-all
          (dev/test). Каждая запись — `{host?, user?}`; пустое поле = wildcard
          по этому измерению (симметрично soul-ssh-static / soul-ssh-vault).
        items:
          type: object
          properties:
            host: { type: string, format: hostname }
            user: { type: string }
