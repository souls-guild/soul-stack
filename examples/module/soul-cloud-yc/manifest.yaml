kind: cloud_driver
protocol_version: 1                    # compat-флаг plugin-протокола (ADR-020(c))
namespace: cloud                       # пример third-party коллекции CloudDriver
name: yc

# Closed enum по ADR-020(f).
# vault_access НЕ нужен: credentials резолвит Keeper (A-flow, docs/keeper/cloud.md)
# и передаёт plain в CreateRequest.credentials — драйвер в Vault НЕ ходит.
required_capabilities:
  - network_outbound                   # вызовы Yandex Cloud API

# CloudDriver работает на keeper-стороне и не трогает локальные ресурсы host-а —
# объявляем пустой список (ADR-020(g), пример из docs/keeper/plugins.md).
side_effects: []

spec:
  provider_kind: yc                    # семейство провайдера (Yandex Cloud)
  # JSON Schema draft 2020-12 (формат для kind: cloud_driver — см.
  # docs/keeper/plugins.md → spec.profile_schema).
  profile_schema:
    type: object
    required: [folder_id, zone, image_id, subnet_id]
    properties:
      folder_id:
        type: string
        description: ID каталога YC, в котором создаётся VM.
      zone:
        type: string
        examples: [ru-central1-a, ru-central1-b, ru-central1-d]
      platform_id:
        type: string
        description: Платформа (Intel Cascade Lake, Ice Lake, ...).
        examples: [standard-v3, standard-v2]
        default: standard-v3
      resources:
        type: object
        required: [cores, memory_gb]
        properties:
          cores:
            type: integer
            minimum: 2
          memory_gb:
            type: integer
            minimum: 1
          core_fraction:
            type: integer
            minimum: 5
            maximum: 100
            description: Baseline-производительность ядра, % (5/20/50/100).
      image_id:
        type: string
        description: ID образа загрузочного диска (compute.images).
      disk:
        type: object
        properties:
          size_gb:
            type: integer
            minimum: 10
          type:
            type: string
            enum: [network-ssd, network-hdd, network-ssd-nonreplicated]
      subnet_id:
        type: string
        description: ID подсети VPC.
      security_group_ids:
        type: array
        items:
          type: string
      nat:
        type: boolean
        description: |
          Выдать VM публичный IPv4 (one-to-one NAT). Default false — VM
          доступна только из VPC по internal-DNS.
        default: false
      service_account_id:
        type: string
        description: |
          Опц. ID сервис-аккаунта, привязанного к VM (для авторизации внутри
          инстанса).
      labels:
        type: object
        additionalProperties:
          type: string
