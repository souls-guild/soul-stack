kind: ssh_provider
protocol_version: 1                    # compat-флаг plugin-протокола (ADR-020(c))
namespace: ssh                         # пример third-party коллекции SshProvider
name: static

# Closed enum по ADR-020(f).
# Static-key читает приватный ключ из файла на keeper-host-е (или из Vault KV,
# если params.vault_ref задан). vault_access нужен только для второго случая;
# объявляем его, так как провайдер УМЕЕТ ходить в Vault (декларация, не runtime —
# docs/keeper/plugins.md → required_capabilities).
required_capabilities:
  - vault_access                       # опциональный резолв ключа из Vault KV

# SshProvider не трогает локальные ресурсы host-а (ключ живёт в памяти
# keeper.push на время сессии), пример из docs/keeper/plugins.md.
side_effects: []

spec:
  # provider_kind — открытая строка (ADR-020(e)); convention из docs/keeper/plugins.md.
  provider_kind: static_key
  # JSON Schema draft 2020-12 (формат для kind: ssh_provider — см.
  # docs/keeper/plugins.md → spec.params_schema). Embedded из schema.json.
  params_schema:
    type: object
    # ровно один из источников ключа: путь к файлу ЛИБО Vault KV-ссылка
    oneOf:
      - required: [key_path]
      - required: [vault_ref]
    properties:
      key_path:
        type: string
        description: Абсолютный путь к приватному SSH-ключу на keeper-host-е.
        examples: [/etc/soul-stack-keeper/ssh/id_ed25519]
      vault_ref:
        type: string
        description: Ссылка на Vault KV-секрет с приватным ключом (поле `private_key`).
        examples: ["secret/keeper/push/static-key"]
      deny:
        type: array
        description: >-
          Deny-list пар (host, user); по умолчанию провайдер allow-all (dev/test).
          Каждая запись — `{host?, user?}`; пустое поле = wildcard по этому измерению.
        items:
          type: object
          properties:
            host: { type: string, format: hostname }
            user: { type: string }
