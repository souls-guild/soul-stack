kind: cloud_driver
protocol_version: 1                    # compat-флаг plugin-протокола (ADR-020(c))
namespace: cloud                       # пример third-party коллекции CloudDriver
name: proxmox

# Closed enum по ADR-020(f).
# vault_access НЕ нужен: credentials резолвит Keeper (A-flow, docs/keeper/cloud.md)
# и передаёт plain в CreateRequest.credentials — драйвер в Vault НЕ ходит.
required_capabilities:
  - network_outbound                   # вызовы Proxmox VE REST API (https://<host>:8006)

# CloudDriver работает на keeper-стороне и не трогает локальные ресурсы host-а —
# объявляем пустой список (ADR-020(g), пример из docs/keeper/plugins.md).
side_effects: []

spec:
  provider_kind: proxmox               # семейство провайдера (Proxmox VE)
  # JSON Schema draft 2020-12 (формат для kind: cloud_driver — см.
  # docs/keeper/plugins.md → spec.profile_schema).
  #
  # Proxmox — гипервизор, не облако: НЕТ regions; VM живёт на конкретной node
  # кластера PVE. create = CLONE из VMID-шаблона (НЕ image). VMID — целое число,
  # уникальное в рамках кластера; в нашем proto.VmInfo он стрингифицируется
  # как `<node>/<vmid>` (см. main.go doc-комментарий, обоснование composite-ID).
  profile_schema:
    type: object
    required: [target_node, template_vmid]
    properties:
      target_node:
        type: string
        description: |
          Имя node PVE, на которой создаётся VM (cluster.nodes[].name). Если
          template живёт на другой node — Proxmox сам сделает live-clone в
          target_node, если задано full_clone=true и shared-storage есть.
      template_vmid:
        type: integer
        minimum: 100
        description: VMID шаблона PVE для clone (qm-шаблон с подготовленным cloud-init).
      new_vmid_start:
        type: integer
        minimum: 100
        description: |
          Стартовый VMID для назначения новым VM. Если 0/опущен — драйвер
          выбирает next-id через `/cluster/nextid`. По convention Proxmox VMID
          ≥ 100 (1–99 зарезервированы под cluster-internal).
        default: 0
      name_prefix:
        type: string
        pattern: "^[a-zA-Z0-9][a-zA-Z0-9-]*$"
        description: |
          Префикс DNS-имени VM (`<prefix>-<vmid>`). По default = `soul`. Чисто
          DNS-имена — кириллица/спецсимволы запрещены QEMU/cloud-init.
        default: soul
      full_clone:
        type: boolean
        description: |
          true → полный clone (копия диска, независимая VM); false → linked
          clone (cow-snapshot, требует не-LVM storage и зависимость от
          template). Default true — оператору обычно нужна независимая VM.
        default: true
      cores:
        type: integer
        minimum: 1
        default: 2
      memory:
        type: integer
        minimum: 256
        description: Память VM в МБ (Proxmox-конвенция).
        default: 2048
      storage:
        type: string
        description: |
          Имя storage-пула PVE для clone-диска (см. /storage). При full_clone
          может отличаться от template-storage — Proxmox перенесёт.
      bridge:
        type: string
        description: |
          Linux-bridge для net0 (vmbr0/vmbr1/…). Если не задан — наследуется
          из шаблона.
      tags:
        type: object
        description: |
          Произвольные теги VM (Proxmox tag-list, semicolon-separated). Ключ
          `soulstack-run` зарезервирован для идемпотентности create.
        additionalProperties:
          type: string
      cicustom:
        type: string
        description: |
          Опц. cicustom-строка Proxmox (snippet-path для user/network/meta).
          Если задана, она используется как есть; иначе userdata из
          CreateRequest.userdata кладётся в `ciuser`/`cipassword`/`sshkeys`
          через стандартные cloud-init поля. См. docs Proxmox cloud-init.
