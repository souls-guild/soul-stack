kind: cloud_driver
protocol_version: 1                    # plugin-protocol compat flag (ADR-020(c))
namespace: cloud                       # example third-party CloudDriver collection
name: proxmox

# Closed enum per ADR-020(f).
# vault_access NOT needed: Keeper resolves credentials (A-flow, docs/keeper/cloud.md)
# and passes plain into CreateRequest.credentials — the driver does NOT talk to Vault.
required_capabilities:
  - network_outbound                   # calls to Proxmox VE REST API (https://<host>:8006)

# CloudDriver runs on the keeper side and does not touch local host resources —
# declaring an empty list (ADR-020(g), example from docs/keeper/plugins.md).
side_effects: []

spec:
  provider_kind: proxmox               # provider family (Proxmox VE)
  # JSON Schema draft 2020-12 (format for kind: cloud_driver — see
  # docs/keeper/plugins.md → spec.profile_schema).
  #
  # Proxmox is a hypervisor, not a cloud: NO regions; a VM lives on a specific
  # node of the PVE cluster. create = CLONE from a VMID template (NOT an image).
  # VMID is an integer, unique within the cluster; in our proto.VmInfo it is
  # stringified as `<node>/<vmid>` (see the main.go doc comment for the
  # composite-ID rationale).
  profile_schema:
    type: object
    required: [target_node, template_vmid]
    properties:
      target_node:
        type: string
        description: |
          Name of the PVE node the VM is created on (cluster.nodes[].name). If
          the template lives on a different node — Proxmox will do a live
          clone into target_node, provided full_clone=true and shared storage
          is present.
      template_vmid:
        type: integer
        minimum: 100
        description: VMID of the PVE template to clone (qm template with prepared cloud-init).
      new_vmid_start:
        type: integer
        minimum: 100
        description: |
          Starting VMID for new VM assignment. If 0/omitted — the driver picks
          the next id via `/cluster/nextid`. By Proxmox convention VMID
          ≥ 100 (1-99 are reserved for cluster-internal).
        default: 0
      name_prefix:
        type: string
        pattern: "^[a-zA-Z0-9][a-zA-Z0-9-]*$"
        description: |
          VM DNS-name prefix (`<prefix>-<vmid>`). Default = `soul`. ASCII-only
          DNS names — Cyrillic/special characters are forbidden by QEMU/cloud-init.
        default: soul
      full_clone:
        type: boolean
        description: |
          true → full clone (disk copy, independent VM); false → linked
          clone (cow-snapshot, requires non-LVM storage and a dependency on
          the template). Default true — operators usually need an independent VM.
        default: true
      cores:
        type: integer
        minimum: 1
        default: 2
      memory:
        type: integer
        minimum: 256
        description: VM memory in MB (Proxmox convention).
        default: 2048
      storage:
        type: string
        description: |
          Name of the PVE storage pool for the clone disk (see /storage). With
          full_clone it can differ from template-storage — Proxmox will migrate it.
      bridge:
        type: string
        description: |
          Linux bridge for net0 (vmbr0/vmbr1/...). If not set — inherited
          from the template.
      tags:
        type: object
        description: |
          Arbitrary VM tags (Proxmox tag-list, semicolon-separated). The key
          `soulstack-run` is reserved for create idempotency.
        additionalProperties:
          type: string
      cicustom:
        type: string
        description: |
          Optional Proxmox cicustom string (snippet path for user/network/meta).
          If set, it is used as-is; otherwise userdata from
          CreateRequest.userdata is placed into `ciuser`/`cipassword`/`sshkeys`
          via standard cloud-init fields. See Proxmox cloud-init docs.
