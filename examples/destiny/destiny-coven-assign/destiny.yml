name: coven-assign
description: Bind a Soul to a set of stable Coven labels in the keeper registry

# Версия destiny — git ref, под которым закоммичен файл (см. ADR-007 в
# docs/architecture.md). Поле `version:` верхнего уровня намеренно отсутствует.
#
# Список задач — НЕ в этом файле. Он живёт в tasks/main.yml; здесь только
# манифест: input-контракт и (если бы были) required_modules.
#
# coven-assign — core-destiny с keeper-side операцией над реестром souls/coven
# (см. docs/keeper/cloud.md: cloud-provision «назначает coven по
# role_distribution» тем же путём — запись в реестре souls). Использует только
# core-модули, поэтому required_modules: не нужен.
#
# Контракт coven-assign declared-роль НЕ пишет (см. docs/scenario/orchestration.md
# §4.1: declared-роль живёт в incarnation.spec.hosts[].role, фактическая привязка
# хоста вне spec — в incarnation.state через scenario state_changes, не здесь).
# Поэтому в input: только sid + coven, поля role нет осознанно.

input:
  sid:
    type: string
    required: true
    format: fqdn                 # SID = FQDN (см. ADR «Идентичность Soul»)
    description: SID (FQDN) Soul-а, которому назначаются coven-метки.

  coven:
    type: array
    required: true
    items:
      type: string
      pattern: "^[a-z][a-z0-9-]*$"
    min_items: 1
    unique: true
    description: Набор стабильных Coven-меток для привязки к Soul-у.
