# L0-харнесс destiny redis-single (Trial, ADR-023). Минимальный scenario, чья
# единственная задача — apply:destiny redis-single, чтобы дать destiny render-only
# L0. Каноническая раскладка обёртки (ADR-023): подкаталог самой destiny —
# `destiny-redis-single/_trial/scenario/apply/`. Резолвер L0 зеркалит прод
# (slice A, ADR-023): apply:destiny резолвится по имени из
# `_trial/service.yml::destiny[]` + URL из `default_destiny_source` тест-кейса.
name: apply
description: >-
  Trial-харнесс: делегирует установку Redis в destiny redis-single через
  apply:destiny. Не сервис — обёртка под L0-render destiny.

input:
  version:
    type: string
    required: false
    # distro-native (epoch + revision), как в контракте destiny redis-single (BUG-1).
    pattern: "^([0-9]+:)?[0-9][A-Za-z0-9.~+-]*$"
  redis_password:
    type: string
    required: true
    secret: true
    min_length: 16
  redis_socket:
    type: string
    default: /var/run/redis/redis-server.sock
    pattern: "^/[A-Za-z0-9._/-]+$"
  maxmemory:
    type: string
    default: 256mb
    pattern: "^[0-9]+(b|kb|mb|gb)$"
  config:
    type: object
    properties: {}
    additional_properties: true

tasks:
  - name: Apply redis-single destiny
    apply:
      destiny: redis-single
      input:
        version:        "${ has(input.version) ? input.version : '' }"
        redis_password: "${ input.redis_password }"
        redis_socket:   "${ input.redis_socket }"
        maxmemory:      "${ input.maxmemory }"
        config:         "${ input.config }"
