# tasks/main.yml — точка входа destiny redis. Только include-список: логические
# группы разнесены по соседним файлам, раскрываются inline ДО render (docs/destiny/
# tasks.md §4 — within-destiny include раскрывается в плоский список). Видит ТОЛЬКО
# свой input: (изоляция, ADR-009).
#
# Режим-агностичный per-host кирпич (standalone/cluster/sentinel/sentinel_only):
# режим выбирает scenario сервиса передачей флагов и cluster-/sentinel-директив в
# config; destiny сама режим не знает. Конфиг приходит ГОТОВЫМ merged map-ом через
# apply: input: config: — destiny ничего не сливает (merge делает scenario).
#
# Обзор конвейера (порядок include = порядок задач; от него зависят финальные
# индексы плоского плана, на которые ассертят L0-кейсы):
#   install.yml  — core.pkg.installed redis-server + каталог unix-сокета;
#   server.yml   — data-плоскость redis-server (gated deploy_redis ОДНИМ внешним
#                  block-ом): TLS-каталог + 3 PEM-задачи (cert/key/ca, в nested
#                  tls.enable-block) → users.acl → redis.conf → systemd hardening
#                  drop-in → core.service.running/restarted. ВСЕ register'ы
#                  redis_* и их onchanges-рестарт ОБЯЗАНЫ жить В ЭТОМ файле: ядро НЕ
#                  раскрывает register через границу include (cross-file register —
#                  open Q tasks.md §12). Разрыв границы расцепил бы ротацию cert от
#                  рестарта (security-регрессия);
#   sentinel.yml — sentinel-демон (gated sentinel_enabled): sentinel.conf + unit +
#                  core.service.running/restarted. register'ы redis_sentinel_* и их
#                  onchanges — здесь;
#   extras.yml   — host-tuning (THP-юнит / logrotate / sysctl), каждый блок gated
#                  своим флагом. register sysctl→apply — здесь;
#   modules.yml  — каталог .so + loop-fetch Redis-модулей (Redis < 8).
#
# Явных daemon-reload-шагов НЕТ: core.service (daemon_reload: auto, default) сам
# перечитывает конфигурацию systemd при смене unit-файла ПЕРЕД start/restart.

- include: install.yml

- include: server.yml

- include: sentinel.yml

- include: extras.yml

- include: modules.yml
