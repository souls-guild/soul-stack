# Диспатч по input.action. include-задача не может нести модификаторы scope/
# контроля (`when:` и пр.) — раскрытие отвергает их `include_modifier_unsupported`
# (shared/config/include_expand.go, destiny/tasks.md §4.1). Поэтому include-соседи
# подключаются БЕЗУСЛОВНО, а гейт по action живёт на module-задачах ВНУТРИ каждого
# файла (apply.yml/manage.yml/diagnostic.yml) через `when: input.action == '…'`.
# Семантика прежняя: при заданном action отрабатывают только задачи его файла,
# остальные `skipped: when` (destiny/tasks.md §6 `when:`).
- name: Apply Redis configuration
  include: apply.yml

- name: Manage Redis users and service state
  include: manage.yml

- name: Run Redis diagnostics
  include: diagnostic.yml
