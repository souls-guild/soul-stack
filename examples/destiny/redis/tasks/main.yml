# tasks/main.yml — точка входа destiny redis. Только include-список: логические
# группы разнесены по соседним файлам, раскрываются inline ДО render (docs/destiny/
# tasks.md §4 — within-destiny include раскрывается в плоский список). Видит ТОЛЬКО
# свой input: (изоляция, ADR-009).
#
# Режим-агностичный per-host кирпич (standalone/cluster/sentinel/sentinel_only):
# режим выбирает scenario сервиса передачей флагов и cluster-/sentinel-директив в
# config; destiny сама режим не знает. Конфиг приходит ГОТОВЫМ merged map-ом через
# apply: input: config: — destiny ничего не сливает (merge делает scenario).
#
# Обзор конвейера (порядок include = порядок задач). Режим-гейт стоит НА include
# (conditional-include, ADR-009 amendment): статический input-предикат на include-
# задаче РЕАЛЬНО исключает группу из плана (render-phase group-drop), а не гасит её
# placeholder-skip-ом. Поэтому выключенный include (sentinel вне sentinel-режима,
# server в sentinel_only) ФИЗИЧЕСКИ отсутствует — его задачи не рендерятся, индексы
# не резервируются. L0-кейсы ассертят presence-матчером (task_present/task_absent),
# которому group-drop безопасен (позиционные индексы не важны).
#
#   install.yml  — установка бинарей redis (БЕЗУСЛОВНО): диспетч по install.method
#                  (package default / binary opt-in) + каталог unix-сокета. Метод-гейт
#                  in-block (package активна всегда, включая sentinel_only), на include
#                  НЕ выносится. binary-ветка несёт СВОЙ рестарт здесь (per-file линтер
#                  onchanges запрещает cross-file register);
#   server.yml   — data-плоскость redis-server (gated deploy_redis НА include): PEM →
#                  users.acl → redis.conf → hardening drop-in → core.service. sentinel_only
#                  (deploy_redis=false) → group-drop;
#   sentinel.yml — sentinel-демон (gated sentinel_enabled НА include). Вне sentinel-
#                  режима — group-drop;
#   extras.yml   — host-tuning (THP-юнит / logrotate / sysctl), все БЕЗУСЛОВНЫ;
#   modules.yml  — каталог .so + ЧЕТЫРЕ ЯВНЫЕ fetch-задачи ВСЕХ Redis-модулей (директива
#                  «модули ВСЕГДА ВСЕ»; gated НА include на deploy_redis И НЕ redis8).
#                  sentinel_only / Redis 8+ → group-drop;
#
# Гейты include — статические input-предикаты (conditional-include требует
# input./essence./incarnation./vars.; register./soulprint. на include запрещены).
# Все три режим-гейта redis input-based. has()-guard в каждом — render-safety при
# absent dict (sentinel в standalone, tls в sentinel_only): when не должен падать
# no-such-key, хотя при истинном include соответствующий dict присутствует.
#
# Явных daemon-reload-шагов НЕТ: core.service (daemon_reload: auto, default) сам
# перечитывает конфигурацию systemd при смене unit-файла ПЕРЕД start/restart.

- include: install.yml

- include: server.yml
  when: "default(input.deploy_redis, true)"

- include: sentinel.yml
  when: "default(input.sentinel_enabled, false)"

- include: extras.yml

# Модули ВСЕГДА ВСЕ (директива C), но ТОЛЬКО где есть data-плоскость (sentinel_only —
# redis-server нет, модулям негде грузиться) И Redis < 8 (на 8+ встроены). version-guard
# вынесен в vars (vars.redis_is_v8plus, единый источник с loadmodules server.yml).
# conditional-include допускает vars. в предикате → группа РЕАЛЬНО исключается из плана.
- include: modules.yml
  when: "default(input.deploy_redis, true) && !vars.redis_is_v8plus"
