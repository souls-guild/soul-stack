# tasks/modules.yml — Redis-модули (концепция Ansible-роли redis: загрузка .so
# RediSearch/RedisJSON/RedisTimeSeries/RedisBloom на Redis < 8). ВЕСЬ файл gated на
# include (main.yml): включён при data-плоскости (deploy_redis) И Redis < 8; иначе
# group-drop (sentinel_only — модулям негде грузиться; Redis 8+ — модули встроены).
#
# ★ ДИРЕКТИВА «модули ВСЕГДА ВСЕ» (2026-06-25): набор — ИНВАРИАНТ vars.redis_modules,
# не operator-выбор; качается ВЕСЬ набор. input.modules / input.modules_dir удалены;
# modules-dir выводится из input.data_dir. В input остаётся только modules_base_url
# (deployment-артефакт под (version, arch)). .so качаются по content-идемпотентности.
# version-gate Redis 8+ и его нормализация '' — в vars/main.yml (см. redis_is_v8plus);
# fail-closed на самом Redis (несовместимый .so → сервер не стартует), без version-matrix.

# Каталог .so-модулей <data_dir>/modules. core.file.rendered/url.fetched создают только
# файл, не родительский каталог. Создаём явно декларативным core.file.directory.
# owner redis: .so читает сервис. parents:true — data_dir переопределяем оператором
# (может быть глубоким путём с несуществующим родителем); сохраняем неявный mkdir -p
# прежнего install -d (core.file.directory по умолчанию parents:false и упал бы на
# отсутствующем промежуточном каталоге).
- name: Ensure the redis modules directory exists
  module: core.file.directory
  params:
    path: "${ vars.redis_modules_dir }"
    parents: true
    owner: "${ vars.redis_user }"
    group: "${ vars.redis_group }"
    mode: "0750"

# Скачивание .so КАЖДОГО модуля набора. ★ ЧЕТЫРЕ ЯВНЫЕ задачи (по одной на алиас), а НЕ
# loop по vars: loop.items резолвится в host-инвариантном контексте БЕЗ доступа к `vars.*`
# (loopInvariantVars, keeper/internal/render/loop.go), а имя .so и арх-URL нужны ИЗ vars —
# params же ИМЕЮТ полный vars-контекст. Набор фиксированный (4) → явное перечисление
# дешевле расширения loop-движка. Порядок задач — по алиасу (как Go-сорт ключей в
# loadmodules) → план детерминирован.
#
# URL АРХ-СПЕЦИФИЧЕН per-host: modules_base_url + soulprint.self.os.arch + имя .so из vars.
# mode 0750 owner redis. register не нужен — loadmodule в redis.conf уже триггерит рестарт
# через redis_conf-register. checksum НЕ передаётся → content-идемпотентность (SHA-256),
# без integrity-verify (как node-exporter).
- name: Fetch the redisbloom module shared object
  module: core.url.fetched
  params:
    url:   "${ input.modules_base_url + '/' + soulprint.self.os.arch + '/' + vars.redis_modules.bloom }"
    path:  "${ vars.redis_modules_dir + '/' + vars.redis_modules.bloom }"
    mode:  "0750"
    owner: "${ vars.redis_user }"
    group: "${ vars.redis_group }"

- name: Fetch the rejson module shared object
  module: core.url.fetched
  params:
    url:   "${ input.modules_base_url + '/' + soulprint.self.os.arch + '/' + vars.redis_modules.json }"
    path:  "${ vars.redis_modules_dir + '/' + vars.redis_modules.json }"
    mode:  "0750"
    owner: "${ vars.redis_user }"
    group: "${ vars.redis_group }"

- name: Fetch the redisearch module shared object
  module: core.url.fetched
