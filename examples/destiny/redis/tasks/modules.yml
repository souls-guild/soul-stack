    path:  "${ vars.redis_modules_dir + '/' + vars.redis_modules.search }"
    mode:  "0750"
    owner: "${ vars.redis_user }"
    group: "${ vars.redis_group }"

- name: Fetch the redistimeseries module shared object
  module: core.url.fetched
  params:
    url:   "${ input.modules_base_url + '/' + soulprint.self.os.arch + '/' + vars.redis_modules.timeseries }"
    path:  "${ vars.redis_modules_dir + '/' + vars.redis_modules.timeseries }"
    mode:  "0750"
    owner: "${ vars.redis_user }"
    group: "${ vars.redis_group }"
