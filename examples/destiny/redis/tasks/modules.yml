# tasks/modules.yml — Redis-модули (концепция Ansible-роли redis: загрузка .so
# RediSearch/RedisJSON/RedisTimeSeries/RedisBloom на Redis < 8). ВЕСЬ файл gated на
# include (main.yml): включён, когда data-плоскость redis-server разворачивается
# (deploy_redis) И версия Redis < 8.
#
# ★ ДИРЕКТИВА «модули ВСЕГДА ВСЕ» (2026-06-25): набор модулей больше НЕ operator-выбор.
# Полная таблица алиас→.so — ИНВАРИАНТ кирпича в vars.redis_modules; fetch-loop
# качает ВЕСЬ набор (на Redis < 8). input.modules / input.modules_dir удалены; modules-
# dir выводится из input.data_dir (<data_dir>/modules). modules_base_url (откуда брать
# .so) ОСТАЁТСЯ в input — deployment-артефакт под пару (version, arch), не инвариант.
# scenario модули не передаёт. .so качаются по content-идемпотентности (без verify).
#
# VERSION-GATE Redis 8+ (директива C, сохранён): на Redis 8+ модули ВСТРОЕНЫ в сервер —
# .so не качаем и loadmodule НЕ пишем. Раньше гейт делал scenario (передавал modules=[]);
# теперь, когда набор-инвариант в vars, гейт ПЕРЕЕХАЛ НА include (main.yml: NOT redis8
# по ЭФФЕКТИВНОЙ версии). ЭФФЕКТИВНАЯ — input.version, когда непуст (`!= ''`), иначе
# input.install.version: scenario передаёт `version` ВСЕГДА (как '' при method=binary),
# поэтому гейт нормализует пустой version к install.version (иначе binary-install Redis 8
# качал бы 4 несовместимых .so + писал loadmodule → redis-server 8 не стартовал бы).
# Полную version-matrix НЕ тащим: gate по мажору версии + fail-closed на самом Redis
# (несовместимый .so → сервер не стартует и рестарт-задача упадёт явно), без probe-matrix
# каждого модуля с каждой минорной версией.
#
# ВКЛЮЧЁН ТОЛЬКО при deploy_redis (data-плоскость) И НЕ redis8: в sentinel_only
# (deploy_redis=false) redis-server нет → модулям негде грузиться; на Redis 8+ они
# встроены. Иначе include дропается целиком (render-phase group-drop): обе задачи
# физически отсутствуют в плане, не placeholder-skip.

# Каталог .so-модулей <data_dir>/modules. core.file.rendered/url.fetched создают только
# файл, не родительский каталог. Создаём явно декларативным core.file.directory.
# owner redis: .so читает сервис. parents:true — data_dir переопределяем оператором
# (может быть глубоким путём с несуществующим родителем); сохраняем неявный mkdir -p
# прежнего install -d (core.file.directory по умолчанию parents:false и упал бы на
# отсутствующем промежуточном каталоге).
- name: Ensure the redis modules directory exists
  module: core.file.directory
  params:
    path: "${ vars.redis_modules_dir }"
    parents: true
    owner: "${ vars.redis_user }"
    group: "${ vars.redis_group }"
    mode: "0750"

# Скачивание .so КАЖДОГО модуля набора. ★ Набор-инвариант фиксирован (vars.redis_modules,
# 4 модуля) → ЧЕТЫРЕ ЯВНЫЕ задачи, по одной на алиас, а НЕ loop по vars. Почему НЕ loop:
# loop.items резолвится в host-инвариантном контексте БЕЗ доступа к `vars.*`
# (loopInvariantVars, keeper/internal/render/loop.go — items видит input/register/
# incarnation/essence/soulprint.hosts, но не file-vars). Имя .so и арх-URL нужны ИЗ vars,
# а params (в отличие от loop.items) ИМЕЮТ полный vars-контекст — поэтому набор разнесён
# в явные задачи: каждая берёт своё имя файла из vars.redis_modules.<alias> в params.
# Набор фиксированный (4) — явное перечисление дешевле расширения loop-движка на vars.
# Порядок задач — по алиасу (bloom/json/search/timeseries), как Go-сорт ключей в
# loadmodules redis.conf → план детерминирован.
#
# URL АРХ-СПЕЦИФИЧЕН per-host: modules_base_url + soulprint.self.os.arch + имя .so из
# vars (soulprint доступен в destiny-CEL params — прецедент node-exporter). mode 0750
# owner redis: .so читает только сервис. register не нужен — loadmodule-директива в
# redis.conf уже триггерит рестарт через redis_conf-register; загрузка идемпотентна.
#
# checksum НЕ передаётся → core.url.fetched качает .so по content-идемпотентности
# (скачать во temp → сравнить SHA-256 с существующим → запись только при diff), без
# integrity-verify — доверяем HTTPS + источнику, как node-exporter (директива «попроще»).
- name: Fetch the redisbloom module shared object
  module: core.url.fetched
  params:
    url:   "${ input.modules_base_url + '/' + soulprint.self.os.arch + '/' + vars.redis_modules.bloom }"
    path:  "${ vars.redis_modules_dir + '/' + vars.redis_modules.bloom }"
    mode:  "0750"
    owner: "${ vars.redis_user }"
    group: "${ vars.redis_group }"

- name: Fetch the rejson module shared object
  module: core.url.fetched
  params:
    url:   "${ input.modules_base_url + '/' + soulprint.self.os.arch + '/' + vars.redis_modules.json }"
    path:  "${ vars.redis_modules_dir + '/' + vars.redis_modules.json }"
    mode:  "0750"
    owner: "${ vars.redis_user }"
    group: "${ vars.redis_group }"

- name: Fetch the redisearch module shared object
  module: core.url.fetched
  params:
    url:   "${ input.modules_base_url + '/' + soulprint.self.os.arch + '/' + vars.redis_modules.search }"
    path:  "${ vars.redis_modules_dir + '/' + vars.redis_modules.search }"
    mode:  "0750"
    owner: "${ vars.redis_user }"
    group: "${ vars.redis_group }"

- name: Fetch the redistimeseries module shared object
  module: core.url.fetched
  params:
    url:   "${ input.modules_base_url + '/' + soulprint.self.os.arch + '/' + vars.redis_modules.timeseries }"
    path:  "${ vars.redis_modules_dir + '/' + vars.redis_modules.timeseries }"
    mode:  "0750"
    owner: "${ vars.redis_user }"
    group: "${ vars.redis_group }"
