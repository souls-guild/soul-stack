# tasks/server.yml — data-плоскость redis-server: TLS PEM + users.acl + redis.conf +
# systemd hardening drop-in + сервис redis-server. ВЕСЬ файл gated на deploy_redis —
# гейт стоит НА include (main.yml, conditional-include ADR-009 amendment), НЕ внутри
# файла. sentinel_only (deploy_redis=false) → include дропается целиком (group-drop).
#
# ★ register'ы (redis_tls_cert/redis_tls_key/redis_tls_ca/redis_acl/redis_conf/
#   redis_hardening) и их onchanges-рестарт ОБЯЗАНЫ жить В ЭТОМ файле: ЗАГРУЗОЧНЫЙ
#   per-file линтер (validateTaskRefs, shared/config/destiny_tasks.go) отвергает
#   cross-file onchanges как unknown_register_reference. SECURITY: вынеси TLS-PEM в
#   отдельный файл от рестарта — ротация cert/key/CA молча перестанет рестартить redis.
#
# Явного daemon-reload-шага НЕТ: core.service (daemon_reload: auto) сам перечитывает
# systemd при смене hardening drop-in ПЕРЕД restart — поэтому рестарт идёт ЧЕРЕЗ
# core.service.restarted (а не raw exec).
#
# ЧАСТИЧНЫЙ inner-гейт tls.enable (только PEM-задачи, не весь файл) ОСТАЁТСЯ in-block
# (nested TLS-block ниже): include-when дропнул бы файл целиком, не подмножество задач.

# ── TLS PEM-материал (концепция Ansible-роли redis: redis_tls_*) ───────────────
# Рендерим cert/key/CA в /etc/redis/tls/ ДО redis.conf и старта сервиса: redis.conf
# (директивы tls-cert-file/tls-key-file/tls-ca-cert-file приходят в config от
# scenario) ссылается на эти файлы — при tls.enable Redis обязан их найти на старте,
# иначе падает «can't open the TLS certificate». Все четыре gated на tls.enable
# (when на nested block) + register'ятся → рестарт реактивен на смену cert (см.
# restart-onchanges ниже). HOST-ИНВАРИАНТ (один cert/CA на кластер): PEM-ПУТИ
# (tls.cert_ref/key_ref/ca_ref) приходят через apply.input.
#
# ★ Вложенный TLS-block с ЧАСТИЧНЫМ gate tls.enable (подмножество задач, не весь файл):
# in-block, потому что include-when дропнул бы файл целиком. При static-false когда
# nested-block раскрывается в per-потомок skip-placeholder-ы со СВОИМ register —
# register потомков (redis_tls_cert/key/ca) виден снаружи и при skip, поэтому
# onchanges-рестарт ниже резолвится одинаково при tls.enable true/false (flat-register-
# scope инвариантен static-skip).
#
# ★ PEM ЧЕРЕЗ core.file.present + vault() В ЯЧЕЙКЕ content (seal-маскинг, ADR-010 §7.4):
# НЕ .tmpl, НЕ уже-резолвленный PEM через apply.input. vault(ref) в ячейке content →
# детектор seal помечает её sealed vault-слоем В destiny-проходе, маскинг скрывает PEM в
# error_summary/state. vault() резолвится keeper-side; vault-клиент на Soul не тянется
# (ADR-012). ref (input.tls.cert_ref) — путь, не секрет. has(input.tls)-guard —
# render-safety при absent tls dict.
- name: Provision redis TLS material
  when: "has(input.tls) && default(input.tls.enable, false)"
  block:
    # Каталог tls/ под conf_dir — idempotent по mode/owner/group, чинит дрейф, dry-run.
    # mode 0750 owner redis: PEM (вкл. приватный ключ) читает только сервис. Путь
    # выводится из input.conf_dir (директива B: conf-dir переопределяем оператором).
    - name: Ensure the redis TLS directory exists
      module: core.file.directory
      params:
        path: "${ vars.redis_conf_dir_eff + '/tls' }"
        owner: "${ vars.redis_user }"
        group: "${ vars.redis_group }"
        mode: "0750"

    # Серверный сертификат. mode 0600 owner redis (PEM читает только сервис). register —
    # рестарт при ротации. content = vault(ref) В ЯЧЕЙКЕ → sealed vault-слоем.
    - name: Render TLS server certificate
      module: core.file.present
      register: redis_tls_cert
      params:
        path: "${ vars.redis_conf_dir_eff + '/tls/redis.crt' }"
        content: "${ vault(input.tls.cert_ref) }"
        mode: "${ vars.redis_pem_mode }"
        owner: "${ vars.redis_user }"
        group: "${ vars.redis_group }"

    # Приватный ключ — СЕКРЕТ. mode 0600 owner redis. content = vault(key_ref) В ЯЧЕЙКЕ
    # → sealed vault-слоем (приватный PEM-ключ маскируется). register — рестарт.
    - name: Render TLS server private key
      module: core.file.present
      register: redis_tls_key
      params:
        path: "${ vars.redis_conf_dir_eff + '/tls/redis.key' }"
        content: "${ vault(input.tls.key_ref) }"
        mode: "${ vars.redis_pem_mode }"
        owner: "${ vars.redis_user }"
        group: "${ vars.redis_group }"

    # CA-сертификат кластера (валидация пиров для tls-replication/tls-cluster).
    # content = vault(input.tls.ca_ref) В ЯЧЕЙКЕ → sealed vault-слоем. register —
    # рестарт.
    - name: Render TLS CA certificate
      module: core.file.present
      register: redis_tls_ca
      params:
        path: "${ vars.redis_conf_dir_eff + '/tls/ca.crt' }"
        content: "${ vault(input.tls.ca_ref) }"
        mode: "${ vars.redis_pem_mode }"
        owner: "${ vars.redis_user }"
        group: "${ vars.redis_group }"

# users.acl из переданного MAP ACL-юзеров имя→{perms,state,password} (aclfile в
# redis.conf). register, чтобы рестартить redis при изменении ACL. owner/group
# redis, mode 0640 — файл содержит password-хеши, читает только сервис. Шаблон
# range-ит MAP (Go сортирует ключи → строки ACL детерминированы между прогонами,
# нет ложного change → нет лишнего рестарта) и хеширует пароль (sha256), plaintext
# не пишет; пустой map → файл без юзеров (валидный aclfile).
- name: Render users.acl
  module: core.file.rendered
  register: redis_acl
  params:
    path: "${ vars.redis_conf_dir_eff + '/users.acl' }"
    template: templates/users.acl.tmpl
    mode: "${ vars.redis_secret_file_mode }"
    owner: "${ vars.redis_user }"
    group: "${ vars.redis_group }"
    vars:
      users: "${ default(input.users, {}) }"

# redis.conf из merged-конфига. register, чтобы рестартить redis только при
# изменении конфига. owner/group redis, mode 0640 — конфиг читает только сервис.
- name: Render redis.conf
  module: core.file.rendered
  register: redis_conf
  params:
    path: "${ vars.redis_conf_dir_eff + '/redis.conf' }"
    template: templates/redis.conf.tmpl
    mode: "${ vars.redis_secret_file_mode }"
    owner: "${ vars.redis_user }"
    group: "${ vars.redis_group }"
    vars:
      password: "${ input.password }"
      config:   "${ default(input.config, {}) }"
      # host-layout (директива B): шаблон выводит `dir` из data_dir (RDB/AOF) и `aclfile`
      # из conf_dir (туда же, куда «Render users.acl» кладёт файл).
      conf_dir: "${ vars.redis_conf_dir_eff }"
      data_dir: "${ vars.redis_data_dir_eff }"
      port:     "${ vars.redis_port }"
      run_dir:  "${ vars.run_dir }"
      log_dir:  "${ vars.log_dir }"
      # Директивы loadmodule — отдельной секцией шаблона (НЕ ключи config-map: range
      # `{{key}} {{value}}` дал бы хвостовой пробел у loadmodule без значения).
      # ★ ДИРЕКТИВА «модули ВСЕГДА ВСЕ» = ALL-OR-NOTHING: version-guard и путь модулей —
      # в vars.yml; здесь тернар «пусто (НИ ОДНОГО loadmodule), иначе пути ВСЕХ .so».
      # ПУСТО когда: Redis 8+ (модули встроены) ЛИБО modules_base_url пуст (vanilla redis,
      # без модулей) — vars.redis_modules_enabled инкапсулирует оба условия (единый источник
      # с include modules.yml, main.yml). Без base_url-гейта loadmodule печатался бы и для
      # vanilla → redis abort (нет .so для загрузки: их негде скачать). ПОРЯДОК — ЯВНЫЙ
      # отсортированный array-литерал алиасов, а НЕ .map() по map-у (CEL итерация по map
      # недетерминирована → ложный change/рестарт).
      loadmodules: >-
        ${ !vars.redis_modules_enabled
           ? []
           : ['bloom', 'json', 'search', 'timeseries'].map(alias,
               vars.redis_modules_dir + '/' + vars.redis_modules[alias]) }

# Каталог drop-in-а systemd. core.file.rendered создаёт только файл, родительский
# каталог .service.d/ — нет, а дистрибутивный пакет redis-server его не заводит.
# Создаём явно ДО рендера декларативным core.file.directory. Путь юнит-drop-in-а
# собирается из vars.systemd_dir + имени сервиса (директива A: service-name из vars).
- name: Ensure the redis-server systemd drop-in directory exists
  module: core.file.directory
  params:
    path: "${ vars.systemd_dir + '/' + vars.redis_service_name + '.service.d' }"
    owner: "${ vars.root_owner }"
    group: "${ vars.root_group }"
    mode: "0755"

# systemd drop-in hardening поверх ДИСТРИБУТИВНОГО юнита redis-server (его нельзя
# заменять целиком — обновляется с пакетом, несёт ExecStart/Type=notify). Override
# мержится в [Service]. stateful-вариант: ProtectSystem=strict + ReadWritePaths под
# фактические каталоги записи redis (data-dir/socket/pid/log). register — чтобы
# реактивно дернуть рестарт только при изменении (daemon-reload core.service делает
# сам перед рестартом). Подробности — в шаблоне.
# ★ ТОЛЬКО package-install: drop-in мержится в ДИСТРИБУТИВНЫЙ юнит (override). При
# binary-install свой юнит редис-сервера рендерится в install.yml уже с hardening —
# дистрибутивного юнита нет, override-у нечего покрывать. Гейт — та же форма, что
# package-ветка install.yml (install не передан / method не задан / method=='package').
- name: Render redis-server systemd hardening drop-in
  module: core.file.rendered
  when: "!has(input.install) || !has(input.install.method) || input.install.method == 'package'"
  register: redis_hardening
  params:
    path: "${ vars.systemd_dir + '/' + vars.redis_service_name + '.service.d/hardening.conf' }"
    template: templates/hardening.conf.tmpl
    mode: "${ vars.unit_file_mode }"
    owner: "${ vars.root_owner }"
    group: "${ vars.root_group }"
    # ReadWritePaths из vars: data_dir следует за override оператора, run_dir/log_dir —
    # системные каталоги socket/pid/log. conf_dir (тоже override-аемый) — под day-2
    # CONFIG REWRITE update_config: redis-server переписывает redis.conf, без conf_dir в
    # RW strict держит /etc только-чтение → REWRITE падает (см. hardening.conf.tmpl).
    vars:
      data_dir: "${ vars.redis_data_dir_eff }"
      run_dir:  "${ vars.run_dir }"
      log_dir:  "${ vars.log_dir }"
      conf_dir: "${ vars.redis_conf_dir_eff }"

# core.service redis-server running. sentinel_only (deploy_redis=false) сервис НЕ держит
# — весь файл group-drop (include-when ложно).
- name: Ensure redis-server is running and enabled at boot
  module: core.service.running
  params:
    name: "${ vars.redis_service_name }"
    enabled: true

# ★ РЕСТАРТ СУЖЕН до hardening drop-in (systemd unit-level) — единственный истинный
# рестарт-кейс data-плоскости. Смена systemd-юнита (ProtectSystem/ReadWritePaths/
# ExecStart-override) вступает в силу ТОЛЬКО через daemon-reload + restart процесса:
# CONFIG SET тут бессилен (это не runtime-директива Redis, а unit самого процесса).
# Поэтому redis_hardening → рестарт (daemon-reload core.service делает сам перед
# restart).
#
# ★ redis.conf / users.acl / TLS PEM СОЗНАТЕЛЬНО НЕ рестартят (нет в onchanges). Они
# ОЖИВЛЯЮТСЯ hot-reload в day-2-сценариях сервиса (конвенция «hot-reload > рестарт»,
# docs/destiny/production-conventions.md §3a/§6): update_config → CONFIG SET/REWRITE;
# add_user → ACL LOAD; rotate_tls → CONFIG SET tls-*-file (Redis 6.2+ live). Рендер
# файлов остаётся ЗДЕСЬ (кладёт желаемое состояние на диск); ОЖИВЛЕНИЕ — day-2-шаг. На
# at-create первичный старт (core.service.running выше) поднимает уже с финальным
# конфигом/ACL/cert, отдельный рестарт не нужен.
#
# ★ Рестарт на смену БИНАРЯ/ЮНИТА binary-ветки НЕ здесь, а в install.yml (cross-file
# onchanges отвергает per-file линтер — register рядом со своим потребителем).
# ★ ТОЛЬКО package-install (см. гейт hardening drop-in выше): в binary-ветке drop-in не
# рендерится → redis_hardening не меняется (свой binary-юнит несёт hardening сразу).
- name: Restart redis-server because the systemd hardening drop-in changed
  module: core.service.restarted
  when: "!has(input.install) || !has(input.install.method) || input.install.method == 'package'"
  onchanges: [redis_hardening]
  timeout: 30s
  params:
    name: "${ vars.redis_service_name }"
