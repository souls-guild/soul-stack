# tasks/server.yml — data-плоскость redis-server (gated deploy_redis): TLS PEM +
# users.acl + redis.conf + systemd hardening drop-in + сервис redis-server.
#
# ★ ВСЕ register'ы (redis_tls_cert/redis_tls_key/redis_tls_ca/redis_acl/redis_conf/
#   redis_hardening) и их onchanges-рестарт ОБЯЗАНЫ жить В ЭТОМ файле: ядро НЕ
#   раскрывает register через границу include (cross-file register — нерешённый
#   open Q docs/destiny/tasks.md §12). Вынеси TLS-PEM в отдельный файл от рестарта —
#   ротация cert/key/CA молча перестанет рестартить redis (security-регрессия).
#
# Явного daemon-reload-шага НЕТ: core.service (daemon_reload: auto, default) сам
# перечитывает конфигурацию systemd при смене hardening drop-in ПЕРЕД restart.
# Поэтому рестарт после смены юнита идёт ЧЕРЕЗ core.service.restarted (а не raw
# exec) — иначе auto-reload не отработал бы.

# ── TLS PEM-материал (концепция Ansible-роли redis: redis_tls_*) ───────────────
# Рендерим cert/key/CA в /etc/redis/tls/ ДО redis.conf и старта сервиса: redis.conf
# (директивы tls-cert-file/tls-key-file/tls-ca-cert-file приходят в config от
# scenario) ссылается на эти файлы — при tls_enable Redis обязан их найти на старте,
# иначе падает «can't open the TLS certificate». Все три gated на tls_enable +
# register'ятся → рестарт реактивен на смену cert (см. restart-onchanges ниже).
# HOST-ИНВАРИАНТ (один cert/CA на кластер): PEM приходит через apply.input
# (scenario резолвит из Vault), НЕ per-host .self — tiling-урок.

# Каталог /etc/redis/tls — core.file.rendered создаёт только файл, не родительский
# каталог. Создаём явно декларативным core.file.directory (idempotent по mode/owner/
# group, чинит дрейф, dry-run — в отличие от императивного core.exec.run install -d).
# mode 0750 owner redis: PEM (вкл. приватный ключ) читает только сервис.
# TLS-PEM — DATA-плоскость redis-server (redis.conf ссылается на эти файлы) →
# gated ТАКЖЕ на deploy_redis: в sentinel_only (deploy_redis=false) redis-server
# нет, PEM data-плоскости не рендерим (sentinel-демон TLS — отдельный follow-up).
- name: Ensure the redis TLS directory exists
  module: core.file.directory
  when: "(has(input.deploy_redis) ? input.deploy_redis : true) && has(input.tls_enable) && input.tls_enable"
  params:
    path: /etc/redis/tls
    owner: redis
    group: redis
    mode: "0750"

# Серверный сертификат. mode 0600 owner redis (cert не секрет, но держим режим
# единым со всем TLS-каталогом). register — рестарт при ротации cert. var-имя
# `tls_cert` (не голое `cert`) — каталог маскинга shared/audit ловит секрет ПО
# ИМЕНИ ключа (regex tls[_-]?(key|cert|ca)); голое `cert` под фильтр не попадало
# бы → PEM утёк бы в логи/OTel/RunResult.
- name: Render TLS server certificate
  module: core.file.rendered
  when: "(has(input.deploy_redis) ? input.deploy_redis : true) && has(input.tls_enable) && input.tls_enable"
  register: redis_tls_cert
  params:
    path: /etc/redis/tls/redis.crt
    template: templates/tls-cert.crt.tmpl
    mode: "0600"
    owner: redis
    group: redis
    vars:
      tls_cert: "${ has(input.tls_cert) ? input.tls_cert : '' }"

# Приватный ключ — СЕКРЕТ. mode 0600 owner redis. var-имя `tls_key` маскируется
# выходным слоем ПО ИМЕНИ ключа (shared/audit regex tls[_-]?(key|cert|ca));
# прежнее голое `key` под фильтр НЕ попадало → приватный PEM-ключ утекал в
# логи/OTel/RunResult. register — рестарт при ротации.
- name: Render TLS server private key
  module: core.file.rendered
  when: "(has(input.deploy_redis) ? input.deploy_redis : true) && has(input.tls_enable) && input.tls_enable"
  register: redis_tls_key
  params:
    path: /etc/redis/tls/redis.key
    template: templates/tls-key.key.tmpl
    mode: "0600"
    owner: redis
    group: redis
    vars:
      tls_key: "${ has(input.tls_key) ? input.tls_key : '' }"

# CA-сертификат кластера (валидация пиров для tls-replication/tls-cluster).
# var-имя `tls_ca` — та же причина: маскинг по имени (tls[_-]?(key|cert|ca)).
- name: Render TLS CA certificate
  module: core.file.rendered
  when: "(has(input.deploy_redis) ? input.deploy_redis : true) && has(input.tls_enable) && input.tls_enable"
  register: redis_tls_ca
  params:
    path: /etc/redis/tls/ca.crt
    template: templates/tls-ca.crt.tmpl
    mode: "0600"
    owner: redis
    group: redis
    vars:
      tls_ca: "${ has(input.tls_ca) ? input.tls_ca : '' }"

# users.acl из переданного MAP ACL-юзеров имя→{perms,state,password} (aclfile в
# redis.conf). register, чтобы рестартить redis при изменении ACL. owner/group
# redis, mode 0640 — файл содержит password-хеши, читает только сервис. Шаблон
# range-ит MAP (Go сортирует ключи → строки ACL детерминированы между прогонами,
# нет ложного change → нет лишнего рестарта) и хеширует пароль (sha256), plaintext
# не пишет; пустой map → файл без юзеров (валидный aclfile).
# DATA-плоскость redis-server → gated на deploy_redis (sentinel_only: ACL нет).
- name: Render users.acl
  module: core.file.rendered
  when: "has(input.deploy_redis) ? input.deploy_redis : true"
  register: redis_acl
  params:
    path: /etc/redis/users.acl
    template: templates/users.acl.tmpl
    mode: "0640"
    owner: redis
    group: redis
    vars:
      users: "${ has(input.users) ? input.users : {} }"

# redis.conf из merged-конфига. register, чтобы рестартить redis только при
# изменении конфига. owner/group redis, mode 0640 — конфиг читает только сервис.
# DATA-плоскость redis-server → gated на deploy_redis (sentinel_only: redis.conf нет).
- name: Render redis.conf
  module: core.file.rendered
  when: "has(input.deploy_redis) ? input.deploy_redis : true"
  register: redis_conf
  params:
    path: /etc/redis/redis.conf
    template: templates/redis.conf.tmpl
    mode: "0640"
    owner: redis
    group: redis
    vars:
      password: "${ input.password }"
      config:   "${ has(input.config) ? input.config : {} }"
      # Директивы loadmodule (Redis < 8) — отдельной секцией шаблона (НЕ ключи
      # config-map: range `{{key}} {{value}}` дал бы хвостовой пробел у loadmodule
      # без значения). Пути .so вычисляются из input.modules (алиасы) + фиксированной
      # таблицы имён .so + modules_dir — host-инвариантны (без arch в пути). Пусто/
      # Redis 8+ (scenario передаёт modules=[]) → пустой список → секции нет.
      loadmodules: >-
        ${ has(input.modules)
           ? input.modules.map(item,
               (has(input.modules_dir) ? input.modules_dir : '/var/lib/redis/modules')
               + '/'
               + {'search': 'redisearch.so', 'json': 'rejson.so', 'timeseries': 'redistimeseries.so', 'bloom': 'redisbloom.so'}[item])
           : [] }

# Каталог drop-in-а systemd. core.file.rendered создаёт только файл, родительский
# каталог .service.d/ — нет, а дистрибутивный пакет redis-server его не заводит.
# Создаём явно ДО рендера декларативным core.file.directory.
# DATA-плоскость (drop-in юнита redis-server) → gated на deploy_redis.
- name: Ensure the redis-server systemd drop-in directory exists
  module: core.file.directory
  when: "has(input.deploy_redis) ? input.deploy_redis : true"
  params:
    path: /etc/systemd/system/redis-server.service.d
    owner: root
    group: root
    mode: "0755"

# systemd drop-in hardening поверх ДИСТРИБУТИВНОГО юнита redis-server (его нельзя
# заменять целиком — обновляется с пакетом, несёт ExecStart/Type=notify). Override
# мержится в [Service]. stateful-вариант: ProtectSystem=strict + ReadWritePaths под
# фактические каталоги записи redis (data-dir/socket/pid/log). register — чтобы
# реактивно дернуть рестарт только при изменении (daemon-reload core.service делает
# сам перед рестартом). Подробности — в шаблоне.
- name: Render redis-server systemd hardening drop-in
  module: core.file.rendered
  when: "has(input.deploy_redis) ? input.deploy_redis : true"
  register: redis_hardening
  params:
    path: /etc/systemd/system/redis-server.service.d/hardening.conf
    template: templates/hardening.conf.tmpl
    mode: "0644"
    owner: root
    group: root

# core.service redis-server running/restarted — DATA-плоскость → gated на
# deploy_redis. sentinel_only (deploy_redis=false) сервис redis-server НЕ держит.
- name: Ensure redis-server is running and enabled at boot
  module: core.service.running
  when: "has(input.deploy_redis) ? input.deploy_redis : true"
  params:
    name: redis-server
    enabled: true

# Рестарт реактивно на изменение конфига/ACL/drop-in/TLS-материала: redis.conf,
# users.acl, hardening drop-in и любой из TLS PEM-файлов требуют рестарта (новые
# директивы/юзеры/сертификаты вступают в силу только после перезапуска). Изменённый
# drop-in вступает в силу только после рестарта (daemon-reload при смене unit
# core.service делает сам перед рестартом). TLS-register'ы в onchanges → ротация
# cert/key/CA дёргает рестарт; вне tls_enable эти задачи placeholder-skip → register
# пуст → onchanges их не считает. Порядок гарантирован позицией задач.
- name: Restart redis-server because config or hardening changed
  module: core.service.restarted
  when: "has(input.deploy_redis) ? input.deploy_redis : true"
  onchanges: [redis_conf, redis_acl, redis_hardening, redis_tls_cert, redis_tls_key, redis_tls_ca]
  timeout: 30s
  params:
    name: redis-server
