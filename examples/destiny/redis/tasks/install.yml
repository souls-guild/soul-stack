# tasks/install.yml — установка бинарей redis. Диспетч по install.method (block per
# method): package (default, поведение-сохраняющее) ИЛИ binary (upstream-tarball).
# Гейт method — static (только input.*) → Keeper гасит неактивную ветку placeholder-
# skip-ом per-потомок (block static-skip, ADR-009): индексы не сдвигаются, register
# потомков виден снаружи и при погашенной ветке (flat-register-scope инвариантен).
#
# ★ register'ы binary-ветки (redis_server_bin/redis_cli_bin/redis_benchmark_bin/
#   redis_server_links/redis_server_unit) и их рестарт-onchanges живут В ЭТОМ файле: ЗАГРУЗОЧНЫЙ per-file
#   линтер (validateTaskRefs, shared/config/destiny_tasks.go) валидирует register-ссылки
#   в onchanges на уровне ОДНОГО файла — cross-file onchanges отвергается как
#   unknown_register_reference (тот же инвариант, что у node-exporter). Поэтому binary-
#   ветка несёт СВОЙ рестарт redis-server здесь, а не дёргает рестарт server.yml.

# ── package-ветка (default, ПОВЕДЕНИЕ-СОХРАНЯЮЩАЯ) ──────────────────────────────
# distro-пакет redis-server + каталог unix-сокета. Один gate install.method==package
# на всю ветку (block static-skip): не передан install / method=='package' → активна.
# Пакет несёт И redis-server, И redis-sentinel-демон → ставится во ВСЕХ режимах,
# включая sentinel_only (deploy_redis=false). version читается голым input.version
# (required_when=package гарантирует присутствие в этой ветке).
#
# Предикат — has()-цепочка, НЕ default(input.install.method, …): default() ловит
# no-such-key только в ПЕРВОМ аргументе на ЛИСТЕ существующего map (отсутствие листа
# method), а сам input.install может отсутствовать ЦЕЛИКОМ (корень) → default() упал
# бы «no such key: install». «package» истинно: install не передан / method не задан /
# method == 'package'.
- name: Install redis from the distribution package
  when: "!has(input.install) || !has(input.install.method) || input.install.method == 'package'"
  block:
    # Пакет из репозитория дистрибутива. retry — против флапающего apt/dnf-зеркала.
    # core.pkg всегда ставит distro-native =version-пин (воспроизводимая инсталляция).
    - name: Install redis-server package
      module: core.pkg.installed
      retry: { count: 3, delay: 10s }
      params:
        name: redis-server
        version: "${ input.version }"

    # redis-sentinel — ОТДЕЛЬНЫЙ distro-пакет: на Debian/Ubuntu пакет redis-server НЕ
    # кладёт исполняемый redis-sentinel под отдельный юнит → redis-sentinel.service падает
    # 203/EXEC (дефект пойман live на Debian 12). Ставим его ТОЛЬКО в sentinel-режиме
    # (sentinel_enabled): cluster/standalone без sentinel-демона пакет не тянут (парный
    # негатив cluster-create-3shards). version — ТОТ ЖЕ distro-пин (версионируются вместе).
    # has(input.sentinel_enabled)-guard НЕ нужен: default() ловит отсутствие листа (поле
    # объявлено в destiny.yml input с дефолтом false).
    - name: Install redis-sentinel package
      module: core.pkg.installed
      when: "default(input.sentinel_enabled, false)"
      retry: { count: 3, delay: 10s }
      params:
        name: redis-sentinel
        version: "${ input.version }"

# ── binary-ветка (default, Nexus — ОТДЕЛЬНЫЕ бинари, НЕ tarball) ────────────────
# ★ Редизайн install-модели: вместо tarball+extract качаем ТРИ отдельных бинаря
# (redis-server/redis-cli/redis-benchmark) прямо в bin_dir (схема ansible-роли redis
# installation.yml). Один gate install.method==binary на всю ветку (block static-skip).
# binary НЕ несёт distro-пакета → САМА ставит то, что пакет даёт даром: бинари в
# /usr/local/bin, distro-юзер/группу redis, свой systemd-юнит redis-server.service,
# симлинки redis-check-aof/redis-check-rdb/redis-sentinel → redis-server. redis-sentinel —
# СИМЛИНК на redis-server (НЕ отдельный fetch): redis-server в Nexus — multi-call бинарь,
# запущенный как redis-sentinel (по argv[0]) работает в sentinel-режиме; отдельного
# redis-sentinel в Nexus нет (404). Это поведение ansible-роли (installation.yml: качает
# только server/cli/benchmark, sentinel вообще не упоминается в install). arch И версия
# дистрибутива для URL — soulprint.self.os.arch / soulprint.self.os.version (soulprint в
# destiny-CEL, прецедент node-exporter).
#
# URL per-host: <base_url>/<arch>/Debian/<distro_ver>/<version>/redis-{server,cli,benchmark}
# (форма ansible redis_url_file_path: base/arch/distribution/distro_major/version/file).
# Distribution захардкожен Debian (целевой парк); distro_ver — soulprint.self.os.version.
# checksum НЕ передаётся → core.url.fetched качает по content-идемпотентности (SHA-256
# содержимого), без integrity-verify — доверяем HTTPS + источнику (директива «попроще»).
#
# ★ SSRF-guard (allow_private): дефолтный binary_base_url сервиса — ВНУТРЕННИЙ Nexus,
# который резолвится в RFC1918-адрес (напр. 10.16.2.130). core.url.fetched по умолчанию
# (allow_private:false) блокит dial в private-IP SSRF-guard-ом (shared/netguard) → fetch
# бинарей падал бы. allow_private: ${ vars.redis_binary_allow_private } снимает guard для
# этих fetch — ИМЕННО для доверенного internal Nexus (vars нормализует флаг из
# apply.input.install.allow_private ← essence.binary_allow_private, дефолт true; публичный-
# mirror-деплой с external-resolvable base ставит false). Это ослабление ОГРАНИЧЕНО binary-
# веткой и взводится осознанно (essence), не глобальный opt-out.
#
# ★ render-safety: задачи binary-блока несут has()-guard на input.install.version/base_url,
#   хотя при method=binary эти поля присутствуют. Причина: при method=package весь блок
#   static-skip, но CEL ячеек binary-задач Keeper ВСЁ РАВНО вычисляет (vars/params
#   рендерятся до skip-проекции) — голый input.install.version упал бы «no such key:
#   install». Guard даёт пустую строку в мёртвом проходе (значение не используется — skip).
- name: Install redis from upstream Nexus binaries
  when: "has(input.install) && has(input.install.method) && input.install.method == 'binary'"
  block:
    # 1. distro-юзер/группа redis (binary НЕ создаёт их — это делает distro-пакет).
    #    Группа ПЕРЕД юзером (primary group юзера). system-аккаунт без login-shell:
    #    redis — сервис, не интерактивный логин. Стабильный uid/gid (stateful data-dir
    #    /var/lib/redis требует стабильного владельца между рестартами — см. hardening.
    #    conf.tmpl: DynamicUser непригоден). uid/gid НЕ пинуем (распределяет ОС).
    - name: Ensure the redis group exists
      module: core.group.present
      params:
        name: "${ vars.redis_group }"
        system: true

    - name: Ensure the redis user exists
      module: core.user.present
      params:
        name: "${ vars.redis_user }"
        group: "${ vars.redis_group }"
        system: true
        shell: /usr/sbin/nologin
        home: "${ vars.redis_data_dir_eff }"

    # 2. Скачать ТРИ бинаря (redis-server/redis-cli/redis-benchmark) per-host из Nexus в
    #    bin_dir. Идемпотентность нативная по SHA-256 содержимого (аналог If-None-Match
    #    ansible-роли): скачать во temp → сравнить хэш → запись только при diff. mode 0755
    #    owner/group root. register'ы → рестарт redis-server (шаг ниже, В ЭТОМ файле)
    #    реагирует на смену любого; cross-file onchanges отверг бы per-file линтер.
    #    URL-база (vars.redis_binary_url_base) — has()-guard render-safe в мёртвом
    #    package-проходе (см. шапку); собирается в vars.yml из install.base_url/version +
    #    soulprint.self.os.arch/version.
    - name: Fetch the redis-server binary into the local bin directory
      module: core.url.fetched
      register: redis_server_bin
      params:
        url: "${ vars.redis_binary_url_base + '/redis-server' }"
        path: "${ vars.redis_bin_dir + '/redis-server' }"
        mode: "0755"
        owner: "${ vars.root_owner }"
        group: "${ vars.root_group }"
        allow_private: "${ vars.redis_binary_allow_private }"

    - name: Fetch the redis-cli binary into the local bin directory
      module: core.url.fetched
      register: redis_cli_bin
      params:
        url: "${ vars.redis_binary_url_base + '/redis-cli' }"
        path: "${ vars.redis_bin_dir + '/redis-cli' }"
        mode: "0755"
        owner: "${ vars.root_owner }"
        group: "${ vars.root_group }"
        allow_private: "${ vars.redis_binary_allow_private }"

    - name: Fetch the redis-benchmark binary into the local bin directory
      module: core.url.fetched
      register: redis_benchmark_bin
      params:
        url: "${ vars.redis_binary_url_base + '/redis-benchmark' }"
        path: "${ vars.redis_bin_dir + '/redis-benchmark' }"
        mode: "0755"
        owner: "${ vars.root_owner }"
        group: "${ vars.root_group }"
        allow_private: "${ vars.redis_binary_allow_private }"

    # 3. Симлинки redis-check-aof/redis-check-rdb/redis-sentinel → redis-server. redis-server —
    #    multi-call бинарь: запущенный как redis-sentinel (по argv[0]) работает в sentinel-
    #    режиме, поэтому отдельный redis-sentinel в Nexus не нужен (его там и нет — 404).
    #    check-aof/check-rdb — maintenance-тулзы того же бинаря. ansible-роль симлинит
    #    check-aof/check-rdb императивно и sentinel-бинарь не качает вовсе. sentinel.yml
    #    ждёт ${ vars.redis_bin_dir }/redis-sentinel при sentinel_enabled — этот симлинк его и даёт.
    #
    #    ★★ ВРЕМЕННО (PILOT): симлинк через core.cmd.shell `ln -sfn` — у core.file НЕТ
    #    декларативного symlink-state (только present/absent/rendered/directory).
    #    Декларативный core.file.symlink — в backlog (architect отдельно). `ln -sfn`
    #    атомарно переписывает симлинк (force + no-deref → не залезает В каталог-цель при
    #    повторном прогоне); идемпотентность не строгая (всегда changed), но безопасна.
    #    register общий → рестарт redis-server на смену (тулзы/sentinel — на переустановке).
    - name: Symlink redis-check-aof, redis-check-rdb and redis-sentinel to redis-server
      module: core.cmd.shell
      register: redis_server_links
      params:
        cmd: "${ 'ln -sfn ' + vars.redis_bin_dir + '/redis-server ' + vars.redis_bin_dir + '/redis-check-aof && ln -sfn ' + vars.redis_bin_dir + '/redis-server ' + vars.redis_bin_dir + '/redis-check-rdb && ln -sfn ' + vars.redis_bin_dir + '/redis-server ' + vars.redis_bin_dir + '/redis-sentinel' }"

    # 4. Свой systemd-юнит redis-server.service (binary НЕ несёт distro-юнита).
    #    ★ Имя юнита redis-server — чтобы server.yml hardening drop-in
    #    (/etc/systemd/system/redis-server.service.d/) и core.service redis-server
    #    рестарт работали В ОБЕИХ ветках без ветвления. ExecStart=/usr/local/bin/
    #    redis-server (binary-путь). register — рестарт при смене юнита.
    - name: Render redis-server systemd unit (binary install)
      module: core.file.rendered
      register: redis_server_unit
      params:
        # Путь юнита из vars.systemd_dir + имени СЕРВИСА (НЕ путь бинаря — тот в ExecStart
        # шаблона фиксированный).
        path: "${ vars.systemd_dir + '/' + vars.redis_service_name + '.service' }"
        template: templates/redis-server.service.tmpl
        mode: "${ vars.unit_file_mode }"
        owner: "${ vars.root_owner }"
        group: "${ vars.root_group }"
        vars:
          bin_dir:     "${ vars.redis_bin_dir }"
          conf_dir:    "${ vars.redis_conf_dir_eff }"
          redis_user:  "${ vars.redis_user }"
          redis_group: "${ vars.redis_group }"

    # 5. Рестарт redis-server на смену бинаря/юнита вынесен НИЖЕ top-level: он обязан
    #    идти ПОСЛЕ создания каталога unix-сокета (нужен сервису при старте), а сокет —
    #    top-level (обе ветки). Внутри binary-блока рестарт оказался бы ВЫШЕ сокета.

# ── conf-dir, data-dir и log-dir (обе ветки, БЕЗУСЛОВНО) ────────────────────────
# Каталог конфигурации (/etc/redis: redis.conf, users.acl, sentinel.conf, sentinel-
# users.acl, tls/) ОБЯЗАН существовать ДО первого рендера любого из этих файлов
# (server.yml/sentinel.yml идут ПОСЛЕ этого include). package-ветка: distro-пакет
# заводит /etc/redis сам — idempotent core.file.directory = no-op/чинит дрейф. binary-
# ветка: пакета НЕТ, создать НЕКОМУ → рендер users.acl/redis.conf падал бы «open
# .../.users.acl.tmp-…: no such file or directory» (caught live 2026-06-29). Потому
# БЕЗУСЛОВНО (НЕ gated на install.method и НЕ на deploy_redis): conf-dir нужен ОБЕИМ
# плоскостям — и redis-server (redis.conf/users.acl/tls), и sentinel-демону (sentinel.conf/
# sentinel-users.acl в том же conf_dir, sentinel_only без deploy_redis тоже сюда пишет).
# owner/group redis (пакет или binary-ветка их завели — задача ПОСЛЕ обоих установочных
# блоков). mode 0750: владелец redis читает конфиг (secret-файлы 0640/0600), остальные не
# входят. parents:true — conf_dir переопределяем оператором (input.conf_dir, может быть
# глубоким путём с несуществующим родителем; default parents:false упал бы на нём).
- name: Ensure the redis configuration directory exists
  module: core.file.directory
  params:
    path: "${ vars.redis_conf_dir_eff }"
    owner: "${ vars.redis_user }"
    group: "${ vars.redis_group }"
    mode: "0750"
    parents: true

# Каталоги данных (/var/lib/redis: RDB/AOF, modules) и логов (/var/log/redis:
# redis-server.log/redis-sentinel.log) ОБЯЗАНЫ существовать ДО первого старта
# redis-server (server.yml) И sentinel-демона. package-ветка: distro-пакет обычно
# заводит data-dir, но НЕ всегда log-dir под наш logfile — idempotent core.file.directory
# в пакетной инсталляции = no-op/чинит дрейф. binary-ветка: пакета нет, создать НЕКОМУ
# (systemd RuntimeDirectory покрывает только run-dir, не stateful data/log). Потому
# БЕЗУСЛОВНО (НЕ gated на install.method и НЕ на deploy_redis): оба каталога нужны и
# redis-server, и sentinel-демону (sentinel_only без deploy_redis всё равно логирует).
# owner/group redis (пакет или binary-ветка их завели — задачи идут ПОСЛЕ обоих
# установочных блоков). mode 0750: владелец redis читает/пишет, остальные не входят.
- name: Ensure the redis data directory exists
  module: core.file.directory
  params:
    path: "${ vars.redis_data_dir_eff }"
    owner: "${ vars.redis_user }"
    group: "${ vars.redis_group }"
    mode: "0750"
    parents: true

- name: Ensure the redis log directory exists
  module: core.file.directory
  params:
    path: "${ vars.log_dir }"
    owner: "${ vars.redis_user }"
    group: "${ vars.redis_group }"
    mode: "0750"
    parents: true

# ── Каталог unix-сокета (обе ветки) ─────────────────────────────────────────────
# ТОЛЬКО если в merged-конфиге есть директива unixsocket. Пакетный systemd создаёт
# каталог через RuntimeDirectory лишь при старте юнита (хрупко); создаём явно ДО старта/
# рестарта redis-server, но ПОСЛЕ установки (нужен пользователь/группа redis — пакет или
# binary-ветка их завели; поэтому задача идёт после обоих установочных блоков).
# Декларативное core.file.directory: idempotent по mode/owner/group, чинит дрейф,
# dry-run. mode 0755: владелец redis пишет сокет, остальные обходят каталог; доступ к
# сокету режет unixsocketperm (директива конфига). НЕ gated на install.method (нужен в
# обеих ветках), gated на deploy_redis + наличие unixsocket в config.
- name: Ensure the redis socket directory exists
  module: core.file.directory
  when: "default(input.deploy_redis, true) && has(input.config) && has(input.config.unixsocket)"
  params:
    # mode 0755 — литералом (точечный, нужен только этой задаче): владелец redis пишет
    # сокет, остальные обходят каталог.
    path: "${ vars.socket_dir }"
    owner: "${ vars.redis_user }"
    group: "${ vars.redis_group }"
    mode: "0755"

# ── Первичный старт redis-server — ЕДИНСТВЕННЫЙ, в server.yml (НЕ здесь) ─────────
# Преждевременный рестарт redis-server на смену бинаря/юнита УБРАН: на day-1 он
# стартовал redis-server ДО рендера redis.conf/users.acl/data-dir (следующий include
# server.yml) → restart-loop. Первичный старт остаётся единственным —
# server.yml `core.service.running redis-server`, который идёт ПОСЛЕ рендера конфига +
# ACL + каталогов (data/log/socket); daemon_reload:auto подхватывает свежий binary-юнит.
# register'ы binary-ветки (redis_server_bin/redis_server_links/redis_server_unit) остаются
# объявленными (захват результата fetch/links/unit), потребителя-onchanges у них теперь нет.
#
# ★ binary-upgrade рестарт вынесен в upgrade-сценарий/ручной — ВРЕМЕННО, см.
# architect-аудит 2026-06-29: апгрейд бинаря на ЖИВОМ инстансе НЕ авто-рестартит
# (core.service.running видит active → no-op), пока нет upgrade-сценария.
