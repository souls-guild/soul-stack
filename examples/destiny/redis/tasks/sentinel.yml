# tasks/sentinel.yml — sentinel daemon (sentinel/sentinel_only mode). The WHOLE file is gated
# on sentinel_enabled AT include (main.yml, conditional-include ADR-009 amendment), NOT
# inside the file. Outside sentinel mode the include is dropped entirely (group-drop). master
# election is done by the service scenario run_once, which passes READY master_ip/master_port —
# destiny stays a mode-agnostic "dumb" brick.

# ★ registers for redis_sentinel_conf/redis_sentinel_unit and their onchanges-restart MUST
#   live IN THIS file: the per-file linter (validateTaskRefs) rejects cross-file onchanges.
#   There is no explicit daemon-reload step: core.service (daemon_reload: auto) re-reads the
#   unit itself BEFORE restart — hence restart goes THROUGH core.service.restarted (not raw exec).

# sentinel-users.acl — a SECOND aclfile, ONLY for the sentinel daemon (a separate perms set:
# sentinel commands). register — restart the daemon on change. owner/group redis, mode
# 0640 (password hashes). Empty/not passed → empty aclfile (back-compat). BEFORE sentinel.conf:
# its aclfile directive points at this file, sentinel must find it on startup.
- name: Render sentinel-users.acl
  module: core.file.rendered
  register: redis_sentinel_acl
  params:
    path: "${ vars.redis_conf_dir_eff + '/sentinel-users.acl' }"
    template: templates/sentinel-users.acl.tmpl
    mode: "${ vars.redis_secret_file_mode }"
    owner: "${ vars.redis_user }"
    group: "${ vars.redis_group }"
    vars:
      users: "${ default(input.sentinel_users, {}) }"

# sentinel.conf from the passed master parameters. register — restart the daemon on
# change. announce-ip is rendered in the template per-host from .self (NOT from vars).
# aclfile (sentinel.conf directive) points at sentinel-users.acl (see template).
- name: Render sentinel.conf
  module: core.file.rendered
  register: redis_sentinel_conf
  params:
    path: "${ vars.redis_conf_dir_eff + '/sentinel.conf' }"
    template: templates/sentinel.conf.tmpl
    mode: "${ vars.redis_secret_file_mode }"
    owner: "${ vars.redis_user }"
    group: "${ vars.redis_group }"
    vars:
      master_name: "${ default(input.sentinel.master_name, 'master') }"
      master_ip:   "${ input.sentinel.master_ip }"
      # master_port/quorum — has()?string(X):Y: the then-branch calls string(), NOT bare
      # X → default() (select-chain-only) doesn't apply here, left as a ternary.
      master_port: "${ has(input.sentinel.master_port) ? string(input.sentinel.master_port) : '6379' }"
      quorum:      "${ has(input.sentinel.quorum) ? string(input.sentinel.quorum) : '2' }"
      auth_user:   "${ default(input.sentinel.auth_user, '') }"
      auth_pass:   "${ default(input.sentinel.auth_pass, '') }"
      sentinel_config: "${ default(input.sentinel.config, {}) }"
      # host-layout (directive B): the template derives `dir` from data_dir and `aclfile`
      # (sentinel-users.acl) from conf_dir.
      data_dir:    "${ vars.redis_data_dir_eff }"
      conf_dir:    "${ vars.redis_conf_dir_eff }"
      port:        "${ vars.sentinel_port }"
      run_dir:     "${ vars.run_dir }"
      log_dir:     "${ vars.log_dir }"

# The full redis-sentinel systemd unit (the package doesn't always set it up under our config).
# register — restart reactively on unit change (daemon-reload on unit change
# is done by core.service itself before restart). sentinel_bin/cli_bin — binary path:
# /usr/bin for install.method=package (distro package), /usr/local/bin for binary
# (install.yml laid them out there). So one unit template serves both branches.
- name: Render redis-sentinel systemd unit
  module: core.file.rendered
  register: redis_sentinel_unit
  params:
    path: "${ vars.systemd_dir + '/' + vars.sentinel_service_name + '.service' }"
    template: templates/redis-sentinel.service.tmpl
    mode: "${ vars.unit_file_mode }"
    owner: "${ vars.root_owner }"
    group: "${ vars.root_group }"
    # has()-chain (NOT default(input.install.method, …)): input.install itself may be
    # missing entirely (root) → default() would fail with no-such-key. binary →
    # vars.redis_bin_dir (install.yml laid it out there; same layout dir), otherwise
    # /usr/bin (distro package — NOT our layout, not exposed in vars).
    vars:
      sentinel_bin: "${ has(input.install) && has(input.install.method) && input.install.method == 'binary' ? vars.redis_bin_dir : '/usr/bin' }"
      cli_bin:      "${ has(input.install) && has(input.install.method) && input.install.method == 'binary' ? vars.redis_bin_dir : '/usr/bin' }"
      conf_dir:      "${ vars.redis_conf_dir_eff }"
      sentinel_port: "${ vars.sentinel_port }"
      redis_user:    "${ vars.redis_user }"
      redis_group:   "${ vars.redis_group }"
      data_dir:      "${ vars.redis_data_dir_eff }"
      log_dir:       "${ vars.log_dir }"
      run_dir:       "${ vars.run_dir }"

- name: Ensure redis-sentinel is running and enabled at boot
  module: core.service.running
  params:
    name: "${ vars.sentinel_service_name }"
    enabled: true

# Restart reactively on change of sentinel.conf, sentinel-users.acl, or the unit.
# core.service does daemon-reload itself before restart on unit change. The sentinel
# daemon's ACL is re-read only via restart (there's no separate hot-reload scenario for the
# sentinel aclfile — the set is service-only, changed only on rotation/create).
- name: Restart redis-sentinel because config, ACL or unit changed
  module: core.service.restarted
  onchanges: [redis_sentinel_conf, redis_sentinel_acl, redis_sentinel_unit]
  timeout: 30s
  params:
    name: "${ vars.sentinel_service_name }"
