# tasks/sentinel.yml — sentinel-демон (режим sentinel/sentinel_only). ВЕСЬ файл gated
# на sentinel_enabled НА include (main.yml, conditional-include ADR-009 amendment), НЕ
# внутри файла. Вне sentinel-режима include дропается целиком (group-drop). master-
# election делает scenario сервиса run_once и передаёт ГОТОВЫЕ master_ip/master_port —
# destiny остаётся режим-агностичным «глупым» кирпичом.
#
# ★ register'ы redis_sentinel_conf/redis_sentinel_unit и их onchanges-рестарт ОБЯЗАНЫ
#   жить В ЭТОМ файле: per-file линтер (validateTaskRefs) отвергает cross-file onchanges.
#   Явного daemon-reload-шага НЕТ: core.service (daemon_reload: auto) сам перечитывает
#   unit ПЕРЕД restart — поэтому рестарт идёт ЧЕРЕЗ core.service.restarted (не raw exec).

# sentinel-users.acl — ВТОРОЙ aclfile, ТОЛЬКО для sentinel-демона (отдельный perms-набор:
# sentinel-команды). register — рестарт демона при изменении. owner/group redis, mode
# 0640 (password-хеши). Пустой/не передан → пустой aclfile (back-compat). ДО sentinel.conf:
# его aclfile-директива ссылается на этот файл, sentinel обязан его найти при старте.
- name: Render sentinel-users.acl
  module: core.file.rendered
  register: redis_sentinel_acl
  params:
    path: "${ vars.redis_conf_dir_eff + '/sentinel-users.acl' }"
    template: templates/sentinel-users.acl.tmpl
    mode: "${ vars.redis_secret_file_mode }"
    owner: "${ vars.redis_user }"
    group: "${ vars.redis_group }"
    vars:
      users: "${ default(input.sentinel_users, {}) }"

# sentinel.conf из переданных параметров master-а. register — рестартить демон при
# изменении. announce-ip рендерится в шаблоне per-host из .self (НЕ из vars).
# aclfile (директива sentinel.conf) указывает на sentinel-users.acl (см. шаблон).
- name: Render sentinel.conf
  module: core.file.rendered
  register: redis_sentinel_conf
  params:
    path: "${ vars.redis_conf_dir_eff + '/sentinel.conf' }"
    template: templates/sentinel.conf.tmpl
    mode: "${ vars.redis_secret_file_mode }"
    owner: "${ vars.redis_user }"
    group: "${ vars.redis_group }"
    vars:
      master_name: "${ default(input.sentinel.master_name, 'master') }"
      master_ip:   "${ input.sentinel.master_ip }"
      # master_port/quorum — has()?string(X):Y: then-ветка вызов string(), НЕ голый
      # X → default() (select-chain-only) тут неприменим, оставлено тернаром.
      master_port: "${ has(input.sentinel.master_port) ? string(input.sentinel.master_port) : '6379' }"
      quorum:      "${ has(input.sentinel.quorum) ? string(input.sentinel.quorum) : '2' }"
      auth_user:   "${ default(input.sentinel.auth_user, '') }"
      auth_pass:   "${ default(input.sentinel.auth_pass, '') }"
      sentinel_config: "${ default(input.sentinel.config, {}) }"
      # host-layout (директива B): шаблон выводит `dir` из data_dir и `aclfile`
      # (sentinel-users.acl) из conf_dir.
      data_dir:    "${ vars.redis_data_dir_eff }"
      conf_dir:    "${ vars.redis_conf_dir_eff }"
      port:        "${ vars.sentinel_port }"
      run_dir:     "${ vars.run_dir }"
      log_dir:     "${ vars.log_dir }"

# Полный systemd-юнит redis-sentinel (пакет не всегда заводит его под наш конфиг).
# register — рестарт реактивно на изменение юнита (daemon-reload при смене unit
# core.service делает сам перед рестартом). sentinel_bin/cli_bin — путь бинарей:
# /usr/bin при install.method=package (distro-пакет), /usr/local/bin при binary
# (install.yml разложил их туда). Так один юнит-шаблон обслуживает обе ветки.
- name: Render redis-sentinel systemd unit
  module: core.file.rendered
  register: redis_sentinel_unit
  params:
    path: "${ vars.systemd_dir + '/' + vars.sentinel_service_name + '.service' }"
    template: templates/redis-sentinel.service.tmpl
    mode: "${ vars.unit_file_mode }"
    owner: "${ vars.root_owner }"
    group: "${ vars.root_group }"
    # has()-цепочка (НЕ default(input.install.method, …)): сам input.install может
    # отсутствовать целиком (корень) → default() упал бы no-such-key. binary →
    # vars.redis_bin_dir (install.yml разложил туда; тот же layout-каталог), иначе
    # /usr/bin (distro-пакет — НЕ наш layout, в vars не выносится).
    vars:
      sentinel_bin: "${ has(input.install) && has(input.install.method) && input.install.method == 'binary' ? vars.redis_bin_dir : '/usr/bin' }"
      cli_bin:      "${ has(input.install) && has(input.install.method) && input.install.method == 'binary' ? vars.redis_bin_dir : '/usr/bin' }"
      conf_dir:      "${ vars.redis_conf_dir_eff }"
      sentinel_port: "${ vars.sentinel_port }"
      redis_user:    "${ vars.redis_user }"
      redis_group:   "${ vars.redis_group }"
      data_dir:      "${ vars.redis_data_dir_eff }"
      log_dir:       "${ vars.log_dir }"
      run_dir:       "${ vars.run_dir }"

- name: Ensure redis-sentinel is running and enabled at boot
  module: core.service.running
  params:
    name: "${ vars.sentinel_service_name }"
    enabled: true

# Рестарт реактивно на изменение sentinel.conf, sentinel-users.acl или юнита.
# core.service при смене unit сам делает daemon-reload перед рестартом. ACL sentinel-
# демона перечитывается только рестартом (отдельного hot-reload-сценария для sentinel-
# aclfile нет — набор служебный, меняется лишь на ротации/create).
- name: Restart redis-sentinel because config, ACL or unit changed
  module: core.service.restarted
  onchanges: [redis_sentinel_conf, redis_sentinel_acl, redis_sentinel_unit]
  timeout: 30s
  params:
    name: "${ vars.sentinel_service_name }"
