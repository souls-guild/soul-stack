# tasks/sentinel.yml — sentinel-демон (режим sentinel/sentinel_only). Все задачи
# GATED на sentinel_enabled. Вне sentinel-режима sentinel_enabled отсутствует/false
# → has()-guard гасит весь блок placeholder-skip-ом (слоты заняты, индексы не
# съезжают). master-election (кто master) делает scenario сервиса run_once и
# передаёт ГОТОВЫЕ master_ip/master_port — destiny остаётся режим-агностичным
# «глупым» кирпичом.
#
# ★ register'ы redis_sentinel_conf/redis_sentinel_unit и их onchanges-рестарт ОБЯЗАНЫ
#   жить В ЭТОМ файле: register-ссылки в onchanges валидирует ЗАГРУЗОЧНЫЙ per-file
#   линтер (validateTaskRefs, shared/config/destiny_tasks.go) — cross-file onchanges
#   отвергается как unknown_register_reference. Within-destiny include уплощается ДО
#   render (tasks.md §4) — keeper-side registerIndex плоский, — но проверка ссылок
#   остаётся per-file. Явного daemon-reload-шага НЕТ: core.service (daemon_reload: auto)
#   сам перечитывает unit при смене redis-sentinel.service ПЕРЕД restart, поэтому
#   рестарт после смены юнита идёт ЧЕРЕЗ core.service.restarted (а не raw exec).
#
# ★ ОДИН gate sentinel_enabled на всю группу (#8 DRY): прежде каждая из четырёх задач
# повторяла `default(input.sentinel_enabled, false)` в своём when — теперь все они
# собраны во ВНЕШНИЙ block с этим when (ADR-009 block static-skip), ядро вливает gate
# в каждого потомка через AND. Вне sentinel-режима → весь block static-skip
# placeholder-ом (per-потомок, register потомков виден снаружи — flat-register-scope
# инвариантен static-skip). Индексы не сдвигаются (block раскрывается в плоский список
# тех же задач). Рестарт-задача — ПОСЛЕДНИЙ потомок, onchanges на register'ы соседей.
- name: Run the redis-sentinel daemon
  when: "default(input.sentinel_enabled, false)"
  block:
    # sentinel.conf из переданных параметров master-а. register — рестартить демон при
    # изменении. announce-ip рендерится в шаблоне per-host из .self (НЕ из vars).
    - name: Render sentinel.conf
      module: core.file.rendered
      register: redis_sentinel_conf
      params:
        path: /etc/redis/sentinel.conf
        template: templates/sentinel.conf.tmpl
        mode: "0640"
        owner: redis
        group: redis
        vars:
          master_name: "${ default(input.sentinel.master_name, 'mymaster') }"
          master_ip:   "${ input.sentinel.master_ip }"
          # master_port/quorum — has()?string(X):Y: then-ветка вызов string(), НЕ голый
          # X → default() (select-chain-only) тут неприменим, оставлено тернаром.
          master_port: "${ has(input.sentinel.master_port) ? string(input.sentinel.master_port) : '6379' }"
          quorum:      "${ has(input.sentinel.quorum) ? string(input.sentinel.quorum) : '2' }"
          auth_user:   "${ default(input.sentinel.auth_user, '') }"
          auth_pass:   "${ default(input.sentinel.auth_pass, '') }"
          sentinel_config: "${ default(input.sentinel.config, {}) }"

    # Полный systemd-юнит redis-sentinel (пакет не всегда заводит его под наш конфиг).
    # register — рестарт реактивно на изменение юнита (daemon-reload при смене unit
    # core.service делает сам перед рестартом). sentinel_bin/cli_bin — путь бинарей:
    # /usr/bin при install.method=package (distro-пакет), /usr/local/bin при binary
    # (install.yml разложил их туда). Так один юнит-шаблон обслуживает обе ветки.
    - name: Render redis-sentinel systemd unit
      module: core.file.rendered
      register: redis_sentinel_unit
      params:
        path: /etc/systemd/system/redis-sentinel.service
        template: templates/redis-sentinel.service.tmpl
        mode: "0644"
        owner: root
        group: root
        # has()-цепочка (НЕ default(input.install.method, …)): сам input.install может
        # отсутствовать целиком (корень) → default() упал бы no-such-key. binary →
        # /usr/local/bin (install.yml разложил туда), иначе /usr/bin (distro-пакет).
        vars:
          sentinel_bin: "${ has(input.install) && has(input.install.method) && input.install.method == 'binary' ? '/usr/local/bin' : '/usr/bin' }"
          cli_bin:      "${ has(input.install) && has(input.install.method) && input.install.method == 'binary' ? '/usr/local/bin' : '/usr/bin' }"

    - name: Ensure redis-sentinel is running and enabled at boot
      module: core.service.running
      params:
        name: redis-sentinel
        enabled: true

    # Рестарт реактивно на изменение sentinel.conf или юнита. core.service при смене
    # unit сам делает daemon-reload перед рестартом.
    - name: Restart redis-sentinel because config or unit changed
      module: core.service.restarted
      onchanges: [redis_sentinel_conf, redis_sentinel_unit]
      timeout: 30s
      params:
        name: redis-sentinel
