# vars.yml — destiny-локалы redis (docs/destiny/vars.md): инварианты, ОДИНАКОВЫЕ для
# всех incarnation и НЕ переопределяемые снаружи (не input — это контракт vs внутренности).
# Один источник правды; задачи берут через ${ vars.* }.
#
# Резолвятся ОДИН раз на destiny-проход (per-host) до задач. var→var-ссылка внутри слоя
# разрешена (eager-topological, vars.md): vars.<other> резолвится на другой file-var того
# же слоя (root_group → root_owner), цикл/несуществующий ref → ошибка рендера, порядок
# объявления безразличен. Файл закоммичен в git destiny-репо — секретов тут нет (пароли/
# PEM приходят через input с secret/vault()).
#
# ── ГРАНИЦА vars (инвариант) vs input (оператор-переопределяемое) ───────────────
# vars (ЗДЕСЬ) — то, что ОДИНАКОВО для всех incarnation и менять незачем/нельзя:
#   - identity сервиса: имена systemd-юнитов (redis_service_name/sentinel_service_name)
#     — контракт с distro-пакетом, сменишь → сломаешь package-ветку;
#   - фиксированная номенклатура: таблица алиас→.so Redis-модулей (redis_modules);
#   - file-mode/owner инварианты; каталоги layout-а, привязанные к systemd/пакету
#     (systemd_dir, tls-/modules-dir выводятся из conf_dir/data_dir).
# input (destiny.yml input:) — то, что РАЗУМНО переопределить per-incarnation:
#   - conf_dir/data_dir: оператор может развернуть конфиг/данные под свой storage-
#     layout (другой mount под /data и т.п.). Дефолт input = vars-значение
#     (redis_conf_dir/redis_data_dir) — back-compat, дефолтный путь не меняется.
# Почему НЕ всё в input: переопределяемость без сценария применения раздувает контракт
# (имя юнит-файла, drop-in-каталог, набор модулей менять незачем) — vars.md «не плодить
# input ради умозрительной гибкости».

# system-юзер и группа сервиса redis. distro-пакет заводит их сам, binary-ветка
# install.yml создаёт явно (core.group.present/core.user.present) — оба берут имя отсюда.
redis_user:  redis
redis_group: redis

# ── Имена systemd-сервисов (директива A: имя сервиса в vars, ВЕЗДЕ) ────────────
# ИНВАРИАНТ (vars, не input): имя юнита — контракт между binary-юнитом, hardening
# drop-in (.service.d/), core.service running/restart и distro-пакетом. distro-пакет
# зовёт сервис именно redis-server/redis-sentinel; менять имя НЕЛЬЗЯ, не сломав
# package-ветку → не operator-переопределяемое. ВНИМАНИЕ: это имя СЕРВИСА (systemd),
# НЕ имя пакета (core.pkg redis-server) и НЕ имя бинаря (/usr/local/bin/redis-server) —
# совпадение значений случайно, семантика разная, те токены НЕ из этих vars.
redis_service_name:    redis-server
sentinel_service_name: redis-sentinel

# ── Дефолтные порты (директива «хардкод порта → var») ───────────────────────────
# ИНВАРИАНТ (vars, не input): well-known порт redis-server (6379) и redis-sentinel
# (26379). redis.conf печатает `port 6379` ПЕРВОЙ строкой (merged config от scenario
# может переопределить last-wins — напр. `port 0` при tls.only); sentinel.conf —
# `port 26379`; ExecStop redis-sentinel.service шлёт shutdown на этот же sentinel-порт.
# Это дефолт кирпича, не operator-input (TLS-порт — отдельно в input.tls.port).
redis_port:    6379
sentinel_port: 26379

# ── Базовые пути host-layout (директива B) ──────────────────────────────────────
# data_dir/conf_dir дополнительно ВЫНЕСЕНЫ в input (destiny.yml) — оператор может
# захотеть другое расположение под свой storage-layout; vars-значения тут — дефолты,
# на которые ссылается input.default. Задачи берут НЕ эти raw-vars напрямую, а
# эффективные _eff-vars ниже (резолв input→дефолт).

# conf-dir redis: redis.conf, users.acl, sentinel.conf, tls/. ДЕФОЛТ для input.conf_dir.
redis_conf_dir: /etc/redis

# ── Эффективные пути conf/data (резолв input→дефолт ОДИН раз) ────────────────────
# var→input CEL (eager-topological, vars.md): резолв default(input.X, дефолт) уходит
# СЮДА, задачи берут готовое ${ vars.redis_conf_dir_eff } вместо повторного inline-
# default по файлам. _eff-суффикс отделяет «эффективный путь (input или дефолт)» от
# raw-дефолта redis_conf_dir/redis_data_dir (на который ссылается input.default).
redis_conf_dir_eff: "${ default(input.conf_dir, vars.redis_conf_dir) }"
redis_data_dir_eff: "${ default(input.data_dir, vars.redis_data_dir) }"

# data-dir redis (RDB/AOF, modules-dir). ДЕФОЛТ для input.data_dir (оператор может
# переопределить под свой storage). modules-dir выводится из input.data_dir в задачах
# (${ input.data_dir }/modules) — отдельного modules_dir в input больше нет (директива
# B: modules_dir убран из input, путь производный от data-dir).
redis_data_dir: /var/lib/redis

# Каталог установки бинарей redis (redis-server/redis-cli/redis-sentinel) binary-ветки.
# ИНВАРИАНТ (vars, не input): фиксированный layout-каталог /usr/local/bin (прецедент
# node-exporter), менять незачем. Задачи binary-ветки собирают путь как
# ${ vars.redis_bin_dir }/redis-server (и -cli/-sentinel).
redis_bin_dir: /usr/local/bin

# ── arch Nexus-пути: GOARCH-конвенция → uname-m-конвенция ───────────────────────
# soulprint.self.os.arch несёт GOARCH-имя (amd64/arm64 — Go-конвенция, читается
# core.pkg/core.service напрямую). Nexus же раскладывает бинари/.so по uname-m-пути
# (x86_64/aarch64 — ansible_architecture/`uname -m` ансибл-роли-источника): путь
# .../redis/amd64/... → 404, .../redis/x86_64/... → 200. Маппим ТОЛЬКО для URL Nexus
# (бинари install.yml + .so modules.yml); soulprint не трогаем. amd64→x86_64,
# arm64→aarch64, прочее (в т.ч. синтетический arch фикстур) — как есть.
# ★ has()-guard render-safe в МЁРТВОМ package-проходе (file-var резолвится до skip-
# проекции): absent soulprint.self.os.arch → '' (значение не используется — задачи skip).
redis_arch: >-
  ${ has(soulprint.self.os.arch)
       ? (soulprint.self.os.arch == 'amd64' ? 'x86_64'
          : (soulprint.self.os.arch == 'arm64' ? 'aarch64' : soulprint.self.os.arch))
       : '' }

# ── URL-база бинарей Redis из Nexus (редизайн install-модели) ───────────────────
# Базовый URL КАТАЛОГА бинарей конкретной (version, arch, distro_ver) сборки —
# собирается в ОДНОМ месте, install.yll-задачи дописывают лишь имя файла
# (/redis-server, /redis-cli, /redis-benchmark). Форма ansible redis_url_file_path:
# <base_url>/<arch>/<distribution>/<distro_major>/<version>. Distribution захардкожен
# Debian (целевой парк); arch — vars.redis_arch (uname-m-маппинг soulprint.self.os.arch,
# x86_64/aarch64 — Nexus-путь), distro_ver — per-host из soulprint.self.os.version.
#
# ★ render-safety в МЁРТВОМ package-проходе: при install.method=package binary-блок
# static-skip, НО file-vars резолвятся per-host ДО skip-проекции (eager, до задач) —
# голый input.install.base_url/version упал бы «no such key: install». Поэтому base_url
# и version нормализуются has()-цепочкой к '' (значение не используется в package-проходе —
# задачи skip; в binary-проходе validate/required гарантируют присутствие). arch/version
# дистрибутива — soulprint.self.os (есть в destiny-CEL, прецедент node-exporter/modules).
# ★ soulprint.self.os.arch/version — has()-guard render-safe: в МЁРТВОМ package-проходе
# (binary-блок static-skip) var всё равно резолвится, а fixtures package-кейсов могут не
# нести os.version → голый soulprint.self.os.version упал бы «no such key». В binary-проходе
# soulprint несёт оба поля (ADR-018 typed). Значение в мёртвом проходе не используется (skip).
redis_binary_url_base: >-
  ${ (has(input.install) && has(input.install.base_url) ? input.install.base_url : '')
       + '/' + vars.redis_arch
       + '/Debian/' + (has(soulprint.self.os.version) ? soulprint.self.os.version : '')
       + '/' + (has(input.install) && has(input.install.version) ? input.install.version : '') }

# ── SSRF-guard для fetch бинарей Nexus (core.url.fetched allow_private) ─────────
# Дефолтный binary_base_url сервиса — ВНУТРЕННИЙ Nexus (resolve в RFC1918, напр.
# 10.16.2.130) → core.url.fetched по умолчанию (allow_private:false) блокит dial
# SSRF-guard-ом (shared/netguard). Значение приходит из scenario через
# apply.input.install.allow_private (compute.install ← essence.binary_allow_private,
# дефолт true: дефолтный base = internal Nexus). 4 fetch-задачи binary-ветки берут
# готовое ${ vars.redis_binary_allow_private }. has()-цепочка render-safe в МЁРТВОМ
# package-проходе (binary-блок static-skip, но file-var всё равно резолвится до задач):
# absent install/allow_private → false (строгий дефолт; значение в package-проходе не
# используется — задачи binary-ветки skip).
redis_binary_allow_private: >-
  ${ has(input.install) && has(input.install.allow_private) && input.install.allow_private }

# ── SSRF-guard для fetch .so модулей (core.url.fetched allow_private) ────────────
# Симметрично redis_binary_allow_private: modules_base_url тоже может быть внутренним
# Nexus (resolve в RFC1918) → 4 .so-fetch (modules.yml) упали бы на SSRF-guard.
# Значение — из scenario apply.input.modules_allow_private (compute.modules_allow_private
# ← essence.modules_allow_private, дефолт true). has()-guard render-safe: absent → false.
redis_modules_allow_private: >-
  ${ has(input.modules_allow_private) && input.modules_allow_private }

# Каталог systemd drop-in-ов redis-server (override поверх distro-юнита). ИНВАРИАНТ
# (привязан к имени сервиса + layout systemd): /etc/systemd/system/<unit>.d. Задачи
# строят путь из vars.redis_service_name.
systemd_dir: /etc/systemd/system

# ── Системные run-/log-каталоги Redis (директива «хардкод пути → var») ──────────
# ИНВАРИАНТ (vars, не input): системные каталоги runtime-состояния (pidfile/unix-сокет)
# и логов redis-server/redis-sentinel. Привязаны к host-layout пакета/systemd (не
# storage-выбор оператора как conf_dir/data_dir) → не operator-переопределяемое. Один
# источник правды для redis.conf/sentinel.conf, обоих .service-юнитов, logrotate и
# hardening drop-in.

# Run-каталог redis: pidfile (redis-server.pid/redis-sentinel.pid) и unix-сокет.
# RuntimeDirectory=redis у systemd-юнита создаёт именно /var/run/redis. socket_dir
# ниже ссылается сюда (var→var) — каталог сокета и run-каталог совпадают, один литерал.
run_dir: /var/run/redis

# Лог-каталог redis: logfile redis-server.log/redis-sentinel.log (redis.conf/
# sentinel.conf), glob *.log в logrotate.d, ReadWritePaths логов в hardening/юнитах.
log_dir: /var/log/redis

# Каталог unix-сокета redis (создаётся, когда в merged-конфиге есть unixsocket — см.
# install.yml). Совпадает с run-каталогом (pidfile/socket — один системный каталог) →
# var→var на run_dir.
socket_dir: "${ vars.run_dir }"

# ── Каталог Redis-модулей и полный набор (директива C: модули ВСЕГДА ВСЕ) ───────
# ИНВАРИАНТ (vars, не input): фиксированная таблица алиас→имя .so-файла (номенклатура
# Redis, не operator-выбор). Директива «модули ВСЕГДА ВСЕ»: разворачиваем ВЕСЬ набор на
# Redis < 8, оператор НЕ выбирает подмножество. loadmodules (server.yml) и ЧЕТЫРЕ ЯВНЫЕ
# fetch-задачи (modules.yml) берут имена .so отсюда; детерминированный порядок задаёт
# СОРТИРОВАННЫЙ литерал алиасов, а НЕ итерация по map (иначе ложный change/рестарт).
# REDIS 8+: модули ВСТРОЕНЫ в сервер — version-guard в задачах (см. redis_is_v8plus).
redis_modules:
  bloom:      redisbloom.so
  json:       rejson.so
  search:     redisearch.so
  timeseries: redistimeseries.so

# Каталог .so-модулей под data-dir: <data_dir>/modules. var→var (vars.redis_data_dir_eff).
# Задачи modules.yml/loadmodules берут готовый путь отсюда — один источник правды.
redis_modules_dir: "${ vars.redis_data_dir_eff + '/modules' }"

# ── Version-guard Redis 8+ (директива C) ────────────────────────────────────────
# ЭФФЕКТИВНАЯ версия redis для version-gate модулей: input.version (distro-пин), когда
# непуст (`!= ''`), ИНАЧЕ input.install.version (binary-ветка). ★ scenario передаёт ключ
# `version` ВСЕГДА (как '' при install.method=binary) → голый has() брал бы '' и делал бы
# install.version мёртвой; поэтому нормализуем пустой version к install.version.
redis_effective_version: "${ (has(input.version) && input.version != '') ? input.version : (has(input.install) && has(input.install.version) ? input.install.version : '') }"

# Redis 8+? Мажор >= 8 (regex: опц. epoch `N:` + мажор 8/9/двузначный). Единый источник
# version-gate для loadmodules (server.yml) и include modules.yml (main.yml). Пустая
# версия (обе absent — невозможно при валидном вводе) regex не матчит → false (< 8).
redis_is_v8plus: >-
  ${ vars.redis_effective_version.matches('^([0-9]+:)?(8|9|[1-9][0-9])\\.') }

# ── Гейт загрузки Redis-модулей (ALL-OR-NOTHING) ───────────────────────────────
# Модули («директива C: модули ВСЕГДА ВСЕ» на Redis < 8) грузятся ТОЛЬКО когда задан
# непустой modules_base_url. Пустой base_url → vanilla redis (НЕ рендерится loadmodule,
# НЕ качаются .so) — иначе redis.conf нёс бы loadmodule на .so, которые fetch-группа
# (group-drop при пустом base_url) не скачала, и redis-server падал бы на старте.
# modules_base_url — input-поле destiny (default '' через has()-цепочку: absent → vanilla).
redis_modules_enabled: >-
  ${ !vars.redis_is_v8plus
     && (has(input.modules_base_url) ? input.modules_base_url : '') != '' }

# ── file-mode/owner инварианты (вынесены: >2 употреблений по задачам) ──────────
# Точечные mode на ≤2 задачи (0750 tls-dir/modules-dir, 0755 socket-/drop-in-dir)
# ОСТАЮТСЯ литералом: общим инвариантом destiny не являются (vars.md — не плодить var
# ради одной задачи).

# mode конфигов с секретами redis (содержат password-хеши / requirepass): redis.conf,
# users.acl, sentinel.conf. 0640 owner/group redis — читает только сервис.
redis_secret_file_mode: "0640"

# mode systemd-юнитов и drop-in-ов (root-owned, world-readable стандарт systemd):
# redis-server/redis-sentinel/disable-thp .service, hardening drop-in, logrotate.d.
unit_file_mode: "0644"

# mode TLS PEM-материала redis-server (cert/key/CA): 0600 owner redis — приватный
# ключ и сертификаты читает только сервис.
redis_pem_mode: "0600"

# owner root-owned артефактов (systemd-юниты/drop-ины/logrotate.d): литерал root.
root_owner: root

# group root-owned артефактов. var→var на root_owner: owner и group совпадают,
# поэтому group выражена через owner — одна точка правды (резолвится в "root").
root_group: "${ vars.root_owner }"
