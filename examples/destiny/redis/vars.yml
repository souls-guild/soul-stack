# vars.yml — destiny-локалы redis (docs/destiny/vars.md): инварианты, ОДИНАКОВЫЕ для
# всех incarnation и НЕ переопределяемые снаружи (не input — это контракт vs внутренности).
# Литералы redis/redis (system-юзер/группа distro-пакета) и пути host-layout-а раньше
# были зашиты по задачам копипастом / объявлены task-level vars — теперь один источник
# правды здесь, задачи берут через ${ vars.* }.
#
# Резолвятся ОДИН раз на destiny-проход (per-host) до задач. var→var-ссылка внутри слоя
# разрешена (eager-topological, vars.md): vars.<other> резолвится на другой file-var того
# же слоя (root_group → root_owner), цикл/несуществующий ref → ошибка рендера, порядок
# объявления безразличен. Файл закоммичен в git destiny-репо — секретов тут нет (пароли/
# PEM приходят через input с secret/vault()).
#
# ── ГРАНИЦА vars (инвариант) vs input (оператор-переопределяемое) ───────────────
# vars (ЗДЕСЬ) — то, что ОДИНАКОВО для всех incarnation и менять незачем/нельзя:
#   - identity сервиса: имена systemd-юнитов (redis_service_name/sentinel_service_name)
#     — контракт с distro-пакетом, сменишь → сломаешь package-ветку;
#   - фиксированная номенклатура: таблица алиас→.so Redis-модулей (redis_modules);
#   - file-mode/owner инварианты; каталоги layout-а, привязанные к systemd/пакету
#     (systemd_dir, tls-/modules-dir выводятся из conf_dir/data_dir).
# input (destiny.yml input:) — то, что РАЗУМНО переопределить per-incarnation:
#   - conf_dir/data_dir: оператор может развернуть конфиг/данные под свой storage-
#     layout (другой mount под /data и т.п.). Дефолт input = vars-значение
#     (redis_conf_dir/redis_data_dir) — back-compat, дефолтный путь не меняется.
# Почему НЕ всё в input: переопределяемость без сценария применения раздувает контракт
# (имя юнит-файла, drop-in-каталог, набор модулей менять незачем) — vars.md «не плодить
# input ради умозрительной гибкости».

# system-юзер и группа сервиса redis. distro-пакет заводит их сам, binary-ветка
# install.yml создаёт явно (core.group.present/core.user.present) — оба берут имя отсюда.
redis_user:  redis
redis_group: redis

# ── Имена systemd-сервисов (директива A: имя сервиса в vars, ВЕЗДЕ) ────────────
# ИНВАРИАНТ (vars, не input): имя юнита — контракт между binary-юнитом, hardening
# drop-in (.service.d/), core.service running/restart и distro-пакетом. distro-пакет
# зовёт сервис именно redis-server/redis-sentinel; менять имя НЕЛЬЗЯ, не сломав
# package-ветку → не operator-переопределяемое. Один источник правды: задачи и пути
# юнит-файлов собираются из ${ vars.*_service_name }, литералы redis-server/
# redis-sentinel по задачам устранены. ВНИМАНИЕ: это имя СЕРВИСА (systemd), НЕ имя
# пакета (core.pkg redis-server) и НЕ имя бинаря (/usr/local/bin/redis-server) — там
# совпадение значений случайно, но семантика разная, потому те токены НЕ из этих vars.
redis_service_name:    redis-server
sentinel_service_name: redis-sentinel

# ── Базовые пути host-layout (директива B: инвариантные базовые пути → vars) ────
# ИНВАРИАНТ (vars, не input): системные каталоги распаковки конфигурации Redis,
# ОДИНАКОВЫЕ для всех incarnation. Конкретные файлы выводятся из этих баз в задачах
# (${ vars.redis_conf_dir }/redis.conf и т.п.) — один источник правды на каталог.
# Что НЕ здесь: data_dir и conf_dir дополнительно ВЫНЕСЕНЫ в input (см. destiny.yml
# input.data_dir/input.conf_dir) — оператор может захотеть другое расположение data/
# conf под свой storage-layout; vars-значения тут — дефолты, на которые ссылается
# input.default. Имя unit-файла, tls-/modules-/drop-in-каталоги в input НЕ выносятся:
# менять их незачем (привязаны к layout systemd/пакета), переопределяемость только
# раздула бы контракт без сценария применения.

# conf-dir redis: redis.conf, users.acl, sentinel.conf, tls/. ДЕФОЛТ для input.conf_dir
# (оператор может переопределить). Задачи берут input.conf_dir (не этот var напрямую),
# чтобы переопределение оператора доезжало; этот var — единый источник дефолта.
redis_conf_dir: /etc/redis

# ── Эффективные пути conf/data (резолв input→дефолт ОДИН раз, директива «conf_dir в
# vars») ────────────────────────────────────────────────────────────────────────
# var→input CEL (vars.md, ADR-009/010 amendment 2026-06-24: file-var видит input.* и
# другие file-vars того же слоя, eager-topological): резолв default(input.X, дефолт)
# уходит СЮДА, задачи берут готовое ${ vars.redis_conf_dir_eff } вместо повторного
# inline-default по файлам. Один источник правды на каталог; смена дефолта — в одном
# месте. _eff-суффикс отделяет «эффективный путь (input или дефолт)» от raw-дефолта
# redis_conf_dir/redis_data_dir выше (на который ссылается input.default в destiny.yml).
redis_conf_dir_eff: "${ default(input.conf_dir, vars.redis_conf_dir) }"
redis_data_dir_eff: "${ default(input.data_dir, vars.redis_data_dir) }"

# data-dir redis (RDB/AOF, modules-dir). ДЕФОЛТ для input.data_dir (оператор может
# переопределить под свой storage). modules-dir выводится из input.data_dir в задачах
# (${ input.data_dir }/modules) — отдельного modules_dir в input больше нет (директива
# B: modules_dir убран из input, путь производный от data-dir).
redis_data_dir: /var/lib/redis

# Каталог TLS PEM-материала (cert/key/CA). ИНВАРИАНТ (под conf_dir): tls/ внутри
# conf-dir. Задачи строят путь как ${ input.conf_dir }/tls.

# Каталог установки бинарей redis (redis-server/redis-cli/redis-sentinel) binary-ветки.
# ИНВАРИАНТ (vars, не input): node-exporter-прецедент кладёт upstream-бинари в
# /usr/local/bin — фиксированный layout-каталог, менять незачем. Задачи binary-ветки
# собирают путь как ${ vars.redis_bin_dir }/redis-server (и -cli/-sentinel). Имя бинаря
# совпадает со значением redis_service_name случайно (там семантика «имя СЕРВИСА»,
# здесь «путь бинаря») — это РАЗНЫЕ vars, токен не переиспользуется.
redis_bin_dir: /usr/local/bin

# ── Пути binary-install tarball-а (директива «путь в одном месте») ──────────────
# ИНВАРИАНТ-производные (vars, не input): пути временного tarball-а и распакованного
# каталога upstream-install собираются из upstream-версии (input.install.version) в
# ОДНОМ месте, а не дублируются inline по install.yml-задачам (fetch/extract/три
# core.file.present src:). var→input CEL (eager-topological): file-var видит input.* и
# другие file-vars слоя.
#
# ★ render-safety в МЁРТВОМ package-проходе: при install.method=package binary-блок
# static-skip, НО file-vars резолвятся per-host ДО skip-проекции (eager, до задач) —
# голый input.install.version упал бы «no such key: install». Поэтому версия нормализуется
# has()-цепочкой к '' (значение не используется в package-проходе — задачи skip; в
# binary-проходе validate гарантирует присутствие install.version). redis_install_tarball/
# redis_src_dir ссылаются на этот нормализованный redis_install_ver (var→var, тот же слой).
redis_install_ver:     "${ has(input.install) && has(input.install.version) ? input.install.version : '' }"
redis_install_tarball: "${ '/tmp/redis-' + vars.redis_install_ver + '.tar.gz' }"
redis_src_dir:         "${ '/tmp/redis-' + vars.redis_install_ver }"

# Каталог systemd drop-in-ов redis-server (override поверх distro-юнита). ИНВАРИАНТ
# (привязан к имени сервиса + layout systemd): /etc/systemd/system/<unit>.d. Задачи
# строят путь из vars.redis_service_name.
systemd_dir: /etc/systemd/system

# Каталог unix-сокета redis. core.file.directory создаёт его в обеих ветках, когда в
# merged-конфиге есть директива unixsocket (см. install.yml). Совпадает с дефолтным
# unixsocket-путём, который scenario передаёт в config.
socket_dir: /var/run/redis

# ── Каталог Redis-модулей и полный набор (директива C: модули ВСЕГДА ВСЕ) ───────
# ИНВАРИАНТ (vars, не input): фиксированная таблица алиас→имя .so-файла Redis-модулей.
# Имена .so — НЕ operator-выбор, а фиксированная номенклатура Redis (redisearch.so /
# rejson.so / redistimeseries.so / redisbloom.so) → живёт в destiny. Директива
# пользователя «модули ВСЕГДА ВСЕ»: разворачиваем ВЕСЬ набор всегда (на Redis < 8),
# оператор НЕ выбирает подмножество. loadmodules в redis.conf (сорт-литерал алиасов
# ['bloom','json','search','timeseries'].map(...)) и ЧЕТЫРЕ ЯВНЫЕ fetch-задачи
# modules.yml (по одной на алиас) берут имена .so из ЭТОГО map-а (vars.redis_modules
# .<alias>) — детерминированный порядок задаёт сортированный литерал алиасов, не
# итерация по map. Источник .so (modules_base_url) ОСТАЁТСЯ в input — это deployment-
# артефакт (где лежат бинари модулей под (version, arch) кластера), не инвариант кирпича.
# .so качаются по content-идемпотентности (SHA-256 содержимого), без integrity-verify.
# REDIS 8+: модули ВСТРОЕНЫ в сервер — .so не качаем и loadmodule не пишем (version-
# guard в задачах по input.version/input.install.version, см. server.yml/modules.yml).
redis_modules:
  bloom:      redisbloom.so
  json:       rejson.so
  search:     redisearch.so
  timeseries: redistimeseries.so

# Каталог .so-модулей под data-dir: <data_dir>/modules. var→var (vars.redis_data_dir_eff).
# Задачи modules.yml/loadmodules берут готовый путь отсюда — один источник правды.
redis_modules_dir: "${ vars.redis_data_dir_eff + '/modules' }"

# ── Version-guard Redis 8+ (директива C: vars-вычисление, не inline по задачам) ──
# ЭФФЕКТИВНАЯ версия redis для version-gate модулей: input.version (distro-пин), когда
# непуст (`!= ''`), ИНАЧЕ input.install.version (upstream-semver binary-ветки). scenario
# передаёт ключ `version` ВСЕГДА (как '' при install.method=binary) → голый has() брал
# бы '' и делал бы install.version мёртвой; поэтому нормализуем пустой version к
# install.version. var→input CEL (eager, render-safe в любом проходе).
redis_effective_version: "${ (has(input.version) && input.version != '') ? input.version : (has(input.install) && has(input.install.version) ? input.install.version : '') }"

# Redis 8+? Мажор >= 8 (regex по эффективной версии: опц. epoch `N:` + мажор 8/9/двузначный).
# На Redis 8+ модули ВСТРОЕНЫ в сервер — .so не качаем и loadmodule не пишем (директива C).
# Единый источник version-gate: loadmodules (server.yml), include modules.yml (main.yml).
# var→var (redis_effective_version). Пустая версия (обе absent — невозможно при валидном
# вводе) regex не матчит → false → не гейтим (модули проходят как < 8).
redis_is_v8plus: >-
  ${ vars.redis_effective_version.matches('^([0-9]+:)?(8|9|[1-9][0-9])\\.') }

# ── file-mode/owner инварианты (вынесены: >2 употреблений по задачам) ──────────
# Литеральные значения; задачи берут через ${ vars.* }. Вынос сохраняет рендер
# бит-в-бит — это те же mode-/owner-строки, что стояли инлайн. Точечные mode на
# ≤2 задачи (0750 tls-dir/modules-dir, 0755 socket-/drop-in-dir) ОСТАЮТСЯ литералом:
# общим инвариантом destiny не являются (vars.md — не плодить var ради одной задачи).

# mode конфигов с секретами redis (содержат password-хеши / requirepass): redis.conf,
# users.acl, sentinel.conf. 0640 owner/group redis — читает только сервис.
redis_secret_file_mode: "0640"

# mode systemd-юнитов и drop-in-ов (root-owned, world-readable стандарт systemd):
# redis-server/redis-sentinel/disable-thp .service, hardening drop-in, logrotate.d.
unit_file_mode: "0644"

# mode TLS PEM-материала redis-server (cert/key/CA): 0600 owner redis — приватный
# ключ и сертификаты читает только сервис.
redis_pem_mode: "0600"

# owner root-owned артефактов (systemd-юниты/drop-ины/logrotate.d): литерал root.
root_owner: root

# group root-owned артефактов. var→var-ссылка на root_owner (vars.md, ADR-009/ADR-010
# amendment 2026-06-24: var→var внутри слоя разрешён, eager-topological): owner и group
# совпадают, поэтому group выражена через owner — одна точка правды, при смене root_owner
# группа едет автоматически. Резолвится в "root".
root_group: "${ vars.root_owner }"
