# Пути и имена — фиксированная конвенция debian/ubuntu redis-пакета.
redis_unit_name: redis-server
redis_conf_path: /etc/redis/redis.conf
redis_data_dir:  /var/lib/redis
redis_log_dir:   /var/log/redis
redis_user:      redis
redis_group:     redis

# Может ссылаться на input через шаблон — vars вычисляются после валидации input.
acl_file_path: "/etc/redis/users/${ input.user }.acl"
