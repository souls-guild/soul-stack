# L2 fixture (docker-стенд), harness MVP не исполняет — ADR-023 post-MVP.
name: install-and-ping
description: |
  Базовый сценарий жизни режим-агностичного destiny redis (standalone) на чистом
  хосте:
    1. apply destiny redis  — установить redis-server и поднять сервис с
       отрендеренным redis.conf (TCP 6379 + опц. unix-сокет, requirepass).
    2. ping                 — убедиться, что отвечает PONG (через redis-cli или
       community.redis.command — последнее в scenario сервиса).

  Тест прогоняется на эфемерном стенде (см. блок `stand:` ниже), на котором нет
  ни redis-server-а, ни конфигов. После прохода стенд уничтожается.

# ─── Стенд ────────────────────────────────────────────────────────────────────
stand:
  driver: docker                       # docker | podman | cloud:<provider> — open Q
  image:  ubuntu:24.04                 # базовый образ sandbox-хоста
  mode:   push                         # push | pull — как destiny попадает на стенд

# ─── Что применяем ────────────────────────────────────────────────────────────
# Целевой destiny — ../../destiny.yml (режим-агностичный кирпич).
# Имя берётся из родительского манифеста; в case достаточно указать input.
# Контракт нового destiny (см. destiny.yml): version? / password (secret) /
# config (object — ГОТОВЫЙ merged redis.conf, БЕЗ top-level maxmemory/socket:
# это обычные ключи внутри config) / users? / sentinel_enabled? / sentinel?.
# В реальном прогоне config мержит scenario сервиса; здесь передаём готовый map.
# action-DSL удалён в redis-консолидации.
input:
  version:  "7.2.4"
  password: "vault:test/redis/password"
  config:
    maxmemory:  256mb
    maxclients: 10000
    timeout:    300
    # unixsocket — обычный ключ merged-конфига (не отдельное top-level поле). Задан
    # → destiny создаёт каталог сокета (task gated на config.unixsocket) и redis
    # слушает сокет; verify ниже пингует именно по нему. Не задан → ping по TCP.
    unixsocket: /var/run/redis/redis-server.sock

# Двойной прогон: фреймворк применит destiny с этим input ещё раз и проверит, что
# во втором применении не было изменений ни в одном шаге (идемпотентность).
expect_idempotent: true

# ─── Проверки результата ──────────────────────────────────────────────────────
verify:
  - name: redis-binary-installed
    apply:
      destiny: core.exec.run
      input:
        cmd: redis-server
        args: ["--version"]
    expect:
      exit_code: 0
      stdout_contains: "v=7.2.4"        # точные ключи `expect:` — open Q №8

  - name: redis-service-active
    apply:
      destiny: core.exec.run
      input:
        cmd: systemctl
        args: ["is-active", "redis-server"]
    expect:
      stdout: "active"
      exit_code: 0

  - name: redis-config-deployed
    apply:
      destiny: core.cmd.shell          # `&&` цепочка test+stat — shell-семантика
      input:
        cmd: "test -f /etc/redis/redis.conf && stat -c '%a %U:%G' /etc/redis/redis.conf"
    expect:
      stdout: "640 redis:redis"

  - name: redis-responds-to-ping
    # Пинг по unix-сокету валиден ТОЛЬКО потому, что config.unixsocket задан в input
    # выше (destiny создала каталог сокета, redis слушает сокет). Без config.unixsocket
    # сокет-файла нет → проверять надо по TCP (redis-cli -h 127.0.0.1 -p 6379).
    apply:
      destiny: core.cmd.shell          # redis-cli по сокету — самосогласованная проверка
      input:
        cmd: "redis-cli -s /var/run/redis/redis-server.sock -a vault:test/redis/password PING"
    expect:
      stdout_contains: "PONG"

# ─── Опциональные соседи рядом с этим файлом ─────────────────────────────────
#   prepare.yml / verify.yml / cleanup.yml — см. docs/destiny/testing.md.
