# L2 fixture (docker-стенд), harness MVP не исполняет — ADR-023 post-MVP.
name: install-and-ping
description: |
  Базовый сценарий жизни destiny на чистом хосте:
    1. action: apply  — установить redis-server 7.2.4 и поднять сервис.
    2. action: ping   — убедиться, что отвечает PONG.

  Тест прогоняется на эфемерном стенде (см. блок `stand:` ниже),
  на котором нет ни redis-server-а, ни конфигов. После прохода
  стенд уничтожается; никакого состояния между кейсами не остаётся.

# ─── Стенд ────────────────────────────────────────────────────────────────────
# Эфемерное окружение, на котором будет применяться destiny.
# Формат блока `stand:` — open Q №3 в docs/destiny/testing.md
# (одиночный универсальный образ vs матрица ОС; docker vs cloud-driver vs push-pool).
# Здесь — иллюстративный минимум: docker, ubuntu-образ, push-режим.
stand:
  driver: docker                       # docker | podman | cloud:<provider> — open Q
  image:  ubuntu:24.04                 # базовый образ sandbox-хоста
  mode:   push                         # push | pull — как destiny попадает на стенд
  # mode=push  : keeper.push поднимает ssh-доступ внутрь контейнера и применяет destiny.
  # mode=pull  : в контейнер ставится soul-агент, он подключается к Keeper-у.
  # Дефолт под open Q №4 (real vs mock модули) — пока real, других режимов нет.

# ─── Что применяем ────────────────────────────────────────────────────────────
# Целевой destiny — ../../destiny.yml (тот, рядом с которым лежит этот tests/).
# Имя берётся из родительского манифеста; в case достаточно указать input.
input:
  action:   apply
  version:  "7.2.4"
  password: "vault:test/redis/password"
  maxmemory: 256mb

# Двойной прогон: фреймворк применит destiny с этим input ещё раз и проверит,
# что во втором применении не было изменений ни в одном шаге. См. open Q №5
# в docs/destiny/testing.md — пока считаем обязательной частью каждого case.
expect_idempotent: true

# ─── Проверки результата ──────────────────────────────────────────────────────
# verify — это последовательность задач (как в service tests/smoke.yml):
# каждая исполняет destiny/модуль на том же стенде и сравнивает поля `output:`
# через блок `expect:`. Никакого отдельного DSL-я ассерций нет — проверки
# выражаются через те же destiny, которыми система пользуется в проде.
verify:
  - name: redis-binary-installed
    apply:
      destiny: core.exec.run
      input:
        cmd: redis-server
        args: ["--version"]
    expect:
      exit_code: 0
      stdout_contains: "v=7.2.4"        # точные ключи `expect:` — open Q №8 (что измерять)

  - name: redis-service-active
    apply:
      destiny: core.exec.run
      input:
        cmd: systemctl
        args: ["is-active", "redis-server"]
    expect:
      stdout: "active"
      exit_code: 0

  - name: redis-config-deployed
    apply:
      destiny: core.cmd.shell          # `&&` цепочка test+stat — shell-семантика
      input:
        cmd: "test -f /etc/redis/redis.conf && stat -c '%a %U:%G' /etc/redis/redis.conf"
    expect:
      stdout: "640 redis:redis"

  - name: redis-responds-to-ping
    apply:
      destiny: redis                    # тот же destiny, с другим action — самосогласованная проверка
      input:
        action: ping
    expect:
      stdout: "PONG"

# ─── Опциональные соседи рядом с этим файлом ─────────────────────────────────
#   prepare.yml  — задачи до основного apply (например, поднять Vault-stub
#                  с тестовым паролем по ссылке vault:test/redis/password).
#   verify.yml   — если ассерций становится много, можно вынести в отдельный
#                  файл и подключить `verify: !include verify.yml`.
#   cleanup.yml  — задачи после verify; обычно не нужны (стенд снесётся весь),
#                  но полезны если case подложил внешние ресурсы (объекты в S3,
#                  записи в DNS, реальные облачные VM).
