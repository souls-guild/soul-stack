name: redis
description: >-
  Режим-агностичный per-host кирпич Redis (концепция Ansible-роли, B-гибрид
  ADR-009): установка пакета + render redis.conf из merged-конфига + render
  users.acl + systemd hardening drop-in + сервис. ВСЯ оркестрация (топология,
  rolling-restart, failover, sentinel reconcile, health-gate) живёт в scenario
  сервиса — здесь только идемпотентный install/render/service одного инстанса.

# Версия destiny — git ref (ADR-007). Поля `version:` верхнего уровня нет.
# Список задач — в tasks/main.yml. Только core-модули → required_modules: не нужен
# (community.redis вызывается из scenario сервиса, не из этой destiny).
#
# Режим-агностична: один и тот же кирпич обслуживает standalone, cluster и sentinel
# (последний — через sentinel_enabled + conditional-include sentinel.yml). Режим
# выбирает scenario сервиса передачей флагов и cluster-/sentinel-директив в config;
# destiny сама режим не знает. Конфиг приходит ГОТОВЫМ merged map-ом через
# apply: input: config: (merge делает scenario сервиса) — destiny остаётся «глупой».

input:
  # ── Гейт data-плоскости redis-server (режим sentinel_only) ───────────────────
  # deploy_redis=false (режим sentinel_only) → НЕ разворачиваем redis-server: всю
  # data-плоскость гасит include-when (server.yml/modules.yml group-drop). Пакет
  # redis при этом ставится ВСЕГДА — sentinel-демон поставляется ТЕМ ЖЕ пакетом,
  # поэтому sentinel_only поднимает только его, мониторящий ВНЕШНИЙ master.
  deploy_redis:
    type: boolean
    required: false
    default: true
    description: >-
      Разворачивать ли data-плоскость redis-server (render redis.conf/users.acl/
      PEM + systemd-сервис redis-server). По умолчанию true. false (режим
      sentinel_only) — поднять только sentinel-демон (sentinel_enabled), master
      внешний. Пакет redis ставится в любом случае (несёт и sentinel-демон).

  version:
    type: string
    # ОБЯЗАТЕЛЬНА ТОЛЬКО для install.method=package (required_when): distro-native
    # пин читает её голым input.version (см. install.yml package-ветка). При
    # install.method=binary distro-пакет НЕ ставится — версия бинаря приходит в
    # install.version (upstream-semver), а это поле не используется. required_when
    # context — input-only (default() недоступен) → absent-нормализация has()-цепочкой:
    # «package» истинно, когда install не передан / method не задан / method=='package'.
    required_when: "!has(input.install) || !has(input.install.method) || input.install.method == 'package'"
    # distro-native: опциональный epoch `N:` + upstream-версия + опциональная
    # ревизия (напр. Debian `5:7.0.15-1~deb12u7`). Узкий semver ломал version-пин
    # на реальном дистрибутиве (apt-get install redis-server=7.2.4 → exit 100).
    pattern: "^([0-9]+:)?[0-9][A-Za-z0-9.~+-]*$"
    description: >-
      Версия пакета redis-server в репозитории дистрибутива (distro-native пин,
      напр. 5:7.0.15-1~deb12u7). ОБЯЗАТЕЛЬНА при install.method=package (директива
      пользователя 2026-06-23): core.pkg всегда ставит =version-пин. Поведение
      «latest из репо» (пустой version → core.pkg без пина) более НЕ доступно. При
      install.method=binary НЕ используется (версия бинаря — в install.version).

  # ── Пути host-layout, переопределяемые оператором (директива B) ──────────────
  # conf_dir/data_dir — базовые каталоги конфигурации и данных Redis. ОПЕРАТОР-
  # ПЕРЕОПРЕДЛЯЕМЫ (input, не vars): оператор может развернуть конфиг/данные под свой
  # storage-layout. Дефолт = текущий путь (back-compat). Задачи выводят конкретные
  # файлы/подкаталоги из этих баз (redis.conf, users.acl, tls/, modules/). Инвариантные
  # каталоги (имя юнит-файла, drop-in-dir) в input НЕ выносятся — см. vars.yml граница
  # vars↔input.
  conf_dir:
    type: string
    required: false
    default: /etc/redis
    pattern: "^/[A-Za-z0-9._/-]+$"
    description: >-
      Каталог конфигурации Redis (redis.conf, users.acl, sentinel.conf, tls/).
      По умолчанию /etc/redis. Оператор может переопределить под свой layout.

  data_dir:
    type: string
    required: false
    default: /var/lib/redis
    pattern: "^/[A-Za-z0-9._/-]+$"
    description: >-
      Рабочий каталог данных Redis (RDB/AOF; modules/ выводится из него как
      <data_dir>/modules). По умолчанию /var/lib/redis. Оператор может переопределить
      под свой storage-layout.

  # ── install: способ установки redis (концепция Ansible-роли redis_install_*) ──
  # Гейт install.method static (только input.*) → Keeper гасит неактивную ветку
  # install.yml placeholder-skip-ом без сдвига индексов (block static-skip).
  #
  # ★ binary-ветка САМА несёт всё, что distro-пакет даёт даром: systemd-юнит
  # redis-server.service (+ redis-sentinel.service в sentinel-режиме), distro-юзер/
  # группу redis. Имя юнита — redis-server (НЕ redis), чтобы server.yml hardening
  # drop-in (/etc/systemd/system/redis-server.service.d/) и core.service redis-server
  # рестарт работали В ОБЕИХ ветках без ветвления.
  install:
    type: object
    required: false
    additional_properties: false
    description: >-
      Способ установки redis (концепция redis_install_* роли). method: package
      (default) — distro-пакет redis-server (поведение-сохраняющее); binary — upstream-
      tarball (base_url + version + soulprint.self.os.arch → /usr/local/bin + свой
      systemd-юнит + distro-юзер/группа redis). base_url/version нужны лишь при
      method=binary. Пустой/не передан → method=package.
    properties:
      method:
        type: string
        enum: [package, binary]
      base_url:
        type: string
        description: >-
          Базовый URL источника tarball-а redis (без version/arch-сегментов). destiny
          строит полный URL per-host как <base_url>/redis-<version>-<arch>.tar.gz, где
          arch — soulprint.self.os.arch. Обязателен при method=binary.
      version:
        type: string
        # upstream-semver (напр. 7.2.4) — ОТДЕЛЬНО от top-level version (distro-epoch):
        # бинарный tarball именуется upstream-версией, не distro-ревизией. method=binary
        # → пишется в URL tarball-а и в путь распакованного каталога /tmp/redis-<version>,
        # откуда core.file.present (src:) разложит бинари (идемпотентность нативная по
        # sha256 содержимого, version-guard не нужен — см. install.yml шаг 4).
        pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+$"
        description: >-
          Upstream-версия redis для tarball-а (semver, напр. 7.2.4). Обязательна при
          method=binary. ОТДЕЛЬНА от top-level version (distro-epoch) — разные
          форматы (#4 version-pattern).
      # ── allow_private: снять SSRF-guard core.url для fetch бинарей (2026-06-28) ──
      # Дефолтный binary_base_url сервиса — ВНУТРЕННИЙ Nexus (resolve в RFC1918-адрес,
      # напр. 10.16.2.130). core.url.fetched по умолчанию (allow_private:false) блокит
      # dial в private-IP SSRF-guard-ом (shared/netguard) → fetch бинарей падает. Это
      # поле пробрасывается в каждую core.url.fetched-задачу binary-ветки install.yml.
      # Опциональное (only-add, forward-compat): не передан → has()-guard в vars даёт
      # false (строгий дефолт destiny — guard держится). scenario create выставляет его
      # из essence.binary_allow_private (дефолт true: дефолтный base = internal Nexus).
      # Публичный-mirror-деплой (внешний resolvable base) задаёт false.
      allow_private:
        type: boolean
        description: >-
          Снять SSRF-guard core.url для fetch бинарей binary-ветки (разрешить dial в
          RFC1918/loopback — легитимный internal Nexus). Нужен, когда base_url
          резолвится в private-адрес. Не передан → guard держится (строгий дефолт).

  # ★ input.password УДАЛЁН (РЕДИЗАЙН default_admin 2026-06-30): requirepass убран из
  # redis.conf, главного пароля больше нет. Аутентификация идёт под СИСТЕМНЫМ ACL-юзером
  # default_admin (приходит в `users` ниже с per-user паролем, как replica/monitoring).
  # Шаблоны redis.conf.tmpl/users.acl.tmpl больше НЕ читают .vars.password — destiny его
  # не принимает и не передаёт в render_context. Пароли ВСЕХ юзеров (вкл. default_admin) —
  # в map `users`/`sentinel_users` (поле password каждого, зарезолвлено keeper-side).
  #
  # ★ РЕДИЗАЙН default_admin (2026-06-30): replica→master AUTH (masteruser/masterauth) НЕ
  # отдельные input-поля destiny — это ОБЫЧНЫЕ директивы redis.conf, которые scenario кладёт
  # прямо в `config`-map (sentinel deploy-body), и destiny range-ит их в redis.conf как любую
  # другую директиву. Так destiny остаётся «глупой» (один config-канал, без спец-полей под
  # репликацию), а пароль маскируется vault()-в-ячейке config на стороне scenario. КРИТИЧНО
  # для персистентности через рестарт: статическая masterauth в redis.conf переживает рестарт
  # (CONFIG SET плагина community.redis.replica — нет, без CONFIG REWRITE).

  # Merged-конфиг redis.conf: caller (scenario сервиса) сливает default→preset→
  # вычисления→passthrough через merge() и передаёт ГОТОВЫЙ map. Шаблон range-ит
  # его ПОСЛЕ базовых директив (last-wins): caller может осознанно переопределить
  # любую базовую. Пустой/не передан → секция пуста. unixsocket/maxmemory/save/
  # appendonly/maxmemory-policy — обычные ключи этого map-а (scenario их вычислил).
  config:
    type: object
    description: >-
      Готовые директивы redis.conf (merged на стороне scenario сервиса). Каждая
      пара key→value пишется в redis.conf как есть. Destiny НЕ мержит повторно.
    properties:
      maxclients:
        type: integer
        min: 1
      timeout:
        type: integer
        min: 0
    additional_properties: true

  # ACL-пользователи Redis: MAP имя→{perms, state, password}. scenario строит этот
  # map из своего typed-array input.users и резолвит password каждого юзера keeper-side
  # из Vault. Шаблон users.acl.tmpl range-ит MAP (Go сортирует ключи → строки ACL
  # детерминированы между прогонами, нет ложного change/рестарта) и хеширует пароль
  # (Redis ACL #<sha256>) — plaintext в файл НЕ пишется.
  users:
    type: object
    required: false
    description: >-
      ACL-пользователи Redis (map имя→{perms, state, password}). Рендерятся в
      /etc/redis/users.acl (aclfile в redis.conf), порядок строк детерминирован
      (range по map сортирует ключи). password — зарезолвленный keeper-side
      секрет (маскируется); в файл пишется его sha256-хеш.
    properties: {}
    additional_properties:
      type: object
      required: [perms, state, password]
      additional_properties: false
      properties:
        perms:
          type: string
        state:
          type: string
          enum: [on, off]
        password:
          type: string
          secret: true

  # ── Системные ACL-юзеры sentinel-демона (2-й aclfile) ────────────────────────
  # ОПЦИОНАЛЬНОЕ additive-поле (only-add, forward-compat): служебные юзеры sentinel-
  # демона с sentinel-командами (ОТЛИЧНЫ от users.acl redis-server). Рендерится в
  # ОТДЕЛЬНЫЙ ${conf_dir}/sentinel-users.acl. Пустой/не передан → пустой aclfile
  # (back-compat: destiny старого ref без поля рендерит пустой, директива безвредна).
  sentinel_users:
    type: object
    required: false
    description: >-
      Системные ACL-пользователи sentinel-демона (map имя→{perms, state, password}).
      Рендерятся в ${conf_dir}/sentinel-users.acl (aclfile в sentinel.conf). Набор —
      service-side из essence.system_acl_users_sentinel (default/monitoring/sentinel/
      haproxy с sentinel-командами). password — зарезолвленный keeper-side секрет
      (маскируется); в файл пишется sha256-хеш. Только sentinel-режим.
    properties: {}
    additional_properties:
      type: object
      required: [perms, state, password]
      additional_properties: false
      properties:
        perms:
          type: string
        state:
          type: string
          enum: [on, off]
        password:
          type: string
          secret: true

  # ── TLS (концепция Ansible-роли redis: redis_tls_*) ──────────────────────────
  # TLS-параметры — единый dict `tls` (object-typed, симметрично `users`/`sentinel`):
  # enable/only/port/cert_ref/key_ref/ca_ref. HOST-ИНВАРИАНТ (один cert/CA/порт на
  # кластер) → приходят через apply.input. Пустой/absent dict → TLS off (has(input.tls)-
  # guard + default() в задачах даёт enable=false). Гейт tls.enable — per-task when на
  # PEM-задачах (tasks/server.yml). Сами TLS-директивы (tls-port/tls-cert-file/...) —
  # обычные ключи merged config (scenario кладёт их в config), destiny range-ит их в
  # redis.conf. tls.only НЕ читается destiny как отдельная задача — он лишь меняет
  # config (scenario ставит `port 0`).
  #
  # ★ PEM-РЕНДЕР ЧЕРЕЗ vault() В САМОЙ ЯЧЕЙКЕ (seal-маскинг, ADR-010 §7.4): destiny
  # получает Vault-ПУТИ (tls.cert_ref/key_ref/ca_ref), а сам PEM читает CEL-функцией
  # vault() ПРЯМО в ячейке content задачи core.file.present (НЕ .tmpl, НЕ apply.input
  # с уже-резолвленным PEM). vault() резолвится KEEPER-SIDE в render-фазе destiny-
  # прохода — детектор seal помечает ячейку sealed vault-слоем, маскинг ловит PEM в
  # error_summary/state. PEM в файл уезжает уже значением; vault-клиент на Soul не
  # тянется (ADR-012). Если бы destiny принимала operator-литеральный PEM (не ref) —
  # его пришлось бы гнать через apply.input, а seal destiny-прохода схему secret-input
  # не видит (destiny-input-secret transit — отложенный слайс) → PEM не маскировался
  # бы. Поэтому контракт — именно Vault-ref, vault() в ячейке.
  tls:
    type: object
    # cert_ref/key_ref/ca_ref обязательны, КОГДА dict передан (object-level required:
    # список под-ключей): без путей PEM-задачам нечего читать. Один ключ `required`
    # несёт ЛИБО bool (опциональность поля), ЛИБО список обязательных под-ключей —
    # здесь выбрана списочная форма (как у `sentinel`), поэтому `required: false`
    # отсутствует: опциональность поля достигается отсутствием field-level required.
    required: [cert_ref, key_ref, ca_ref]
    additional_properties: false
    description: >-
      Параметры TLS Redis (концепция redis_tls_* роли). Пустой/не передан → TLS off
      (block PEM-задач placeholder-skip, директив TLS нет). enable — главный гейт
      рендера PEM/директив; only — закрыть plain-порт (scenario ставит `port 0`);
      port — TLS-порт (директива tls-port); cert_ref/key_ref/ca_ref — Vault-ПУТИ
      серверного cert/key и CA (форма "<mount>/<path>#<field>"). destiny читает PEM
      через vault(ref) В ЯЧЕЙКЕ content (seal-маскинг), vault-клиент на Soul нет.
    properties:
      enable:
        type: boolean
      only:
        type: boolean
      port:
        type: integer
        min: 1
      cert_ref:
        type: string
      key_ref:
        type: string
      ca_ref:
        type: string

  # ── Redis-модули (концепция Ansible-роли redis: redis_module_*) ──────────────
  # ★ ДИРЕКТИВА «модули ВСЕГДА ВСЕ» (2026-06-25): НАБОР модулей больше НЕ operator-
  # выбор — это ИНВАРИАНТ кирпича (таблица алиас→.so в vars.redis_modules). Поэтому
  # полей input.modules / input.modules_dir больше НЕТ (modules_dir выводится из
  # input.data_dir), scenario модули НЕ передаёт. version-gate Redis 8+ и механика —
  # в vars.yml/modules.yml. Здесь в input остаётся ТОЛЬКО modules_base_url.
  #
  # modules_base_url ОСТАЁТСЯ в input — это deployment-артефакт под пару (version,
  # arch) кластера, не инвариант кирпича. URL .so АРХ-СПЕЦИФИЧЕН: destiny строит его
  # per-host из modules_base_url + СВОЕГО soulprint.self.os.arch + имени .so (так
  # mixed-arch incarnation корректен — каждый хост качает .so под свою арх).
  modules_base_url:
    type: string
    required: false
    description: >-
      Базовый URL источника .so Redis-модулей (без арх-сегмента). destiny строит
      полный URL каждого модуля как modules_base_url/<arch>/<имя.so>, где arch —
      soulprint.self.os.arch ЭТОГО хоста, а имя файла — из vars.redis_modules.
      Обязателен на Redis < 8 (модули разворачиваются всегда все).

  # ── modules_allow_private: SSRF-guard для fetch .so модулей (2026-06-28) ────────
  # Симметрично install.allow_private: modules_base_url тоже может быть ВНУТРЕННИМ
  # Nexus (resolve в RFC1918) → fetch .so падал бы на SSRF-guard core.url. Поле
  # пробрасывается в каждую core.url.fetched-задачу modules.yml. Опциональное (only-add):
  # не передан → has()-guard в vars даёт false (строгий дефолт). scenario create
  # выставляет его из essence.modules_allow_private (дефолт true).
  modules_allow_private:
    type: boolean
    description: >-
      Снять SSRF-guard core.url для fetch .so модулей (разрешить dial в RFC1918/loopback —
      легитимный internal Nexus). Нужен, когда modules_base_url резолвится в private-адрес.
      Не передан → guard держится (строгий дефолт).

  # ── Host-tuning extras (концепция Ansible-роли) ──────────────────────────────
  # Режим-агностичные per-host добавки. THP-отключение / logrotate / sysctl —
  # БЕЗУСЛОВНЫ (рекомендация Redis / hardening, не выбор оператора): флагов в
  # контракте нет, задачи всегда активны. sysctl_settings — данные-таблица значений
  # kernel-параметров, host-инвариантна → приходит через apply.input (scenario
  # сервиса), сами параметры применяются всегда.
  sysctl_settings:
    type: object
    required: false
    description: >-
      Kernel-параметры под Redis (map имя→значение), рендерятся в
      /etc/sysctl.d/30-redis.conf. Значения — СТРОКИ (multi-value параметры через
      пробел). Передаются scenario сервиса (дефолты — essence.sysctl_settings).
    properties: {}
    additional_properties: true

  # ── Sentinel (режим sentinel) ────────────────────────────────────────────────
  # Эти поля задействованы ТОЛЬКО когда sentinel_enabled=true (gated-задачи ниже
  # в tasks/main.yml). Вне sentinel-режима не передаются → has()-guard в задачах
  # гасит рендер sentinel.conf/unit. Структура — режим-агностичный кирпич остаётся
  # «глупым»: scenario сервиса вычисляет master-election и передаёт ГОТОВЫЕ значения.
  sentinel_enabled:
    type: boolean
    required: false
    default: false
    description: >-
      Включить рендер sentinel.conf + redis-sentinel.service + запуск демона
      (режим sentinel). По умолчанию false (standalone/cluster — без sentinel).

  sentinel:
    type: object
    # Поле опционально (field-level required отсутствует → false): передаётся
    # только в sentinel-режиме (gated на sentinel_enabled). Когда передано —
    # master_ip обязателен (object-level required: [...] ниже). Один ключ
    # `required` может нести ЛИБО bool (опциональность поля), ЛИБО список
    # обязательных под-ключей object-а — здесь выбрана списочная форма, поэтому
    # `required: false` отсутствует (опциональность достигается дефолтом).
    description: >-
      Параметры monitored master для sentinel.conf. master_ip/master_port —
      HOST-ИНВАРИАНТНЫЙ адрес master-а кластера (один на кластер, scenario
      резолвит run_once). announce-ip НЕ здесь: он per-host, рендерится из
      .self.network.primary_ip. config — стартовые директивы sentinel.conf
      (файловая форма). auth_pass — зарезолвленный keeper-side секрет (маскируется).
    # master_ip обязателен: sentinel без monitored master бессмыслен, а задача
    # рендера sentinel.conf берёт ${ input.sentinel.master_ip } БЕЗ has()-guard
    # (gated на sentinel_enabled). Required ловит пропуск адреса понятной
    # schema-ошибкой ДО render, а не криптичным CEL «no such key» в шаблоне.
    required: [master_ip]
    additional_properties: false
    properties:
      master_name:
        type: string
      master_ip:
        type: string
      master_port:
        type: integer
        min: 1
      quorum:
        type: integer
        min: 1
      auth_user:
        type: string
      auth_pass:
        type: string
        secret: true
      config:
        type: object
        properties: {}
        additional_properties: true
