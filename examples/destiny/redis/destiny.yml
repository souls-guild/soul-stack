name: redis
description: Install and configure Redis server on a single host
# Версия destiny — git ref, под которым закоммичен файл (см. ADR-007 в docs/architecture.md).
# Поле `version:` верхнего уровня намеренно отсутствует.
#
# Список задач — НЕ в этом файле. Он живёт в tasks/main.yml; см. docs/architecture.md →
# «Структура задачи в `tasks:`». Здесь только манифест: input-контракт и required_modules.

# Входной контракт destiny. Проверяется keeper-ом при инвокации и soul-ом
# перед apply (defense in depth). DSL описан в docs/architecture.md →
# «Destiny: входной контракт и валидация».

# Эта destiny использует только core-модули, поэтому required_modules: не нужен.
# Блок required_modules: появляется только когда destiny требует custom-модули
# из сторонних коллекций — например, required_modules: [wb.haproxy, wb.myapp].

input:
  action:
    type: string
    required: true
    enum: [apply, ensure_user, ensure_users, update_acls, restart, failover_and_restart, ping, replication_status, diagnose]

  version:
    type: string
    required: false
    # distro-native: опциональный epoch `N:` + upstream-версия + опциональная
    # ревизия (напр. Debian `5:7.0.15-1~deb12u7`). Узкий semver ломал version-пин
    # на реальном дистрибутиве (apt-get install redis-server=7.2.4 → exit 100).
    pattern: "^([0-9]+:)?[0-9][A-Za-z0-9.~+-]*$"
    description: >-
      Версия пакета redis-server в репозитории дистрибутива (distro-native, напр.
      5:7.0.15-1~deb12u7). Опциональна: если не передана, ставится версия по
      умолчанию из репозитория (core.pkg без =version-пина).

  password:
    type: string
    secret: true
    min_length: 16

  # ACL для action: ensure_users применяются ПРОТИВ master_addr (а не
  # локально), чтобы шаг create, идущий широко по incarnation, на репликах
  # не создавал локальный ACL до репликации (рассинхрон). На любом хосте
  # incarnation команда уходит на один и тот же master → на репликах
  # idempotent. scenario вычисляет адрес сам (модель 3-ADDR); destiny не
  # резолвит. Не required: остальные action (apply/ensure_user/restart/…)
  # master_addr не используют.
  master_addr:
    type: string

  maxmemory:
    type: string
    pattern: "^[0-9]+(b|kb|mb|gb)$"          # Redis-формат: 256mb, 4gb, …

  config:
    type: object
    properties:
      maxclients:
        type: integer
        min: 1
      timeout:
        type: integer
        min: 0
    additional_properties: true

  user:
    type: string
    pattern: "^[a-z_][a-z0-9_-]{0,31}$"

  acl:
    type: string

  state:
    type: string
    enum: [on, off]

  # ACL-пользователи Redis: map по имени юзера → {acl, state}.
  # tasks/manage.yml итерирует ${ input.users } через `as: user,
  # index_as: username` и читает ${ user.acl } / ${ user.state }; поэтому
  # верхний уровень — type=object с additional_properties: <schema>, а
  # фиксированных properties нет (имена юзеров — произвольные).
  users:
    type: object
    description: ACL-пользователи Redis, ключ — имя юзера, значение — {acl, state}.
    properties: {}
    additional_properties:
      type: object
      properties:
        acl:
          type: string
        state:
          type: string
          enum: [on, off]
      required: [acl, state]
      additional_properties: false
