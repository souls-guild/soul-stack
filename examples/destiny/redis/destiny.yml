name: redis
description: >-
  Mode-agnostic per-host brick for Redis (Ansible role concept, B-hybrid
  ADR-009): package install + render redis.conf from a merged config + render
  users.acl + systemd hardening drop-in + service. ALL orchestration (topology,
  rolling-restart, failover, sentinel reconcile, health-gate) lives in the service
  scenario — this destiny is only the idempotent install/render/service of a single instance.

# destiny version — git ref (ADR-007). No top-level `version:` field.
# Task list — in tasks/main.yml. Core modules only → required_modules: not needed
# (community.redis is called from the service scenario, not from this destiny).
#
# Mode-agnostic: the same brick serves standalone, cluster and sentinel
# (the latter — via sentinel_enabled + conditional-include sentinel.yml). The
# service scenario picks the mode by passing flags and cluster-/sentinel directives
# into config; destiny itself doesn't know the mode. Config arrives as a READY
# merged map via apply: input: config: (the merge is done by the service scenario) —
# destiny stays "dumb".

input:
  # ── Gate for the redis-server data plane (sentinel_only mode) ───────────────────
  # deploy_redis=false (sentinel_only mode) → do NOT deploy redis-server: the whole
  # data plane is suppressed by include-when (server.yml/modules.yml group-drop). The
  # redis package is still ALWAYS installed — the sentinel daemon ships in the SAME
  # package, so sentinel_only brings up only that, monitoring an EXTERNAL master.
  deploy_redis:
    type: boolean
    required: false
    default: true
    description: >-
      Whether to deploy the redis-server data plane (render redis.conf/users.acl/
      PEM + redis-server systemd service). Default true. false (sentinel_only
      mode) — bring up only the sentinel daemon (sentinel_enabled), master
      external. The redis package is installed in any case (it also carries the sentinel daemon).

  version:
    type: string
    # REQUIRED ONLY for install.method=package (required_when): the distro-native
    # pin reads it as plain input.version (see install.yml package branch). With
    # install.method=binary the distro package is NOT installed — the binary version comes
    # from install.version (upstream semver), and this field is unused. required_when
    # context is input-only (default() unavailable) → absent-normalization via has()-chain:
    # "package" is true when install isn't passed / method isn't set / method=='package'.
    required_when: "!has(input.install) || !has(input.install.method) || input.install.method == 'package'"
    # distro-native: optional epoch `N:` + upstream version + optional
    # revision (e.g. Debian `5:7.0.15-1~deb12u7`). A narrow semver pattern broke the version pin
    # on a real distro (apt-get install redis-server=7.2.4 → exit 100).
    pattern: "^([0-9]+:)?[0-9][A-Za-z0-9.~+-]*$"
    description: >-
      redis-server package version in the distro repository (distro-native pin,
      e.g. 5:7.0.15-1~deb12u7). REQUIRED when install.method=package (user
      directive 2026-06-23): core.pkg always installs with a =version pin. The
      "latest from repo" behavior (empty version → core.pkg without a pin) is NO LONGER
      available. With install.method=binary NOT used (the binary version is in install.version).

  # ── Host-layout paths, operator-overridable (directive B) ──────────────────
  # conf_dir/data_dir — base directories for Redis config and data. OPERATOR-
  # OVERRIDABLE (input, not vars): the operator can deploy config/data under their own
  # storage layout. Default = current path (back-compat). Tasks derive concrete
  # files/subdirectories from these bases (redis.conf, users.acl, tls/, modules/). Invariant
  # directories (unit filename, drop-in dir) are NOT exposed in input — see the vars.yml
  # vars↔input boundary.
  conf_dir:
    type: string
    required: false
    default: /etc/redis
    pattern: "^/[A-Za-z0-9._/-]+$"
    description: >-
      Redis config directory (redis.conf, users.acl, sentinel.conf, tls/).
      Defaults to /etc/redis. The operator can override it for their own layout.

  data_dir:
    type: string
    required: false
    default: /var/lib/redis
    pattern: "^/[A-Za-z0-9._/-]+$"
    description: >-
      Redis working data directory (RDB/AOF; modules/ is derived from it as
      <data_dir>/modules). Defaults to /var/lib/redis. The operator can override it
      for their own storage layout.

  # ── install: redis install method (Ansible role concept redis_install_*) ──
  # Gate install.method is static (input.* only) → Keeper suppresses the inactive branch
  # of install.yml with a placeholder-skip without shifting indices (block static-skip).
  #
  # ★ the binary branch carries EVERYTHING a distro package gives for free: the systemd unit
  # redis-server.service (+ redis-sentinel.service in sentinel mode), distro user/
  # group redis. Unit name is redis-server (NOT redis), so server.yml hardening
  # drop-in (/etc/systemd/system/redis-server.service.d/) and core.service redis-server
  # restart work in BOTH branches without branching.
  install:
    type: object
    required: false
    additional_properties: false
    description: >-
      Redis install method (redis_install_* role concept). method: package
      (default) — distro redis-server package (behavior-preserving); binary — upstream
      tarball (base_url + version + soulprint.self.os.arch → /usr/local/bin + its own
      systemd unit + distro redis user/group). base_url/version needed only when
      method=binary. Empty/not passed → method=package.
    properties:
      method:
        type: string
        enum: [package, binary]
      base_url:
        type: string
        description: >-
          Base URL of the redis tarball source (without version/arch segments). destiny
          builds the full per-host URL as <base_url>/redis-<version>-<arch>.tar.gz, where
          arch is soulprint.self.os.arch. Required when method=binary.
      version:
        type: string
        # upstream semver (e.g. 7.2.4) — SEPARATE from the top-level version (distro-epoch):
        # the binary tarball is named by the upstream version, not the distro revision. method=binary
        # → written into the tarball URL and into the unpacked directory path /tmp/redis-<version>,
        # from which core.file.present (src:) lays out the binaries (idempotency is native via
        # content sha256, no version-guard needed — see install.yml step 4).
        pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+$"
        description: >-
          Upstream redis version for the tarball (semver, e.g. 7.2.4). Required when
          method=binary. SEPARATE from the top-level version (distro-epoch) — different
          formats (#4 version-pattern).
      # ── allow_private: lift the core.url SSRF guard for fetching binaries (2026-06-28) ──
      # The service's default binary_base_url is an INTERNAL Nexus (resolves to an RFC1918 address,
      # e.g. 10.16.2.130). core.url.fetched by default (allow_private:false) blocks
      # dialing a private IP via the SSRF guard (shared/netguard) → binary fetch fails. This
      # field is forwarded into every core.url.fetched task of the install.yml binary branch.
      # Optional (only-add, forward-compat): not passed → has()-guard in vars gives
      # false (destiny's strict default — the guard stays up). scenario create sets it
      # from essence.binary_allow_private (default true: the default base is the internal Nexus).
      # A public-mirror deployment (externally resolvable base) sets false.
      allow_private:
        type: boolean
        description: >-
          Lift the core.url SSRF guard for fetching binary-branch binaries (allow dialing
          RFC1918/loopback — legitimate internal Nexus). Needed when base_url
          resolves to a private address. Not passed → guard stays up (strict default).

  # ★ input.password REMOVED (default_admin REDESIGN 2026-06-30): requirepass was removed from
  # redis.conf, there's no longer a single master password. Auth goes through the SYSTEM ACL user
  # default_admin (comes in `users` below with a per-user password, like replica/monitoring).
  # The redis.conf.tmpl/users.acl.tmpl templates no longer read .vars.password — destiny no longer
  # accepts it and doesn't pass it into render_context. Passwords for ALL users (incl. default_admin) —
  # in the `users`/`sentinel_users` map (password field per user, resolved keeper-side).
  #
  # ★ default_admin REDESIGN (2026-06-30): replica→master AUTH (masteruser/masterauth) are NOT
  # separate destiny input fields — they're ORDINARY redis.conf directives that the scenario places
  # directly into the `config` map (sentinel deploy-body), and destiny ranges over them into redis.conf like
  # any other directive. This keeps destiny "dumb" (a single config channel, no special fields for
  # replication), and the password is masked via vault()-in-cell for config on the scenario side. CRITICAL
  # for persistence across a restart: a static masterauth in redis.conf survives a restart
  # (community.redis.replica's CONFIG SET does not, without CONFIG REWRITE).

  # Merged redis.conf config: the caller (service scenario) merges default→preset→
  # computed→passthrough via merge() and passes a READY map. The template ranges over
  # it AFTER the base directives (last-wins): the caller can deliberately override
  # any base one. Empty/not passed → section is empty. unixsocket/maxmemory/save/
  # appendonly/maxmemory-policy — ordinary keys of this map (the scenario computed them).
  config:
    type: object
    description: >-
      Ready-made redis.conf directives (merged on the service scenario side). Each
      key→value pair is written into redis.conf as-is. Destiny does NOT merge again.
    properties:
      maxclients:
        type: integer
        min: 1
      timeout:
        type: integer
        min: 0
    additional_properties: true

  # Redis ACL users: MAP name→{perms, state, password}. The scenario builds this
  # map from its typed-array input.users and resolves each user's password keeper-side
  # from Vault. The users.acl.tmpl template ranges over the MAP (Go sorts keys → ACL
  # lines are deterministic across runs, no spurious change/restart) and hashes the password
  # (Redis ACL #<sha256>) — plaintext is NOT written to the file.
  users:
    type: object
    required: false
    description: >-
      Redis ACL users (map name→{perms, state, password}). Rendered into
      /etc/redis/users.acl (aclfile in redis.conf), line order is deterministic
      (ranging over a map sorts keys). password — a keeper-side resolved
      secret (masked); its sha256 hash is written to the file.
    properties: {}
    additional_properties:
      type: object
      required: [perms, state, password]
      additional_properties: false
      properties:
        perms:
          type: string
        state:
          type: string
          enum: [on, off]
        password:
          type: string
          secret: true

  # ── Sentinel daemon system ACL users (2nd aclfile) ────────────────────────
  # OPTIONAL additive field (only-add, forward-compat): sentinel daemon service
  # users with sentinel commands (DISTINCT from the redis-server users.acl). Rendered into
  # a SEPARATE ${conf_dir}/sentinel-users.acl. Empty/not passed → empty aclfile
  # (back-compat: an older destiny ref without this field renders an empty file, the directive is harmless).
  sentinel_users:
    type: object
    required: false
    description: >-
      Sentinel daemon system ACL users (map name→{perms, state, password}).
      Rendered into ${conf_dir}/sentinel-users.acl (aclfile in sentinel.conf). The set is
      service-side from essence.system_acl_users_sentinel (default/monitoring/sentinel/
      haproxy with sentinel commands). password — a keeper-side resolved secret
      (masked); its sha256 hash is written to the file. Sentinel mode only.
    properties: {}
    additional_properties:
      type: object
      required: [perms, state, password]
      additional_properties: false
      properties:
        perms:
          type: string
        state:
          type: string
          enum: [on, off]
        password:
          type: string
          secret: true

  # ── TLS (Ansible role concept redis: redis_tls_*) ──────────────────────────
  # TLS parameters — a single `tls` dict (object-typed, symmetric with `users`/`sentinel`):
  # enable/only/port/cert_ref/key_ref/ca_ref. HOST-INVARIANT (one cert/CA/port per
  # cluster) → arrives via apply.input. Empty/absent dict → TLS off (has(input.tls)
  # guard + default() in tasks gives enable=false). The tls.enable gate is a per-task when on
  # PEM tasks (tasks/server.yml). The TLS directives themselves (tls-port/tls-cert-file/...) are
  # ordinary keys of the merged config (the scenario puts them into config), destiny ranges them into
  # redis.conf. tls.only is NOT read by destiny as a separate task — it only changes
  # config (the scenario sets `port 0`).
  #
  # ★ PEM RENDER VIA vault() RIGHT IN THE CELL (seal-masking, ADR-010 §7.4): destiny
  # receives Vault PATHS (tls.cert_ref/key_ref/ca_ref), and reads the actual PEM via the CEL
  # function vault() DIRECTLY in the content cell of the core.file.present task (NOT .tmpl, NOT
  # apply.input with an already-resolved PEM). vault() is resolved KEEPER-SIDE during the render
  # phase of the destiny pass — the seal detector marks the cell as sealed by the vault layer,
  # masking catches the PEM in error_summary/state. The PEM leaves as a value already written into the
  # file; no vault client is pulled onto Soul (ADR-012). If destiny accepted an operator-literal
  # PEM (not a ref), it would have to go through apply.input, and the destiny pass's seal doesn't
  # see the secret-input schema (destiny-input-secret transit is a deferred slice) → the PEM wouldn't
  # be masked. Hence the contract is specifically a Vault ref, vault() in the cell.
  tls:
    type: object
    # cert_ref/key_ref/ca_ref are required WHEN the dict is passed (object-level required:
    # a list of sub-keys): without paths, PEM tasks have nothing to read. One `required`
    # key carries EITHER a bool (field optionality) OR a list of required sub-keys —
    # here the list form is chosen (like `sentinel`), so `required: false`
    # is absent: field optionality is achieved by omitting the field-level required.
    required: [cert_ref, key_ref, ca_ref]
    additional_properties: false
    description: >-
      Redis TLS parameters (redis_tls_* role concept). Empty/not passed → TLS off
      (PEM-task block placeholder-skip, no TLS directives). enable — the main gate for
      rendering PEM/directives; only — close the plain port (the scenario sets `port 0`);
      port — the TLS port (tls-port directive); cert_ref/key_ref/ca_ref — Vault PATHS
      to the server cert/key and CA (form "<mount>/<path>#<field>"). destiny reads the PEM
      via vault(ref) IN THE CELL content (seal-masking), no vault client on Soul.
    properties:
      enable:
        type: boolean
      only:
        type: boolean
      port:
        type: integer
        min: 1
      cert_ref:
        type: string
      key_ref:
        type: string
      ca_ref:
        type: string

  # ── Redis modules (Ansible role concept redis: redis_module_*) ──────────────
  # ★ "ALWAYS ALL modules" DIRECTIVE (2026-06-25): the SET of modules is no longer an operator
  # choice — it's an INVARIANT of the brick (the alias→.so table in vars.redis_modules). So
  # the input.modules / input.modules_dir fields no longer exist (modules_dir is derived from
  # input.data_dir), the scenario does NOT pass modules. The Redis 8+ version-gate and the mechanics
  # live in vars.yml/modules.yml. Here, only modules_base_url remains in input.
  #
  # modules_base_url STAYS in input — it's a deployment artifact for the cluster's
  # (version, arch) pair, not a brick invariant. The .so URL is ARCH-SPECIFIC: destiny builds it
  # per-host from modules_base_url + its OWN soulprint.self.os.arch + the .so name (this way
  # mixed-arch incarnation is correct — each host fetches the .so for its own arch).
  modules_base_url:
    type: string
    required: false
    description: >-
      Base URL of the Redis modules' .so source (without an arch segment). destiny builds
      the full URL for each module as modules_base_url/<arch>/<module.so>, where arch is
      THIS host's soulprint.self.os.arch, and the filename comes from vars.redis_modules.
      Required on Redis < 8 (modules are always all deployed).

  # ── modules_allow_private: SSRF guard for fetching .so modules (2026-06-28) ────────
  # Symmetric to install.allow_private: modules_base_url can also be an INTERNAL
  # Nexus (resolves to RFC1918) → fetching .so would trip the core.url SSRF guard. This field
  # is forwarded into every core.url.fetched task of modules.yml. Optional (only-add):
  # not passed → has()-guard in vars gives false (strict default). scenario create
  # sets it from essence.modules_allow_private (default true).
  modules_allow_private:
    type: boolean
    description: >-
      Lift the core.url SSRF guard for fetching .so modules (allow dialing RFC1918/loopback —
      legitimate internal Nexus). Needed when modules_base_url resolves to a private address.
      Not passed → guard stays up (strict default).

  # ── Host-tuning extras (Ansible role concept) ──────────────────────────────
  # Mode-agnostic per-host add-ons. THP-disable / logrotate / sysctl —
  # UNCONDITIONAL (Redis/hardening recommendation, not an operator choice): no flags in
  # the contract, tasks are always active. sysctl_settings — a data table of kernel
  # parameter values, host-invariant → arrives via apply.input (service
  # scenario), the parameters themselves always apply.
  sysctl_settings:
    type: object
    required: false
    description: >-
      Kernel parameters for Redis (map name→value), rendered into
      /etc/sysctl.d/30-redis.conf. Values are STRINGS (multi-value parameters
      space-separated). Passed by the service scenario (defaults — essence.sysctl_settings).
    properties: {}
    additional_properties: true

  # ── Sentinel (sentinel mode) ────────────────────────────────────────────────
  # These fields are used ONLY when sentinel_enabled=true (gated tasks below
  # in tasks/main.yml). Outside sentinel mode they're not passed → the has()-guard in tasks
  # suppresses rendering sentinel.conf/unit. Structure — the mode-agnostic brick stays
  # "dumb": the service scenario computes master election and passes READY values.
  sentinel_enabled:
    type: boolean
    required: false
    default: false
    description: >-
      Enable rendering sentinel.conf + redis-sentinel.service + starting the daemon
      (sentinel mode). Default false (standalone/cluster — no sentinel).

  sentinel:
    type: object
    # Field is optional (field-level required absent → false): passed
    # only in sentinel mode (gated on sentinel_enabled). When passed —
    # master_ip is required (object-level required: [...] below). One
    # `required` key can carry EITHER a bool (field optionality) OR a list of
    # required object sub-keys — here the list form is chosen, so
    # `required: false` is absent (optionality is achieved by the default).
    description: >-
      Monitored master parameters for sentinel.conf. master_ip/master_port —
      the HOST-INVARIANT address of the cluster's master (one per cluster, the scenario
      resolves it run_once). announce-ip is NOT here: it's per-host, rendered from
      .self.network.primary_ip. config — starting sentinel.conf directives
      (file form). auth_pass — a keeper-side resolved secret (masked).
    # master_ip is required: sentinel without a monitored master is meaningless, and the
    # task rendering sentinel.conf reads ${ input.sentinel.master_ip } WITHOUT a has()-guard
    # (gated on sentinel_enabled). Required catches a missing address with a clear
    # schema error BEFORE render, rather than a cryptic CEL "no such key" in the template.
    required: [master_ip]
    additional_properties: false
    properties:
      master_name:
        type: string
      master_ip:
        type: string
      master_port:
        type: integer
        min: 1
      quorum:
        type: integer
        min: 1
      auth_user:
        type: string
      auth_pass:
        type: string
        secret: true
      config:
        type: object
        properties: {}
        additional_properties: true
