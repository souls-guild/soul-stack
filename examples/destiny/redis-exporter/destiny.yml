name: redis-exporter
description: Install Prometheus redis_exporter from a pinned GitHub release tarball and run it as a hardened systemd service under DynamicUser (no manual service account), talking to Redis over a unix socket.

# Destiny version is a git ref (ADR-007). No top-level `version:` field.
# Task list is in tasks/main.yml. Only core modules -> required_modules: not needed.
#
# Extracted from the monitoring / redis-monitored inline scenarios.
# Key feature: redis_exporter talks to Redis over a UNIX SOCKET
# (--redis.addr=unix://<socket>), not TCP. Because of this, unlike
# node-exporter, the unit needs AF_UNIX in RestrictAddressFamilies (prod
# convention §3) and membership in the redis group for group access to the
# 770 socket - given via SupplementaryGroups=redis together with
# DynamicUser=yes (see tasks/main.yml and templates/redis_exporter.service.tmpl).

input:
  version:
    type: string
    default: "1.62.0"
    pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+$"
    description: redis_exporter version (GitHub Releases oliver006/redis_exporter).

  # Checksum of the redis_exporter tarball (linux-<arch>). core.url.fetched verifies
  # it BEFORE publishing the file. REQUIRED, no default (fail-closed): no hash ->
  # an honest refusal instead of a fetch with a placeholder that verification would
  # reject anyway. The value comes from the sha256sums file of the GitHub release
  # oliver006/redis_exporter for the pair (version, arch), e.g. for
  # redis_exporter-v<v>.linux-<arch>.tar.gz.
  sha256:
    type: string
    required: true
    pattern: "^sha256:[0-9a-f]{64}$"
    description: >-
      SHA-256 of the redis_exporter tarball (form "sha256:<hex>"). Must
      match the version + arch pair; taken from the GitHub release sha256sums.

  arch:
    type: string
    default: amd64
    enum: [amd64, arm64]
    description: Architecture of the GitHub release tarball (amd64|arm64).

  # https-only (core.url rejects http:// on Validate without allow_http). The full
  # tarball URL is assembled by CEL in tasks/main.yml from base_url + version + arch.
  base_url:
    type: string
    default: "https://github.com/oliver006/redis_exporter/releases/download"
    pattern: "^https://[A-Za-z0-9._/:-]+$"
    description: >-
      Root download URL for redis_exporter releases. Defaults to GitHub
      Releases; can be overridden to an internal mirror/nexus proxy.

  # SSRF-guard opt-out for private-resolve base_url - same pattern as redis destiny.yml install.allow_private.
  allow_private:
    type: boolean
    default: false
    description: >-
      Lift the core.url SSRF guard for the tarball fetch (allow dialing
      RFC1918/loopback - legitimate for an internal Nexus). Needed when
      base_url resolves to a private address. Default false - guard stays on
      (github-public back-compat).

  bin_dir:
    type: string
    default: /usr/local/bin
    pattern: "^/[A-Za-z0-9._/-]+$"
    description: Directory where the redis_exporter binary is placed.

  listen:
    type: string
    default: ":9121"
    pattern: "^[A-Za-z0-9._-]*:[0-9]{1,5}$"
    description: redis_exporter listen address (--web.listen-address). Defaults to :9121.

  # Path to the Redis unix socket - integration point with destiny redis-single (the
  # same path goes into redis.conf::unixsocket). redis_exporter connects via
  # --redis.addr=unix://<socket>. The caller (service) must pass the SAME
  # path into both destinies.
  redis_socket:
    type: string
    default: /var/run/redis/redis-server.sock
    pattern: "^/[A-Za-z0-9._/-]+$"
    description: >-
      Path to the Redis unix socket that redis_exporter connects to
      (--redis.addr=unix://...). Matches unixsocket in redis-server.

  # Redis password: redis_exporter authenticates with it (requirepass). Passed into
  # the unit via Environment=REDIS_PASSWORD, not ExecStart (doesn't show up in ps/journalctl).
  redis_password:
    type: string
    required: true
    secret: true
    min_length: 16
    description: >-
      Redis password (requirepass). Masked in logs/traces/UI. Accepts either
      an already-resolved password OR a vault-ref: cascade - the service passes
      a vault-ref, resolution happens Soul-side.

  # ACL username for redis_exporter auth (--redis.user=<user>). Required when
  # Redis runs on ACL WITHOUT requirepass (default-user removed): without --redis.user the
  # exporter logs in as the default user and gets WRONGPASS. Default '' - back-compat
  # requirepass model (default-user + password in Environment, no --redis.user flag);
  # empty -> the flag is NOT added to ExecStart (conditional render in the template).
  # When set, the exporter sends AUTH <user> <password>. The password is still in
  # Environment=REDIS_PASSWORD (the user in ExecStart is not a secret). The pattern `*`
  # allows both an empty string (default) and valid Redis ACL names.
  redis_user:
    type: string
    default: ""
    pattern: "^[A-Za-z0-9._-]*$"
    description: >-
      ACL username for redis_exporter auth (--redis.user). Empty (default) -
      requirepass model (flag omitted, default-user). Set - AUTH as this ACL
      user (needed on an ACL instance without requirepass, otherwise WRONGPASS).

  # Passthrough channel for ANY redis_exporter flags beyond the base --redis.addr
  # and --web.listen-address: extra collectors (--check-keys=...,
  # --check-single-keys=...), TLS/basic-auth (--web.config.file=<path>), namespace,
  # etc. Each element is a separate ExecStart token (not split by the template on
  # whitespace), so a value with a space must be passed as one element:
  # ["--web.config.file=/etc/x.yml"]. The web.yml file itself (TLS certs/basic-auth) is
  # the operator's responsibility (separate file on the host); this destiny does NOT
  # render it, only passes through the flag (prod convention §4).
  extra_args:
    type: array
    default: []
    items:
      type: string
    description: >-
      Extra redis_exporter flags (--check-keys=..., --is-tile38,
      --web.config.file=<path> for TLS/basic-auth, etc). Each element is a
      separate ExecStart argument. web.yml for TLS is a separate file, not
      from this destiny.
