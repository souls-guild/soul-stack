# L0-испытание (Trial, ADR-023) destiny redis-exporter через харнесс-scenario apply.
#
# Render-only, герметично. Главное, что демонстрирует кейс:
#   - core.url.fetched: имя файла tarball-а несёт префикс `v` перед версией
#     (redis_exporter-v<v>.linux-<arch>) — отличие раскладки от node_exporter;
#   - сервис-аккаунт даёт DynamicUser=yes в unit-е (гибрид-правило прод-конвенции
#     §2): ручного core.user/core.group НЕТ; group-доступ к unix-сокету (770)
#     transient-юзер получает через SupplementaryGroups=redis — статический текст
#     шаблона, в render_context не попадает, в L0-плане его не видно;
#   - core.file.rendered unit: redis_addr собран CEL-ом из 'unix://' + redis_socket
#     — подключение к Redis через unix-сокет.
name: redis-exporter destiny renders fetch/extract/install/unit/service plan

# L0-render не применяет default-ы контракта — дублируем дефолты + обязательные.
#
# apply:destiny резолвится зеркалом прода (slice A, ADR-023): redis-exporter
# объявлена в _trial/service.yml::destiny[], URL — из default_destiny_source ниже
# (file://, относительно service-root = _trial/).
fixtures:
  default_destiny_source: "file://../../{name}"
  input:
    version:        "1.62.0"
    # sha256 ОБЯЗАТЕЛЕН (required:true, placeholder-дефолт убран). L0 render-only —
    # fetch не исполняется; передаём валидный тестовый 64-hex.
    sha256:         "sha256:2222222222222222222222222222222222222222222222222222222222222222"
    arch:           amd64
    redis_socket:   /var/run/redis/redis-server.sock
    redis_password: "change-me-please-32"
    # extra_args не передаём — проверяем default [] destiny: ExecStart без доп.
    # токенов, render_context.vars.extra_args = [].

assert:
  task_present:
    # Все 4 модуля плана уникальны (url.fetched / archive.extracted / file.rendered /
    # service.running) — presence-форма без дизамбигуаторов.
    #
    # url: префикс `v` перед версией в имени файла и каталоге внутри tarball-а.
    - module: core.url.fetched
      params_subset:
        url: https://github.com/oliver006/redis_exporter/releases/download/v1.62.0/redis_exporter-v1.62.0.linux-amd64.tar.gz
        path: /tmp/redis_exporter-1.62.0.tar.gz
        checksum: "sha256:2222222222222222222222222222222222222222222222222222222222222222"
        mode: "0644"
        # back-compat: github-default → SSRF-guard держится (allow_private default false).
        allow_private: false

    - module: core.archive.extracted
      params_subset:
        path: /tmp/redis_exporter-1.62.0.tar.gz
        dest: /tmp/redis_exporter-1.62.0

    # core.group/core.user шагов НЕТ: сервис-аккаунт даёт DynamicUser=yes в unit-е
    # (гибрид-правило прод-конвенции §2). Group-доступ к сокету (770) — через
    # SupplementaryGroups=redis, статический текст шаблона, в плане не виден.

    # unit: redis_addr собран CEL-ом из 'unix://' + redis_socket — подключение к
    # Redis через unix-сокет. bin_dir/listen добраны из default destiny. extra_args
    # не передан → default [] (ExecStart без доп. токенов).
    - module: core.file.rendered
      params_subset:
        path: /etc/systemd/system/redis_exporter.service
        # template-путь заменён на доставленное Keeper-ом literal-содержимое (A1, ADR-012(d)).
        template_content: "<present>"
        mode: "0644"
        owner: root
        group: root
        # Корень text/template — render_context {vars,self,role,essence}
        # (templating.md §3.2, BUG-A fix); плоского params.vars больше нет.
        render_context:
          vars:
            bin_dir: /usr/local/bin
            listen: ":9121"
            redis_addr: unix:///var/run/redis/redis-server.sock
            password: change-me-please-32
            # redis_user не передан → default '' (requirepass-модель, back-compat):
            # флаг --redis.user в ExecStart НЕ добавляется (условный рендер шаблона).
            redis_user: ""
            extra_args: []
          self:
            sid: trial-host
            choirs: []
            # traits — registry-проекция (ADR-060), пустой объект без меток.
            traits: {}
            # covens несёт incarnation.name-метку (имя scenario = apply) —
            # зеркало прод-roster `WHERE $1 = ANY(coven)` (harness single-host сахар).
            covens: [apply]
            role: ""
          role: ""
          essence: {}

    - module: core.service.running
      params_subset:
        name: redis_exporter
        enabled: true
