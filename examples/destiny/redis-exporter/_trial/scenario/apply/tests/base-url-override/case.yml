# L0-кейс: переопределение base_url на внутреннее зеркало (зеркало кейса
# node-exporter base-url-override).
#
# base_url_override=https://nexus.internal/re → харнесс передаёт его в
# destiny.base_url → CEL собирает url с зеркала вместо GitHub Releases.
# Ассерт — url шага core.url.fetched начинается с зеркала; раскладка имени
# tarball-а (префикс `v`) не меняется.
name: redis-exporter renders download url from base_url mirror override

fixtures:
  default_destiny_source: "file://../../{name}"
  input:
    version:        "1.62.0"
    sha256:         "sha256:2222222222222222222222222222222222222222222222222222222222222222"
    arch:           amd64
    redis_socket:   /var/run/redis/redis-server.sock
    redis_password: "change-me-please-32"
    base_url_override: "https://nexus.internal/re"

assert:
  task_present:
    - module: core.url.fetched
      params_subset:
        url: https://nexus.internal/re/v1.62.0/redis_exporter-v1.62.0.linux-amd64.tar.gz
        path: /tmp/redis_exporter-1.62.0.tar.gz
