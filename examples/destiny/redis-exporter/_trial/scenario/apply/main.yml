# L0-харнесс destiny redis-exporter (Trial, ADR-023). Минимальный scenario, чья
# единственная задача — apply:destiny redis-exporter, чтобы дать destiny
# render-only L0. Каноническая раскладка обёртки (ADR-023): подкаталог самой
# destiny — `redis-exporter/_trial/scenario/apply/`. Резолвер L0 зеркалит
# прод (slice A, ADR-023): apply:destiny резолвится по имени из
# `_trial/service.yml::destiny[]` + URL из `default_destiny_source` тест-кейса.
name: apply
description: >-
  Trial-харнесс: делегирует установку redis_exporter в destiny redis-exporter
  через apply:destiny. Не сервис — обёртка под L0-render destiny.

input:
  version:
    type: string
    default: "1.62.0"
    pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+$"
  sha256:
    type: string
    required: true   # fail-closed: placeholder-дефолт убран (BUG-2)
    pattern: "^sha256:[0-9a-f]{64}$"
  arch:
    type: string
    default: amd64
    enum: [amd64, arm64]
  redis_socket:
    type: string
    default: /var/run/redis/redis-server.sock
    pattern: "^/[A-Za-z0-9._/-]+$"
  redis_password:
    type: string
    required: true
    secret: true
    min_length: 16

tasks:
  - name: Apply redis-exporter destiny
    apply:
      destiny: redis-exporter
      input:
        version:        "${ input.version }"
        sha256:         "${ input.sha256 }"
        arch:           "${ input.arch }"
        redis_socket:   "${ input.redis_socket }"
        redis_password: "${ input.redis_password }"
