# service.yml L0-обёртки destiny redis-exporter (Trial, ADR-023).
#
# Обёртка не настоящий сервис: единственная роль — дать standalone destiny
# redis-exporter render-only L0-проверку через scenario apply:destiny. Резолв
# apply:destiny зеркалит ПРОД (slice A): name → service.yml::destiny[] + URL из
# default_destiny_source (case.yml). Поэтому даже обёртке нужен service.yml с
# объявленной зависимостью.
name: trial-redis-exporter
state_schema_version: 1
description: >-
  L0-харнесс destiny redis-exporter (ADR-023). Не сервис — scenario-обёртка под
  render-only Trial. state_schema здесь номинальный (Trial L0 его не ассертит).

state_schema:
  type: object

destiny:
  - { name: redis-exporter, ref: v1.0.0 }
