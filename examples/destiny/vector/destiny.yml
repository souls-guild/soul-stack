name: vector
description: >-
  Install Vector (vectordotdev/vector) log-shipping agent from a pinned GitHub
  release tarball and run it as a hardened systemd service under a stable system
  account (vector, persistent disk-buffer needs a stable uid — NOT DynamicUser),
  tailing service log files and forwarding them to a central collector
  (loki / elasticsearch / vector / console sink).

# Версия destiny — git ref (ADR-007). Поля `version:` верхнего уровня нет. Список
# задач — в tasks/main.yml. Только core-модули → required_modules: не нужен.
#
# ★ Наблюдаемость: Vector — лог-плоскость (sources→transforms→sinks, PUSH логов),
# ДОПОЛНЯЕТ node-exporter (метрики хоста, pull) и redis-exporter (метрики Redis),
# НЕ заменяет их. Три разных observability-слоя (ADR-065 amends ADR-064/024).
#
# Раскладка клонирует node-exporter (install tarball GitHub + sha256 → extract →
# file.present бинарь + стабильный system-аккаунт + hardened systemd unit +
# service.running + restarted onchanges). Отличие от node-exporter/redis-exporter:
# arch tarball-а Vector кодируется как <arch>-unknown-linux-gnu (Rust-триплет),
# поэтому soulprint.self.os.arch (amd64/arm64) маппится в x86_64/aarch64 CEL-ом.
#
# ★ Стабильный сервис-аккаунт (НЕ DynamicUser): у Vector persistent disk-buffer
# (data_dir) — очередь на диске переживает рестарт и требует фиксированного
# uid-владельца (прод-конвенция §2, stateful-ветка — как textfile-каталог
# node-exporter). DynamicUser тут непригоден.

input:
  # REQUIRED без дефолта: версия артефакта — осознанный выбор оператора, не «какая-нибудь».
  version:
    type: string
    required: true
    pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+$"
    description: >-
      Версия Vector (GitHub Releases vectordotdev/vector, без префикса v).

  # checksum tarball-а Vector (<arch>-unknown-linux-gnu). core.url.fetched
  # верифицирует его ДО публикации файла. ОБЯЗАТЕЛЬНЫЙ, без дефолта (fail-closed):
  # нет хэша → честный отказ, а не fetch с placeholder-ом, который верификация всё
  # равно отвергнет. Значение — из sha256sums.txt GitHub-релиза vectordotdev/vector
  # под пару (version, arch) для vector-<v>-<triplet>.tar.gz.
  sha256:
    type: string
    required: true
    pattern: "^sha256:[0-9a-f]{64}$"
    description: >-
      SHA-256 tarball-а Vector (форма "sha256:<hex>"). Должен соответствовать паре
      version + arch; берётся из sha256sums.txt GitHub-релиза vectordotdev/vector.

  # https-only (core.url отвергнёт http:// на Validate без allow_http). Полный URL
  # tarball-а собирается CEL-ом в tasks/install.yml из base_url + version + triplet.
  base_url:
    type: string
    default: "https://github.com/vectordotdev/vector/releases/download"
    pattern: "^https://[A-Za-z0-9._/:-]+$"
    description: >-
      Корень загрузки релизов Vector. По умолчанию GitHub Releases;
      переопределяется на внутреннее зеркало/nexus-proxy.

  bin_dir:
    type: string
    default: /usr/local/bin
    pattern: "^/[A-Za-z0-9._/-]+$"
    description: Каталог, куда раскладывается бинарь vector.

  user:
    type: string
    default: vector
    pattern: "^[a-z_][a-z0-9_-]*$"
    description: >-
      Системный сервис-аккаунт vector. Стабильный uid нужен: persistent disk-buffer
      (data_dir) переживает рестарты (прод-конвенция §2, stateful-ветка).

  group:
    type: string
    default: vector
    pattern: "^[a-z_][a-z0-9_-]*$"
    description: >-
      Primary-группа сервис-аккаунта vector и владелец data_dir. Задаётся независимо
      от user (по умолчанию совпадает с именем аккаунта).

  data_dir:
    type: string
    default: /var/lib/vector
    pattern: "^/[A-Za-z0-9._/-]+$"
    description: >-
      Каталог данных Vector (global data_dir): persistent disk-buffer сдвигов
      прочитанных файлов и очередь sink-а. Переживает рестарт → владелец = сервис-
      аккаунт (стабильный uid).

  log_level:
    type: string
    default: info
    enum: [trace, debug, info, warn, error]
    description: Уровень логирования самого Vector (env VECTOR_LOG). По умолчанию info.

  # ── sink: центральный коллектор логов ────────────────────────────────────────
  # Единственный sink агента. Тип выбирает секцию рендера vector.yaml (условный range
  # по sink_type в templates/vector.yaml.tmpl): loki (Grafana Loki push API) /
  # elasticsearch (bulk API) / vector (vector-to-vector gRPC на агрегатор) / console
  # (stdout, для отладки — endpoint не нужен).
  sink_type:
    type: string
    default: console
    enum: [loki, elasticsearch, vector, console]
    description: >-
      Тип sink-а (куда шлём логи). loki — Grafana Loki (endpoint = URL push API);
      elasticsearch — ES bulk (endpoint = URL); vector — vector-to-vector gRPC на
      центральный агрегатор (endpoint = host:port); console — stdout для отладки
      (endpoint игнорируется). Дефолт console (безопасно, без внешней инфры).

  # Пусто → допустимо только для sink_type=console (отладка). Для loki/elasticsearch/
  # vector — адрес центрального коллектора. Валидность (сетевой vs URL) не проверяем
  # схемой: разные sink-типы принимают разные формы (URL / host:port).
  sink_endpoint:
    type: string
    default: ""
    description: >-
      Адрес центрального коллектора логов. Форма зависит от sink_type: loki/
      elasticsearch — URL (https://...); vector — host:port gRPC-агрегатора;
      console — не используется. Пусто допустимо только для console.

  # ACL/токен доступа к коллектору. Секрет: маскируется в логах/трейсах/UI.
  # Передаётся в vector.yaml через Environment=VECTOR_SINK_TOKEN (не в самом
  # конфиг-файле в открытом виде, симметрия REDIS_PASSWORD redis-exporter). Пусто →
  # sink без аутентификации (console / открытый внутренний коллектор). Принимает уже
  # зарезолвленный секрет ИЛИ vault-ref (каскад: сервис передаёт vault-ref, резолв
  # Soul-side).
  sink_auth_ref:
    type: string
    default: ""
    secret: true
    description: >-
      Токен/пароль доступа к коллектору логов (Bearer/basic). Маскируется в логах/
      трейсах/UI. Пробрасывается в unit через Environment=VECTOR_SINK_TOKEN. Пусто —
      sink без аутентификации.

  # ── источники логов ──────────────────────────────────────────────────────────
  # Список путей/glob-ов лог-файлов сервиса, которые Vector читает (source type file,
  # read_from end). Каждый элемент — путь или glob (/var/log/redis/*.log). Собираются
  # в ОДИН file-source `service_logs` (include: [...]). Пусто → source не рендерится
  # (агент стартует, но ничего не читает — валидный degenerate-конфиг).
  log_sources:
    type: array
    default: []
    items:
      type: string
      pattern: "^/[A-Za-z0-9._/*-]+$"
    description: >-
      Пути/glob-ы лог-файлов сервиса для чтения (source type file, read_from end).
      Каждый элемент — абсолютный путь или glob (/var/log/redis/*.log). Пусто —
      Vector стартует без file-source.

  # Дополнительно тянуть системный журнал (source type journald). Отдельный флаг:
  # journald-source не требует путей (читает systemd-journal), включается независимо
  # от файловых log_sources. false → journald-source не рендерится.
  journald:
    type: boolean
    default: false
    description: >-
      Читать системный журнал systemd (source type journald) в дополнение к файловым
      log_sources. По умолчанию выключено (только файлы).
