# vars.yml — vector destiny locals (docs/destiny/vars.md): invariants, the SAME
# for all incarnations and NOT overridable from outside (not input — the "contract vs
# internals" boundary). Resolved ONCE per destiny pass (per-host) before tasks; referencing
# input.* is allowed (vars are computed AFTER input validation). File is committed to the
# destiny repo git — no secrets here.

# ── vector systemd service name ("service name lives in vars, EVERYWHERE" directive) ──────────────
# INVARIANT (vars, not input): the unit name is a contract between the unit file,
# core.service.running/restarted and the template's SyslogIdentifier. Match with the
# binary name (vector) is coincidental.
service_name: vector

# ── Rust arch triplet for URL and paths inside the tarball ───────────────────────────
# INVARIANT (vars, not input): Vector publishes releases with a Rust target triplet in the name
# (vector-<v>-<arch>-unknown-linux-gnu.tar.gz), not amd64/arm64 like Prometheus
# exporters. soulprint.self.os.arch returns amd64/arm64 (proto soulprint.proto) —
# we map it to x86_64/aarch64. Declared as ONE var: both the URL (install.yml) and the binary
# path inside the extracted directory (src_bin below) read the same value. Unknown
# arch → empty string (URL ends up malformed, fetch fails honestly — not our case:
# soulprint only gives amd64/arm64).
arch_triplet: "${ soulprint.self.os.arch == 'arm64' ? 'aarch64-unknown-linux-gnu' : (soulprint.self.os.arch == 'amd64' ? 'x86_64-unknown-linux-gnu' : '') }"

# ── Artifact paths in the temp directory ("download path in vars" directive) ───────
# INVARIANT (vars, not input): the tarball is downloaded to /tmp and extracted next to it; /tmp
# is a fixed staging area, no need for the operator to change it. Names depend on input.version
# (vars are computed after input validation). install.yml takes ${ vars.tarball_path }
# (fetch.path / extract.path) and ${ vars.extract_dir } (extract.dest).
tarball_path: "${ '/tmp/vector-' + input.version + '.tar.gz' }"
extract_dir:  "${ '/tmp/vector-' + input.version }"

# ── vector binary path (single source of truth for ALL references) ──────────────────
# Target path of the installed binary. Tasks take ${ vars.bin_path }, and the unit template
# reads the file-var DIRECTLY as `.vars.bin_path` (render_context.vars carries file-vars,
# no need for passthrough via params.vars).
bin_path: "${ input.bin_dir + '/vector' }"

# src_bin — the binary path INSIDE the extracted release. Vector's GitHub Releases layout:
# the tarball unpacks into subdirectory vector-<triplet>/bin/vector (Rust arch triplet,
# see arch_triplet). service.yml takes ${ vars.src_bin } as core.file.present.src.
src_bin: "${ vars.extract_dir + '/vector-' + vars.arch_triplet + '/bin/vector' }"

# ── vector.yaml config directory and path ("service name/paths in vars" directive) ─
# INVARIANT: Vector reads a single config file (--config-yaml <path>). config_dir —
# config directory (created by account.yml core.file.directory), config_path —
# the file itself (rendered by service.yml core.file.rendered, read by the unit's ExecStart).
config_dir:  /etc/vector
config_path: /etc/vector/vector.yaml
