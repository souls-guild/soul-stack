# tasks/service.yml — lays out the vector binary + renders vector.yaml (sources/sinks) +
# the main systemd unit.
#
# The binary install step lives HERE (not in install.yml) intentionally: its register vector_bin
# is read by the restart onchanges below, and the per-file linter (validateTaskRefs, shared/config/
# destiny_tasks.go) rejects cross-file onchanges. install.yml prepares the artifact in /tmp
# (fetch+extract), service.yml installs the binary, renders the config and brings up the service.
#
# There's no explicit daemon-reload step: core.service (daemon_reload: auto) re-reads
# systemd itself on unit-file change BEFORE start/restart.

# Lay out the binary from the extracted directory into bin_dir via core.file.present src:
# (copies the content of a regular file from the host; docs/module/core/file). Idempotency
# is native: the desired hash = sha256(content of src), changed strictly on binary byte change
# (or mode/owner drift). register — a version upgrade (changed=true) restarts the service.
- name: Install vector binary
  module: core.file.present
  register: vector_bin
  params:
    path: "${ vars.bin_path }"
    src: "${ vars.src_bin }"
    mode: "0755"
    owner: root
    group: root

# Vector configuration (vector.yaml: sources/transforms/sinks). Go text/template strict
# (ADR-010, Variant B): the template reads input DIRECTLY (.input.log_sources / .input.journald
# / .input.sink_type / .input.sink_endpoint / .input.log_level) and file-vars (.vars.*).
# The sink_auth_ref secret is NOT written into the config — it goes into the unit via Environment (below),
# ExecStart reads env VECTOR_SINK_TOKEN. register — restart on config change.
#
# mode 0640 owner root group vector: the config may carry the collector address; read by the
# service account via group-read, world-read is closed.
- name: Render vector configuration
  module: core.file.rendered
  register: vector_config
  params:
    path: "${ vars.config_path }"
    template: templates/vector.yaml.tmpl
    mode: "0640"
    owner: root
    group: "${ input.group }"

# Main systemd unit (.tmpl, ADR-010). register — restart on file change.
# The collector secret is passed into the unit via Environment=VECTOR_SINK_TOKEN
# (sink_auth_ref, masked on output): it doesn't appear in vector.yaml on disk, and in ps/
# journalctl only the env name shows up, not the value (systemd Environment isn't logged).
- name: Render vector systemd unit
  module: core.file.rendered
  register: vector_unit
  params:
    path: "${ '/etc/systemd/system/' + vars.service_name + '.service' }"
    template: templates/vector.service.tmpl
    mode: "0644"
    owner: root
    group: root
    vars:
      # The collector access secret is the only vars-passthrough (vector.yaml itself
      # doesn't have it). Already-resolved secret OR '' (sink without auth). seal-masking on output.
      sink_token: "${ input.sink_auth_ref }"

- name: Ensure vector is running and enabled at boot
  module: core.service.running
  params:
    name: "${ vars.service_name }"
    enabled: true

# Restart the daemon — reactively on ANY of three: config (vector_config), unit file
# (vector_unit) OR reinstalled binary (vector_bin, changed on version upgrade).
# daemon-reload on unit change is done by core.service itself before restart.
- name: Restart vector because config, unit or binary changed
  module: core.service.restarted
  onchanges: [vector_config, vector_unit, vector_bin]
  timeout: 30s
  params:
    name: "${ vars.service_name }"
