# tasks/install.yml — скачивание и распаковка релизного tarball-а Vector.
# Тройка установки разнесена по границе include из-за ЗАГРУЗОЧНОГО per-file линтера
# (validateTaskRefs, shared/config/destiny_tasks.go): cross-file onchanges отвергается
# как unknown_register_reference, поэтому раскладка бинаря (register vector_bin) живёт
# в service.yml рядом с рестартом. Здесь — только fetch + распаковка, без register-ов.
#
# arch для URL — Rust-триплет vars.arch_triplet (маппинг soulprint.self.os.arch →
# <arch>-unknown-linux-gnu, см. vars.yml).

# 1. Скачать tarball во временный путь. URL собирается CEL-ом из base_url + version +
#    триплет. checksum ОБЯЗАТЕЛЕН (fail-closed): core.url.fetched верифицирует SHA-256
#    ДО публикации файла (input.sha256, форма "sha256:<hex>").
- name: Fetch vector tarball
  module: core.url.fetched
  params:
    url: "${ input.base_url + '/v' + input.version + '/vector-' + input.version + '-' + vars.arch_triplet + '.tar.gz' }"
    path: "${ vars.tarball_path }"
    checksum: "${ input.sha256 }"
    mode: "0644"
    # SSRF-guard opt-out при private-resolve base_url (паттерн redis destiny.yml install.allow_private).
    allow_private: "${ input.allow_private }"

# 2. Распаковать tarball в каталог. format auto-detect по .tar.gz. Идемпотентно:
#    core.archive пишет marker и повторно не распаковывает тот же архив. Пути — из
#    vars (tarball_path / extract_dir), один источник правды.
- name: Extract vector tarball
  module: core.archive.extracted
  params:
    path: "${ vars.tarball_path }"
    dest: "${ vars.extract_dir }"
