# tasks/account.yml — стабильный сервис-аккаунт vector + каталоги данных и конфигурации.
#
# В отличие от stateless-ветки прод-конвенции §2 (DynamicUser=yes, как redis-exporter),
# держим ручной system-аккаунт (stateful-ветка §2): у Vector persistent disk-buffer
# (data_dir) — очередь сдвигов прочитанных файлов и sink-а переживает рестарты и
# принадлежит фиксированному uid (иначе после смены uid Vector не прочитает свой
# checkpoint). Группа создаётся ДО пользователя (core.user -g требует существующую
# primary-группу). Имя группы — input.group (по умолчанию совпадает с input.user, но
# задаётся независимо), чтобы владелец data_dir не был жёстко прибит к имени аккаунта.

- name: Ensure the vector system group exists
  module: core.group.present
  params:
    name: "${ input.group }"
    system: true

# home НЕ задаём: core.user.present ВСЕГДА вызывает useradd с -M (каталог не создаётся),
# поэтому отсутствие `home:` = system-аккаунт без домашней директории (паритет ansible
# create_home: no).
- name: Ensure the vector system user exists
  module: core.user.present
  params:
    name: "${ input.user }"
    system: true
    group: "${ input.group }"
    shell: /usr/sbin/nologin

# data_dir — persistent disk-buffer Vector (global data_dir): checkpoint-сдвиги
# прочитанных файлов + очередь sink-а. Декларативное состояние core.file.directory:
# idempotent по mode/owner/group, чинит дрейф. owner/group — сервис-аккаунт (Vector
# читает/пишет буфер под своим uid). mode 0700: буфер может содержать необработанные
# записи логов — доступ только владельцу.
- name: Ensure vector data directory exists
  module: core.file.directory
  params:
    path:  "${ input.data_dir }"
    owner: "${ input.user }"
    group: "${ input.group }"
    mode:  "0700"

# config_dir — каталог конфигурации (/etc/vector). Владелец root (конфиг пишет root,
# читает сервис-аккаунт по group/other-read юнита). mode 0755: сам vector.yaml
# рендерится 0640 (см. service.yml).
- name: Ensure vector config directory exists
  module: core.file.directory
  params:
    path:  "${ vars.config_dir }"
    owner: root
    group: "${ input.group }"
    mode:  "0750"
