# L0 trial (Trial, ADR-023) for destiny vector: sink_type=loki + journald + auth token.
#
# Complements render-defaults (console/file-only): exercises the second sink-selection
# branch and the journald source. Render-only: L0 does not execute the vector.yaml
# content (loki section); the delivery signal is render_context.input (sink_type=loki +
# endpoint + journald=true) for the config and render_context.vars.sink_token (the
# resolved collector secret) for the unit.
#
# ★ Covers the input.journald=true branch (render-defaults only exercises false): the
# soul-trial coverage gate requires both.
name: vector destiny renders loki sink with journald source and auth token

fixtures:
  default_destiny_source: "file://../../{name}"
  input:
    version: "0.40.0"
    sha256: "sha256:2222222222222222222222222222222222222222222222222222222222222222"
    sink_type: loki
    sink_endpoint: "https://loki.example.com"
    # secret is already resolved (in prod: a vault-ref, resolved Soul-side); L0 passes the value directly.
    sink_auth_ref: "loki-bearer-token-secret"
    log_sources: ["/var/log/redis/*.log"]
    journald: true
  soulprint:
    os:
      arch: arm64

assert:
  task_present:
    # arch arm64 → Rust triplet aarch64-unknown-linux-gnu (vars.arch_triplet mapping).
    - module: core.url.fetched
      params_subset:
        url: https://github.com/vectordotdev/vector/releases/download/v0.40.0/vector-0.40.0-aarch64-unknown-linux-gnu.tar.gz
        path: /tmp/vector-0.40.0.tar.gz
        checksum: "sha256:2222222222222222222222222222222222222222222222222222222222222222"
        mode: "0644"

    # install path for the binary inside the unpacked archive is the same aarch64 triplet.
    - module: core.file.present
      params_subset:
        path: /usr/local/bin/vector
        src: /tmp/vector-0.40.0/vector-aarch64-unknown-linux-gnu/bin/vector
        mode: "0755"

    # vector.yaml: render_context.input carries loki sink + endpoint + journald=true.
    - module: core.file.rendered
      params_subset:
        path: /etc/vector/vector.yaml
        template_content: "<present>"
        mode: "0640"
        owner: root
        group: vector
        render_context:
          input:
            version: "0.40.0"
            sha256: "sha256:2222222222222222222222222222222222222222222222222222222222222222"
            base_url: "https://github.com/vectordotdev/vector/releases/download"
            allow_private: false
            bin_dir: /usr/local/bin
            user: vector
            group: vector
            data_dir: /var/lib/vector
            log_level: info
            sink_type: loki
            sink_endpoint: "https://loki.example.com"
            sink_auth_ref: "loki-bearer-token-secret"
            log_sources: ["/var/log/redis/*.log"]
            journald: true
          vars: {}
          self:
            sid: trial-host
            covens: [apply]
            choirs: []
            traits: {}
            role: ""
            os:
              arch: arm64
          role: ""
          essence: {}

    # unit: render_context.vars.sink_token is the resolved collector secret (passed into
    # Environment=VECTOR_SINK_TOKEN). journald=true → the template adds SupplementaryGroups
    # (not visible in L0: static .tmpl text, but input.journald is present in the context).
    # render_context is checked IN FULL (deep-compare of every key, like vector.yaml above):
    # vars = file-vars + sink_token; input = all fields after defaults (loki + endpoint +
    # journald=true); self = synthetic arm64 host; essence is empty (sub-destiny isolation).
    - module: core.file.rendered
      params_subset:
        path: /etc/systemd/system/vector.service
        template_content: "<present>"
        mode: "0644"
        owner: root
        group: root
        render_context:
          vars:
            bin_path: /usr/local/bin/vector
            config_path: /etc/vector/vector.yaml
            sink_token: "loki-bearer-token-secret"
          input:
            version: "0.40.0"
            sha256: "sha256:2222222222222222222222222222222222222222222222222222222222222222"
            base_url: "https://github.com/vectordotdev/vector/releases/download"
            allow_private: false
            bin_dir: /usr/local/bin
            user: vector
            group: vector
            data_dir: /var/lib/vector
            log_level: info
            sink_type: loki
            sink_endpoint: "https://loki.example.com"
            sink_auth_ref: "loki-bearer-token-secret"
            log_sources: ["/var/log/redis/*.log"]
            journald: true
          self:
            sid: trial-host
            covens: [apply]
            choirs: []
            traits: {}
            role: ""
            os:
              arch: arm64
          role: ""
          essence: {}

    - module: core.service.running
      params_subset:
        name: vector
        enabled: true

    - module: core.service.restarted
      params_subset:
        name: vector
