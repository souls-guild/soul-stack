# coven-assign — привязка Soul-а (input.sid) к набору Coven-меток
# (input.coven) в keeper-реестре souls/coven.
#
# Тонкая обёртка вокруг keeper-side core-модуля `core.soul.registered`
# (полная спецификация — docs/keeper/modules.md). Сам destiny.yml
# (input-контракт sid + coven) — совместим, не меняется.
#
# mode: append — destiny не отменяет существующие метки, лишь добавляет
# переданные (идемпотентно). Режимы replace/remove доступны только при
# прямом вызове модуля из сценария.
#
# refresh_soulprint: false — destiny вызывается вне scenario-контекста,
# обновлять `soulprint.hosts` прогона нечего и не нужно.

- name: Register Soul with the requested coven labels
  on: keeper
  module: core.soul.registered
  params:
    sid:               "${ input.sid }"
    coven:             "${ input.coven }"
    mode:              append
    refresh_soulprint: false
