# tasks/main.yml — точка входа destiny redis-single (плоский список module-задач).
# Видит ТОЛЬКО свой input: (изоляция, ADR-009).
#
# Установка — через пакетный менеджер дистрибутива (declarative, idempotent), как
# в инлайн-источнике; tarball для самого Redis не нужен. redis.conf рендерится в
# режиме dual-access: TCP-порт 6379 (bind primary_ip + 127.0.0.1) — для обычных
# клиентов + unix-сокет (unixsocket + unixsocketperm 770) — least-privilege
# локальный путь для redis_exporter (destiny redis-exporter) и локального redis-cli.

# Пакет из репозитория дистрибутива. retry — против флапающего apt/dnf-зеркала.
# version опционален: caller может не передать ключ вовсе (required:false). Тогда
# has(input.version) ложно → version рендерится в "" → core.pkg ставит версию по
# умолчанию из репо БЕЗ =version-пина (поведение latest). Если передан — пин на
# distro-native строку (напр. 5:7.0.15-1~deb12u7).
- name: Install redis-server package
  module: core.pkg.installed
  retry: { count: 3, delay: 10s }
  params:
    name: redis-server
    version: "${ has(input.version) ? input.version : '' }"

# Каталог unix-сокета. Пакетный systemd создаёт его через RuntimeDirectory только
# при старте юнита — хрупко (порядок/тип init не гарантирован, на не-systemd хостах
# его нет). Создаём явно ДО старта redis-server, но ПОСЛЕ установки пакета: пакет
# заводит пользователя/группу redis, на которые ссылается owner/group ниже.
#
# `install -d` создаёт каталог + mode + owner/group атомарно и идемпотентно.
# core.file.present каталоги не создаёт (только файлы), а directory-state у
# core.file пока нет — отсюда core.exec.run (argv без shell, метасимволов в команде
# нет). creates: каталог уже на месте → шаг no-op (idempotency-якорь, как в
# node-exporter). mode 0755: владелец redis пишет сокет, остальные обходят
# каталог; доступ к самому сокету ограничивает unixsocketperm 770 в redis.conf.
- name: Ensure the redis socket directory exists
  module: core.exec.run
  params:
    creates: /var/run/redis
    cmd: install
    args: ["-d", "-o", "redis", "-g", "redis", "-m", "0755", "/var/run/redis"]

# redis.conf dual-access (TCP 6379 + unix-сокет). register, чтобы рестартить redis
# только при изменении конфига (онлайн-задел под сценарий update_config).
# owner/group redis, mode 0640 — конфиг читает только сервис.
- name: Render redis.conf with dual-access (TCP + unix socket)
  module: core.file.rendered
  register: redis_conf
  params:
    path: /etc/redis/redis.conf
    template: templates/redis.conf.tmpl
    mode: "0640"
    owner: redis
    group: redis
    vars:
      socket:    "${ input.redis_socket }"
      password:  "${ input.redis_password }"
      maxmemory: "${ input.maxmemory }"
      config:    "${ input.config }"

# Каталог drop-in-а systemd. core.file.rendered создаёт только файл, родительский
# каталог .service.d/ — нет, а дистрибутивный пакет redis-server его не заводит
# (drop-in-ы — наша добавка). Без этого шага rendered падает на отсутствующем
# /etc/systemd/system/redis-server.service.d/. Создаём явно ДО рендера, тем же
# идемпотентным паттерном (install -d + creates-якорь), что и сокет-каталог выше.
# mode 0755 — стандартный для systemd .d-каталогов (root:root, world-readable).
- name: Ensure the redis-server systemd drop-in directory exists
  module: core.exec.run
  params:
    creates: /etc/systemd/system/redis-server.service.d
    cmd: install
    args: ["-d", "-o", "root", "-g", "root", "-m", "0755", "/etc/systemd/system/redis-server.service.d"]

# systemd drop-in hardening поверх ДИСТРИБУТИВНОГО юнита redis-server (его нельзя
# заменять целиком — обновляется с пакетом, несёт ExecStart/Type=notify). Override
# мержится в [Service] дистрибутивного unit-а. stateful-вариант: ProtectSystem=strict
# + ReadWritePaths под фактические каталоги записи redis (data-dir/socket/pid/log),
# без них strict сломал бы запись RDB/AOF — прод-инцидент. User/Group НЕ задаются:
# аккаунт redis:redis от пакета (стабильный uid stateful-сервиса, не DynamicUser).
# MDWE намеренно нет (redis на C/jemalloc/loadable-модули). Подробности — в шаблоне.
# register, чтобы реактивно дернуть daemon-reload + restart только при изменении.
- name: Render redis-server systemd hardening drop-in
  module: core.file.rendered
  register: redis_hardening
  params:
    path: /etc/systemd/system/redis-server.service.d/hardening.conf
    template: templates/hardening.conf.tmpl
    mode: "0644"
    owner: root
    group: root

# Drop-in меняет загруженный unit → systemd обязан перечитать конфигурацию ДО
# рестарта, иначе рестарт стартует со старым (не-hardened) определением. daemon-reload
# реактивно: onchanges на drop-in-задачу. Drop-in не изменился → no-op (идемпотентно).
# argv без shell — метасимволов в команде нет.
- name: Reload systemd because the hardening drop-in changed
  module: core.exec.run
  onchanges: [redis_hardening]
  params:
    cmd: systemctl
    args: ["daemon-reload"]

- name: Ensure redis-server is running and enabled at boot
  module: core.service.running
  params:
    name: redis-server
    enabled: true

# Рестарт реактивно на изменение конфига ИЛИ drop-in: redis.conf требует рестарта
# (новые директивы), а изменённый drop-in вступает в силу только после рестарта
# (daemon-reload выше лишь перечитал unit). Порядок гарантирован позицией задач:
# drop-in → daemon-reload → restart. Ни то ни другое не изменилось → no-op.
- name: Restart redis-server because config or hardening changed
  module: core.service.restarted
  onchanges: [redis_conf, redis_hardening]
  timeout: 30s
  params:
    name: redis-server
