# L0-испытание (Trial, ADR-023) destiny node-exporter через харнесс-scenario apply.
#
# Render-only, герметично: проверяет, что apply:destiny раскрывает destiny
# node-exporter в ожидаемый плоский план задач (CEL-фаза). L0 не качает tarball,
# не ставит пакеты, не исполняет text/template (.tmpl) — только CEL-render
# YAML-выражений.
#
# Раскладка задач (include-файлы раскрыты inline ДО render):
#   install.yml   → 0 fetch, 1 extract
#   account.yml   → 2 group, 3 user, 4 directory (core.file.directory)
#   service.yml   → 5 install-бинаря, 6 unit, 7 running, 8 restarted
#   collectors.yml→ smartmon 9..14, nvme 15..21, ipmi 22..29
name: node-exporter destiny renders fetch/extract/install/account/unit/collectors plan

# L0-render берёт input как есть и НЕ применяет default-ы scenario-контракта
# (defaults подставляет Keeper при инвокации, до render-фазы). Дублируем дефолты.
#
# apply:destiny резолвится зеркалом прода (slice A, ADR-023): node-exporter
# объявлена в _trial/service.yml::destiny[], URL — из default_destiny_source ниже
# (file://, относительно service-root = _trial/; сама destiny лежит уровнем выше,
# в examples/destiny/node-exporter/).
fixtures:
  default_destiny_source: "file://../../{name}"
  input:
    version: "1.9.0"
    # sha256 ОПЦИОНАЛЕН (default ""). L0 render-only — fetch не исполняется, хэш
    # не верифицируется; передаём непустой валидный 64-hex, чтобы зафиксировать
    # проброс checksum в core.url.fetched. Пустая ветка («без проверки») покрыта
    # самой опциональностью контракта.
    sha256:  "sha256:1111111111111111111111111111111111111111111111111111111111111111"
    collectors: [smartmon, nvme, ipmi]
  # soulprint синтетического L0-хоста: destiny берёт arch напрямую из
  # soulprint.self.os.arch (URL/install-путь), а apply:input — primary_ip из
  # soulprint.self.network.primary_ip (listen-выражение). primary_ip из 10.0.0.0/8
  # → bind на internal-IP.
  soulprint:
    os:
      arch: amd64
    network:
      primary_ip: "10.0.0.5"

# Сверка params по-ключно частична (лишние ключи рендера кейс не валят); индексы
# покрываются подмножеством. bin_dir/textfile_dir/user — из default destiny.
assert:
  rendered_tasks:
    # ── install.yml: fetch + extract (индексы 0..1) ─────────────────────────────
    # url собран CEL-ом из base_url+version+arch (arch из soulprint.self.os.arch),
    # checksum-пин из apply:input.
    - index: 0
      module: core.url.fetched
      params:
        url: https://github.com/prometheus/node_exporter/releases/download/v1.9.0/node_exporter-1.9.0.linux-amd64.tar.gz
        path: /tmp/node_exporter-1.9.0.tar.gz
        checksum: "sha256:1111111111111111111111111111111111111111111111111111111111111111"
        mode: "0644"

    - index: 1
      module: core.archive.extracted
      params:
        path: /tmp/node_exporter-1.9.0.tar.gz
        dest: /tmp/node_exporter-1.9.0

    # ── account.yml: стабильный сервис-аккаунт + textfile-каталог (индексы 2..4) ─
    - index: 2
      module: core.group.present
      params:
        name: node_exporter
        system: true

    - index: 3
      module: core.user.present
      params:
        name: node_exporter
        system: true
        group: node_exporter
        shell: /usr/sbin/nologin
        home: /

    # textfile-каталог через декларативное core.file.directory (НЕ core.exec.run
    # install -d): idempotent по mode/owner/group, чинит дрейф, поддерживает dry-run.
    - index: 4
      module: core.file.directory
      params:
        path: /var/lib/node_exporter
        owner: node_exporter
        group: node_exporter
        mode: "0755"

    # ── service.yml: install-бинаря + unit + сервис (индексы 5..8) ──────────────
    # install-шаг несёт rendered shell-строку (раскладка node_exporter) — её полная
    # фиксация хрупка; module + version-aware unless достаточно. unless собран
    # CEL-ом: бинарь существует И его --version содержит `version <input.version>`
    # → exit 0 → install skip; иначе install выполняется и рестартит сервис.
    - index: 5
      module: core.cmd.shell
      params:
        unless: "test -x /usr/local/bin/node_exporter && /usr/local/bin/node_exporter --version 2>&1 | grep -qF 'version 1.9.0 '"

    # Основной hardened-unit. listen собран CEL-ом: primary_ip из 10.* → bind на
    # него + порт :9100. render_context не ассертим (self host-вариативен).
    # daemon-reload-шага НЕТ: core.service сам reload-ит перед start/restart при
    # смене unit (daemon_reload: auto). Порядок: render unit → running → restarted.
    - index: 6
      module: core.file.rendered
      params:
        path: /etc/systemd/system/node_exporter.service
        template_content: "<present>"
        mode: "0644"
        owner: root
        group: root

    - index: 7
      module: core.service.running
      params:
        name: node_exporter
        enabled: true

    - index: 8
      module: core.service.restarted
      params:
        name: node_exporter

    # ── collectors.yml: smartmon (индексы 9..14): module-only (when: остаётся в
    #    плане, вычисляется на Soul). daemon-reload-шага НЕТ: core.service.running
    #    таймера сам reload-ит при смене .timer-файла (auto). ────────────────────
    - index: 9
      module: core.pkg.installed
      params:
        name: smartmontools
    - index: 10
      module: core.file.rendered
    - index: 11
      module: core.file.rendered
      params:
        path: /etc/systemd/system/node-exporter-smartmon.service
    - index: 12
      module: core.file.rendered
      params:
        path: /etc/systemd/system/node-exporter-smartmon.timer
    - index: 13
      module: core.service.running
      params:
        name: node-exporter-smartmon.timer
        enabled: true
    - index: 14
      module: core.file.absent
      params:
        path: /etc/cron.d/node_exporter_smartmon

    # ── nvme (индексы 15..21): nvme-cli + jq (две отдельные pkg-задачи) + скрипт/
    #    unit/timer/running/cron-cleanup ──────────────────────────────────────────
    - index: 15
      module: core.pkg.installed
      params:
        name: nvme-cli
    - index: 16
      module: core.pkg.installed
      params:
        name: jq
    - index: 20
      module: core.service.running
      params:
        name: node-exporter-nvme.timer
        enabled: true
    - index: 21
      module: core.file.absent
      params:
        path: /etc/cron.d/node_exporter_nvme

    # ── ipmi (индексы 22..29): + udev-правило + udev-reload ─────────────────────
    - index: 22
      module: core.pkg.installed
      params:
        name: ipmitool
    - index: 24
      module: core.file.rendered
      params:
        path: /lib/udev/rules.d/52-ipmi.rules
        template_content: "<present>"
        mode: "0644"
    - index: 25
      module: core.exec.run
      params:
        cmd: sh
    - index: 28
      module: core.service.running
      params:
        name: node-exporter-ipmitool.timer
        enabled: true
    - index: 29
      module: core.file.absent
      params:
        path: /etc/cron.d/node_exporter_ipmitool
