# L0-испытание (Trial, ADR-023) destiny node-exporter через харнесс-scenario apply.
#
# Render-only, герметично: проверяет, что apply:destiny раскрывает destiny
# node-exporter в ожидаемый плоский план задач (CEL-фаза). L0 не качает tarball,
# не ставит пакеты, не исполняет text/template (.tmpl) — только CEL-render
# YAML-выражений.
#
# Раскладка задач (include-файлы раскрыты inline ДО render):
#   install.yml   → 0 fetch, 1 extract
#   account.yml   → 2 group, 3 user, 4 directory (core.file.directory)
#   service.yml   → 5 install-бинаря, 6 unit, 7 running, 8 restarted
#   collectors.yml→ smartmon 9..15, nvme 16..23, ipmi 24..32
#                   (каждый коллектор: pkg(+jq)/script/unit/timer/running/restarted/
#                    cron-cleanup; restarted реактивно рестартит .timer на смену
#                    его .service/.timer — симметрия с основным unit, см. ниже).
name: node-exporter destiny renders fetch/extract/install/account/unit/collectors plan

# L0-render берёт input как есть и НЕ применяет default-ы scenario-контракта
# (defaults подставляет Keeper при инвокации, до render-фазы). Дублируем дефолты.
#
# apply:destiny резолвится зеркалом прода (slice A, ADR-023): node-exporter
# объявлена в _trial/service.yml::destiny[], URL — из default_destiny_source ниже
# (file://, относительно service-root = _trial/; сама destiny лежит уровнем выше,
# в examples/destiny/node-exporter/).
fixtures:
  default_destiny_source: "file://../../{name}"
  input:
    version: "1.11.1"
    collectors: [smartmon, nvme, ipmi]
  # soulprint синтетического L0-хоста: destiny берёт arch напрямую из
  # soulprint.self.os.arch (URL/install-путь), а apply:input — primary_ip из
  # soulprint.self.network.primary_ip (listen-выражение). primary_ip из 10.0.0.0/8
  # → bind на internal-IP.
  soulprint:
    os:
      arch: amd64
    network:
      primary_ip: "10.0.0.5"

# Presence-форма (миграция 2026-06-24): тест проверяет НАЛИЧИЕ вызовов в плане, не
# их позицию. Дубли модулей (core.file.rendered / core.pkg.installed /
# core.service.running / core.file.absent) разводятся params_subset (path/name —
# уникальны на задачу). Сверка params_subset по-ключно частична: лишние ключи
# рендера кейс не валят. bin_dir/textfile_dir/user — из default destiny.
assert:
  task_present:
    # ── install.yml: fetch + extract ───────────────────────────────────────────
    # url собран CEL-ом из base_url+version+arch (arch из soulprint.self.os.arch).
    # checksum НЕ задаётся (скачивание без verification — idempotency по SHA-256
    # содержимого). Единственный core.url.fetched в плане.
    - module: core.url.fetched
      params_subset:
        url: https://github.com/prometheus/node_exporter/releases/download/v1.11.1/node_exporter-1.11.1.linux-amd64.tar.gz
        path: /tmp/node_exporter-1.11.1.tar.gz
        mode: "0644"

    # Единственный core.archive.extracted в плане.
    - module: core.archive.extracted
      params_subset:
        path: /tmp/node_exporter-1.11.1.tar.gz
        dest: /tmp/node_exporter-1.11.1

    # ── account.yml: стабильный сервис-аккаунт + textfile-каталог ───────────────
    - module: core.group.present
      params_subset:
        name: node_exporter
        system: true

    # home НЕ ассертим: core.user.present всегда передаёт useradd -M (каталог не
    # создаётся), поэтому `home:` в params опущен — system-аккаунт без домашней
    # директории (паритет ansible create_home: no).
    - module: core.user.present
      params_subset:
        name: node_exporter
        system: true
        group: node_exporter
        shell: /usr/sbin/nologin

    # textfile-каталог через декларативное core.file.directory (НЕ core.exec.run
    # install -d): idempotent по mode/owner/group, чинит дрейф, поддерживает dry-run.
    - module: core.file.directory
      params_subset:
        path: /var/lib/node_exporter
        owner: node_exporter
        group: node_exporter
        mode: "0755"

    # ── service.yml: install-бинаря + unit + сервис ─────────────────────────────
    # install-шаг — core.file.present с src: (копия node_exporter из распакованного
    # /tmp). Идемпотентность нативная по sha256(src) — честный changed строго при
    # смене байт бинаря; version-aware unless-guard прежнего core.cmd.shell не нужен.
    # Единственный core.file.present в плане.
    - module: core.file.present
      params_subset:
        path: /usr/local/bin/node_exporter
        src: /tmp/node_exporter-1.11.1/node_exporter-1.11.1.linux-amd64/node_exporter
        mode: "0755"
        owner: root
        group: root

    # Основной hardened-unit. listen собран CEL-ом: primary_ip из 10.* → bind на
    # него + порт :9100. render_context не ассертим (self host-вариативен).
    # daemon-reload-шага НЕТ: core.service сам reload-ит перед start/restart при
    # смене unit (daemon_reload: auto). Дизамбигуатор от других rendered — path.
    - module: core.file.rendered
      params_subset:
        path: /etc/systemd/system/node_exporter.service
        template_content: "<present>"
        mode: "0644"
        owner: root
        group: root

    - module: core.service.running
      params_subset:
        name: node_exporter
        enabled: true

    # Основной демон рестартится реактивно. params_subset: name=node_exporter
    # дизамбигуирует от трёх restarted-шагов коллекторов ниже (имя демона уникально).
    - module: core.service.restarted
      params_subset:
        name: node_exporter

    # ── collectors.yml: smartmon — module присутствует (when: остаётся в плане,
    #    вычисляется на Soul). pkg разводится name. core.service.running таймера
    #    daemon-reload-ит при смене .timer (auto), но НЕ рестартит уже запущенный
    #    .timer → отдельный restarted реактивно перезапускает таймер на смену его
    #    .service/.timer (новое расписание/sandbox подхватываются). ────────────────
    - module: core.pkg.installed
      params_subset:
        name: smartmontools
    - module: core.file.rendered
      params_subset:
        path: /etc/systemd/system/node-exporter-smartmon.service
    - module: core.file.rendered
      params_subset:
        path: /etc/systemd/system/node-exporter-smartmon.timer
    - module: core.service.running
      params_subset:
        name: node-exporter-smartmon.timer
        enabled: true
    - module: core.service.restarted
      params_subset:
        name: node-exporter-smartmon.timer
    - module: core.file.absent
      params_subset:
        path: /etc/cron.d/node_exporter_smartmon

    # ── nvme: nvme-cli + jq (две отдельные pkg-задачи) + timer/running/restarted/
    #    cron-cleanup ──────────────────────────────────────────────────────────────
    - module: core.pkg.installed
      params_subset:
        name: nvme-cli
    - module: core.pkg.installed
      params_subset:
        name: jq
    - module: core.service.running
      params_subset:
        name: node-exporter-nvme.timer
        enabled: true
    - module: core.service.restarted
      params_subset:
        name: node-exporter-nvme.timer
    - module: core.file.absent
      params_subset:
        path: /etc/cron.d/node_exporter_nvme

    # ── ipmi: + udev-правило + udev-reload + timer/running/restarted/cron-cleanup ──
    - module: core.pkg.installed
      params_subset:
        name: ipmitool
    - module: core.file.rendered
      params_subset:
        path: /lib/udev/rules.d/52-ipmi.rules
        template_content: "<present>"
        mode: "0644"
    # Единственный core.exec.run в плане (udev-reload). cmd: sh + args дизамбигуируют.
    - module: core.exec.run
      params_subset:
        cmd: sh
    - module: core.service.running
      params_subset:
        name: node-exporter-ipmitool.timer
        enabled: true
    - module: core.service.restarted
      params_subset:
        name: node-exporter-ipmitool.timer
    - module: core.file.absent
      params_subset:
        path: /etc/cron.d/node_exporter_ipmitool
