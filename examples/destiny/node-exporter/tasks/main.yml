# tasks/main.yml — точка входа destiny node-exporter. Только include-список:
# логические группы разнесены по соседним файлам, раскрываются inline ДО render
# (docs/destiny/tasks.md §4 — within-destiny include раскрывается в плоский список).
#
# Обзор конвейера:
#   install.yml    — fetch tarball → extract (подготовка артефакта в /tmp);
#   account.yml    — group + user node_exporter + textfile-каталог
#                    (core.file.directory);
#   service.yml    — install бинаря node_exporter (version-aware unless) + render
#                    hardened-unit + core.service.running + restarted (auto
#                    daemon-reload встроен в core.service). install-шаг бинаря
#                    здесь, а не в install.yml: его register читает onchanges
#                    рестарта, а ядро не раскрывает register через границу include
#                    (cross-file register — open Q tasks.md §12);
#   collectors.yml — textfile-коллекторы железа smartmon/nvme/ipmi
#                    (when: членство в input.collectors).

- include: install.yml

- include: account.yml

- include: service.yml

- include: collectors.yml
