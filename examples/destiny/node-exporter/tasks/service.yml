# tasks/service.yml — lays out the node_exporter binary + the main systemd unit.
#
# The binary install step lives HERE (not in install.yml) intentionally: its register
# node_exporter_bin is read by the restart onchanges below, and the per-file linter (validateTaskRefs,
# shared/config/destiny_tasks.go) rejects cross-file onchanges. install.yml prepares
# the artifact in /tmp (fetch+extract), service.yml installs the binary and brings up the service.
#
# There's no explicit daemon-reload step: core.service (daemon_reload: auto) itself re-reads
# systemd on a unit-file change BEFORE start/restart.

# Lay out the binary from the unpacked directory into bin_dir via core.file.present src:
# (copies the content of a regular file from the host; docs/module/core/file).
#
# Native IDEMPOTENCY: the desired hash = sha256(content of src), changed strictly when
# the binary's bytes change (or mode/owner drifts) — the version-aware unless-guard of the old
# core.cmd.shell isn't needed, and this is stricter than it (catches ANY byte change). register — a version
# upgrade (changed=true) restarts the service the same way a unit-file change does.
- name: Install node_exporter binary
  module: core.file.present
  register: node_exporter_bin
  params:
    path: "${ vars.bin_path }"
    src: "${ vars.src_bin }"
    mode: "0755"
    owner: root
    group: root

# Main systemd unit (.tmpl, ADR-010). register — restart when the file changes.
#
# ★ Option B (ADR-010 §3.2 amendment): params.vars is NOT needed here at all. The
# template reads operator-input `.input.<name>` directly (render_context.input), prod params — with
# a native type (list/int/map). The template reads the binary path as `.vars.bin_path` (a file-var from vars.yml,
# render_context.vars carries file-vars without passthrough).
- name: Render node_exporter systemd unit
  module: core.file.rendered
  register: node_exporter_unit
  params:
    path: "${ '/etc/systemd/system/' + vars.service_name + '.service' }"
    template: templates/node_exporter.service.tmpl
    mode: "0644"
    owner: root
    group: root

- name: Ensure node_exporter is running and enabled at boot
  module: core.service.running
  params:
    name: "${ vars.service_name }"
    enabled: true

# Restarting the main daemon — reacts to EITHER of two: the unit file (node_exporter_unit)
# OR the reinstalled binary (node_exporter_bin, changed on a version upgrade — byte
# change). daemon-reload on a unit change is done by core.service itself before the restart.
- name: Restart node_exporter because unit or binary changed
  module: core.service.restarted
  onchanges: [node_exporter_unit, node_exporter_bin]
  timeout: 30s
  params:
    name: "${ vars.service_name }"
