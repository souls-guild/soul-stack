# tasks/service.yml — раскладка бинаря node_exporter + основной systemd-unit.
#
# Install-шаг бинаря живёт ЗДЕСЬ (а не в install.yml) намеренно: его register
# node_exporter_bin читает onchanges рестарта ниже, а register-ссылки в onchanges
# валидирует ЗАГРУЗОЧНЫЙ per-file линтер (validateTaskRefs, shared/config/
# destiny_tasks.go) — onchanges на register из ДРУГОГО include-файла отвергается как
# unknown_register_reference. (Within-destiny include уплощается ДО render — tasks.md
# §4, — keeper-side registerIndex плоский, — но проверка ссылок per-file.) Поэтому
# register и его onchanges-потребитель обязаны быть в одном файле: install.yml готовит
# артефакт в /tmp (fetch+extract), service.yml ставит бинарь и поднимает сервис.
#
# Явного daemon-reload-шага НЕТ: core.service (daemon_reload: auto, default) сам
# перечитывает конфигурацию systemd при смене unit-файла ПЕРЕД start/restart.
# Порядок: install бинаря → render unit → core.service.running → core.service.restarted.

# Разложить бинарь из распакованного каталога в bin_dir. core.file.present умеет
# src: — копию содержимого regular-файла с хоста (docs/module/core/file: src
# взаимоисключён с content, абсолютный путь, Lstat-проверка regular-file, атомарная
# запись). src — node_exporter из распакованного во /tmp каталога релиза.
#
# Идемпотентность — нативная, от самого core.file.present: желаемый хэш =
# sha256(содержимое src), changed=true ТОЛЬКО если целевого файла нет либо его
# sha256 отличается от sha256 src (либо дрейфит mode/owner). Тот же бинарь на
# повторном прогоне → байты совпали → changed=false. Это убирает нужду в
# version-aware unless-guard прежнего core.cmd.shell (который сам по себе всегда
# changed=true и потому требовал guard, чтобы не холостить onchanges-рестарт):
# разные версии = разные байты бинаря → честный changed строго при апгрейде, что
# эквивалентно version-guard-у и строже его (ловит ЛЮБУЮ смену байт, не только
# смену строки --version). register — install-шаг подключён к onchanges рестарта:
# апгрейд версии (changed=true) рестартит сервис так же, как изменение unit-файла.
- name: Install node_exporter binary
  module: core.file.present
  register: node_exporter_bin
  params:
    path: "${ vars.bin_path }"
    src: "${ vars.src_bin }"
    mode: "0755"
    owner: root
    group: root

# Основной systemd-unit. Рендерится из .tmpl (ADR-010): literal-шаблон +
# render_context → core.file.rendered раскладывает на хосте. register — чтобы
# рестартить unit при изменении файла.
#
# Вариант B (ADR-010 §3.2 amendment): operator-input доезжает в шаблон через
# render_context.input напрямую — шаблон читает `.input.<name>` (user/group/
# listen/textfile_dir + прод-параметры демона), БЕЗ redundant passthrough
# `params.vars` каждого input-поля. ПРОИЗВОДНЫЕ destiny-локалы (vars.yml) тоже
# доезжают в шаблон НАПРЯМУЮ: render_context.vars = file-vars (vars.yml) + task-
# level params.vars (override). Поэтому params.vars здесь НЕ нужен вовсе — путь
# бинаря шаблон читает как `.vars.bin_path` (file-var из vars.yml), а не через
# passthrough exporter_bin. Прод-параметры (gomaxprocs/disabled_collectors/
# enabled_collectors/collector_options/log_level/log_format/web_telemetry_path/
# fs_mount_points_exclude/netdev_device_exclude) — это input-поля; шаблон берёт
# их из `.input.*` нативным типом (list/int/map уезжают как есть, ADR-010).
- name: Render node_exporter systemd unit
  module: core.file.rendered
  register: node_exporter_unit
  params:
    path: "${ '/etc/systemd/system/' + vars.service_name + '.service' }"
    template: templates/node_exporter.service.tmpl
    mode: "0644"
    owner: root
    group: root

- name: Ensure node_exporter is running and enabled at boot
  module: core.service.running
  params:
    name: "${ vars.service_name }"
    enabled: true

# Рестарт основного демона — реактивно на ЛЮБОЕ из двух изменений: unit-файл
# (node_exporter_unit) ИЛИ переустановленный бинарь (node_exporter_bin,
# срабатывает при апгрейде версии — unless не satisfied → install changed).
# core.service onchanges принимает список register-ов (docs/module/core/service:
# onchanges: [a, b]) — рестарт триггерится, если изменился хотя бы один.
# daemon-reload при смене unit core.service делает сам перед рестартом.
- name: Restart node_exporter because unit or binary changed
  module: core.service.restarted
  onchanges: [node_exporter_unit, node_exporter_bin]
  timeout: 30s
  params:
    name: "${ vars.service_name }"
