# tasks/service.yml — раскладка бинаря node_exporter + основной systemd-unit.
#
# Install-шаг бинаря живёт ЗДЕСЬ (а не в install.yml) намеренно: его register
# node_exporter_bin читает onchanges рестарта ниже, а register-ссылки в onchanges
# валидирует ЗАГРУЗОЧНЫЙ per-file линтер (validateTaskRefs, shared/config/
# destiny_tasks.go) — onchanges на register из ДРУГОГО include-файла отвергается как
# unknown_register_reference. (Within-destiny include уплощается ДО render — tasks.md
# §4, — keeper-side registerIndex плоский, — но проверка ссылок per-file.) Поэтому
# register и его onchanges-потребитель обязаны быть в одном файле: install.yml готовит
# артефакт в /tmp (fetch+extract), service.yml ставит бинарь и поднимает сервис.
#
# Явного daemon-reload-шага НЕТ: core.service (daemon_reload: auto, default) сам
# перечитывает конфигурацию systemd при смене unit-файла ПЕРЕД start/restart.
# Порядок: install бинаря → render unit → core.service.running → core.service.restarted.

# Разложить бинарь из распакованного каталога в bin_dir. core.file.present
# копировать из пути не умеет (только inline-content), а бинарь — контент из
# ФС → install-шаг core.cmd.shell (локальный install -m0755, без сети).
#
# Идемпотентность — версия-зависимый guard unless: install пропускается ТОЛЬКО
# если на месте уже стоит бинарь нужной версии. core.cmd «satisfied» = exit 0
# (docs/module/core/cmd: unless с exit 0 → skip, reason: unless). node_exporter
# --version печатает строку вида `node_exporter, version <X> (...)` → grep на
# литерал `version <input.version> ` даёт exit 0 при совпадении. Пробелы с ОБЕИХ
# сторон версии закрывают границы: ведущий — слева, trailing (node_exporter
# печатает пробел перед `(`) — справа, чтобы `version 1.9.0 ` матчило, а
# `version 1.9.01 ` — нет. `test -x … && … | grep -qF …`: нет бинаря ИЛИ версия
# другая → test или grep даёт non-zero → unless НЕ satisfied → install выполняется
# (перезапишет старую версию). grep-паттерн — в одинарных кавычках (пробел внутри);
# input.version под semver-pattern, в кавычках injection невозможна. register —
# install-шаг подключён к onchanges рестарта: апгрейд версии (install changed)
# рестартит сервис так же, как изменение unit-файла.
- name: Install node_exporter binary
  module: core.cmd.shell
  register: node_exporter_bin
  params:
    unless: "${ 'test -x ' + input.bin_dir + '/node_exporter && ' + input.bin_dir + '/node_exporter --version 2>&1 | grep -qF ' + \"'version \" + input.version + \" '\" }"
    cmd: >-
      install -m 0755
      '${ '/tmp/node_exporter-' + input.version + '/node_exporter-' + input.version + '.linux-' + soulprint.self.os.arch + '/node_exporter' }'
      '${ input.bin_dir + '/node_exporter' }'

# Основной systemd-unit. Рендерится из .tmpl (ADR-010): literal-шаблон +
# CEL-rendered vars → core.file.rendered раскладывает на хосте. register — чтобы
# рестартить unit при изменении файла.
- name: Render node_exporter systemd unit
  module: core.file.rendered
  register: node_exporter_unit
  params:
    path: /etc/systemd/system/node_exporter.service
    template: templates/node_exporter.service.tmpl
    mode: "0644"
    owner: root
    group: root
    vars:
      bin_dir:       "${ input.bin_dir }"
      user:          "${ input.user }"
      listen:        "${ input.listen }"
      textfile_dir:  "${ input.textfile_dir }"

- name: Ensure node_exporter is running and enabled at boot
  module: core.service.running
  params:
    name: node_exporter
    enabled: true

# Рестарт основного демона — реактивно на ЛЮБОЕ из двух изменений: unit-файл
# (node_exporter_unit) ИЛИ переустановленный бинарь (node_exporter_bin,
# срабатывает при апгрейде версии — unless не satisfied → install changed).
# core.service onchanges принимает список register-ов (docs/module/core/service:
# onchanges: [a, b]) — рестарт триггерится, если изменился хотя бы один.
# daemon-reload при смене unit core.service делает сам перед рестартом.
- name: Restart node_exporter because unit or binary changed
  module: core.service.restarted
  onchanges: [node_exporter_unit, node_exporter_bin]
  timeout: 30s
  params:
    name: node_exporter
