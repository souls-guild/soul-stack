# tasks/service.yml — раскладка бинаря node_exporter + основной systemd-unit.
#
# Install-шаг бинаря живёт ЗДЕСЬ (а не в install.yml) намеренно: его register
# node_exporter_bin читает onchanges рестарта ниже, а per-file линтер (validateTaskRefs,
# shared/config/destiny_tasks.go) отвергает cross-file onchanges. install.yml готовит
# артефакт в /tmp (fetch+extract), service.yml ставит бинарь и поднимает сервис.
#
# Явного daemon-reload-шага НЕТ: core.service (daemon_reload: auto) сам перечитывает
# systemd при смене unit-файла ПЕРЕД start/restart.

# Разложить бинарь из распакованного каталога в bin_dir через core.file.present src:
# (копия содержимого regular-файла с хоста; docs/module/core/file).
#
# ИДЕМПОТЕНТНОСТЬ нативная: желаемый хэш = sha256(содержимое src), changed строго при
# смене байт бинаря (или дрейфе mode/owner) — version-aware unless-guard прежнего
# core.cmd.shell не нужен, и это строже его (ловит ЛЮБУЮ смену байт). register — апгрейд
# версии (changed=true) рестартит сервис так же, как изменение unit-файла.
- name: Install node_exporter binary
  module: core.file.present
  register: node_exporter_bin
  params:
    path: "${ vars.bin_path }"
    src: "${ vars.src_bin }"
    mode: "0755"
    owner: root
    group: root

# Основной systemd-unit (.tmpl, ADR-010). register — рестарт при изменении файла.
#
# ★ Вариант B (ADR-010 §3.2 amendment): params.vars здесь НЕ нужен вовсе. operator-input
# шаблон читает `.input.<name>` напрямую (render_context.input), прод-параметры — нативным
# типом (list/int/map). Путь бинаря шаблон читает как `.vars.bin_path` (file-var из vars.yml,
# render_context.vars несёт file-vars без passthrough).
- name: Render node_exporter systemd unit
  module: core.file.rendered
  register: node_exporter_unit
  params:
    path: "${ '/etc/systemd/system/' + vars.service_name + '.service' }"
    template: templates/node_exporter.service.tmpl
    mode: "0644"
    owner: root
    group: root

- name: Ensure node_exporter is running and enabled at boot
  module: core.service.running
  params:
    name: "${ vars.service_name }"
    enabled: true

# Рестарт основного демона — реактивно на ЛЮБОЕ из двух: unit-файл (node_exporter_unit)
# ИЛИ переустановленный бинарь (node_exporter_bin, changed при апгрейде версии — смена
# байт). daemon-reload при смене unit core.service делает сам перед рестартом.
- name: Restart node_exporter because unit or binary changed
  module: core.service.restarted
  onchanges: [node_exporter_unit, node_exporter_bin]
  timeout: 30s
  params:
    name: "${ vars.service_name }"
