# tasks/account.yml — стабильный сервис-аккаунт node_exporter + textfile-каталог.
#
# В отличие от stateless-ветки прод-конвенции §2 (DynamicUser=yes, аккаунт даёт
# сам systemd), держим ручной system-аккаунт (stateful-ветка §2): textfile-каталог
# переживает рестарты и читается root-сборщиками — нужен стабильный uid-владелец.
# Группа создаётся ДО пользователя (core.user -g требует существующую primary-группу).
# Имя группы — input.group (по умолчанию совпадает с input.user, но задаётся
# независимо), чтобы primary-группа и владелец каталога не были жёстко прибиты к
# имени аккаунта.

- name: Ensure the node_exporter system group exists
  module: core.group.present
  params:
    name: "${ input.group }"
    system: true

# home НЕ задаём: core.user.present ВСЕГДА вызывает useradd с флагом -M (домашний
# каталог не создаётся — docs/module/core/user, soul/internal/coremod/user/user.go),
# поэтому отсутствие `home:` = «system-аккаунт без домашней директории» (паритет с
# ansible create_home: no). Явный `home: /` лишний — он лишь прописал бы / в поле
# home /etc/passwd, каталог всё равно не создаётся.
- name: Ensure the node_exporter system user exists
  module: core.user.present
  params:
    name: "${ input.user }"
    system: true
    group: "${ input.group }"
    shell: /usr/sbin/nologin

# textfile-каталог. Декларативное состояние core.file.directory: idempotent по
# mode/owner/group, чинит дрейф, поддерживает dry-run (в отличие от императивного
# core.exec.run install -d). owner/group — сервис-аккаунт (oneshot-сборчики пишут
# туда от root, основной демон читает).
- name: Ensure textfile collector directory exists
  module: core.file.directory
  params:
    path:  "${ input.textfile_dir }"
    owner: "${ input.user }"
    group: "${ input.group }"
    mode:  "0755"
