# tasks/collectors.yml — textfile-коллекторы железа (smartmon / nvme / ipmi).
#
# Каждый шаг коллектора несёт when: членство в input.collectors (голый CEL,
# top-level expression-ключ — без ${…}). systemd-Condition в .service/.timer
# дополнительно не даёт коллектору стартовать там, где железа нет.
#
# Явных daemon-reload-шагов НЕТ: core.service.running таймера (daemon_reload:
# auto, default) сам перечитывает systemd при смене .timer-файла перед start.
# udev-reload (ipmi) остаётся — это udevadm, не systemctl.
#
# Реактивный рестарт таймера: running лишь поднимает остановленный .timer и делает
# daemon-reload, но НЕ перезапускает УЖЕ ЗАПУЩЕННЫЙ таймер. Поэтому смена .service
# или .timer коллектора (расписание OnCalendar, sandbox-директивы, пути из input)
# должна реактивно рестартить таймер — иначе старое расписание/окружение остаётся
# жить до ручного перезапуска. Симметрия с основным unit (tasks/service.yml:
# core.service.restarted onchanges:[node_exporter_unit, node_exporter_bin]): на
# каждый коллектор — свой restarted onchanges:[<c>_unit, <c>_timer].

# ── Коллектор smartmon (SMART-метрики дисков) ───────────────────────────────
- name: Install smartmontools for smartmon collector
  module: core.pkg.installed
  when: "'smartmon' in input.collectors"
  params:
    name: smartmontools

# Скрипт-сборщик статичен (Go-переменных нет), но кладётся через
# core.file.rendered: .tmpl-расширение обязательно для rendered, vars пуст —
# text/template strict отдаёт тело as-is. Альтернатива (inline-content в
# core.file.present) потребовала бы зашить весь bash в YAML — менее читаемо.
- name: Deploy smartmon collector script
  module: core.file.rendered
  when: "'smartmon' in input.collectors"
  params:
    path: "${ input.bin_dir + '/smartmon.sh' }"
    template: templates/smartmon.sh.tmpl
    mode: "0755"
    owner: root
    group: root
    vars: {}

- name: Render smartmon collector unit
  module: core.file.rendered
  register: smartmon_unit
  when: "'smartmon' in input.collectors"
  params:
    path: /etc/systemd/system/node-exporter-smartmon.service
    template: templates/node-exporter-smartmon.service.tmpl
    mode: "0644"
    owner: root
    group: root
    vars:
      bin_dir:      "${ input.bin_dir }"
      textfile_dir: "${ input.textfile_dir }"

- name: Render smartmon collector timer
  module: core.file.rendered
  register: smartmon_timer
  when: "'smartmon' in input.collectors"
  params:
    path: /etc/systemd/system/node-exporter-smartmon.timer
    template: templates/node-exporter-smartmon.timer.tmpl
    mode: "0644"
    owner: root
    group: root
    vars: {}

- name: Ensure smartmon timer is running and enabled
  module: core.service.running
  when: "'smartmon' in input.collectors"
  params:
    name: node-exporter-smartmon.timer
    enabled: true

# Рестарт таймера реактивно на смену его .service (smartmon_unit) ИЛИ .timer
# (smartmon_timer): running выше не перезапускает уже запущенный таймер, поэтому
# новое расписание/sandbox подхватываются только этим шагом. daemon-reload перед
# рестартом core.service делает сам (daemon_reload: auto).
- name: Restart smartmon timer because its unit or timer changed
  module: core.service.restarted
  when: "'smartmon' in input.collectors"
  onchanges: [smartmon_unit, smartmon_timer]
  timeout: 30s
  params:
    name: node-exporter-smartmon.timer

- name: Remove legacy smartmon cron job
  module: core.file.absent
  when: "'smartmon' in input.collectors"
  params:
    path: /etc/cron.d/node_exporter_smartmon

# ── Коллектор nvme (NVMe SMART-метрики) ─────────────────────────────────────
- name: Install nvme-cli for nvme collector
  module: core.pkg.installed
  when: "'nvme' in input.collectors"
  params:
    name: nvme-cli

# nvme_metrics.sh парсит nvme-cli JSON через jq (~16 вызовов) — отдельная
# зависимость, ставится так же, как smartmontools/ipmitool у своих коллекторов.
- name: Install jq for nvme collector
  module: core.pkg.installed
  when: "'nvme' in input.collectors"
  params:
    name: jq

- name: Deploy nvme collector script
  module: core.file.rendered
  when: "'nvme' in input.collectors"
  params:
    path: "${ input.bin_dir + '/nvme_metrics.sh' }"
    template: templates/nvme_metrics.sh.tmpl
    mode: "0755"
    owner: root
    group: root
    vars: {}

- name: Render nvme collector unit
  module: core.file.rendered
