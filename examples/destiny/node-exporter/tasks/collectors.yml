    path: /etc/cron.d/node_exporter_nvme

# ── ipmi collector (IPMI sensors) ────────────────────────────────────────────
# In addition to the script/timer, ipmi requires a udev rule (grants the
# node_exporter group access to /dev/ipmi*) + a udev re-read on rule change.
- name: Install ipmitool for ipmi collector
  module: core.pkg.installed
  when: "'ipmi' in input.collectors"
  params:
    name: ipmitool

- name: Deploy ipmi collector script
  module: core.file.rendered
  when: "'ipmi' in input.collectors"
  params:
    # ipmitool — an awk script in textfile_dir; mode 0755 (parity with the
    # smartmon/nvme scripts: executable, no group-write).
    path: "${ input.textfile_dir + '/ipmitool' }"
    template: templates/ipmitool.tmpl
    mode: "0755"
    owner: root
    group: root
    vars: {}

- name: Deploy ipmi udev rule
  module: core.file.rendered
  register: ipmi_udev_rule
  when: "'ipmi' in input.collectors"
  params:
    path: /lib/udev/rules.d/52-ipmi.rules
    template: templates/52-ipmi.rules.tmpl
    mode: "0644"
    owner: root
    group: root
    vars:
      user: "${ input.user }"

# The udev rule is re-read via udevadm (NOT systemctl) — this is udev, not
# systemd, core.service auto-reload doesn't apply here. onchanges on the rule:
# reload only on its change (idempotent). argv without a shell doesn't work —
# we need && between the two udevadm calls, hence sh -c.
- name: Reload udev rules for ipmi
  module: core.exec.run
  when: "'ipmi' in input.collectors"
  onchanges: [ipmi_udev_rule]
  params:
    cmd: sh
    args:
      - "-c"
      - "udevadm control --reload-rules && udevadm trigger"

- name: Render ipmi collector unit
  module: core.file.rendered
  register: ipmi_unit
  when: "'ipmi' in input.collectors"
  params:
    path: /etc/systemd/system/node-exporter-ipmitool.service
    template: templates/node-exporter-ipmitool.service.tmpl
    mode: "0644"
    owner: root
    group: root
    vars:
      textfile_dir: "${ input.textfile_dir }"

- name: Render ipmi collector timer
  module: core.file.rendered
  register: ipmi_timer
  when: "'ipmi' in input.collectors"
  params:
    path: /etc/systemd/system/node-exporter-ipmitool.timer
    template: templates/node-exporter-ipmitool.timer.tmpl
    mode: "0644"
    owner: root
    group: root
    vars: {}

- name: Ensure ipmi timer is running and enabled
  module: core.service.running
  when: "'ipmi' in input.collectors"
  params:
    name: node-exporter-ipmitool.timer
    enabled: true

- name: Restart ipmi timer because its unit or timer changed
  module: core.service.restarted
  when: "'ipmi' in input.collectors"
  onchanges: [ipmi_unit, ipmi_timer]
  timeout: 30s
  params:
    name: node-exporter-ipmitool.timer

- name: Remove legacy ipmi cron job
  module: core.file.absent
  when: "'ipmi' in input.collectors"
  params:
    path: /etc/cron.d/node_exporter_ipmitool
