# tasks/install.yml — скачивание и распаковка релизного tarball-а node_exporter.
# Тройка установки разнесена по границе include из-за ЗАГРУЗОЧНОГО per-file линтера
# (validateTaskRefs, shared/config/destiny_tasks.go): cross-file onchanges отвергается
# как unknown_register_reference, поэтому раскладка бинаря (register node_exporter_bin)
# живёт в service.yml рядом с рестартом. Здесь — только fetch + распаковка, без register-ов.
#
# arch для URL берётся из soulprint.self.os.arch (доступен в destiny-CEL).

# 1. Скачать tarball во временный путь. URL собирается CEL-ом из base_url + version +
#    arch (soulprint.self.os.arch); путь — vars.tarball_path. checksum не задаём → core.url
#    идёт idempotency по SHA-256 содержимого (fetched.go: ветка checksum == "").
- name: Fetch node_exporter tarball
  module: core.url.fetched
  params:
    url: "${ input.base_url + '/v' + input.version + '/node_exporter-' + input.version + '.linux-' + soulprint.self.os.arch + '.tar.gz' }"
    path: "${ vars.tarball_path }"
    mode: "0644"

# 2. Распаковать tarball в каталог. format auto-detect по .tar.gz. Идемпотентно:
#    core.archive пишет marker и повторно не распаковывает тот же архив. Пути —
#    из vars (tarball_path / extract_dir), один источник правды.
- name: Extract node_exporter tarball
  module: core.archive.extracted
  params:
    path: "${ vars.tarball_path }"
    dest: "${ vars.extract_dir }"
