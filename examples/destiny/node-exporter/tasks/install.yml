# tasks/install.yml — скачивание и распаковка релизного tarball-а node_exporter.
# Тройка установки разнесена по границе include из-за ЗАГРУЗОЧНОГО per-file линтера:
# register-ссылки в onchanges валидируются на уровне ОДНОГО файла (validateTaskRefs,
# shared/config/destiny_tasks.go) — onchanges в одном include-файле на register из
# ДРУГОГО отвергается как unknown_register_reference. (Within-destiny include
# уплощается в плоский план ДО render — tasks.md §4, — keeper-side registerIndex
# плоский, — но проверка ссылок остаётся per-file.) Поэтому register и его onchanges-
# потребитель держатся в одном файле: раскладка бинаря (register node_exporter_bin)
# живёт в service.yml рядом с рестартом, который на неё реагирует. Здесь — только
# сетевая часть (fetch) + распаковка, без register-ов.
#
# arch для URL берётся из soulprint.self.os.arch (soulprint доступен в destiny-CEL).

# 1. Скачать tarball во временный путь. URL собирается CEL-ом из base_url +
#    version + arch (soulprint.self.os.arch). Путь скачивания — vars.tarball_path
#    (единый источник правды на download-путь, см. vars.yml). checksum не задаём —
#    core.url трактует отсутствующий checksum как «без проверки» и идёт idempotency
#    по SHA-256 содержимого (soul/internal/coremod/url/fetched.go: ветка checksum == "").
- name: Fetch node_exporter tarball
  module: core.url.fetched
  params:
    url: "${ input.base_url + '/v' + input.version + '/node_exporter-' + input.version + '.linux-' + soulprint.self.os.arch + '.tar.gz' }"
    path: "${ vars.tarball_path }"
    mode: "0644"

# 2. Распаковать tarball в каталог. format auto-detect по .tar.gz. Идемпотентно:
#    core.archive пишет marker и повторно не распаковывает тот же архив. Пути —
#    из vars (tarball_path / extract_dir), один источник правды.
- name: Extract node_exporter tarball
  module: core.archive.extracted
  params:
    path: "${ vars.tarball_path }"
    dest: "${ vars.extract_dir }"
