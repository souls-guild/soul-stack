# L2 fixture (docker-стенд), harness MVP не исполняет — ADR-023 post-MVP.
name: replica-only
description: |
  Проверяет инвариант «master не делается репликой» и идемпотентность.

  Стенд иллюстративный: applied на хосте, чей soulprint.self.network.primary_ip
  НЕ равен master_addr → ожидаем, что replicaof выполнился (хост стал
  репликой). Кейс «я и есть master» (soulprint.self.network.primary_ip ==
  master_addr) проверяется в верификации ниже как отрицательная ветка:
  команда replicaof на носителе master_addr пропускается (no-op).

# ─── Стенд ────────────────────────────────────────────────────────────────────
# Формат блока `stand:` — open Q №3 в docs/destiny/testing.md. Здесь —
# иллюстративный минимум: docker, ubuntu, push-режим (как destiny-redis).
stand:
  driver: docker
  image:  ubuntu:24.04
  mode:   push

# ─── Что применяем ────────────────────────────────────────────────────────────
input:
  hosts:
    - sid: redis-01.test.local
      role: primary
      network: { primary_ip: 10.0.0.1 }
      os: { family: debian }
      covens: [bob]
    - sid: redis-02.test.local
      role: replica
      network: { primary_ip: 10.0.0.2 }
      os: { family: debian }
      covens: [bob]
  master_addr: 10.0.0.1
  password: "vault:test/redis/password"

# Двойной прогон: фреймворк применит destiny с этим input ещё раз и проверит,
# что во втором применении не было изменений ни в одном шаге (idempotent).
expect_idempotent: true

# ─── Проверки результата ──────────────────────────────────────────────────────
verify:
  # Стенд с soulprint.self.network.primary_ip == 10.0.0.1 — это master. Инвариант:
  # шаг replicaof пропущен (when falsy), redis НЕ переведён в slave.
  - name: master-stays-master
    apply:
      destiny: core.cmd.shell
      input:
        cmd: "redis-cli role | head -1"
    expect:
      stdout: "master"

  # Стенд с soulprint.self.network.primary_ip != 10.0.0.1 — это реплика. Инвариант:
  # шаг replicaof выполнен, redis смотрит на master_addr.
  - name: replica-points-at-master
    apply:
      destiny: core.cmd.shell
      input:
        cmd: "redis-cli info replication | grep -E '^role:|^master_host:'"
    expect:
      stdout_contains: "role:slave"
