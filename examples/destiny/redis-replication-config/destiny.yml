name: redis-replication-config
description: Configure Redis replication (replicaof master) on replica hosts only

# Версия destiny — git ref, под которым закоммичен файл (см. ADR-007 в
# docs/architecture.md). Поле `version:` верхнего уровня намеренно отсутствует.
#
# Список задач — НЕ в этом файле. Он живёт в tasks/main.yml; здесь только
# манифест: input-контракт.
#
# Эта destiny использует только core-модули, поэтому required_modules: не нужен.
#
# ───────────────────────────────────────────────────────────────────────────
# ИНВАРИАНТ «master не делается репликой».
#
# destiny конфигурирует `replicaof master_addr` ТОЛЬКО на хостах, которые НЕ
# являются носителем master_addr. На самом master — idempotent no-op (master
# не делает replicaof сам на себя).
#
# Опознание «я не master» — строго ЛОКАЛЬНОЕ, без обращения к другим хостам:
# хост сравнивает свой собственный стабильный адрес (soulprint.self.network.primary_ip)
# с input.master_addr. Если совпадает — это master, шаг replicaof пропускается
# (no-op). destiny остаётся тупым изолированным кирпичом: master_addr приходит
# готовым (scenario вычислил его по модели 3-ADDR — на create declared, в
# runtime probe; destiny сам адрес мастера НЕ резолвит), hosts даёт destiny
# знание о множестве хостов кластера, но решение «реплика/не реплика»
# принимается из своего soulprint.self, не из cross-host данных.
# ───────────────────────────────────────────────────────────────────────────

input:
  hosts:
    type: array
    required: true
    min_items: 1
    items:
      type: object
      # Структура элемента — стабильные факты soulprint.hosts
      # (см. docs/scenario/orchestration.md §4.1). scenario пробрасывает этот
      # список через apply: input:; destiny напрямую soulprint.hosts не видит.
      properties:
        sid:
          type: string
          format: fqdn
        role:
          type: string
          # declared-роль из incarnation.spec.hosts[].role; может быть пустой
          # для хостов, привязанных к incarnation вне declared-spec
          # (§4.1: role может быть null) — поэтому не required.
        network:
          type: object
          # Соответствует NetworkFacts из ADR-018: основной IPv4 — primary_ip.
          properties:
            primary_ip:
              type: string
          required: [primary_ip]
        os:
          type: object
          # Свободная форма (os.family, …) — стабильные ОС-факты soulprint.hosts;
          # сами под-ключи здесь не валидируются (properties: {} + любые ключи).
          properties: {}
          additional_properties: true
        covens:
          type: array
          items:
            type: string
      required: [sid, network]
    description: >
      Множество хостов кластера (стабильные факты soulprint.hosts), чтобы
      destiny знало топологию. Решение «я реплика» принимается локально по
      soulprint.self vs master_addr, не по этому списку (изоляция destiny).

  master_addr:
    type: string
    required: true
    description: >
      Готовый адрес мастера. scenario вычислил его сам (create — declared,
      runtime — probe; модель 3-ADDR). destiny адрес НЕ резолвит.

  password:
    type: string
    required: true
    secret: true
    min_length: 16
    description: Master-auth пароль для подключения реплики к мастеру.
