name: dragonfly
description: >-
  Per-host кирпич DragonFly data-плоскости (концепция Ansible-роли, B-гибрид ADR-009):
  установка DragonFly (distro-deb / upstream-tarball) + render dragonfly.conf (FLAGFILE) из
  merged-конфига + render users.acl + сервис. ВСЯ оркестрация (топология, REPLICAOF,
  health-gate) живёт в scenario сервиса — здесь только идемпотентный install/render/service
  одного инстанса.

# Версия destiny — git ref (ADR-007). Поля `version:` верхнего уровня нет. Список задач —
# в tasks/main.yml. Только core-модули → required_modules: не нужен (community.redis
# вызывается из scenario сервиса, не из этой destiny).
#
# ★ DragonFly vs redis: отдельный destiny, копия структуры redis с подменой config-формата
# (FLAGFILE --flag=value вместо redis.conf), unit (Type=simple, binary-юнит несёт hardening
# сам) и install (один бинарь dragonfly). БЕЗ redis-модулей (.so), БЕЗ cluster-директив.
#
# ★ SENTINEL — НЕ ЗДЕСЬ (рефактор «sentinel из destiny redis»): DragonFly не несёт
# redis-sentinel, а sentinel-демон полностью разворачивает destiny `redis` в режиме
# sentinel_only (deploy_redis=false). scenario сервиса dragonfly делает ВТОРОЙ apply:destiny:
# redis рядом с apply:destiny:dragonfly (две apply:destiny в одном сценарии, ADR-009).
# Поэтому sentinel_enabled/sentinel/sentinel_users из этого input УБРАНЫ — кирпич `dragonfly`
# отвечает строго за data-плоскость DragonFly.
#
# Конфиг приходит ГОТОВЫМ merged map-ом через apply: input: config: (merge делает scenario
# сервиса) — destiny «глупая».

input:
  # ── Гейт data-плоскости dragonfly ────────────────────────────────────────────
  # deploy_dragonfly=false → НЕ разворачиваем data-плоскость DragonFly: её гасит include-when
  # (server.yml group-drop). Бинарь DragonFly и redis-tools (install.yml) при этом ставятся
  # ВСЕГДА. В сервисе dragonfly всегда true (scenario не передаёт, default) — флаг оставлен
  # для гибкости кирпича (симметрия с deploy_redis destiny `redis`).
  deploy_dragonfly:
    type: boolean
    required: false
    default: true
    description: >-
      Разворачивать ли data-плоскость DragonFly (render dragonfly.conf/users.acl/PEM +
      systemd-сервис dragonfly). По умолчанию true. false — не разворачивать data-плоскость
      (бинарь DragonFly и redis-tools всё равно ставятся). Sentinel этот кирпич не ставит —
      его разворачивает destiny `redis` (sentinel_only) отдельным apply сценария.

  version:
    type: string
    # ОБЯЗАТЕЛЬНА ТОЛЬКО для install.method=package (required_when): distro-native пин
    # читает её голым input.version (install.yml package-ветка). При install.method=binary
    # distro-deb dragonfly НЕ ставится — версия бинаря в install.version (upstream-semver),
    # это поле не используется. required_when context — input-only (default() недоступен) →
    # absent-нормализация has()-цепочкой.
    required_when: "!has(input.install) || !has(input.install.method) || input.install.method == 'package'"
    # distro-native: опциональный epoch `N:` + upstream-версия + опциональная ревизия.
    pattern: "^([0-9]+:)?[0-9][A-Za-z0-9.~+-]*$"
    description: >-
      Версия distro-пакета dragonfly (distro-native пин). ОБЯЗАТЕЛЬНА при
      install.method=package: core.pkg всегда ставит =version-пин. При
      install.method=binary НЕ используется (версия бинаря — в install.version).

  # ── Пути host-layout, переопределяемые оператором (директива B) ──────────────
  # conf_dir/data_dir — базовые каталоги конфигурации и данных DragonFly. ОПЕРАТОР-
  # ПЕРЕОПРЕДЕЛЯЕМЫ (input, не vars). Дефолт = текущий путь (back-compat).
  conf_dir:
    type: string
    required: false
    default: /etc/dragonfly
    pattern: "^/[A-Za-z0-9._/-]+$"
    description: >-
      Каталог конфигурации DragonFly (dragonfly.conf, users.acl, sentinel.conf, tls/).
      По умолчанию /etc/dragonfly. Оператор может переопределить под свой layout.

  data_dir:
    type: string
    required: false
    default: /var/lib/dragonfly
    pattern: "^/[A-Za-z0-9._/-]+$"
    description: >-
      Рабочий каталог данных DragonFly (snapshot). По умолчанию /var/lib/dragonfly.
      Оператор может переопределить под свой storage-layout.

  # ── install: способ установки DragonFly (концепция Ansible-роли *_install_*) ──
  # Гейт install.method static (только input.*) → Keeper гасит неактивную ветку
  # install.yml placeholder-skip-ом без сдвига индексов (block static-skip).
  #
  # ★ binary-ветка САМА несёт всё, что distro-deb даёт даром: systemd-юнит
  # dragonfly.service (с hardening внутри), distro-юзер/группу dragonfly. base_url/version
  # нужны лишь при method=binary. tarball — dragonfly-<arch>.tar.gz (arch x86_64/aarch64
  # из soulprint.self.os.arch); имя файла БЕЗ версии (официальный releases-asset).
  install:
    type: object
    required: false
    additional_properties: false
    description: >-
      Способ установки DragonFly. method: package (default) — distro-deb dragonfly; binary —
      upstream-tarball (base_url + version + soulprint.self.os.arch → /usr/local/bin + свой
      systemd-юнит + distro-юзер/группа dragonfly). base_url/version нужны лишь при
      method=binary. Пустой/не передан → method=package.
    properties:
      method:
        type: string
        enum: [package, binary]
      base_url:
        type: string
        description: >-
          Базовый URL источника tarball-а DragonFly (без arch-сегмента). destiny строит
          полный URL per-host как <base_url>/dragonfly-<arch>.tar.gz, где arch (x86_64/
          aarch64) выводится из soulprint.self.os.arch. Обязателен при method=binary.
      version:
        type: string
        # upstream-semver (напр. 1.39.0). method=binary → используется в ПУТИ распакованного
        # каталога /tmp/dragonfly-<version> (имя tarball-а версии НЕ несёт). core.file.present
        # (src:) разложит бинарь, идемпотентность нативная по sha256 содержимого.
        pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+$"
        description: >-
          Upstream-версия DragonFly для пути распакованного каталога (semver, напр. 1.39.0).
          Обязательна при method=binary. Имя tarball-а версии не несёт (dragonfly-<arch>.tar.gz).

  # ★ input.password УДАЛЁН (РЕДИЗАЙН default_admin): --requirepass убран из flagfile, главного
  # пароля больше нет. Аутентификация идёт под СИСТЕМНЫМ ACL-юзером default_admin (приходит в
  # `users` ниже с per-user паролем, как replica/monitoring). Шаблон dragonfly.flags.tmpl больше
  # НЕ читает .vars.password — destiny его не принимает и не передаёт в render_context. Пароли
  # ВСЕХ юзеров (вкл. default_admin) — в map `users` (поле password каждого, зарезолвлено
  # keeper-side). replica→master AUTH (masteruser/masterauth) — ОБЫЧНЫЕ флаги, которые scenario
  # кладёт прямо в `config`-map (vault()-в-ячейке, seal-маскинг), destiny range-ит их во flagfile.

  # Merged-конфиг dragonfly.conf (FLAGFILE): caller (scenario сервиса) сливает default→
  # вычисления→passthrough через merge() и передаёт ГОТОВЫЙ map. Шаблон range-ит его ПОСЛЕ
  # базовых директив (last-wins у absl). Пустой/не передан → секция пуста. Ключи — в DF-форме
  # (underscore): maxmemory/maxmemory_policy/tls/tls_cert_file/...  (scenario их вычислил).
  config:
    type: object
    description: >-
      Готовые директивы dragonfly.conf flagfile (merged на стороне scenario сервиса). Каждая
      пара key→value пишется как `--<key>=<value>`. Ключи — DF-флаги (underscore-форма).
      Destiny НЕ мержит повторно.
    properties:
      maxclients:
        type: integer
        min: 1
    additional_properties: true

  # ACL-пользователи DragonFly: MAP имя→{perms, state, password}. scenario строит этот map
  # из своего typed-array input.users и резолвит password каждого юзера keeper-side из Vault.
  # Шаблон users.acl.tmpl range-ит MAP (Go сортирует ключи → детерминизм) и хеширует пароль
  # (#<sha256>) — DF принимает redis-формат aclfile с хешем; plaintext в файл НЕ пишется.
  users:
    type: object
    required: false
    description: >-
      ACL-пользователи DragonFly (map имя→{perms, state, password}). Рендерятся в
      ${conf_dir}/users.acl (--aclfile), порядок строк детерминирован (range по map
      сортирует ключи). password — зарезолвленный keeper-side секрет (маскируется); в файл
      пишется его sha256-хеш.
    properties: {}
    additional_properties:
      type: object
      required: [perms, state, password]
      additional_properties: false
      properties:
        perms:
          type: string
        state:
          type: string
          enum: [on, off]
        password:
          type: string
          secret: true

  # ── TLS (концепция Ansible-роли *_tls_*) ─────────────────────────────────────
  # TLS-параметры — единый dict `tls`: enable/cert_ref/key_ref/ca_ref. HOST-ИНВАРИАНТ (один
  # cert/CA на кластер) → приходят через apply.input. Пустой/absent dict → TLS off. Гейт
  # tls.enable — per-task when на PEM-задачах (tasks/server.yml). Сами TLS-флаги (tls/
  # tls_cert_file/...) — обычные ключи merged config (scenario кладёт их в config), destiny
  # range-ит во flagfile.
  #
  # ★ DragonFly vs redis: tls.only/tls.port ОТСУТСТВУЮТ — у DragonFly TLS встаёт на ОСНОВНОЙ
  # --port (флаг --tls; tls_port у DF НЕТ — absl FATAL на неизвестном). Нет второго порта →
  # нет «только-TLS» (`port 0`) и нет отдельного tls-порта. destiny эти поля и не читал как
  # задачу (server.yml гейтит PEM только на tls.enable) — их удаление согласовано со scenario.
  #
  # ★ PEM-РЕНДЕР ЧЕРЕЗ vault() В САМОЙ ЯЧЕЙКЕ (seal-маскинг, ADR-010 §7.4): destiny получает
  # Vault-ПУТИ (tls.cert_ref/key_ref/ca_ref), а PEM читает vault() ПРЯМО в ячейке content
  # задачи core.file.present (НЕ .tmpl, НЕ apply.input с резолвленным PEM). vault() резолвится
  # KEEPER-SIDE; seal помечает ячейку sealed, маскинг ловит PEM в error_summary/state.
  tls:
    type: object
    required: [cert_ref, key_ref, ca_ref]
    additional_properties: false
    description: >-
      Параметры TLS DragonFly. Пустой/не передан → TLS off (block PEM-задач placeholder-skip,
      директив TLS нет). enable — главный гейт рендера PEM/директив (TLS встаёт на ОСНОВНОЙ порт
      6379 — у DragonFly нет отдельного tls-порта); cert_ref/key_ref/ca_ref — Vault-ПУТИ
      серверного cert/key и CA (форма "<mount>/<path>#<field>"). destiny читает PEM через
      vault(ref) В ЯЧЕЙКЕ content (seal-маскинг), vault-клиент на Soul нет.
    properties:
      enable:
        type: boolean
      cert_ref:
        type: string
      key_ref:
        type: string
      ca_ref:
        type: string

  # ── Host-tuning extras (концепция Ansible-роли) ──────────────────────────────
  # Режим-агностичные per-host добавки. THP-отключение / logrotate / sysctl — БЕЗУСЛОВНЫ
  # (рекомендация in-memory-store / hardening, не выбор оператора): флагов в контракте нет.
  # sysctl_settings — данные-таблица значений kernel-параметров, host-инвариантна → приходит
  # через apply.input (scenario сервиса).
  sysctl_settings:
    type: object
    required: false
    description: >-
      Kernel-параметры под DragonFly (map имя→значение), рендерятся в
      /etc/sysctl.d/30-dragonfly.conf. Значения — СТРОКИ (multi-value через пробел).
      Передаются scenario сервиса (дефолты — essence.sysctl_settings).
    properties: {}
    additional_properties: true
