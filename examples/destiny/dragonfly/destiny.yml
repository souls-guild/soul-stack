name: dragonfly
description: >-
  Per-host brick for the DragonFly data plane (B-hybrid ADR-009):
  install DragonFly (distro-deb / upstream-tarball) + render dragonfly.conf (FLAGFILE) from a
  merged config + render users.acl + service. ALL orchestration (topology, REPLICAOF,
  health-gate) lives in the service scenario - here only idempotent install/render/service
  of a single instance.

# Destiny version - git ref (ADR-007). There is no top-level `version:` field. Task list -
# in tasks/main.yml. Core modules only -> required_modules: not needed (community.redis
# is called from the service scenario, not from this destiny).
#
# * DragonFly vs redis: separate destiny, a copy of the redis structure with a swapped
# config format (FLAGFILE --flag=value instead of redis.conf), unit (Type=simple, the
# binary unit carries hardening itself) and install (a single dragonfly binary). WITHOUT
# redis modules (.so), WITHOUT cluster directives.
#
# * SENTINEL - NOT HERE (refactor "sentinel from destiny redis"): DragonFly does not carry
# redis-sentinel; the sentinel daemon fully deploys destiny `redis` in sentinel_only mode
# (deploy_redis=false). The dragonfly service scenario does a SECOND apply:destiny:
# redis alongside apply:destiny:dragonfly (two apply:destiny in one scenario, ADR-009).
# That's why sentinel_enabled/sentinel/sentinel_users are REMOVED from this input - the
# `dragonfly` brick is responsible strictly for the DragonFly data plane.
#
# Config arrives as a READY merged map via apply: input: config: (the merge is done by the
# service scenario) - destiny is "dumb".

input:
  # ── DragonFly data-plane gate ────────────────────────────────────────────
  # deploy_dragonfly=false -> do NOT deploy the DragonFly data plane: it's gated off by
  # include-when (server.yml group-drop). The DragonFly binary and redis-tools (install.yml)
  # are still installed ALWAYS. In the dragonfly service always true (scenario doesn't pass
  # it, default) - the flag is kept for brick flexibility (symmetry with deploy_redis destiny
  # `redis`).
  deploy_dragonfly:
    type: boolean
    required: false
    default: true
    description: >-
      Whether to deploy the DragonFly data plane (render dragonfly.conf/users.acl/PEM +
      the dragonfly systemd service). Defaults to true. false - do not deploy the data
      plane (the DragonFly binary and redis-tools are still installed). Sentinel does not
      install this brick - it's deployed by destiny `redis` (sentinel_only) via a separate
      scenario apply.

  version:
    type: string
    # REQUIRED ONLY for install.method=package (required_when): the distro-native pin
    # reads it as bare input.version (install.yml package branch). With install.method=binary
    # the distro-deb dragonfly is NOT installed - the binary version is in install.version
    # (upstream-semver), this field is not used. required_when context is input-only
    # (default() unavailable) -> absent-normalization via has() chain.
    required_when: "!has(input.install) || !has(input.install.method) || input.install.method == 'package'"
    # distro-native: optional epoch `N:` + upstream version + optional revision.
    pattern: "^([0-9]+:)?[0-9][A-Za-z0-9.~+-]*$"
    description: >-
      Distro-package version of dragonfly (distro-native pin). REQUIRED when
      install.method=package: core.pkg always installs with an =version pin. With
      install.method=binary it is NOT used (binary version is in install.version).

  # ── Host-layout paths, operator-overridable (directive B) ──────────────
  # conf_dir/data_dir - base config and data directories for DragonFly. OPERATOR-
  # OVERRIDABLE (input, not vars). Default = current path (back-compat).
  conf_dir:
    type: string
    required: false
    default: /etc/dragonfly
    pattern: "^/[A-Za-z0-9._/-]+$"
    description: >-
      DragonFly config directory (dragonfly.conf, users.acl, sentinel.conf, tls/).
      Defaults to /etc/dragonfly. The operator can override it for their own layout.

  data_dir:
    type: string
    required: false
    default: /var/lib/dragonfly
    pattern: "^/[A-Za-z0-9._/-]+$"
    description: >-
      DragonFly working data directory (snapshot). Defaults to /var/lib/dragonfly.
      The operator can override it for their own storage layout.

  # ── install: how DragonFly is installed ──
  # Static install.method gate (input.* only) -> Keeper skips the inactive branch in
  # install.yml with a placeholder-skip, no index shifting (block static-skip).
  #
  # * The binary branch itself carries everything distro-deb gives for free: the systemd
  # unit dragonfly.service (with hardening inside), the distro user/group dragonfly.
  # base_url/version are only needed for method=binary. tarball is
  # dragonfly-<arch>.tar.gz (arch x86_64/aarch64 from soulprint.self.os.arch); the file
  # name carries NO version (official releases asset).
  install:
    type: object
    required: false
    additional_properties: false
    description: >-
      How DragonFly is installed. method: package (default) - distro-deb dragonfly; binary -
      upstream tarball (base_url + version + soulprint.self.os.arch -> /usr/local/bin + its own
      systemd unit + distro user/group dragonfly). base_url/version are only needed for
      method=binary. Empty/not passed -> method=package.
    properties:
      method:
        type: string
        enum: [package, binary]
      base_url:
        type: string
        description: >-
          Base URL of the DragonFly tarball source (without the arch segment). destiny
          builds the full per-host URL as <base_url>/dragonfly-<arch>.tar.gz, where arch
          (x86_64/aarch64) is derived from soulprint.self.os.arch. Required for
          method=binary.
      version:
        type: string
        # upstream-semver (e.g. 1.39.0). method=binary -> used in the PATH of the unpacked
        # directory /tmp/dragonfly-<version> (the tarball name carries no version).
        # core.file.present (src:) unpacks the binary, idempotency is native by sha256
        # content.
        pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+$"
        description: >-
          Upstream DragonFly version for the unpacked directory path (semver, e.g.
          1.39.0). Required for method=binary. The tarball name carries no version
          (dragonfly-<arch>.tar.gz).

  # * input.password REMOVED (default_admin REDESIGN): --requirepass was removed from the
  # flagfile, there's no more single main password. Authentication goes through the SYSTEM
  # ACL user default_admin (comes in `users` below with a per-user password, like
  # replica/monitoring). The dragonfly.flags.tmpl template no longer reads .vars.password -
  # destiny does not accept it and does not pass it into render_context. Passwords of ALL
  # users (incl. default_admin) are in the `users` map (each entry's password field,
  # resolved keeper-side). replica->master AUTH (masteruser/masterauth) are ORDINARY flags
  # that the scenario puts directly into the `config` map (vault()-in-cell, seal masking),
  # destiny ranges them into the flagfile.

  # Merged dragonfly.conf (FLAGFILE): the caller (service scenario) merges default ->
  # computed -> passthrough via merge() and passes a READY map. The template ranges it AFTER
  # the base directives (absl last-wins). Empty/not passed -> section empty. Keys are in DF
  # form (underscore): maxmemory/maxmemory_policy/tls/tls_cert_file/... (computed by the
  # scenario).
  config:
    type: object
    description: >-
      Ready dragonfly.conf flagfile directives (merged on the service scenario side). Each
      key->value pair is written as `--<key>=<value>`. Keys are DF flags (underscore form).
      Destiny does NOT merge again.
    properties:
      maxclients:
        type: integer
        min: 1
    additional_properties: true

  # DragonFly ACL users: MAP name->{perms, state, password}. The scenario builds this map
  # from its typed-array input.users and resolves each user's password keeper-side from
  # Vault. The users.acl.tmpl template ranges the MAP (Go sorts keys -> determinism) and
  # hashes the password (#<sha256>) - DF accepts a redis-format aclfile with a hash;
  # plaintext is NOT written to the file.
  users:
    type: object
    required: false
    description: >-
      DragonFly ACL users (map name->{perms, state, password}). Rendered into
      ${conf_dir}/users.acl (--aclfile), line order is deterministic (range over map
      sorts keys). password - a keeper-side resolved secret (masked); its sha256 hash is
      written to the file.
    properties: {}
    additional_properties:
      type: object
      required: [perms, state, password]
      additional_properties: false
      properties:
        perms:
          type: string
        state:
          type: string
          enum: [on, off]
        password:
          type: string
          secret: true

  # ── TLS ─────────────────────────────────────────────────────────────────────
  # TLS parameters - a single dict `tls`: enable/cert_ref/key_ref/ca_ref. HOST-INVARIANT
  # (one cert/CA per cluster) -> arrives via apply.input. Empty/absent dict -> TLS off. Gate
  # tls.enable - per-task when on the PEM tasks (tasks/server.yml). The TLS flags themselves
  # (tls/tls_cert_file/...) are ordinary merged config keys (the scenario puts them into
  # config), destiny ranges them into the flagfile.
  #
  # * DragonFly vs redis: tls.only/tls.port ARE ABSENT - DragonFly's TLS runs on the MAIN
  # --port (flag --tls; DF has NO tls_port - absl FATAL on unknown). No second port ->
  # no "TLS-only" (`port 0`) and no separate tls port. destiny never read these fields as a
  # task (server.yml gates PEM only on tls.enable) - their removal was agreed with the
  # scenario.
  #
  # * PEM RENDER VIA vault() DIRECTLY IN THE CELL (seal masking, ADR-010 §7.4): destiny
  # receives Vault PATHS (tls.cert_ref/key_ref/ca_ref), and PEM is read by vault() DIRECTLY
  # in the content cell of the core.file.present task (NOT .tmpl, NOT apply.input with a
  # resolved PEM). vault() is resolved KEEPER-SIDE; seal marks the cell sealed, masking
  # catches PEM in error_summary/state.
  tls:
    type: object
    required: [cert_ref, key_ref, ca_ref]
    additional_properties: false
    description: >-
      DragonFly TLS parameters. Empty/not passed -> TLS off (PEM-task block placeholder-skip,
      no TLS directives). enable - the main gate for rendering PEM/directives (TLS runs on
      the MAIN port 6379 - DragonFly has no separate tls port); cert_ref/key_ref/ca_ref -
      Vault PATHS to the server cert/key and CA (form "<mount>/<path>#<field>"). destiny
      reads PEM via vault(ref) IN THE content CELL (seal masking), there's no vault client
      on Soul.
    properties:
      enable:
        type: boolean
      cert_ref:
        type: string
      key_ref:
        type: string
      ca_ref:
        type: string

  # ── Host-tuning extras ─────────────────────────────────────────────────────
  # Mode-agnostic per-host additions. THP-disable / logrotate / sysctl are UNCONDITIONAL
  # (in-memory-store recommendation / hardening, not an operator choice): there is no flag
  # for them in the contract. sysctl_settings - a data table of kernel parameter values,
  # host-invariant -> arrives via apply.input (service scenario).
  sysctl_settings:
    type: object
    required: false
    description: >-
      Kernel parameters for DragonFly (map name->value), rendered into
      /etc/sysctl.d/30-dragonfly.conf. Values are STRINGS (multi-value via space).
      Passed by the service scenario (defaults - essence.sysctl_settings).
    properties: {}
    additional_properties: true
