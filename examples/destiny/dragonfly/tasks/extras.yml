# tasks/extras.yml — host-tuning extras (концепция Ansible-роли): THP-юнит + logrotate +
# sysctl. Режим-АГНОСТИЧНЫ (одинаково полезны standalone/sentinel). Все три БЕЗУСЛОВНЫ
# (рекомендация in-memory-store / hardening — не выбор оператора): задачи без when:,
# рендерятся ВСЕГДА. REUSE из redis-extras (THP/sysctl — те же kernel-рекомендации для
# in-memory-store; DragonFly так же выигрывает от отключённого THP и сетевого tuning).
#
# disable-thp daemon-reload УБРАН: core.service (daemon_reload: auto) сам перечитывает
# unit при смене disable-thp.service ПЕРЕД enable/start.

# transparent-hugepages: oneshot-юнит отключения THP до DragonFly. БЕЗУСЛОВНО (THP даёт
# latency-спайки на fork snapshot — рекомендация in-memory-store). Шаблон REUSE из redis
# (disable-thp.service.tmpl, юнит-имя disable-thp нейтрально).
- name: Render disable-thp systemd unit
  module: core.file.rendered
  params:
    path: /etc/systemd/system/disable-thp.service
    template: templates/disable-thp.service.tmpl
    mode: "${ vars.unit_file_mode }"
    owner: "${ vars.root_owner }"
    group: "${ vars.root_group }"

# core.service сам перечитывает unit (daemon_reload: auto) при смене disable-thp.service
# перед enable/start. disable-thp — oneshot RemainAfterExit, отрабатывает один раз.
- name: Ensure disable-thp is running and enabled at boot
  module: core.service.running
  params:
    name: disable-thp
    enabled: true

# logrotate: ротация лог-файлов DragonFly в /etc/logrotate.d/dragonfly. БЕЗУСЛОВНО (как
# THP — host-tuning не выбор оператора). mode 0644 owner/group root — стандарт logrotate.d.
# ★ Шаблон покрывает ТОЛЬКО DragonFly glog (рефактор «sentinel из destiny redis»: логи
# sentinel-демона ротирует logrotate destiny `redis`) — см. logrotate.tmpl.
- name: Render the dragonfly logrotate config
  module: core.file.rendered
  params:
    path: /etc/logrotate.d/dragonfly
    template: templates/logrotate.tmpl
    mode: "${ vars.unit_file_mode }"
    owner: "${ vars.root_owner }"
    group: "${ vars.root_group }"
    vars:
      # glob лог-файлов DragonFly (glog) из системного лог-каталога.
      log_dir: "${ vars.log_dir }"

# sysctl: bulk-набор kernel-параметров под in-memory-store ОДНИМ drop-in
# /etc/sysctl.d/30-dragonfly.conf. БЕЗУСЛОВНО (как THP/logrotate). core.sysctl.applied сам
# владеет drop-in: пишет детерминированный файл (sorted keys → нет ложного change),
# реактивно перечитывает его `sysctl -p <file>` точечно при изменении (reload: auto). В
# контейнерах часть vm.* read-only — ignore_failures даёт `sysctl -e -p` (--ignore глушит
# read-only/несуществующие ключи). sysctl_settings — map kernel-параметр→значение,
# scenario сервиса передаёт его через apply.input (дефолты — essence.sysctl_settings).
- name: Apply dragonfly sysctl kernel parameters
  module: core.sysctl.applied
  params:
    filename: 30-dragonfly
    reload: auto
    ignore_failures: true
    settings: "${ default(input.sysctl_settings, {}) }"
