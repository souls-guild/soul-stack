# tasks/main.yml — точка входа destiny dragonfly. Только include-список: логические
# группы разнесены по соседним файлам, раскрываются inline ДО render (docs/destiny/
# tasks.md §4 — within-destiny include раскрывается в плоский список). Видит ТОЛЬКО свой
# input: (изоляция, ADR-009).
#
# Per-host кирпич DragonFly (data-плоскость одного инстанса): install DragonFly + render
# flagfile/users.acl/PEM + сервис + host-tuning. Конфиг приходит ГОТОВЫМ merged map-ом через
# apply: input: config: — destiny ничего не сливает (merge делает scenario).
#
# ★ DragonFly vs redis: структура копирует redis-main БЕЗ data-плоскостных излишеств —
#   без modules.yml (DragonFly не грузит redis-модули .so) и без version-guard Redis 8+.
#
# ★ SENTINEL — НЕ ЗДЕСЬ (рефактор «sentinel из destiny redis»): DragonFly не несёт
#   redis-sentinel, а распределённый sentinel-демон полностью разворачивает destiny `redis`
#   в режиме sentinel_only (deploy_redis=false). scenario сервиса dragonfly делает ВТОРОЙ
#   apply:destiny:redis рядом с этим (две apply:destiny в одном сценарии, ADR-009). Поэтому
#   sentinel.yml/sentinel-шаблоны/sentinel-input из ЭТОГО destiny УБРАНЫ (дубликат снят) —
#   кирпич `dragonfly` отвечает строго за data-плоскость DragonFly.
#
# Обзор конвейера (порядок include = порядок задач). Режим-гейт стоит НА include
# (conditional-include, ADR-009 amendment): статический input-предикат на include-задаче
# РЕАЛЬНО исключает группу из плана (render-phase group-drop), а не гасит её placeholder-
# skip-ом. Поэтому выключенный include (server при deploy_dragonfly=false) ФИЗИЧЕСКИ
# отсутствует. L0-кейсы ассертят presence-матчером (task_present/task_absent), которому
# group-drop безопасен (позиционные индексы не важны).
#
#   install.yml  — установка DragonFly (диспетч по install.method: package distro-deb
#                  dragonfly / binary upstream-tarball) + redis-tools (redis-cli для
#                  health-gate / REPLICAOF плагином, DragonFly его не несёт). binary-ветка
#                  несёт СВОЙ рестарт здесь (per-file линтер onchanges запрещает cross-file
#                  register);
#   server.yml   — data-плоскость dragonfly (gated deploy_dragonfly НА include): PEM →
#                  users.acl → dragonfly.conf (flagfile) → core.service. deploy_dragonfly=false
#                  → group-drop;
#   extras.yml   — host-tuning (THP-юнит / logrotate / sysctl), все БЕЗУСЛОВНЫ;
#
# Гейты include — статические input-предикаты (conditional-include требует input./essence./
# incarnation./vars.; register./soulprint. на include запрещены). has()-guard в каждом —
# render-safety при absent dict (tls в plaintext-режиме).
#
# Явных daemon-reload-шагов НЕТ: core.service (daemon_reload: auto, default) сам перечитывает
# конфигурацию systemd при смене unit-файла ПЕРЕД start/restart.

- include: install.yml

- include: server.yml
  when: "default(input.deploy_dragonfly, true)"

- include: extras.yml
