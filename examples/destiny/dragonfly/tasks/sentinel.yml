# tasks/sentinel.yml — sentinel-демон (режим sentinel/sentinel_only). ВЕСЬ файл gated на
# sentinel_enabled НА include (main.yml, conditional-include ADR-009 amendment). Вне
# sentinel-режима include дропается целиком (group-drop). master-election делает scenario
# сервиса run_once и передаёт ГОТОВЫЕ master_ip/master_port — destiny остаётся «глупым»
# режим-агностичным кирпичом.
#
# ★ DragonFly vs redis (D1): sentinel-демон — redis-sentinel из distro-пакета redis-server
#   (DF его НЕ несёт; install.yml ставит redis-server БЕЗУСЛОВНО). Поэтому:
#     - bin-путь sentinel ВСЕГДА /usr/bin (distro-пакет), БЕЗ binary-ветвления (у redis оно
#       было: /usr/local/bin при install.method=binary; у DF install.method относится к
#       САМОМУ DragonFly, не к sentinel-бинарю — он всегда distro);
#     - юзер/группа/каталоги sentinel — vars.sentinel_user/group (redis) + sentinel_run_dir/
#       sentinel_log_dir (/var/run/redis, /var/log/redis), ОТДЕЛЬНЫЕ от dragonfly-юзера.
#   sentinel мониторит DragonFly как обычный redis-master (DF redis-совместим: REPLICAOF/
#   SENTINEL MONITOR/INFO replication работают — их CI это доказывает, community.redis БЕЗ
#   правок). Шаблоны sentinel.conf/sentinel-users.acl/redis-sentinel.service — REUSE из
#   redis 1:1 (контракт sentinel-демона идентичен), параметризованы через .vars.
#
# ★ register'ы redis_sentinel_conf/redis_sentinel_acl/redis_sentinel_unit и их onchanges-
#   рестарт ОБЯЗАНЫ жить В ЭТОМ файле (per-file линтер отвергает cross-file onchanges).
#   core.service (daemon_reload: auto) сам перечитывает unit ПЕРЕД restart.

# sentinel-users.acl — ВТОРОЙ aclfile, ТОЛЬКО для sentinel-демона (отдельный perms-набор:
# sentinel-команды). register — рестарт демона при изменении. owner/group redis (sentinel-
# юзер), mode 0640 (password-хеши). Пустой/не передан → пустой aclfile (back-compat). ДО
# sentinel.conf: его aclfile-директива ссылается на этот файл.
- name: Render sentinel-users.acl
  module: core.file.rendered
  register: redis_sentinel_acl
  params:
    path: "${ vars.dragonfly_conf_dir_eff + '/sentinel-users.acl' }"
    template: templates/sentinel-users.acl.tmpl
    mode: "${ vars.dragonfly_secret_file_mode }"
    owner: "${ vars.sentinel_user }"
    group: "${ vars.sentinel_group }"
    vars:
      users: "${ default(input.sentinel_users, {}) }"

# sentinel.conf из переданных параметров master-а. register — рестарт демона при изменении.
# announce-ip рендерится в шаблоне per-host из .self (НЕ из vars). aclfile (директива
# sentinel.conf) указывает на sentinel-users.acl. data_dir/log_dir/run_dir — sentinel-
# каталоги (под redis-юзером), ОТДЕЛЬНЫЕ от DragonFly data/log/run (разные владельцы).
- name: Render sentinel.conf
  module: core.file.rendered
  register: redis_sentinel_conf
  params:
    path: "${ vars.dragonfly_conf_dir_eff + '/sentinel.conf' }"
    template: templates/sentinel.conf.tmpl
    mode: "${ vars.dragonfly_secret_file_mode }"
    owner: "${ vars.sentinel_user }"
    group: "${ vars.sentinel_group }"
    vars:
      master_name: "${ default(input.sentinel.master_name, 'master') }"
      master_ip:   "${ input.sentinel.master_ip }"
      # master_port/quorum — has()?string(X):Y: then-ветка вызов string(), default()
      # (select-chain-only) тут неприменим, оставлено тернаром. master_port дефолт 6379
      # (DragonFly слушает 6379, redis-совместим).
      master_port: "${ has(input.sentinel.master_port) ? string(input.sentinel.master_port) : '6379' }"
      quorum:      "${ has(input.sentinel.quorum) ? string(input.sentinel.quorum) : '2' }"
      auth_user:   "${ default(input.sentinel.auth_user, '') }"
      auth_pass:   "${ default(input.sentinel.auth_pass, '') }"
      sentinel_config: "${ default(input.sentinel.config, {}) }"
      # host-layout: шаблон выводит `dir`/`aclfile` (sentinel-users.acl) — dir из
      # sentinel-data-каталога /var/lib/redis (owned redis-юзером, distro-пакет; НЕ
      # dragonfly data_dir — под dragonfly-владением redis-юзер не записал бы state),
      # aclfile из conf_dir (общий с DragonFly /etc/dragonfly).
      data_dir:    "${ vars.sentinel_data_dir }"
      conf_dir:    "${ vars.dragonfly_conf_dir_eff }"
      port:        "${ vars.sentinel_port }"
      run_dir:     "${ vars.sentinel_run_dir }"
      log_dir:     "${ vars.sentinel_log_dir }"

# Полный systemd-юнит redis-sentinel. register — рестарт реактивно на изменение юнита.
# ★ bin ВСЕГДА /usr/bin (distro-пакет redis-server несёт redis-sentinel/redis-cli; у DF
#   нет binary-ветки для sentinel-бинаря — install.method относится к DragonFly, не к
#   sentinel). redis_user/redis_group — sentinel-юзер (redis), под которым демон работает
#   и владеет своими каталогами. Шаблон redis-sentinel.service.tmpl REUSE из redis 1:1
#   (контекстные имена .vars.redis_user/redis_group/sentinel_bin/cli_bin сохранены).
- name: Render the redis-sentinel systemd unit
  module: core.file.rendered
  register: redis_sentinel_unit
  params:
    path: "${ vars.systemd_dir + '/' + vars.sentinel_service_name + '.service' }"
    template: templates/redis-sentinel.service.tmpl
    mode: "${ vars.unit_file_mode }"
    owner: "${ vars.root_owner }"
    group: "${ vars.root_group }"
    vars:
      # ВСЕГДА /usr/bin (distro-пакет redis-server) — без install.method-ветвления.
      sentinel_bin:  /usr/bin
      cli_bin:       /usr/bin
      conf_dir:      "${ vars.dragonfly_conf_dir_eff }"
      sentinel_port: "${ vars.sentinel_port }"
      # Имена .vars.redis_user/redis_group в шаблоне — это sentinel-юзер (redis).
      redis_user:    "${ vars.sentinel_user }"
      redis_group:   "${ vars.sentinel_group }"
      data_dir:      "${ vars.dragonfly_data_dir_eff }"
      log_dir:       "${ vars.sentinel_log_dir }"
      run_dir:       "${ vars.sentinel_run_dir }"

- name: Ensure redis-sentinel is running and enabled at boot
  module: core.service.running
  params:
    name: "${ vars.sentinel_service_name }"
    enabled: true

# Рестарт реактивно на изменение sentinel.conf, sentinel-users.acl или юнита.
# core.service при смене unit сам делает daemon-reload перед рестартом.
- name: Restart redis-sentinel because config, ACL or unit changed
  module: core.service.restarted
  onchanges: [redis_sentinel_conf, redis_sentinel_acl, redis_sentinel_unit]
  timeout: 30s
  params:
    name: "${ vars.sentinel_service_name }"
