# redis-replication-config — направить реплики на master_addr.
#
# ИНВАРИАНТ «master не делается репликой» (см. destiny.yml):
# шаг replicaof выполняется ТОЛЬКО когда собственный стабильный адрес хоста
# (soulprint.self.network.primary_ip) НЕ равен input.master_addr. На носителе
# master_addr условие falsy → шаг пропускается (idempotent no-op, master НЕ
# делает replicaof сам на себя). Опознание чисто локальное: только
# soulprint.self + input, без обращения к другим хостам — изоляция destiny.

# `&&` цепочка двух redis-cli — shell-семантика → core.cmd.shell (cmd.go).
- name: Point this replica at the configured master
  module: core.cmd.shell
  when: soulprint.self.network.primary_ip != input.master_addr
  # redis-cli replicaof идемпотентен: повторный вызов с тем же master:port на
  # уже-реплике ничего не меняет. changed_when опускаем — модуль сам не знает
  # «изменилось ли»; идемпотентность гарантируется самой командой redis.
  no_log: true                       # masterauth-пароль в команде — не логировать
  params:
    cmd: >
      redis-cli -h ${ soulprint.self.network.primary_ip }
      CONFIG SET masterauth ${ input.password }
      && redis-cli -h ${ soulprint.self.network.primary_ip }
      replicaof ${ input.master_addr } 6379
