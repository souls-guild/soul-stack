# tasks/main.yml — точка входа destiny node-exporter (плоский список module-задач,
# без within-destiny include). Видит ТОЛЬКО свой input: (изоляция, ADR-009).
#
# Паттерн установки из релиза — единая «тройка» (как в инлайн-сценариях
# service-monitoring): скачать tarball (core.url.fetched, https-only +
# checksum-верификация ДО публикации, supply-chain-safe) → распаковать
# (core.archive.extracted) → разложить бинарь (core.cmd.shell install).

# 1. Скачать tarball с GitHub Releases во временный путь. URL собирается CEL-ом
#    из version+arch. checksum верифицируется до материализации файла; при
#    совпадении хэша уже скачанного tarball-а шаг — no-op (идемпотентность).
- name: Fetch node_exporter tarball
  module: core.url.fetched
  params:
    url: "${ 'https://github.com/prometheus/node_exporter/releases/download/v' + input.version + '/node_exporter-' + input.version + '.linux-' + input.arch + '.tar.gz' }"
    path: "${ '/tmp/node_exporter-' + input.version + '.tar.gz' }"
    checksum: "${ input.sha256 }"
    mode: "0644"

# 2. Распаковать tarball в каталог. format auto-detect по .tar.gz. Идемпотентно:
#    core.archive пишет marker и повторно не распаковывает тот же архив.
- name: Extract node_exporter tarball
  module: core.archive.extracted
  params:
    path: "${ '/tmp/node_exporter-' + input.version + '.tar.gz' }"
    dest: "${ '/tmp/node_exporter-' + input.version }"

# 3. Разложить бинарь из распакованного каталога в bin_dir с mode 0755.
#    core.file.present копировать из пути не умеет (только inline-content), а
#    бинарь — это контент из ФС, поэтому install-шаг — core.cmd.shell:
#    единственный shell здесь — локальная установка install -m0755, без сети.
#    Идемпотентность — через creates: бинарь на месте → no-op.
- name: Install node_exporter binary
  module: core.cmd.shell
  params:
    creates: "${ input.bin_dir + '/node_exporter' }"
    cmd: >-
      install -m 0755
      '${ '/tmp/node_exporter-' + input.version + '/node_exporter-' + input.version + '.linux-' + input.arch + '/node_exporter' }'
      '${ input.bin_dir + '/node_exporter' }'

# Выделенного системного пользователя/группы НЕТ намеренно. node_exporter —
# stateless-демон без owned data-dir, поэтому по гибрид-правилу прод-конвенции
# (docs/destiny/production-conventions.md §2) сервис-аккаунт даёт сам systemd через
# DynamicUser=yes в unit-е: запертый transient-юзер на время жизни процесса, без
# ручных core.user/core.group. Стабильный system-uid нужен только stateful-сервисам
# (redis/postgres) ради владения каталогом данных — это отдельное правило.

# systemd-unit рендерится из .tmpl (ADR-010): literal-шаблон + CEL-rendered vars
# → core.file.rendered раскладывает на хосте. register, чтобы рестартить unit при
# изменении файла.
- name: Render node_exporter systemd unit
  module: core.file.rendered
  register: node_exporter_unit
  params:
    path: /etc/systemd/system/node_exporter.service
    template: templates/node_exporter.service.tmpl
    mode: "0644"
    owner: root
    group: root
    vars:
      bin_dir: "${ input.bin_dir }"
      listen:  "${ input.listen }"
      # passthrough-флаги node_exporter (--collector.*, --web.config.file=... и
      # пр.): уходят в шаблон списком, range дописывает каждый отдельным токеном
      # ExecStart. Вся ячейка = один ${…} → нативный список (ADR-010).
      extra_args: "${ input.extra_args }"

- name: Ensure node_exporter is running and enabled at boot
  module: core.service.running
  params:
    name: node_exporter
    enabled: true

- name: Restart node_exporter because unit changed
  module: core.service.restarted
  onchanges: [node_exporter_unit]
  timeout: 30s
  params:
    name: node_exporter
