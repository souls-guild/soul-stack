name: node-exporter
description: Install Prometheus node_exporter from a pinned GitHub release tarball and run it as a hardened systemd service under DynamicUser (no manual service account).

# Версия destiny — git ref, под которым закоммичен файл (ADR-007). Поля
# `version:` верхнего уровня намеренно нет.
#
# Список задач — НЕ в этом файле. Он живёт в tasks/main.yml. Здесь только
# манифест: input-контракт и (если бы были) required_modules. Эта destiny
# использует только core-модули → required_modules: не нужен.
#
# Извлечено из инлайн-сценариев service-monitoring / service-redis-monitored
# в самостоятельную переиспользуемую destiny: сервис подключает её через
# apply:destiny (изоляция input, ADR-009).

input:
  version:
    type: string
    default: "1.8.2"
    format: semver
    description: Версия node_exporter (GitHub Releases prometheus/node_exporter).

  # checksum tarball-а node_exporter (linux-<arch>). core.url.fetched верифицирует
  # его ДО публикации файла — неверный хэш не материализуется (supply-chain).
  # ОБЯЗАТЕЛЬНЫЙ, без дефолта (fail-closed): нет хэша → честный отказ, а не fetch
  # с placeholder-ом, который верификация всё равно отвергнет. Значение берётся из
  # файла sha256sums.txt GitHub-релиза prometheus/node_exporter под пару
  # (version, arch), напр. для node_exporter-<v>.linux-<arch>.tar.gz.
  sha256:
    type: string
    required: true
    pattern: "^sha256:[0-9a-f]{64}$"
    description: >-
      SHA-256 tarball-а node_exporter (форма "sha256:<hex>"). Должен
      соответствовать паре version + arch; берётся из sha256sums GitHub-релиза.

  # arch — архитектура релизного tarball-а. default amd64 — fallback для прямых
  # вызовов; вызывающий scenario ОБЯЗАН передавать сюда фактическую архитектуру
  # хоста: `arch: "${ soulprint.self.os.arch }"` (soulprint уже отдаёт значение в
  # нотации amd64/arm64 — proto soulprint.proto, маппинг не нужен). Destiny
  # изолирована (ADR-009) и soulprint напрямую не видит — значение приходит только
  # через apply:input от caller-а.
  arch:
    type: string
    default: amd64
    enum: [amd64, arm64]
    description: >-
      Архитектура GitHub-релизного tarball-а (amd64|arm64). Вызывающий scenario
      должен передавать soulprint.self.os.arch; default — fallback.

  bin_dir:
    type: string
    default: /usr/local/bin
    pattern: "^/[A-Za-z0-9._/-]+$"
    description: Каталог, куда раскладывается бинарник node_exporter.

  listen:
    type: string
    default: ":9100"
    pattern: "^[A-Za-z0-9._-]*:[0-9]{1,5}$"
    description: Listen-адрес node_exporter (--web.listen-address). По умолчанию :9100.

  # Passthrough-канал для ЛЮБЫХ флагов node_exporter сверх базового
  # --web.listen-address: коллекторы (--collector.systemd, --no-collector.wifi),
  # textfile-каталог (--collector.textfile.directory=...), TLS/basic-auth
  # (--web.config.file=/etc/node_exporter/web.yml). Каждый элемент — отдельный
  # токен ExecStart (не разбивается шаблоном по пробелам), поэтому
  # значение-с-пробелом передавай одним элементом: ["--web.config.file=/etc/x.yml"].
  # Сам web.yml (TLS-сертификаты/basic-auth) — ответственность оператора (отдельный
  # файл на хосте); эта destiny его НЕ рендерит, только пробрасывает флаг.
  extra_args:
    type: array
    default: []
    items:
      type: string
    description: >-
      Дополнительные флаги node_exporter (--collector.*, --no-collector.*,
      --web.config.file=<path> для TLS/basic-auth и пр.). Каждый элемент —
      отдельный аргумент ExecStart. web.yml для TLS — отдельный файл, не из этой
      destiny.
