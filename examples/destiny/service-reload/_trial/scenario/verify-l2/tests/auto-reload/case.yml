# L2-кейс (docker systemd-PID1 стенд, Trial ADR-023). Исполняется ТОЛЬКО под
# build-tag integration: `go test -tags integration -run TestL2 ./internal/trial/...`
# (требует docker + privileged). Дефолтный harness (make test) помечает Skipped.
#
# Доказывает фикс daemon-reload в режиме auto (gated по NeedDaemonReload):
# после перезаписи unit-файла (core.file.present, in-place) systemd выставляет
# NeedDaemonReload=yes, core.service.restarted с daemon_reload=auto делает reload
# и применяет НОВОЕ определение (ExecStart=…2000). Эмпирически на debian-12
# (systemd 252) flag-flip надёжен — это основной guard.
name: auto-reload
description: |
  E2E daemon-reload (auto): unit переписан → NeedDaemonReload=yes →
  core.service.restarted(daemon_reload=auto) делает reload → применяется v2.

# systemd-PID1 стенд: образ из debian-12.Dockerfile (e2e-live), Entrypoint
# /sbin/init, privileged. Поле image при init: systemd игнорируется (стенд
# собирается из Dockerfile), но обязательно по схеме — указываем эталонный тег.
stand:
  driver: docker
  image:  debian:12-slim
  mode:   push
  init:   systemd

input:
  unit:        reload-probe
  reload_mode: auto

# restarted всегда changed=true → повторный apply не идемпотентен.
expect_idempotent: false

verify:
  # Доказательство: загруженное ExecStart = НОВОЕ определение (sleep 2000).
  - name: execstart-is-v2
    apply:
      module: core.cmd.shell
      params:
        cmd: "systemctl show reload-probe -p ExecStart --value"
    expect:
      exit_code: 0
      stdout_contains: "2000"
