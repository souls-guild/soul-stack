# nfpm-конфиг пакета `keeper` (deb + rpm). ADR-004 — центральный узел Soul Stack.
#
# Сборка: `make pkg` (вызывает nfpm package). Версия берётся из переменной
# окружения VERSION (см. Makefile) через ${VERSION}-подстановку nfpm. Бинарь
# должен быть собран ДО упаковки (`make build`) — кладётся keeper/bin/keeper.
#
# Пакет ставит: бинарь в /usr/local/bin, systemd-юнит + env, пример конфига как
# .yml.example (не перетирает рабочий конфиг оператора при upgrade — pkg-конфиги
# помечены config-flag-ом, но пример кладём отдельным именем намеренно).
name: soul-stack-keeper
arch: ${ARCH}
platform: linux
version: ${VERSION}
section: admin
priority: optional
maintainer: Soul Stack <noreply@soul-stack.dev>
description: |
  Soul Stack Keeper — центральный узел управления конфигурациями (ADR-004).
  gRPC bidi-stream поверх mTLS, OpenAPI/MCP для операторов, Postgres + Redis.
vendor: Soul Stack
homepage: https://github.com/souls-guild/soul-stack
license: Apache-2.0

contents:
  - src: ./keeper/bin/keeper
    dst: /usr/local/bin/keeper
    file_info:
      mode: 0755

  - src: ./deploy/systemd/keeper.service
    dst: /etc/systemd/system/keeper.service
    file_info:
      mode: 0644

  - src: ./deploy/systemd/keeper.env
    dst: /etc/keeper/keeper.env
    type: config|noreplace
    file_info:
      mode: 0644

  # Пример конфига — отдельным именем, чтобы upgrade не трогал рабочий
  # /etc/keeper/keeper.yml оператора. Скопировать руками при первой установке.
  - src: ./examples/keeper/keeper.yml
    dst: /etc/keeper/keeper.yml.example
    file_info:
      mode: 0640

# Maintainer-scripts (deb: postinst/prerm/postrm, rpm: %post/%preun/%postun).
# Создают системного пользователя soul-stack и рабочие каталоги keeper с
# правильным владельцем — без этого clean-install не работает (демон под
# soul-stack не пишет в root-owned /var/lib/soul-stack-keeper). Bootstrap
# первого Архонта (keeper init) остаётся ручным.
scripts:
  postinstall: ./deploy/nfpm/scripts/keeper.postinstall.sh
  preremove:   ./deploy/nfpm/scripts/keeper.preremove.sh
  postremove:  ./deploy/nfpm/scripts/keeper.postremove.sh

overrides:
  deb:
    # passwd — пакет с useradd (Essential/base в Debian и Ubuntu); postinst его
    # вызывает напрямую. Был adduser — он лишь обёртка над тем же passwd.
    depends:
      - passwd
  rpm:
    depends:
      - shadow-utils
