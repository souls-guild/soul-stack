# nfpm-конфиг пакета `soul-lint` (deb + rpm). ADR-004 — офлайн-линтер (CLI).
#
# Сборка: `make pkg`. Версия из переменной окружения VERSION (см. Makefile).
# Бинарь собирается ДО упаковки (`make build`) — кладётся soul-lint/bin/soul-lint.
#
# В отличие от keeper/soul — НЕ демон: нет systemd-юнита, нет env-файла, нет
# конфига. Только бинарь в /usr/local/bin (запускается оператором вручную).
name: soul-stack-soul-lint
arch: ${ARCH}
platform: linux
version: ${VERSION}
section: devel
priority: optional
maintainer: Soul Stack <noreply@soul-stack.dev>
description: |
  Soul Stack soul-lint — офлайн-валидатор артефактов (ADR-004): destiny /
  service / manifest / scenario. CLI, без демона и конфига.
vendor: Soul Stack
homepage: https://github.com/souls-guild/soul-stack
license: Apache-2.0

contents:
  - src: ./soul-lint/bin/soul-lint
    dst: /usr/local/bin/soul-lint
    file_info:
      mode: 0755
