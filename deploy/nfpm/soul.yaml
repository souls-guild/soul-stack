# nfpm config for the `soul` package (deb + rpm). ADR-004 — managed agent daemon.
#
# Build: `make pkg`. Version from the VERSION environment variable (see Makefile).
# The binary is built BEFORE packaging (`make build`) with ldflags version
# injection — lands at soul/bin/soul.
#
# Hardening of the soul unit is softer than keeper's: Soul applies Destiny
# (installs packages, edits files) and requires real privileges on the host
# (see soul.service).
name: soul-stack-soul
arch: ${ARCH}
platform: linux
version: ${VERSION}
section: admin
priority: optional
maintainer: Soul Stack <noreply@soul-stack.com>
description: |
  Soul Stack Soul — managed agent daemon (ADR-004). Initiates a gRPC stream to
  Keeper over mTLS, applies Destiny via core modules.
vendor: Soul Stack
homepage: https://github.com/souls-guild/soul-stack
license: BUSL-1.1

contents:
  - src: ./soul/bin/soul
    dst: /usr/local/bin/soul
    file_info:
      mode: 0755

  - src: ./deploy/systemd/soul.service
    dst: /etc/systemd/system/soul.service
    file_info:
      mode: 0644

  - src: ./deploy/systemd/soul.env
    dst: /etc/soul/soul.env
    type: config|noreplace
    file_info:
      mode: 0644

  # Example config — under a separate name; the operator creates the working
  # /etc/soul/soul.yml themselves (see soul.service: install, soul init).
  - src: ./examples/soul/soul.yml
    dst: /etc/soul/soul.yml.example
    file_info:
      mode: 0640

# Maintainer scripts (deb: postinst/prerm/postrm, rpm: %post/%preun/%postun).
# Create the soul-stack system user and state directories with the right
# owner — without this clean-install doesn't work (soul init fails on MkdirAll
# in root-owned directories). Onboarding (soul init --token) stays manual.
scripts:
  postinstall: ./deploy/nfpm/scripts/soul.postinstall.sh
  preremove:   ./deploy/nfpm/scripts/soul.preremove.sh
  postremove:  ./deploy/nfpm/scripts/soul.postremove.sh

overrides:
  deb:
    # passwd — the package with useradd (Essential/base on Debian and Ubuntu);
    # postinst calls it directly. Used to be adduser — just a wrapper over the same passwd.
    depends:
      - passwd
  rpm:
    depends:
      - shadow-utils
