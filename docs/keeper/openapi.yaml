          type: string
        batch_percent:
          format: int64
          maximum: 100
          minimum: 1
          type: integer
        batch_size:
          format: int64
          minimum: 1
          type: integer
        concurrency:
          format: int64
          maximum: 500
          minimum: 1
          type: integer
        dry_run:
          type: boolean
        fail_threshold:
          format: int64
          minimum: 1
          type: integer
        input:
          additionalProperties: {}
          description: recipe parameters
          type: object
        inter_batch_interval_ms:
          format: int64
          type: integer
        inter_unit_interval_ms:
          format: int64
          type: integer
        kind:
          description: run recipe type
          enum:
            - scenario
            - command
          type: string
        max_failures:
          description: "failure threshold: N absolute or N%"
          type: string
        module:
          description: module for kind=command
          type: string
        notify:
          description: one-off subscriptions to THIS run (ephemeral)
          items:
            $ref: "#/components/schemas/VoyageNotify"
          type:
            - array
            - "null"
        on_failure:
          description: abort | continue (default)
          type: string
        require_alive:
          type: boolean
        scenario_name:
          description: scenario name for kind=scenario
          type: string
        schedule_at:
          description: RFC3339 deferred start
          format: date-time
          type: string
        target:
          $ref: "#/components/schemas/VoyageTarget"
          description: declarative target (resolved into a snapshot of units)
      required:
        - kind
        - target
      type: object
    VoyageListReply:
      additionalProperties: false
      properties:
        items:
          items:
            $ref: "#/components/schemas/Voyage"
          type:
            - array
            - "null"
        limit:
          format: int64
          type: integer
        offset:
          format: int64
          type: integer
        total:
          format: int64
          type: integer
      required:
        - items
        - limit
        - offset
        - total
      type: object
    VoyageNotify:
      additionalProperties: false
      properties:
        annotations:
          additionalProperties: {}
          type: object
        herald:
          description: Herald channel name
          pattern: ^[a-z0-9-]{1,63}$
          type: string
        "on":
          description: "terminal states/event types: completed|failed|partial"
          items:
            type: string
          type:
            - array
            - "null"
        only_changes:
          type: boolean
        only_failures:
          type: boolean
        projection:
          items:
            type: string
          type:
            - array
            - "null"
      required:
        - herald
      type: object
    VoyagePreviewReply:
      additionalProperties: false
      properties:
        batch_mode:
          type: string
        effective_batch_size:
          format: int64
          type: integer
        kind:
          type: string
        scope_size:
          format: int64
          type: integer
        total_batches:
          format: int64
          type: integer
      required:
        - batch_mode
        - kind
        - scope_size
        - total_batches
      type: object
    VoyageSummary:
      additionalProperties: false
      properties:
        cancelled:
          format: int64
          type: integer
        failed:
          format: int64
          type: integer
        no_match:
          format: int64
          type: integer
        succeeded:
          format: int64
          type: integer
        total:
          format: int64
          type: integer
      required:
        - cancelled
        - failed
        - succeeded
        - total
      type: object
    VoyageTarget:
      additionalProperties: false
      properties:
        coven:
          description: coven labels (scenario env tag / command host label)
          items:
            type: string
          type:
            - array
            - "null"
        incarnations:
          description: incarnation names (scenario mode)
          items:
            type: string
          type:
            - array
            - "null"
        service:
          description: service name (scenario mode)
          type: string
        sids:
          description: host SIDs (command mode)
          items:
            type: string
          type:
            - array
            - "null"
        where:
          description: CEL predicate as an ADDITION to sids/coven (command mode)
          type: string
      type: object
    VoyageTargetEntry:
      additionalProperties: false
      properties:
        apply_id:
          type: string
        batch_index:
          format: int64
          type: integer
        errand_id:
          type: string
        finished_at:
          format: date-time
          type: string
        status:
          type: string
        target_id:
          type: string
        target_kind:
          type: string
      required:
        - batch_index
        - status
        - target_id
        - target_kind
      type: object
    VoyageTargetsReply:
      additionalProperties: false
      properties:
        targets:
          items:
            $ref: "#/components/schemas/VoyageTargetEntry"
          type:
            - array
            - "null"
        voyage_id:
          pattern: ^[0-9A-HJKMNP-TV-Z]{26}$
          type: string
      required:
        - targets
        - voyage_id
      type: object
  securitySchemes:
    bearerAuth:
      bearerFormat: JWT
      description: "Archon JWT (Authorization: Bearer <jwt>). All /v1 operations require a valid token."
      scheme: bearer
      type: http
info:
  title: Soul Stack Keeper Operator API
  version: v1
openapi: 3.1.0
paths:
  /auth/ldap/login:
    post:
      description: "Federated authentication (ADR-058): LDAP search-bind → mapped to operators(aid)+roles → internal JWT in an HttpOnly+Secure cookie. Empty response body."
      operationId: ldapLogin
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LDAPLoginRequest"
        required: true
      responses:
        "204":
          description: No Content
          headers:
            Set-Cookie:
              schema:
                type: string
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HumaProblemError"
          description: Unauthorized
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HumaProblemError"
          description: Forbidden
        "422":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HumaProblemError"
          description: Unprocessable Entity
        "429":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HumaProblemError"
          description: Too Many Requests
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HumaProblemError"
          description: Internal Server Error
      summary: Operator login via LDAP
      tags:
        - auth
  /auth/oidc/callback:
    get:
      description: Validates id_token (JWKS signature/iss/aud/exp/nonce), maps to operators(aid)+roles, issues an internal JWT in an HttpOnly+Secure cookie, and redirects (302) to the UI. Validation/mapping error → 401/403.
      operationId: oidcCallback
      parameters:
        - description: authorization code from the IdP
          explode: false
          in: query
          name: code
          schema:
            description: authorization code from the IdP
            type: string
        - description: opaque CSRF state issued at /auth/oidc/login
          explode: false
          in: query
          name: state
          schema:
            description: opaque CSRF state issued at /auth/oidc/login
            type: string
        - description: error code from the IdP (if authentication was rejected)
          explode: false
          in: query
          name: error
          schema:
            description: error code from the IdP (if authentication was rejected)
            type: string
      responses:
        "302":
          description: Found
          headers:
            Location:
              schema:
                type: string
            Set-Cookie:
              schema:
                type: string
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HumaProblemError"
          description: Unauthorized
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HumaProblemError"
          description: Forbidden
        "422":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HumaProblemError"
          description: Unprocessable Entity
        "429":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HumaProblemError"
          description: Too Many Requests
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HumaProblemError"
          description: Internal Server Error
      summary: Operator OIDC callback
      tags:
        - auth
  /auth/oidc/login:
    get:
      description: "Federated authentication (ADR-058): generates state+nonce+PKCE and redirects (302) to the external IdP's authorization_endpoint."
      operationId: oidcLogin
      responses:
        "302":
          description: Found
          headers:
            Location:
              schema:
                type: string
        "429":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HumaProblemError"
          description: Too Many Requests
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HumaProblemError"
          description: Internal Server Error
      summary: Start of operator OIDC login
      tags:
        - auth
  /v1/audit:
    get:
      description: Read-only audit_log feed with filters (type/source multi-OR, archon_aid/correlation_id case-insensitive substring ILIKE, payload_herald/payload_voyage exact, started_after/before RFC3339) and pagination. Permission audit.read. Read-only, no audit (reads are not logged - would recurse).
      operationId: listAuditEvents
      parameters:
        - description: "multi-value ?type=X&type=Y: exact-match OR on event_type"
          explode: true
          in: query
          name: type
          schema:
            description: "multi-value ?type=X&type=Y: exact-match OR on event_type"
            items:
              type: string
            type:
              - array
              - "null"
        - description: "multi-value ?source=api&source=mcp: exact-match OR; value outside the enum → 422"
          explode: true
          in: query
          name: source
          schema:
            description: "multi-value ?source=api&source=mcp: exact-match OR; value outside the enum → 422"
            items:
              enum:
                - signal
                - api
                - mcp
                - keeper_internal
                - soul_grpc
                - background
                - config_bootstrap
              type: string
            type:
              - array
              - "null"
        - description: initiating Archon's AID (case-insensitive substring, ILIKE)
          explode: false
          in: query
          name: archon_aid
          schema:
            description: initiating Archon's AID (case-insensitive substring, ILIKE)
            type: string
        - description: ULID of the chain of related events (case-insensitive substring, ILIKE)
          explode: false
          in: query
          name: correlation_id
          schema:
            description: ULID of the chain of related events (case-insensitive substring, ILIKE)
            type: string
        - description: Herald channel name from payload->>'herald' (exact match)
          explode: false
          in: query
          name: payload_herald
          schema:
            description: Herald channel name from payload->>'herald' (exact match)
            type: string
        - description: voyage_id from payload->>'voyage_id' (exact match)
          explode: false
          in: query
          name: payload_voyage
          schema:
            description: voyage_id from payload->>'voyage_id' (exact match)
            type: string
        - description: created_at >= started_after (RFC3339, inclusive); bad value → 400
          explode: false
          in: query
          name: started_after
          schema:
            description: created_at >= started_after (RFC3339, inclusive); bad value → 400
            format: date-time
            type: string
        - description: created_at <= started_before (RFC3339, inclusive); bad value → 400
          explode: false
          in: query
          name: started_before
          schema:
            description: created_at <= started_before (RFC3339, inclusive); bad value → 400
            format: date-time
            type: string
        - description: offset from the start of the set, ≥0 (matches shared/api.ParsePage; out-of-range → 400)
          explode: false
          in: query
          name: offset
          schema:
            default: 0
            description: offset from the start of the set, ≥0 (matches shared/api.ParsePage; out-of-range → 400)
            format: int32
            type: integer
        - description: page size 1..1000 (matches shared/api.ParsePage; out-of-range → 400)
          explode: false
          in: query
          name: limit
          schema:
            default: 50
            description: page size 1..1000 (matches shared/api.ParsePage; out-of-range → 400)
            format: int32
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditEventListReply"
          description: OK
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HumaProblemError"
          description: Bad Request
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HumaProblemError"
          description: Forbidden
        "422":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HumaProblemError"
          description: Unprocessable Entity
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HumaProblemError"
          description: Internal Server Error
      summary: Audit-events feed (paged + filters)
      tags:
        - audit
  /v1/augur/omens:
    get:
      description: Omen registry with pagination (ADR-025). Permission omen.list. Read-only, no audit.
      operationId: listOmens
      parameters:
        - description: offset from the start of the set, ≥0 (matches shared/api.ParsePage; out-of-range → 400)
          explode: false
          in: query
          name: offset
          schema:
            default: 0
            description: offset from the start of the set, ≥0 (matches shared/api.ParsePage; out-of-range → 400)
            format: int32
            type: integer
        - description: page size 1..1000 (matches shared/api.ParsePage; out-of-range → 400)
          explode: false
          in: query
          name: limit
          schema:
            default: 50
            description: page size 1..1000 (matches shared/api.ParsePage; out-of-range → 400)
            format: int32
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OmenListReply"
          description: OK
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HumaProblemError"
          description: Bad Request
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HumaProblemError"
          description: Forbidden
        "422":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HumaProblemError"
          description: Unprocessable Entity
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HumaProblemError"
          description: Internal Server Error
      summary: Omen list (paged)
      tags:
        - augur
    post:
      description: Adds an Omen (an external system) to the augur registry (ADR-025). Permission omen.create. 409 - name already taken. The master credential is not stored (only auth_ref).
      operationId: createOmen
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OmenCreateRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OmenView"
          description: Created
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HumaProblemError"
          description: Bad Request
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HumaProblemError"
          description: Forbidden
        "409":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HumaProblemError"
          description: Conflict
        "422":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HumaProblemError"
          description: Unprocessable Entity
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HumaProblemError"
          description: Internal Server Error
      summary: Create an Omen
      tags:
        - augur
  /v1/augur/omens/{name}:
    delete:
      description: Deletes an Omen cascadingly (related Rites, ADR-025). Permission omen.delete. 404 - no such record.
      operationId: deleteOmen
      parameters:
        - description: Omen name
          in: path
          name: name
          required: true
          schema:
            description: Omen name
            type: string
      responses:
        "204":
          description: No Content
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HumaProblemError"
          description: Forbidden
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HumaProblemError"
          description: Not Found
        "422":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HumaProblemError"
          description: Unprocessable Entity
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HumaProblemError"
          description: Internal Server Error
      summary: Delete an Omen
      tags:
        - augur
    get:
      description: Metadata for a single Omen by name (ADR-025). Permission omen.list (read is covered by the list permission). Read-only, no audit.
      operationId: getOmen
      parameters:
        - description: Omen name
          in: path
          name: name
          required: true
          schema:
            description: Omen name
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OmenView"
          description: OK
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HumaProblemError"
          description: Forbidden
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HumaProblemError"
          description: Not Found
        "422":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HumaProblemError"
          description: Unprocessable Entity
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HumaProblemError"
          description: Internal Server Error
      summary: Omen details
      tags:
        - augur
  /v1/augur/rites:
    get:
      description: Rites (grants) of a single Omen (ADR-025). Permission rite.list. Required filter omen=<name>. Read-only, no audit.
      operationId: listRites
      parameters:
        - description: by-omen filter (required in the MVP); empty/malformed → 422
          explode: false
          in: query
          name: omen
          schema:
            description: by-omen filter (required in the MVP); empty/malformed → 422
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiteListReply"
          description: OK
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HumaProblemError"
          description: Forbidden
        "422":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HumaProblemError"
          description: Unprocessable Entity
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HumaProblemError"
          description: Internal Server Error
      summary: Rite list by Omen
      tags:
        - augur
    post:
      description: Adds a Rite (grant) to the augur registry (ADR-025). Permission rite.create. 404 - Omen does not exist. 422 - subject XOR violation/malformed allow.
      operationId: createRite
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RiteCreateRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiteView"
          description: Created
        "400":
          content:
