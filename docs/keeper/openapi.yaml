            description: multi-value ?status=X&status=Y OR; outside enum -> 422
            items:
              enum:
                - scheduled
                - pending
                - running
                - succeeded
                - failed
                - partial_failed
                - cancelled
              type: string
            type:
              - array
              - "null"
        - description: offset from start of set, ≥0 (out-of-range → 400)
          explode: false
          in: query
          name: offset
          schema:
            default: 0
            description: offset from start of set, ≥0 (out-of-range → 400)
            format: int32
            type: integer
        - description: page size 1..1000 (out-of-range → 400)
          explode: false
          in: query
          name: limit
          schema:
            default: 50
            description: page size 1..1000 (out-of-range → 400)
            format: int32
            type: integer
