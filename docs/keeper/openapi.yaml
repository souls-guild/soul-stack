components:
  schemas:
    AuditEvent:
      additionalProperties: false
      properties:
        archon_aid:
          pattern: ^[a-z0-9][a-z0-9._@-]{1,127}$
          type: string
        correlation_id:
          pattern: ^[0-9A-HJKMNP-TV-Z]{26}$
          type: string
        created_at:
          format: date-time
          type: string
        id:
          pattern: ^[0-9A-HJKMNP-TV-Z]{26}$
          type: string
        payload:
          additionalProperties: {}
          type: object
        source:
          type: string
        type:
          type: string
      required:
        - created_at
        - id
        - payload
        - source
        - type
      type: object
    AuditEventListReply:
      additionalProperties: false
      properties:
        items:
          items:
            $ref: "#/components/schemas/AuditEvent"
          type:
            - array
            - "null"
        limit:
          format: int64
          type: integer
        offset:
          format: int64
          type: integer
        total:
          format: int64
          type: integer
      required:
        - items
        - limit
        - offset
        - total
      type: object
    Cadence:
      additionalProperties: false
      properties:
        batch_mode:
          enum:
            - barrier
            - window
          type: string
        batch_percent:
          format: int64
          type: integer
        batch_size:
          format: int64
          type: integer
        cadence_id:
          description: ULID расписания
          pattern: ^[0-9A-HJKMNP-TV-Z]{26}$
          type: string
        concurrency:
          format: int64
          type: integer
        created_at:
          format: date-time
          type: string
        created_by_aid:
          pattern: ^[a-z0-9][a-z0-9._@-]{1,127}$
          type: string
        cron_expr:
          type: string
        enabled:
          type: boolean
        fail_threshold:
          format: int64
          type: integer
        fail_threshold_percent:
          format: int64
          type: integer
        interval_seconds:
          format: int64
          type: integer
        kind:
          enum:
            - scenario
            - command
          type: string
        last_run_at:
          format: date-time
          type: string
        module:
          type: string
        name:
          type: string
        next_run_at:
          format: date-time
          type: string
        on_failure:
          enum:
            - abort
            - continue
          type: string
        overlap_policy:
          enum:
            - skip
            - queue
            - parallel
          type: string
        require_alive:
          type: boolean
        scenario_name:
          type: string
        schedule_kind:
          enum:
            - interval
            - cron
          type: string
        target:
          $ref: "#/components/schemas/VoyageTarget"
          description: декларативный таргет прогона (declarative, отдаётся as-is)
        updated_at:
          format: date-time
          type: string
      required:
        - cadence_id
        - name
        - enabled
        - schedule_kind
        - overlap_policy
        - kind
        - created_by_aid
        - created_at
        - updated_at
      type: object
    CadenceCreateReply:
      additionalProperties: false
      properties:
        cadence_id:
          description: ULID созданного расписания
          pattern: ^[0-9A-HJKMNP-TV-Z]{26}$
          type: string
        enabled:
          type: boolean
        location:
          description: относительный URL ресурса
          type: string
        name:
          type: string
        next_run_at:
          description: RFC3339 время следующего запуска
          format: date-time
          type: string
      required:
        - cadence_id
        - name
        - enabled
        - location
      type: object
    CadenceCreateRequest:
      additionalProperties: false
      properties:
        batch:
          description: "размер батча: N хостов/инкарнаций или N%"
          type: string
        batch_mode:
          type: string
        batch_percent:
          format: int64
          maximum: 100
          minimum: 1
          type: integer
        batch_size:
          format: int64
          minimum: 1
          type: integer
        concurrency:
          format: int64
          minimum: 1
          type: integer
        cron_expr:
          description: cron-выражение для schedule_kind=cron
          type: string
        enabled:
          description: вкл/выкл планировщика (default true)
          type: boolean
        fail_threshold:
          format: int64
          minimum: 1
          type: integer
        input:
          additionalProperties: {}
          description: параметры рецепта
          type: object
        inter_batch_interval_ms:
          format: int64
          type: integer
        inter_unit_interval_ms:
          format: int64
          type: integer
        interval_seconds:
          description: период для schedule_kind=interval (минимум 30с — абсолютный poll_floor, ADR-046/048)
          format: int64
          minimum: 30
          type: integer
        kind:
          description: тип рецепта прогона
          enum:
            - scenario
            - command
          type: string
        max_failures:
          description: "порог провалов: N абсолют или N%"
          type: string
        module:
          description: модуль для kind=command
          type: string
        name:
          description: человекочитаемое имя расписания
          type: string
        notify:
          description: подписки на уведомления о прогонах этого расписания
          items:
            $ref: "#/components/schemas/VoyageNotify"
          type:
            - array
            - "null"
        on_failure:
          type: string
        overlap_policy:
          description: политика наложения прогонов
          enum:
            - skip
            - queue
            - parallel
          type: string
        require_alive:
          type: boolean
        scenario_name:
          description: имя сценария для kind=scenario
          type: string
        schedule_kind:
          description: тип расписания
          enum:
            - interval
            - cron
          type: string
        target:
          $ref: "#/components/schemas/VoyageTarget"
          description: таргет прогона (резолвится на спавне)
      required:
        - name
        - schedule_kind
        - overlap_policy
        - kind
        - target
      type: object
    CadenceEnabledReply:
      additionalProperties: false
      properties:
        cadence_id:
          pattern: ^[0-9A-HJKMNP-TV-Z]{26}$
          type: string
        enabled:
          type: boolean
      required:
        - cadence_id
        - enabled
      type: object
    CadenceListReply:
      additionalProperties: false
      properties:
        items:
          description: страница расписаний
          items:
            $ref: "#/components/schemas/Cadence"
          type:
            - array
            - "null"
        limit:
          description: размер страницы
          format: int32
          type: integer
        offset:
          description: сдвиг от начала набора
          format: int32
          type: integer
        total:
          description: общее число записей в наборе
          format: int32
          type: integer
      required:
        - items
        - offset
        - limit
        - total
      type: object
    CadencePatchRequest:
      additionalProperties: false
      properties:
        batch:
          description: "размер батча: N хостов/инкарнаций или N%"
          type: string
        batch_mode:
          type: string
        batch_percent:
          format: int64
          maximum: 100
          minimum: 1
          type: integer
        batch_size:
          format: int64
          minimum: 1
          type: integer
        concurrency:
          format: int64
          minimum: 1
          type: integer
        cron_expr:
          description: cron-выражение (пустая строка → очистить)
          type: string
        enabled:
          description: вкл/выкл планировщика
          type: boolean
        fail_threshold:
          format: int64
          minimum: 1
          type: integer
        input:
          additionalProperties: {}
          description: параметры рецепта
          type: object
        interval_seconds:
          description: период для schedule_kind=interval (минимум 30с — абсолютный poll_floor, ADR-046/048)
          format: int64
          minimum: 30
          type: integer
        max_failures:
          description: "порог провалов: N абсолют или N%"
          type: string
        module:
          description: модуль для kind=command (пустая строка → очистить)
          type: string
        name:
          description: человекочитаемое имя расписания
          type: string
        on_failure:
          description: abort|continue (пустая строка → очистить)
          type: string
        overlap_policy:
          description: политика наложения прогонов
          enum:
            - skip
            - queue
            - parallel
          type: string
        require_alive:
          type: boolean
        scenario_name:
          description: имя сценария (пустая строка → очистить)
          type: string
        schedule_kind:
          description: тип расписания
          enum:
            - interval
            - cron
          type: string
        target:
          $ref: "#/components/schemas/VoyageTarget"
          description: таргет прогона
      type: object
    Choir:
      additionalProperties: false
      properties:
        choir_name:
          type: string
        created_at:
          format: date-time
          type: string
        created_by_aid:
          pattern: ^[a-z0-9][a-z0-9._@-]{1,127}$
          type:
            - string
            - "null"
        description:
          type:
            - string
            - "null"
        incarnation_name:
          pattern: ^[a-z0-9][a-z0-9-]{0,62}$
          type: string
        max_size:
          format: int64
          type:
            - integer
            - "null"
        min_size:
          format: int64
          type:
            - integer
            - "null"
      required:
        - choir_name
        - created_at
        - created_by_aid
        - description
        - incarnation_name
        - max_size
        - min_size
      type: object
    ChoirCreateRequest:
      additionalProperties: false
      properties:
        choir_name:
          description: имя Choir-а (^[a-z][a-z0-9_-]*$)
          pattern: ^[a-z][a-z0-9_-]*$
          type: string
        description:
          description: человекочитаемое описание
          type: string
        max_size:
          description: верхний лимит размера партии (≥ min_size)
          format: int64
          type: integer
        min_size:
          description: нижний лимит размера партии (> 0)
          format: int64
          type: integer
      required:
        - choir_name
      type: object
    ChoirListReply:
      additionalProperties: false
      properties:
        items:
          items:
            $ref: "#/components/schemas/Choir"
          type:
            - array
            - "null"
        limit:
          format: int64
          type: integer
        offset:
          format: int64
          type: integer
        total:
          format: int64
          type: integer
      required:
        - items
        - limit
        - offset
        - total
      type: object
    ClusterInstanceEntry:
      additionalProperties: false
      properties:
        alive:
          type: boolean
        is_reaper_leader:
          type: boolean
        kid:
          type: string
        started_at:
          format: date-time
          type: string
      required:
        - kid
        - alive
        - is_reaper_leader
      type: object
    ClusterReply:
      additionalProperties: false
      properties:
        instances:
          items:
            $ref: "#/components/schemas/ClusterInstanceEntry"
          type:
            - array
            - "null"
        self_health:
          additionalProperties:
            type: string
          type: object
        self_kid:
          type: string
      required:
        - instances
        - self_kid
        - self_health
      type: object
    DecreeCreateRequest:
      additionalProperties: false
      properties:
        action_input:
          description: вход сценария (vault-ref едет как есть)
        action_scenario:
          description: named scenario (whitelist; raw-команда отвергнута)
          pattern: ^[a-z][a-z0-9_]*$
          type: string
        cooldown:
          description: минимальный интервал между срабатываниями per-(decree, subject)
          type: string
        coven:
          description: субъект-метки coven (XOR с sid)
          items:
            type: string
          type: array
        enabled:
          description: активно ли правило (по умолчанию true)
          type: boolean
        incarnation_name:
          description: таргет-incarnation реакции (обязательно)
          pattern: ^[a-z0-9][a-z0-9-]{0,62}$
          type: string
        name:
          description: имя Decree-а (kebab-case, 1..63)
          pattern: ^[a-z0-9-]{1,63}$
          type: string
        on_beacon:
          description: имя Vigil-а, на чей Portent правило реагирует
          pattern: ^[a-z0-9-]{1,63}$
          type: string
        sid:
          description: субъект — один конкретный SID (XOR с coven)
          type: string
        where:
          description: опц. CEL-предикат над event.data; compile-проверяется
          type: string
      required:
        - name
        - on_beacon
        - incarnation_name
        - action_scenario
      type: object
    DecreeListReply:
      additionalProperties: false
      properties:
        items:
          items:
            $ref: "#/components/schemas/DecreeView"
          type:
            - array
            - "null"
        limit:
          format: int32
          type: integer
        offset:
          format: int32
          type: integer
        total:
          format: int32
          type: integer
      required:
        - items
        - limit
        - offset
        - total
      type: object
    DecreeView:
      additionalProperties: false
      properties:
        action_input: {}
        action_scenario:
          type: string
        cooldown:
          type: string
        coven:
          items:
            type: string
          type: array
        created_at:
          format: date-time
          type: string
        created_by_aid:
          type: string
        enabled:
          type: boolean
        incarnation_name:
          pattern: ^[a-z0-9][a-z0-9-]{0,62}$
          type: string
        name:
          pattern: ^[a-z0-9-]{1,63}$
          type: string
        on_beacon:
          pattern: ^[a-z0-9-]{1,63}$
          type: string
        sid:
          type: string
        updated_at:
          format: date-time
          type: string
        where:
          type: string
      required:
        - action_input
        - action_scenario
        - cooldown
        - created_at
        - enabled
        - incarnation_name
        - name
        - on_beacon
        - updated_at
      type: object
    DriftHostReport:
      additionalProperties: false
      properties:
        sid:
          type: string
        status:
          type: string
        tasks:
          items:
            $ref: "#/components/schemas/DriftTaskResult"
          type:
            - array
            - "null"
      required:
        - sid
        - status
        - tasks
      type: object
    DriftReport:
      additionalProperties: false
      properties:
        checked_at:
          format: date-time
          type: string
        hosts:
          items:
            $ref: "#/components/schemas/DriftHostReport"
          type:
            - array
            - "null"
        incarnation:
          type: string
        scenario_ref:
          type: string
        summary:
          $ref: "#/components/schemas/DriftSummary"
      required:
        - checked_at
        - incarnation
        - scenario_ref
        - hosts
        - summary
      type: object
    DriftScanSummary:
      additionalProperties: false
      properties:
        hosts_clean:
          format: int64
          type: integer
        hosts_drifted:
          format: int64
          type: integer
        hosts_failed:
          format: int64
          type: integer
        hosts_unsupported:
          format: int64
          type: integer
        scanned_at:
          format: date-time
          type: string
        total_hosts:
          format: int64
          type: integer
      required:
        - hosts_clean
        - hosts_drifted
        - hosts_failed
        - hosts_unsupported
        - scanned_at
        - total_hosts
      type: object
    DriftSummary:
      additionalProperties: false
      properties:
        hosts_clean:
          format: int64
          type: integer
        hosts_drifted:
          format: int64
          type: integer
        hosts_failed:
          format: int64
          type: integer
        hosts_unsupported:
          format: int64
          type: integer
      required:
        - hosts_drifted
        - hosts_clean
        - hosts_unsupported
        - hosts_failed
      type: object
    DriftTaskResult:
      additionalProperties: false
      properties:
        action:
          type: string
        changed:
          type: boolean
        idx:
          format: int64
          type: integer
        message:
          type: string
        module:
          type: string
      required:
        - idx
        - module
        - changed
      type: object
    ErrandAccepted:
      additionalProperties: false
      properties:
        errand_id:
          description: ULID запущенного Errand-а
          pattern: ^[0-9A-HJKMNP-TV-Z]{26}$
          type: string
        status:
          description: строка ещё выполняется (async-escalation)
          enum:
            - running
          type: string
      required:
        - errand_id
        - status
      type: object
    ErrandListReply:
      additionalProperties: false
      properties:
        items:
          items:
            $ref: "#/components/schemas/ErrandResult"
          type:
            - array
            - "null"
        limit:
          format: int64
          type: integer
        offset:
          format: int64
          type: integer
        total:
          format: int64
          type: integer
      required:
        - items
        - limit
        - offset
        - total
      type: object
    ErrandResult:
      additionalProperties: false
      properties:
        duration_ms:
          format: int64
          type: integer
        errand_id:
          pattern: ^[0-9A-HJKMNP-TV-Z]{26}$
          type: string
        error_message:
          type: string
        exit_code:
          format: int32
          type: integer
        finished_at:
          format: date-time
          type: string
        module:
          type: string
        output:
          additionalProperties: {}
          type: object
        sid:
          pattern: ^[a-z0-9][a-z0-9.-]{0,253}$
          type: string
        started_at:
          format: date-time
          type: string
        started_by_aid:
          pattern: ^[a-z0-9][a-z0-9._@-]{1,127}$
          type: string
        status:
          type: string
        stderr:
          type: string
        stderr_truncated:
          type: boolean
        stdout:
          type: string
        stdout_truncated:
          type: boolean
      required:
        - errand_id
        - module
        - sid
        - started_at
        - started_by_aid
        - status
      type: object
    ErrandRunRequest:
      additionalProperties: false
      properties:
        dry_run:
          description: только для PlanReadSafe-модулей; verb-модуль (shell/exec) → 400
          type: boolean
        input:
          additionalProperties: {}
          description: input для модуля (валидируется против input_schema)
          type: object
        module:
          description: fully-qualified <ns>.<name>.<state> (core.cmd.shell / core.exec.run / ErrandReadSafe-модуль)
          type: string
        timeout_seconds:
          description: полный timeout Errand-а [1..300]; 0/опущено → дефолт 30s; > server-cap (30s) → 202 + Location
          format: int64
          maximum: 300
          type: integer
      required:
        - module
      type: object
    EventTypeArea:
      additionalProperties: false
      properties:
        name:
          type: string
      required:
        - name
      type: object
    EventTypeCatalogReply:
      additionalProperties: false
      properties:
        areas:
          items:
            $ref: "#/components/schemas/EventTypeArea"
          type:
            - array
            - "null"
        point_events:
          items:
            $ref: "#/components/schemas/EventTypePoint"
          type:
            - array
            - "null"
      required:
        - areas
        - point_events
      type: object
    EventTypePoint:
      additionalProperties: false
      properties:
        name:
          type: string
      required:
        - name
      type: object
    GitRef:
      additionalProperties: false
      properties:
        commit:
          type: string
        is_default:
          type: boolean
        name:
          type: string
        type:
          type: string
      required:
        - commit
        - name
        - type
      type: object
    GlobalRunEntry:
      additionalProperties: false
      properties:
        apply_id:
          pattern: ^[0-9A-HJKMNP-TV-Z]{26}$
          type: string
        finished_at:
          format: date-time
          type: string
        incarnation:
          type: string
        scenario:
          type: string
        service:
          type: string
        started_at:
          format: date-time
          type: string
        started_by_aid:
          pattern: ^[a-z0-9][a-z0-9._@-]{1,127}$
          type: string
        status:
          enum:
            - applying
            - success
            - failed
            - cancelled
          type: string
      required:
        - apply_id
        - incarnation
        - service
        - scenario
        - status
        - started_at
      type: object
    GrantOperatorRequest:
      additionalProperties: false
      properties:
        aid:
          description: AID архонта, назначаемого в роль/группу (naming-rules.md)
          pattern: ^[a-z0-9][a-z0-9._@-]{1,127}$
          type: string
      required:
        - aid
      type: object
    Herald:
      additionalProperties: false
      properties:
        config:
          additionalProperties: {}
          type: object
        created_at:
          format: date-time
          type: string
        created_by_aid:
          type: string
        enabled:
          type: boolean
        name:
          pattern: ^[a-z0-9-]{1,63}$
          type: string
        secret_ref:
          type: string
        type:
          type: string
        updated_at:
          format: date-time
          type: string
      required:
        - config
        - created_at
        - enabled
        - name
        - type
        - updated_at
      type: object
    HeraldCreateRequest:
      additionalProperties: false
      properties:
        config:
          additionalProperties: {}
          description: "per-type config (форма зависит от type; см. каталог GET /v1/herald-types). Секрет канала (bot_token/webhook_url/header_secret) — dual-mode: значение (plaintext) ИЛИ *_ref (vault-путь)"
          type: object
        enabled:
          description: канал включён (опущено → true)
          type: boolean
        name:
          description: имя Herald-канала (kebab-case, 1..63), уникальное в кластере
          pattern: ^[a-z0-9-]{1,63}$
          type: string
        secret:
          description: "опц. plaintext webhook signing-token (dual-mode, ADR-064): keeper пишет его в Vault сам; XOR с secret_ref. Требует TLS-фронта (secret_ingest.accept_plaintext)"
          type: string
        secret_ref:
          description: опц. vault-ref на webhook signing-token (vault:<mount>/<path>); XOR с secret
          type: string
        type:
          description: "тип канала (closed-enum: webhook|telegram|slack|mattermost|discord|custom|email); значение вне enum → 422"
          enum:
            - custom
            - discord
            - email
            - mattermost
            - slack
            - telegram
            - webhook
          type: string
      required:
        - name
        - type
        - config
      type: object
    HeraldListReply:
      additionalProperties: false
      properties:
        items:
          items:
            $ref: "#/components/schemas/Herald"
          type:
            - array
            - "null"
        limit:
          format: int64
          type: integer
        offset:
          format: int64
          type: integer
        total:
          format: int64
          type: integer
      required:
        - items
        - limit
        - offset
        - total
      type: object
    HeraldTypeCatalogEntry:
      additionalProperties: false
      properties:
        fields:
          items:
