        attempt:
          format: int64
          type: integer
        batch_mode:
          type: string
        batch_percent:
          format: int64
          type: integer
        batch_size:
          format: int64
          type: integer
        concurrency:
          format: int64
          type: integer
        created_at:
          format: date-time
          type: string
        current_batch_index:
          format: int64
          type: integer
        dry_run:
