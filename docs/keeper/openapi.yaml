  securitySchemes:
    bearerAuth:
      bearerFormat: JWT
      description: "Archon JWT (Authorization: Bearer <jwt>). All /v1 operations require a valid token."
      scheme: bearer
      type: http
info:
  title: Soul Stack Keeper Operator API
  version: v1
openapi: 3.1.0
paths:
  /auth/ldap/login:
    post:
      description: "Federated authentication (ADR-058): LDAP search-bind -> mapping onto operators(aid)+roles -> internal JWT in HttpOnly+Secure cookie. Response body is empty."
      operationId: ldapLogin
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LDAPLoginRequest"
        required: true
      responses:
        "204":
          description: No Content
          headers:
            Set-Cookie:
              schema:
                type: string
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HumaProblemError"
          description: Unauthorized
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HumaProblemError"
          description: Forbidden
        "422":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HumaProblemError"
          description: Unprocessable Entity
        "429":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HumaProblemError"
          description: Too Many Requests
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HumaProblemError"
          description: Internal Server Error
      summary: Operator login via LDAP
      tags:
        - auth
  /auth/methods:
    get:
      description: Public list of login methods for the UI login form (password always true; ldap/oidc — depending on keeper config). Booleans only, no IdP URLs/domains.
      operationId: authMethods
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthMethodsReply"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HumaProblemError"
          description: Error
      summary: Available login methods
      tags:
        - auth
  /auth/oidc/callback:
    get:
      description: Validates id_token (JWKS signature/iss/aud/exp/nonce), maps to operators(aid)+roles, issues the internal JWT in an HttpOnly+Secure cookie and redirects (302) to the UI. Validation/mapping error -> 401/403.
      operationId: oidcCallback
      parameters:
        - description: authorization code from the IdP
          explode: false
          in: query
          name: code
          schema:
            description: authorization code from the IdP
            type: string
        - description: opaque CSRF-state, issued at /auth/oidc/login
          explode: false
          in: query
          name: state
          schema:
            description: opaque CSRF-state, issued at /auth/oidc/login
            type: string
        - description: error code from the IdP (if authentication was rejected)
          explode: false
          in: query
          name: error
          schema:
            description: error code from the IdP (if authentication was rejected)
            type: string
      responses:
        "302":
          description: Found
          headers:
            Location:
              schema:
                type: string
            Set-Cookie:
              schema:
                type: string
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HumaProblemError"
          description: Unauthorized
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HumaProblemError"
          description: Forbidden
        "422":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HumaProblemError"
          description: Unprocessable Entity
        "429":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HumaProblemError"
          description: Too Many Requests
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HumaProblemError"
          description: Internal Server Error
      summary: OIDC callback for the operator
      tags:
        - auth
  /auth/oidc/login:
    get:
      description: "Federated authentication (ADR-058): generates state+nonce+PKCE and redirects (302) to the external IdP's authorization_endpoint."
      operationId: oidcLogin
      responses:
        "302":
          description: Found
          headers:
            Location:
              schema:
                type: string
        "429":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HumaProblemError"
          description: Too Many Requests
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HumaProblemError"
          description: Internal Server Error
      summary: Start OIDC login for the operator
      tags:
        - auth
  /auth/token:
    post:
      description: "NIM-77/ADR-058 (Variant B): reads the HttpOnly cookie soul_session (internal JWT), verifies it with the same verifier as the Bearer on /v1, and issues a short-lived Bearer in the JSON body. Subject/roles are strictly from verified cookie claims. Not written to audit."
      operationId: authTokenExchange
      parameters:
        - in: cookie
          name: soul_session
          schema:
            type: string
        - in: header
          name: Sec-Fetch-Site
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokenReply"
          description: OK
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HumaProblemError"
          description: Unauthorized
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HumaProblemError"
          description: Forbidden
        "422":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HumaProblemError"
          description: Unprocessable Entity
        "429":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HumaProblemError"
          description: Too Many Requests
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HumaProblemError"
          description: Internal Server Error
      summary: Exchange session-cookie for a short Bearer
      tags:
        - auth
  /v1/audit:
    get:
      description: Read-only feed of audit_log with filters (type/source multi-OR, archon_aid/correlation_id case-insensitive substring ILIKE, payload_herald/payload_voyage exact, started_after/before RFC3339) and pagination. Permission audit.read. Read-only, no audit (reads are not written - recursion).
      operationId: listAuditEvents
      parameters:
        - description: multi-value ?type=X&type=Y - exact-match OR by event_type
          explode: true
          in: query
          name: type
          schema:
            description: multi-value ?type=X&type=Y - exact-match OR by event_type
            items:
              type: string
            type:
              - array
              - "null"
        - description: multi-value ?source=api&source=mcp - exact-match OR; value outside enum -> 422
          explode: true
          in: query
          name: source
          schema:
            description: multi-value ?source=api&source=mcp - exact-match OR; value outside enum -> 422
            items:
              enum:
                - signal
                - api
                - mcp
                - keeper_internal
                - soul_grpc
                - background
                - config_bootstrap
              type: string
            type:
              - array
              - "null"
        - description: AID of the initiating Archon (case-insensitive substring, ILIKE)
          explode: false
          in: query
          name: archon_aid
          schema:
            description: AID of the initiating Archon (case-insensitive substring, ILIKE)
            type: string
        - description: ULID of the related event chain (case-insensitive substring, ILIKE)
          explode: false
          in: query
          name: correlation_id
          schema:
            description: ULID of the related event chain (case-insensitive substring, ILIKE)
            type: string
        - description: Herald channel name from payload->>'herald' (exact match)
          explode: false
          in: query
          name: payload_herald
          schema:
            description: Herald channel name from payload->>'herald' (exact match)
            type: string
        - description: voyage_id from payload->>'voyage_id' (exact match)
          explode: false
          in: query
          name: payload_voyage
          schema:
            description: voyage_id from payload->>'voyage_id' (exact match)
            type: string
        - description: created_at >= started_after (RFC3339, inclusive); bad-value -> 400
          explode: false
          in: query
          name: started_after
          schema:
            description: created_at >= started_after (RFC3339, inclusive); bad-value -> 400
            format: date-time
            type: string
        - description: created_at <= started_before (RFC3339, inclusive); bad-value -> 400
          explode: false
          in: query
          name: started_before
          schema:
            description: created_at <= started_before (RFC3339, inclusive); bad-value -> 400
            format: date-time
            type: string
        - description: offset from start of set, ≥0 (matches shared/api.ParsePage; out-of-range → 400)
          explode: false
          in: query
          name: offset
          schema:
            default: 0
            description: offset from start of set, ≥0 (matches shared/api.ParsePage; out-of-range → 400)
            format: int32
            type: integer
        - description: page size 1..1000 (matches shared/api.ParsePage; out-of-range → 400)
          explode: false
          in: query
          name: limit
          schema:
            default: 50
            description: page size 1..1000 (matches shared/api.ParsePage; out-of-range → 400)
            format: int32
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditEventListReply"
          description: OK
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HumaProblemError"
          description: Bad Request
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HumaProblemError"
          description: Forbidden
        "422":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HumaProblemError"
          description: Unprocessable Entity
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HumaProblemError"
          description: Internal Server Error
      summary: Feed of audit-events (paged + filters)
      tags:
        - audit
  /v1/augur/omens:
    get:
      description: Registry of Omens with pagination (ADR-025). Permission omen.list. Read-only, no audit.
      operationId: listOmens
      parameters:
        - description: offset from start of set, ≥0 (matches shared/api.ParsePage; out-of-range → 400)
          explode: false
          in: query
          name: offset
