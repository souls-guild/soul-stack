      parameters:
        - description: фильтр по kind; вне enum → 422
          explode: false
          in: query
          name: kind
          schema:
            description: фильтр по kind; вне enum → 422
            enum:
              - scenario
              - command
            type: string
        - description: multi-value ?status=X&status=Y OR; вне enum → 422
          explode: true
          in: query
          name: status
          schema:
            description: multi-value ?status=X&status=Y OR; вне enum → 422
            items:
              enum:
                - scheduled
                - pending
                - running
                - succeeded
                - failed
                - partial_failed
                - cancelled
              type: string
            type:
              - array
              - "null"
        - description: сдвиг от начала набора, ≥0 (out-of-range → 400)
