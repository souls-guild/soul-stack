            description: filter by kind; outside the enum → 422
            enum:
              - scenario
              - command
            type: string
        - description: multi-value ?status=X&status=Y OR; outside the enum → 422
          explode: true
          in: query
          name: status
          schema:
            description: multi-value ?status=X&status=Y OR; outside the enum → 422
            items:
              enum:
                - scheduled
                - pending
                - running
                - succeeded
                - failed
                - partial_failed
                - cancelled
              type: string
            type:
              - array
              - "null"
