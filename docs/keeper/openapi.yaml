  securitySchemes:
    bearerAuth:
      bearerFormat: JWT
      description: "Archon JWT (Authorization: Bearer <jwt>). Все /v1-операции требуют валидный токен."
      scheme: bearer
      type: http
info:
  title: Soul Stack Keeper Operator API
  version: v1
openapi: 3.1.0
paths:
  /auth/ldap/login:
    post:
      description: "Федеративная аутентификация (ADR-058): LDAP search-bind → маппинг на operators(aid)+роли → внутренний JWT в HttpOnly+Secure cookie. Тело ответа пустое."
      operationId: ldapLogin
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LDAPLoginRequest"
        required: true
      responses:
        "204":
          description: No Content
          headers:
            Set-Cookie:
              schema:
                type: string
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HumaProblemError"
          description: Unauthorized
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HumaProblemError"
          description: Forbidden
        "422":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HumaProblemError"
          description: Unprocessable Entity
        "429":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HumaProblemError"
          description: Too Many Requests
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HumaProblemError"
          description: Internal Server Error
      summary: Логин оператора через LDAP
      tags:
        - auth
  /auth/oidc/callback:
    get:
      description: Валидирует id_token (JWKS-подпись/iss/aud/exp/nonce), маппит на operators(aid)+роли, выпускает внутренний JWT в HttpOnly+Secure cookie и редиректит (302) в UI. Ошибка валидации/маппинга → 401/403.
      operationId: oidcCallback
      parameters:
        - description: authorization code от IdP
          explode: false
          in: query
          name: code
          schema:
            description: authorization code от IdP
            type: string
        - description: opaque CSRF-state, выданный на /auth/oidc/login
          explode: false
          in: query
          name: state
          schema:
            description: opaque CSRF-state, выданный на /auth/oidc/login
            type: string
        - description: код ошибки от IdP (если аутентификация отклонена)
          explode: false
          in: query
          name: error
          schema:
            description: код ошибки от IdP (если аутентификация отклонена)
            type: string
      responses:
        "302":
          description: Found
          headers:
            Location:
              schema:
                type: string
            Set-Cookie:
              schema:
                type: string
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HumaProblemError"
          description: Unauthorized
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HumaProblemError"
          description: Forbidden
        "422":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HumaProblemError"
          description: Unprocessable Entity
        "429":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HumaProblemError"
          description: Too Many Requests
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HumaProblemError"
          description: Internal Server Error
      summary: OIDC-callback оператора
      tags:
        - auth
  /auth/oidc/login:
    get:
      description: "Федеративная аутентификация (ADR-058): генерирует state+nonce+PKCE и редиректит (302) на authorization_endpoint внешнего IdP."
      operationId: oidcLogin
      responses:
        "302":
          description: Found
          headers:
            Location:
              schema:
                type: string
        "429":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HumaProblemError"
          description: Too Many Requests
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HumaProblemError"
          description: Internal Server Error
      summary: Старт OIDC-логина оператора
      tags:
        - auth
  /v1/audit:
    get:
      description: Read-only-лента audit_log с фильтрами (type/source multi-OR, archon_aid/correlation_id case-insensitive substring ILIKE, payload_herald/payload_voyage exact, started_after/before RFC3339) и пагинацией. Permission audit.read. Read-only, без audit (чтение не пишется — рекурсия).
      operationId: listAuditEvents
      parameters:
        - description: multi-value ?type=X&type=Y — exact-match OR по event_type
          explode: true
          in: query
          name: type
          schema:
            description: multi-value ?type=X&type=Y — exact-match OR по event_type
            items:
              type: string
            type:
              - array
              - "null"
        - description: multi-value ?source=api&source=mcp — exact-match OR; значение вне enum → 422
          explode: true
          in: query
          name: source
          schema:
            description: multi-value ?source=api&source=mcp — exact-match OR; значение вне enum → 422
            items:
              enum:
                - signal
                - api
                - mcp
                - keeper_internal
                - soul_grpc
                - background
                - config_bootstrap
              type: string
            type:
              - array
              - "null"
        - description: AID Архонта-инициатора (case-insensitive substring, ILIKE)
          explode: false
          in: query
          name: archon_aid
          schema:
            description: AID Архонта-инициатора (case-insensitive substring, ILIKE)
            type: string
        - description: ULID цепочки связанных событий (case-insensitive substring, ILIKE)
          explode: false
          in: query
          name: correlation_id
          schema:
            description: ULID цепочки связанных событий (case-insensitive substring, ILIKE)
            type: string
        - description: имя Herald-канала из payload->>'herald' (exact match)
          explode: false
          in: query
          name: payload_herald
          schema:
            description: имя Herald-канала из payload->>'herald' (exact match)
            type: string
        - description: voyage_id из payload->>'voyage_id' (exact match)
          explode: false
          in: query
          name: payload_voyage
          schema:
            description: voyage_id из payload->>'voyage_id' (exact match)
            type: string
        - description: created_at >= started_after (RFC3339, включающая); bad-value → 400
          explode: false
          in: query
          name: started_after
          schema:
            description: created_at >= started_after (RFC3339, включающая); bad-value → 400
            format: date-time
            type: string
        - description: created_at <= started_before (RFC3339, включающая); bad-value → 400
          explode: false
          in: query
          name: started_before
          schema:
            description: created_at <= started_before (RFC3339, включающая); bad-value → 400
            format: date-time
            type: string
        - description: сдвиг от начала набора, ≥0 (совпадает с shared/api.ParsePage; out-of-range → 400)
          explode: false
          in: query
          name: offset
          schema:
            default: 0
            description: сдвиг от начала набора, ≥0 (совпадает с shared/api.ParsePage; out-of-range → 400)
            format: int32
            type: integer
        - description: размер страницы 1..1000 (совпадает с shared/api.ParsePage; out-of-range → 400)
          explode: false
          in: query
          name: limit
          schema:
            default: 50
            description: размер страницы 1..1000 (совпадает с shared/api.ParsePage; out-of-range → 400)
            format: int32
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditEventListReply"
          description: OK
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HumaProblemError"
          description: Bad Request
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HumaProblemError"
          description: Forbidden
        "422":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HumaProblemError"
          description: Unprocessable Entity
        "500":
          content:
