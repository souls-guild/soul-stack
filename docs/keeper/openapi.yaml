        - dry_run
        - kind
        - scope_size
        - started_by_aid
        - status
        - total_batches
        - voyage_id
      type: object
    VoyageCancelReply:
      additionalProperties: false
      properties:
        status:
          type: string
        voyage_id:
          pattern: ^[0-9A-HJKMNP-TV-Z]{26}$
          type: string
      required:
        - status
        - voyage_id
      type: object
    VoyageCreateReply:
      additionalProperties: false
      properties:
        kind:
          type: string
        location:
          type: string
        scope_size:
          format: int64
          type: integer
        status:
          type: string
        voyage_id:
          pattern: ^[0-9A-HJKMNP-TV-Z]{26}$
          type: string
      required:
        - kind
        - location
        - scope_size
        - status
        - voyage_id
      type: object
    VoyageCreateRequest:
      additionalProperties: false
      properties:
