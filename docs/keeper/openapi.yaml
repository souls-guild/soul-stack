          explode: false
          in: query
          name: offset
          schema:
            default: 0
            description: сдвиг от начала набора, ≥0 (совпадает с shared/api.ParsePage; out-of-range → 400)
            format: int32
            type: integer
        - description: размер страницы 1..1000 (совпадает с shared/api.ParsePage; out-of-range → 400)
          explode: false
          in: query
          name: limit
          schema:
            default: 50
            description: размер страницы 1..1000 (совпадает с shared/api.ParsePage; out-of-range → 400)
            format: int32
            type: integer
