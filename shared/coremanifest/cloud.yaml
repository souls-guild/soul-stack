kind: soul_module
protocol_version: 1
namespace: core
name: cloud

spec:
  states:
    created:
      description: Keeper-side (on:keeper). Облачные VM созданы через CloudDriver-плагин (ADR-017).
      input:
        provider:          { type: string, required: true, description: "Имя cloud-Provider в реестре (driver + креды + регион)." }
        profile:           { type: map,    description: "Параметры VM-профиля (backend-специфично)." }
        count:             { type: int,    description: "Сколько VM создать (default 1, >= 1)." }
        userdata:          { type: string, description: "Cloud-init userdata (взаимоисключим с generate_userdata и self_onboard)." }
        generate_userdata: { type: bool,   description: "Сгенерировать userdata из keeper.yml cloud_init (ADR-017(h))." }
        name:              { type: string, description: "Базовое имя VM-батча (self-onboard Вариант T): keeper предсказывает FQDN=<name>-<index>.<suffix>. Обязателен при self_onboard." }
        self_onboard:      { type: bool,   description: "VM онбордится сама из cloud-init (Вариант T, ADR-017(h)): keeper предсказывает FQDN и запекает per-VM токены в userdata. Требует name + providers.fqdn_suffix." }
    destroyed:
      description: Keeper-side (on:keeper). Облачные VM уничтожены, реестры cascade-обновлены (ADR-017).
      input:
        provider: { type: string, required: true, description: "Имя cloud-Provider в реестре." }
        vm_ids:   { type: list,   required: true, items: { type: string }, description: "Список provider-vm-id для уничтожения." }
        sids:     { type: list,   items: { type: string }, description: "SID-ы для cascade-обновления реестров (souls/seeds/tokens)." }
    resized:
      description: Keeper-side (on:keeper). Ресурсы облачных VM изменены до абсолютного целевого размера через CloudDriver.Resize (capability Resizable).
      input:
        provider:       { type: string, required: true, description: "Имя cloud-Provider в реестре." }
        vm_ids:         { type: list,   required: true, items: { type: string }, description: "provider-vm-id для resize (один target на весь батч)." }
        desired:        { type: map,    required: true, description: "Целевые ресурсы в наших единицах: cpu_cores (ядра) / ram_mb (МБ) / disk_gb (ГБ). Хотя бы одно > 0; поля с 0 не меняются." }
        allow_downtime: { type: bool,   description: "Разрешить downtime (stop/start) для cpu/ram-resize. Обязателен при изменении cpu/ram; disk-only online (default false)." }
