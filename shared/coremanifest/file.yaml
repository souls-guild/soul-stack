kind: soul_module
protocol_version: 1
namespace: core
name: file

required_capabilities:
  - fs_write_root

spec:
  states:
    present:
      description: Файл существует с заданным content/mode/owner/group (ADR-015).
      input:
        path:    { type: string, required: true, description: "Целевой путь файла." }
        content: { type: string, description: "Содержимое файла (inline). Взаимоисключается с src; ни одного — пустой файл." }
        src:     { type: string, description: "Абсолютный путь regular-файла на хосте, содержимое копируется в path (типично результат core.archive.extracted). Задаёт только содержимое, не атрибуты источника. Взаимоисключается с content." }
        mode:    { type: string, description: "Права в восьмеричной форме, напр. \"0640\"." }
        owner:   { type: string, description: "Владелец (имя пользователя)." }
        group:   { type: string, description: "Группа-владелец (имя группы)." }
    absent:
      description: Файл удалён.
      input:
        path: { type: string, required: true, description: "Путь удаляемого файла." }
    directory:
      description: Каталог существует с заданным owner/group/mode (замена `core.exec.run install -d`, ADR-015).
      input:
        path:    { type: string, required: true, description: "Целевой путь каталога." }
        mode:    { type: string, description: "Права в восьмеричной форме, напр. \"0755\"." }
        owner:   { type: string, description: "Владелец (имя пользователя)." }
        group:   { type: string, description: "Группа-владелец (имя группы)." }
        parents: { type: bool,   description: "Создавать промежуточные каталоги (семантика mkdir -p). Default false." }
    rendered:
      description: Файл = результат рендера text/template-шаблона (ADR-010).
      input:
        path:     { type: string, required: true, description: "Целевой путь рендеренного файла." }
        template: { type: string, required: true, description: "Путь к .tmpl-шаблону (резолвится локально, потом service-level)." }
        vars:     { type: map,    items: { type: string }, description: "Переменные рендера (видны шаблону как .vars.*)." }
        mode:     { type: string, description: "Права в восьмеричной форме, напр. \"0644\"." }
        owner:    { type: string, description: "Владелец (имя пользователя)." }
        group:    { type: string, description: "Группа-владелец (имя группы)." }
