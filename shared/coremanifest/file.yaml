kind: soul_module
protocol_version: 1
namespace: core
name: file

required_capabilities:
  - fs_write_root

spec:
  states:
    present:
      description: File exists with the given content/mode/owner/group (ADR-015).
      input:
        path:    { type: string, required: true, description: "Target file path." }
        content: { type: string, description: "File content (inline). Mutually exclusive with src; if neither is given, an empty file." }
        src:     { type: string, description: "Absolute path of a regular file on the host, its content is copied to path (typically the result of core.archive.extracted). Sets only the content, not the source's attributes. Mutually exclusive with content." }
        mode:    { type: string, description: "Permissions in octal form, e.g. \"0640\"." }
        owner:   { type: string, description: "Owner (username)." }
        group:   { type: string, description: "Owning group (group name)." }
    absent:
      description: File is removed.
      input:
        path: { type: string, required: true, description: "Path of the file to remove." }
    rendered:
      description: File = result of rendering a text/template template (ADR-010).
      input:
        path:     { type: string, required: true, description: "Target path of the rendered file." }
        template: { type: string, required: true, description: "Path to the .tmpl template (resolved locally, then service-level)." }
        vars:     { type: map,    items: { type: string }, description: "Render variables (visible to the template as .vars.*)." }
        mode:     { type: string, description: "Permissions in octal form, e.g. \"0644\"." }
        owner:    { type: string, description: "Owner (username)." }
        group:    { type: string, description: "Owning group (group name)." }
