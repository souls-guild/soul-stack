kind: soul_module
protocol_version: 1
namespace: core
name: group

required_capabilities:
  - run_as_root
  - exec_subprocess

spec:
  states:
    present:
      description: Группа существует (present-or-create; ADR-015).
      input:
        name:   { type: string, required: true, description: "Имя группы." }
        gid:    { type: int,    description: "Явный gid (groupadd -g). Действует только при создании." }
        system: { type: bool,   description: "Системная группа (groupadd -r), gid из системного диапазона. Только при создании." }
    absent:
      description: Группа удалена.
      input:
        name: { type: string, required: true, description: "Имя группы." }
