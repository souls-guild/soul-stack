kind: soul_module
protocol_version: 1
namespace: core
name: firewall

required_capabilities:
  - run_as_root
  - exec_subprocess

spec:
  states:
    present:
      description: Правило файрвола существует (port/proto/source/action); ufw/firewalld. ADR-015/ADR-016.
      input:
        # port читается как int ИЛИ string (для ${...}-интерполяции). Тип в схеме —
        # int (числовой литерал); строковая форма проходит как CEL-обёрнутая.
        port:   { type: int,    required: true, description: "Порт 1..65535." }
        proto:  { type: string, enum: [tcp, udp],  description: "Протокол tcp|udp (default tcp)." }
        action: { type: string, enum: [allow, deny], description: "Действие allow|deny (default allow)." }
        source: { type: string, description: "IPv4 CIDR или одиночный IPv4 (default any). IPv6 не поддержан в MVP." }
        zone:   { type: string, description: "Зона firewalld (default — default zone)." }
    absent:
      description: Правило удалено.
      input:
        port:   { type: int,    required: true, description: "Порт 1..65535." }
        proto:  { type: string, enum: [tcp, udp],  description: "Протокол tcp|udp (default tcp)." }
        action: { type: string, enum: [allow, deny], description: "Действие allow|deny (default allow)." }
        source: { type: string, description: "IPv4 CIDR или одиночный IPv4." }
        zone:   { type: string, description: "Зона firewalld." }
