kind: soul_module
protocol_version: 1
namespace: core
name: exec

required_capabilities:
  - exec_subprocess

spec:
  states:
    run:
      description: Запустить процесс с argv без shell (ADR-015).
      input:
        cmd:     { type: string, required: true, example: "/usr/local/bin/myscript", description: "Имя исполняемого файла (argv[0], без shell)." }
        args:    { type: list,   items: { type: string }, description: "Аргументы argv[1:]." }
        cwd:     { type: string, description: "Рабочий каталог процесса." }
        env:     { type: map,    items: { type: string }, description: "Дополнительные переменные окружения (KEY: VALUE)." }
        creates: { type: string, description: "Idempotency: если файл существует — шаг пропускается (changed=false)." }
        unless:  { type: string, description: "Idempotency: shell-команда; exit=0 → пропуск." }
        onlyif:  { type: string, description: "Idempotency: shell-команда; exit≠0 → пропуск." }
