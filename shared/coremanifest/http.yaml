kind: soul_module
protocol_version: 1
namespace: core
name: http

required_capabilities:
  - network_outbound

spec:
  states:
    probe:
      description: Read-probe HTTP-эндпоинта (GET/HEAD); read-only, changed всегда false. ADR-015/ADR-016, https-only.
      input:
        url:           { type: string, required: true, description: "Целевой URL (только https://; SSRF-guard на резолвнутый IP)." }
        method:        { type: string, enum: [GET, HEAD], default: GET, description: "HTTP-метод GET|HEAD (default GET); мутирующие методы запрещены." }
        # headers — sensitive-by-construction (ADR-010 §7.4): значения не логируются,
        # в output отдаётся только список ключей. secret-флаг DSL не ставится (он форсит
        # `^vault:.*`-ref, а headers — произвольная map). Маскинг — runtime-аспект.
        headers:       { type: map,    items: { type: string }, description: "HTTP-заголовки (значения секретны, в output не попадают)." }
        status_codes:  { type: list,   items: { type: int }, description: "Ожидаемые коды ответа (список int); по умолчанию 2xx." }
        allow_private: { type: bool,   description: "Снять SSRF-guard для internal health-check (default false)." }
        allow_http:    { type: bool,   description: "Разрешить http:// (снять https-only); file:// остаётся запрещён. Не открывает SSRF (default false)." }
        insecure_skip_verify: { type: bool, description: "Отключить TLS-верификацию (self-signed / internal CA); MITM-риск (default false)." }
        timeout:       { type: string, format: duration, description: "Таймаут probe (Soul Stack duration, напр. \"30s\")." }
