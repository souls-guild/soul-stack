name: Feature request
description: Suggest an improvement or a new capability
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea. Please describe the **problem** you're trying to solve, not
        only the solution you have in mind — it helps us find the best fit.

        For larger changes, this issue is a good place to agree on the approach before
        anyone writes code. Design decisions live in the
        [ADRs](https://github.com/souls-guild/soul-stack/tree/main/docs/adr).

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do, and what's getting in the way today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like Soul Stack to do? A config/API sketch helps.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, and why they fall short.
    validations:
      required: false

  - type: dropdown
    id: component
    attributes:
      label: Area
      description: Which part of Soul Stack does this touch?
      options:
        - keeper
        - soul
        - soulctl
        - soul-lint
        - web
        - modules / Destiny
        - docs
        - not sure / several
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else — use case, links, prior art.
    validations:
      required: false
