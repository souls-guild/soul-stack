# Release Soul Stack. Automates the manual release flow (P0 release
# engineering, docs/prod-readiness.md): `make build` + `make pkg` + `make sbom`
# and publishing artifacts to GitHub Release. All build logic stays in the
# Makefile — the workflow only reproduces it on the runner, no duplication.
#
# GH-MINUTE SAVINGS (2k/month limit): the workflow runs EXCLUSIVELY on push of
# a `v*` tag — releases are rare. On a regular push to a branch/PR it does not
# run (that's ci.yml's job). One tag = one run.
name: Release

# Only tag-push `v*`. Does not react to branches/PRs. Will NOT fire on an
# already-existing tag (e.g. v0.1.0-beta.1) — the trigger catches a push of a
# NEW tag.
on:
  push:
    tags:
      - "v*"

# Needs write permission for Releases (create release + upload assets).
# Everything else — read.
permissions:
  contents: write

env:
  # Go version from go.work (toolchain 1.26.4), synced with ci.yml.
  GO_VERSION: "1.26.4"

jobs:
  release:
    name: build + package + publish release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # Full history + tags: VERSION in the Makefile comes from
          # `git describe --tags`. Without fetch-depth: 0 and tags, describe
          # would return the short sha instead of the tag name.
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: |
            keeper/go.sum
            proto/go.sum
            proto/plugin/go.sum
            sdk/go.sum
            shared/go.sum
            soul/go.sum
            soul-lint/go.sum
            soulctl/go.sum

      # Packagers not present in the runner's PATH. Same commands the
      # Makefile prints as a hint when they're missing (pkg/sbom targets).
      - name: Install nfpm + cyclonedx-gomod
        run: |
          set -euo pipefail
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          go install github.com/CycloneDX/cyclonedx-gomod/cmd/cyclonedx-gomod@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      # Binaries (natively linux-amd64 on ubuntu-latest), then deb+rpm and SBOM.
      # VERSION inside each target is derived from git describe (tag) — same
      # as in a manual release, no need to pass it separately.
      - name: make build
        run: make build

      - name: make pkg (deb + rpm)
        run: make pkg

      - name: make sbom
        run: make sbom

      # `make build` puts binaries into <module>/bin/<name> without an
      # arch suffix. We lay them out into dist/release-assets/ with
      # *-linux-amd64 names for the release (runner = linux-amd64, and
      # binaries from `make build` are exactly that). soul-trial from build
      # is NOT published (internal trial harness).
      - name: Stage release binaries
        run: |
          set -euo pipefail
          mkdir -p dist/release-assets
          cp keeper/bin/keeper        dist/release-assets/keeper-linux-amd64
          cp soul/bin/soul            dist/release-assets/soul-linux-amd64
          cp soul-lint/bin/soul-lint  dist/release-assets/soul-lint-linux-amd64
          cp soulctl/bin/soulctl      dist/release-assets/soulctl-linux-amd64
          ls -l dist/release-assets dist/pkg dist/sbom

      # Prerelease for pre-release tags: the name contains `-beta` or `-rc`
      # (e.g. v0.1.0-beta.1, v1.2.0-rc.1). A stable tag (v1.2.0) → a regular
      # release. softprops/action-gh-release accepts prerelease as a boolean string.
      - name: Determine prerelease flag
        id: prerelease
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if [[ "$tag" == *-beta* || "$tag" == *-rc* ]]; then
            echo "value=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          # Tag and release name = the pushed tag. Body is generated
          # automatically from commits between tags.
          generate_release_notes: true
          prerelease: ${{ steps.prerelease.outputs.value }}
          files: |
            dist/release-assets/keeper-linux-amd64
            dist/release-assets/soul-linux-amd64
            dist/release-assets/soul-lint-linux-amd64
            dist/release-assets/soulctl-linux-amd64
            dist/pkg/*.deb
            dist/pkg/*.rpm
            dist/sbom/*.cdx.json

