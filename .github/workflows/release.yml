# Release Soul Stack via GoReleaser (NIM-135). One tag = one logical version of
# all modules (RELEASING.md / ADR-011). GoReleaser reproduces on the runner what
# the Makefile does by hand — cross-compile keeper/soul/soul-lint/soulctl for
# linux amd64+arm64, package (deb/rpm/brew/tar.gz), push GHCR images, sign every
# artifact with cosign keyless, and attach a syft SBOM. Config: .goreleaser.yaml.
#
# GH-MINUTE SAVINGS (2k/month limit): runs EXCLUSIVELY on push of a `v*` tag —
# releases are rare. Regular pushes/PRs are ci.yml's job. One tag = one run.
name: Release

on:
  push:
    tags:
      - "v*"

# Least-privilege, scoped to what GoReleaser needs on a tag:
#   contents: write  — create the GitHub Release + upload assets
#   packages: write  — push images to GHCR
#   id-token: write  — OIDC token for cosign keyless (Fulcio/Rekor)
permissions:
  contents: write
  packages: write
  id-token: write

env:
  # Go toolchain from go.work, synced with ci.yml.
  GO_VERSION: "1.26.4"

jobs:
  release:
    name: goreleaser + GHCR + cosign + SBOM
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # Full history + tags: GoReleaser derives the version from the tag and
          # generates the changelog from the commit range. Shallow clones break both.
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
          # Cache every module's go.sum (go.work multi-module workspace).
          cache-dependency-path: |
            keeper/go.sum
            proto/go.sum
            proto/plugin/go.sum
            sdk/go.sum
            shared/go.sum
            soul/go.sum
            soul-lint/go.sum
            soulctl/go.sum

      # Multi-arch (arm64) image builds need qemu + buildx.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Push target for the GHCR images. GITHUB_TOKEN has packages:write here.
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # cosign for keyless signing (blobs + images); syft for the SBOM.
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0

      # Single GoReleaser run drives builds → packages → images → sign → SBOM →
      # GitHub Release. Keyless cosign uses the job's OIDC id-token (no secret key).
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Write access to souls-guild/homebrew-tap for the brew formula. On a
          # pre-release tag GoReleaser skips the tap upload (skip_upload: auto),
          # so this may be unset for betas without failing the run.
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          # Enables cosign keyless (Fulcio/Rekor via the OIDC token above).
          COSIGN_EXPERIMENTAL: "1"

# apt repo on Cloudflare R2 is published OUT OF BAND from this workflow (it needs
# R2 credentials, not GitHub OIDC): after the release, the .deb assets are
# mirrored into the apt pool by deploy/apt-r2/publish-apt.sh. See
# deploy/apt-r2/README.md for the process.
