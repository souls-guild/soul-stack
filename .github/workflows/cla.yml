# CLA Assistant (Lite). Asks first-time contributors to sign the Contributor License
# Agreement (../../CLA.md) and records signatures. No third-party SaaS: signatures are
# stored IN THIS REPOSITORY at `path-to-signatures` on the default branch.
#
# Flow: on a PR the action checks whether every author has signed; if not, it comments
# with the CLA link and the sign sentence. A contributor signs by replying to that
# comment with the exact sentence — the `issue_comment` trigger below re-runs the check
# and appends the signature to the JSON store. `recheck` forces a re-scan.
#
# `pull_request_target` (not `pull_request`) is required so the action has repo write
# access and secrets even for PRs from forks. It only reads PR metadata and posts
# comments — it never checks out or runs the PR's code, so the elevated context is safe.
name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write      # write the signature file back to the repo
  pull-requests: write # comment on / label the PR
  statuses: write

jobs:
  cla:
    name: CLA Assistant
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: >-
          (github.event.comment.body == 'recheck' ||
           github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA')
          || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          # GITHUB_TOKEN is enough because signatures live in THIS repo. A separate
          # PERSONAL_ACCESS_TOKEN is only needed if the store is moved to another repo
          # (then also set remote-organization-name / remote-repository-name below).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: signatures/version1/cla.json
          path-to-document: https://github.com/souls-guild/soul-stack/blob/main/CLA.md
          branch: main
          # Bots don't sign CLAs.
          allowlist: dependabot[bot],*[bot]
          custom-notsigned-prcomment: >-
            Thanks for your contribution! Before we can merge it, please sign our
            [Contributor License Agreement](https://github.com/souls-guild/soul-stack/blob/main/CLA.md)
            by posting the comment below. You sign once; it covers your future PRs too.
          custom-pr-sign-comment: I have read the CLA Document and I hereby sign the CLA
          custom-allsigned-prcomment: All contributors have signed the CLA. ✅
